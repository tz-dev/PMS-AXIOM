      CRITIQUE_PROD, CRITIQUE_STABLE, D1 reaction drift, D3 narrative repair,
      D5 public pillory, or a combined case-specific signature.>
    final_claim_boundary: >
      This CRITIQUE overlay adds visibility for critique thresholds, reach,
      scale, publicness, drift, modulators, and critique-facing projection
      boundaries. It does not revise PMS Base, rewrite the PMS Core pass,
      establish truth, verify motives, diagnose persons, rank persons, prescribe
