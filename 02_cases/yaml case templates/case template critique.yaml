  mip_docking_interface:
    status: "<not_triggered | optional | triggered | needs_review>"
    purpose: >
      Optional controlled handoff from structural explanation
      PMS-CRITIQUE to explicit evaluation MIP when legitimacy, attribution, or
      regime conditions are the stated object.
    non_implication: >
      Docking does not imply that PMS-CRITIQUE naturally culminates in
      evaluation. PMS-CRITIQUE remains complete as a structural grammar without
      downstream docking.
    separation_rule:
      pms_critique_role: >
        Explains how critique emerges, stabilizes, drifts, and binds at the
        level of operator grammar.
      mip_role: >
        Evaluates enactments, attribution, and regime conditions under explicit
        criteria, documentation, and guardrails.
      non_substitution:
        - "PMS-CRITIQUE must not be used to decide legitimacy."
        - "MIP must not be used to explain critique emergence or mutation."
        - "No back-projection of MIP verdicts into PMS causal language."
        - "No retrofitting of PMS structures into evaluative scores."
    docking_points:
      DP1_projection_input:
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          PMS critique-facing projections A/C/R/E/D may serve as scene-bound
          inputs for MIP-style case description without becoming trait claims.
        case_application: >
          <State whether projection input docking is relevant.>
      DP2_asymmetry_evaluation:
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          PMS may describe asymmetry structurally; MIP may evaluate enactment of
          that asymmetry under its own explicit criteria.
        case_application: >
          <State whether asymmetry evaluation docking is relevant.>
      DP3_regime_publicity_constraint:
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Publicness and transmission conditions may be imported as explicit
          admissibility constraints for evaluative use.
        case_application: >
          <State whether regime/publicity docking is relevant.>
      DP4_shared_critique_readiness:
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Docking is valid only when structural explanation and evaluation
          remain documented, reversible, bounded, and non-weaponizable.
        case_application: >
          <State whether shared critique-readiness conditions are met.>

  limits_and_boundedness:
    structural_limits:
      - "Does not establish truth."
      - "Does not verify motives, sincerity, or inner states."
      - "Does not adjudicate moral rightness."
      - "Does not rank persons, roles, or groups."
      - "Does not function as clinical, forensic, HR, compliance, or sanctioning tool."
      - "Does not dissolve accountability into 'just structure'."
      - "Does not promise exhaustive capture of lived experience, normative disagreement, or social reality."
    genuine_non_capture:
      status: "kept_open"
      possible_when:
        - "the grammar produces a coherent reading but weakens what is structurally decisive in the case"
        - "critique functions more as symbolic refusal, public rupture, ethical contestation, or resistance than as correction-oriented coordination"
        - "rival framings preserve dimensions that PMS-CRITIQUE backgrounds by design"
      anti_absorption_rule:
        - "Do not prematurely redescribe resistant cases as mere drift."
        - "Do not treat resistant cases as calibration noise by default."
        - "Do not treat incomplete capture as proof that the scene is defective."
      case_application: >
        <State the case-specific non-capture zones.>
    rival_framings:
      status: "kept_open"
      note: >
        Rival critique grammars remain methodologically open. PMS-CRITIQUE may
        be more structurally legible in some cases without thereby being
        superior in all respects.
      case_application: >
        <State which rival critique grammars remain open.>
    final_boundedness_statement: >
      Nothing in this overlay requires PMS-CRITIQUE to be treated as final,
      exhaustive, or uniquely sufficient. Its strength remains most credible
      where its own limits, rival framings, and possible non-capture cases are
      kept explicit.

  guardrails:
    application_gate:
      required:
        - "Χ + reversibility + D is a validity constraint on PMS application, not on critique, refusal, revision, or rejection."
        - "Χ remains practically activatable; stop-capability is real, not merely formal."
        - "Reversibility: readings remain scene-bound and revisable; Θ accumulation is treated as real."
        - "Dignity-in-Practice: no shaming, humiliation, or actor-ranking; critique stays structural."
        - "Applications remain scene-bound rather than person-bound."
      disallowed_uses:
        - "Person-labeling, motive attribution, psychological diagnosis."
        - "Verdict logic as an output of the model."
        - "Coercive binding Ψ→Other, threats, or exposure-as-punishment."
        - "Using drift labels as sanctions rather than structural descriptors."
        - "Using structure-talk to suspend accountability where responsibility was structurally available."
        - "Treating resistant cases as invalid merely because they exceed this grammar."
      case_application: >
        <State how the application gate is preserved in this case.>
    dignity_in_practice:
      status: "<maintained | compromised | needs_review>"
      note: >
        D constrains application mode, not content: analysis must not become a
        pile-on and must preserve restraint even when Ω or P are high.
      invalidity_clause: >
        Critique becomes structurally invalid as a PMS-CRITIQUE enactment when
        degradation, humiliation, or exposure steering replaces correction.
      case_application: >
        <State how dignity-in-practice is preserved or at risk.>
    misuse_signatures_to_flag:
      chi_as_coercion:
        signature: "Using Χ-language to demand compliance."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether Χ-language drifts into coercion.>
      exposure_as_correction:
        signature: "Treating public exposure as correction; P substituted for Σ/Ψ."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether exposure is substituted for correction.>
      drift_labels_as_moral_rank:
        signature: "Turning drift labels into moral rank tokens."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether drift labels risk moral ranking.>
      scene_to_person_typing:
        signature: "Collapsing scene-bounded critique into person-typing."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether scene descriptors risk becoming person labels.>
      irreversible_binding_demands:
        signature: "Using drift language to justify irreversible binding demands."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether drift language risks coercive binding.>
      explanation_neutralizes_accountability:
        signature: "Using explanation-first language to neutralize accountability."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether structural explanation risks neutralizing accountability.>
      evaluation_bypasses_structure:
        signature: "Using evaluation-first labels to bypass structural explanation."
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether evaluative labels bypass structural explanation.>

  example_suite_schema_alignment:
    status: "reference_only_not_used_as_case_output"
    source: "PMS-CRITIQUE.yaml:example_suite.packet_schema"
    required_fields_reference:
      - "scene_label"
      - "frame_anchor (□)"
      - "trigger_mismatch (Δ)"
      - "operator_signature (reduced; 2–6 operators)"
      - "guardrail_gate (Χ + reversibility + D reminder)"
