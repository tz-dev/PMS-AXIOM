      <State the selected horizontal scale and whether P amplifies drift.>
    drift_result: >
      <State the main CRITIQUE drift risks and how they are constrained.>
    dignity_result: >
      <State how Dignity-in-Practice is preserved or where critique risks
      degradation, humiliation, exposure steering, or person-typing.>
