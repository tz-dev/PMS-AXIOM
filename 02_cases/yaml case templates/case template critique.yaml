pms_critique_overlay_application:
  schema_version: "PMS-CRITIQUE_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-CRITIQUE.yaml"
  paper_source_file: "PMS-CRITIQUE.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "Praxeological Meta-Structure – Critique Layer"
    model_short: "PMS-CRITIQUE"
    status: "repository_overlay_draft"
    maturity: "draft"
    repository_role: "paper_specific_application_schema"
    last_updated: "2026-04-06"
    doi: "10.5281/zenodo.18175456"
    repositories:
      pms_base: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
      this_repo: "https://github.com/tz-dev/PMS-CRITIQUE"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
      repository_role: "current_base_schema"
    description: >
      PMS-CRITIQUE is a PMS-conform application layer that reconstructs critique
      as a structurally constrained praxis form: how mismatch becomes
      interruptible through Χ-stabilized framed differentiation, how critique
      becomes productive through Φ and Σ, and how follow-up may become bound
      across time through Ψ without coercion.
    epistemic_status: >
      This overlay is structurally disciplined and portable, but not final,
      exhaustive, uniquely sufficient, immune to revision, or superior to all
      rival critique grammars.
    methodological_restraint: >
      PMS-CRITIQUE does not claim monopoly on critique analysis. Rival grammars
      may remain stronger where normativity, institutional legitimacy,
      rhetorical force, discourse ethics, public rupture, resistance, or lived
      experience are the primary object.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "<completed PMS Core case YAML>"
    rule: >
      This CRITIQUE block is appended to or integrated with an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or
      treat CRITIQUE constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The CRITIQUE overlay may add visibility for critique thresholds, reach,
      scale, publicness, drift classes, modulators, critique-facing derived-axis
      projections, optional MIP docking, and misuse guardrails. It must not
      modify the completed PMS Core case except where a direct PMS.yaml
      inconsistency has been separately identified.

  pms_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
    dependency_hygiene:
      chi_note: >
        Χ is used here as a reduced signature for critique interruptibility.
        In PMS terms, Χ presupposes Φ, Θ, and □; it is not treated as a
        standalone trait.
      no_operator_override: >
        Any operator gloss in this overlay is an application-facing excerpt
        only. Canonical operator definitions and dependencies remain in
        PMS.yaml.
      overlay_discipline: >
        Derived critique constructs remain overlay-level and do not alter the
        base PMS derivation path.

  nested_overlay_policy:
    overlays:
      P:
        name: "Publicness Overlay"
        type: "overlay_modulator"
        is_operator: false
        amplifies:
          - "Ω"
          - "Θ"
          - "Α"
        note: >
          Publicness amplifies exposure gradients, hardens irreversibility, and
          accelerates script stabilization without creating critique or
          correction by itself.
        case_application: >
          <State whether publicness amplifies the critique configuration in this case.>
    no_base_extension: true
    rule: >
      PMS-CRITIQUE introduces overlay-level constructs only: critique formulas,
      reach and scale ladders, publicness overlay, drift classes, modulators,
      projections, docking interfaces, and example-packet discipline. These
      organize existing PMS operators and never become PMS operators or
      dependencies.

  validity_gate:
    status: "<passed | failed | needs_review>"
    gate_type: "PMS_application_only"
    note: >
      This gate constrains PMS application only. It does not constrain critique,
      refusal, rejection, revision proposals, or rival formalizations.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "<maintained | compromised | needs_review>"
        meaning: >
          A maintained meta-position and stop-capability are present. The
          CRITIQUE overlay does not fuse the case into reaction, verdict,
          sanction, exposure-punishment, authority, or person-level attribution.
      reversibility:
        status: "<maintained | compromised | needs_review>"
        meaning: >
          Readings remain scene-bound, revisable, and non-final. The overlay
          does not produce global person labels, irreversible labels, or final
          judgments.
      Dignity_in_Practice_D:
        id: "D"
        status: "<maintained | compromised | needs_review>"
        meaning: >
          Dignity-in-Practice is preserved. The overlay does not shame, rank,
          humiliate, morally evaluate, diagnose, or ontologically assess persons
          or groups.
    gate_result: "<valid_as_critique_overlay_application | invalid_as_critique_overlay_application | requires_revision>"

  critique_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgment, no person-ranking, no sanction logic."
      - "No adjudication of correctness, truth, motives, sincerity, or moral rightness."
      - "No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal, or enforcement script."
      - "Critique remains structural, scene-bound, reversible, and non-coercive."
      - "Drift labels remain structural descriptors, not accusations."
      - "Resistant cases must not be treated as invalid merely because they exceed PMS-CRITIQUE."
    may_add_visibility_to:
      - "mismatch as Δ"
      - "response pressure as ∇"
      - "frame relevance and role space as □"
      - "non-response or missing follow-up as Λ"
      - "stabilized critique scripts as Α"
      - "exposure gradients as Ω"
      - "accumulation and irreversibility as Θ"
      - "recontextualization as Φ"
      - "stop-capability and interruptibility as Χ"
      - "correction consolidation as Σ"
      - "non-coercive follow-up binding as Ψ"
      - "minimal, productive, and stable critique thresholds"
      - "vertical reach and horizontal scale"
      - "publicness amplification"
      - "critique drift patterns"
      - "modulator conditions"
      - "critique-facing A/C/R/E/D projections"
      - "optional MIP docking boundaries"
    must_not_do:
      - "treat critique as personal essence"
      - "treat reaction as weaker critique"
      - "treat judgment as strict critique without Χ, Φ, or Σ"
      - "translate critique legibility into verdict"
      - "convert Ψ into Ψ→Other coercive demand"
      - "treat public exposure as correction"
      - "use drift labels as sanctions"
      - "collapse scene-bounded critique into person-typing"
      - "use explanation-first language to neutralize accountability"
      - "use evaluation-first labels to bypass structural explanation"
      - "claim PMS Base validation"

  critique_core:
    scope_note: >
      PMS-CRITIQUE models structural conditions of critique and drift under
      load. It does not adjudicate correctness of opinions, establish truth,
      verify motives, or provide normative discourse ethics.
    definitions:
      CRITIQUE_MIN:
        label: "Minimal Critique"
        applicability: "<active | weak | not_applicable | needs_review>"
        formula:
          required:
            - "Δ"
            - "□"
            - "Χ"
          background_typically_active:
            - "Ω"
            - "Θ"
        gloss: >
          Minimal critique is Χ-stabilized framed differentiation: a mismatch
          Δ becomes legible as relevant inside a frame □, and the configuration
          remains interruptible Χ rather than collapsing into impulse discharge,
          frame policing, or paralysis.
        threshold_status: "strict_structural_minimum"
        non_equivalences:
          - "Reaction Δ + ∇ without Χ is not a weaker critique; it is structurally different."
          - "Judgment □ + Δ without Φ/Σ does not count as critique in the strict sense used here."
          - "Silence or paralysis under mismatch are not low-grade critique; they are distinct stabilizations."
        case_application: >
          <State whether the case reaches minimal critique and how Δ, □, and Χ
          are satisfied or under-specified.>

      CRITIQUE_PROD:
        label: "Productive Critique"
        applicability: "<active | weak | not_applicable | needs_review>"
        formula:
          required:
            - "Δ"
            - "□"
            - "Χ"
            - "Φ"
            - "Σ"
          background_typically_active:
            - "Ω"
            - "Θ"
        gloss: >
          Productive critique crosses from interruption into correction. Φ
          recontextualizes the mismatch into an actionable context; Σ
          consolidates a coherent corrective step that is coordinatable rather
          than merely asserted.
        threshold_status: "productive_correction_threshold"
        case_application: >
          <State whether the case reaches productive critique, or whether it
          remains at interruption, reaction, judgment, commentary, silence, or
          drift.>

      CRITIQUE_STABLE:
        label: "Stable Critique / Follow-up Binding"
        applicability: "<active | weak | not_applicable | needs_review>"
        formula:
          required:
            - "Δ"
            - "□"
            - "Χ"
            - "Φ"
            - "Σ"
            - "Ψ"
          background_typically_active:
            - "Ω"
            - "Θ"
        gloss: >
          Stable critique binds correction into a trajectory without coercing
          others. Follow-up becomes structurally owned over time Θ while
          remaining revisable and restrained by Dignity-in-Practice.
        threshold_status: "follow_up_binding_threshold"
        binding_rule: "Ψ must bind self or own follow-up, not become Ψ→Other demand."
        case_application: >
          <State whether the case reaches stable critique and how follow-up
          ownership appears without coercion.>

    non_goals:
      - "No moral ranking of positions, speakers, or outcomes."
      - "No psychological typing, motive attribution, sincerity judgment, trait claim, or diagnostic claim."
      - "No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal, or sanctioning logic."
      - "No coercive enforcement: Ψ must not be converted into Ψ→Other demands."
      - "No truth adjudication, correctness verdict, or final settlement of critique legitimacy."

    reach_ladder_note: >
      The vertical reach ladder is not a virtue ladder. It describes how far a
      critique chain structurally travels from mismatch to interruption to
      correction to binding before breaking.
    boundedness_note: >
      These critique formulas are paper-specific overlay constructs. They do
      not establish that all critique-relevant phenomena must be captured in
      exactly these terms.

  critique_mapping:
    overview: >
      Operator-to-critique mappings are one-to-many: each PMS operator may
      realize multiple critique-relevant functions depending on frame and
      scale. This mapping is descriptive and does not treat operators as
      psychological traits or personal capacities.
    operator_roles:
      "Δ":
        name: "Difference"
        critique_role: "Legible mismatch."
        typical_realizations:
          - "Error vs. standard."
          - "Claim vs. evidence mismatch."
          - "Expectation vs. non-response mismatch carried by Λ."
        case_application: >
          <State the mismatch that becomes critique-relevant.>
      "∇":
        name: "Impulse"
        critique_role: "Directional pressure to respond."
        typical_realizations:
          - "Fast-response pressure."
          - "Defensive countering."
          - "Demand for immediate explanation as closure substitute."
        case_application: >
          <State the response pressure or activation involved.>
      "□":
        name: "Frame"
        critique_role: "Relevance and role space."
        typical_realizations:
          - "Meeting / review frame."
          - "Training / evaluation frame."
          - "Platform discourse frame."
        case_application: >
          <State the frame that defines what counts as response, interruption, or correction.>
      "Λ":
        name: "Non-Event"
        critique_role: "Structured absence under expectation."
        typical_realizations:
          - "Promised follow-up does not occur."
          - "Repeated silence after raised concerns."
          - "Ambiguity sustained by not-deciding."
        case_application: >
          <State the missing response, omitted correction, delayed follow-up, or meaningful absence.>
      "Α":
        name: "Attractor"
        critique_role: "Stabilized scripts that handle critique pressure without correction."
        typical_realizations:
          - "Pile-on pattern."
          - "Silence script."
          - "Routine deflection."
          - "Process-talk without outcome."
        case_application: >
          <State whether a critique-handling pattern stabilizes.>
      "Ω":
        name: "Asymmetry"
        critique_role: "Exposure gradients."
        typical_realizations:
          - "Public target vs. diffuse crowd."
          - "Junior exposed under senior correction."
          - "Raiser bears cost; manager bears less cost."
        case_application: >
          <State the exposure, status, retaliation, or cost gradient.>
      "Θ":
        name: "Temporality"
        critique_role: "Accumulation and irreversibility."
        typical_realizations:
          - "Durable residue."
          - "Repeated non-follow-up hardens silence norm."
          - "No review windows; correction never consolidates."
        case_application: >
          <State how time, accumulation, residue, repetition, or review windows matter.>
      "Φ":
        name: "Recontextualization"
        critique_role: "Reframing toward correction or substitute."
        typical_realizations:
          - "Constraint context makes fix actionable."
          - "Endless explanation expansion without action plan."
          - "Reframing mismatch as tone problem."
        case_application: >
          <State whether recontextualization bridges toward correction or substitutes for it.>
      "Χ":
        name: "Distance"
        critique_role: "Stop-capability / interruptibility."
        typical_realizations:
          - "Legitimate pauses and renegotiations."
          - "Non-penalized meta-position."
          - "Protected revision windows."
        case_application: >
          <State how stop-capability or interruptibility appears or fails.>
      "Σ":
        name: "Integration"
        critique_role: "Consolidation of a corrective step."
        typical_realizations:
          - "Concrete fix, decision, or implementation unit."
          - "Aligned meaning that becomes actionable."
          - "Defined correction path with roles and constraints."
        case_application: >
          <State whether a corrective step consolidates.>
      "Ψ":
        name: "Self-Binding"
        critique_role: "Non-coercive trajectory ownership."
        typical_realizations:
          - "Assigned responsibility points and scheduled review."
          - "Audit loop or feedback loop."
          - "Bounded escalation rules that remain reversible."
        case_application: >
          <State whether follow-up is self-bound without coercing others.>

  critique_projections:
    overview: >
      These critique-facing projections reuse the base PMS derived axes as
      readability aids for critique scenes. They do not redefine PMS formulas
      and do not create scoring, diagnosis, maturity labels, or person
      evaluation.
    reuse_status: "overlay_level_reuse_of_base_PMS_derived_axes"
    axes:
      Awareness_A:
        symbol: "A"
        formula:
          - "Θ"
          - "□"
          - "Δ"
        description: "Sustained, framed differentiation across time."
        base_status: "reuse_of_base_PMS_derived_axis"
        case_application: >
          <State how critique sustains or fails framed differentiation over time.>
      Coherence_C:
        symbol: "C"
        formula:
          - "Θ"
          - "Λ"
          - "□"
          - "∇"
        description: "Narrative and expectation stability under time, framing, and non-events."
        base_status: "reuse_of_base_PMS_derived_axis"
        case_application: >
          <State how critique pressure, frame, non-event, and temporality affect coherence.>
      Responsibility_R:
        symbol: "R"
        formula:
          - "Ψ"
          - "Φ"
          - "Θ"
          - "Ω"
        description: "Bound follow-up ownership under asymmetry over time."
        base_status: "reuse_of_base_PMS_derived_axis"
        case_application: >
          <State whether responsibility appears as follow-up ownership under asymmetry and time.>
      Action_E:
        symbol: "E"
        formula:
          - "Σ"
          - "Θ"
          - "∇"
        description: "Enactable correction rather than commentary."
        base_status: "reuse_of_base_PMS_derived_axis"
        docking_note: >
          Within PMS-CRITIQUE, E can function as a critique-internal bridging
          descriptor for correction reach. It is not thereby elevated into a
          separate MIP core parameter.
        case_application: >
          <State whether critique becomes enactable correction or remains commentary / interruption / drift.>
      Dignity_in_Practice_D:
        symbol: "D"
        formula:
          - "Ψ"
          - "Χ"
          - "Ω"
        description: "Restrained handling of asymmetry under self-binding."
        base_status: "reuse_of_base_PMS_derived_axis"
        case_application: >
          <State how Dignity-in-Practice constrains the critique reading.>
    projection_note: >
      These projections increase readability within this framework but do not
      prove exhaustive critique representation.

  critique_axes:
    overview: >
      PMS-CRITIQUE uses two descriptive axes: vertical reach and horizontal
      scale, plus publicness overlay P. Reach and scale are structural, not
      virtue, status, moral rank, or person quality.
    vertical_reach:
      selected_level: "<V0 | V1 | V2 | V3 | V4 | mixed | not_applicable | needs_review>"
      levels:
        V0:
          name: "Irritation only"
          signature:
            - "Δ"
          description: "Mismatch is registered but not interruptible or framed into a critique episode."
          case_application: >
            <State whether the case remains at irritation only.>
        V1:
          name: "Reaction / discharge"
          signature:
            - "Δ"
            - "∇"
          description: "Directional response without Χ; critique in the strict sense does not occur."
          case_application: >
            <State whether the case is reaction/discharge rather than critique.>
        V2:
          name: "Minimal critique"
          signature:
            - "Δ"
            - "□"
            - "Χ"
          description: "Interruption becomes possible inside a frame and remains revisable."
          case_application: >
            <State whether minimal critique is reached.>
        V3:
          name: "Productive critique"
          signature:
            - "Δ"
            - "□"
            - "Χ"
            - "Φ"
            - "Σ"
          description: "Recontextualization and integration consolidate a corrective step."
          case_application: >
            <State whether productive critique is reached.>
        V4:
          name: "Stable critique"
          signature:
            - "Δ"
            - "□"
            - "Χ"
            - "Φ"
            - "Σ"
            - "Ψ"
          description: "Follow-up binding anchors correction into time without coercion."
          case_application: >
            <State whether stable critique is reached.>

    horizontal_scale:
      selected_system: "<paper_tags | deployment_tags | not_applicable | needs_review>"
      selected_paper_tag: "<a | b | c | d | mixed | not_applicable | needs_review>"
      selected_deployment_tag: "<dyadic_micro | small_group_team | org_institution | public_mass | not_applicable | needs_review>"
      note: >
        A case may carry both a paper tag and a deployment tag, but the systems
        themselves remain paper_tags and deployment_tags. No additional scale
        system is introduced.
      paper_tags:
        a:
          label: "Generic / Structural Critique (No Actor Binding)"
          description: >
            Critique is treated as formal structural possibility. No actor,
            role, or scene is bound. Ω/Θ appear only as abstract parameters.
          case_application: >
            <State whether the case is generic/structural critique.>
        b:
          label: "Single-Subject Critique (Self / Support / Learning)"
          description: >
            Critique is inwardly bound. The subject occupies both poles.
            Ω is internalized; Χ must be self-generated unless scaffolded.
            Ψ is optional but decisive for durable trajectory change.
          typical_drifts:
            - "Under-questioning"
            - "Over-framing"
            - "Φ without Σ"
            - "Avoidance of Σ due to anticipated self-exposure costs"
          case_application: >
            <State whether the case is single-subject critique.>
        c:
          label: "Small Group Critique (Peers / Team / Family)"
          description: >
            Critique becomes relational. Ω is distributed across roles; Χ is
            harder because interruption affects belonging and status. Λ becomes
            central; repeated Λ stabilizes Α scripts.
          typical_drifts:
            - "Λ → Α silence script"
            - "Judgment drift in evaluative micro-hierarchies"
            - "Diffusion drift via unclear role space"
          case_application: >
            <State whether the case is small-group critique.>
        d:
          label: "Public Critique (Street / Media / Online)"
          description: >
            Critique often operates under maximal amplification: Ω gradients
            steepen, Θ hardens irreversibility, Α stabilizes quickly, Χ becomes
            fragile, Σ is costly, and Ψ is rare or substituted by performative
            alignment signals.
          typical_drifts:
            - "Reaction drift under time pressure"
            - "Public pillory"
            - "Bystander paralysis → Λ persistence → silence attractor"
          case_application: >
            <State whether the case is public critique.>
      chapter_marker_quote_ready: >
        The operators stay the same, but scale decides the cost: as critique
        moves into publicness, exposure and irreversibility amplify drift
        without adding new structure.

      deployment_tags:
        dyadic_micro:
          label: "dyadic / micro"
          description: "Small, direct interaction."
          case_application: >
            <State relevance if applicable.>
        small_group_team:
          label: "small group / team"
          description: "Teams, meetings, families."
          case_application: >
            <State relevance if applicable.>
        org_institution:
          label: "organization / institution"
          description: "Governance layers, policies."
          case_application: >
            <State relevance if applicable.>
        public_mass:
          label: "public / mass"
          description: "Media, online, street publics."
          case_application: >
            <State relevance if applicable.>
      interoperability:
        preferred_system: "paper_tags"
        legacy_scale_tag_interpretation: "paper_tags"
        allowed_systems:
          - "paper_tags"
          - "deployment_tags"

    publicness_overlay:
      id: "P"
      applicability: "<active | weak | not_applicable | needs_review>"
      type: "overlay_modulator"
      is_operator: false
      amplifies:
        - "Ω"
        - "Θ"
        - "Α"
      description: >
        Publicness amplifies exposure gradients, hardens irreversibility, and
        accelerates script stabilization without creating critique or correction
        by itself.
      case_application: >
        <State whether publicness amplifies critique, drift, exposure, or residue in this case.>

  drift_typology:
    overview: >
      Drift names predictable structural mutations of critique chains under
      load. Drift labels are not accusations; they are operator-readable
      stabilization forms.
    methodological_status:
      type: "open_structural_index"
      note: >
        The drift typology is not exhaustive. Some cases may resist clean
        classification without this constituting mere deficiency.
    main_classes:
      D1:
        name: "Reaction masquerading as critique"
        applicability: "<active | risk | not_applicable | needs_review>"
        minimal_signature: "Δ + ∇ present / Χ absent"
        description: >
          Impulse discharge replaces interruption; expression is fast and
          non-interruptible.
        typical_markers:
          - "tempo pressure substitutes for framing"
          - "no stop-capability once launched"
        case_application: >
          <State whether reaction drift is active or a risk.>
      D2:
        name: "Judgment masquerading as critique"
        applicability: "<active | risk | not_applicable | needs_review>"
        minimal_signature: "□ + Δ present / Φ and Σ absent, often Ω leveraged"
        description: >
          Evaluation replaces coordination; labels stabilize clarity at the
          cost of actionability.
        typical_markers:
          - "evaluation replaces correction path"
          - "exposure increases while actionability decreases"
        case_application: >
          <State whether judgment drift is active or a risk.>
      D3:
        name: "Narrative repair masquerading as critique"
        applicability: "<active | risk | not_applicable | needs_review>"
        minimal_signature: "Φ high / Σ absent"
        description: >
          Recontextualization becomes endpoint; explanation expands while
          correction remains unreachable.
        typical_markers:
          - "endless reframing"
          - "no consolidated corrective step"
        case_application: >
          <State whether narrative repair drift is active or a risk.>
      D4:
        name: "Commentary / analysis paralysis"
        applicability: "<active | risk | not_applicable | needs_review>"
        minimal_signature: "Χ present / Σ absent"
        description: >
          Meta-commentary stabilizes; interruption suspends correction
          indefinitely.
        typical_markers:
          - "meta-position replaces integration"
          - "revision windows exist but never close"
        case_application: >
          <State whether commentary drift is active or a risk.>
      D5:
        name: "Public pillory"
        applicability: "<active | risk | not_applicable | needs_review>"
        minimal_signature: "Ω + Θ + Α under P, restraint collapsed"
        description: >
          Exposure replaces coordination; interruption fuses with degradation.
        typical_markers:
          - "visibility-as-sanction"
          - "irreversible residue fields dominate"
        case_application: >
