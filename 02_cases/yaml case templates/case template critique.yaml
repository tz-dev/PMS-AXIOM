      reach, scale, drift, or publicness structure.>
    threshold_result: >
      <State whether the case reaches irritation only, reaction, minimal
      critique, productive critique, stable critique, or a drift configuration.>
    mismatch_result: >
      <State how Δ becomes critique-relevant or remains under-specified.>
    frame_result: >
      <State how □ defines response, role space, relevance, and correction
      possibility.>
    distance_result: >
      <State whether Χ stop-capability is real, weak, absent, or compromised.>
    recontextualization_result: >
      <State whether Φ bridges toward correction or substitutes for it.>
    integration_result: >
      <State whether Σ consolidates correction, remains absent, or is bypassed.>
    self_binding_result: >
      <State whether Ψ binds follow-up without coercion, remains absent, or
