  modulators:
    overview: >
      Modulators are operator weightings that shift reachability and
      stabilization without adding new primitives. They are not person types and
      not prescriptions.
    selectivity_note: >
      These modulators are a selective set of recurrent weighting conditions
      legible in critique configurations, not a complete inventory of all
      possible scene-load variables.
    items:
      M1_frame_clarity:
        name: "Frame clarity"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          How clearly □ defines who may interrupt, what counts as response, and
          what correction could be.
        case_application: >
          <State how frame clarity affects the case.>
      M2_non_event_density:
        name: "Non-event density"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          How often expected responses fail Λ and how much coordination shifts
          into absence.
        case_application: >
          <State how non-event density affects the case.>
      M3_asymmetry_visibility:
        name: "Asymmetry visibility"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Salience of exposure gradients Ω and status or retaliation risk in
          the scene.
        case_application: >
          <State how asymmetry visibility affects the case.>
      M4_temporal_compression:
        name: "Temporal compression"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Degree of time pressure versus availability of review windows Θ.
        case_application: >
          <State how temporal compression affects the case.>
      M5_recontextualization_habituation:
        name: "Recontextualization habituation"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Whether Φ is routinely used as bridge or becomes the default
          substitute.
        case_application: >
          <State how recontextualization habituation affects the case.>
      M6_distance_availability:
        name: "Distance availability"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Whether Χ stop-capability is practically activatable without penalty
          inside the frame.
        case_application: >
          <State how distance availability affects the case.>
      M7_attractor_inertia:
        name: "Attractor inertia"
        applicability: "<active | weak | not_applicable | needs_review>"
        description: >
          Speed with which scripts Α harden into default handling such as
          outrage, silence, mockery, or judgment.
        case_application: >
          <State how attractor inertia affects the case.>
      M8_publicness_overlay:
        name: "Publicness overlay"
        applicability: "<active | weak | not_applicable | needs_review>"
