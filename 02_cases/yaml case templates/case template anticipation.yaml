        capacity_bounded_attribution:
          status: "<satisfied | weak | failed | not_applicable>"
          meaning: "Responsibility attaches only where effective, frame-bound influence exists."
          case_application: >
            <State where effective influence exists or does not exist.>
        non_outcome_dependency:
          status: "<satisfied | weak | failed | not_applicable>"
          meaning: "Responsibility is grounded in Ψ, not correctness."
          case_application: >
            <State how responsibility is independent of predictive success.>
        asymmetry_discipline:
          status: "<satisfied | weak | failed | not_applicable>"
          meaning: "Anticipatory insight increases protection-discipline under Ω, not entitlement to act."
          case_application: >
            <State how Ω requires restraint rather than authority.>
        distance_sustained:
          status: "<satisfied | weak | failed | not_applicable>"
          meaning: "Responsibility remains viable only if Χ stays active under Θ and Ω."
          case_application: >
            <State how distance is sustained.>
