          status: "<satisfied | weak | failed | not_applicable>"
          meaning: "Must not amplify threat narratives or urgency in ways that convert Λ into inevitability."
          case_application: >
            <State how fear production is avoided or where it is a risk.>
        no_coercion_generation:
