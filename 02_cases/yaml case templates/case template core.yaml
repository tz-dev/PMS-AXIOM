      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      <Identify whether and how self-binding, stable normativity,
      self-relation, or responsibility-as-self-commitment appears.>
    dependency_status: "<satisfied | weak | failed | not_active>"
    analytic_weight: "<major | moderate | minor | not_active>"
    calibration_points:
      - "<Apply Ψ only where self-binding or analytic self-binding is actually in scope.>"
      - "<Do not attribute selfhood to non-subjects unless the case explicitly warrants a structural self-model claim.>"
    falsifier_conditions:
      - "<If Ψ is applied without Σ, Θ, and Χ, the self-binding reading is under-specified.>"
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity.

