# =============================================================================
#  PMS-AXIOM — EDEN OVERLAY CASE TEMPLATE
#
#  Template version:
#    PMS-AXIOM_EDEN_OVERLAY_CASE_TEMPLATE_v0.2
#
#  Source profiles:
#    PMS.yaml / schema_version: PMS_1.3
#    PMS-EDEN.yaml / schema_version: PMS-EDEN_2.0
#    PMS-EDEN_CASE_2.0 / reusable case template
#
#  AXIOM role:
#    Apply PMS-EDEN as an add-on overlay to an already completed PMS-Core case.
#    The PMS-Core layer is not regenerated, revised, or overwritten.
# =============================================================================

pms_axiom_eden_overlay_case:
  schema_version: "PMS-AXIOM_EDEN_OVERLAY_CASE_TEMPLATE_v0.2"
  case_schema_version: PMS-EDEN_CASE_2.0
  schema_role: "axiom_addon_overlay_case_template"
  overlay_model: "PMS-EDEN"
  overlay_schema_version: "PMS-EDEN_2.0"
  eden_case_template_source: "PMS-EDEN_CASE_2.0"
  base_model: "PMS"
  base_schema_version: "PMS_1.3"
  axiom_status: "addon_layer_only_over_completed_core_case"

  template_purpose: >
    Structure an AXIOM-compatible PMS-EDEN overlay for one already completed
    PMS-Core case. The overlay maps scene-bound false-coordinated real
    asymmetry, responsibility/action-power distribution, Σ/Ψ status, cost
    distribution, non-action/non-binding relevance, immunization-overexposure
    and AEP signals, counter-scenes, falsifiers, and description/application
    firewall status without modifying the completed PMS-Core analysis and
    without converting structural reading into diagnosis, person verdict,
    sex truth, moral ranking, action authorization, advice, intervention, or
    PMS-Base revision.

  source_alignment:
    pms_base:
      source_file: "PMS.yaml"
      schema_version: "PMS_1.3"
      role: "base operator grammar and application guardrails"
    eden_profile:
      source_file: "PMS-EDEN.yaml"
      schema_version: "PMS-EDEN_2.0"
      role: "current paper-repository EDEN application overlay"
    eden_repo_case_template:
      source_file: "PMS-EDEN_CASE_2.0"
      role: "field structure for scene-bound PMS-EDEN example cases"
    axiom_policy: >
      AXIOM does not generate a standalone PMS-EDEN example-suite artefact unless
      explicitly requested. In AXIOM, PMS-EDEN functions as an add-on layer over
      an existing PMS-Core case. PMS-Core remains the already completed base pass.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "<completed PMS-Core case YAML or Markdown>"
    core_case_identifier: "<AXIOM case id>"
    core_case_title: "<AXIOM case title>"
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
    rule: >
      The EDEN overlay is appended to or integrated after the already completed
      PMS-Core case. It may refer to Core operators, Core scene framing, and Core
      boundary discipline as anchors, but it must not modify the PMS-Core pass,
      redefine PMS operators, alter PMS dependencies, replace derived PMS axes,
      or treat PMS-EDEN constructs as PMS Base.
    preserved_core_elements:
    - "PMS operator inventory: Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
    - "PMS repository operator order and dependency hygiene"
    - "PMS derived structures A, C, R, E, D as derived, not primitive"
    - "PMS application gate: Χ, reversibility, Dignity-in-Practice"
    - "PMS non-diagnostic and non-person-ranking discipline"
    - "PMS non-capture and rival-openness discipline"
    - "Completed PMS-Core case content unless a separate PMS.yaml inconsistency has been explicitly identified"

  pms_v13_and_eden_conformity:
    status: "conformant_overlay_required"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    overlay_only: true
    pms_R_axis_preserved: true
    pms_D_axis_preserved: true
    pms_E_strict_action_preserved: true
    eden_responsibility_principle_is_overlay_attribution_rule: true
    eden_constructs_are_not_pms_base: true
    adult_reciprocity_is_not_new_pms_axis: true
    reciprocity_loss_is_not_new_pms_axis: true
    correctability_is_not_new_pms_axis: true
    minimal_recovery_signature_is_not_new_pms_axis: true
    notes:
    - "Adult Reciprocity is a PMS-EDEN positive baseline / normative benchmark, not a PMS Base operator or axis."
    - "False-Coordinated Real Asymmetry is an EDEN mechanism, not a PMS operator."
    - "Action-Power is an EDEN scene-bound attribution handle, not a PMS operator."
    - "PFO, Eden scene, reciprocity loss, AEP, switch-family, and related labels are overlay constructs or profiles, not PMS
      Base."
    - "EDEN may sharpen domain visibility but does not prove exhaustive capture."
    - "Description does not authorize binding use; application requires additional gating."

  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependency_hygiene_note: Reduced EDEN signatures, formulas, or shortcuts do not alter PMS dependencies. In 
      particular, Χ still presupposes Φ, Θ, and □ within PMS; EDEN uses PMS operators as references, not as redefined 
      constructs.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: PMS-EDEN 2.0 constructs, EDEN-MAP fields, profiles, mechanisms, benchmarks, boundaries, falsifiers, and 
      viability signatures organize existing PMS operators only. They do not become PMS operators, PMS axes, PMS 
      dependencies, additional AXIOM layers, or independent application authority.
  eden_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-theological, non-clinical, non-diagnostic.
    - No person-level judgment, no group label, no ideology claim, no sex ranking, no sanction logic.
    - No psychology, motive, intention, trauma, or inner-state inference from EDEN mapping.
    - No moral verdict logic and no application authority from description.
    - Description and application remain firewalled by Χ, reversibility, D, contextual responsibility, affected-role 
      contestation, and independent application authority.
    may_add_visibility_to:
    - Adult Reciprocity as truthful coordination of real Ω
    - False-Coordinated Real Asymmetry
    - real Ω mapping before failure attribution
    - responsibility and Action-Power distribution
    - Σ/Ψ blockage, simulation, externalization, or openness
    - cost distribution under Ω and Θ
    - non-action and non-binding relevance under □/Λ/Ω/Θ
    - immunization, overexposure, and AEP as scene-bound profiles
    - PFO as downstream regime stabilization where separately supported
    - Reciprocity Loss as erosion of shared correctability
    - counter-scenes, falsifiers, rivals, boundaries, and non-capture
    must_not_do:
    - treat EDEN as PMS Base
    - treat Adult Reciprocity, Action-Power, PFO, AEP, correctability, or Reciprocity Loss as PMS operators or axes
    - start from PFO, Fall, False Comparison, or sex category as master origin
    - use EDEN-MAP as a coercive map against persons, couples, groups, sexes, institutions, or political positions
    - treat non-action as praxis by default or non-binding as avoidance by default
    - treat protection as immunity from R or responsibility as permission to degrade
    - claim full capture, final verdict, diagnosis, prescription, or PMS-Core correction
  axiom_validity_gate:
    status: "<passed | partial | failed | needs_review | suspended>"
    gate_type: "PMS_application_plus_EDEN_application_requirements"
    applies_to: "EDEN_overlay_application_in_AXIOM"
    canonical_pms_entry_condition:
      distance_Chi:
        id: "Χ"
        status: "<maintained | partial | compromised | needs_review>"
        case_application: "<how meta-position, stop-capability, and non-verdictive distance are maintained>"
      reversibility:
        id: "reversibility"
        status: "<maintained | partial | compromised | needs_review>"
        case_application: "<how the reading remains scene-bound, revisable, and non-final>"
      dignity_in_practice_D:
        id: "D"
        status: "<maintained | partial | compromised | needs_review>"
        case_application: "<how no shaming, humiliation, person-ranking, sex-ranking, diagnosis, or dignity hierarchy is introduced>"
    eden_application_requirements:
      scene_packet:
        status: "<present | partial | absent | needs_review>"
        note: "<bounded scene packet; not impression or vibe>"
      counter_scene_exposure:
        status: "<present | partial | absent | needs_review>"
        note: "<strongest materially different organization of evidence>"
      contextual_responsibility:
        status: "<present | partial | absent | needs_review>"
        note: "<R tied to structuring effect, legibility, capacity, alternatives, Θ, and Ω cost/exposure>"
      evidentiary_answerability:
        status: "<present | partial | absent | needs_review>"
        note: "<what evidence could narrow, suspend, revise, or defeat the map>"
      affected_role_contestation:
        status: "<available | partial | absent | not_applicable | needs_review>"
        note: "<how affected roles could contest packet, frame, evidence, R trace, or application>"
      independent_application_authority:
        status: "<not_authorized | separately_authorized_and_fully_gated | not_applicable | needs_review>"
        note: "<EDEN-MAP itself gives no authority to confront, bind, intervene, punish, or enforce>"
    invalid_if_any:
    - "core_case_rewritten_by_overlay"
    - "PMS_operator_redefined"
    - "PMS_derived_axis_redefined"
    - "EDEN_construct_treated_as_PMS_base"
    - "EDEN_by_vibe"
    - "PFO_by_vibe"
    - "real_Ω_asserted_without_scene_packet"
    - "false_coordination_claimed_without_real_Ω_displaced_R_and_blocked_or_weakened_or_simulated_or_avoided_or_externalized_Σ_Ψ"
    - "counter_scene_cannot_change_reading"
    - "no_falsifier_named"
    - "description_converted_directly_into_binding_or_obligation"
    - "responsibility_assigned_without_contextual_conditions"
    - "non_action_treated_as_praxis_by_default"
    - "non_binding_treated_as_avoidance_by_default"
    - "sex_or_person_label_substituted_for_scene_analysis"
    - "hidden_motive_or_psychology_inferred_from_operator_trace"
    - "humiliation_or_exposure_used_as_method"
    - "action_recommendation_or_intervention_protocol_added"
    - "legal_clinical_forensic_policy_or_HR_conclusion_added"
    - "D_suspended_for_truth_clarity_efficiency_punishment_or_resolution"

  case_meta:
    id: "<AXIOM-eden-overlay-case-id>"
    title: "<case title>"
    subtitle: "<optional short subtitle>"
    status: "draft_overlay | final_overlay | needs_review"
    model: PMS-EDEN
    model_schema_version: PMS-EDEN_2.0
    base_schema: PMS_1.3
    file_name: <AXIOM EDEN overlay case filename>
    authorship:
      originator: T. Zöller
      formalization_assistant: ChatGPT
    purpose: Replace or regenerate only the PMS-EDEN add-on layer for an already completed AXIOM PMS-Core case.
    axiom_part: "<Part / chapter if applicable>"
    base_core_case_ref: "<completed PMS-Core case ref>"
    addon: "EDEN"
    output_role: "replace_existing_EDEN_addon_layer_only"
    case_type: "<minimal_scene | contrast_case | myth_correction | legibility_case | trajectory_case>"
    axiom_overlay_focus: <false_coordination | responsibility_distribution | reciprocity_loss | counter_scene | 
      non_capture | mixed | other>
    primary_focus:
      construct: "<primary EDEN construct, mechanism, benchmark, protocol step, or test-scene element>"
      yaml_home: "<path in PMS-EDEN.yaml>"
      construct_status: "<eden_mechanism | eden_normative_benchmark | eden_theoretical_compression | overlay_construct | regime_stabilization
        | application_protocol | boundary_condition | falsifier | scene_bound_profile | viability_signature | paper_internal_shorthand>"
      secondary_constructs: []
      not_a_case_of: []

  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_sex_ranking: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_legal_forensic_clinical_policy_or_HR_conclusion: true
    no_action_authorization: true
    no_application_authority_from_description: true
    no_humiliation_or_public_exposure_as_method: true
    description_to_action_firewall: "active"
    validity_gate_reference: "axiom_validity_gate"
    required_method_conditions:
      canonical_pms_entry_condition: ["Χ", "reversibility", "D"]
      eden_application_requirements:
      - "scene_packet"
      - "counter_scene_exposure"
      - "contextual_responsibility"
      - "evidentiary_answerability"
      - "affected_role_contestation"
      - "independent_application_authority"
    core_rule: "Map the scene; do not diagnose persons, prescribe action, rank sexes, authorize intervention, or revise PMS-Core."
    invalid_if_any:
    - "Χ_suspended_for_clarity_or_urgency"
    - "reversibility_suspended_for_verdict"
    - "D_suspended_for_truth_or_efficiency"
    - "scene_packet_replaced_by_impression"
    - "counter_scene_cannot_change_reading"
    - "responsibility_without_scene_conditions"
    - "description_converted_directly_into_binding"
    - "person_or_sex_label_substituted_for_scene_analysis"
    - "Core_layer_rewritten_by_EDEN_overlay"
    prohibited_shortcuts:
    - "EDEN-by-vibe"
    - "PFO-by-vibe"
    - "identity-based_assignment"
    - "sex-truth_inference"
    - "personality_inference"
    - "motive_inference_from_operator_trace"
    - "description_converted_into_obligation"
    - "PMS-Core-correction-by-overlay"

  example_schema_alignment:
    required_fields_from_PMS_EDEN_CASE_2_0:
      case_schema_version: case_schema_version / mapped to pms_axiom_eden_overlay_case.case_schema_version
      case_meta: "case_meta"
      guardrails: "case_guardrails"
      vignette: "minimal_vignette"
      scene_packet: "scene_packet"
      pms_operator_trace: "pms_operator_trace"
      eden_map: "eden_map"
      construct_selection: "construct_selection"
      closure: "readable_structural_closure"
    required_eden_map_fields:
    - "scene_packet_summary"
    - "real_omega_mapping"
    - "dominant_false_coordination_frame"
    - "responsibility_and_action_power_distribution"
    - "sigma_psi_status"
    - "cost_distribution"
    - "non_action_and_non_binding"
    - "immunization_overexposure_AEP"
    - "counter_scene_and_falsifier"
    - "description_application_status"
    - "revision_point_or_open_question"
    axiom_adapter_fields:
    - "overlay_relationship_to_core"
    - "core_anchor"
    - "axiom_validity_gate"
    - "axiom_integration"
    - "eden_overlay_quality_control"
    axiom_adapter_note: >
      EDEN CASE 2.0 provides the internal field structure. AXIOM adds the
      completed-Core anchor, replacement-only add-on role, and final QC that the
      overlay did not become a Core rewrite or standalone application authority.

  example_suite_schema_alignment:
    status: reference_only_embedded_in_AXIOM_overlay
    source: PMS-EDEN_CASE_2.0 reusable case template
    axiom_case_policy: AXIOM cases do not generate a standalone PMS-EDEN example-suite artefact unless explicitly 
      requested. The EDEN case template is used as the internal overlay field structure over a completed PMS-Core case.
  paper_structure_map_alignment:
    status: reference_only
    source: PMS-EDEN.yaml.paper_structure_map
    case_application: <state which PMS-EDEN paper-structure regions are materially relevant to this AXIOM overlay, if 
      useful; do not reproduce the whole paper map in the case output unless requested>
  core_anchor:
    completed_core_case_summary:
      use: "anchor_only_not_rewrite"
      core_scene_boundary: "<reuse the already completed PMS-Core scene boundary>"
      core_primary_operator_profile: "<brief anchor; no new Core derivation>"
      core_relevant_asymmetries: []
      core_relevant_non_events: []
      core_relevant_temporalities: []
      core_boundary_notes: []
    core_to_eden_bridge:
      eden_relevance_trigger: "<why EDEN overlay is relevant here: real Ω, comparison/parity/protection frame, responsibility
        distribution, non-action/non-binding, recognition/protection, cost distribution, correctability, etc.>"
      what_eden_adds_beyond_core_visibility: "<what becomes domain-salient under PMS-EDEN but was not isolated as EDEN structure
        in PMS-Core>"
      what_must_remain_core_only: "<Core findings not to be imported as EDEN-specific claims>"

  minimal_vignette:
    scene: >
      <One compact paragraph describing the EDEN-relevant scene mechanism, not
      merely an end-state. Keep it concrete enough to map role-positions, real
      Ω, costs, timing, responsibility, non-action/non-binding, Σ/Ψ status,
      correctability, and possible counter-scenes. Do not over-narrate inner
      motives, psychology, pathology, moral quality, or sex essence.>
    temporal_boundary: "<where the scene begins, what recurrence/carryover matters, and where the bounded reading ends>"
    roles:
    - id: "role_A"
      label: "<scene-bound role-position, not person type>"
    - id: "role_B"
      label: "<scene-bound role-position, not person type>"
    - id: "field_or_medium"
      label: "<optional medium/institution/audience/category/language field that stabilizes or distributes the scene>"
    surface_description: "<how the scene may initially appear before real Ω, R distribution, costs, Σ/Ψ, and counter-scenes
      are mapped>"
    eden_question: "<what EDEN-MAP is testing in this case; not advice request>"

  scene_packet:
    specified_scene: "<bounded scene under analysis>"
    role_positions:
      role_A:
        scene_position: "<position in the scene; no person-typing>"
        not_identity: true
      role_B:
        scene_position: "<position in the scene; no person-typing>"
        not_identity: true
      field_or_medium:
        scene_position: "<optional: what the field/medium/language category stabilizes, hides, amplifies, circulates, or makes
          costly>"
        not_identity: true
        optional: true

    dominant_frame:
      candidate_frame: "<comparison | protection | parity | superiority | recognition | vulnerability | responsibility | non_action_neutrality
        | non_binding_autonomy | legitimation | authority | mixed | indeterminate>"
      frame_description: "<how the scene becomes legible to participants or observers>"
      frame_status: "<functional | ambiguous | potentially_false_coordination | not_established | indeterminate>"
      false_coordination_boundary: "No frame family is categorically false; false coordination requires real Ω, displaced
        R, and blocked/weakened/simulated/avoided/externalized Σ/Ψ."

    real_Ω:
      present: "<true | false | indeterminate>"
      summary: "<real asymmetry or reason no consequential Ω is established>"
      dimensions:
        capacity: "<none | low | medium | high | mixed | indeterminate>"
        exposure: "<none | low | medium | high | mixed | indeterminate>"
        dependency: "<none | low | medium | high | mixed | indeterminate>"
        protection: "<none | low | medium | high | mixed | indeterminate>"
        obligation: "<none | low | medium | high | mixed | indeterminate>"
        access: "<none | low | medium | high | mixed | indeterminate>"
        timing_control: "<none | low | medium | high | mixed | indeterminate>"
        frame_control: "<none | low | medium | high | mixed | indeterminate>"
        recognition_control: "<none | low | medium | high | mixed | indeterminate>"
        binding_control: "<none | low | medium | high | mixed | indeterminate>"
        language_access: "<none | low | medium | high | mixed | indeterminate>"
        explanation_burden: "<none | low | medium | high | mixed | indeterminate>"
        vulnerability: "<none | low | medium | high | mixed | indeterminate>"
        action_power: "<none | low | medium | high | mixed | indeterminate>"
        risk: "<none | low | medium | high | mixed | indeterminate>"
        cost: "<none | low | medium | high | mixed | indeterminate>"
        exit_and_waiting_capacity: "<none | low | medium | high | mixed | indeterminate>"
      mapping_question: "<what each asymmetry changes in options, cost, exposure, responsibility, or correction access>"
      asymmetry_not_failure_rule: "Asymmetry is not the failure; false coordination of asymmetry is the failure."
      multidimensional_guardrail: "Keep crossed asymmetries visible; authority, exit power, embodiment, language, timing,
        protection, and explanation burden may diverge and cannot become one rank."

    relevant_Λ:
      present: "<true | false | indeterminate>"
      non_event_or_absence: "<silence | delay | refusal | non-clarification | non-binding | non-response | missing correction
        | missing integration | restraint | incapacity | boundary | none | other>"
      scene_structuring_effect: "<what the non-event changes, if anything>"
      no_passive_praxis_check: "Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ."

    non_action_relevance:
      status: "<mere_absence | structuring_non_event | integrated_abstention | indeterminate | not_relevant>"
      note: "<why the absence/non-event is or is not scene-relevant under □/Λ/Ω/Θ>"
      boundary: "Silence, delay, refusal, non-response, or absence is not praxis by default and never proves motive, manipulation,
        drift, or responsibility."

    non_binding_relevance:
      status: "<legitimate_openness | Ψ_load_shift | avoidance | indeterminate | not_relevant>"
      note: "<whether non-binding preserves genuine openness or shifts Ψ-load, cost, exposure, timing, or responsibility>"
      boundary: "Non-binding may be legitimate where uncertainty, costs, alternatives, and exit/waiting conditions remain
        legible."

    Θ_trajectory:
      sequence:
      - step: 1
        description: "<initial condition>"
      - step: 2
        description: "<change, delay, repetition, breach, escalation, erosion, or correction attempt>"
      - step: 3
        description: "<resulting distribution of cost, R, Σ, Ψ, or correctability>"
      trajectory_status: "<single_event | repeated_pattern | accumulating_effect | unresolved | indeterminate>"
      trajectory_origin_note: "<if relevant, who/what goes first structurally; not moral rank by default>"

    structuring_effects:
      role_A_effects:
      - "<effect structured by role_A, if supported>"
      role_B_effects:
      - "<effect structured by role_B, if supported>"
      shared_or_field_effects:
      - "<effects of the scene/frame itself>"
      unsupported_effects:
      - "<claims that must not be inferred>"

    responsibility_distribution:
      pms_axis: "R"
      governing_formula: "R follows real structuring effect under available legibility, capacity, alternative possibility,
        Θ trajectory, and Ω cost/exposure conditions."
      role_A:
        structuring_effect: "<supported | weak | indeterminate | not_supported>"
        legibility: "<available | limited | absent | contested | indeterminate>"
        capacity: "<available | limited | absent | contested | indeterminate>"
        alternatives: "<available | limited | absent | contested | indeterminate>"
        provisional_R_status: "<proportionate | underassigned | overassigned | displaced | indeterminate>"
      role_B:
        structuring_effect: "<supported | weak | indeterminate | not_supported>"
        legibility: "<available | limited | absent | contested | indeterminate>"
        capacity: "<available | limited | absent | contested | indeterminate>"
        alternatives: "<available | limited | absent | contested | indeterminate>"
        provisional_R_status: "<proportionate | underassigned | overassigned | displaced | indeterminate>"
      blame_guardrail: "R is not blame, guilt, moral worth, person condemnation, or total liability."

    recognition_and_protection:
      recognition_frame: "<present | absent | mixed | indeterminate>"
      protection_frame: "<present | absent | mixed | indeterminate>"
      D_status: "<preserved | strained | damaged | indeterminate>"
      recognition_structure:
        role_A: "<how role_A is recognized, misrecognized, made criticizable, or made less criticizable in this scene>"
        role_B: "<how role_B is recognized, misrecognized, made criticizable, or made less criticizable in this scene>"
        scene_effect: "<whether recognition remains proportionate, becomes detached from R, or distributes criticizability
          unevenly>"
      protection_structure:
        role_A: "<how protection, immunity, exposure, or criticizability attaches to role_A>"
        role_B: "<how protection, immunity, exposure, or criticizability attaches to role_B>"
        scene_effect: "<whether protection preserves D, blocks R, or shifts exposure/cost>"
      dignity_guardrail: "Responsibility must not degrade; protection must not immunize."

    Σ_Ψ_status:
      Σ_integration:
        status: "<open | partially_open | mixed_evidence | simulated | blocked | externalized | indeterminate>"
        note: "<whether relevant costs/effects can enter one accountable scene account>"
      Ψ_self_binding:
        status: "<open | partially_open | mixed_evidence | weakened | avoided | simulated | externalized | blocked | indeterminate>"
        note: "<whether consequential positions remain bound to what they structure>"
      load_shift:
        present: "<true | false | indeterminate>"
        formula: "low Ψ on one side → increased Ψ-load on the other."
        shifted_loads: []

    visible_costs:
      visibility_cost: "<who becomes visible or scrutinized while another consequential position remains comparatively opaque>"
      explanation_cost: "<who must explain structure, burden, harmlessness of naming it, or the unresolved scene>"
      reaction_cost: "<who carries response-form, tone, timing, recognizability, or affect-management cost>"
      waiting_cost: "<who carries duration, suspended action, anticipation, or option preservation under uncertainty>"
      binding_cost: "<who absorbs added Ψ-load where another remains less bound to effects>"
      protection_cost: "<who loses criticizability through protection or carries vigilance, restraint, risk, or exposure required
        to protect>"
