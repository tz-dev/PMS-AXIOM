# =============================================================================
#  PMS-AXIOM — SEX OVERLAY CASE TEMPLATE
#
#  Template version:
#    PMS-AXIOM_SEX_OVERLAY_CASE_TEMPLATE_v0.2
#
#  Source profiles:
#    PMS.yaml / schema_version: PMS_1.3
#    PMS-SEX.yaml / schema_version: PMS-SEX_PROFILE
#    PMS-SEX_CASE_TEMPLATE / reusable case template
#
#  AXIOM role:
#    Apply PMS-SEX as an add-on overlay to an already completed PMS-Core case.
#    The PMS-Core layer is not regenerated, revised, or overwritten.
# =============================================================================

pms_axiom_sex_overlay_case:
  schema_version: PMS-AXIOM_SEX_OVERLAY_CASE_TEMPLATE_v0.2
  schema_role: axiom_addon_overlay_case_template
  overlay_status: application_profile_only
  overlay_model: PMS-SEX
  overlay_schema_version: PMS-SEX_PROFILE
  sex_case_template_source: PMS-SEX_CASE_TEMPLATE
  base_model: PMS
  base_schema_version: PMS_1.3
  axiom_status: addon_layer_only_over_completed_core_case
  template_purpose: Structure an AXIOM-compatible PMS-SEX overlay for one already completed PMS-Core case.
    The overlay maps scene-bound sexual-praxeological structure, layer distinctions, sexual cost topology,
    drift/viability/D-readouts, direct-otherness and embodiment/boundary readings, withdrawal/binding
    handling, and possible MIP docking without modifying the completed PMS-Core analysis and without converting
    structural reading into diagnosis, person verdict, practice guidance, moral ranking, legal/clinical/forensic
    conclusion, or maturity/adultness verdict from PMS-SEX alone.
  source_alignment:
    pms_base:
      source_file: PMS.yaml
      schema_version: PMS_1.3
      role: base operator grammar and application guardrails
    sex_profile:
      source_file: PMS-SEX.yaml
      schema_version: PMS-SEX_PROFILE
      profile_format: compact_machine_profile
      role: current paper-repository SEX application overlay
    sex_repo_case_template:
      source_file: PMS-SEX_CASE_TEMPLATE / example template.yaml
      case_schema_version: PMS-SEX_CASE_TEMPLATE
      role: full field structure for scene-bound PMS-SEX example cases
    axiom_old_template:
      source_file: old PMS-AXIOM SEX case template
      role: 'AXIOM adapter logic: subordinate overlay over completed PMS-Core case'
    axiom_policy: AXIOM does not generate a standalone PMS-SEX example-suite artefact unless explicitly
      requested. In AXIOM, PMS-SEX functions as an add-on layer over an existing PMS-Core case. PMS-Core
      remains the already completed base pass.
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: <completed PMS-Core case YAML or Markdown>
    rule: The SEX overlay is appended to or integrated after the already completed PMS-Core case. It may
      refer to Core operators, Core scene framing, and Core boundary discipline as anchors, but it must
      not modify the PMS-Core pass, redefine PMS operators, alter PMS dependencies, replace derived PMS
      axes, or treat PMS-SEX constructs as PMS Base.
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures A, C, R, E, D as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: The SEX overlay may add visibility for scene framing, inner/outer/public layer separation,
      sexual cost topology, body remainder, publicness, direct otherness, access logic, withdrawal/binding,
      path-cost, drift corridors, asymmetry-switch drift, parity-to-exit, responsibility-to-authority,
      adult sexual reciprocity, dignity-in-practice constraints, and MIP docking guards. It must not modify
      the completed PMS-Core case except where a direct PMS.yaml inconsistency has been separately identified.
    core_case_identifier: <AXIOM case id>
    core_case_title: <AXIOM case title>
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
  pms_v13_and_sex_conformity:
    status: conformant_overlay_required
    base_schema_version: PMS_1.3
    canonical_operator_spine: Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    no_direct_adultness_verdict: true
    overlay_only: true
    reduced_signatures_are_shorthand_only: true
    sex_constructs_are_not_pms_base: true
    mip_docking_required_for_adultness_or_maturity_language: true
    notes:
    - PMS-SEX uses the default PMS repository dependency path as reference spine for domain-specific application.
      Reduced formulas are shorthand, not alternative dependency graphs.
    - Publicness, outer legibility, body remainder, direct otherness, sexual cost topology, withdrawal/binding
      profiles, drift profiles, viability conditions, and MIP docking are PMS-SEX overlay constructs,
      not PMS operators.
    - Suspended self-binding means Ψ is present as a deliberately suspended attribution condition. It
      is not absent, replaced, removed, or transformed into a new operator.
    - Sexual cost topology is a scene-bound Ω/Θ cost layout. It is not a score, person measure, dignity
      measure, maturity measure, sex truth, or genital truth.
    - Dignity-in-Practice remains the PMS-derived construct with canonical derivation [Ψ, Χ, Ω]; PMS-SEX
      adds application-side D checks without revising PMS-D.
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: 'PMS-SEX introduces no PMS operators or dependencies. Its reduced signatures, publicness/documentation
      overlays, path-cost language, sexual cost topology, EDEN/PFO switch references, asymmetry-switch
      drift, parity-to-exit, responsibility-to-authority, adult sexual reciprocity, modulators, warning
      signals, and MIP docking guards remain application-level constructs only.'
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    canonical_order:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependencies:
      Δ: []
      ∇:
      - Δ
      □:
      - Δ
      - ∇
      Λ:
      - □
      Α:
      - Δ
      - ∇
      - □
      - Λ
      Ω:
      - Α
      Θ:
      - Ω
      - Α
      Φ:
      - Θ
      - Ω
      - □
      Χ:
      - Φ
      - Θ
      - □
      Σ:
      - Χ
      - Φ
      Ψ:
      - Σ
      - Θ
      - Χ
    dependency_hygiene:
      reduced_signatures_are_shorthand: true
      reduced_signatures_do_not_change_dependencies: true
      chi_presupposes:
      - Φ
      - Θ
      - □
      sigma_presupposes:
      - Χ
      - Φ
      psi_presupposes:
      - Σ
      - Θ
      - Χ
      overlay_concepts_are_not_operators: true
      drift_profiles_are_not_operators: true
      axis_refs_are_not_operators: true
      axis_refs_do_not_modify_pms_axes: true
      mip_axes_do_not_modify_pms_axes: true
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  references:
    pms_base: PMS.yaml / PMS_1.3
    pms_sex_profile: PMS-SEX.yaml / PMS-SEX_PROFILE
    pms_sex_case_template: PMS-SEX_CASE_TEMPLATE
    completed_core_case: <completed PMS-Core case artefact>
  sex_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic, non-therapeutic.
    - No person-level judgment, no person-ranking, no orientation taxonomy, no identity verdict.
    - No maturity hierarchy, dignity hierarchy, humiliation, or moral pathology.
    - No direct adultness verdict; maturity-relevant evaluation belongs only to explicit downstream MIP
      docking.
    - No how-to guidance, no risk-management manual, no optimization logic, no legal or forensic authority.
    - Sexual cost topology is scene-bound cost layout, not score or ranking.
    - Outer legibility is not public-punishment license.
    - Internal framing is real but not total.
    - Publicness is overlay, not necessary origin of consequence.
    - Asymmetry-switch drift, parity-to-exit, and responsibility-to-authority are configuration markers,
      not person labels.
    - Direct otherness is reality-correction without access entitlement.
    - Genital meaning must not be converted into genital sovereignty or person truth.
    - Withdrawal is neither automatic guilt nor automatic exculpation.
    - Viability means governability, not normality.
    may_add_visibility_to:
    - sexuality as recurring praxis pressure
    - scene/frame grammar
    - internal framing
    - outer legibility
    - pre-reflective scene readability
    - publicness as □ extension
    - path-cost / stabilization burden
    - body as non-operator remainder
    - sexual cost topology
    - EDEN/PFO asymmetry-switch sexual instantiation
    - asymmetry-switch drift
    - parity-to-exit
    - responsibility-to-authority
    - adult sexual reciprocity
    - asymmetry-specific responsibility
    - cost-topology mismatch
    - functional minimum conditions
    - warning signals
    - minimal psychology adapter
    - Dignity-in-Practice module
    - MIP docking guards
    must_not_do:
    - treat sexuality as person essence
    - treat structural readability as diagnosis
    - treat path-cost as person value
    - treat sexual cost topology as maturity or dignity score
    - treat body remainder as biological taxonomy
    - treat publicness as accusation license
    - treat asymmetry activation as automatic drift
    - treat parity as automatic reciprocity
    - treat responsibility as authority
    - treat operator profile as adultness verdict
    - claim PMS Base validation
  axiom_validity_gate:
    status: <passed | failed | needs_review>
    gate_type: PMS_application_only
    paper_refs:
    - Ch. 0.2
    - Ch. 0.4
    - Ch. 0.9
    - Ch. 21
    - Ch. 22
    - Appendix B
    note: 'This gate constrains PMS application only, not critique, rejection, refusal, revision, or rival
      formalization.'
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: <maintained | compromised | needs_review>
        meaning: 'Maintained meta-position and stop-capability; no fusion into verdict, urgency, enforcement,
          person-level attribution, role, impulse, asymmetry activation, parity claim, responsibility
          claim, or self-justifying rhetoric.'
        case_application: '<State how Distance is maintained or where it is compromised in this case.>'
      reversibility:
        id: reversibility
        status: <maintained | compromised | needs_review>
        meaning: 'Scene-bound, configuration-specific, revisable readings; no global person labels, irreversible
          interpretive claims, identity verdicts, maturity verdicts, or ontological attributions.'
        case_application: '<State how reversibility is preserved.>'
      Dignity_in_Practice_D:
        id: D
        name: Dignity-in-Practice
        status: <maintained | compromised | needs_review>
        meaning: 'No shaming, humiliation, person-ranking, diagnosis, orientation taxonomy, maturity hierarchy,
          dignity hierarchy, or person-worth evaluation; critique targets enacted structures and cost
          handling only.'
        case_application: '<State how Dignity-in-Practice is preserved.>'
    prohibits:
    - sexual_cost_topology_as_score
    - asymmetry_switch_as_authority
    - parity_to_exit_as_reciprocity
    - responsibility_to_authority_as_care
    - operator_profile_as_direct_adultness_verdict
    - outer_legibility_as_public_punishment_license
    - path_cost_as_person_value
    - disturbance_language_as_orientation_taxonomy
    gate_result: <valid_as_sex_overlay_application | invalid_as_sex_overlay_application | requires_revision>
    applies_to: SEX_overlay_application_in_AXIOM
    invalid_if_any:
    - scene_packet_replaced_by_impression
    - operator_trace_used_as_person_verdict
    - visible_form_totalized_as_whole_configuration
    - internal_framing_erases_outer_legibility
    - public_measure_formation_becomes_confession_demand
    - consent_or_mutuality_substitutes_for_cost_topology
    - access_threshold_becomes_entitlement
    - permission_image_treated_as_consent
    - body_boundary_coding_treated_as_person_truth
    - genital_meaning_treated_as_genital_sovereignty
    - withdrawal_treated_as_automatic_guilt
    - withdrawal_treated_as_automatic_exculpation
    - D_suspended_for_clarity_or_punishment
    - description_converted_directly_into_binding_or_action
    - core_case_rewritten_by_overlay
    - PMS_operator_redefined
    - SEX_construct_treated_as_PMS_base
    - adultness_or_maturity_verdict_made_without_MIP_docking
    - D_suspended_for_clarity_authority_punishment_or_resolution
  case_schema_version: PMS-SEX_CASE_TEMPLATE
  case_meta:
    id: <AXIOM-sex-overlay-case-id>
    title: <AXIOM case title>
    subtitle: <optional_short_subtitle>
    status: <draft_overlay | final_overlay | needs_review>
    model: PMS-SEX
    model_schema_version: PMS-SEX_PROFILE
    base_schema: PMS_1.3
    file_name: <AXIOM case file or overlay output file>
    authorship:
      originator: T. Zöller
      formalization_assistant: ChatGPT 5.5 (Thinking)
    purpose: Demonstrate a bounded PMS-SEX structural overlay for a specified AXIOM case scene while preserving
      the already completed PMS-Core pass.
    case_type: <minimal_scene | contrast_case | layer_case | drift_case | viability_case | dignity_case | withdrawal_case | embodiment_case | direct_otherness_case | mip_docking_case | non_capture_case | mixed_axiom_overlay>
    primary_focus:
      construct: <primary PMS-SEX concept, drift, module, viability condition, or pipeline step>
      construct_status: <concept | drift | drift_set | drift_chain | viability_condition | dignity_condition | mip_gate | limit_guard | example_schema_field>
      yaml_home: <path in PMS-SEX.yaml>
      secondary_constructs: []
      not_a_case_of: []
    axiom_part: <Part / chapter if applicable>
    base_core_case_ref: <completed PMS-Core case ref>
    addon: SEX
    output_role: replace_existing_SEX_addon_layer_only
    axiom_overlay_focus: <which old SEX add-on layer is being replaced or updated>
  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_orientation_taxonomy: true
    non_sex_ranking: true
    non_genital_truth: true
    non_biological_destiny: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_practice_guidance: true
    no_risk_optimization: true
    no_public_punishment: true
    no_public_confession_requirement: true
    description_mode: structural_mapping_only
    validity_gate_reference: guard_sets.final_profile
    required_pms_entry_conditions:
    - Χ
    - reversibility
    - Dignity-in-Practice
    required_pms_sex_conditions:
    - scene_bound
    - operator_profile_only
    - internal_outer_public_layers_distinguished
    - sexual_cost_topology_explicit_if_relevant
    - after_scene_dignity_checked_if_relevant
    - direct_otherness_not_converted_into_access_entitlement
    - genital_meaning_not_converted_into_genital_sovereignty
    - withdrawal_not_moralized_or_exculpated_by_default
    - viability_read_as_governability_not_normality
    - mip_docking_only_if_maturity_or_adultness_language_appears
    core_rule: Map configurations; do not diagnose persons, prescribe practice, rank sexes, infer motives,
      or authorize action.
    invalid_if_any:
    - scene_packet_replaced_by_impression
    - operator_trace_used_as_person_verdict
    - visible_form_totalized_as_whole_configuration
    - internal_framing_erases_outer_legibility
    - public_measure_formation_becomes_confession_demand
    - consent_or_mutuality_substitutes_for_cost_topology
    - access_threshold_becomes_entitlement
    - permission_image_treated_as_consent
    - body_boundary_coding_treated_as_person_truth
    - genital_meaning_treated_as_genital_sovereignty
    - withdrawal_treated_as_automatic_guilt
    - withdrawal_treated_as_automatic_exculpation
    - D_suspended_for_clarity_or_punishment
    - description_converted_directly_into_binding_or_action
    - core_case_rewritten_by_overlay
    - PMS_operator_redefined
    - SEX_construct_treated_as_PMS_base
    - adultness_or_maturity_verdict_made_without_MIP_docking
    - D_suspended_for_clarity_authority_punishment_or_resolution
    prohibited_shortcuts:
    - PMS-SEX-by-vibe
    - deviance-by-label
    - practice-label-settles-structure
    - consent-settles-cost
    - public-reaction-settles-harm
    - body-state-proves-person-truth
    - genital-self-description-settles-analysis
    - orientation-or-identity-used-as-explanation
    - motive-inference-from-operator-trace
    - maturity-verdict-without-MIP-docking
    - using_SEX_to_correct_or_override_PMS_Core
    - using_SEX_as_relationship_advice
    - using_SEX_as_clinical_legal_forensic_or_policy_authority
    no_relationship_advice: true
    no_legal_forensic_clinical_policy_conclusion: true
    guard_registry_reference: PMS-SEX.yaml:guard_registry
    guard_sets_reference: PMS-SEX.yaml:guard_sets.final_profile
  repo_use:
    status: structural_focus_only
    intended_use:
    - scene_bound_analysis
    - operator_mapping
    - cost_topology_readout
    - drift_and_viability_scan
    - dignity_in_practice_check
    - mip_docking_gate_if_relevant
    not_intended_for:
    - practice_guidance
    - therapy_or_intervention
    - legal_or_forensic_judgment
    - relationship_advice
    - diagnosis
    - person_verdict
    - sexual_identity_taxonomy
    - maturity_or_adultness_verdict_from_PMS_SEX_alone
    output_contract: A completed case may name scene-bound structures, operator profiles, cost topology,
      drift risk, viability status, D-status, and docking conditions; it must not prescribe action or
      decide person status.
  example_schema_alignment:
    required_fields_from_PMS_SEX_yaml:
      vignette: minimal_vignette
      repo_use: repo_use
      operator_mapping: scene_packet.operator_trace and pms_sex_map.operator_profile
      layer_distinction: scene_packet.layer_distinction and pms_sex_map.layer_readout
      cost_topology: scene_packet.sexual_cost_topology and pms_sex_map.cost_topology_readout
      drift_readout: pms_sex_map.drift_scan
      viability_readout: pms_sex_map.viability_readout
      dignity_readout: pms_sex_map.dignity_in_practice_readout
      mip_gate: pms_sex_map.mip_docking_gate
      closure: readable_structural_closure
    optional_fields_from_PMS_SEX_yaml:
      direct_otherness_readout: pms_sex_map.direct_otherness_and_access
      genital_integration_readout: pms_sex_map.embodiment_boundary_genital_readout
      withdrawal_expectation_readout: pms_sex_map.withdrawal_binding_readout
      boundary_aggression_readability: pms_sex_map.dignity_in_practice_readout.application_condition_profile.boundary_aggression_readability
      eden_pfo_switch_note: pms_sex_map.asymmetry_activation_and_reciprocity and pms_sex_map.drift_scan
      publicness_overlay_expansion: scene_packet.layer_distinction.publicness_overlay
      biological_affordance_guard: scene_packet.embodiment_and_genital_meaning.biological_affordance_guard
      non_capture_note: pms_sex_map.non_capture_and_limits
  minimal_vignette:
    scene: '<One compact paragraph describing the scene as a mechanism, not only as an end-state. Keep
      it concrete enough to map role-positions, frame, repetition, medium, tone, timing, asymmetry, cost
      topology, non-events, body/boundary relevance, direct otherness, withdrawal, and possible drifts.
      Where relevant, show how after-scene effects grow out of the scene grammar, recurrence, symbolic
      handling, publicness, documentation, role structure, or cost layout. Do not over-narrate inner motives,
      fantasies, pathology, or moral quality.>'
    temporal_boundary: <where the scene begins, what recurrence or carryover matters, and where the bounded
      reading ends; include after-scene carryover if relevant>
    roles:
    - id: role_A
      label: <scene-bound role-position, not person type; name frame-control, access, continuity, or cost-position
        only if relevant>
    - id: role_B
      label: <scene-bound role-position, not person type; name cost-carrying, correction, withdrawal,
        exposure, or after-scene position only if relevant>
    - id: field_or_medium
      label: <optional medium, platform, audience, institution, category system, tone, documentation layer,
        shared narrative, or non-human scene factor>
    surface_description: <how the scene may initially appear before cost topology and Θ carryover are
      mapped>
    pms_sex_question: <what PMS-SEX is testing in this case; formulate as structural test, not advice
      request>
  scene_packet:
    specified_scene: <bounded scene under analysis; include the concrete recurrence, medium, tone, publicness,
      or after-scene boundary if it drives the mechanism>
    role_positions:
      role_A:
        scene_position: <position in the scene; describe scene function such as frame-control, access-position,
          narrative-continuity, asymmetry activation, or cost externalization without person-typing>
        not_identity: true
      role_B:
        scene_position: <position in the scene; describe scene function such as cost-carrying, correction-seeking,
          withdrawal, exposure, body-boundary, or after-scene residue without person-typing>
        not_identity: true
      field_or_medium:
        scene_position: <optional field/medium/platform/category/audience/institution/tone/documentation/shared
          narrative; describe what it stabilizes, amplifies, hides, circulates, or makes costly>
        not_identity: true
        optional: true
    frame:
      dominant_frame: <intimacy | play | service | devotion | experimentation | non_binding | casual |
        boundary | exposure | publicness | image_mediated | practice_label | authority | protection |
        parity | mixed | indeterminate>
      frame_description: <how the scene becomes legible inside and outside the scene; include whether
        the frame merely describes the practice or also protects repetition, cost denial, exit cost, publicness,
        or symbolic continuity>
      frame_status: <clear | ambiguous | unstable | contested | collapsed | indeterminate>
      practice_label_if_any: <label used by participants or observers, shared safety narrative, public
        category, or none>
      frame_guard: Practice labels, safety language, parity claims, and public categories may clarify
        internal framing but do not settle outer legibility, cost topology, publicness, symbolic residue,
        or Θ carryover.
    layer_distinction:
      internal_framing:
        description: <how the scene is inhabited, narrated, or understood from within>
        status: <present | absent | contested | indeterminate>
      outer_legibility:
        description: <externally readable action-form without person verdict>
        status: <low | medium | high | mixed | contested | indeterminate>
        possible_outer_forms:
        - <asymmetry_form | exposure_form | humiliation_near_form | body_boundary_form | access_form |
          control_form | authority_form | none | other>
      publicness_overlay:
        status: <private | semi_private | documented | circulating | public | reputational | institutional | indeterminate>
        effect: <distribution, amplification, documentation, circulation, reputation, sedimentation, or
          none>
        measure_vs_confession_guard: Sexual praxis may be publicly measure-forming without making private
          preference confession-mandatory.
      body_boundary_layer:
        status: <not_relevant | bodily_cost | exposure | boundary | shame | recognition | visibility |
          reproductive_or_health_cost | genital_meaning | indeterminate>
        note: <how body/boundary relevance structures the scene, if at all>
      theta_carryover:
        status: <none | low | medium | high | accumulating | irreversible | contested | indeterminate>
        note: <what remains after the local episode>
      layer_guard: Layers may diverge and must not collapse into each other.
    operator_trace:
      status: operator_profile_only
      operator_reference: operator_spine
      operator_set_fixed:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
      primary_signature:
        operators: []
        shorthand_only: true
        note: Reduced signatures are analytic shorthand and do not change PMS dependencies.
      trace:
        Δ: <what specific difference, boundary, category, body/boundary marker, access threshold, or legibility
          distinction makes this case readable; avoid generic contrast if a concrete scene distinction
          is available>
        ∇: <what pressure, impulse-nearness, attraction, urgency, tonal charge, escalation, proximity,
          or activation gradient drives recurrence>
        □: <what frame, scene grammar, label, publicness, safety language, parity claim, or permission
          structure constrains the scene and possibly protects the drift>
        Λ: <what non-event, silence, delay, refusal, absence, non-binding, avoided re-reading, unnamed
          cost, or withdrawal structures expectation>
        Α: <what repetition, category, script, attractor, continuity demand, or stabilization path makes
          the pattern easier to reproduce than to revise>
        Ω: <what asymmetry of access, exposure, cost, power, body, exit, responsibility, interpretation,
          language, publicness, or correction-capacity is active>
