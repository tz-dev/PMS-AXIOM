          bypassed; Dignity-in-Practice becomes fragile.
        case_application: >
          <State whether the secondary drift chain is active.>
      eden_pfo_sexual_drift_chain:
        applicability: "<active | risk | not_applicable | needs_review>"
        raw: "real/invoked Ω/Θ pressure → asymmetry activation → unmarked/unbounded/unrebound activation → parity-to-exit or responsibility-to-authority → cost-topology mismatch"
        reading: >
          Sexual asymmetry activation becomes drift where it is not marked,
          bounded, and re-bound into Σ/Ψ. Parity may become responsibility-exit;
          responsibility may become authority; the cost topology no longer
          matches the declared frame.
        case_application: >
          <State whether the EDEN/PFO sexual drift chain is active.>
      compact_triads:
        sexual_drift_triad:
          applicability: "<active | risk | not_applicable | needs_review>"
          raw: "asymmetry-switch drift → parity-to-exit and/or responsibility-to-authority → cost-topology mismatch"
          case_application: >
            <State whether the sexual drift triad is active or only a risk.>

  viability:
    note: >
      Viability expresses structural governability only. It makes no moral
      claim, defines no normality threshold, and does not prescribe action.
    functional_minimum_conditions_ch19_3:
      explicit_omega_recognition:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Explicit Ω recognition"
        minimal_form: "Ω(asymmetry) must be nameable and regulable within the frame."
        case_application: >
          <State whether asymmetry is nameable and regulable.>
      explicit_sexual_cost_topology:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Explicit sexual cost topology"
        minimal_form: >
          Bodily, temporal, exposure-related, reputational, binding-related,
          exit-related, publicness-related, and responsibility-related costs
          must be readable as scene-bound layout, not person score.
        case_application: >
          <State whether cost topology is explicit.>
      theta_awareness:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Θ awareness"
        minimal_form: "Consequences are treated as real: exit realism."
        case_application: >
          <State whether temporality and consequence accumulation are carried.>
      stable_chi_capacity:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Stable Χ capacity"
        minimal_form: "Χ(distance) is operative, not ornamental."
        case_application: >
          <State whether stop-capability and meta-commentability are practically available.>
      no_psi_substitution:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "No Ψ substitution"
        minimal_form: "No Ψ leak as the default carrier of stakes."
        case_application: >
          <State whether practice substitutes for identity proof, commitment
          test, self-worth, or relationship clarification.>
      lambda_tolerance_without_escalation:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Λ tolerance without escalation"
        minimal_form: "Λ(non-event) can exist without becoming steering or coercion."
        case_application: >
          <State whether absence, pause, refusal, delay, or non-occurrence is
          tolerable without escalation.>
      internal_framing_accountable_to_outer_form:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Internal framing remains accountable to outer form"
        minimal_form: "Internal framing does not erase outer structural form."
        case_application: >
          <State whether internal labels remain accountable to outer form.>
      publicness_handled_as_overlay:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Publicness is handled as overlay"
        minimal_form: >
          Publicness modifies readability and consequence without being confused
          with their necessary origin.
        case_application: >
          <State whether publicness is handled as overlay.>
      marked_bounded_rebound_asymmetry_activation:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "Marked / bounded / re-bound asymmetry activation"
        minimal_form: >
          Asymmetry activation under real Ω/Θ burden must be marked, bounded,
          and re-bound into Σ/Ψ.
        case_application: >
          <State whether asymmetry activation is marked, bounded, and re-bound.>
      no_parity_to_exit:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "No parity-to-exit"
        minimal_form: >
          Parity language must coordinate reciprocity rather than deny
          additional responsibility under unequal sexual cost topology.
        case_application: >
          <State whether parity coordinates or exits responsibility.>
      no_responsibility_to_authority:
        status: "<satisfied | weak | failed | not_applicable>"
        label: "No responsibility-to-authority"
        minimal_form: >
          Responsibility under asymmetry remains Ψ/Χ self-binding rather than
          control, protection entitlement, or frame authority.
        case_application: >
          <State whether responsibility remains restraint rather than control.>

    warning_signals_ch19_4:
      note: >
        Warning signals indicate increased drift potential toward coercion,
        harm, or destructive dynamics. They are configuration markers only and
        do not label persons.
      signals:
        phi_narrative_inflation:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Φ substitutes for Σ(integration)."
          case_application: >
            <State whether narrative inflation is active.>
        mono_frame:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Α(attractor) monopolizes □(frame)."
          case_application: >
            <State whether one frame narrows or monopolizes the scene.>
        omega_moralization:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Ω is handled ideologically, increasing pseudo-symmetry risk."
          case_application: >
            <State whether asymmetry is moralized instead of regulated.>
        persistence_despite_structural_undercutting:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Α + Θ overrun Χ."
          case_application: >
            <State whether repetition persists despite visible structural cost.>
        theta_cost_externalization:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Θ costs are shifted asymmetrically through Ω(layout)."
          case_application: >
            <State whether temporal costs are externalized.>
        outer_form_denial:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Χ is weakened because the configuration cannot re-read itself."
          case_application: >
            <State whether outer-form denial is present.>
        publicness_confusion:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Publicness is misread as origin or as nothing rather than as overlay."
          case_application: >
            <State whether publicness confusion is present.>
        asymmetry_switch_drift:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Unmarked Ω activation replaces Σ/Ψ coordination."
          case_application: >
            <State whether switch drift warning signal is present.>
        parity_to_exit:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Parity rhetoric exits responsibility under unequal sexual cost topology."
          case_application: >
            <State whether parity-to-exit warning signal is present.>
        responsibility_to_authority:
          status: "<active | risk | absent | needs_review>"
          structural_note: "Required Ψ/Χ self-binding is converted into control."
          case_application: >
            <State whether responsibility-to-authority warning signal is present.>

    minimal_viability_corridor_appendix_D5:
      status: "<satisfied | partial | failed | not_applicable | needs_review>"
      raw: >
        □ explicit + Ω nameable + Θ realistic + Χ operative + Λ tolerable +
        Ψ handled (+ Σ reachable) + cost topology explicit + asymmetry
        activation marked/bounded/re-bound + no parity-to-exit + no
        responsibility-to-authority = structurally governable configuration.
      guard: >
        This corridor expresses structural governability only. It makes no
        moral claim, defines no normality threshold, and does not prescribe
        action.
      case_application: >
        <State whether the minimal viability corridor is satisfied.>

    adult_sexual_reciprocity:
      status: "<active | weak | failed | not_applicable | needs_review>"
      principle: "unequal burdens must not be externalized"
      required:
        - "explicit_cost_topology"
        - "marked_asymmetry_activation"
        - "bounded_asymmetry_activation"
        - "psi_re_binding_after_activation"
        - "sigma_coordination"
        - "chi_restraint"
        - "no_unmarked_exception_lever"
        - "no_parity_to_exit"
        - "no_responsibility_to_authority"
        - "dignity_in_practice"
      guard: >
        Adult sexual reciprocity is a structural viability principle, not a
        moral command, role prescription, or direct maturity verdict about
        persons.
      case_application: >
        <State whether unequal burdens are coordinated or externalized.>

  modulators:
    note: >
      Modulators are praxeological, not psychological. They are non-operator
      weightings: types without typing.
    basic_rule_ch14_2: >
      A modulator is best read as a weighting that makes a particular operator
      chain pull faster or more persistently in a configuration, without typing
      persons or explaining inner causes.
    minimal_formula_ch14_3: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    central_modulators_ch14_4:
      early_framing_box0:
        source_label: "14.4.1 □₀ Early framing"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights how later frames can be set and maintained, including
          speakability, boundary clarity, internal naming, outer-form
          accountability, and whether cost topology can be named without
          moralization.
        case_application: >
          <State whether early framing weights the case.>
      omega0_asymmetry_calibration:
        source_label: "14.4.2 Ω₀ Asymmetry calibration"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights how asymmetry is noticed, named, regulated, and re-bound,
          including bodily, reputational, exposure-related, publicness-related,
          exit-related, and responsibility-related cost topology.
        case_application: >
          <State whether asymmetry calibration weights the case.>
      lambda_density:
        source_label: "14.4.3 Λ density"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights how often non-occurrence becomes structurally active:
          withdrawal, rejection, hesitation, cancellation, indeterminacy,
          chronic mismatch, or non-clarification of cost topology.
        case_application: >
          <State whether Λ density weights the case.>
      theta_stability:
        source_label: "14.4.4 Θ stability"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights how sequences connect over time, including continuity,
          repeatability, commitment, publicness/documentation sedimentation, and
          whether non-binding language hides accumulated Ω/Θ consequences.
        case_application: >
          <State whether Θ stability weights the case.>
      phi_habituation:
        source_label: "14.4.5 Φ habituation"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights how often tension is handled by re-framing, narrative repair,
          switching of what the scene “really was,” erasure of outer form, or
          conversion of responsibility into authority / equality into exit.
        case_application: >
          <State whether Φ habituation weights the case.>
      chi_mode:
        source_label: "14.4.6 Χ mode"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights what distance does in practice: protection, control,
          devaluation, meta-capacity, outer-form awareness, switch
          clarification, and whether asymmetry activation can be paused, named,
          and re-bound.
        case_application: >
          <State whether Χ mode weights the case.>
      publicness_media_modulators:
        source_label: "14.4.7 Publicness / media modulators"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Publicness and media modulators function as □ frame extensions, not
          causes. They weight visibility, documentation, comparison pressure,
          reputational stakes, circulation, sedimentation, and reputational
          after-costs.
        case_application: >
          <State whether publicness / media modulation weights the case.>
      cost_topology_modulators:
        source_label: "14.4.8 Cost-topology modulators"
        status: "<active | weak | not_applicable | needs_review>"
        effect: >
          Weights how costs attach to role-positions before and after enactment:
          bodily non-delegability, exposure and publicness, reputational
          sedimentation, exit cost, responsibility externalizability,
          frame-control capacity, and asymmetry activation capacity.
        case_application: >
          <State whether cost-topology modulation weights the case.>
    interplay_ch14_5:
      status: "<active | weak | not_applicable | needs_review>"
      typical_configuration_patterns:
        - "Λ-dense + Χ-weak + Θ-fragmented: brittle stabilization."
        - "Ω₀ blurred + □ unstable: pseudo-symmetry."
        - "Φ-high + Σ-weak: narrative inflation."
        - "internal-label capture + publicness confusion."
        - "sexual cost topology unequal + parity rhetoric dominant: parity-to-exit risk."
        - "real Ω/Θ burden + weak Χ/Σ/Ψ re-binding: asymmetry-switch drift risk."
        - "responsibility recognized + frame-control capacity high: responsibility-to-authority risk."
      note: "These patterns are legibility shortcuts, not predictions about persons."
      case_application: >
        <State which modulator interplay patterns are relevant to the case.>
    demarcation_ch14_6:
      rules:
        - "Modulator ≠ character."
        - "Modulator ≠ blame."
        - "Modulator ≠ diagnosis."
        - "Modulator ≠ sexual identity."
        - "Modulator ≠ orientation taxonomy."
        - "Modulator ≠ maturity verdict."
        - "Modulator ≠ dignity ranking."
      case_application: >
        <State how modulator language remains configuration-language.>
    guard: >
      Modulators are not personality types, causes, diagnoses, role essences,
      sexual identities, orientation taxonomies, maturity verdicts, dignity
      rankings, or moral explanations.

  minimal_psychology_adapter:
    status: "<not_triggered | optional | triggered | needs_review>"
    note: >
      The minimal psychology adapter activates only as a structural self-check
      when drift persists despite clarity. It does not explain desire,
      diagnose, confess, psychologize, or replace the operator reading.
    activation_conditions:
      - "drift markers from Chapter 18 are present"
      - "minimal viability conditions from Chapter 19 are no longer restoring correction"
      - "the configuration is still carried voluntarily and repeatedly"
    primary_structural_question: >
      What structural role is this desire-language or desire-orientation playing
      in this configuration?
    permitted_warning_hypothesis: >
      In this configuration, desire-language may be functioning as a
      drift-maintaining mechanism rather than as play, exploration, negotiated
      intensity, bounded practice, or marked asymmetry activation.
    test_criteria:
      D_in_Practice_failure:
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether repeated D-in-Practice failure appears.>
      theta_damage_despite_knowledge:
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether foreseeable Θ damage continues despite recognition.>
      progressive_frame_narrowing:
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether the frame narrows progressively.>
      desire_used_against_chi:
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether desire-language bypasses distance.>
      publicness_displacement:
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether publicness displaces scene analysis.>
      switch_drift_carried_by_self_description:
        status: "<active | risk | absent | needs_review>"
        case_application: >
          <State whether self-description carries switch drift.>
    output_boundary:
      allowed_alarm_statements:
        - "In this configuration, drift persistence is present."
        - "Structural self-correction is failing within the configuration."
        - "Distance (Χ), frame clarity (□), and Θ realism require reactivation."
        - "Internal framing is no longer sufficient to settle the enacted structure."
        - "Outer legibility and cost distribution require re-reading without person-ranking."
        - "Asymmetry activation, if present, requires marking, bounding, and re-binding into Σ/Ψ."
        - "Parity language and responsibility language require re-reading against the sexual cost topology."
      prohibited_conclusions:
        - "character"
        - "pathology"
        - "motive"
        - "identity"
        - "orientation"
        - "maturity"
        - "worth"
    case_application: >
      <State whether the minimal psychology adapter is triggered and why.>

  dignity_in_practice_module:
    pms_status: "derived_construct_from_PMS"
    canonical_pms_formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    pms_sex_application_formula: >
      explicit Ω + operative Χ + no covert Ψ demand under Θ +
      marked/bounded asymmetry activation + no parity-to-exit +
      no responsibility-to-authority, with outer-form readability preserved.
    application_guard: >
      D-compliance in PMS-SEX also requires that internal framing not erase
      outer-form readability, that sexual cost topology remain nameable, and
      that asymmetry activation not become leverage, parity not become exit, and
      responsibility not become authority. This is an application-side guard,
      not a revision of PMS-D.
    principle: >
      D applies in enactment, not as status. PMS-SEX has no entitlement to the
      person: no authority over motives, worth, identity, biography,
      orientation, body, desire, or what someone “really is.” PMS-SEX has only
      entitlement to D in enactment: restraint, respect, and non-degradation
      within the accepted frame.
    outer_form_guard: >
      Naming an externally readable humiliation-form, degradation-form,
      asymmetry-form, possession-form, control-form, exposure-form, or
      authority-form is not itself a violation of the anti-moral stance. The
      violation would lie in converting scene analysis into person-ranking,
      humiliation, diagnosis, identity verdict, maturity ranking, or moral
      contempt.
    D_status_in_case: "<preserved | fragile | compromised | not_applicable | needs_review>"
    case_application: >
      <State how Dignity-in-Practice applies in this case.>
    critique_language:
      structurally_legible_when:
        - "Ψ leak appears"
        - "Ω escalation appears"
        - "pseudo-symmetry makes costs unnameable"
        - "Θ consequences are ignored or externalized"
        - "outer-form denial blocks scene readability"
        - "publicness is weaponized or denied"
        - "asymmetry-switch drift appears"
        - "parity-to-exit appears"
        - "responsibility-to-authority appears"
      not_justified_when:
        - "frame respect is maintained"
        - "no D-in-Practice failure in enactment occurs"
        - "no Ω escalation occurs"
        - "no Ψ leak occurs"
        - "outer-form naming remains non-punitive"
        - "publicness is not weaponized"
        - "no unmarked asymmetry activation occurs"
        - "no parity-to-exit occurs"
        - "no responsibility-to-authority occurs"
      case_application: >
        <State whether critique-language is structurally legible or not justified.>
    critique_markers_ch21_6:
      psi_leak:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "Ψ"
          - "□"
          - "Θ"
        case_application: >
          <State whether covert self-binding demand appears.>
      omega_escalation:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "Ω"
          - "Χ"
          - "□"
        case_application: >
          <State whether power/choice abuse or Ω steering appears.>
      pseudo_symmetry:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "□"
          - "Ω"
          - "Θ"
        case_application: >
          <State whether pseudo-symmetry appears.>
      irresponsibility_under_theta:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "Θ"
          - "Ω"
          - "Ψ"
        case_application: >
          <State whether foreseeable consequences are ignored or externalized.>
      outer_form_denial:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "□"
          - "Φ"
          - "Χ"
        case_application: >
          <State whether internal labels end structural reading.>
      publicness_weaponization_or_denial:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "□"
          - "Ω"
          - "Θ"
        case_application: >
          <State whether publicness is weaponized or denied.>
      asymmetry_switch_drift:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "Ω"
          - "Θ"
          - "Σ"
          - "Ψ"
        case_application: >
          <State whether asymmetry-switch drift is legible.>
      parity_to_exit:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "□"
          - "Ω"
          - "Θ"
          - "Ψ"
        case_application: >
          <State whether parity-to-exit is legible.>
      responsibility_to_authority:
        status: "<active | risk | absent | needs_review>"
        operators:
          - "Ψ"
          - "Χ"
          - "Ω"
          - "□"
        case_application: >
          <State whether responsibility-to-authority is legible.>
    asymmetries_on_both_sides:
      principle: >
        Asymmetry does not imply one-sidedness. Both sides may face
        asymmetries, but in different channels.
      channels:
        - "different costs"
        - "different risks"
        - "different exposures"
        - "different exit margins and recovery conditions"
        - "different capacities to define, refuse, publicize, repair, or absorb consequences"
        - "different capacities to activate asymmetry"
        - "different capacities to externalize costs through parity rhetoric"
        - "different capacities to convert responsibility into authority"
      case_application: >
        <State whether different asymmetry channels appear on different sides.>

  mip_docking_interface:
    status: "<not_triggered | optional | triggered | needs_review>"
    note: >
      PMS-SEX records operator profiles only. MIP may evaluate
      maturity-relevant questions only through explicit docking. Docking must
      remain scene-bound, reversible, non-person-ranking, non-diagnostic, and
      D-preserving.
    operator_profile_only_rule:
      pms_sex_may_record:
        - "unmarked_omega_activation"
        - "weak_or_defensive_chi"
        - "missing_sigma_coordination"
        - "psi_externalization"
        - "parity_to_exit"
        - "responsibility_to_authority"
        - "cost_topology_mismatch"
        - "repeated_failure_to_mark_bound_and_rebind_asymmetry_activation"
      pms_sex_must_not_issue:
        - "maturity_verdict"
        - "adultness_verdict"
        - "person_label"
        - "moral_failure_claim"
        - "dignity_hierarchy"
    IA_box:
      Transparent:
        question: "Was the asymmetry legible?"
        case_application: >
          <State whether asymmetry was transparent.>
      Justified:
        question: "Was it grounded in a protected good or legitimate constraint?"
        case_application: >
          <State whether asymmetry activation was justified in the structural frame.>
      Time_bound:
        question: "Was it limited and reviewable?"
        case_application: >
          <State whether asymmetry activation was time-bound.>
      Reversible:
        question: "Were correction and exit pathways structurally available?"
        case_application: >
          <State whether correction and exit pathways remained available.>
    D_module_scenic:
      principle: >
        Dignity-in-Practice remains praxeologically defined. MIP adds a regime
        lens but may not convert D into person-status judgment.
      questions:
        - "Was D violated in enactment, not what kind of person is this?"
        - "Who had realistic capacity to secure D under the given Ω and Θ?"
        - "Was the violation avoidable given actual P and A?"
        - "Did publicness amplify costs, expose burdens, or distort the reading?"
        - "Was outer-form naming used for protection and accountability, or converted into shaming?"
        - "Was asymmetry activation marked, bounded, and re-bound into Σ/Ψ?"
        - "Was parity used to coordinate reciprocity, or to exit responsibility?"
        - "Was responsibility carried as self-binding, or converted into authority?"
      case_application: >
        <State whether MIP docking is warranted and how operator-profile-only
        discipline is preserved.>
    guard_clause: >
      PMS-SEX outer-form naming does not automatically license public
      accusation. MIP critique does not retroactively convert PMS-SEX structural
      descriptions into moral verdicts. Path-cost, disturbance, stabilization
      burden, asymmetry-switch drift, parity-to-exit,
      responsibility-to-authority, or cost-topology mismatch remains PMS-SEX
      configuration-language unless a separate evaluative framework is
      explicitly and legitimately docked.
    case_application: >
      <State MIP docking status for this case.>

  limits_and_extensions:
    structural_limits:
      PMS_SEX_models:
        - "scenes and enactments"
        - "frames and frame stability"
        - "asymmetries and cost layouts"
        - "sexual cost topology"
        - "repetition, trajectories, and irreversibility"
        - "non-events, absence, and expectation fields"
        - "outer legibility and publicness overlays"
        - "drift, stabilization, and exit conditions"
        - "asymmetry-switch drift"
        - "parity-to-exit"
        - "responsibility-to-authority"
        - "cost-topology mismatch"
        - "operator profiles for possible MIP docking"
      PMS_SEX_does_not_model:
        - "persons"
        - "personality, disposition, or character"
        - "inner motives, drives, or experiential qualities"
        - "developmental histories or causal psychologies"
        - "sexual identity, orientation, or worth"
        - "individual responsibility beyond structural attribution"
        - "direct adultness verdicts"
        - "maturity hierarchy"
        - "dignity hierarchy"
    configuration_scope:
      note: >
        PMS-SEX does not claim isomorphism across all sexual configurations.
        Identical practice labels do not imply identical structure. Internal
        framing does not settle outer form. Public discourse does not exhaust
        scene legibility. Cost topology must be reconstructed scene by scene.
      case_application: >
        <State the configuration-scope limits for this case.>
    psychology_scope:
      note: >
        Psychology is subordinated, not denied. It may refine a reading only
        after structural reconstruction via Δ–Ψ, cost layout, outer legibility,
        sexual cost topology, and publicness overlays have already been
        reconstructed.
      forbidden_uses:
        - "bypassing Ω accounting"
        - "dissolving Θ irreversibility"
        - "personalizing what remains structurally induced"
        - "erasing outer form with inner narrative"
        - "converting drift into diagnosis"
        - "converting path-cost into identity rank"
