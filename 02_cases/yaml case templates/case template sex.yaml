    paper_refs:
      - "Ch. 24.3"
      - "Ch. 24.4"
      - "Appendix D.11"
      - "Appendix B"
    text: >
      PMS-SEX remains valid by staying within what it can responsibly say: not
      what persons are, but what configurations do over time. It reads sexual
      praxis as enacted configuration under frame, asymmetry, non-event,
      repetition, temporality, distance, integration, and self-binding. It
      permits hard claims about cost, drift, outer legibility, sexual cost
      topology, and consequence without converting those claims into
      person-status judgments.
    compressed_rules:
      - "no consequence-free sex"
      - "no desire exempt from structural conditions"
      - "no outer-form erasure by internal labels"
      - "no publicness reduction"
      - "no path-cost as person-worth"
      - "no sexual cost topology as score"
      - "no asymmetry switch as authority"
      - "no parity-to-exit as reciprocity"
      - "no responsibility-to-authority as care"
      - "no operator profile as direct adultness verdict"
      - "no critique through humiliation"
      - "no maturity hierarchy"
      - "no dignity hierarchy"
      - "no taxonomy where only configuration-language is warranted"
      - "no total capture where the scene exceeds the grammar"
    adult_reciprocity_guard: >
      Adult sexual reciprocity does not require equal burdens. It requires that
      unequal burdens not be externalized through unmarked asymmetry activation,
      parity-to-exit, or responsibility-to-authority.
    mip_docking_guard: >
      PMS-SEX may record operator profiles and drift markers. It may not
      directly evaluate person-adultness. Adultness-relevant critique belongs to
      MIP docking and must remain scene-bound, reversible, non-person-ranking,
      non-diagnostic, and D-preserving.
    final_marker: >
      PMS-SEX remains valid by staying within what it can responsibly say: not
      what persons are, but what configurations do over time.
    case_application: >
      <State how the final PMS-SEX profile guard constrains this case.>

