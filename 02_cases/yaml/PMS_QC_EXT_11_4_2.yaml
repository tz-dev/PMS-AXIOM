pms_qc_ext_overlay_application:
  schema_version: "PMS-QC_EXT_1.1"
  schema_role: "case_extension_overlay_application"
  overlay_status: "optional_paper_specific_refinement_layer"
  overlay_source_file: "PMS-QC-EXT.yaml"
  base_qc_overlay_source_file: "PMS-QC.yaml"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"
  extends:
    base_model: "PMS-QC_1.1"
    base_dependency: "PMS_1.3"
    compatibility: >
      Declared for PMS-QC_1.1 as an optional paper-specific refinement layer.
      This extension does not override PMS or PMS-QC base semantics.

  pms_application_reference:
    note: >
      Any use of PMS-QC_EXT that claims PMS-based application remains
      subordinate to the PMS_1.3 entry condition and self-binding clause. This
      extension does not suspend, replace, or override PMS application
      guardrails.
    refers_to:
      - "pms_entry_condition"
      - "schema_meta.normative_position.self_binding_clause"
      - "repository_governance"
    case_application: >
      PMS entry discipline remains active. The Oracle-Asymmetry Audit is still
      reversible, bounded, non-diagnostic, non-anthropomorphic, non-tribunal,
      and non-validating. QC-EXT may add paper-specific visibility for ladder,
      fixed-point, attractor-schedule, measurement-domain, and policy-refinement
      motifs, but it does not alter the Core PMS case, the PMS-QC base overlay,
      PMS operators, PMS dependencies, or PMS Base status.

  extension_meta:
    model_name: "Praxeological Meta-Structure – Quantum Computing Extension Layer"
    model_short: "PMS-QC_EXT"
    status: "draft"
    repository_role: "paper_specific_qc_refinement_layer"
    layer_role: "optional_extension"
    optional_extension: true
    depends_on:
      - "PMS_1.3"
      - "PMS-QC_1.1"
    epistemic_status: >
      Optional paper-derived refinement layer for bounded structural analysis,
      annotation, and policy experimentation within the PMS-QC framework.
    boundedness_note: >
      PMS-QC_EXT is not a generic QC standard and not a canonical part of PMS.
      It collects paper-specific refinements that remain subordinate to PMS and
      the PMS-QC base overlay. Use of EXT does not imply comparative
      superiority, exhaustive capture, deployment adequacy, or validated safety.
    description: >
      PMS-QC_EXT adds paper-specific macro refinements, Δ–Ψ chain templates,
      attractor schedule patterns, ladder refinements, measurement-domain
      modelling refinements, and optional structural policy refinements derived
      from the present PMS-QC paper. It extends the expressive range available
      for paper-aligned analysis without altering the semantics of the generic
      PMS-QC base overlay. Nothing in this file should be read as introducing
      new PMS meta-axioms, a new operator layer, or a uniquely privileged
      architecture for AI–QC governance.
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "extension_formalization"
    case_application: >
      EXT is used here because the case explicitly names oracle-like components
      that may resemble paper-specific refinements: controlled-unitary ladders,
      marking or phase-kickback motifs, possible attractor-like amplification,
      measurement-domain branching, and bounded audit-policy questions. The
      EXT reading remains weak and optional because the case provides no
      concrete QPE ladder, Grover fixed-point variant, attractor schedule,
      measurement basis, register, iteration depth, or stabilisation policy.

  source_header_alignment:
    intended_use:
      - "Attach alongside PMS.yaml and PMS-QC.yaml for paper-specific QC analysis, annotation, and bounded refinement work."
      - "Support optional reasoning about QPE ladders, fixed-point Grover variants, attractor schedules, and bounded governance-oriented experimentation."
      - "Provide paper-derived refinement templates for documentation, orchestration, and compilation-adjacent analysis."
    not_intended_for:
      - "redefining PMS or PMS-QC base semantics"
      - "establishing a generic QC standard"
      - "validated safety architecture"
      - "deployment-ready agent control"
      - "physical correctness guarantees"
      - "architecture-independent implementation claims"
      - "anthropomorphic interpretation of quantum processes"
    repositories:
      PMS_base: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
      PMS_QC: "https://github.com/tz-dev/PMS-QC"
    relationship_to_pms_qc:
      - "Supplements PMS-QC with paper-specific macro refinements, chain templates, and optional structural constraints."
      - "Never overrides base definitions."
      - "Never promotes paper-specific constructs into the generic base layer."
    case_application: >
      The case uses PMS-QC_EXT only as an optional paper-specific refinement
      lens after PMS Core and PMS-QC base have already been applied. It does
      not use EXT to establish a generic QC standard, validated safety layer,
      deployment architecture, physical correctness guarantee, or PMS Base
      revision.

  load_order:
    required_order:
      - "PMS.yaml"
      - "PMS-QC.yaml"
      - "PMS-QC-EXT.yaml"
    rule: >
      PMS-QC_EXT may be applied only after PMS Base and PMS-QC base overlay have
      been read and preserved. EXT is optional and paper-specific. It cannot
      substitute for the PMS Core pass or for the generic PMS-QC overlay.
    case_application: >
      Load order is satisfied for this application profile: PMS.yaml remains
      the only PMS Base reference, the PMS-QC base overlay remains the generic
      QC layer, and PMS-QC_EXT is appended only as an optional paper-specific
      refinement block.

  overlay_relationship_to_core_and_qc:
    status: "subordinate_to_completed_pms_core_and_qc_overlay"
    core_case_status: "already_completed"
    qc_base_overlay_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Oracle-Asymmetry Audit (Audit Trace)"
    qc_base_overlay_source: "completed PMS-QC overlay YAML for Oracle-Asymmetry Audit (Audit Trace)"
    rule: >
      This QC-EXT block is appended to or integrated with an already completed
      PMS Core v1.3 case artefact and, where relevant, an already completed
      PMS-QC base overlay. It does not rewrite the Core pass, redefine PMS
      operators, alter PMS dependencies, change derived structures, override
      PMS-QC base semantics, or silently promote paper-specific EXT refinements
      into the generic QC layer.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    preserved_qc_base_elements:
      - "PMS-QC generic base macros"
      - "PMS-QC base structural policies"
      - "PMS-QC non-guarantee clauses"
      - "PMS-QC base / extension boundary"
      - "PMS-QC structural-not-physical discipline"
      - "PMS-QC rival-formalism openness"
    integration_rule: >
      The QC-EXT overlay may add paper-specific refinements for QPE ladders,
      fixed-point or overshoot-regulated Grover variants, attractor schedules,
      measurement-domain modelling, and optional AI–QC policy heuristics. These
      refinements are overlay shorthand and case-annotation aids only. Reduced
      signatures such as Θ^t(Ω ∘ □), Ψ ∘ Σ ∘ Α, or optional_EXT_review(...) do
      not redefine PMS operators, do not alter PMS dependencies, do not replace
      the completed Core formula, and do not override PMS-QC base semantics. The
      EXT overlay must not modify the completed PMS Core case or PMS-QC base
      overlay except where a direct consistency error has been separately
      identified.
    case_application: >
      The EXT reading depends on the completed Core and QC passes by treating
      oracle-like directionality first as PMS Ω under □, then as PMS-QC
      QFRAME/QORACLE_CALL or conditional QMEASURE structure, and only then as
      possible EXT resemblance to QPE ladder, Grover centering, fixed-point
      attractor, measurement projection, or paper-specific policy refinement.
      In this case, EXT does not become the operative case model: it remains a
      weak refinement audit over possible paper-specific motifs. No EXT
      construct is promoted into PMS Base or PMS-QC base, and no reduced EXT
      signature is treated as a new PMS dependency path.

  normative_position:
    non_identity_clause: >
      EXT mappings and refinements are structural renderings only. They do not
      imply ontological identity between PMS operators and the specific
      algorithmic or governance constructs discussed in the paper.
    non_monopoly_clause: >
      PMS-QC_EXT does not claim monopoly over high-level structural analysis,
      nor does it imply that rival or complementary formalisms could not capture
      certain distinctions more effectively.
    anthropomorphism_clause: >
      Terms such as awareness, attractor, governance, or self-binding remain
      structural and non-anthropomorphic. EXT constructs do not attribute
      consciousness, intention, agency, or moral status to quantum systems.
    non_guarantee_clause: >
      Structural refinement does not imply physical correctness, convergence,
      stability, safety, or deployment readiness.
    governance_conditionality_clause: >
      Governance-oriented content in this extension is optional and conditional.
      It should be read as one bounded architectural path within the paper, not
      as the natural telos of PMS-QC or as a validated control architecture.
    base_vs_extension_clause: >
      Generic PMS-QC macros and policies remain in the base overlay.
      Paper-specific ladder structures, fixed-point Grover refinements,
      stronger attractor schedules, and additional policy heuristics remain
      EXT-only.
    case_application: >
      These clauses keep the Oracle-Asymmetry Audit from becoming an EXT
      verdict. Controlled unitaries do not become QPE ladders unless a concrete
      U^(2^j) ladder is specified. Marking or phase-kickback primitives do not
      become fixed-point Grover unless regulated amplification is specified.
      Measurement mappings do not become physical measurement theory. Policy
      checks remain structural and non-guaranteeing.

  computational_position:
    representation_clause: >
      This file is a formal representational addendum for optional
      paper-specific refinements. It is not executable code, not a proof of
      implementability, and not a guarantee of interoperability.
    calibration_clause: >
      Structural well-formedness in PMS-QC_EXT does not by itself establish
      physical adequacy, numerical correctness, stability, safety, or optimal
      compilation.
    accountability_clause: >
      Any operational use of EXT remains dependent on external architectures,
      implementations, validation procedures, and domain-specific accountability
      mechanisms.
    deployment_clause: >
      EXT compliance or EXT policy satisfaction must not be treated as evidence
      of deployment readiness, safe orchestration, or validated agent control.
    case_application: >
      The case remains representational and annotation-oriented. It is not an
      executable macro program, not a circuit verifier, not an empirical run,
      not a compiler proof, and not a deployment control layer. EXT risks
      implementation overclaim only if weak resemblance to QPE, Grover,
      attractor schedules, or measurement-domain modelling is treated as
      concrete algorithmic validation.

  semantic_anchor:
    note: >
      The workflow model below is one optional organizational abstraction for
      toolchains and analysis. It is non-canonical and does not redefine PMS or
      PMS-QC composition logic.
    qc_workflow_model: >
      A QC workflow may be modeled as a typed directed acyclic graph (DAG),
      where nodes represent macros, gates, measurements, or policy checks,
      edges represent causal, temporal, or data dependencies, and scopes are
      determined by active □-frames. This is a toolchain-oriented aid, not a
      replacement for canonical PMS composition rules.
    case_application: >
      DAG-style workflow modeling is relevant because the case explicitly
      allows a circuit, hybrid DAG, or macro program. It remains non-canonical:
      the DAG model can organize oracle nodes, control edges, measurement nodes,
      and policy checks, but it does not redefine PMS operator composition,
      PMS-QC base macro semantics, or QC-EXT paper-specific refinements.

  extension_governance:
    role_of_this_file: >
      Optional paper-specific refinement layer within the PMS-QC repository
      ecosystem.
    extensions_may:
      - "Define paper-specific refinements of generic PMS-QC macros."
      - "Introduce paper-specific chain templates for analysis and annotation."
      - "Add optional structural policy refinements and bounded governance heuristics."
      - "Add organizational or toolchain-oriented helper metadata when explicitly marked as non-canonical."
    extensions_should_not_without_explicit_revision:
      - "Silently redefine PMS or PMS-QC base semantics."
      - "Silently promote EXT refinements into the generic base layer."
      - "Present paper-specific constructs as generic PMS-QC standards."
      - "Treat governance-oriented refinements as validated deployment architecture."
      - "Treat helper metadata as if it modified canonical PMS operator logic."
    case_application: >
      Governance discipline is preserved by marking all EXT content as optional,
      paper-specific, weak or conditional unless concrete evidence is supplied.
      No EXT macro, policy, chain, or DAG helper is used to alter PMS Base,
      PMS-QC base, operator dependencies, or completed Core case conclusions.

  base_vs_extension_boundary:
    note: >
      This block records the intended separation between the generic PMS-QC base
      overlay and the paper-specific EXT layer.
    refines_base_macros:
      - "QORACLE_CALL"
      - "QDIFFUSION"
      - "QMEASURE"
    reserved_ext_macros:
      - "QPE_ORACLE_LADDER"
      - "GROVER_CENTERING"
      - "ATTRACTOR_FIXED_POINT"
      - "MEASUREMENT_PROJECTION_MODEL"
    paper_specific_chain_patterns:
      - "qpe_exact"
      - "grover_fixed_point"
      - "attractor_alignment"
    paper_specific_policy_refinements:
      - "qpe_depth_guard"
      - "grover_no_overshoot"
      - "basis_reframe_guard"
      - "attractor_cycle_integrity"
    boundary_status: "preserved"
    case_application: >
      The case uses PMS-QC base for the primary QC reading and invokes EXT only
      as a weak paper-specific refinement audit. QPE_ORACLE_LADDER,
      GROVER_CENTERING, ATTRACTOR_FIXED_POINT, and MEASUREMENT_PROJECTION_MODEL
      are not promoted into base macros. The strongest conditional EXT relevance
      is MEASUREMENT_PROJECTION_MODEL where measurement mappings are present;
      QPE and Grover refinements remain resemblance checks only.

  application_boundary:
    note: >
      EXT use remains bounded by the same non-anthropomorphic and non-deployment
      discipline that governs PMS and PMS-QC.
    constraints:
      - "No clinical, personal or moral interpretation of QC actors or workflows."
      - "No anthropomorphisation of quantum patterns."
      - "No inference from structural refinement to safety or capability."
      - "No deployment claim from EXT compliance alone."
    case_application: >
      Application boundaries are preserved. The workflow, oracle components,
      controlled unitaries, phase-kickback primitives, and measurement mappings
      are not treated as persons, agents, minds, moral actors, legal subjects,
      or deployment-ready systems. EXT compliance remains annotation and audit
      structure only.

  extended_qc_mappings:
    overview: >
      These are paper-specific refined renderings of selected Δ–Ψ operators in
      QC contexts. They do not override the generic PMS-QC base mappings and
      should be read as optional, non-canonical refinements used for the present
      paper's algorithmic and governance-oriented analysis.
    mapping_status: "partial"
    items:
      Delta:
        operator: "Δ"
        applicability: "weak"
        refined_roles:
          - "Phase-distinguished alternatives in eigenvalue encodings."
          - "Domain-partitioned initialisation in multi-register workflows."
        case_application: >
          Δ is already active in the Core and PMS-QC base readings. EXT
          refinement is weak because the case does not specify eigenphase
          encoding, multi-register initialization, or phase-distinguished
          alternatives beyond generic marking or phase-kickback language.
      Alpha:
        operator: "Α"
        applicability: "weak"
        refined_roles:
          - "Paper-specific fixed-point-oriented attractor schedules for controlled amplitude adjustment."
          - "Centre-aligned attractor regions used in spectral or phase-estimation-style settings."
        case_application: >
          Α remains weak. Marking or phase-kickback primitives may resemble
          Grover-style or spectral attractor contexts, but no fixed-point
          schedule, centre-aligned attractor region, amplitude amplification
          routine, or spectral alignment process is specified.
      Theta:
        operator: "Θ"
        applicability: "weak"
        refined_roles:
          - "Paper-specific rendering of the controlled-unitary ladder U^(2^j) as a structured Θ–Ω pattern in QPE-related contexts."
          - "Optional iterative attractor-contraction schedules in fixed-point-style refinements."
        case_application: >
          Θ is active in the Core/QC base as workflow ordering, but EXT-specific
          Θ is weak because no QPE ladder U^(2^j), no t-depth control register,
          no fixed-point contraction schedule, and no explicit iteration bound
          is provided.
      Phi:
        operator: "Φ"
        applicability: "weak"
        refined_roles:
          - "Paper-specific two-stage reframing from spectral / phase encoding toward computational readout."
        case_application: >
          Φ is active in the Core/QC base as audit recontextualization, but
          EXT-specific Φ is weak because the case does not specify spectral or
          phase encoding followed by computational readout, inverse QFT, or a
          two-stage measurement-domain transition.
      Psi:
        operator: "Ψ"
        applicability: "weak"
        refined_roles:
          - "Possible structural loci for invariance-bound commitments such as iteration ceilings or bounded coherence conditions."
          - "Paper-specific attractor-cycle validity constraints that aim to prevent runaway structural amplification without guaranteeing physical convergence."
        case_application: >
          Ψ remains weak. No iteration ceiling, bounded coherence condition,
          attractor-cycle validity rule, stabiliser invariant, or audit policy
          is specified. Any Ψ reading remains analytic or policy-conditional
          and must not be anthropomorphized.

  macro_extensions:
    overview: >
      These macros are paper-specific refinements of the generic PMS-QC base
      layer. They are optional and intended for analysis, annotation,
      documentation, orchestration, and compilation-adjacent reasoning within
      the scope of the present paper. They do not claim completeness, physical
      sufficiency, optimal compilation, or validated control behaviour.
    selected_macro_extensions:
      - "MEASUREMENT_PROJECTION_MODEL"
    macros:
      QPE_ORACLE_LADDER:
        id: "QPE_ORACLE_LADDER"
        applicability: "weak"
        refines_base_macro: "QORACLE_CALL"
        paper_dependency: "PMS-QC paper, QPE reconstruction / ladder refinement"
        params:
          - "unitary_id"
          - "t"
        description: >
          Paper-specific reusable refinement of the controlled power-of-two
          ladder U^(2^j) for j in [0, t-1] in QPE-related settings.
        pms_expansion:
          - "Θ"
          - "Ω"
          - "□"
        chain_pattern: "Θ^t( Ω ∘ □ )"
        notes: >
          This macro captures the paper-specific ladder refinement discussed in
          the QPE chapter. It does not alter the semantics of QORACLE_CALL in
          the generic base layer. The ladder itself remains EXT-only and does
          not imply optimality, necessity, correctness, or physical adequacy.
        case_application: >
          QPE_ORACLE_LADDER is weakly relevant because the case mentions
          controlled unitaries and phase-kickback primitives. It is not active
          because no unitary_id, t, control register, U^(2^j) ladder, phase
          estimation target, or measurement-readout structure is supplied.
      GROVER_CENTERING:
        id: "GROVER_CENTERING"
        applicability: "weak"
        refines_base_macro: "QDIFFUSION"
        paper_dependency: "PMS-QC paper, Grover refinement / fixed-point discussion"
        params: []
        description: >
          Paper-specific refinement for fixed-point or overshoot-regulated
          Grover-style centering.
        pms_expansion:
          - "Α"
          - "Σ"
          - "Ψ"
        chain_pattern: "Ψ ∘ Σ ∘ Α"
        notes: >
          This refinement adds a Ψ-layer after attractor integration in order
          to model bounded, paper-specific regulation of Grover-style
          amplification. It is not part of standard Grover, is not required by
          the base representation, and does not guarantee convergence or
          overshoot prevention.
        case_application: >
          GROVER_CENTERING is weakly relevant because marking and phase-kickback
          can resemble Grover-style oracle motifs. It is not active because the
          case supplies no diffusion operator, fixed-point regulation, overshoot
          guard, iteration cycle, Α→Σ boundary, or Ψ-bound regulation.
      ATTRACTOR_FIXED_POINT:
        id: "ATTRACTOR_FIXED_POINT"
        applicability: "weak"
        refines_base_macro: null
        paper_dependency: "PMS-QC paper, attractor schedule refinement discussion"
        params:
          - "schedule"
        description: >
          Paper-specific attractor schedule template for bounded fixed-point-
          oriented convergence modelling.
        pms_expansion:
          - "Α"
          - "Θ"
          - "Σ"
          - "Ψ"
        allowed_schedule_examples:
          - "linear"
          - "exponential"
          - "custom"
          - "under_specified"
        notes: >
          Supports optional schedule descriptions such as linear, exponential,
          or custom sequences. This is a structural refinement template only
          and does not guarantee actual convergence, correctness, stability, or
          physical adequacy.
        case_application: >
          ATTRACTOR_FIXED_POINT is weak only as a possible future refinement.
          The case contains no schedule, convergence model, repeated Α steps,
          Σ checkpoints, Ψ invariants, or fixed-point target. Any schedule is
          therefore under-specified and non-operational.
      MEASUREMENT_PROJECTION_MODEL:
        id: "MEASUREMENT_PROJECTION_MODEL"
        applicability: "weak"
        refines_base_macro: "QMEASURE"
        paper_dependency: "PMS-QC paper, measurement branching discussion"
        params: []
        description: >
          Paper-specific structural modelling refinement for branching in
          measurement domains.
        pms_expansion:
          - "Δ"
          - "Λ"
          - "□"
        notes: >
          Λ encodes unrealised branches, Δ actual outcome distinctions, and □
          the relevant measurement domain. This is a structural modelling aid,
          not a complete physical theory of measurement, and does not replace
          the base semantics of QMEASURE.
        case_application: >
          MEASUREMENT_PROJECTION_MODEL is the most directly relevant EXT macro
          because the case includes measurement mappings as possible oracle-like
          components. It remains weak because no measurement domain, basis,
          register, outcome set, branch structure, or expected non-event is
          specified.

  chain_patterns:
    overview: >
      These patterns derive directly from the PMS-QC paper and provide
      paper-specific chain templates for analysis, annotation, and comparison.
      They are non-canonical and do not override the semantics of the generic
      PMS-QC base overlay.
    selected_chain_patterns:
      - "none"
    patterns:
      qpe_exact:
        applicability: "weak"
        description: >
          Paper-specific full QPE chain template with explicit ladder
          refinement.
        chain:
          - "Δ"
          - "∇"
          - "Α"
          - "Θ^t(Ω ∘ □)"
          - "Φ"
          - "Α"
          - "Σ"
          - "Δ"
          - "Λ"
        notes: >
          Matches QPE preparation, controlled ladder refinement, Fourier-domain
          reframing, alignment, and final measurement. The QFT-alignment stage
          is semantically ordered as Σ(Α(Φ(S))). The ladder component remains
          paper-specific and EXT-only.
        case_application: >
          qpe_exact is weak only. Controlled unitaries and phase kickback are
          compatible with QPE-like resemblance, but no preparation, control
          register, ladder depth t, U^(2^j) sequence, QFT alignment, Σ commit,
          or final measurement structure is supplied.
      grover_fixed_point:
        applicability: "weak"
        description: >
          Paper-specific Grover template with EXT-bound fixed-point-style
          regulation.
        chain:
          - "□"
          - "Δ"
          - "∇"
          - "Α"
          - "Θ^k(Ψ ∘ Σ ∘ Α ∘ Ω ∘ Δ ∘ □)"
          - "Δ"
          - "Λ"
        notes: >
          Standard Grover remains a base-layer construction without Ψ. This
          template adds EXT-bound Ψ regulation within the iterated block to
          model fixed-point or overshoot-regulated variants.
        case_application: >
          grover_fixed_point is weak only. Marking or phase-kickback language
          may resemble a Grover-style oracle, but no diffusion block, k, Ψ-bound
          regulation, no-overshoot policy, or fixed-point variant is supplied.
      attractor_alignment:
        applicability: "weak"
        description: >
          Paper-specific reframing-plus-alignment pattern for spectral or
          Fourier-oriented estimation settings.
        chain:
          - "Δ"
          - "Φ"
          - "Α"
          - "Σ"
        notes: >
          Useful where reframing and alignment are structurally foregrounded.
          This pattern is non-canonical and should not be conflated with the
          generic base macro semantics of QFT_ALIGN.
        case_application: >
          attractor_alignment is weak. The case has audit recontextualization,
          but no spectral domain, Fourier alignment, attractor-centered region,
          or Σ alignment commit is specified.

  extended_policies:
    overview: >
      These are paper-specific structural guardrails and optional governance-,
      audit-, and stability-oriented refinements derived from the PMS-QC paper.
      They compose with, but never replace, PMS-QC base policies. They are
      non-guarantee refinements, not validated safety defaults.
    global_non_guarantee_clause: >
      Structural refinement ≠ physical guarantee ≠ safety guarantee.
    policy_status: "partial"
    selected_policies:
      - "basis_reframe_guard"
    policies:
      qpe_depth_guard:
        id: "qpe_depth_guard"
        applicability: "risk"
        policy_kind: "governance"
        paper_specific: true
        non_guarantee: true
        description: >
          Bounded structural guard on QPE-style ladder depth. t_max expresses a
          paper-specific governance or audit bound, not a correctness or
          optimality guarantee.
        params:
          t_max: "unspecified"
        rule: >
          Θ^t(Ω ∘ □) requires t <= t_max unless an explicit Ψ-stabilisation
          section follows.
        case_application: >
          qpe_depth_guard is a review risk only if the workflow is later
          specified as a QPE-like ladder. In the current case, t and t_max are
          unspecified, so no depth compliance is claimed.
      grover_no_overshoot:
        id: "grover_no_overshoot"
        applicability: "risk"
        policy_kind: "stability"
        paper_specific: true
        non_guarantee: true
        description: >
          Paper-specific overshoot-avoidance guard for Grover-style cycles with
          EXT-bound regulation.
        rule: >
          If Σ is applied after Α in Grover-style cycles, Ψ should follow
          within the same iteration scope unless alternative paper-specific
          invariance conditions are explicitly declared.
        case_application: >
          grover_no_overshoot is a review risk only if a Grover-style Α→Σ cycle
          is later specified. The current case has no diffusion cycle, no k,
          and no Ψ-bound regulation, so no overshoot compliance is claimed.
