  uniform_report:
    generate_only_from_structured_fields: true
    title: "MIP analysis of Structural injustice"
    overview_4_to_7_sentences: >
      This MIP analysis treats Structural injustice as an abstract structural case, not as a concrete
      praxis scene. A–C–R–P fields are structurally relevant, but no A-score or M-score is assigned because
      no concrete actors, roles, institutions, time window, or evidence are supplied. The IA-box remains
