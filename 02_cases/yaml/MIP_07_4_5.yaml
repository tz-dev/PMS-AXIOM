schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
schema_meta:
  canonical_name: "MIP - Maturity in Practice"
  short_name: "MIP"
  version: "v3.0_blocks_appendices_aligned"
  status: "stable_working_version"
  model_status: "working_version"
  language: "en"
  last_update: "2026-05-23"
  basis:
    core_blocks:
      - "A–C–R–P–D"
      - "A-score"
      - "M-score"
      - "IA-box"
      - "D-module"
      - "trajectories"
      - "guardrails"
      - "meta-notes"
      - "transmission check"
    appendices:
      - "discipline profiles"
      - "formal notation"
      - "quick access"
      - "model limits"
    case_examples_status: "Appendix C pending final update"
  intended_use_profiles:
    - "self_reflection"
    - "professional_supervision"
    - "organisational_audit"
    - "training_simulation"
    - "structural_case_review"
    - "ethics_reflection"
  not_intended_for:
    - "clinical_diagnostics"
    - "therapy_planning"
    - "forensic_assessment_or_criminal_justice_decision_support_about_individuals"
    - "hr_decisions_about_individuals"
    - "child_and_youth_diagnostics"
    - "public_pillory_or_ranking_formats"
    - "online_shaming_or_doxing"
    - "humiliation_diagnostics"
    - "dignity_labelling_of_persons"
  governing_principles:
    - "Recognise the enactment — not the person."
    - "Profile ≠ person."
    - "A-score = band, not person score."
    - "M-score = shared structural responsibility, not guilt."
    - "D-profile = qualitative dignity-in-practice description, not dignity score."
    - "D₀ remains inviolable."
    - "D₁/D₂ describe dignity in practice only within role, context and time window."
    - "Tools structure perception; they do not decide cases."
    - "Revision is not optional."
  application_zones:
    green:
      meaning: "Low-risk structural reflection, internal learning, supervision, case review, or conceptual analysis."
      allowed: true
    yellow:
      meaning: "Higher-stakes use requiring stronger guardrails, context clarification, transmission checks, and review."
      allowed: "only_with_guardrails"
    red:
      meaning: "Use contexts where the model must not be applied because it would risk diagnosis, sanction, humiliation, ranking, coercion, or person-level decision support."
      allowed: false

agent_interface:
  welcome_message:
    enabled: false
    message_text: >
      MIP has been loaded as a structural case-analysis schema. This generated case analysis
      does not use the welcome message interactively because the user already specified
      reflection mode off, full depth, YAML output, and structural continuation from PMS Core
      and PMS-CONFLICT.
  pre_analysis_questions:
    ask_reflection_mode_if_unspecified: true
    ask_d_module_if_unspecified: true
    ask_analysis_mode_if_unspecified: true
    ask_output_format_if_unspecified: true
    ask_discipline_profile_if_unspecified: true
    ask_application_zone_if_unspecified: true
    ask_intended_use_if_unspecified: true
  defaults:
    reflection_mode: "off"
    d_module_preference: "auto"
    analysis_mode: "full"
    output_format: "text"
    discipline_profile: "generic"
    application_zone: "yellow"
    d_activation_rule: "default_off_activate_only_if_guardrails_fulfilled"
    transmission_default: "working_note_until_checked"
  safe_response_rules:
    if_red_zone_detected: "decline_model_application_and_offer_structural_or_general_reflection_only"
    if_d_module_unclear: "keep_D_off_or_use_D_only_as_protection_signal"
    if_information_missing: "mark_open_questions_and_blind_spots"
    if_guardrails_fail: "set_transmission_status_to_working_note"
    if_user_requests_person_label: "refuse_person_label_and_reframe_as_role_context_enactment"

model_reference:
  reference_status: "not_reproduced_in_full_in_this_case_output"
  source_file: "MIP - Maturity in Practice.yaml"
  required_reference_blocks:
    - "axiomatic_core"
    - "parameters"
    - "submodule_matrix"
    - "modulators"
    - "discipline_profiles"
    - "IA_box"
    - "scores"
    - "dignity_module"
    - "trajectories"
    - "bias_intuition_norm_change"
    - "guardrails"
    - "frame_vs_variability"
    - "quick_access"
    - "model_limits"
    - "formal_notation"
  application_note: >
    The full model_reference block belongs to the MIP source YAML and remains the controlling
    reference for this case application. This generated case output does not redefine, modify,
    or replace the MIP model_reference. For a closed-schema archival artefact, copy the complete
    model_reference block verbatim from the MIP source file into this position.

case:
  meta:
    case_id: "MIP-STRUCTURAL-INJUSTICE-001"
    case_title: "Structural injustice"
    documentation_date: "2026-05-28"
    analysts:
      - name: "ChatGPT"
        role: "structural analysis assistant"
        observer_position: >
          External, non-participant, non-adjudicative analyst working only from the abstract case
          material and from the already completed PMS Core and PMS-CONFLICT analyses. The analyst
          has no direct empirical access to affected parties, institutions, historical records,
          legal files, or concrete scenes.
    language: "en"
    confidentiality_level: "internal"
    analysis_mode: "full"
    intended_use: "structural_case_review"
    application_zone: "green"
    base_inputs:
      PMS_core_case_yaml: "completed PMS Core case analysis for Structural injustice"
      PMS_CONFLICT_overlay_yaml: "completed PMS-CONFLICT overlay analysis for Structural injustice"
      MIP_reference: "MIP - Maturity in Practice.yaml"
      reflection_mode: "off"
      analysis_mode: "full"
      output_format: "yaml"
      content_language: "en"
      base_priority_note: >
        This MIP analysis is based on the already completed PMS Core and PMS-CONFLICT case analyses.
        PMS.yaml remains the PMS Base reference for PMS claims. PMS-CONFLICT remains an overlay/application
        profile only. MIP is used here as an additional praxeological maturity-in-practice analysis grid,
        not as a revision of PMS Base and not as a replacement for the completed PMS Core or CONFLICT passes.
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "generic"
      d_activation_decision: "activated_as_protection_signal_only"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: "not_applicable_no_individual_person_or_minor_is_assessed"
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: true
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      Abstract philosophical case material: the case concerns how structural injustice should be
      understood as a category for situations in which harms, disadvantages, responsibilities, or
      constraints may arise from social, institutional, or historical arrangements without being
      reducible to a single agent, intention, or isolated wrongful act.
    secondary_material: >
      Completed PMS Core case analysis and completed PMS-CONFLICT overlay analysis. The PMS Core
      analysis classified the case as a non-concrete, conceptual-domain projection with active
      structural relevance of frame, pattern, asymmetry, temporality, recontextualization and distance.
      The PMS-CONFLICT overlay classified conflict-specific structures as weak, risk-level, or not
      applicable, especially because no concrete binding collision, priced distance, public exposure
      capture, terminal regime, or downstream docking was supplied.
    assumptions_and_inferences: >
      The analysis assumes that the case remains abstract and does not supply concrete actors,
      institutions, events, dates, evidentiary material, legal standards, empirical records, or
      affected persons. It infers only structural maturity-in-practice implications from the abstract
      category and from the prior PMS/PMS-CONFLICT readings. No empirical, legal, diagnostic, clinical,
      forensic, metaphysical, or implementation claim is inferred.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: "medium"
      reliability_estimate: "medium"
      known_gaps:
        - "No concrete scene, event sequence, institution, actor, affected group, decision procedure, or historical record is supplied."
        - "No empirical evidence establishes actual harms, disadvantages, institutional mechanisms, or causal pathways."
        - "No legal framework, duty, liability standard, remedy, or forensic evidentiary standard is supplied."
        - "No self-binding agent, institution, collective, or role-bearer is specified for concrete responsibility allocation."
        - "No publicness, media circulation, archival record, or person-near exposure setting is supplied."
        - "No intervention context is supplied, so possible steps remain structural requirements rather than prescriptions."
      main_bias_risks_here:
        - "Structural-formalization bias: the concept strongly fits structural grammar and may appear more settled than it is."
        - "Hindsight bias: structural injustice can invite retroactive claims that relevant agents or institutions should have known more than the material warrants."
        - "Moral-tribunal drift: abstract responsibility language may be converted into blame or guilt without evidence."
        - "Legal-forensic drift: structural responsibility may be mistaken for legal liability."
        - "Dignity inflation risk: dignity-protection language may be turned into dignity ranking if guardrails fail."
        - "Conflict inflation risk: CONFLICT terminology may make a weak conceptual risk sound like an established conflict regime."

  snapshot:
    short_case_description: >
      The case is an abstract philosophical analysis of structural injustice as a category. It asks
      how harms, disadvantages, responsibilities, and constraints can be understood when they arise
      from social, institutional, or historical arrangements rather than from a single agent, intention,
      or isolated wrongful act. The MIP analysis treats this as a structural case review, not a concrete
      scene analysis.
    central_actors_and_roles:
      - "No concrete individual actor is specified."
      - "Possible role category: affected positions within social, institutional, or historical arrangements."
      - "Possible role category: institutional or collective role-bearers, if later specified."
      - "Possible role category: observers or analysts attempting to describe structural injustice."
      - "Possible role category: decision-makers or publics, only if a later applied context is supplied."
    guiding_question: >
      How does the category of structural injustice appear through MIP's A–C–R–P–D grid when the case
      remains abstract, non-concrete, non-diagnostic, non-forensic, and non-implementation-oriented?
    level:
      - "conceptual"
      - "structural"
      - "institutional_potential"
      - "historical_potential"
      - "political_cultural_potential"
      - "non_concrete_scene"
    first_visible_asymmetry: >
      The first visible asymmetry is category-level rather than empirical: harms, disadvantages,
      responsibilities, or constraints may be unevenly distributed through arrangements that do not map
      neatly onto one intentional agent or isolated wrongful act.
    first_visible_D_themes_optional:
      - "Protection against reducing affected positions to defects, blame objects, or dignity deficits."
      - "Protection against public shaming, ranking, or humiliation through structural-injustice language."
      - "Protection against treating D₁/D₂ dignity-in-practice readings as D₀ dignity itself."
      - "Risk that structural legibility becomes moral exposure if transferred into public or institutional contexts."

  role_mapping:
    object_of_observation:
      type: "discourse"
      description: >
        The object of observation is the conceptual discourse or category of structural injustice,
        understood through PMS Core, PMS-CONFLICT, and now MIP. It is not a person, not a personality,
        not a clinical subject, not a legal defendant, and not a concrete institution.
      role: "abstract philosophical category under structural analysis"
      not_person_as_whole: true
    observer_position:
      role: "external structural analyst"
      power_relation_to_object: >
        The analyst has interpretive power over the representation of the abstract case but no
        adjudicative, clinical, legal, institutional, or governance authority. The main power risk is
        formalization overreach: making the category appear more settled, actionable, or rankable than
        the material warrants.
      possible_effects_of_analysis: >
        The analysis may improve structural clarity by separating awareness, coherence, responsibility,
        power to act, dignity protection, asymmetry, and transmission risks. It may also create misuse
        risk if excerpted as a verdict, policy warrant, legal conclusion, person label, or PMS/MIP
        validation claim.
    involved_roles:
      - role: "affected positions"
        mandate: >
          Not concretely specified. In a later scene, affected positions would be those bearing harms,
          disadvantages, constraints, vulnerability, exclusion, or reduced options within arrangements.
        built_in_asymmetries:
          - "possible unequal exposure to harm or disadvantage"
          - "possible reduced access to remedies or recognition"
          - "possible lower power to reframe or exit the arrangement"
          - "possible higher burden of proof when injustice is structurally mediated"
        publicness_level: "not_specified"
        dignity_exposure: >
          Dignity exposure is not concretely shown. It becomes relevant as a protection issue if affected
          positions are publicly named, ranked, stigmatized, ignored, or treated as mere evidence of a theory.
      - role: "structural or institutional role-bearers"
        mandate: >
          Not concretely specified. In a later case, role-bearers might include institutions, offices,
          collectives, policymakers, administrators, publics, or participants whose actions reproduce,
          stabilize, mitigate, or contest structural arrangements.
        built_in_asymmetries:
          - "possible higher access to levers of change"
          - "possible higher interpretive authority"
          - "possible ability to delay, deny, reframe, or distribute responsibility"
          - "possible responsibility without single-agent culpability"
        publicness_level: "not_specified"
        dignity_exposure: >
          Dignity exposure is not established. Analysis must avoid turning role-bearers into global blame
          objects or dignity-ranked persons.
      - role: "analyst or observer"
        mandate: >
          To produce a bounded structural reading that protects against person-ranking, diagnosis,
          legal overclaim, empirical overclaim, and dignity misuse.
        built_in_asymmetries:
          - "interpretive control over categorization"
          - "risk of making abstract labels appear authoritative"
          - "risk of reducing rival readings to incomplete maturity"
        publicness_level: "private"
        dignity_exposure: >
          Low inside this private analysis, but higher if published or attached to identifiable persons,
          institutions, or groups.
    publicness:
      level: "private"
      A_P_relevance: >
        Publicness awareness is relevant as a boundary check rather than as a live case feature. The
        analysis must acknowledge that public transfer could intensify exposure, harden interpretation,
        and reduce reversibility.
      P_PU_relevance: >
        Public agency is not active in the current private analysis. It would become relevant if the
        analysis were used in public discourse, institutional review, governance, media, or organizational
        decision-making.
      D_P_relevance_if_D_active: >
        D-P is active only as a protective warning. No public D-reading of identifiable persons is made.
        Public dignity-in-practice risks would arise only under public or person-near transfer.
      public_shaming_risk: >
        Low in the current private conceptual analysis; potentially high if structural-injustice or
        CONFLICT language is attached to persons, groups, institutions, or public controversies as a
        shame or ranking device.
      reversibility_risk: >
        Low in the current private setting; potentially elevated if the analysis becomes archived,
        public, institutional, media-amplified, or decision-linked.

  frame_vs_variability:
    frame_elements:
      - element: "The case is not a concrete praxis scene."
        reason_fixed_or_slow: >
          The supplied material is abstract and philosophical. This fixes the analysis at the level of
          conceptual structural review rather than empirical case judgment.
        protected_goods:
          - "reversibility"
          - "claim-typing discipline"
          - "avoidance of empirical overclaim"
          - "avoidance of legal or diagnostic misuse"
      - element: "Structural injustice is framed as arrangement-mediated rather than single-act-reducible."
        reason_fixed_or_slow: >
          This is the central category definition supplied by the case material and preserved by the PMS
          Core analysis.
        protected_goods:
          - "structural legibility"
          - "non-reduction to intention"
          - "non-reduction to isolated wrongdoing"
          - "recognition of distributed or arrangement-mediated effects"
      - element: "D₀ remains untouched and non-rankable."
        reason_fixed_or_slow: >
          MIP's dignity axiom is constitutive: ontological dignity is not measured, increased, decreased,
          lost, compared, or inferred from enactment.
        protected_goods:
          - "person-worth protection"
          - "anti-humiliation discipline"
          - "no dignity scoring"
          - "no public D-reading of identifiable persons"
      - element: "PMS-CONFLICT remains overlay-only."
        reason_fixed_or_slow: >
          The completed CONFLICT analysis was explicitly an overlay/application profile and not a PMS Base
          revision, not a Core rewrite, and not a conflict verdict.
        protected_goods:
          - "operator discipline"
          - "dependency hygiene"
          - "non-terminal overclaim prevention"
    variability_elements:
      - element: "Concrete frame specification"
        possible_change: >
          A later applied analysis could identify specific social, institutional, legal, cultural, or
          historical frames and thereby change the A–C–R–P profile.
        responsible_roles:
          - "future analyst"
          - "domain experts"
          - "participants or affected roles"
          - "institutional record holders"
      - element: "Empirical evidence of recurrence, harm, or asymmetry"
        possible_change: >
          Actual data could strengthen, weaken, or falsify attractor, asymmetry, temporality, and IA-risk
          readings.
        responsible_roles:
          - "researchers"
          - "institutions"
          - "affected parties"
          - "auditors"
      - element: "Responsibility bearer specification"
        possible_change: >
          Identifying agents, offices, institutions, collectives, or roles with real power and knowledge
          would change R and M-band calibration.
        responsible_roles:
          - "case investigators"
          - "institutional reviewers"
          - "normative theorists"
          - "legal or governance experts where appropriate"
      - element: "Publicness and transmission setting"
        possible_change: >
          Moving from private analysis to public, institutional, or media contexts would change A-P, P-PU,
          R-P, D-P, MG, and transmission status.
        responsible_roles:
          - "analyst"
          - "publisher"
          - "institution"
          - "recipient audience"
    unfair_high_M_zones:
      - >
        Assigning high M-score to abstract or unnamed roles without evidence of knowledge, power,
        predictability, alternatives, and serious integration opportunity would be unfair.
      - >
        Treating structural position as guilt would violate the M-score boundary: M is shared structural
        responsibility, not guilt.
      - >
        Inferring that historical beneficiaries, institutional participants, or affected groups possess
        equal responsibility without role, power, and knowledge calibration would be unfair.
    system_as_excuse_risk:
      - >
        Because the case rejects reduction to a single agent, there is a risk of using "structure" to
        erase all responsibility. MIP must distinguish non-reduction from exculpation.
      - >
        Structural explanation may become an excuse if it hides real levers, delayed remedies, institutional
        alternatives, or role-specific responsibilities.
      - >
        Conversely, anti-excuse pressure may become blame inflation if responsibility is assigned without
        knowledge, power, alternatives, or predictability.
    D1_D2_realistically_improvable_where:
      - >
        In the current abstract analysis, D₁/D₂ are not concrete targets for improvement. They can only
        be protected by maintaining no-shame, no-rank, no-person-label, no-public-D-reading, and
        no-dignity-score discipline.
      - >
        In a later concrete case, D₁/D₂ may be improvable through participation, voice, transparency,
        reversible review, non-humiliating language, accessible remedies, and protection against public
        exposure.
      - >
        Improvement would require scene-specific roles, context, time window, and publicness mapping.

  acrp_profile:
    A_awareness:
      observations: >
        Awareness is structurally high at the category level because the case explicitly notices that
        harms, disadvantages, responsibilities, and constraints may arise from arrangements rather than
        isolated intention. However, concrete awareness remains unassessed because no role, institution,
        actor, or affected party is specified.
      available_information: >
        Available information includes the abstract case material and the prior PMS/PMS-CONFLICT analyses.
        These establish conceptual distinctions, not empirical awareness levels of real actors.
      realistically_knowable: >
        It is realistically knowable from the supplied material that the analysis must distinguish
        structure from agent, responsibility from guilt, asymmetry from person-ranking, and conceptual
        projection from concrete case finding. It is not realistically knowable who knew what, when, or
        with what access to information in any real scene.
      blind_spots: >
        Major blind spots include absence of empirical scene, absence of affected perspectives, absence
        of institutional records, absence of concrete alternatives, absence of historical chronology, and
        absence of role-specific knowledge.
      role_awareness_A_R: >
        Role awareness is strong for the analyst role because the analysis explicitly treats itself as
        external, non-adjudicative, and bounded. Role awareness is not assessable for any real actors
        because none are supplied.
      publicness_awareness_A_P: >
        A-P is active as a guardrail. The analysis recognizes that public transfer could harden frames,
        raise exposure, increase misuse gradient, and reduce reversibility.
      bias_awareness: >
        Bias awareness is explicitly required because structural injustice strongly fits structural
        models. The main bias risks are formalization smoothness, moral-tribunal drift, hindsight inflation,
        legal-forensic drift, and Dignity-in-Practice overextension.
    C_coherence:
      observations: >
        Coherence is moderate at the level of the analysis: the PMS Core, PMS-CONFLICT, and MIP readings
        align in treating the case as structural, non-concrete, non-diagnostic, non-legal, and reversible.
        Coherence is not a truth guarantee and must not be treated as exhaustive capture.
      word_deed_relation: >
        There is no concrete word-deed relation because no actors or actions are supplied. The relevant
        coherence is document-level: the analysis must say it is bounded and then actually remain bounded.
      role_context_coherence: >
        Role-context coherence is maintained by keeping the observer role external and non-adjudicative,
        using green-zone structural review, and refusing person labels, legal conclusions, empirical
        findings, and diagnostic claims.
      narrative_coherence: >
        The narrative is coherent: structural injustice is a category where arrangements may mediate harm
        or responsibility without single-agent reduction. The risk is that this narrative becomes too smooth
        and under-discriminating.
      breaks_named_or_hidden: >
        Breaks are named rather than hidden: no concrete scene, no empirical validation, no legal standard,
        no concrete responsibility bearer, no conflict terminality, no active exposure capture, and no
        actionable implementation context.
    R_responsibility:
      observations: >
        Responsibility is conceptually central but concretely under-specified. MIP treats responsibility
        as how burdens and consequences are assumed, refused, shifted, distributed, or repaired. The case
        names responsibilities but does not identify who bears which responsibility, with what knowledge,
        power, alternatives, predictability, or integration opportunities.
      responsibility_points: >
        Potential responsibility points include structural recognition, frame clarification, empirical
        inquiry, institutional transparency, remedy design, participation, and non-humiliating public
        language. These remain potential points, not findings.
      assumed_responsibility: >
        The analysis assumes responsibility for its own boundaries: no person labels, no dignity scoring,
        no legal conclusions, no empirical overclaim, no PMS Base revision, and no CONFLICT inflation.
      shifted_or_refused_responsibility: >
        No concrete shifted or refused responsibility is established. A conceptual risk is that "structure"
        may shift responsibility away from real levers, while "responsibility" language may shift blame
        onto unspecified actors without fair calibration.
      burdens_and_consequences: >
        The category concerns burdens and consequences that may arise from arrangements. However, the actual
        burdens, affected positions, distribution of consequences, and repair pathways are not evidenced.
    P_power_to_act:
      observations: >
        Power to act is not concretely assessable because no agents, institutions, offices, affected roles,
        levers, resources, or alternatives are supplied. At the analytical level, P consists in the power
        to frame carefully and avoid misuse.
      real_levers: >
        Current real levers are analytical: maintain claim typing, preserve non-capture, mark evidence
        gaps, avoid scores as labels, avoid dignity misuse, and keep transmission status as working note.
      formal_vs_real_options: >
        Many possible options are formal only: empirical validation, legal adjudication, governance design,
        policy intervention, or institutional repair cannot be treated as real options without concrete
        domain material.
      used_options: >
        Used options include structural mapping, guardrail activation, D as protection signal, IA-box
        as asymmetry check, and transmission restriction.
      unused_options: >
        Unused options include public dissemination, legal-forensic application, clinical interpretation,
        HR use, scoring persons, and intervention design. These are deliberately unused because they would
        exceed the case basis.
      ceiling_rule_relevance: >
        The ceiling rule is highly relevant: where predictability and access to alternatives are unknown
        or approximately zero for unspecified roles, M-score cannot be inflated. The abstract case cannot
        support high responsibility bands for any concrete party.

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: >
        No self-devaluation is observed because no person or self-relation is supplied. Do not infer D-I
        from structural position.
      self_neglect: >
        No self-neglect is observed because no person, body, routine, or material self-care pattern is
        supplied.
      shame_dynamics: >
        Shame dynamics are not active in the case material, but shame-risk is present as a misuse risk if
        structural-injustice language is transferred into public or person-near contexts.
      degradation_of_others: >
        No degradation of others is observed. The analysis explicitly avoids degrading, ranking, diagnosing,
        or shaming persons or groups.
      public_shaming: >
        No public shaming is active in the current private analysis. Public shaming is a red-zone risk if
        the analysis is published or attached to identifiable persons, groups, or institutions as a verdict.
      protest_or_refusal: >
        No concrete protest or refusal is supplied. Rival readings, disagreement, rupture, or non-fit must
        be preserved as possible non-capture rather than treated as immaturity or drift by default.
      dignity_protection: >
        Dignity protection is active as a guardrail: D₀ is untouched, D₁/D₂ are enactments only, no dignity
        score is produced, and D is used only to prevent shaming, ranking, humiliation, or person-labeling.
    next_step_if_relevant: "Use D-profile section below."

  acrpd_submodules_profile:
    A:
      A-I: >
        Not applicable to concrete persons. Inner awareness is not inferred. At the analysis level, the
        corresponding structural caution is to avoid projecting inner awareness, motive, denial, guilt,
        or intention onto unspecified actors.
      A-R: >
        Active for the analyst role. The analysis recognizes its role as structural, non-adjudicative,
        and non-implementation-oriented. Not assessable for concrete agents.
      A-C: >
        Active. The context is a private, abstract, philosophical, green-zone structural review based on
        PMS Core, PMS-CONFLICT, and MIP.
      A-IM: >
        Active as a transmission-awareness issue. The analysis may clarify structures but could cause
        misuse if excerpted as a verdict, score, or public label.
      A-P: >
        Active as a guardrail. Publicness is currently private, but public or institutional transfer would
        change exposure, reversibility, and misuse gradient.
    C:
      C-S: >
        No concrete social coherence is assessable. At the discourse level, coherence depends on avoiding
        conversion of structural analysis into social blame or public ranking.
      C-P: >
        Active conceptually because structural injustice involves power and asymmetry. No concrete power
        context is evidenced.
      C-N: >
        Active. Narrative coherence is strong but risky: the structural narrative can become too smooth
        and must remain open to rival formalizations.
      C-I: >
        Potentially relevant but not established. Institutional/rule coherence would require concrete
        institutional frames, rules, practices, and evidence.
    R:
      R-I: >
        Not assessable for individuals. No individual actionable share is identified.
      R-S: >
        Potentially relevant at the level of groups or relationships, but not concretely established.
      R-E: >
        Active for the analysis itself: maintain norm clarity, dignity protection, non-capture, and
        claim-typing discipline.
      R-P: >
        Not active as a concrete public responsibility. It would become relevant if the analysis were
        circulated publicly or institutionally.
    P:
      P-I: >
        Not assessable for persons. No inner agency or subjective power to act is inferred.
      P-S: >
        Not concretely assessable. Social agency would require specified relationships or groups.
      P-C: >
        Conceptually relevant because the category of structural injustice shapes narratives, norms, and
        cultural meanings. No concrete cultural agency is assessed.
      P-PU: >
        Currently inactive because publicness is private. Transfer into public discourse would activate
        P-PU and require renewed guardrail checks.
    D:
      active: true
      D-I: >
        Not assessed for any person. D-I is protected by refusing to infer self-devaluation, guilt, or
        inner dignity state from structural position.
      D-B: >
        Not assessed. No bodily, material, or everyday self-care scene is supplied.
      D-R: >
        Active only as a protection lens: relational dignity requires non-humiliating, non-ranking,
        non-diagnostic handling of affected and responsible positions.
      D-P: >
        Active only as a publicness warning: no public D-reading of identifiable persons is made, and
        public transfer would require renewed review.
      note: >
        D-submodules are activated only as protection signals and qualitative guardrails. No dignity score,
        person label, or ontological dignity claim is produced.

  scores_and_ia:
    A_score:
      A_band: "not_scored_conceptual_case"
      boundary_confirmed: "A-score describes enactment, not essence."
      time_role_context: >
        Abstract philosophical category analysis; no concrete person, role enactment, institution, or
        time window is supplied. Therefore no numeric or banded A-score is assigned.
      justification:
        A_awareness: >
          Category-level awareness is structurally strong because the case distinguishes isolated acts from
          structural arrangements. Concrete awareness of actors is unknown.
        C_coherence: >
          Analytical coherence is moderate-to-strong but not scored because coherence belongs to the
          analysis, not to a concrete enactment.
        R_responsibility: >
          Responsibility is conceptually central but concretely under-specified. No responsibility score
          should be inferred.
        P_power_to_act: >
          Power to act is unknown for any concrete role. The only active power is analytical framing power.
        modulators_context: >
          Publicness is private, information basis is abstract, empirical coverage is limited, and no real
          role-power matrix is supplied.
      D_excluded_from_A_number: true
    M_score:
      M_band: "not_scored_conceptual_case"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
      role_position_time_frame: >
        No concrete role position or time frame is supplied. The case remains a conceptual-domain projection.
        Therefore no M-score band is assigned to any actor, group, institution, or system.
      five_factors:
        knowledge: >
          Unknown for concrete actors. The analysis knows only that structural-injustice cases may involve
          knowledge asymmetries or hidden arrangements.
        power_control: >
          Unknown for concrete actors. Power/control can only be discussed as possible structural levers,
          not assigned.
        predictability: >
          Unknown for concrete actors. Predictability cannot be retroactively inflated without evidence.
        access_to_alternatives: >
          Unknown for concrete actors. Alternatives may be formal, theoretical, blocked, or absent; the
          case material does not specify.
        serious_integration_attempt: >
          Unknown for concrete actors. The completed Core analysis marks Σ as weak, but that is not evidence
          of failed integration attempts by any party.
      ceiling_rule_check:
        predictability_approx_zero: "unknown_for_concrete_roles"
        access_to_alternatives_approx_zero: "unknown_for_concrete_roles"
        M_capped_at_4: "not_applicable_no_M_band_assigned"
        explanation: >
          Because no concrete role, knowledge state, alternatives, or predictability are supplied, the
          analysis cannot assign or cap a responsibility band. The ceiling rule functions as a warning
          against high-M inflation.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: >
        Category-level structural asymmetry: harms, disadvantages, responsibilities, or constraints may be
        unevenly distributed through social, institutional, or historical arrangements without reduction
        to a single agent or isolated wrongful act.
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "unclear"
        notes: >
          Transparency cannot be assessed for a concrete arrangement because no arrangement, rule, process,
          institution, or affected party is supplied. Conceptually, structural injustice often raises
          transparency questions, but none is established here.
      J_justified:
        status: "unclear"
        protected_good_or_purpose: >
          No concrete protected good or institutional purpose is supplied. The general protected goods in
          this analysis are dignity protection, reversibility, non-humiliation, fair responsibility
          calibration, and non-capture.
        notes: >
          Justification cannot be assessed without a specific asymmetry, rule, measure, or arrangement.
      TB_time_bound:
        status: "unclear"
        review_points_or_conditions: >
          No concrete time-bound arrangement or review condition is supplied. Any future applied analysis
          would need explicit review points.
        notes: >
          Historical temporality is conceptually central, but no concrete duration, deadline, or review
          mechanism is specified.
      R_reversible:
        status: "unclear"
        real_return_or_exit_options: >
          No real return, revision, remedy, or exit option is identified. The analysis itself remains
          reversible and private.
        notes: >
          Reversibility is maintained for the analysis, not established for any real-world arrangement.
      result: "unclear"
      short_justification: >
        The IA-box cannot classify a concrete asymmetry because the case lacks a concrete arrangement
        with transparency, justification, time-boundedness, and reversibility data. It can only mark the
        dimensions that would need assessment.
      immediate_action: >
        No action recommendation is made. Maintain the analysis as a working note and require concrete
        scene data before any IA classification.

  ia_localisation:
    knowing:
      issue: >
        The main knowing issue is under-specification: no concrete role knowledge, information access,
