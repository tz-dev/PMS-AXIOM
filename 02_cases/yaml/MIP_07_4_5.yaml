        alternatives, strategic delay, and principled rival framing.

  ia_protection:
    transparency_measures:
      - "State explicitly that this is a conceptual structural analysis, not a concrete finding."
      - "Separate material, inference, assumption, and interpretation in any later application."
      - "Declare publicness, intended use, and transmission risk before reuse."
    justification_measures:
      - "Justify any future asymmetry reading through concrete frame, protected good, role mandate, and evidence."
      - "Avoid treating structural fit as justification for blame, liability, or intervention."
      - "Keep rival readings open unless comparison criteria are specified."
    time_boundedness_measures:
      - "Require a defined time window for any concrete A/M/IA/D reading."
      - "Use trajectory rather than label if a later scene supplies time points."
      - "Add review intervals when any applied structural conclusion is used."
    reversibility_measures:
      - "Keep the present analysis as a working note."
      - "Do not attach the analysis to persons or institutions as a durable label."
      - "Require a correction and review path before any public or institutional transfer."
    participation_or_voice_measures:
      - "In concrete applications, include affected perspectives and counter-perspectives."
      - "Distinguish analyst framing from participant framing."
      - "Do not treat resistance or rival framing as immaturity by default."
    dignity_protection_measures:
      - "Keep D₀ untouched."
      - "Use D only as a protection signal."
      - "Avoid dignity scores, person labels, public D-readings, shaming, humiliation, and ranking."
      - "Dial D down if dignity language creates more shame than clarity."
    review_or_falsifier:
      date_or_interval: "Before any public, institutional, legal, clinical, governance, or implementation reuse."
      falsifier_question: >
        Does the analysis still remain a reversible structural working note, or has it begun to function
        as a person label, verdict, score, sanction, legal conclusion, clinical interpretation, or
        governance warrant?
      responsible_roles:
        - "analyst"
        - "future reviewer"
        - "domain expert if the analysis moves into a domain-specific context"
        - "affected-perspective representative if a concrete case is later supplied"

