      possible_intervention: >
        If later applied, identify who is permitted to speak, contest, revise, access remedies, or change
        the arrangement, and whether permission is symmetrical or asymmetrical.
    willing:
      issue: >
        Willingness cannot be inferred. No motives, commitments, resistance, refusal, denial, or integration
