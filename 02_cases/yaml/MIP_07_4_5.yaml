  meta_notes:
    bias_risks:
      confirmation_bias: >
        High risk: PMS, PMS-CONFLICT, and MIP all structurally fit the topic of structural injustice. The
        analysis may over-confirm the model instead of testing discriminative limits.
      hindsight_bias: >
        High risk in any future concrete application: once structural harm is visible, observers may infer
        that actors should have known or acted earlier without checking knowledge, predictability, and
        alternatives.
      status_quo_loyalty_bias: >
        Possible risk: institutional or historical arrangements may be treated as neutral background rather
        than active frames. Conversely, anti-status-quo bias could overread every arrangement as injustice.
      halo_horn_effects: >
        Possible risk if persons, groups, or institutions are later named. Structural categories can create
        halo or horn effects if attached to identities.
      in_group_out_group_bias: >
        Possible risk in politicized use: rival readings of structural injustice may be sorted into moral
        camps rather than compared as formalizations.
      dignity_bias_effect: >
        Dignity language can over-amplify moral pressure if D₁/D₂ are mistaken for D₀ or if dignity protection
        becomes dignity ranking. The analysis blocks this by using D only as protection signal.
    norm_assumptions:
      explicit_norms:
        - "Persons must not be ranked, diagnosed, humiliated, or reduced to structural positions."
        - "D₀ is inviolable, immeasurable, non-losable, and non-rankable."
        - "A-score and M-score are not person scores and are not assigned in this abstract case."
        - "IA-box is an asymmetry check, not a verdict."
        - "Structural responsibility is not guilt."
        - "Rival readings and non-capture must remain open."
      implicit_norms:
        - "Structural harms should be made legible without collapsing into blame or exculpation."
        - "Affected perspectives matter in concrete applications, even though none is supplied here."
        - "Public transfer increases responsibility for wording, reversibility, and dignity protection."
        - "Conceptual clarity should not become tribunal authority."
      dignity_concepts:
        - "D₀ as ontological dignity remains outside analysis and scoring."
        - "D₁/D₂ as dignity in practice are qualitative enactment readings only."
        - "D-P as public dignity-in-practice becomes relevant under publicness and exposure."
        - "Dignity-in-Practice is protective, not ranking."
      normative_position_of_D_reading: >
        The D-reading is protective and anti-humiliation. It does not evaluate the worth of persons,
        groups, institutions, or positions. It asks only whether the analysis itself preserves dignity
        in practice and what dignity risks would arise under transfer.
    intuition:
      initial_intuition: >
        The intuitive pull is that structural injustice fits MIP because it involves awareness, coherence,
        responsibility, power, asymmetry, and dignity protection. This intuition is useful as a sensor but
        dangerous if it ends the analysis.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: >
        The abstract case explicitly concerns arrangements, harms, disadvantages, responsibilities, and
        constraints. The completed PMS analyses already marked asymmetry, temporality, frame, and
        non-capture discipline.
      contradicting_evidence: >
        No concrete scene, no actors, no time window, no roles, no evidence, no publicness, and no specific
        responsibility bearers are supplied. This blocks scoring, IA classification, concrete M-bands, and
        terminal conflict classification.
    possible_alternative_interpretations:
      - "A legal-forensic interpretation may require duties, causation, evidence, liability, and remedy rather than MIP structural maturity language."
      - "A moral-philosophical interpretation may treat justice, responsibility, and harm through principles not reducible to A–C–R–P–D."
      - "An empirical social-scientific interpretation may require measurement, causal inference, institutional data, and affected-party testimony."
      - "A political-theory interpretation may treat rupture, antagonism, refusal, or domination as central rather than as integration problems."
      - "A phenomenological interpretation may focus on lived experience of harm or recognition beyond MIP structural fields."
    counter_perspective:
      from_other_side: >
        A critic may argue that MIP softens structural injustice by translating it into maturity-in-practice
        fields and thereby risks underplaying domination, coercion, law, material distribution, or political
        struggle.
      from_affected_side: >
        An affected perspective may reject abstract reversibility if the lived arrangement is experienced
        as urgent, harmful, historically entrenched, or materially coercive. This rejection must not be
        treated as immaturity by default.
      from_external_observer: >
        An external observer may find the analysis disciplined but too cautious, because it refuses empirical
        or legal conclusions. That caution is correct given the material, but it limits practical actionability.

  open_questions_and_blind_spots:
    missing_information:
      - "Which concrete social, institutional, or historical arrangement is at issue?"
      - "Who is affected, and how are harms, disadvantages, responsibilities, or constraints distributed?"
      - "What evidence establishes recurrence, stabilization, or path-dependence?"
      - "Which roles have knowledge, power, alternatives, predictability, or repair capacity?"
      - "What are the publicness conditions and transmission risks?"
      - "Which rival theory or formalization is being compared against MIP?"
      - "What would count as falsifying the structural-injustice reading in a concrete case?"
    uncertain_assumptions:
      - "That arrangement-mediated harm is the primary object rather than isolated wrongdoing or accidental misfortune."
      - "That asymmetry is relevant but not yet classifiable as IA."
      - "That dignity protection is useful as a guardrail without becoming dignity evaluation."
      - "That responsibility can remain structurally visible without becoming guilt."
      - "That the analysis remains private and reversible."
    weak_points_in_analysis:
      - "No A-score or M-score can be assigned without concrete enactments."
      - "IA-box cannot yield a result beyond unclear."
      - "D-module can only protect, not describe concrete D₁/D₂ enactments."
      - "CONFLICT overlay remains mostly threshold-negative rather than positively diagnostic of conflict."
      - "The analysis may be too coherent because the topic strongly fits structural models."
    needed_perspectives:
      - "Affected-position perspectives in any concrete application."
      - "Institutional or role-bearer perspectives."
      - "Historical and empirical evidence."
      - "Legal expertise if legal consequences are considered."
      - "Political-theory or ethics perspectives for rival formalizations."
      - "Publicness and transmission-risk review before publication."

  possible_steps_towards_maturity:
    decision_mode: "maintain"
    functional_next_step:
      action: >
        Maintain the analysis as a bounded internal structural working note. Do not convert it into a
        score, verdict, public claim, legal conclusion, clinical interpretation, governance recommendation,
        or implementation procedure.
      reversible: true
      responsible_role: "analyst"
    short_term_feasible:
      - "Keep the MIP analysis attached to its claim boundaries and non-concrete-scene status."
      - "Use A–C–R–P–D only as structural fields, not as person-evaluation."
      - "Preserve D as protection signal only."
      - "Mark IA-box result as unclear rather than forcing classification."
      - "Preserve PMS and PMS-CONFLICT conclusions without rewriting them."
      - "List concrete evidence requirements before any applied use."
    medium_term_feasible:
      - "If a concrete case is supplied later, build a new MIP analysis with roles, time window, publicness, evidence, and affected perspectives."
      - "Compare MIP with rival legal, empirical, political, ethical, and phenomenological frameworks."
      - "Develop operational criteria for transparency, justification, time-boundedness, reversibility, and participation only in a domain-specific context."
      - "Review publicness and misuse gradient before any excerpt, publication, or institutional transfer."
    overambitious_or_risky:
      - "Assigning A or M bands to unspecified actors."
      - "Treating IA-box as a verdict."
      - "Using D-profile to describe identifiable persons publicly."
      - "Inferring guilt, liability, diagnosis, or institutional fault."
      - "Using CONFLICT terminality language without concrete failed integration under binding and asymmetry."
      - "Treating the analysis as a policy or governance recommendation."
    protection_first_if_low_M_high_harm:
      - >
        If later evidence shows high harm but low calibrated M for affected or constrained roles, prioritize
        protection, voice, participation, remedy access, and dignity preservation rather than blame.
      - >
        Avoid increasing responsibility burden on affected positions merely because harm is visible.
    structural_change_if_high_M:
      - >
        If later evidence establishes high role-specific M through knowledge, power, predictability,
        alternatives, and failed serious integration, structural change may be appropriate; this would
        require domain-specific evidence and accountability.
      - >
        Structural change should remain transparent, justified, time-bound, reversible where possible,
        and dignity-protective.

