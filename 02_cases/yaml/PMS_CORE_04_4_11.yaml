    repository_role: >
      This case follows PMS_1.3 order and dependencies while marking weak or
      conditional operators rather than forcing full activation.
  operator_inventory:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  operator_inventory_status: "no_additional_pms_operators_introduced"

operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ is active because functional truth requires discrimination: fit and
      non-fit, orientation and disorientation, correction and error, claim and
      counterclaim, coordinated and uncoordinated praxis.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the relevant distinction is true/false, adequate/inadequate, oriented/disoriented, corrected/uncorrected, or coordinated/uncoordinated."
      - "Do not conflate truth with usefulness, coherence, agreement, validity, evidence, or PMS-legibility unless a concrete frame supplies the linkage."
    falsifier_conditions:
      - "If the case cannot identify any stable distinction that truth is supposed to make, PMS analysis loses its entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is active as the directedness of truth-practice: movement toward
      orientation, correction, clarification, and coordinated praxis once
      discriminable non-fit or uncertainty is present.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Treat the tension as structural and practical-conceptual rather than as inferred subjective desire."
      - "Distinguish correction-directedness from coercive urgency, enforcement, or the impulse to win a dispute."
    falsifier_conditions:
      - "If the proposed truth-reading has no directed corrective or orienting function, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because the case explicitly situates truth within praxis.
      Truth-as-orientation requires a frame of relevance, standards, roles,
      expectations, and consequences.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is situated praxis: truth as orientation, discrimination, correction, and coordination within action-contexts."
      - "Frame shifts to metaphysical, legal, empirical, or semantic truth require explicit marking and cannot be silently absorbed."
    falsifier_conditions:
      - "If no frame of praxis or relevance can be specified, the analysis becomes too abstract to discriminate truth from coherence, usefulness, or coordination."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is weak-active because correction often presupposes structured absence:
      error, failed expectation, missing evidence, unfulfilled orientation,
      silence where response is expected, or non-fit within a frame. No concrete
      expected occurrence is supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Tie any meaningful absence to a specified expectation within the praxis frame."
      - "Preserve the possibility that absence, resistance, disagreement, or missing evidence marks non-capture or rival framing rather than PMS drift."
    falsifier_conditions:
      - "If no structured expectation exists in a concrete application, Λ should be removed or retained only as an analytic possibility."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak-active because truth-practices can stabilize into recurrent
      patterns of inquiry, verification, correction, and coordination. The
      abstract case does not document recurrence in a concrete scene.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence or stabilization before treating Α as established."
      - "Distinguish stable truth-practice from repeated assertion, habitual authority, institutional routine, or accidental aggregation."
    falsifier_conditions:
      - "If no recurrence, stabilization, or path-dependence is shown, Α is over-read."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak-active because truth-practices may involve asymmetries of
      authority, evidential access, interpretive power, vulnerability,
      obligation, or exposure. The case material does not specify a concrete
      asymmetry.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify who or what has authority, exposure, obligation, vulnerability, evidential access, or corrective power before asserting Ω strongly."
      - "Do not moralize asymmetry by default; it is structural imbalance, not judgment about worth or blame."
      - "Allow Ω to remain weak where the case remains a conceptual projection without actors, roles, institutions, or evidence gradients."
    falsifier_conditions:
      - "If no directional imbalance is identifiable in a concrete application, Ω claims must be removed, marked weak, or treated only as application guardrail."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is active because truth as orientation and correction is temporal: a
      claim is tested, revised, stabilized, displaced, or coordinated across
      sequence, delay, anticipation, and consequence.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish diachronic correction and revision from static comparison."
      - "Check whether temporality is essential to the functional reading rather than incidental wording."
    falsifier_conditions:
      - "If the case is reformulated as purely static truth with no correction, orientation, revision, or coordination over time, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active because correction can re-place an existing claim, error,
      expectation, or frame into a new context. Functional truth depends on
      reframing when prior orientation proves inadequate.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name source frame and target frame whenever correction is described as recontextualization."
      - "Check whether recontextualization clarifies the case or merely absorbs disagreement, rupture, rival theory, or non-fit into PMS language."
    falsifier_conditions:
      - "If every rupture, refusal, resistance, or rival account is redescribed as Φ, the PMS reading becomes over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as a validity condition for this application and as an
      analytic feature of truth-practice: reflective distance prevents immediate
      verdict, coercive correction, enforcement, and premature closure.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Suspend final verdicts about truth as such and preserve reversibility of the PMS projection."
      - "Distinguish distance from avoidance, indifference, empty neutrality, or refusal to discriminate."
    falsifier_conditions:
      - "If Χ is suspended to force truth, authority, closure, or PMS superiority, the PMS application is invalid."
    non_capture_note: >
      Distance does not by itself prove adequacy; it preserves reversibility.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is active but bounded because functional truth involves coordination and
      integration of distinctions, frames, corrections, and trajectories into
      workable praxis. Integration does not prove truth.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Test whether integration preserves differences and correction criteria rather than smoothing conflict into coherence."
      - "Distinguish integration from forced coherence, narrative neatness, agreement, consensus, usefulness, or PMS fit."
    falsifier_conditions:
      - "If coherence or PMS integration is treated as proof of adequacy or truth, Σ is overclaimed."
    non_capture_note: >
      Coherence and integration do not establish truth by themselves.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and conditional. It is active as application discipline because
      this analysis self-binds to reversibility, Distance, non-capture, and
      Dignity-in-Practice. It is not established as a property of truth itself
      or of any subject in the case material.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only to analytic self-binding of the PMS application or to a concrete truth-practice explicitly involving sustained commitment across time."
      - "Do not attribute selfhood, stable normativity, or responsibility-as-self-commitment to the abstract concept of truth unless explicitly warranted."
    falsifier_conditions:
      - "If Ψ is used to claim selfhood, maturity, responsibility, or normative superiority without concrete Σ, Θ, and Χ, the self-binding reading is under-specified."
    non_capture_note: >
      Self-Binding must not be projected onto abstract concepts as literal
      selfhood.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the case by identifying the basic functional grammar:
      distinctions are made, correction is directed, praxis supplies the frame,
      absence or non-fit can matter, and truth-practices may stabilize into
      patterns. Λ and Α remain weak because no concrete scene demonstrates a
      specific missing event or recurrence.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is uneven. Θ is central because truth as correction and coordination
      unfolds over time. Ω is calibration-dependent because no concrete relation
      of authority, exposure, vulnerability, or obligation is specified.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 carries major analytic weight: Φ captures correction through reframing,
      Χ preserves distance and reversibility, and Σ models bounded integration
      into coordination without treating coherence as truth.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is analytic-only for this case. Ψ constrains the application as
      self-binding to PMS discipline, but the case material does not establish
      truth itself as a self-binding subject or stable self-relation.

dependency_logic:
  status: "dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Functional truth begins from discrimination: orientation/disorientation, correction/error, coordination/non-coordination."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Directed correction and orientation arise from discriminable non-fit or uncertainty."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The frame is situated praxis, which constrains relevance and correction."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Weakly satisfied by possible absence, error, missing evidence, or non-fit within the praxis frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Weakly satisfied by plausible stabilization of inquiry, verification, and correction practices; not demonstrated."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Weakly satisfied as a calibration condition for truth-practices under authority, access, exposure, or obligation gradients."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Satisfied by correction, revision, stabilization, and coordination across sequence."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Satisfied where correction places a claim, error, expectation, or orientation into a new frame."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied by reversible, non-tribunal, non-totalizing treatment of the case."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Satisfied as bounded coordination of distinctions, frames, corrections, and temporal trajectories."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Satisfied only as analytic application discipline; not primary in the case formula and not attributed to truth as a subject."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

