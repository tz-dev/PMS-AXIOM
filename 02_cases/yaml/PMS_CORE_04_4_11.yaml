core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a praxis-structure: orientation, discrimination,
      correction, and coordination. No person, psyche, essence, consciousness,
      or ontological standing is analyzed.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis for praxis. Whether they are fully complete, optimally
      minimal, or uniquely ordered remains open to critique.
    status: "satisfied"
    case_application: >
      Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators.
      Truth, orientation, discrimination, correction, and coordination are case
      terms, not new PMS operators.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: awareness, coherence, responsibility, action,
      dignity-in-practice, and asymmetry drift patterns are derived from
      operator compositions rather than introduced as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are treated only
      as formula-derived structures.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Ω and Θ are central structural operators. Responsibility, maturity, and
      dignity-in-practice are analyzed under temporal and asymmetrical conditions
      rather than as static attributes.
    status: "satisfied"
    case_application: >
      Θ is active because functional truth involves correction, revision, and
      coordination across time. Ω is weak and calibration-dependent because the
      abstract case does not specify concrete authority, exposure, obligation,
      or vulnerability, although truth-practices can become asymmetrically loaded.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality
      or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by
      itself imply implementation, interoperability, or explanatory adequacy.
    status: "satisfied"
    case_application: >
      This YAML representation is an inspectable case encoding, not an
      implementation of truth, praxis, agency, selfhood, empirical adequacy, or
      computational validity.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative
      grammars, sharper discriminative models, or more empirically grounded
      formalisms remains methodologically open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including correspondence, coherence,
      pragmatic, deflationary, semantic, proof-theoretic, phenomenological,
      scientific-realist, and legal-forensic accounts of truth.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating
      rival formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not by itself prove exhaustive capture.
      Some forms of praxis may remain only partially legible or may resist
      assimilation within the current grammar.
    status: "satisfied"
    case_application: >
      Possible non-capture is preserved for metaphysical truth, formal semantic
      truth, mathematical proof, phenomenological disclosure, empirical adequacy,
      legal proof, and rival framings that reject functional-praxeological
      translation.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      The analysis makes no clinical, psychological, therapeutic, forensic,
      competence, risk, trait, maturity, or person-ranking inference.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological
      scenes, roles, and structures. Global person-labels and irreversible
      ontological attributions are out of scope.
    status: "satisfied"
    case_application: >
      Because the case is not a concrete scene, all claims are case-type-bound
      to the conceptual projection. No global claim about truth as such or about
      persons is made.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible,
      decontextualized claims.

