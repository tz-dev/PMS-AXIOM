analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "philosophical_structural_projection"
      - "pms_case_pre_analysis_application"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This case type permits PMS-internal structural projection and dependency
      hygiene. It does not permit concrete scene judgment, empirical finding,
      metaphysical proof, legal or forensic conclusion, clinical assessment,
      implementation claim, person ranking, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The PMS reading strongly fits the functional vocabulary of orientation,
      discrimination, correction, and coordination. That fit creates a specific
      analytic danger: the smoother the PMS derivation becomes, the easier it is
      to mistake structural legibility for truth. PMS can show how a
      truth-practice may differentiate, orient, correct, reframe, distance, and
      integrate praxis, but this does not show that a given claim is true, that
      the frame is adequate, that the correction is justified, or that the
      coordination is non-coercive. The fit therefore creates a risk that PMS
      coherence becomes too smooth, over-assimilative, or
      under-discriminating, especially if truth is reduced to coordination,
      usefulness, integration, or PMS-legibility.
    mitigation: >
      The reading is constrained by distinction tests, explicit non-capture
      zones, rival readings, falsifier conditions, and the rule that PMS
      coherence is not sufficient for truth. In addition, every major operator
      must remain withdrawable or down-calibratable if a concrete scene fails to
      supply its conditions. Recontextualization must not absorb all rival
      theories, Distance must prevent tribunal closure, and Integration must
      preserve discriminative difference rather than merely smoothing conflict.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the functional-praxeological structure well: distinctions,
      directed correction, frame, temporal revision, recontextualization,
      distance, and bounded integration are all legible. This is a strong
      structural fit at the level of praxis-form.
    discrimination_requirement: >
      The PMS reading must distinguish truth from coherence, usefulness,
      agreement, consensus, validity, empirical adequacy, legal proof,
      metaphysical correspondence, and successful coordination. It must also
      distinguish correction from coercion, recontextualization from
      assimilation, distance from avoidance, and integration from forced
      narrative closure.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish functional truth from mere coherence or coordination."
      expected_pms_distinction: >
        Σ can model integration and coordination, but Σ does not certify truth.
        Δ and □ must keep separate the criteria for truth, coherence, usefulness,
        evidence, and agreement.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish correction from coercive verdict or authority."
      expected_pms_distinction: >
        ∇ and Φ may describe correction and reframing, while Χ and
        Dignity-in-Practice constrain coercive closure, tribunal use,
        person-ranking, and forced assimilation.
      current_status: "satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinctions make functional truth analyzable without conflating truth with adjacent concepts?"
      current_calibration: "partial"
    - operator: "∇"
      question: "What directed tension toward orientation or correction is present without inferring psychological desire?"
      current_calibration: "satisfied"
    - operator: "□"
      question: "What praxis frame supplies relevance, standards, and correction conditions?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "What expected occurrence, fit, evidence, response, or coordination is absent within a specified frame?"
      current_calibration: "weak"
    - operator: "Α"
      question: "What recurrence or stabilization of truth-practice is shown rather than merely possible?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "What concrete asymmetry of authority, exposure, evidential access, capacity, or obligation is present?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "What temporal sequence of orientation, correction, revision, stabilization, or coordination is required?"
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "What source frame and target frame are involved in correction or recontextualization?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "How is reflective distance maintained against verdict, enforcement, closure, or PMS superiority?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "How does integration coordinate without becoming forced coherence or proof of truth?"
      current_calibration: "partial"
    - operator: "Ψ"
      question: "Is self-binding present as case content, or only as application discipline?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Metaphysical or correspondence truth not reducible to praxis-function."
      - "Formal semantic, proof-theoretic, mathematical, or logical truth conditions."
      - "Empirical truth requiring evidence, measurement, observation, or testing."
      - "Phenomenological disclosure or revelatory truth outside functional-praxeological modeling."
      - "Legal-forensic truth under institutional evidentiary standards."
      - "Rival framings that reject PMS translation or functional truth as the primary lens."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Correspondence theory of truth."
      - "Coherence theory of truth."
      - "Pragmatic theory of truth."
      - "Deflationary or minimalist theory of truth."
      - "Semantic or model-theoretic theory of truth."
      - "Proof-theoretic or warranted-assertibility account."
      - "Phenomenological disclosure account."
      - "Legal-forensic fact-finding account."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading is weakened if the case requires a theory of truth that
        does not depend on praxis, orientation, discrimination, correction, or
        coordination.
    - id: "F2"
      condition: >
        The PMS reading is under-discriminating if it cannot distinguish truth
        from coherence, usefulness, consensus, validity, evidence, or successful
        coordination.
    - id: "F3"
      condition: >
        The PMS reading is over-assimilative if disagreement, rupture,
        resistance, non-fit, absence, or rival formalization is automatically
        redescribed as PMS drift, recontextualization, incomplete integration,
        or failed maturity.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The case is usable as a reversible PMS conceptual projection because it
      respects PMS operators, dependencies, derived-status discipline,
      non-capture, and guardrails. It remains non-empirical, non-metaphysical,
      non-diagnostic, non-legal, non-implementation, and not PMS Base validation.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical, or
    applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Explicit coded distinctions such as truth claim versus correction, fit versus non-fit, evidence-supported versus unsupported, and coordination versus non-coordination."
      "∇": "Observable corrective directedness, such as revision attempts, error signals, inquiry moves, or orientation shifts."
      "□": "A specified praxis frame with relevance criteria, standards, roles, constraints, and domain boundaries."
      "Λ": "An explicit expected event, answer, evidence, fit, response, or coordination outcome whose absence is meaningful within the frame."
      "Α": "Evidence of recurrence, stabilization, path-dependence, or patterned truth-practice over time."
      "Ω": "Specified asymmetry of authority, exposure, access, capacity, obligation, vulnerability, or corrective power."
      "Θ": "Temporal sequence data showing orientation, correction, delay, revision, stabilization, or consequence."
      "Φ": "Documented source and target frames for recontextualization or correction."
      "Χ": "Criteria for reflective distance, suspension of verdict, non-coercion, reversibility, and restraint."
      "Σ": "Criteria showing integration that preserves discrimination and does not collapse into forced coherence."
      "Ψ": "Explicit evidence of sustained self-binding commitment across time, or a narrowly scoped analytic self-binding protocol."
    negative_cases:
      - "A coherent but false belief system that coordinates action without being true."
      - "A useful orientation that succeeds pragmatically but lacks evidential support."
      - "A legal judgment that establishes fact under procedure but does not map cleanly onto functional praxis."
      - "A formal semantic truth condition with no praxeological correction scene."
      - "A rival metaphysical account of truth that rejects functional reduction."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The present document is a conceptual
    PMS projection; empirical, comparative, computational, legal, clinical, or
    applied validation would require additional evidence, criteria, and external
    evaluation.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      Truth (functional) is analyzed as a structural praxis configuration, not
      as a mental state, motive, sincerity, cognition, or personality trait.
    non_metaphysical: >
      The analysis does not define what truth ultimately is and does not prove
      correspondence, realism, disclosure, or metaphysical adequacy.
    non_diagnostic: >
      No person, group, institution, or agent is diagnosed or ranked through
      this case.
    non_legal_forensic: >
      The analysis does not establish evidentiary standards, legal facts,
      burdens of proof, liability, or forensic conclusions.
    non_implementation_claim: >
      The YAML document is not an implementation of truth-practice, artificial
      agency, verification, fact-checking, or decision procedure.
    non_moral_ranking: >
      The case does not rank truth-users, interpreters, persons, theories, or
      forms of life by worth or maturity.
    non_exhaustive_capture: >
      PMS translation is partial and reversible; rival truth theories and
      non-praxeological truth domains may remain outside capture.
    reversibility: >
      Every operator activation is case-type-bound and revisable; weak
      operators may be withdrawn if a concrete scene fails to support them.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by refusing shame, ranking, tribunal use,
      coercive correction, and ontological evaluation under asymmetry.

limits:
  - >
    The case material is conceptual and does not supply a concrete praxis scene
    with actors, roles, evidence, events, or consequences.
  - >
    The analysis makes no empirical, metaphysical, diagnostic, clinical, legal,
    forensic, computational, or implementation claim.
  - >
    Rival theories of truth may capture aspects of the case that PMS does not
    capture, and non-capture must not be redescribed automatically as drift or
    failed integration.
  - >
    Because the PMS reading fits the functional vocabulary smoothly, there is a
    high coherence risk: PMS could become under-discriminating if truth is
    reduced to coherence, coordination, or PMS-legibility.

case_synthesis:
  primary_pms_reading: >
    Truth (functional) can be modeled in PMS as bounded integration of
    discriminative, correction-directed, frame-situated, temporally revised,
    recontextualized, and reflectively distanced praxis coordination.
  continuity_condition: >
    Continuity is present only as a temporal condition of sustained orientation,
    correction, and coordination; no stable subject or self-continuity is claimed.
  change_condition: >
    Change occurs where correction recontextualizes a prior claim, expectation,
    error, or orientation into a new frame while preserving discriminative
    criteria.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, or non-fit may indicate error,
    rival framing, unresolved evidence, or PMS non-capture. They must not
    automatically be redescribed as drift, incomplete integration, incomplete
    calibration, recontextualization, or maturity failure.
  responsibility_condition: >
    Responsibility is conditional and weak: it requires concrete asymmetry,
    temporal obligation, recontextualization, and self-binding commitment not
    supplied by the abstract case material.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring restraint under
    possible asymmetry and forbidding person-ranking, shaming, humiliation,
    irreversible labeling, or ontological evaluation.
  rival_reading_condition: >
    Rival formalizations remain open. PMS translation does not defeat
    correspondence, semantic, proof-theoretic, pragmatic, deflationary,
    phenomenological, empirical, or legal-forensic accounts.

final_structural_formula:
  primary_formula: "Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    Functional truth is read as bounded integration of discriminating,
    correction-directed, framed, temporally revised, recontextualized, and
    distanced praxis coordination. Δ, ∇, □, Θ, Φ, Χ, and Σ carry the main
    structural weight: truth is treated as making differences, orienting
    correction, operating within a frame, unfolding across time, allowing
    recontextualization, preserving reflective distance, and integrating
    coordination without equating integration with truth. Λ, Α, and Ω remain
    calibration-dependent because the abstract case supplies no concrete
    expected absence, recurrent truth-practice, or asymmetry of authority,
    exposure, access, capacity, obligation, or vulnerability. Ψ is retained only
    as application discipline unless a concrete self-binding truth-practice is
    supplied.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity,
    implementation validity, moral ranking, or PMS Base validation. The formula
    is valid only as a reversible case-type-bound PMS reading of functional
    truth; it remains vulnerable to rival theories of truth and to falsifiers
    showing that PMS coordination, coherence, or recontextualization fails to
    discriminate truth adequately.