operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Trust becomes structurally analyzable through distinctions such as
      trusting versus not trusting, reliance versus non-reliance, confidence
      versus doubt, role versus person, claim versus institution, expected
      occurrence versus meaningful absence, repair versus non-repair, and
      betrayal versus ordinary failure.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - >
        The relevant distinctions are reliance/non-reliance, confidence/doubt,
        expected/non-expected, repair/non-repair, and
        vulnerability/protection within a trust relation.
      - >
        Because the case is abstract, these distinctions must remain explicitly
        framed and must not be conflated with diagnosis, moral ranking, or legal
        breach.
    falsifier_conditions:
      - >
        If trust cannot be distinguished from mere prediction, dependence,
        credibility, loyalty, fear, faith, or institutional compliance, the PMS
        reading loses its entry point.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Trust contains directional tension: movement toward reliance, confidence,
      repair, or renewed relation, and movement away through doubt, withdrawal,
      refusal, or suspension. The direction is structural, not an inferred
      subjective desire.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - >
        The tension is relational and practical: toward reliance or repair, away
        through doubt or withdrawal, within a framed expectation.
      - >
        No inner motive, pathology, desire, or emotional state is inferred from
        the structural direction alone.
    falsifier_conditions:
      - >
        If no orientation toward reliance, withdrawal, repair, confidence, or
        refusal arises from the distinctions, ∇ is under-specified.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The active frame is the relational regime of trust itself:
      interpersonal, role-based, claim-based, or institutional relations in
      which reliance, vulnerability, expectation, confidence, doubt, withdrawal,
      repair, or betrayal acquire relevance.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The active frame is trust as a relational regime among persons, roles,
        claims, or institutions.
      - >
        Frame shifts among interpersonal, institutional, testimonial, moral, or
        procedural trust must be marked rather than silently collapsed.
    falsifier_conditions:
      - >
        If no trust frame or relational relevance condition is specified, the
        analysis becomes too abstract to discriminate trust from adjacent
        phenomena.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Trust is strongly shaped by structured absence: the expected reply,
      protection, fidelity, recognition, action, repair, or institutional
      response that does not occur, is delayed, or remains unresolved within a
      trust frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The expected occurrence must be named within its frame: response,
        protection, reliable action, fidelity, repair, or recognition.
      - >
        Absence, silence, delay, refusal, or non-fit may mark legitimate
        boundary, rival framing, or PMS non-capture; it must not automatically
        be coded as betrayal or failed integration.
    falsifier_conditions:
      - >
        If there is no framed expectation whose absence matters, Λ should be
        removed or marked inactive.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Trust commonly stabilizes through repeated reliability, repeated failure,
      repeated withdrawal, repair cycles, institutional routine, or recurrent
      disappointment. In this abstract case, recurrence is structurally relevant
      but not scene-proven.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Show recurrence or stabilization: repeated reliance, repeated
        responsiveness, repeated non-response, repair cycles, or stable
        institutional role patterning.
      - >
        Distinguish a stable trust pattern from a single event, accidental
        aggregation, or conceptual overgeneralization.
    falsifier_conditions:
      - >
        If no recurrence, stabilization, role-script, or path dependence is
        shown in a concrete case, Α is over-read.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Trust involves structural imbalance through vulnerability, exposure,
      dependence, authority, capacity, information, role obligation, or
      institutional power. The one who relies may be more exposed than the one
      relied upon.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Specify the direction and kind of asymmetry: exposure, dependence,
        obligation, authority, capacity, or informational imbalance.
      - >
        Do not moralize asymmetry by default; Ω does not by itself identify
        blame, victim status, legal wrong, or moral superiority.
      - >
        Ω remains calibration-dependent where the trust relation is symmetrical,
        reciprocal, or not concrete enough to map direction.
    falsifier_conditions:
      - >
        If no directional imbalance of exposure, capacity, power, role, or
        obligation is identifiable, Ω claims must be removed or marked weak.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Trust is temporal: reliability accumulates, confidence persists, doubt
      grows, betrayal is remembered, repair unfolds, expectations endure, and
      institutions carry histories.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Distinguish a diachronic trust trajectory from a static comparison of
        attitudes or concepts.
      - >
        Check whether temporality is essential to the trust configuration;
        first encounters, repeated relations, repair, and betrayal may require
        different temporal arcs.
    falsifier_conditions:
      - >
        If temporal extension, delay, memory, anticipation, persistence, or
        repair trajectory is not required, Θ is overextended.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Repair, reinterpretation, forgiveness, renegotiated expectation,
      institutional reform, or reframing betrayal as misunderstanding may
      recontextualize a trust structure by placing it into a new frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Name the source frame and target frame, such as promise to
        misunderstanding, personal reliance to institutional role, betrayal to
        repair, or suspicion to clarified expectation.
      - >
        Check whether recontextualization clarifies the relation or merely
        absorbs rupture, refusal, or rival framing into PMS smoothness.
    falsifier_conditions:
      - >
        If every rupture, resistance, refusal, or disagreement is automatically
        absorbed as Φ, the reading is over-assimilative.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Distance is central as reflective suspension: doubt, hesitation,
      withdrawal, refusal to rush judgment, or pausing before renewed reliance.
      It also governs the analysis by preventing verdict, diagnosis, or forced
      closure.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Check whether the analysis suspends verdict and preserves
        reversibility, especially around betrayal, refusal, and repair.
      - >
        Distinguish reflective distance from avoidance, denial, empty
        neutrality, punishment, or coerced withdrawal.
    falsifier_conditions:
      - >
        If Χ is suspended to force a verdict of betrayal, maturity, immaturity,
        integration, or failure, the PMS application is invalid.
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Integration may appear where confidence and doubt, reliance and
      vulnerability, memory and repair, role and person, or institutional claim
      and lived exposure are coordinated. In this abstract case, integration is
      plausible but not scene-proven.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Test whether integration discriminates among trust, confidence,
        reliance, credibility, loyalty, refusal, repair, and betrayal rather
        than smoothing them together.
      - >
        Distinguish integration from forced coherence or from treating PMS
        formal elegance as adequacy.
    falsifier_conditions:
      - >
        If coherence is treated as proof of adequacy, Σ is overclaimed.
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Self-Binding is weak and conditional: it appears only where trust involves
      promise, role ownership, accountability, institutional commitment, durable
      responsibility, or analytic self-binding of this application. The abstract
      case does not establish SELF_FIXPOINT.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Apply Ψ only where commitment, promise, role ownership,
        responsibility-as-self-commitment, or analytic self-binding is actually
        in scope.
      - >
        Do not attribute literal selfhood to institutions, roles, claims, or
        abstract trust unless explicitly scoped as structural self-binding.
    falsifier_conditions:
      - >
        If Ψ is applied without demonstrable Σ, Θ, and Χ, the self-binding
        reading is under-specified.
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the minimal trust field through distinctions, directional
      reliance or withdrawal, relational frames, meaningful non-events, and
      stabilizing patterns of confidence or doubt. Because the case is abstract,
      L1 is active but must be concretized before event-level claims are made.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is central because trust depends on asymmetry and temporality:
      vulnerability, exposure, obligation, dependence, memory, persistence,
      repair, and betrayal become legible only across structured relational
      time.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 is active as a reflexive layer for repair, recontextualization,
      distance, and possible integration. It must not force reconciliation or
      treat rupture, refusal, or rival framing as failed maturity.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is analytic-only or weak in this case. Ψ may apply to promises, role
      commitments, responsibility, or the self-binding discipline of the
      analysis, but the abstract material does not establish SELF_FIXPOINT.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case explicitly differentiates reliance, vulnerability, expectation,
        confidence, doubt, withdrawal, repair, and betrayal.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        Directional movement toward reliance or repair and away through doubt or
        withdrawal arises from those differences.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The trust relation supplies the frame; subframes may include persons,
        roles, claims, and institutions.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Meaningful non-events are present as failed, delayed, or absent expected
        responses, protections, or repairs within a frame.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        The case invokes relational regimes and patterns of confidence,
        withdrawal, repair, or betrayal, but recurrence remains abstract rather
        than scene-proven.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Vulnerability and reliance create structural exposure and possible
        obligation gradients, though direction must be concretely calibrated.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Trust depends on temporal persistence, expectation, memory, delay,
        repair, and betrayal, all of which require trajectory.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Repair, reinterpretation, renegotiation, and reframing are possible
        trust operations, but not automatically valid in every rupture.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Doubt, withdrawal, suspension, and the analytic refusal of verdict
        supply reflective distance.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Integration is only weakly satisfied because the case names possible
        coordination but gives no concrete enactment of integrated trust action.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Self-binding is weakly satisfied only as analytic discipline and as a
        possible structure of promises, accountability, or role commitment;
        SELF_FIXPOINT is not established.
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

