analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "pms_internal_operator_projection"
      - "reversible_structural_pre_application"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This case type permits structural mapping and calibration warnings. It
      does not permit empirical findings, legal or forensic conclusions,
      diagnostic claims, clinical use, implementation claims, or PMS Base
      validation.
  coherence_risk:
    status: "high"
    reason: >
      Trust fits many PMS operators smoothly: difference, expectation,
      non-event, asymmetry, temporality, recontextualization, distance, and
      possible integration. That smoothness risks over-assimilation and
      under-discrimination among trust, reliance, confidence, credibility,
      loyalty, dependence, suspicion, refusal, repair, and betrayal.
    mitigation: >
      The reading is constrained by discrimination tests, weak marking of Σ and
      Ψ, possible non-capture zones, rival readings, falsifier conditions, and
      the refusal to treat PMS coherence as sufficient by itself.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the relational structure of trust well where trust involves
      framed reliance, meaningful expectation, vulnerability, recurrent
      patterns, temporal extension, distance, and possible repair or rupture.
      The fit is especially strong for the operators □, Λ, Ω, Θ, Φ, and Χ,
      because trust often depends on frame-bound expectation, meaningful absence,
      exposure, temporal continuity, possible reframing, and reflective
      suspension.
    discrimination_requirement: >
      The PMS reading must distinguish trust from adjacent phenomena and must
      distinguish rupture, refusal, absence, disagreement, and non-fit from PMS
      drift, failed integration, or immaturity. It must also avoid converting
      every unresolved trust relation into a PMS-friendly developmental story.
      Discriminative force is shown only if the analysis can say when trust is
      not merely dependence, when doubt is not necessarily failure, when refusal
      may be adequate praxis, when repair is not merely recontextualization, and
      when betrayal cannot be inferred from absence alone.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish trust from mere prediction, dependency, credibility, loyalty, compliance, or generalized confidence."
      expected_pms_distinction: >
        Use □ to identify the active trust frame, Δ to separate adjacent
        relation-types, Λ to require framed expectation, Ω to identify exposure,
        and Θ to require temporal trajectory where relevant. A trust relation
        should not be inferred from accurate prediction alone, from dependence
        without exposure, from institutional compliance without reliance, or
        from credibility without vulnerability.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish rupture, refusal, doubt, and withdrawal from betrayal, drift, incomplete integration, or maturity failure."
      expected_pms_distinction: >
        Use Χ to preserve reflective suspension, Λ only where framed expectation
        is established, Φ only where actual recontextualization occurs, and Σ
        only where integration is shown rather than imposed. Doubt, withdrawal,
        silence, and refusal may be structurally appropriate responses, not
        automatically deficient trust, failed maturity, or low integration.
      current_status: "partially_satisfied"
    - id: "DT3"
      test: "Distinguish repair from mere narrative smoothing or coercive restoration of trust."
      expected_pms_distinction: >
        Use Φ only where a frame-shift is actually specified, Χ where distance
        protects against premature reconciliation, Ω where vulnerability or
        obligation gradients constrain repair, and Σ only where conflicting
        elements are practically coordinated rather than formally harmonized.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinctions are necessary to make trust legible without conflating it with adjacent phenomena?"
      current_calibration: "partial"
    - operator: "∇"
      question: "What movement toward reliance, repair, confidence, withdrawal, doubt, or refusal is structurally present?"
      current_calibration: "partial"
    - operator: "□"
      question: "Which trust frame is active: interpersonal, role-based, institutional, testimonial, moral, procedural, or another frame?"
      current_calibration: "partial"
    - operator: "Λ"
      question: "Which expected occurrence is absent, delayed, omitted, or unresolved within the active trust frame?"
      current_calibration: "partial"
    - operator: "Α"
      question: "Which repeated pattern, stabilization, routine, or path dependence shows that trust is not a single isolated event?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "Who or what is exposed, dependent, obligated, empowered, capable, or vulnerable, and in what direction?"
      current_calibration: "partial"
    - operator: "Θ"
      question: "What temporal arc connects expectation, reliance, confidence, doubt, repair, withdrawal, or betrayal?"
      current_calibration: "partial"
    - operator: "Φ"
      question: "What source frame is transformed into what target frame, and does this clarify rather than absorb non-fit?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "How are doubt, withdrawal, suspension, and analytic non-verdict distinguished from avoidance or forced neutrality?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "What evidence shows actual coordination rather than formal coherence imposed by PMS?"
      current_calibration: "weak"
    - operator: "Ψ"
      question: "What promise, commitment, role ownership, accountability, or analytic self-binding justifies Self-Binding?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Lived affective texture of trust, including fear, hope, warmth, grief, shame, or relief."
      - "Cultural, religious, historical, linguistic, or institutional meanings of trust not captured by the operator grammar."
      - "Legal or forensic standards for breach, duty, evidence, culpability, or liability."
      - "Empirical psychology, sociology, and political science of trust dynamics."
      - "Principled refusal of trust as adequate praxis rather than drift or failed integration."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "phenomenological account of trust as lived openness or exposure"
      - "game-theoretic account of trust as risk-sensitive expectation under uncertainty"
      - "moral-philosophical account of trust as virtue, fidelity, promise, or betrayal"
      - "legal-institutional account of trust as fiduciary duty, reliance, breach, or procedural legitimacy"
      - "sociological account of trust as social capital, norm stabilization, or institutional legitimacy"
      - "linguistic-pragmatic account of trust as uptake of testimony, sincerity, or communicative reliability"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if a concrete case
        lacked stable trust-relevant distinctions, framed expectation,
        meaningful absence, recurrence, asymmetry, or temporal trajectory while
        the analysis still asserted them.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if it could not distinguish trust from
        dependence, prediction, credibility, loyalty, faith, compliance,
        institutional legitimacy, suspicion, refusal, repair, or betrayal.
    - id: "F3"
      condition: >
        The reading would over-assimilate if rupture, disagreement, absence,
        non-fit, withdrawal, or rival framing were automatically redescribed as
        drift, incomplete calibration, failed integration, or maturity failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The case is usable as a reversible PMS conceptual projection. It is not a
      concrete scene analysis and remains under-specified for empirical, legal,
      diagnostic, implementation, or PMS Base validation claims. Its strongest
      operators are □, Λ, Ω, Θ, Φ, and Χ; Σ and Ψ remain weak or conditional.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical, or
    applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Operationalization would need observable distinctions among trust, non-trust, reliance, doubt, refusal, repair, betrayal, role, claim, and institution."
      "∇": "Operationalization would need indicators of directional orientation toward reliance, withdrawal, repair, renewed confidence, suspension, or refusal."
      "□": "Operationalization would need explicit identification of the active trust frame and any frame shifts."
      "Λ": "Operationalization would need specified expected occurrences and evidence of absence, delay, omission, or unresolved expectation within the frame."
      "Α": "Operationalization would need evidence of recurrence, stabilization, routine, pattern formation, or path dependence."
      "Ω": "Operationalization would need mapped exposure, dependence, power, capacity, information, authority, or obligation asymmetries."
      "Θ": "Operationalization would need a timeline showing anticipation, delay, persistence, memory, repair, withdrawal, or betrayal."
      "Φ": "Operationalization would need evidence of actual recontextualization, such as renegotiated expectations, reframing, repair, or institutional reform."
      "Χ": "Operationalization would need evidence of reflective suspension, restraint, pause, distance, or non-immediate reaction without presuming avoidance."
      "Σ": "Operationalization would need evidence that conflicting elements are coordinated in practice rather than merely redescribed coherently."
      "Ψ": "Operationalization would need evidence of promise, commitment, role ownership, accountability, durable normativity, or analytic self-binding."
    negative_cases:
      - "A situation of accurate prediction without vulnerability or reliance."
      - "A relation of dependence without framed expectation or confidence."
      - "A legal breach claim where trust language is irrelevant to evidentiary standards."
      - "A principled refusal of trust that is not drift, immaturity, or incomplete integration."
      - "A one-time interaction with no recurrence or temporal trajectory."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The present material supports only
    conceptual PMS projection; empirical, comparative, computational, legal,
    clinical, or applied validation would require additional scene evidence,
    criteria, calibration thresholds, and external evaluation.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      The analysis does not infer inner states, attachment patterns, personality
      traits, motives, pathology, or subjective experience from trust-language.
    non_metaphysical: >
      The analysis does not define the essence of trust, personhood, agency,
      consciousness, moral worth, or ontological dignity.
    non_diagnostic: >
      Doubt, withdrawal, rupture, betrayal, refusal, confidence, or repair are
      not treated as diagnoses, symptoms, maturity scores, or clinical
      categories.
    non_legal_forensic: >
      Betrayal is used only as case material and structural possibility; no
      legal breach, duty, culpability, evidence threshold, liability, or
      forensic conclusion is claimed.
    non_implementation_claim: >
      The YAML representation is not an implementation of trust, governance,
      policy, AI architecture, intervention method, or operational decision
      system.
    non_moral_ranking: >
      No person, role, institution, claimant, relying party, or withdrawing
      party is ranked, shamed, humiliated, or judged as morally superior or
      inferior.
    non_exhaustive_capture: >
      The PMS projection does not exhaust trust. Rival formalizations and
      non-capture zones remain open.
    reversibility: >
      All operator assignments are reversible and conditional on case-type. A
      concrete scene could activate, weaken, or remove operators differently.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by maintaining restraint under
      vulnerability and asymmetry, especially around betrayal, refusal,
      withdrawal, doubt, and repair.

limits:
  - >
    The PMS reading is limited by the abstract case material and cannot
    determine a concrete trust relation, sequence, duty, breach, repair, or
    responsible actor.
  - >
    The analysis has no empirical, metaphysical, diagnostic, clinical, legal,
    forensic, implementation, governance, or PMS Base validation status.
  - >
    Rival readings and non-capture remain open, especially phenomenological,
    legal, sociological, psychological, moral-philosophical, political, and
    linguistic-pragmatic accounts of trust.
  - >
    Because trust maps smoothly onto many PMS operators, the reading carries
    high coherence risk and must not substitute formal coherence for
    discriminative adequacy.

case_synthesis:
  primary_pms_reading: >
    Trust can be projected as a relational regime in which framed expectation
    and vulnerability become temporally extended, asymmetrically exposed,
    pattern-sensitive praxis involving reliance, doubt, withdrawal, repair, or
    betrayal.
  continuity_condition: >
    Continuity is relevant where trust persists through repeated reliability,
    stable role expectations, institutional routine, memory, or ongoing
    confidence; it is not established for any concrete scene.
  change_condition: >
    Change is relevant where repair, forgiveness, reinterpretation,
    renegotiation, reform, or reframing shifts the trust relation; such Φ must
    be calibrated rather than presumed beneficial.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, withdrawal, or non-fit may
    indicate betrayal, boundary, refusal, rival framing, or PMS non-capture;
    they are not automatically drift, failed integration, incomplete
    calibration, recontextualization, or maturity failure.
  responsibility_condition: >
    Responsibility is conditional and requires Ω, Θ, Φ, and Ψ: asymmetry,
    temporal obligation, recontextualization under changing conditions, and
    self-binding commitment. The abstract case does not establish responsibility
    as blame or liability.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective
    restraint under vulnerability and asymmetry, without ranking, shaming,
    humiliation, diagnosis, or irreversible labels.
  rival_reading_condition: >
    Rival formalizations remain open because PMS translation does not prove
    exhaustive capture, empirical superiority, metaphysical adequacy, or legal
    relevance.

final_structural_formula:
  primary_formula: "Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    Trust is modeled as temporally extended, asymmetrically exposed,
    pattern-stabilized, expectation-sensitive praxis within a relational frame.
    The formula privileges the structural minimum required for the case:
    differentiation, directional reliance or withdrawal, framing, meaningful
    non-event, recurrent patterning, asymmetry, and temporal trajectory. It does
    not yet claim successful repair, full integration, self-binding, moral
    responsibility, legal breach, or empirical validity.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity,
    implementation validity, moral ranking, or PMS Base validation. Higher
    operators such as Φ, Χ, Σ, and Ψ remain available for reflexive repair,
    withdrawal, recontextualization, integration, or self-binding only where the
    concrete material warrants them; they are not forced into the primary
    formula merely because PMS can formally accommodate them.