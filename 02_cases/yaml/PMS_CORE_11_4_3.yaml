operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Δ marks the distinctions that make the case structurally analyzable: recorded outcome versus unrealized alternative, recorded entry versus missing trace entry, timely reading versus delayed reading, measurement step versus interpretation of the step, and relevant absence versus irrelevant absence.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - Specify whether each difference is between outcome states, trace states, temporal states, or interpretive states rather than merging them into one generic uncertainty.
    - Check whether distinctions are given by the workflow/audit frame or imported from external quantum, legal, or software assumptions not present in the case.
    falsifier_conditions:
    - If the case cannot distinguish recorded, delayed, missing, unrealized, and irrelevant elements, Δ loses discriminative force and the PMS reading becomes too abstract.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ appears as structural pressure to interpret a workflow when a difference matters; an expected record is missing, a reading is delayed, or an alternative remains unrealized but affects how the workflow is understood. This is explanatory and structural directedness, not subjective desire.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Specify whether the directional pressure is practical, explanatory, audit-oriented, or protocol-driven.
    - Do not infer psychological drive, agent intention, or consciousness from the workflow description.
    falsifier_conditions:
    - If the differences in the case generate no interpretive pressure or orientation within a frame, ∇ should be marked weak or removed from the active model.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is the workflow/audit frame that determines which measurement steps, recorded outcomes, delayed readings, expected trace entries, and unrealized alternatives count as relevant. Without this frame, a missing entry is only absence, not yet a structured Non-Event.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Name the active frame as the quantum-workflow interpretation frame plus the audit-trace expectation frame described by the case.
    - Mark any shift between measurement frame, logging frame, reading frame, and retrospective interpretation frame rather than treating all frames as identical.
    falsifier_conditions:
    - If no workflow or audit frame specifies what should be recorded, read, delayed, or interpreted, the PMS reading becomes under-discriminating.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Λ is central because the case explicitly concerns meaningful failures or delays of expected occurrence within a frame: missing trace entries, delayed readings, and unrealized alternatives that affect interpretation. Each Λ claim depends on an expectation generated by the workflow/audit frame.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'Specify the expected occurrence: a trace entry, a reading at a given time, a recorded outcome, or a represented alternative within the workflow/audit frame.'
    - Preserve the possibility that a missing trace entry, delayed reading, or unrealized alternative marks non-capture, missing data, or rival formalization rather than PMS drift or integration failure.
    falsifier_conditions:
    - If the frame does not require the entry, reading, or alternative to be present or relevant, Λ should not be asserted for that absence.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is only weakly available. The case says a workflow includes measurement steps, which may imply repeated structured interactions, but it does not specify recurrence, stabilization, path dependence, routine failure, or a stable role-script.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Show actual recurrence or stabilization in the trace pattern before upgrading Α from weak to active.
    - Distinguish a single missing entry or delayed reading from an attractor formed by repeated workflow/audit interactions.
    falsifier_conditions:
    - If no repeated or stabilized pattern is shown, Α remains weak and must not be used to support strong Ω, Θ, drift, or self-binding claims.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is conditional and weak. The case could involve asymmetries of access, authority, exposure, obligation, or interpretive control between recorder, reader, workflow system, and auditor, but the material does not specify those roles or gradients.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - 'Specify the direction and kind of asymmetry before using Ω: access to trace entries, authority to interpret missingness, responsibility for logging, exposure to consequences, or capacity to correct the workflow.'
    - Do not moralize asymmetry or convert it into fault, blame, or status ranking.
    - Allow Ω to remain weak because the case material does not provide concrete role, power, vulnerability, or obligation structure.
    falsifier_conditions:
    - If no directional imbalance of access, capacity, exposure, authority, or obligation is identifiable, Ω must remain weak or not active.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is active because the case turns on measurement sequence, recording time, reading time, delay, missing trace order, and later reinterpretation of the workflow. Temporality is not incidental; it structures what counts as delayed, missing, or recontextualizing.
    dependency_status: partial_dependency_qualified
    analytic_weight: major
    calibration_points:
    - Distinguish measurement time, record time, expected read time, delayed read time, audit reconstruction time, and retrospective interpretation time.
    - Check whether temporal extension is doing analytic work rather than merely describing that events occur in sequence.
    falsifier_conditions:
    - If timing, delay, sequence, and later interpretation do not alter the workflow meaning, Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Φ is active where an outcome, missing entry, delayed reading, or unrealized alternative changes meaning when placed from one frame into another: measurement execution, audit trace, delayed review, or retrospective workflow interpretation.'
    dependency_status: partial_dependency_qualified
    analytic_weight: major
    calibration_points:
    - Name source and target frames, such as measurement frame to audit-trace frame, real-time workflow frame to delayed-reading frame, or recorded-outcome frame to retrospective interpretation frame.
    - Check whether recontextualization clarifies a specific frame shift or merely absorbs non-fit and missing evidence into a PMS-friendly narrative.
    falsifier_conditions:
    - If every absence, delay, or rival formalization is automatically redescribed as Φ, the reading becomes over-assimilative and loses non-capture.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is a major analytic guardrail. It requires suspension of premature verdicts about empirical truth, metaphysics, fault, implementation correctness, legal validity, or PMS sufficiency while keeping the structural reading reversible and discriminating.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Check that the analysis suspends verdict and preserves reversibility about missing traces, delayed readings, unrealized alternatives, and rival formalisms.
    - 'Distinguish distance from empty neutrality: Χ still requires explicit discrimination tests, falsifiers, and boundaries.'
    falsifier_conditions:
    - If Χ is suspended to force a verdict about quantum truth, audit fault, responsibility, implementation correctness, or PMS completeness, the application becomes invalid as a bounded PMS application.
    non_capture_note: 'Distance protects against overclaiming and premature closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is conditional and moderate. The case may integrate outcome records, structured absences, delays, and frame shifts into a coherent workflow interpretation, but PMS coherence by itself is insufficient and must not smooth over unresolved trace gaps.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Test whether integration discriminates among missing data, delayed reading, null outcome, unrealized alternative, logging failure, and irrelevant absence.
    - Distinguish integration from forced coherence or narrative smoothing over unresolved audit gaps.
    falsifier_conditions:
    - If coherence is treated as proof of empirical adequacy, audit validity, implementation correctness, or PMS superiority, Σ is overclaimed.
    non_capture_note: 'PMS coherence is insufficient by itself.'
