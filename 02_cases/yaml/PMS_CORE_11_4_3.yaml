schema_meta_alignment:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  pms_status: theoretical_meta_model
  pms_maturity: formalizing
  repository_role: current_base_schema
  epistemic_status: 'PMS is a theoretical meta-model under formalization. It is not a diagnostic system, clinical framework, legal decision procedure, metaphysical doctrine, moral ranking system, or empirically validated universal grammar of human conduct.'
  description_alignment: 'PMS is treated here as a generative, operator-based meta-model for representing a general operator grammar of praxis. It formalizes how enactment, asymmetry, temporality, integration, and self-binding may be systematically derived from eleven systematically ordered operators.'
  intended_use_alignment:
  - structural_analysis
  - conceptual_modeling
  - theoretical_research
  - comparative_framework_development
  - ai_reasoning_interface
  - simulation_or_agent_architecture_scaffolding
  - non_diagnostic_case_reflection
  normative_position_alignment:
    descriptive_not_prescriptive: true
    no_person_ranking: true
    no_clinical_or_forensic_use: true
    no_irreversible_labels: true
    preserves_dignity_in_practice: true
    dignity_in_practice_note: 'Dignity-in-practice is treated as a praxeological application constraint, not as an ontological ranking or claim of moral superiority.'
  computational_position_alignment:
    yaml_representation: true
    direct_implementation_claim: false
    computational_sufficiency_claim: false
    validation_claim: false
    note: 'YAML representation supports inspection and structured reasoning. It does not prove implementation, interoperability, empirical adequacy, or complete explanatory capture.'
  terminology_alignment:
    praxis: action_structure_context_temporality_asymmetry_integration_self_binding
    axiom_operator: structural_operator_not_metaphysical_substance
    asymmetry: structural_imbalance_not_moral_verdict
    non_event: structured_absence_within_frame_not_generic_nonexistence
    self_binding: commitment_to_integrated_structures_not_proof_of_subjectivity
  last_updated: '2026-04-06'
  authors:
    primary_author: Till Niermann
    assistant_role: formalization_support
