    non_moral_ranking: "No person or decision-maker is ranked as more or less dignified, mature, coherent, responsible, or morally superior."
    non_exhaustive_capture: "PMS may illuminate consequence propagation, but causal, empirical, moral, legal, systems-theoretic, and phenomenological accounts may remain outside or alongside PMS."
    reversibility: "Every major claim is reversible; weak and conditional operators may be removed if a concrete scene fails to support them."
