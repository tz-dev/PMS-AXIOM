    role_in_case: "Ψ is weak and conditional. A decision may become self-binding if tied to durable commitment, responsibility, or stable self-relation across time, but the case material provides no subject-position, promise, obligation, role-continuity, or commitment structure. Ψ therefore remains a possible later operator, not a current case finding."
