operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides: ["boundary_formation", "object_differentiation", "structural_contrast"]
    examples: ["self vs. other", "inside vs. outside a role", "allowed vs. forbidden action"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Δ supplies the entry distinction between decision and downstream consequence, consequence-propagation and prophecy, possible future effects and already actual outcomes, and structural anticipation and deterministic certainty."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active distinction is decision versus consequence, with a secondary distinction between consequence-trajectory and fixed prediction."
      - "The analysis must not conflate possible downstream effects with settled facts or structural anticipation with metaphysical determinism."
    falsifier_conditions:
      - "If the case no longer distinguishes decision from consequence or propagation from prophecy, the PMS reading loses its entry point."
    non_capture_note: "Difference does not prove that PMS exhausts the philosophical problem."
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on: ["Δ"]
    provides: ["activation", "orientation", "energetic_gradient", "proto_agency"]
    examples: ["desire triggered by perceived lack", "urge to correct an imbalance", "movement toward or away from a signal"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "∇ appears as the directional activation implied by a decision: a decision orients praxis toward some path rather than another. Because no motive, pressure, desire, institution, or actor is supplied, ∇ remains structurally present but weakly specified."
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "The tension is structural and practical rather than psychological."
      - "No subjective desire, intention, affect, institutional pressure, or moral motive is inferred."
    falsifier_conditions:
      - "If the decision does not orient any trajectory, priority, or practical difference, ∇ is under-specified."
    non_capture_note: "Impulse is not a claim about inner motivation."
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on: ["Δ", "∇"]
    provides: ["context", "boundary_conditions", "relevance_structuring", "role_space"]
    examples: ["institutional rules", "family role expectations", "conversation context"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "□ is the philosophical frame in which decisions are considered as generators of downstream consequences without those consequences being fixed, fully predictable, or already determined."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is a conceptual action-theory frame concerning consequence propagation under uncertainty."
      - "Any shift into empirical, moral, legal, metaphysical, or implementation framing must be explicitly marked."
    falsifier_conditions:
      - "If no frame of relevance is maintained, the analysis becomes too abstract to discriminate."
    non_capture_note: "The frame does not exclude rival frames."
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on: ["□"]
    provides: ["expectation", "counterfactual_structure", "tension_through_absence"]
    examples: ["a promised reply that never arrives", "silence where a response is expected", "postponed decision that reshapes the situation"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Λ is active because downstream consequences are not yet actual. The case concerns expected, delayed, absent, possible, or unrealized consequence-structures."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence is the open field of possible downstream effects framed by the decision."
      - "Absence, delay, non-fit, or missing evidence may mark PMS non-capture rather than failed integration."
    falsifier_conditions:
      - "If no structured expectation, non-actualized consequence, delay, absence, or counterfactual field is involved, Λ should not be asserted."
    non_capture_note: "Non-events are not actual outcomes."
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on: ["Δ", "∇", "□", "Λ"]
    provides: ["pattern_formation", "stability", "path_dependence", "role_script_emergence"]
    examples: ["repeated avoidance of conflict", "reliable punctuality", "stable institutional routine"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Α is weak and conditional. A decision may generate path dependence, recurrence, or stabilized consequence-patterns, but the case material does not show recurrence or attractor formation."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Attractor status would require evidence of recurrence, stabilization, path dependence, or repeated consequence-patterning."
      - "A merely imaginable future effect must not be treated as a stable attractor."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown, Α remains weak or should be removed from the active reading."
    non_capture_note: "Path-dependence may require non-PMS systems modeling."
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on: ["Α"]
    provides: ["role_differentiation", "responsibility_gradients", "vulnerability_structures"]
    examples: ["parent-child relation", "mentor-apprentice dynamics", "leader-follower position"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ω is weak and conditional. Downstream consequences can create asymmetries of exposure, power, capacity, vulnerability, obligation, or responsibility, but no such directional imbalance is specified."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Any Ω claim must specify kind and direction of asymmetry."
      - "Asymmetry must not be moralized by default."
      - "Ω remains weak unless roles, affected parties, institutions, dependencies, vulnerability, or responsibility-bearing positions are supplied."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or kept weak."
    non_capture_note: "Asymmetry is not a moral verdict."
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on: ["Ω", "Α"]
    provides: ["sequence_and_trajectory", "persistence", "anticipation_and_delay", "developmental_arcs"]
    examples: ["long-term responsibility", "accumulating consequences", "ongoing development of a role"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Θ is strongly active as case content because the case is centrally about downstream temporal extension: decisions may open later trajectories, anticipated effects, delayed outcomes, and non-final consequence structures. At strict PMS dependency level, however, Θ is dependency-attenuated because Α and Ω remain weak or conditional in the supplied material. This means Θ carries the philosophical case, but does not by itself license claims about stabilized path-dependence, asymmetry, responsibility, or determinism."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The relevant temporality is diachronic consequence-trajectory, not static comparison."
      - "Temporal extension must not be equated with determinism, inevitability, full foreseeability, or complete predictability."
      - "Θ may describe an open temporal field of later effects without implying that the future is already actual, fixed, or known."
    falsifier_conditions:
      - "If temporal extension is not required for the case, Θ is overextended."
      - "If temporal extension is treated as sufficient for determinism, prophecy, or responsibility attribution, Θ is miscalibrated."
    non_capture_note: "Temporality does not settle metaphysical time, causality, determinism, indeterminism, free will, empirical forecasting, or responsibility."
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on: ["Θ", "Ω", "□"]
    provides: ["adaptation", "reinterpretation", "developmental_change", "pattern_shift"]
    examples: ["reframing conflict as misunderstanding", "seeing a failure as a learning step", "renegotiating role expectations"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Φ is active as a conceptual recontextualization guard because later consequence-contexts may alter the meaning of an earlier decision without proving that the later meaning was already available, fixed, or predictable at the moment of decision. At strict PMS dependency level, Φ is dependency-attenuated because Ω is not scene-specified. Φ therefore supports openness to later reframing, but not totalizing absorption of all future difference into PMS coherence."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The source frame is the initial decision-frame; target frames are later consequence-contexts."
      - "Recontextualization must not absorb every rupture, disagreement, absence, delay, non-fit, or rival framing into PMS coherence."
      - "Φ is strongest when a concrete source frame and target frame can be identified; in this case that remains conceptual rather than scene-grounded."
    falsifier_conditions:
      - "If every later non-fit or rival account is automatically absorbed as Φ, the reading becomes over-assimilative."
      - "If later consequences are treated as having been fully knowable in advance, Φ collapses into prophecy and loses PMS discipline."
    non_capture_note: "Φ does not license totalizing reinterpretation and does not defeat rival formalizations."
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on: ["Φ", "Θ", "□"]
    provides: ["regulation", "inhibition", "reflection_and_meta_position"]
    examples: ["pausing before reacting", "stepping out of a role to reflect", "deliberately suspending a habitual script"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Χ is strongly active as the main guardrail of the case. It suspends prophecy, verdict, premature closure, deterministic fusion, and overconfident responsibility attribution. Χ allows consequence propagation to be thought structurally while keeping possible downstream effects reversible, non-final, and non-tribunal."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The analysis must suspend verdict, preserve reversibility, and avoid treating possible consequences as fixed outcomes."
      - "Distance is disciplined restraint, not avoidance, denial, empty neutrality, or refusal to analyze consequence propagation."
      - "Χ should prevent PMS coherence from becoming too smooth, too complete, or too eager to absorb non-capture."
    falsifier_conditions:
      - "If Χ is suspended to force prophecy, certainty, blame, determinism, implementation authority, or final verdict, the PMS application becomes invalid."
    non_capture_note: "Distance protects against overclaiming and preserves possible non-capture."
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on: ["Χ", "Φ"]
    provides: ["coherence", "resolution_of_contradiction", "multi_level_coordination", "maturity_of_praxis"]
    examples: ["aligning motives and roles", "integrating emotional impulse and norm", "forming a coherent action plan"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Σ is weak and conditional. The case invites a possible integration of decision, uncertainty, temporal trajectory, non-event, and later reframing, but no concrete synthesis into praxis is supplied. Σ therefore functions mainly as a warning against mistaking a smooth PMS reading for adequate integration."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Integration must show discriminative synthesis rather than smoothing uncertainty into a neat PMS narrative."
      - "Coherence must not be treated as proof of adequacy, truth, empirical validity, responsibility, maturity, or exhaustive capture."
      - "Σ may become active only if the case later supplies a concrete synthesis of competing frames, consequences, obligations, or action paths."
    falsifier_conditions:
      - "If coherence is treated as sufficient proof of PMS adequacy, Σ is overclaimed."
      - "If unresolved tensions are erased rather than held open, Σ becomes premature closure."
    non_capture_note: "PMS coherence is insufficient by itself."
