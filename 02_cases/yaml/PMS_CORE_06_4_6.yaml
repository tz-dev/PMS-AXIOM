case_synthesis:
  primary_pms_reading: "A decision differentiates a field and orients praxis within a frame, opening not-yet-actual downstream consequence structures across time. Those structures may later be recontextualized, but Χ prevents the analysis from becoming prophecy, determinism, verdict, implementation authority, or person-ranking. The case therefore fits PMS most strongly as a bounded Θ-Φ-Χ problem with Δ, □, and Λ support, while Α, Ω, Σ, and Ψ remain weak or conditional."
  continuity_condition: "Continuity is present only as an open temporal consequence-trajectory: the decision and later effects are structurally linkable by Θ, but not by necessity, full predictability, metaphysical determinism, or already-actual future status."
  change_condition: "Change occurs when later consequence-contexts reframe the meaning of the decision. Φ is active only if source and target frames remain distinguishable and if recontextualization does not erase non-capture, disagreement, absence, or rival formalization."
  rupture_or_non_fit_condition: "Rupture, resistance, disagreement, absence, delay, or non-fit must remain capable of marking rival framing or PMS non-capture, not automatically PMS drift, incomplete calibration, incomplete integration, recontextualization, or maturity failure."
  responsibility_condition: "Responsibility is not claimed. It would require scene-specific Ω, Θ, Φ, and Ψ, including specified asymmetry, role, exposure, obligation, durable commitment, or responsibility-as-self-binding."
  dignity_condition: "Dignity-in-Practice constrains the analysis by preventing tribunal use, moral ranking, diagnosis, person-labeling, ontological hierarchy, or irreversible attribution."
  rival_reading_condition: "Rival formalizations remain open and may supersede the PMS reading if they better discriminate causality, uncertainty, probability, moral responsibility, legal responsibility, systems dynamics, or lived experience."

