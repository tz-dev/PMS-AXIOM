      - "No selfhood, maturity, agency depth, responsibility level, or person-ranking is attributed."
      - "SELF_FIXPOINT remains derived and analytic-only unless the case later supplies sufficient Σ, Θ, Χ, and commitment structure."
    falsifier_conditions:
      - "If Ψ is applied without sufficient Σ, Θ, Χ, and case-specific commitment structure, the self-binding reading is under-specified."
    non_capture_note: "SELF_FIXPOINT is derived, not primitive, and not metaphysical proof of subjectivity."

