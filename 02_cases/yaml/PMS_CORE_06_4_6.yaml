    failure_condition: "Would fail if the analysis inferred inner states, person essence, pathology, or moral rank."
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: "Use only the PMS operator inventory Δ–Ψ."
