dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
  compositional_reading_used: ["Ψ", "Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Stable distinction between decision and downstream consequence, and between propagation and prophecy."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Decision minimally orients praxis, but direction is weak because no actor, motive, or pressure is supplied."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The philosophical frame makes the distinction and orientation intelligible."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Downstream consequences are not-yet-actual possibilities rather than settled facts."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Only conditional, because recurrence or stabilization is not shown."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Only conditional, because no directional imbalance is provided."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Θ is case-central because downstream consequence structure is temporal, but strict PMS dependency is weak because Α and Ω are not concretely established."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Φ is conceptually active because later consequence-contexts may reframe the decision, but strict PMS dependency is weak because Ω is not scene-specified."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Reflective distance refuses deterministic closure, verdict, and complete predictability."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Weak, because no concrete synthesis of tensions into coherent praxis is supplied."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Analytic-only unless durable commitment or responsibility across time is supplied."
  dependency_failure_conditions:
    - "If a later operator is used while dependencies are absent, mark the reading under-specified or invalid."
    - "If the chain is used as smooth totalization without discrimination tests, mark coherence risk high."
    - "If an operator is not active, state so rather than forcing the full chain."

