    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep findings tied to structures of praxis, not ontological claims about persons."
    - "Treat asymmetry Ω as structural, not moral judgment."
    - "Do not rank or compare human beings."
    - "Do not treat PMS translation as exhaustive capture."
    - "Do not treat absence of rival models as proof of completeness."
    - "Do not frame resistance, disagreement, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Χ, D, and external accountability."
    - "Preserve intelligibility, revisability, and bounded interpretation."
  case_specific:
    non_psychological: "No psychological motive, personality structure, subjective desire, or mental state is inferred."
    non_metaphysical: "The analysis does not settle causation, determinism, indeterminism, free will, or the ontology of future consequences."
    non_diagnostic: "No diagnosis, pathology, maturity failure, drift type, or person-category is assigned."
