pms_anticipation_overlay_application:
  schema_version: "PMS-ANTICIPATION_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-ANTICIPATION.yaml"
  paper_source_file: "PMS-ANTICIPATION.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–ANTICIPATION Application Profile"
    model_short: "PMS-ANTICIPATION"
    status: "draft"
    repository_role: "paper_specific_overlay"
    last_updated: "2026-04-06"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–ANTICIPATION"
      subtitle: "Structural Conditions, Risks, and Viability of Anticipatory Praxis"
      source_file: "PMS-ANTICIPATION.md"
    description: >
      PMS-ANTICIPATION is applied here as an application profile / overlay for the completed PMS Core case. It makes anticipation-specific structures visible while leaving the PMS Core pass, PMS operator inventory, PMS dependencies, derived structures, guardrails, and claim boundaries unchanged.
    methodological_restraint: >
      This overlay does not claim monopoly over anticipation analysis. Forecasting, Bayesian updating, risk governance, engineering safety, scenario planning, strategic foresight, and other future-oriented formalisms remain live rival or complementary frames.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Forecasting without prophecy"
    rule: >
      This ANTICIPATION block is appended to or integrated with an already completed PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat ANTICIPATION constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The ANTICIPATION overlay adds visibility for possible future events and non-events, forecast/prognosis contrast, probability-to-authority drift, irreversibility, asymmetry, restraint, preparedness constraints, post-confirmation discipline, and responsibility under anticipatory load. It does not modify the completed PMS Core case.

  overlays: {}

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-ANTICIPATION introduces no amplification overlays beyond reduced signatures, viability criteria, contrast frames, drift markers, post-confirmation discipline, scope limitations, and minimal application-protocol constructs. It remains an overlay/application profile only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    note: >
      This gate constrains PMS application only. It does not constrain critique, refusal, rejection, or rival formalization.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          The overlay keeps forecast, probability, prognosis, anticipation, action, authority, and future truth separated. It does not convert the case into verdict, urgency, ideology, action mandate, or role authority.
      reversibility:
        status: "maintained"
        meaning: >
          The anticipatory reading remains case-type-bound, revisable, and configuration-specific. It does not generate global person labels, irreversible interpretive claims, or future-closure claims.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The overlay does not shame, rank, humiliate, coerce, ontologically evaluate, or morally assess persons or groups. It remains restricted to structural handling of risk, exposure, capacity, restraint, and non-coercive consequence awareness under Ω and Θ.
    gate_result: "valid_as_anticipation_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any ANTICIPATION reduced signature is shorthand only. Reduced signatures, protocols, comparison profiles, drift markers, and viability criteria do not replace PMS dependencies and must not be read as alternative dependency paths.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  anticipation_overlay_scope:
    scope_guardrails:
      - "Scene-bound or case-type-bound structural analysis only."
      - "Non-metaphysical, non-psychological, non-clinical, non-diagnostic."
      - "No person-level judgments, no person-ranking, no shaming, no humiliation."
      - "No action mandates, no certainty claims, no future-truth authority."
      - "No conversion of probability into authorization."
      - "No conversion of prognosis into command."
      - "No replacement of justification by anticipatory stance."
      - "No erosion of Dignity-in-Practice under Ω and Θ."
    may_add_visibility_to:
      - "possible future events and non-events"
      - "Λ carried inside □ rather than closed into future truth"
      - "irreversibility under Θ"
      - "asymmetry and exposure under Ω"
      - "restraint through Χ"
      - "integration without totalization through Σ"
      - "self-binding of the anticipator through Ψ"
      - "anticipation versus prognosis contrast"
      - "preparedness and planning constraints"
      - "risk and drift markers"
      - "post-confirmation discipline"
      - "capacity-bounded responsibility"
      - "non-capture and rival framings"
    must_not_do:
      - "treat anticipation as prediction or future-truth claim"
      - "treat probability as authorization"
      - "treat prognosis as command"
      - "replace PMS generativity with explanatory closure"
      - "collapse Λ into certainty"
      - "suspend Χ under urgency"
      - "instrumentalize Ω as coercive authority"
      - "externalize Ψ onto others"
      - "convert anticipation into action mandate"
      - "claim predictive correctness as PMS validity"
      - "claim PMS Base validation"

  paper_lens:
    name: "Anticipation"
    definition: >
      Anticipation is the structurally disciplined handling of possible future events and non-events under irreversibility Θ and asymmetry Ω, without closure claims.
    case_application: >
      The forecasting case is anticipation-relevant because probabilistic projections orient present stance, planning, restraint, downstream consequence awareness, and possible action before the forecasted event or non-event is settled. The overlay isolates the boundary where such future-oriented handling remains anticipation rather than prophecy, prognosis-as-authority, or probability-driven command.
    non_negotiable_constraints:
      discipline:
        status: "active"
        meaning: >
          Anticipation is regulated by Χ, Σ, and Ψ. Impulses, uncertainties, frames, and future-oriented pressures are coordinated without totalization or authority claims.
        case_application: >
          Discipline is maintained by treating forecasts as bounded inputs, not settled future truth. It is strained where time pressure and asymmetric stakes invite probability to become authority.
      non_event_centrality:
        status: "active"
        meaning: >
          Anticipation carries Λ inside □ rather than converting absence, uncertainty, or possibility into settled future truth.
        case_application: >
          The possible event, possible non-event, delayed confirmation, missing update, and absent certainty must remain structurally open. The case becomes anticipation-specific precisely because Λ can be carried or collapsed.
      no_closure_claims:
        status: "active"
        meaning: >
          Anticipation does not translate the possible into certainty, nor the probable into authorization, especially under Ω and Θ.
        case_application: >
          The overlay marks prophecy drift as closure pressure, not as a conclusion already proven by the abstract case. Forecast probability remains non-authorizing unless a separate frame supplies justified action criteria.
      non_capture_openness:
        status: "active"
        meaning: >
          Some anticipatory configurations may resist clean translation into PMS operator chains. Coherent translation alone does not prove exhaustive capture.
        case_application: >
          Forecast accuracy, statistical calibration, domain-specific model validity, emergency thresholds, legal standards, strategic success, and lived anticipation remain possible non-capture or rival-analysis zones.

  lens_operator_roles:
    note: >
      These are ANTICIPATION-specific overlay roles, not operator redefinitions.
    roles:
      "Δ":
        anticipation_role: "Marks a bounded anticipatory object without valuation or truth-claim."
        case_application: >
          The bounded anticipatory object is the probabilistic forecast as distinct from outcome, certainty, command, verdict, or settled future truth.
      "∇":
        anticipation_role: "Introduces directional tension and closure-drive that must be regulated downstream."
        case_application: >
          Forecasts create pressure to prepare, allocate, intervene, delay, revise, or escalate; ANTICIPATION treats that pressure as structurally regulable rather than self-authorizing.
      "□":
        anticipation_role: "Binds anticipation to a concrete role-space and scope; prevents global projection."
        case_application: >
          The frame is the abstract forecast-use domain of science, risk management, economics, weather, engineering, or organizational planning. The overlay remains case-type-bound and excludes concrete claims about any specific model, actor, institution, or decision.
      "Λ":
        anticipation_role: "Carries meaningful absence or possibility as structurally decisive."
        case_application: >
          What may not happen, what has not yet happened, what remains unconfirmed, and what may remain absent must not be treated as irrelevant or already resolved.
      "Α":
        anticipation_role: "Encodes repetition, patterning, and path-dependence in anticipatory configurations."
        case_application: >
          Stabilized prophecy-like forecast use is possible but not evidenced. Α remains weak unless repeated forecast-as-truth routines or path-dependent closure practices are shown.
      "Ω":
        anticipation_role: "Makes restraint consequential by tracking uneven exposure, capacity, or vulnerability."
        case_application: >
          Asymmetric stakes make restraint consequential because the costs of false positives, false negatives, irreversible action, and contestability may fall unevenly across roles.
      "Θ":
        anticipation_role: "Introduces irreversibility, accumulating cost, closing windows, and durable consequences."
        case_application: >
          Forecasting works through horizons, deadlines, update cadence, lag, reversibility windows, and downstream consequences; these temporal conditions intensify but do not authorize closure.
      "Φ":
        anticipation_role: "Allows adaptation to new information without retroactive innocence or narrative collapse."
        case_application: >
          Recontextualization is central: a forecast can remain a bounded input, be revised by new information, or drift into prophecy-like future truth. ANTICIPATION requires the first two without the third.
      "Χ":
        anticipation_role: "Stop-capability that prevents closure, coercion, and premature enactment under pressure."
        case_application: >
          Χ is required wherever probability, urgency, authority, or confirmation would fuse forecast with command, verdict, or inevitability.
      "Σ":
        anticipation_role: "Coordinates multiple signals and pressures while keeping Λ open."
        case_application: >
          Σ would integrate model uncertainty, rival forecasts, thresholds, temporal windows, stakes, and action constraints without producing totalized future certainty.
      "Ψ":
        anticipation_role: "Binds the anticipator to restraint and consequence-handling rather than binding others."
        case_application: >
          Ψ is weak in the abstract case. It becomes active only if the anticipator binds itself to revision, uncertainty disclosure, accountability, and restraint rather than externalizing obligation onto others.

  reduced_signatures:
    ANT_min:
      label: "Minimal anticipatory stance"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Θ"
        - "Χ"
      reduced: true
      note: >
        Minimal anticipation is present when a bounded possibility Δ in □ remains structurally open Λ under irreversibility Θ with sustained restraint Χ. This chain is shorthand only and explicitly not action-authorizing.
      case_application: >
        The case satisfies ANT_min as an overlay reading: probabilistic forecast content is bounded, framed, temporally projected, held open as possible event or non-event, and constrained by distance against prophecy drift.
    ANT_viable_full:
      label: "Viable anticipatory configuration"
      applicability: "weak"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      reduced: false
      note: >
        Mature anticipation disciplines impulse, carries openness, recognizes pattern stabilization, handles asymmetry across time, adapts, preserves distance, integrates without closure, and binds the anticipator.
      case_application: >
        The full configuration is too strong as a scene claim because Α, Σ, and Ψ are not concretely evidenced. It remains a viability standard for a concrete forecast-use scene, not a finding already established by this abstract case.
    ANT_to_planning_constraint:
      label: "Constraint for downstream planning or preparedness"
      applicability: "active"
      is_operator: false
      requires:
        - "Χ"
        - "D"
        - "reversibility"
      note: >
        Planning may emerge downstream as a derived praxis form, but must not convert probability into compulsion or authority while Λ persists under Θ.
      case_application: >
        The case explicitly includes organizational planning and risk management. Downstream planning is allowed only as constrained praxis: it must preserve distance, reversibility, Dignity-in-Practice, and non-closure of Λ.

  viability_criteria:
    viability_definition:
      label: "Viability"
      definition: >
        An anticipatory configuration is viable if it remains coherent under Λ and responsibility-bearing under Ω and Θ, without collapsing Χ.
      success_independence_note: >
        Viability is independent of being right. It remains accountable and structurally stable even if the anticipated event does not occur.
      case_application: >
        The case is viable only conditionally: forecast use remains PMS-ANTICIPATION viable if uncertainty is carried, temporality is respected, distance is maintained, integration remains open, and any self-binding is not externalized into demands on others. Viability does not depend on predictive correctness.
    positive_criteria:
      Λ_carried:
        status: "weak"
        meaning: "Λ is carried, not resolved; openness remains structurally active."
        case_application: >
          The analysis carries Λ as a requirement, but the abstract case does not show a concrete practice that actually preserves openness.
      Θ_respected:
        status: "weak"
        meaning: "Θ is respected, not compressed; irreversibility and delayed feedback are acknowledged."
        case_application: >
          Θ is strongly relevant through forecast horizons, deadlines, update rhythms, and consequences, but concrete temporal discipline is not evidenced.
      Χ_active:
        status: "satisfied"
        meaning: "Χ remains active even under high probability; likely does not become authorized."
        case_application: >
          Χ is satisfied at the level of this overlay because the analysis explicitly refuses to turn probability, urgency, or model output into authority or command.
      Ψ_binds_self:
        status: "weak"
        meaning: "Ψ binds the anticipator, not others; binding is not externalized as obligation."
        case_application: >
          Ψ remains weak because no concrete anticipator or binding practice is supplied. The overlay permits Ψ only as a requirement of self-binding restraint, not as other-binding.
      Σ_integrates_openness:
        status: "weak"
        meaning: "Σ coordinates uncertainty and conflict without producing false certainty."
        case_application: >
          Σ is required but not proven. A concrete scene would need evidence that uncertainty, alternatives, stakes, thresholds, and revision conditions are integrated without closure.
    formal_invalidity_markers:
      certainty_replaces_Λ:
        status: "risk"
        marker: "Λ replaced by certainty"
        structural_effect: "Closure shift; future treated as settled."
        case_application: >
          This is the core prophecy-drift risk: probabilistic projection may be treated as settled future truth.
      actionism_neutralizes_Θ:
        status: "risk"
        marker: "Θ neutralized by action compulsion"
        structural_effect: "Irreversibility denied; trajectory weight ignored."
        case_application: >
          Time pressure may turn forecast orientation into must-act compulsion before temporal windows, reversibility, and consequences are integrated.
      Χ_suspended:
        status: "risk"
        marker: "Χ suspended through assumed superior knowledge"
        structural_effect: "Distance collapses into authority."
        case_application: >
          Χ suspension is a risk where model output, probability, urgency, or expertise becomes verdict-like authority.
      Ω_instrumentalized:
        status: "risk"
        marker: "Ω instrumentalized"
        structural_effect: "Power gradient used to enforce compliance."
        case_application: >
          Ω instrumentalization is a risk where asymmetric stakes are used to coerce acceptance of the forecast as settled truth.
      Ψ_externalized:
        status: "risk"
        marker: "Ψ externalized"
        structural_effect: "Binding shifted outward; pathway to coercion or moralization."
        case_application: >
          Ψ externalization is a risk where the anticipator's restraint is replaced by demands that others accept, comply, or act because of the forecast.

  contrast_frames:
    anticipation_vs_prognosis:
      prognosis:
        applicability: "active"
        characterization: >
          Prognosis is a future-truth claim posture: a specific future state is treated as sufficiently settled to justify coordination.
        core_features:
          - "Claim about future truth; closure pressure on Λ."
          - "Hit/miss evaluation by correspondence."
          - "Success-oriented pull toward near-term optimization and action."
        pms_status_note: >
          Prognosis may be used as descriptive input, but becomes formally invalid within PMS anticipatory criteria when it supplies authority, especially by closing Λ, suspending Χ, or eroding D.
        case_application: >
          Prognosis appears as a contrast and drift risk. Forecast outputs may inform anticipation descriptively, but prophecy drift occurs when prognosis supplies authority or future-truth status.
      anticipation:
        applicability: "active"
        characterization: >
          Anticipation is a present structural stance: carrying uncertainty without closure claims.
        core_features:
          - "Operates in the present as stance, not forecast."
          - "Viable under non-occurrence because Λ is explicitly retained."
          - "Responsibility without event-dependence because Ψ binds under Ω and Θ."
        preparedness_distinction_note: >
          Preparedness or planning may emerge downstream; anticipation itself does not mandate readiness, execution, or intervention.
        downstream_constraints:
          - "Χ"
          - "D"
          - "reversibility"
        case_application: >
          The case remains anticipation when forecasted possibilities are carried as uncertain and revisable while present stance, restraint, and integration remain active.

  prognosis_contrast:
    handling_rule:
      note: >
        Prognoses may inform anticipation only as descriptive material, reprocessed through □ and Α under Θ. Prognosis may supply content, but must not supply authority.
      invalidity_triggers:
        - "Λ becomes settled future truth."
        - "Ω becomes coercion warrant and erodes D."
      case_application: >
        Any model projection or probabilistic forecast may supply content for the anticipatory frame, but not authority for closure, coercion, or action mandates.
    types:
      statistical:
        structural_basis:
          - "Α"
          - "Θ"
        pms_status: "Permitted as descriptive input, non-authorizing."
        case_application: >
          Statistical prognosis is active as a likely forecast form in science, risk, economics, weather, and engineering, but it remains non-authorizing.
      scenario_based:
        structural_basis:
          - "□"
          - "Λ"
          - "Χ"
        pms_status: "Compatible if Λ remains open and Χ remains active."
        case_application: >
          Scenario-based anticipation is active where multiple possible futures or non-events remain framed without closure.
      strategic:
        structural_basis:
          - "Ω"
          - "Θ"
        pms_status: "Viability requires explicit Χ and D."
        case_application: >
          Strategic anticipation is weak-to-active in organizational planning and risk management, but its PMS validity requires explicit restraint and non-coercive handling of asymmetry.
      preventive:
        structural_basis:
          - "Λ"
          - "Ω"
          - "Θ"
        pms_status: "Invalid if Λ is closed into certainty or reversibility is suspended."
        case_application: >
          Preventive logic is a risk in high-stakes forecast use. It remains valid only if it does not close Λ, suspend reversibility, or convert probability into compulsion.
      moralized:
        structural_basis:
          - "Ω"
          - "Ψ"
        pms_status: "Excluded where normative escalation authorizes closure or coercion."
        case_application: >
          Moralized anticipation is not evidenced by the abstract case; it remains a drift risk if responsibility language becomes a command structure.

  configuration_comparison:
    note: "This comparison concerns configurations, not persons."
    action_proximate:
      applicability: "risk"
      descriptors:
        - "anticipatory"
        - "probabilistic"
        - "outcome-bound"
        - "action-proximate"
      structural_strength: "Early Action_E effectiveness."
      primary_risk: "Outcome-binding of Ψ; closure drift; escalation-prone Ω."
      typical_drift_pattern: "Preventive overreach through Ω instrumentalization."
      case_application: >
        The case may lean toward action-proximate configuration under time pressure and asymmetric stakes, but the abstract material does not establish actual action or overreach.
    restraint_oriented:
      applicability: "active"
      descriptors:
        - "suspensive"
        - "criterial"
        - "outcome-agnostic"
        - "stability-oriented"
      structural_strength: "Long-term stability via Σ and Ψ without collapsing Λ."
      primary_risk: "Loss of momentum due to prolonged Χ; delayed intervention."
      typical_drift_pattern: "Delayed action despite rising Ω and closing Θ-windows."
      case_application: >
        The overlay itself is restraint-oriented: it preserves forecast uncertainty, refuses authority drift, and keeps downstream action constrained rather than mandated.
    core_tradeoff:
      statement: >
        Effectiveness tends to increase as Ψ binds toward E; stability tends to increase as Χ precedes E. These are incompatible optimizations, structural rather than simply corrigible by better information.
      case_application: >
        The case-specific tradeoff is between acting early on forecast signals and maintaining enough distance to avoid prophecy drift, coercion, and false closure.

  risk_and_drift_patterns:
    note: >
      ANTICIPATION drift patterns are configuration markers, not diagnoses, person-types, moral verdicts, or enforcement categories.
    structural_drift_patterns:
      preemptive_authoritarian_drift:
        label: "Preemptive authoritarian drift / Ω-inflation"
        applicability: "risk"
        typical_marker: "Anticipatory stance becomes power instrument."
        invalidity_links:
          - "Ω_instrumentalized"
          - "Χ_suspended"
          - "Ψ_externalized"
        case_application: >
          This remains a risk where asymmetric stakes or authority positions turn forecast anticipation into enforced compliance.
      probability_action_compulsion:
        label: "Probability-induced action compulsion"
        applicability: "risk"
        typical_marker: "Probability rhetoric produces must-act compulsion."
        invalidity_links:
          - "actionism_neutralizes_Θ"
          - "Χ_suspended"
          - "certainty_replaces_Λ"
        case_application: >
          This is the most directly relevant drift risk: probabilistic projection may become action compulsion under time pressure.
      moralization_of_uncertainty:
        label: "Moralization of uncertainty"
        applicability: "risk"
        typical_marker: "Λ is treated as normative warrant; pressure framed as virtue."
        invalidity_links:
          - "certainty_replaces_Λ"
          - "Ψ_externalized"
          - "Ω_instrumentalized"
        case_application: >
          This is not evidenced as active, but it remains a risk if uncertainty is framed as a moral reason to comply, intervene, or accept closure.
      preventive_escalation:
        label: "Preventive escalation"
        applicability: "risk"
        typical_marker: "Irreversible commitments justified before Λ is resolved."
        invalidity_links:
          - "actionism_neutralizes_Θ"
          - "Ω_instrumentalized"
          - "reversibility"
        case_application: >
          This risk appears where forecasted harm or opportunity is used to justify irreversible commitment before uncertainty is integrated.
      AD_A_much_greater_E:
        label: "AD_A≫E / over-reflection, under-enactment"
        applicability: "risk"
        related_pms_pattern: "AD_A>>E from PMS Base"
        typical_marker: "Chronic delay of E due to sustained distancing without consolidation."
        note: >
          Structural drift pattern where evaluative or reflective space expands while integrated enactment remains chronically delayed or suppressed.
        case_application: >
          Excessive distance and delayed enactment remain possible but not established. The core case already marks AD_A>>E as possible, not entailed.
    most_dangerous_error:
      status: "risk"
      statement: "Using anticipation to legitimate intervention instead of binding oneself to restraint."
      structural_diagnosis: >
        This externalizes Ψ and collapses Χ under Ω/Θ pressure, producing a critical breach of PMS entry conditions and eroding D.
      pms_conclusion: >
        Anticipation is structurally valid only when it increases the anticipator’s obligation to restraint and consequence-handling, not when it supplies authority.
      case_application: >
        The forecasting case risks this error when probability, model authority, or urgency is used to legitimate intervention rather than to increase restraint, accountability, and revision discipline.

  post_confirmation_discipline:
    applicability: "weak"
    structural_shift_after_confirmation:
      notes:
        - "Λ partially collapses into an event; pressure for immediacy increases under Θ."
        - "Ω may be socially reinterpreted as epistemic authority."
        - "Confirmation is a second-order test: validation must restore restraint, not accelerate dominance."
      case_application: >
        Post-confirmation discipline is relevant as a future overlay condition. The abstract case does not include confirmation, but forecasts later being right can intensify prophecy drift retroactively.
    typical_drift_patterns:
      psi_overbinding:
        label: "Ψ-overbinding"
        applicability: "risk"
        meaning: "Binding identity to correctness."
        case_application: >
          If a forecast proves accurate, the forecaster or institution may bind identity to correctness rather than to restraint and revision discipline.
      omega_epistemic_inflation:
        label: "Ω-inflation at epistemic level"
        applicability: "risk"
        meaning: "Validation becomes superiority claim."
        case_application: >
          Confirmation may be misread as enduring epistemic authority over others.
      chi_erosion:
        label: "Χ-erosion"
        applicability: "risk"
        meaning: "Loss of distance after being right."
        case_application: >
          Being right can erode distance by making future forecasts appear more verdict-like.
      lambda_rewrite:
        label: "Λ-denial retroactively"
        applicability: "risk"
        meaning: "Uncertainty is rewritten as inevitability."
        case_application: >
          Post-confirmation hindsight may rewrite probabilistic uncertainty as if the event had been inevitable all along.
    requirement_reopen_distance:
      core_claim: >
        Confirmation makes visible whether restraint was maintained under the structural pressures tracked here.
      required_moves:
        - "Re-suspend closure claims; Λ is never fully eliminated."
        - "Renew contingency acknowledgment under Θ."
        - "Refuse generalization from single confirmations into enduring Ω dominance."
      pms_note: >
        Within PMS criteria, confirmation calls for renewed distance rather than accelerated entitlement to act.
      case_application: >
        If a forecast is confirmed, distance must be reopened by distinguishing this event from future certainty, preserving uncertainty for future cases, and refusing authority inflation.

  structural_potentials_and_costs:
    possible_advantages:
      reduced_surprise_amplitude:
        applicability: "active"
        meaning: "Carrying Λ under Θ can soften discontinuities."
        case_application: >
          Disciplined anticipation may reduce surprise without claiming the forecast as destiny.
      crisis_resilience:
        applicability: "weak"
        meaning: "Χ + Σ can reduce drift into reactive actionism."
        case_application: >
          Crisis resilience is possible if distance and integration remain active under time pressure, but the abstract case does not evidence it.
      early_self_binding:
        applicability: "weak"
        meaning: "Ψ may stabilize responsibility independently of outcomes."
        case_application: >
          Early self-binding is a possible requirement, not an established scene fact.
      escalation_dampening:
        applicability: "weak"
        meaning: "Disciplined Ω handling can reduce power inflation."
        case_application: >
          Escalation dampening is possible if asymmetry is handled through restraint rather than authority.
      protection_of_vulnerable_positions:
        applicability: "weak"
        meaning: "D is more likely to be preserved, especially after confirmation."
        case_application: >
          Protection of vulnerable positions is relevant under asymmetric stakes, but concrete vulnerable positions are not specified.
    possible_disadvantages:
      increased_structural_load:
        applicability: "active"
        meaning: "Carrying Λ under Θ is demanding."
        case_application: >
          The case imposes structural load because forecasts must be used without collapsing uncertainty, urgency, and asymmetry into command.
      self_overstabilization:
        applicability: "risk"
        meaning: "Confirmation may harden Α and misplace Ψ."
        case_application: >
          Self-overstabilization is a post-confirmation risk if correctness hardens into identity or institutional routine.
      delayed_action:
        applicability: "risk"
        meaning: "Strong Χ/Σ can overshoot favorable Θ-windows."
        case_application: >
          Delay is a risk because excessive restraint can miss temporal windows, but this does not authorize action without separate justification.
      misuse_as_power_instrument:
        applicability: "risk"
        meaning: "Anticipatory stance may be weaponized and erode D."
        case_application: >
          Misuse is possible if anticipation becomes a tool for coercion or authority under asymmetric stakes.
      misinterpretation_as_knowing_better:
        applicability: "risk"
        meaning: "Others may project dominance onto restraint."
        case_application: >
          Forecast restraint may be misread either as superior knowledge or as indecision; both remain outside direct PMS proof without a concrete scene.
    conclusion_note: >
      Anticipation loses viability within PMS not by being wrong, but by losing restraint when rightness tempts authority.

  responsibility_and_dignity_links:
    responsibility:
      core_claim: "Anticipation does not authorize action — it deepens responsibility for restraint."
      status: "weak"
      constraints:
        capacity_bounded_attribution:
          status: "weak"
          meaning: "Responsibility attaches only where effective, frame-bound influence exists."
          case_application: >
            Effective influence is not specified by the abstract case; responsibility attribution therefore remains capacity-bounded and under-specified.
        non_outcome_dependency:
          status: "satisfied"
          meaning: "Responsibility is grounded in Ψ, not correctness."
          case_application: >
            The overlay explicitly refuses to evaluate responsibility by whether the forecast later proves correct.
        asymmetry_discipline:
          status: "weak"
          meaning: "Anticipatory insight increases protection-discipline under Ω, not entitlement to act."
          case_application: >
            Ω requires restraint where asymmetry is present, but the concrete protection structure is not supplied.
        distance_sustained:
          status: "satisfied"
          meaning: "Responsibility remains viable only if Χ stays active under Θ and Ω."
          case_application: >
            The overlay sustains distance by refusing probability authorization, closure, and action mandate.
    dignity_in_practice:
      core_claim: "Anticipation is PMS-valid only if it preserves D under Ω, especially after confirmation."
      status: "active"
      non_negotiable_conditions:
        no_fear_production:
          status: "satisfied"
          meaning: "Must not amplify threat narratives or urgency in ways that convert Λ into inevitability."
          case_application: >
            The overlay names fear-producing closure as a risk but does not amplify it into inevitability.
        no_coercion_generation:
          status: "satisfied"
          meaning: "Must not justify pressure or compulsion; prevents Ω dominance and dignity erosion."
          case_application: >
            The overlay does not justify pressure, compliance, intervention, or compulsion.
        no_replacement_of_justification:
          status: "satisfied"
          meaning: "Cannot substitute for reasons; justification must be recontextualized through Φ rather than imported as authority."
          case_application: >
            Anticipation is treated as a structural stance, not as justification. Any concrete action would need separate reasons and frame-specific validation.

  derived_axes_reference:
    note: >
      Axes are canonical PMS derived structures. This overlay states relevance under the anticipation lens only and does not redefine A/C/R/E/D.
    Awareness_A:
      status: "active"
      note: "Sustains framed differentiation over time without escalating into certainty."
      case_application: >
        ANTICIPATION sharpens Awareness_A by requiring the forecasted future to remain differentiated from certainty across time.
    Coherence_C:
      status: "active"
      note: "Maintains anticipatory narratives under non-occurrence and delay."
      case_application: >
        Coherence_C is tested by whether the forecasting stance remains coherent even if the projected event does not occur or confirmation is delayed.
    Responsibility_R:
      status: "weak"
      note: "Attaches where capacity exists; binds through Ψ under Ω and Θ, not through being right."
      case_application: >
        Responsibility_R remains weak because Ψ and concrete capacity are not evidenced; the overlay keeps responsibility non-outcome-dependent.
    Action_E:
      status: "constrained"
      note: "May follow downstream, but does not arise from anticipation without Χ, D, and reversibility."
      case_application: >
        Action_E is downstream and constrained. Anticipation may inform action only through Χ, D, reversibility, and separate decision criteria.
    Dignity_in_Practice_D:
      status: "active"
      note: "Non-coercive handling of Ω; tested especially after confirmation."
      case_application: >
        Dignity-in-Practice constrains forecast use by preventing asymmetry, probability, or confirmation from becoming coercive or ranking authority.

  scope_limitations_and_rival_framings:
    where_this_analysis_ends:
      note: >
        This overlay analyzes anticipation as a praxeological configuration under Ω, Θ, Λ, and Χ. It does not claim to exhaust what anticipation is or how it may be analyzed.
      rival_domains:
        epistemic_anticipation:
          relevance: "active"
          description: "Forecasting, Bayesian updating, and evidence-based prediction address future-state estimation."
          case_application: >
            Epistemic anticipation is a major rival or complementary frame because the case centrally concerns forecasts and probabilistic projection.
        phenomenological_anticipation:
          relevance: "weak"
          description: "Lived futurity, affective orientation, and projection lie outside PMS by design."
          case_application: >
            Phenomenological anticipation remains a non-capture zone because the case does not provide lived experience or affective futurity.
        strategic_anticipation:
          relevance: "active"
          description: "Foresight, optimization, and scenario gaming may overlap, but strategic success is not a PMS criterion."
          case_application: >
            Strategic anticipation is relevant in risk management, engineering, economics, and organizational planning, but strategic success is not treated as PMS validity.
    genuine_non_capture:
      status: "kept_open"
      note: >
        Not all anticipatory phenomena must translate cleanly into PMS operator chains. Non-capture becomes plausible where PMS generates a coherent reading but weakens what is structurally decisive in the case.
      examples:
        - "Closure as viability condition in emergency response, triage, wartime command, or rapidly escalating safety scenarios."
        - "Configurations where Ω is too weak for restraint-under-asymmetry to be structurally central."
        - "Extreme temporal compression where Φ, Χ, Σ, and Ψ do not stabilize."
      case_application: >
        Case-specific non-capture includes probabilistic scoring, model calibration, domain expertise, emergency decision thresholds, legal standards, institutional governance, and contexts where closure may be required by non-PMS criteria.
    complementarity:
      note: >
        PMS-ANTICIPATION should not be presented as the only legitimate analysis of anticipation. The relevant question is where each framing becomes structurally productive and where it obscures what other framings make visible.
      comparisons:
        - "Predictive processing / Active Inference"
        - "Scenario planning / futures studies"
        - "Precautionary ethics"
      case_application: >
        Bayesian decision theory, risk governance, engineering safety, scenario planning, precautionary ethics, and strategic foresight remain open as rival or complementary frames.
    what_this_overlay_does_not_claim:
      - "that all non-PMS anticipatory framings are structurally wrong"
      - "that predictive or strategic anticipation are invalid as such"
      - "that restraint is always the dominant criterion in every anticipatory configuration"
      - "that PMS-ANTICIPATION exhausts the field of future-oriented praxis"

  methodological_appendix_alignment:
    minimal_application_protocol_MAP:
      status: "partial"
      note: >
        Any PMS-ANTICIPATION application should answer all five questions in a scene-bound or case-type-bound way.
      steps:
        frame_validity_check:
          operator: "□"
          status: "weak"
          questions:
            - "What is the concrete role space?"
            - "Where does influence actually exist?"
            - "What is out of scope?"
          invalidity_marker: "Global anticipation without a frame violates PMS frame-boundedness."
          case_application: >
            The role space is only case-type-bound: science, risk management, economics, weather, engineering, or organizational planning. Concrete influence and out-of-scope boundaries would need a specific scene.
        non_event_integrity_check:
          operator: "Λ"
          status: "satisfied"
          questions:
            - "What might not happen?"
            - "What absences are structurally decisive?"
            - "Where is closure pressure appearing?"
          invalidity_marker: "Treating absence as unlikely but irrelevant equals prognosis drift."
          case_application: >
            The projected event may not occur, expected updates may not arrive, and uncertainty may remain unresolved. Closure pressure appears where probabilistic projection is treated as settled future truth.
        asymmetry_audit:
          operator: "Ω"
          status: "weak"
          questions:
            - "Who carries exposure?"
            - "Who carries capacity?"
            - "Who bears irreversible cost?"
          invalidity_marker: "Anticipation under Ω without restraint equals latent coercion."
          case_application: >
            The case states asymmetric stakes but does not identify concrete actors, capacities, or cost distribution. The audit remains structurally required but under-specified.
        distance_enforcement:
          operator: "Χ"
          status: "satisfied"
          questions:
            - "Where is action pressure rising?"
            - "Where is probability used rhetorically?"
            - "Where is urgency replacing structure?"
          invalidity_marker: "Any analysis that demands action violates PMS entry conditions."
          case_application: >
            Distance is enforced by refusing any move from forecast probability to command, action mandate, verdict, or future-truth authority.
        self_binding_test:
          operator: "Ψ"
          status: "weak"
          questions:
            - "Who is bound by this anticipation?"
            - "Is binding internal or externalized?"
            - "Does the anticipator carry consequence?"
          invalidity_marker: "Others must act now equals Ψ-externalization."
          case_application: >
            No concrete anticipator is supplied. Ψ remains a constraint: binding must be internal to the anticipator's restraint and consequence-handling, not externalized onto others.
    red_flag_patterns:
      note: "Immediate PMS invalidity markers as phrase-patterns."
      table:
        - pattern: "We must act because…"
          structural_diagnosis: "Λ collapsed"
          case_relevance: "risk"
        - pattern: "The data clearly shows…"
          structural_diagnosis: "Α → certainty"
          case_relevance: "risk"
        - pattern: "Responsibility demands intervention"
          structural_diagnosis: "Ω instrumentalized"
          case_relevance: "risk"
        - pattern: "Delay is irresponsible"
          structural_diagnosis: "Χ suspended"
          case_relevance: "risk"
        - pattern: "They should have known"
          structural_diagnosis: "retroactive guilt"
          case_relevance: "risk"
    pms_compatible_outputs:
      allowed:
        - "Structural mappings"
        - "Risk articulation without prescriptions"
        - "Constraint descriptions"
        - "Capacity-bounded responsibility attribution"
        - "Post-confirmation restraint requirements"
      disallowed:
        - "Action mandates"
        - "Moral imperatives"
        - "Optimization advice"
        - "Agent ranking"
        - "Certainty claims"
      case_output_boundary: >
        This case output may provide an ANTICIPATION overlay mapping, drift-risk articulation, and constraint description. It may not prescribe action, rank agents, claim certainty, or validate forecast correctness.
    self_application_meta_rule:
      status: "satisfied"
      statement: "Any use of PMS-ANTICIPATION is itself subject to PMS."
      formal_invalidity_triggers:
        - "Χ dropped to be clearer"
        - "Ψ shifted to others"
        - "D relaxed for efficiency"
      consequence: "Analysis is not mistaken, but formally invalid."
      case_application: >
        The overlay keeps its own anticipation disciplined by preserving Χ, reversibility, Dignity-in-Practice, rival openness, and non-capture instead of forcing a cleaner prognosis-drift verdict.
    cannot_do_can_do:
      cannot:
        - "supply action mandates or prescriptions"
        - "evaluate anticipatory success by predictive accuracy alone"
        - "replace epistemic, phenomenological, or strategic anticipatory analysis"
        - "determine that every closure-demand is structurally illegitimate"
        - "decide when action must occur in non-PMS terms"
      can:
        - "make structural drift visible under PMS criteria"
        - "track how Λ, Ω, Θ, and Χ interact in anticipatory configurations"
        - "distinguish self-binding from other-binding under anticipatory load"
        - "show when anticipation becomes structurally coercive, prematurely closed, or externally authorized"
      case_application: >
        The overlay can show how forecast use remains disciplined anticipation or risks prognosis drift. It cannot determine forecast accuracy, legal responsibility, optimal action, or final strategic adequacy.

