  anticipation_overlay_synthesis:
    primary_anticipation_reading: >
      PMS-ANTICIPATION makes visible that forecasting without prophecy is not primarily a question of being right early, but of carrying possible future event and non-event structure under Θ and Ω while preserving Χ, Σ, D, and non-externalized Ψ.
    anticipation_vs_prognosis_result: >
      The case remains valid anticipation when prognosis-like forecast content is descriptive input only. It drifts toward prognosis when the forecast supplies authority, future-truth status, or coordination mandate.
    non_event_result: >
      Λ remains active because the forecasted event may not happen, confirmation may be delayed, updates may be absent, and uncertainty may remain structurally open.
    temporality_result: >
      Θ structures forecast horizons, deadlines, lag, update cadence, reversibility windows, and downstream consequence pressure without itself authorizing closure.
    asymmetry_result: >
      Ω marks uneven exposure, capacity, vulnerability, and error cost under asymmetric stakes; it remains disciplined only if Χ and D prevent coercive or ranking use.
    distance_and_restraint_result: >
      Χ prevents probability, urgency, expertise, model output, or later confirmation from becoming authority, command, or future-truth claim.
    self_binding_result: >
      Ψ is weak as a scene fact but active as a constraint: anticipation may bind the anticipator to restraint, revision, uncertainty disclosure, and consequence-handling, not bind others to compliance.
    viability_result: >
      The anticipatory configuration is minimally active and full-viability weak: ANT_min applies, while ANT_viable_full requires concrete evidence of Α, Σ, Ψ, and capacity-bounded responsibility.
    drift_result: >
      Main ANTICIPATION drift risks are certainty replacing Λ, probability-induced action compulsion, Ω instrumentalization, Χ suspension, Ψ externalization, and post-confirmation authority inflation.
    post_confirmation_result: >
      Post-confirmation discipline is weak but relevant: if a forecast proves right, distance must be reopened rather than converted into superiority, entitlement, or retroactive inevitability.
    final_anticipation_formula_or_signature: >
      ANT_min active: Δ + □ + Λ + Θ + Χ as reduced overlay shorthand; ANT_viable_full weak pending concrete evidence of Α, Σ, Ψ, and capacity-bounded responsibility; ANT_to_planning_constraint active for downstream planning only under Χ, D, and reversibility.
    closing_formula:
      quote: "Anticipation is not about being early — it is about being bound before acting."
      case_application: >
        The formula applies because forecasting remains PMS-ANTICIPATION viable only when future-oriented stance increases restraint and consequence-handling before action, rather than turning early projection into prophecy or mandate.
    final_claim_boundary: >
      This ANTICIPATION overlay adds visibility for future-oriented praxis, non-event preservation, irreversibility, asymmetry, restraint, viability, prognosis drift, post-confirmation discipline, and responsibility under anticipatory load. It does not revise PMS Base, rewrite the PMS Core pass, predict the future, authorize action, prescribe intervention, rank persons, validate PMS, or claim final capture of anticipation.