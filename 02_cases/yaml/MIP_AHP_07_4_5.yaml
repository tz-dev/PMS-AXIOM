        selected_PH_band: "high"
        confidence_shift:
          A_reading: "up"
          C_reading: "up"
          IA_box_decidability: "more_decidable"
        risk_shift:
          D_R_D_P_misreading_risk: "down"
        explanation: >
          The target MIP analysis is unusually explicit about scope, role, publicness, score hygiene,
          IA undecidability, D-boundaries, red-zone avoidance, and transmission status. This supports high
          PH. At the same time, high PH does not remove attack points; it means the analysis exposes its
          weak points clearly enough to support hardening.

      uniform_report:
        addon_overlays:
          ah_precision:
        precision_heuristic_summary: >
          Precision Heuristic (PH): high (6/6). Satisfied precision dimensions: 6/6. Expected overlay
