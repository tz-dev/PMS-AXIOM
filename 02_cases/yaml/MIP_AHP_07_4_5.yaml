          escalation at case.D_module_optional.active. AP-004 medium — Original case material versus
          model-derived material could be separated more visibly at case.information_basis. AP-005 medium
          — M-ceiling rule is correctly blocked but not operationally testable at case.scores_and_ia.M_score.ceiling_rule_check.
          AP-006 medium — Transmission status is clear but public excerpt risk remains high at
          case.transmission_check.status. AP-007 low — High PH could be misread as public-readiness unless
          the uniform report explicitly blocks that reading.
        hardening_backlog_summary: >
          Hardening Backlog (next iteration): HB-001 high — add a front-loaded scope statement that
          multi-model coherence increases auditability, not evidentiary or domain authority. HB-002 high
          — add IA-box criteria explaining that unclear is an appropriate boundary result caused by missing
