          case material, PMS Core inheritance, CONFLICT inheritance, MIP reading, and AHP overlay. HB-005
          medium — add a next-run M-ceiling evidence checklist. HB-006 medium — add a mandatory excerpt
          preface for any reuse. HB-007 low — add an AHP boundary note that high PH improves attackability
          and precision but does not make the analysis transmittable.
        boundary_note: >
          AHP hardens the analysis; it does not rescore A, M, IA, or D. It does not activate D, does not
          create a D-profile, does not assign a D-Quick-Grid level, does not change transmission status,
