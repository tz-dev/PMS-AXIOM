      falsifier: The analysis should be revised or withdrawn if concrete evidence shows that critique reach is better explained by rival frameworks, lacks the assumed scale shift, or requires legal, empirical, political, rhetorical, or ethical analysis outside MIP.
  uniform_report:
    generate_only_from_structured_fields: true
    title: MIP Analysis of Critique Reach (Micro → Macro)
    overview_4_to_7_sentences: This MIP analysis treats "Critique Reach (Micro → Macro)" as an abstract structural case, not as a concrete person, institution, or event. The case has relatively strong conceptual awareness of scale, frame, publicness, asymmetry, temporality, drift risk, and non-capture, but it lacks concrete scene evidence. The provisional A-band for the analytical artefact is 4-5, because the structure is coherent and careful while practical enactment, correction, and responsibility remain under-specified. M-score is not assignable to any person or role-holder; if forced for real-world responsibility, it would be capped at <=4 without concrete predictability and alternatives. IA is marked as risk-level only, because macro/public critique may create exposure and reversibility risks, but no concrete asymmetry is adjudicated. D is activated only as a qualitative dignity-in-practice protection layer and produces no dignity score.
    key_findings:
    - The case is structurally mature in boundary discipline but not mature enough for concrete findings.
    - A(H) is provisionally 4-5 for the analytical artefact, not for any person.
    - M(X) is not assignable because no concrete role-holder, power, predictability, alternatives, or integration attempt is supplied.
    - IA risk is present only as a potential macro/public critique risk, not as a verdict.
    - Dignity-in-Practice is relevant as protection against humiliation, public pillory, and exposure-as-correction.
    - Publicness increases the need for reversibility, voice, time-boundedness, and correction pathways.
    - Rival readings and non-capture remain central.
    A_summary: A-awareness is conceptually strong; C-coherence is high but risks smoothness; R-responsibility is responsibly withheld; P-power-to-act is limited to structural clarification. The resulting A-band is 4-5 provisional for the artefact.
    M_summary: M-score cannot be assigned to a person or concrete role. High M is blocked by missing predictability, alternatives, and real-world power-control evidence.
    IA_box_summary: IA-box result is IA_risk only. Transparency of the analysis is partial-to-good, but justification, time-boundedness, and reversibility of any real macro critique remain under-specified.
    D_summary_if_activated: D is active only as guardrail-bound qualitative protection. D0 remains untouched; D1 is not assessed; D2/D-P appear as caution against humiliation, degradation, public pillory, irreversible labeling, and exposure-as-correction.
    trajectory_summary: The conceptual trajectory moves from local critique to scale transition to either productive correction through Σ/Ψ or drift risk through judgment, narrative repair, commentary, public pillory, silence, diffusion, integration bypass, or commitment evasion. No branch is empirically established.
    guardrail_status: Guardrails are satisfied for internal structural working-note use. Red-zone uses remain prohibited.
    transmission_status: Structurally transmittable as internal working note only; not suitable for decision, sanction, HR, forensic, clinical, legal, public ranking, or identifiable-person use.
    practical_implications: Any future concrete use must first define the scene, roles, publicness, evidence, correction path, review windows, voice safeguards, and falsifier conditions.
    conclusion: 'MIP adds a disciplined maturity-in-practice reading to the PMS Core and PMS-CRITIQUE analyses: the case is structurally coherent and guardrail-aware, but all concrete maturity, responsibility, IA, D, empirical, legal, clinical, implementation, and validation claims remain withheld.'