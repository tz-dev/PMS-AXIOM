        trend_band_qualitative: not_applicable
      D2_relational_dignity_D_R:
        observed_enactments: 'Relational dignity appears only as a guardrail requirement: critique must not become humiliation, degradation, person-typing, sanction logic, or coercive binding.'
        context_notes: The risk rises when critique becomes public or systemic and the addressee loses voice or reversibility.
        interpretive_reading_not_judgment: This is a structural caution about critique handling, not a judgment that any actor has violated dignity.
      D_P_public_dignity:
