operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Δ marks the distinctions that make the case analyzable: self and other, accessible signs and inaccessible
      inner experience, trust and distrust, evidence and absence, and calibrated stance versus premature verdict.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The primary distinction is between directly inaccessible inner experience and the observable or relational structures
      through which trust may be calibrated.
    - The distinction must not be conflated with a certainty/uncertainty binary that would force either total trust or total
      distrust.
    falsifier_conditions:
    - If no stable distinction between inaccessible interiority and observable praxis is maintained, the PMS reading loses
      its entry point.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ appears as the structural directedness toward calibrating trust rather than remaining in undifferentiated
      uncertainty. The material does not establish a subjective desire or affective drive.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - The tension is philosophical and structural; a need to orient trust under epistemic limitation, not an empirically observed
      emotional impulse.
    - No subjective desire, fear, suspicion, or attachment is inferred because the case material does not provide such evidence.
    falsifier_conditions:
    - If the question does not generate any directional pressure toward calibration, ∇ must be downgraded to not active.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is the interpersonal-philosophical frame in which trust is at stake despite non-access to the other's inner
      experience. It constrains relevance to trust-calibration rather than metaphysical proof or diagnosis.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is interpersonal trust considered as a philosophical and praxeological calibration problem.
    - Any shift from philosophical frame to empirical, clinical, legal, or implementation frame must be explicitly marked and
      is not supplied by the case material.
    falsifier_conditions:
    - If no interpersonal or trust-calibration frame is specified, the analysis becomes too abstract to discriminate.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Λ is the structured absence of direct access to another person's inner experience. This absence is meaningful
      because the case asks how trust can be calibrated without such access.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The absent expected item is direct access to the other's inner experience within the frame of interpersonal trust-calibration.
    - This absence must remain possible non-capture; it is not automatically failure, deception, concealment, immature trust,
      or incomplete integration.
    - Λ should be read as the structural condition under which trust-calibration becomes necessary, not as evidence that the
      other has withheld something that ought to have been available.
    - The analysis must distinguish opacity as an ordinary condition of interpersonal praxis from silence, refusal, evasion,
      breach, or bad faith, none of which is supplied by the case material.
    falsifier_conditions:
    - If direct access to inner experience is not expected, relevant, or structurally at stake, Λ should not be asserted as
      a major operator.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is weak because the abstract case does not provide repeated interactions or stabilized patterns. It becomes
      relevant only if trust-calibration is placed into a temporal history of recurring signs, promises, repairs, or failures.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - A concrete Α claim would require recurrence or stabilization, such as repeated reliability, repeated rupture, or a stable
      role-script around trust.
    - The current case must distinguish possible attractor formation from mere conceptual repetition of the trust problem.
    falsifier_conditions:
    - If no recurrence, stabilization, or path-dependence is shown, Α remains weak and must not be treated as established.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is active as structural asymmetry; the trusting agent is exposed under incomplete access, and the other
      person's interior remains unavailable. The asymmetry is epistemic-practical and vulnerability-related, not a moral verdict.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - 'The relevant asymmetry concerns unequal access and exposure: one may have to act or withhold action without direct access
      to the other''s inner experience.'
    - This asymmetry must not be moralized as guilt, superiority, domination, deception, or inferiority by default.
    - Because no role relation or repeated pattern is supplied, Ω remains structurally active but not concretely specified as
      power, authority, care, dependency, or obligation.
    - Ω should not be collapsed into epistemic lack alone; the asymmetry also concerns vulnerability, reliance, possible risk,
      and the fact that trust may bind or expose the trusting party before certainty is available.
    - No conclusion follows yet about whether the asymmetry should be reduced, accepted, endured, formalized, reciprocated,
      or refused.
    falsifier_conditions:
    - If no directional imbalance of access, vulnerability, exposure, capacity, obligation, or role can be identified, Ω must
      be removed or marked weak.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Θ is active because trust-calibration normally depends on temporal extension: consistency, delay, promise,
      repair, accumulated reliability, and reversible revision. The case implies this structure but provides no concrete trajectory.'
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The analysis must distinguish a diachronic trust trajectory from a one-time static inference about another person's interior.
    - Temporality is essential for calibration in principle, but the present case does not provide actual sequence data.
    - Θ should therefore be used to mark the need for revision, delay, confirmation, disconfirmation, repair, repetition, or
      accumulated praxis, not to invent a history that the case does not give.
    - A stronger Θ claim would require identifiable before-and-after structure, such as repeated reliability, a broken promise,
      repair after rupture, delayed disclosure, or stable conduct across changing conditions.
    falsifier_conditions:
    - If trust calibration is treated as a single timeless inference with no role for sequence, revision, persistence, or anticipation,
      Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is weak-active because the problem invites reframing inaccessible interiority as a condition for calibrated
      praxis rather than as automatic impossibility, certainty, suspicion, or proof. No specific source-to-target reframing
      is supplied.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - A candidate source frame is inner-access epistemology; a candidate target frame is praxeological calibration through
      observable relation, time, distance, and restraint.
    - Recontextualization must clarify the problem without absorbing rival framings or treating non-fit as PMS failure.
    falsifier_conditions:
    - If every disagreement, absence, or resistance is absorbed as Φ, the reading becomes over-assimilative.
    non_capture_note: 'Recontextualization is not automatic justification.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Χ is critical: reflective distance prevents the analysis from converting inaccessible inner experience into
      certainty, suspicion, person-ranking, diagnostic judgment, or forced closure.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must suspend verdict about the other person's actual inner experience and preserve reversibility of the
      trust reading.
    - Distance here is not avoidance or empty neutrality; it is restraint under uncertainty and asymmetry.
    - Χ is the main protection against tribunal drift: the analysis must not turn inaccessible interiority into a verdict of
      trustworthiness, untrustworthiness, sincerity, deception, maturity, or deficiency.
    - Χ also prevents PMS coherence from becoming coercive; even a formally elegant reading must remain revisable and open
      to non-capture or rival formalization.
    falsifier_conditions:
    - If Χ is suspended in order to force a verdict about trustworthiness, sincerity, deception, maturity, or inner experience,
      the PMS application is invalid.
    non_capture_note: 'Distance preserves reversibility and guards against coercive closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is relevant but not sufficient. Trust-calibration would require integrating distinction, absence, asymmetry,
      temporality, possible reframing, and distance into a coherent stance, but such coherence cannot prove correctness.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Integration must discriminate among trust, distrust, suspended judgment, ethical openness, strategic risk management,
      and relational commitment rather than smoothing them together.
    - Integration must be distinguished from forced coherence or narrative closure over inaccessible inner experience.
    - Σ may coordinate the operators into a coherent trust stance, but it cannot certify that the stance is correct, morally
      adequate, empirically warranted, or phenomenologically faithful.
    - A strong Σ claim would require showing what is integrated, what remains unresolved, what rival readings still survive,
      and what concrete action or restraint follows from the integration.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy, truth, trustworthiness, or correct calibration, Σ is overclaimed.
    non_capture_note: 'Integration must not be treated as proof of truth, adequacy, or superiority over rival readings.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
