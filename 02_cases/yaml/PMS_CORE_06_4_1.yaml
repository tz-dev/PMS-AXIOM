operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Δ is active in the distinctions that make the case intelligible: self versus other, inner experience versus outward expression, direct access versus indirect attribution, trust versus distrust, and understanding versus non-understanding."
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "The primary distinctions are self/other, accessible/inaccessible, inner/outer, attribution/non-attribution, and trust/distrust within the philosophical frame."
      - "These distinctions must not be converted into metaphysical proof, psychological essence, or a fixed ranking between the knower and the other."
    falsifier_conditions:
      - "If the problem is reformulated so that no distinction between self and other, access and inaccessibility, or attribution and non-attribution remains, the PMS reading loses its entry point."
    non_capture_note: "Difference does not by itself prove that PMS captures the case."
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "∇ is active as the directional pressure to justify trust, make sense of the other, attribute mindedness, or understand what cannot be directly accessed. The pressure is structural and philosophical, not evidence of a subjective desire in a particular person."
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "The tension is explanatory and praxeological: the case asks how trust or attribution can proceed under inaccessible inner experience."
      - "No affective motive, personal desire, or psychological drive is inferred because the case material does not provide a concrete subject."
    falsifier_conditions:
      - "If no pressure toward trust, attribution, justification, or understanding arises from the self/other distinction, ∇ is under-specified."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "□ is active as the philosophical frame that makes the absence of direct access to another mind relevant. Within that frame, trust, attribution, and understanding become constrained questions rather than free metaphysical speculation."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is the philosophical problem of other minds, treated here as a PMS conceptual domain projection."
      - "Possible frame shifts must be marked: epistemic skepticism, ethical recognition, phenomenological intersubjectivity, pragmatic trust, and PMS praxeological structure are not identical frames."
    falsifier_conditions:
      - "If no frame is specified for why inaccessible inner experience matters, the analysis becomes too abstract to discriminate the case from any ordinary uncertainty."
    non_capture_note: "A frame can clarify a case without exhausting it."
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Λ is the dominant operator: the expected direct access, confirmation, or transparent availability of another's inner experience does not occur. The absence is meaningful only within the frame where trust, attribution, or understanding seeks justification."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence is direct access to another mind's inner experience; its absence matters within the other-minds problem and within practices of trust or attribution."
      - "The absence must not be automatically treated as a PMS defect, failed integration, drift, or proof that trust is impossible; it may also mark genuine non-capture."
    falsifier_conditions:
      - "If the case is read in a frame where direct inner access is not expected or needed at all, Λ should be weakened or reformulated rather than asserted as central."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Α is weak and conditional. Stable trust could emerge through repeated testimony, expression, responsiveness, conduct, or shared forms of life, but the case material gives no concrete recurrence or path dependence."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "A stronger Α claim would require observable recurrence: repeated expressions, reliable responsiveness, stable trust practices, or patterned attribution."
      - "A philosophical tendency to return to the same problem is not enough by itself to establish a case-level attractor."
    falsifier_conditions:
      - "If no recurrence, stabilization, or pattern formation is supplied, Α remains weak and must not be used to support strong Ω, Θ, or Ψ claims."
    non_capture_note: "Pattern formation is not proof of explanatory sufficiency."
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ω is active but bounded. Trust under inaccessible inner experience involves exposure to what cannot be verified directly, and attribution can asymmetrically position the other as interpreted by a knower. This does not imply moral ranking or epistemic superiority."
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "The asymmetry is epistemic and praxeological: one side seeks to trust or attribute while the other's inner experience remains unavailable."
      - "The direction of asymmetry must not be moralized; inaccessible inner experience does not make the other deficient or the interpreter superior."
      - "Because no concrete relation of power, role, or obligation is given, Ω remains bounded and cannot be treated as a full social asymmetry."
    falsifier_conditions:
      - "If no directional imbalance of access, exposure, vulnerability, capacity, or obligation is identifiable, Ω must be marked weak or removed."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Θ is weak to moderate. Trust and understanding normally unfold across time through memory, delay, promise, repeated interaction, and responsiveness, but the case material provides no concrete temporal sequence."
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "The temporal structure is implied by trust and attribution as practices that may persist or fail over time, not by a described sequence of events."
      - "A static epistemic puzzle would weaken Θ unless the analysis explicitly concerns temporally extended trust."
    falsifier_conditions:
      - "If the problem is limited to a timeless logical question about the existence of other minds, Θ is overextended and should be marked weak or not active."
    non_capture_note: "Temporality in PMS does not by itself settle metaphysical or empirical continuity."
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Φ is active as a bounded recontextualization: the case can be shifted from the demand for direct inner access to a praxeological problem of trust, attribution, and restraint under Λ. This shift is not a solution by itself."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The source frame is the classical epistemic or metaphysical problem of other minds; the target frame is PMS structural praxis under Λ, Ω, Θ, Χ, and possible Σ."
      - "The recontextualization must not merely absorb skeptical, phenomenological, ethical, or linguistic non-fit into PMS vocabulary."
    falsifier_conditions:
      - "If PMS redescribes every rival framing or unresolved absence as Φ without preserving its independent force, the reading becomes over-assimilative."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Χ is strongly active as application discipline and analytic restraint. The analysis suspends verdicts about actual consciousness, mental-state truth, metaphysical access, diagnosis, legal credibility, and implementation."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The analysis preserves reversibility by treating all PMS results as a bounded structural projection, not as proof or closure."
      - "Distance is not avoidance: it still names the active problem of Λ while refusing premature certainty, total skepticism, or tribunal-like judgment."
    falsifier_conditions:
      - "If Χ is suspended in order to force a metaphysical answer, empirical verdict, diagnostic attribution, legal standard, or implementation claim, the PMS application is invalid."
    non_capture_note: "Distance protects against overclaiming and premature closure."
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Σ is weak. PMS can coordinate several elements of the case—difference, frame, absence, asymmetry, temporality, distance, and recontextualization—but the abstract material does not establish full integration or solution of the problem."
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Integration must discriminate among trust, attribution, understanding, skepticism, ethical recognition, and phenomenological encounter rather than smoothing them into one PMS pattern."
      - "Coherence of the PMS formula is not evidence that the philosophical problem has been solved."
    falsifier_conditions:
      - "If coherence is treated as proof that PMS captures or resolves the other-minds problem, Σ is overclaimed."
    non_capture_note: "PMS coherence is insufficient by itself."
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ψ is weak and conditional. Self-binding would be relevant if a concrete agent committed over time to trust, restraint, recognition, or accountable attribution, but no such commitment is specified in the case material."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Ψ may apply to the analysis itself as self-binding discipline, but case-level self-binding requires a specified agent, commitment, duration, and integrated structure."
      - "The case does not warrant attributing selfhood, agency, or stable normativity to an abstract problem or to an unspecified other."
    falsifier_conditions:
      - "If Ψ is claimed without established Σ, Θ, and Χ in a concrete or explicitly scoped structural self-model, the self-binding reading is under-specified."
    non_capture_note: "SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: "Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns."
    case_function: "L1 provides the strongest case structure: Δ distinguishes self/other and access/inaccessibility, ∇ marks the pressure toward trust or attribution, □ supplies the philosophical frame, Λ names the missing direct access, and Α remains weak because no repeated practice is described."
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: "Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments."
    case_function: "L2 is relevant but bounded: Ω appears as epistemic and praxeological exposure under inaccessible inner experience, while Θ is implied by trust as temporally extended but is not concretely supplied."
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: "Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis."
    case_function: "L3 carries major application discipline: Φ permits a bounded shift from metaphysical access to praxis under absence, Χ prevents closure and person-ranking, and Σ remains weak because integration is possible but not established."
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: "Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts."
    case_function: "L4 is not primary. Ψ is case-level weak because no concrete agent self-binds over time; it is active mainly as application discipline governing the analysis itself."

dependency_logic:
  status: "dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The case has stable distinctions between self and other, inner and outer, direct access and indirect attribution."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "The problem includes a structural pressure toward trust, attribution, justification, or understanding arising from those distinctions."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The philosophical problem of other minds supplies the frame that makes the distinctions and pressures relevant."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Within that frame, direct access to another mind's inner experience is the meaningful non-event or unavailable expected occurrence."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Only weakly satisfied: possible recurrent trust practices are conceptually relevant, but no concrete recurrence is provided."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Only weakly satisfied through the possible epistemic and praxeological asymmetry of trusting or attributing under inaccessible inner experience; no concrete power relation is given."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Only weakly satisfied: trust normally unfolds across time, but the case material provides no temporal sequence."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Weakly satisfied as a conceptual reframe from direct-access epistemology to praxeological trust under Λ; rival frames remain open."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied as application discipline and analytic restraint: the reading remains reversible, non-diagnostic, non-metaphysical, and non-totalizing."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Weakly satisfied: the analysis coordinates the operators but does not establish full integration or solve the philosophical problem."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Weakly satisfied only as analytic self-binding of the application; no case-level self-binding agent or practice is supplied."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

