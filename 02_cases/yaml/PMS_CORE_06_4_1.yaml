core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: "PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological essences."
    status: "satisfied"
    case_application: "The case is treated as a structure of praxis: how trust, attribution, and understanding may be enacted under inaccessible inner experience. It is not treated as a claim about psychological essence, personal worth, consciousness, or ontology."
    failure_condition: "The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings."
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: "The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization and critique."
    status: "satisfied"
    case_application: "Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ is used as PMS operator language. No additional PMS operators, axes, layers, or primitives are introduced."
    failure_condition: "The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged to PMS Base."
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: "PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action, dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator compositions rather than introduced as independent primitives."
    status: "satisfied"
    case_application: "Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are treated as formula-derived PMS constructs, not as independent axioms. Their activation is marked weak, conditional, analytic, or under-specified where the case does not support stronger use."
    failure_condition: "The analysis would fail P3 if derived structures were treated as independent axioms."
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: "Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes."
    status: "satisfied"
    case_application: "Ω is relevant because trust under inaccessible inner experience creates structural exposure and interpretive asymmetry. Θ is relevant because trust and attribution normally require persistence, delay, memory, and repeated responsiveness, but the case material does not provide a concrete temporal trajectory; therefore Θ is marked weak rather than fully active."
    failure_condition: "The analysis would fail P4 if Ω or Θ were erased where they structure the case, or if they were converted into static person attributes."
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: "PMS may be encoded in formal, computational, or machine-readable structures, but such encodings do not by themselves implement praxis, agency, selfhood, consciousness, empirical validity, or moral standing."
    status: "satisfied"
    case_application: "The YAML representation is only a formal case encoding. It is not a computational implementation, empirical validation, simulation result, AI architecture, or proof of agency, consciousness, or selfhood."
    failure_condition: "The analysis would fail P5 if YAML representation were treated as implementation or validation."
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: "PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models, or more empirically grounded formalisms remains methodologically open."
    status: "satisfied"
    case_application: "Rival readings remain open, including skeptical epistemology, phenomenology, Wittgensteinian public-criteria accounts, inferential accounts from behavior and testimony, ethical recognition accounts, and computational hidden-state models."
    failure_condition: "The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default."
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: "Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms of praxis may remain only partially legible or may resist assimilation within the current grammar."
    status: "satisfied"
    case_application: "Possible non-capture is preserved for qualia, lived phenomenology, metaphysical questions about the existence of other minds, the normativity of trust, and rival accounts that may discriminate the case more sharply than PMS."
    failure_condition: "The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure."
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: "PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions."
    status: "satisfied"
    case_application: "No person, mind, agent, community, or theory-holder is diagnosed, ranked, assessed for pathology, or assigned a trait. PMS terms are restricted to structural case mapping."
    failure_condition: "The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis."
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: "Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global person-labels and irreversible ontological attributions are out of scope."
    status: "satisfied"
    case_application: "Because the case is not a concrete scene, the analysis is case-type-bound rather than scene-bound. It remains limited to the abstract philosophical problem as stated and cannot generate decontextualized findings about actual persons or interactions."
    failure_condition: "The analysis would fail P9 if it generated global, irreversible, decontextualized claims."

