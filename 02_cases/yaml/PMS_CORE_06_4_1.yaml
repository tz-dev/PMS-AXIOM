      - "The possibility that the philosophical demand for justification remains unresolved even after a PMS-consistent structural rendering."
    rule: "These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured absence, or failed maturity. They may mark genuine limits of the PMS reading. In particular, the unresolved inaccessibility of another´s inner experience must not be converted into a PMS success condition merely because Λ can name it."
