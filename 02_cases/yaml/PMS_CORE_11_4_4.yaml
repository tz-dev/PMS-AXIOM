      - "The actual evidentiary status, completeness, and reliability of workflow records."
      - "The semantics of checkpoints, interruptions, permitted gaps, and missing documentation."
      - "Whether audit trace analysis is better handled by state-machine, process-mining, reliability, or legal-evidence formalization."
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete
      integration, structured absence, or failed maturity. They may mark genuine limits of the PMS reading.
