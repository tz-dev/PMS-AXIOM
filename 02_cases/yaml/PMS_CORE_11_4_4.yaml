core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological
      entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a structure of documented workflow enactment, repetition, interruption,
      review, and traceability, not as an analysis of persons, inner states, ontological entities,
      psychological essences, or person-level properties.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological essence claims,
      ontological rankings, or diagnostic conclusions from the audit-trace structure.

  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis.
      Whether they are fully complete, optimally minimal, or uniquely ordered remains open to further
      formalization and critique.
    status: "satisfied"
    case_application: >
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ is used as PMS operators.
      Terms such as audit trace, checkpoint, interruption, missing record, quantum workflow, and
      stabilising step remain case descriptors and are not introduced as PMS operators, axes, layers,
      principles, or derived structures.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, layers, primitives, or
      governance add-ons as if they belonged to PMS Base.

  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS
      from operator compositions rather than introduced as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT,
      AD_A>>E, and AD_Sigma_low are treated only as formula-derived PMS structures. They are not
      treated as independent axioms, empirical findings, diagnostic categories, person-types, or
      legal/forensic classifications.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as primitives, if drift patterns
      became diagnoses, or if Dignity-in-Practice were converted into ontological dignity or moral ranking.

  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility,
      maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions rather
      than as static attributes.
    status: "partial"
    case_application: >
      Θ is central because the case involves several iterations, checkpoint order, interruptions,
      missing-record timing, and later review. Ω is retained only as weakly calibrated possible audit
      asymmetry, because the case material does not specify concrete roles, authority gradients,
      exposure gradients, obligations, or responsibility distributions.
    failure_condition: >
      The analysis would fail P4 if it ignored the temporal structure of the case, or if it inflated
      audit language into an established Ω claim without concrete asymmetry evidence.

  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply direct implementation,
      guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints,
      and evaluation.
    status: "satisfied"
    case_application: >
      The YAML rendering is a formal case encoding only. It does not implement QSTABILIZE, validate a
      quantum workflow, establish interoperability, prove computational sufficiency, or demonstrate
      empirical adequacy of an audit trace.
    failure_condition: >
      The analysis would fail P5 if YAML form were treated as implemented praxis, empirical testing,
      computational validation, or proof of technical adequacy.

  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative
      models, or more empirically grounded formalisms remains methodologically open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including workflow-log, state-machine, process-mining,
      reliability-engineering, audit-evidence, and quantum-technical formalizations. PMS translation
      is not treated as defeating those rivals by default.
    failure_condition: >
      The analysis would fail P6 if it treated structural PMS coherence as sufficient to exclude rival
      formalisms or as proof that PMS is the most discriminating model for the case.

  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms
      of praxis may remain only partially legible or may resist assimilation within the current grammar.
    status: "satisfied"
    case_application: >
      The PMS translation does not exhaust the technical meaning of quantum stabilization, the evidentiary
      status of records, the semantics of checkpoints, the reasons for interruptions, or the status of
      missing documentation. Such residues may remain genuine non-capture rather than PMS drift,
      incomplete integration, or calibration failure.
    failure_condition: >
      The analysis would fail P7 if all non-fit, missing evidence, rival framing, rupture, absence, or
      disagreement were automatically absorbed as drift, incomplete integration, recontextualization,
      or maturity failure.

  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic,
      or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No person, team, system, operator, reviewer, organization, workflow, or audit practice is diagnosed,
      ranked, pathologized, or classified as mature, immature, responsible, negligent, defective, or
      superior.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, personality traits, competence, risk,
      liability, clinical status, forensic status, or person-level quality from the PMS structure.

  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures.
      Global person-labels and irreversible ontological attributions are out of scope.
    status: "satisfied"
    case_application: >
      Because no concrete scene is supplied, the reading is explicitly case-type-bound to the given
      audit-trace description. It remains reversible, non-final, non-tribunal, non-person-ranking,
      and unavailable for global or irreversible attribution.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized, person-level,
      ontological, empirical, legal, forensic, or implementation claims from the abstract case description.

