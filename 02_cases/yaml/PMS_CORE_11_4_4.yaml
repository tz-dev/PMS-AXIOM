      non-capture zones, rival formalizations, and falsifier conditions requiring concrete trace and
      workflow evidence.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural relations among repeated framed operations, expected records, meaningful
      absences, temporal sequence, later review, reflective distance, and possible trace integration.
    discrimination_requirement: >
      The PMS reading must distinguish recurrence from attractor formation, missing data from meaningful
      Non-Event, audit review from Recontextualization, storage from Integration, and accountability
      questions from Responsibility_R.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish repeated stabilising steps from genuine Attractor formation."
      expected_pms_distinction: >
        Α requires recurrent pattern or stabilization emerging from repeated structural interaction, not
        merely multiple executions or accidental repetitions.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish missing records as Λ from ordinary absence, irrelevant omission, permitted non-recording, or PMS non-capture."
      expected_pms_distinction: >
