      current_calibration: "satisfied"
    - operator: "∇"
      question: "What procedural directedness toward stabilization or reviewability follows from those distinctions without inferring subjective intention?"
      current_calibration: "partial"
    - operator: "□"
      question: "Which frames make the distinctions relevant: workflow execution, audit review, or both?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "Which expected records or checkpoint events are absent, delayed, or undocumented within an identified frame?"
      current_calibration: "partial"
    - operator: "Α"
      question: "What shows recurrent stabilization rather than mere repetition or accidental duplication?"
      current_calibration: "partial"
    - operator: "Ω"
      question: "What concrete power, exposure, capacity, authority, or obligation gradient is present?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "What sequence, trajectory, persistence, delay, or later dependency structures the case?"
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "Does later audit review transform the frame of the workflow trace or merely inspect records?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "Does review maintain reflective distance rather than collapsing gaps into verdicts?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "Are disparate iteration records integrated into a coherent trace, or merely present as fragments?"
      current_calibration: "weak"
    - operator: "Ψ"
