operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ is active because the case requires distinctions between iterations, stabilising steps,
      checkpoints, interruptions, completed records, missing records, execution-time events, and
      later review objects.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - >
        Distinguish iteration from checkpoint, checkpoint from stabilising step, interruption from
        missing record, and execution trace from later audit review.
      - >
        Check that distinctions are not imported beyond the given material: the case does not specify
        actual quantum states, actors, log schemas, or technical success criteria.
    falsifier_conditions:
      - >
        If the workflow description cannot support stable distinctions among repetitions, checkpoints,
        interruptions, and missing records, the PMS reading loses its entry point.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is weak-active as structural directedness toward stabilization and trace continuity, not as
      psychological desire or subjective intention.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        The directedness is structural and procedural: the workflow is oriented toward repeated
        stabilization and later reviewable documentation.
      - >
        Do not infer desire, agency, consciousness, or intent from the word workflow or from the
        presence of stabilising steps.
    falsifier_conditions:
      - >
        If repeated steps have no directional relation to stabilization, continuation, or reviewability,
        ∇ is under-specified.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because the workflow frame and audit-review frame determine which repetitions,
      checkpoints, interruptions, and records count as relevant.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The active frames are the quantum-workflow execution frame and the later audit-trace review
        frame.
      - >
        Frame shifts must be marked: execution-time stabilization is not identical with later audit
        interpretation.
    falsifier_conditions:
      - >
        If no workflow frame or audit frame can be specified, the analysis becomes too abstract to
        discriminate.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active where missing records, undocumented interruptions, skipped checkpoints, delayed
      entries, or expected-but-absent documentation become meaningful within the workflow or audit
      frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The expected occurrence is a record, checkpoint entry, interruption note, or iteration trace
        expected by the workflow or audit frame.
      - >
        Absence must remain reversible: a missing record may be irrelevant, permitted, technically
        unavailable, a PMS non-capture zone, or a structured Non-Event, depending on evidence not
        supplied here.
    falsifier_conditions:
      - >
        If no documentation or checkpoint expectation exists in the relevant frame, Λ should not be
        asserted.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is active because the case explicitly describes repeated stabilising steps across several
      iterations, which can be read as recurrent patterning if the repetition is structurally organized.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Show recurrence by identifying repeated stabilising operations rather than merely counting
        multiple events.
      - >
        Distinguish a stable attractor from accidental aggregation, random reruns, or unstructured
        duplication.
    falsifier_conditions:
      - >
        If the iterations are not patterned, stabilized, or recurrence-forming, Α is over-read.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak because audit review may introduce asymmetries of authority, exposure, obligation,
      access to records, or accountability, but the material does not specify concrete roles or
      responsibility gradients.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Possible Ω directions include reviewer over reviewed trace, audit authority over workflow
        operator, or record-holder over later interpreter, but none are established as concrete facts.
      - >
        Do not moralize, legalize, or blame through Ω; mark it weak unless directional power, exposure,
        capacity, or obligation is specified.
      - >
        Allow Ω to remain weak or absent if the case remains a neutral trace-reconstruction problem.
    falsifier_conditions:
      - >
        If no directional imbalance of power, exposure, capacity, or obligation is identifiable, Ω
        claims must be removed or kept weak.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: >
      Temporal structuring that enables trajectories, commitments, development, and longer-form
      self-relation.
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is active because the case depends on sequence across iterations, persistence of stabilization
      attempts, checkpoint order, interruptions, missing records over time, and later review.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Distinguish diachronic trajectory from a static set of records by tracking iteration order,
        checkpoint order, interruptions, and later review timing.
      - >
        Temporality is essential because audit trace meaning depends on what occurred, failed to occur,
        or was recorded across iterations.
    falsifier_conditions:
      - >
        If the case can be fully described without sequence, persistence, delay, or later dependency,
        Θ is overextended.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active but bounded because later review may place prior workflow events into an audit frame,
      transforming their relevance from execution steps into reviewable trace elements.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Source frame: workflow execution and stabilization. Target frame: later audit-trace review of
        repetitions, checkpoints, interruptions, and missing records.
      - >
        Check whether review genuinely recontextualizes the prior workflow or merely retrieves logs
        without changing their interpretive frame.
    falsifier_conditions:
      - >
        If every interruption, missing record, or rival framing is absorbed as recontextualization
        without evidence of a frame transformation, the reading is over-assimilative.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "delaying judgment until context is clearer"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as the required reflective distance of the later review and of this PMS application;
      it prevents immediate conversion of trace gaps into verdicts.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Distance is located primarily in the audit-review posture and the PMS application posture, not
        necessarily in the workflow itself.
      - >
        Maintain inhibition against premature empirical, legal, diagnostic, implementation, or
        metaphysical conclusions.
    falsifier_conditions:
      - >
        If review collapses into immediate enforcement, blame, or irreversible classification without
        reflective distance, Χ is compromised.
    non_capture_note: >
      Distance does not make the reading neutral, complete, or empirically valid by itself.
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "balancing competing role obligations"
      - "integrating criticism into future action"
      - "coordinating multiple perspectives"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak-active only if repetitions, checkpoints, interruptions, and absences are synthesized
      into a coherent audit trace; the case states dependency on documentation but does not show
      completed integration.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Identify whether separate iteration records are coordinated into one trace structure rather
        than merely stored side by side.
      - >
        Do not treat a smooth PMS account as proof that the actual records are integrated, consistent,
        or adequate.
    falsifier_conditions:
      - >
        If records remain fragmented or unavailable and no synthesis is shown, Σ is under-specified
        or absent.
    non_capture_note: >
      Integration is not proof of truth, maturity, adequacy, or closure.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: >
      Formation of self-relation through commitment to integrated structures across time.
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "keeping a promise because it defines who one is"
      - "maintaining integrity across contexts"
      - "binding oneself to a long-term responsibility"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and not established because the material does not specify stable self-binding, norm
      commitment, policy continuity, or a self-relation; any use is limited to possible trace-discipline
      constraints.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Only claim Ψ if a stable commitment across time is specified, such as a binding audit rule,
        policy constraint, or persistent trace obligation.
      - >
        For a technical workflow, Ψ must not be read as consciousness, subjectivity, or literal selfhood.
    falsifier_conditions:
      - >
        If no self-binding commitment or stable normativity across time is present, Ψ should remain
        weak, analytic-only, or not applicable.
    non_capture_note: >
      Self-Binding is not literal subjectivity, consciousness, or ontological selfhood in this case.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames, non-events, and
      recurrent patterns.
    case_function: >
      L1 structures the core case: distinctions among iterations and records, directed stabilization,
      workflow and audit frames, meaningful missing documentation, and recurrent stabilising patterning.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally extended into
      trajectories and commitments.
    case_function: >
      L2 is partially active: Θ is strong because the case is temporal, while Ω is weak because audit
      authority, exposure, and responsibility gradients are only implied and not concretely specified.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning and more mature
      forms of praxis.
    case_function: >
      L3 is review-bound: Φ and Χ are relevant to later audit review and to the reflective posture of
      this application, while Σ remains weak until the records are actually synthesized into a coherent
      trace.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation maintained
      across time and contexts.
    case_function: >
      L4 is not primary. Ψ is only a possible analytic constraint if stable audit self-binding, policy
      continuity, or trace-discipline commitments are specified; no literal selfhood is inferred.

dependency_logic:
  status: "dependency_respecting_with_weak_omega_calibration"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case supplies basic distinctions among repeated stabilising steps, checkpoints,
        interruptions, documented records, and missing records.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        The described stabilising workflow gives procedural directedness toward stabilization and
        reviewability, though not subjective drive.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The quantum-workflow frame and audit-review frame constrain relevance and give the distinctions
        their case meaning.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Missing records and interruptions matter only because the audit/workflow frame expects some
        recordable occurrence or checkpoint trace.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Repetition over several iterations supports recurrent patterning, provided the repetitions are
        structurally organized rather than accidental.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Only weakly satisfied: audit review may imply authority, exposure, or obligation asymmetry,
        but roles and gradients are not specified.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Satisfied by iteration sequence, checkpoint order, interruption timing, missing-record timing,
        and later review dependency, while Ω remains weak.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Weakly satisfied: later audit review may reframe execution events as trace objects, but the
        transformative force of the review is not shown.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Satisfied as an application and review condition: the case must be considered from reflective
        distance rather than immediate judgment.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Weakly satisfied: integration would require synthesis of iteration records into a coherent
        audit trace, which the case does not demonstrate.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Weakly satisfied at most: stable self-binding would require explicit audit commitments or
        policy continuity, not merely a repeated workflow.
  dependency_failure_conditions:
    - >
      If a later operator is used while its dependencies are absent, mark the reading as under-specified
      or invalid.
    - >
      If the chain is used as a smooth totalization without discrimination tests, mark coherence risk
      as high.
    - >
      If an operator is not active, state so rather than forcing the full chain.

