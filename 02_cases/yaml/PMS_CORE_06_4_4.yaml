operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ distinguishes possible futures, reversible from irreversible planning
      paths, interpretation from commitment, commitment from action, and
      provisional orientation from lock-in.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "The primary distinctions are reversible planning versus lock-in, possible future versus fixed path, and provisional interpretation versus settled commitment."
      - "The distinctions remain conceptual because no concrete planning scene or evidence is supplied."
    falsifier_conditions:
      - "If no stable distinction between reversible orientation and premature closure can be maintained, the PMS reading loses its entry point."
    non_capture_note: "Difference does not by itself prove that PMS captures the case."
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as structural directedness toward possible futures. Planning is
      not pure observation; it is orientation under tension between present
      uncertainty and future action.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "The tension is structural and practical-conceptual, not an inferred psychological desire."
      - "No affective drive, motive, or individual intention is claimed."
    falsifier_conditions:
      - "If the case is mere description with no orienting pressure toward decision or action, ∇ becomes under-specified."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is the planning frame that selects relevant futures, constraints,
      interpretations, and possible commitments while itself remaining
      revisable.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is philosophical planning under reversibility constraints."
      - "Frame shifts matter because the planning frame itself can become a hidden source of lock-in."
    falsifier_conditions:
      - "If no planning frame can be specified, the case becomes too abstract to discriminate."
    non_capture_note: "A frame can clarify a case without exhausting it."
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active in the not-yet of possible futures, postponed commitment,
      unrealized alternatives, and the structured absence of a final decision or
      fixed path.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence is eventual orientation or action; its delay matters because reversibility requires non-finalization before sufficient calibration."
      - "Absence, delay, or non-decision is not automatically treated as defect, drift, failure, or immaturity."
    falsifier_conditions:
      - "If no expectation of future decision, commitment, or action is present, Λ should be reduced or removed."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α appears mainly as the risk of lock-in: provisional planning may
      stabilize into a path-dependent attractor before interpretation,
      commitment, or action is adequately calibrated.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "The case names stabilization as a risk through lock-in, but does not show actual recurrence."
      - "Α must be distinguished from any single choice, heuristic, or necessary practical stabilization."
    falsifier_conditions:
      - "If no recurrence, stabilization, or path-dependence is relevant to lock-in, Α is over-read."
    non_capture_note: "Pattern formation is not proof of explanatory sufficiency."
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak and conditional. The case gives no explicit asymmetry of power,
      vulnerability, capacity, exposure, obligation, or role. Ω becomes relevant
      only if a concrete planning scene affects others or distributes risk
      unevenly.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "No direction or kind of asymmetry is established by the case material."
      - "Asymmetry must not be moralized; it is structural only if evidence shows unequal exposure, capacity, power, or obligation."
      - "Ω remains weak rather than forced into the analysis."
    falsifier_conditions:
      - "If no directional imbalance is identifiable in a concrete planning scene, Ω claims must remain weak or be removed."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is central because the case explicitly concerns orientation toward
      possible futures, anticipation, delay, trajectory formation, and timing of
      commitment.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The temporal structure is diachronic: planning holds possible futures open while preparing for eventual orientation or action."
      - "Temporality is essential because reversibility concerns how future-directed commitment is timed and modulated."
    falsifier_conditions:
      - "If the problem can be reformulated without temporal extension, anticipation, or delayed commitment, Θ is overextended."
    non_capture_note: "Temporality in PMS does not settle metaphysical or empirical continuity."
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is central because reversible planning requires the ability to place an
      emerging plan or interpretation into new frames without treating the first
      frame as final.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Source frames include current interpretation, projected future, and initial planning assumptions; target frames include revised constraints, new possible futures, and alternative formalizations."
      - "Φ must clarify revisability without absorbing every non-fit, disagreement, or rival frame as merely incomplete recontextualization."
    falsifier_conditions:
      - "If all resistance, rupture, or rival framing is automatically redescribed as Φ, the reading becomes over-assimilative."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is central as reflective distance, suspension of premature verdict, and
      inhibition of fusion into urgency, fixed interpretation, irreversible
      commitment, or immediate action.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The analysis itself preserves Χ by withholding empirical, diagnostic, legal, implementation, and metaphysical claims."
      - "Χ must be distinguished from avoidance, empty neutrality, paralysis, or refusal to act."
    falsifier_conditions:
      - "If Χ is suspended in order to force closure, the PMS application becomes invalid."
    non_capture_note: "Distance protects against overclaiming and premature closure."
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is active but bounded: reversible planning requires enough integration
      to orient action while refusing to treat coherence as final closure or
      proof of adequacy.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Integration must discriminate between provisional orientation and forced coherence."
      - "Σ remains provisional and does not override rival readings, non-capture, or the possibility that action should remain delayed."
    falsifier_conditions:
      - "If coherence is treated as sufficient proof that the PMS reading is correct or that the plan is adequate, Σ is overclaimed."
    non_capture_note: "PMS coherence is insufficient by itself."
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak-to-conditional. Planning may involve commitments across time,
      but the case resists premature self-binding. Ψ is relevant only as
      reversible, bounded commitment discipline.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Ψ applies only to provisional commitment or analytic self-binding of the PMS application, not to established selfhood or irreversible identity commitment."
      - "No literal subjectivity or selfhood is attributed to an abstract planning problem."
    falsifier_conditions:
      - "If self-binding is asserted without bounded Σ, Θ, and Χ, or if it becomes irreversible lock-in, the Ψ reading is under-specified or invalid."
    non_capture_note: "SELF_FIXPOINT is derived, not a metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of distinctions, impulses, frames, non-events, and recurrent
      patterns.
    case_function: >
      L1 differentiates possible futures and planning alternatives, gives them
      directional planning pressure, frames them as relevant, treats not-yet
      commitments as meaningful, and marks lock-in as a possible attractor risk.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is uneven: Θ is central because reversible planning is temporal, while
      Ω remains weak and conditional until a concrete scene shows who is
      exposed, obligated, empowered, or vulnerable.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 carries the main analytic load: Φ keeps frames revisable, Χ prevents
      premature closure, and Σ provides provisional integration sufficient for
      orientation without totalizing coherence.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into relatively stable
      self-relation across time and context.
    case_function: >
      L4 is secondary and conditional. Ψ matters as bounded commitment
      discipline, but the case does not warrant primary SELF_FIXPOINT or
      irreversible self-binding.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Conceptual distinction between reversible planning and premature lock-in."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Structural orientation toward possible futures and eventual action."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Planning frame selecting relevant futures, interpretations, constraints, and commitments."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Meaningful not-yet of futures, postponed commitments, and non-final decisions within the planning frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Weakly satisfied as lock-in risk; no actual recurrence is shown."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Weakly satisfied only as a conditional dependency if planning later affects others or distributes risk unevenly."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Satisfied by future-orientation, anticipation, delay, and commitment timing; Ω and Α remain weak dependency conditions."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Satisfied by the requirement that interpretations and plans remain recontextualizable under new frames."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied by maintaining distance from premature interpretation, commitment, or action."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Satisfied only as provisional integration: enough coordination to orient action without closing rival futures."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Weak: reversible commitment discipline is relevant, but stable self-binding is not established by the abstract case."
  dependency_failure_conditions:
    - "If a later operator is used while dependencies are absent, mark the reading under-specified or invalid."
    - "If the chain is used as smooth totalization without discrimination tests, mark coherence risk high."
    - "If an operator is not active, mark it weak, conditional, under-specified, or not applicable rather than forcing the full chain."

