derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >
    Each derived structure must be marked as active, weak,
    analytic_constraint, possible_but_not_entailed, under_specified, or
    not_applicable. Consideration does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs, not independent
    axioms, diagnoses, ontological rankings, metaphysical entities, or proof of
    PMS completeness.
  case_status: >
    Awareness_A and Coherence_C are active. Action_E is under-specified because
    no concrete enactment is given. Responsibility_R is weak because Ω and Ψ are
    conditional. Dignity_in_Practice_D is an application constraint. SELF_FIXPOINT
    is analytic-only. AD_A>>E and AD_Sigma_low are possible but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is structural, not phenomenological consciousness.
    case_reading: >
      Awareness_A is active as sustained, framed differentiation across time:
      possible futures, provisional interpretations, and reversible commitments
      remain distinguishable within a planning frame.
    status: "active"
    calibration_points:
      - "Differentiate possible futures, interpretations, commitments, and action paths within a planning frame across a temporal horizon."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability of action, including absences and
      delays, without requiring full integration or self-binding.
    case_reading: >
      Coherence_C is active but provisional: planning impulse is framed by
      reversibility, structured by meaningful not-yet commitments, and
      temporalized into trajectories without becoming final integration.
    status: "active"
    calibration_points:
      - "Coherence must be distinguished from truth, empirical adequacy, forced integration, and narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of self-relation."
    notes: >
      Responsibility is structural rather than moralistic and is not legal
      liability, moral blame, diagnosis, or person-ranking.
    case_reading: >
      Responsibility_R is weak. The case supplies Θ and Φ, but does not
      establish concrete Ω or Ψ.
    status: "weak"
    calibration_points:
      - "Identify affected parties, obligation gradients, exposure, and reversible self-binding before claiming responsibility."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures directedness as trajectory."
      - "Σ integrates conflicting impulses, constraints, and roles into enactment."
    notes: >
      Action here means integrated temporally extended enactment, not mere
      behavior or abstract thought.
    case_reading: >
      Action_E is under-specified. The case concerns orientation toward possible
      action, but gives no concrete enactment, plan execution, or integrated
      realization.
    status: "under_specified"
    calibration_points:
      - "Require concrete steps, timing, constraints, and integration evidence before claiming Action_E."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms protecting standing under asymmetry."
    notes: >
      Dignity-in-Practice concerns how asymmetry is handled, not ontological
      dignity or moral superiority.
    case_reading: >
      Dignity_in_Practice_D functions as an application constraint. The analysis
      avoids ranking, shaming, humiliation, irreversible labeling, and overreach
      under possible asymmetry.
    status: "application_constraint"
    calibration_points:
      - "Handle any later asymmetry without ranking, shaming, humiliation, irreversible labeling, or ontological claims."
    non_capture_note: "D is praxeological, not ontological or moral superiority."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    SELF_FIXPOINT is the derived PMS representation of self-binding as the
    result of integrated, reflexively modulated, temporally extended,
    asymmetry-aware praxis being bound into relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not primary here. The case asks how to avoid premature
    lock-in, so stable self-binding is only an analytic boundary condition:
    commitments may become Ψ only if they remain integrated, temporal, distant,
    and reversible rather than forced.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence must not be read as proving that all selfhood, agency,
    identity, or case structure reduces without remainder to this chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to abstract concepts as literal
    subjectivity unless explicitly scoped as structural self-binding only.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS asymmetry drift patterns are structurally derived distortion forms. They
    are not diagnoses, person-types, moral verdicts, clinical categories, or
    automatic consequences of a case. In this case they function only as
    conditional risk checks: they help test whether reversible planning might
    become over-distanced, chronically delayed, or under-integrated, but they do
    not authorize a finding that such drift is actually present.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation while recontextualization reinforces drift toward evaluation
        rather than integrative transformation and balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces evaluative framing rather than balance."
    case_reading: >
      AD_A>>E remains only a risk. Reversible planning could over-expand
      awareness, scenario-work, interpretation, reflection, or evaluation while
      suppressing enactment. However, the case gives no concrete evidence of
      chronic delay, suppressed action, excessive distance, positional
      asymmetry, or recurrent evaluative patterning. Therefore AD_A>>E must not
      be claimed as present; it remains a falsifiable risk condition for later
      scene-specific analysis.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      moral judgment, or maturity verdict. A planning structure may preserve
      reversibility without thereby becoming excessive awareness or suppressed
      enactment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis. This pattern belongs
        to the family of asymmetry drift patterns within PMS, especially where
        unstable recontextualization and weak integration unfold under
        asymmetrically loaded praxis conditions.
    generative_mechanism:
      - "Φ: frames are shifted or updated in ways that may destabilize continuity."
      - "Σ: integration fails to consolidate perspectives and impulses into coherent enactment."
    case_reading: >
      AD_Sigma_low remains only a risk. Reversible planning could become
      under-integrated if reframing repeatedly outpaces provisional synthesis,
      if no orientation can be stabilized even temporarily, or if coherence
      collapses whenever a rival future appears. But openness, non-lock-in,
      unresolved absence, and rival framing must not be automatically
      redescribed as fragmented integration. The case does not establish low Σ;
      it only makes provisional Σ a calibration requirement.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, person-type, moral verdict, or failure of
      maturity. Non-capture and legitimate rival formalization remain possible.

example_operator_chains_application:
  note: >
    The chains below apply PMS.yaml operator-chain discipline to the case. They
