  asymmetry_emergence:
    formula:
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Asymmetrical roles emerging from stabilized patterns."
    case_reading: >
      Asymmetry emergence is weak: it would require a concrete scene in which
      planning produces uneven power, exposure, vulnerability, capacity, or
      obligation.
    status: "weak"
  developmental_trajectory:
    formula:
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory is active in conceptual form because planning
      orients across possible futures and commitment timing. It is not a
      clinical or empirical developmental claim.
    status: "active"
  reflexive_praxis:
    formula:
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >
      Reflexive praxis is active as a bounded PMS projection: Φ, Χ, and
      provisional Σ allow planning to orient action without immediate closure.
    status: "active"
  self_binding_chain:
    formula:
      - "Ψ"
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Default repository chain for self-binding as structured self-relation."
    case_reading: >
      The self-binding chain is analytic-only. Reversible planning may include
      bounded commitment, but the case does not establish stable self-relation
      or full SELF_FIXPOINT.
    status: "analytic_only"

computational_representation:
  file_role: "case_application_representation"
  representation_scope: >
    This YAML encodes a PMS-based case analysis in machine-readable form. It
    does not implement praxis, agency, consciousness, selfhood, morality,
    diagnosis, legal judgment, or empirical validation.
  supports:
    - "machine_readable_loading"
    - "dependency_reasoning"
    - "operator_chain_validation"
    - "simulation_scaffolding"
    - "structural_analysis"
    - "agent_architecture_modeling"
    - "export_to_json_xml_graphviz"
