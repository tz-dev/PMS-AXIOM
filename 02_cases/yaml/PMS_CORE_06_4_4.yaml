core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a structure of praxis: planning, future-orientation,
      frame maintenance, reframing, distance, provisional integration, and
      bounded commitment. No person essence, psychology, diagnosis, or ontology
      is inferred.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ through Ψ are treated within PMS as a proposed
      minimal generative basis for praxis, without claiming final completeness
      or unique ordering.
    status: "satisfied"
    case_application: >
      Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators. No
      new PMS operator, axis, layer, primitive, or add-on is introduced.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS derives structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and drift patterns from operator
      compositions rather than independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, AD_A>>E, and AD_Sigma_low are
      treated as derived structures and activated only where their PMS formulas
      are warranted.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Ω and Θ are central PMS operators; responsibility, maturity, and
      dignity-in-practice are analyzed under temporal and asymmetrical
      conditions rather than static attributes.
    status: "satisfied"
    case_application: >
      Θ is central because reversible planning is explicitly future-oriented and
      temporally extended. Ω is weak and conditional because no affected parties,
      exposure, vulnerability, capacity, power gradient, or obligation asymmetry
      is specified.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality
      or imported either without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not imply
      direct implementation, guaranteed interoperability, or explanatory
      adequacy.
    status: "satisfied"
    case_application: >
      This YAML representation is not an implementation of reversible planning,
      not an agent architecture, not empirical validation, and not computational
      sufficiency.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not exempt from rivalry; comparison with alternative grammars,
      sharper models, or more empirically grounded formalisms remains open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including decision-theoretic option value,
      pragmatist experimentation, phenomenological futurity, systems feedback,
      design rollback, and ethical-political accounts of reversible commitment.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating
      rival formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture. Some praxis
      may remain partially legible or resist assimilation within the current
      grammar.
    status: "satisfied"
    case_application: >
      The analysis preserves the possibility that reversible planning may be
      better captured by uncertainty theory, option-value analysis, design
      modularity, ethical-political theory, or phenomenological accounts.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No pathology, trait, maturity level, avoidance pattern, indecision,
      competence judgment, risk status, or clinical category is inferred.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must remain tied to specific praxeological scenes, roles,
      and structures; global person-labels and irreversible ontological
      attributions are out of scope.
    status: "satisfied"
    case_application: >
      Because the case is abstract, the findings are bound to the case type:
      conceptual projection of a philosophical question about reversible
      planning.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, or
      decontextualized claims.

