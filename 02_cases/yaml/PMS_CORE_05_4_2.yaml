derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A>>E"
    - "AD_Sigma_low"
  usage_rule: >
    Derived structures are used only when their PMS.yaml formulas are respected.
    They are not independent axioms and do not override operator-level
    dependency discipline.
  rule: >
    If a derived structure is unsupported by the case material, it is marked
    weak, under-specified, not applicable, or application constraint rather than
    forced into the case.
  case_status: >
    Awareness_A is weak to active as framed differentiation of alternatives,
    Coherence_C is weak as the problem-space has structure but no final
    resolution, Responsibility_R is not applicable except as a conditional
    applied-scene possibility, Action_E is weak or under-specified,
    Dignity_in_Practice_D functions as an application constraint, and
    SELF_FIXPOINT is not established.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically. Within PMS it
      can be systematically derived from this operator sequence, but this does
      not imply that all notions of awareness are exhausted by it.
    case_reading: >
      Awareness_A is weak to active as sustained, framed differentiation of
      alternative theories, explanations, or interpretations. Θ remains weak
      because the case does not specify duration, but □ and Δ are central.
    status: "weak"
    calibration_points:
      - "Differentiate candidate alternatives within an explicitly named evidential frame and specify whether the differentiation is momentary or sustained across inquiry."
    non_capture_note: "Structural awareness is not phenomenological consciousness."

  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability of action, including meaningful
      absences and delays, without yet requiring full integration or
      self-binding. Rival theories may formalize coherence differently.
    case_reading: >
      Coherence_C is weak. The case has a coherent problem-space consisting of
      pressure toward determination, evidential framing, expected discrimination,
      and absence of decisive result; however this is not truth, validation, or
      final integration.
    status: "weak"
    calibration_points:
      - "Distinguish coherence of the underdetermination structure from truth, validity, forced integration, or narrative smoothing."
    non_capture_note: "Coherence is not proof of PMS adequacy or truth."

  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic in this specification.
      It is formally derived within PMS, not asserted as the only valid theory
      of responsibility.
    case_reading: >
      Responsibility_R is not applicable on the supplied material. No agent,
      institution, asymmetry, temporal obligation, recontextualized duty, or
      self-binding responsibility is provided. It would become conditional only
      in an applied decision scene.
    status: "not_applicable"
    calibration_points:
      - "Identify Ω, Θ, Φ, and Ψ in a concrete scene before claiming responsibility; none is sufficiently supplied here."
    non_capture_note: "Responsibility is not inferred from unresolved evidence."

  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into a coherent enactment."
    notes: >
      Action here is not any behavior; it is integrated and temporally extended.
      Higher operators such as Ω, Φ, and Ψ may enrich it, but are not required
      for its minimal structural definition within PMS.
    case_reading: >
      Action_E is under-specified. The case concerns abstract evidential
      non-determination rather than integrated realization of directedness across
      time. Action would require a decision procedure, deadline, or enacted
      response.
    status: "under_specified"
    calibration_points:
      - "Distinguish action from abstract theory choice, conceptual comparison, or possible future decision under underdetermination."
    non_capture_note: "Action is not inferred from the mere possibility of selection."

  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how
      asymmetry is handled, not the ranking of persons or ontological worth.
    case_reading: >
      Dignity_in_Practice_D is an application constraint rather than a
      case-internal derived axis. It requires that the analysis not rank persons,
      pathologize disagreement, moralize rival theories, or turn non-fit into
      failure.
    status: "application_constraint"
    calibration_points:
      - "Check that any later asymmetric application handles vulnerability without ranking, shaming, diagnostic labeling, or irreversible tribunal judgment."
    non_capture_note: "Dignity-in-Practice is not ontological dignity or moral superiority."

self_model_analysis:
