  welcome_message: >
    This case uses PMS as a structural operator model. PMS is non-psychological,
    non-diagnostic, non-clinical, non-prescriptive, and non-metaphysical in its
    claims.
  modes:
    - id: "axiomatic"
      title: "Axiomatic / theory mode"
      description: "Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions."
      case_status: "active"
      case_application: >
        Axiomatic mode is used to map the case to PMS operators Δ through Ψ
        while preserving dependencies and non-capture.
    - id: "derived_axes_inspection"
      title: "Derived axes mode"
      description: "Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis."
      case_status: "active"
      case_application: >
        Derived axes mode is used only to assess formula-derived structures as
        weak, not applicable, under-specified, or application constraints.
    - id: "ai_architecture"
      title: "AI architecture mode"
      description: "Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing."
      case_status: "not_applicable"
      case_application: >
        AI architecture mode is not applicable because the case does not specify
        an AI system, implementation, agent design, or computational validation.
  guardrails:
    general:
      - "Do not infer mental states, traits, or diagnoses."
      - "Do not anthropomorphize abstract structures."
      - "Do not convert PMS coherence into truth."
      - "Do not treat PMS as PMS Base validation."
      - "Do not erase rival formalizations or non-capture."
  suggested_questions:
    - "What structural operators are involved in this pattern of praxis?"
    - "What asymmetries or temporal trajectories are visible?"
    - "Where do recontextualization, distance, and integration appear?"
    - "Which derived axes are active, weak, or not applicable?"
    - "What remains tentative, rival-readable, or outside PMS capture?"
  case_answer_to_suggested_questions:
    structural_operators_involved:
      - "Δ"
      - "□"
      - "Λ"
      - "Φ"
      - "Χ"
      - "∇ weak"
      - "Α weak"
      - "Θ weak"
      - "Σ weak"
      - "Ψ weak procedural"
      - "Ω not established"
    asymmetries_and_temporal_trajectories_visible: >
      Ω is not visible in the abstract case because no asymmetrical roles or
      obligations are given. Θ is weak because underdetermination may persist
      through inquiry, but no temporal sequence or trajectory is specified.
    recontextualization_distance_integration: >
      Φ is active as multiple framings of the same evidence, Χ is active as
      reversible suspension of closure, and Σ is weak because integration into a
      single determination is precisely not warranted by the case material.
    derived_axes_projection: >
      Awareness_A is weak through framed differentiation, Coherence_C is weak as
      a structured problem-space, Responsibility_R is not applicable, Action_E is
      under-specified, and Dignity_in_Practice_D is an application constraint.
    tentative_calibration_rivalry: >
      The PMS reading remains tentative because rival formalizations may better
      capture theory-evidence relations, compatibility, non-identifiability,
      semantic ambiguity, or confirmation structure. Non-capture is preserved.

analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary: []
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The analysis may map the conceptual structure of underdetermination into
      PMS operators, but it may not infer empirical findings, metaphysical
      conclusions, diagnoses, legal-forensic status, implementation behavior,
      responsibility, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The PMS reading can become too smooth because Δ, □, Λ, Φ, and Χ readily
      fit the case. That fit may under-discriminate among empirical equivalence,
      interpretive plurality, temporary ignorance, semantic ambiguity, principled
      non-identifiability, and methodological pluralism.
    mitigation: >
      Mitigation requires explicit discrimination tests, rival readings,
      non-capture zones, falsifier conditions, weak marking for unsupported
      operators, and refusal to treat PMS coherence as sufficient for truth or
      final determination.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structure of differentiated alternatives, framed evidential
      relevance, absent discriminating criterion, rival recontextualizations, and
      reflective suspension of closure.
    discrimination_requirement: >
      The PMS reading must distinguish underdetermination from ordinary
      uncertainty, ignorance, ambiguity, pluralism, disagreement, legal
      insufficiency, and diagnostic undecidability.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish underdetermination from ordinary lack of information."
      expected_pms_distinction: >
        Underdetermination requires Δ alternatives within □ and Λ absence of a
        discriminating criterion despite compatibility; ordinary ignorance may
        lack a structured compatibility frame or expected discriminating
        non-event.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish rival formalization from PMS recontextualization."
      expected_pms_distinction: >
        Φ may model alternative framing only if a shared structure is placed into
        new frames; rival formalizations may operate outside PMS capture and must
        not be automatically assimilated.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinguishes the compatible alternatives in this case?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What structural pressure toward theory, explanation, or interpretation selection is actually present?"
      current_calibration: "weak"
    - operator: "□"
      question: "What evidential or interpretive frame determines relevance and compatibility?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "What discriminating event, criterion, or evidence is absent within that frame?"
      current_calibration: "satisfied"
    - operator: "Α"
      question: "Is underdetermination recurrent or stabilized across inquiry cycles?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "Is any asymmetry of power, exposure, capacity, obligation, or role position present?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "Is the underdetermination static, temporary, persistent, historical, or principled?"
      current_calibration: "weak"
    - operator: "Φ"
      question: "Are alternatives genuine recontextualizations of shared evidence or different formal systems?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "Does reflective distance preserve reversibility without becoming empty neutrality?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "Does integration discriminate among alternatives or merely force coherence?"
      current_calibration: "weak"
    - operator: "Ψ"
      question: "Is there an agent or institution self-binding over time, or only procedural analytic restraint?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "The logical or confirmation-theoretic relation between evidence and theory may not be captured by PMS operator grammar; model theory, Bayesian confirmation, hermeneutics, or philosophy of science may be more discriminating."
      - "The case may concern semantic, formal, or epistemic compatibility rather than praxis, and such compatibility may not require PMS operators beyond a loose structural analogy."
      - "The absence of decisive evidence may be a principled feature of the domain, a temporary evidential deficit, a methodological limitation, or a result of frame choice; PMS must not collapse these into one reading."
      - "A rival theory may reject the PMS framing itself rather than merely occupy another Φ-recontextualization inside PMS."
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration
      residue, incomplete integration, structured absence, immature praxis,
      failed responsibility, or resistance to integration. They may mark genuine
      limits of the PMS reading, legitimate rival formalization, or a domain
      whose decisive structures are not primarily praxeological.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Underdetermination as a confirmation-theoretic or model-theoretic relation among empirically equivalent theories rather than a praxeological structure."
      - "Underdetermination as Bayesian non-identifiability or insufficient posterior discrimination under shared evidence."
      - "Underdetermination as hermeneutic plurality, where several interpretations remain textually or contextually admissible without implying deficiency."
      - "Underdetermination as decision-theoretic uncertainty, where action may be required even though theory choice remains unresolved."
      - "Underdetermination as temporary lack of evidence, in contrast to principled non-uniqueness."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
      In this case, no such comparative test is supplied, so rivalry is
      preserved rather than domesticated as merely incomplete PMS calibration.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading is weakened if no stable alternatives, no shared evidence
        frame, or no structured absent discriminating criterion can be identified.
    - id: "F2"
      condition: >
        PMS is under-discriminating if it cannot distinguish empirical
        equivalence, interpretive plurality, temporary ignorance, semantic
        ambiguity, methodological pluralism, and principled non-identifiability.
    - id: "F3"
      condition: >
        The reading over-assimilates if every rival formalization, disagreement,
        absence, or non-fit is automatically translated into Φ, incomplete Σ,
        drift, maturity failure, or PMS-internal residue.
    - id: "F4"
      condition: >
        The reading is overextended if it infers Ω, Responsibility_R,
        Dignity-in-Practice as a case-internal axis, SELF_FIXPOINT, or drift
        patterns without a concrete scene involving asymmetry, temporality,
        obligation, or self-binding.
    - id: "F5"
      condition: >
        The reading fails as PMS application if Χ is suspended in order to force
        closure, rank rival theories, claim PMS superiority, or treat PMS
        coherence as sufficient evidence of capture.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The application is usable as a reversible conceptual PMS projection
      centered on Δ, □, Λ, Φ, and Χ, with weak or non-active status for
      unsupported operators. It remains bounded by high coherence risk, partial
      discrimination, and preserved non-capture.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical, or
    applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: "A specified set of distinct candidate theories, explanations, or interpretations."
      ∇: "A specified pressure, task, or orientation toward selecting, explaining, deciding, or acting."
      □: "A stated evidential, interpretive, methodological, legal, or decision frame that determines relevance."
      Λ: "A specified absent or unavailable discriminating observation, criterion, result, or expected occurrence."
      Α: "Evidence of recurrence, stabilization, path dependence, or repeated underdetermination across attempts."
      Ω: "Evidence of directional power, exposure, vulnerability, capacity, role, or obligation asymmetry."
      Θ: "Evidence of temporal sequence, delay, persistence, historical trajectory, or anticipated future inquiry."
      Φ: "Identifiable source and target frames showing how the same evidence is recontextualized."
      Χ: "Procedural markers of suspension, reflective distance, reversibility, and restraint from premature verdict."
      Σ: "Criteria showing when integration is warranted, partial, deferred, or prohibited."
      Ψ: "Evidence of self-binding by an agent, institution, or analytic procedure across time."
    negative_cases:
      - "A case of ordinary ignorance with only one vague hypothesis and no structured set of compatible alternatives would not satisfy the same PMS reading."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The supplied case material is
    conceptual and lacks evidence sets, formal alternatives, compatibility
    criteria, temporal sequence, asymmetry, decision procedure, empirical data,
    computational representation, or applied validation protocol.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: "The case is not treated as a mental state, cognitive defect, attitude, anxiety, indecision, or personality trait."
    non_metaphysical: "The analysis does not claim that reality itself is indeterminate; it only treats evidential insufficiency relative to compatible alternatives."
    non_diagnostic: "No person, group, theory-holder, or institution is diagnosed, ranked, pathologized, or assigned maturity failure."
    non_legal_forensic: "No legal burden, forensic standard, evidentiary rule, culpability finding, or tribunal conclusion is inferred."
    non_implementation_claim: "No software, AI system, decision architecture, computational model, or implementation behavior is claimed."
    non_moral_ranking: "Rival theories and interpreters are not morally ranked; disagreement and non-fit are not treated as failure."
    non_exhaustive_capture: "PMS capture remains partial and reversible; rival formalizations may be more precise for theory-evidence relations."
    reversibility: "The reading can be withdrawn or revised if a concrete scene, decisive evidence, alternative formalization, or stronger discriminating criterion is supplied."
    dignity_in_practice: "Dignity-in-Practice is preserved by avoiding ontological ranking, shaming, diagnostic labeling, and irreversible attribution under unresolved evidence."

limits:
  - "The PMS reading is limited to conceptual pre-structuring of underdetermination; it does not determine which theory, explanation, or interpretation is correct."
  - "The case does not warrant empirical, metaphysical, diagnostic, clinical, legal-forensic, implementation, or PMS Base validation claims."
  - "Rival readings remain open, and some aspects of underdetermination may belong more properly to confirmation theory, model theory, Bayesian epistemology, hermeneutics, or decision theory."
  - "Because the PMS mapping is coherent, there is a high risk of over-smooth assimilation unless falsifiers, discrimination tests, and non-capture zones remain active."

case_synthesis:
  primary_pms_reading: >
    Underdetermination is read as a framed differentiation of compatible
    alternatives in which a discriminating event or criterion is absent, allowing
    rival recontextualizations while requiring reflective distance from premature
    closure.
  continuity_condition: >
    Continuity is relevant only if the same underdetermined relation persists
    across inquiry over time; the supplied material does not establish that
    trajectory.
  change_condition: >
    Change would occur if new evidence, a new criterion, or a revised frame
    transformed compatibility relations and allowed or altered discrimination
    among alternatives.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, and rival framing are preserved
    as possible non-capture or rival formalization rather than automatically
    translated into drift, incomplete integration, or recontextualization failure.
  responsibility_condition: >
    Responsibility is not applicable unless a later concrete scene introduces an
    agent or institution self-binding under asymmetrical obligation across time.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by preventing person-ranking,
    diagnosis, moralized hierarchy, and irreversible labeling under unresolved
    determination.
  rival_reading_condition: >
    Rival formalizations remain open wherever they better specify compatibility,
    evidential support, confirmation, interpretation, or decision under
    uncertainty.

final_structural_formula:
  primary_formula: "Χ ∘ Φ ∘ Λ ∘ □ ∘ Δ"
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    Within PMS_1.3, underdetermination is a reversible conceptual projection in
    which differentiated compatible alternatives are held within an evidential
    frame lacking decisive discrimination, so rival recontextualizations remain
    open under reflective distance rather than forced integration.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity, implementation
    validity, moral ranking, or PMS Base validation.