operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the distinction among multiple candidate theories, explanations,
      or interpretations that remain compatible with the available evidence. It
      also marks the distinction between evidence, alternative, and
      discriminating criterion.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the alternatives are genuinely distinct theories, explanations, or interpretations rather than mere paraphrases of one option."
      - "Check whether the distinctions are imported from a philosophy-of-science frame, an interpretive frame, or another frame; avoid conflating alternative theories with alternative evidence sets."
    falsifier_conditions:
      - "If the alternatives cannot be differentiated in a stable way, the PMS reading loses its Δ entry point and becomes an empty claim of plurality."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.

  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is weakly present as the structural pressure toward explanation,
      interpretation, adjudication, or theory selection that arises once
      differentiated alternatives are recognized. No subjective desire or
      agentive drive is inferred.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Treat the tension as explanatory and structural, not affective or psychological."
      - "Do not infer desire, anxiety, will, or institutional pressure unless a concrete scene later supplies such evidence."
    falsifier_conditions:
      - "If the case is read as a purely static logical relation with no pressure toward determination, ∇ should remain only backgrounded or inactive."
    non_capture_note: >
      Impulse does not imply psychology or subjective motivation.

  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active as the evidential and interpretive frame within which evidence
      counts as relevant and alternatives are assessed as compatible. Without
      such a frame, underdetermination cannot be discriminated from vague
      uncertainty.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as evidential comparison among theories, explanations, or interpretations under shared available evidence."
      - "Mark any shift from empirical-evidential, interpretive, legal, semantic, or methodological framing instead of treating all frames as interchangeable."
    falsifier_conditions:
      - "If no relevance frame can be specified, the analysis becomes too abstract to distinguish underdetermination from ordinary ignorance or ambiguity."
    non_capture_note: >
      The frame must remain explicit and must not become an unexamined PMS
      totalization.

  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active as the structured absence of a decisive discriminating event,
      criterion, observation, or interpretive result that would select one
      alternative from the compatible set.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected discriminating evidence or criterion and the frame within which its absence matters."
      - "Preserve the possibility that the absence indicates PMS non-capture, rival-formalization priority, or under-specification rather than a defect in the case."
    falsifier_conditions:
      - "If no structured expectation of discrimination exists, Λ should not be asserted and the case may be merely plural rather than underdetermined."
    non_capture_note: >
      Absence must not be automatically converted into defect, drift, failure,
      or maturity problem.

  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak and conditional. The case material does not show recurrence,
      stabilization, path dependence, or a repeated role-script; an attractor
      would be warranted only if underdetermination recurs or stabilizes across
      inquiry cycles.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Show recurrence across repeated comparisons, experiments, interpretations, or institutional decisions before treating underdetermination as an attractor."
      - "Distinguish persistent structural underdetermination from a one-time lack of evidence."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown, Α remains conditional and must not be used to derive drift patterns or asymmetry."
    non_capture_note: >
      Pattern language must not replace evidence of recurrence.

  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is not case-internally established. The abstract material supplies no
      asymmetry of power, exposure, vulnerability, capacity, obligation,
      responsibility, or role position. Ω would become relevant only in an
      applied scene where unresolved determination affects differently
      positioned parties.
    dependency_status: "not_active"
    analytic_weight: "not_active"
    calibration_points:
      - "Specify any direction and kind of asymmetry before using Ω; none is supplied by the abstract case material."
      - "Do not moralize underdetermination or rival interpretation as fault, weakness, or hierarchy."
      - "Allow Ω to remain absent unless later case material introduces authority, vulnerability, burden, or obligation."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must remain removed, weak, or strictly conditional."
    non_capture_note: >
      Asymmetry must not be inflated from mere disagreement or plurality.

  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is weak. Underdetermination can be considered at a moment of comparison,
      but temporality becomes relevant if inquiry continues, evidence is awaited,
      alternatives persist, or suspension of judgment becomes a trajectory.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Distinguish a static relation among compatible alternatives from a diachronic inquiry trajectory."
      - "Check whether temporality is essential to the case or only introduced by an applied decision context not present here."
    falsifier_conditions:
      - "If the case is only a timeless logical relation and no sequence, delay, persistence, or trajectory is in scope, Θ should not be treated as central."
    non_capture_note: >
      Temporality must not be asserted merely because analysis unfolds in time.

  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active with weak dependency support: the same evidence can be placed
      into more than one theory, explanation, or interpretation. This models
      alternative recontextualizations without deciding that every rival
      formalization is reducible to PMS recontextualization.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Identify the source frame as the shared evidence and the target frames as the candidate theories, explanations, or interpretations."
      - "Check whether recontextualization clarifies compatibility or merely absorbs non-fit and rival theories too smoothly."
    falsifier_conditions:
      - "If every resistance, rupture, or rival account is absorbed as Φ, the reading becomes over-assimilative and loses non-capture."
    non_capture_note: >
      Rival formalizations may exceed or bypass PMS recontextualization.

  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as reflective distance, suspension of premature closure, and
      reversible meta-positioning toward rival alternatives. It is also an
      application guardrail preventing forced verdict, diagnosis, ranking, or
      PMS self-validation.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Check whether the analysis suspends verdict and preserves reversibility rather than converting PMS coherence into final determination."
      - "Distinguish distance from avoidance, empty neutrality, or refusal to discriminate if future evidence becomes available."
    falsifier_conditions:
      - "If Χ is suspended to force a verdict, assert PMS capture, or rank rival readings, the PMS application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.

  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak and deliberately constrained. The case concerns insufficient
      warrant for a single integrated determination, so PMS must not force
      synthesis merely because a coherent operator formula can be written.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Test whether any integration discriminates among alternatives or merely smooths over unresolved compatibility."
      - "Distinguish limited structural integration of the problem-space from integration that selects the true or best theory."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, Σ is overclaimed and the PMS reading becomes under-discriminating."
    non_capture_note: >
      PMS coherence is insufficient by itself.

  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and procedural only. No selfhood, self-relation,
      autobiographical coherence, or responsibility-as-self-commitment is
      supplied by the case material. At most, the analysis self-binds to
      reversible inquiry discipline.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only as analytic self-binding to restraint unless a concrete agent or institution binds itself to inquiry norms over time."
      - "Do not attribute selfhood, maturity, or responsibility to abstract theories, evidence, or non-subjects."
    falsifier_conditions:
      - "If Ψ is applied without Σ, Θ, and Χ being sufficiently supported by the case, the self-binding reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 carries the core of the case: Δ differentiates compatible alternatives,
      ∇ weakly marks pressure toward determination, □ supplies the evidential
      frame, Λ marks the missing discriminating result, and Α remains weak unless
      recurrent underdetermination is shown.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is mostly conditional: Ω is not established by the abstract material,
      and Θ is weak unless the underdetermination persists across inquiry,
      delay, or decision trajectories.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 supplies the main application discipline: Φ models alternative framing
      of the same evidence, Χ preserves reflective non-closure, and Σ remains
      weak because the case does not warrant forced integration into one
      determination.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is not primary. Ψ appears only as procedural analytic self-binding to
      reversible, non-totalizing PMS use; it is not a case-internal claim about
      selfhood.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Δ is satisfied because the case explicitly concerns multiple compatible alternatives."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "∇ is weak because there is structural pressure toward determination, but no concrete agentive drive is supplied."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "□ is satisfied because underdetermination presupposes a frame in which evidence is relevant and alternatives are compatible."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Λ is satisfied because the decisive discriminating evidence or criterion is absent within the frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Α is weak because recurrence or stabilization is not shown by the abstract material."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Ω is not active because no asymmetry of power, exposure, capacity, role, or obligation is supplied."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Θ is weak because persistence, delay, or trajectory is possible but not specified."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Φ is weakly dependency-supported because alternative recontextualizations are central, while Θ and Ω dependencies are not strongly established in a concrete scene."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Χ is weakly dependency-supported as an application constraint because reflective distance is necessary for reversible non-closure, while its case-internal dependencies remain partly conditional."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Σ is weak because synthesis is not warranted as a final determination among alternatives."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Ψ is weak because only analytic self-binding to restraint is present; no case-internal self-relation is established."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

