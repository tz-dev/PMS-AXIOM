schema_version: PMS_1.3
schema_role: case_application
analysis_mode: axiomatic
template_status: pms_yaml_aligned_case_application_template
template_purpose: 'Template for rendering a PMS_1.3-conformant case analysis. This template applies PMS.yaml as repository
  reference. It does not replace PMS.yaml, redefine PMS Base, introduce new PMS operators, or treat derived structures as
  independent primitives.'
repository_reference:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  reference_file: PMS.yaml
  reference_status: repository_reference
  repository_role: current_base_schema
  reference_last_updated: '2026-04-06'
  base_schema_status: repository_reference
  compliance_note: 'This case analysis applies PMS_1.3 as the current repository reference. It does not redefine PMS operators,
    alter the default repository order, introduce new meta-axioms, treat derived axes as independent primitives, override
    PMS application guardrails, or claim PMS Base validation.'
schema_meta_alignment:
  pms_schema_version: PMS_1.3
  case_schema_version: PMS_1.3
  alignment_status: aligned_to_repository_reference
  pms_base_priority_rule: PMS.yaml takes priority over template text, bridge layers, domain overlays, prior case analysis,
    implementation schemas, or generated commentary.
  template_role: application_schema_only
  prior_analysis_role: application_aid_only
  conflict_resolution: if_conflict_use_pms_yaml
repository_governance_alignment:
  reference_constraints:
  - PMS.yaml is the only PMS Base reference for this case.
  - This case file does not modify, extend, rewrite, or supersede PMS.yaml.
  - Domain examples, case interpretations, computational representations, or critique layers are not PMS Base unless explicitly
    defined in PMS.yaml.
  - Derived structures are treated as formula-derived PMS constructs, not independent axioms.
  - PMS Base validation is not claimed by successful case application.
  base_revision_status: no_base_revision
  pms_base_validation_claimed: false
  domain_overlay_status: none_claimed_as_base
pms_entry_condition:
  source: PMS.yaml:application_entry_gate
  application_gate:
    status: accepted_for_this_application
    conditions:
      Distance_Chi:
        operator: Χ
        requirement: maintained reflective distance; no fusion into verdict, urgency, enforcement, or person-level attribution
        status: maintained
      reversibility:
        requirement: all structural readings are scene-bound, revisable, and non-final; no irreversible labels or global
          person claims
        status: maintained
      Dignity_in_Practice_D:
        derived_structure: Dignity_in_Practice_D
        requirement: enacted restraint under asymmetry; no shaming, ranking, humiliation, or ontological evaluation of persons
          or groups
        status: maintained
    gate_result: valid_as_pms_application
    note: 'This gate constrains application only. PMS may be criticized, rejected, revised, or ignored without satisfying
      it.'
application_discipline:
  self_binding_clause:
    source: PMS.yaml:self_binding_clause_application_discipline
    status: active
    rule: 'Any application of PMS is itself subject to PMS. Analyses that suspend Distance (Χ), Self-Binding discipline
      (Ψ), or Dignity-in-Practice (D) in order to enforce truth, clarity, authority, resolution, or action are formally
      invalid as PMS applications within the present usage convention.'
    application_to_this_case: The analysis is self-bound to PMS.yaml by suspending verdict on which truth theory is correct,
      preserving reversibility, avoiding total capture, and treating the truth-theory field as a bounded conceptual projection
      rather than as a concrete scene or tribunal.
  application_only_boundary:
    status: active
    rule: This document is a PMS case application, not a PMS Base extension.
  non_capture_rule:
    status: active
    rule: 'Uncaptured residue, resistance, rupture, disagreement, non-fit, or rival framing must not automatically be translated
      into PMS drift, incomplete calibration, incomplete integration, recontextualization, or maturity failure.'
  no_pms_base_revision:
    status: active
    rule: 'All operator definitions, dependencies, provides-fields, derived formulas, and guardrails remain governed by PMS.yaml
      only.'
case:
  title: Truth theories
  interpretation_type: comparative_theoretical_case
  case_type: philosophical_meta_theoretical_truth_theory_comparison
  claim_status: conceptual_pms_projection
  not_a_concrete_scene: true
  empirical_status: not_empirical
  result_status: reversible_case_bound_projection
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: This application analyzes the case material as a conceptual field of rival accounts of truth, including correspondence,
    coherence, pragmatic success, semantic structure, deflationary use, plural functions, and related accounts of what makes
    a statement, belief, proposition, or claim true. PMS is used only to map structural differences, framing patterns, recontextualizations,
    weak or conditional dependencies, non-capture zones, and application guardrails.
  non_scope: This application does not prove any theory of truth, decide the metaphysics of truth, validate semantic theories,
    diagnose philosophers or schools, establish empirical findings, provide legal or forensic criteria, implement a computational
    model, rank persons or traditions, or validate PMS Base.
  non_goals:
  - metaphysical_proof
  - diagnostic_assessment
  - legal_or_forensic_judgment
  - person_ranking
  - irreversible_labeling
  - pms_base_validation
  case_typing_note: This is not a concrete praxis scene. It is a comparative theoretical and conceptual-domain projection
    in which PMS operators are used to map how truth-theory frames differ, stabilize, conflict, or resist integration while
    remaining open to rival formalizations.
template_compliance:
  required_sections_present:
  - repository_reference
  - schema_meta_alignment
  - repository_governance_alignment
  - pms_entry_condition
  - application_discipline
  - case
  - core_principle_alignment
  - pms_model_reference_application
  - operator_analysis
  - operator_layer_mapping
  - dependency_logic
  - dependency_table_reference
  - derived_structure_discipline
  - derived_axes_projection
  - self_model_analysis
  - asymmetry_drift_patterns
  - example_operator_chains_application
  - computational_representation
  - ai_interface_pms_alignment
  - analysis_quality_control
  - operationalization_requirements
  - guardrails
  - limits
  - case_synthesis
  - final_structural_formula
  pms_yaml_alignment_status: complete
  missing_sections: []
  known_limitations:
  - The case material supplies no concrete praxis scene, institutional setting, evidence base, temporal sequence, agent,
    or action trajectory.
  - The PMS reading remains a conceptual projection and does not validate PMS Base or adjudicate truth theories.
  validation_checks:
    valid_yaml: true
    no_new_pms_operators: true
    no_redefined_pms_base: true
    all_operators_present: true
    all_operator_dependencies_preserved: true
    dependency_table_reference_present: true
    dependency_table_reference_matches_pms_yaml: true
    all_derived_axes_formula_based: true
    self_fixpoint_treated_as_derived: true
    drift_patterns_not_diagnostic: true
    quality_control_present: true
    falsifier_conditions_present: true
    possible_non_capture_preserved: true
core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: 'PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities
      or psychological essences.'
    status: partial
    case_application: The case is not a concrete enactment, role scene, or action sequence, so praxeological focus is limited
      to conceptual structures of theoretical framing and dispute rather than persons, psychology, or ontology.
    failure_condition: 'The analysis would fail P1 if it generated global person-labels, psychological essence claims,
      or ontological person rankings.'
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: 'The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis. Whether
      they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization and critique.'
    status: satisfied
    case_application: Only the eleven PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators. No additional
      operators, axes, layers, or primitives are introduced as PMS Base.
    failure_condition: 'The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged
      to PMS Base.'
  P3_generativity:
    id: P3
    title: Generativity
    base_text: 'PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action,
      dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator compositions
      rather than introduced as independent primitives.'
    status: satisfied
    case_application: Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and drift
      patterns are treated as formula-derived PMS constructs and not as independent axioms.
    failure_condition: 'The analysis would fail P3 if derived structures were treated as independent axioms.'
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: 'Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, maturity, and
      dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes.'
    status: partial
    case_application: Ω and Θ are explicitly calibrated as weak or conditional because the case material gives theoretical
      frames but no concrete asymmetry, role exposure, temporal sequence, or action trajectory.
    failure_condition: 'The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without
      calibration.'
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: 'PMS may be represented computationally, but representation does not by itself imply direct implementation,
      guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints, and evaluation.'
    status: satisfied
    case_application: The YAML representation is a case-application record only. It is not an implementation, simulation,
      empirical test, semantic engine, or validation of PMS.
    failure_condition: 'The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational
      sufficiency.'
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: 'PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models,
      or more empirically grounded formalisms remains methodologically open.'
    status: satisfied
    case_application: Rival readings remain open, including formal semantic, metaphysical, logical, pragmatic, deflationary,
      pluralist, and epistemological accounts of truth that may discriminate the domain more sharply than PMS.
    failure_condition: 'The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default.'
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: 'PMS applications must preserve possible non-capture. Not every case, rupture, absence, disagreement, or rival
      framing must be redescribed as PMS structure.'
    status: satisfied
    case_application: Possible non-capture is preserved for the metaphysical nature of truth, truth-makers, semantic validity,
      logical argument, and any resistance of deflationary or rival theories to PMS translation.
    failure_condition: 'The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration
      failure.'
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: 'PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking
      decisions.'
    status: satisfied
    case_application: No person, school, philosopher, institution, or group is diagnosed, ranked, pathologized, or treated
      as a moral type.
    failure_condition: 'The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.'
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: 'Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global
      person-labels and irreversible ontological attributions are out of scope.'
    status: satisfied
    case_application: Because no concrete scene is supplied, the analysis is explicitly case-type-bound as a non-concrete
      comparative theoretical projection and does not generate global or irreversible claims.
    failure_condition: 'The analysis would fail P9 if it generated global, irreversible, decontextualized claims.'
pms_model_reference_application:
  ordering_status:
    interpretation: 'The PMS default order is treated as the current repository dependency path. It is not treated as uniquely
      necessary, final, or proof of PMS completeness.'
    repository_role: 'This case follows PMS_1.3 order and dependencies unless explicitly marked as critique or rival formalization.'
  operator_inventory:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  operator_inventory_status: no_additional_pms_operators_introduced
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Δ is active because the case is constituted by structural distinctions among accounts of truth and among
      statement, belief, proposition, claim, truth-maker, use, success, coherence, correspondence, semantic structure, and
      plural function.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The operative distinctions are among rival truth-theory frames and among the different relata or criteria each frame
      privileges.
    - The distinctions must be kept as philosophical distinctions, not collapsed into PMS categories or treated as evidence
      of PMS superiority.
    falsifier_conditions:
    - If the case were redescribed without stable differences among truth accounts, PMS would lose its entry point for this
      application.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: '∇ is weakly active as explanatory or argumentative pressure: the differences among truth theories generate
      a directed need to clarify what counts as truth, truth-making, validity, use, success, or function. No psychological
      desire or concrete action drive is inferred.'
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - The tension is argumentative and explanatory, not affective, clinical, institutional, or practical unless further case
      material supplies such a scene.
    - The analysis must not infer subjective motivation of philosophers or theory adherents from the existence of conceptual
      disagreement.
    falsifier_conditions:
    - If the case contains only a neutral list of theories with no explanatory pressure or problem orientation, ∇ should
      be reduced to weak or not active.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is active because each theory of truth functions as a frame that constrains relevance; correspondence
      privileges relation to fact or reality, coherence privileges systemic fit, pragmatic accounts privilege success in
      practice, semantic accounts privilege formal structure, deflationary accounts privilege use, and pluralist accounts
      privilege multiple functions.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frames are the truth-theory accounts named in the case material.
    - Frame shifts must be marked as shifts among philosophical accounts rather than treated as automatic PMS recontextualization.
    falsifier_conditions:
    - If no theory-frame or relevance-structure can be identified, the PMS reading becomes too abstract to discriminate among
      the truth theories.
    non_capture_note: 'A frame is a structural context, not proof that the frame is valid.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: Meaningful absence, non-occurrence, delay, omission, or latent expectation.
    depends_on:
    - □
    provides:
    - expectation_structure
    - negative_space
    - delayed_actualization
    - absence_as_structural
    examples:
    - expected response not received
    - promise not kept
    - ritual omission
    status_within_pms: treated_as_structurally_basic
    role_in_case: Λ is active but bounded where an expected sufficiency, fit, truth-maker, closure, or resolution is absent
      within a given truth-theory frame. Such absence may be philosophically meaningful, but it must not be treated as PMS
      drift, failure, immaturity, or incomplete integration by default.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - The expected occurrence is theory-specific sufficiency or explanatory closure within a named truth-theory frame.
    - Absence, non-fit, or unresolved disagreement may mark genuine PMS non-capture or a rival formalization rather than
      a defect in the case.
    falsifier_conditions:
    - If no structured expectation is specified within any truth-theory frame, Λ should be marked weak rather than active.
    non_capture_note: 'Non-event must not be used to pathologize silence, refusal, disagreement, or non-fit.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Stabilizing pattern that draws repetition, orientation, or role formation.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_stability
    - recurrence
    - path_dependence
    - role_stabilization
    examples:
    - habit loop
    - recurring conflict pattern
    - institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is active because correspondence, coherence, pragmatic, semantic, deflationary, and plural-function
      accounts appear as stabilized theoretical attractors or recurring forms of organizing the truth question.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - The relevant stabilization is recurrence as a recognizable theoretical account or family of accounts, not mere repetition
      of vocabulary.
    - A stable attractor must be distinguished from a loose list of examples or an accidental aggregation of views.
    falsifier_conditions:
    - If the listed truth accounts are not treated as recurrent or stabilized theoretical forms, Α is over-read and should
      be downgraded.
    non_capture_note: 'Attractor status does not prove adequacy, maturity, or normativity.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Directional imbalance in role, power, exposure, vulnerability, capacity, or responsibility.
    depends_on:
    - Α
    provides:
    - role_asymmetry
    - responsibility_gradient
    - exposure_difference
    - power_directionality
    examples:
    - parent/child dependency
    - teacher/student grading power
    - doctor/patient vulnerability
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is weak and conditional. The case permits only possible explanatory asymmetries, such as one theory
      claiming priority over another or one criterion being treated as authoritative. It does not provide concrete power,
      exposure, vulnerability, role obligation, or responsibility asymmetry.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - The only supported asymmetry is conceptual or explanatory priority among theory-frames; no human, institutional, legal,
      or moral asymmetry is established.
    - Asymmetry must not be moralized, psychologized, or treated as a person-ranking.
    - Ω may remain weak or absent because the case material does not supply a concrete asymmetrical scene.
    falsifier_conditions:
    - If no directional imbalance beyond theoretical contrast is identifiable, Ω claims must remain weak or be removed.
    non_capture_note: 'Asymmetry is structural, not moral condemnation.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal extension, sequencing, persistence, anticipation, and trajectory.
    depends_on:
    - Ω
    - Α
    provides:
    - trajectory
    - sequencing
    - developmental_path
    - persistence_and_revision
    examples:
    - gradual role change
    - escalation over time
    - long-term commitment
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is weak and conditional. The case does not supply a historical sequence, developmental trajectory, persistence
      across action, anticipation, delay, or temporally extended commitment. Temporality may enter only if a later application
      adds historical development or theory-change.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - The current comparison is mostly static; diachronic trajectory must not be inferred from the existence of multiple
      theories.
    - Temporality is incidental in the given material unless additional evidence specifies sequence, persistence, revision,
      or development.
    falsifier_conditions:
    - If no temporal extension or sequence is required for the case, Θ must not be treated as a major active operator.
    non_capture_note: 'Not every pattern requires developmental interpretation.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation of meaning or function when a structure is placed into a new context.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - frame_shift
    - meaning_transformation
    - reinterpretation
    - contextual_translation
    examples:
    - joke becomes insult in another setting
    - private habit becomes public role
    - conflict becomes lesson
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Φ is active because the case changes when truth is placed under different frames: fact-relation, system-coherence,
      practical success, semantic structure, deflationary use, plural function, or other accounts. This is recontextualization
      at the level of conceptual framing, not proof that PMS absorbs the theories or that frame-shift itself resolves the
      philosophical problem of truth.'
    dependency_status: partially_satisfied_in_conceptual_projection
    analytic_weight: major
    calibration_points:
    - Source and target frames are the named truth-theory accounts, such as correspondence to coherence, coherence to pragmatic
      success, semantic structure to deflationary use, or monist to plural-function readings.
    - Because Ω and Θ are weak in this non-concrete case, Φ is active only as conceptual frame-shift, not as fully grounded
      concrete recontextualization across role asymmetry, temporal consequence, or enacted practice.
    - Recontextualization must clarify frame-shifts without absorbing all disagreement, resistance, rupture, absence, or
      non-fit into PMS.
    falsifier_conditions:
    - If every rival theory is redescribed as mere Φ in a way that erases its philosophical content, the reading is over-assimilative.
    - If a rival semantic, logical, metaphysical, pragmatic, deflationary, or pluralist formalization explains the frame-shift
      more precisely, PMS must remain a partial projection rather than a superior account.
    non_capture_note: 'Recontextualization must not be used to absorb every rupture or rival reading.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective distance, inhibition, suspension, or meta-position enabling non-immediate response.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - inhibition
    - meta_position
    - reflective_gap
    - de_fusion
    examples:
    - withholding immediate retaliation
    - taking perspective
    - suspending judgment
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is active as the governing distance condition for this application; the analysis suspends verdict on
      which theory is true, avoids tribunal-style adjudication, preserves reversibility, and keeps PMS from becoming a replacement
      theory of truth.
    dependency_status: satisfied_as_application_discipline_not_object_level
    analytic_weight: major
    calibration_points:
    - The analysis must suspend metaphysical, semantic, empirical, legal, diagnostic, and implementation verdicts.
    - Χ is fully active as PMS application discipline, while object-level Χ remains bounded by the absence of a concrete
      praxis scene, agent, institution, temporal sequence, or decision setting.
    - Distance here is not avoidance or empty neutrality; it is the disciplined restraint required to keep PMS application
      bounded, reversible, and open to non-capture.
    falsifier_conditions:
    - If Χ is suspended in order to force a final truth-theory verdict or PMS superiority claim, the PMS application is invalid.
    - If PMS coherence becomes a substitute for philosophical discrimination, Χ has failed as distance and the reading becomes
      too smooth.
    non_capture_note: 'Distance is not avoidance; it is structural inhibition and reflective spacing.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Coherent organization of differentiated and recontextualized structures into higher-order stability.
    depends_on:
    - Χ
    - Φ
    provides:
    - synthesis
    - coordination
    - higher_order_coherence
    - internal_consistency
    examples:
    - reconciling roles
    - coordinating competing commitments
    - holding tension without collapse
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is weak and contested. The case may invite integration among multiple truth functions or theoretical
      frames, but PMS coherence or synthesis is not sufficient to establish truth, validity, or superiority over rival formalizations.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Any integration must discriminate among truth theories rather than smoothing over their substantive differences.
    - Integration must be distinguished from forced coherence, pluralist truth theory, and PMS-internal neatness.
    falsifier_conditions:
    - If coherence or integration is treated as proof of philosophical adequacy, Σ is overclaimed.
    non_capture_note: 'Integration does not prove truth, moral superiority, or finality.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Stable self-relation or commitment structure that binds integrated praxis across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_relation
    - commitment_stability
    - normative_binding
    - identity_through_praxis
    examples:
    - keeping a promise as self-commitment
    - identity-forming practice
    - responsibility accepted over time
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Ψ is weak at the object level and active only as application discipline. The case contains no self-binding
      agent, subject, institution, or responsibility relation. The PMS analysis itself is self-bound to Distance, reversibility,
      non-capture, and Dignity-in-Practice.'
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Ψ applies only as analytic self-binding unless further material supplies an agent or practice that binds itself over
      time.
    - No selfhood, subjectivity, or stable normativity is attributed to abstract truth theories.
    falsifier_conditions:
    - If Ψ is applied to the truth theories as literal selfhood or agentic self-binding without Σ, Θ, Χ, and a scoped subject,
      the reading is under-specified.
    non_capture_note: 'Self-binding must not be anthropomorphized or projected onto abstract systems without explicit scope.'
operator_layer_mapping:
  L1:
    id: L1
    name: Generative base of praxis
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Layer in which difference, directedness, framing, absence, and attractor formation establish the minimal
      generative space of praxis.'
    case_function: 'L1 structures the case through Δ, ∇, □, Λ, and Α: truth theories are distinguished, generate explanatory
      pressure, become framed accounts of relevance, disclose possible non-events or missing sufficiency conditions, and
      stabilize as recognizable theoretical attractors.'
  L2:
    id: L2
    name: Asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become directional, asymmetrical, and temporally extended.'
    case_function: L2 is weak because Ω and Θ are not grounded in a concrete scene. Only conditional conceptual asymmetry
      and possible historical or developmental temporality are available.
  L3:
    id: L3
    name: Recontextualization, distance, integration
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer in which structures are recontextualized, distanced, and integrated into more coherent configurations.'
    case_function: 'L3 is analytically important through Φ, Χ, and Σ: the case is read through frame-shifts among truth accounts,
      reflective distance from verdict, and weak or contested integration that must not become forced coherence.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across
      time and contexts.'
    case_function: L4 is analytic-only for the PMS application and not applicable to the case object. Ψ binds the analysis
      to PMS guardrails but does not attribute selfhood or self-binding to truth theories.
dependency_logic:
  status: dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case supplies initial distinctions among truth-theory accounts and among candidate truth-bearers,
      truth-makers, uses, and functions.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: The distinctions generate explanatory and argumentative pressure to account for what makes claims true,
      though no psychological or concrete action impulse is inferred.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: The named accounts function as frames that constrain relevance and organize the problem-space.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Within those frames, unresolved sufficiency, missing closure, non-fit, or absent truth-maker conditions
      can become meaningful, while preserving non-capture.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: The listed theory families are recognizable stabilized attractors in the philosophical truth-theory field.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Only weak conceptual or explanatory asymmetry is available; no concrete power or vulnerability asymmetry
      is supplied.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Only weak or conditional temporality is available because the case lacks a historical sequence or action
      trajectory.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Recontextualization is grounded in shifts among correspondence, coherence, pragmatic, semantic, deflationary,
      and plural-function frames.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Reflective distance is maintained by suspending verdict and preserving reversibility.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Integration is weak and contested because synthesis among truth theories is possible but not truth-sufficient.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Self-binding is limited to application discipline; no object-level self-binding subject is supplied.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
