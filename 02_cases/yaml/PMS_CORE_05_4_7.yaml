ai_interface_pms_alignment:
  welcome_message: 'This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic, non-clinical,
    non-prescriptive, and non-metaphysical in its claims.'
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect how Δ through Ψ apply or remain weak in a comparative theoretical
      case, while preserving PMS operator order and dependency discipline.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis.
    case_status: active
    case_application: Derived axes mode is used only to project formula-derived structures and to mark Awareness_A and Coherence_C
      as weak, Responsibility_R and Action_E as not applicable, and Dignity_in_Practice_D as an application constraint.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing.
    case_status: not_applicable
    case_application: AI architecture mode is not applicable because the case supplies no agent design, computational architecture,
      implementation target, interface behavior, or evaluation protocol.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of
      the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice
      (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    asymmetries_and_temporal_trajectories_visible: Ω is present only as a weak conceptual possibility, limited to explanatory
      priority, criterion authority, or frame dominance among truth-theory accounts; it is not grounded as concrete power,
      exposure, vulnerability, role obligation, or responsibility asymmetry. Θ is likewise weak because the case material
      supplies no sequence, historical development, revision path, long-term commitment, or action trajectory.
    recontextualization_distance_integration: Φ is active as conceptual frame-shift among correspondence, coherence, pragmatic,
      semantic, deflationary, plural-function, and other truth-theory accounts. Χ is active as application discipline through
      suspension of verdict, reversibility, and prevention of PMS fusion with a theory of truth. Σ remains weak and contested:
      integration may coordinate rival frames, but it must not become proof of truth, philosophical superiority, or PMS
      completeness.
    derived_axes_projection: Awareness_A is weak because Δ and □ are present but Θ is under-specified; Coherence_C is weak
      and must not be confused with the philosophical coherence theory of truth; Responsibility_R and Action_E are not applicable
      because no concrete agent, obligation, role asymmetry, or enactment sequence is supplied; Dignity_in_Practice_D constrains
      the application by requiring restraint, non-ranking, and non-tribunal use.
    tentative_calibration_rivalry: The reading remains especially tentative around Ω, Θ, Σ, and Ψ. Metaphysical truth, semantic
      validity, truth-maker theory, formal logic, paradox-handling, deflationary resistance, pluralist adequacy, and rival
      formalizations remain open and may mark genuine PMS non-capture rather than incomplete integration or calibration residue.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - comparative_theoretical_case
    - reversible_case_bound_projection
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: comparative_theoretical_case
    concrete_scene: false
    implication: This case type permits structural comparison of truth-theory frames and PMS operator calibration, but it
      does not permit empirical findings, metaphysical truth claims, diagnostic judgments, implementation claims, legal or
      forensic claims, or PMS Base validation.
  coherence_risk:
    status: high
    reason: The PMS reading risks becoming too smooth because many truth theories can be described as frames, attractors,
      or recontextualizations. This smoothness could under-discriminate substantive differences among truth theories, confuse
      PMS Coherence_C with the philosophical coherence theory of truth, or make PMS integration appear more adequate merely
      because it can hold several accounts in one structural field.
    mitigation: The reading is constrained by explicit discrimination tests, weak markings for Ω, Θ, Σ, and Ψ, non-capture
      zones, rival formalizations, and falsifier conditions that prevent PMS translation from counting as adequacy. The
      analysis must preserve the possibility that PMS is useful for mapping the debate while still being too coarse to decide
      its semantic, metaphysical, logical, pragmatic, deflationary, or pluralist substance.
  coverage_vs_discrimination:
    coverage_result: PMS covers the structural organization of theoretical differences, frames, stabilized account-families,
      recontextualizations, weak integration pressures, and application discipline.
    discrimination_requirement: The PMS reading must distinguish correspondence, coherence, pragmatic, semantic, deflationary,
      and plural-function theories without reducing them to a single PMS pattern or treating integration as philosophical
      truth. A successful PMS application must show not only that the theories can be structurally mapped, but also where
      the mapping remains partial, reversible, and inferior to rival formalisms for some questions.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish PMS Coherence_C from the philosophical coherence theory of truth.
    expected_pms_distinction: Coherence_C is a derived PMS structure from Θ, Λ, □, and ∇; coherence theory of truth is a
      philosophical account of truth conditions or justification-like fit. PMS must not conflate them.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish frame-shift mapping from adjudicating which truth theory is true.
    expected_pms_distinction: Φ may map recontextualization across theory-frames, while Χ prevents verdict fusion and Σ remains
      weak unless integration discriminates without erasure.
    current_status: satisfied
  calibration_points:
  - operator: Δ
    question: What distinctions among truth-theory frames, truth-bearers, truth-makers, uses, functions, and success criteria
      are actually supplied by the case?
    current_calibration: satisfied
  - operator: ∇
    question: What explanatory or argumentative pressure follows from those distinctions without inferring psychological
      desire or practical action?
    current_calibration: partial
  - operator: □
    question: Which theory-frame is active in each reading, and what does that frame make relevant to truth?
    current_calibration: satisfied
  - operator: Λ
    question: What expected sufficiency, fit, truth-maker, semantic closure, or resolution is absent within a specified frame?
    current_calibration: partial
  - operator: Α
    question: Which accounts recur as stabilized theoretical attractors rather than accidental examples?
    current_calibration: satisfied
  - operator: Ω
    question: Is there any grounded asymmetry beyond conceptual priority or criterion authority?
    current_calibration: weak
  - operator: Θ
    question: Is there a supplied temporal sequence, history, development, or sustained trajectory?
    current_calibration: weak
  - operator: Φ
    question: What source and target truth-theory frames are being shifted between, and what changes under that shift?
    current_calibration: satisfied
  - operator: Χ
    question: Is the analysis maintaining verdict suspension, reversibility, and non-tribunal use?
    current_calibration: satisfied
  - operator: Σ
    question: Does any integration discriminate among theories rather than force smooth coherence?
    current_calibration: partial
  - operator: Ψ
    question: Is self-binding limited to analytic discipline unless an agent or practice is supplied?
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - The metaphysical nature of truth and whether truth has one essence, many functions, or no substantial nature.
    - Formal semantic adequacy, truth-maker theory, logical validity, and paradox-handling within truth theories.
    - Deflationary accounts that may deny the need for deeper structural explanation.
    - Rival philosophical formalisms that may discriminate truth theories more precisely than PMS.
    rule: 'These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured
      absence, or failed maturity. They may mark genuine limits of the PMS reading.'
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - Formal semantic analysis of truth predicates and truth-conditions.
    - Metaphysical truth-maker theory or correspondence ontology.
    - Pragmatist account of truth as warranted success in practice.
    - Deflationary or minimalist account that resists substantive truth-theory structure.
    - Pluralist theory treating different domains as governed by different truth functions.
    rule: 'Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria are
      explicitly specified and applied.'
  falsifier_conditions:
  - id: F1
    condition: The PMS reading would be weakened or invalidated if the case required a determinate metaphysical, semantic,
      logical, empirical, legal, diagnostic, or implementation conclusion that PMS cannot provide without overextension.
  - id: F2
    condition: PMS would be under-discriminating if it mapped correspondence, coherence, pragmatic, semantic, deflationary,
      and pluralist theories as the same frame-shift or attractor pattern while losing their substantive differences.
  - id: F3
    condition: The reading would be over-assimilative if disagreement, non-fit, absence, rival framing, or deflationary resistance
      were automatically redescribed as PMS drift, incomplete calibration, or incomplete integration.
  final_quality_status:
    result: usable_with_limits
    reason: The PMS application is usable as a reversible, bounded conceptual projection with high coherence risk and partial
      discrimination. It is not a concrete scene analysis, truth-theory adjudication, empirical result, implementation, or
      PMS Base validation.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: 'These requirements identify what would be needed to turn the PMS projection into a calibrated empirical, comparative,
    computational, legal, clinical, or applied analysis.'
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: Explicitly coded distinctions among truth-theory frames, truth-bearers, truth-makers, uses, functions, and criteria.
      ∇: Evidence of argumentative, explanatory, practical, or institutional pressure arising from those distinctions.
      □: Named frames with relevance rules showing what each account treats as truth-relevant.
      Λ: Specified expectations and absent sufficiency conditions within each frame, with non-capture preserved.
      Α: Evidence that a truth account recurs or stabilizes as a theoretical attractor rather than an isolated example.
      Ω: Grounded directional asymmetry, such as institutional power, criterion authority, role exposure, or obligation,
        if claimed.
      Θ: Documented sequence, historical development, revision path, persistence, or trajectory if temporality is claimed.
      Φ: Clear source and target frames and a defined transformation across them.
      Χ: Procedural evidence of verdict suspension, reversibility, and non-totalizing analysis.
      Σ: Integration criteria that show discriminative coordination rather than forced coherence.
      Ψ: A scoped self-binding agent, institution, practice, or explicit analytic self-binding rule if Ψ is claimed beyond
        application discipline.
    negative_cases:
    - A purely formal semantic proof in which PMS framing adds no discriminative value.
    - A deflationary account that explicitly rejects substantive truth-theory structure and is distorted by PMS translation.
    - A concrete legal or institutional truth-finding scene requiring evidence standards not provided by this conceptual
      case.
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: Operationalization is not fulfilled. The supplied material is sufficient only for bounded conceptual PMS
    projection, not for empirical, comparative, computational, legal, clinical, or applied validation.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: No psychological motive, mental state, temperament, pathology, or subjective experience is inferred
      from adherence to any truth theory.
    non_metaphysical: PMS does not decide what truth is, whether truth corresponds to reality, whether truth is coherent
      fit, whether truth is pragmatic success, or whether truth is deflationary or plural.
    non_diagnostic: No philosopher, school, theory community, or agent is diagnosed, pathologized, ranked by maturity, or
      classified as a person-type.
    non_legal_forensic: The analysis supplies no evidentiary standard, forensic criterion, burden of proof, or legal truth-finding
      procedure.
    non_implementation_claim: The YAML document is not a computational implementation of truth evaluation, semantic parsing,
      or agentic reasoning.
    non_moral_ranking: No truth theory or adherent is treated as morally superior, inferior, mature, immature, dignified,
      or undignified.
    non_exhaustive_capture: PMS translation does not exhaust the truth-theory domain and may fail to capture formal, metaphysical,
      semantic, pragmatic, or deflationary content.
    reversibility: All operator assignments remain revisable if new case material supplies a concrete scene, a specific
      argument, a temporal history, an institutional setting, or sharper rival criteria.
    dignity_in_practice: 'Dignity-in-Practice is preserved as restraint in application: the analysis avoids tribunal language,
      humiliation, ontological ranking, and irreversible labels.'
limits:
- The PMS reading maps structural features of a conceptual truth-theory field; it does not settle the philosophy of truth.
- No empirical, metaphysical, diagnostic, clinical, legal, forensic, implementation, or PMS Base validation claim is made.
- Rival readings remain open, including semantic, metaphysical, logical, pragmatic, deflationary, pluralist, and epistemological
  formalisms that may better fit the domain.
- The reading has high coherence and over-assimilation risk because PMS can smoothly describe many theories as frames or
  recontextualizations without thereby discriminating their substantive content.
case_synthesis:
  primary_pms_reading: Truth theories are structurally readable as rival frames and stabilized attractors for organizing
    what counts as truth, with active difference, framing, recontextualization, and distance, but only weak asymmetry, temporality,
    integration, and self-binding.
  continuity_condition: Not applicable as a concrete continuity condition; no sustained action trajectory or self-relation
    is supplied. Continuity may only refer weakly to the recurrence of truth-theory frames as theoretical attractors.
  change_condition: 'Change is relevant as Φ: the case changes when truth is recontextualized from correspondence to coherence,
    pragmatic success, semantic structure, deflationary use, plural function, or another theory-frame.'
  rupture_or_non_fit_condition: Rupture, resistance, disagreement, unresolved absence, or non-fit is preserved as possible
    philosophical substance or PMS non-capture and is not automatically redescribed as drift, incomplete calibration, incomplete
    integration, recontextualization, or maturity failure.
  responsibility_condition: Not applicable. The case provides no agent, obligation, asymmetrical role, temporal commitment,
    or self-binding practice sufficient for Responsibility_R.
  dignity_condition: Dignity-in-Practice constrains the analysis by requiring non-ranking, non-diagnostic, reversible, and
    non-tribunal treatment of theories, traditions, and any persons associated with them.
  rival_reading_condition: Rival formalizations remain open unless explicit comparison criteria are introduced and applied;
    PMS readability alone does not defeat semantic, metaphysical, logical, pragmatic, deflationary, or pluralist accounts.
final_structural_formula:
  primary_formula: Χ ∘ Φ ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ; with Ω, Θ, Σ, and Ψ marked weak, conditional, or application-disciplinary in the case-status notes
  primary_formula_status: primary_case_model
  compressed_reading: As a reversible PMS projection, the truth-theory case is primarily a differentiated field of framed
    and recontextualized theoretical attractors, constrained by Distance and non-capture. Ω and Θ remain weak because no
    concrete asymmetry or temporal action trajectory is supplied; Σ remains contested because integration is not truth-sufficient;
    Ψ applies only as analytic self-binding of the PMS application, not as object-level selfhood or responsibility.
  final_validity_status: valid_with_limits
  final_claim_boundary: 'This formula states a PMS-internal structural projection of the case. It does not establish empirical
    truth, metaphysical truth, phenomenological completeness, diagnostic validity, legal or forensic validity, implementation
    validity, moral ranking, or PMS Base validation. It remains open to rival semantic, metaphysical, logical, pragmatic,
    deflationary, and pluralist formalizations, including the possibility that those formalisms discriminate the truth-theory
    domain more sharply than PMS.'