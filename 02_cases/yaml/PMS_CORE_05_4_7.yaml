derived_structure_discipline:
  structures_considered:
  - Awareness_A
  - Coherence_C
  - Responsibility_R
  - Action_E
  - Dignity_in_Practice_D
  - SELF_FIXPOINT
  - AD_A_much_greater_E
  - AD_under_integration
  usage_rule: 'Each derived structure must be marked as active, weak, analytic_constraint, possible_but_not_entailed, under_specified,
    or not_applicable. Consideration does not imply activation.'
  rule: 'Derived structures are formula-derived PMS constructs. They are not independent axioms, diagnoses, ontological rankings,
    metaphysical entities, or proof of PMS completeness.'
  case_status: Awareness_A is weak because Θ is weak; Coherence_C is weak and contested because PMS coherence must not be
    confused with philosophical coherence truth theory; Responsibility_R and Action_E are not applicable without a concrete
    scene, agent, obligation, or enactment; Dignity_in_Practice_D is an application constraint; SELF_FIXPOINT is not applicable
    to the case object; drift patterns are possible-but-not-entailed monitoring risks rather than findings.
derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ enables distinctions in the field.
    - □ frames distinctions as situationally relevant.
    - Θ maintains these framed distinctions over time.
    notes: 'Awareness is modeled structurally, not phenomenologically. Within PMS it can be systematically derived from this
      operator sequence, but this does not imply that all notions of awareness are exhausted by it.'
    case_reading: 'Awareness_A is only weakly projected: the case differentiates truth theories within frames, but the material
      does not provide sustained temporal structure beyond the general persistence of philosophical problem-forms.'
    status: weak
    calibration_points:
    - Differentiate correspondence, coherence, pragmatic, semantic, deflationary, plural-function, and other truth accounts
      within their own frames, while marking Θ as weak because no temporal sequence is provided.
    non_capture_note: 'Structural awareness is not phenomenological consciousness.'
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Temporally stabilized structuring of impulse and expectation within a frame.
    generative_reasoning:
    - ∇ introduces directional impulse.
    - □ constrains and structures the impulse.
    - Λ encodes expectations and meaningful non-events.
    - Θ temporalizes the configuration into trajectories.
    notes: 'Coherence captures narrative stability of action, including meaningful absences and delays, without yet requiring
      full integration or self-binding.'
    case_reading: 'Coherence_C is weak and contested: the case includes coherence as a truth theory, but PMS Coherence_C is
      a derived structural axis involving temporally stabilized impulse and expectation within a frame. PMS coherence does
      not establish truth.'
    status: weak
    calibration_points:
    - Distinguish PMS Coherence_C from the philosophical coherence theory of truth and from any forced smoothing of rival
      truth theories.
    non_capture_note: 'Coherence_C is not truth, validity, or forced narrative smoothing.'
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding under asymmetrical temporal conditions.
    generative_reasoning:
    - Ω introduces asymmetrical exposure or role-differentiation.
    - Θ places asymmetry into temporally extended consequences.
    - Φ recontextualizes the actor or role in light of those consequences.
    - Ψ binds the agent to a stable relation to the consequences of action.
    notes: 'Responsibility is not reduced to blame. It is a structural relation between asymmetry, temporality, recontextualization,
      and self-binding.'
    case_reading: Responsibility_R is not applicable because the case material contains no concrete asymmetrical role, obligation,
      temporal commitment, recontextualized duty, or self-binding agent.
    status: not_applicable
    calibration_points:
    - Do not claim responsibility unless Ω, Θ, Φ, and Ψ are grounded in a concrete praxeological scene or explicitly scoped
      structural agent.
    non_capture_note: 'Responsibility_R must not become moral accusation or legal culpability without appropriate domain
      warrant.'
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ supplies directedness.
    - Θ extends directedness into a temporal path.
    - Σ integrates impulses, frames, and constraints into coherent enactment.
    notes: 'Action is treated as more than behavior: it is integrated, temporally extended, directed realization.'
    case_reading: Action_E is not applicable because the case concerns abstract theories and claims, not integrated realization
      of directedness across time in a concrete action sequence.
    status: not_applicable
    calibration_points:
    - Distinguish abstract theoretical comparison from action, enactment, practice, implementation, or behavioral sequence.
    non_capture_note: 'Action_E does not imply that every movement, output, or text is action in the full PMS sense.'
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-binding to restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: 'Dignity-in-practice is a structural stance in action. It concerns how asymmetry is handled, not the ranking of
      persons or ontological worth.'
    case_reading: 'Dignity_in_Practice_D functions as an application constraint: the analysis avoids ranking persons, schools,
      or theories as morally superior, avoids humiliation or tribunal framing, and handles possible asymmetry with restraint.'
    status: application_constraint
    calibration_points:
    - Maintain non-ranking, non-diagnostic, non-humiliating treatment of rival theories and any associated persons or traditions.
    non_capture_note: 'D is a praxeological application constraint, not an ontological or moral superiority claim.'
self_model_analysis:
  id: SELF_FIXPOINT
  priority_in_this_case: not_applicable
  formula_sequence:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  description: 'Formal representation of self-binding as the result of integrated, reflexively modulated, temporally extended,
    asymmetry-aware patterns of praxis being bound into a relatively stable self-relation.'
  case_reading: SELF_FIXPOINT is not applicable to the case object because abstract truth theories are not subjects and the
    case gives no self-binding agent. The chain remains relevant only as a reminder not to import selfhood, identity, or
    responsibility where the case does not warrant it.
  implications:
  - Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin.
  - Identity is represented as relatively stable self-binding to integrated trajectories.
  - No phenomenological or metaphysical claims about subjectivity are implied.
  interpretation_note: 'This sequence records one derivational strategy within PMS. It must not be read as proving that all
    forms of selfhood, agency, identity, or case structure reduce without remainder to this exact chain.'
  non_capture_note: 'SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions as literal subjectivity
    unless explicitly scoped as structural self-binding or analytic self-binding.'
asymmetry_drift_patterns:
  status_in_this_case: possible_but_not_entailed
  general_note: 'PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms. They are not automatically
    entailed by a case and must not be treated as diagnoses, person-types, or moral verdicts.'
  AD_A_much_greater_E:
    code: AD_A>>E
    name: Excessive Distance between Awareness and Enactment
    applicability: possible_but_not_entailed
    structural_basis:
      formula:
      - Φ
      - Α
      - Ω
      description: 'Evaluative or power asymmetry becomes stabilized through attractor formation, while recontextualization
        reinforces drift toward evaluation rather than supporting integrative transformation and balanced enactment.

        '
    generative_mechanism:
    - 'Ω: evaluative or positional asymmetry becomes structurally salient.'
    - 'Α: the asymmetry stabilizes into recurrent evaluative patterning.'
    - 'Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration.'
    case_reading: AD_A>>E is not found as a case result. It remains only a monitoring risk because a highly abstract conceptual
      comparison could over-expand awareness while no action scene exists. This must not be converted into a diagnosis,
      maturity claim, or criticism of any theory.
    axis_effects:
      awareness_axis: under_specified
      action_axis: not_applicable
    guardrail: 'This is not a personality trait, diagnosis, person-label, clinical state, or moral judgment.'
  AD_under_integration:
    code: AD_Sigma_low
    name: Fragmented integration
    applicability: possible_but_not_entailed
    structural_basis:
      primary_tension:
      - Φ
      - Σ
      condition: recontextualization_outpaces_integration
      description: 'Frequent recontextualization without sufficient integration leads to unstable trajectories and weak coherence
        of praxis, especially where unstable recontextualization and weak integration unfold under asymmetrically loaded
        praxis conditions.

        '
    generative_mechanism:
    - 'Φ: frames are frequently shifted or updated in ways that destabilize continuity.'
    - 'Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment.'
    case_reading: AD_Sigma_low is not established. Rival theories and unresolved pluralism could look like low integration,
      but the PMS reading must not translate disagreement, rupture, absence, or rival framing into fragmented integration
      without independent warrant.
    axis_effects:
      coherence_axis: under_specified
      responsibility_axis: not_applicable
    guardrail: 'This pattern describes structural volatility in action forms, not a clinical state, diagnosis, or person-type.'
