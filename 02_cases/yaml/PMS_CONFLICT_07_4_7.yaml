pms_conflict_overlay_application:
  schema_version: "PMS-CONFLICT_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-CONFLICT.yaml"
  paper_source_file: "PMS-CONFLICT.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–CONFLICT Application Profile"
    model_short: "PMS-CONFLICT"
    status: "production_overlay"
    repository_role: "paper_specific_application_overlay"
    epistemic_status: >
      This specification records the current paper-specific application overlay
      for PMS-CONFLICT. It is intended to be formally disciplined, portable, and
      fully subordinate to PMS_1.3, but not final, complete, uniquely ordered,
      or immune to revision.
    last_updated: "2026-04-11"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
      repository_role: "current_base_schema"
    paper_source:
      title: "PMS–CONFLICT"
      subtitle: "Conflict as Stabilized Incompatibility Under Binding, Time, Cost, and Exposure"
      source_file: "PMS-CONFLICT.md"
    description: >
      PMS-CONFLICT is an application profile for PMS that formalizes the
      conflict lens: how incompatibility stabilizes once binding persists,
      trajectories accumulate, distance/exit becomes priced or asymmetric, and
      exposure converts description into pressure. The profile expresses the
      paper strictly in the canonical PMS operator grammar Δ–Ψ, without
      redefining operators or altering dependencies. It provides reduced
      signatures, core drift classes, scale/cost overlays, non-operator
      constructs, and reusable safety interfaces for application-bound contexts.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for case title 'Asymmetry lock-in'"
    rule: >
      This CONFLICT block is appended to or integrated with an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      CONFLICT constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The CONFLICT overlay may add visibility for stabilized incompatibility,
      binding collision, asymmetry lock-in, exposure capture, dignity collapse,
      priced or asymmetric distance, terminal regime positioning, publicness,
      misuse gradients, and downstream docking. It must not modify the completed
      PMS Core case except where a direct PMS.yaml inconsistency has been
      separately identified.

  overlays:
    P:
      name: "Publicness Overlay"
      is_operator: false
      amplifies:
        - "Ω"
        - "Θ"
        - "Α"
        - "Φ"
      note: >
        Amplification only. Higher publicness increases exposure coupling and
        raises the cost of revision. It introduces no new operators.
      case_application: >
        Publicness is not active as a case-scene feature because the case
        material is abstract and does not describe public exposure, audience
        coupling, media amplification, durable record effects, or institutional
        visibility. P remains available only as an overlay warning for later
        transfer of the analysis into public, institutional, or excerpted
        contexts.

    MG:
      name: "Misuse Gradient / Transmission Risk"
      is_operator: false
      amplifies:
        - "Ω"
        - "Θ"
      note: >
        Classification of predictable misuse risk when operator language
        travels through excerpt dynamics, audience coupling, or enforcement
        affordances. Not an operator.
      case_application: >
        Misuse-gradient relevance is low to mixed within the present descriptive
        YAML context, but non-zero because "asymmetry lock-in" language can be
        misread as verdict, diagnosis, coercion claim, or person-level
        attribution if excerpted without the PMS Core boundaries.

  nested_overlay_policy:
    no_base_extension: true
    rule: >
      PMS-CONFLICT introduces overlay-level constructs only: reduced signatures,
      drift classes, scale matrices, publicness/misuse overlays, and
      non-operator conflict constructs. These organize existing PMS operators.
      They never replace PMS generativity with explanation, never bypass Ω, Θ,
      or Χ, and never become PMS operators or dependencies.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    note: >
      This gate constrains PMS application only, not critique, refusal,
      rejection, or revision proposals.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          Reflective distance is maintained. The CONFLICT overlay does not fuse
          the case into verdict, urgency, enforcement, or person-level
          attribution.
      reversibility:
        id: "reversibility"
        status: "maintained"
        meaning: >
          Readings remain scene-bound, revisable, and non-final. The overlay
          does not produce global person labels, irreversible labels, or final
          judgments.
      Dignity_in_Practice_D:
        id: "D"
        name: "Dignity-in-Practice"
        status: "maintained"
        meaning: >
          Enacted restraint under asymmetry is preserved. The overlay does not
          shame, rank, humiliate, or ontologically evaluate persons or groups.
    pms_entry_condition_ref: "PMS.yaml#/pms_entry_condition"
    gate_result: "valid_as_conflict_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any use of Χ in reduced signatures is shorthand only. In PMS, Χ depends
      on Φ, Θ, and □. Reduced signatures do not negate prerequisites or alter
      the default dependency path recorded in PMS_1.3.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  conflict_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgment, no ranking, no sanction logic."
      - "Describes structural regimes and operator drift under load."
      - "No procedure manual: no intervention scripts, no solutions section."
      - "Bounded to this grammar; no monopoly claim over conflict intelligibility as such."
    may_add_visibility_to:
      - "stabilized incompatibility"
      - "binding collisions under Ψ"
      - "Σ-failure or Σ-incompatibility under load"
      - "asymmetry gradients under Ω"
      - "temporal hardening under Θ"
      - "priced or asymmetric distance under Χ"
      - "conflict attractor stabilization under Α"
      - "exposure capture under Ω/Θ/Φ with publicness amplification"
      - "dignity collapse under Ω/Θ/Χ/Ψ pressure"
      - "young Α-field dynamics"
      - "institutionalized distance regimes"
      - "application-boundary and misuse-gradient red zones"
      - "terminal regime positioning"
      - "downstream docking into governance or evaluation layers"
    must_not_do:
      - "treat conflict as personal essence"
      - "treat incompatibility as diagnosis"
      - "translate conflict legibility into verdict"
      - "produce intervention scripts or solution procedures"
      - "convert Σ-failure into moral failure"
      - "convert Ω-gradient into authority claim"
      - "convert publicness into enforcement warrant"
      - "convert terminality into finality"
      - "treat downstream governance as continuation of PMS-CONFLICT"
      - "claim PMS Base validation"

  paper_lens:
    methodological_boundedness:
      status: "active"
      note: >
        PMS-CONFLICT develops a structural grammar of stabilized
        incompatibility under binding, asymmetry, temporality, cost, and
        exposure. It does not claim to exhaust everything conflict is or could
        become under other analytical grammars, and it does not convert
        conflict-legibility into verdict, solution, diagnosis, or governance
        authority.
      constraints:
        - "Conflict legibility here is internal to the PMS grammar."
        - "Terminality here names the end of reintegration resources within this grammar."
        - "Where classification and attractor logic preserve coherence, non-capture remains open."
        - "A conflict-readable structure is not thereby a conflict finding in an empirical, legal, clinical, or forensic sense."
      case_application: >
        The overlay remains bounded to the PMS-CONFLICT grammar by treating
        "asymmetry lock-in" as a conflict-legible structural possibility rather
        than an empirical conflict finding. The Core case already establishes
        that Ω and Θ are central and that Χ, Φ, Σ, and Ψ require calibration;
        CONFLICT adds the narrower lens that asymmetry may become conflictual
        when distance, exit, revision, or interruption is unevenly priced under
        temporal hardening. Rival conflict grammars remain open, including
        coercion theory, domination theory, care ethics, legal analysis,
        institutional path-dependence, systems theory, and phenomenological
        accounts of vulnerability or moral remainder.

    scope_limit_of_tragic_legibility:
      status: "weak"
      note: >
        The tragedy clause should not be read as an inflationary claim that
        mature conflict is always or finally tragic. Its narrower claim is that
        tragedy remains structurally possible even under maintained distance,
        reflexivity, and responsibility constraints, and that some conflicts
        become more legible without becoming more integrable.
      openings:
        - "Not every hard conflict is tragic in the strong sense developed here."
        - "Tragic legibility does not eliminate rival conflict grammars."
        - "Difficulty of exit is not by itself proof of tragedy, terminality, coercion, or Σ-failure."
      case_application: >
        The case is conflict-legible in the CONFLICT sense because it concerns
        asymmetry, time, exit difficulty, and possible stabilization. It is not
        established as tragic in the strong CONFLICT sense because the material
        does not show incompatible bindings, exhausted integration resources, a
        concrete terminal regime, or a scene in which every available continuation
        preserves loss. Tragic legibility therefore remains a watch condition,
        not a result.

    core_definition:
      conflict_domain_layer:
        is_operator: false
        applicability: "weak"
        definition: >
          Within this descriptive architecture, CONFLICT names a terminal
          descriptive regime in which incompatibility is stabilized under
          binding, temporality, asymmetry, and costly or asymmetric distance.
          The model increases legibility of this regime but does not generate
          an additional internal operator that restores integrability once Σ no
          longer carries under Θ/Ω with priced or asymmetric Χ.
        minimal_operator_touchpoints:
          - "Σ"
          - "Ψ"
          - "Ω"
          - "Θ"
          - "Χ"
        case_application: >
          The case reaches the conflict-domain layer only weakly and
          conceptually. Ω and Θ are central, Χ is relevant as distance or exit
          availability, Σ is a calibration question, and Ψ remains weak because
          no concrete binding collision or stable self-binding is described.
          The overlay should therefore not say that the case is already a full
          CONFLICT regime. It can only say that the Core case contains the
          structural preconditions through which a CONFLICT regime could become
          visible if concrete incompatibility, binding, cost, and failed
          integration were later supplied.

    terminal_positioning:
      applicability: "weak"
      terminal_stack_claim: >
        Within the PMS-domain stack developed here, CONFLICT functions as the
        terminal domain layer: beyond maximal Δ–Ψ load under Θ/Ω/Χ, the model
        yields no further internal reintegration grammar — only downstream
        governance, institutionalization, decision, or evaluation.
      structural_full_stop_sentence: >
        This paper does not continue into solutions. It ends where praxis
        becomes tragically legible but no longer integrable within this
        descriptive pathway.
      terminality_without_finality: >
        Terminality here is stack-internal and grammar-internal. It does not
        claim that conflict as such admits no further analysis, only that this
        operator grammar does not generate an additional internal reintegration
        layer once Σ has failed under sustained Θ/Ω/Ψ with costly or asymmetric
        Χ.
      case_application: >
        Terminal positioning is weak rather than active. The abstract case
        raises the possibility of trajectories becoming no longer revisable,
        interruptible, or exit-able, but it does not establish that Σ has failed
        under sustained Θ/Ω/Ψ with costly or asymmetric Χ. It also does not
        establish maximal Δ–Ψ load, incompatible Ψ-bindings, or a final point
        at which reintegration grammar is exhausted. Terminality is therefore
        retained only as an upper-bound reading of what this case-type could
        become, not as the current case result.

    downstream_docking:
      status: "not_triggered"
      note: >
        Within this stack architecture, CONFLICT terminates the PMS domain
        grammar. Any continuation constitutes a mode shift into downstream
        governance, institutionalization, decision, or evaluation layers, not a
        further descriptive extension of PMS-CONFLICT itself.
      allowed_continuations:
        - "governance frameworks"
        - "institutional rule-setting"
        - "decision procedures"
        - "evaluation overlays"
      disallowed_continuations:
        - "implicit solution derivation"
        - "hidden intervention logic"
        - "operator extension beyond Δ–Ψ"
        - "treating terminal legibility as authority to decide"
      case_application: >
        The case remains descriptive. No governance, institutional,
        decision-procedural, legal, forensic, or evaluation layer is triggered
        by the material supplied. Any later move toward policy, adjudication,
        institutional response, or applied decision would have to be marked as
        downstream docking and could not be presented as a continuation of this
        CONFLICT overlay itself.

  non_operator_constructs:
    conflict_attractor_A_conflict:
      is_operator: false
      applicability: "weak"
      definition: >
        Stabilized conflict pattern Α_conflict in which incompatibility itself
        becomes a repeatable orientation field under asymmetric cost and
        temporal pressure; distance or exit remains formally available but
        priced or asymmetric.
      operator_touchpoints:
        - "Α"
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      case_application: >
        Conflict itself is not shown to stabilize as an attractor in a concrete
        scene. The construct is weakly relevant because the case concerns
        possible lock-in, but Α_conflict requires evidence of recurrence,
        path-dependence, and incompatibility stabilizing as a pattern.

    binding_collision:
      is_operator: false
      applicability: "weak"
      definition: >
        Two or more bindings Ψ collide and remain jointly non-viable under the
        same frame and time trajectory; integration Σ cannot produce a shared
        spine at acceptable cost.
      operator_touchpoints:
        - "Ψ"
        - "Ω"
        - "Θ"
        - "Σ"
      case_application: >
        Binding collision is not established. Responsibility is named in the
        abstract case, but no two concrete commitments, role-bindings, promises,
        institutional duties, or self-bindings are shown to collide.

    asymmetry_lock_in:
      is_operator: false
      applicability: "active"
      definition: >
        Exit or reflection costs Χ become structurally asymmetric under Ω and
        Θ: one role position can withdraw, delay, or reframe at lower price,
        turning Χ-availability into a power gradient rather than a shared
        stabilizing resource. Asymmetry lock-in therefore does not simply mean
        that exit is difficult; it means that the difficulty of exit, delay,
        revision, or distance is distributed unevenly across positions under
        temporal hardening.
      operator_touchpoints:
        - "Ω"
        - "Θ"
        - "Χ"
      case_application: >
        This construct is the strongest CONFLICT overlay fit. The case explicitly
        concerns asymmetries of position, exposure, dependency, responsibility,
        or available exit becoming difficult to revise, interrupt, or leave.
        The activation remains conceptual and non-empirical because no concrete
        distribution of distance, exit, delay, liability, exposure, or reflection
        costs is supplied. The overlay therefore marks asymmetry lock-in as an
        active conflict shorthand for the case-type, not as proof that any
        concrete actor has coerced, trapped, failed, dominated, or been
        diagnostically characterized.

    exposure_capture:
      is_operator: false
      applicability: "not_applicable"
      definition: >
        Recontextualization Φ under scaled exposure converts interpretation
        into enforcement affordances: statements harden into irreversible
        pressure rather than remaining revisable, scene-bound readings.
      operator_touchpoints:
        - "Ω"
        - "Θ"
        - "Φ"
      overlays:
        - "P"
        - "MG"
      case_application: >
        Exposure capture is not applicable as a scene feature because no public,
        institutional, media, durable-record, audience-coupled, or enforcement
        context is provided. It remains only a misuse warning for transfer of
        the analysis.

    dignity_collapse:
      is_operator: false
      applicability: "not_applicable"
      definition: >
        Dignity-in-practice constraints fail under load: Χ is delegitimized or
        priced, Ψ no longer binds restraint, and language drifts toward
        shaming, ranking, and coercive transfer under Ω/Θ pressure.
      operator_touchpoints:
        - "Ω"
        - "Θ"
        - "Χ"
        - "Ψ"
      overlays:
        - "MG"
      case_application: >
        Dignity collapse is not active. The PMS Core pass preserved
        Dignity-in-Practice, non-ranking, non-diagnosis, reversibility, and
        possible non-capture. The risk would arise only if the case were used to
        label persons, shame positions, or convert asymmetry language into
        coercive verdict.

  reduced_signatures:
    note: >
      Reduced signatures are shorthand lenses and threshold markers, not proof
      chains. They compress dominant operator involvement for scene-bound
      readings and do not replace PMS dependencies.
    CONFLICT_terminal_core:
      label: "CONFLICT terminal core"
      applicability: "weak"
      operators:
        - "Σ"
        - "Ψ"
        - "Ω"
        - "Θ"
        - "Χ"
      reduced: true
      note: >
        Marks the terminal descriptive regime within PMS-CONFLICT: Σ under load
        with binding Ψ and priced or asymmetric distance Χ under Ω/Θ.
      case_application: >
        The reduced signature is weakly relevant but not active. Ω, Θ, and Χ
        are central to the case, but Σ-failure and Ψ-binding under sustained
        load are not established by the abstract material.

    CONFLICT_stabilized_pattern:
      label: "Stabilized conflict attractor"
      applicability: "weak"
      operators:
        - "Α"
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      reduced: true
      note: >
        Conflict regime stabilized as an attractor; distance remains present but
        priced or asymmetric, preventing Σ from carrying as reintegration.
      case_application: >
        The stabilized-pattern signature remains weak. The Core case already
        marked Α as relevant to lock-in, but no concrete recurrence,
        stabilization evidence, binding structure, or priced Χ distribution is
        supplied.

    DRIFT_binding_collision:
      label: "Binding collision"
      applicability: "risk"
      operators:
        - "Ψ"
        - "Ω"
        - "Θ"
        - "Σ"
      reduced: true
      note: >
        Colliding bindings with non-viable joint integration; Σ becomes
        internally incompatible under shared Θ with asymmetric cost gradients Ω.
      case_application: >
        Binding collision is a risk condition only. Responsibility is in scope,
        but no concrete incompatible bindings or failed shared Σ are present in
        the case material.

    DRIFT_asymmetry_lock_in:
      label: "Asymmetry lock-in"
      applicability: "active"
      operators:
        - "Ω"
        - "Θ"
        - "Χ"
      reduced: true
      note: >
        Exit, distance, or reflection becomes asymmetrically priced under Ω/Θ.
        Χ availability becomes a power gradient rather than shared stabilizing
        resource. This reduced signature is an overlay shorthand only; it does
        not cancel Χ dependencies on Φ, Θ, and □, and it does not replace the
        PMS Core dependency chain.
      case_application: >
        This is the primary active CONFLICT shorthand. It names the same
        conceptual structure the case targets: asymmetry under temporal
        hardening where revision, interruption, distance, or exit may become
        unequally available. Its activation is bounded to the abstract
        case-type. It does not establish concrete coercion, legal captivity,
        diagnostic pathology, failed maturity, blame, or a terminal CONFLICT
        regime. It remains shorthand only and does not alter PMS dependencies.

    DRIFT_exposure_capture:
      label: "Exposure capture"
      applicability: "not_applicable"
      operators:
        - "Ω"
        - "Θ"
        - "Φ"
      overlays:
        - "P"
        - "MG"
      reduced: true
      note: >
        Publicness and transmission risk amplify Ω/Θ while Φ turns
        interpretation into enforcement affordance or irreversible pressure.
      case_application: >
        Exposure capture is not applicable to the case scene because no
        publicness, institutional visibility, media amplification, or durable
        enforcement affordance is described.

    DRIFT_dignity_collapse:
      label: "Dignity collapse"
      applicability: "risk"
      operators:
        - "Ω"
        - "Θ"
        - "Χ"
        - "Ψ"
      overlays:
        - "MG"
      reduced: true
      note: >
        Dignity-in-Practice constraints fail under Ω/Θ pressure when Χ becomes
        delegitimized or coercively priced and Ψ no longer binds restraint.
      case_application: >
        Dignity collapse is a misuse risk, not a case finding. It would become
        relevant if asymmetry-lock-in language were used to shame, rank,
        diagnose, or coercively label actors. The completed Core pass does not
        do this.

  drift_catalogue:
    note: >
      CONFLICT drift classes describe structural operator distortions. They are
      not personal traits, diagnoses, moral verdicts, or enforcement categories.
      Their structural signatures distinguish operators that are present,
      missing, failed, priced, under load, or amplified by overlays.
    sigma_incompatibility_clash:
      label: "Σ-incompatibility clash"
      applicability: "risk"
      structural_signature:
        present:
          - "Σ_local"
        missing_or_failed:
          - "Σ_shared"
        under_load:
          - "Ψ"
          - "Ω"
          - "Θ"
        often_present:
          - "Χ_priced_or_asymmetric"
      typical_markers:
        - "local integrations remain coherent but mutually non-integrable"
        - "shared continuation cannot be produced without unacceptable cost"
        - "conflict is misread as misunderstanding or communication failure"
      guardrail_reminder: >
        Do not treat Σ-failure as moral failure, immaturity, or person defect.
      case_application: >
        This drift is a risk rather than active. The case could later involve
        locally coherent but jointly non-integrable structures, but the present
        material supplies no concrete local integrations, shared frame, or
        failed shared Σ.

    binding_collision_drift:
      label: "Binding collision drift"
      applicability: "risk"
      structural_signature:
        present:
          - "Ψ"
        failed_or_conflicted:
          - "Σ"
        under_load:
          - "Ω"
          - "Θ"
        often_present:
          - "Χ_priced_or_asymmetric"
      typical_markers:
        - "two or more commitments cannot be jointly carried"
        - "shared frame cannot integrate incompatible bindings"
        - "repair attempts increase rather than reduce cost"
      guardrail_reminder: >
        Do not translate binding collision into guilt, betrayal, or person
        inadequacy without explicit non-PMS grounds.
      case_application: >
        Binding collision drift is a risk condition only. Responsibility is
        thematically present, but Ψ remains weak in the Core pass and no
        concrete incompatible commitments are established.

    asymmetry_lock_in_drift:
      label: "Asymmetry lock-in drift"
      applicability: "active"
      structural_signature:
        present:
          - "Ω"
          - "Θ"
        missing_or_priced:
          - "Χ"
        often_present:
          - "Ψ"
      typical_markers:
        - "exit or delay is cheap for one position and costly for another"
        - "reflection or withdrawal becomes a power differential"
        - "pseudo-symmetry hides unequal exposure or liability"
      guardrail_reminder: >
        Do not treat formal availability of exit or distance as equal
        availability under Ω/Θ.
      case_application: >
        Asymmetry lock-in drift is active as the overlay's primary conceptual
        fit. The activation is bounded: the case names the structure but does
        not empirically establish actual priced Χ, unequal exit, pseudo-symmetry,
        or liability distribution.

    exposure_capture_drift:
      label: "Exposure capture drift"
      applicability: "not_applicable"
      structural_signature:
        present:
          - "Ω"
          - "Θ"
          - "Φ"
        amplified_by_overlays:
          - "P"
          - "MG"
        often_present:
          - "Α"
          - "Ψ"
        risk_channel:
          - "public_record_hardening"
          - "interpretation_to_enforcement_affordance"
          - "revision_cost_increase"
      typical_markers:
        - "scene-bound reading hardens into durable record"
        - "interpretation becomes enforcement affordance"
        - "revision becomes publicly or institutionally costly"
      guardrail_reminder: >
        Public or institutional transfer requires explicit mode, publicness, and
        misuse-gradient declarations.
      case_application: >
        Exposure capture is not applicable as a described case feature. It is
        retained only as an application-boundary warning if the overlay is later
        moved into public, institutional, or enforcement-adjacent contexts.

    dignity_collapse_drift:
      label: "Dignity collapse drift"
      applicability: "risk"
      structural_signature:
        present:
          - "Ω"
          - "Θ"
        compromised_or_missing:
          - "Χ"
          - "Ψ"
        amplified_by_overlays:
          - "MG"
        risk_channel:
          - "shaming"
          - "ranking"
          - "humiliation"
          - "person_near_verdict"
      typical_markers:
        - "language drifts toward shaming, ranking, or humiliation"
        - "distance is delegitimized or coercively imposed"
        - "conflict reading becomes person-near verdict"
      guardrail_reminder: >
        Dignity collapse invalidates the PMS application as a PMS application,
        even if terminology remains structurally correct.
      case_application: >
        Dignity collapse is a misuse risk only. The overlay itself preserves
        Dignity-in-Practice by keeping the case reversible, non-diagnostic,
        non-tribunal, non-person-ranking, and open to rival formalizations.

  scale_matrices:
    note: >
      Paper-derived scale overlays and projections are structural only. They
      must not become person evaluation, maturity scoring, diagnosis, or
      enforcement logic.

    firewall_matrices:
      second_firewall_what_conflict_is_not:
        status: "satisfied"
        note: >
          CONFLICT must remain a descriptive structural lens. It must not become
          a solution manual, diagnostic tool, moral tribunal, personality
          model, enforcement script, governance authority, or proof of PMS Base.
        not_conflict:
          - "diagnosis"
          - "personality_typing"
          - "moral_verdict"
          - "sanction_logic"
          - "solution_procedure"
          - "governance_authority"
          - "pms_base_validation"
        misuse_patterns:
          solution_manual_drift:
            pattern: "CONFLICT language is used to imply repair steps or intervention scripts."
            prohibited_use: "solution_procedure"
            case_relevance: "absent"
          diagnostic_drift:
            pattern: "Conflict structure is converted into a diagnosis, trait, or person-type."
            prohibited_use: "diagnosis_or_personality_typing"
            case_relevance: "risk"
          moral_tribunal_drift:
            pattern: "Σ-failure, binding collision, or asymmetry is used to assign blame or virtue."
            prohibited_use: "moral_verdict"
            case_relevance: "risk"
          sanction_logic_drift:
            pattern: "Conflict legibility is treated as a warrant for punishment, exclusion, or enforcement."
            prohibited_use: "sanction_logic"
            case_relevance: "absent"
          governance_authority_drift:
            pattern: "PMS-CONFLICT is treated as if it can itself authorize institutional decisions."
            prohibited_use: "governance_authority"
            case_relevance: "absent"
          pms_base_validation_drift:
            pattern: "Successful conflict mapping is treated as validation of PMS Base."
            prohibited_use: "pms_base_validation"
            case_relevance: "risk"
          person_near_labeling_drift:
            pattern: "Scene-bound conflict descriptors are attached to persons, groups, or identities."
            prohibited_use: "irreversible_person_labeling"
            case_relevance: "risk"
        red_zone_prohibited_uses:
          - "public or media-amplified person-near conflict labeling"
          - "use in hiring, sanction, disciplinary, custody, forensic, or coercive decision contexts"
          - "conversion of conflict signatures into guilt, competence, maturity, dignity, or risk scores"
          - "use of exposure capture or asymmetry lock-in language to justify enforcement"
          - "use of terminal-regime language to claim no further analysis, appeal, or repair is possible"
          - "excerpting without mode, publicness, misuse-gradient, and boundary declarations"
          - "treating downstream governance as if it were still PMS-CONFLICT analysis"
        case_application: >
          The firewall is satisfied. The overlay is descriptive only and blocks
          diagnosis, person-typing, moral tribunal use, sanction logic,
          governance authority, and PMS Base validation. The main misuse risks
          are diagnostic drift, moral tribunal drift, person-near labeling, and
          over-reading the successful fit of "asymmetry lock-in" as PMS
          validation.

    theta_history_scaling:
      label: "Θ-history scaling / young Α-field"
      applicability: "weak"
      scope: "regime_description_not_actor_attribute"
      methodological_boundary: >
        Θ-history scaling describes regime production conditions. It does not
        essentialize persons, groups, or roles.
      operators_under_load:
        - "Α"
        - "Θ"
        - "Ω"
        - "Φ"
      non_operator_constructs_reference:
        young_A_field:
          is_operator: false
          applicability: "not_applicable"
          definition: >
            Young Α-field names a regime in which the enabling conditions for
            attractor stabilization are recent or recently intensified.
            Patterns appear volatile, rapidly re-labeled, and
            exposure-sensitive because Θ is compressed and Φ is accelerated
            faster than Σ can consolidate.
          operator_touchpoints:
            - "Α"
            - "Θ"
            - "Φ"
            - "Ω"
            - "Λ"
          note: "Regime diagnosis only; not a person or group attribute."
          case_application: >
            Young Α-field dynamics are not applicable because no historical
            onset, recent intensification, volatility, accelerated Φ, or
            compressed Θ-field is described.
      scale_axes:
        theta_pressure:
          level: "mixed"
          meaning: "How fast trajectories lock in and reversibility windows close."
          case_application: >
            Θ-pressure is mixed at the overlay level. Temporality is central to
            the concept, but the material does not specify speed, acceleration,
            accumulated cost, closure of windows, or historical duration.
        phi_frequency:
          level: "low"
          meaning: >
            How often structures are re-embedded into new frames such that
            interpretations mutate faster than consolidation can stabilize.
          case_application: >
            Φ-frequency is low in the supplied material. Recontextualization is
            relevant as a calibration question, but repeated reframing or rapid
            interpretive churn is not described.
      composite_regime_bands:
        selected_band: "C3_asymmetric_lock"
        C1_extended_stable:
          label: "C1 — Extended & stable"
          condition: "low Θ-pressure + low Φ-frequency"
          typical_risks:
            - "Complacency: treating slow drift as no drift."
            - "Under-reading Λ residue because it remains locally containable."
        C2_compressed_churn:
          label: "C2 — Compressed with churn"
          condition: "high Θ-pressure + high Φ-frequency"
          typical_risks:
            - "Essence drift: reading regime products as timeless traits."
            - "Narrative prosecution: Φ-substitution becomes mistaken for explanation."
            - "Irreversibility inflation under Ω/Θ exposure gradients."
        C3_asymmetric_lock:
          label: "C3 — Compressed with asymmetric exit"
          condition: "high Θ-pressure + Ω-amplified Χ_exit"
          typical_risks:
            - "Pseudo-symmetry narratives denying Ω while it governs cost."
            - "Treating imposed continuity costs as choice or preference."
        case_application: >
          C3_asymmetric_lock is selected as the best conceptual regime band
          because the case explicitly concerns asymmetry and difficulty of exit,
          interruption, or revision. The selection is schematic, not empirical:
          actual compression, exit asymmetry, and Χ-pricing are not evidenced.

    institutionalized_distance_scaling:
      label: "Institutionalized Χ scaling"
      applicability: "weak"
      description: >
        Institutionalized distance scaling tracks whether Χ is personal,
        informal, explicit, or coercively enforced. It evaluates the structure
        of distance availability, not persons.
      selected_band: "not_applicable"
      scale_bands:
        CHI-0:
          label: "No institutionalized Χ / personal steering only"
          chi_level: "none"
          expected_drift_tendencies:
            - "Φ-substitution"
            - "Α_conflict stabilization"
            - "Λ as control channel"
          anti_misuse_note: >
            Reading leadership failure as personal defect is invalid;
            instability is regime-produced by missing distance constraints.
        CHI-1:
          label: "Partial institutionalization / informal norms or weak mandates"
          chi_level: "partial"
          expected_drift_tendencies:
            - "reduced but persistent Φ-substitution"
            - "oscillation between integration attempts and Α_conflict"
          anti_misuse_note: >
            Partial Χ reduces volatility but does not eliminate substitution
            dynamics; stability should not be inferred as integrability.
        CHI-2:
          label: "Explicit institutionalized Χ / clear mandates and criteria"
          chi_level: "explicit"
          expected_drift_tendencies:
            - "lower Φ-substitution probability"
            - "reduced Α_conflict stabilization likelihood"
          anti_misuse_note: >
            Explicit Χ stabilizes legibility but does not guarantee
            integration; tragedy remains possible under binding collisions.
        CHI-3:
          label: "Enforced Χ / coercive or exposure-based enforcement"
          chi_level: "enforced"
          validity_gate_status: "FORMALLY_INVALID"
          expected_drift_tendencies:
            - "immediate stabilization with high downstream costs"
            - "dignity collapse and legitimacy erosion"
          anti_misuse_note: >
            Coercive enforcement violates Dignity-in-Practice and collapses Χ
            into domination; such regimes are invalid as PMS application.
      recognition_formulas:
        stable_regime:
          formula: "Ω guided + Χ institutional + Θ explicit → trust possible"
          case_application: >
            The stable recognition formula does not apply because no institution,
            explicit mandate, guided Ω, or institutional Χ is present in the
            material.
        unstable_regime:
          formula: "Ω guided − Χ → groups / narratives / Α_conflict"
          case_application: >
            The unstable recognition formula also does not apply as a scene
            claim. The case is too abstract to establish guided Ω without Χ or
            narrative-group conflict dynamics.
      validity_gate_reminder:
        applies:
          - "Χ"
          - "reversibility"
          - "D"
        note: >
          Any institutionalization of Χ must preserve reversibility and
          Dignity-in-Practice. Distance enforced through coercion, exposure, or
          humiliation invalidates PMS use.
      case_application: >
        Institutionalized distance affects the case only as a possible later
        operationalization requirement. The present overlay cannot assign a CHI
        band because no institutional setting is supplied.

    application_boundary_scaling:
      label: "Application boundary scaling"
      applicability: "active"
      description: >
        Application boundary scaling governs transfer of CONFLICT language into
        private, semi-public, institutional, public, or media-amplified
        contexts. It is a safety interface, not a theory extension.
      classification_axes:
        mode:
          value: "DESCRIPTIVE"
          allowed_values:
            - "DESCRIPTIVE"
            - "EVALUATION_OVERLAY"
          requirement: >
            Mode must be explicitly declared whenever analysis leaves purely
            descriptive circulation.
        publicness:
          value: "PRIVATE"
          allowed_values:
            - "PRIVATE"
            - "SEMI_PUBLIC"
            - "INSTITUTIONAL"
            - "PUBLIC"
            - "MEDIA_AMPLIFIED"
        misuse_gradient:
          value: "MG_LOW"
          allowed_values:
            - "MG_LOW"
            - "MG_MIXED"
            - "MG_HIGH"
      red_zone_mapping:
        status: "absent"
        definition: >
          Red zones are configurations where transfer of CONFLICT language
          becomes structurally invalid as PMS application due to irreversibility
          and coercive affordances.
        conditions:
          - "High or media-amplified publicness + MG_HIGH"
          - "Low reversibility environments / durable records / liability coupling"
          - "Person-near interpretation under asymmetry Ω"
          - "Asymmetric exposure where one role controls visibility"
        consequence: >
          Transfer is formally invalid; continued use constitutes a breach of
          the PMS entry condition.
        case_application: >
          The case does not enter a red-zone configuration. The overlay is
          descriptive, non-person-near, non-public, non-institutional, and
          non-enforcement-oriented.
      minimal_declaration_block:
        required_if_application:
          - "Mode declaration"
          - "Publicness level"
          - "Misuse gradient classification"
        note: >
          This block is a structural constraint, not a disclaimer. Absence of
          the declaration defaults the context to high misuse risk.
        case_application: >
          Mode: DESCRIPTIVE. Publicness: PRIVATE. Misuse gradient: MG_LOW. Any
          public, institutional, forensic, governance, or evaluative transfer
          would require a new declaration and would constitute a mode shift.
      reuse_protocol:
        for_excerpts:
          must_include:
            - "Compressed what this does not do statement"
            - "Publicness + reversibility red-zone reminder"
            - "Mode / publicness / misuse declaration if governance overlay is invoked"
          failure_effect: >
            Without these elements, excerpts predictably drift into
            pseudo-symmetry, moral substitution, person-labeling, and narrative
            immunization.
      operator_status:
        operators_under_load:
          - "guardrails_only: Χ + reversibility + D"
          - "Ω and Φ as typical misuse carriers under exposure"
        inference_operators: "not_permitted_in_this_scaling"
      case_application: >
        The application-boundary status is active and satisfied. The overlay
        remains descriptive and private; no evaluative, public, governance, or
        sanctioning use is authorized.

    terminal_positioning_projection:
      label: "Terminal regime projection / legibility without reintegration"
      applicability: "weak"
      description: >
        Projection that fixes the terminal position of PMS-CONFLICT within the
        PMS-domain stack. It marks the point at which operator-legible
        description remains possible while internal reintegration grammar is
        exhausted. Beyond this point, any continuation is structurally
        downstream.
      terminal_stack_claim: >
        Within the PMS-domain stack developed here, CONFLICT functions as the
        terminal domain layer: beyond maximal Δ–Ψ load under Θ/Ω/Χ, the model
        yields no further internal reintegration grammar — only downstream
        governance, institutionalization, decision, or evaluation.
      structural_full_stop_sentence: >
        This paper does not continue into solutions. It ends where praxis
        becomes tragically legible but no longer integrable within this
        descriptive pathway.
      terminality_without_finality: >
        The terminal claim concerns the descriptive architecture of
        PMS-CONFLICT, not the finality of conflict analysis as such. What
        reaches a limit is this grammar’s capacity to generate a further
        internal reintegration layer once incompatibility has stabilized under
        Θ, Ω, Ψ, and costly or asymmetric Χ.
      terminal_regime:
        is_operator: false
        applicability: "weak"
        minimal_operator_touchpoints:
          - "Σ"
          - "Θ"
          - "Ω"
          - "Ψ"
          - "Χ"
        note: >
          The terminal regime is not a failure state, not a diagnosis, and not a
          recommendation to act. It is a boundary condition of the descriptive
          grammar itself.
      case_application: >
        Terminal regime projection is weak. The case is conceptually compatible
        with terminality, but the material does not establish maximal Δ–Ψ load,
        failed Σ, sustained Ψ collision, costly Χ, or a point beyond which PMS
        reintegration grammar is exhausted.

    derived_axes_projection:
      note: >
        Optional structural projection of the CONFLICT configuration onto PMS
        derived axes. This is not a maturity score and not a person-level
        evaluation.
      axes:
        Awareness_A:
          structural_level: "high"
          operator_basis:
            - "Δ"
            - "Θ"
            - "Ω"
            - "Φ"
          structural_reading: >
            Awareness tends to increase because constraint regimes become
            legible. Θ-history is required to prevent essentialization; Φ
            acceleration raises the need for production-reading over
            attribute-reading.
          case_application: >
            CONFLICT heightens Awareness_A by isolating the specific danger that
            differences in position, exposure, dependency, responsibility, and
            exit are not merely static asymmetries but may harden into unequal
            distance or exit structures over time.

        Coherence_C:
          structural_level: "mixed"
          operator_basis:
            - "Σ"
            - "Φ"
            - "Θ"
            - "Ω"
            - "Ψ"
          structural_reading: >
            CONFLICT often exhibits high internal coherence within positions,
            while joint consolidation fails. Φ may sustain narrative legibility
            without producing shared Σ.
          case_application: >
            Coherence_C is mixed. The abstract reading is coherent, but the
            overlay explicitly preserves the Core caution that PMS coherence is
            not sufficient and may under-discriminate without concrete scene
            data.

        Responsibility_R:
          structural_level: "weak"
          operator_basis:
            - "Ω"
            - "Θ"
            - "Ψ"
            - "Χ"
            - "Λ"
          structural_reading: >
            Responsibility becomes structurally salient because binding persists
            under asymmetric exposure and path dependence. Attribution pressure
            increases while fair comparison may collapse.
          case_application: >
            Responsibility_R remains weak. The CONFLICT lens makes attribution
            pressure visible under Ω/Θ, but Ψ-binding and fair responsibility
            distribution are not established by the abstract material.

        Action_E:
          structural_level: "constrained"
          operator_basis:
            - "Χ"
            - "Θ"
            - "Ω"
            - "Σ"
            - "Φ"
          structural_reading: >
            Action is structurally constrained because exit or interruptibility
            is priced or asymmetric and because Σ-work does not yield shared
            continuation.
          case_application: >
            Action_E is constrained at the conceptual level because the case
            concerns difficulty of revision, interruption, or exit. It remains
            under-specified as enacted action because no actor or action
            trajectory is supplied.

        Dignity_in_Practice_D:
          structural_level: "active"
          operator_basis:
            - "Ω"
            - "Θ"
            - "Χ"
            - "Φ"
            - "Ψ"
          structural_reading: >
            D is a practice constraint, not an operator. It remains feasible
            when distance is real and exposure is bounded; it degrades when
            Ω/Θ amplify vulnerability and Φ converts interpretation into
            pressure.
          case_application: >
            Dignity-in-Practice remains active as an application constraint.
            The CONFLICT overlay does not convert asymmetry, lock-in, Σ-risk,
            or terminality into shame, ranking, diagnosis, coercion, or
            person-near verdict.

      constraints:
        no_scoring_rule: >
          Do not convert the axis projection into numeric scores, rankings,
          maturity labels, or person-level typologies. Axis projection is for
          structural readability only.
        validity_gate_reminder: "Any application use remains gated by Χ + reversibility + D."

  conflict_overlay_quality_control:
    status: "passed"
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      no_person_level_judgment: true
      no_solution_or_intervention_script: true
      no_sanction_logic: true
      no_diagnosis_or_person_typing: true
      conflict_not_treated_as_essence: true
      terminality_not_treated_as_finality: true
      downstream_docking_marked_as_mode_shift: true
      publicness_overlay_not_operator: true
      misuse_gradient_not_operator: true
      conflict_attractor_not_operator: true
      dignity_in_practice_preserved: true
      reversibility_preserved: true
      distance_chi_preserved: true
      drift_patterns_not_person_labels: true
      scale_matrices_not_scores: true
      red_zone_checked: true
      non_capture_preserved: true
    issues_found:
      - "none"
    correction_required: false
    final_overlay_judgment: >
      The CONFLICT overlay is valid, bounded, and correctly subordinated to the
      completed PMS Core case because it adds conflict-specific visibility
      without redefining PMS Base, altering dependencies, rewriting the Core
      pass, or converting structural drift into diagnosis or verdict.

  conflict_overlay_synthesis:
    primary_conflict_reading: >
      PMS-CONFLICT makes visible that the Core case's asymmetry lock-in
      structure can be read as a conflict-specific regime risk: incompatibility
      may stabilize when Ω and Θ harden differences while Χ, revision,
      interruption, or exit become priced or asymmetric. The overlay does not
      add empirical findings; it isolates the conflict grammar latent in the
      Core reading. Its strongest contribution is to distinguish a merely
      asymmetrical situation from a conflict-prone lock-in structure in which
      distance, exit, delay, or revision are not equally available across
      positions.
    stabilized_incompatibility_result: >
      Stabilized incompatibility is conceptually relevant but empirically
      under-specified. The case names the relevant structure, but no concrete
      conflict attractor, recurrence evidence, binding collision, public
      exposure pattern, or failed shared integration is supplied. The overlay
      therefore treats stabilization as a threshold to be tested, not as a
      completed result.
    sigma_result: >
      Σ does not fail as a finding. It remains a weak calibration point: the
      overlay warns that integration may become local only, non-shared, or too
      costly under Ω/Θ/Χ pressure, but this is not established. PMS coherence
      in the Core pass and CONFLICT legibility in the overlay are both
      insufficient to prove shared integrability or shared non-integrability.
    binding_result: >
      Ψ-binding is weak. Responsibility is mentioned, but binding collision is
      only a risk because the case does not describe concrete self-bindings,
      commitments, duties, promises, role obligations, or incompatible
      obligations. The overlay must therefore not convert responsibility
      language into blame, culpability, betrayal, legal duty, or person-level
      moral failure.
    asymmetry_result: >
      Ω is central. The overlay specifically reads asymmetry as potentially
      distributing exposure, dependency, exit capacity, revision cost, delay
      cost, liability, and capacity for distance unevenly across positions. This
      remains structural and conceptual; it is not a legal, empirical, clinical,
      or forensic determination that such unequal distribution actually occurred.
    temporality_result: >
      Θ is central. The overlay reads the case as a temporal-hardening problem:
      asymmetries may become less revisable, less interruptible, and harder to
      leave as patterns stabilize or costs accumulate. However, no actual
      sequence, duration, acceleration, recurrence, or point of irreversibility
      is supplied, so Θ supports conceptual legibility rather than empirical
      lock-in proof.
    distance_exit_result: >
      Χ is available in the analysis as reflective distance and is possibly
      priced or asymmetric in the case structure. Actual priced Χ, asymmetric
      exit, institutionalized distance, coercively imposed distance, or
      unequal reflection cost is not established. The overlay therefore keeps
      Χ as both a PMS application constraint and a conflict-relevant cost
      question.
    exposure_publicness_result: >
      Publicness P is not active in the case material. Misuse gradient MG is
      low within the present descriptive setting and becomes relevant only if
      the overlay is excerpted or transferred into public, institutional,
      evaluation, governance, legal, forensic, or person-near contexts. Such
      transfer would require a new mode declaration and would not be a simple
      continuation of this descriptive overlay.
    dignity_result: >
      Dignity-in-Practice is preserved. It remains an application constraint,
      not an ontological claim, moral ranking, diagnosis, maturity label, or
      proof of superiority. Dignity collapse is only a misuse risk and would
      become relevant if CONFLICT language were used to shame, rank, expose,
      diagnose, or coercively label persons or positions.
    terminality_result: >
      The case remains below active terminal-regime threshold. Terminality is
      weakly relevant as a possible limit case, but no exhausted Σ, binding
      collision, fully stabilized incompatibility, maximal Δ–Ψ load, or costly
      asymmetric Χ regime is shown. Terminality therefore names a boundary
      possibility within the CONFLICT grammar, not a final state of the case.
    downstream_docking_result: >
      Downstream docking is not triggered. Any governance, institutional,
      decision, legal, forensic, clinical, evaluative, or implementation
      continuation would be a mode shift rather than a continuation of
      PMS-CONFLICT analysis. The overlay provides no solution script, sanction
      logic, intervention pathway, or decision authority.
    non_capture_result: >
      Non-capture remains open for moral remainder, lived experience, material
      constraint, legal meaning, care ethics, domination theory, coercion
      analysis, institutional path-dependence, systems-theoretic accounts,
      phenomenology, and other rival conflict grammars. Resistance, rupture,
      silence, non-fit, or rival framing must not be automatically redescribed
      as PMS drift, CONFLICT drift, failed integration, failed maturity, or
      incomplete recontextualization.
    final_conflict_formula_or_signature: >
      DRIFT_asymmetry_lock_in + weak{CONFLICT_stabilized_pattern,
      DRIFT_binding_collision, CONFLICT_terminal_core} with P:not_applicable,
      MG:low, terminal_regime:weak, downstream_docking:not_triggered.
    final_claim_boundary: >
      This CONFLICT overlay adds visibility for stabilized incompatibility,
      binding collision, asymmetry lock-in, exposure capture, dignity collapse,
      scale/cost regimes, terminal descriptive positioning, and downstream
      docking boundaries. It does not revise PMS Base, rewrite the PMS Core
      pass, change PMS dependencies, diagnose persons, rank persons, prescribe
      intervention, generate solution procedures, authorize governance or
      sanction, validate PMS, or claim final capture of conflict.