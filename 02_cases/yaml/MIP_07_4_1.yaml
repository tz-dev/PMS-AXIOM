    - structural_case_review
    - template_performance_check
    - philosophical_anthropology_discussion
    - private_model_alignment_review
    not_allowed_use:
    - person_label
    - public_shaming
    - individual_sanction
    - HR_decision
    - forensic_use
    - clinical_diagnosis
    - dignity_score
    - maturity_ranking
    - public_D_reading
    - solution_procedure
    - PMS_or_MIP_validation_claim
    review_required:
      required: true
      review_date_or_condition: Before any public, institutional, evaluative, person-near, intervention-oriented, or decision-basis
        use.
      falsifier: If the analysis is used to label persons, assign responsibility without actors/levers, activate D without
        safe material, or imply terminal conflict without CONFLICT thresholds, it fails transmission.
  uniform_report:
    generate_only_from_structured_fields: true
    title: 'MIP analysis: Conflict as structural incompatibility'
    overview_4_to_7_sentences: 'This MIP application treats the completed PMS Core and PMS-CONFLICT analyses as a private
      structural working note about a philosophical case, not a concrete praxis scene. The case is suitable for ACRP reflection
      only in a non-scored, conceptual way because no actors, roles, evidence, decision sequence, or dignity-in-practice enactments
      are supplied. The strongest MIP contribution is guardrail discipline: the analysis protects the separation between profile
      and person, keeps D inactive, refuses unsupported A/M scoring, and blocks misuse as diagnosis, tribunal, sanction, or
      public label. The PMS-CONFLICT finding that the case resembles a local/shared Σ tension is preserved but not inflated
      into terminal conflict. IA is not assessed as case content because no concrete asymmetry is established. The result
      is usable only as a reversible structural working note with explicit non-capture and rival-readings preserved.'
    key_findings:
    - The case is green-zone, private, philosophical, and non-concrete.
    - A-score and M-score are not assigned because the necessary scene, role, and evidence basis is absent.
    - IA-box is functional only as a transmission and interpretive-authority check, not as a case-content verdict.
    - D-module remains off; dignity protection functions only as guardrail.
    - The strongest substantive pattern is local coherence without established shared integration, not terminal conflict.
    - Rival readings and non-capture remain open.
    A_summary: Awareness is strong at the analytic level because boundaries, roles, publicness, model limits, and bias risks
      are named; no A-score is assigned to the case as an enactment.
    M_summary: M is not assigned because no actor, knowledge condition, power/control lever, predictability field, alternatives,
      or concrete integration attempt is supplied. The ceiling rule would block high M if scoring were forced.
    IA_box_summary: No case-content IA finding is made. The only active IA concern is interpretive asymmetry created by formal
      model language, managed through transparency, reversibility, non-scoring, and working-note status.
    D_summary_if_activated: D is not activated. D0 remains untouched, D1/D2 are not assessed, no dignity score is produced,
      and dignity protection operates only as a guardrail against shaming, ranking, or public person-near use.
    trajectory_summary: The analytic trajectory moves from abstract conflict material to PMS structural mapping to CONFLICT
      weak projection to MIP guardrail analysis. Discrimination increases, while scoring and terminal classification remain
      withheld.
    guardrail_status: Guardrails are satisfied for private structural working-note use but not for decision-basis transmission.
      Red zones are avoided.
    transmission_status: working_note
    practical_implications: Do not use this as a score, diagnosis, legal/forensic judgment, HR input, sanction basis, or public-facing
      label. If a concrete case is later supplied, rerun MIP with roles, publicness, information basis, affected perspectives,
      IA criteria, and D activation checks.
    conclusion: The MIP analysis confirms that the prior PMS and PMS-CONFLICT readings are structurally disciplined when kept
      reversible, non-scoring, non-diagnostic, and non-terminal; its main added value is not a new conclusion about conflict
      but a guardrail-rich maturity-of-analysis check.