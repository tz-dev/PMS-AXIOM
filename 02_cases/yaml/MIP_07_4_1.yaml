schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml

application_note: This document fills the MIP case template for the previously completed PMS Core case and PMS-CONFLICT overlay.
  It does not redefine PMS operators, alter PMS dependencies, rewrite the PMS Core pass, or treat PMS-CONFLICT reduced signatures
  as PMS operators. Reflection mode is off; analysis depth is full.
case:
  meta:
    case_id: MIP-CONFLICT-STRUCTURAL-INCOMPATIBILITY-001
    case_title: Conflict as structural incompatibility
    documentation_date: '2026-05-28'
    analysts:
    - name: ChatGPT
      role: formalization_assistant
      observer_position: External structural analyst applying MIP as a working-version praxeological model to an already completed
        PMS Core case and PMS-CONFLICT overlay; no participant, authority, adjudicator, diagnostician, or implementation agent.
    language: en
    confidentiality_level: private_structural_working_note
    analysis_mode: full
    intended_use: structural_case_review_and_philosophical_anthropology_reflection_only
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: philosophy_anthropology
      d_activation_decision: not_activated
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    minimal_adulthood_check_note: Applicability gate reviewed only; no person-level adulthood, developmental status, maturity type, or subject-capacity assessment is performed because the case is a non-concrete philosophical structural working note.
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: The completed PMS Core case YAML for 'Conflict as structural incompatibility' and the appended PMS-CONFLICT
      overlay YAML. The underlying case material states that conflict is considered philosophically as the way practical,
      conceptual, or institutional trajectories can become structurally incompatible while each remains locally coherent within
      its own frame.
    secondary_material: MIP - Maturity in Practice.yaml used as the model reference and case template for this additional
      analysis. PMS.yaml remains the prior PMS Core reference for the completed PMS analysis, and PMS-CONFLICT.yaml remains
      an overlay/application profile for the conflict-specific extension.
    assumptions_and_inferences: The MIP analysis treats the case as a philosophical structural constellation, not as a concrete
      enactment involving identifiable persons. ACRP is therefore applied to the analytic treatment of the case and to possible
      role/structure conditions, not to a person. D is kept off because no dignity-in-practice enactments by persons are supplied.
      A-score and M-score are not numerically assigned because the case lacks a concrete scene, role-holder, time window,
      and observed enactment sequence.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: High coverage for conceptual structure and guardrail discipline; low coverage for concrete enactments,
        persons, institutions, evidence, and intervention context.
      reliability_estimate: Reliable as a bounded structural working note derived from documented PMS and PMS-CONFLICT analyses;
        not reliable as empirical, diagnostic, forensic, clinical, legal, implementation, or decision basis.
      known_gaps:
      - No concrete actors or role-holders are specified.
      - No institutional setting, evidence record, decision sequence, or harm trajectory is supplied.
      - No observed dignity-in-practice enactments are supplied.
      - No asymmetry of power, exposure, obligation, or exit cost is concretely evidenced.
      - No reliable basis exists for numeric A-band, M-band, IA result, or D-profile activation.
      main_bias_risks_here:
      - Over-mapping an abstract philosophical case onto maturity language.
      - Mistaking structural coherence of the YAML for practical adequacy.
      - Inflating local/shared integration tension into maturity failure.
      - 'Hindsight-style overpredictability: reading structural incompatibility as if downstream consequences were already
        knowable.'
      - Dignity-language overreach if D is activated without concrete dignity enactments.
  snapshot:
    short_case_description: A philosophical structural case in which conflict is understood as possible incompatibility between
      locally coherent trajectories across practical, conceptual, or institutional frames.
    central_actors_and_roles:
    - No concrete human actor is analyzed.
    - 'Analytic object: frame-bound trajectories and their local/shared coherence relation.'
    - 'Observer role: external structural analyst producing a private working note.'
    - 'Possible abstract roles: frame-holder, affected role, mediator, institution, analyst; all remain conceptual and non-personal.'
    guiding_question: How can MIP make visible the maturity-in-practice conditions and guardrail risks around a PMS/CONFLICT
      reading of structural incompatibility without turning the case into a person score, a diagnosis, a verdict, or an integration
      mandate?
    level:
    - philosophical
    - conceptual
    - structural
    - non-concrete-scene
    - green-zone working note
    first_visible_asymmetry: No concrete asymmetry is visible. Asymmetry appears only as a conditional analytic risk if future
      versions specify power, exposure, obligation, capacity, vulnerability, or exit-cost gradients.
    first_visible_D_themes_optional:
    - D is not activated as case content.
    - Dignity protection is relevant only as a guardrail against person-labelling, shaming, ranking, public exposure, or tribunal
      use.
  role_mapping:
    object_of_observation:
      type: conceptual_structural_constellation
      description: A locally coherent set of trajectories that may become mutually incompatible when compared, coordinated,
        recontextualized, or placed under shared integration pressure.
      role: object_of_structural_reflection_not_person_or_group
      not_person_as_whole: true
    observer_position:
      role: formalization_assistant_and_structural_analyst
      power_relation_to_object: 'No direct power over persons or institutions is involved. The main power risk is interpretive:
        model language may harden into verdict, ranking, or authority if transmitted without guardrails.'
      possible_effects_of_analysis: Can clarify distinctions between local coherence, shared integration, conflict-legibility,
        terminal conflict threshold, and non-capture. Can also mislead if treated as a score, solution procedure, or validation
        of PMS/MIP.
    involved_roles:
    - role: conceptual_trajectory_or_frame
      mandate: To remain locally coherent according to its own relevance criteria, norms, practices, or institutional logic.
      built_in_asymmetries:
      - 'Possible but not specified: one frame may have more authority, publicness, enforcement power, or interpretive dominance.'
      publicness_level: private_abstract
      dignity_exposure: none_as_case_content; only guardrail-level exposure risk if attached to identifiable persons later
    - role: analyst_or_model_user
      mandate: To preserve role/context distinction, non-capture, reversibility, score hygiene, and separation between profile
        and person.
      built_in_asymmetries:
      - Interpretive asymmetry between model-user and represented case structure.
      - Potential authority effect of formal YAML notation.
      publicness_level: private_working_note
      dignity_exposure: low_if_private_and_non-personal; higher if excerpted or person-attached
    publicness:
      level: private_working_note
      A_P_relevance: Awareness of publicness is required because formalized conflict language may be reused or excerpted beyond
        the private analytic setting.
      P_PU_relevance: Public power to act is not active in the case content, but transmission could create public interpretive
        power if the analysis is published, institutionalized, or attached to actors.
      D_P_relevance_if_D_active: D-P is not active; if the analysis became public and person-near, D-P risk would rise sharply
        and D-module guardrails would need renewed assessment.
      public_shaming_risk: Low in current use; prohibited if the analysis is used to label or expose identifiable persons,
        groups, or institutions.
      reversibility_risk: Low in current private setting; increases if formal signatures are excerpted into durable public
        or institutional records.
  frame_vs_variability:
    frame_elements:
    - element: PMS operator inventory and dependencies in the completed core analysis
      reason_fixed_or_slow: They belong to PMS.yaml and must not be revised by this MIP application.
      protected_goods:
      - model integrity
      - dependency hygiene
      - non-invented operator use
    - element: PMS-CONFLICT overlay status as application profile only
      reason_fixed_or_slow: The overlay is subordinate to PMS and cannot become a new PMS Base or operator extension.
      protected_goods:
      - subordination discipline
      - non-capture openness
      - non-diagnostic conflict analysis
    - element: MIP guardrails around person/enactment separation, score hygiene, D0 protection, red zones, and transmission
      reason_fixed_or_slow: They are constitutive conditions for valid MIP use.
      protected_goods:
      - dignity protection
      - reversibility
      - non-shaming analysis
      - avoidance of score misuse
    variability_elements:
    - element: How strongly ACRP is applied to an abstract non-scene case
      possible_change: Can remain qualitative and non-scored, or become more concrete if a scene, roles, and evidence are
        later supplied.
      responsible_roles:
      - analyst
      - model_user
      - future case provider
    - element: D-module activation
      possible_change: May remain off, or be activated only if concrete dignity-in-practice enactments, safe communication
        space, and guardrails are fulfilled.
      responsible_roles:
      - analyst
      - moderator_if_any
      - affected_roles_if_any
    - element: Transmission status
      possible_change: Can remain working note or become a reviewed structural report if scope, roles, publicness, score hygiene,
        bias risks, and reversibility are checked.
      responsible_roles:
      - analyst
      - reviewer
      - user
    unfair_high_M_zones:
    - Assigning high shared responsibility where no actor, knowledge, predictability, alternatives, or power to act are specified.
    - Treating terminal CONFLICT thresholds as if they were already met by the abstract case material.
    - Reading downstream conflict consequences as fixed, fully predictable, or already determined without concrete evidence.
    system_as_excuse_risk:
    - Using abstract structural incompatibility to erase concrete responsibility where future evidence might show real levers.
    - Using 'frames' or 'systems' to avoid naming power, exposure, and repair obligations in later applied scenes.
    - Treating non-capture as a reason to stop examining practical harms.
    D1_D2_realistically_improvable_where:
    - Not applicable as case content because no D1/D2 enactments are supplied.
    - As analysis practice, dignity-in-practice is improvable by keeping the reading private, role-bound, reversible, non-shaming,
      and non-ranking.
  acrp_profile:
    A_awareness:
      observations: The completed PMS and CONFLICT analyses show strong structural awareness of the distinction between local
        coherence, shared integration, conflict-legibility, terminal conflict thresholds, and non-capture. MIP adds awareness
        of guardrail, transmission, score, and dignity-risk conditions.
      available_information: Available information includes the abstract case material, the PMS Core case analysis, the CONFLICT
        overlay, and MIP's model/template. It does not include empirical observations or participant testimony.
      realistically_knowable: At this stage it is realistically knowable that the case is non-concrete, philosophical, and
        structurally abstract. It is not realistically knowable whether a specific actor had knowledge, alternatives, predictability,
        or power to repair.
      blind_spots: The major blind spot is the temptation to treat a formally coherent multi-model analysis as evidence that
        the conflict is captured, diagnosable, integrable, terminal, or mature/immature.
      role_awareness_A_R: 'Role awareness is good at the analysis level: the analyst role is not an adjudicator, clinician,
        forensic evaluator, HR decision-maker, or solution designer. Case roles remain abstract and non-personal.'
      publicness_awareness_A_P: Publicness is explicitly low/private in current use, but the risk of excerpt drift, formal-authority
        effect, and person-near misuse is recognized.
      bias_awareness: Bias awareness includes over-assimilation to PMS/MIP grammar, hindsight bias, coherence bias, terminality
        inflation, and dignity-language overreach.
    C_coherence:
      observations: The analysis is coherent if it keeps MIP subordinate to its own guardrails and does not rewrite PMS or
        CONFLICT results. Coherence is high as a structural working note, but must not be mistaken for practical sufficiency.
      word_deed_relation: The analysis says it avoids scoring, diagnosis, and verdict; it must enact that by marking A/M/IA/D
        as non-scored or not applicable where the material is abstract.
      role_context_coherence: Role/context coherence is preserved by identifying the object as a conceptual structural constellation
        rather than a person, concrete event, or institutional decision.
      narrative_coherence: 'Narrative coherence is strong around the core arc: local coherence does not equal shared integration;
        weak CONFLICT projection does not equal terminal conflict; MIP maturity language must remain guardrail-bound.'
      breaks_named_or_hidden: 'The main possible break is named: MIP normally analyses enactments and roles, while this case
        is abstract. This is handled by non-scored conceptual application rather than hidden scoring.'
    R_responsibility:
      observations: 'Responsibility is mostly meta-analytic: responsibility lies in how the analyst handles formal language,
        guardrails, reversibility, non-capture, and transmission. Case-content responsibility is not established.'
      responsibility_points: Responsibilities include not person-labelling, not assigning M-score without actors and levers,
        not activating D without dignity enactments, not treating Σ tension as moral failure, and not using the overlay as
        solution authority.
      assumed_responsibility: The analysis assumes responsibility for boundary marking, bias naming, role/context clarification,
        and refusal to overclassify the abstract case.
      shifted_or_refused_responsibility: No concrete responsibility is shifted to an actor. Potential misuse would occur if
        the analysis shifted model uncertainty into claims about persons, institutions, or moral fault.
      burdens_and_consequences: 'The burdens are interpretive and transmission-related: formal YAML may carry authority and
        must therefore remain visibly bounded, non-diagnostic, and revisable.'
    P_power_to_act:
      observations: 'Power to act exists at the analytic level: the analyst can keep D off, avoid scores, mark uncertainty,
        preserve non-capture, and provide working-note status. There is no case-level power-to-act finding because no concrete
        actors are supplied.'
      real_levers: Real analytic levers include scope declarations, non-scoring, IA non-assessment, D non-activation, red-zone
        checks, bias notes, and transmission restrictions.
      formal_vs_real_options: Formally, the template permits A-score, M-score, IA, D, trajectory, and steps. Really, the material
        only supports qualitative conceptual mapping and guardrail-based non-scoring.
      used_options: The analysis uses full template coverage while refusing unsupported numeric scoring or D activation.
      unused_options: Concrete intervention, individual responsibility attribution, IA verdict, public communication, D-Quick-Grid,
        and numerical bands are left unused or not assigned.
      ceiling_rule_relevance: 'The ceiling rule is relevant as a protection: because predictability, alternatives, and actor
        levers are not supplied, high M cannot be assigned.'
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: Not observed; no person or self-treatment data are supplied.
      self_neglect: Not observed; no bodily, material, or everyday self-care data are supplied.
      shame_dynamics: Not observed as case content; only a misuse risk if the analysis is turned into shaming or ranking.
      degradation_of_others: Not observed; no relational conduct is supplied.
      public_shaming: Not present in the current private structural working note; prohibited if transmitted publicly as person-near
        analysis.
      protest_or_refusal: No concrete protest or refusal is supplied; conceptual non-fit must not be treated as immaturity
        or D failure.
      dignity_protection: 'Active only as a guardrail: D0 is untouched, D1/D2 are not scored, and D-module remains off.'
    next_step_if_relevant: Keep D-profile inactive unless future concrete material supplies dignity-in-practice enactments
      and a safe, role-bound, non-public communication space.
  acrpd_submodules_profile:
    A:
      A-I: Not applicable to inner states. As structural analysis, internal reflection is replaced by documented awareness
        of model limits and overreach risks.
      A-R: 'Active at analyst level: roles are separated into conceptual object, analyst, possible future frame-holder, and
        possible affected role. No person is profiled.'
      A-C: 'Active: context is philosophical, abstract, private, green-zone, and not a concrete praxis scene.'
      A-IM: 'Active as transmission awareness: formal conflict language may have downstream effects if reused, excerpted,
        or attached to actors.'
      A-P: 'Active as publicness awareness: publicness is low now, but public or institutional transfer would increase risk.'
    C:
      C-S: Not socially instantiated; no social interaction scene is supplied. Social coherence is only a future application
        question.
      C-P: Maintained as guardrail coherence under possible interpretive asymmetry; no concrete power context is evidenced.
      C-N: 'Strong conceptual narrative coherence: local coherence and shared integration are distinguished, and terminal
        conflict classification is rejected.'
      C-I: Coherent with model rules if PMS Base, PMS-CONFLICT overlay status, and MIP guardrails remain distinct and non-fused.
    R:
      R-I: No individual responsibility is assigned. Analyst responsibility is limited to boundary discipline and non-overclaiming.
      R-S: Social responsibility is not case-established; future use would require affected perspectives and role mapping.
      R-E: 'Ethical responsibility is active as restraint: do not score persons, diagnose, shame, or turn conflict legibility
        into verdict.'
      R-P: 'Public responsibility is latent: any public transfer requires publicness, misuse gradient, reversibility, and
        D-protection checks.'
    P:
      P-I: No inner agency is assessed. Analytic agency exists as the ability to keep unsupported modules inactive.
      P-S: No social agency is assessed because no social scene is supplied.
      P-C: 'Conceptual agency is active: the analysis can shape how conflict is framed, especially by preserving non-capture
        and avoiding terminality inflation.'
      P-PU: Public agency is inactive in the current private working note; high-risk if later publicized or institutionalized.
    D:
      active: false
      D-I: Inactive; no self-treatment material.
      D-B: Inactive; no bodily or material self-care material.
      D-R: Inactive as case content; guardrail only against degrading others through the analysis.
      D-P: Inactive as case content; guardrail only against public shaming or person-near exposure.
      note: D-submodules remain inactive because D-module is not activated and guardrails require concrete, safe, role-bound
        material before D-profile use.
  scores_and_ia:
    A_score:
      A_band: not_assigned_non_concrete_case
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: Private philosophical structural working note; no concrete actor, role-holder, event, or observed
        enactment sequence.
      justification:
        A_awareness: Awareness is structurally high in the analysis but not converted into a case score because no enactment
          object suitable for scoring is supplied.
        C_coherence: Coherence is strong at the level of model-boundary discipline but this does not justify numeric maturity
          scoring.
        R_responsibility: Responsibility is meta-analytic and transmission-related; no actor-level responsibility is assessed.
        P_power_to_act: Power to act exists only in analytic handling, not in a concrete case scene.
        modulators_context: The non-concrete status, abstract philosophical level, and absence of actor data make scoring
          inappropriate.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned_no_actor_or_role_holder
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No role-holder, decision-maker, institutional agent, or time-bounded enactment is specified.
      five_factors:
        knowledge: Cannot be assessed for a concrete actor; only analytic knowledge of model limits is present.
        power_control: Cannot be assessed for case actors; no levers or control positions are specified.
        predictability: Cannot be assessed; no downstream consequence chain or foresight conditions are provided.
        access_to_alternatives: Cannot be assessed; no decision alternatives or exit options are provided.
        serious_integration_attempt: Cannot be assessed as case content; the analysis itself seriously distinguishes local
          coherence, shared integration, non-capture, and terminal threshold.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: If a numerical M-band were forced, the ceiling rule would block high M because predictability and alternatives
          are not supplied. The disciplined result is not to assign M at all.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: No concrete asymmetry named; only conditional risks around interpretive authority, publicness, and
        possible future power/exposure gradients.
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: satisfied_for_analysis_scope
        notes: The analysis transparently states its information basis, non-concrete status, and refusal to score or diagnose.
      J_justified:
        status: satisfied_for_structural_working_note
        protected_good_or_purpose: Clarifying conceptual conflict while protecting against person-labelling, overclassification,
          and misuse of formal model language.
        notes: Justification would fail if the analysis were used as decision basis, public label, or authority for sanction.
      TB_time_bound:
        status: partially_satisfied
        review_points_or_conditions: Review required if concrete actors, institutional use, public transmission, D-module
          activation, or intervention intent is introduced.
        notes: The working note is temporally bounded by current abstract material and must be revisited under any applied
          transfer.
      R_reversible:
        status: satisfied_as_private_working_note
        real_return_or_exit_options: The analysis can be revised, withheld, replaced by rival formalizations, or downgraded
          to non-capture without practical sanction.
        notes: Reversibility would decrease if the analysis entered durable public or institutional records.
      result: functional_asymmetry_check_for_current_private_use; no IA finding about case content
      short_justification: The only active asymmetry is the analyst/model-language authority risk, which is managed through
        scope, non-scoring, non-publicness, and transmission guardrails.
      immediate_action: Keep as working note; do not transmit as decision basis or attach to persons.
  ia_localisation:
    knowing:
      issue: The analysis knows the model structures and prior case analyses, but lacks concrete scene evidence.
      possible_intervention: State the evidence boundary explicitly and keep scores and D inactive.
    being_able:
      issue: The analyst is able to produce formal structure but not able to validate empirical maturity, responsibility, or
        dignity dynamics.
      possible_intervention: Limit output to conceptual working-note status and require future evidence for applied use.
    being_permitted:
      issue: MIP permits structural reflection in green-zone contexts but not red-zone uses such as diagnosis, HR, forensic,
        public shaming, or person labelling.
      possible_intervention: Keep application zone green and add a transmission warning if reused.
    willing:
      issue: The analysis must be willing to resist overclassification even when the YAML structure invites completion.
      possible_intervention: Use 'not assigned', 'not applicable', and 'conditional risk' where unsupported rather than filling
        fields with false precision.
  ia_protection:
    transparency_measures:
    - State that this is a private structural working note.
    - State that the case is not a concrete scene.
    - State that A-score, M-score, IA, and D-profile are not person-level findings.
    justification_measures:
    - Use MIP only to clarify guardrail, responsibility, and maturity-in-practice conditions around the prior PMS/CONFLICT
      analyses.
    - Avoid any solution, sanction, diagnosis, or public authority function.
    time_boundedness_measures:
    - Review if a concrete case, actor, institutional setting, public transmission, or intervention goal is added.
    - Review if D-module activation is requested or implied.
    reversibility_measures:
    - Keep all findings revisable.
    - Permit rival formalizations and non-capture.
    - Do not create durable person labels or decision records.
    participation_or_voice_measures:
    - No affected party is present because the case is abstract.
    - If applied to concrete persons later, affected perspectives and counter-perspectives must be included before transmission.
    dignity_protection_measures:
    - Keep D-module off.
    - Do not infer D0, D1, or D2 status from structural conflict.
    - Do not use maturity or conflict language for shaming, ranking, or humiliation.
    review_or_falsifier:
      date_or_interval: review_before_any_non_private_or_concrete_application
      falsifier_question: Does the analysis remain a reversible structural working note, or has it begun to function as a
        person-near score, verdict, diagnosis, intervention script, or authority claim?
      responsible_roles:
      - analyst
      - user
      - future_reviewer_if_transmitted
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Abstract case material: conflict as local coherence becoming structural incompatibility across frames.'
      A_band: not_assigned; structural awareness begins with frame distinction
      M_band: not_assigned; no actor responsibility basis
      D_observation_optional: D inactive; no D enactment material
      key_context_role_power_situation: Philosophical conceptual framing with no concrete asymmetry.
    - timepoint: t1
      short_description: 'PMS Core analysis: operators map the case with strong non-capture, rival readings, and no empirical
        or diagnostic claims.'
      A_band: not_assigned; formal awareness improves but remains non-scored
      M_band: not_assigned; no concrete role-holder or consequence chain
      D_observation_optional: Dignity-in-Practice appears only as praxeological guardrail, not D-profile content
      key_context_role_power_situation: 'Structural mapping under PMS entry conditions: Distance, reversibility, and dignity-in-practice.'
    - timepoint: t2
      short_description: 'PMS-CONFLICT overlay: local/shared Σ tension becomes more visible, while terminal CONFLICT regime
        is rejected as unestablished.'
      A_band: not_assigned; discrimination increases without scoring
      M_band: not_assigned; binding, asymmetry, predictability, alternatives, and priced distance remain absent
      D_observation_optional: Dignity collapse is not present; D remains a guardrail
      key_context_role_power_situation: Conflict-legibility increases, but no terminality, exposure capture, asymmetry lock-in,
        or binding collision is found.
    - timepoint: t3
      short_description: 'MIP application: maturity-in-practice discipline checks whether the prior analyses remain non-scoring,
        non-diagnostic, reversible, and transmission-safe.'
      A_band: not_assigned; qualitative structural maturity of the analysis is reviewable but not scored
      M_band: not_assigned; shared responsibility cannot be assigned without concrete actors and levers
      D_observation_optional: D-module remains off; dignity protection remains active as guardrail
      key_context_role_power_situation: Private green-zone structural working note with low publicness and low misuse gradient
        if not excerpted.
    A_t:
      pattern: A(t) increases in structural discrimination across t0-t3, but this is an analytic trajectory of the case treatment,
        not a person maturity label.
      notes: 'The strongest maturity feature is the repeated refusal to overclassify: local coherence is not shared integration;
        weak CONFLICT projection is not terminal conflict; MIP A/M/IA/D are not forced.'
    M_t_RVR_t:
      RVR_description: RVR(t) applies only to the analytic handling, not to absent case actors. Knowing, being able, being
