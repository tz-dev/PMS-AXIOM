pms_logic_overlay_application:
  schema_version: "PMS-LOGIC_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-LOGIC.yaml"
  paper_source_file: "PMS-LOGIC.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–LOGIC Application Profile"
    model_short: "PMS-LOGIC"
    status: "draft"
    last_updated: "2026-04-06"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–LOGIC"
      subtitle: "Pre-Moral Foundations, Logical Limits, and Post-Moral Effects"
      source_file: "PMS-LOGIC.md"
    description: >
      PMS-LOGIC is applied here as an overlay/application profile for the
      completed PMS Core case "Grounding regress." It makes visible the
      LOGIC-specific boundary-management profile of the case: pre-moral
      structural legibility, logical non-closure, closure-pressure, sustainable
      non-assertion, and drift risks around dogmatic closure or logic-as-authority,
      without redefining PMS operators, altering PMS dependencies, introducing
      norms, or validating PMS Base.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "Completed PMS Core case YAML for Grounding regress"
    rule: >
      This LOGIC block is appended to or integrated into the already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      LOGIC constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The LOGIC overlay adds boundary, non-closure, closure-drive,
      reduced-signature, and failure-mode visibility only. It does not modify the
      already completed PMS Core case except as an appended overlay profile and
      does not claim metaphysical, empirical, diagnostic, legal-forensic,
      clinical, implementation, moral, or PMS Base validation status.

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-LOGIC introduces no amplification overlays beyond reduced signatures,
      structural failure modes, and paper-specific non-operator constructs. It
      remains an overlay/application profile only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          A meta-position and stop-capability are maintained. The LOGIC overlay
          does not fuse the case into verdict, authority, enforcement, certainty,
          moral demand, metaphysical proof, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          The LOGIC reading remains case-type-bound, revisable, and
          configuration-specific. It does not generate global person labels,
          irreversible interpretive claims, or final philosophical closure.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The LOGIC overlay does not shame, rank, humiliate, morally evaluate, or
          ontologically assess persons or groups. It remains restricted to
          structural attribution, boundary handling, and non-closure discipline.
    gate_result: "valid_as_logic_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any LOGIC reduced signature is shorthand only. Reduced signatures do not
      replace PMS dependencies. In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or Ψ
      remains dependency-respecting according to PMS.yaml.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  logic_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgments, no moral evaluation, no sanction logic."
      - "Focus on structures of praxis, not right or good morality."
      - "Audience: analysis of praxis and structure, not action guidance or decision rules."
    may_add_visibility_to:
      - "non-closure"
      - "closure-drive"
      - "logical boundary management"
      - "sustainable non-assertion"
      - "logic as ordering tool rather than authority"
      - "failure-mode constraints"
      - "LOGIC drift risks"
      - "counter-readings"
      - "reduced-signature shorthand"
    must_not_do:
      - "derive ought from being"
      - "introduce norms, values, duties, prescriptions, or moral rules"
      - "treat morality as a PMS operator"
      - "convert responsibility into blame"
      - "convert non-innocence into guilt"
      - "convert logical coherence into final authority"
      - "convert Σ into totalization"
      - "convert Ω into justificatory authority"
      - "convert Λ into defect, ignorance, nihilism, or metaphysical pointer"
      - "claim PMS Base validation"

  tripartition:
    pre_moral_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators_involved:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      claim: >
        This level identifies the structural conditions under which the case
        becomes praxeologically legible before evaluative or normative
        interpretation appears.
      case_application: >
        Grounding regress is structurally legible before any norm is introduced:
        a ground/grounded difference is marked, a further-ground demand is
        activated, a grounding-relevant frame makes the demand intelligible,
        terminal closure does not arrive within that frame, and the pattern may
        stabilize into recurrence. This does not assert that the regress is
        morally wrong, metaphysically real, epistemically vicious, or practically
        defective.
      no_normativity_introduced: true
      notes:
        - "No norms, values, duties, prescriptions, or moral commands are introduced."
        - "Patterns may stabilize without intention, moral assessment, or authority."

    logical_boundary_management:
      label: "Logical level of ordering and boundary management"
      applicability: "active"
      dominant_operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      dependency_note: >
        The listed operators are dominant boundary-management operators. Their
        PMS dependencies remain intact; especially Χ and Σ are not treated as
        dependency-free shorthand. LOGIC uses them here to mark the profile of a
        boundary problem, not to revise PMS operator order or dependency logic.
      claim: >
        Logic functions as an ordering and integration instrument. It may
        stabilize distinctions, test inferential pressure, identify frame-bound
        expectations, and make non-closure explicit. It does not thereby become
        final authority, metaphysical ground, normative source, or a substitute
        for the missing terminal ground where Λ persists.
      case_application: >
        The case centrally concerns logical boundary management: the frame seeks
        grounding sufficiency, but the recurrence of the further-ground demand
        prevents final closure. Logic can order the regress-form, distinguish
        closure-seeking from non-closure-bearing frames, and prevent category
        collapse. It can also show where an alleged solution changes the frame:
        foundationalist stopping, coherentist mutual support, infinitist
        continuation, pragmatic sufficiency, semantic deflation, or PMS
        structural projection. It cannot by itself decide whether the regress is
        vicious, benign, metaphysically real, epistemically necessary,
        pragmatically stoppable, or merely an artifact of a chosen frame.
      aphorism: "Logic is the beginning of everything — not the end."
      boundary_result: >
        The boundary is reached where the demand for grounding continues without
        a terminal ground supplied by the case material. Λ is carried as
        structured non-closure rather than repaired by assertion. Χ prevents the
        analysis from smuggling in forced closure, metaphysical authority,
        normative demand, or PMS validation. Σ remains coordinative and
        provisional: it may organize the regress-form, but it does not totalize
        the case or convert structural coherence into final philosophical
        settlement.

    post_moral_effects:
      label: "Post-moral level of effects"
      applicability: "not_applicable"
      operators_involved:
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      claim: >
        Effects become morally readable once praxis unfolds under asymmetry and
        irreversible time, while responsibility is reconstructed as
        attributability rather than as an ought.
      case_application: >
        The supplied case is an abstract philosophical problem-form, not a
        concrete praxis scene with agents, capacities, consequences, roles, or
        irreversible effects. Therefore post-moral effects, responsibility
        readability, non-innocence, and consequence-attribution are not activated
        as case content. The overlay preserves this boundary and does not derive
        duty, blame, guilt, sanction, or moral readability from the regress-form.
      core_formula: "Pre-moral in justification, logical in boundary management, post-moral in effect."
      no_ought_derived: true

  key_claims:
    C1_non_closure_as_strength:
      status: "active"
      claim: >
        Non-closure is treated as a structural strength rather than a mere
        deficiency. Persistent Λ prevents logical systems from compensating
        uncertainty with dogma or substitute narratives.
      case_application: >
        Grounding regress is precisely a case where non-closure must be carried
        rather than automatically repaired. Treating Λ as a boundary prevents the
        analysis from declaring brute foundations, metaphysical ultimates,
        coherentist circularity, infinitist continuation, pragmatic stopping, or
        PMS coherence to be final simply because closure is desired.

    C2_morality_as_readability_field:
      status: "not_applicable"
      claim: >
        Morality is not reconstructed as an operator, but as a readability field
        under constellations involving Ω, Θ, Λ, and Ψ.
      case_application: >
        The case does not supply praxis effects, responsible agents,
        self-binding trajectories, or consequence-attribution. Morality therefore
        remains out of scope. The overlay explicitly does not introduce morality
        as an operator, readability field, norm, duty, or sanction in this case.

    C3_responsibility_as_attribution_not_prescription:
      status: "not_applicable"
      claim: >
        What everyday language may call obligation is reconstructed as
        attribution of consequences, not prescriptive demand.
      case_application: >
        No consequence-bearing agent, effective capacity, role, or temporal
        window is supplied. Responsibility as attribution is therefore not
        activated. The case remains a logical boundary problem, not a
        responsibility or obligation case.

    C4_apparent_norms_as_failure_mode_constraints:
      status: "weak"
      claim: >
        Apparent norms can be reconstructed as structural failure-mode
        constraints stabilized by self-binding, without external authority or
        prescriptive ought.
      case_application: >
        The case contains no direct norm. A weak LOGIC relevance appears only as
        an application constraint: do not force closure where Λ persists, do not
        convert logic into authority, and do not convert coherence into
        validation. These are failure-mode constraints for the analysis, not
        prescriptions generated by the case.

    C5_logic_as_ordering_tool_not_authority:
      status: "active"
      claim: >
        Logic remains important for consistency and integration, but becomes
        structurally unstable when it attempts final authority or closure beyond
        what the frame can deliver under persistent Λ.
      case_application: >
        Grounding regress directly exhibits the authority-risk of logic when
        ordering is mistaken for final grounding. Logic can discipline the
        regress-form, but if it claims ultimate closure merely because the chain
        has been formally organized, it becomes unstable as authority.

  responsibility_readability_chain:
    status: "weak"
    source: "PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain"
    chain_type: "readability_chain_not_dependency_definition"
    sequence:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    note: >
      This sequence is used as a LOGIC readability chain for responsibility,
      non-closure, and moral-readability analysis. It is not a new PMS
      dependency definition; PMS.yaml dependencies remain authoritative.
    case_application: >
      The chain is only partially readable in this case. Δ, ∇, □, Λ, Α, Θ, Χ,
      and weak Σ are relevant to the boundary-management profile. Ω remains weak
      as dependency-direction only, Φ remains conditional, and Ψ is not case
      content. Therefore the full responsibility-readability chain is not active.

  theses_and_definitions:
    intermediate_thesis:
      label: "Boundary point of logic"
      quote: "Logic does not end in silence, but in a structurally sustainable non-assertion."
      operator_reading: >
        Non-event Λ, stabilized by Α within □, may mark a disciplined stopping
        point for logic rather than failure or negation.
      case_application: >
        In grounding regress, the disciplined stopping point is not a final
        ground but the refusal to replace non-closure with dogma, metaphysical
        compensation, or PMS-internal totalization. The sustainable
        non-assertion is: the regress-form can be structurally organized, but the
        case material does not decide its ultimate philosophical resolution.

    central_thesis:
      quote: "From effective capacity follows structural responsibility, not obligation."
      operator_reading:
        responsibility_requires:
          - "effective capacity within □"
          - "irreversibility under Θ"
          - "distribution gradients under Ω"
          - "attributability continuity via Ψ"
      case_application: >
        Effective capacity is not present as case content. There is no supplied
        agent, system, institution, action possibility, or consequence-bearing
        temporal window. Responsibility-readability therefore does not follow,
        and no obligation, blame, guilt, or prescription is derived.

    conclusion_thesis:
      quote: >
        Logic does not fail as a tool; it becomes structurally unstable when it
        begins to function as authority.
      case_application: >
        The case shows logic remaining valid as a tool for distinguishing frame,
        demand, non-closure, recurrence, and rival readings. It drifts toward
        instability only if logical ordering is converted into final authority,
        metaphysical settlement, or PMS Base validation.

  boundary_conditions:
    BC_EFFECTIVE_CAPACITY:
      label: "Absence of effective capacity"
      status: "not_applicable"
      definition: >
        Responsibility presupposes effective, frame-bound capacity within □ and
        temporal availability under Θ. Where access, means, authority, or the
        relevant temporal window are structurally absent, no responsibility
        attribution arises even if outcomes later appear significant.
      calibration_note: >
        PMS-LOGIC specifies the structural form of attributable capacity, but
        not every concrete threshold of sufficiency in advance.
      case_application: >
        Effective capacity is not supplied by the case. Grounding regress is
        presented as an abstract philosophical problem, not as a situation in
        which an agent has access, means, authority, or a temporal window for
        consequence-bearing intervention.

  non_operator_constructs:
    logic_paper_specific:
      status: "active"
      is_operator: false
      definition: >
        Logic is a procedural discipline of consistency, derivation, and
        closure-drive that meets a structural boundary at Λ under □.
      operator_touchpoints:
        - "Σ"
        - "Λ"
        - "□"
        - "∇"
        - "Χ"
      case_application: >
        Logic functions as the ordering discipline that makes the regress-form
        explicit: it tracks the further-ground demand, the closure pressure, and
        the point where the frame cannot produce final settlement. Logic remains
        a tool for disciplined non-closure, not an authority that resolves the
        regress by decree.

    morality_readability_field:
      status: "not_applicable"
      is_operator: false
      definition: >
        Morality is the readability of responsibility that emerges post hoc from
        irreversible praxis under structural conditions. No norms, values, or
        duties are introduced.
      minimal_operator_basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      case_application: >
        Moral readability does not emerge from the supplied material because
        there is no concrete praxis, no effective capacity, no responsible
        trajectory, and no consequence-attribution. The overlay therefore keeps
        morality out of the case analysis.

    responsibility_vs_ought:
      status: "not_applicable"
      is_operator: false
      responsibility: "Attribution of consequences."
      ought: "Prescriptive demand; explicitly out of scope."
      pms_logic_position: >
        PMS-LOGIC operates on responsibility-readability and attributability, not
        on ought-statements.
      case_application: >
        The case contains neither consequence-attribution nor prescriptive
        demand. It is a regress and boundary-management case, not a
        responsibility or ought case.

    potential_effective_capacity:
      status: "not_applicable"
      is_operator: false
      definition: >
        Effective capacity means capacity within a frame □ plus temporal
        availability Θ. It introduces exposure to consequences, not duty.
      reduced_basis:
        - "□"
        - "Θ"
      case_application: >
        Effective capacity is not present. The case does not specify an agent,
        means of intervention, authority, capacity threshold, or temporal window.

    non_innocence:
      status: "not_applicable"
      is_operator: false
      definition: >
        Non-innocence is the structural condition in which consequences become
        attributable even without intent, command, guilt, or blame.
      basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "□"
        - "Ψ"
      case_application: >
        Non-innocence is not activated. There is no omission, non-action,
        agentive capacity, or consequence path to which responsibility could be
        structurally attributed.

    apparent_norms_as_constraints:
      status: "weak"
      is_operator: false
      definition: >
        Apparent norms are reconstructed as PMS-internal self-binding
        constraints that prevent structural failure modes under irreversible,
        asymmetric conditions. They are not commandments.
      basis:
        - "Χ"
        - "Σ"
        - "Ψ"
        - "Λ"
        - "□"
        - "Ω"
        - "Θ"
      case_application: >
        The case does not generate norms. The only weak constraint is
        methodological: the analysis should carry non-closure, preserve rival
        readings, and avoid forced closure. This is a LOGIC application
        restraint, not a case-derived command.

  reduced_signatures:
    PRE_MORAL_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: "Structural preconditions of praxis; no normativity introduced."
      case_application: >
        Active as shorthand for the regress-core: distinction, further-ground
        demand, grounding frame, non-arrival of final closure, and recurrence.
        This shorthand does not replace PMS dependencies and does not introduce
        normativity.

    LOGIC_boundary_management:
      label: "Logical boundary management"
      applicability: "active"
      operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      reduced: true
      note: >
        Ordering and integration under non-closure; Χ prevents dogmatic
        Σ-totalization.
      dependency_hygiene: >
        This is reduced shorthand only. PMS dependencies remain authoritative.
      case_application: >
        Active as the central LOGIC profile of the case. The frame seeks
        grounding sufficiency, Λ marks persistent non-closure, Χ maintains
        distance from forced authority, and Σ remains provisional coordination
        rather than total resolution.

    POST_MORAL_effects:
      label: "Post-moral effects"
      applicability: "not_applicable"
      operators:
        - "Ω"
        - "Θ"
        - "Ψ"
      reduced: true
      note: >
        Irreversible consequence attribution under asymmetry and time; no norms
        derived.
      case_application: >
        Not applicable because the case lacks concrete praxis effects,
        consequence-bearing agents, effective capacity, and self-binding
        trajectories.

    MORAL_READABILITY_min:
      label: "Moral readability field"
      applicability: "not_applicable"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Morality as interpretive field generated post hoc; not an operator.
      case_application: >
        Not applicable because no post-hoc moral readability is supplied by the
        abstract grounding-regress material.

    POTENTIAL_effective:
      label: "Effective potential / capacity"
      applicability: "not_applicable"
      operators:
        - "□"
        - "Θ"
      reduced: true
      note: >
        Situated capacity plus temporal availability; generates exposure, not
        duty.
      case_application: >
        Not applicable because no agent, access, means, authority, or temporal
        intervention window is specified.

    NON_CLOSURE_stability:
      label: "Sustainable non-closure"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: >
        Openness carried within frame; attractor stabilizes non-substitution.
      case_application: >
        Active. The regress is best handled as sustainable non-closure when the
        frame cannot provide a terminal ground. The non-closure should be
        carried without being converted into ignorance, defect, nihilism, brute
        metaphysical assertion, or PMS validation.

    HUME_KNOT_reconstruction:
      label: "Hume knot reconstruction"
      applicability: "not_applicable"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Rewrites potential obligates into non-innocence and attributable
        consequence; preserves the is/ought boundary without crossing it.
      case_application: >
        Not applicable. The case is not about potential, obligation,
        non-innocence, or consequence attribution. The is/ought boundary remains
        preserved because no ought is derived.

  failure_mode_constraints:
    note: >
      The following are frame-dependent PMS-internal self-binding constraints.
      They are not universal prescriptions. They name conditions for coherence
      and non-destructive praxis under non-closure.
    items:
      - id: "FMC1"
        label: "A boundary that cannot be carried becomes structurally unstable."
        applicability: "weak"
        operator_basis:
          - "Δ"
          - "Ψ"
        meaning: >
          Marking or occupying a boundary generates exposure. If the
          consequences cannot be sustained across time, the boundary becomes
          destructive rather than orienting.
        failure_mode: "Boundary inflation, authority overreach, collapse into dogma or abandonment."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "authority_capture_omega_inflation"
        case_application: >
          Weakly applicable as an analysis constraint only. The case marks a
          conceptual boundary at non-closure, but no self-binding actor is
          supplied. The boundary must therefore be carried methodologically
          without becoming an asserted final ground.

      - id: "FMC2"
        label: "Forced closure where Λ persists produces structural instability."
        applicability: "active"
        operator_basis:
          - "Λ"
          - "□"
          - "Χ"
        meaning: >
          Where a structure does not yield final explanation, forced closure
          introduces substitute narratives such as dogma, myth, metaphysical
          compensation, or false certainty.
        failure_mode: "Dogmatization, metaphysical compensation, false certainty."
        related_drifts:
          - "dogmatism_sigma_totalization"
        case_application: >
          Active. Grounding regress is structurally vulnerable to forced closure:
          declaring a final ground, brute stop, total coherentist solution, or
          PMS formula as final would overstep what the case material warrants.

      - id: "FMC3"
        label: "Explanatory power converted into sense-making authority causes structural overreach."
        applicability: "weak"
        operator_basis:
          - "∇"
          - "Σ"
          - "□"
          - "Χ"
        meaning: >
          Explanatory success does not confer authority over meaning.
          Integration is coordination, not domination; Χ prevents closure-drive
          from laundering authority through explanation.
        failure_mode: "Epistemic domination, technocratic moralism, authority laundering through explanation."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "technocratic_reduction_frame_overconstraint"
        case_application: >
          Weakly applicable as a risk. A PMS or LOGIC explanation of the
          regress-form may be useful, but it must not become authority over the
          meaning or final resolution of grounding itself.

      - id: "FMC4"
        label: "Where proximity generates power, viable praxis requires maintained distance."
        applicability: "not_applicable"
        operator_basis:
          - "Χ"
          - "Ω"
        meaning: >
          Closeness increases influence; where influence increases, unregulated
          proximity becomes power. Χ is a condition for dignified handling of
          power.
        failure_mode: "Manipulation, coercive intimacy, moral overreach."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "moralism_pseudo_ought_injection"
        case_application: >
          Not applicable as case content because no interpersonal proximity,
          influence, vulnerability, or concrete power relation is supplied.

      - id: "FMC5"
        label: "Stable self-binding takes the form of restraint rather than assertion."
        applicability: "weak"
        operator_basis:
          - "Ψ"
          - "Χ"
          - "Λ"
        meaning: >
          Assertions seek closure and authority; restraint preserves openness.
          Self-binding to restraint stabilizes praxis without commanding others.
        failure_mode: "Authoritarian certainty, moral exhibitionism, escalation dynamics."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "moralism_pseudo_ought_injection"
        case_application: >
          Weakly applicable to the analysis rather than the case object. The
          overlay should bind itself to restraint: no final metaphysical claim,
          no normative command, no authority claim, and no PMS Base validation.

  drift_catalogue:
    note: >
      LOGIC drift classes describe structural operator distortions. They are not
      personal traits, diagnoses, moral verdicts, or enforcement categories.
    dogmatism_sigma_totalization:
      label: "Dogmatism / Σ-totalization"
      applicability: "risk"
      distorted_operators:
        - "Σ"
      mechanism: >
        Integration is forced into total closure, treating coherence as final
        truth rather than provisional coordination. Λ is denied instead of
        carried.
      symptoms:
        - "claims_of_ultimate_explanation"
        - "immunization_against_revision"
        - "replacement_of_structural_coherence_with_certainty"
      result: >
        Brittle structure under novelty; non-closure treated as error rather
        than constraint.
      case_application: >
        Risk, not active verdict. The risk arises if PMS coherence, logical
        organization, foundational stopping, or any rival solution is treated as
        final merely because it closes the regress-form.

    authority_capture_omega_inflation:
      label: "Authority capture / Ω-inflation"
      applicability: "risk"
      distorted_operators:
        - "Ω"
      mechanism: >
        Asymmetry is converted from descriptive condition into justificatory
        principle. Power gradients are mistaken for epistemic or moral
        authority.
      symptoms:
        - "because_I_can_becomes_because_I_am_right"
        - "suppression_of_Χ"
        - "obscured_responsibility_pathways"
      result: >
        Domination may become masked as necessity; responsibility flows upward
        and becomes opaque.
      case_application: >
        Risk only by analogy at the level of analysis: weak dependency-direction
        in the grounding relation must not be inflated into authority,
        justification, moral superiority, or proof that one frame dominates all
        rivals.

    moralism_pseudo_ought_injection:
      label: "Moralism / pseudo-ought injection"
      applicability: "risk"
      distorted_operators:
        - "Ψ"
        - "Χ"
      mechanism: >
        Responsibility is retranslated into obligation. Self-binding is replaced
        by compliance-seeking enforcement. Non-innocence is moralized into
        blame.
      symptoms:
        - "should_or_must_reintroduced_as_if_structurally_authorized"
        - "attribution_becomes_accusation"
        - "praxis_judged_instead_of_reconstructed"
      result: >
        Covert normativity is reintroduced; responsibility collapses into
        enforcement.
      case_application: >
        Risk only if the overlay converts non-closure into a demand that one must
        accept PMS, must accept a specific grounding theory, or must treat
        unresolvedness as failure. No such ought is derived here.

    nihilism_lambda_suppression:
      label: "Nihilism / Λ-suppression"
      applicability: "risk"
      distorted_operators:
        - "Λ"
      mechanism: >
        Non-events, omissions, or restraints are treated as irrelevant. The
        structural significance of omission within frames under time is erased.
      symptoms:
        - "nothing_happened_so_nothing_matters"
        - "denial_of_omission_effects"
        - "flattening_of_temporal_consequence"
      result: >
        False innocence; responsibility dissolves through denial of structural
        impact.
      case_application: >
        Risk only at the level of logical reading. Treating non-closure as
        meaningless, mere failure, or nothing-to-analyze would suppress Λ. The
        overlay instead treats Λ as a structured boundary.

    technocratic_reduction_frame_overconstraint:
      label: "Technocratic reduction / □-overconstraint"
      applicability: "risk"
      distorted_operators:
        - "□"
      mechanism: >
        Frames are treated as exhaustive representations of reality. What is
        unmodeled is dismissed or misrecognized as Λ.
      symptoms:
        - "overconfidence_in_models_or_metrics"
        - "ignoring_unmodeled_effects"
        - "frame_lock_in"
      result: >
        Blind spots are mistaken for non-existence; systemic fragility
        increases.
      case_application: >
        Risk if the PMS or LOGIC frame is treated as exhaustive. The overlay
        preserves rival metaphysical, epistemic, semantic, coherentist,
        infinitist, pragmatic, and deflationary formalizations.

  logic_derived_axes_projection:
    note: >
      This projection is a PMS-LOGIC paper-internal structural localization. It
      is not a measurement of objective quality and not a person evaluation.
    Awareness_A:
      structural_level: "high"
      operator_basis:
        - "Δ"
        - "□"
        - "Θ"
      effect_notes:
        - "Sensitivity to limits and conditions of praxis."
        - "Perception of where explanation reaches a stopping point and responsibility becomes structurally relevant."
      case_application: >
        Awareness_A is high as abstract structural awareness: the case requires
        sustained differentiation of ground and grounded within a frame across an
        ordered sequence. This is not consciousness, phenomenology, or person
        evaluation.

    Coherence_C:
      structural_level: "medium"
      operator_basis:
        - "∇"
        - "□"
        - "Λ"
        - "Θ"
      effect_notes:
        - "Coherence maintained despite non-closure."
        - "Stability from integration of absence, not closure."
      case_application: >
        Coherence_C is medium: the regress-form is coherent enough to be mapped
        structurally, but its non-closure remains unresolved. PMS coherence does
        not solve the regress and must not be treated as sufficient by itself.

    Responsibility_R:
      structural_level: "not_applicable"
      operator_basis:
        - "Ω"
        - "Θ"
        - "Φ"
        - "Ψ"
      effect_notes:
        - "Responsibility without moral demand."
        - "Accountability without sanction."
        - "Exposure accepted rather than displaced."
        - "Responsibility is structurally attributable rather than obligatory."
      boundary_condition_ref: "BC_EFFECTIVE_CAPACITY"
      case_application: >
        Responsibility_R is not applicable because no agent, effective capacity,
        obligation, consequence-attribution, or self-binding trajectory is
        supplied.

    Action_E:
      structural_level: "weak"
      operator_basis:
        - "∇"
        - "Θ"
        - "Σ"
        - "Χ"
      effect_notes:
        - "Action slowed or filtered."
        - "Preference for restraint over intervention."
        - "Avoidance of irreversible overreach under asymmetry amplification."
      case_application: >
        Action_E is weak. The case contains argumentative movement and
        closure-pressure, but no concrete enactment. The relevant LOGIC effect
        is restrained handling of the regress, not action guidance.

    Dignity_in_Practice_D:
      structural_level: "stabilizing"
      operator_basis:
        - "Ω"
        - "Χ"
        - "Ψ"
      effect_notes:
        - "Protection of vulnerable positions without paternalism."
        - "Power exercised without domination."
        - "Self-binding as stable continuity without norm derivation."
      case_application: >
        Dignity_in_Practice_D stabilizes the application only: no shaming, no
        ranking, no tribunal use, no person-type inference, no ontological
        dignity claim, and no forced conversion of philosophical non-closure into
        failure.

  counter_readings:
    note: >
      Counter-readings are interpretive risks. PMS-LOGIC responds through
      structural clarification rather than polemic.
    items:
      - id: "D1"
        reading: "This is just ethics in disguise."
        relevance: "weak"
        pms_response: >
          No PMS operator generates values, norms, or prescriptions. What
          appears ethical is the interpretability of responsibility under Ω, Θ,
          Λ, and Ψ.
        case_application: >
          The counter-reading is weak because this case does not activate
          morality or responsibility. The overlay remains about logical
          non-closure and boundary management, not ethics.

      - id: "D2"
        reading: "This collapses into relativism."
        relevance: "weak"
        pms_response: >
          Frames are explicit scope constraints, and reversibility is required.
          Structural attribution under Ω, Θ, and Λ is not arbitrary preference.
        case_application: >
          The case does not collapse into relativism because LOGIC preserves
          frame discipline, dependency hygiene, falsifiers, and rival comparison.
          It also does not claim final philosophical superiority.

      - id: "D3"
        reading: "This is nihilism with extra steps."
        relevance: "weak"
        pms_response: >
          Λ is not meaninglessness but structured absence. Omission and
          non-action remain relevant under Θ and Ω.
        case_application: >
          The counter-reading is weak but relevant: non-closure is not treated as
          meaninglessness. It is carried as a disciplined logical boundary.

      - id: "D4"
        reading: "This is a hidden theological argument."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC carries non-closure within □ without metaphysical filling.
          No external ground, lawgiver, or ultimate justification is introduced.
        case_application: >
          The counter-reading is weak but important because grounding regress may
          invite ultimate-ground speculation. The overlay explicitly introduces
          no external ground, lawgiver, divine stop, or metaphysical ultimate.

      - id: "D5"
        reading: "This makes responsibility unfair."
        relevance: "not_applicable"
        pms_response: >
          PMS does not claim fairness. It models attribution, not moral desert.
          Responsibility is structural, not a reward or punishment scheme.
          Absence of effective capacity implies no responsibility.
        case_application: >
          Not applicable because responsibility is not attributed in this case.

      - id: "D6"
        reading: "This cannot guide action."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC does not instruct; it orients by constraining overreach.
          Guidance is replaced by orientation through Χ, Σ, and Ψ.
        case_application: >
          The counter-reading is weakly relevant because the case is not an
          action-guidance case. LOGIC offers restraint against forced closure,
          not a prescription.

      - id: "D7"
        reading: "This wins by translation, not necessarily by final superiority."
        relevance: "active"
        pms_response: >
          Translation success is not final settlement. The relevant test is
          whether the grammar preserves differentiating force under pressure.
        case_application: >
          Active. The PMS-LOGIC overlay may organize the regress clearly, but
          translation success does not establish final superiority over
          foundationalist, coherentist, infinitist, pragmatic, semantic,
          deflationary, or metaphysical readings.

      - id: "D8"
        reading: "Relation to adjacent frameworks."
        relevance: "active"
        pms_response: >
          PMS-LOGIC is not virtue ethics, pragmatism, or systems ethics. It
          reconstructs responsibility structurally under asymmetry, temporality,
          and non-closure without ethical evaluation or normative optimization.
        case_application: >
          Active. Adjacent frameworks remain open for comparison, especially
          epistemology, metaphysics of grounding, formal logic, semantics,
          pragmatism, coherentism, infinitism, and deflationary accounts.

