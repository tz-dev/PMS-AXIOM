core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological essences.
    status: satisfied
    case_application: >
      The case is treated as a structural problem field concerning temporal forms of praxis, framing, expectation, recurrence, trajectory, and commitment. It does not analyze persons as psychological essences or ontological entities.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization and critique.
    status: satisfied
    case_application: >
      Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators. Temporal subterms such as duration, memory, recurrence, or historical time are treated as case material, not as additional PMS operators.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged to PMS Base.
  P3_generativity:
    id: P3
    title: Generativity
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action, dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator compositions rather than introduced as independent primitives.
    status: satisfied
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are treated only through PMS formulas. They are not treated as independent axioms, diagnoses, metaphysical entities, or empirical findings.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes.
    status: partial
    case_application: >
      Θ is central because the case directly concerns sequence, duration, persistence, development, delay, anticipation, memory, recurrence, and future-oriented commitment. Ω is retained only as weak or conditional because the material does not specify a concrete asymmetry of power, exposure, capacity, vulnerability, obligation, or role position.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without calibration.
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply direct implementation, guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints, and evaluation.
    status: satisfied
    case_application: >
      The YAML representation is only a formal case encoding. It does not implement praxis, time, agency, selfhood, temporality, empirical adequacy, or computational validity.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models, or more empirically grounded formalisms remains methodologically open.
    status: satisfied
    case_application: >
      Rival readings remain open, including phenomenology, metaphysics of time, temporal logic, physics, process philosophy, historical theory, narratology, systems theory, theology, and empirical psychology of temporal cognition.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default.
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms of praxis may remain only partially legible or may resist assimilation within the current grammar.
    status: satisfied
    case_application: >
      Possible non-capture is preserved for physical simultaneity, metaphysical time, lived temporality, empirical memory, historical explanation, aesthetic rhythm, theological eternity, and formal temporal logics. Non-fit is not automatically redescribed as PMS drift or incomplete integration.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions.
    status: satisfied
    case_application: >
      The case contains no person, group, mental state, pathology, risk, competence judgment, clinical criterion, or forensic subject. No diagnostic claim is made.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global person-labels and irreversible ontological attributions are out of scope.
    status: partial
    case_application: >
      Because there is no concrete scene, the reading is bounded by case type rather than scene. It remains a reversible conceptual projection and does not generate global labels, person-level claims, or irreversible attributions.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized claims.
