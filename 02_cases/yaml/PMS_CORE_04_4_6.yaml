  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    asymmetries_and_temporal_trajectories_visible: >
      Θ is strongly visible through sequence, duration, change, persistence, anticipation, delay, memory, irreversibility, development, event-order, recurrence, and future-oriented commitment. Ω is only weakly visible as a possible temporal asymmetry involving waiting, aging, inheritance, vulnerability, dependency, or obligation; no concrete asymmetry is established.
    recontextualization_distance_integration: >
      Φ appears in shifts among chronological, lived, structural, historical, processual, recurrent, and commitment-oriented temporal frames. Χ is active as reflective distance and reversibility. Σ is provisional because the material invites coordination of temporal frames but does not justify forced synthesis.
    derived_axes_projection: >
      Awareness_A and Coherence_C are active as structural projections; Responsibility_R is weak and conditional; Action_E is under-specified; Dignity_in_Practice_D is an application constraint rather than an ontological dignity claim.
    tentative_calibration_rivalry: >
      The reading remains tentative where Ω, Σ, and Ψ would require concrete asymmetry, integration criteria, or self-binding commitment. Rival metaphysical, phenomenological, physical, logical, historical, processual, narratological, theological, aesthetic, and empirical readings remain open.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary: []
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: >
      This case type permits PMS-internal structural projection and operator calibration over a philosophical problem field. It does not permit concrete scene judgment, empirical finding, diagnostic inference, legal or forensic conclusion, clinical interpretation, implementation claim, metaphysical proof, or PMS Base validation.
  coherence_risk:
    status: high
    reason: >
      The case strongly fits PMS at the level of Θ, □, Λ, Α, and Φ because temporality is already one of the PMS operators and the case material names many temporally structured phenomena. This creates a risk that the reading becomes too smooth, over-assimilative, or under-discriminating: almost every listed feature could be made to look PMS-readable unless the analysis continues to ask which temporal frame, which absence, which recurrence, which trajectory, and which recontextualization are actually doing analytic work.
    mitigation: >
      The analysis mitigates this risk by marking Ω, Σ, Ψ, Responsibility_R, Action_E, SELF_FIXPOINT, and drift patterns as weak, conditional, analytic-only, or under-specified; by preserving non-capture zones; by listing rival formalizations; and by including falsifier conditions. The reading must also keep chronological ordering, lived temporality, structural temporality, historical time, process, recurrence, and future-oriented commitment analytically separable unless a later concrete scene or stronger theoretical specification justifies integration.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers framed temporal differentiation, structured absence, recurrence, trajectory, frame-shift, reflective distance, and provisional integration well at a conceptual level. This is a strength of the PMS reading, especially for praxis-oriented temporality, delay, anticipation, commitment, and the relation between event and non-event.
    discrimination_requirement: >
      The PMS reading must distinguish praxeological temporality from metaphysical time, physical time, phenomenological lived temporality, empirical temporal cognition, historical explanation, formal temporal logic, and aesthetic or ritual rhythm. It must also distinguish PMS coherence from PMS adequacy: a structurally coherent PMS mapping is not sufficient unless it helps discriminate among the temporal forms named in the case.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish PMS Θ as praxeological temporal structuring from a metaphysical theory of what time is.
    expected_pms_distinction: >
      Θ may model sequence, trajectory, anticipation, delay, development, persistence, recurrence, and commitment within praxis, but it does not establish presentism, eternalism, becoming, ontology, or metaphysical truth about time.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish chronological time, lived temporality, structural temporality, historical time, process, recurrence, and future-oriented commitment without collapsing them into one temporal frame.
    expected_pms_distinction: >
      □ must mark frame differences, Φ must mark frame shifts, Λ must mark expected or absent events only within a frame, Α must mark recurrence only where stabilization is present, and Σ must not force premature integration.
    current_status: partially_satisfied
  - id: DT3
    test: Distinguish possible PMS non-capture from PMS failure, drift, or incomplete integration.
    expected_pms_distinction: >
      Resistance, rupture, rival framing, unresolved absence, or non-fit may indicate a genuine limit of PMS readability rather than AD_A>>E, AD_Sigma_low, incomplete calibration, or failed maturity. Non-capture must remain possible unless the case material gives explicit grounds for a PMS-internal structural reading.
    current_status: satisfied
  calibration_points:
  - operator: Δ
    question: Which temporal distinction is being used: before/after, duration/instant, event/non-event, recurrence/novelty, persistence/change, or chronological/lived/structural/historical time?
    current_calibration: satisfied
  - operator: ∇
    question: Is there structural directedness through anticipation, delay, process, development, or future commitment without inferring subjective desire?
    current_calibration: weak
  - operator: □
    question: Which temporal frame constrains relevance: chronological, lived, structural, historical, processual, recurrent, or commitment-oriented?
    current_calibration: satisfied
  - operator: Λ
    question: What expected occurrence, absence, delay, no-longer, not-yet, memory, or irreversibility matters within the chosen frame?
    current_calibration: satisfied
  - operator: Α
    question: What recurrence, rhythm, persistence, stabilization, or path-dependence is actually shown rather than merely named?
    current_calibration: partial
  - operator: Ω
    question: What directional asymmetry of exposure, capacity, vulnerability, obligation, inheritance, dependency, or responsibility is present?
    current_calibration: weak
  - operator: Θ
    question: What temporal trajectory, duration, sequence, development, persistence, anticipation, delay, or event-order structures the case?
    current_calibration: satisfied
  - operator: Φ
    question: What source frame is being placed into what target frame, and does the shift clarify rather than absorb rival readings?
    current_calibration: partial
  - operator: Χ
    question: Does the analysis preserve reflective distance, reversibility, and non-totalization?
    current_calibration: satisfied
  - operator: Σ
    question: Does integration discriminate among temporal forms rather than producing forced coherence?
    current_calibration: partial
  - operator: Ψ
    question: Is there a concrete self-binding, promise, commitment, stable normativity, or responsibility-as-self-commitment?
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - metaphysical theories of time such as presentism, eternalism, becoming, persistence, or identity through time
    - physics of time, simultaneity, spacetime, entropy, irreversibility, and cosmology
    - phenomenological lived temporality, inner time-consciousness, retention, protention, embodiment, and affective time
    - empirical psychology and neuroscience of memory, anticipation, rhythm, temporal perception, and development
    - historical explanation, periodization, rupture, continuity, material causation, and archival evidence
    - formal temporal logic, tense logic, modal time, branching futures, and event calculus
    - aesthetic, musical, ritual, theological, or poetic temporalities that may lose specificity under PMS translation
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured absence, or failed maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - phenomenological reading of lived temporality
    - metaphysical reading of time, persistence, becoming, and identity through time
    - physical reading of simultaneity, spacetime, entropy, and irreversibility
    - temporal-logic formalization of event order, tense, modality, and branching futures
    - process-philosophical reading of becoming, recurrence, duration, and event
    - historical-theoretical reading of periodization, development, rupture, and continuity
    - narratological reading of memory, anticipation, plot, and retrospective ordering
    - systems-theoretical reading of feedback, recurrence, rhythm, and path-dependence
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
  - id: F1
    condition: >
      The PMS reading would be weakened if the intended case is purely metaphysical, physical, phenomenological, or formal-logical and has no praxeological or structural-action dimension.
  - id: F2
    condition: >
      The PMS reading would be under-discriminating if Θ, □, Λ, Α, and Φ cannot distinguish chronological time, lived temporality, structural temporality, historical time, process, recurrence, and future-oriented commitment better than a rival formalism.
  - id: F3
    condition: >
      The PMS reading would become over-assimilative if resistance, rupture, disagreement, absence, or rival framing were automatically redescribed as drift, incomplete calibration, incomplete integration, recontextualization, or maturity failure.
  final_quality_status:
    result: usable_with_limits
    reason: >
      The case analysis is valid as a reversible PMS conceptual projection with high coherence risk. It is usable only if Ω, Σ, Ψ, Responsibility_R, Action_E, SELF_FIXPOINT, and drift patterns remain bounded and if non-capture and rival formalizations remain open.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: >
    These requirements identify what would be needed to turn the PMS projection into a calibrated empirical, comparative, computational, legal, clinical, or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: A specified temporal distinction such as before/after, event/non-event, duration/instant, persistence/change, recurrence/novelty, or chronological/lived/structural/historical frame contrast.
      ∇: Observable or formally specified directedness such as anticipation, delay-pressure, process-orientation, developmental tendency, or commitment-directedness without psychologizing.
      □: An explicit temporal frame, such as clock-time, lived time, historical time, institutional time, process-time, recurrence, or commitment-time, with stated relevance conditions.
      Λ: A specified expected event, missing event, delay, postponed occurrence, no-longer, not-yet, counterfactual, or meaningful absence within a frame.
      Α: Evidence or formal criteria for recurrence, rhythm, stabilization, persistence, path-dependence, or repeated structural interaction.
      Ω: A specified directional imbalance of power, exposure, capacity, vulnerability, obligation, dependency, inheritance, or responsibility-gradient.
      Θ: A specified temporal trajectory, sequence, duration, development, persistence, anticipation, delay, event-order, or longer-form commitment.
      Φ: A documented recontextualization from one temporal frame into another, with criteria for whether the shift clarifies, distorts, or over-assimilates.
      Χ: A documented reflective distance operation, suspension of verdict, preservation of reversibility, or inhibition of premature closure.
      Σ: Explicit criteria for integration that coordinate multiple temporal frames without erasing conflict or rival formalizations.
      Ψ: A concrete self-binding, promise, commitment, stable normativity, or responsibility-as-self-commitment across time.
    negative_cases:
    - a purely physical account of simultaneity with no praxeological framing
    - a purely metaphysical argument about the ontology of time with no structural action dimension
    - a psychological experiment on temporal perception where PMS operators are not operationalized
    - a historical explanation requiring archival evidence that PMS cannot supply
    - a formal temporal logic model that discriminates event order without PMS categories
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: >
    Operationalization is not fulfilled. The present case provides only conceptual material and no empirical indicators, concrete scene, comparative rival-model test, computational architecture, legal standard, clinical criterion, or applied validation context.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: >
      The analysis does not infer mental states, subjective desire, memory experience, anticipation experience, personality traits, or psychological capacities from the philosophical topic of temporality.
    non_metaphysical: >
      The analysis does not claim what time is, whether only the present exists, whether the future is real, whether becoming is ontologically basic, or whether persistence has a metaphysical solution.
    non_diagnostic: >
      No person, group, institution, disorder, maturity level, risk state, clinical category, or pathology is diagnosed.
    non_legal_forensic: >
      No legal responsibility, causation standard, evidence rule, forensic reconstruction, liability, or admissibility claim is made.
    non_implementation_claim: >
      The YAML case representation is not a software implementation, agent architecture, simulation result, model validation, or computational proof.
    non_moral_ranking: >
      The analysis does not rank persons, beings, cultures, temporal orientations, philosophical schools, or forms of life as superior or inferior.
    non_exhaustive_capture: >
      PMS translation does not exhaust metaphysical, phenomenological, physical, historical, logical, aesthetic, theological, or empirical accounts of time.
    reversibility: >
      The reading remains reversible by marking the case as conceptual, keeping operators calibrated, preserving weak and conditional statuses, and listing falsifier conditions and rival formalizations.
    dignity_in_practice: >
      Dignity-in-Practice is preserved as restraint in application: no shaming, humiliation, irreversible labeling, person-ranking, ontological evaluation, or coercive closure is introduced.
limits:
- >
  The PMS reading is limited to a structural projection of temporality as a praxeological problem field and does not analyze a concrete actor, scene, institution, decision, conflict, or evidence chain.
- >
  The reading is not empirical, metaphysical, phenomenological, diagnostic, legal, forensic, clinical, computational, implementation-level, or PMS Base validation.
- >
  Rival readings may capture parts of the problem field more precisely, especially physics of time, phenomenology, metaphysics, temporal logic, historical theory, process philosophy, narratology, theology, aesthetics, and empirical temporal cognition.
- >
  Because temporality is itself a PMS operator, the reading has high coherence and over-assimilation risk; coherence must not be treated as sufficiency.
case_synthesis:
  primary_pms_reading: >
    Time / Temporality is structurally readable in PMS as framed temporal differentiation organized through meaningful absence, recurrence, possible asymmetry, trajectory, and recontextualization, with reflective distance and provisional integration required to avoid metaphysical, empirical, or totalizing overclaim.
  continuity_condition: >
    Continuity is readable where persistence, rhythm, recurrence, process-continuity, historical development, or commitment across time is specified within a frame and not merely assumed.
  change_condition: >
    Change is readable where a temporal structure is recontextualized from one frame to another, such as chronological-to-lived, lived-to-structural, historical-to-processual, recurrence-to-attractor, or futurity-to-commitment, without erasing frame differences.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, or non-fit must remain possible non-capture unless the case supplies reasons to treat it as structured absence, recontextualization, under-integration, or drift. Non-fit is not automatically PMS failure or case failure.
  responsibility_condition: >
    Responsibility_R is conditional and becomes relevant only where future-oriented commitment is tied to concrete asymmetry, temporal extension, recontextualization of obligation, and self-binding.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring distance, reversibility, restraint under any possible asymmetry, and no ranking, shaming, humiliating, diagnosing, or ontological evaluation.
  rival_reading_condition: >
    Rival formalizations remain open and may be preferable for metaphysical, phenomenological, physical, logical, historical, empirical, theological, aesthetic, or processual questions that PMS does not discriminate sufficiently.
final_structural_formula:
  primary_formula: Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  primary_formula_status: primary_case_model
  compressed_reading: >
    Time / Temporality is read as a reversible PMS projection in which framed temporal distinctions generate weak directedness, meaningful absence, recurrence, possible asymmetry, temporal trajectory, and recontextualization. The formula is dependency-complete rather than claim-maximal: Ω is included as the dependency-position through which temporality may become asymmetrical, but the case material keeps Ω weak and conditional; ∇ is included as structural directedness, not as psychological impulse; Χ remains active chiefly as application discipline; Σ remains provisional; and Ψ is not established except where future-oriented commitment is later specified as self-binding.
  final_validity_status: valid_with_limits
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It does not establish empirical truth, metaphysical truth, phenomenological completeness, diagnostic validity, legal or forensic validity, clinical validity, implementation validity, moral ranking, or PMS Base validation. Its validity is limited to the claim that the philosophical problem field of temporality can be made PMS-readable under strict boundary conditions, not that PMS captures time as such or supersedes rival formalizations.