operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Δ makes the case structurally analyzable by distinguishing before and after, past and future, duration and instant, chronological time and lived temporality, event and non-event, recurrence and novelty, persistence and change, process and state, and historical time and structural temporality.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - 'Specify which temporal distinction is being used in each local reading: sequence, duration, simultaneity, delay, anticipation, memory, irreversibility, recurrence, or commitment.'
    - Check whether distinctions among chronological, lived, structural, historical, processual, and commitment-oriented temporality are being preserved rather than conflated.
    falsifier_conditions:
    - If no discriminable temporal distinction is in play, PMS has no stable entry point for this case.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      ∇ appears weakly as the structural directedness of anticipation, delay, development, process, and future-oriented commitment. The case does not warrant a psychological drive or subjective desire claim.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Treat the tension as structural or philosophical directedness, not as affective impulse or empirical motivation.
    - Do not infer subjective desire, urgency, intention, or agency because the case material provides no actor or concrete scene.
    falsifier_conditions:
    - If temporality is treated only as static ordering without directional tension, ∇ should remain weak or inactive.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      □ is active because the case explicitly differentiates temporal frames: chronological time, lived temporality, structural temporality, historical time, process, recurrence, and future-oriented commitment.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'Name the active temporal frame before drawing conclusions: clock-time, lived time, structural time, historical time, process-time, recurrence, or commitment-time.'
    - Mark frame shifts explicitly so that recontextualization does not silently collapse different temporal orders.
    falsifier_conditions:
    - If no temporal frame is specified, the analysis becomes too broad to discriminate among forms of temporality.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Λ is active wherever delay, anticipation, memory, irreversibility, the no-longer, the not-yet, expected occurrence, missed occurrence, or unresolved absence structures the meaning of time within a frame.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Specify the expected occurrence and the frame in which its absence, delay, postponement, or irreversibility matters.
    - Preserve the possibility that some absences mark genuine non-capture by PMS rather than incomplete integration or case defect.
    falsifier_conditions:
    - If the case concerns only positive succession without meaningful expectation, absence, delay, or counterfactual structure, Λ should not carry major weight.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Α is active through rhythm, recurrence, persistence, habit-like patterning, process-continuity, developmental regularity, and historical or structural repetition, while remaining calibration-dependent because no concrete repeated scene is provided.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - Show recurrence, stabilization, path dependence, rhythm, or persistence rather than merely naming repetition.
    - Distinguish genuine attractor formation from accidental aggregation, isolated recurrence, or conceptual similarity.
    falsifier_conditions:
    - If no recurrence, stabilization, rhythm, or path-dependence is structurally relevant, Α is over-read.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Ω is weak and conditional. Temporality may generate asymmetry through waiting, aging, inheritance, irreversibility, dependency, future vulnerability, or obligation to future others, but the case material does not specify a concrete asymmetrical relation.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - 'Specify the direction and kind of temporal asymmetry before using Ω: power, exposure, capacity, vulnerability, obligation, inheritance, dependency, or responsibility-gradient.'
    - Do not moralize temporal asymmetry by default; asymmetry is structural, not automatically blameworthy.
    - Allow Ω to remain weak where the case concerns abstract temporality without role-differentiated exposure or obligation.
    falsifier_conditions:
    - If no directional imbalance of power, exposure, capacity, vulnerability, obligation, or responsibility can be identified, Ω must remain weak or be removed from substantive claims.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Θ is the central operator because the case directly concerns sequence, duration, change, persistence, simultaneity, delay, anticipation, memory, irreversibility, rhythm, development, event-order, historical time, process, recurrence, and future-oriented commitment.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Distinguish diachronic trajectory, duration, anticipation, memory, and recurrence from static comparison or mere classification.
    - Check whether temporality is essential to the local claim or whether PMS Θ is being inflated into a total theory of time.
    falsifier_conditions:
    - If the relevant issue can be fully described without temporal extension, trajectory, delay, anticipation, persistence, or development, Θ is overextended.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Φ is active because the case moves among temporal frames: chronological time may be recontextualized as lived temporality, historical time as structural temporality, recurrence as process, or futurity as commitment.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Name the source frame and target frame for each recontextualization, such as chronological-to-lived, lived-to-structural, historical-to-processual, or future-to-commitment.
    - Check whether recontextualization clarifies temporal plurality or merely absorbs rival accounts and non-fit into PMS language.
    falsifier_conditions:
    - If every rupture, resistance, rival theory, or non-fit is redescribed as Φ, the PMS reading becomes over-assimilative.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Χ is active as application discipline and as a reflective requirement for philosophical analysis: the reading suspends metaphysical verdicts, diagnostic inference, empirical claims, and person-level attribution while keeping PMS translation reversible.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Check whether the analysis suspends verdict and preserves reversibility instead of forcing PMS closure.
    - Distinguish reflective distance from avoidance, empty neutrality, or refusal to discriminate among temporal frames.
    falsifier_conditions:
    - If Χ is suspended to force a metaphysical, empirical, diagnostic, legal, or PMS-validating verdict, the PMS application is invalid.
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Σ is weak-to-moderate because the case invites coordination of many temporal frames, but the material does not supply a completed synthesis or criteria for integrating them without remainder.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Test whether integration discriminates among chronological, lived, structural, historical, processual, recurrent, and commitment-oriented temporality rather than smoothing them into one term.
    - Distinguish integration from forced coherence, premature synthesis, or PMS-internal elegance.
    falsifier_conditions:
    - If PMS coherence is treated as proof of adequacy, Σ is overclaimed.
    non_capture_note: >
      PMS coherence is insufficient by itself.
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Ψ is weak and conditional. It becomes relevant only where temporality is specifically framed as future-oriented commitment, promise, self-relation, accountability, stable normativity, or responsibility across time.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Apply Ψ only where self-binding or analytic self-binding is explicitly in scope, especially future-oriented commitment.
    - Do not attribute selfhood, consciousness, or subjectivity to time, temporality, abstract concepts, or formal structures.
    falsifier_conditions:
    - If Ψ is applied without established Σ, Θ, and Χ, or without a commitment structure, the self-binding reading is under-specified.
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the case by supplying distinctions, directional tensions, frames, meaningful absences, and recurrence-patterns needed to distinguish event-order, delay, anticipation, memory, rhythm, recurrence, and persistence.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.
    case_function: >
      L2 is dominated by Θ, while Ω remains weak and conditional. Temporal extension is central, but concrete asymmetry is not established unless time is later tied to power, exposure, vulnerability, dependency, inheritance, or obligation.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.
    case_function: >
      L3 structures the reflective treatment of temporal plurality through recontextualization, distance, and provisional integration. It prevents chronological, lived, historical, structural, processual, and commitment-oriented time from being prematurely collapsed.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.
    case_function: >
      Ψ is secondary and conditional. It applies only to the future-oriented commitment aspect of the case or to the self-binding discipline of the analysis itself, not to time as a subject or metaphysical entity.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: >
      The case begins from explicit temporal distinctions such as before/after, duration/instant, event/non-event, recurrence/novelty, and chronological/lived temporality.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: >
      Directional tension is structurally present only weakly through anticipation, delay, development, process, and future-oriented commitment.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: >
      The case explicitly supplies multiple frames of temporal interpretation, including chronological, lived, structural, historical, processual, recurrent, and commitment-oriented frames.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: >
      Delay, anticipation, memory, irreversibility, no-longer, not-yet, and expected or missed occurrence make structured absence relevant within temporal frames.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: >
      Rhythm, recurrence, persistence, process-continuity, and developmental regularity make attractor logic relevant as a conceptual operator, though not empirically established.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: >
      Temporal asymmetry is possible through waiting, aging, inheritance, future vulnerability, and obligation, but no concrete asymmetrical relation is specified; Ω is therefore weak and conditional.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: >
      The case directly names temporal structuring, sequence, duration, change, persistence, anticipation, memory, irreversibility, development, event-order, recurrence, and future-oriented commitment.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: >
      The case turns on shifts among temporal frames, such as chronological time, lived temporality, structural temporality, historical time, process, recurrence, and commitment-time.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: >
      Reflective distance is required by the PMS entry condition and by the need to avoid metaphysical verdicts, empirical claims, diagnostic closure, and PMS self-validation.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: >
      The case invites synthesis of multiple temporal frames, but achieved integration is not demonstrated; Σ is therefore weak and provisional.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: >
      Self-binding is relevant only where future-oriented commitment is explicitly considered, and otherwise remains conditional rather than a claim about time as selfhood.
  dependency_failure_conditions:
  - >
    If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - >
    If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
