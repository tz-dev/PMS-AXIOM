pms_critique_overlay_application:
  schema_version: PMS-CRITIQUE_1.1
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-CRITIQUE.yaml
  paper_source_file: PMS-CRITIQUE.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: Praxeological Meta-Structure – Critique Layer
    model_short: PMS-CRITIQUE
    status: repository_overlay_draft
    maturity: draft
    repository_role: paper_specific_application_schema
    last_updated: '2026-04-06'
    doi: 10.5281/zenodo.18175456
    repositories:
      pms_base: https://github.com/tz-dev/Praxeological-Meta-Structure-Theory
      this_repo: https://github.com/tz-dev/PMS-CRITIQUE
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.4 Thinking)
      role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      repository_role: current_base_schema
    description: 'PMS-CRITIQUE is a PMS-conform application layer that reconstructs critique as a structurally constrained praxis form: how mismatch becomes interruptible through Χ-stabilized framed differentiation, how critique becomes productive through Φ and Σ, and how follow-up may become bound across time through Ψ without coercion.

      '
    epistemic_status: 'This overlay is structurally disciplined and portable, but not final, exhaustive, uniquely sufficient, immune to revision, or superior to all rival critique grammars.

      '
    methodological_restraint: 'PMS-CRITIQUE does not claim monopoly on critique analysis. Rival grammars may remain stronger where normativity, institutional legitimacy, rhetorical force, discourse ethics, public rupture, resistance, or lived experience are the primary object.

      '
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for Critique Reach (Micro → Macro), schema_version PMS_1.3, result_status valid_with_limits
    rule: 'This CRITIQUE block is appended to or integrated with an already completed PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat CRITIQUE constructs as PMS Base. The Core pass remains the controlling PMS analysis; this overlay only adds critique-facing readability, threshold classification, drift sensitivity, and scale/publicness modulation.

      '
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    - Core claim typing and non-overclaim discipline
    - Core result status as valid_with_limits rather than validated truth
    integration_rule: 'The CRITIQUE overlay may add visibility for critique thresholds, reach, scale, publicness, drift classes, modulators, critique-facing derived-axis projections, optional MIP docking, and misuse guardrails. It must not modify the completed PMS Core case except where a direct PMS.yaml inconsistency has been separately identified. Overlay shorthand such as CRITIQUE_MIN, CRITIQUE_PROD, CRITIQUE_STABLE, vertical reach levels, drift classes, and P-publicness must remain descriptive application scaffolding, not a second PMS Base.

      '
  pms_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    canonical_source_url: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
    dependency_hygiene:
      chi_note: 'Χ is used here as a reduced signature for critique interruptibility. In PMS terms, Χ presupposes Φ, Θ, and □; it is not treated as a standalone trait.

        '
      no_operator_override: 'Any operator gloss in this overlay is an application-facing excerpt only. Canonical operator definitions and dependencies remain in PMS.yaml.

        '
      overlay_discipline: 'Derived critique constructs remain overlay-level and do not alter the base PMS derivation path.

        '
  nested_overlay_policy:
    overlays:
      P:
        name: Publicness Overlay
        type: overlay_modulator
        is_operator: false
        amplifies:
        - Ω
        - Θ
        - Α
        note: 'Publicness amplifies exposure gradients, hardens irreversibility, and accelerates script stabilization without creating critique or correction by itself.

          '
        case_application: Publicness is relevant as an overlay amplifier for the macro side of the case, but only weakly because no concrete public episode is supplied. It may amplify Ω, Θ, and Α in institutional/public/systemic critique without becoming a PMS operator.
    no_base_extension: true
    rule: 'PMS-CRITIQUE introduces overlay-level constructs only: critique formulas, reach and scale ladders, publicness overlay, drift classes, modulators, projections, docking interfaces, and example-packet discipline. These organize existing PMS operators and never become PMS operators or dependencies.

      '
  validity_gate:
    status: passed
    gate_type: PMS_application_only
    note: 'This gate constrains PMS application only. It does not constrain critique, refusal, rejection, revision proposals, or rival formalizations.

      '
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: 'A maintained meta-position and stop-capability are present. The CRITIQUE overlay does not fuse the case into reaction, verdict, sanction, exposure-punishment, authority, or person-level attribution.

          '
      reversibility:
        status: maintained
        meaning: 'Readings remain scene-bound, revisable, and non-final. The overlay does not produce global person labels, irreversible labels, or final judgments.

          '
      Dignity_in_Practice_D:
        id: D
        status: maintained
        meaning: 'Dignity-in-Practice is preserved. The overlay does not shame, rank, humiliate, morally evaluate, diagnose, or ontologically assess persons or groups.

          '
    gate_result: valid_as_critique_overlay_application
  critique_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic.
    - No person-level judgment, no person-ranking, no sanction logic.
    - No adjudication of correctness, truth, motives, sincerity, or moral rightness.
    - No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal, or enforcement script.
    - Critique remains structural, scene-bound, reversible, and non-coercive.
    - Drift labels remain structural descriptors, not accusations.
    - Resistant cases must not be treated as invalid merely because they exceed PMS-CRITIQUE.
    may_add_visibility_to:
    - mismatch as Δ
    - response pressure as ∇
    - frame relevance and role space as □
    - non-response or missing follow-up as Λ
    - stabilized critique scripts as Α
    - exposure gradients as Ω
    - accumulation and irreversibility as Θ
    - recontextualization as Φ
    - stop-capability and interruptibility as Χ
    - correction consolidation as Σ
    - non-coercive follow-up binding as Ψ
    - minimal, productive, and stable critique thresholds
    - vertical reach and horizontal scale
    - publicness amplification
    - critique drift patterns
    - modulator conditions
    - critique-facing A/C/R/E/D projections
    - optional MIP docking boundaries
    must_not_do:
    - treat critique as personal essence
    - treat reaction as weaker critique
    - treat judgment as strict critique without Χ
    - treat exposure as correction
    - treat publicness as moral authority
    - treat PMS-CRITIQUE as truth adjudication
    - treat PMS-CRITIQUE as legitimacy adjudication
    - treat PMS-CRITIQUE as a governance or sanction instrument
    - treat drift classes as accusations or diagnoses
    - treat reduced signatures as replacement definitions for PMS operators
  critique_core:
    scope_note: 'PMS-CRITIQUE uses reduced signatures for critique thresholds as overlay shorthand. These signatures are not replacement definitions of PMS operators and do not alter PMS dependencies.

      '
    definitions:
      CRITIQUE_MIN:
        name: Minimal critique
        reduced_signature:
        - Δ
        - □
        - Χ
        full_pms_dependency_note: 'Χ presupposes Φ, Θ, and Ω within PMS dependency discipline; the reduced signature marks critique-level interruptibility, not a new operator path. The reduced signature is therefore an overlay shortcut for readability, not a dependency revision.

          '
        meaning: 'A mismatch becomes framed and interruptible. The episode can be stopped, reviewed, or redirected instead of becoming mere reaction, discharge, exposure, or judgment.

          '
        not_yet:
        - correction
        - follow_up
        - stable_commitment
        - empirical_truth
        - legitimacy_judgment
        applicability: active
        case_application: 'Minimal critique is reached only at the conceptual-overlay level: Δ is supplied by the mismatch between micro and macro critique reach, □ by the frame shift from interpersonal/local settings to institutional/public/systemic contexts, and Χ by the maintained application distance that keeps the analysis interruptible and reversible. This does not establish a concrete critique episode, a valid critique in the normative sense, or a successful correction.'
      CRITIQUE_PROD:
        name: Productive critique
        reduced_signature:
        - Δ
        - □
        - Χ
        - Φ
        - Σ
        full_pms_dependency_note: 'Φ and Σ are used according to PMS dependency discipline. This signature means that recontextualization and integration become visible as correction-oriented structure. It does not mean that any recontextualization is already correction or that PMS coherence proves productivity.

          '
        meaning: 'Critique becomes productive when the framed interruption recontextualizes the mismatch and consolidates a corrective step while preserving the relevant limits of the original frame.

          '
        not_yet:
        - durable_follow_up
        - self_bound_commitment
        - implementation_success
        - empirical_validation
        applicability: weak
        case_application: Productive critique is weak rather than established. Φ is central because the case is about scale recontextualization, and Σ is present as a required integration test, but no concrete corrective step is supplied. The case therefore projects toward CRITIQUE_PROD without proving correction consolidation. In this case, productivity would require showing how macro recontextualization actually improves, redirects, or coordinates critique rather than merely enlarging its vocabulary or audience.
      CRITIQUE_STABLE:
        name: Stable critique
        reduced_signature:
        - Δ
        - □
        - Χ
        - Φ
        - Σ
        - Ψ
        full_pms_dependency_note: 'Ψ remains PMS Self-Binding and must not be converted into coercive binding of others. Stable critique therefore means self-bound follow-up discipline, not enforcement, punishment, or forced agreement.

          '
        meaning: 'Critique becomes stable when correction is bound into follow-up across time without coercing the other party, collapsing into sanction, or treating public exposure as completion.

          '
        requires:
        - non_coercive_follow_up
        - ownership_without_person_ranking
        - revisability
        - dignity_in_practice
        - temporal_review_condition
        - non_capture_preservation
        applicability: weak
        case_application: Stable critique is weak and conditional. Ψ could become relevant if macro critique binds follow-up across time without coercion, but the abstract case material does not provide actor continuity, ownership, review windows, or durable follow-up practice. Stability must therefore remain a withheld claim rather than a maturity attribution.
    non_goals:
    - 'CRITIQUE_MIN is not truth.'
    - 'CRITIQUE_PROD is not moral superiority.'
    - 'CRITIQUE_STABLE is not coercion.'
    - 'Reduced signatures are not PMS Base revisions.'
    reach_ladder_note: 'The CRITIQUE_MIN → CRITIQUE_PROD → CRITIQUE_STABLE ladder is an overlay-level readability structure. It helps classify critique reach but does not rank people, roles, or institutions.

      '
    boundedness_note: 'A case may fail to reach a threshold without being morally defective. It may remain outside the overlay, require rival grammar, or lack sufficient evidence.

      '
  critique_mapping:
    overview: 'Operator roles below are PMS operator applications within the critique overlay. They are not new definitions.

      '
    operator_roles:
      Δ:
        name: Difference
        critique_role: 'Mismatch or irritation condition; something no longer fits the current frame.

          '
        case_application: The critique-relevant mismatch is the change in critique reach when critique moves from small-scale interpersonal or local contexts toward institutional, public, or systemic contexts.
      ∇:
        name: Impulse
        critique_role: 'Response pressure: tendency toward objection, interruption, expression, or correction.

          '
        case_application: 'The response pressure is the directed tension of critique itself: objection, interruption, challenge, clarification, or reframing. No psychological motive or affect is inferred.'
      □:
        name: Frame
        critique_role: 'Role space and relevance boundary; defines what counts as response, interruption, or correction.

          '
        case_application: 'The relevant frame is the scale frame: interpersonal/local critique versus institutional/public/systemic critique. The frame defines what counts as response, interruption, correction, audience, and reach.'
      Λ:
        name: Non-Event
        critique_role: 'Structured absence: non-response, missing follow-up, omitted correction, or silence under expectation.

          '
        case_application: Λ is under-specified. Missing response, omitted correction, silence, delayed follow-up, or absent institutional uptake would matter only if a concrete expectation frame were supplied.
      Α:
        name: Attractor
        critique_role: 'Stabilized critique-handling scripts such as outrage, silence, mockery, judgment, process-talk, or endless reframing.

          '
        case_application: Α is weak. A critique-handling pattern may stabilize as public discourse, institutional routine, silence script, or judgment script, but no recurrence is evidenced by the abstract case.
      Ω:
        name: Asymmetry
        critique_role: 'Exposure, cost, retaliation risk, status gradients, and uneven vulnerability in critique and correction.

          '
        case_application: 'Ω is active as exposure and obligation gradient across scale: macro critique can redistribute visibility, risk, status cost, institutional burden, and audience pressure, but no concrete party is ranked or judged.'
      Θ:
        name: Temporality
        critique_role: 'Accumulation, residue, irreversibility, review windows, delayed correction, and repeated non-events.

          '
        case_application: Θ is active because critique reach changes through accumulation, delay, residue, historical framing, institutional memory, public circulation, and future-oriented review or correction horizons.
      Φ:
        name: Recontextualization
        critique_role: 'Bridge from mismatch to correction, unless it becomes substitute explanation without action.

          '
        case_application: Φ is central. Recontextualization may bridge micro critique toward macro correction, but it may also substitute explanation or abstraction for correction; this remains an open calibration point.
      Χ:
        name: Distance
        critique_role: 'Stop-capability and interruptibility; prevents reaction, judgment, exposure, or commentary from fusing into coercive certainty.

          '
        case_application: 'Χ is maintained as stop-capability and interruptibility of the analysis: the overlay does not fuse critique into reaction, judgment, sanction, exposure-punishment, or person-level attribution.'
      Σ:
        name: Integration
        critique_role: 'Correction consolidation; coordinates mismatch, frame, recontextualization, asymmetry, and time into enactable correction.

          '
        case_application: Σ is present as a test, not as a completed result. A corrective step would require integrated coordination across local specificity, macro frame, asymmetry, time, and rival readings.
      Ψ:
        name: Self-Binding
        critique_role: 'Non-coercive follow-up ownership; binds the correcting agent or structure to revisable continuation.

          '
        case_application: Ψ is weak. Follow-up may become self-bound in a stable critique practice, but the case does not provide concrete ownership, commitment, institutional follow-up, or non-coercive binding evidence.
  critique_projections:
    overview: 'These critique-facing projections reuse PMS derived axes. They do not add new primitives or replace the PMS formulas.

      '
    reuse_status: overlay_level_readability_reuse_of_base_pms_derived_axes
    axes:
      Awareness_A:
        formula:
        - Θ
        - □
        - Δ
        base_status: reuse_of_base_PMS_derived_axis
        critique_gloss: Framed mismatch remains differentiable across time.
        case_application: 'Awareness_A is active as sustained framed differentiation over time: critique differentiates micro and macro frames and tracks how reach changes under temporal extension.'
      Coherence_C:
        formula:
        - Θ
        - Λ
        - □
        - ∇
        base_status: reuse_of_base_PMS_derived_axis
        critique_gloss: Critique pressure remains narratively and expectationally stable under time and non-events.
        case_application: Coherence_C is weak-to-active. Critique pressure and frame are present, and temporality is active, but Λ is under-specified because no concrete missing response or omitted correction is given.
      Responsibility_R:
        formula:
        - Ψ
        - Φ
        - Θ
        - Ω
        base_status: reuse_of_base_PMS_derived_axis
        critique_gloss: Follow-up ownership under asymmetry and time.
        case_application: Responsibility_R is weak and conditional. Responsibility would require follow-up ownership under Ω and Θ after Φ, but Ψ is not established by the abstract material.
      Action_E:
        formula:
        - Σ
        - Θ
        - ∇
        base_status: reuse_of_base_PMS_derived_axis
        critique_gloss: Enactable correction rather than commentary.
        case_application: Action_E is under-specified. The case analyzes critique reach and possible correction conditions, but it does not describe enactable correction, intervention, repair, or implementation.
      Dignity_in_Practice_D:
        formula:
        - Ψ
        - Χ
        - Ω
        base_status: reuse_of_base_PMS_derived_axis
        critique_gloss: Restrained critique handling under asymmetry.
        case_application: 'Dignity-in-Practice constrains the overlay by requiring restraint under asymmetry: no degradation, humiliation, exposure steering, person-typing, moral ranking, diagnosis, or sanction logic is derived.'
    projection_note: 'These projections are readability aids. They do not establish exhaustive capture of critique and do not create independent axes outside PMS.

      '
  critique_axes:
    overview: 'PMS-CRITIQUE uses vertical reach, horizontal scale, and publicness overlay P as overlay-level descriptors only.

      '
    vertical_reach:
      selected_level: mixed
      note: Reach is structural, not virtue, status, or moral rank.
      levels:
        V0:
          name: Irritation only
          signature:
          - Δ
          description: Mismatch registered but not interruptible or framed into critique.
          case_application: The case does not remain at irritation only, because it already names critique and its frame movement; however, concrete mismatch registration is still abstract rather than scene-specific.
        V1:
          name: Reaction / discharge
          signature:
          - Δ
          - ∇
          description: Directional response without Χ.
          case_application: The case is not merely reaction/discharge because Χ is maintained as application distance and no impulse discharge or non-interruptible reaction is described.
        V2:
          name: Minimal critique
          signature:
          - Δ
          - □
          - Χ
          description: Interruption becomes possible inside a frame; revisability remains.
          case_application: 'Minimal critique is reached at the conceptual level through Δ, □, and Χ: mismatch, scale frame, and interruptible distance are all present in the overlay reading.'
        V3:
          name: Productive critique
          signature:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          description: Recontextualization and integration consolidate correction.
          case_application: Productive critique is only weakly projected. Φ and Σ are central to the case, but no concrete corrective step is consolidated.
        V4:
          name: Stable critique
          signature:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          - Ψ
          description: Follow-up binding anchors correction without coercion.
          case_application: Stable critique is not established. Ψ remains weak because follow-up ownership, durable review, or self-bound correction practice is not supplied.
    horizontal_scale:
      selected_system: paper_tags
      selected_paper_tag: mixed
      selected_deployment_tag: not_applicable
      note: Scale changes viability conditions without changing PMS operator grammar.
      paper_tags:
        a:
          label: Generic / Structural Critique
          case_application: 'Active as the starting abstraction: the case treats critique reach structurally and without actor binding.'
        b:
          label: Single-Subject Critique
          case_application: Not directly applicable. The case does not concern inward self-critique or single-subject support/learning critique.
        c:
          label: Small-Group / Dyadic / Team Critique
          case_application: Relevant as part of the micro/local side when critique occurs in small groups, teams, or local scenes, but no concrete group is supplied.
        d:
          label: Public / Mass / Institutional Critique
          case_application: Relevant as part of the macro side when critique becomes public, institutional, or systemic; publicness remains an overlay amplifier rather than a new operator.
      deployment_tags:
        dyadic_micro:
          case_application: Conceptually relevant to the micro side, but no dyadic scene is supplied.
        small_group_team:
          case_application: Conceptually relevant to local critique reach, but no team or group episode is supplied.
        org_institution:
          case_application: Conceptually relevant to the institutional macro side, but no organization or procedure is supplied.
        public_mass:
          case_application: Conceptually relevant to public/systemic critique reach, but no concrete public circulation episode is supplied.
    publicness_overlay:
      id: P
      is_operator: false
      applicability: weak
      amplifies:
      - Ω
      - Θ
      - Α
      case_application: Publicness weakly amplifies critique, drift, exposure, and residue in the macro direction of the case, especially through Ω, Θ, and Α; no concrete public scene makes P active as an observed condition. In this case, P is best treated as a scale-modulator that explains why macro critique may become more irreversible, more audience-sensitive, and more susceptible to exposure effects without thereby becoming more truthful, legitimate, corrective, or mature.
  drift_typology:
    overview: 'Drift names predictable structural mutations of critique chains under load. Drift labels are not accusations, diagnoses, person-types, maturity failures, or sanctions. In this case, drift remains almost entirely risk-level because the supplied material is abstract and does not provide a concrete sequence, uptake pattern, audience reaction, institutional response, or corrective failure.

      '
    methodological_status:
      type: open_structural_index
      note: 'The catalogue is compact and non-exhaustive. Some cases may resist clean classification without being deficient. A drift class may be useful as a warning about possible critique mutation, but it must not be converted into a finding unless the scene supplies operator evidence.

        '
    main_classes:
      D1:
        name: Reaction masquerading as critique
        applicability: not_applicable
        minimal_signature: Δ + ∇ present / Χ absent
        description: 'Impulse discharge replaces interruption; expression is fast and non-interruptible.

          '
        typical_markers:
        - tempo pressure substitutes for framing
        - no stop-capability once launched
        case_application: Reaction drift is not active because the completed Core pass maintains Χ and does not describe impulse discharge. It remains only a general possibility outside the supplied case material.
      D2:
        name: Judgment masquerading as critique
        applicability: risk
        minimal_signature: □ + Δ present / Φ and Σ absent, often Ω leveraged
        description: 'Evaluation replaces coordination; labels stabilize clarity at the cost of actionability.

          '
        typical_markers:
        - evaluation replaces correction path
        - exposure increases while actionability decreases
        case_application: Judgment drift is a structural risk if macro critique stabilizes evaluation labels while Φ and Σ fail to produce correction, but the case does not establish active judgment drift.
      D3:
        name: Narrative repair masquerading as critique
        applicability: risk
        minimal_signature: Φ high / Σ absent
        description: 'Recontextualization becomes endpoint; explanation expands while correction remains unreachable.

          '
        typical_markers:
        - endless reframing
        - no consolidated corrective step
        case_application: Narrative repair drift is a structural risk because Φ is central and could become endpoint recontextualization without Σ; the case keeps this as a risk, not an active finding.
      D4:
        name: Commentary / analysis paralysis
        applicability: risk
        minimal_signature: Χ present / Σ absent
        description: 'Meta-commentary stabilizes; interruption suspends correction indefinitely.

          '
        typical_markers:
        - meta-position replaces integration
        - revision windows exist but never close
        case_application: Commentary drift is a structural risk because Χ and analysis could suspend correction indefinitely; the case mitigates this by marking Σ as a test and Action_E as under-specified.
      D5:
        name: Public pillory
        applicability: risk
        minimal_signature: Ω + Θ + Α under P, restraint collapsed
        description: 'Exposure replaces coordination; interruption fuses with degradation.

          '
        typical_markers:
        - visibility-as-sanction
        - irreversible residue fields dominate
        case_application: Public pillory is a risk only for macro/public extension under P if exposure replaces correction and restraint collapses. The abstract case does not show active pillory.
      D6:
        name: Silence attractor
        applicability: risk
        minimal_signature: Λ persistent, often Λ → Α, under Ω/Θ
        description: 'Repeated non-intervention stabilizes as default; non-critique becomes the expected script.

          '
        typical_markers:
        - non-event load accumulates
        - raising costs increase over time
        case_application: Silence attractor is a weak risk where macro critique depends on missing uptake or non-response, but Λ and Α are under-specified and no active silence script is shown.
    compact_catalogue:
      C1_Reaction_Drift:
        minimal_signature: Δ + ∇ present / Χ absent
        applicability: not_applicable
        case_application: 'Rejected for this case: Χ is maintained and no non-interruptible discharge is described.'
      C2_Judgment_Drift:
        minimal_signature: □ + Δ present / Φ and Σ absent / Ω leveraged
        applicability: risk
        case_application: 'Accepted only as a risk: macro critique could become evaluative labeling without correction, but this is not established.'
      C3_Moralization_Drift:
        minimal_signature: Ω high / Χ collapsed
        applicability: risk
        case_application: 'Accepted only as a risk: Ω could be moralized if distance collapsed, but D and Χ are maintained.'
      C4_Narrative_Reset_Drift:
        minimal_signature: Φ high / Σ absent
        applicability: risk
        case_application: 'Accepted only as a risk: Φ could become explanatory reset without Σ, but the case explicitly keeps Σ as a test.'
      C5_Commentary_Drift:
        minimal_signature: Χ present / Σ absent
        applicability: risk
        case_application: 'Accepted only as a risk: reflective analysis could replace correction, but no concrete correction opportunity is present.'
      C6_Silence_as_Steering:
        minimal_signature: Λ persistent / Ω unacknowledged
        applicability: risk
        case_application: 'Accepted only as a weak risk: Λ is under-specified, so silence steering cannot be claimed.'
      C7_Diffusion_Drift:
        minimal_signature: Ω distributed / □ unclear / Χ not triggered
        applicability: risk
        case_application: 'Accepted only as a risk: macro scale may distribute Ω and make □ unclear, but the overlay preserves frame discipline.'
      C8_Public_Pillory:
        minimal_signature: Ω + Θ + Α under P
        applicability: risk
        case_application: Accepted only as a risk under publicness P; exposure-as-correction is explicitly prohibited.
      C9_Integration_Bypass:
        minimal_signature: ∇ + Φ present / Σ bypassed
        applicability: risk
        case_application: 'Accepted only as a risk: ∇ and Φ may appear without Σ, but the Core pass treats Σ as a non-guaranteed requirement.'
      C10_Commitment_Evasion:
        minimal_signature: Σ partial / Ψ absent
        applicability: risk
        case_application: 'Accepted only as a risk: Ψ is weak, but absence of Ψ is not treated as failure in this abstract case.'
    typical_drift_chains:
      chain_public:
        applicability: risk
        description: 'Ω salience increases → Χ erodes → reaction stabilizes Α → Θ hardens residue.

          '
        case_application: The public drift chain is a risk when macro publicness increases Ω salience, weakens Χ, stabilizes Α, and hardens Θ residue; the supplied case does not show this chain as active.
      chain_narrative_to_silence:
        applicability: risk
        description: 'Φ expands → Σ stays absent → Λ accumulates → Ψ is avoided.

          '
        case_application: The narrative-to-silence chain is a risk if Φ expands explanation while Σ and Ψ remain absent and Λ stabilizes; the case keeps this as a non-established possibility.
  modulators:
    overview: 'Modulators are operator weightings that shift reachability and stabilization without adding new primitives. They are not person types and not prescriptions.

      '
    selectivity_note: 'These modulators are a selective set of recurrent weighting conditions legible in critique configurations, not a complete inventory of all possible scene-load variables.

      '
    items:
      M1_frame_clarity:
        name: Frame clarity
        applicability: active
        description: 'How clearly □ defines who may interrupt, what counts as response, and what correction could be.

          '
        case_application: Frame clarity is central because the case depends on distinguishing interpersonal/local frames from institutional/public/systemic frames.
      M2_non_event_density:
        name: Non-event density
        applicability: weak
        description: 'How often expected responses fail Λ and how much coordination shifts into absence.

          '
        case_application: Non-event density is weak because Λ is only conditionally relevant; no concrete missing response or repeated omission is supplied.
      M3_asymmetry_visibility:
        name: Asymmetry visibility
        applicability: active
        description: 'Salience of exposure gradients Ω and status or retaliation risk in the scene.

          '
        case_application: Asymmetry visibility is active conceptually because critique reach changes exposure, obligation, publicness, and institutional capacity across scale.
      M4_temporal_compression:
        name: Temporal compression
        applicability: weak
        description: 'Degree of time pressure versus availability of review windows Θ.

          '
        case_application: 'Temporal compression is weak: Θ is active, but no specific time pressure or review window is supplied.'
      M5_recontextualization_habituation:
        name: Recontextualization habituation
        applicability: active
        description: 'Whether Φ is routinely used as bridge or becomes the default substitute.

          '
        case_application: Recontextualization habituation is active as a calibration risk because Φ is central and may become bridge or substitute.
      M6_distance_availability:
        name: Distance availability
        applicability: active
        description: 'Whether Χ stop-capability is practically activatable without penalty inside the frame.

          '
        case_application: 'Distance availability is active as the overlay validity condition: Χ remains practically maintained as analytic stop-capability.'
      M7_attractor_inertia:
        name: Attractor inertia
        applicability: weak
        description: 'Speed with which scripts Α harden into default handling such as outrage, silence, mockery, or judgment.

          '
        case_application: Attractor inertia is weak because Α is not evidenced; macro critique could harden scripts, but recurrence is not supplied.
      M8_publicness_overlay:
        name: Publicness overlay
        applicability: weak
        description: 'P overlay amplifies Ω/Θ/Α and increases drift sensitivity without changing primitives.

          '
        case_application: Publicness overlay is weak-to-relevant because macro critique may amplify Ω, Θ, and Α, but no concrete public episode is given.
  mip_docking_interface:
    status: not_triggered
    purpose: 'Optional controlled handoff from structural explanation PMS-CRITIQUE to explicit evaluation MIP when legitimacy, attribution, or regime conditions are the stated object.

      '
    non_implication: 'Docking does not imply that PMS-CRITIQUE naturally culminates in evaluation. PMS-CRITIQUE remains complete as a structural grammar without downstream docking.

      '
    separation_rule:
      pms_critique_role: 'Explains how critique emerges, stabilizes, drifts, and binds at the level of operator grammar.

        '
      mip_role: 'Evaluates enactments, attribution, and regime conditions under explicit criteria, documentation, and guardrails.

        '
      non_substitution:
      - PMS-CRITIQUE must not be used to decide legitimacy.
      - MIP must not be used to explain critique emergence or mutation.
      - No back-projection of MIP verdicts into PMS causal language.
      - No retrofitting of PMS structures into evaluative scores.
    docking_points:
      DP1_projection_input:
        applicability: weak
        description: 'PMS critique-facing projections A/C/R/E/D may serve as scene-bound inputs for MIP-style case description without becoming trait claims.

          '
        case_application: Projection input docking is possible only if a later evaluative framework explicitly requests A/C/R/E/D as scene-bound inputs; it is not triggered here.
      DP2_asymmetry_evaluation:
        applicability: weak
        description: 'PMS may describe asymmetry structurally; MIP may evaluate enactment of that asymmetry under its own explicit criteria.

          '
        case_application: Asymmetry evaluation docking is possible only for a later evaluation of enacted asymmetry; this overlay remains structural and non-evaluative.
      DP3_regime_publicity_constraint:
        applicability: weak
        description: 'Publicness and transmission conditions may be imported as explicit admissibility constraints for evaluative use.

          '
        case_application: Regime/publicity docking is possible only if publicness or regime conditions become an explicit evaluative object; not triggered here.
      DP4_shared_critique_readiness:
        applicability: weak
        description: 'Docking is valid only when structural explanation and evaluation remain documented, reversible, bounded, and non-weaponizable.

          '
        case_application: Shared critique-readiness conditions are partly present as documentation, reversibility, boundedness, and non-weaponization, but no evaluation docking is requested.
  limits_and_boundedness:
    structural_limits:
    - Does not establish truth.
    - Does not verify motives, sincerity, or inner states.
    - Does not adjudicate moral rightness.
    - Does not rank persons, roles, or groups.
    - Does not function as clinical, forensic, HR, compliance, or sanctioning tool.
    - Does not dissolve accountability into 'just structure'.
    - Does not promise exhaustive capture of lived experience, normative disagreement, or social reality.
    genuine_non_capture:
      status: kept_open
      possible_when:
      - the grammar produces a coherent reading but weakens what is structurally decisive in the case
      - critique functions more as symbolic refusal, public rupture, ethical contestation, or resistance than as correction-oriented coordination
      - rival framings preserve dimensions that PMS-CRITIQUE backgrounds by design
      anti_absorption_rule:
      - Do not prematurely redescribe resistant cases as mere drift.
      - Do not treat resistant cases as calibration noise by default.
      - Do not treat incomplete capture as proof that the scene is defective.
      case_application: Non-capture zones include critique as symbolic refusal, political rupture, ethical contestation, rhetorical force, empirical sociology, institutional legitimacy, public affect, and lived experience. These are not redescribed as drift merely because they exceed the overlay.
    rival_framings:
      status: kept_open
      note: 'Rival critique grammars remain methodologically open. PMS-CRITIQUE may be more structurally legible in some cases without thereby being superior in all respects.

        '
      case_application: Open rival grammars include discourse ethics, genealogy, ideology critique, public-sphere theory, rhetoric, political legitimacy theory, sociology of critique, legal complaint analysis, and theories of resistance or refusal.
    final_boundedness_statement: 'Nothing in this overlay requires PMS-CRITIQUE to be treated as final, exhaustive, or uniquely sufficient. Its strength remains most credible where its own limits, rival framings, and possible non-capture cases are kept explicit.

      '
  guardrails:
    application_gate:
      required:
      - Χ + reversibility + D is a validity constraint on PMS application, not on critique, refusal, revision, or rejection.
      - Χ remains practically activatable; stop-capability is real, not merely formal.
      - 'Reversibility: readings remain scene-bound and revisable; Θ accumulation is treated as real.'
      - 'Dignity-in-Practice: no shaming, humiliation, or actor-ranking; critique stays structural.'
      - Applications remain scene-bound rather than person-bound.
      disallowed_uses:
      - Person-labeling, motive attribution, psychological diagnosis.
      - Verdict logic as an output of the model.
      - Coercive binding Ψ→Other, threats, or exposure-as-punishment.
      - Using drift labels as sanctions rather than structural descriptors.
      - Using structure-talk to suspend accountability where responsibility was structurally available.
      - Treating resistant cases as invalid merely because they exceed this grammar.
      case_application: The gate is preserved because the overlay remains application-only, keeps Χ, reversibility, and D active, avoids verdict logic, does not rewrite the Core pass, and treats drift labels as structural risks rather than accusations.
    dignity_in_practice:
      status: maintained
      note: 'D constrains application mode, not content: analysis must not become a pile-on and must preserve restraint even when Ω or P are high.

        '
      invalidity_clause: 'Critique becomes structurally invalid as a PMS-CRITIQUE enactment when degradation, humiliation, or exposure steering replaces correction.

        '
      case_application: Dignity-in-Practice is preserved by keeping the analysis non-diagnostic, non-tribunal, non-person-ranking, non-humiliating, and non-coercive, especially where publicness or asymmetry could amplify exposure.
    misuse_signatures_to_flag:
      chi_as_coercion:
        signature: Using Χ-language to demand compliance.
        status: absent
        case_application: Χ-language does not drift into coercion; it is used only as analytic distance and stop-capability.
      exposure_as_correction:
        signature: Treating public exposure as correction; P substituted for Σ/Ψ.
        status: risk
        case_application: Exposure-as-correction is a risk in macro/public critique but is explicitly rejected as a substitute for Σ or Ψ.
      drift_labels_as_moral_rank:
        signature: Turning drift labels into moral rank tokens.
        status: absent
        case_application: Drift labels are not used as moral rank tokens; they remain conditional structural descriptors.
      scene_to_person_typing:
        signature: Collapsing scene-bounded critique into person-typing.
        status: absent
        case_application: No scene descriptor is converted into person-typing; the case has no concrete person or group target.
      irreversible_binding_demands:
        signature: Using drift language to justify irreversible binding demands.
        status: absent
        case_application: No drift language is used to justify coercive or irreversible binding demands.
      explanation_neutralizes_accountability:
        signature: Using explanation-first language to neutralize accountability.
        status: risk
        case_application: Structural explanation could neutralize accountability if misused, but the overlay avoids accountability claims because no concrete responsibility scene is supplied.
      evaluation_bypasses_structure:
        signature: Using evaluation-first labels to bypass structural explanation.
        status: absent
        case_application: Evaluative labels do not bypass structural explanation; the overlay withholds truth, legitimacy, and moral verdicts.
