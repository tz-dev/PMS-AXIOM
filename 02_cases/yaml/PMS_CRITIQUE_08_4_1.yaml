  critique_overlay_synthesis:
    primary_critique_reading: 'PMS-CRITIQUE makes visible that the case is not only a general PMS scale-transition but specifically a critique-reach problem: minimal critique is conceptually present through Δ, □, and Χ, while productive and stable critique depend on non-guaranteed Φ, Σ, and Ψ conditions under changing Ω, Θ, and possible publicness P. The overlay therefore clarifies where critique becomes interruptible, where it may become correction-oriented, and where it would require non-coercive follow-up, without deciding whether any actual critique is true, justified, legitimate, or successful.'
    threshold_result: The case reaches CRITIQUE_MIN at the conceptual-overlay level, projects weakly toward CRITIQUE_PROD, and does not establish CRITIQUE_STABLE. Drift configurations are risks, not active findings. The threshold result is structural rather than evaluative.
    mismatch_result: Δ becomes critique-relevant as the mismatch between critique in micro interpersonal/local settings and critique in institutional/public/systemic contexts. This mismatch is not yet a norm violation, empirical finding, or proof of institutional pattern.
    frame_result: □ defines response, role space, relevance, and correction possibility by distinguishing local interpersonal frames from macro institutional, public, and systemic frames. The analysis must keep both frames legible rather than allowing the macro frame to erase the micro frame.
    distance_result: Χ stop-capability is maintained at the application level; it is real as analytic restraint but not evidenced as a concrete scene practice. Χ prevents critique reach from becoming verdict, exposure-punishment, forced agreement, or person-level classification.
    recontextualization_result: Φ is central and may bridge toward correction by moving critique across scale, but it may also substitute broader explanation for correction if Σ remains absent. Φ therefore carries both the main productive possibility and the main abstraction risk of the case.
    integration_result: Σ is a required integration test and remains non-guaranteed; no concrete corrective consolidation is supplied. Integration would require coordinating local specificity, macro framing, asymmetry, temporality, rival readings, and non-capture without smoothing them into one premature account.
    self_binding_result: Ψ remains weak. Follow-up binding without coercion is conceptually relevant but not established by the abstract case material. No stable critique practice, actor continuity, commitment, review condition, or self-bound responsibility is inferred.
    asymmetry_temporality_result: Ω and Θ shape the case by marking how scale changes exposure, cost, residue, accumulation, institutional memory, public circulation, and irreversibility risk. These operators make the macro movement structurally consequential without making it automatically more correct or more dangerous.
    scale_publicness_result: 'The selected horizontal scale is mixed paper_tags: generic/structural critique moving through local/small-group possibilities toward institutional/public/systemic critique. P weakly amplifies drift sensitivity but is not an operator and is not concretely active. Publicness is therefore treated as a possible amplifier of Ω, Θ, and Α rather than as authority, legitimacy, or correction.'
    drift_result: Main drift risks are D2 judgment drift, D3 narrative repair, D4 commentary drift, D5 public pillory under P, D6 silence attractor, C7 diffusion drift, C9 integration bypass, and C10 commitment evasion. They are constrained by Χ, reversibility, D, non-capture, and the non-overclaim discipline of the Core pass. None of these risks is converted into an active finding without concrete operator evidence.
    dignity_result: Dignity-in-Practice is preserved by refusing degradation, humiliation, exposure steering, person-typing, sanction logic, and moral ranking. D remains a praxeological constraint on critique handling under asymmetry, not an ontological dignity theory.
    non_capture_result: Outside PMS-CRITIQUE capture remain symbolic refusal, public rupture, ethical contestation, rhetoric, political legitimacy, sociology of critique, empirical uptake, and lived experience. These are not treated as deficient merely because they resist CRITIQUE threshold grammar.
    optional_mip_docking_result: MIP docking is not triggered. It would remain optional and separated if later evaluation of legitimacy, attribution, regime, or publicity conditions were explicitly requested.
    final_critique_formula_or_signature: CRITIQUE_MIN active; CRITIQUE_PROD weak; CRITIQUE_STABLE not established; drift risks D2/D3/D4/D5/D6 constrained; horizontal scale mixed with weak P overlay.
    final_claim_boundary: This CRITIQUE overlay adds visibility for critique thresholds, reach, scale, publicness, drift, modulators, and critique-facing projection boundaries. It does not revise PMS Base, rewrite the PMS Core pass, establish truth, verify motives, diagnose persons, rank persons, prescribe correction, generate sanction logic, validate PMS, or claim final capture of critique.