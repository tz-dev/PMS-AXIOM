  pattern_library:
    note: >-
      Scene-bound recognition aids; not diagnoses; not enforcement licenses.
      Pattern usefulness depends on whether differentiating force is preserved
      in application. For this case, the pattern library is used sparingly
      because the material is conceptual and not a concrete scene.
    ref: "PMS-EDEN §13"
    pattern_status_clarification:
      status: "open_structural_index"
      statement: >-
        The named patterns collected here are not independent ontological
        entities. They are paper-internal composites that bundle recurrent
        operator constellations into portable analytical forms.
      revisability_note: >-
        The library does not claim formal completeness and remains revisable
        under counter-scenes, rival framings, and genuine non-capture.
      rival_framing_note: >-
        Rival frameworks may describe some patterns through symbolic order,
        recognition struggle, attachment distortion, institutional asymmetry,
        phenomenological alienation, switch-drift, or responsibility
        externalization. PMS-EDEN renders one structural layer especially
        visible without abolishing such readings.
    use_condition_reminder_13_1:
      statement: >-
        Descriptive unless explicitly used for binding or prescription; any
        application use is valid only under the §12 gate.
      application_gate: "Χ + reversibility + D"
      ref: "PMS-EDEN §13.1 and §12.2.2"
      case_application: >-
        Use remains descriptive. The Recognition case has no concrete scene,
        so pattern naming cannot become binding, prescriptive, diagnostic, or
        action-authorizing. The valid use is to mark where a later scene might
        show denial, suppression, frame capture, externalization, or Σ-simulation,
        while keeping those possibilities reversible.
    pattern_index_13_2:
      statement: >-
        Index of drift patterns; each pattern is recorded with C5 triad:
        Trigger / Stabilizer / Failure.
      framing_note: >-
        These are the core EDEN patterns reconstructed in this paper. They
        organize the field as analyzed here and remain paper-internal.
      record_schema_C5:
        - "Trigger configuration"
        - "Primary stabilizer"
        - "Primary failure"
      ref: "PMS-EDEN §13.2"
    C5_record_schema:
      - "Trigger configuration"
      - "Primary stabilizer"
      - "Primary failure"

    patterns:
      P_Omega_AC:
        code: "P-Ω-AC"
        name: "Ω → Covert Authority / Authority Capture"
        applicability: "risk"
        basis_operators:
          - "Ω"
          - "□"
          - "Α"
          - "Σ"
          - "Ψ"
          - "Λ"
          - "Χ"
          - "Θ"
        operator_signature_readable: >-
          Ω↑ + □ to value-relation + Σ low/blocked + Ψ displaced + Λ support
          + Α indirect-steering script under Θ.
        C5:
          trigger_configuration: "Ω high/legible + □ drifts into value-relation while Σ does not form."
          primary_stabilizer: "Α protocolization of indirect steering, often supported by Λ residues."
          primary_failure: "Σ low/blocked and Ψ displaced or misbound."
        case_application: >-
          Authority capture is not active. It is a risk only where acknowledgment
          of responsibility becomes frame control, protection entitlement, or
          indirect steering instead of Ψ/Χ self-binding. The current case has no
          high Ω, no value-relation, no indirect-steering script, and no concrete
          displacement of Ψ.

      P_Lambda_DN:
        code: "P-Λ-DN"
        name: "Λ → Denial / Suppression"
        applicability: "risk"
        basis_operators:
          - "Λ"
          - "□"
          - "Φ"
          - "Α"
          - "Σ"
          - "Ψ"
          - "Θ"
          - "Χ"
        operator_signature_readable: >-
          Λ present + □ demands closure without repair + Φ reframe + Α
          avoidance script; Σ/Ψ do not convert Λ into repair under Θ.
        C5:
          trigger_configuration: "Λ present + □ demands closure while Σ repair conversion does not occur."
          primary_stabilizer: "Α avoidance default supported by Φ narrative repairs."
          primary_failure: "Σ low/absent and Ψ not bound to explicit repair commitments."
        case_application: >-
          Denial/suppression is the most relevant pattern risk because the Core
          case explicitly concerns denial, delay, and explicitness. It is still
          not active as a finding. To activate it, a concrete frame would need to
          show an expected acknowledgment-event, unresolved Λ, closure demand,
          reframe-based avoidance, and failure to convert Λ into Σ/Ψ repair.

      P_Sigma_TOT:
        code: "P-Σ-TOT"
        name: "Σ → Totalization / Dogma / Closure"
        applicability: "risk"
        basis_operators:
          - "Σ"
          - "Ψ"
          - "Χ"
          - "Ω"
          - "□"
          - "Δ"
          - "Λ"
          - "Α"
          - "Θ"
        basis_axes:
          - "D"
        operator_signature_readable: >-
          Closure demand under Δ/Λ pressure + Σ invoked as closure-weapon + Χ
          suppressed + D violated + Ψ binds irreversibly + Α final-answer script.
        C5:
          trigger_configuration: "Δ/Λ pressure meets closure demand inside □."
          primary_stabilizer: "Ψ irreversible enforcement, stabilized by Α final-answer scripts."
          primary_failure: "Χ suppressed and D violated."
        case_application: >-
          Totalizing Σ is a risk of the analysis itself rather than an
          object-level finding. Because recognition maps smoothly onto PMS and
          EDEN threshold language, the overlay must not use apparent coherence
          to force closure, declare acknowledgment owed, or treat denial as
