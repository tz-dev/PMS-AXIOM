pms_eden_overlay_application:
  schema_version: "PMS-EDEN_1.2"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-EDEN.yaml"
  paper_source_file: "PMS-EDEN - Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–EDEN Application Profile"
    model_short: "PMS-EDEN"
    status: "draft"
    repository_role: "paper_specific_application_profile"
    last_updated: "2026-05-24"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    repo:
      name: "PMS-EDEN"
      url: "https://github.com/tz-dev/PMS-EDEN"
    source_paper:
      title: "PMS–EDEN — Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss"
      version: "PMS-EDEN_1.2"
      status: "final_updated_reference"
      paper_role: "authoritative_overlay_source"
    description: >-
      PMS-EDEN is used here as a paper-specific application profile for PMS_1.3.
      It operationalizes the EDEN lens as a machine-first overlay: reduced
      signatures, paper constructs, drift traces, pattern handles, EDEN-MAP
      mapping discipline, boundary conditions, alternative explanations, and
      example-suite scaffolding. In this case it is applied only to the already
      completed PMS Core case "Recognition (Acknowledgment)" and remains strictly
      subordinate to PMS.yaml.
    methodological_restraint: >-
      PMS-EDEN does not claim to exhaust all accounts of Eden, comparison,
      reciprocity, asymmetry, sexed difference, recognition, acknowledgment,
      denial, delay, responsibility, or relational breakdown. For this case it
      offers a structural overlay reading of possible recognition-related drift
      corridors while preserving rival framings, partial applicability, and
      genuine non-capture. Because the Core case is not a concrete praxis scene,
      EDEN signatures remain overlay-level visibility tools rather than factual
      findings.

  abbrev_legend:
    A: "Awareness"
    C: "Coherence"
    R: "Responsibility"
    E: "Action / Enactment"
    D: "Dignity-in-practice"
    PS: "Pseudo-Symmetry (paper-internal construct)"
    PFO: "Postfeminist Override / Over-steering (paper-internal regime label; non-operator)"
    NRK: "Negative Responsibility Kernel (paper-internal construct)"
    AS: "Asymmetry Switch / Exception Switch (paper-internal label; non-operator)"
    PES: "Permanentized Exception Switch (paper-internal regime-drift label; non-operator)"
    PTE: "Parity-to-exit (paper-internal drift profile; non-operator)"
    RTA: "Responsibility-to-authority (paper-internal drift profile; non-operator)"
    EDEN_MAP: "EDEN-MAP mapping protocol (paper schema)"

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Recognition (Acknowledgment), including the accepted textual corrections and the normalization of Χ_app to Χ"
    rule: >-
      This EDEN block is appended to or integrated with the already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, replace
      PMS guardrails, or treat EDEN constructs as PMS Base. EDEN reduced
      signatures are overlay shorthand only and do not become operators,
      dependencies, axes, or new PMS principles.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
      - "The Core claim type: conceptual domain projection, not concrete scene analysis"
      - "The Core status: no empirical, metaphysical, diagnostic, legal-forensic, clinical, implementation, or PMS Base validation claim"
    integration_rule: >-
      The EDEN overlay may add visibility for EDEN ground-state reading,
      threshold explicitness, breach as chain interruption, NRK, false
      comparison, dissatisfaction as system cost, pseudo-symmetry,
      asymmetry-switch availability, PFO, parity-to-exit,
      responsibility-to-authority, reciprocity loss, EDEN-MAP, pattern library,
      viability boundaries, and alternative explanations. In this Recognition
      case, these additions are mostly weak, conditional, or risk-level because
      the Core material supplies no concrete actors, no scene, no recurrence,
      no role-specific asymmetry, and no evidence of comparison-dominant drift.
      The overlay therefore clarifies where EDEN could become relevant without
      converting possible denial, delay, silence, refusal, disagreement, or rival
      framing into drift by default.

  overlays: {}

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >-
      PMS-EDEN introduces no amplification overlays beyond paper-internal
      descriptors, reduced signatures, drift corridors, regime descriptions,
      cost markers, viability boundaries, EDEN-MAP, alternative-explanation
      discipline, and example-suite schemas. These organize existing PMS
      operators and never become PMS operators, axes, dependencies, diagnoses,
      group labels, or ideology claims. In this case, the EDEN overlay must not
      be used to intensify the completed Core pass into a stronger finding than
      the case material warrants.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    note: >-
      This gate constrains PMS application only. PMS itself, PMS-EDEN, or the
      case may be criticized, rejected, revised, or ignored without satisfying
      this gate. For this Recognition case, the gate is passed because the EDEN
      overlay remains reversible, non-diagnostic, non-tribunal, non-person-ranking,
      and subordinate to PMS.yaml.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >-
          Maintained reflective distance; no fusion into verdict, urgency,
          enforcement, person-level attribution, diagnosis, humiliation, or
          irreversible labeling. In this case Χ is preserved by treating
          recognition-as-acknowledgment as a conceptual PMS Core projection and
          treating EDEN signatures as optional overlay lenses rather than as
          proof of denial, responsibility failure, pseudo-symmetry, or reciprocity
          loss.
      reversibility:
        id: "reversibility"
        status: "maintained"
        meaning: >-
          Scene-bound, revisable, non-final readings; no global person labels,
          no group labels, no irreversible drift classification. Because the
          Core case is explicitly not a concrete praxis scene, every EDEN marking
          remains conditional and open to weakening, removal, or replacement by
          rival formalization.
      Dignity_in_Practice_D:
        id: "D"
        name: "Dignity-in-practice"
        status: "maintained"
        meaning: >-
          No shaming, ranking, humiliation, or ontological person evaluation.
          Critique applies only to enacted structures, role-position
          configurations, cost handling, and scene-bound drift profiles. Here D
          is used only as praxeological application constraint and not as an
          ontological dignity claim, moral superiority claim, or person-ranking
          standard.
    gate_result: "valid_as_eden_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >-
      Any use of Χ in reduced signatures is shorthand only. In PMS, Χ
      presupposes Φ, Θ, and □. Reduced signatures do not negate prerequisites,
      replace generativity with explanation, or alter the default dependency
      path recorded in PMS_1.3. For this case, EDEN shorthand never changes the
      Core ordering or the weak/conditional Core status of Ω, Σ, and Ψ.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  references:
    pms_github: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
    pms_yaml_raw: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    pms_eden_repo: "https://github.com/tz-dev/PMS-EDEN"

  eden_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-theological, non-clinical, non-diagnostic."
      - "No person-level judgment, no group label, no ideology claim, no ranking, no sanction logic."
      - "No psychology or inner-state explanation."
      - "No moral verdict logic."
      - "No automatic prescriptive authority."
      - "No person-level interpretation of switch-drift handles."
      - "Switch labels are scene-bound structural profiles, not traits, motives, or person defects."
      - "Description and application remain firewalled by Χ + reversibility + D."
    may_add_visibility_to:
      - "Eden as ground-state praxis configuration"
      - "Threshold explicitness / option visibility"
      - "Breach as chain interruption rather than knowledge gain"
      - "Fig leaves as legibility management"
      - "Negative Responsibility Kernel"
      - "False comparison pivot"
      - "Dissatisfaction as system cost"
      - "Pseudo-Symmetry regime"
      - "Asymmetry-switch availability"
      - "Permanentized exception switch"
      - "Parity-to-exit drift"
      - "Responsibility-to-authority drift"
      - "PFO as paper-internal regime label"
      - "Reciprocity as coordinated asymmetry"
      - "Reciprocity loss"
      - "Devaluation and humiliation as structural stabilization modes"
      - "Pattern-library recognition handles"
      - "EDEN-MAP scene-bound mapping"
      - "Boundary conditions and alternative explanations"
    must_not_do:
      - "read Eden as theological doctrine or moral anthropology"
      - "treat paper-internal labels as PMS operators"
      - "treat switch-drift handles as person labels"
      - "treat PFO as group label or ideology claim"
      - "treat humiliation or devaluation as moral accusation"
      - "treat NRK as PMS Action_E"
      - "treat comparison drift as diagnosis"
      - "convert additional responsibility into authority"
      - "convert parity into exit from unequal cost-bearing"
      - "use EDEN-MAP as coercive mapping against persons"
      - "claim PMS Base validation"

  paper_frontmatter_min:
    key_claims:
      - "Eden as a praxeological ground state within PMS: A-availability without deficit pressure in a structurally specified praxis scene."
      - "Breach/Fall as operator-chain interruption, not knowledge gain; consequence-field legibility under Ω/Θ/Λ without epistemic surplus."
      - "Drift pipeline: praxis → comparison-dominant □ → PS → asymmetry-switch availability → PFO/permanentized exception → parity-to-exit / responsibility-to-authority drift → devaluation/humiliation scripts → reciprocity loss."
    pms_conformance:
      - "Uses only PMS_1.3 operators Δ–Ψ."
      - "No redefinitions and no new axioms."
      - "Separates description from application."
      - "Validity gate applies to application only."
    acred_reference:
      A:
        formula:
          - "Θ"
          - "□"
          - "Δ"
        label: "Awareness"
      C:
        formula:
          - "Θ"
          - "Λ"
          - "□"
          - "∇"
        label: "Coherence"
      R:
        formula:
          - "Ψ"
          - "Φ"
          - "Θ"
          - "Ω"
        label: "Responsibility"
      E:
        formula:
          - "Σ"
          - "Θ"
          - "∇"
        label: "Action / Enactment"
      D:
        formula_note: "D = (Ψ ∘ Χ) applied to Ω-handling"
        label: "Dignity-in-practice"
        discipline: "non-metaphysical; non-ranking"
    paper_terms_min:
      pseudo_symmetry_PS:
        status: "risk"
        definition: >-
          Comparison-dominant □ asserts rhetorical parity while Ω remains
          operative in consequences and may produce asymmetry-switch
          availability. This is a paper-internal structural substitution, not a
          moral claim.
        case_application: >-
          Pseudo-symmetry is not active in the supplied Recognition case because
          no comparison-dominant frame, parity rhetoric, concrete Ω, blocked Σ,
          or misbound Ψ is evidenced. It remains a risk-level overlay only if a
          later concrete scene shows acknowledgment being replaced by a parity
          surface that leaves real responsibility, vulnerability, authority, or
          consequence asymmetry uncoordinated.
      asymmetry_switch:
        status: "risk"
        definition: >-
          Paper-internal label for parity-to-asymmetry activation under real or
          invoked Ω/Θ pressure; valid only where marked, bounded, and re-bound
          into Σ/Ψ.
        case_application: >-
          Asymmetry-switch activation is not shown. The Core case names
          responsibility and acknowledgment, which could later involve Ω/Θ
          pressure, but no actor, role, cost, emergency, exception, or marked
          activation is supplied. The overlay therefore keeps AS as a conditional
          risk, not as a finding.
      permanentized_exception_switch:
        status: "not_applicable"
        definition: >-
          PFO drift form in which asymmetry activation ceases to be
          emergency-bound and becomes a standing lever under preserved parity
          surface.
        case_application: >-
          Permanentized exception-switch drift is not applicable to the current
          abstract case. There is no repeated exception, no preserved parity
          surface, no standing lever, and no evidence that acknowledgment or
          responsibility has been converted into an ongoing asymmetry-switch
          regime.
      parity_to_exit:
        status: "risk"
        definition: >-
          Drift pattern in which parity rhetoric is used to deny additional
          responsibility under unequal Ω/Θ consequences.
        case_application: >-
          Parity-to-exit is not active because no parity rhetoric appears in the
          case material. It remains a risk-level possibility only for a future
          concrete recognition scene in which equality or symmetry language is
          used to avoid re-internalizing an unequal responsibility or consequence
          profile.
      responsibility_to_authority:
        status: "risk"
        definition: >-
          Drift pattern in which required Ψ/Χ self-binding under asymmetry is
          converted into control, protection entitlement, or frame authority.
        case_application: >-
          Responsibility-to-authority is not evidenced. The Core case mentions
          responsibility as a possible object of recognition, but it does not
          show any conversion of responsibility into control, authority,
          protection entitlement, or governance over another role-position. The
          status remains risk-only because recognition cases can later drift in
          this direction when responsibility is named without Ψ/Χ restraint.
      PFO:
        status: "not_applicable"
        definition: >-
          Paper-internal regime label for □ governance attempting to manage or
          suppress Ω legibility while permanentizing asymmetry-switch
          availability. It is structural, not a group label and not an ideology
          claim.
        case_application: >-
          PFO is too strong for this case and is marked not applicable. The case
          contains no regime-level □ governance, no Ω-taboo, no comparison
          metric, no permanentized exception-switch availability, and no
          evidence of suppressed Σ or displaced Ψ across Θ. PFO is not used as
          a group label, ideology claim, or hidden diagnosis.
      reciprocity_loss:
        status: "risk"
        definition: >-
          Erosion or failure of Σ/Ψ-supported coordination under real Ω across
          Θ, including switch-drift forms where parity becomes exit, asymmetry
          becomes leverage, or responsibility becomes authority.
        case_application: >-
          Reciprocity loss is not active because coordinated reciprocity is not
          concretely established or broken in the case material. It remains a
          bounded risk for future concrete scenes where recognition failure,
          delayed acknowledgment, or responsibility denial erodes Σ/Ψ-supported
          coordination under specified Ω across Θ.

    case_application: >-
      The EDEN key claims are relevant only as overlay visibility, not as a
      rewrite of the Core PMS pass. Threshold explicitness is most directly
      relevant because the Recognition case concerns what becomes noticed,
      accepted, denied, delayed, or made explicit. Breach, NRK, pseudo-symmetry,
      asymmetry-switch, PFO, parity-to-exit, responsibility-to-authority, and
      reciprocity loss remain weak, conditional, risk-level, or not applicable
      because the case is not a concrete praxis scene and supplies no comparison
      regime, no role-specific asymmetry, no repeated drift, no cost topology,
      and no evidence of Σ/Ψ failure.

  paper_internal_terms_index:
    note: >-
      Paper-internal terms are stable handles only. They are not PMS operators,
      not diagnoses, not person labels, not group labels, and not ideology
      claims. In this Recognition case they are used only to identify possible
      overlay drift risks and must not be used to label a person, group,
      intention, worldview, or moral status.
    asymmetry_switch:
      handle: "AS"
      status: "risk"
      definition: >-
        Shift from parity claim to asymmetry activation under real or invoked
        Ω/Θ pressure. Valid only where activation is marked, bounded, and
        re-bound into Σ/Ψ; drift where unmarked, repeatable, and
        responsibility-shifting.
      case_application: >-
        AS is not active. The Recognition case has no parity claim and no
        concrete asymmetry activation. It remains a risk handle only if a later
        scene shows a recognizer or claimant switching from parity language to
        asymmetry leverage under pressure without marking, bounding, and
        re-binding that activation into Σ/Ψ.
    permanentized_exception_switch:
      handle: "PES"
      status: "not_applicable"
      definition: >-
        PFO drift form in which asymmetry activation ceases to be
        emergency-bound and becomes a standing lever under preserved parity
        surface.
      case_application: >-
        PES is not applicable. No emergency-bound exception is described, no
        repeated exception is permanentized, and no preserved parity surface is
        supplied. A mere abstract possibility of denial or delay is insufficient
        for this label.
    parity_to_exit:
      handle: "PTE"
      status: "risk"
      definition: >-
        Drift pattern in which parity rhetoric is used to deny additional
        responsibility under unequal Ω/Θ consequences.
      case_application: >-
        PTE is not active because the case contains no parity rhetoric. It
        remains a risk only in a future scene where acknowledgment is refused or
        delayed by appealing to formal parity while unequal consequences or
        responsibilities remain uncarried.
    responsibility_to_authority:
      handle: "RTA"
      status: "risk"
      definition: >-
        Drift pattern in which required Ψ/Χ self-binding under asymmetry is
        converted into control, frame authority, protection entitlement, or
        governance over another role-position.
      case_application: >-
        RTA is not active. The case names responsibility as something that may
        be noticed, accepted, denied, delayed, or made explicit, but it does not
        show responsibility being converted into authority. It remains a
        conditional risk where recognition of responsibility becomes a claim to
        control the frame rather than a self-bound assumption of cost.

  paper_constructs:
    note: >-
      The following are EDEN paper constructs. They are non-operators and must
      remain scene-bound, structural, non-diagnostic, and non-personal. In this
      case, they are applied only as overlay handles on the completed PMS Core
      case "Recognition (Acknowledgment)" and cannot strengthen the Core beyond
      the evidence supplied.
    EDEN_ground_state:
      name: "Eden ground state"
      is_operator: false
      type: "scene_configuration"
      applicability: "weak"
      basis_operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "A"
      definition: >-
        Eden is reconstructed as a structurally specified praxis scene without
        deficit pressure: Δ is present, □ is stable, Θ is continuity rather than
        punitive accumulation, A = [Θ, □, Δ] is available, ∇ exists without
        deficit-compulsion dominance, Ω is latent or non-escalated, and Λ is not
        the central engine.
      case_application: >-
        An EDEN-like ground-state reading is weak and analogical. Recognition as
        acknowledgment can be imagined as a non-deficit configuration in which a
        person, claim, situation, or responsibility is available to A without
        immediate comparison, denial, or pressure. However, the Core case does
        not describe a structurally specified scene with stable □, continuity
        across Θ, latent/non-escalated Ω, or non-central Λ. The ground-state
        construct therefore functions only as a contrast background for possible
        recognition breakdown, not as an established case state.

    THRESHOLD_apple:
      name: "Threshold marker / option explicitness"
      is_operator: false
      type: "threshold_marker"
      applicability: "active"
      basis_operators:
        - "Δ"
        - "□"
        - "Θ"
      basis_axes:
        - "A"
      definition: >-
        The threshold marks option visibility: a negative praxis option becomes
        explicitly selectable within □ across Θ under available A. It adds no
        new Δ, A, or Χ and is not treated as knowledge, insight, guilt, or
        proof of breach.
      case_application: >-
        Threshold explicitness is the strongest EDEN overlay fit. The Core case
        concerns how something is noticed, accepted, denied, delayed, or made
        explicit. In EDEN terms, acknowledgment becomes threshold-relevant when
        the possibility of acknowledgment itself becomes visible as an option
        within □ across Θ: one may acknowledge, refuse, delay, leave implicit,
        name responsibility, or avoid naming it. This does not create new
        knowledge, does not add a PMS operator, and does not prove that denial
        is breach or that acknowledgment is owed. It only marks that the
        recognition-field has crossed from undifferentiated availability into
        selectable acknowledgment-status. Because the case is not concrete, this
        threshold remains structural and non-forensic: it cannot decide whether
        any particular non-acknowledgment is legitimate, negligent, evasive,
        careful, respectful, procedurally required, or a rival framing.

    BREACH_chain_interruption:
      name: "Praxis breach as chain interruption"
      is_operator: false
      type: "chain_interrupt"
      applicability: "weak"
      basis_operators:
        - "Δ"
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
      definition: >-
        Breach is reconstructed as realization under ∇ within □ with available
        A, where Σ does not carry integration and Ψ does not carry durable
        binding. It produces consequence-field legibility under Ω/Θ/Λ and does
        not produce epistemic surplus.
      case_application: >-
        Breach-like chain interruption is weak only. Denial, delay, or failure
        to make acknowledgment explicit could interrupt a recognition chain if a
        concrete frame establishes that acknowledgment was expected and if Ω/Θ/Λ
        consequences become legible. The current material does not provide such
        a scene, so breach cannot be claimed. EDEN should therefore not convert
        every absence of recognition into fall, refusal, irresponsibility, or
        drift. A breach reading would require at least: a specified
        acknowledgment-event, a relevant frame, a real option-set, trajectory
        across Θ, consequence-bearing Ω, and failure of Σ/Ψ carriage. Any
        realization of denial or delay must remain separate from PMS Action_E
        unless Σ, Θ, and ∇ are shown to support integrated action.

    FIG_LEAVES_legibility_management:
      name: "Fig leaves as legibility management"
      is_operator: false
      type: "cost_management_response"
      applicability: "not_applicable"
      basis_operators:
        - "Λ"
        - "Ω"
        - "Χ"
        - "□"
        - "Θ"
      definition: >-
        Fig leaves mark post-breach legibility management: □ shifts toward
        exposure/vulnerability framing, Χ appears as shielding distance rather
        than Σ-enabled reflection, Λ persists as remainder, Ω becomes
        instrumentally legible, and Α may seed concealment scripts.
      case_application: >-
        Fig-leaf legibility management is not applicable. The Recognition case
        mentions acknowledgment, denial, delay, and explicitness, but it does not
        show post-breach exposure, concealment, shielding distance, vulnerability
        management, or an Α-seeded script. Silence or delay must not be assumed
        to be concealment.

    NRK:
      name: "Negative Responsibility Kernel"
      is_operator: false
      type: "composite_kernel"
      applicability: "weak"
      basis_operators:
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "R"
        - "E"
      compact_form: >-
        NRK = A available + real option-set in □ + Ω effective + Θ
        trajectory-bearing + realization under ∇ within □ with Σ not carrying
        and Ψ absent, aborted, externalized, displaced, or simulated.
      discipline_E_separation: >-
        Do not label NRK as E. E remains reserved for integrated action:
        E = [Σ, Θ, ∇].
      case_application: >-
        NRK is weak and not active. The Core case allows the possibility that a
        responsibility becomes visible and yet is denied, delayed, externalized,
        or not self-bound, but it does not establish effective Ω, a real
        option-set, realization under ∇, Σ failure, or Ψ absence. Action_E must
        therefore remain under-specified, not replaced by NRK. NRK is an EDEN
        overlay warning about one possible responsibility-recognition failure,
        not a finding and not a PMS derived structure.

    FALSE_COMPARISON:
      name: "False comparison pivot"
      is_operator: false
      type: "frame_mutation"
      applicability: "weak"
      basis_operators:
        - "□"
        - "Ω"
        - "Δ"
        - "Λ"
        - "Α"
        - "Θ"
      definition: >-
        False comparison is a post-NRK frame inversion in which □ shifts from
        praxis-relation to value-relation. Δ becomes comparative tokenization,
        Ω is read as verdict or grievance surface, and comparison replaces
        coordination where Σ/Ψ cannot carry reciprocity.
      case_application: >-
        False comparison is weak and not evidenced. Recognition can drift from
        acknowledgment of a situated claim or responsibility into comparative
        standing, rank, validation competition, or value-relation; however, this
        case material does not show such a frame mutation. The overlay preserves
        the distinction between acknowledgment and comparison rather than
        assuming that every recognition conflict is comparison drift.

    DISSATISFACTION_system_cost:
      name: "Dissatisfaction as system cost marker"
      is_operator: false
      type: "cost_marker"
      applicability: "weak"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Α"
        - "Λ"
      definition: >-
        Dissatisfaction is modeled as system cost of maintaining false
