        roles: >-
          not concretely specified; possible abstract role-positions are
          recognizer, claimant, acknowledged party, responsibility-bearer,
          affected party, witness, and frame-holder. These are role slots only,
          not persons, types, groups, moral ranks, motives, or diagnostic
          categories.
      Trigger:
        delta: >-
          distinction between acknowledged and not-yet-acknowledged, explicit
          and implicit, accepted and denied, delayed and enacted,
          responsibility-named and responsibility-unnamed. The distinction is
          structural and does not decide whether acknowledgment is due or whether
          denial is invalid.
        nabla: >-
          weak structural tension toward acknowledgment, response, explicitness,
          denial, delay, or responsibility uptake; no subjective impulse,
          avoidance motive, guilt, sincerity, bad faith, or psychological state
          is inferred.
      Lambda_candidates:
        - "expected acknowledgment-event absent within a specified frame, if such a frame is later supplied"
        - "responsibility remains unnamed where a concrete frame expects naming"
        - "explicit acceptance is delayed where a concrete frame defines a relevant acknowledgment window"
        - "a claim is noticed but not accepted, where the relevant frame distinguishes notice from acceptance"
        - "a situation is treated as visible but not yet made explicit, where explicitness is structurally required by the frame"
      Realizations:
        observed: "none; the case material contains no concrete enactment"
        omissions: >-
          none evidenced; only conceptual possibility of denial, delay,
          non-explicitness, refusal, silence, or non-uptake. These remain
          possible non-events only if a concrete frame establishes an expected
          acknowledgment-event.
        escalations: >-
          none evidenced; no conflict escalation, sanction, authority move,
          comparison pivot, humiliation, devaluation, parity-to-exit, or
          responsibility-to-authority move is supplied.
      Echeck:
        E_present: "not_applicable"
        Sigma_carrier: "no"
        notes: >-
          Action_E is not present because the case does not show integrated
          enactment. PMS Action_E requires Σ, Θ, and ∇. The case has weak ∇ and
          conceptual Θ, but Σ is not established. EDEN NRK is not Action_E and
          must not be used to substitute for Action_E. Explicit wording,
          acknowledgment-language, or denial-language would still not count as E
          unless it is integrated into a temporally carried praxis interface.
      Alpha_stabilizers:
        - "none evidenced; recurrence, script, protocol, habit, or stabilized pattern would be required"
      Omega_real:
        capacity: "under_specified; no capacity gradient is supplied"
        exposure: "under_specified; no exposure or vulnerability gradient is supplied"
        obligation: "weak; responsibility is mentioned as a possible object of recognition but no concrete obligation gradient is established"
        leverage: "under_specified; no leverage or authority gradient is supplied"
      Psi_map:
