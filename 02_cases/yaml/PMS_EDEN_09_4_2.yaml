  eden_overlay_synthesis:
    primary_eden_reading: >-
      PMS-EDEN makes visible that Recognition (Acknowledgment) is strongest at
      the threshold-explicitness level: the option to notice, accept, deny,
      delay, or make explicit becomes structurally selectable within a frame
      across time. EDEN also identifies bounded risks around Λ-denial,
      Σ-simulation, Ψ-externalization, false comparison, pseudo-symmetry, and
      reciprocity loss, while refusing to treat those risks as active without a
      concrete scene. The overlay therefore sharpens the Core case without
      rewriting it: recognition is not automatically validation, validation is
      not automatically legal admission, responsibility-naming is not
      responsibility-taking, and explicit acknowledgment is not already Σ or Ψ.
    ground_state_result: >-
      EDEN ground-state configuration is weak and analogical. Recognition can be
      imagined as A-availability without deficit pressure: something or someone
      is structurally available to be noticed without immediate deficit,
      comparison, accusation, or compensatory framing. But no full EDEN
      ground-state praxis scene is supplied. The ground-state reading therefore
      functions only as contrast: it shows what would have to remain stable
      before acknowledgment becomes organized by denial, delay, comparison,
      responsibility displacement, or reciprocity loss.
    threshold_result: >-
      Threshold explicitness is active. The case centrally concerns how a
      person, claim, situation, or responsibility becomes visible as
      acknowledged, denied, delayed, accepted, or explicit within a frame across
      Θ. The threshold is not a verdict. It marks that acknowledgment-status has
      become selectable and therefore structurally legible. Whether a concrete
      selection is valid, harmful, evasive, careful, respectful, legally
      significant, morally sufficient, or procedurally required remains outside
      the overlay unless a concrete scene supplies those grounds.
    breach_or_NRK_result: >-
      Breach-like chain interruption and NRK are weak and not active. Denial or
      delay could become breach-like or NRK-relevant only if a concrete scene
      shows effective Ω, real option-set, realization under ∇, consequence-field
      legibility, and absent, failed, displaced, or simulated Σ/Ψ. Realization
      remains distinct from PMS Action_E. In particular, an explicit denial, an
      explicit acknowledgment, or an explicit responsibility statement is not
      yet E unless Σ carries integration across Θ under directedness; and it is
      not yet Ψ unless it becomes durable self-binding.
    legibility_management_result: >-
      Fig-leaf-like shielding, concealment, or exposure management does not
      appear. The case concerns explicitness in general, not post-breach
      concealment or vulnerability management.
    comparison_result: >-
      No □ shift from praxis-relation to comparison/value-relation is shown.
      False comparison remains a risk only where recognition becomes rank,
      parity, standing, or validation competition.
    dissatisfaction_cost_result: >-
      Dissatisfaction or continuous adjustment does not appear as active system
      cost. There is no evidence of false equivalence, permanent comparison,
      correction loop, Φ-repair spike, chronic Λ, or Α load.
    pseudo_symmetry_result: >-
      Pseudo-symmetry is weak and risk-level only. It would require rhetorical
      parity inside comparison-dominant □ under real Ω with blocked or simulated
      Σ and misbound Ψ. The current case supplies none of those conditions.
    switch_drift_result: >-
      Asymmetry-switch, permanentized exception switch, parity-to-exit, and
      responsibility-to-authority do not appear. Switch labels remain
      paper-internal, scene-bound, non-personal risk handles.
    pfo_result: >-
      PFO is not applicable and would be an overextension. Local switch drift
      is also not evidenced. The case contains no regime-level Ω-taboo,
      comparison metric, permanentized exception switch, suppressed Σ, displaced
      Ψ, or protocolized Α.
    reciprocity_result: >-
      Reciprocity is weakly relevant only as a viability horizon. Coordinated
      asymmetry, simulated reciprocity, displaced reciprocity, and reciprocity
      loss are not established because Ω, Σ, Ψ, chronic Λ, and stabilized Α are
      not supplied.
    devaluation_humiliation_result: >-
      Devaluation and humiliation are not active. They remain remote structural
      risks for concrete scenes where non-recognition stabilizes status lowering
      under named Ω with blocked Σ/Ψ. The overlay preserves non-moral,
      non-personal language.
    pattern_library_result: >-
      The most relevant pattern-library handles are P-Λ-DN as risk,
      P-Σ-TOT as analysis-risk, P-Ψ-EXT as coercive-application risk,
      P-□-MOR as tribunal-frame risk, and P-Σ-SIM as explicitness-without-
      integration risk. No C5 pattern is active because trigger, stabilizer, and
      failure are not all evidenced.
    eden_map_result: >-
      EDEN-MAP yields the formula:
      □conceptual-recognition → Λpossible-delay-or-denial →
      Αnone-evidenced → Ωweak/under-specified → Σweak/not-established →
      Ψweak/not-established. No primary attractor is evidenced. The cost layout
      is moderate A-load, weak C-load, weak R-clarity, under-specified E, and
      active D as application restraint.
    alternative_explanations_result: >-
      AE1 through AE5 remain plausible only as weak, non-exclusive future
      explanations. Rival models remain open: speech-act theory, legal
      admission or notice, ethical responsiveness, political recognition,
      epistemic uptake, interpersonal validation, institutional stress, and
      refusal as non-assimilative boundary.
    boundary_conditions_result: >-
      Boundary conditions strongly reduce EDEN applicability: Ω is minimal or
      absent, the frame is not comparison-based, no concrete Σ/Ψ is established,
      no institution is specified, rival frameworks retain explanatory force,
      and genuine non-capture risk is active.
    non_capture_result: >-
      PMS-EDEN does not capture the full field of recognition. Felt validation,
      political status, legal admission, testimonial credibility, institutional
      notice, ritual acknowledgment, apology, repair, silence as boundary, and
      refusal as non-assimilation remain outside or only partially legible.
    final_eden_formula_or_signature: >-
      THRESHOLD_marker_signature active:
      Δ within □ across Θ with A = [Θ, □, Δ] available; acknowledgment,
      denial, delay, or explicitness becomes selectable.
      Secondary risk-only signature:
      Λ-denial / Σ-simulation / Ψ-externalization risk under possible
      responsibility recognition, with Ω, Α, Σ, and Ψ not established.
    final_claim_boundary: >-
      This EDEN overlay adds visibility for ground-state praxis, threshold
      explicitness, breach as chain interruption, NRK, comparison drift,
      pseudo-symmetry, switch-drift profiles, PFO, reciprocity loss, EDEN-MAP
      cost mapping, pattern-library handles, alternative explanations, and
      boundary conditions. It does not revise PMS Base, rewrite the PMS Core
      pass, introduce new PMS operators, diagnose persons, rank persons, make
      group or ideology claims, prescribe action, authorize coercion, validate
      PMS, or claim final capture of Eden, reciprocity, or relational drift.