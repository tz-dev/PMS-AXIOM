schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >-
  PMS_1.3 case application of the conceptual case title "Free Will vs
  Determinism". This document applies PMS.yaml as PMS Base, does not revise
  PMS.yaml, and does not treat the application schema, pre-analysis, or this
  case output as PMS Base.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >-
    This case applies PMS_1.3 as repository reference only. It does not redefine
    PMS operators, alter operator order, introduce new meta-axioms, treat
    derived structures as primitives, override application guardrails, or claim
    PMS Base validation.
  referenced_base_sections:
    - "pms_entry_condition"
    - "schema_version"
    - "schema_meta"
    - "repository_governance"
    - "core_principles"
    - "pms_model_reference"
    - "derived_structures"
    - "example_operator_chains"
    - "computational_representation"
    - "ai_interface_pms"
  application_schema_note: >-
    The template is used only as an application schema. PMS.yaml remains the
    only PMS Base reference.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >-
    PMS_1.3 is treated as formally disciplined and portable, but not final,
    complete, uniquely ordered, or immune to revision.
  description_alignment: >-
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - "theoretical_reflection"
      - "structural_action_theory"
      - "anthropology_and_praxeology"
      - "systems_theory"
      - "ai_architecture_and_safety"
      - "model_documentation_and_specification"
      - "simulation_scaffolding"
      - "structural_reasoning"
    not_intended_for:
      - "clinical_diagnosis"
      - "personality_typing"
      - "mental_health_risk_assessment"
      - "automated_moral_judgement"
      - "individual_person_evaluation"
      - "forensic_decision_making"
      - "policy_enforcement"
      - "irreversible_labeling"
  normative_position_alignment:
    ontology: >-
      The case analysis makes no PMS-based claim about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological
      dignity.
    dignity_clause: >-
      Dignity-in-Practice is treated as a praxeological constraint on handling
      asymmetry, not as a metaphysical or moral ranking.
    tragedy_clause: >-
      Structural maturity, coherence, integration, or responsibility do not
      eliminate tragedy, unresolved tension, rupture, or non-capture.
    self_binding_clause: >-
      The analysis remains subject to PMS application discipline: Distance Χ,
      Self-Binding discipline Ψ, and Dignity-in-Practice D must not be
      suspended to force clarity, truth, authority, resolution, or action.
  computational_position_alignment:
    representation_clause: >-
      YAML representation is a formal encoding of a PMS reading, not an
      implementation of praxis, agency, selfhood, subjectivity, consciousness,
      or empirical validity.
    calibration_clause: >-
      Any operational use would require calibration, constraints, empirical
      testing where applicable, external evaluation, context-sensitive
      interpretation, and accountability.
    accountability_clause: >-
      Formal PMS translation does not guarantee public intelligibility,
      empirical adequacy, external accountability, or explanatory sufficiency.
    rivalry_clause: >-
      PMS rendering does not prove superiority over rival grammars or
      formalisms.
  terminology_alignment:
    praxis: >-
      Situated, meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through
      operator compositions.
    meta_axiom: >-
      One of the eleven PMS operators Δ–Ψ, treated as structurally basic within
      PMS_1.3.
    operator_composition: >-
      Ordered or structured application of PMS meta-axioms to generate complex
      praxeological formations.
    derived_construct: >-
      A higher-order construct systematically derived within PMS from operator
      compositions, not an independent primitive.
    asymmetry_drift_pattern: >-
      A structurally derived distortion pattern within PMS; not a diagnosis,
      person-type, clinical category, ontological attribution, or moral verdict.
    repository_reference: >-
      PMS.yaml remains the base reference; this case template is subordinate.
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.4 Thinking)"
      role: "formalization_assistant"
  role_of_pms_yaml: >-
    PMS.yaml is the current repository reference specification for PMS Base.
    This case analysis depends on PMS.yaml but does not revise it.
  this_template_may:
    - "depend_on_pms"
    - "reference_pms_operators"
    - "define_case_application_structure"
    - "organize_pms_operators_for_case_analysis"
    - "specify_case_quality_control"
    - "support_structural_reasoning"
  this_template_must_not:
    - "silently_redefine_meta_axioms"
    - "silently_alter_default_operator_order"
    - "silently_alter_default_dependency_path"
    - "present_new_meta_axioms_as_if_already_in_base_pms"
    - "treat_derived_axes_as_independent_primitives"
    - "override_application_guardrails_while_claiming_full_pms_conformity"
    - "claim_pms_base_validation_from_a_case"
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >-
    Any PMS application presupposes Distance Χ, reversibility, and
    Dignity-in-Practice D as praxeological application constraints. This gate
    applies to PMS applications, not to critique, refusal, rejection, or rival
    formalization.
  applies_to: "application_only"
  does_not_apply_to:
    - "critique"
    - "refusal"
    - "rejection"
    - "revision_proposals"
    - "rival_formalization"
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >-
          The analysis does not fuse PMS into verdict, urgency, enforcement,
          closure, metaphysical proof, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >-
          The reading remains revisable, bounded, non-final, and
          non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >-
          The analysis maintains restraint under possible asymmetry and does not
          shame, rank, humiliate, or ontologically evaluate persons or groups.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >-
      Any application of PMS is itself subject to PMS. Distance Χ,
      Self-Binding discipline Ψ, and Dignity-in-Practice D may not be suspended
      to enforce truth, clarity, authority, resolution, or action.
    application_to_this_case: >-
      The analysis remains self-bound by treating "Free Will vs Determinism" as
      a reversible conceptual PMS projection, not as a metaphysical verdict,
      diagnostic profile, legal tribunal, implementation claim, person ranking,
      or PMS Base validation.
  application_only_boundary:
    status: "active"
    statement: >-
      PMS may be criticized, rejected, revised, or compared with rival
      formalisms without satisfying the PMS entry condition. The gate governs
      only applications that claim to use PMS.
  non_capture_rule:
    status: "active"
    statement: >-
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, unresolved absence, or rival framing must
      not automatically be redescribed as drift, failed integration, incomplete
      calibration, or structured absence.
  no_pms_base_revision:
    status: "active"
    statement: >-
      This case does not alter PMS Base, PMS operators, dependencies, derived
      structures, guardrails, or repository governance.

case:
  title: "Free Will vs Determinism"
  interpretation_type: "conceptual_domain_projection"
  case_type: "high_abstraction_philosophical_conceptual_projection"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >-
    The case structurally projects the title as a framed conceptual opposition
    between agency-language and causal-determination-language. PMS is used only
    to map the operator availability, dependency risks, derived-structure
    limits, rival readings, non-capture zones, falsifiers, and guardrails.
  non_scope: >-
    The analysis does not prove or disprove free will, determinism,
    compatibilism, incompatibilism, consciousness, moral desert, legal
    responsibility, clinical capacity, empirical neuroscience, software
    implementation, person ranking, or PMS Base validity.
  non_goals:
    - "metaphysical_proof"
    - "diagnostic_assessment"
    - "legal_or_forensic_judgment"
    - "person_ranking"
    - "irreversible_labeling"
    - "pms_base_validation"
  case_typing_note: >-
    This is not a concrete praxis scene. It is a high-abstraction conceptual
    projection using PMS operators to map a philosophical opposition while
    preserving rival formalizations and possible non-capture.

