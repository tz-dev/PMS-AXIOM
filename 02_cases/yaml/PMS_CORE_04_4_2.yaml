    The PMS reading is limited because the case material is only a title, not a
    concrete praxis scene, argument, dataset, legal case, clinical case, or
    implementation specification.
  - >-
    The analysis makes no empirical, metaphysical, diagnostic, legal, forensic,
    clinical, implementation, or PMS Base validation claim.
  - >-
    Rival readings remain open, and non-capture may apply to metaphysical
    freedom, causal closure, consciousness, moral desert, legal responsibility,
    theology, existential authenticity, and empirical decision science.
  - >-
    Because PMS can organize the opposition smoothly, coherence risk is high
    unless discrimination tests and falsifier conditions are maintained.

case_synthesis:
  primary_pms_reading: >-
    "Free Will vs Determinism" is best treated as a bounded PMS conceptual
    projection: Δ supplies the basic opposition, □ frames it philosophically, ∇
    gives weak argumentative pressure, Χ preserves distance, and Θ/Φ remain
    guarded supports for temporal-causal and rival-frame analysis.
  continuity_condition: >-
    Continuity is weak and would require an explicit temporal argument,
    repeated debate pattern, or praxis trajectory rather than the title alone.
  change_condition: >-
    Change or recontextualization is possible when the binary frame is shifted
    into compatibilist, incompatibilist, empirical, legal, theological,
    existential, or PMS-praxeological frames, but such shifts must not erase
    rival disagreement.
  rupture_or_non_fit_condition: >-
    Rupture, resistance, disagreement, absence, and non-fit are preserved as
    possible rival-formalization or non-capture zones, not automatically treated
    as drift, incomplete calibration, failed integration, or maturity failure.
  responsibility_condition: >-
    Responsibility is not active as a finding. It becomes analyzable only if
    later material supplies asymmetry, temporal commitment, recontextualization,
    and self-binding conditions.
  dignity_condition: >-
    Dignity-in-Practice constrains the analysis by requiring restraint under
    possible asymmetry and responsibility questions without shaming, ranking,
    humiliating, diagnosing, or ontologically evaluating persons or groups.
  rival_reading_condition: >-
    Rival formalizations remain open until explicit comparison criteria and
    case material show that PMS discriminates better rather than merely
    translating more broadly.

