core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >-
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >-
      The case is treated as conceptual praxis-structure: a framed opposition
      between agency and causality. No person, group, psychology, essence, or
      ontology is evaluated.
    failure_condition: >-
      The analysis would fail P1 if it generated person-labels, psychological
      essence claims, or ontological rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >-
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis for praxis. Completeness, optimal minimality, and unique
      ordering remain open.
    status: "satisfied"
    case_application: >-
      Only PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS
      operators.
    failure_condition: >-
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >-
      PMS derives structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and asymmetry drift patterns from operator
      compositions rather than primitives.
    status: "satisfied"
    case_application: >-
      Awareness, Coherence, Responsibility, Action, Dignity-in-Practice,
      SELF_FIXPOINT, and drift patterns are considered only as formula-derived
      PMS structures.
    failure_condition: >-
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >-
      Asymmetry Ω and temporality Θ are central structural operators.
      Responsibility, maturity, and dignity-in-practice are analyzed under
      temporal and asymmetrical conditions rather than static attributes.
    status: "partial"
    case_application: >-
      Θ is relevant because determinism invokes sequence and causal trajectory.
      Ω is weak because no concrete role, exposure, vulnerability, obligation,
      or responsibility scene is supplied.
    failure_condition: >-
      The analysis would fail P4 if it ignored relevant temporality or imported
      asymmetry without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >-
      PMS may be represented computationally, but representation does not imply
      direct implementation, interoperability, or explanatory adequacy.
    status: "satisfied"
    case_application: >-
      This YAML representation is inspectable encoding only. It is not
      implementation, empirical validation, AI architecture, or proof of
      explanatory sufficiency.
    failure_condition: >-
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >-
      PMS is not exempt from rivalry. Comparison with alternative grammars,
      sharper discriminative models, or more empirically grounded formalisms
      remains open.
    status: "satisfied"
    case_application: >-
      Rival readings remain open: compatibilist, incompatibilist, libertarian,
      hard-determinist, legal-forensic, empirical-neuroscientific, theological,
      existential, and pragmatic-praxeological formalizations.
    failure_condition: >-
      The analysis would fail P6 if PMS translation were treated as defeating
      rival formalizations by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >-
      PMS translation does not prove exhaustive capture. Some forms of praxis
      may remain partially legible or resist assimilation.
    status: "satisfied"
    case_application: >-
      Possible non-capture is preserved for metaphysical freedom, causal
      closure, consciousness, moral desert, legal culpability, theology,
      existential authenticity, and empirical decision science.
    failure_condition: >-
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >-
      PMS is not a diagnostic tool and must not be used for clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >-
      No individual, symptom, pathology, clinical criterion, forensic capacity
      claim, or person-level assessment appears in the case.
    failure_condition: >-
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >-
      PMS applications must keep findings tied to specific praxeological scenes,
      roles, and structures. Global person-labels and irreversible ontological
      attributions are out of scope.
    status: "partial"
    case_application: >-
      No concrete scene is supplied, so the analysis is explicitly
      case-type-bound as a conceptual projection and not generalized into scene
      findings.
    failure_condition: >-
      The analysis would fail P9 if it generated global, irreversible,
      decontextualized claims.

