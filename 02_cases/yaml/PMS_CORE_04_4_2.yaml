operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      The case becomes analyzable through the distinction between free will and
      determinism, with secondary contrasts between agency-language and
      causal-necessity-language, choice and constraint, responsibility and
      determination.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "The primary distinction is free will versus determinism as named in the title."
      - "Secondary distinctions remain conceptual and are not metaphysical findings."
    falsifier_conditions:
      - "If the title is later shown not to name a genuine distinction or opposition, Δ loses its current entry role."
    non_capture_note: >-
      Difference opens the PMS reading but does not prove PMS captures the
      metaphysical debate.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      The versus-form introduces argumentative pressure: the framed difference
      invites comparison, contestation, possible adjudication, or possible
      reframing. No subjective desire is inferred.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "The tension is argumentative and explanatory, not affective, institutional, or diagnostic."
      - "No subjective desire, motive, or inner drive is inferred from the title."
    falsifier_conditions:
      - "If later material treats the title as neutral taxonomy rather than tension, ∇ should be downgraded."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      The active frame is philosophical-conceptual debate. It constrains
      relevance to agency, causality, explanation, responsibility, and rival
      formalizations rather than clinical, legal, empirical, or implementation
      contexts.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is high-abstraction philosophical-conceptual analysis."
      - "Frame shifts to metaphysics, law, neuroscience, theology, or implementation must be explicitly marked."
    falsifier_conditions:
      - "If a concrete scene, legal case, experiment, or implementation specification is later supplied, the frame must be recalibrated."
    non_capture_note: "A frame can clarify a case without exhausting it."
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Λ is weak. The title may imply a missing or contested resolution between
      free will and determinism, and may gesture toward absent alternatives or
      missing empirical evidence. No structured non-event is explicitly supplied.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "The possible expected occurrence is a resolution of the opposition within the philosophical debate frame."
      - "Absence may mark PMS non-capture or under-specification, not case defect."
    falsifier_conditions:
      - "If no expected resolution, meaningful absence, or counterfactual structure appears, Λ should be marked not active."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Α is weak. The free-will/determinism debate can form recurrent
      argumentative attractors, but this title supplies no historical
      recurrence, repeated practice, or stabilized role script.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Recurrence requires textual, historical, argumentative, or scene evidence beyond the title."
      - "A general philosophical tradition should not be treated as a case-specific attractor without evidence."
    falsifier_conditions:
      - "If recurrence is not shown, Α remains weak and cannot strongly ground later operators."
    non_capture_note: "Pattern formation is possible but not established."
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Ω is weak and guarded. Responsibility, blame, capacity, obligation, and
      vulnerability may become asymmetrical in concrete free-will debates, but
      no role imbalance, exposure, power relation, or obligation is supplied.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "No direction of asymmetry is asserted from the title alone."
      - "Asymmetry must not be moralized or converted into blame, rank, legal liability, or diagnostic capacity."
      - "Ω may become active only if a scene introduces power, vulnerability, obligation, capacity, or accountability."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must remain weak or be removed."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Θ is relevant but bounded: determinism invokes temporal sequence, causal
      trajectory, persistence, and prior-condition dependence. PMS temporality
      is not identical to metaphysical determinism.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Diachronic causal-sequence framing must be distinguished from static comparison between doctrines."
      - "Temporality is central to the determinism side but does not prove causal determinism or agency continuity."
    falsifier_conditions:
      - "If the case is treated purely as static taxonomy without temporal extension, Θ is overextended."
    non_capture_note: "PMS temporality does not settle metaphysical causality, empirical continuity, or subjective time."
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Φ is relevant as a guarded possibility. The opposition can be
      recontextualized through compatibilist, incompatibilist, hard-determinist,
      libertarian, legal, empirical, theological, existential, or praxeological
      frames.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Source frame: binary free will versus determinism."
      - "Target frames may include compatibilist, incompatibilist, legal-forensic, empirical-neuroscientific, theological, existential, or PMS-praxeological interpretations."
      - "Recontextualization must preserve rival disagreement and possible non-capture."
    falsifier_conditions:
      - "If every disagreement or rupture is treated as merely needing PMS reframing, Φ becomes over-assimilative."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Χ carries major analytic weight as application discipline. The analysis
      suspends metaphysical verdict, legal tribunal framing, diagnostic
      inference, implementation claim, and forced synthesis.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Χ is satisfied as PMS application discipline and entry-gate restraint, but only weakly satisfied as a case-derived operator because Φ and Θ remain weak or partial in this non-concrete conceptual projection."
      - "The analysis must preserve suspension of verdict, reversibility, and non-totalization."
      - "Distance is not avoidance or empty neutrality; it is reflective restraint under under-specified case conditions."
    falsifier_conditions:
      - "If Χ is suspended to declare that PMS resolves free will versus determinism, the PMS application becomes invalid."
    non_capture_note: "Distance protects against overclaiming and premature closure."
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Σ is weak and high-risk. Compatibilist or PMS-praxeological synthesis is
      possible, but the title alone does not license integration or resolution
      of the opposition.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Integration must discriminate rather than smooth over unresolved philosophical conflict."
      - "Forced coherence must be distinguished from justified synthesis supported by explicit argument."
    falsifier_conditions:
      - "If coherence is treated as proof that PMS resolves the debate, Σ is overclaimed."
    non_capture_note: "PMS coherence is insufficient by itself."
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Ψ is weak and topic-adjacent. Self-binding may matter if the case becomes
      about commitment, responsibility, accountability, promise, identity, or
      stable normativity under deterministic conditions, but none is specified
      by the title alone.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only if self-binding or analytic self-binding is explicitly in scope."
      - "Do not infer metaphysical selfhood, consciousness, or ultimate authorship from structural self-binding."
    falsifier_conditions:
      - "If Ψ is applied without Σ, Θ, and Χ, or without a responsibility/self-relation scene, the self-binding reading is under-specified."
    non_capture_note: "SELF_FIXPOINT is derived, not a metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >-
      Base layer of distinctions, impulses, frames, non-events, and recurrent
      patterns.
    case_function: >-
      L1 structures the case through the distinction, argumentative pressure,
      and philosophical frame. Λ and Α remain weak because no concrete expected
      event or recurrence is supplied.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >-
      Layer in which stabilized patterns become asymmetric relations and
      temporally extended trajectories.
    case_function: >-
      L2 is only weakly available. Θ is relevant to causal sequence and
      trajectory; Ω remains guarded because no concrete asymmetry is supplied.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >-
      Layer of transformation, distance, and integration.
    case_function: >-
      L3 functions primarily as analytic discipline. Φ permits guarded rival
      reframing, Χ maintains distance and reversibility, and Σ remains weak.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >-
      Layer in which integrated structures are bound into relatively stable
      self-relation.
    case_function: >-
      Ψ is analytic-only and weak unless later material introduces
      responsibility, identity, commitment, or stable normativity across time.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The title supplies the root distinction Free Will vs Determinism."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Argumentative pressure arises weakly from the versus structure."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The philosophical-conceptual debate frame organizes the distinction and tension."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "A possible unresolved expectation of settlement is weakly available but not scene-established."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Possible recurrent debate-patterning is weak because recurrence is not supplied by the title."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Possible responsibility or capacity asymmetry remains weak because no scene or stable attractor is supplied."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Temporal sequence is relevant to determinism, but dependency support remains weak."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Rival reframings are available only as guarded frame transformations."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Distance is satisfied as an application guardrail through suspended verdict and reversibility; as a case-derived operator-chain node, its dependency support remains weak because Φ and Θ are only weak or partial in the title-level conceptual projection."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Integration is only a possible synthesis and remains weak without explicit argument."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Self-binding is topic-adjacent only; responsibility and self-relation are not scene-specified."
  dependency_failure_conditions:
    - "If a later operator is used while dependencies are absent, mark the reading under-specified or invalid."
    - "If the chain is used as smooth totalization without discrimination tests, mark coherence risk high."
    - "If an operator is not active, state so rather than forcing the full chain."

