analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "axiomatic_operator_inspection"
      - "case_type_bound_structural_projection"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >-
      This permits operator-level conceptual mapping and guardrail calibration.
      It does not permit concrete scene findings, empirical conclusions,
      metaphysical adjudication, diagnosis, legal judgment, implementation
      claims, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >-
      The free-will/determinism debate is broad enough that PMS could appear to
      organize every rival position too smoothly, becoming over-assimilative or
      under-discriminating.
    mitigation: >-
      Late operators are marked weak or guarded, non-capture zones are
      preserved, rival formalizations remain open, and falsifier conditions
      constrain stronger claims.
  coverage_vs_discrimination:
    coverage_result: >-
      PMS covers the structural distinction, argumentative pressure,
      conceptual frame, bounded temporality, guarded recontextualization,
      distance discipline, and risks of forced integration.
    discrimination_requirement: >-
      PMS must distinguish structural mapping from metaphysical adjudication,
      compatibilist synthesis from forced PMS integration, and responsibility
      discourse from legal or diagnostic judgment.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish PMS structural projection from metaphysical adjudication."
      expected_pms_distinction: >-
        Χ must suspend verdict while □ keeps the philosophical frame explicit
        and Δ remains only a structural distinction.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish legitimate integration from forced PMS smoothing."
      expected_pms_distinction: >-
        Σ may activate only after Φ and Χ with explicit argument; unresolved
        disagreement must remain available as non-capture or rivalry.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinction is named by the case title?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "Is the versus relation real argumentative pressure or neutral taxonomy?"
      current_calibration: "weak"
    - operator: "□"
      question: "Which frame is active?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "Is there an expected resolution, missing alternative, or meaningful absence?"
      current_calibration: "weak"
    - operator: "Α"
      question: "Is recurrence or stabilization shown beyond the title?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "Is there directional imbalance of power, exposure, capacity, obligation, or responsibility?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "Is temporality causal sequence, praxis trajectory, developmental arc, or doctrine label?"
      current_calibration: "partial"
    - operator: "Φ"
      question: "Which source and target frames are being used, and do they preserve disagreement?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "Does the analysis maintain reflective distance and reversibility?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "Is any synthesis argued rather than merely desired?"
      current_calibration: "weak"
    - operator: "Ψ"
      question: "Is self-binding or responsibility-as-self-commitment actually in scope?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "metaphysical free will or ultimate authorship"
      - "causal determinism or causal closure"
      - "phenomenological consciousness or qualia"
      - "moral desert and blameworthiness"
      - "legal culpability and forensic capacity"
      - "empirical neuroscience or behavioral evidence"
      - "theological foreknowledge or existential authenticity"
    rule: >-
      These zones must not be redescribed automatically as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "compatibilist formalization"
      - "incompatibilist formalization"
      - "libertarian free-will formalization"
      - "hard-determinist formalization"
      - "legal-forensic responsibility formalization"
      - "empirical-neuroscientific decision-process formalization"
      - "theological or existential formalization"
      - "pragmatic or praxeological action-theory formalization"
    rule: >-
      Rival readings remain open. PMS translation does not defeat them unless
      comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >-
        The PMS reading is weakened if no stable distinction, argumentative
        pressure, or philosophical frame can be identified in the actual
        material beyond the title.
    - id: "F2"
      condition: >-
        The PMS reading is under-discriminating if it cannot distinguish
        compatibilism, incompatibilism, hard determinism, libertarianism,
        empirical neuroscience, legal responsibility, and PMS-praxeological
        framing.
    - id: "F3"
      condition: >-
        The reading is over-assimilative if resistance, disagreement, rupture,
        absence, or rival framing is automatically converted into drift,
        incomplete integration, recontextualization, or maturity failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >-
      The application is valid as a reversible, bounded PMS conceptual
      projection, but under-specified for concrete scene analysis, metaphysical
      adjudication, empirical claims, legal-forensic use, implementation, or PMS
      Base validation.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >-
    These requirements identify what would be needed to turn the PMS projection
    into calibrated empirical, comparative, computational, legal, clinical, or
    applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "A specified text or scene showing the exact distinction between free will and determinism."
      "∇": "Evidence of argumentative, practical, institutional, or explanatory pressure generated by the distinction."
      "□": "An explicit frame such as metaphysical, legal, empirical, theological, existential, or PMS-praxeological analysis."
      "Λ": "A defined expectation, missing alternative, failed resolution, omission, or counterfactual structure."
      "Α": "Evidence of recurrence, stabilization, path-dependence, or repeated argumentative pattern."
      "Ω": "A directional imbalance of power, exposure, capacity, obligation, vulnerability, or responsibility."
      "Θ": "A temporal sequence, causal trajectory, developmental arc, commitment over time, or accumulating consequence."
      "Φ": "A specified source frame and target frame with criteria for successful or failed recontextualization."
      "Χ": "Evidence of reflective suspension, restraint, meta-position, or non-totalizing discipline."
      "Σ": "Criteria showing whether synthesis integrates tensions without forced coherence."
      "Ψ": "Evidence of self-binding, stable normativity, responsibility-as-self-commitment, promise, identity, or policy stability across time."
    negative_cases:
      - "A neutral taxonomy listing free will and determinism without opposition or tension."
      - "A legal responsibility case requiring forensic standards rather than conceptual PMS projection."
      - "An empirical neuroscience study requiring data and statistical evaluation."
      - "A metaphysical argument whose validity depends on premises PMS does not adjudicate."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >-
    Operationalization is not fulfilled. The title supplies only a conceptual
    opposition, so empirical, comparative, computational, legal, clinical, and
    applied validation requirements remain unmet.

