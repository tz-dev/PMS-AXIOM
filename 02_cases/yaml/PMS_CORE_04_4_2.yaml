derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >-
    Each derived structure is marked active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration
    does not imply activation.
  rule: >-
    Derived structures are formula-derived PMS constructs. They are not
    independent axioms, diagnoses, ontological rankings, metaphysical entities,
    or proof of PMS completeness.
  case_status: >-
    Awareness_A is weak; Coherence_C is weak; Responsibility_R is weak and
    topic-adjacent; Action_E is under-specified; Dignity_in_Practice_D is an
    application constraint; SELF_FIXPOINT is analytic-only; AD_A>>E and
    AD_Sigma_low are possible risks but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >-
      Awareness is structural, not phenomenological, and does not imply
      exhaustive capture of awareness.
    case_reading: >-
      The case contains sustained framed differentiation only at the conceptual
      level: free will and determinism are distinguished within a philosophical
      frame, with Θ available through causal-sequence concerns.
    status: "weak"
    calibration_points:
      - "Differentiate free will and determinism within the philosophical frame across the temporal-causal horizon implied by determinism."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >-
      Coherence captures narrative stability without requiring full integration
      or self-binding.
    case_reading: >-
      Coherence is weak because the title provides directional argumentative
      pressure and a frame, while Λ and Θ remain only partially available. No
      narrative, argument, or praxis trajectory stabilizes the configuration.
    status: "weak"
    calibration_points:
      - "Distinguish PMS coherence from truth, metaphysical validity, forced integration, or narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of self-relation."
    notes: >-
      Responsibility is structural rather than moralistic in this PMS
      specification.
    case_reading: >-
      Responsibility is topic-adjacent but not active as a scene finding. It
      would require identifiable Ω, Θ, Φ, and Ψ, such as obligation or
      accountability under deterministic conditions.
    status: "weak"
    calibration_points:
      - "Identify asymmetry, temporal extension, recontextualization, and self-binding before claiming Responsibility_R."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures directedness as a trajectory."
      - "Σ integrates impulses, constraints, and roles into coherent enactment."
    notes: >-
      Action_E is not any behavior; it is integrated and temporally extended.
    case_reading: >-
      Action_E is under-specified because the case supplies no enacted action,
      decision, integrated realization, or trajectory of directedness across
      time.
    status: "under_specified"
    calibration_points:
      - "Distinguish action from abstract doctrine, argument topic, behavior-language, or metaphysical claim."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >-
      Dignity-in-Practice concerns how asymmetry is handled, not the ranking of
      persons or ontological worth.
    case_reading: >-
      D functions as an application constraint: the analysis must handle
      possible responsibility and asymmetry questions without ranking persons,
      blaming positions, humiliating groups, or converting the debate into a
      tribunal.
    status: "application_constraint"
    calibration_points:
      - "Handle asymmetry questions without ranking, shaming, humiliating, diagnosing, or irreversibly labeling persons or groups."
    non_capture_note: "D is a praxeological application constraint, not ontological dignity."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >-
    Formal representation of self-binding as integrated, reflexively modulated,
    temporally extended, asymmetry-aware praxis bound into relatively stable
    self-relation.
  case_reading: >-
    SELF_FIXPOINT is not the primary structure of the title. It remains an
    analytic-only reference for possible later analysis of responsibility,
    identity, or self-binding under deterministic conditions; it is not applied
    as metaphysical selfhood.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >-
    This sequence must not be read as proving that all selfhood, agency,
    identity, or case structure reduces without remainder to this chain.
  non_capture_note: >-
    SELF_FIXPOINT must not be applied to abstract concepts or institutions as
    literal subjectivity unless explicitly scoped as structural self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >-
    Drift patterns are structurally derived risks, not diagnoses, person-types,
    moral verdicts, clinical categories, or ontological attributions.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >-
        Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces drift toward evaluation
        rather than integrative transformation and balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces evaluative framing rather than restoring balance."
    case_reading: >-
      The topic can invite inflated abstraction and delayed enactment, but the
      title alone does not establish evaluative asymmetry, stabilized drift, or
      suppressed action. This remains a watch condition only.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >-
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >-
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >-
      Multiple rival reframings could outpace integration, but no actual
      sequence of reframing, volatility, or inconsistent responsibility is
      supplied. This remains a risk, not a finding.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >-
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, or person-type.

