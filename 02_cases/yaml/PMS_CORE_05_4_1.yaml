      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak and unresolved. The case concerns contested integration between
      finite observed regularity and general/future-oriented warrant. PMS
      coherence does not establish justification.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether integration discriminates rather than smooths over conflict."
      - "Distinguish integration from forced coherence or premature closure."
    falsifier_conditions:
      - "If PMS coherence is treated as proof of adequacy, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
