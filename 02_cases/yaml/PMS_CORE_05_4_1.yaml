dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Finite observed cases are distinguished from unobserved future or general cases."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Observed cases generate pressure toward expectation or generalization."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The pressure is assessed inside a justificatory epistemic frame."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Future cases, universal observation, and complete warrant are absent within that frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Repeated observed cases may stabilize as a pattern that attracts expectation."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Only weak epistemic imbalance is present: finite evidence versus broader claim."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "The case is explicitly future-oriented and temporally extended."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "The problem can be recontextualized into rival justificatory or formal frames."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Reflective distance prevents immediate projection, skeptical closure, or PMS closure."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Integration is weak and contested because PMS coherence does not establish warrant."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Not active in the case because no commitment-bearing self-relation is supplied."
  dependency_failure_conditions:
    - "If a later operator is used while dependencies are absent, mark it under-specified or invalid."
    - "If the chain becomes smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

