      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is not active in the supplied case material. No self-relation,
      commitment-bearing agent, autobiographical continuity, or responsibility
      as self-commitment is given. Ψ remains relevant only as application
      discipline for the analysis.
    dependency_status: "not_active"
    analytic_weight: "not_active"
    calibration_points:
      - "Apply Ψ only if a commitment-bearing epistemic agent, institution, or system is explicitly introduced."
      - "Do not attribute selfhood, consciousness, or subjectivity to an abstract philosophical problem."
    falsifier_conditions:
      - "If Ψ is applied without explicit Σ, Θ, and Χ in a commitment-bearing structure, the self-binding reading is under-specified."
    non_capture_note: >
