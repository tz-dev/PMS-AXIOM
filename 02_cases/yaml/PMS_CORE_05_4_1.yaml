core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis; it does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The problem is treated as an abstract structure of inferential praxis:
      an expectation-forming practice confronts the gap between finite observed
      cases and general or future-oriented claims.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis, while completeness, optimal minimality, and unique order
      remain open.
    status: "satisfied"
    case_application: >
      Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes,
      layers, or primitives as PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      Derived structures are systematically derived from operator compositions,
      not introduced as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and asymmetry drift patterns are
      handled only through PMS formulas.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms or explanatory primitives.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Ω and Θ are central structural operators; responsibility, maturity, and
      dignity-in-practice are analyzed under temporal and asymmetrical
      conditions rather than as static attributes.
    status: "satisfied"
    case_application: >
      Θ is major because the case is future-oriented. Ω is weak and only
      epistemic: finite evidence is asked to support broader inferential reach.
    failure_condition: >
      The analysis would fail P4 if it ignored temporal projection or inflated
      weak epistemic imbalance into interpersonal, moral, legal, or power
      asymmetry.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not imply
      implementation, interoperability, or explanatory adequacy.
    status: "satisfied"
    case_application: >
      YAML form is representation only. It is not implementation, validation,
      or computational proof.
    failure_condition: >
      The analysis would fail P5 if YAML form were treated as implemented
      praxis, empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS remains open to rival grammars, sharper discriminative models, and
      more empirically grounded formalisms.
    status: "satisfied"
    case_application: >
      Rival readings remain open: deductive-skeptical, probabilistic, Bayesian,
      pragmatic, transcendental, naturalized, semantic-projectability, causal,
      and learning-theoretic accounts.
    failure_condition: >
      The analysis would fail P6 if PMS translation were treated as defeating
      rival formalizations by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture.
    status: "satisfied"
    case_application: >
      Formal logic, probability theory, causal inference, projectability,
      metaphysics of regularity, scientific methodology, pragmatic accounts,
      transcendental accounts, naturalized epistemology, and learning theory
      remain possible non-capture zones.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as PMS drift,
      incomplete integration, incomplete calibration, or maturity failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No person, group, philosopher, skeptic, scientist, or position is
      diagnosed, ranked, pathologized, or assigned maturity status.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, trait, competence,
      risk, diagnosis, or person-level defect.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must remain tied to specific praxeological scenes, roles,
      or explicitly bounded case types.
    status: "satisfied"
    case_application: >
      Because the case is not concrete, it is explicitly marked as a
      non-concrete, case-type-bound conceptual projection.
    failure_condition: >
      The analysis would fail P9 if it produced global, irreversible,
      decontextualized, or person-level claims.

pms_model_reference_application:
  ordering_status:
