    repository_role: >
      This case follows PMS_1.3 order and dependencies while marking weak or
      inactive operators rather than forcing full activation.
  operator_inventory:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  operator_inventory_status: "no_additional_pms_operators_introduced"

operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks observed versus unobserved cases, finite evidence versus general
      claim, past/present cases versus future expectation, regularity versus
      warrant, and expectation versus justification.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Keep finite observation distinct from general or future-oriented claim."
      - "Do not collapse expectation, regularity, warrant, and justification."
    falsifier_conditions:
      - "If no stable distinction between finite observation and general or future-oriented claim is present, the PMS reading loses its entry point."
    non_capture_note: >
      Difference does not by itself prove PMS capture.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ marks directional inferential pressure from observed cases toward
      expectation, projection, or generalization, plus counter-pressure from
      the demand for justification.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Treat the impulse as structural and inferential, not subjective desire."
      - "Preserve both movement toward expectation and pressure to justify it."
    falsifier_conditions:
      - "If no directional tension arises from finite cases toward general or future-oriented expectation, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is the epistemic justificatory frame in which finite-to-general or
      past-to-future movement becomes the problem of induction rather than mere
      habit, prediction, or pattern recognition.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as philosophical epistemic justification."
      - "Keep the frame separate from empirical success, metaphysical necessity, pragmatic usefulness, and PMS coherence."
    falsifier_conditions:
      - "If no justificatory frame is specified, the analysis cannot distinguish induction from ordinary prediction or habit."
    non_capture_note: >
      A frame can clarify without exhausting the case.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active because future cases are absent, the universal set of cases is
      not observed, and a decisive non-circular warrant is absent within the
      finite evidential frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify absent future/general cases and absent complete warrant."
      - "Do not treat absence automatically as failure, drift, or PMS-complete explanation."
    falsifier_conditions:
      - "If the target formulation does not depend on absent future or unobserved general cases, Λ should not be asserted as major."
    non_capture_note: >
      Absence must not automatically become incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α marks stabilized observed regularity that can attract expectation. It
      does not by itself justify projection beyond finite observation.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence or stabilization, not a single isolated observation."
      - "Distinguish attractor formation from proof, probability assignment, causality, or metaphysical uniformity."
    falsifier_conditions:
      - "If recurrence or stabilization is not part of the case, Α is over-read."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak. The warranted asymmetry is only epistemic: finite evidence is
      structurally weaker than the general or future-oriented claim it is asked
      to support. No interpersonal, moral, political, legal, or responsibility
      asymmetry is supplied.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Specify imbalance between evidential basis and inferential reach."
      - "Do not moralize Ω or convert it into blame, power, vulnerability, authority, or person-ranking."
      - "Allow Ω to remain weak because no concrete asymmetrical relation is given."
    falsifier_conditions:
      - "If no directional imbalance between finite evidence and general/future claim is identifiable, Ω must be removed or marked not applicable."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is major because the problem projects from finite observed cases toward
      future or general expectation.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish temporal projection from temporal warrant."
      - "Distinguish diachronic trajectory from static comparison."
    falsifier_conditions:
      - "If temporal extension or general projection beyond observed cases is not required, Θ is overextended."
    non_capture_note: >
      Temporality does not settle metaphysical or empirical continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active as calibrated openness to rival frames: skeptical,
      probabilistic, Bayesian, pragmatic, transcendental, naturalized,
      semantic-projectability, causal, or learning-theoretic. Reframing is not
      resolution.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Name source and target frames explicitly."
      - "Check whether reframing clarifies or merely absorbs non-fit into PMS vocabulary."
    falsifier_conditions:
      - "If every rival reading or disagreement is absorbed as Φ without comparison criteria, the reading is over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is major because the problem requires reflective withdrawal from
      immediate pattern-projection, premature skeptical closure, and PMS-based
      solution claims.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Suspend verdict and preserve reversibility."
      - "Distinguish Distance from avoidance, denial, empty neutrality, or forced skepticism."
    falsifier_conditions:
      - "If Χ is suspended to force a verdict that induction is solved, justified, unjustified, or exhausted by PMS, the application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
