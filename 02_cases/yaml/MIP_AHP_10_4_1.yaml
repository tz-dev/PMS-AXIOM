migration_notes:
  from_v1_2_to_v2_0:
    rename_file:
      from: MIPractice_addon_AH_precision.yaml
      to: MIP - Maturity in Practice - AHP Module.yaml
    schema_version:
      from: MIPractice_addon_AH_precision_v1.2
      to: MIP_AHP_module_v2.0
    compatibility:
      from: MIPractice_case_v2.0_full_with_model_reference
      to: MIP - Maturity in Practice.yaml
    activation_default:
      from: auto
      to: 'off'
    case_path:
      from: case.ah_precision
      to: case.addons.ah_precision
    report_path:
      from: case.uniform_report.precision_score_summary / attack_surface_summary / hardening_actions_summary
      to: case.uniform_report.addon_overlays.ah_precision
    terminology_updates:
    - MIPractice -> MIP
    - D0 -> `D₀` in human-readable text
    - D1/D2 -> `D₁/D₂` in human-readable text
    - D module -> D-module
    - D profile -> D-profile
    - IA box -> IA-box
    - A score -> A-score
    - M score -> M-score
    - Precision score -> Precision Heuristic
    semantic_updates:
    - PH does not rescore A/M/IA/D.
    - AHP does not activate D.
    - Attack Points are analysis vulnerabilities, not person findings.
    - Hardening actions feed the next MIP iteration.
    - AHP cannot make a non-transmittable analysis transmittable.
validation_checklist:
  global_search_for_deprecated_terms:
    must_not_appear_except_in_legacy_or_negated_context:
    - MIPractice_case_v2.0_full_with_model_reference
    - MIPractice_addon_AH_precision
    - case.ah_precision
    - D0
    - D1/D2
    - D module
    - D profile
    - IA box
    - A score
    - M score
    - precision_score as base score
    - rescore A
    - rescore M
    - person-level attack point
  expected_final_terms:
  - MIP
  - MIP - Maturity in Practice.yaml
  - MIP - Maturity in Practice - AHP Module.yaml
  - '`D₀`'
  - '`D₁/D₂`'
  - D-module
  - D-profile
  - IA-box
  - A-score
  - M-score
  - Precision Heuristic
  - case.addons.ah_precision
  - analysis artifact
  - working note
  - not mature for transmission
  semantic_musts:
  - AHP is optional.
  - Default activation is off.
  - AHP requires existing structured MIP analysis fields.
  - AHP derives outputs only from documented fields.
  - AHP never invents hidden assumptions.
  - AHP never changes base A/M/IA/D results.
  - AHP never independently activates, deactivates, creates, or revises D; it preserves the base MIP D-status.
  - AHP never creates person-level findings.
  - AHP never upgrades transmission status.