              - [medium (relevant uncertainty / visible leverage)] add_ceiling_rule_check: Add staged evidence categories for knowledge, control, predictability, alternatives, and serious integration attempt before any future M-score revision.
                - ID: HB-005
                - Linked to attack point: AP-005
                - Expected effect: Protects M-score hygiene and prevents hindsight responsibility inflation.

              - [medium (relevant uncertainty / visible leverage)] add_D_profile_boundary: Repeat the D boundary in any later rendered text; D₀ untouched, D₁/D₂ role-context only, no dignity score, no person label.
                - ID: HB-006
                - Linked to attack point: AP-006
                - Expected effect: Reduces D-R/D-P misreading risk while preserving the already activated qualitative D-module status.

              - [medium (relevant uncertainty / visible leverage)] define_terms: Add a PMS-SEX boundary notice explaining that SEX-derived terms are calibration lenses and structural risk markers, not scene findings.
                - ID: HB-007
                - Linked to attack point: AP-007
                - Expected effect: Reduces technical-term over-reading and keeps PMS/PMS-SEX/MIP layer boundaries visible.
            boundary_note: AHP hardens the analysis; it does not rescore A, M, IA or D.
