        addon_overlays:
          ah_precision:
            precision_heuristic_summary: '**Precision Heuristic (PH):** high (6/6)

              - Satisfied precision dimensions: 6/6

              - Expected overlay effect: A-reading confidence up, C-reading confidence up, IA-box decidability more_decidable,
              D-R/D-P misreading risk down

              - Boundary: PH does not rescore A, M, IA or D.

              - Interpretation: The MIP analysis is high-precision as an analysis artifact, not as empirical case evidence.
              It remains a working note over an abstract case and does not become mature for transmission or decision use.'
            attack_surface_summary: |
              **Attack Points (analysis vulnerabilities, not person findings):**
              - [high (structural vulnerability / likely misread)] Formal completeness may be mistaken for evidentiary completeness
                - ID: AP-001
                - Target: case.information_basis.quality_and_limits
                - Type: evidence_gap
                - Note: The MIP analysis is structurally full and carefully guarded, but the underlying case remains abstract. The most serious attack surface is that readers may mistake YAML completeness, template conformity, and cross-model precision for concrete evidence about consent, power, capacity, publicness, bodily cost, chronology, or after-scene conduct.
                - Suggested patch: Add a next-iteration evidence-status matrix that separates supplied material, structured inference, missing evidence, and prohibited inference before any stronger use.

              - [high (structural vulnerability / likely misread)] Working-note status may be weakened by formal presentation
                - ID: AP-002
                - Target: case.transmission_check.status
                - Type: transmission_status_ambiguity
                - Note: The MIP output correctly marks itself as a working note, yet its high formal density and complete report structure can create authority pressure. This risks readers treating the artifact as decision-ready even though the analysis itself says it is not suitable as decision basis.
                - Suggested patch: Preserve a top-level non-transmission warning in any reuse: working note only; not mature for public, legal, clinical, forensic, HR, relational, or conduct decision use.

              - [medium (relevant uncertainty / visible leverage)] Red-zone false values could be misread as known absence in the underlying case
                - ID: AP-003
                - Target: case.guardrails.red_zone_check
                - Type: scope_leakage
                - Note: The red-zone section correctly states that the analysis itself does not operate in clinical, forensic, HR, public-shaming, or humiliation-diagnostic modes. However, because the case is abstract, those false values should not be read as empirical findings that the underlying situation has no legal, clinical, institutional, or public relevance.
                - Suggested patch: In the next iteration, distinguish analysis-use status from underlying-case domain relevance by separating not_used_here from unknown_or_not_supplied.

              - [medium (relevant uncertainty / visible leverage)] IA-box result is correct but minimum evidence thresholds are not staged
                - ID: AP-004
                - Target: case.scores_and_ia.IA_box
                - Type: missing_conditions
                - Note: The IA-box result is appropriately marked as IA_risk rather than verdict. The vulnerability is that transparency, justification, time-boundedness, and reversibility are described as partial or indeterminate without a compact threshold table stating what evidence would make each assessable.
                - Suggested patch: Add IA_minimum_evidence_needed for T, J, TB, and R before any later IA-box revision or transmission.

              - [medium (relevant uncertainty / visible leverage)] M-score ceiling is guarded but future escalation thresholds remain implicit
                - ID: AP-005
                - Target: case.scores_and_ia.M_score.ceiling_rule_check
                - Type: M_ceiling_rule_gap
                - Note: The MIP output keeps M-score capped because predictability and real alternatives are missing. The current artifact is sound, but a later reader could still escalate responsibility if the thresholds for knowledge, control, predictability, alternatives, and serious integration attempt are not operationally staged.
                - Suggested patch: Add staged evidence categories for the five M factors before any later M-score revision: unknown, not_supplied, constrained, partially_available, robustly_available.

              - [medium (relevant uncertainty / visible leverage)] D-module activation is legitimate but D-language remains misreadable
                - ID: AP-006
                - Target: case.D_module_optional
                - Type: D_profile_boundary_risk
                - Note: Unlike an inactive D-module case, the MIP output activates D as qualitative dignity-in-practice protection. This is allowed and guarded, but terms such as D risk, D stress, public dignity, and after-scene dignity can still be misread as dignity findings about persons unless D₀ and D₁/D₂ boundaries remain explicit.
                - Suggested patch: Repeat the D boundary wherever D-language is reused: D₀ remains untouched; D₁/D₂ describe role-context enactment only; no dignity score and no person label.

              - [medium (relevant uncertainty / visible leverage)] PMS-SEX technical terms may be over-read as scene findings
                - ID: AP-007
                - Target: case.information_basis.main_bias_risks_here
                - Type: term_ambiguity
                - Note: The MIP output correctly treats PMS-SEX constructs as prior analytical layers and risk lenses. However, terms such as sexual cost topology, direct otherness, parity-to-exit, responsibility-to-authority, and after-scene dignity are rhetorically strong and may be mistaken for established incident findings if separated from the under-specified evidence status.
                - Suggested patch: Add a compact PMS-SEX boundary notice: SEX-derived terms are calibration lenses and structural risk markers only; they are not concrete scene findings without bounded evidence.
            hardening_backlog_summary: |
              **Hardening Backlog (next iteration):**
              - [high (structural vulnerability / likely misread)] separate_observation_vs_evaluation: Add an evidence-status matrix separating supplied material, structured inference, missing evidence, and prohibited inference.
                - ID: HB-001
                - Linked to attack point: AP-001
                - Expected effect: Reduces evidence-overreach risk; preserves high PH; keeps A-score, M-score, IA-box, and D-profile unchanged.

