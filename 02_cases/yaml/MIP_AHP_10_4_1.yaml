schema_version: MIP_AHP_module_v2.0
file_name: MIP - Maturity in Practice - AHP Module.yaml
addon_meta:
  canonical_name: MIP - A&H Precision Module
  short_name: AHP Module
  module_id: MIP-AHP
  version: v2.0
  status: stable_working_overlay
  model_status: optional_second_order_overlay
  last_update: '2026-05-23'
  language: en
  compatible_with:
  - MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
  - MIP - Maturity in Practice.yaml
  legacy_compatibility:
    previous_schema_versions:
    - MIPractice_addon_AH_precision_v1.2
    - MIPractice_case_v2.0_full_with_model_reference
    note: 'Legacy references are retained for migration only. The canonical target is now "MIP - Maturity in Practice.yaml".'
  loading_mode: optional_companion
  required_position:
    order: after_base_MIP_analysis_fields_exist
    requires_existing_mip_analysis: true
    requires_structured_case_fields: true
  non_interference:
    does_not_modify_axioms: true
    does_not_modify_guardrails: true
    does_not_modify_A_score: true
    does_not_modify_M_score: true
    does_not_modify_IA_box_result: true
    does_not_modify_D_profile: true
    does_not_activate_D_module: true
    does_not_assign_D_quick_grid_level: true
    does_not_change_transmission_status: true
    adds_overlay_only: true
  overlay_boundary: 'AHP may lower or raise confidence in the quality of a reading, but it may not change
    base A/M/IA/D results. Any base revision must occur in a new MIP analysis run, not inside this module.'
  clarification_note: 'This module provides an analysis-quality overlay including output templates, minimal storage
    fields and a precision heuristic. It introduces no new first-order inference layer and does not alter base model
    logic.'
AHP_module:
  id: AHP-OUT-2
  label: A&H Precision Module — output, storage, heuristic
  purpose: 'Provide consistent, auto-renderable overlays for: - Precision Heuristic (PH), - Attack Points as analysis
    attack-surface, - Hardening Backlog as next-iteration actions. These overlays derive strictly from structured case
    fields and introduce no new base inferences or score changes to A-score, M-score, IA-box or D-profile.'
  PH_boundary: 'PH is a precision heuristic for the analysis artifact. It is not an A-score, not an M-score, not a
    D-score and not an IA verdict.'
  attack_surface_boundary: 'Attack Points identify vulnerabilities in the analysis artifact: wording, scope, inference,
    evidence linkage, reversibility, publicness, transmission risk or dignity language. They never identify vulnerabilities,
    defects or dignity deficits in persons.'
  hardening_boundary: 'Hardening actions improve the next analysis iteration. They do not repair the case, change persons
    or settle responsibility.'
  rendering_controls:
    max_attack_points_in_text: 7
    max_hardening_actions_in_text: 7
    show_link_to_target_path: true
    show_severity: true
    show_expected_effect: true
    bullet_style: '-'
    ordering:
      attack_points:
      - high
      - medium
      - low
      hardening_actions:
      - high
      - medium
      - low
    recursion_guard:
      do_not_render_notes_on_annotations: true
      bounded_recursion: true
      rule: No annotations on annotations; address or consciously accept attack points as limits.
    inline_comment_limits:
      max_inline_comments: 3
      inline_comment_boundary: 'Inline AH notes may mark analysis-language risks only. They must not add person-level
        interpretations or D-readings.'
      if_D_context_active:
        avoid_public_inline_D_comments_about_identifiable_persons: true
  severity_lexicon:
    low: low (minor noise / easy patch)
    medium: medium (relevant uncertainty / visible leverage)
    high: high (structural vulnerability / likely misread)
    severity_meaning: 'Severity describes the magnitude of interpretive or communicative risk inside the analysis. It
      is not moral fault and not harm severity in the case itself.'
  language_guardrail:
    no_moralised_attack_language: true
    no_person_defect_language: true
    no_dignity_labelling: true
    no_severity_escalation_beyond_lexicon: true
    attack_points_describe: analysis_artifact
    attack_points_do_not_describe: persons
  templates_de:
    precision_heuristic_summary:
      legacy_name_note: '"precision_score_summary" was the legacy field name. It now refers to PH as a precision heuristic,
        not to a base score.'
      template: '**Präzisionsheuristik (PH):** {PH_band} ({PH_points}/{PH_max})
        - Erfüllte Präzisionsdimensionen: {PH_dims_true}/{PH_dims_total}
        - Erwartete Overlay-Wirkung: A-Lesart-Sicherheit {confidence_shift_for_A_reading}, C-Lesart-Sicherheit {confidence_shift_for_C_reading},
        IA-box-Entscheidbarkeit {IA_box_decidability}, D-R/D-P-Fehlleserisiko {D_R_D_P_misreading_risk}
        - Boundary: PH bewertet A, M, IA oder D nicht neu.'
    attack_surface_summary:
      header: '**Attack Points (Angriffsflächen der Analyse, keine Personenbefunde):**'
      item_template: "{bullet} [{severity_label}] {title}\n  {bullet} ID: {attack_point_id}\n  {bullet} Ziel: {target_path}\n\
        \  {bullet} Typ: {note_type}\n  {bullet} Hinweis: {message}\n  {bullet} Präzisierung: {suggested_action}\n"
      footer_if_none: _Keine relevanten Attack Points markiert (oder AHP deaktiviert)._
    hardening_backlog_summary:
      header: '**Hardening Backlog (nächste Iteration):**'
      item_template: "{bullet} [{severity_label}] {action_type}: {instruction}\n  {bullet} ID: {hardening_action_id}\n\
        \  {bullet} Verknüpft mit Attack Point: {linked_attack_ref}\n  {bullet} Erwarteter Effekt: {expected_effect}\n"
      footer_if_none: _Kein Hardening-Backlog erzeugt._
    inline_attack_point_comment:
      template: '↳ **AHP-Note:** {message} (Patch: {suggested_action}; Severity: {severity_label})'
  templates_en:
    precision_heuristic_summary:
      legacy_name_note: '"precision_score_summary" was the legacy field name. It now refers to PH as a precision heuristic,
        not to a base score.'
      template: '**Precision Heuristic (PH):** {PH_band} ({PH_points}/{PH_max})
        - Satisfied precision dimensions: {PH_dims_true}/{PH_dims_total}
        - Expected overlay effect: A-reading confidence {confidence_shift_for_A_reading}, C-reading confidence {confidence_shift_for_C_reading},
        IA-box decidability {IA_box_decidability}, D-R/D-P misreading risk {D_R_D_P_misreading_risk}
        - Boundary: PH does not rescore A, M, IA or D.'
    attack_surface_summary:
      header: '**Attack Points (analysis vulnerabilities, not person findings):**'
      item_template: "{bullet} [{severity_label}] {title}\n  {bullet} ID: {attack_point_id}\n  {bullet} Target: {target_path}\n\
        \  {bullet} Type: {note_type}\n  {bullet} Note: {message}\n  {bullet} Suggested patch: {suggested_action}\n"
      footer_if_none: _No relevant attack points marked (or AHP disabled)._
    hardening_backlog_summary:
      header: '**Hardening Backlog (next iteration):**'
      item_template: "{bullet} [{severity_label}] {action_type}: {instruction}\n  {bullet} ID: {hardening_action_id}\n\
        \  {bullet} Linked to attack point: {linked_attack_ref}\n  {bullet} Expected effect: {expected_effect}\n"
      footer_if_none: _No hardening backlog generated._
    inline_attack_point_comment:
      template: '↳ **AHP-Note:** {message} (Patch: {suggested_action}; Severity: {severity_label})'
  variables_spec:
    precision_vars:
      PH_band: low|mixed|high
      PH_points: 0..6
      PH_max: '6'
      PH_dims_true: 0..6
      PH_dims_total: '6'
      confidence_shift_for_A_reading: down|mixed|up
      confidence_shift_for_C_reading: down|mixed|up
      IA_box_decidability: more_unclear|partial|more_decidable
      D_R_D_P_misreading_risk: up|mixed|down
    attack_point_vars:
      attack_point_id: stable string id, e.g. AP-001
      severity: low|medium|high
      severity_label: rendered via severity_lexicon[severity]
      title: short descriptive label
      target_path: YAML path string
      note_type: one of AH_precision_storage_spec.attack_surface.note_types
      message: short explanation of the analysis vulnerability
      suggested_action: one-line patch instruction
      bullet: rendering_controls.bullet_style
    hardening_vars:
      hardening_action_id: stable string id, e.g. HB-001
      severity: low|medium|high
      severity_label: rendered via severity_lexicon[severity]
      action_type: one of AH_precision_storage_spec.hardening.action_types
      instruction: one-line instruction
      linked_attack_ref: stable attack point id, e.g. AP-001
      expected_effect: e.g., 'PH+1; IA.J more decidable; D-P misreading risk down in public'
      bullet: rendering_controls.bullet_style
  integration_guidance:
    derivation_rule: 'All rendered outputs must be derived exclusively from `case.addons.ah_precision` and existing documented
      structured case fields. The module may not introduce hidden assumptions, new evidence or independent first-order
      findings.'
    no_hidden_rescoring: true
    no_hidden_D_activation: true
    no_hidden_transmission_upgrade: true
    into_case_uniform_report:
      append_fields_in_order:
      - precision_heuristic_summary
      - attack_surface_summary
      - hardening_backlog_summary
      target_path: case.uniform_report.addon_overlays.ah_precision
    optional_inline_comments:
      allowed: true
      recommended_targets:
      - scores_and_ia.IA_box.J_justified
      - scores_and_ia.IA_box.TB_time_bound
      - scores_and_ia.IA_box.R_reversible
      - acrp_profile.A_awareness
      - acrp_profile.C_coherence
      - scores_and_ia.M_score.ceiling_rule_check
      - D_module_optional.D_profile
      - transmission_check.status
      rule: Use inline notes sparingly (<=3) to avoid derailing the main report.
  transmission_boundary:
    AH_cannot_make_analysis_transmittable: true
    if_main_guardrails_fail: do_not_render_as_report
    if_red_zone_detected: mark_AHP_block_internal_only
    if_transmission_status_unclear: add_attack_point_transmission_status_ambiguity
  A_boundary:
    AH_may_flag_weak_A_justification: true
    AH_may_not_change_A_band: true
  M_boundary:
    AH_may_flag_M_ceiling_rule_gap: true
    AH_may_not_change_M_band: true
    AH_may_not_raise_or_lower_M: true
    required_next_step_if_M_issue_found: add hardening action, not a new M-score
  IA_boundary:
    AH_may_flag_IA_box_decidability_gap: true
    AH_may_not_change_IA_box_result: true
    required_next_step_if_IA_issue_found: add threshold/evidence hardening, not verdict update
  D_activation_boundary:
    AH_may_flag_D_language_risk: true
    AH_may_not_activate_D_module: true
    AH_may_not_create_D_profile: true
    AH_may_not_assign_D_quick_grid_level: true
    allowed_D_language_risk_formulation: This wording may increase D-R/D-P misreading risk.
    forbidden_D_language_risk_formulation: This person lacks dignity or has dignity deficit.
agent_addon_interface:
  activation:
    allowed: true
    values:
    - 'off'
    - auto
    - 'on'
    default: 'off'
    requires_existing_mip_analysis: true
    requires_structured_case_fields: true
    auto_mode_rule: 'In auto mode, the agent may suggest AHP activation when transmission, publicness, contested terms
      or iteration pressure are present. It must not silently render AHP overlays without user or workflow permission.'
    enable_triggers:
    - user_requests_precision_heuristic
    - user_requests_attack_points
    - user_requests_hardening_backlog
    - contested_terms_present
    - politically_loaded_terms_present
    - boundary_setting_claims_present
    - exclusion_claims_present
    - high_publicity_context
    - semi_public_or_public_transmission_planned
    - D_language_present
    - score_hygiene_risk_present
    - M_ceiling_rule_relevance_unclear
    - transmission_status_unclear
    - model_used_iteratively_next_run_planned
  output:
    include_in_uniform_report: true
    placement_order:
    - precision_heuristic_summary
    - attack_surface_summary
    - hardening_backlog_summary
    target_path: case.uniform_report.addon_overlays.ah_precision
    verbosity_default: short
  recursion_guard:
    no_annotations_on_annotations: true
    max_annotations: 12
    max_hardening_actions: 8
  refusal_or_downgrade_rules:
    if_no_structured_case_fields: do_not_render_AHP; ask for or generate base MIP structure first
    if_red_zone_detected: do_not_render_public_AHP_report
    if_user_requests_person_attack_points: refuse_and_reframe_as_analysis_attack_surface
    if_user_requests_rescoring_via_AHP: refuse_and_reframe_as_next_iteration_hardening
    if_user_requests_D_activation_via_AHP: refuse_and_reframe_as_D_language_risk_or_main_MIP_D_decision
AH_precision_storage_spec:
  id: AHP-STORAGE-2
  label: Minimal storage fields for A&H Precision Module
  note: 'Storage fields are used exclusively to support rendering and iteration. They complement, but do not replace,
    `open_questions_and_blind_spots`: attack points document critique-exposed weaknesses of the analysis itself, while
    open questions document epistemic gaps in the case material.'
  distinction_from_open_questions:
    open_questions_and_blind_spots: gaps in case material, evidence, perspective or context
    attack_surface_annotations: vulnerabilities in the analysis artifact, wording, scope, inference or transmission risk
  precision_heuristic:
    boundary: 'PH is a precision heuristic for the analysis artifact. It is not a base MIP score and must not be interpreted
      as maturity, responsibility, dignity or IA quality.'
    dimensions:
      PD-1_term_definition:
        weight: 1
        description: Key terms defined with working definition, scope and exclusions.
      PD-2_scope_boundaries:
        weight: 1
        description: Role, context, level and publicness stated.
      PD-3_conditions_and_thresholds:
        weight: 1
        description: If/then criteria, IA-box thresholds, D-activation conditions or M ceiling rule relevance stated where
          needed.
      PD-4_evidence_linking:
        weight: 1
        description: Observation vs evaluation separated; inferences marked; no hidden assumptions.
      PD-5_reversibility_clause:
        weight: 1
        description: Update, correction, review or working-note conditions stated.
      PD-6_language_hygiene:
        weight: 1
        description: No global person labels; no dignity labels; non-shaming; risk/potential phrasing; D₀ untouched.
    scoring:
      method: weighted_checklist_sum
      max_points: 6
      mapping_to_band:
        low:
          points_min: 0
          points_max: 2
        mixed:
          points_min: 3
          points_max: 4
        high:
          points_min: 5
          points_max: 6
  attack_surface:
    note_types:
    - term_ambiguity
    - scope_leakage
    - missing_conditions
    - weak_justification
    - missing_reversibility
    - evidence_gap
    - counter_reading_missing
    - publicity_context_collapse_risk
    - dignity_language_risk
    - role_context_publicness_gap
    - score_hygiene_risk
    - D_profile_boundary_risk
    - M_ceiling_rule_gap
    - normative_position_missing
    - meta_notes_missing
    - transmission_status_ambiguity
    - guardrail_ambiguity
    severity_scale:
      values:
      - low
      - medium
      - high
      meaning: Noise/uncertainty/risk magnitude inside the analysis, not moral fault and not harm severity in the case.
    id_format:
      prefix: AP
      example: AP-001
      stability_rule: IDs must remain stable across sorting, truncation and iteration.
  hardening:
    action_types:
    - define_terms
    - add_scope_statement
    - add_if_then_criteria
    - separate_observation_vs_evaluation
    - add_reversibility_clause
    - add_counter_reading
    - add_publicity_guardrails
    - tighten_language_hygiene
    - add_role_context_publicness_precheck
    - add_score_hygiene_boundary
    - add_ceiling_rule_check
    - add_D_profile_boundary
    - add_normative_position_statement
    - add_meta_notes
    - add_transmission_status
    - downgrade_to_working_note
    id_format:
      prefix: HB
      example: HB-001
      stability_rule: IDs must remain stable across sorting, truncation and iteration.
    linkage_rule: Each hardening action should link to exactly one primary attack point where possible.
    hardening_boundary: 'Hardening actions improve the next analysis iteration. They do not repair the case, change persons
      or settle responsibility.'
  impact_overlay:
    principle: 'PH affects confidence in the analysis artifact and IA/D decidability, not the base score scales and not
      the underlying case.'
    by_PH_band:
      low:
        confidence_shift:
          A_reading: down
          C_reading: down
          IA_box_decidability: more_unclear
        risk_shift:
          D_R_D_P_misreading_risk: up
      mixed:
        confidence_shift:
          A_reading: mixed
          C_reading: mixed
          IA_box_decidability: partial
        risk_shift:
          D_R_D_P_misreading_risk: mixed
      high:
        confidence_shift:
          A_reading: up
          C_reading: up
          IA_box_decidability: more_decidable
        risk_shift:
          D_R_D_P_misreading_risk: down_if_PD-6_and_PD-2_true
  boundary_flags:
    no_hidden_first_order_findings: true
    no_hidden_rescoring: true
    no_hidden_D_activation: true
    no_hidden_transmission_upgrade: true
    formal_neat_misuse_remains_misuse: true
case_schema_patch:
  id: AHP-CASE-PATCH-2
  note: 'Merge into `case:` of "MIP - Maturity in Practice.yaml". Output slots are placed under `case.uniform_report.addon_overlays.ah_precision`
    as additive overlays. This patch does not replace existing MIP case fields.'
  merge_into_case:
    case:
      addons:
        ah_precision:
          enabled: true
          mode: 'on'
          requires_completed_mip_analysis: true
          requires_structured_case_fields: true
          PH_points_0_to_6: 6
          PH_band: high
          PH_boundary_confirmed: true
          PH_checklist:
            PD-1_term_definition: true
            PD-2_scope_boundaries: true
            PD-3_conditions_and_thresholds: true
            PD-4_evidence_linking: true
            PD-5_reversibility_clause: true
            PD-6_language_hygiene: true
          PH_overlay_effect:
            confidence_shift_for_A_reading: up
            confidence_shift_for_C_reading: up
            IA_box_decidability: more_decidable
            D_R_D_P_misreading_risk: down
          attack_surface_annotations:
          - attack_point_id: AP-001
            severity: high
            title: Formal completeness may be mistaken for evidentiary completeness
            target_path: case.information_basis.quality_and_limits
            note_type: evidence_gap
            message: The MIP analysis is structurally full and carefully guarded, but the underlying case remains abstract.
              The most serious attack surface is that readers may mistake YAML completeness, template conformity, and cross-model
              precision for concrete evidence about consent, power, capacity, publicness, bodily cost, chronology, or after-scene
              conduct.
            suggested_action: Add a next-iteration evidence-status matrix that separates supplied material, structured inference,
              missing evidence, and prohibited inference before any stronger use.
            source_fields:
            - case.information_basis.quality_and_limits.known_gaps
            - case.open_questions_and_blind_spots.missing_information
            - case.transmission_check.if_not_transmittable_reason
            person_level_finding: false
          - attack_point_id: AP-002
            severity: high
            title: Working-note status may be weakened by formal presentation
            target_path: case.transmission_check.status
            note_type: transmission_status_ambiguity
            message: The MIP output correctly marks itself as a working note, yet its high formal density and complete
              report structure can create authority pressure. This risks readers treating the artifact as decision-ready
              even though the analysis itself says it is not suitable as decision basis.
            suggested_action: 'Preserve a top-level non-transmission warning in any reuse: working note only; not mature
              for public, legal, clinical, forensic, HR, relational, or conduct decision use.'
            source_fields:
            - case.transmission_check.status
            - case.transmission_check.not_allowed_use
            - case.uniform_report.transmission_status
            person_level_finding: false
          - attack_point_id: AP-003
            severity: medium
            title: Red-zone false values could be misread as known absence in the underlying case
            target_path: case.guardrails.red_zone_check
            note_type: scope_leakage
            message: The red-zone section correctly states that the analysis itself does not operate in clinical, forensic,
              HR, public-shaming, or humiliation-diagnostic modes. However, because the case is abstract, those false values
              should not be read as empirical findings that the underlying situation has no legal, clinical, institutional,
              or public relevance.
            suggested_action: In the next iteration, distinguish analysis-use status from underlying-case domain relevance
              by separating not_used_here from unknown_or_not_supplied.
            source_fields:
            - case.guardrails.red_zone_check
            - case.information_basis.assumptions_and_inferences
            - case.open_questions_and_blind_spots.needed_perspectives
            person_level_finding: false
          - attack_point_id: AP-004
            severity: medium
            title: IA-box result is correct but minimum evidence thresholds are not staged
            target_path: case.scores_and_ia.IA_box
            note_type: missing_conditions
            message: The IA-box result is appropriately marked as IA_risk rather than verdict. The vulnerability is that
              transparency, justification, time-boundedness, and reversibility are described as partial or indeterminate
              without a compact threshold table stating what evidence would make each assessable.
            suggested_action: Add IA_minimum_evidence_needed for T, J, TB, and R before any later IA-box revision or transmission.
            source_fields:
            - case.scores_and_ia.IA_box.T_transparent
            - case.scores_and_ia.IA_box.J_justified
            - case.scores_and_ia.IA_box.TB_time_bound
            - case.scores_and_ia.IA_box.R_reversible
            person_level_finding: false
          - attack_point_id: AP-005
            severity: medium
            title: M-score ceiling is guarded but future escalation thresholds remain implicit
            target_path: case.scores_and_ia.M_score.ceiling_rule_check
            note_type: M_ceiling_rule_gap
            message: The MIP output keeps M-score capped because predictability and real alternatives are missing. The
              current artifact is sound, but a later reader could still escalate responsibility if the thresholds for knowledge,
              control, predictability, alternatives, and serious integration attempt are not operationally staged.
            suggested_action: 'Add staged evidence categories for the five M factors before any later M-score revision:
              unknown, not_supplied, constrained, partially_available, robustly_available.'
            source_fields:
            - case.scores_and_ia.M_score.five_factors
            - case.scores_and_ia.M_score.ceiling_rule_check
            - case.trajectory.M_t_RVR_t
            person_level_finding: false
          - attack_point_id: AP-006
            severity: medium
            title: D-module activation is legitimate but D-language remains misreadable
            target_path: case.D_module_optional
            note_type: D_profile_boundary_risk
            message: Unlike an inactive D-module case, the MIP output activates D as qualitative dignity-in-practice protection.
              This is allowed and guarded, but terms such as D risk, D stress, public dignity, and after-scene dignity can
              still be misread as dignity findings about persons unless D₀ and D₁/D₂ boundaries remain explicit.
            suggested_action: 'Repeat the D boundary wherever D-language is reused: D₀ remains untouched; D₁/D₂ describe
              role-context enactment only; no dignity score and no person label.'
            source_fields:
            - case.guardrails.dignity_protection
            - case.optional_D_observation
            - case.D_module_optional.D_profile
            - case.uniform_report.D_summary_if_activated
            person_level_finding: false
          - attack_point_id: AP-007
            severity: medium
            title: PMS-SEX technical terms may be over-read as scene findings
            target_path: case.information_basis.main_bias_risks_here
            note_type: term_ambiguity
            message: The MIP output correctly treats PMS-SEX constructs as prior analytical layers and risk lenses. However,
              terms such as sexual cost topology, direct otherness, parity-to-exit, responsibility-to-authority, and after-scene
              dignity are rhetorically strong and may be mistaken for established incident findings if separated from the
              under-specified evidence status.
            suggested_action: 'Add a compact PMS-SEX boundary notice: SEX-derived terms are calibration lenses and structural
              risk markers only; they are not concrete scene findings without bounded evidence.'
            source_fields:
            - case.information_basis.secondary_material
            - case.snapshot.short_case_description
            - case.meta_notes.contradicting_evidence
            - case.open_questions_and_blind_spots.weak_points_in_analysis
            person_level_finding: false
          hardening_actions:
          - hardening_action_id: HB-001
            severity: high
            action_type: separate_observation_vs_evaluation
            instruction: Add an evidence-status matrix separating supplied material, structured inference, missing evidence,
              and prohibited inference.
            linked_attack_ref: AP-001
            expected_effect: Reduces evidence-overreach risk; preserves high PH; keeps A-score, M-score, IA-box, and D-profile
              unchanged.
            feeds_next_iteration: true
          - hardening_action_id: HB-002
            severity: high
            action_type: add_transmission_status
            instruction: 'Add a top-level non-transmission banner: working note only; not mature for public, legal, clinical,
              forensic, HR, relational, or conduct decision use.'
            linked_attack_ref: AP-002
            expected_effect: Reduces transmission-status ambiguity; prevents formal completeness from being read as decision
              authority.
