      Clear refusal to assign A-score, M-score, D-profile, IA verdict, adultness
      verdict, legal/clinical/forensic finding, or PMS Base validation.
    - >
      Strong separation of abstract case material from PMS Core and PMS-SEX
      prior analyses.
    - >
      Strong score hygiene: no hidden A/M scoring and no D-module activation.
    - >
      Strong non-capture discipline and rival reading preservation.
    - >
      Strong transmission discipline: working note only, not decision basis.
    - >
      Strong recognition that the only available trajectory is a documentation
      trajectory, not a role-holder enactment trajectory.
  main_attack_surface_cluster:
    - "formal completeness may be misread as evidentiary completeness"
    - "working-note status may be lost in reuse"
