                - Expected effect: Reduces scope leakage and domain overclaim risk without introducing new case facts.

              - [medium (relevant uncertainty / visible leverage)] add_if_then_criteria: Add IA_minimum_evidence_needed for T, J, TB, and R before any future IA-box revision.
                - ID: HB-004
