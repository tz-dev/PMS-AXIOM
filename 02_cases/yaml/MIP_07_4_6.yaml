schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
schema_conformance_note: >
  This YAML fills the case-analysis portion of the MIP schema. It does not
  reproduce the complete model_reference, schema_meta, or agent_interface
  sections from the canonical MIP model file. Those remain external reference
  material in "MIP - Maturity in Practice.yaml".
case:
  meta:
    case_id: "MIP_dirty_hands_forced_choice_001"
    case_title: "Dirty hands / forced choice"
    documentation_date: "2026-05-28"
    analysts:
      - name: "ChatGPT"
        role: "MIP application assistant"
        observer_position: "external structural analyst using completed PMS Core and PMS-CONFLICT case analyses as prior application material"
    language: "English"
    confidentiality_level: "private_working_analysis"
    analysis_mode: "full"
    intended_use: "conceptual structural reflection on maturity-in-practice conditions in an abstract philosophical dirty-hands / forced-choice case"
    application_zone: "philosophy_anthropology"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "full_depth_structural_application"
      d_activation_decision: "not_activated_because_no_concrete_D_enactments_are_available"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: "Case material: an abstract philosophical case concerning morally difficult choices in which loss, conflict, guilt, responsibility, or irreversibility may remain significant even when no available action, interpretation, or reconciliation fully resolves the situation."
    secondary_material: "Completed PMS Core case YAML and PMS-CONFLICT overlay analysis for Dirty hands / forced choice. PMS.yaml remains the PMS Base reference. PMS-CONFLICT remains an overlay/application profile. MIP is applied here as a separate maturity-in-practice model/template without redefining PMS operators or conflict signatures."
    assumptions_and_inferences: "The analysis assumes no concrete actor, event, institution, legal case, clinical case, empirical observation, or outcome trace. All maturity readings are therefore conceptual, role-structural, and under-specified. No person score, guilt score, legal attribution, diagnosis, implementation claim, or PMS/MIP validation claim is made."
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: "High coverage for abstract structural reflection; low coverage for concrete enactment assessment because no scene, actor, role mandate, timeline, publicness regime, or action trace is supplied."
      reliability_estimate: "Reliable only as a bounded conceptual MIP projection grounded in the prior PMS Core and PMS-CONFLICT analyses; not reliable as empirical, legal, diagnostic, clinical, institutional, or intervention guidance."
      known_gaps:
        - "No concrete actor or role-holder is identified."
        - "No specific forced choice, action, refusal, delay, or outcome is described."
        - "No concrete distribution of knowledge, power, alternatives, predictability, or responsibility is supplied."
        - "No evidence is provided for publicness, exposure capture, asymmetry lock-in, institutional frame, or terminal conflict regime."
        - "No D1/D2 enactments are observable; therefore the D-module is not activated."
      main_bias_risks_here:
        - "Coherence bias: the analysis may become too fluent because PMS, PMS-CONFLICT, and MIP all structurally fit parts of the case."
        - "Hindsight bias: irreversibility and guilt may be overread as if consequences were predictable."
        - "Moralization bias: forced choice may be translated into blame or maturity failure without evidence."
        - "Tragedy inflation: non-resolution may be treated as terminal conflict too quickly."
        - "Dignity bias: concern for dignity may be confused with a D-profile even though no concrete D enactments are present."

  snapshot:
    short_case_description: "The case concerns a philosophical dirty-hands / forced-choice constellation in which morally difficult action may leave loss, guilt, conflict, responsibility, or irreversibility unresolved. The prior PMS Core analysis marked active Λ, Ω, Θ, Φ, and Χ; weak or unresolved Σ and Ψ; and preserved non-capture. The PMS-CONFLICT overlay marked weak conflict-terminal relevance and risk-level binding collision without active terminal conflict."
    central_actors_and_roles:
      - "No concrete actor; abstract role of a possible responsibility-bearing agent or role-holder under forced choice."
      - "No concrete affected party; abstract role of those exposed to loss, burden, harm, or unresolved consequence."
      - "No concrete institution; abstract moral-praxeological frame in which responsibility, asymmetry, and irreversibility matter."
      - "Analyst role: structural interpreter constrained by MIP, PMS Core, PMS-CONFLICT guardrails, non-diagnosis, and non-verdictive handling."
    guiding_question: "How can the maturity-in-practice conditions of a dirty-hands / forced-choice case be structurally profiled without converting non-resolution into blame, maturity failure, diagnosis, legal judgment, or false integration?"
    level:
      - "conceptual_philosophical_case"
      - "role_structural_projection"
      - "not_concrete_scene"
      - "not_person_assessment"
    first_visible_asymmetry: "Abstract asymmetry of responsibility, exposure, vulnerability, obligation, power-to-act, and irreversible consequence; direction and distribution are not concretely specified."
    first_visible_D_themes_optional:
      - "Potential dignity stress under unresolved responsibility and guilt."
      - "Potential risk of shaming if dirty-hands language becomes person-near verdict."
      - "Potential need for protection-oriented language if harm is high and M is low."
      - "No concrete D1/D2 enactment is available; D remains a guardrail theme, not an activated module."

  role_mapping:
    object_of_observation:
      type: "abstract_case_constellation"
      description: "A philosophical forced-choice structure rather than a concrete person, institution, or observed interaction."
      role: "conceptual object for MIP profiling of awareness, coherence, responsibility, power-to-act, asymmetry, trajectory, and guardrail discipline."
      not_person_as_whole: true
    observer_position:
      role: "external structural analyst"
      power_relation_to_object: "No direct power over concrete persons is involved because the case is abstract; however, the analysis has interpretive power and must not harden into verdict, model overreach, or public shaming language."
      possible_effects_of_analysis: "The analysis may clarify structural distinctions between moral residue, weak integration, responsibility, power-to-act, and conflict-terminal risk; it may also mislead if read as a concrete maturity score, guilt attribution, legal assessment, or solution procedure."
    involved_roles:
      - role: "possible responsibility-bearing agent"
        mandate: "To act, refrain, decide, or interpret under conditions where no available option fully resolves conflict, loss, guilt, or responsibility."
        built_in_asymmetries:
          - "May possess more power-to-act than affected parties."
          - "May bear role responsibility even where clean resolution is unavailable."
          - "May face irreversible consequences under partial knowledge."
          - "May have unequal access to exit, delay, or reflective distance if a concrete scene were supplied."
        publicness_level: "unspecified_private_conceptual"
        dignity_exposure: "Potential but not evidenced; no concrete D exposure can be assessed."
      - role: "affected or exposed parties"
        mandate: "No concrete mandate supplied; structurally they may bear loss, risk, vulnerability, or consequence."
        built_in_asymmetries:
          - "May carry consequences of another role-holder's forced choice."
          - "May lack equivalent decision power or exit capacity."
          - "May be exposed to irreversible burden without symmetric control."
        publicness_level: "unspecified_private_conceptual"
        dignity_exposure: "Potentially relevant if harm, humiliation, public exposure, or degradation were specified; not assessable here."
      - role: "interpretive community or analyst"
        mandate: "To understand the forced-choice structure without converting it into blame, total capture, person ranking, diagnostic claim, or false reconciliation."
        built_in_asymmetries:
          - "Interpretive authority can overframe the case."
          - "Model language can become transmission risk if detached from guardrails."
          - "Public or institutional reuse could create exposure capture."
        publicness_level: "private_working_analysis"
        dignity_exposure: "Low in current form; higher if applied to identifiable persons or public conflict."
    publicness:
      level: "PRIVATE"
      A_P_relevance: "Publicness awareness is relevant mainly as a transmission guardrail: the case is abstract and private, but dirty-hands language could become harmful if excerpted publicly or person-nearly."
      P_PU_relevance: "Public power-to-act is not active in the case material; it becomes relevant only if the analysis is used in governance, legal, institutional, public, or media-amplified settings."
      D_P_relevance_if_D_active: "D-P would become relevant only if public dignity exposure, public shaming, reputational hardening, or identifiable persons were involved. D is not activated here."
      public_shaming_risk: "Low inside the private abstract analysis; medium-to-high if transferred into public or identifiable-person contexts."
      reversibility_risk: "Low in the current private conceptual use; high if the YAML is used as durable record, public classification, institutional evaluation, or sanction-supporting document."

  frame_vs_variability:
    frame_elements:
      - element: "Abstract moral-praxeological forced-choice frame"
        reason_fixed_or_slow: "The case definition itself fixes moral difficulty, conflict, loss, guilt, responsibility, irreversibility, and possible non-resolution as relevant."
        protected_goods:
          - "Reversibility of analysis"
          - "Non-diagnostic handling"
          - "Non-tribunal interpretation"
          - "Preservation of rival readings"
          - "Protection against false resolution"
      - element: "PMS Core boundary"
        reason_fixed_or_slow: "PMS.yaml remains the only PMS Base reference and the prior PMS Core analysis must not be rewritten."
        protected_goods:
          - "Operator discipline"
          - "Derived-structure discipline"
          - "Non-capture"
          - "No PMS Base validation claim"
      - element: "PMS-CONFLICT overlay boundary"
        reason_fixed_or_slow: "CONFLICT reduced signatures remain overlay shorthand only and do not redefine PMS operators or dependencies."
        protected_goods:
          - "No terminal conflict overclaim"
          - "No drift diagnosis"
          - "No solution procedure"
          - "No sanction logic"
      - element: "MIP guardrail boundary"
        reason_fixed_or_slow: "MIP profiles structures and enactments, not personhood, dignity worth, or guilt."
        protected_goods:
          - "Profile-not-person"
          - "Score hygiene"
          - "D0 untouched"
          - "D-module not activated without evidence"
    variability_elements:
      - element: "Degree of MIP scoring"
        possible_change: "A-band and M-band may remain not assigned because the case lacks concrete enactment; a fuller scene could permit cautious banding."
        responsible_roles:
          - "analyst"
          - "future case provider"
      - element: "IA-box result"
        possible_change: "The IA-box can shift from under-specified to functional_asymmetry, IA_risk, or inadult_asymmetry if transparency, justification, time-boundness, and reversibility data are supplied."
        responsible_roles:
          - "analyst"
          - "role-holder"
          - "institution if a concrete scene is provided"
      - element: "D-module activation"
        possible_change: "D may be activated only if a concrete safe communication space, role, time window, and D1/D2 enactments are available and expected to bring more clarity than shame."
        responsible_roles:
          - "analyst"
          - "moderator or supervisory context if applicable"
      - element: "Conflict-terminal reading"
        possible_change: "The CONFLICT reading could strengthen if binding collision, priced/asymmetric Χ, exposure capture, repeated Α_conflict, and failed Σ under Θ/Ω/Ψ are evidenced."
        responsible_roles:
          - "analyst"
          - "future evidence provider"
    unfair_high_M_zones:
      - "It would be unfair to assign high M to any abstract agent because knowledge, predictability, access to alternatives, real power, and serious integration attempts are not specified."
      - "It would be unfair to treat moral guilt or tragic residue as evidence of high shared structural responsibility."
      - "It would be unfair to infer maturity failure from non-resolution alone."
    system_as_excuse_risk:
      - "System language could be misused to erase responsibility entirely by saying the case is only structural tragedy."
      - "Conversely, responsibility language could be misused to erase structural constraints by treating forced choice as personal guilt."
      - "MIP must keep both risk channels visible without converting either into verdict."
    D1_D2_realistically_improvable_where:
      - "Not assessable inside the abstract case because no D1/D2 enactments are observed."
      - "In a concrete scene, D1/D2 improvement would concern language, exposure, participation, protection, and non-humiliating handling under asymmetry."

  acrp_profile:
    A_awareness:
      observations: "Awareness is structurally high as a conceptual question because the case explicitly names loss, conflict, guilt, responsibility, irreversibility, and non-resolution. However, this is not actor awareness. It is case-level awareness generated by the philosophical framing and prior PMS/PMS-CONFLICT analysis."
      available_information: "Available information includes the abstract case material, prior PMS Core operator mapping, and CONFLICT overlay status. Missing are concrete facts about who knew what, when, with what access, under what role mandate, and with what bias risks."
      realistically_knowable: "At the conceptual level, it is realistically knowable that forced choice may involve asymmetry, temporal residue, non-capture, and weak integration. At the concrete level, knowledge conditions are not realistically assessable without a scene."
      blind_spots: "The major blind spots are the absence of concrete actors, alternatives, consequences, affected parties, publicness, institutional frame, temporal sequence, and evidence of actual integration attempts."
      role_awareness_A_R: "Role awareness is conceptually relevant but under-specified. A possible agent may need to recognize role obligations and burdens, but no role-holder or mandate is described."
      publicness_awareness_A_P: "Publicness awareness is primarily an analyst-side transmission requirement. The case is private and abstract, but public reuse could increase exposure, shaming, and irreversibility."
      bias_awareness: "Bias awareness must remain active: coherence bias, hindsight bias, tragedy inflation, moralization bias, and model-confirmation bias are all plausible because the case fits multiple structural grammars."
    C_coherence:
      observations: "Coherence is structurally difficult. The PMS Core analysis already marked Coherence_C as weak-to-active and unstable; CONFLICT marked weak terminal relevance. In MIP terms, a coherent interpretation may be possible, but coherence cannot be treated as moral adequacy or successful integration."
      word_deed_relation: "Not assessable. There are no words, deeds, promises, refusals, or enacted decisions in the case material."
      role_context_coherence: "Under-specified. The abstract role of a responsibility-bearing agent can be imagined, but no concrete role-context alignment can be judged."
      narrative_coherence: "Narrative coherence is possible at the level of philosophical framing: dirty hands may be narrated as tragedy, necessity, residue, culpability, role conflict, or existential responsibility. The analysis must not force one narrative into dominance."
      breaks_named_or_hidden: "Breaks are named conceptually: non-resolution, loss, conflict, guilt, irreversibility, and possible non-capture. Hidden breaks may include unexamined moral theory assumptions and the risk of confusing structural legibility with integrative success."
    R_responsibility:
      observations: "Responsibility is central as a question but not assignable as a finding. PMS Responsibility_R was active as a structural question and weak as attribution; MIP must preserve that distinction."
      responsibility_points: "Possible responsibility points include knowledge, action capacity, role mandate, foreseeable consequences, alternatives, attempts to integrate harm, and protection of affected parties. None is specified concretely."
      assumed_responsibility: "No concrete assumed responsibility is evidenced. The analysis itself assumes responsibility for guarding against overclaim, person ranking, diagnosis, legal attribution, and false closure."
      shifted_or_refused_responsibility: "No concrete shifting or refusal is evidenced. The case could involve refusal, over-assumption, or tragic acceptance of responsibility, but these remain rival possibilities."
      burdens_and_consequences: "Burdens and consequences are named abstractly as loss, guilt, conflict, responsibility, and irreversibility. Their concrete distribution is unknown."
    P_power_to_act:
      observations: "Power-to-act is conceptually central but under-specified. Forced choice implies some action pressure, yet the agent's real levers, constraints, alternatives, and exit options are not supplied."
      real_levers: "Unknown. Possible levers in a fuller case could include choosing among harms, delaying, refusing, disclosing, mitigating, compensating, seeking counsel, protecting affected parties, or preserving reversibility."
      formal_vs_real_options: "Not assessable. The case states that no available action fully resolves the situation, but it does not distinguish formal options from real, feasible, safe, or legitimate options."
      used_options: "No used options are described."
      unused_options: "No unused options are described."
      ceiling_rule_relevance: "The MIP ceiling rule is highly relevant: without predictability and real alternatives, high M should not be assigned. Since both are unknown, M must remain under-specified or capped in any hypothetical concrete extension."

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: "No concrete self-devaluation enactment is observable. Guilt in the case material must not be treated as self-devaluation."
      self_neglect: "No concrete self-neglect is observable."
      shame_dynamics: "No concrete shame dynamic is observable. There is a transmission risk that dirty-hands language could become shaming if applied to identifiable persons."
      degradation_of_others: "No concrete degradation of others is observable."
      public_shaming: "No public shaming is present in the abstract case. Public shaming risk would arise only through misuse or public transfer."
      protest_or_refusal: "No concrete protest or refusal is observable. Resistance or non-fit must not be automatically treated as immaturity."
      dignity_protection: "Dignity protection is present as an analytic guardrail: maintain reversibility, avoid person-ranking, avoid humiliation, avoid D0 evaluation, and avoid legal/diagnostic overclaim."
    next_step_if_relevant: "Do not activate the D-profile unless a concrete safe scene, role, time window, and observable D1/D2 enactments are supplied."

  acrpd_submodules_profile:
    A:
      A-I: "Information awareness is strong at the conceptual-analysis level but absent at the actor level. We know the case theme, not who knew what in a concrete forced choice."
      A-R: "Role awareness is under-specified. A possible agent may hold role obligations, but the actual role, mandate, and role conflict are not identified."
      A-C: "Context awareness is structurally present as moral-praxeological context; concrete social, institutional, cultural, or legal context is absent."
      A-IM: "Impact awareness is conceptually central because loss and irreversibility are named, but concrete impact pathways and affected parties are missing."
      A-P: "Publicness awareness is relevant for transmission discipline, not for the case material itself. Publicness remains private/abstract unless the analysis is reused publicly."
    C:
      C-S: "Structural coherence is partial: PMS Core and CONFLICT provide a coherent map, but the case itself may resist integration."
      C-P: "Practical coherence is not assessable because no action sequence is supplied."
      C-N: "Narrative coherence is plural and rival: tragedy, necessity, culpability, residue, role conflict, and existential responsibility remain open."
      C-I: "Integration coherence is weak: Σ is unresolved and must not be converted into proof of failure or maturity deficit."
    R:
      R-I: "Individual responsibility is not assignable because no individual actor or knowledge/power profile is supplied."
      R-S: "Social responsibility is not assessable; possible affected parties and social relations are abstract."
      R-E: "Ethical responsibility is central as a conceptual question but not settled as blame, guilt, or duty outcome."
      R-P: "Public responsibility is not active; it becomes relevant only if the case enters public, institutional, or governance use."
    P:
      P-I: "Inner agency is not assessable; no inner state, motive, courage, despair, or intention is provided."
      P-S: "Social agency is not assessable; no relational field is specified."
      P-C: "Cultural or contextual agency is not assessable; no concrete norms or culture are specified beyond philosophical moral difficulty."
      P-PU: "Public agency is not active in the case material; public reuse would create separate transmission obligations."
    D:
      active: false
      D-I: "Not activated. No inner self-relation enactment is observable."
      D-B: "Not activated. No bodily or material self-care enactment is observable."
      D-R: "Not activated. No relational dignity enactment is observable."
      D-P: "Not activated. No public dignity enactment is observable."
      note: "D-submodules remain off because the case is abstract. D0 remains untouched; D1/D2 are not scored or profiled."

  scores_and_ia:
    A_score:
      A_band: "not_assigned_conceptual_case"
      boundary_confirmed: "A-score describes enactment, not essence."
      time_role_context: "No concrete time-role-context is available; assessment is limited to the abstract philosophical case and prior PMS/PMS-CONFLICT structural analyses."
      justification:
        A_awareness: "Case-level awareness is high because relevant tensions are explicitly named; actor-level awareness is unknown."
        C_coherence: "Coherence is mixed: the analysis is structurally coherent, but the case itself may involve non-integrable moral remainder."
        R_responsibility: "Responsibility is central as a question but cannot be assigned without knowledge, power, alternatives, and predictability data."
        P_power_to_act: "Power-to-act is under-specified because no real levers, alternatives, or constraints are described."
        modulators_context: "Abstractness, non-concrete-scene status, PMS non-capture, CONFLICT weak terminality, and D-module non-activation prevent numeric or banded maturity scoring."
      D_excluded_from_A_number: true
    M_score:
      M_band: "not_assigned_under_specified"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
      role_position_time_frame: "No concrete role-holder, time frame, action path, or consequence distribution is specified."
      five_factors:
        knowledge: "Unknown. The case does not state what a possible actor knows or could know."
        power_control: "Unknown. The case implies forced choice but does not specify real levers or control."
        predictability: "Unknown. Irreversibility is mentioned, but predictability of consequences is not supplied."
        access_to_alternatives: "Unknown-to-limited. The case says no available action fully resolves the situation, but does not specify actual alternatives or their feasibility."
        serious_integration_attempt: "Unknown. No attempt to name, mitigate, repair, integrate, or review harm is described."
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: false
        explanation: "The ceiling rule is relevant but cannot be applied quantitatively. Predictability and access to alternatives are not known to be approximately zero; they are simply unspecified. Therefore no M-band is assigned rather than capped."
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: "Abstract asymmetry of responsibility, exposure, vulnerability, obligation, and irreversible consequence; no concrete asymmetry holder or affected party is specified."
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "under_specified"
        notes: "Transparency cannot be assessed because no concrete information distribution is supplied."
      J_justified:
        status: "under_specified"
        protected_good_or_purpose: "Possible protected goods include minimizing harm, preserving responsibility, protecting affected parties, and avoiding false reconciliation; none is concretely specified."
        notes: "Justification cannot be assessed because the actual asymmetry, role mandate, and purpose are unknown."
      TB_time_bound:
        status: "under_specified"
        review_points_or_conditions: "No review points, temporal boundaries, or conditions are specified."
        notes: "The case names irreversibility and temporal residue but not a time-bound asymmetry."
      R_reversible:
        status: "under_specified"
        real_return_or_exit_options: "No real return, exit, repair, reversal, or mitigation options are described."
        notes: "Reversibility is central as an analytic guardrail but not assessable as a concrete IA criterion."
      result: "not_assigned_under_specified"
      short_justification: "The IA-box cannot produce functional_asymmetry, IA_risk, or inadult_asymmetry as a concrete result because the case lacks scene data. It can only mark asymmetry questions for future operationalization."
      immediate_action: "Maintain the analysis as a private, reversible, non-verdictive working note; do not use it for evaluation, sanction, legal judgment, clinical inference, or public labeling."

  ia_localisation:
    knowing:
      issue: "Knowledge conditions are absent. The case does not specify what was known, knowable, ignored, refused, or misunderstood."
      possible_intervention: "For a concrete follow-up, reconstruct the information horizon at the time of choice and distinguish available knowledge from hindsight."
    being_able:
      issue: "Power-to-act and real alternatives are absent. The forced-choice structure is named but not operationalized."
      possible_intervention: "For a concrete follow-up, list real levers, blocked levers, costs, dependencies, exit options, and mitigation possibilities."
    being_permitted:
      issue: "No institutional, legal, relational, or role permission structure is supplied."
      possible_intervention: "For a concrete follow-up, identify mandates, prohibitions, role duties, procedural constraints, and legitimacy conditions."
    willing:
      issue: "No subjective willingness, refusal, courage, avoidance, guilt, or ownership can be inferred."
      possible_intervention: "For a concrete follow-up, document enacted attempts to name, mitigate, repair, review, or bear responsibility without inferring inner states beyond evidence."

  ia_protection:
    transparency_measures:
      - "Keep material/inference distinctions explicit: the case names moral difficulty, but does not supply actor knowledge, concrete alternatives, or evidence."
      - "Mark all MIP scores as not assigned unless a concrete scene is provided."
    justification_measures:
      - "Treat any asymmetry as a question to be justified, not as evidence of guilt or authority."
      - "Require a protected good or testable purpose before calling an asymmetry functional."
    time_boundedness_measures:
      - "Do not infer temporal hardening beyond the abstract mention of irreversibility."
      - "If a concrete scene is added, require review points, time windows, and conditions for reassessment."
    reversibility_measures:
      - "Keep the YAML as a reversible working analysis, not as a decision record."
      - "Block transfer into public, institutional, legal, clinical, or evaluative contexts without a new mode declaration."
    participation_or_voice_measures:
      - "No affected voice is present in the abstract case; a concrete application would require affected-party perspectives where safe and appropriate."
      - "Do not substitute model coherence for stakeholder intelligibility."
    dignity_protection_measures:
      - "Keep D0 outside analysis and do not activate D1/D2 without concrete enactments."
      - "Avoid shaming, person-near labels, moral sentencing, or humiliation language."
    review_or_falsifier:
      date_or_interval: "before any concrete, public, institutional, legal, clinical, or evaluative reuse"
      falsifier_question: "Does new concrete evidence specify actors, roles, knowledge, alternatives, predictability, power, time windows, D1/D2 enactments, or affected voices in a way that invalidates the current under-specified MIP profile?"
      responsible_roles:
        - "analyst"
        - "case owner if a concrete scene is later supplied"
        - "moderator or reviewer if analysis is transmitted beyond private reflection"

  trajectory:
    principle: "Trajectories, not labels."
    timeline:
      - timepoint: "t0"
        short_description: "Abstract dirty-hands / forced-choice problem is introduced as a philosophical case."
        A_band: "not_assigned_conceptual"
        M_band: "not_assigned_conceptual"
        D_observation_optional: "D not activated; no concrete D enactments."
