  uniform_report:
    generate_only_from_structured_fields: true
    title: "MIP Analysis: Privacy vs. Publicness"
    overview_4_to_7_sentences: This MIP analysis treats Privacy vs. Publicness as an abstract structural case, not as a concrete scene. Awareness is conceptually developed in the prior PMS and CRITIQUE analyses, but no A-score band is assigned because there is no concrete enactment, actor, role-holder, or time window. Responsibility is thematically central but not assignable; M-score is therefore not assigned, and the ceiling rule blocks high M for hypothetical roles. IA-box analysis identifies only conceptual IA-risk around exposure, access, publicness, justification, time-boundedness, and reversibility. The D-module is activated only as a qualitative protection signal because publicness and exposure can implicate dignity in practice, but D0 remains untouched and no D-score or person-level D reading is made. The analysis is transmittable only as a structural working note.
    key_findings:
      - The case supports structural maturity questions but not maturity scoring.
      - A-awareness is strongest at the level of analytic guardrails and weakest at the level of concrete scene evidence.
      - "C-coherence is formal rather than empirical: the analysis is coherent, but the case itself is under-specified."
      - R-responsibility cannot be assigned without roles, knowledge, power, predictability, alternatives, and integration attempts.
      - MIP P as power-to-act is under-specified for case roles; CRITIQUE publicness overlay P must not be confused with MIP P.
      - D is active only as a protection signal for possible public exposure, shame, degradation, and reversibility risk.
      - Non-capture and rival formalizations remain necessary because MIP may not be the most discriminating framework for all privacy/publicness cases.
    A_summary: A-score is not assigned. Conceptual awareness is relatively strong in the analysis because privacy/publicness distinctions, publicness risk, asymmetry, non-capture, and bias risks are named, but no concrete awareness of any actor can be assessed.
    M_summary: M-score is not assigned. No role-holder X, time frame, knowledge, control, predictability, alternatives, or integration attempt is supplied; the ceiling rule blocks high M for hypothetical roles.
    IA_box_summary: The IA-box result is conceptual IA-risk only. Transparency, justification, time-boundedness, and reversibility are all under-specified, with reversibility conceptually at risk where publicness could become irreversible exposure.
    D_summary_if_activated: The D-module is activated as a protected qualitative signal only. No D0 claim, D-score, person label, or public D reading is made; D-P is relevant because publicness may become humiliation or reputational residue.
    trajectory_summary: The only trajectory visible is an analysis trajectory from abstract case material to PMS Core, CRITIQUE, and MIP guardrailed visibility. No maturity trajectory of a person, group, institution, or event is inferred.
    guardrail_status: "Guardrails are maintained: non-diagnostic, non-forensic, non-legal, non-clinical, non-implementation, non-ranking, D0-protective, reversible, and working-note only."
    transmission_status: Transmittable as structural working note only; not transmittable for decision, sanction, diagnosis, legal use, public accusation, or implementation.
    practical_implications: Any applied use must first specify a concrete scene and then separately calibrate A-C-R-P, IA-box, D protections, publicness level, reversibility, and rival-framework comparison. Until then, the mature practice is restraint, differentiation, and protection-first handling of exposure risk.
    conclusion: MIP adds a maturity-in-practice lens to the PMS Core and CRITIQUE analyses by showing that the case supports guardrailed structural clarification but not scoring, responsibility assignment, productive correction, stable critique, legal judgment, or D evaluation.