        case_application: 'The policy is active as a guardrail: once a trace, checkpoint, or governance decision is treated as
          Σ-bound, later Φ must be explicit, reviewable, and Ψ-bound rather than silent post-hoc rationalization.'
    self_binding_policies:
      max_iteration_depth:
        id: max_iteration_depth
        applicability: risk
        policy_kind: theta_bound
        non_guarantee: true
        description: Limit iteration depth unless explicitly stabilized and reviewed.
        params:
          k_max: unspecified
        rule: For any QITERATE(k, block), require k less_than_or_equal_to k_max unless wrapped in a QSTABILIZE(arguments)
          section that enforces additional invariants. This prevents unbounded or poorly reviewed Θ-growth at the structural
          overlay level.
        case_application: Iteration depth is central but not bounded by a supplied k_max. This remains the main QC governance
          risk in the overlay.
      stabiliser_frequency:
        id: stabiliser_frequency
        applicability: risk
        policy_kind: psi_density
        non_guarantee: true
        description: Long temporal chains require sufficient stabilisation checkpoints.
        params:
          theta_length_threshold: unspecified
        rule: If Θ-chain length exceeds the declared threshold, require QSTABILIZE or review checkpoint before further iteration.
        case_application: Long Θ-chains require stabilisation density or review cadence, but no threshold, stabiliser routine,
