        id: no_reframing_past_sigma
        applicability: active
        policy_kind: integration_boundary_constraint
        non_guarantee: true
        description: Recontextualization after integration must be explicitly bound.
        rule: 'After a Σ-marked commit/checkpoint, further Φ must be logged as revision, review, or Ψ-bound update.

