      unstable_asymmetry_guard:
        id: unstable_asymmetry_guard
        applicability: risk
        policy_kind: asymmetry_guard
        non_guarantee: true
        description: Ω-heavy chains should be guarded by attractor or self-binding conditions.
        rule: Chains dominated by Ω require either Α-stabilisation or Ψ-bound constraint documentation before being treated
          as governance-ready.
        case_application: Ω-heavy chains are possible through opacity, oracle/control dependence, review authority, and downstream
