operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - boundary_formation
      - object_differentiation
      - structural_contrast
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the structural distinction between verbally asserted parity and
      uneven distribution of outcomes, exposure, responsibilities, or
      obligations. It also marks the distinction between formal or rhetorical
      symmetry and practical distributional asymmetry.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - >
        The primary distinction is parity-claim versus distributional asymmetry
        inside a relational or institutional setting.
      - >
        The distinction must not be inflated into a verdict; it remains
        ambiguous until the relevant frame, distribution, and temporal structure
        are specified.
    falsifier_conditions:
      - >
        If the parity claim and the distributional pattern cannot be
        distinguished, or if the alleged unevenness disappears once the correct
        frame is specified, the PMS reading loses its entry point.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - activation
      - orientation
      - energetic_gradient
      - proto_agency
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is weakly active as structural pressure generated by the Δ mismatch:
      the configuration may orient actors or analysis toward correction,
      justification, denial, exposure, contestation, or stabilization. No
      subjective desire or psychological motive is inferred.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        The tension is structural and institutional-argumentative rather than
        psychological: the mismatch invites questions about whether
        parity-language and distributional practice align.
      - >
        Do not infer subjective drive, resentment, manipulation, or intent from
        the mere presence of uneven distribution.
    falsifier_conditions:
      - >
        If the asserted parity and uneven distribution generate no practical,
        argumentative, explanatory, or structural pressure in the relevant
        frame, ∇ is under-specified and should remain weak or inactive.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - context
      - boundary_conditions
      - relevance_structuring
      - role_space
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because the case only becomes intelligible inside a relational
      or institutional frame where parity, obligation, exposure, responsibility,
      and outcome distribution count as relevant.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The active frame is a relational or institutional setting in which
        parity is asserted and distributions are normatively or practically
        salient.
      - >
        Frame shifts must be marked: formal equality, role differentiation,
        distributive equality, reciprocal obligation, and institutional
        accountability may not be the same frame.
    falsifier_conditions:
      - >
        If no relevant relational or institutional frame can be identified, the
        analysis becomes too abstract to discriminate pseudo-symmetry from
        ordinary difference or role specialization.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - expectation
      - counterfactual_structure
      - tension_through_absence
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is weak and conditional. It may name the structured absence of expected
      reciprocity, equalized exposure, shared obligation, or accountable
      adjustment within the frame, but the case material does not specify the
      exact expected occurrence whose absence matters.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        The expected occurrence would need to be specified, such as equal
        exposure, reciprocal accountability, redistributed burden, or explicit
        acknowledgment of asymmetry within the relevant frame.
      - >
        The absence of equalization may also mark PMS non-capture or a rival
        framing rather than a defect, drift, or failed integration.
    falsifier_conditions:
      - >
        If no structured expectation of reciprocity, equalization,
        acknowledgment, or adjustment exists within the frame, Λ should not be
        asserted beyond a weak conditional marker.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - pattern_formation
      - stability
      - path_dependence
      - role_script_emergence
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak and conditional. The phrase "situations where" suggests a
      pattern-type, and institutional settings may stabilize pseudo-symmetry
      into role-scripts, but no concrete recurrence, routine, or path dependence
      is provided.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Recurrence would need evidence that parity-language repeatedly coexists
        with uneven distribution in the same frame or across comparable scenes.
      - >
        A stable attractor must be distinguished from a single event,
        accidental aggregation, temporary transition, or one-off mismatch.
    falsifier_conditions:
      - >
        If recurrence, stabilization, path dependence, or role-script emergence
        is not shown, Α is over-read and cannot support strong Ω, Θ, or
        drift-pattern claims.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - role_differentiation
      - responsibility_gradients
      - vulnerability_structures
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is the central operator because the case explicitly concerns uneven
      distribution of outcomes, exposure, responsibilities, or obligations
      under asserted parity. The asymmetry is structural, not automatically
      moralized.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        The direction and kind of asymmetry must be specified: outcomes,
        exposure, responsibilities, obligations, power, vulnerability, capacity,
        or role differentiation may not be interchangeable.
      - >
        Ω must not be moralized by default; asymmetry can be unjustified,
        justified, functional, transitional, accepted, hidden, or contested.
      - >
        Because Ω depends on Α in the PMS dependency path, strong Ω requires
        evidence that the imbalance is stabilized rather than merely momentary.
    falsifier_conditions:
      - >
        If no directional imbalance is identifiable, or if uneven distribution
        is transparently justified and not masked by the parity claim, Ω must be
        weakened or removed from the pseudo-symmetry reading.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - sequence_and_trajectory
      - persistence
      - anticipation_and_delay
      - developmental_arcs
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is weak-to-moderate. The wording "remain unevenly distributed" implies
      persistence, but the case gives no sequence, duration, accumulation,
      developmental arc, or delayed correction.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Diachronic trajectory must be distinguished from static comparison;
        persistence, accumulation, recurrence, or delay would need to be shown.
      - >
        Temporality is analytically relevant only if the unevenness endures,
        accumulates, anticipates future burden, or reshapes later commitments.
    falsifier_conditions:
      - >
        If the case concerns only a static mismatch with no temporal extension
        or persistence, Θ is overextended and should remain weak.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - adaptation
      - reinterpretation
      - developmental_change
      - pattern_shift
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is major and calibration-sensitive. The parity assertion may
      recontextualize an uneven distribution as symmetry, mutuality, fairness,
      formal equality, or shared responsibility. This may clarify, mask,
      stabilize, or merely name an aspirational norm depending on the frame.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        The source frame is distributional asymmetry; the target frame may be
        asserted parity, formal equality, reciprocal obligation, institutional
        neutrality, or aspirational fairness.
      - >
        Φ must be tested for discrimination: it may clarify an asymmetry, mask
        it, stabilize it, or express a future norm. It must not absorb every
        rupture, disagreement, or rival framing.
    falsifier_conditions:
      - >
        If every resistance, rupture, disagreement, or non-fit is absorbed as
        recontextualization, the PMS reading becomes over-assimilative and loses
        non-capture.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - regulation
      - inhibition
      - reflection_and_meta_position
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active primarily as an application constraint: the analysis must
      maintain reflective distance, suspend verdict, preserve reversibility, and
      avoid converting pseudo-symmetry into a tribunal category. Within the case
      scene itself, Χ is not established.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The analysis must suspend person-level verdicts, empirical claims,
        legal findings, and moral rankings while keeping the structural mismatch
        legible.
      - >
        Distance is not avoidance or empty neutrality; it is restraint that
        keeps rival readings, non-capture, and falsifier conditions active.
    falsifier_conditions:
      - >
        If Χ is suspended in order to force a verdict, rank actors, declare
        institutional guilt, or close rival readings without evidence, the PMS
        application is invalid.
    non_capture_note: >
      Distance is required for valid PMS application and must not be used as
      denial or premature neutrality.
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - coherence
      - resolution_of_contradiction
      - multi_level_coordination
      - maturity_of_praxis
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak and contested. The case may show asserted coherence through
      parity-language, but it does not show integrated handling of uneven
      outcomes, exposure, responsibilities, or obligations.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Integration must discriminate rather than smooth over conflict; a parity
        claim is not integrated merely because it is symmetrical in wording.
      - >
        Σ must distinguish integration from forced coherence, rhetorical
        closure, administrative simplification, or narrative smoothing.
    falsifier_conditions:
      - >
        If PMS coherence is treated as proof that the case is adequately
        captured, or if verbal parity is treated as integrated praxis without
        distributional calibration, Σ is overclaimed.
    non_capture_note: >
      Coherence does not prove adequacy.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - self_model
      - responsibility_as_self_commitment
      - stable_normativity
      - autobiographical_coherence
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and conditional. It becomes relevant only if parity claims are
      bound into durable commitments, institutional self-description, role
      obligations, or stable responsibility-as-self-commitment across time. The
      case material does not establish this.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Apply Ψ only where self-binding, institutional commitment, or analytic
        self-binding is actually in scope and supported by temporal and
        integrative structure.
      - >
        Do not attribute literal selfhood, moral maturity, or stable identity to
        abstract institutions, discourses, or cases unless explicitly scoped as
        structural self-binding.
    falsifier_conditions:
      - >
        If Ψ is applied without sufficient Σ, Θ, and Χ, or without any durable
        commitment structure, the self-binding reading is under-specified.
    non_capture_note: >
      Self-Binding must not be treated as literal selfhood where only a
      conceptual pattern is present.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the basic intelligibility of the case: the parity/asymmetry
      distinction, weak pressure generated by the mismatch, the relational or
      institutional frame, possible missing reciprocity or acknowledgment, and
      possible stabilization of the pattern. In this case, L1 is necessary for
      legibility but does not yet establish recurrence, failure, blame, or drift.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 carries the main thematic load: Ω names uneven distribution of
      exposure, outcomes, responsibilities, or obligations; Θ remains weaker
      because persistence is suggested but not concretely evidenced. The layer
      therefore supports a bounded asymmetry reading but not a full diachronic
      or responsibility-chain conclusion.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 is calibration-sensitive: Φ names possible reframing of asymmetry as
      parity, Χ constrains the analysis through reflective distance and
      reversibility, and Σ tests whether asserted coherence is actually
      integrated or merely verbal. This layer is also where the analysis must
      resist becoming too smooth, because parity-language can be explanatory,
      ideological, aspirational, administrative, or frame-contested.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      Ψ is secondary and weak. It is relevant only as analytic self-binding of
      the PMS application and as a possible institutional commitment if the
      parity claim is shown to bind roles over time; it is not a literal
      selfhood claim. In this case, L4 should mainly police overclaim rather
      than generate a strong SELF_FIXPOINT reading.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case material explicitly distinguishes verbally asserted parity from
        uneven distribution.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        A weak structural pressure follows from the mismatch, but no subjective
        impulse or concrete activation is evidenced.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The case material specifies a relational or institutional setting, which
        supplies the frame for parity and obligation claims.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Only conditional: missing reciprocity, equalization, acknowledgment, or
        adjustment may be relevant, but the expected occurrence is not
        specified.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Only weak: the phrase "situations where" suggests a pattern-type, but no
        recurrence or stabilized role-script is evidenced.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        The case explicitly names uneven distribution, but strong PMS dependency
        on Α remains weak because stabilization is not evidenced.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        The word "remain" suggests persistence, but concrete temporal
        trajectory, accumulation, delay, or sequence is absent.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        The parity assertion may place distributional asymmetry into a symmetry
        frame, but the exact source and target frames require calibration.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Satisfied as an application discipline: the analysis maintains distance,
        reversibility, non-diagnosis, and non-tribunal boundaries.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Weak: the analysis tests asserted coherence but does not infer actual
        integration from verbal parity.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Weak: no durable self-binding, institutional commitment, or self-relation
        is established beyond analytic application discipline.
  dependency_failure_conditions:
    - >
      If a later operator is used while its dependencies are absent, mark the
      reading as under-specified or invalid.
    - >
      If the chain is used as a smooth totalization without discrimination
      tests, mark coherence risk as high.
    - >
      If an operator is not active, state so rather than forcing the full chain.

