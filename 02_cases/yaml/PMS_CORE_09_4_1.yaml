analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - pms_internal_structural_projection
    not_claimed:
      - metaphysical_proof
      - phenomenological_account
      - clinical_assessment
      - legal_or_forensic_judgment
      - person_ranking
      - pms_base_validation
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This case type permits bounded PMS operator projection and calibration of
      possible structures. It does not permit empirical findings, legal or
      forensic conclusions, diagnostic judgments, implementation claims,
      person-ranking, or PMS Base validation. The absence of a concrete scene is
      not a defect to be repaired by inference; it is a boundary condition of
      the analysis.
  coherence_risk:
    status: "high"
    reason: >
      The PMS reading fits the case smoothly because pseudo-symmetry is already
      structurally described as a mismatch between assertion and distribution.
      This creates a high risk that PMS will over-assimilate the phenomenon or
      under-discriminate among formal equality, functional asymmetry,
      ideological masking, transitional reform, rhetorical simplification,
      administrative normalization, and genuine pseudo-symmetry.
    mitigation: >
      The reading is constrained by weak operator markings, dependency checks,
      rival readings, falsifier conditions, non-capture zones, and the explicit
      rule that PMS coherence is insufficient by itself. Smooth operator
      coverage must therefore be treated as a warning signal as well as an
      analytic advantage.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the formal structure of parity/asymmetry mismatch, the role of
      frame, the centrality of Ω, the possible role of Φ, and the need for Χ, Σ,
      Ψ calibration. This is a strong structural fit at the level of conceptual
      projection.
    discrimination_requirement: >
      The PMS reading must distinguish pseudo-symmetry from justified role
      differentiation, formal equality with material inequality, aspirational
      parity, temporary transition, strategic concealment, administrative
      simplification, symbolic parity, and mere disagreement about the relevant
      frame.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish pseudo-symmetry from justified functional asymmetry."
      expected_pms_distinction: >
        Ω must be calibrated with □ and Α: uneven distribution only supports
        pseudo-symmetry if the parity frame claims practical equivalence while
        the asymmetry remains relevant, stabilized, and not transparently
        role-justified.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish masking recontextualization from aspirational parity or formal equality."
      expected_pms_distinction: >
        Φ must specify source and target frames and must be tested by Σ:
        parity-language may mask asymmetry, name a formal status, express a
        future norm, or coordinate a transitional arrangement. PMS must not
        collapse these cases into one drift-pattern.
      current_status: "partially_satisfied"
    - id: "DT3"
      test: "Distinguish verbal coherence from integrated praxis."
      expected_pms_distinction: >
        Σ must not be granted merely because the parity claim is formally
        symmetrical. Integration would require the uneven distribution to be
        handled coherently within the frame, not merely renamed or rhetorically
        balanced.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What exactly distinguishes asserted parity from distributional asymmetry in this case?"
      current_calibration: "partial"
    - operator: "∇"
      question: "What structural pressure follows from the mismatch without inferring subjective desire?"
      current_calibration: "weak"
    - operator: "□"
      question: "Which relational or institutional frame makes parity and uneven distribution relevant?"
      current_calibration: "partial"
    - operator: "Λ"
      question: "Which expected reciprocity, acknowledgment, redistribution, or accountability is absent?"
      current_calibration: "weak"
    - operator: "Α"
      question: "Is pseudo-symmetry recurrent or stabilized rather than a single mismatch?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "Which kind and direction of uneven distribution is present?"
      current_calibration: "partial"
    - operator: "Θ"
      question: "Does the unevenness persist, accumulate, or create temporal commitments?"
      current_calibration: "weak"
    - operator: "Φ"
      question: "Does parity-language recontextualize asymmetry as symmetry, and with what effect?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "Is reflective distance maintained by the analysis and, if relevant, within the scene?"
      current_calibration: "partial"
    - operator: "Σ"
      question: "Is there actual integration of the mismatch, or only verbal coherence?"
      current_calibration: "weak"
    - operator: "Ψ"
      question: "Is any durable self-binding or commitment structure evidenced?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Formal equality may be the relevant frame even where material outcomes differ."
      - "Uneven obligations may be functional, transparent, temporary, or voluntarily accepted rather than pseudo-symmetrical."
      - "The parity claim may be aspirational, transitional, administrative, symbolic, or norm-setting rather than descriptive concealment."
      - "The phenomenon may be better formalized through distributive justice, recognition theory, institutional incentive analysis, contract theory, systems theory, or discourse analysis."
      - "Rupture, refusal, disagreement, absence, or non-fit may mark a genuine limit of PMS capture rather than drift or failed integration."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence,
      recontextualization, or failed maturity.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - formal_equality_with_material_difference
      - justified_functional_asymmetry
      - ideological_cover_or_legitimation_reading
      - transitional_reform_or_aspirational_parity
      - discourse_conflict_over_the_relevant_frame
      - distributive_justice_or_recognition_theory_formalization
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would weaken if the parity claim is explicitly only
        formal or aspirational, if the uneven distribution is transparent and
        role-justified, if no relevant asymmetry remains after frame
        specification, or if no recurrence, persistence, or distributional
        consequence is shown.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if it cannot separate pseudo-symmetry
        from legitimate role differentiation, transitional correction, formal
        equality, symbolic parity, strategic masking, administrative
        simplification, or contested frame selection.
    - id: "F3"
      condition: >
        The reading would over-assimilate if every disagreement, rupture,
        resistance, missing evidence, or rival framing is redescribed as Φ, Λ,
        low Σ, AD_A>>E, AD_Sigma_low, or maturity failure.
    - id: "F4"
      condition: >
        The drift-pattern reading would fail if recurrence, stabilization,
        temporal persistence, or distributional consequence cannot be shown
        beyond the abstract conceptual pattern.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The PMS application is valid as a reversible conceptual projection with
      high coherence risk and limited discrimination. It is not a concrete scene
      analysis and does not support empirical, metaphysical, diagnostic, legal,
      implementation, or PMS Base validation claims. Its main value is
      pre-analytic structuring; its main risk is appearing more complete than
      the evidence permits.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical, or
    applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: "Identify and document the specific parity statement and the specific uneven distribution it contrasts with."
      ∇: "Identify observable practical, argumentative, institutional, or procedural pressure arising from the mismatch without inferring private motive."
      □: "Specify the relevant relational or institutional frame, including whether parity means formal equality, reciprocal obligation, equal exposure, equal outcome, or another norm."
      Λ: "Specify the expected event, acknowledgment, redistribution, reciprocity, protection, or accountability whose absence matters within the frame."
      Α: "Show recurrence, stabilization, path dependence, routine, or role-script emergence across scenes or time."
      Ω: "Map the direction and type of imbalance: outcomes, exposure, responsibilities, obligations, power, vulnerability, capacity, or role differentiation."
      Θ: "Provide temporal evidence for persistence, delay, accumulation, anticipation, sequence, or trajectory."
      Φ: "Identify the source frame and target frame of recontextualization and test whether parity-language clarifies, masks, stabilizes, or aspires beyond asymmetry."
      Χ: "Show how the analysis or actors maintain reflective distance, suspend premature verdict, and preserve reversibility."
      Σ: "Provide criteria for distinguishing integrated handling of asymmetry from forced coherence, rhetoric, or administrative smoothing."
      Ψ: "Show durable self-binding, institutional commitment, role obligation, or stable responsibility-as-self-commitment across time."
    negative_cases:
      - >
        A setting with explicit formal parity and transparently justified
        role-differentiated obligations, where uneven distribution is
        acknowledged, bounded, and corrected or accepted within the relevant
        frame.
      - >
        A temporary transitional arrangement where asymmetry is openly named as
        incomplete implementation rather than denied through parity-language.
      - >
        A purely symbolic parity statement that does not govern exposure,
        outcomes, responsibilities, or obligations.
    comparison_needs:
      - rival_model_comparison
      - explicit_criteria_for_superior_discrimination
      - calibration_thresholds_for_operator_activation
      - case_specific_evidence
      - external_evaluation_where_empirical_claims_are_made
  current_status: >
    Operationalization is not fulfilled. The case material provides a
    conceptual pattern but no concrete indicators, evidence, comparison set,
    calibration thresholds, or external validation.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      Do not infer motives, resentment, denial, manipulation, intent, maturity,
      traits, or mental states from the presence of asserted parity and uneven
      distribution.
    non_metaphysical: >
      Do not treat pseudo-symmetry as a claim about consciousness, essence,
      ontological dignity, metaphysical equality, or the nature of persons.
    non_diagnostic: >
      Do not treat pseudo-symmetry as a diagnosis of actors, groups,
      institutions, relations, pathologies, or clinical states.
    non_legal_forensic: >
      Do not treat the PMS reading as evidence of liability, intent,
      discrimination, culpability, admissibility, or legal violation.
    non_implementation_claim: >
      Do not treat this YAML case application as an implemented decision system,
      governance tool, empirical detector, or operational classifier.
    non_moral_ranking: >
      Do not rank persons, roles, institutions, or groups by dignity, maturity,
      responsibility, blame, or moral worth based on the structural reading.
    non_exhaustive_capture: >
      Do not treat translation into Δ–Ψ as exhaustive capture; formal equality,
      functional asymmetry, aspirational parity, and rival formalizations remain
      possible.
    reversibility: >
      Every active or weak operator marking can be revised if a concrete scene
      shows different framing, justified asymmetry, absence of recurrence, or
      better rival discrimination.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by handling Ω with restraint, refusing
      humiliation or irreversible labels, and treating D as a praxeological
      constraint rather than ontological superiority.

limits:
  - >
    The PMS reading is limited by the absence of a concrete praxis scene,
    identified actors, specified frame, evidence, temporal sequence, and
    distributional measurements.
  - >
    The reading makes no empirical, metaphysical, diagnostic, clinical, legal,
    forensic, implementation, governance, or PMS Base validation claim.
  - >
    Rival readings remain open, including formal-equality, functional-asymmetry,
    ideological-cover, aspirational-parity, discourse-conflict, and
    distributive-justice formalizations.
  - >
    The case has high coherence risk because PMS can map the parity/asymmetry
    mismatch smoothly; this smoothness must not be mistaken for discriminative
    sufficiency.

case_synthesis:
  primary_pms_reading: >
    Pseudo-Symmetry is structurally readable as Ω within □, marked by Δ between
    asserted parity and uneven distribution, with Φ as a possible
    recontextualization of asymmetry as symmetry; Λ, Α, Θ, Σ, and Ψ remain weak
    or conditional. The reading is strongest as a pre-analytic structural map
    and weakest wherever concrete recurrence, temporality, integration, and
    self-binding would be required.
  continuity_condition: >
    Continuity becomes relevant only if evidence shows that parity-language and
    uneven distribution persist or recur across time; otherwise continuity
    remains under-specified. The word "remain" permits a temporal question but
    does not by itself establish a full Θ trajectory.
  change_condition: >
    Change or recontextualization occurs if the uneven distribution is placed
    into a parity frame, but Φ must be tested to distinguish clarification,
    masking, stabilization, administrative simplification, and aspirational
    reframing.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, missing evidence, or rival
    framing must remain possible non-capture and must not be automatically
    translated into drift, low integration, recontextualization, or maturity
    failure.
  responsibility_condition: >
    Responsibility_R is only weak and conditional: it requires asymmetry
    extended across time, recontextualization, and self-binding. Uneven
    obligation alone is not moral blame, legal liability, diagnostic evidence,
    or proof of failed praxis.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring restraint under
    asymmetry, no person-ranking, no humiliation, no irreversible labels, and no
    ontological dignity claims. It governs how the case is handled, not what
    any person or institution is metaphysically worth.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparison criteria and
    evidence show that PMS discriminates the case better without
    over-assimilation. A rival reading may explain the same material through
    formal equality, functional differentiation, recognition, legitimacy,
    institutional incentives, or distributive justice without being reducible to
    PMS drift.

final_structural_formula:
  primary_formula: >
    Φ(Ω within □) marked by Δ(parity_claim / uneven_distribution); with Λ, Α,
    Θ, Σ, and Ψ conditional, and Χ as application constraint.
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    Pseudo-Symmetry is a PMS-readable conceptual pattern in which asserted
    parity recontextualizes or coexists with structural asymmetry inside a
    relational or institutional frame. The formula is deliberately bounded:
    it shows where PMS can organize the case, not that PMS exhausts the case.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity,
    implementation validity, moral ranking, or PMS Base validation. Stronger
    claims would require a concrete scene, external evidence, operator
    calibration, rival-model comparison, and explicit falsification conditions.