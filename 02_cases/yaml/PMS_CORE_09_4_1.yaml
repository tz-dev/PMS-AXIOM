derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - Awareness_A
    - Coherence_C
    - Responsibility_R
    - Action_E
    - Dignity_in_Practice_D
    - SELF_FIXPOINT
    - AD_A_much_greater_E
    - AD_under_integration
  usage_rule: >
    Each derived structure is marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration
    does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not
    independent axioms, diagnoses, ontological rankings, metaphysical entities,
    or proof of PMS completeness.
  case_status: >
    Awareness_A is weak; Coherence_C is weak; Responsibility_R is weak and
    conditional; Action_E is under-specified; Dignity_in_Practice_D is active as
    an application constraint; SELF_FIXPOINT is analytic-only and not a primary
    case structure; AD_A>>E and AD_Sigma_low are possible but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    case_reading: >
      Awareness_A appears only weakly as sustained, framed differentiation
      between asserted parity and uneven distribution. The relational or
      institutional frame is given, but the temporal structure required by Θ is
      only suggested by "remain" and not concretely evidenced.
    status: "weak"
    calibration_points:
      - >
        Differentiate parity-language from distributional asymmetry inside the
        relational or institutional frame, and require evidence of persistence
        before treating the differentiation as sustained across time.
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    case_reading: >
      Coherence_C is weak because parity-language may provide narrative or
      formal coherence, while uneven distribution may destabilize that
      coherence. The case does not show whether impulse, frame, non-event, and
      temporality actually stabilize into coherent praxis.
    status: "weak"
    calibration_points:
      - >
        Distinguish formal or rhetorical coherence from integrated validity;
        PMS coherence is not sufficient by itself and must be tested against
        distributional structure and rival readings.
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    case_reading: >
      Responsibility_R is weak and conditional. The case mentions
      responsibilities and obligations as unevenly distributed, but PMS
      Responsibility_R requires Ω, Θ, Φ, and Ψ: asymmetry across time,
      recontextualization, and self-binding. These are not fully specified.
    status: "weak"
    calibration_points:
      - >
        Before claiming Responsibility_R, identify the relevant asymmetry,
        temporal extension, recontextualization of obligation, and self-binding
        structure; do not convert uneven obligation into blame, diagnosis, or
        legal liability.
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    case_reading: >
      Action_E is under-specified because the case material does not provide
      concrete enactment, intervention, decision, or temporally integrated
      realization. It gives a conceptual pattern of assertion and distribution,
      not an action sequence.
    status: "under_specified"
    calibration_points:
      - >
        Distinguish action from verbal assertion, institutional description,
        abstract pattern, or observed outcome; require ∇, Θ, and Σ to show
        integrated realization over time.
    non_capture_note: "Without a concrete scene, Action_E may remain under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    case_reading: >
      Dignity_in_Practice_D constrains the application: asymmetry must be
      handled without ranking, shaming, humiliating, pathologizing, or
      ontologically evaluating persons or groups. The case scene itself does not
      provide enough evidence to judge whether D is preserved there.
    status: "application_constraint"
    calibration_points:
      - >
        Keep Ω structural and non-moralized, maintain Χ, and apply Ψ only as
        self-binding discipline for the analysis unless a concrete self-binding
        scene is provided.
    non_capture_note: >
      D is a praxeological application constraint, not an ontological or moral
      superiority claim.

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of
    praxis being bound into a relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not the primary structure of Pseudo-Symmetry. It is
    relevant only as an analytic chain showing what would be required for strong
    self-binding: integrated, reflexively modulated, temporally extended,
    asymmetry-aware praxis. The case does not warrant literal selfhood,
    identity, or institutional subjectivity claims.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence records one derivational strategy within PMS. It must not be
    read as proving that all forms of selfhood, agency, identity, or case
    structure reduce without remainder to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or
    institutions as literal subjectivity unless explicitly scoped as structural
    self-binding or analytic self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived
    distortion forms. They are not automatically entailed by a case and must not
    be treated as diagnoses, person-types, moral verdicts, or clinical
    categories.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces drift toward evaluation
        rather than supporting integrative transformation and balanced
        enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: >
      AD_A>>E is a possible risk if parity-language repeatedly stabilizes
      evaluative or positional asymmetry while balanced enactment,
      redistribution, or correction remains suppressed or chronically delayed.
      The present case material does not establish recurrence, stabilized
      evaluative patterning, or delayed enactment, so the pattern is not active
      as a finding.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis, especially where
        unstable recontextualization and weak integration unfold under
        asymmetrically loaded praxis conditions.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >
      AD_Sigma_low is a possible risk if parity-language repeatedly
      recontextualizes asymmetry faster than the frame integrates the uneven
      distribution into coherent praxis. The case does not establish chronic
      reframing, unstable trajectories, or inconsistent responsibility, so the
      pattern remains possible but not entailed.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, or person-type.

