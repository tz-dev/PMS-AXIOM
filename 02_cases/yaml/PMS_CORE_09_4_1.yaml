core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    status: "satisfied"
    case_application: >
      The case is treated as a praxis-structure: an asserted parity claim
      operating inside relational or institutional role-space while
      distributional asymmetry remains. No claim is made about the essence,
      psychology, inner state, worth, or moral rank of any person or group.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    status: "satisfied"
    case_application: >
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ is used
      as PMS operators. Terms such as pseudo-symmetry, parity-language, uneven
      distribution, and non-capture are case descriptions or guardrail terms,
      not new PMS operators.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and the drift patterns are treated
      only as formula-derived structures from PMS.yaml. They are not assumed as
      primitive axes or independent explanatory layers.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    status: "partial"
    case_application: >
      Ω is central because the case explicitly concerns uneven distribution of
      outcomes, exposure, responsibilities, or obligations. Θ is weaker because
      the wording "remain unevenly distributed" suggests persistence, but no
      concrete temporal trajectory, sequence, accumulation, or duration is
      provided.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    status: "satisfied"
    case_application: >
      This YAML representation is a case-application encoding. It does not
      implement praxis, validate an empirical model, prove interoperability, or
      establish explanatory adequacy without external calibration and
      evaluation.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    status: "satisfied"
    case_application: >
      Rival readings remain open, including formal-equality,
      functional-asymmetry, ideological-cover, transitional-reform,
      discourse-conflict, distributive-justice, recognition-theory,
      contract-theory, and institutional-analysis readings.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    status: "satisfied"
    case_application: >
      The reading preserves possible non-capture: some uses of parity-language
      may be aspirational, formal, functional, accepted, transitional, or
      governed by a rival grammar that PMS does not exhaust.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    status: "satisfied"
    case_application: >
      The case is not used to diagnose people, institutions, groups, mental
      states, maturity level, pathology, intent, moral worth, or personality
      type.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    status: "partial"
    case_application: >
      Because no concrete scene is provided, the analysis is explicitly marked
      as a non-concrete case-type-bound projection. Any stronger scenic reading
      would require specified actors, roles, frame, claim, distribution,
      temporality, and evidence.

