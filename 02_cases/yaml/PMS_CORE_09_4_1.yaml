      case_application: >
        Axiomatic mode is used to map the case through Δ–Ψ while preserving
        dependency logic and marking weak or conditional operators rather than
        forcing a full chain.
    - id: "derived_axes_inspection"
      title: "Derived axes mode"
      case_status: "active"
      case_application: >
        Derived axes mode is used only after operator calibration: A, C, R, E,
        and D are projected as formula-derived structures, not as independent
        primitives or diagnostic categories.
    - id: "ai_architecture"
      title: "AI architecture mode"
      case_status: "not_applicable"
      case_application: >
        AI architecture mode is not applicable because the case does not concern
        agent design, software implementation, safety architecture, or
        computational deployment.
  case_answer_to_suggested_questions:
    structural_operators_involved:
      - "Δ active"
      - "∇ weak"
      - "□ active"
      - "Λ weak"
      - "Α weak"
      - "Ω active but dependency-weak"
      - "Θ weak-to-moderate"
      - "Φ active but calibration-sensitive"
      - "Χ active as application constraint"
      - "Σ weak"
      - "Ψ weak"
    asymmetries_and_temporal_trajectories_visible: >
      Ω is visible in the uneven distribution of outcomes, exposure,
      responsibilities, or obligations. Θ is only weakly visible through the
      word "remain"; persistence is suggested but no concrete trajectory,
      accumulation, or delay is evidenced.
    recontextualization_distance_integration: >
      Φ is central as possible reframing of asymmetry as parity; Χ is maintained
      by refusing verdict, diagnosis, and closure; Σ remains weak because verbal
      symmetry does not prove integrated handling of uneven distribution.
    derived_axes_projection: >
      Awareness_A is weak, Coherence_C is weak, Responsibility_R is weak and
      conditional, Action_E is under-specified, and Dignity_in_Practice_D is
      active as an application constraint rather than an ontological claim.
    tentative_calibration_rivalry: >
      The reading remains tentative because no concrete scene is provided. Rival
      readings such as functional asymmetry, formal equality, ideological cover,
      transitional reform, or discourse-conflict may explain the pattern
