schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >
  PMS_1.3-conformant case application for the philosophical case
  "Pseudo-Symmetry." This document applies PMS.yaml as PMS Base. It does not
  redefine PMS Base, introduce new PMS operators, alter dependencies, treat
  derived structures as primitives, or claim PMS Base validation.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "only_pms_base_reference_for_this_chat"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    PMS.yaml has priority over this case application, the prior pre-analysis,
    and the application template. This case analysis is an application of PMS,
    not a revision of PMS.
  referenced_base_sections:
    - pms_entry_condition
    - schema_version
    - schema_meta
    - repository_governance
    - core_principles
    - pms_model_reference
    - derived_structures
    - example_operator_chains
    - computational_representation
    - ai_interface_pms
  application_schema_note: >
    The template is treated as an application schema only. It is not PMS Base.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as strong, formally disciplined, and portable, but not
    final, complete, uniquely ordered, immune to revision, or superior by
    default to rival formalizations.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - theoretical_reflection
      - structural_action_theory
      - anthropology_and_praxeology
      - systems_theory
      - ai_architecture_and_safety
      - model_documentation_and_specification
      - simulation_scaffolding
      - structural_reasoning
    not_intended_for:
      - clinical_diagnosis
      - personality_typing
      - mental_health_risk_assessment
      - automated_moral_judgement
      - individual_person_evaluation
      - forensic_decision_making
      - policy_enforcement
      - irreversible_labeling
  normative_position_alignment:
    ontology: >
      This case analysis makes no PMS-based claim about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological
      dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological application constraint
      on handling asymmetry, not as an ontological or moral ranking of beings.
    tragedy_clause: >
      Structural coherence, integration, responsibility, or maturity does not
      eliminate tragedy, rupture, unresolved tension, or possible non-capture.
    self_binding_clause: >
      The analysis itself remains subject to PMS application discipline:
      Distance (Χ), Self-Binding discipline (Ψ), and Dignity-in-Practice (D)
      must not be suspended to force clarity, authority, resolution, truth, or
      action.
  computational_position_alignment:
    representation_clause: >
      This YAML is a formal encoding of a PMS case reading, not a direct
      implementation of praxis, agency, consciousness, selfhood, subjectivity,
      empirical validity, policy, or enforcement.
    calibration_clause: >
      Operational use would require context-specific calibration, evidence,
      implementation constraints, empirical testing where applicable, external
      evaluation, and public accountability.
    accountability_clause: >
      Formal translation into PMS terms does not itself guarantee public
      intelligibility, intersubjective uptake, empirical adequacy, explanatory
      sufficiency, or external accountability.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars.
  terminology_alignment:
    praxis: >
      Situated meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through
      operator compositions.
    meta_axiom: >
      One of the eleven PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ.
    operator_composition: >
      Ordered or structured application of PMS meta-axioms to generate complex
      praxeological formations.
    derived_construct: >
      A higher-order PMS construct systematically derived from operator
      compositions, not introduced as an independent primitive.
    asymmetry_drift_pattern: >
      A structurally derived PMS distortion pattern; not a diagnosis,
      person-type, clinical category, ontological attribution, or moral verdict.
    repository_reference: >
      PMS.yaml remains the only PMS Base reference for this case application.

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the current repository reference specification for PMS Base.
    This case analysis depends on PMS.yaml and does not revise it.
  this_template_may:
    - depend_on_pms
    - reference_pms_operators
    - define_case_application_structure
    - organize_pms_operators_for_case_analysis
    - specify_case_quality_control
    - support_structural_reasoning
  this_template_must_not:
    - silently_redefine_meta_axioms
    - silently_alter_default_operator_order
    - silently_alter_default_dependency_path
    - present_new_meta_axioms_as_if_already_in_base_pms
    - treat_derived_axes_as_independent_primitives
    - override_application_guardrails_while_claiming_full_pms_conformity
    - claim_pms_base_validation_from_a_case
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >
    Any use of PMS as an application presupposes acceptance of distance (Χ),
    reversibility, and dignity-in-practice (D; a praxeological constraint, not
    ontological worth). This condition applies to application, not to critique,
    refusal, revision, or rejection.
  applies_to: "application_only"
  does_not_apply_to:
    - critique
    - refusal
    - rejection
    - revision_proposals
    - rival_formalization
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >
          Reflective distance is maintained; the analysis does not fuse PMS into
          verdict, urgency, enforcement, closure, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          Structural readings remain revisable, bounded, non-final, and
          non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >
          The analysis maintains enacted restraint under asymmetry and does not
          shame, rank, humiliate, diagnose, or ontologically evaluate persons or
          groups.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      Any application of PMS is itself subject to PMS. Analyses that suspend
      Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in
      order to enforce truth, clarity, authority, resolution, or action are
      formally invalid as PMS applications, even if PMS terminology is retained.
    application_to_this_case: >
      The analysis is self-bound by treating Pseudo-Symmetry as a conceptual
      PMS projection only. It preserves Distance (Χ), keeps all readings
      reversible, avoids person-ranking or tribunal language, does not convert
      resistance or rival framing into drift by default, and treats
      Dignity-in-Practice as an application constraint under asymmetry rather
      than an ontological ranking.
  application_only_boundary:
    status: "active"
    statement: >
      PMS can be criticized, revised, rejected, ignored, or compared with rival
      formalizations without satisfying the PMS entry condition. The entry
      condition governs only applications that claim to use PMS.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, absence, or rival framing must not
      automatically be redescribed as drift, failed integration, incomplete
      calibration, recontextualization, structured absence, or failed maturity.
  no_pms_base_revision:
    status: "active"
    statement: >
      This case does not alter PMS Base, PMS operators, PMS dependencies,
      derived structures, guardrails, or repository governance.

case:
  title: "Pseudo-Symmetry"
  interpretation_type: "conceptual_domain_projection"
  case_type: >
    Philosophical conceptual-domain projection of verbally asserted parity
    under uneven distribution in a relational or institutional setting.
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    The analysis covers only the structural pattern named Pseudo-Symmetry: a
    relational or institutional configuration in which parity is verbally
    asserted while outcomes, exposure, responsibilities, or obligations remain
    unevenly distributed. The scope is PMS-internal and conceptual; it concerns
    how PMS operators can be calibrated to this pattern without treating the
    pattern as a concrete scene.
  non_scope: >
    The analysis does not claim metaphysical proof, phenomenological
    completeness, diagnostic assessment, legal or forensic judgment, clinical
    validity, empirical validation, implementation validity, moral ranking,
    person-ranking, institutional guilt, or PMS Base validation. It also does
    not claim that every uneven distribution is pseudo-symmetry or that PMS
    exhausts the phenomenon.
  non_goals:
    - metaphysical_proof
    - diagnostic_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - irreversible_labeling
    - pms_base_validation
  case_typing_note: >
    This is not a concrete praxis scene. The case material names a pattern-type
    rather than specifying actors, evidence, temporal sequence, institutional
    records, enforceable norms, or observed action. The PMS reading therefore
    remains bounded, reversible, non-diagnostic, non-tribunal, and open to rival
    formalizations.

