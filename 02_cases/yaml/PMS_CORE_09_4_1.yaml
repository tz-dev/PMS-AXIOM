  developmental_trajectory:
    formula:
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory is weak: "remain unevenly distributed" suggests
      persistence, but the case lacks sequence, accumulation, delay,
      anticipation, or role-development evidence.
    status: "weak"
  reflexive_praxis:
    formula:
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >
      Reflexive praxis is active primarily as an application requirement: Χ
