  case_status: Awareness_A is active as structural monitoring differentiation; Coherence_C is weak-to-active and must not be treated as validation;
    Responsibility_R is weak and conditional on specified accountable roles or governance self-binding; Action_E is under-specified because no concrete
    enactment is supplied; Dignity_in_Practice_D functions as an application constraint; SELF_FIXPOINT is analytic-only; AD_A>>E and AD_Sigma_low
