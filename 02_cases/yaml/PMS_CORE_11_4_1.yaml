ai_interface_pms_alignment:
  welcome_message: 'This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic, non-clinical, non-forensic, non-prescriptive,
    and does not rank persons.'
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect the case through the Δ–Ψ operator inventory, dependency order, and derived formulas without
      adding operators or claiming PMS Base validation.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis.
    case_status: active
    case_application: Derived axes mode is used to project A, C, R, E, and D only as formula-derived structures and to mark weak or under-specified
      statuses where the case lacks concrete scene evidence.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing systems.
    case_status: not_applicable
    case_application: AI architecture mode is not applied as an implementation claim. The quantum-computing workflow may be computationally described,
      but this analysis does not design, certify, or implement an architecture.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice (D),
      and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ with Σ and Ψ treated as conditional or weak where concrete integration and self-binding are not specified
    asymmetries_and_temporal_trajectories_visible: Ω appears as possible imbalance between workflow execution, technical opacity, review access,
      authority to halt, and downstream exposure; Θ appears strongly in iteration depth, repetition limits, audit history, monitoring sequence,
      delay, and retrospective review.
    recontextualization_distance_integration: Φ appears when outputs and traces are moved from execution into governance review; Χ requires that
      the workflow and its trace not validate themselves; Σ is only weak-to-active because integration of controls is required but not concretely
      specified.
    derived_axes_projection: Awareness_A is active as structural monitoring differentiation; Coherence_C is weak because coherence is not validation;
      Responsibility_R is weak and conditional; Action_E is under-specified; Dignity_in_Practice_D is an application constraint.
    tentative_calibration_rivalry: The reading remains tentative because no concrete workflow, evidence, roles, thresholds, trace format, review
      procedure, or validation criteria are supplied. Rival technical verification, software assurance, formal-methods, institutional accountability,
