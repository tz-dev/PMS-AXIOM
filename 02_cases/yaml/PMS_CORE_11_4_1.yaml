derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ enables distinctions in the field.
    - □ frames distinctions as situationally relevant.
    - Θ maintains these framed distinctions over time.
    notes: 'Awareness is modeled structurally, not phenomenologically. Within PMS it can be systematically derived from this operator sequence, but
      this does not imply that all notions of awareness are exhausted by it.'
    case_reading: 'Awareness_A appears as sustained, framed differentiation across time: the governance scheme must distinguish run state, iteration
      depth, trace status, limit status, review status, and validation status throughout the workflow history.'
    status: active
    calibration_points:
    - What is differentiated is execution, iteration, trace, review, halt, and validation; the frame is non-self-validating workflow governance;
      the temporal structure is repeated computation and later audit or review.
    non_capture_note: 'Structural awareness is not phenomenological consciousness.'
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Temporally stabilized structuring of impulse and expectation within a frame.
    generative_reasoning:
    - ∇ introduces directional impulse.
    - □ constrains and structures the impulse.
    - Λ encodes expectations and meaningful non-events.
    - Θ temporalizes the configuration into trajectories.
    notes: 'Coherence captures narrative stability of action, including meaningful absences and delays, without yet requiring full integration or self-binding.
      Rival theories may formalize coherence differently.'
    case_reading: Coherence_C is weak-to-active because directed workflow pressure, governance frame, expected trace or review events, possible
      non-events, and temporal sequence can stabilize a coherent governance narrative. This coherence does not prove correctness, compliance, or
      adequacy.
    status: weak
    calibration_points:
    - Coherence must be distinguished from technical truth, empirical validity, legal sufficiency, implementation adequacy, and forced PMS smoothing.
    non_capture_note: 'Coherence does not prove adequacy.'
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding orientation toward asymmetry extended across time and recontextualization.
    generative_reasoning:
    - Ω creates structural imbalance in exposure, capacity, or obligation.
    - Θ extends this imbalance into enduring commitments.
    - Φ allows reinterpretation of obligations under changing conditions.
    - Ψ binds the agent to these obligations as part of its self-relation.
    notes: 'Responsibility is structural rather than moralistic in this specification. It is formally derived within PMS, not asserted as the only valid
      theory of responsibility.'
    case_reading: Responsibility_R is weak and conditional. It becomes structurally legible only if asymmetry, temporally extended obligation, review
      recontextualization, and durable governance self-binding are specified by actors, roles, institutions, or procedures.
    status: weak
    calibration_points:
    - Before claiming Responsibility_R, the analysis must identify who or what has review authority, exposure, obligation, capacity to halt, and
      commitment to constraints across time.
    non_capture_note: 'Responsibility_R is not moral blame, diagnosis, or legal liability.'
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ provides energetic directedness.
    - Θ structures this directedness as a trajectory rather than a momentary reaction.
    - Σ integrates conflicting impulses, constraints, and roles into a coherent enactment.
    notes: 'Action here is not any behavior; it is integrated and temporally extended. Higher operators such as Ω, Φ, and Ψ may enrich it, but are
      not required for its minimal structural definition within PMS.'
    case_reading: Action_E is under-specified because the case names governance concerns but supplies no concrete workflow enactment, decision,
      intervention, halt, review outcome, or integrated action plan.
    status: under_specified
    calibration_points:
    - Action must be distinguished from conceptual schema, audit language, execution trace, or abstract governance aspiration.
    non_capture_note: 'Without a concrete scene, Action_E may remain under-specified.'
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-bound reflective restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: 'Dignity-in-practice is a structural stance in action. It concerns how asymmetry is handled, not the ranking of persons or ontological worth.'
    case_reading: 'Dignity_in_Practice_D constrains the application by requiring reflective restraint under asymmetry: no shaming, person-ranking,
      irreversible labeling, tribunal posture, or automatic conversion of non-fit into PMS failure.'
    status: application_constraint
    calibration_points:
    - Asymmetry is handled as structural exposure, capacity, obligation, or review-access imbalance without moralized ranking or ontological evaluation.
    non_capture_note: 'D is a praxeological application constraint, not an ontological or moral superiority claim.'
