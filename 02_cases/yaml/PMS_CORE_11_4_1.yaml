core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: 'PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological
      essences.'
    status: satisfied
    case_application: 'The case is treated as a structure of governed praxis: workflow execution, iteration, tracing, monitoring, review, and restraint.
      No person essence, psychology, or ontology is analyzed.'
    failure_condition: 'The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings.'
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: 'The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis. Whether they are fully
      complete, optimally minimal, or uniquely ordered remains open to further formalization and critique.'
    status: satisfied
    case_application: Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ is used as PMS operator vocabulary. No additional operator,
      axis, layer, or PMS primitive is introduced.
    failure_condition: 'The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged to PMS Base.'
  P3_generativity:
    id: P3
    title: Generativity
    base_text: 'PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action, dignity-in-practice,
      and asymmetry drift patterns can be systematically derived within PMS from operator compositions rather than introduced as independent primitives.'
    status: satisfied
    case_application: Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and drift risks are treated
      only as formula-derived PMS structures, not as independent axioms.
    failure_condition: 'The analysis would fail P3 if derived structures were treated as independent axioms.'
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: 'Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, maturity, and dignity-in-practice
      are analyzed under temporal and asymmetrical conditions rather than as static attributes.'
    status: satisfied
    case_application: Θ is central because iteration depth, repetition limits, monitoring, and review unfold across time. Ω is active but calibration-sensitive
      because workflow opacity, review capacity, delegated authority, and downstream exposure may create structural imbalance.
    failure_condition: 'The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without calibration.'
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: 'PMS may be represented computationally, but representation does not by itself imply direct implementation, guaranteed interoperability,
      or explanatory adequacy. Operational use requires calibration, constraints, and evaluation.'
    status: satisfied
    case_application: The YAML rendering and PMS projection do not implement, validate, test, or certify the quantum-computing workflow. Operational
      use would require architecture-specific calibration, empirical testing where relevant, computational verification where relevant, and external
      evaluation.
    failure_condition: 'The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational sufficiency.'
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: 'PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models, or more empirically
      grounded formalisms remains methodologically open.'
    status: satisfied
    case_application: Rival readings remain open, including technical verification, software assurance, epistemology of validation, institutional
      accountability, formal-methods, and automation-governance formalisms.
    failure_condition: 'The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default.'
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: 'Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms of praxis may remain only partially
      legible or may resist assimilation within the current grammar.'
    status: satisfied
    case_application: Technical correctness, statistical adequacy, legal admissibility, compliance, actual trace reliability, and architecture-specific
      governance may remain outside PMS capture and must not be automatically redescribed as PMS drift or incomplete integration.
    failure_condition: 'The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure.'
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: 'PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions.'
    status: satisfied
    case_application: The case is non-diagnostic. It does not infer pathology, traits, maturity, competence, risk profile, intention, or clinical
      status for any person or group.
    failure_condition: 'The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.'
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: 'Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global person-labels and
      irreversible ontological attributions are out of scope.'
    status: satisfied
    case_application: Because no concrete scene is supplied, the analysis remains case-type-bound to the conceptual governance problem and does
      not generate decontextualized or irreversible claims.
    failure_condition: 'The analysis would fail P9 if it generated global, irreversible, decontextualized claims.'
