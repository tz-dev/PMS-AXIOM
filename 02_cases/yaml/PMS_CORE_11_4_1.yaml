guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: Workflow iteration, audit, and review are analyzed as structural praxis relations, not as psychological states, intentions,
      desires, or traits.
    non_metaphysical: No claim is made about consciousness, subjectivity, ontology, or metaphysical status of the quantum-computing workflow.
    non_diagnostic: No diagnostic, clinical, therapeutic, maturity, competence, pathology, or person-level assessment is made.
    non_legal_forensic: Audit traces and governance structures are not treated as legal evidence, forensic sufficiency, compliance, liability,
      negligence, or admissibility determinations.
    non_implementation_claim: The analysis does not implement, certify, validate, or specify a quantum-computing architecture, software system,
      audit mechanism, or governance procedure.
    non_moral_ranking: Asymmetry is treated structurally and does not rank persons, groups, reviewers, developers, users, institutions, or workflows
      as morally superior or inferior.
    non_exhaustive_capture: Technical, empirical, legal, organizational, and rival-theoretical dimensions may remain outside PMS and must not be
      forced into PMS drift or incomplete integration.
    reversibility: Every operator status remains revisable if a concrete workflow, trace format, review process, empirical evidence, or rival formalization
      changes the case conditions.
    dignity_in_practice: Dignity-in-Practice is preserved by maintaining restraint under asymmetry, avoiding tribunal posture, refusing person-ranking,
      and keeping non-capture and rival readings open.
limits:
- The PMS reading is limited to a structural conceptual projection of workflow governance and does not establish that any quantum-computing workflow
  is safe, correct, validated, or well governed.
- The analysis makes no empirical, metaphysical, diagnostic, clinical, legal, forensic, or implementation claim and does not validate PMS Base.
- Rival technical, formal, institutional, legal, and epistemological readings remain open; PMS translation does not defeat them by default.
- The case strongly fits PMS vocabulary, creating high coherence risk; this smoothness must be constrained by discrimination tests, falsifiers,
  Χ, and non-capture.
case_synthesis:
  primary_pms_reading: The case is best read as a PMS-structured governance problem in which iteration depth, repetition, audit traces, and review
    require Χ-mediated separation between workflow operation and validation, supported by □, Θ, Λ, Α, Ω, Φ, and only conditionally by Σ and Ψ.
  continuity_condition: Continuity holds only if the governance frame consistently distinguishes iteration, trace, review, halt, and validation
    across repeated workflow time.
  change_condition: Change occurs when outputs and traces are recontextualized from execution into governance review without becoming retrospective
    rationalization.
  rupture_or_non_fit_condition: Rupture, resistance, disagreement, missing trace, unresolved absence, or rival framing must remain possible non-capture
    or under-specification and must not be automatically redescribed as drift, failed integration, incomplete calibration, or maturity failure.
  responsibility_condition: Responsibility is only weak and conditional unless asymmetry, review authority, obligation, temporal commitment, and
    governance self-binding are concretely specified.
  dignity_condition: Dignity-in-Practice constrains the analysis by requiring reflective restraint under asymmetry and forbidding tribunal posture,
    person-ranking, ontological claims, or irreversible labels.
  rival_reading_condition: Rival formalizations remain open unless explicit comparison criteria and case-specific evidence show that the PMS reading
    discriminates better without over-assimilation.
