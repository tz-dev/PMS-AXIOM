analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - case_type_bound_structural_reading
    - pms_internal_dependency_inspection
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: This permits a bounded PMS structural projection of the governance problem. It does not permit empirical findings, implementation
      certification, legal or forensic judgment, diagnostic assessment, metaphysical claim, clinical claim, or PMS Base validation.
  coherence_risk:
    status: high
    reason: The case fits PMS very smoothly because iteration, audit trace, review, distance, temporality, and self-binding map readily onto Δ–Ψ.
      That smoothness creates a risk of under-discrimination, especially if trace, governance coherence, PMS coherence, and validation are collapsed.
      The danger is not that the PMS reading is incoherent, but that it may become too elegant: it may appear to explain governance merely by naming
      the right operators.
    mitigation: The reading is constrained by explicit non-capture zones, rival formalizations, falsifier conditions, operator calibration, refusal
      to claim implementation or empirical validity, and the requirement that Χ separate workflow operation from validation. The analysis also
