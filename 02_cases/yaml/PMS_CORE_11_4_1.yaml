  model_name: Praxeological Meta-Structure
  model_short: PMS
  pms_status: repository_reference
  pms_maturity: draft
  repository_role: current_base_schema
  epistemic_status: 'PMS_1.3 is treated as strong, formally disciplined, and portable, but not final, complete, uniquely ordered, or immune to
    revision.'
  description_alignment: 'The case is analyzed through PMS as a structural, non-phenomenological, non-psychological, non-clinical, non-diagnostic,
