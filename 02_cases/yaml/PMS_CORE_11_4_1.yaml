operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Δ is active in the distinctions between workflow execution and workflow review, iteration and termination, audit trace and validation,
      internal output and external accountability, repetition and drift, and structural constraint and self-confirmation.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The decisive distinctions are execution versus validation, trace production versus trace review, iteration depth versus governance adequacy,
      and internal coherence versus accountable acceptance.
    - The analysis must not conflate logging with justification, repetition with reliability, or PMS structural fit with external validity.
    falsifier_conditions:
    - If these distinctions cannot be maintained in the concrete workflow or formal case, the PMS reading loses its structural entry point.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ is active as workflow-directedness; pressure toward computation, iteration, optimization, convergence, repetition, result production,
      or continued execution under a governance frame. It is not read as subjective desire.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - 'The tension is structural and procedural: the workflow tends toward further runs, deeper iteration, or result completion once differences such
      as incomplete output or uncertainty are framed.'
    - No psychological desire, intention, or agency is inferred from the quantum-computing workflow.
    falsifier_conditions:
    - If the case specifies no directed workflow pressure, optimization, repetition, or execution-orientation, ∇ should be reduced to weak or removed
      from the primary reading.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: '□ is central as the governance frame that constrains the workflow: iteration limits, repetition thresholds, audit expectations,
      monitoring conditions, review requirements, stopping criteria, and the boundary between internal process and accountable validation.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'The active frame is workflow governance under non-self-validation: limits and review must stand outside mere workflow continuation.'
    - Any shift from technical-execution frame to governance-review frame must be marked rather than silently absorbed.
    falsifier_conditions:
    - If no governance frame, review frame, or constraint frame is specified, the analysis becomes too abstract to discriminate the case from any
      iterative process.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Λ is active where expected governance events may be absent, delayed, or untriggered: missing audit trace, missing review, absent stop
      condition, absent external validation, unresolved expected occurrence, or lack of interruption despite repetition.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'The expected occurrence must be named by the frame: trace production, trace review, halt, repetition-limit enforcement, or external validation.'
    - An absence is not automatically a defect or PMS drift; it becomes Λ only when the governance frame makes that non-occurrence structurally
      meaningful.
    falsifier_conditions:
    - If the case never specifies or implies an expected governance event, Λ must be marked weak rather than asserted.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is active as recurrence and stabilization in repeated workflow runs, iteration-depth routines, repeated trace production, repeated
      review cycles, or normalized non-review patterns.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Recurrence must be shown as a stabilized workflow pattern, such as repeated iteration under a rule or repeated reliance on logs, rather than
      merely the word 'repetition'.
    - A stable attractor must be distinguished from accidental aggregation of isolated runs.
    falsifier_conditions:
    - If the workflow is a single non-repeated event with no stabilization or recurrence, Α is over-read.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is active but calibration-sensitive as possible structural imbalance between workflow execution and external review, technical
      opacity and governance authority, those able to inspect the trace and those exposed to outputs, or automated process and accountable decision-maker.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - 'The direction and kind of asymmetry must be specified: capacity to inspect, capacity to halt, exposure to outputs, authority to validate,
      or obligation to review.'
    - Ω is not blame and not moral ranking; it marks directional imbalance in capacity, exposure, obligation, or review access.
    - If the concrete scene supplies no such imbalance, Ω must remain weak or be removed.
    falsifier_conditions:
    - If no directional imbalance of power, capacity, exposure, obligation, or review access is identifiable, Ω claims must be removed or marked
      weak.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is central because iteration depth, repetition limits, trace production, monitoring, delayed review, retrospective audit, and
      cumulative workflow history are temporal structures.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must distinguish single-run event, repeated trajectory, cumulative depth, delayed review, and review that still can or cannot
      affect action.
    - Temporality is essential here because audit traces and iteration limits are meaningful only across sequence, persistence, delay, and retrospective
      inspection.
    falsifier_conditions:
    - If the case is reduced to a static parameter choice with no sequence, delay, persistence, repetition, or review timing, Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is active when workflow outputs, traces, and iteration histories are placed into a governance-review frame rather than remaining
      within the execution frame.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The source frame is internal workflow execution; the target frame is external governance review, audit interpretation, and accountability-bound
      constraint inspection.
    - Recontextualization must clarify conditions of review and cannot merely redescribe a workflow result as acceptable because the workflow produced
      it.
    falsifier_conditions:
    - If every anomaly, missing trace, failed halt, or rival framing is absorbed as successful recontextualization, the reading becomes over-assimilative.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is decisive as reflective distance from workflow outputs, repetitions, audit traces, internal coherence, and PMS coherence.
      It requires separation between execution and validation. In this case, Χ is the main protection against circular governance, because neither
      a completed run, repeated iteration, convergence, audit logging, nor a smooth PMS mapping may count as sufficient validation by itself.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis suspends empirical, legal, implementation, and PMS Base validation verdicts and preserves reversibility.
    - Distance here is not avoidance or empty neutrality; it is the structural requirement that review can interrupt, reinterpret, or reject workflow
      self-confirmation.
    - The strongest Χ test is whether a review structure can say no to the workflow despite traceability, repetition, internal coherence, or
      attractive results.
    falsifier_conditions:
    - If the workflow, audit trace, or PMS derivation is treated as self-validating, Χ is compromised and the PMS application becomes invalid or
      overclaimed.
    - If distance becomes merely nominal while the workflow's own outputs determine the standards of validation, the Χ reading is too weak.
    non_capture_note: 'Distance protects against overclaiming and premature closure. It also protects against treating PMS coherence as equivalent
      to practical, empirical, legal, or implementation adequacy.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is weak-to-active as possible coordination among iteration-depth rules, repetition limits, audit traces, monitoring, review
      criteria, stopping conditions, and accountability structures. It is not established merely because the case contains several governance
      terms. Integration would require that these controls constrain one another in a coherent reviewable procedure rather than appearing as parallel
      artifacts.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Integration must be tested by coordination among controls, not by the mere presence of many governance artifacts.
    - Σ must be distinguished from forced coherence, procedural accumulation, or smoothing over unresolved non-fit.
    - A strong Σ claim would require evidence that iteration depth, repetition limits, audit trace semantics, monitoring, review authority, and
      stopping rules are mutually connected and practically enforceable.
    falsifier_conditions:
    - If PMS coherence, audit coherence, or governance vocabulary is treated as proof of adequacy, Σ is overclaimed.
    - If controls exist but do not constrain one another, Σ should remain weak or under-specified.
    non_capture_note: 'PMS coherence is insufficient by itself. Apparent integration must remain open to rival technical, institutional, legal,
      and computational assessments.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is conditional and weak-to-active only if the governance regime binds itself across time to non-self-validation, limits, review
      obligations, and stable constraint enforcement. It is not attributed as machine selfhood or consciousness. In this case, Ψ can only mean
      durable constraint fidelity by a governance procedure, institution, policy, or accountable review regime, not inner commitment by the workflow.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - 'Ψ applies only as governance self-binding or analytic self-binding: stable commitment to constraints across time by a regime, institution,
      policy, or accountable procedure.'
    - The workflow itself is not treated as a literal subject, and no structural self-model claim is made for quantum computation.
    - The main Ψ question is what prevents the governance regime from suspending or revising its own limits whenever repeated workflow output looks
      attractive, useful, efficient, or internally coherent.
    falsifier_conditions:
    - If no durable self-binding rule, institution, policy, or cross-time commitment exists, Ψ remains analytic-only or under-specified.
    - If the workflow is described as self-binding without an explicitly scoped structural or institutional meaning, the analysis overclaims Ψ.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity. In this case it remains analytic-only
      unless a concrete governance regime supplies evidence of durable self-binding across time.'
