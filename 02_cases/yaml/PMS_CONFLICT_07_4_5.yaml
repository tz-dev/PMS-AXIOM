pms_conflict_overlay_application:
  schema_version: PMS-CONFLICT_1.1
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-CONFLICT.yaml
  paper_source_file: PMS-CONFLICT.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3

  overlay_metadata:
    model_name: PMS–CONFLICT Application Profile
    model_short: PMS-CONFLICT
    status: production_overlay
    repository_role: paper_specific_application_overlay
    epistemic_status: >
      This specification records the current paper-specific application overlay for PMS-CONFLICT.
      It is intended to be formally disciplined, portable, and fully subordinate to PMS_1.3, but not
      final, complete, uniquely ordered, or immune to revision.
    last_updated: "2026-04-11"
    authors:
      - name: T. Zöller
        role: originator
      - name: ChatGPT (GPT-5.4 Thinking)
        role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      repository_role: current_base_schema
    paper_source:
      title: PMS–CONFLICT
      subtitle: Conflict as Stabilized Incompatibility Under Binding, Time, Cost, and Exposure
      source_file: PMS-CONFLICT.md
    description: >
      PMS-CONFLICT is an application profile for PMS that formalizes the conflict lens: how incompatibility
      stabilizes once binding persists, trajectories accumulate, distance/exit becomes priced or asymmetric,
      and exposure converts description into pressure. The profile expresses the paper strictly in
      the canonical PMS operator grammar Δ–Ψ, without redefining operators or altering dependencies.
      It provides reduced signatures, core drift classes, scale/cost overlays, non-operator constructs,
      and reusable safety interfaces for application-bound contexts.

  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: "completed PMS Core case YAML: Structural injustice"
    rule: >
      This CONFLICT block is appended to or integrated with an already completed PMS Core v1.3 case
      artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies,
      change derived structures, or treat CONFLICT constructs as PMS Base.
    preserved_core_elements:
      - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
      - PMS operator order and dependency hygiene
      - PMS derived structures as derived, not primitive
      - PMS application guardrails
      - PMS non-diagnostic and non-person-ranking discipline
      - PMS non-capture and rival-openness discipline
    integration_rule: >
      The CONFLICT overlay may add visibility for stabilized incompatibility, binding collision, asymmetry
      lock-in, exposure capture, dignity collapse, priced or asymmetric distance, terminal regime
      positioning, publicness, misuse gradients, and downstream docking. It must not modify the completed
      PMS Core case except where a direct PMS.yaml inconsistency has been separately identified.
    case_specific_inheritance_rule: >
      Every CONFLICT statement in this overlay inherits the completed Core case boundaries: the case is
      not a concrete praxis scene, not empirical, not metaphysical, not diagnostic, not clinical, not
      legal or forensic, not implementation-ready, and not PMS Base validation. The overlay may therefore
      mark only conceptual conflict visibility, threshold conditions, and transfer risks unless additional
      concrete evidence is supplied.
    no_core_rewrite_clause: >
      The Core pass remains intact. Where the CONFLICT overlay uses terms such as terminality, exposure
      capture, binding collision, dignity collapse, or asymmetry lock-in, these terms are case-specific
      overlay readings and do not revise any PMS Core operator, dependency, derived structure, claim type,
      or validity gate.

  overlays:
    P:
      name: Publicness Overlay
      is_operator: false
      amplifies:
        - Ω
        - Θ
        - Α
        - Φ
      note: >
        Amplification only. Higher publicness increases exposure coupling and raises the cost of revision.
        It introduces no new operators.
      case_application: >
        Publicness does not amplify a concrete conflict configuration in the case material itself because
        the case remains a private, descriptive, conceptual-domain projection. No public, institutional,
        media-amplified, archival, administrative, or person-near circulation is supplied. P therefore
        remains inactive as an internal amplifier and active only as a transfer-boundary warning.
      transfer_boundary: >
        P would become materially relevant if the structural-injustice reading were excerpted, published,
        institutionalized, archived, attached to persons or groups, or circulated in a setting where
        interpretive frames harden into record-like consequences. Under those conditions, Ω, Θ, Α, and Φ
        could become amplified because publicness increases exposure, stabilizes role assignment, raises
        revision costs, and can convert recontextualization into durable framing.
      misuse_boundary: >
        Publicness must not be treated as epistemic improvement by itself. A public reading may become
        more consequential without becoming more accurate. Any move into publicness would require renewed
        declaration of mode, publicness level, misuse gradient, reversibility status, and red-zone exposure.

    MG:
      name: Misuse Gradient / Transmission Risk
      is_operator: false
      amplifies:
        - Ω
        - Θ
      note: >
        Classification of predictable misuse risk when operator language travels through excerpt dynamics,
        audience coupling, or enforcement affordances. Not an operator.
      case_application: >
        Misuse-gradient relevance is low inside this bounded descriptive application and mixed only if the
        YAML is extracted into public, institutional, governance, legal, administrative, clinical, or
        person-near contexts. The main predictable misuse is converting structural-injustice legibility
        into blame, sanction logic, person-labeling, tribunal framing, institutional sorting, or PMS Base
        validation, all of which are explicitly blocked.
      current_risk_profile:
        diagnostic_misuse: blocked
        person_ranking_misuse: blocked
        legal_forensic_misuse: blocked
        clinical_misuse: blocked
        governance_misuse: blocked
        implementation_misuse: blocked
        public_exposure_misuse: not_active_but_transfer_sensitive
        pms_base_validation_misuse: blocked
        moral_tribunal_misuse: risk_only_and_blocked
        sanction_logic_misuse: blocked
      transmission_note: >
        MG tracks the transmission conditions under which a structurally valid description may become
        pragmatically harmful or invalid as a PMS application. A low-risk private reading can become
        higher-risk if copied into a durable public record, attached to a party, used for evaluation, or
        treated as an enforcement affordance.

  nested_overlay_policy:
    no_base_extension: true
    rule: >
      PMS-CONFLICT introduces overlay-level constructs only: reduced signatures, drift classes, scale
      matrices, publicness/misuse overlays, and non-operator conflict constructs. These organize existing
      PMS operators. They never replace PMS generativity with explanation, never bypass Ω, Θ, or Χ,
      and never become PMS operators or dependencies.
    non_operator_constructs:
      - Publicness Overlay P
      - Misuse Gradient MG
      - conflict attractor
      - binding collision
      - asymmetry lock-in
      - exposure capture
      - dignity collapse
      - terminal regime
      - downstream docking
      - scale matrices
      - reduced conflict signatures
    reduced_signature_rule: >
      Reduced signatures are overlay shorthand only. They do not replace PMS formulas, do not erase
      omitted dependencies, and do not authorize shortcuts through PMS order. A reduced Χ-bearing
      signature still presupposes PMS Χ dependency on Φ, Θ, and □. A reduced Ψ-bearing signature still
      presupposes Σ, Θ, and Χ. A reduced Σ-bearing signature still presupposes Χ and Φ.
    mode_shift_rule: >
      Any move from descriptive overlay visibility into governance, legal evaluation, institutional
      decision, policy design, clinical use, computational deployment, public classification, sanction
      logic, or intervention design is a mode shift. Such a shift is not automatically licensed by
      PMS-CONFLICT and would require new claim typing, evidence, accountability, and domain-specific
      validation.

  validity_gate:
    status: passed
    gate_type: PMS_application_only
    note: >
      This gate constrains PMS application only, not critique, refusal, rejection, or revision proposals.
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: >
          Reflective distance is maintained. The CONFLICT overlay does not fuse the case into verdict,
          urgency, enforcement, solution, closure, institutional action, or person-level attribution.
          Χ remains an active restraint on the analysis itself.
      reversibility:
        id: reversibility
        status: maintained
        meaning: >
          Readings remain scene-bound, case-type-bound, revisable, and non-final. The overlay does
          not produce global person labels, irreversible labels, final judgments, terminal classifications,
          legal conclusions, or governance warrants.
      Dignity_in_Practice_D:
        id: D
        name: Dignity-in-Practice
        status: maintained
        meaning: >
          Enacted restraint under asymmetry is preserved. The overlay does not shame, rank, humiliate,
          diagnose, sanction, expose, sort, or ontologically evaluate persons or groups. Structural
          injustice and conflict-legibility are not converted into guilt, moral inferiority, moral
          superiority, contamination, maturity failure, or defect.
    pms_entry_condition_ref: PMS.yaml#/pms_entry_condition
    gate_result: valid_as_conflict_overlay_application
    failure_conditions:
      - The overlay would fail if it treated PMS-CONFLICT as PMS Base.
      - The overlay would fail if it changed PMS operator dependencies.
      - The overlay would fail if it used reduced signatures as independent formulas.
      - The overlay would fail if it converted weak Σ into integration failure without concrete evidence.
      - The overlay would fail if it converted weak Ψ into binding collision without specified binders.
      - The overlay would fail if it transformed descriptive conflict visibility into sanction logic.
      - The overlay would fail if it treated structural injustice as diagnosis, person-type, or moral ranking.
      - The overlay would fail if it used terminality as finality or as a warrant for ending rival analysis.

  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
    dependency_hygiene_note: >
      Any use of Χ in reduced signatures is shorthand only. In PMS, Χ depends on Φ, Θ, and □. Reduced
      signatures do not negate prerequisites or alter the default dependency path recorded in PMS_1.3.
      Any use of Σ preserves the dependency on Χ and Φ. Any use of Ψ preserves the dependency on Σ,
      Θ, and Χ. Reduced signatures do not permit the overlay to bypass PMS dependency hygiene.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  conflict_overlay_scope:
    scope_guardrails:
      - Non-metaphysical, non-clinical, non-diagnostic.
      - No person-level judgment, no ranking, no sanction logic.
      - Describes structural regimes and operator drift under load.
      - No procedure manual: no intervention scripts, no solutions section.
      - Bounded to this grammar; no monopoly claim over conflict intelligibility as such.
    may_add_visibility_to:
      - stabilized incompatibility
      - binding collisions under Ψ
      - Σ-failure or Σ-incompatibility under load
      - asymmetry gradients under Ω
      - temporal hardening under Θ
      - priced or asymmetric distance under Χ
      - conflict attractor stabilization under Α
      - exposure capture under Ω/Θ/Φ with publicness amplification
      - dignity collapse under Ω/Θ/Χ/Ψ pressure
      - young Α-field dynamics
      - institutionalized distance regimes
      - application-boundary and misuse-gradient red zones
      - terminal regime positioning
      - downstream docking into governance or evaluation layers
    must_not_do:
      - treat conflict as personal essence
      - treat incompatibility as diagnosis
      - translate conflict legibility into verdict
      - produce intervention scripts or solution procedures
      - convert Σ-failure into moral failure
      - convert Ω-gradient into authority claim
      - convert publicness into enforcement warrant
      - convert terminality into finality
      - treat downstream governance as continuation of PMS-CONFLICT
      - claim PMS Base validation
    case_specific_scope_clarification: >
      CONFLICT is not used here as a severity amplifier. The case "Structural injustice" is structurally
      conflict-relevant because it can involve incompatible framings of agency, harm, responsibility,
      and institutional history. Yet the supplied material is abstract, so the overlay mostly marks
      thresholds not yet crossed: no concrete binding collision, no terminal regime, no priced Χ, no
      active exposure capture, no public hardening, no downstream docking, and no established conflict
      attractor.

  paper_lens:
    methodological_boundedness:
      status: active
      note: >
        PMS-CONFLICT develops a structural grammar of stabilized incompatibility under binding, asymmetry,
        and temporality. It does not claim to exhaust everything conflict is or could become under
        other analytical grammars.
      constraints:
        - Conflict legibility here is internal to the PMS grammar.
        - Terminality here names the end of reintegration resources within this grammar.
        - Where classification and attractor logic preserve coherence, non-capture remains open.
      case_application: >
        The case remains bounded to PMS-CONFLICT as an overlay lens on the already completed PMS Core
        analysis. The overlay may make stabilized incompatibility, asymmetry pressure, temporal hardening,
        exposure risks, and misuse boundaries more visible, but it does not turn structural injustice
        into a conflict essence and does not claim that rival moral, legal, political, empirical,
        phenomenological, or metaphysical conflict grammars are derivative, immature, incomplete, or
        defeated. The overlay is methodologically useful precisely because it marks what the Core pass
        did not and could not establish: concrete stabilized incompatibility, concrete binding collision,
        concrete terminality, concrete public exposure, and concrete downstream governance transition.

    scope_limit_of_tragic_legibility:
      status: weak
      note: >
        The tragedy clause should not be read as an inflationary claim that mature conflict is always
        or finally tragic. Its narrower claim is that tragedy remains structurally possible even under
        maintained distance, reflexivity, and responsibility constraints, and that some conflicts
        become more legible without becoming more integrable.
      openings:
        - Not every hard conflict is tragic in the strong sense developed here.
        - Tragic legibility does not eliminate rival conflict grammars.
      case_application: >
        The case is conflict-legible only in a weak conceptual sense: structural injustice can involve
        incompatible frames of agency, responsibility, harm, causation, institutional history, recognition,
        and distribution. It is not tragically legible in the strong PMS-CONFLICT sense because no concrete
        stabilized incompatibility, binding collision, priced distance, or failed reintegration scene is
        supplied. Strong tragic legibility would require more than philosophical disagreement. It would
        require a scene in which competing obligations, frames, or self-bindings cannot be integrated
        without remainder under sustained asymmetry and time, while distance itself becomes costly,
        asymmetric, or insufficient. That threshold is not met.

    core_definition:
      conflict_domain_layer:
        is_operator: false
        applicability: weak
        definition: >
          Within this descriptive architecture, CONFLICT names a terminal descriptive regime in which
          incompatibility is stabilized under binding, temporality, asymmetry, and costly or asymmetric
          distance. The model increases legibility of this regime but does not generate an additional
          internal operator that restores integrability once Σ no longer carries under Θ/Ω with priced
          or asymmetric Χ.
        minimal_operator_touchpoints:
          - Σ
          - Ψ
          - Ω
          - Θ
          - Χ
        case_application: >
          The case does not reach the conflict-domain layer as an established regime. Σ is weak in the
          Core pass rather than failed under concrete load. Ψ is conditional and under-specified because
          no self-binding bearer is supplied. Ω and Θ are conceptually central because structural injustice
          concerns asymmetry and historical arrangement. Χ is maintained as application discipline rather
          than shown as priced or asymmetric exit. The layer is therefore weak and threshold-bound, not
          active as a case finding.

    terminal_positioning:
      applicability: not_applicable
      terminal_stack_claim: >
        Within the PMS-domain stack developed here, CONFLICT functions as the terminal domain layer:
        beyond maximal Δ–Ψ load under Θ/Ω/Χ, the model yields no further internal reintegration grammar —
        only downstream governance, institutionalization, decision, or evaluation.
      structural_full_stop_sentence: >
        This paper does not continue into solutions. It ends where praxis becomes tragically legible but
        no longer integrable within this descriptive pathway.
      terminality_without_finality: >
        Terminality here is stack-internal and grammar-internal. It does not claim that conflict as such
        admits no further analysis, only that this operator grammar does not generate an additional
        internal reintegration layer once Σ has failed under sustained Θ/Ω/Ψ with costly or asymmetric Χ.
      case_application: >
        Terminal positioning is not applicable as a case finding. The abstract case provides no praxis
        scene in which Σ fails under sustained Θ/Ω/Ψ with costly or asymmetric Χ. Terminality must not be
        used as dramatic seriousness-language. Structural injustice may be serious, tragic, urgent, or
        politically consequential under other frameworks, but PMS-CONFLICT terminality has a specific
        structural threshold, and that threshold is not reached here.

    downstream_docking:
      status: not_triggered
      note: >
        Within this stack architecture, CONFLICT terminates the PMS domain grammar. Any continuation
        constitutes a mode shift into downstream governance, institutionalization, decision, or evaluation
        layers, not a further descriptive extension of PMS-CONFLICT itself.
      allowed_continuations:
        - governance frameworks
        - institutional rule-setting
        - decision procedures
        - evaluation overlays
      disallowed_continuations:
        - implicit solution derivation
        - hidden intervention logic
        - operator extension beyond Δ–Ψ
      case_application: >
        The overlay remains descriptive. No governance, institutionalization, legal evaluation, policy
        design, empirical validation, clinical use, computational implementation, public classification,
        sanction logic, or intervention design is triggered. Any later use in such a domain would be a
        mode shift and would require separate evidence, validation, accountability, and domain-specific
        criteria. It would not be a continuation of PMS-CONFLICT itself.

  non_operator_constructs:
    conflict_attractor_A_conflict:
      is_operator: false
      applicability: weak
      definition: >
        Stabilized conflict pattern Α_conflict in which incompatibility itself becomes a repeatable
        orientation field under asymmetric cost and temporal pressure; distance or exit remains formally
        available but priced or asymmetric.
      operator_touchpoints:
        - Α
        - Ω
        - Θ
        - Ψ
        - Χ
      case_application: >
        Conflict itself is not shown to stabilize as an attractor. At most, the category can host a weak
        attractor-risk when agent-centered, institutional, historical, recognition-based, distributional,
        legal, and political framings repeatedly become mutually non-integrable under asymmetry and time.
        A stronger conflict-attractor reading would require a concrete scene in which attempts at
        explanation or repair reproduce incompatibility, role positions harden, exit or distance becomes
        costly or asymmetric, and the incompatibility persists beyond a single theoretical disagreement.
        The present case supplies only the abstract possibility of such a structure.

    binding_collision:
      is_operator: false
      applicability: not_applicable
      definition: >
        Two or more bindings Ψ collide and remain jointly non-viable under the same frame and time
        trajectory; integration Σ cannot produce a shared spine at acceptable cost.
      operator_touchpoints:
        - Ψ
        - Ω
        - Θ
        - Σ
      case_application: >
        Binding collision is not applicable because no self-binding agents, institutions, collectives,
        roles, offices, or responsibility-bearers are specified. Ψ remains weak in the Core pass. The
        case mentions responsibilities, but it does not identify who or what is self-bound, to which
        obligation, across what temporal horizon, and under what asymmetry. PMS-CONFLICT therefore must
        not shortcut from "responsibility is conceptually relevant" to "binding collision is active."

    asymmetry_lock_in:
      is_operator: false
      applicability: weak
      definition: >
        Exit or reflection costs Χ become structurally asymmetric under Ω and Θ: one role position can
        withdraw, delay, or reframe at lower price, turning Χ-availability into a power gradient rather
        than a shared stabilizing resource.
      operator_touchpoints:
        - Ω
        - Θ
        - Χ
      case_application: >
        Asymmetry lock-in is weakly relevant as a conceptual risk because structural injustice may involve
        asymmetrically distributed exit, delay, exposure, credibility, procedural access, revision cost,
        or burden of proof. The present material does not identify concrete role positions, concrete exit
        routes, actual delay costs, actual exposure burdens, or actual revision asymmetries. A stronger
        lock-in claim would require showing that one position bears higher costs for waiting, withdrawing,
        reframing, refusing, correcting, or remaining visible. That threshold is not met.

    exposure_capture:
      is_operator: false
      applicability: weak
      definition: >
        Recontextualization Φ under scaled exposure converts interpretation into enforcement affordances:
        statements harden into irreversible pressure rather than remaining revisable, scene-bound readings.
      operator_touchpoints:
        - Ω
        - Θ
        - Φ
      overlays:
        - P
        - MG
      case_application: >
        Exposure capture is weakly relevant as a transfer risk if the descriptive reading travels into
        public, institutional, administrative, legal, media, or person-near contexts and becomes an
        enforcement affordance or record-like interpretation. Within the current bounded application,
        interpretation remains private, reversible, and non-person-near. Exposure capture would require
        more than interpretive visibility: it would require a transmission environment in which being
        described through the conflict frame increases vulnerability, reduces revision capacity, hardens
        role assignment, or attaches durable consequences. Such a transmission environment is not present.

    dignity_collapse:
      is_operator: false
      applicability: not_applicable
      definition: >
        Dignity-in-practice constraints fail under load: Χ is delegitimized or priced, Ψ no longer binds
        restraint, and language drifts toward shaming, ranking, and coercive transfer under Ω/Θ pressure.
      operator_touchpoints:
        - Ω
        - Θ
        - Χ
        - Ψ
      overlays:
        - MG
      case_application: >
        Dignity collapse is not applicable as a finding. Dignity-in-Practice is preserved by refusing
        shaming, ranking, diagnosis, sanction, coercive exposure, person-near verdicts, and moralized
        sorting. The analysis treats asymmetry as a structural condition, not as permission to humiliate,
        blame, classify, or reduce persons or groups to conflict positions. Dignity collapse would become
        relevant only if the overlay itself intensified vulnerability under Ω, weakened Χ, erased
        reversibility, or attached person-near labels with durable exposure or sanction effects.

  reduced_signatures:
    note: >
      Reduced signatures are shorthand lenses and threshold markers, not proof chains. They compress
      dominant operator involvement for scene-bound readings and do not replace PMS dependencies.
    signature_hygiene:
      - Reduced signatures do not create new PMS operators.
      - Reduced signatures do not remove omitted dependencies.
      - Reduced signatures do not license terminality.
      - Reduced signatures do not license diagnosis, person-ranking, or sanction.
      - Reduced signatures do not convert conceptual relevance into empirical finding.

    CONFLICT_terminal_core:
      label: CONFLICT terminal core
      applicability: not_applicable
      operators:
        - Σ
        - Ψ
        - Ω
        - Θ
        - Χ
      reduced: true
      note: >
        Marks the terminal descriptive regime within PMS-CONFLICT: Σ under load with binding Ψ and priced
        or asymmetric distance Χ under Ω/Θ.
      case_application: >
        This reduced signature is rejected as a case finding. Ψ is not specified, Σ is weak rather than
        failed under concrete load, and Χ is maintained as analytic distance rather than priced, blocked,
        or asymmetric exit. Ω and Θ are conceptually central, but that is insufficient for terminal
        conflict. Terminal core would require sustained incompatibility under self-binding and asymmetry,
        temporal persistence, failure of integration, and compromised or costly distance. The abstract
        case lacks concrete binders, concrete obligations, concrete failed integration, and concrete
        exit or distance costs.

    CONFLICT_stabilized_pattern:
      label: Stabilized conflict attractor
      applicability: weak
      operators:
        - Α
        - Ω
        - Θ
        - Ψ
        - Χ
      reduced: true
      note: >
        Conflict regime stabilized as an attractor; distance remains present but priced or asymmetric,
        preventing Σ from carrying as reintegration.
      case_application: >
        This reduced signature applies only weakly as overlay shorthand. The Core pass gives Α, Ω, and
        Θ conceptual weight, but conflict-specific stabilized incompatibility, binding persistence, and
        priced or asymmetric Χ remain under-specified. A stabilized conflict pattern would require
        recurrence of the incompatibility itself, not merely recurrence of structural arrangements. The
        case does not show repeated conflict events, hardened positions, or failed recontextualizations.

    DRIFT_binding_collision:
      label: Binding collision
      applicability: not_applicable
      operators:
        - Ψ
        - Ω
        - Θ
        - Σ
      reduced: true
      note: >
        Colliding bindings with non-viable joint integration; Σ becomes internally incompatible under
        shared Θ with asymmetric cost gradients Ω.
      case_application: >
        This drift signature is rejected because the case does not supply two or more Ψ-bindings that
        collide under a shared frame and temporal trajectory. Responsibility remains a conceptual topic,
        not an established binding structure. This drift must not be inferred merely because the topic
        is morally serious or politically contested. Seriousness is not Ψ-collision.

    DRIFT_asymmetry_lock_in:
      label: Asymmetry lock-in
      applicability: risk
      operators:
        - Ω
        - Θ
        - Χ
      reduced: true
      note: >
        Exit, distance, or reflection becomes asymmetrically priced under Ω/Θ. Χ availability becomes a
        power gradient rather than shared stabilizing resource.
      case_application: >
        This drift signature is marked as a risk only. Structural-injustice analysis can hide unequal
        exit, delay, exposure, credibility, and revision costs behind formal symmetry, but the abstract
        case does not establish actual lock-in. The risk marker must not become a conclusion that some
        party is trapped, guilty, harmed, responsible, or unable to exit. It only identifies what a concrete
        analysis would have to test.

    DRIFT_exposure_capture:
      label: Exposure capture
      applicability: risk
      operators:
        - Ω
        - Θ
        - Φ
      overlays:
        - P
        - MG
      reduced: true
      note: >
        Publicness and transmission risk amplify Ω/Θ while Φ turns interpretation into enforcement
        affordance or irreversible pressure.
      case_application: >
        This drift signature is marked as a transfer risk only. If the overlay is excerpted into public,
        institutional, governance, legal, media, or person-near contexts, Φ may harden interpretation
        into exposure or enforcement pressure. Inside the current descriptive application, this drift
        is not active. Exposure capture must not be invoked to forbid interpretation. It marks a
        transmission risk, not a ban, remedy, or governance rule.

    DRIFT_dignity_collapse:
      label: Dignity collapse
      applicability: risk
      operators:
        - Ω
        - Θ
        - Χ
        - Ψ
      overlays:
        - MG
      reduced: true
      note: >
        Dignity-in-Practice constraints fail under Ω/Θ pressure when Χ becomes delegitimized or coercively
        priced and Ψ no longer binds restraint.
      case_application: >
        This drift signature is marked as a guarded misuse risk only. The overlay blocks any conversion
        of structural injustice or conflict language into shaming, ranking, humiliation, person-near
        verdict, diagnosis, coercive transfer, or sanction logic. If this risk became active through the
        analysis itself, the PMS application would fail its entry condition. The correct response would
        be to restore Χ, reversibility, and Dignity-in-Practice, not to intensify conflict classification.

  drift_catalogue:
    note: >
      CONFLICT drift classes describe structural operator distortions. They are not personal traits,
      diagnoses, moral verdicts, or enforcement categories. Their structural signatures distinguish
      operators that are present, missing, failed, priced, under load, or amplified by overlays.

    sigma_incompatibility_clash:
      label: Σ-incompatibility clash
      applicability: risk
      structural_signature:
        present:
          - Σ_local
        missing_or_failed:
          - Σ_shared
        under_load:
          - Ψ
          - Ω
          - Θ
        often_present:
          - Χ_priced_or_asymmetric
      typical_markers:
        - local integrations remain coherent but mutually non-integrable
        - shared continuation cannot be produced without unacceptable cost
        - conflict is misread as misunderstanding or communication failure
      guardrail_reminder: >
        Do not treat Σ-failure as moral failure, immaturity, or person defect.
      case_application: >
        This drift is a risk only. Rival readings of structural injustice may remain locally coherent
        while resisting shared Σ, but no concrete bindings or positions are supplied whose integrations
        are mutually non-viable. In this case, incompatibility is philosophical and formal rather than
        shown as stabilized conflict praxis. Activation would require specified frames that cannot be
        integrated without erasing essential commitments, plus a concrete temporal scene in which attempts
        at integration reproduce rather than resolve the incompatibility.

    binding_collision_drift:
      label: Binding collision drift
      applicability: not_applicable
      structural_signature:
        present:
          - Ψ
        failed_or_conflicted:
          - Σ
        under_load:
          - Ω
          - Θ
        often_present:
          - Χ_priced_or_asymmetric
      typical_markers:
        - two or more commitments cannot be jointly carried
        - shared frame cannot integrate incompatible bindings
        - repair attempts increase rather than reduce cost
      guardrail_reminder: >
        Do not translate binding collision into guilt, betrayal, or person inadequacy without explicit
        non-PMS grounds.
      case_application: >
        This drift is not applicable because no concrete Ψ-bindings are specified. Responsibility is
        discussed as a category, but no actor, office, institution, collective, role, or person is shown
        to be self-bound to conflicting commitments. Activation would require identified bearers of
        binding, identified commitments, a shared or overlapping frame, temporal persistence, and failure
        of Σ to integrate the bindings.

    asymmetry_lock_in_drift:
      label: Asymmetry lock-in drift
      applicability: risk
      structural_signature:
        present:
          - Ω
          - Θ
        missing_or_priced:
          - Χ
        often_present:
          - Ψ
      typical_markers:
        - exit or delay is cheap for one position and costly for another
        - reflection or withdrawal becomes a power differential
        - pseudo-symmetry hides unequal exposure or liability
      guardrail_reminder: >
        Do not treat formal availability of exit or distance as equal availability under Ω/Θ.
      case_application: >
        This drift is a risk only. Structural injustice often directs attention to unequal exposure,
        exit, delay, credibility, procedural access, or liability conditions, but this case provides no
        concrete scene in which Χ is missing, priced, blocked, or asymmetric. Activation would require
        showing that one party or role bears disproportionate costs for distance, refusal, waiting,
        correction, reframing, or exit.

    exposure_capture_drift:
      label: Exposure capture drift
      applicability: risk
      structural_signature:
        present:
          - Ω
          - Θ
          - Φ
        amplified_by_overlays:
          - P
          - MG
        often_present:
          - Α
          - Ψ
        risk_channel:
          - public_record_hardening
          - interpretation_to_enforcement_affordance
          - revision_cost_increase
      typical_markers:
        - scene-bound reading hardens into durable record
        - interpretation becomes enforcement affordance
        - revision becomes publicly or institutionally costly
      guardrail_reminder: >
        Public or institutional transfer requires explicit mode, publicness, and misuse-gradient
        declarations.
      case_application: >
        This drift is a risk only. A structural reading may harden into durable public or institutional
        record if transferred without mode, publicness, and misuse-gradient declarations. In the present
        private descriptive application, no such capture is active. Activation would require publicness,
        institutional record formation, person-near attachment, durable reputational or procedural effect,
        or a downstream setting in which revision becomes costly.

    dignity_collapse_drift:
      label: Dignity collapse drift
      applicability: risk
      structural_signature:
        present:
          - Ω
          - Θ
        compromised_or_missing:
          - Χ
          - Ψ
        amplified_by_overlays:
          - MG
        risk_channel:
          - shaming
          - ranking
          - humiliation
          - person_near_verdict
      typical_markers:
        - language drifts toward shaming, ranking, or humiliation
        - distance is delegitimized or coercively imposed
        - conflict reading becomes person-near verdict
      guardrail_reminder: >
        Dignity collapse invalidates the PMS application as a PMS application, even if terminology remains
        structurally correct.
      case_application: >
        This drift is a risk only and is explicitly blocked. If the analysis were used to shame, rank,
        diagnose, expose, sanction, or attach person-near verdicts, the PMS application would fail.
        Activation would require the analysis or its transmission to weaken Dignity-in-Practice by
        converting structural asymmetry into humiliation, stigma, exclusion, coercion, or irreversible
        labeling.

  scale_matrices:
    note: >
      Paper-derived scale overlays and projections are structural only. They must not become person
      evaluation, maturity scoring, diagnosis, or enforcement logic.

    firewall_matrices:
      second_firewall_what_conflict_is_not:
        status: satisfied
        note: >
          CONFLICT must remain a descriptive structural lens. It must not become a solution manual,
          diagnostic tool, moral tribunal, personality model, enforcement script, governance authority,
          or proof of PMS Base.
        not_conflict:
          - diagnosis
          - personality_typing
          - moral_verdict
          - sanction_logic
          - solution_procedure
          - governance_authority
          - pms_base_validation
        misuse_patterns:
          solution_manual_drift:
            pattern: CONFLICT language is used to imply repair steps or intervention scripts.
            prohibited_use: solution_procedure
            case_relevance: absent
          diagnostic_drift:
            pattern: Conflict structure is converted into a diagnosis, trait, or person-type.
            prohibited_use: diagnosis_or_personality_typing
            case_relevance: absent
          moral_tribunal_drift:
            pattern: Σ-failure, binding collision, or asymmetry is used to assign blame or virtue.
            prohibited_use: moral_verdict
            case_relevance: risk
          sanction_logic_drift:
            pattern: Conflict legibility is treated as a warrant for punishment, exclusion, or enforcement.
            prohibited_use: sanction_logic
            case_relevance: absent
          governance_authority_drift:
            pattern: PMS-CONFLICT is treated as if it can itself authorize institutional decisions.
            prohibited_use: governance_authority
            case_relevance: absent
          pms_base_validation_drift:
            pattern: Successful conflict mapping is treated as validation of PMS Base.
            prohibited_use: pms_base_validation
            case_relevance: absent
          person_near_labeling_drift:
            pattern: Scene-bound conflict descriptors are attached to persons, groups, or identities.
            prohibited_use: irreversible_person_labeling
            case_relevance: risk
        red_zone_prohibited_uses:
          - public or media-amplified person-near conflict labeling
          - use in hiring, sanction, disciplinary, custody, forensic, or coercive decision contexts
          - conversion of conflict signatures into guilt, competence, maturity, dignity, or risk scores
          - use of exposure capture or asymmetry lock-in language to justify enforcement
          - use of terminal-regime language to claim no further analysis, appeal, or repair is possible
          - excerpting without mode, publicness, misuse-gradient, and boundary declarations
          - treating downstream governance as if it were still PMS-CONFLICT analysis
        case_application: >
          The firewall is satisfied. Moral-tribunal drift and person-near labeling are retained as risks
          because the topic of structural injustice can invite blame transfer, guilt language,
          institutional accusation, or public sorting. Both risks are explicitly blocked by the overlay's
          descriptive, private, MG_LOW classification and by the PMS entry condition. The overlay does
          not solve the case, diagnose conflict parties, adjudicate responsibility, prescribe intervention,
          assign blame, produce governance authority, or validate PMS Base.

    theta_history_scaling:
      label: Θ-history scaling / young Α-field
      applicability: weak
      scope: regime_description_not_actor_attribute
      methodological_boundary: >
        Θ-history scaling describes regime production conditions. It does not essentialize persons,
        groups, or roles.
      operators_under_load:
        - Α
        - Θ
        - Ω
        - Φ
      non_operator_constructs_reference:
        young_A_field:
          is_operator: false
          applicability: not_applicable
          definition: >
            Young Α-field names a regime in which the enabling conditions for attractor stabilization
            are recent or recently intensified. Patterns appear volatile, rapidly re-labeled, and
            exposure-sensitive because Θ is compressed and Φ is accelerated faster than Σ can consolidate.
          operator_touchpoints:
            - Α
            - Θ
            - Φ
            - Ω
            - Λ
          note: Regime diagnosis only; not a person or group attribute.
          case_application: >
            Young Α-field dynamics are not applicable because the case does not describe a recently
            intensified, volatile, exposure-sensitive attractor field. There is no concrete field, no
            recent acceleration, no public volatility, no scene-specific hardening, and no frame-churn
            sequence.
      scale_axes:
        theta_pressure:
          level: not_applicable
          meaning: How fast trajectories lock in and reversibility windows close.
          case_application: >
            Θ-pressure cannot be scaled from the abstract case material. Historical temporality is
            conceptually central, but no concrete lock-in speed, duration, recurrence interval, hardening
            rate, deadline structure, or reversibility window is supplied.
        phi_frequency:
          level: not_applicable
          meaning: >
            How often structures are re-embedded into new frames such that interpretations mutate faster
            than consolidation can stabilize.
          case_application: >
            Φ-frequency cannot be scaled. The case contains one analytic recontextualization from
            isolated-agent or isolated-act framing to structural-arrangement framing, not a repeated
            frame-churn regime.
      composite_regime_bands:
        selected_band: not_applicable
        C1_extended_stable:
          label: C1 — Extended & stable
          condition: low Θ-pressure + low Φ-frequency
          typical_risks:
            - "Complacency: treating slow drift as no drift."
            - "Under-reading Λ residue because it remains locally containable."
        C2_compressed_churn:
          label: C2 — Compressed with churn
          condition: high Θ-pressure + high Φ-frequency
          typical_risks:
            - "Essence drift: reading regime products as timeless traits."
            - "Narrative prosecution: Φ-substitution becomes mistaken for explanation."
            - "Irreversibility inflation under Ω/Θ exposure gradients."
        C3_asymmetric_lock:
          label: C3 — Compressed with asymmetric exit
          condition: high Θ-pressure + Ω-amplified Χ_exit
          typical_risks:
            - "Pseudo-symmetry narratives denying Ω while it governs cost."
            - "Treating imposed continuity costs as choice or preference."
        case_application: >
          No composite regime band is selected. The matrix is retained only to state non-applicability.
          It must not be filled by intuition, moral seriousness, or philosophical salience. Scaling
          requires concrete temporal and field data.

    institutionalized_distance_scaling:
      label: Institutionalized Χ scaling
      applicability: not_applicable
      description: >
        Institutionalized distance scaling tracks whether Χ is personal, informal, explicit, or coercively
        enforced. It evaluates the structure of distance availability, not persons.
      selected_band: not_applicable
      scale_bands:
        CHI-0:
          label: No institutionalized Χ / personal steering only
          chi_level: none
          expected_drift_tendencies:
            - Φ-substitution
            - Α_conflict stabilization
            - Λ as control channel
          anti_misuse_note: >
            Reading leadership failure as personal defect is invalid; instability is regime-produced by
            missing distance constraints.
        CHI-1:
          label: Partial institutionalization / informal norms or weak mandates
          chi_level: partial
          expected_drift_tendencies:
            - reduced but persistent Φ-substitution
            - oscillation between integration attempts and Α_conflict
          anti_misuse_note: >
            Partial Χ reduces volatility but does not eliminate substitution dynamics; stability should
            not be inferred as integrability.
        CHI-2:
          label: Explicit institutionalized Χ / clear mandates and criteria
          chi_level: explicit
          expected_drift_tendencies:
            - lower Φ-substitution probability
            - reduced Α_conflict stabilization likelihood
          anti_misuse_note: >
            Explicit Χ stabilizes legibility but does not guarantee integration; tragedy remains possible
            under binding collisions.
        CHI-3:
          label: Enforced Χ / coercive or exposure-based enforcement
          chi_level: enforced
          validity_gate_status: FORMALLY_INVALID
          expected_drift_tendencies:
            - immediate stabilization with high downstream costs
            - dignity collapse and legitimacy erosion
          anti_misuse_note: >
            Coercive enforcement violates Dignity-in-Practice and collapses Χ into domination; such
            regimes are invalid as PMS application.
      recognition_formulas:
        stable_regime:
          formula: Ω guided + Χ institutional + Θ explicit → trust possible
          case_application: >
            This stable recognition formula does not apply because the case provides no concrete institution,
            no explicit Χ protocol, no guided Ω regime, and no operational temporal structure. Χ is maintained
            only as analytic and application distance.
        unstable_regime:
          formula: Ω guided − Χ → groups / narratives / Α_conflict
          case_application: >
            This unstable recognition formula does not apply as a finding. It remains a conceptual risk
            only if a later concrete setting shows asymmetry without adequate distance constraints, leading
            to narrative grouping or conflict-attractor stabilization.
      validity_gate_reminder:
        applies:
          - Χ
          - reversibility
          - D
        note: >
          Any institutionalization of Χ must preserve reversibility and Dignity-in-Practice. Distance
          enforced through coercion, exposure, or humiliation invalidates PMS use.
      case_application: >
        Institutionalized distance scaling is not applicable. Χ is maintained as analytic and application
        distance in the Core pass. No office, bureaucracy, legal system, platform, public record, institutional
        protocol, or organizational setting is specified that would price distance or distribute exit
        asymmetrically. Institutionalized distance cannot be inferred from the mere fact that structural
        injustice may involve institutions.

    application_boundary_scaling:
      label: Application boundary scaling
      applicability: active
      description: >
        Application boundary scaling governs transfer of CONFLICT language into private, semi-public,
        institutional, public, or media-amplified contexts. It is a safety interface, not a theory extension.
      classification_axes:
        mode:
          value: DESCRIPTIVE
          allowed_values:
            - DESCRIPTIVE
            - EVALUATION_OVERLAY
          requirement: >
            Mode must be explicitly declared whenever analysis leaves purely descriptive circulation.
        publicness:
          value: PRIVATE
          allowed_values:
            - PRIVATE
            - SEMI_PUBLIC
            - INSTITUTIONAL
            - PUBLIC
            - MEDIA_AMPLIFIED
        misuse_gradient:
          value: MG_LOW
          allowed_values:
            - MG_LOW
            - MG_MIXED
            - MG_HIGH
      red_zone_mapping:
        status: absent
        definition: >
          Red zones are configurations where transfer of CONFLICT language becomes structurally invalid
          as PMS application due to irreversibility and coercive affordances.
        conditions:
          - High or media-amplified publicness + MG_HIGH
          - Low reversibility environments / durable records / liability coupling
          - Person-near interpretation under asymmetry Ω
          - Asymmetric exposure where one role controls visibility
        consequence: >
          Transfer is formally invalid; continued use constitutes a breach of the PMS entry condition.
        case_application: >
          The case does not enter a red-zone configuration because the overlay is descriptive, private,
          reversible, non-person-near, non-governance, non-sanctioning, non-clinical, non-legal, and
          non-implementation-oriented.
      minimal_declaration_block:
        required_if_application:
          - Mode declaration
          - Publicness level
          - Misuse gradient classification
        note: >
          This block is a structural constraint, not a disclaimer. Absence of the declaration defaults
          the context to high misuse risk.
        case_application: >
          Mode: DESCRIPTIVE. Publicness: PRIVATE. Misuse gradient: MG_LOW. The overlay remains chat-bound,
          conceptual, reversible, and non-person-near. Any public, institutional, media-amplified, legal,
          clinical, administrative, governance, computational, or person-near reuse requires renewed
          declaration and red-zone review.
      reuse_protocol:
        for_excerpts:
          must_include:
            - Compressed what this does not do statement
            - Publicness + reversibility red-zone reminder
            - Mode / publicness / misuse declaration if governance overlay is invoked
          failure_effect: >
            Without these elements, excerpts predictably drift into pseudo-symmetry, moral substitution,
            person-labeling, and narrative immunization.
      operator_status:
        operators_under_load:
          - "guardrails_only: Χ + reversibility + D"
          - "Ω and Φ as typical misuse carriers under exposure"
        inference_operators: not_permitted_in_this_scaling
      case_application: >
        Application-boundary scaling is active because it governs the status of the overlay itself rather
        than empirical features of the case. It is the only scale block that can be active without a concrete
        scene. It confirms DESCRIPTIVE mode, PRIVATE publicness, MG_LOW, and no red-zone entry.

    terminal_positioning_projection:
      label: Terminal regime projection / legibility without reintegration
      applicability: not_applicable
      description: >
        Projection that fixes the terminal position of PMS-CONFLICT within the PMS-domain stack. It marks
        the point at which operator-legible description remains possible while internal reintegration
        grammar is exhausted. Beyond this point, any continuation is structurally downstream.
      terminal_stack_claim: >
        Within the PMS-domain stack developed here, CONFLICT functions as the terminal domain layer:
        beyond maximal Δ–Ψ load under Θ/Ω/Χ, the model yields no further internal reintegration grammar —
        only downstream governance, institutionalization, decision, or evaluation.
      structural_full_stop_sentence: >
        This paper does not continue into solutions. It ends where praxis becomes tragically legible but
        no longer integrable within this descriptive pathway.
      terminality_without_finality: >
        The terminal claim concerns the descriptive architecture of PMS-CONFLICT, not the finality of
        conflict analysis as such. What reaches a limit is this grammar’s capacity to generate a further
        internal reintegration layer once incompatibility has stabilized under Θ, Ω, Ψ, and costly or
        asymmetric Χ.
      terminal_regime:
        is_operator: false
        applicability: not_applicable
        minimal_operator_touchpoints:
          - Σ
          - Θ
          - Ω
          - Ψ
          - Χ
        note: >
          The terminal regime is not a failure state, not a diagnosis, and not a recommendation to act.
          It is a boundary condition of the descriptive grammar itself.
      case_application: >
        Terminal regime projection does not apply. The case does not show maximal Δ–Ψ load, failed Σ
        under binding, costly or asymmetric Χ, stabilized incompatibility, or exhaustion of internal
        reintegration grammar. Terminality must not be used as a dramatic synonym for seriousness.

    derived_axes_projection:
      note: >
        Optional structural projection of the CONFLICT configuration onto PMS derived axes. This is not
        a maturity score and not a person-level evaluation.
      axes:
        Awareness_A:
          structural_level: mixed
          operator_basis:
            - Δ
            - Θ
            - Ω
            - Φ
          structural_reading: >
            Awareness tends to increase because constraint regimes become legible. Θ-history is required
            to prevent essentialization; Φ acceleration raises the need for production-reading over
            attribute-reading.
          case_application: >
            CONFLICT modestly increases structural readability by foregrounding incompatibility risks
            among frames of agency, responsibility, harm, institutional history, recognition, and
            distribution. Awareness_A remains mixed because the case contains no concrete scene or
            trajectory through which conflict awareness could be tested.
        Coherence_C:
          structural_level: mixed
          operator_basis:
            - Σ
            - Φ
            - Θ
            - Ω
            - Ψ
          structural_reading: >
            CONFLICT often exhibits high internal coherence within positions, while joint consolidation
            fails. Φ may sustain narrative legibility without producing shared Σ.
          case_application: >
            Coherence_C remains mixed. PMS Core coherence is weakly available, and CONFLICT highlights
            the risk that rival readings remain locally coherent without shared Σ. However, no concrete
            incompatibility regime is established and no shared integration failure is shown.
        Responsibility_R:
          structural_level: weak
          operator_basis:
            - Ω
            - Θ
            - Ψ
            - Χ
            - Λ
          structural_reading: >
            Responsibility becomes structurally salient because binding persists under asymmetric exposure
            and path dependence. Attribution pressure increases while fair comparison may collapse.
          case_application: >
            Responsibility_R remains weak because Ψ was not established in the Core pass. CONFLICT adds
            only a warning that attribution pressure may rise under Ω/Θ if the analysis is transferred
            into public, institutional, or person-near contexts.
        Action_E:
          structural_level: weak
          operator_basis:
            - Χ
            - Θ
            - Ω
            - Σ
            - Φ
          structural_reading: >
            Action is structurally constrained because exit or interruptibility is priced or asymmetric
            and because Σ-work does not yield shared continuation.
          case_application: >
            Action_E remains weak and under-specified. The case contains no concrete action, repair,
            refusal, omission, intervention, or implementation. CONFLICT adds no solution procedure and
            does not convert legibility into action.
        Dignity_in_Practice_D:
          structural_level: active
          operator_basis:
            - Ω
            - Θ
            - Χ
            - Φ
            - Ψ
          structural_reading: >
            D is a practice constraint, not an operator. It remains feasible when distance is real and
            exposure is bounded; it degrades when Ω/Θ amplify vulnerability and Φ converts interpretation
            into pressure.
          case_application: >
            Dignity-in-Practice is active as an application constraint. The overlay preserves restraint
            under Ω, keeps Χ real, blocks person-ranking and shaming, and treats all conflict signatures
            as overlay shorthand rather than verdicts. D is not ontological dignity and not moral
            superiority.
      constraints:
        no_scoring_rule: >
          Do not convert the axis projection into numeric scores, rankings, maturity labels, or person-level
          typologies. Axis projection is for structural readability only.
        validity_gate_reminder: Any application use remains gated by Χ + reversibility + D.

  conflict_overlay_quality_control:
    status: passed
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      no_person_level_judgment: true
      no_solution_or_intervention_script: true
      no_sanction_logic: true
      no_diagnosis_or_person_typing: true
      conflict_not_treated_as_essence: true
      terminality_not_treated_as_finality: true
      downstream_docking_marked_as_mode_shift: true
      publicness_overlay_not_operator: true
      misuse_gradient_not_operator: true
      conflict_attractor_not_operator: true
      dignity_in_practice_preserved: true
      reversibility_preserved: true
      distance_chi_preserved: true
      drift_patterns_not_person_labels: true
      scale_matrices_not_scores: true
      red_zone_checked: true
      non_capture_preserved: true
    issues_found:
      - none
    correction_required: false
    final_overlay_judgment: >
      The CONFLICT overlay is valid, bounded, structurally template-conformant, and correctly subordinated
      to the completed PMS Core case; it adds conflict-specific visibility and transfer-risk discipline
      without revising PMS Base or rewriting the Core pass.

  conflict_overlay_synthesis:
    primary_conflict_reading: >
      PMS-CONFLICT makes visible that structural injustice can become conflict-relevant when structural
      explanation, responsibility attribution, institutional history, distributional effects, recognition
      claims, and asymmetrical exposure stabilize into incompatible frames. In this case the visibility
      remains weak and conceptual: no concrete binding collision, priced distance, terminal regime, active
      conflict attractor, or public exposure capture is established.
    stabilized_incompatibility_result: >
      Stabilized incompatibility is weak and under-specified. The Core case supports structural patterning
      through □, Α, Ω, and Θ, but not a concrete conflict regime in which incompatibility itself has
      stabilized. The case therefore remains conflict-legible as a conceptual risk, not as a demonstrated
      conflict attractor.
    sigma_result: >
      Σ remains weak rather than failed. The overlay does not claim that shared integration has collapsed.
      It only marks the risk that rival readings may remain locally coherent without a shared integrative
      spine. PMS coherence must not be treated as proof of adequate capture.
    binding_result: >
      Ψ-binding is not established. Responsibility is mentioned, but no self-binding bearer, commitment,
      role, office, institution, collective, or colliding set of bindings is specified. Binding collision
      is therefore not applicable.
    asymmetry_result: >
      Ω remains conceptually central as structural imbalance in exposure, capacity, vulnerability,
      obligation, responsibility-gradient, access, credibility, or constraint. CONFLICT adds the warning
      that these asymmetries could become lock-in or attribution pressure if concrete exit, delay, exposure,
      or revision costs were shown.
    temporality_result: >
      Θ remains conceptually central through historical arrangement, persistence, accumulation, inheritance,
      and delay. CONFLICT does not scale Θ-pressure because no concrete timeline, compression, hardening
      rate, recurrence interval, deadline structure, or reversibility window is supplied.
    distance_exit_result: >
      Χ is available and maintained as analytic and application distance. It is not shown to be priced,
      blocked, asymmetric, institutionalized, coercively enforced, or converted into a power gradient.
    exposure_publicness_result: >
      Publicness P and Misuse Gradient MG do not amplify the case internally. They function as boundary
      overlays for possible transfer: mode DESCRIPTIVE, publicness PRIVATE, misuse gradient MG_LOW, red-zone
      absent. Public or institutional reuse would require renewed boundary declaration and review.
    dignity_result: >
      Dignity-in-Practice is preserved and active as a constraint. The overlay blocks dignity collapse by
      refusing shaming, ranking, diagnosis, humiliation, person-near labeling, sanction logic, coercive
      exposure, and coercive transfer. D remains praxeological, not ontological.
    terminality_result: >
      The case remains below the terminal-regime threshold. It is conflict-legible only weakly and is not
      tragically legible in the strong PMS-CONFLICT sense. Terminality is not applicable because Σ failure
      under Ψ/Ω/Θ with costly or asymmetric Χ is not shown.
    downstream_docking_result: >
      Downstream docking is not triggered. Any later governance, institutionalization, decision, legal
      evaluation, empirical validation, policy continuation, clinical use, public classification, sanction
      logic, or computational implementation would be a mode shift rather than continuation of PMS-CONFLICT.
    non_capture_result: >
      Open non-capture remains for non-PMS conflict grammars, normative theories of justice, legal-forensic
      doctrines, empirical causal models, phenomenological accounts of lived harm, recognition-based
      theories, distributional theories, and political theories of rupture, refusal, antagonism, or domination.
      Rival framings are not automatically PMS-CONFLICT drift, failed integration, incomplete calibration,
      or recontextualization residue.
    final_conflict_formula_or_signature: >
      CONFLICT_stabilized_pattern: weak / under-specified; DRIFT_asymmetry_lock_in: risk only;
      DRIFT_exposure_capture: risk only; DRIFT_dignity_collapse: guarded misuse risk only;
      DRIFT_binding_collision: not_applicable; CONFLICT_terminal_core: not_applicable.
    final_claim_boundary: >
      This CONFLICT overlay adds visibility for stabilized incompatibility, binding collision, asymmetry
      lock-in, exposure capture, dignity collapse, scale/cost regimes, terminal descriptive positioning,
      and downstream docking boundaries. It does not revise PMS Base, rewrite the PMS Core pass, diagnose
      persons, rank persons, prescribe intervention, generate solution procedures, validate PMS, or claim
      final capture of conflict.