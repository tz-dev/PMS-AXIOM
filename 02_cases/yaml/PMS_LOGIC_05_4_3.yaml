  counter_readings:
    note: 'Counter-readings are interpretive risks. PMS-LOGIC responds through structural clarification rather than polemic.'
    items:
    - id: D1
      reading: This is just ethics in disguise.
      relevance: not_applicable
      pms_response: 'No PMS operator generates values, norms, or prescriptions. What appears ethical is the interpretability of responsibility under Ω, Θ, Λ, and Ψ.'
      case_application: This counter-reading does not threaten the case if the overlay remains explicit that no norm, value, duty, or moral evaluation is generated. The Gettier problem is epistemological and the LOGIC overlay is boundary-management only.
    - id: D2
      reading: This collapses into relativism.
      relevance: weak
      pms_response: 'Frames are explicit scope constraints, and reversibility is required. Structural attribution under Ω, Θ, and Λ is not arbitrary preference.'
      case_application: The relativism reading is weakly relevant because the case preserves rival formalisms. The response is that frame-bound non-closure is not arbitrary preference; the JTB frame, Λ boundary, and discrimination tests remain explicit.
    - id: D3
      reading: This is nihilism with extra steps.
      relevance: weak
      pms_response: 'Λ is not meaninglessness but structured absence. Omission and non-action remain relevant under Θ and Ω.'
      case_application: Weakly relevant. Λ could be misread as saying nothing follows from Gettier cases. LOGIC blocks this by treating Λ as structured non-closure that preserves the problem without converting it into meaninglessness.
    - id: D4
      reading: This is a hidden theological argument.
      relevance: not_applicable
      pms_response: 'PMS-LOGIC carries non-closure within □ without metaphysical filling. No external ground, lawgiver, or ultimate justification is introduced.'
      case_application: Not applicable. The overlay introduces no external ground, lawgiver, ultimate justification, or metaphysical substitute for the JTB boundary.
    - id: D5
      reading: This makes responsibility unfair.
      relevance: not_applicable
      pms_response: 'PMS does not claim fairness. It models attribution, not moral desert. Responsibility is structural, not a reward or punishment scheme. Absence of effective capacity implies no responsibility.'
      case_application: Not applicable because no responsibility attribution is made. Effective capacity is not applicable and no guilt, blame, desert, or fairness claim is introduced.
    - id: D6
      reading: This cannot guide action.
      relevance: weak
      pms_response: 'PMS-LOGIC does not instruct; it orients by constraining overreach. Guidance is replaced by orientation through Χ, Σ, and Ψ.'
      case_application: 'Weakly relevant. The overlay does not guide action, but it orients analysis by constraining overreach: maintain Χ, carry Λ, avoid Σ-totalization, and preserve rival readings.'
    - id: D7
      reading: This wins by translation, not necessarily by final superiority.
      relevance: active
      pms_response: 'Translation success is not final settlement. The relevant test is whether the grammar preserves differentiating force under pressure.'
      case_application: Active. The case is especially vulnerable to winning by translation because PMS can map the structure smoothly. The overlay preserves rival epistemological readings and treats discriminative force, not translation success, as the relevant test.
    - id: D8
      reading: Relation to adjacent frameworks.
      relevance: active
      pms_response: 'PMS-LOGIC is not virtue ethics, pragmatism, or systems ethics. It reconstructs responsibility structurally under asymmetry, temporality, and non-closure without ethical evaluation or normative optimization.'
      case_application: Active. Adjacent frameworks such as anti-luck epistemology, modal safety, reliabilism, internalism, externalism, and justification-defect readings remain open for comparison; PMS-LOGIC does not replace or defeat them by translation.
