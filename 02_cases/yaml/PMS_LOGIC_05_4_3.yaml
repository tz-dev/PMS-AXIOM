pms_logic_overlay_application:
  schema_version: PMS-LOGIC_1.1
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-LOGIC.yaml
  paper_source_file: PMS-LOGIC.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: PMS–LOGIC Application Profile
    model_short: PMS-LOGIC
    status: draft
    last_updated: '2026-04-06'
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
    paper_source:
      title: PMS–LOGIC
      subtitle: Pre-Moral Foundations, Logical Limits, and Post-Moral Effects
      source_file: PMS-LOGIC.md
    description: 'PMS-LOGIC is an application profile / overlay for PMS. It formalizes pre-moral justification, logical boundary management, and post-moral effects without redefining PMS operators, dependencies, derived axes, or guardrails.'
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for Gettier problems
    rule: 'This LOGIC block is appended to or integrated into an already completed PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat LOGIC constructs as PMS Base.'
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: 'The LOGIC overlay may add boundary, non-closure, attribution, non-innocence, reduced-signature, and failure-mode visibility. It must not modify the already completed PMS Core case except where a direct PMS.yaml inconsistency has been separately identified.'
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: 'PMS-LOGIC introduces no amplification overlays beyond reduced signatures, structural failure modes, and paper-specific non-operator constructs. It remains an overlay/application profile only.'
  validity_gate:
    status: passed
    gate_type: PMS_application_only
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: 'A meta-position and stop-capability are maintained. The LOGIC overlay does not fuse the case into verdict, authority, enforcement, certainty, moral demand, or person-level attribution.'
      reversibility:
        status: maintained
        meaning: 'The LOGIC reading remains scene-bound or case-type-bound, revisable, and configuration-specific. It does not generate global person labels or irreversible interpretive claims.'
      Dignity_in_Practice_D:
        id: D
        status: maintained
        meaning: 'The LOGIC overlay does not shame, rank, humiliate, morally evaluate, or ontologically assess persons or groups. It remains restricted to structural attribution and boundary handling.'
    gate_result: valid_as_logic_overlay_application
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependency_hygiene_note: 'Any LOGIC reduced signature is shorthand only. Reduced signatures do not replace PMS dependencies. In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or Ψ must remain dependency-respecting according to PMS.yaml.'
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  logic_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic.
    - No person-level judgments, no moral evaluation, no sanction logic.
    - 'Focus on structures of praxis, not right or good morality.'
    - 'Audience: analysis of praxis and structure, not action guidance or decision rules.'
    may_add_visibility_to:
    - non-closure
    - closure-drive
    - logical boundary management
    - responsibility as attributability
    - non-innocence without guilt
    - effective capacity
    - moral readability as post-hoc interpretive field
    - failure-mode constraints
    - LOGIC drift risks
    - counter-readings
    must_not_do:
    - derive ought from being
    - introduce norms, values, duties, prescriptions, or moral rules
    - treat morality as a PMS operator
    - convert responsibility into blame
    - convert non-innocence into guilt
    - convert logical coherence into final authority
    - convert Σ into totalization
    - convert Ω into justificatory authority
    - convert Λ into defect, ignorance, nihilism, or metaphysical pointer
    - claim PMS Base validation
  tripartition:
    pre_moral_justification:
      label: Pre-moral level of justification
      applicability: active
      operators_involved:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      claim: 'This level identifies the structural conditions under which the case becomes praxeologically legible before evaluative, normative, moral, diagnostic, legal, or implementation-oriented interpretation appears.'
      case_application: The Gettier case is legible at the pre-moral level because it first presents structural differentiation rather than evaluation: justified true belief is distinguished from knowledge, explanatory pressure arises from that difference, the JTB frame supplies relevance conditions, Λ marks the missing knowledge-attribution, and Α appears weakly as the recurrence of Gettier-style counterexamples. This level does not yet decide whether the epistemological deficit is luck, defective justification, modal instability, reliability failure, or a non-PMS feature. No norms, duties, values, moral rankings, prescriptions, sanctions, or person-level assessments are introduced.
      no_normativity_introduced: true
      notes:
      - No norms, values, duties, prescriptions, sanctions, moral commands, or epistemic ought-statements are introduced.
      - Patterns may stabilize without intention, moral assessment, person-ranking, authority, or PMS Base validation.
      - The pre-moral level supplies legibility conditions, not a sufficient theory of knowledge.
    logical_boundary_management:
      label: Logical level of ordering and boundary management
      applicability: active
      dominant_operators:
      - □
      - Λ
      - Χ
      - Σ
      dependency_note: 'The listed operators are dominant boundary-management operators. Their PMS dependencies remain intact; especially Χ and Σ must not be treated as dependency-free shorthand, and Φ, Θ, Ω, Α, ∇, and Δ remain relevant wherever PMS dependency closure is required.'
      claim: 'Logic functions as an ordering and integration instrument. It may organize coherence within a frame, but it does not become final authority, proof of knowledge, proof of PMS sufficiency, or ultimate closure where Λ persists.'
      case_application: The case is centrally a boundary-management problem: the JTB frame appears to invite closure, yet the Gettier structure preserves Λ as the point where justified true belief does not settle knowledge. LOGIC therefore organizes the pressure toward consistency and integration while Χ prevents Σ from becoming total closure, epistemological finality, or authority over rival theories. The overlay sharpens the boundary between coherent reconstruction and sufficient explanation without rewriting the PMS Core pass.
      aphorism: Logic is the beginning of everything — not the end.
      boundary_result: The logical boundary is reached where the JTB account cannot, within the supplied case material, convert justified true belief into knowledge without confronting luck or accidental truth. Λ is carried as sustainable non-closure rather than treated as ignorance, defect, nihilism, metaphysical hint, methodological failure, epistemic laziness, or PMS Base validation. Χ preserves reversibility, blocks dogmatic Σ-totalization, and keeps rival formalizations open.
    post_moral_effects:
      label: Post-moral level of effects
      applicability: not_applicable
      operators_involved:
      - Ω
      - Θ
      - Ψ
      - Χ
      claim: 'Effects become morally readable once praxis unfolds under asymmetry and irreversible time, while responsibility is reconstructed as attributability rather than as an ought.'
      case_application: The case does not supply a concrete praxis scene with irreversible consequences, effective capacity, obligation-bearing roles, self-binding responsibility, consequence-attribution, or moral readability. Post-moral effects are therefore not activated case-internally. The LOGIC overlay only preserves the boundary that responsibility would mean attributability, not ought, blame, guilt, sanction, duty, maturity judgment, or person-ranking.
      core_formula: Pre-moral in justification, logical in boundary management, post-moral in effect.
      no_ought_derived: true
  key_claims:
    C1_non_closure_as_strength:
      status: active
      claim: 'Non-closure is treated as a structural strength rather than a mere deficiency. Persistent Λ prevents logical systems from compensating uncertainty with dogma or substitute narratives.'
      case_application: The Gettier problem gains discriminative force because the absence of knowledge-attribution is carried rather than filled. LOGIC treats the persistent Λ as a strength of the analysis: it prevents a quick replacement of the unresolved epistemic gap with dogma, certainty, metaphysical compensation, or premature PMS closure.
    C2_morality_as_readability_field:
      status: not_applicable
      claim: 'Morality is not reconstructed as an operator, but as a readability field under constellations involving Ω, Θ, Λ, and Ψ.'
      case_application: The case does not become morally readable in the PMS-LOGIC sense because it lacks a concrete asymmetrical praxis scene, irreversible consequence-pathway, and case-internal self-binding. Morality is not introduced as a PMS operator or as a normative system.
    C3_responsibility_as_attribution_not_prescription:
      status: not_applicable
      claim: 'What everyday language may call obligation is reconstructed as attribution of consequences, not prescriptive demand.'
      case_application: No consequence-attribution to an agent or trajectory is made in the case. The overlay therefore does not derive duty, command, blame, guilt, sanction, or obligation. It only keeps the responsibility/ought distinction explicit for application discipline.
    C4_apparent_norms_as_failure_mode_constraints:
      status: weak
      claim: 'Apparent norms can be reconstructed as structural failure-mode constraints stabilized by self-binding, without external authority or prescriptive ought.'
      case_application: 'The apparent pressure not to call the Gettier belief knowledge may look norm-like, but in this overlay it is reconstructed only as a structural boundary constraint: do not force closure where Λ persists, and do not treat coherence as sufficient for knowledge. No external commandment, moral rule, or epistemic duty is derived.'
    C5_logic_as_ordering_tool_not_authority:
      status: active
      claim: 'Logic remains important for consistency and integration, but becomes structurally unstable when it attempts final authority or closure beyond what the frame can deliver under persistent Λ.'
      case_application: Logic functions as an ordering tool for distinctions, frame limits, and non-closure. It becomes risky only if the JTB frame, the PMS frame, or the LOGIC overlay claims final authority over knowledge, luck, justification, or rival epistemological formalisms.
  responsibility_readability_chain:
    status: weak
    source: PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain
    chain_type: readability_chain_not_dependency_definition
    sequence:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    note: 'This sequence is used as a LOGIC readability chain for responsibility, non-closure, and moral-readability analysis. It is not a new PMS dependency definition; PMS.yaml dependencies remain authoritative.'
    case_application: The full sequence is present only as a LOGIC readability reference and PMS dependency-aware shorthand. Δ, ∇, □, Λ, weak Α, weak Ω, weak Θ, Φ, Χ, and contested Σ are relevant to the conceptual case, but Ψ is not case-internal and responsibility-readability is not activated. The chain is therefore partial and does not redefine PMS dependencies.
  theses_and_definitions:
    intermediate_thesis:
      label: Boundary point of logic
      quote: Logic does not end in silence, but in a structurally sustainable non-assertion.
      operator_reading: 'Non-event Λ, stabilized by Α within □, may mark a disciplined stopping point for logic rather than failure or negation.'
      case_application: The disciplined stopping point is the refusal to assert knowledge merely from JTB where luck or accidental truth remains structurally relevant. This non-assertion is sustainable Λ within □, not silence, defeat, or metaphysical substitution.
    central_thesis:
      quote: From effective capacity follows structural responsibility, not obligation.
      operator_reading:
        responsibility_requires:
        - effective capacity within □
        - irreversibility under Θ
        - distribution gradients under Ω
        - attributability continuity via Ψ
      case_application: Effective capacity is not case-internally present because the material does not supply an agent acting within a concrete frame over time with capacity to affect outcomes. Responsibility-readability therefore does not follow; no ought is derived.
    conclusion_thesis:
      quote: 'Logic does not fail as a tool; it becomes structurally unstable when it begins to function as authority.'
      case_application: The case shows logic remaining a tool when it clarifies the boundary of JTB and preserves non-closure. It would drift toward authority only if the analysis converted that clarification into final epistemological settlement, PMS superiority, or closure over rival theories.
  boundary_conditions:
    BC_EFFECTIVE_CAPACITY:
      label: Absence of effective capacity
      status: not_applicable
      definition: 'Responsibility presupposes effective, frame-bound capacity within □ and temporal availability under Θ. Where access, means, authority, or the relevant temporal window are structurally absent, no responsibility attribution arises even if outcomes later appear significant.'
      calibration_note: 'PMS-LOGIC specifies the structural form of attributable capacity, but not every concrete threshold of sufficiency in advance.'
      case_application: Effective capacity is not applicable to the abstract Gettier case because no concrete agentic capacity, means, authority, access, or temporal opportunity for outcome-influence is specified. The boundary is checked precisely to prevent responsibility, non-innocence, blame, or duty from being inferred.
  non_operator_constructs:
    logic_paper_specific:
      status: active
      is_operator: false
      definition: 'Logic is a procedural discipline of consistency, derivation, and closure-drive that meets a structural boundary at Λ under □.'
      operator_touchpoints:
      - Σ
      - Λ
      - □
      - ∇
      - Χ
      case_application: 'Logic functions as procedural ordering: it differentiates JTB from knowledge, tracks closure-drive, and identifies Λ where the JTB frame cannot secure knowledge under luck. Its role is boundary management, not final authority.'
    morality_readability_field:
      status: not_applicable
      is_operator: false
      definition: 'Morality is the readability of responsibility that emerges post hoc from irreversible praxis under structural conditions. No norms, values, or duties are introduced.'
      minimal_operator_basis:
      - Ω
      - Θ
      - Λ
      - Ψ
      case_application: Moral readability does not emerge case-internally. The case lacks irreversible praxis under Ω, Θ, Λ, and Ψ. The overlay therefore does not introduce morality, value, duty, guilt, or sanction.
    responsibility_vs_ought:
      status: active
      is_operator: false
      responsibility: Attribution of consequences.
      ought: Prescriptive demand; explicitly out of scope.
      pms_logic_position: 'PMS-LOGIC operates on responsibility-readability and attributability, not on ought-statements.'
      case_application: 'The distinction is active as a guardrail: the case does not attribute consequences and does not generate prescriptions. Any pressure to ''count'' or ''not count'' the belief as knowledge is treated as epistemological boundary management, not a PMS-derived ought.'
    potential_effective_capacity:
      status: not_applicable
      is_operator: false
      definition: 'Effective capacity means capacity within a frame □ plus temporal availability Θ. It introduces exposure to consequences, not duty.'
      reduced_basis:
      - □
      - Θ
      case_application: Effective capacity is not applicable because the case material contains no concrete capacity within a frame over time. There is no structural basis for exposure-to-consequence or duty.
    non_innocence:
      status: not_applicable
      is_operator: false
      definition: 'Non-innocence is the structural condition in which consequences become attributable even without intent, command, guilt, or blame.'
      basis:
      - Ω
      - Θ
      - Λ
      - □
      - Ψ
      case_application: Non-innocence is not activated. The unresolved absence of knowledge-attribution is not a non-action with attributable consequences and must not be moralized into guilt, blame, or responsibility.
    apparent_norms_as_constraints:
      status: weak
      is_operator: false
      definition: 'Apparent norms are reconstructed as PMS-internal self-binding constraints that prevent structural failure modes under irreversible, asymmetric conditions. They are not commandments.'
      basis:
      - Χ
      - Σ
      - Ψ
      - Λ
      - □
      - Ω
      - Θ
      case_application: 'Apparent normative pressure is reconstructed only as a structural constraint against forced closure: where Λ persists, do not totalize Σ, do not treat PMS coherence as knowledge, and do not suppress rival epistemological readings. This is not a commandment.'
  reduced_signatures:
    PRE_MORAL_justification:
      label: Pre-moral level of justification
      applicability: active
      operators:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      reduced: true
      note: Structural preconditions of praxis; no normativity introduced.
      case_application: 'Active as shorthand for the structural preconditions of the case: Δ separates JTB from knowledge, ∇ supplies explanatory pressure, □ supplies the JTB frame, Λ marks withheld knowledge-attribution, and Α weakly marks recurrence across Gettier problems. This signature introduces no normativity.'
    LOGIC_boundary_management:
      label: Logical boundary management
      applicability: active
      operators:
      - □
      - Λ
      - Χ
      - Σ
      reduced: true
      note: 'Ordering and integration under non-closure; Χ prevents dogmatic Σ-totalization.'
      dependency_hygiene: 'This is reduced shorthand only. PMS dependencies remain authoritative.'
      case_application: Active as reduced shorthand only. □, Λ, Χ, and contested Σ make visible the closure pressure of JTB, the boundary created by luck-sensitive non-closure, the need for reflective distance, and the danger of treating integration as final truth. PMS dependencies remain authoritative.
    POST_MORAL_effects:
      label: Post-moral effects
      applicability: not_applicable
      operators:
      - Ω
      - Θ
      - Ψ
      reduced: true
      note: 'Irreversible consequence attribution under asymmetry and time; no norms derived.'
      case_application: Not applicable because the abstract epistemological case does not provide irreversible praxis under asymmetry and time, nor case-internal Ψ. No post-moral consequence-attribution is derived.
    MORAL_READABILITY_min:
      label: Moral readability field
      applicability: not_applicable
      operators:
      - Ω
      - Θ
      - Λ
      - Ψ
      reduced: true
      note: 'Morality as interpretive field generated post hoc; not an operator.'
      case_application: Not applicable because Ω, Θ, Λ, and Ψ do not form a case-internal moral-readability field. Λ is epistemological non-closure, not moral interpretability.
    POTENTIAL_effective:
      label: Effective potential / capacity
      applicability: not_applicable
      operators:
      - □
      - Θ
      reduced: true
      note: 'Situated capacity plus temporal availability; generates exposure, not duty.'
      case_application: Not applicable because no concrete capacity, access, means, authority, or temporal window is supplied. The signature is retained only as a checked boundary against responsibility overclaim.
    NON_CLOSURE_stability:
      label: Sustainable non-closure
      applicability: active
      operators:
      - Δ
      - □
      - Λ
      - Α
      reduced: true
      note: 'Openness carried within frame; attractor stabilizes non-substitution.'
      case_application: 'Active: Δ, □, Λ, and weak Α stabilize the Gettier problem as a recurrent non-closure pattern. The absence of knowledge-attribution is carried within the JTB frame rather than replaced by dogma, nihilism, metaphysics, or PMS totalization.'
    HUME_KNOT_reconstruction:
      label: Hume knot reconstruction
      applicability: not_applicable
      operators:
      - □
      - Ω
      - Θ
      - Λ
      - Ψ
      reduced: true
      note: 'Rewrites potential obligates into non-innocence and attributable consequence; preserves the is/ought boundary without crossing it.'
      case_application: Not applicable. The case does not concern the move from potential capacity to responsibility or from is to ought. It concerns epistemic sufficiency under luck, and no obligation is derived.
  failure_mode_constraints:
    note: 'The following are frame-dependent PMS-internal self-binding constraints. They are not universal prescriptions. They name conditions for coherence and non-destructive praxis under non-closure.'
    items:
    - id: FMC1
      label: A boundary that cannot be carried becomes structurally unstable.
      applicability: weak
      operator_basis:
      - Δ
      - Ψ
      meaning: 'Marking or occupying a boundary generates exposure. If the consequences cannot be sustained across time, the boundary becomes destructive rather than orienting.'
      failure_mode: Boundary inflation, authority overreach, collapse into dogma or abandonment.
      related_drifts:
      - dogmatism_sigma_totalization
      - authority_capture_omega_inflation
      case_application: Weakly applicable to theory-boundary handling: if the boundary between JTB and knowledge is asserted without being carried through Χ and rival openness, it can inflate into dogma or collapse into abandonment. This is a constraint on analysis, not a diagnosis.
    - id: FMC2
      label: Forced closure where Λ persists produces structural instability.
      applicability: active
      operator_basis:
      - Λ
      - □
      - Χ
      meaning: 'Where a structure does not yield final explanation, forced closure introduces substitute narratives such as dogma, myth, metaphysical compensation, or false certainty.'
      failure_mode: Dogmatization, metaphysical compensation, false certainty.
      related_drifts:
      - dogmatism_sigma_totalization
      case_application: Active. The case centrally involves persistent Λ: JTB does not yield unproblematic knowledge. Forced closure would introduce false certainty, metaphysical compensation, or dogmatic epistemological settlement.
    - id: FMC3
      label: Explanatory power converted into sense-making authority causes structural overreach.
      applicability: active
      operator_basis:
      - ∇
      - Σ
      - □
      - Χ
      meaning: 'Explanatory success does not confer authority over meaning. Integration is coordination, not domination; Χ prevents closure-drive from laundering authority through explanation.'
      failure_mode: Epistemic domination, technocratic moralism, authority laundering through explanation.
      related_drifts:
      - authority_capture_omega_inflation
      - technocratic_reduction_frame_overconstraint
      case_application: Active as a risk constraint. PMS and LOGIC may explain the case structurally, but explanatory power must not become authority over the meaning of knowledge, luck, justification, or rival epistemological accounts.
    - id: FMC4
      label: Where proximity generates power, viable praxis requires maintained distance.
      applicability: not_applicable
      operator_basis:
      - Χ
      - Ω
      meaning: 'Closeness increases influence; where influence increases, unregulated proximity becomes power. Χ is a condition for dignified handling of power.'
      failure_mode: Manipulation, coercive intimacy, moral overreach.
      related_drifts:
      - authority_capture_omega_inflation
      - moralism_pseudo_ought_injection
      case_application: Not applicable case-internally because the material does not involve proximity, interpersonal influence, coercive intimacy, or power generated by closeness.
    - id: FMC5
      label: Stable self-binding takes the form of restraint rather than assertion.
      applicability: weak
      operator_basis:
      - Ψ
      - Χ
      - Λ
      meaning: 'Assertions seek closure and authority; restraint preserves openness. Self-binding to restraint stabilizes praxis without commanding others.'
      failure_mode: Authoritarian certainty, moral exhibitionism, escalation dynamics.
      related_drifts:
      - dogmatism_sigma_totalization
      - moralism_pseudo_ought_injection
      case_application: Weakly applicable as analytic restraint: a stable PMS-LOGIC application should refrain from asserting final closure, superiority, or normative command. The relevant self-binding belongs to the analysis, not to the Gettier subject.
  drift_catalogue:
    note: 'LOGIC drift classes describe structural operator distortions. They are not personal traits, diagnoses, moral verdicts, forensic categories, clinical categories, maturity rankings, or enforcement categories.'
    dogmatism_sigma_totalization:
      label: Dogmatism / Σ-totalization
      applicability: risk
      distorted_operators:
      - Σ
      mechanism: 'Integration is forced into total closure, treating coherence as final truth rather than provisional coordination. Λ is denied instead of carried.'
      symptoms:
      - claims_of_ultimate_explanation
      - immunization_against_revision
      - replacement_of_structural_coherence_with_certainty
      result: 'Brittle structure under novelty; non-closure treated as error rather than constraint.'
      case_application: Risk. The main drift would be treating a coherent PMS, LOGIC, or JTB integration as final epistemic truth and denying persistent Λ. In this case, Σ must remain contested because integration among belief, truth, justification, luck, and knowledge is precisely the problem rather than the solution. The guardrail is Χ plus explicit non-capture, rival-openness, and discrimination against lucky guesses, justified false beliefs, unjustified true beliefs, and ordinary uncertainty.
    authority_capture_omega_inflation:
      label: Authority capture / Ω-inflation
      applicability: risk
      distorted_operators:
      - Ω
      mechanism: 'Asymmetry is converted from descriptive condition into justificatory principle. Power gradients are mistaken for epistemic or moral authority.'
      symptoms:
      - because_I_can_becomes_because_I_am_right
      - suppression_of_Χ
      - obscured_responsibility_pathways
      result: 'Domination may become masked as necessity; responsibility flows upward and becomes opaque.'
      case_application: Risk only at the theory-application level. Weak Ω could be inflated into authority if PMS, LOGIC, the JTB frame, or any epistemological school claimed privileged power to settle knowledge merely by imposing a frame. The case itself does not supply interpersonal authority, institutional hierarchy, role asymmetry, obligation, or vulnerability structure. Ω therefore remains weak, descriptive, and dependency-bound.
    moralism_pseudo_ought_injection:
      label: Moralism / pseudo-ought injection
      applicability: not_applicable
      distorted_operators:
      - Ψ
      - Χ
      mechanism: 'Responsibility is retranslated into obligation. Self-binding is replaced by compliance-seeking enforcement. Non-innocence is moralized into blame.'
      symptoms:
      - should_or_must_reintroduced_as_if_structurally_authorized
      - attribution_becomes_accusation
      - praxis_judged_instead_of_reconstructed
      result: 'Covert normativity is reintroduced; responsibility collapses into enforcement.'
      case_application: Not applicable to the case itself because no responsibility, non-innocence, obligation, guilt, blame, sanction, duty, or compliance-seeking enforcement is introduced. The overlay explicitly blocks pseudo-ought injection. Any statement that the belief should or must be classified in a certain way is treated as epistemological boundary management, not as a PMS-derived norm.
    nihilism_lambda_suppression:
      label: Nihilism / Λ-suppression
      applicability: risk
      distorted_operators:
      - Λ
      mechanism: 'Non-events, omissions, or restraints are treated as irrelevant. The structural significance of omission within frames under time is erased.'
      symptoms:
      - nothing_happened_so_nothing_matters
      - denial_of_omission_effects
      - flattening_of_temporal_consequence
      result: 'False innocence; responsibility dissolves through denial of structural impact.'
      case_application: Risk. One could suppress Λ by saying the absence of knowledge-attribution means nothing can be said, that the case is merely failure, or that unresolved epistemological absence is analytically empty. LOGIC instead treats Λ as structured non-closure within the JTB frame. The absence is meaningful because knowledge-attribution was expected, but it is not automatically evidence of defect, nihilism, drift, immaturity, or PMS incompleteness.
    technocratic_reduction_frame_overconstraint:
      label: Technocratic reduction / □-overconstraint
      applicability: risk
      distorted_operators:
      - □
      mechanism: 'Frames are treated as exhaustive representations of reality. What is unmodeled is dismissed or misrecognized as Λ.'
      symptoms:
      - overconfidence_in_models_or_metrics
      - ignoring_unmodeled_effects
      - frame_lock_in
      result: 'Blind spots are mistaken for non-existence; systemic fragility increases.'
      case_application: Risk. The JTB frame, PMS frame, or LOGIC frame could be treated as exhaustive, causing unmodeled features such as modal safety, sensitivity, reliabilist process conditions, internalist justification standards, defeaters, or anti-luck constraints to be dismissed. The guardrail is non-capture: what a frame does not model must not be treated as nonexistent, irrational, immature, or already solved by PMS translation.
  logic_derived_axes_projection:
    note: 'This projection is a PMS-LOGIC paper-internal structural localization. It is not a measurement of objective quality and not a person evaluation.'
    Awareness_A:
      structural_level: medium
      operator_basis:
      - Δ
      - □
      - Θ
      effect_notes:
      - Sensitivity to limits and conditions of praxis.
      - Perception of where explanation reaches a stopping point and responsibility becomes structurally relevant.
