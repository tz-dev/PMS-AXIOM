operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Δ distinguishes commitment from prophecy, possible future from fixed future, revisability from irreversibility, interpretation from enacted course, and bounded self-binding from totalized identity closure.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - Specify that the central distinction is between binding orientation and fixed prediction, not between seriousness and unseriousness.
    - Check that commitment, promise, plan, identity, obligation, and action-course are not conflated as one undifferentiated object.
    falsifier_conditions:
    - If commitment and prophecy cannot be structurally distinguished in the case, the PMS reading loses its primary entry point.
    - If all future-oriented commitment is stipulated to be necessarily irreversible, Δ no longer supports the requested problem.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ appears weakly as the directional orientation toward possible futures and toward making a commitment matter. The material does not warrant attributing subjective desire, psychological drive, or motivational pressure.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Treat the tension as structural orientation toward a future possibility, not as a mental state or affective drive.
    - Do not infer subjective desire, urgency, avoidance, or compulsion from the abstract philosophical formulation.
    falsifier_conditions:
    - If the case is only a logical distinction with no directional orientation toward commitment or action, ∇ remains under-specified.
    - If the analysis treats weak ∇ as psychological motivation, the operator is overextended.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is the philosophical action-theory frame in which commitment, possible futures, revisability, and irreversibility become relevant. It constrains the reading to structural praxis rather than metaphysics, diagnosis, law, or implementation.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Name the active frame as philosophical structural action theory about commitment without prophecy.
    - Mark any shift from conceptual projection to empirical, legal, diagnostic, or implementation framing as outside current scope unless new material supplies grounds.
    falsifier_conditions:
    - If the frame changes to a concrete empirical, legal, clinical, or technical case without further evidence, this application becomes under-specified.
    - If the frame is treated as PMS Base validation, the reading violates scope discipline.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Λ is active as the not-yet-event structure of possible futures: the future is meaningful for commitment while not yet occurring, not yet failed, and not already fixed. Because no specific expected event is supplied, Λ remains carefully bounded.'
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Specify the expected occurrence as possible future enactment or fulfillment only in a conceptual frame, not as a concrete missed event.
    - Preserve the possibility that an unresolved future or missing scene marks PMS non-capture rather than defect, failure, or incomplete integration.
    falsifier_conditions:
    - If possible futures are not structured as meaningful not-yet-events or expectations within a frame, Λ should be reduced or removed.
    - If the analysis treats absence of fulfillment as failure, avoidance, or drift without scene evidence, Λ is overclaimed.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α appears only as a risk of stabilization. A commitment could harden into a fixed interpretation, role script, or path-dependent course. The case provides no recurrence, habit, or observed pattern.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Show recurrence or stabilization before claiming an attractor; here only a philosophical risk of fixation is available.
    - Distinguish possible path-dependence from actual recurrent behavior or institutional routine.
    falsifier_conditions:
    - If no recurrence, stabilization, or path dependence is supplied, Α cannot be claimed as active pattern evidence.
    - If a single conceptual risk is treated as established drift, Α is over-read.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is weak and bounded. The case suggests an asymmetry between present commitment and future openness or between present self-binding and later constraint, but no interpersonal power, exposure, vulnerability, role hierarchy, or legal obligation is specified.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Specify the asymmetry as temporal-structural, not interpersonal or moral, unless a concrete scene later supplies power, capacity, exposure, or obligation gradients.
    - Do not moralize the asymmetry or convert it into person-ranking, blame, domination, or tribunal logic.
    - Allow Ω to remain weak because the case material does not support stronger asymmetry claims.
    falsifier_conditions:
    - If no directional imbalance between present commitment and future constraint can be identified, Ω must be marked not active.
    - If Ω is used to infer domination, vulnerability, or culpability without scene evidence, the analysis is overextended.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is central. The case concerns temporal extension, a commitment made now relates to possible futures, persists across time, and must remain revisable without being converted into destiny or irreversible trajectory.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Distinguish diachronic commitment from static preference, isolated intention, or timeless logical proposition.
    - Check that temporal orientation is not reified into inevitability, prophecy, destiny, or metaphysical continuity.
    falsifier_conditions:
    - If the case no longer requires temporal extension, anticipation, persistence, or future-directedness, Θ is overextended.
    - If Θ is treated as proof that the future is already fixed, the analysis violates the case problem.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is central because revisability requires that a commitment can be placed into new frames as circumstances, understanding, or possible futures change. In this case, Φ protects commitment from becoming a prophecy by allowing later conditions to alter the frame of relevance without automatically voiding the earlier commitment. Φ does not, however, by itself prove that a revision is justified, mature, coherent, or faithful to the original commitment.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - 'Source frame: initial commitment to a possible future; target frame: changed future conditions or revised understanding of the commitment.'
    - Check whether recontextualization clarifies the commitment or merely absorbs non-fit, resistance, disagreement, absence, or rupture into PMS terms.
    - Distinguish revision from abandonment, rationalization, tactical reframing, and retrospective smoothing. A new frame must not be treated as valid merely because it can be described in PMS language.
    falsifier_conditions:
    - If every rupture, rival framing, or refusal is absorbed as Φ, the reading is over-assimilative.
    - If revision is stipulated to be impossible, Φ is not available as a case operator.
    - If recontextualization cancels all binding force, the case ceases to be about commitment and becomes a weaker case of preference revision or non-commitment.
    non_capture_note: 'Recontextualization must preserve possible non-capture. A rival frame may be a genuine alternative formalization rather than a PMS-internal developmental shift.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is central as reflective distance from fixation, immediate enactment, identity-locking, and prophetic closure. It allows commitment to remain serious while not collapsing into irreversible interpretation. In the case, Χ is the operator that keeps the future open enough to remain possible while still allowing the present commitment to matter.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Check that the analysis suspends verdict and preserves reversibility rather than forcing closure.
    - Distinguish distance from avoidance, denial, empty neutrality, indefinite suspension, or refusal of responsibility.
    - Preserve the difference between reflective non-finality and practical emptiness. Χ should weaken premature closure, not erase commitment or action-capacity.
    falsifier_conditions:
    - If Χ is suspended in order to force a final verdict about the commitment, the PMS application becomes invalid.
    - If distance is used to avoid all enactment or responsibility, Χ is miscalibrated.
    - If reflective distance is redescribed as proof that no commitment exists, the reading collapses the case's central tension.
    non_capture_note: 'Distance protects against overclaiming and premature closure, but it does not guarantee that PMS has captured the full philosophical structure of revisable commitment.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is active as a requirement rather than an achieved result. The case asks how binding and revisability can be integrated without one cancelling the other. Σ must therefore hold a tension: too little integration leaves only open-ended revisability, while too much integration risks forced coherence, identity foreclosure, or premature closure. No concrete action scene shows that integration has actually occurred.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Test whether integration discriminates between commitment, revision, abandonment, rationalization, and irreversible fixation.
    - Distinguish integration from forced coherence, premature closure, or smoothing over the core tension.
    - Treat PMS coherence as insufficient by itself. A PMS-consistent formula may still fail if it does not discriminate commitment from prophecy or revision from evasion.
    falsifier_conditions:
    - If PMS coherence is treated as proof that the problem is solved, Σ is overclaimed.
    - If binding and revisability cannot be held together without contradiction under the case frame, Σ remains under-specified.
    - If integration erases the possibility of non-capture, rival formalization, or tragic remainder, it exceeds PMS application discipline.
    non_capture_note: 'PMS coherence is insufficient by itself. Integration must not become a mechanism for hiding unresolved philosophical difference.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is central because commitment is self-binding across time. The case turns on whether self-binding can persist without becoming prophecy, identity foreclosure, or an irreversible self-command. Ψ must therefore be read as revisable self-binding rather than as a metaphysical self, fixed destiny, or conclusive identity claim.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Apply Ψ only to structural self-binding in the philosophical problem, not to metaphysical selfhood or psychological identity.
    - Keep Ψ dependent on Σ, Θ, and Χ so that self-binding remains integrated, temporal, and reflective rather than fixed or prophetic.
    - Require Φ and Χ to remain active around Ψ. Without recontextualization and distance, self-binding risks becoming the very irreversible commitment structure the case problematizes.
    falsifier_conditions:
    - If Ψ is applied without Σ, Θ, and Χ, the self-binding reading is under-specified.
    - If self-binding is treated as proof of subjectivity, destiny, or unrevisable identity, the analysis violates PMS boundaries.
    - If commitment is reduced either to fixed identity or to fully optional preference, Ψ no longer discriminates the case adequately.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity. In this case it remains analytic-only because the material supplies no concrete stabilized self-relation.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.'
    case_function: 'L1 establishes the abstract problem-space: differences between commitment and prophecy, weak directional orientation toward possible futures, a philosophical frame, possible futures as not-yet-events, and only a weak risk of stabilization into fixed patterns.'
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.'
    case_function: L2 is partially active. Θ is central as temporal extension, while Ω is weak and limited to temporal-structural asymmetry between present self-binding and future openness rather than interpersonal power or vulnerability.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.'
    case_function: 'L3 carries much of the case: Φ supports revisability, Χ protects distance from closure, and Σ tests whether commitment and revisability can be integrated without forced coherence.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.'
    case_function: 'L4 is central as analytic self-binding: Ψ names the structure of commitment across time, but it is not treated as metaphysical selfhood, diagnosis, person-ranking, or established SELF_FIXPOINT.'
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case depends on the distinction between commitment and prophecy and between possible and fixed futures.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: Only weakly satisfied by structural orientation toward possible future commitment; no psychological impulse is inferred.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: Satisfied by the explicit philosophical frame concerning commitment, revisability, and irreversibility.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Weakly satisfied by possible futures as meaningful not-yet-events; no concrete missed occurrence is provided.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: Weakly satisfied as a risk of stabilization into fixed interpretation; no recurrence is evidenced.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Weakly satisfied as temporal-structural asymmetry between present commitment and future constraint; no interpersonal asymmetry is evidenced.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Strongly relevant as temporal commitment, but dependency is weak because Ω and Α are weak.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Relevant as recontextualization under future change, but dependency is weak because Ω is weak and the case is non-scenic.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Satisfied as reflective distance preserving reversibility and preventing prophetic closure.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Satisfied as an analytic requirement to integrate binding with revisability, not as an observed achievement.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Satisfied as the self-binding structure of commitment, bounded by Σ, Θ, and Χ and not treated as metaphysical selfhood.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
