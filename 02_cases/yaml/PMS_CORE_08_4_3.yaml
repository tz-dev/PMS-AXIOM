analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - pms_internal_structural_projection
    - non_concrete_philosophical_case_typing
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The case type permits operator-level structural projection and calibration analysis. It does not permit
      empirical finding, concrete scene judgment, diagnosis, legal or forensic conclusion, implementation claim, person-ranking,
      or PMS Base validation.
  coherence_risk:
    status: high
    reason: The case strongly fits PMS vocabulary around frame, asymmetry, non-uptake, recontextualization, distance, and
      dignity-in-practice. This fit is analytically useful, but it also creates the risk that the PMS rendering becomes too
      smooth, converts a morally and politically contested domain into an internally elegant operator chain, or mistakes
      structural coherence for sufficient discrimination.
    mitigation: The reading therefore keeps several operators weak or conditional, preserves non-capture, keeps rival readings
      open, includes falsifier conditions, refuses PMS Base validation, and explicitly denies that PMS coherence is sufficient
      by itself. In particular, disagreement, silence, rupture, refusal, missing evidence, rival framing, and non-fit are
      not automatically redescribed as drift, incomplete integration, incomplete calibration, or maturity failure.
  coverage_vs_discrimination:
    coverage_result: PMS covers the structural relation among credibility distinctions, interpretive frames, possible non-uptake,
      possible recurrence, asymmetry, conditional temporality, recontextualization, reflective restraint, weak integration,
      and dignity-in-practice guardrails.
    discrimination_requirement: The reading must distinguish epistemic injustice from ordinary disagreement, evidentiary
      caution, legitimate non-uptake, misunderstanding, communication failure, refusal, silence, rupture, conceptual mismatch,
      strategic disagreement, and genuine non-capture. It must also distinguish a PMS-internal structural projection from
      empirical finding, metaphysical claim, diagnostic assessment, legal or forensic judgment, implementation design, and
      PMS Base validation.
    discrimination_status: partial_but_explicitly_guarded
  discrimination_tests:
  - id: DT1
    test: Distinguish epistemic injustice from ordinary disagreement or evidentiary insufficiency.
    expected_pms_distinction: □ and Ω must show a credibility or interpretive frame with asymmetrical participation; Λ must
      identify structured non-uptake rather than mere lack of agreement.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish structured non-uptake from legitimate refusal, silence, or non-capture.
    expected_pms_distinction: Λ must be tied to a specified expectation within □, while Χ and P7 preserve the possibility
      that absence or resistance is not PMS drift or integration failure.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: What calibrates Difference in this case?
    current_calibration: satisfied
  - operator: ∇
    question: What calibrates Impulse in this case?
    current_calibration: weak
  - operator: □
    question: What calibrates Frame in this case?
    current_calibration: satisfied
  - operator: Λ
    question: What calibrates Non-Event in this case?
    current_calibration: weak
  - operator: Α
    question: What calibrates Attractor in this case?
    current_calibration: weak
  - operator: Ω
    question: What calibrates Asymmetry in this case?
    current_calibration: partial
  - operator: Θ
    question: What calibrates Temporality in this case?
    current_calibration: weak
  - operator: Φ
    question: What calibrates Recontextualization in this case?
    current_calibration: partial
  - operator: Χ
    question: What calibrates Distance in this case?
    current_calibration: satisfied
  - operator: Σ
    question: What calibrates Integration in this case?
    current_calibration: weak
  - operator: Ψ
    question: What calibrates Self-Binding in this case?
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - Phenomenology of being disbelieved, silenced, humiliated, or excluded as a knower.
    - Historical, political, sociological, and institutional accounts of oppression that may require non-PMS concepts.
    - Legal and evidentiary categories that cannot be derived from PMS without jurisdiction-specific criteria.
    - Legitimate disagreement, evidentiary caution, refusal, rupture, or silence that should not be absorbed into PMS drift
      or failed integration.
    rule: 'These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured
      absence, or failed maturity. They may mark genuine limits of the PMS reading.'
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - Moral-philosophical reading of epistemic injustice as wrong done to persons in their epistemic capacity.
    - Political-structural reading focused on social power and credibility distribution.
    - Hermeneutical reading focused on gaps in shared interpretive resources.
    - Speech-act reading focused on uptake and participation.
    - Empirical-sociological or legal-forensic reading requiring evidence outside PMS.
    - Non-capture reading in which PMS remains only partially adequate.
    rule: 'Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria are explicitly
      specified and applied.'
  falsifier_conditions:
  - id: F1
    condition: The PMS reading would be weakened if no credibility, interpretive, or participation asymmetry can be specified,
      or if the case is better explained as ordinary disagreement, misunderstanding, or evidentiary insufficiency.
  - id: F2
    condition: The PMS reading would be under-discriminating if it cannot distinguish epistemic wronging from legitimate non-uptake,
      silence, refusal, rupture, or rival framing.
  - id: F3
    condition: The PMS reading would over-assimilate the case if it treats all resistance, absence, disagreement, or non-fit
      as drift, incomplete integration, recontextualization, maturity failure, or calibration residue.
  final_quality_status:
    result: usable_with_limits
    reason: The PMS projection is usable as a reversible conceptual pre-application because it preserves operator discipline,
      weak dependencies, rival readings, non-capture, and falsifier conditions; it remains under-specified for concrete,
      empirical, legal, clinical, or implementation use.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: 'These requirements identify what would be needed to turn the PMS projection into a calibrated empirical, comparative,
    computational, legal, clinical, or applied analysis.'
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: Operational use would require observable distinctions among roles such as speaker, hearer, knower, interpreter,
        credible participant, discounted participant, and excluded contribution.
      ∇: Operational use would require observable directional tension such as requests for uptake, attempts at correction,
        interpretive assertion, resistance to dismissal, or participation claims.
      □: Operational use would require a specified frame such as a conversation, institution, discipline, legal setting, classroom,
        workplace, or interpretive community.
      Λ: Operational use would require a defined expected uptake, response, recognition, interpretive resource, or credibility
        assignment whose absence matters within the frame.
      Α: Operational use would require evidence of recurrence, stabilization, routine, path dependence, or role-script formation
        rather than a single abstract claim.
      Ω: Operational use would require evidence of directional imbalance in credibility, interpretive authority, exposure,
        capacity, vulnerability, obligation, or participation.
      Θ: Operational use would require sequence, duration, delay, accumulation, historical persistence, or trajectory evidence.
      Φ: Operational use would require documented source and target frames and criteria showing that recontextualization improves
        discrimination rather than absorbs non-fit.
      Χ: Operational use would require procedures preserving reversibility, restraint, no person-ranking, and no premature
        verdict or enforcement.
      Σ: Operational use would require criteria for integration that distinguish coherence from smoothing, suppression, or
        premature closure.
      Ψ: Operational use would require explicit self-binding commitments by agents, institutions, or analytic procedures
        across time.
    negative_cases:
    - A disagreement in which all parties have equal credibility standing and no structured non-uptake is present.
    - A refusal to accept testimony based on transparent evidence standards rather than credibility asymmetry.
    - A silence or absence that marks legitimate non-participation or non-capture rather than epistemic wronging.
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: Operationalization is not fulfilled. The present document is a conceptual PMS projection only and would
    require empirical, comparative, and applied validation before use in concrete cases or systems.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: The case does not infer motives, traits, emotions, resentment, defensiveness, credibility competence,
      or psychological essence from epistemic participation structures.
    non_metaphysical: The case does not claim metaphysical dignity, consciousness, essence, personhood, or ontological status;
      Dignity-in-Practice remains praxeological.
    non_diagnostic: The case is not used to diagnose individuals, groups, institutions, or communities, and does not assign
      pathology, maturity level, risk, or clinical status.
    non_legal_forensic: The case does not establish liability, discrimination finding, evidentiary breach, procedural violation,
      culpability, or legal responsibility.
    non_implementation_claim: The case does not provide policy, governance, moderation, software, institutional, or intervention
      design; operationalization would require additional evidence and accountability.
    non_moral_ranking: No participant is ranked as morally superior, inferior, immature, enlightened, credible by essence,
      or epistemically defective by essence.
    non_exhaustive_capture: PMS translation remains partial and reversible; lived, historical, political, phenomenological,
      legal, or resistant aspects may exceed PMS capture.
    reversibility: Every operator activation remains revisable, especially Λ, Α, Θ, Σ, and Ψ, because the case is abstract
      and lacks concrete evidence.
    dignity_in_practice: Dignity-in-Practice is preserved by analyzing asymmetry with restraint and without shaming, humiliation,
      ranking, ontological evaluation, or irreversible labeling.
limits:
- The PMS reading is limited by the absence of a concrete praxis scene, specified agents, institutions, timeline, evidence,
  uptake event, or enacted response.
- No empirical, metaphysical, diagnostic, clinical, legal, forensic, implementation, or PMS Base validation status is established
  by this conceptual projection.
- Rival readings and possible non-capture remain open; PMS does not defeat moral-philosophical, political, hermeneutical,
  speech-act, empirical, legal, or phenomenological accounts by default.
- The case strongly fits several PMS operators, so the analysis carries high coherence risk and must be constrained by discrimination
  tests, falsifier conditions, and non-capture zones.
case_synthesis:
  primary_pms_reading: Epistemic Injustice is structurally projectable as a credibility-and-interpretation asymmetry within
    a frame of shared understanding. The PMS reading is strongest where distinctions of knowing, interpreting, credibility,
    and participation are framed by shared expectations and where non-uptake, exclusion from intelligibility, or denial of
    credible participation can be specified without turning the analysis into a tribunal.
  continuity_condition: Continuity would require evidence that credibility, interpretation, participation, or non-uptake
    persists, recurs, stabilizes, accumulates, or becomes role-structured across time. This temporal reading is plausible
    for many epistemic-injustice contexts, but it is not established by the abstract case material and therefore remains
    conditional rather than fully activated.
  change_condition: Change is modeled through Φ only as a bounded recontextualization from ordinary disagreement, misunderstanding,
    failed communication, or lack of uptake toward possible epistemic wronging under asymmetry. This recontextualization
    is valid only insofar as it improves discrimination and does not absorb all rival readings into PMS terms.
  rupture_or_non_fit_condition: Rupture, resistance, disagreement, absence, silence, missing evidence, and rival framing
    are preserved as possible non-capture or legitimate alternative readings. They are not automatically translated into
    drift, failed integration, incomplete calibration, recontextualization residue, immaturity, or refusal of responsibility.
  responsibility_condition: Responsibility_R remains weak unless asymmetry, temporal extension, recontextualization, and
    self-binding commitments are specified. The case does not assign blame, guilt, liability, legal responsibility, forensic
    responsibility, diagnostic status, or moral rank.
  dignity_condition: Dignity-in-Practice constrains the analysis by requiring restraint under epistemic asymmetry. It forbids
    shaming, ranking, humiliation, ontological evaluation, irreversible labels, and the conversion of credibility asymmetry
    into person-level superiority or inferiority.
  rival_reading_condition: Rival formalizations remain open and may be more discriminating in moral, political, hermeneutical,
    legal, empirical, phenomenological, sociological, or speech-act contexts. PMS translation therefore remains a bounded
    structural projection rather than a claim of exhaustive capture.
