  operator_inventory_status: no_additional_pms_operators_introduced
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Δ marks the distinctions that make the case analyzable: knower versus excluded knower, interpreter versus
      interpreted object, credible participant versus discounted participant, recognized contribution versus dismissed contribution,
      and shared understanding versus exclusion from that shared field.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The relevant distinctions concern epistemic role, credibility, interpretive standing, participation, and uptake; they
      are structural distinctions, not person rankings.
    - The analysis must check whether these distinctions are supplied by the case frame or imported too quickly from external
      theories of epistemic injustice.
    falsifier_conditions:
    - If the case cannot distinguish credibility, interpretation, participation, or uptake from ordinary undifferentiated
      conflict, the PMS reading loses its entry point.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: '∇ appears as weak structural directedness: pressure toward testimony, interpretation, recognition, correction,
      resistance to dismissal, or participation in shared understanding. The abstract case does not establish subjective desire
      or affect.'
    dependency_status: satisfied
    analytic_weight: minor
    calibration_points:
    - 'The tension is conceptual and praxeological: the field is oriented by the difference between recognized and discounted
      knowing or interpreting.'
    - No subjective urge, motive, resentment, defensiveness, or psychological state is inferred from the abstract case material.
    falsifier_conditions:
    - If no orientation toward uptake, correction, participation, or recognition arises from the distinctions, ∇ remains under-specified.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is central because credibility, interpretation, relevance, authority, and participation are intelligible
      only within frames that determine whose claims count and how shared understanding is structured.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is the credibility-and-interpretation frame governing participation in shared understanding.
    - Any shift from ordinary disagreement to epistemic wronging must be explicitly marked as a frame shift, not assumed as
      automatic.
    falsifier_conditions:
    - If no credibility, interpretive, conversational, institutional, or participatory frame can be specified, the PMS analysis
      becomes too abstract to discriminate.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Λ is weak to active as possible structured non-uptake: not being heard, believed, interpreted, recognized,
      or given resources for intelligible participation. The case does not specify a concrete expected occurrence.'
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - The expected occurrence would need to be specified as uptake, response, interpretive availability, recognition, credibility,
      or participation within a defined frame.
    - Absence, silence, refusal, or non-fit must remain open as possible PMS non-capture or legitimate disagreement, not automatically
      as defect or failed integration.
    falsifier_conditions:
    - If no structured expectation of uptake, interpretation, recognition, or response exists, Λ should be removed or marked
      not active.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is weak because epistemic injustice often concerns recurrent credibility deficits or stabilized interpretive
      exclusion, but the supplied case material does not prove recurrence, path dependence, or a stable role script.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Recurrence would require evidence of repeated non-uptake, repeated credibility discounting, routine interpretive exclusion,
      or stabilized participation barriers.
    - A general philosophical concept is not itself evidence of an attractor in a concrete scene.
    falsifier_conditions:
    - If recurrence or stabilization is not shown, Α remains weak and cannot support strong claims about entrenched patterning.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is central as structural imbalance in credibility, interpretive authority, exposure, vulnerability, or
      participatory standing. The case concerns being wronged specifically where such standing is asymmetrically distributed
      or denied.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The asymmetry must be specified as credibility asymmetry, interpretive-resource asymmetry, authority asymmetry, vulnerability
      asymmetry, or participation asymmetry.
    - Asymmetry is not moralized by default; PMS marks directional imbalance without automatically assigning guilt or superiority.
    - Ω remains weak in dependency terms until Α, recurrence, or stabilized role differentiation is concretely evidenced.
    falsifier_conditions:
    - If no directional imbalance in credibility, interpretation, exposure, obligation, or participation is identifiable,
      Ω claims must be withdrawn or marked weak.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is weak to active because epistemic injustice may unfold through repetition, delay, accumulated credibility
      loss, inherited interpretive gaps, or persistent exclusion, but the abstract case material gives no timeline.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Diachronic structure would require sequence, recurrence, accumulation, delayed recognition, historical persistence,
      or ongoing role stabilization.
    - If the analysis remains conceptual and non-scenic, temporality should be treated as conditional rather than fully evidenced.
    falsifier_conditions:
    - If temporal extension, delay, sequence, accumulation, or persistence is irrelevant to the intended reading, Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is central because the case asks how morally difficult situations should be understood when reframed
      as wrongs to knowing, interpreting, or credible participation rather than as mere disagreement or communication failure.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The source frame may be ordinary disagreement, misunderstanding, lack of evidence, or failed communication; the target
      frame is possible epistemic wronging under credibility and interpretive asymmetry.
    - Recontextualization must clarify discriminative structure and must not absorb all rupture, resistance, disagreement,
      or rival framing as PMS residue.
    falsifier_conditions:
    - If every disagreement, refusal, absence, or rival interpretation is absorbed as Φ without discrimination, the reading
      becomes over-assimilative.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is central as the application guardrail that keeps the PMS reading reflective, reversible, bounded, non-tribunal,
      and non-person-ranking. It also models suspension of immediate credibility verdicts where the case is later concretized.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The analysis suspends verdict, avoids enforcement, and preserves reversibility because the case is abstract and not
      a concrete scene.
    - Distance is not avoidance or empty neutrality; it is reflective restraint that prevents PMS from becoming a moral verdict
      machine.
    falsifier_conditions:
    - If Χ is suspended to force a verdict about persons, groups, institutions, guilt, maturity, or truth, the PMS application
      is invalid.
    non_capture_note: 'Distance protects against overclaiming and premature closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is weak because the case may require coordination among credibility, testimony, interpretation, disagreement,
      absence, and asymmetry, but no concrete integration or enacted resolution is supplied.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Integration must discriminate among epistemic injustice, ordinary disagreement, evidentiary insufficiency, legitimate
      non-uptake, and non-capture rather than smoothing them into one coherent story.
    - Forced coherence would overclaim PMS and risk erasing rupture, refusal, or unresolved absence.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy or as a substitute for evidence, Σ is overclaimed.
    non_capture_note: 'PMS coherence is insufficient by itself.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is weak in the case object but active as analytic discipline. It may become relevant if agents or institutions
      bind themselves over time to norms of credible uptake, interpretive fairness, and restraint under asymmetry; such commitments
      are not specified.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Ψ applies only where self-binding, stable normativity, responsibility-as-self-commitment, or analytic self-binding is
      explicitly in scope.
    - No literal selfhood is attributed to abstract concepts, institutions, or groups; any institutional use would be structural
      self-binding only.
    falsifier_conditions:
    - If Ψ is applied without specified Σ, Θ, and Χ, or without a scoped self-binding commitment, the self-binding reading
      is under-specified.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent
      patterns.'
    case_function: L1 structures the case by identifying the basic distinctions, directional pressures, credibility-and-interpretation
      frames, possible non-uptake, and possible recurrent patterns that make epistemic wronging formally legible.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories
      and commitments.'
    case_function: L2 is conceptually important because credibility, interpretation, and participation may be asymmetrically
      distributed and temporally accumulated, but concrete temporal and recurrent evidence is absent.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature
      forms of praxis.'
    case_function: 'L3 provides the strongest application discipline: the case is recontextualized as possible epistemic
      wronging while Χ prevents verdict-fusion and Σ remains weak until discrimination is shown.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across
      time and contexts.'
    case_function: L4 is analytic-only and weak for the case object. Ψ constrains the application as self-binding discipline,
      and would become case-primary only if explicit long-term commitments to epistemic responsibility were supplied.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The conceptual case begins from distinctions among knower, interpreter, credible participant, dismissed
      contribution, and shared understanding.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: The distinctions generate weak structural directedness toward uptake, recognition, interpretation, correction,
      or participation.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: The credibility-and-interpretation frame makes those distinctions and tensions relevant to shared understanding.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Possible non-uptake, non-recognition, or absent interpretive resources are conceptually relevant, but no
      concrete expected occurrence is specified.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: Recurrence and stabilization are possible in epistemic injustice but are not evidenced by the abstract case
      material.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Asymmetry is conceptually central, but its dependency on stabilized attractor formation is weak because
      no concrete pattern is supplied.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Temporal accumulation or delayed recognition is plausible but not established; Θ is therefore conditional
      and weak.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Recontextualization is active as a conceptual shift from ordinary disagreement or failure of communication
      to possible epistemic wronging.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Distance is maintained as application discipline and depends on the weak but explicit recontextualization,
      temporality, and frame structure.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Integration remains weak because the case does not provide enough scene detail to synthesize tensions without
      smoothing over them.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Self-binding is analytic discipline and possible institutional or agent commitment only; no full SELF_FIXPOINT
      is established.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
