    case results, because integration and self-binding are not established by the abstract case material.
  final_validity_status: valid_with_limits_and_high_coherence_risk
  final_claim_boundary: 'This formula states a PMS-internal structural projection of the case. It does not establish empirical
    truth, metaphysical truth, phenomenological completeness, diagnostic validity, clinical validity, legal or forensic validity,
    implementation validity, moral ranking, person-level maturity, or PMS Base validation. The formula is valid only as a
