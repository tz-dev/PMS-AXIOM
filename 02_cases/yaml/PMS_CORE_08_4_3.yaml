  primary_formula: Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  primary_formula_status: primary_case_model_with_conditional_middle_operators
  compressed_reading: PMS projects Epistemic Injustice as a bounded, reversible structure in which credibility and interpretive
    differences are framed, oriented toward uptake or participation, possibly marked by structured non-uptake, possibly
    stabilized into recurrent patterns, asymmetrically distributed, conditionally temporalized, recontextualized as epistemic
