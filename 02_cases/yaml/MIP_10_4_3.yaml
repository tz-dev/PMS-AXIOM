  acrp_profile:
    A_awareness:
      observations: >
        A-awareness is structurally central but empirically under-specified.
        The completed PMS Core analysis shows that the case turns on framed
        distinctions. MIP adds that mature handling would require awareness of
        the boundary type, the relevant frame, possible asymmetries, publicness
        conditions, real information limits, and the difference between
        material evidence and inference.
      available_information: >
        Available information includes the abstract case description, the PMS
        Core result □ ∘ Δ with conditional later operators, and the PMS-SEX
        non-activation result. No concrete episode, role history, institutional
        rule, legal standard, communication record, or affected-person
        testimony is available.
      realistically_knowable: >
        At this stage it is realistically knowable that the case is not a
        concrete scene, that later operator and MIP activations are
        under-specified, that sexuality-specific overlay handles are not
        activated, and that responsible application requires calibration
        before scoring or intervention.
      blind_spots: >
        Unknowns include actors, boundary type, role mandates, asymmetry
        direction, knowledge states, power to act, temporal sequence,
        publicness, harm, consent or refusal, repair attempts, legal frame,
        clinical relevance, and whether any party experienced dignity-in-
        practice harm.
      role_awareness_A_R: >
        Role awareness is not assessable for participants. At the analysis
        level, role awareness is maintained by marking the analyst as an
        external structural observer and not a tribunal, clinician, lawyer, or
        decision-maker.
      publicness_awareness_A_P: >
        Publicness awareness is preserved negatively: the analysis explicitly
        marks publicness as not established and refuses public D readings or
        public accusation logic.
      bias_awareness: >
        Bias risks are explicitly marked: coherence bias, moralization,
        psychologizing, legalization, sexualization, and false neutrality.
    C_coherence:
      observations: >
        Coherence is moderate at the analysis level and under-specified at the
        case level. The completed PMS and PMS-SEX analyses coherently preserve
        boundaries: PMS Core remains conservative, PMS-SEX remains non-
        activating, and MIP does not convert absence into verdict.
      word_deed_relation: >
        No participant word-deed relation exists in the material. At the
        analytic level, word and deed align if the output actually refrains
        from scoring persons, activating SEX handles, or claiming concrete
        maturity findings.
      role_context_coherence: >
        Role-context coherence is preserved by keeping each model in its role:
        PMS.yaml as base reference, PMS-SEX as overlay, MIP as maturity-in-
        practice lens, and the abstract case as non-scene material.
      narrative_coherence: >
        The narrative is coherent as a sequence of applications: PMS Core
        identifies the minimal structural entry point; PMS-SEX prevents
        unwarranted sexualization; MIP identifies maturity conditions and
        under-specification. The risk is that this coherence may become too
        smooth and under-discriminating.
      breaks_named_or_hidden: >
        Breaks are named rather than hidden: no concrete scene, no sexual
        material, no calibrated asymmetry, no publicness, no evidence for D
        activation, and no fair basis for A/M scoring.
    R_responsibility:
      observations: >
        Responsibility is a topic in the case material but not yet a calibrated
        MIP responsibility finding. MIP requires knowledge, power, alternatives,
        predictability, and integration attempts before assigning shared
        structural responsibility.
      responsibility_points: >
        The mature responsibility points at this stage belong mainly to the
        analysis: do not overclaim, do not person-rank, do not sexualize, do
        not diagnose, do not legalize, do not score, and do not erase possible
        harm if later evidence appears.
      assumed_responsibility: >
        The analysis assumes responsibility for model hygiene, distinction
        management, claim typing, and preservation of non-capture. It also
        assumes responsibility for marking missing evidence.
      shifted_or_refused_responsibility: >
        No participant responsibility shift is evidenced. Analytic
        responsibility would be refused if the analysis used MIP to produce
        a maturity verdict from abstract material.
      burdens_and_consequences: >
        No concrete burdens or consequences are evidenced. Possible burdens in
        future scenes could include role overload, boundary intrusion, loss of
        voice, responsibility dumping, public exposure, dignity stress, or
        blocked exit, but these remain hypothetical.
    P_power_to_act:
      observations: >
        Power to act is not assessable for participants. The only present
        power-to-act lies in the analysis: the ability to clarify, withhold,
        distinguish, mark under-specification, and formulate operationalization
        requirements.
      real_levers: >
        Real analytic levers include claim typing, guardrail enforcement,
        explicit under-specification, non-capture preservation, and refusal of
        person-level conclusions. Concrete practical levers are unknown.
      formal_vs_real_options: >
        Formal options include producing a full MIP case template, but real
        responsible options are constrained by missing evidence. The analysis
        may map conditions but cannot prescribe scene action.
      used_options: >
        The analysis uses the option to produce a complete structural YAML
        while keeping D off, A/M bands unassigned, IA non-verdictal, and SEX
        handles non-activated.
      unused_options: >
        Unused options include scoring persons, activating D-profile, issuing
        practical directives, deriving legal or clinical conclusions,
        sexualizing the case, or claiming a final maturity finding.
      ceiling_rule_relevance: >
        The ceiling rule is highly relevant: because predictability and access
        to alternatives are unknown for all hypothetical participants, any high
        M-score would be blocked.

