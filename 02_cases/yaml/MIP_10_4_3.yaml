case:
  meta:
    case_id: boundary_confusion_mip_layer
    case_title: Boundary Confusion — MIP Layer over PMS Core and PMS-SEX Overlay
    documentation_date: '2026-07-07'
    analysts:
    - name: T. Zöller / ChatGPT 5.5 Thinking
      role: formalization and structural review
      observer_position: external model-assisted analyst working from completed PMS Core and PMS-SEX YAML layers only
    language: en
    confidentiality_level: anonymised_public
    analysis_mode: full
    intended_use: structural_case_review_for_scientific_work
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: philosophy_anthropology
      d_activation_decision: not_activated_as_full_D_module; D_guardrails_used_only
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: Completed PMS Core case YAML for Boundary Confusion and completed PMS-SEX overlay YAML appended to that
      Core case.
    secondary_material: PMS.yaml as Core operator grammar, PMS-SEX.yaml as sexual-praxeological overlay profile, and MIP YAML
      as maturity-in-practice case template.
    assumptions_and_inferences: 'The analysis assumes the Core pass remains unchanged and that the SEX overlay has been narrowed
      after review: sexuality-specific cost, access, embodiment, withdrawal, drift and viability claims are indeterminate
      or non-capture because no concrete sexual scene is supplied. MIP therefore reads the case as a conceptual structural
      boundary problem, not as an evaluation of persons.'
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: medium
      reliability_estimate: medium
      known_gaps:
      - No concrete episode, actor identity, institutional setting, dates, evidence, affected-party perspective, or enacted
        boundary event is supplied.
      - PMS-SEX resolved mainly as non-capture, so sexuality-specific MIP readings cannot be activated substantively.
      - A-score and M-score cannot be assigned as ordinary bands without overclaiming.
      main_bias_risks_here:
      - 'formal-coherence bias: the case may appear more determinate because the YAML is complete'
      - 'hindsight bias: later overlay discipline may make the Core case look more calibrated than the original abstract material
        permits'
      - 'scope creep: boundary language could be overextended into sexuality, maturity, dignity, legality, or psychology without
        scene evidence'
  snapshot:
    short_case_description: 'Boundary Confusion is a conceptual PMS Core case about unclear, contested, or repeatedly crossed
      boundaries between roles, responsibilities, spaces, or decisions. The PMS-SEX overlay adds only scope discipline and
      strong non-capture because no concrete sexual-praxeological scene is present. MIP reads the configuration as an abstract
      maturity-in-practice problem: how awareness, coherence, responsibility and power-to-act can be discussed without turning
      structural boundary ambiguity into person labels, maturity verdicts or dignity rankings.'
    central_actors_and_roles:
    - role_A as abstract boundary-position, not a person
    - role_B as abstract counter-position or affected boundary-position, not a person
    - field_or_medium as conceptual boundary frame and scientific-model context
    guiding_question: What maturity-in-practice structure is visible when the completed PMS Core boundary analysis and the
      PMS-SEX non-capture overlay are translated into A–C–R–P terms without scoring persons or activating unwarranted D, sexual,
      legal, clinical or forensic claims?
    level:
    - conceptual
    - dyadic
    - institutional_or_relational_possible_but_unspecified
    - model_documentation
    first_visible_asymmetry: Possible asymmetry in interpretive authority, boundary-setting power, responsibility allocation,
      access to clarification, or burden of correction; direction and magnitude remain unspecified.
    first_visible_D_themes_optional:
    - Dignity-in-practice is relevant as a guardrail against shaming, person-ranking and forced clarity, but the full D-module
      is not activated because no concrete scene and no identifiable person-level D-enactment are supplied.
  role_mapping:
    object_of_observation:
      type: narrative
      description: 'The object of observation is the completed multi-layer case construction: PMS Core Boundary Confusion
        plus the narrowed PMS-SEX overlay.'
      role: conceptual case-type used for structural model application
      not_person_as_whole: true
    observer_position:
      role: external structural analyst using MIP after PMS and PMS-SEX passes
      power_relation_to_object: The analyst has interpretive power over the formalized case text but no authority over persons,
        facts, legal outcomes, therapeutic treatment, or practice guidance.
      possible_effects_of_analysis: The analysis may stabilize terminology, guardrails and research presentation; it must
        not harden into person evaluation or decision basis.
    involved_roles:
    - role: role_A_boundary_position
      mandate: abstractly associated with crossing, defending, contesting, clarifying or claiming a boundary
      built_in_asymmetries:
      - possible interpretive authority
      - possible responsibility externalization
      - possible access to frame-setting, all unspecified
      publicness_level: private
      dignity_exposure: indeterminate; no person or concrete dignity exposure is supplied
    - role: role_B_counter_position
      mandate: abstractly associated with receiving, contesting, holding, resisting, clarifying or being affected by the boundary
      built_in_asymmetries:
      - possible burden of correction
      - possible exposure to boundary ambiguity
      - possible weaker access to frame-setting, all unspecified
      publicness_level: private
      dignity_exposure: indeterminate; no person or concrete dignity exposure is supplied
    - role: scientific_model_context
      mandate: maintain structural conformity, non-capture, reversibility and guardrail discipline across PMS, PMS-SEX and
        MIP layers
      built_in_asymmetries:
      - model language may over-legibilize the case
      - formal YAML may appear more authoritative than the material permits
      publicness_level: anonymised_public
      dignity_exposure: low if anonymised and structurally bounded; higher if reused as person verdict
    publicness:
      level: anonymised_public
      A_P_relevance: 'High for the analysis artefact: publication or scientific use requires awareness that formal labels
        can be misread as verdicts.'
      P_PU_relevance: 'Moderate: the analyst has public interpretive power if the YAML enters a scientific work, even though
        the case is abstract.'
      D_P_relevance_if_D_active: D-P would become relevant only if the analysis were attached to identifiable persons or public
        critique; here it remains a guardrail.
      public_shaming_risk: Low in the abstract version, but structurally important as a misuse risk if the template is later
        applied to identifiable persons.
      reversibility_risk: 'Medium: formal completeness may reduce perceived revisability unless non-capture and weak-status
        markers remain explicit.'
  frame_vs_variability:
    frame_elements:
    - element: PMS Core operator inventory and dependencies
      reason_fixed_or_slow: The user explicitly requires no redefinition of PMS operators and no dependency changes.
      protected_goods:
      - operator hygiene
      - model integrity
      - reversibility
    - element: PMS-SEX overlay-only status
      reason_fixed_or_slow: The SEX layer is subordinate to Core and has been structurally checked against its template.
      protected_goods:
      - non-capture
      - anti-sexualization guard
      - no person verdict
    - element: MIP person/enactment separation
      reason_fixed_or_slow: MIP constitutively forbids using maturity language as a person type or dignity ranking.
      protected_goods:
      - D0 untouched
      - profile not person
      - score hygiene
    variability_elements:
    - element: Concrete scene evidence
      possible_change: A later case could add actors, time window, episode sequence, institutional frame, or affected-party
        perspective.
      responsible_roles:
      - future analyst
      - case author
      - source material provider
    - element: Degree of MIP scoring
      possible_change: A-score and M-score could be assigned only if a concrete enactment with knowability, power, alternatives
        and predictability is supplied.
      responsible_roles:
      - future analyst
      - reviewer
    - element: D-module activation
      possible_change: D could be activated in a safe, role-bound and non-public frame if concrete D-enactments are documented
        and D brings more clarity than shame.
      responsible_roles:
      - future analyst
      - moderator_or_supervisor_if_applicable
    unfair_high_M_zones:
    - Any high M-score for role_A or role_B would be unfair because predictability, alternatives, real levers and actual consequences
      are unspecified.
    - Any maturity verdict would be unfair because the case is a conceptual domain projection, not an observed enactment.
    system_as_excuse_risk:
    - The abstractness of the case could be used to avoid naming concrete responsibility if later evidence exists.
    - Model complexity could become an excuse for not distinguishing unclear, contested, crossed, violated, negotiated or
      legally defined boundaries.
    D1_D2_realistically_improvable_where:
    - 'At the level of analysis practice: by preserving non-shaming language, reversibility, counter-readings and explicit
      non-capture.'
    - 'At the level of future concrete applications: by documenting affected perspectives and avoiding public D-labelling
      of identifiable persons.'
  acrp_profile:
    A_awareness:
      observations: The completed Core case shows high structural awareness of boundary distinction, frame-dependence, weak
        operator status, non-capture and rival readings. The SEX overlay adds awareness that sexual-praxeological categories
        are not warranted without a bounded sexual scene.
      available_information: Available information consists of formal case layers and templates, not empirical scene evidence.
      realistically_knowable: It is realistically knowable that the current material is abstract, that Core Δ/□ are central,
        that later Core operators are weak or conditional, and that SEX-specific claims are non-capture.
      blind_spots: Concrete motives, actual harm, legal status, clinical relevance, cultural setting, bodily consequence,
        publicness and affected-party experience are unknown.
      role_awareness_A_R: 'Role awareness is strong at the analyst/model level: the analysis is a structural overlay, not
        a tribunal. Role awareness inside the hypothetical case is indeterminate.'
      publicness_awareness_A_P: 'Publicness awareness is relevant for the scientific artefact: formal labels must not become
        publishable person judgements.'
      bias_awareness: Main bias risks are overformalization, smooth-capture bias, hindsight inflation and sexualization-by-overlay.
    C_coherence:
      observations: The PMS Core, SEX overlay and requested MIP layer are coherent insofar as they preserve subordination,
        non-capture, operator hygiene and guardrail discipline. Coherence would fail if MIP assigned maturity bands or D-readings
        as if a concrete scene existed.
      word_deed_relation: The stated rule is structural analysis only; the YAML should enact that rule by leaving scene-dependent
        claims indeterminate or suspended.
      role_context_coherence: The role/context relation is coherent when the case remains a conceptual scientific artefact
        and not a person evaluation.
      narrative_coherence: 'The narrative remains coherent as a progression: Core structural boundary reading, SEX scope/non-capture
        overlay, MIP maturity-in-practice guardrail analysis.'
      breaks_named_or_hidden: 'The main break is named rather than hidden: the material is too abstract for ordinary A/M scoring,
        full D activation, or SEX-specific viability claims.'
    R_responsibility:
      observations: Responsibility in this layer attaches primarily to analysis conduct, not to hypothetical persons. The
        analyst must carry the burden of marking limits, preserving reversibility and preventing score or maturity language
        from becoming a verdict.
      responsibility_points: Maintain Core unchanged; preserve SEX non-capture; avoid D and MIP scoring overreach; document
        missing evidence; keep alternative frameworks open.
      assumed_responsibility: The analysis assumes responsibility for methodological restraint, field separation and explicit
        guardrail status.
      shifted_or_refused_responsibility: No concrete role responsibility can be attributed to role_A or role_B. It would be
        responsibility-shifting if the model blamed an abstract role for unspecified costs.
      burdens_and_consequences: 'The relevant burdens are epistemic and communicative: avoiding overclaim, preventing misuse,
        and making the analysis reviewable.'
    P_power_to_act:
      observations: 'Power to act exists mainly at the analyst/documentation level: the YAML can clarify, suspend, narrow
        or overstate claims. No concrete action power inside the case can be assessed.'
      real_levers: Use indeterminate/suspended statuses where evidence is absent; retain non-capture; avoid person-level scores;
        define transmission limits; require concrete scene evidence for stronger claims.
      formal_vs_real_options: Formally, the template permits scores and D-module fields; realistically, the evidence does
        not support ordinary scoring or D activation.
      used_options: The analysis uses the option to fill all fields while marking A/M bands as not assigned and D as guardrail-only.
      unused_options: It does not use MIP as a decision engine, moral ranking, legal interpretation, clinical assessment,
        or maturity verdict.
      ceiling_rule_relevance: 'High: because predictability and access to alternatives for any concrete role are approximately
        unknown, M-scores for role_A or role_B must not exceed low/indeterminate status and are not assigned.'
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: No self-devaluation is visible in the abstract case material.
      self_neglect: No self-neglect is visible in the abstract case material.
      shame_dynamics: No scene-level shame dynamic is visible; shame risk exists only as a misuse risk if boundary or SEX/MIP
        language is applied to persons.
      degradation_of_others: No degradation of others is visible in the case material; the overlay explicitly prohibits person-ranking
        and humiliation.
      public_shaming: No public shaming is present; public-shaming risk is guarded against for later use.
      protest_or_refusal: Protest or refusal is not concretely supplied; Core non-capture preserves the possibility that refusal
        or disagreement may be legitimate rather than drift.
      dignity_protection: 'Dignity protection appears as analysis discipline: D0 untouched, D1/D2 not scored, no person label,
        no public D-reading of identifiable persons.'
    next_step_if_relevant: Use D-profile section below.
  acrpd_submodules_profile:
    A:
      A-I: Not assessed for persons; inner awareness is outside scope because no inner life or motives are supplied.
      A-R: 'Strong at analysis level: roles are abstract and explicitly not persons; indeterminate inside the hypothetical
        case.'
      A-C: 'Strong at analysis level: Core, SEX and MIP contexts are separated; concrete context remains missing.'
      A-IM: 'Moderate at analysis level: impact risk of overclaim is recognized; empirical impacts are unknown.'
      A-P: 'Moderate-to-high for publication context: formal YAML may become publicly legible and must preserve non-verdict
        language.'
    C:
      C-S: Social coherence is indeterminate for the case; coherent as model documentation if used without person labelling.
      C-P: Power-context coherence is partial because possible asymmetry is named but not calibrated.
      C-N: 'Narrative coherence is strong as layered model progression: Core boundary reading -> SEX non-capture -> MIP guardrail
        analysis.'
      C-I: Institutional/rule coherence is strong inside the model stack because Core and overlay rules remain subordinated
        and unchanged.
    R:
      R-I: No individual responsibility assigned; only analyst/documentation responsibility is active.
      R-S: Social responsibility is not case-assessable; structurally, future use should protect affected perspectives and
        avoid shaming.
      R-E: 'Ethical responsibility is high for the analyst: prevent model misuse, over-scoring and maturity verdicts.'
      R-P: 'Public responsibility is moderate if included in a scientific work: anonymization and guardrail language must
        remain visible.'
    P:
      P-I: Inner agency is not assessed.
      P-S: Social agency inside the case is indeterminate.
      P-C: 'Cultural agency exists at the theory-building level: the model language can shape how boundary cases are understood.'
      P-PU: Public agency is present only through publication or transmission of the analysis artefact.
    D:
      active: false
      D-I: Not active; no self-treatment enactment supplied.
      D-B: Not active; no bodily/material self-care enactment supplied.
      D-R: 'Guardrail-only: relational dignity language must not become person ranking or accusation.'
      D-P: 'Guardrail-only: public dignity risk concerns transmission and misuse, not a public D-reading of persons.'
      note: D-submodules are not activated as a full D-profile; they remain protective guardrails because the case is conceptual
        and non-identifiable.
  scores_and_ia:
    A_score:
      A_band: not_assigned_conceptual_case
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: Completed abstract Core/SEX case as of 2026-07-07; no concrete enactment time window.
      justification:
        A_awareness: Structural awareness is relatively strong at the document level, but A-score is not assigned because
          there is no concrete enactment H.
        C_coherence: Coherence is strong as model-layer discipline, but not a full enactment score.
        R_responsibility: Responsibility is mainly methodological, not attributable to concrete actors.
        P_power_to_act: Power to act lies in documentation and review choices, not in a scene role.
        modulators_context: Abstractness, lack of scene evidence and publication context modulate all readings downward toward
          caution.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned_conceptual_case
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No concrete role-holder/time frame; only abstract role_A, role_B and analyst/model context.
      five_factors:
        knowledge: Concrete role knowledge is unknown; analyst knowledge is limited to completed YAML layers.
        power_control: Concrete power/control is unknown; analyst has control over formal wording and transmission status.
        predictability: Concrete consequences are not predictable from the abstract material; misuse risks are predictable
          at the documentation level.
        access_to_alternatives: Concrete alternatives are unknown; analytical alternatives include suspension, non-capture
          and requirement of scene evidence.
        serious_integration_attempt: The layered analysis integrates Core and SEX limits by refusing overclaim; no concrete
          actor integration can be assessed.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: For any hypothetical role_A or role_B, predictability and alternatives are not established; therefore
          no high M-band is permissible. At most, analyst/documentation responsibility can be discussed qualitatively.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: Possible interpretive, boundary-setting, responsibility-allocation, correction-burden and publication
        asymmetries; concrete direction and magnitude are unspecified.
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: partly
        notes: Transparent at the model-documentation level; unclear inside the hypothetical boundary situation.
      J_justified:
        status: unclear
        protected_good_or_purpose: Protected goods are model integrity, dignity protection, reversibility and non-capture;
          concrete asymmetry purpose is unknown.
        notes: No concrete asymmetry is established, so justification cannot be assessed as functional or inadult.
      TB_time_bound:
        status: unclear
        review_points_or_conditions: Review when a concrete scene, affected perspective, or publication use is added.
        notes: The conceptual case itself has no temporal boundary beyond the documentation layer.
      R_reversible:
        status: partly
        real_return_or_exit_options: The analysis can be revised, narrowed, or suspended; real reversibility inside a concrete
          scene is unknown.
        notes: Formal publication may reduce practical reversibility if guardrails are omitted.
      result: unclear
      short_justification: IA cannot be determined for the abstract boundary case because transparency, justification, time-boundedness
        and reversibility are not anchored in a concrete asymmetry. At the analysis level, IA risk is controlled by guardrails
        and non-capture.
      immediate_action: No action guidance; retain working-note status unless reviewed for scientific transmission.
  ia_localisation:
    knowing:
      issue: The strongest issue is knowing what is actually case material versus model inference.
      possible_intervention: Document material/inference separation and require concrete scene evidence before stronger claims.
    being_able:
      issue: The analyst can control wording and status but cannot infer concrete facts.
      possible_intervention: Use indeterminate, suspended and non-capture statuses rather than false precision.
    being_permitted:
      issue: MIP permits structural review but forbids person labels, red-zone use and dignity scoring.
      possible_intervention: Keep the analysis as scientific structural documentation, not decision basis.
    willing:
      issue: The analysis must remain willing to revise and resist the appeal of full template completion as certainty.
      possible_intervention: Keep counter-readings, falsifiers and transmission limits visible.
  ia_protection:
    transparency_measures:
    - Name the case as conceptual and non-empirical.
    - State that A/M bands are not assigned.
    - State that D-module is guardrail-only.
    justification_measures:
    - Justify each suspension by absence of concrete scene evidence.
    - Retain Core and SEX dependency/overlay boundaries.
    time_boundedness_measures:
    - Treat this MIP layer as valid for the current completed Core/SEX YAML only.
    - Review if a concrete scene or publication context changes.
    reversibility_measures:
    - Preserve editable YAML status.
    - Keep non-capture and falsifier fields explicit.
    participation_or_voice_measures:
    - If later applied to real persons, include affected perspectives before any stronger MIP claim.
    - Do not publish identifiable D-readings.
    dignity_protection_measures:
    - Avoid person labels, maturity labels, D-scores and public shaming.
    - Use D only as protection signal unless safe frame and scene evidence are present.
    review_or_falsifier:
      date_or_interval: before scientific integration or after any concrete case material is added
      falsifier_question: Does new material provide a concrete enactment with roles, time window, asymmetry, knowability,
        alternatives and affected perspectives sufficient to assign A/M bands or activate D?
      responsible_roles:
      - case author
      - scientific reviewer
      - model analyst
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Completed PMS Core case: conceptual Boundary Confusion with Δ/□ central and later operators weak
        or conditional.'
      A_band: not_assigned
      M_band: not_assigned
      D_observation_optional: Dignity-in-Practice present only as PMS application constraint.
      key_context_role_power_situation: Abstract boundary distinction; no concrete actors or scene.
    - timepoint: t1
      short_description: 'PMS-SEX overlay: sexuality-specific claims narrowed to scope discipline and strong non-capture.'
      A_band: not_assigned
      M_band: not_assigned
      D_observation_optional: D preserved by preventing sexualization, shaming and person-status claims.
      key_context_role_power_situation: Overlay remains subordinate to Core; no sexual scene supplied.
    A_t:
      pattern: plateauing
      notes: Document-level awareness remains stable and cautious; no enactment trajectory is available.
    M_t_RVR_t:
      RVR_description: RVR(t) applies only to analyst/documentation responsibility, not to hypothetical role_A or role_B.
      knowledge_over_time: Knowledge increases across layers about model limits, not about empirical events.
      leverage_over_time: Leverage remains wording, scope marking, review and transmission control.
      alternatives_over_time: Alternatives are suspension, narrowing, non-capture or future concrete scene analysis.
      ceiling_rule_over_time: High M remains blocked for hypothetical roles because predictability and alternatives are not
        established.
    D_t_optional:
      active: false
      qualitative_course: 'D remains stable as guardrail-only: no shame, no ranking, no public D-reading.'
      D_quick_grid_movement_if_used: not_used
      note: No D-score; only qualitative trajectory.
  D_module_optional:
    active: false
    activation_reason: Not activated as a full D-module because the case is conceptual, non-identifying and lacks concrete
      D-enactments. D remains a protection and transmission guardrail.
    communication_space: internal_structural_review
    guardrails_checked:
      scenic: false
      context_bound: true
      role_bound: true
      time_windowed: false
      no_global_statement_about_persons: true
      no_dignity_score: true
      D0_untouched: true
    D_profile:
      D1_self_treatment_D_I_D_B:
        observed_enactments: No self-treatment enactments supplied.
        context_notes: D1 cannot be read for abstract role positions.
        trend_band_qualitative: unclear
      D2_relational_dignity_D_R:
        observed_enactments: No concrete relational dignity enactments supplied; only model-level refusal of degradation and
          person-ranking.
        context_notes: D2 would require an actual scene with relational treatment, refusal, shaming, protection or protest.
        interpretive_reading_not_judgment: unclear
      D_P_public_dignity:
        active_if_publicness_relevant: false
        observed_enactments: No public dignity enactment in the case; only public misuse risk for a scientific artefact.
        private_public_tension: Low in abstract form, higher if attached to identifiable persons.
        publicity_context: anonymised scientific model documentation
      A_M_D_link_without_mixing:
        A_band_reference: not_assigned
        M_band_reference: not_assigned
        D_tendency: guardrail-only, preserved
        protection_or_responsibility_implication: Protect dignity by keeping D0 untouched, D1/D2 unscored and all maturity
          language role/context-bound.
    D_Quick_Grid:
      used: false
      level: ''
      preferred_wording: This constellation currently shows level-__ D stress in this role / context / time window.
      forbidden_wording_avoided: true
      movement_question: What would be one small, real action that could make this constellation one level more dignified
        — and who has A and M levers for that?
  meta_notes:
    bias_risks:
      confirmation_bias: Risk of selecting only features that confirm PMS/PMS-SEX/MIP fit; mitigated by strong non-capture
        and counter-scene fields.
      hindsight_bias: Risk of treating the completed overlays as if the abstract case always contained their distinctions;
        mitigated by marking later readings as methodological, not empirical.
      status_quo_loyalty_bias: Risk of protecting the formal model stack from critique; mitigated by keeping rival readings
        open.
      halo_horn_effects: Low person-level risk because no persons are assessed; model-level halo risk remains if YAML completeness
        is mistaken for adequacy.
      in_group_out_group_bias: Low for persons; possible theory-in-group bias toward PMS-family models.
      dignity_bias_effect: Risk of using dignity language as moral aura; mitigated by D0/D1-D2 separation and D-module non-activation.
    norm_assumptions:
      explicit_norms:
      - person/enactment separation
      - D0 inviolable and non-rankable
      - no person labels
      - no dignity score
      - reversibility and non-capture
      - scientific structural use only
      implicit_norms:
      - formal analysis should remain proportionate to evidence
      - model layers should not expand beyond their domain
      - maturity language requires scene, role and time-window discipline
