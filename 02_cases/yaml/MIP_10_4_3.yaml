schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
reflection_mode: "off"
analysis_depth: "full"
content_language: "en"
application_basis:
  primary_base_reference:
    file: "PMS.yaml"
    status: "only PMS Base reference"
    role: "PMS operator base and dependency reference"
  sex_overlay_reference:
    file: "PMS-SEX.yaml"
    status: "overlay_application_profile_only"
    role: "SEX overlay applied previously as non-activating boundary-preserving profile"
  mip_reference:
    file: "MIP - Maturity in Practice.yaml"
    status: "MIP model reference and case template"
    role: "maturity-in-practice application lens"
  completed_core_case_yaml:
    status: "used_as_case_material"
    role: "completed PMS Core case application for Boundary Confusion"
  completed_sex_overlay_yaml:
    status: "used_as_case_material"
    role: "completed PMS-SEX overlay application for Boundary Confusion"
  priority_rule: >
    PMS.yaml remains the only PMS Base reference. MIP is applied as a distinct
    maturity-in-practice model and case-analysis framework. PMS-SEX remains an
    overlay/application profile only. No PMS operator, PMS dependency, PMS
    derived structure, PMS guardrail, or PMS Base claim is revised by this MIP
    analysis.
model_alignment:
  mip_status: "application_lens_not_pms_base"
  no_pms_base_revision: true
  no_pms_operator_redefinition: true
  no_pms_dependency_rewrite: true
  no_sex_overlay_expansion: true
  mip_parameters_used:
    - "A_awareness"
    - "C_coherence"
    - "R_responsibility"
    - "P_power_to_act"
    - "D_dignity_in_practice_optional_guardrail_layer"
  mip_not_used_for:
    - "clinical_diagnosis"
    - "therapy_planning"
    - "forensic_decision"
    - "legal_judgment"
    - "individual_HR_decision"
    - "child_youth_diagnostics"
    - "public_pillory"
    - "ranking_format"
    - "online_shaming_or_doxing"
    - "humiliation_diagnostics"
    - "public_D_reading_of_identifiable_persons"
    - "person_level_maturity_label"
    - "person_level_dignity_label"
    - "PMS_Base_validation"
  key_boundary: >
    MIP reads enactments, roles, structures, asymmetry, responsibility,
    possible maturity-in-practice and dignity-in-practice risks. In this case,
    the object is not a person and not a concrete episode; it is an abstract
    conceptual case-type already analysed through PMS Core and PMS-SEX.
    Therefore MIP may identify structural maturity requirements and missing
    conditions, but it may not assign a person maturity verdict, dignity
    status, guilt, blame, legal liability, diagnosis, or final scene judgment.

case:
  addons:
    ah_precision:
      enabled: true
      mode: "on"
      requires_completed_mip_analysis: true
      requires_structured_case_fields: true
      PH_points_0_to_6: 6
      PH_band: "high"
      PH_boundary_confirmed: true
      PH_checklist:
        PD-1_term_definition: true
        PD-2_scope_boundaries: true
        PD-3_conditions_and_thresholds: true
        PD-4_evidence_linking: true
        PD-5_reversibility_clause: true
        PD-6_language_hygiene: true
      PH_overlay_effect:
        confidence_shift_for_A_reading: "up"
        confidence_shift_for_C_reading: "up"
        IA_box_decidability: "more_decidable"
        D_R_D_P_misreading_risk: "down"
      attack_surface_annotations:
        - attack_point_id: "AP-001"
          severity: "high"
          title: "Prior-analysis dependency is conversation-bound"
          target_path: "mip_case_application.application_basis.completed_core_case_yaml / completed_sex_overlay_yaml"
          note_type: "evidence_gap"
          message: >
            The previous MIP output responsibly relied on the completed PMS
            Core and PMS-SEX analyses, but those analyses are referenced as
            prior chat artifacts rather than embedded or minimally quoted
            inside the MIP artifact. This is acceptable in the current
            conversation, yet it makes external audit harder if the YAML is
            copied without its context.
          suggested_action: >
            In the next iteration, add a compact provenance excerpt listing
            the exact prior Core and SEX conclusions used as inputs, without
            copying the full prior YAMLs.
          source_fields:
            - "application_basis.completed_core_case_yaml"
            - "application_basis.completed_sex_overlay_yaml"
            - "information_basis.secondary_material"
          person_level_finding: false
        - attack_point_id: "AP-002"
          severity: "medium"
          title: "High PH may be misread as higher case certainty"
          target_path: "case.addons.ah_precision.PH_overlay_effect"
          note_type: "scope_leakage"
          message: >
            Because the Precision Heuristic is high, readers may confuse
            artifact precision with concrete case certainty. The previous MIP
            result remains non-scoring and under-specified even if the
            artifact is precise.
          suggested_action: >
            Add one explicit sentence to the uniform report: high PH improves
            confidence in the analysis discipline, not confidence in any
            participant-level or scene-level maturity finding.
          source_fields:
            - "scores_and_ia.A_score.A_band"
            - "scores_and_ia.M_score.M_band"
            - "scores_and_ia.IA_box.result"
            - "uniform_report.conclusion"
          person_level_finding: false
        - attack_point_id: "AP-003"
          severity: "medium"
          title: "IA-box decidability needs artifact-level qualification"
          target_path: "scores_and_ia.IA_box"
          note_type: "weak_justification"
          message: >
            The previous analysis correctly left the IA-box unassigned. AHP's
            standard high-PH effect says IA-box decidability becomes more
            decidable, but this must be read as more decidable that the result
            is non-assignment, not as more decidable asymmetry classification.
          suggested_action: >
            Add a qualification that IA-box decidability improves only for the
            meta-result not assignable from available material.
          source_fields:
            - "scores_and_ia.IA_box.result"
            - "scores_and_ia.IA_box.T_transparent.status"
            - "scores_and_ia.IA_box.J_justified.status"
            - "scores_and_ia.IA_box.TB_time_bound.status"
            - "scores_and_ia.IA_box.R_reversible.status"
          person_level_finding: false
        - attack_point_id: "AP-004"
          severity: "medium"
          title: "Non-score status could be mistaken for low maturity"
          target_path: "scores_and_ia.A_score / scores_and_ia.M_score"
          note_type: "score_hygiene_risk"
          message: >
            The previous MIP output states that A-band and M-band are not
            assigned, but some readers may interpret non-assignment as a low
            score, avoidance, or hidden negative maturity finding. This is a
            score-hygiene risk in the analysis artifact.
          suggested_action: >
            Add a score-hygiene line: not_assigned means no responsible score
            can be produced from the available material; it is not a low band,
            hidden score, or maturity deficit.
          source_fields:
            - "scores_and_ia.A_score.A_band"
            - "scores_and_ia.M_score.M_band"
            - "uniform_report.A_summary"
            - "uniform_report.M_summary"
          person_level_finding: false
        - attack_point_id: "AP-005"
          severity: "medium"
          title: "D-language is clean but notation and repetition can be hardened"
          target_path: "guardrails.dignity_protection / D_module_optional / uniform_report.D_summary_if_activated"
          note_type: "dignity_language_risk"
          message: >
            The previous analysis keeps D off as a profile and avoids dignity
            scoring, but it repeatedly mentions dignity-protection language.
            Repetition is protective, yet it can make readers think D has
            been substantively activated.
          suggested_action: >
            In the next iteration, add a short D-language boundary note and
            standardize human-readable notation to `D₀` and `D₁/D₂` where
            notation is used.
          source_fields:
            - "guardrails.dignity_protection"
            - "optional_D_observation"
            - "D_module_optional.active"
            - "uniform_report.D_summary_if_activated"
          person_level_finding: false
        - attack_point_id: "AP-006"
          severity: "low"
          title: "Abstract role labels A/B could be confused with MIP A-awareness"
          target_path: "role_mapping.involved_roles"
          note_type: "term_ambiguity"
          message: >
            The previous output uses abstract participant labels such as A and
            B while MIP also uses A for Awareness. The context is clear enough
            for expert readers, but the notation may cause unnecessary
            ambiguity in reuse.
          suggested_action: >
            Rename abstract participants in the next iteration to
            Role-position 1 and Role-position 2, or explicitly state that
            participant labels are not MIP A-awareness.
          source_fields:
            - "role_mapping.involved_roles"
            - "snapshot.central_actors_and_roles"
            - "acrp_profile.A_awareness"
          person_level_finding: false
        - attack_point_id: "AP-007"
          severity: "low"
          title: "Full-depth form may over-signal readiness for transmission"
          target_path: "transmission_check.status / uniform_report.transmission_status"
          note_type: "transmission_status_ambiguity"
          message: >
            The previous analysis clearly says working_note only, but the
            completeness and polished YAML form may still make the artifact
            look more transmission-ready than it is. The issue is not content
            overclaim; it is possible presentation over-authority.
          suggested_action: >
            Add a top-level and report-level warning that full-depth structure
            increases auditability only and does not upgrade transmission
            status.
          source_fields:
            - "transmission_check.status"
            - "transmission_check.pre_transmission_gate_passed"
            - "uniform_report.transmission_status"
            - "uniform_report.conclusion"
          person_level_finding: false
      hardening_actions:
        - hardening_action_id: "HB-001"
          severity: "high"
          action_type: "separate_observation_vs_evaluation"
          instruction: >
            Add a compact provenance excerpt that quotes or paraphrases only
            the exact prior PMS Core and PMS-SEX conclusions used as inputs:
            Core formula □ ∘ Δ, later operators conditional, SEX overlay
            non-activating, no sexual scene evidence.
          linked_attack_ref: "AP-001"
          expected_effect: "PH remains high; evidence linkage stronger; external auditability up; hidden-context risk down."
          feeds_next_iteration: true
        - hardening_action_id: "HB-002"
          severity: "medium"
          action_type: "add_scope_statement"
          instruction: >
            Add a PH boundary sentence stating that high PH measures precision
            of the analysis artifact only and does not increase confidence in
            any participant maturity, responsibility, dignity, or IA finding.
          linked_attack_ref: "AP-002"
          expected_effect: "Scope leakage risk down; A/M/IA/D non-rescoring boundary clearer; D-R/D-P misreading risk down."
          feeds_next_iteration: true
        - hardening_action_id: "HB-003"
          severity: "medium"
          action_type: "add_if_then_criteria"
          instruction: >
            Add explicit IA wording: if no concrete asymmetry, purpose,
            time-boundary, and reversible exit/review structure are supplied,
            the IA-box result remains not assigned even when PH is high.
          linked_attack_ref: "AP-003"
          expected_effect: "IA-box decidability clearer as non-assignment; IA.J and IA.R misread risk down."
          feeds_next_iteration: true
        - hardening_action_id: "HB-004"
          severity: "medium"
          action_type: "add_score_hygiene_boundary"
          instruction: >
            Add a score-hygiene sentence that not_assigned is a protective
            non-score, not a low score, hidden score, maturity deficit, or
            avoidance of judgment.
          linked_attack_ref: "AP-004"
          expected_effect: "Score hygiene stronger; A/M misreading risk down; public reuse safety up."
          feeds_next_iteration: true
        - hardening_action_id: "HB-005"
          severity: "medium"
          action_type: "add_D_profile_boundary"
          instruction: >
            Add a D-language boundary note and standardize human-readable
            dignity notation to `D₀` and `D₁/D₂` while keeping the D-module
            off and the D-profile uncreated.
          linked_attack_ref: "AP-005"
          expected_effect: "D-language hygiene up; D-profile boundary clearer; D-R/D-P misreading risk down."
          feeds_next_iteration: true
        - hardening_action_id: "HB-006"
          severity: "low"
          action_type: "define_terms"
          instruction: >
            Replace abstract participant labels A/B with Role-position 1 and
            Role-position 2, or add a short note that participant labels are
            not MIP A-awareness.
          linked_attack_ref: "AP-006"
          expected_effect: "Term ambiguity down; A-reading readability up; reuse clarity up."
          feeds_next_iteration: true
        - hardening_action_id: "HB-007"
          severity: "low"
          action_type: "add_transmission_status"
          instruction: >
            Add a top-level and uniform-report sentence that full-depth YAML
            form improves auditability only and does not upgrade the working-
            note transmission status.
          linked_attack_ref: "AP-007"
          expected_effect: "Transmission ambiguity down; false-authority risk down; working-note boundary preserved."
          feeds_next_iteration: true
      boundaries_checked:
        does_not_change_A_band: true
        does_not_change_M_band: true
        does_not_change_IA_box_result: true
        does_not_activate_D_module: true
        does_not_create_D_profile: true
        does_not_assign_D_quick_grid_level: true
        does_not_change_transmission_status: true
        attack_points_describe_analysis_not_persons: true
  meta:
    case_id: "MIP-BOUNDARY-CONFUSION-2026-05-29"
    case_title: "Boundary Confusion"
    documentation_date: "2026-05-29"
    analysts:
      - name: "ChatGPT (GPT-5.5 Thinking)"
        role: "MIP structural application assistant"
        observer_position: "external structural analyst working from completed PMS Core and PMS-SEX case analyses, not from a concrete lived scene"
    language: "en"
    confidentiality_level: "conceptual_non_identifying_case"
    analysis_mode: "full"
    intended_use: >
      Full-depth MIP structural analysis of the abstract case Boundary
      Confusion, based on the completed PMS Core case YAML and the completed
      PMS-SEX overlay YAML. The purpose is conceptual maturity-in-practice
      clarification, not decision-making about persons.
    application_zone: "yellow"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "philosophy_anthropology"
      d_activation_decision: "D_module_not_activated_D_used_only_as_guardrail_and_optional_observation_boundary"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      The primary material is the abstract philosophical case title Boundary
      Confusion and its case material: situations in which the distinction
      between one person's role, responsibility, space, or decision and
      another's becomes unclear, contested, or repeatedly crossed.
    secondary_material: >
      Secondary material consists of the completed PMS Core case YAML and the
      completed PMS-SEX overlay YAML. The PMS Core reading established the
      conservative primary formula □ ∘ Δ, with later PMS operators weak,
      conditional, or under-specified. The PMS-SEX overlay established that
      sexuality-specific handles are not activated because no sexual scene,
      sexual cost topology, public sexual legibility, body remainder, sexual
      drift, adult sexual reciprocity, or MIP docking evidence is present.
    assumptions_and_inferences: >
      The analysis assumes that MIP may be used as a structural maturity-in-
      practice lens over an abstract case-type, but only if all findings remain
      role-, structure-, context-, and evidence-bound. It infers that most MIP
      scores and IA conclusions are under-specified because no concrete actors,
      roles, time sequence, institutional frame, evidence base, asymmetry
      direction, consequences, or available alternatives are supplied.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: >
        High coverage for conceptual guardrails, structural distinctions,
        missing conditions, MIP parameter mapping, and maturity-relevant
        operationalization requirements; low coverage for concrete assessment
        because the case is not a concrete scene.
      reliability_estimate: >
        Reliable as a bounded conceptual MIP application over prior PMS/PMS-SEX
        analyses; not reliable as empirical assessment, legal judgment,
        diagnostic judgment, practical intervention plan, person evaluation, or
        definitive maturity score.
      known_gaps:
        - "No concrete actors or role-holders are identified."
        - "No specific boundary type is selected among role, responsibility, space, decision, access, privacy, authority, or obligation."
        - "No sequence of events or trajectory is provided."
        - "No evidence of harm, repair, refusal, clarification, permission, or enforcement is provided."
        - "No asymmetry direction, magnitude, or channel is specified."
        - "No information about publicness, witnesses, documentation, or reputational consequences is provided."
        - "No sexual scene or SEX-specific activation evidence is supplied."
        - "No real options, alternatives, or levers for involved roles are known."
      main_bias_risks_here:
        - "Coherence bias: because PMS and MIP can both map boundary problems elegantly, the analysis may become too smooth."
        - "Moralization bias: unclear or crossed boundaries may be read too quickly as fault."
        - "Psychologizing bias: boundary confusion may be misread as motive, pathology, immaturity, or character."
        - "Legalization bias: boundary conflict may be misread as legal violation without legal evidence."
        - "Sexualization bias: after PMS-SEX overlay, one might over-activate sexuality-specific terms even though the case lacks sexual material."
        - "False-neutrality bias: preserving reversibility must not erase real harm if a later concrete scene establishes it."

  snapshot:
    short_case_description: >
      Boundary Confusion is an abstract conceptual case concerning unclear,
      contested, or repeatedly crossed distinctions between one person's role,
      responsibility, space, or decision and another's. The case has already
      been structurally mapped through PMS Core as primarily □ ∘ Δ and through
      PMS-SEX as a non-activating overlay check.
    central_actors_and_roles:
      - "Abstract role-holder A: a possible person, office, participant, or agent whose role, responsibility, space, or decision may be confused with another's."
      - "Abstract role-holder B: a possible second person, office, participant, or agent whose boundary may be unclear, contested, or crossed."
      - "Observer or analyst role: external structural analyst who must not convert conceptual boundary ambiguity into person judgment."
      - "Frame-holder role: any institutional, relational, legal, familial, ethical, or procedural context that may define what counts as a boundary."
      - "Affected role-position: any party whose capacity, exposure, responsibility, voice, or dignity-in-practice could later be affected in a concrete scene."
    guiding_question: >
      What does MIP add to the already completed PMS and PMS-SEX analyses of
      Boundary Confusion, without turning an abstract boundary case into a
      person maturity verdict, a dignity judgment, a legal or diagnostic claim,
      or a sexuality-specific finding?
    level:
      - "conceptual_case_type"
      - "role_structure"
      - "boundary_frame"
      - "asymmetry_possibility"
      - "maturity_in_practice_requirements"
      - "not_concrete_scene"
    first_visible_asymmetry: >
      Only a possible and under-specified asymmetry is visible: one role may
      have more power, exposure, obligation, interpretive authority, access,
      or responsibility than another. The direction and magnitude of this
      asymmetry are not given.
    first_visible_D_themes_optional:
      - "Potential risk of dignity-in-practice harm if a concrete scene later shows shaming, domination, humiliation, erasure of voice, coercive boundary crossing, or public degradation."
      - "Potential dignity-protection relevance if boundary clarification prevents person-ranking, shame, or responsibility displacement."
      - "No D-module activation is warranted at this abstract level."

  role_mapping:
    object_of_observation:
      type: "conceptual_case_type"
      description: >
        The object of observation is the structural case-type Boundary
        Confusion, not a person, couple, family, institution, group, sexual
        scene, legal dispute, clinical case, or concrete conflict.
      role: "abstract boundary-configuration"
      not_person_as_whole: true
    observer_position:
      role: "external MIP analyst applying a structural model to prior PMS and PMS-SEX case analyses"
      power_relation_to_object: >
        The analyst has interpretive power over the formal representation but
        no authority over real persons, legal facts, clinical facts,
        institutional decisions, or lived experience.
      possible_effects_of_analysis: >
        The analysis may clarify what would be needed for responsible
        maturity-in-practice evaluation. It could also overreach if it assigns
        maturity, responsibility, dignity, sexuality, or legal meaning without
        concrete evidence. This risk is controlled by keeping most findings
        under-specified and non-transmissible as decision basis.
    involved_roles:
      - role: "abstract boundary participant A"
        mandate: >
          Unknown. In a concrete scene this role might need to clarify,
          respect, negotiate, defend, or repair a boundary, but no mandate is
          supplied here.
        built_in_asymmetries:
          - "possible access asymmetry"
          - "possible responsibility asymmetry"
          - "possible interpretive authority asymmetry"
          - "possible decision-power asymmetry"
          - "not calibrated"
        publicness_level: "unknown_not_established"
        dignity_exposure: "possible_but_not_established"
      - role: "abstract boundary participant B"
        mandate: >
          Unknown. In a concrete scene this role might need to clarify,
          communicate, refuse, consent, withdraw, contest, or co-define a
          boundary, but no mandate is supplied here.
        built_in_asymmetries:
          - "possible vulnerability asymmetry"
          - "possible dependency asymmetry"
          - "possible exposure asymmetry"
          - "possible obligation asymmetry"
          - "not calibrated"
        publicness_level: "unknown_not_established"
        dignity_exposure: "possible_but_not_established"
      - role: "frame-holder or context-defining role"
        mandate: >
          Unknown. In a concrete scene this could be a legal, institutional,
          relational, familial, ethical, procedural, or cultural frame that
          defines the relevant boundary.
        built_in_asymmetries:
          - "possible authority to define rules"
          - "possible power to make boundaries visible or invisible"
          - "possible capacity to create or reduce ambiguity"
        publicness_level: "unknown_not_established"
        dignity_exposure: "indirect_possible"
      - role: "analyst role"
        mandate: >
          Maintain structural discipline, distinguish material from inference,
          preserve PMS/PMS-SEX/MIP boundaries, avoid person-ranking, avoid
          overclaim, and identify what remains under-specified.
        built_in_asymmetries:
          - "interpretive asymmetry"
          - "risk of model-imposed framing"
          - "risk of excessive coherence"
        publicness_level: "chat_output_context_not_public_decision_basis"
        dignity_exposure: "low_if_guardrails_maintained_high_if_used_for_labels_or_shaming"
    publicness:
      level: "not_established_in_case_material"
      A_P_relevance: >
        Publicness awareness cannot be assessed because the case gives no
        public, semi-public, documented, circulated, witnessed, reputational,
        or media context.
      P_PU_relevance: >
        Public power-to-act is not assessable. No public levers, publicity
        risks, institutional channels, or communicative consequences are
        specified.
      D_P_relevance_if_D_active: >
        D-P would become relevant only if a concrete scene showed public
        shaming, public degradation, reputational exposure, public erasure of
        voice, or dignity-protective public clarification. No such material is
        present.
      public_shaming_risk: >
        Low inside this analysis because no identifiable person is evaluated.
        Potentially high if the abstract model were misused to label real
        persons publicly.
      reversibility_risk: >
        Low in the present conceptual analysis because findings are reversible
        and under-specified. High if later used as an irreversible verdict
        about persons or groups.

  frame_vs_variability:
    frame_elements:
      - element: "PMS Base discipline"
        reason_fixed_or_slow: >
          PMS.yaml remains the only PMS Base reference; PMS operators and
          dependencies cannot be rewritten by MIP or PMS-SEX.
        protected_goods:
          - "model integrity"
          - "dependency hygiene"
          - "non-overclaim"
          - "reversibility"
      - element: "MIP person/enactment separation"
        reason_fixed_or_slow: >
          MIP requires analysis of enactments, roles, and structures, not
          ontological value or person essence.
        protected_goods:
          - "D0 untouchability"
          - "non-ranking"
          - "non-diagnostic use"
      - element: "Abstract status of the case"
        reason_fixed_or_slow: >
          The case material supplies no concrete actors, time sequence,
          publicness, evidence, legal frame, clinical frame, or sexual scene.
        protected_goods:
          - "claim discipline"
          - "anti-fictionalization"
          - "non-capture preservation"
      - element: "PMS-SEX non-activation result"
        reason_fixed_or_slow: >
