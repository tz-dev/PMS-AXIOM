      - "Separate participant statements, observed actions, external rules, and analyst inference."
      - "Name the observer position and possible interpretive effects."
    justification_measures:
      - "Identify the protected good served by any asymmetry or boundary rule."
      - "Distinguish care, control, privacy, autonomy, safety, obligation, and authority."
      - "Reject asymmetry justifications that merely preserve one side's advantage without testable purpose."
    time_boundedness_measures:
      - "Define review points for unclear or contested boundaries."
      - "Mark temporary exceptions as temporary."
      - "Track whether repeated crossing becomes a pattern rather than an isolated event."
    reversibility_measures:
      - "Create real correction, clarification, refusal, exit, and repair options."
      - "Avoid irreversible labels while facts are incomplete."
      - "Preserve the possibility that rival formalizations explain the case better."
    participation_or_voice_measures:
      - "Include the affected role-position's account if a concrete scene is analysed."
      - "Avoid defining one role's boundary entirely from another role's frame."
      - "Allow refusal, disagreement, and non-fit to remain meaningful without automatically pathologizing them."
    dignity_protection_measures:
      - "Keep D0 untouchable and outside evaluation."
      - "Use D1/D2 only as enactment-level observation if a safe frame exists."
      - "Avoid shame, humiliation, public ranking, maturity labeling, or dignity scoring."
