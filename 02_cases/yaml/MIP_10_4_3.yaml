      - "Use the analysis to list missing evidence rather than to score maturity."
      - "Preserve the PMS Core formula □ ∘ Δ as the conservative structural entry point."
      - "Preserve the PMS-SEX result that sexuality-specific handles are not activated."
      - "Avoid public or interpersonal transmission as a verdict."
    medium_term_feasible:
      - "Develop a concrete-scene intake structure for boundary cases."
      - "Create a role/boundary matrix separating role, responsibility, space, decision, access, privacy, authority, and obligation."
      - "Define falsifier questions before applying A/M bands."
      - "Add domain routing: legal, clinical, institutional, safety, relational, or MIP structural analysis."
      - "Use IA-box only after asymmetry is concretely named."
    overambitious_or_risky:
      - "Assigning A-score or M-score to abstract participants."
      - "Activating D-profile without safe communication space and concrete D enactments."
      - "Treating 'repeatedly crossed' as proof of attractor, blame, immaturity, or harm."
      - "Using PMS-SEX terms to sexualize the case."
      - "Using this YAML as policy, legal, clinical, or forensic decision support."
    protection_first_if_low_M_high_harm:
      - "If later evidence shows high harm but low M due to low predictability or no alternatives, focus on protection and repair rather than blame."
      - "If a concrete affected role lacks real exit or voice, prioritize participation, safety, and reversibility."
      - "If public shaming risk appears, prevent public D labeling and preserve confidentiality."
    structural_change_if_high_M:
      - "If later evidence shows high knowledge, high power, foreseeable consequences, real alternatives, and failed integration, then structural responsibility may become assessable."
      - "If a role repeatedly externalizes boundary costs despite review opportunities, examine role design, accountability, and repair mechanisms."
