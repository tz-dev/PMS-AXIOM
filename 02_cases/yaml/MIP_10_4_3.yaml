      checked_afterwards: true
      supporting_evidence: >
        The abstract case lacks actors, scene, time, evidence, asymmetry
        direction, publicness, and alternatives. PMS and PMS-SEX analyses both
        already marked later structures as conditional or non-activated.
      contradicting_evidence: >
        The phrase "repeatedly crossed" could suggest pattern, responsibility,
        or maturity relevance, but without episodes it cannot carry scoring or
        IA classification.
    possible_alternative_interpretations:
      - "The case may be primarily a legal boundary dispute rather than a MIP case."
      - "The case may be a semantic or conceptual clarification problem rather than a maturity problem."
      - "The case may be relational autonomy conflict, care ethics conflict, or institutional role ambiguity."
      - "The case may be a safety issue requiring protective response rather than reflective maturity analysis."
      - "The case may remain outside MIP until concrete enactments are supplied."
    counter_perspective:
      from_other_side: >
        A role-holder might say that what appears as boundary crossing is
        actually care, shared responsibility, emergency response, mutual
        agreement, or legitimate role overlap.
      from_affected_side: >
        An affected party might say that abstract reversibility misses the
        felt or material reality of intrusion, erasure, exposure, or blocked
        refusal.
      from_external_observer: >
        An external observer might say that PMS/MIP language is too formal and
        should yield to legal, institutional, clinical, safety, or relational
        frameworks in concrete cases.

  open_questions_and_blind_spots:
    missing_information:
      - "Who are the concrete actors or role-holders?"
      - "Which boundary type is at issue?"
      - "What frame defines the boundary?"
      - "What exactly became unclear, contested, or crossed?"
      - "Was there consent, refusal, permission, mandate, law, policy, or emergency?"
      - "Was there recurrence, and what was the sequence?"
      - "Who had power, vulnerability, exposure, responsibility, or alternatives?"
      - "Were there harms, repairs, clarifications, apologies, or review points?"
      - "Was publicness involved?"
      - "Does any domain framework take priority over MIP?"
    uncertain_assumptions:
      - "That MIP can responsibly analyse an abstract case-type at all if scores remain unassigned."
      - "That the prior PMS Core reading is adequate enough to serve as secondary material."
      - "That PMS-SEX non-activation remains stable after possible future scene details."
      - "That the term 'responsibility' in the case material is structural rather than moral, legal, or psychological."
    weak_points_in_analysis:
      - "The analysis is full-depth structurally but thin empirically."
      - "A/M and IA sections are necessarily non-scoring and may appear less decisive."
      - "The output may over-document guardrails relative to the sparse case material."
      - "The model fit may look stronger than its discriminative evidence."
    needed_perspectives:
      - "Affected role-position perspective if a concrete scene is later provided."
      - "Frame-holder or institutional perspective if roles are formal."
      - "Legal expertise if rights, consent, liability, custody, property, or due process are involved."
      - "Clinical expertise if clinical safety, trauma, diagnosis, or therapy is involved."
      - "Safety expertise if coercion, abuse, or immediate risk is involved."
      - "Cultural or relational context where norms of space, responsibility, care, and autonomy differ."

