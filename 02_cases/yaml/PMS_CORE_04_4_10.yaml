operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Δ distinguishes responsibility from blame, guilt, liability, causality, agency, voluntariness, autonomy,
      obligation, accountability, coercion, control, intention, consequence, and moral worth. It also distinguishes structural
      responsibility from metaphysical freedom and from legal-forensic attribution.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The active distinctions are conceptual and structural; Responsibility_R is not blame, guilt, liability, causality, moral
      worth, diagnosis, or metaphysical free will.
    - The distinction must not be sharpened by inventing new PMS operators; adjacent domain concepts remain outside PMS operator
      inventory unless structurally modeled through Δ–Ψ.
    falsifier_conditions:
    - If responsibility cannot be differentiated from blame, liability, causality, moral worth, or metaphysical freedom, the
      PMS reading becomes under-discriminating and loses its entry point.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ is weakly present as structural directedness toward answering, committing, caring, responding, or maintaining
      a bond under responsibility. The case does not provide evidence of subjective desire, psychological drive, or concrete
      activation.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - The relevant tension is structural and praxeological; pressure toward answerability or commitment, not inferred affect
      or subjective desire.
    - Because no concrete actor or scene is supplied, ∇ remains a weak operator and cannot be used to infer voluntariness,
      intention, or agency.
    falsifier_conditions:
    - If the case contains no directional pressure toward answerability, commitment, response, or maintenance of a role, ∇
      remains under-specified and later action claims must weaken.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is active because responsibility is described as answerability within situated frames and as distinct
      from legal, diagnostic, metaphysical, moral, causal, and implementation frames.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is conceptual structural-praxeological analysis of responsibility under temporal extension and asymmetry.
    - Frame shifts between moral, legal, causal, diagnostic, metaphysical, and PMS-structural uses must be explicitly marked
      rather than silently collapsed.
    falsifier_conditions:
    - If no frame of answerability or role-conditioned relevance can be specified, the case becomes too abstract for PMS discrimination.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Λ is weak and conditional. Responsibility may concern omission, silence, delay, non-response, unfulfilled
      commitment, or missing answerability, but the case material provides no concrete expected occurrence within a specified
      frame.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Λ should be asserted only if an expected response, action, care, protection, repair, or answer is specified within a
      frame.
    - Absence, rupture, disagreement, delay, or non-fit may mark genuine non-capture or insufficient case material and must
      not automatically be redescribed as failure of responsibility.
    falsifier_conditions:
    - If no structured expectation exists, Λ must remain weak or not active and cannot support omission-based responsibility
      claims.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is weak and conditional. Responsibility may stabilize through repeated role expectations, commitments,
      institutions, or self-binding patterns, but the conceptual case does not provide recurrence, routine, or path-dependence
      evidence.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - A stable attractor would require shown recurrence or stabilization of answerability, role script, self-binding, or institutional
      routine.
    - Repeated references to responsibility in the concept case do not by themselves establish an attractor.
    falsifier_conditions:
    - If recurrence, stabilization, or role-script emergence is not shown, Α is over-read and Ω-dependency must be treated
      carefully.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is central. The case explicitly concerns unequal power, capacity, exposure, vulnerability, dependency,
      and obligation, all of which establish responsibility gradients without producing automatic blame or person-ranking.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The kinds of asymmetry are power, capacity, exposure, vulnerability, dependency, and obligation; their direction must
      be specified in any concrete application.
    - Ω is structural and must not be moralized into guilt, blame, superiority, inferiority, or desert by default.
    - Because recurrence is not concretely shown, Ω is strongly salient conceptually but dependency-sensitive with respect
      to Α.
    falsifier_conditions:
    - If no directional imbalance of power, exposure, capacity, vulnerability, dependency, or obligation is relevant, Ω claims
      must be removed or marked weak.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is central because responsibility is framed as temporal extension, commitment across time, changed conditions,
      persistence, delay, consequence, and ongoing answerability.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Θ is calibrated by distinguishing diachronic commitment from one-time causation, static obligation, or momentary intention.
    - Temporal extension must allow revision, delay, tragedy, discontinuity, and changed conditions without automatically
      treating them as irresponsibility.
    falsifier_conditions:
    - If responsibility in the case requires no temporal extension, persistence, commitment, trajectory, or changed condition,
      Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is central because responsibility under changing conditions requires placing an existing commitment or
      asymmetry into a new frame without automatically excusing, condemning, or forcing continuity.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The source frame is initial responsibility as commitment or answerability; the target frame is the responsibility relation
      under changed conditions, capacities, exposures, or obligations.
    - Recontextualization clarifies only when it discriminates new conditions from evasion; it must not absorb every rupture,
      resistance, disagreement, or rival reading as PMS maturity.
    falsifier_conditions:
    - If every rupture or resistance is absorbed as Φ, the reading becomes over-assimilative and loses possible non-capture.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is active as reflective distance from blame, guilt, legal liability, diagnosis, metaphysical free will,
      moral worth, and forced verdicts. It keeps the analysis non-tribunal and reversible.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must suspend verdict, maintain reversibility, and keep PMS terms from becoming enforcement language.
    - Χ must be distinguished from avoidance, detachment, denial, or empty neutrality; it remains accountable to asymmetry
      and dignity-in-practice.
    falsifier_conditions:
    - If Χ is suspended to force blame, absolution, liability, diagnosis, moral ranking, or closure, the PMS application is
      invalid.
    non_capture_note: 'Distance protects against overclaiming and premature closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is active but calibration-dependent. Responsibility requires coordination of distinction, frame, asymmetry,
      temporality, recontextualization, and distance, but integration must not be treated as proof of adequacy.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Integration must discriminate responsibility from adjacent concepts rather than smoothing them into a single moralized
      or legalized category.
    - Σ must be distinguished from forced coherence, compliance, maturity ranking, closure, or absorption of non-fit.
    falsifier_conditions:
    - If coherence is treated as proof that PMS captures responsibility exhaustively or rightly, Σ is overclaimed.
    non_capture_note: 'PMS coherence is insufficient by itself.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is primary. The case treats responsibility as self-binding; commitment to integrated structures across
      time under asymmetry and changing conditions, without metaphysical free will or moral worth claims.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Ψ applies only as structural self-binding or analytic self-binding, not as metaphysical subjectivity, autonomous authorship,
      or inner moral essence.
    - Self-binding requires Σ, Θ, and Χ; it must not be inferred from mere causality, external compulsion, institutional liability,
      or role assignment alone.
    falsifier_conditions:
    - If Ψ is applied without integration, temporality, and distance, the self-binding reading is under-specified and Responsibility_R
      should weaken.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent
      patterns.'
    case_function: L1 supplies distinctions, weak directedness, framing, possible non-events, and possible stabilization.
      In this conceptual case, Δ and □ are strong, while ∇, Λ, and Α remain weak or conditional because no concrete scene
      is supplied.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories
      and commitments.'
    case_function: 'L2 carries the main conceptual load: Ω marks power, capacity, exposure, vulnerability, dependency, and
      obligation; Θ extends responsibility into commitment, persistence, and changing conditions.'
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature
      forms of praxis.'
    case_function: 'L3 constrains the reading through Φ, Χ, and Σ: responsibility must be recontextualizable under changed
      conditions, held at reflective distance from verdicts, and integrated without forced coherence.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across
      time and contexts.'
    case_function: L4 is primary at the conceptual level because the case title and material center Ψ as self-binding; however,
      no literal person-level SELF_FIXPOINT is established.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case begins by differentiating responsibility from adjacent concepts and excluded claim-types.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: Weakly satisfied by structural directedness toward answerability, commitment, or response; no subjective
      impulse is inferred.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: Satisfied by situated frames of answerability and by the explicit separation of PMS-structural, moral, legal,
      diagnostic, metaphysical, and empirical frames.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Weakly satisfied only as possible omission, delay, silence, or missing answerability; no concrete expected
      occurrence is supplied.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: Weakly satisfied as possible stabilization of commitments or role expectations; recurrence is not shown in
      the case material.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Conceptually salient through explicit unequal power, capacity, exposure, vulnerability, dependency, and obligation;
      dependency on Α remains weak because recurrence is not evidenced.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Satisfied by temporal extension, commitment across time, changing conditions, persistence, and answerability
      over time.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Satisfied by the need to reframe responsibility under changing conditions without reducing revision to excuse
      or failure.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Satisfied by the required distance from metaphysical, diagnostic, legal-forensic, moralizing, and person-ranking
      claims.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Satisfied as a calibration-dependent integration of distinctions, frames, asymmetries, temporality, recontextualization,
      and distance.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Satisfied by the case focus on self-binding as commitment to integrated structures across time under asymmetry.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
