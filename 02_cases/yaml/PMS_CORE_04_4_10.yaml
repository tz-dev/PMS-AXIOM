      accountability, or institutional sanction.
    non_implementation_claim: The YAML representation does not implement responsibility, agency, selfhood, compliance, governance,
      or computational evaluation.
    non_moral_ranking: No person or group is ranked as more or less worthy, dignified, responsible, mature, guilty, blameworthy,
