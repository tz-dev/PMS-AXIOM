  critique_overlay_synthesis:
    primary_critique_reading: PMS-CRITIQUE makes visible that the Core case reaches only a minimal, conceptual critique threshold: a mismatch becomes framed and interruptible, but does not become productive or stable correction. The overlay therefore isolates the danger that interpretive explanation may function as commentary, narrative repair, judgment drift, diffusion drift, or integration bypass rather than as correction. This is a strength of the overlay only if it does not mistake its own threshold clarity for practical resolution.
    threshold_result: The case reaches CRITIQUE_MIN at the conceptual/application level and does not reach CRITIQUE_PROD or CRITIQUE_STABLE. It is not mere irritation or reaction because Χ is maintained, but it is not correction because Σ and Ψ remain weak, absent, or analytic-only. The threshold result should therefore be read as critique-readiness, not critique completion.
    mismatch_result: Δ becomes critique-relevant as the mismatch between interpretability or explanation and the practical reality that remains after such explanation. The mismatch is structurally clear but not empirically, legally, clinically, institutionally, or scene-specifically specified. It cannot ground a finding about concrete responsibility, harm, obligation, or validity without additional material.
    frame_result: □ defines the response space as philosophical-praxeological rather than empirical, legal, clinical, implementation, or metaphysical. It makes interruption of explanatory overcapture relevant while withholding correction claims. The frame also prevents the word reality from being treated as a PMS-based metaphysical conclusion.
    distance_result: Χ stop-capability is real within the application: the overlay can stop before verdict, sanction, forced integration, person-ranking, public exposure logic, or proof of capture. Χ is not a standalone trait and remains dependency-hygienic. Its main work is to keep the PMS and CRITIQUE readings from becoming the very over-interpretation the case warns about.
    recontextualization_result: Φ is active but ambiguous: it can bridge the mismatch into critique-readiness, yet it may also substitute explanation for practical correction. The overlay keeps both possibilities open and does not force resolution. In this case, Φ must remain bounded because recontextualization is exactly where explanatory elegance can become a risk.
    integration_result: Σ remains weak and is not treated as achieved correction. The central integration risk is that coherence could be mistaken for adequacy, correction, or practical capture. A clean PMS-CRITIQUE reading would therefore be suspect if it made the case feel resolved without adding scene evidence or operational validation.
    self_binding_result: Ψ does not bind follow-up in the case. It appears only as analytic self-binding of the overlay to non-coercion, reversibility, Dignity-in-Practice, and non-capture. No Ψ→Other demand is permitted, and no rival reading is required to integrate itself into PMS-CRITIQUE.
    asymmetry_temporality_result: Ω and Θ remain weak. Moral difficulty and practical remainder suggest possible exposure, cost, persistence, or residue, but no concrete gradient, sequence, accumulation, review window, obligation chain, or irreversible trace is supplied. Their weakness is not a defect; it is the correct result of the case not being a concrete praxis scene.
    scale_publicness_result: The selected horizontal scale is paper tag a, generic/structural critique. Publicness P is not applicable and does not amplify drift, exposure, or residue. The case may concern reality in practice, but it is not a public critique scene, reputation scene, platform scene, or mass-exposure scene.
    drift_result: The main CRITIQUE drift risks are D2 judgment drift, D3 narrative repair, D4 commentary drift, C7 diffusion drift, and C9 integration bypass. These are risks, not findings. They are constrained by Χ, weak Σ, non-capture openness, and the refusal to treat drift labels as diagnoses, accusations, sanctions, or proof that the case has failed PMS.
    dignity_result: Dignity-in-Practice is preserved by keeping the overlay structural, non-tribunal, non-person-ranking, and non-coercive. No humiliation, exposure steering, diagnostic inference, actor degradation, moral ranking, or ontology of worth is introduced. D functions as application discipline, not as a claim that PMS confers dignity.
    non_capture_result: What remains outside PMS-CRITIQUE capture is the practical reality or moral remainder that may persist despite interpretation. Rival critique grammars remain open where they better handle lived experience, normativity, public rupture, resistance, discourse ethics, testimony, tragedy, or praxis-priority. Non-capture is preserved as a legitimate result, not as residue awaiting forced integration.
    optional_mip_docking_result: MIP docking is not triggered. No projection architecture, regime-publicity interface, shared critique-readiness scene, or external mapping schema is supplied. The overlay remains PMS-CRITIQUE only and does not import another framework.
    final_critique_formula_or_signature: CRITIQUE_MIN with active Δ, □, and Χ; active-but-bounded Φ; weak Σ; analytic-only Ψ; weak Ω and Θ; constrained drift risks D2/D3/D4/C7/C9; not CRITIQUE_PROD, not CRITIQUE_STABLE, no P activation, and no MIP docking.
    final_claim_boundary: 'This CRITIQUE overlay adds visibility for critique thresholds, reach, scale, publicness, drift, modulators, and critique-facing projection boundaries. It does not revise PMS Base, rewrite the PMS Core pass, establish truth, verify motives, diagnose persons, rank persons, prescribe correction, generate sanction logic, validate PMS, or claim final capture of critique. Its strongest claim is limited: the case is structurally critique-ready at the minimal conceptual level, but not correction-complete, follow-up-bound, empirically grounded, or exhaustively captured.'