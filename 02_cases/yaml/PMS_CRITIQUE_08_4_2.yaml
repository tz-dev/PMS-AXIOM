        applicability: weak
        case_application: 'Attractor inertia is weak: no stabilized pattern exists, but a possible explanatory-substitution attractor is flagged.'
      M8_publicness_overlay:
        description: P amplifies Ω, Θ, and Α and can harden drift before Σ/Ψ can stabilize correction.
        applicability: not_applicable
        case_application: Publicness overlay is not applicable because the case is not public, platformed, reputational, or mass-mediated.
  mip_docking_interface:
    status: not_triggered
    purpose: 'Optional interface for docking PMS-CRITIQUE with MIP-style projection and interference analysis while keeping both schemas separate.'
    non_implication: 'Docking does not mean PMS-CRITIQUE contains MIP, validates MIP, or changes PMS Base.'
    separation_rule:
