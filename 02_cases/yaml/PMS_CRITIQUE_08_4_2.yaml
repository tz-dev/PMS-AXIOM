  limits_and_boundedness:
    structural_limits:
    - Does not establish truth.
    - Does not verify motives, sincerity, consciousness, intention, or inner states.
    - Does not adjudicate moral rightness, metaphysical reality, or ultimate adequacy.
    - Does not rank persons, roles, groups, positions, or rival formalisms.
    - Does not function as clinical, forensic, HR, compliance, governance, implementation, or sanctioning tool.
    - Does not dissolve accountability into 'just structure' where concrete responsibility is otherwise established.
    - Does not convert practical remainder into model failure, actor failure, maturity failure, or required integration by default.
    - Does not promise exhaustive capture of lived experience, normative disagreement, public rupture, resistance, or social reality.
    genuine_non_capture:
      status: kept_open
      possible_when:
      - the grammar produces a coherent reading but weakens what is structurally decisive in the case
      - critique functions more as symbolic refusal, public rupture, ethical contestation, testimony, or resistance than as correction-oriented coordination
      - rival framings preserve dimensions that PMS-CRITIQUE backgrounds by design
      - explanation remains intelligible while the practical situation, consequence, exposure, or obligation remains unresolved
      - the relevant reality is not another missing element inside the PMS chain but a limit of what operator translation can responsibly claim
      anti_absorption_rule:
      - Do not prematurely redescribe resistant cases as mere drift.
      - Do not treat resistant cases as calibration noise by default.
      - Do not treat incomplete capture as proof that the scene is defective.
      - Do not treat refusal of PMS vocabulary as evidence of insufficient integration.
      - Do not treat unresolved remainder as a demand for stronger Φ, Σ, or Ψ.
      case_application: The case-specific non-capture zone is the practical remainder that persists after interpretation or explanation. PMS-CRITIQUE may mark the threshold where explanation becomes critique-relevant, but it must not absorb the remainder as drift, incomplete calibration, failed integration, narrative repair, or commentary drift by default. In this case, non-capture is not an embarrassment to be repaired; it is one of the central structures the overlay must preserve.
    rival_framings:
      status: kept_open
      note: 'Rival critique grammars remain methodologically open. PMS-CRITIQUE may be more structurally legible in some cases without thereby being superior in all respects.'
      case_application: Open rival grammars include hermeneutic, phenomenological, pragmatic, discourse-ethical, anti-formalist, moral-remainder, praxis-priority, tragic, and testimony-centered readings. These are not invalid because they resist PMS-CRITIQUE signatures, refuse correction-oriented framing, or keep the remainder outside integration. A rival reading would become especially important if it explains the difference between interpretation and practical reality with sharper discrimination and less risk of assimilation.
    final_boundedness_statement: 'Nothing in this overlay requires PMS-CRITIQUE to be treated as final, exhaustive, or uniquely sufficient. Its strength remains most credible where its own limits, rival framings, and possible non-capture cases are kept explicit. In this case, the overlay is strongest when it shows where critique becomes possible, and weakest if it pretends that critique has already become correction.'
  guardrails:
    application_gate:
      required:
      - Χ + reversibility + D is a validity constraint on PMS application, not on critique, refusal, revision, or rejection.
      - Χ remains practically activatable; stop-capability is real, not merely formal.
      - 'Reversibility: readings remain scene-bound and revisable; Θ accumulation is treated as real.'
      - 'Dignity-in-Practice: no shaming, humiliation, or actor-ranking; critique stays structural.'
      - Applications remain scene-bound rather than person-bound.
      disallowed_uses:
      - Person-labeling, motive attribution, psychological diagnosis.
      - Verdict logic as an output of the model.
      - Coercive binding Ψ→Other, threats, or exposure-as-punishment.
      - Using drift labels as sanctions rather than structural descriptors.
      - Using structure-talk to suspend accountability where responsibility was structurally available.
      - Treating resistant cases as invalid merely because they exceed this grammar.
      case_application: The application gate is preserved by maintaining Χ, reversibility, and D: the overlay adds critique-specific threshold language without adjudicating truth, verifying motives, diagnosing persons, ranking positions, prescribing correction, or rewriting the PMS Core pass.
    dignity_in_practice:
      status: maintained
      note: 'D constrains application mode, not content: analysis must not become a pile-on and must preserve restraint even when Ω or P are high.'
      invalidity_clause: Critique becomes structurally invalid as a PMS-CRITIQUE enactment when degradation, humiliation, or exposure steering replaces correction.
      case_application: Dignity-in-Practice is maintained because the overlay remains structural and non-coercive. It does not shame, expose, rank, diagnose, moralize, or convert practical remainder into a failure of any person or rival framing.
    misuse_signatures_to_flag:
      chi_as_coercion:
        signature: Using Χ-language to demand compliance.
        status: absent
        case_application: Χ-language does not drift into coercion. Distance is used as stop-capability and restraint, not as a demand for compliance.
      exposure_as_correction:
        signature: Treating public exposure as correction; P substituted for Σ/Ψ.
        status: absent
        case_application: Exposure is not substituted for correction because P is not active and no public target or exposure mechanism is supplied.
      drift_labels_as_moral_rank:
        signature: Turning drift labels into moral rank tokens.
        status: risk
        case_application: There is a low risk that drift labels could be mistaken for moral rank tokens. The overlay constrains this by marking drift as conditional structural risk only.
      scene_to_person_typing:
        signature: Collapsing scene-bounded critique into person-typing.
        status: absent
        case_application: Scene descriptors do not become person labels because no persons or concrete actors are present and the overlay remains case-type-bound.
      irreversible_binding_demands:
        signature: Using drift language to justify irreversible binding demands.
        status: absent
        case_application: No irreversible binding demand is made. Ψ is not projected onto others and is limited to analytic self-binding.
      explanation_neutralizes_accountability:
        signature: Using explanation-first language to neutralize accountability.
        status: risk
        case_application: There is a real overlay-level risk that explanation-first language could neutralize practical remainder or accountability. This is constrained by preserving non-capture and withholding Responsibility_R and Action_E findings.
      evaluation_bypasses_structure:
        signature: Using evaluation-first labels to bypass structural explanation.
        status: risk
        case_application: There is a weak risk that the phrase 'morally difficult' could invite evaluative shortcutting. The overlay keeps the reading structural and refuses tribunal logic.
