  modulators:
    overview: 'Modulators are overlay-level weightings that change how critique signatures behave. They are not PMS operators, traits, or diagnoses.'
    selectivity_note: 'Only modulators relevant to the current case should be treated as active; others should be marked weak or not applicable.'
    items:
      M1_frame_clarity:
        description: The clearer □ is, the easier it is to distinguish critique from reaction, judgment, or commentary.
        applicability: active
        case_application: 'Frame clarity is active: the philosophical-praxeological frame is explicit enough to identify the mismatch between explanation and practical remainder, while still requiring domain boundaries.'
      M2_non_event_density:
        description: Dense Λ increases risk of silence attractors, ambiguity, or unresolved residue.
        applicability: weak
        case_application: 'Non-event density is weak: one central absent coincidence is present, but there is no cluster of repeated missed responses or follow-up failures.'
      M3_asymmetry_visibility:
        description: Visible Ω clarifies cost gradients but also increases risk of exposure-based drift.
        applicability: weak
        case_application: 'Asymmetry visibility is weak: moral difficulty implies possible exposure or obligation, but no directional cost gradient is specified.'
      M4_temporal_compression:
        description: Compressed Θ increases reaction drift and public amplification risk.
        applicability: not_applicable
