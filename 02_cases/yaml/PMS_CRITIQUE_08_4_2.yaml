pms_critique_overlay_application:
  schema_version: PMS-CRITIQUE_1.1
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-CRITIQUE.yaml
  paper_source_file: PMS-CRITIQUE.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: Praxeological Meta-Structure – Critique Layer
    model_short: PMS-CRITIQUE
    status: repository_overlay_draft
    maturity: draft
    repository_role: paper_specific_application_schema
    last_updated: '2026-04-06'
    doi: 10.5281/zenodo.18175456
    repositories:
      pms_base: https://github.com/tz-dev/Praxeological-Meta-Structure-Theory
      this_repo: https://github.com/tz-dev/PMS-CRITIQUE
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.4 Thinking)
      role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      repository_role: current_base_schema
    description: 'PMS-CRITIQUE is a PMS-conform application layer that reconstructs critique as a structurally constrained praxis form: how mismatch becomes interruptible through Χ-stabilized framed differentiation, how critique becomes productive through Φ and Σ, and how follow-up may become bound across time through Ψ without coercion.'
    epistemic_status: 'This overlay is structurally disciplined and portable, but not final, exhaustive, uniquely sufficient, immune to revision, or superior to all rival critique grammars.'
    methodological_restraint: 'PMS-CRITIQUE does not claim monopoly on critique analysis. Rival grammars may remain stronger where normativity, institutional legitimacy, rhetorical force, discourse ethics, public rupture, resistance, or lived experience are the primary object.'
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for case title 'Interpretability vs. Reality'
    rule: 'This CRITIQUE block is appended to or integrated with an already completed PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat CRITIQUE constructs as PMS Base.'
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: 'The CRITIQUE overlay may add visibility for critique thresholds, reach, scale, publicness, drift classes, modulators, critique-facing derived-axis projections, optional MIP docking, and misuse guardrails. It must not modify the completed PMS Core case except where a direct PMS.yaml inconsistency has been separately identified.'
  pms_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    canonical_source_url: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
    dependency_hygiene:
      chi_note: 'Χ is used here as a reduced signature for critique interruptibility. In PMS terms, Χ presupposes Φ, Θ, and □; it is not treated as a standalone trait.'
      no_operator_override: 'Any operator gloss in this overlay is an application-facing excerpt only. Canonical operator definitions and dependencies remain in PMS.yaml.'
      overlay_discipline: 'Derived critique constructs remain overlay-level and do not alter the base PMS derivation path.'
  nested_overlay_policy:
    overlays:
      P:
        name: Publicness Overlay
        type: overlay_modulator
        is_operator: false
        amplifies:
        - Ω
        - Θ
        - Α
        note: 'Publicness amplifies exposure gradients, hardens irreversibility, and accelerates script stabilization without creating critique or correction by itself.'
        case_application: Publicness does not amplify the critique configuration in the provided case material. The case is abstract, non-public, and non-scenic; P remains an overlay modulator only and is not activated as exposure, publicity, or mass-scale stabilization.
    no_base_extension: true
    rule: 'PMS-CRITIQUE introduces overlay-level constructs only: critique formulas, reach and scale ladders, publicness overlay, drift classes, modulators, projections, docking interfaces, and example-packet discipline. These organize existing PMS operators and never become PMS operators or dependencies.'
  validity_gate:
    status: passed
    gate_type: PMS_application_only
    note: 'This gate constrains PMS application only. It does not constrain critique, refusal, rejection, revision proposals, or rival formalizations.'
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: 'A maintained meta-position and stop-capability are present. The CRITIQUE overlay does not fuse the case into reaction, verdict, sanction, exposure-punishment, authority, or person-level attribution.'
      reversibility:
        status: maintained
        meaning: 'Readings remain scene-bound, revisable, and non-final. The overlay does not produce global person labels, irreversible labels, or final judgments.'
      Dignity_in_Practice_D:
        id: D
        status: maintained
        meaning: 'Dignity-in-Practice is preserved. The overlay does not shame, rank, humiliate, morally evaluate, diagnose, or ontologically assess persons or groups.'
    gate_result: valid_as_critique_overlay_application
  critique_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic.
    - No person-level judgment, no person-ranking, no sanction logic.
    - No adjudication of correctness, truth, motives, sincerity, or moral rightness.
    - No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal, or enforcement script.
    - Critique remains structural, scene-bound, reversible, and non-coercive.
    - Drift labels remain structural descriptors, not accusations.
    - Resistant cases must not be treated as invalid merely because they exceed PMS-CRITIQUE.
    may_add_visibility_to:
    - mismatch as Δ
    - response pressure as ∇
    - frame relevance and role space as □
    - non-response or missing follow-up as Λ
    - stabilized critique scripts as Α
    - exposure gradients as Ω
    - accumulation and irreversibility as Θ
    - recontextualization as Φ
    - stop-capability and interruptibility as Χ
    - correction consolidation as Σ
    - non-coercive follow-up binding as Ψ
    - minimal, productive, and stable critique thresholds
    - vertical reach and horizontal scale
    - publicness amplification
    - critique drift patterns
    - modulator conditions
    - critique-facing A/C/R/E/D projections
    - optional MIP docking boundaries
    must_not_do:
    - treat critique as personal essence
    - treat reaction as weaker critique
    - treat judgment as strict critique without Χ, Φ, or Σ
    - translate critique legibility into verdict
    - convert Ψ into Ψ→Other coercive demand
    - treat public exposure as correction
    - use drift labels as sanctions
    - collapse scene-bounded critique into person-typing
    - use explanation-first language to neutralize accountability
    - use evaluation-first labels to bypass structural explanation
    - claim PMS Base validation
  critique_core:
    scope_note: 'PMS-CRITIQUE models structural conditions of critique and critique drift under load. It asks whether a mismatch becomes framed, interruptible, recontextualizable, correctable, and optionally self-bound without coercion. It does not adjudicate correctness of opinions, establish truth, verify motives, diagnose actors, rank positions, or provide normative discourse ethics.'
    definitions:
      CRITIQUE_MIN:
        label: Minimal Critique
        applicability: active
        formula:
          required:
          - Δ
          - □
          - Χ
          background_typically_active:
          - Ω
          - Θ
        gloss: 'Minimal critique is Χ-stabilized framed differentiation: a mismatch Δ becomes legible as relevant inside a frame □, and the configuration remains interruptible Χ rather than collapsing into impulse discharge, frame policing, judgment, silence, or paralysis. Minimal critique is therefore not a verdict and not a correction; it is the point at which mismatch can be held without being immediately converted into reaction, closure, or enforcement.'
        threshold_status: strict_structural_minimum
        non_equivalences:
        - Reaction Δ + ∇ without Χ is not a weaker critique; it is structurally different.
        - Judgment □ + Δ without Φ/Σ does not count as productive critique in the strict sense used here.
        - Silence, paralysis, or non-response under mismatch are not low-grade critique; they are distinct stabilizations.
        - Explanation that removes interruptibility is not critique merely because it is intelligible.
        case_application: The completed Core pass reaches the CRITIQUE_MIN threshold only at the conceptual/application level. Δ is the mismatch between interpretability or explanation and practical remainder. □ is the philosophical-praxeological frame that makes the mismatch relevant. Χ is maintained as stop-capability against verdict, overcapture, forced integration, PMS triumphalism, or conversion of remainder into defect. This is not a concrete scene finding and does not establish an enacted critique situation, a public critique, or a correction event.
      CRITIQUE_PROD:
        label: Productive Critique
        applicability: weak
        formula:
          required:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          background_typically_active:
          - Ω
          - Θ
        gloss: 'Productive critique crosses from interruption into correction. Φ recontextualizes the mismatch into a context where change could become intelligible, and Σ consolidates a coherent corrective step that is coordinatable rather than merely asserted. Productive critique is not reached by explanation alone; it requires that recontextualization not substitute for the practical work of consolidation.'
        threshold_status: productive_correction_threshold
        case_application: The case does not securely reach productive critique. Φ is active because the case concerns interpretation and explanation as recontextualizing moves. However, Σ remains weak because no corrective step, action plan, repair, institutional procedure, shared follow-up, or consolidated practical transformation is supplied. The overlay therefore treats productive critique as a nearby but unfulfilled threshold. The main danger is not absence of explanation, but the possibility that explanation becomes a substitute for correction while appearing structurally coherent.
      CRITIQUE_STABLE:
        label: Stable Critique / Follow-up Binding
        applicability: not_applicable
        formula:
          required:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          - Ψ
          background_typically_active:
          - Ω
          - Θ
        gloss: 'Stable critique binds correction into a trajectory without coercing others. Follow-up becomes structurally owned over time Θ while remaining revisable, non-punitive, and restrained by Dignity-in-Practice. Stable critique is not achieved by demanding that others integrate the critique; Ψ must bind one’s own follow-up or role-commitment and must not become Ψ→Other coercion.'
        threshold_status: follow_up_binding_threshold
        binding_rule: Ψ must bind self or own follow-up, not become Ψ→Other demand.
        case_application: Stable critique is not established. The case provides no follow-up owner, no temporally extended correction trajectory, no review condition, no shared praxis scene, and no Ψ self-binding by a case actor. Ψ appears only as analytic self-binding of the PMS and CRITIQUE application to restraint, reversibility, non-capture, and Dignity-in-Practice. It must not become a demand that the case, rival readings, or practical remainder submit to PMS integration.
    non_goals:
    - No moral ranking of positions, speakers, or outcomes.
    - No psychological typing, motive attribution, sincerity judgment, trait claim, maturity claim, or diagnostic claim.
    - No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal, compliance process, or sanctioning logic.
    - No coercive enforcement: Ψ must not be converted into Ψ→Other demands.
    - No truth adjudication, correctness verdict, metaphysical settlement, or final determination of critique legitimacy.
    - No claim that PMS-CRITIQUE captures every form of critique, refusal, rupture, or resistance.
    reach_ladder_note: 'The vertical reach ladder is not a virtue ladder. It describes how far a critique chain structurally travels from mismatch to interruption to correction to binding before breaking. Higher reach does not imply moral superiority, greater truth, better character, or stronger legitimacy.'
    boundedness_note: 'These critique formulas are paper-specific overlay constructs. They do not establish that all critique-relevant phenomena must be captured in exactly these terms. Where critique operates primarily as refusal, rupture, testimony, symbolic resistance, public contestation, or lived moral remainder, rival grammars may be more discriminating.'
  critique_mapping:
    overview: 'Operator-to-critique mappings are one-to-many: each PMS operator may realize multiple critique-relevant functions depending on frame and scale. This mapping is descriptive and does not treat operators as psychological traits or personal capacities.'
    operator_roles:
      Δ:
        name: Difference
        critique_role: Legible mismatch.
        typical_realizations:
        - Error vs. standard.
        - Claim vs. evidence mismatch.
        - Expectation vs. non-response mismatch carried by Λ.
        case_application: The critique-relevant mismatch is the non-coincidence between what can be interpreted or explained and what remains real in practice. The mismatch is conceptual rather than evidentiary or interpersonal.
      ∇:
        name: Impulse
        critique_role: Directional pressure to respond.
        typical_realizations:
        - Fast-response pressure.
        - Defensive countering.
        - Demand for immediate explanation as closure substitute.
        case_application: Response pressure is weak: the case creates pressure toward explanation, clarification, or resolution, but no actor, affect, demand, or concrete response impulse is specified.
      □:
        name: Frame
        critique_role: Relevance and role space.
        typical_realizations:
        - Meeting / review frame.
        - Training / evaluation frame.
        - Platform discourse frame.
        case_application: The frame is a philosophical-praxeological frame about morally difficult situations. It defines relevance around interpretation, explanation, practical remainder, and the danger of treating legibility as capture.
      Λ:
        name: Non-Event
        critique_role: Structured absence under expectation.
        typical_realizations:
        - Promised follow-up does not occur.
        - Repeated silence after raised concerns.
        - Ambiguity sustained by not-deciding.
        case_application: The meaningful absence is the absent or incomplete coincidence between explanation and practical reality. It may be PMS-legible as structured absence, but it may also mark genuine non-capture rather than an omitted correction to be filled.
      Α:
        name: Attractor
        critique_role: Stabilized scripts that handle critique pressure without correction.
        typical_realizations:
        - Pile-on pattern.
        - Silence script.
        - Routine deflection.
        - Process-talk without outcome.
        case_application: No stabilized critique-handling pattern is evidenced. Attractor status remains weak and appears only as the risk that explanatory framing could stabilize into a substitute for correction or practical responsiveness.
      Ω:
        name: Asymmetry
        critique_role: Exposure gradients.
        typical_realizations:
        - Public target vs. diffuse crowd.
        - Junior exposed under senior correction.
        - Raiser bears cost; manager bears less cost.
        case_application: Exposure, status, retaliation, or cost gradients are not concretely given. Ω remains weak because moral difficulty may involve asymmetry, but no directional power, vulnerability, obligation, or role relation is specified.
      Θ:
        name: Temporality
        critique_role: Accumulation and irreversibility.
        typical_realizations:
        - Durable residue.
        - Repeated non-follow-up hardens silence norm.
        - No review windows; correction never consolidates.
        case_application: Temporality is weak. The phrase 'remains real in practice' suggests persistence or residue beyond explanation, but the case provides no sequence, accumulation, repetition, review window, or irreversible public trace.
      Φ:
        name: Recontextualization
        critique_role: Reframing toward correction or substitute.
        typical_realizations:
        - Constraint context makes fix actionable.
        - Endless explanation expansion without action plan.
        - Reframing mismatch as tone problem.
        case_application: Recontextualization is active: the case itself concerns how a practical moral remainder becomes interpreted or explained. The key calibration is whether Φ bridges toward correction or substitutes for what remains real; the Core pass keeps this non-capture risk open.
      Χ:
        name: Distance
        critique_role: Stop-capability / interruptibility.
        typical_realizations:
        - Pausing before verdict.
        - Refusing pile-on acceleration.
        - Keeping critique reversible and non-coercive.
        case_application: Χ is maintained as stop-capability and interruptibility of the interpretation itself. The overlay does not allow the PMS or CRITIQUE rendering to become verdict, sanction, person-label, forced integration, or proof of capture.
      Σ:
        name: Integration
        critique_role: Correction consolidation.
        typical_realizations:
        - Concrete revision or repair step.
        - Coordinated follow-up.
        - Stable distinction between critique and punishment.
        case_application: Σ does not consolidate a corrective step. Integration remains weak and risky because the case explicitly warns that interpretive coherence may fail to coincide with practical reality.
      Ψ:
        name: Self-Binding
        critique_role: Follow-up ownership without coercion.
        typical_realizations:
        - Owning a correction pathway.
        - Commitments with review.
        - Self-binding to restraint in future critique.
        case_application: Ψ is not a case-agent binding. It functions only as analytic self-binding: the CRITIQUE overlay binds itself not to coerce, rank, diagnose, sanction, or demand follow-up where no concrete follow-up structure exists.
  critique_projections:
    overview: 'Critique projections reuse PMS derived axes without redefining them. They describe how critique-relevant configurations affect A, C, R, E, and D in a scene-bound way.'
    reuse_status: overlay_level_reuse_of_base_PMS_derived_axes
    axes:
      Awareness_A:
        formula:
        - Θ
        - □
        - Δ
        critique_projection: Critique sustains awareness only when mismatch remains framed over time rather than collapsing into reaction or disappearing into silence.
        case_application: Awareness_A is weakly supported as sustained framed differentiation between interpretability and practical remainder. Because the case lacks a temporal scene, the critique overlay treats awareness as conceptual discrimination rather than lived awareness or empirical consciousness.
      Coherence_C:
        formula:
        - Θ
        - Λ
        - □
        - ∇
        critique_projection: Critique coherence depends on whether pressure, expectation, frame, and temporal continuation remain structured rather than dissolving into noise or mere commentary.
        case_application: Coherence_C is contested. The critique pressure is to make the mismatch intelligible, but PMS-CRITIQUE must not let coherence become proof of truth, capture, or adequate correction. The non-event Λ remains a possible limit rather than an integration deficit.
      Responsibility_R:
        formula:
        - Ψ
        - Φ
        - Θ
        - Ω
        critique_projection: Responsibility appears when recontextualized critique under asymmetry becomes owned over time without coercive projection onto others.
        case_application: Responsibility_R is not established. There is no concrete asymmetry, obligation, follow-up owner, or self-binding actor. Responsibility remains a possible later scene question, not a result of the overlay.
      Action_E:
        formula:
        - Σ
        - Θ
        - ∇
        critique_projection: Critique becomes action only when directional pressure is temporally carried into integrated correction, not merely voiced, judged, or narrated.
        case_application: Action_E is under-specified. The case does not become enactable correction; it remains a conceptual critique-readiness structure around mismatch, framing, distance, and the risk of explanatory substitution.
      Dignity_in_Practice_D:
        formula:
        - Ψ
        - Χ
        - Ω
        critique_projection: D constrains critique so that exposure or asymmetry does not become humiliation, person-ranking, or coercive binding.
        case_application: Dignity-in-Practice constrains the overlay by forbidding person-ranking, shaming, diagnostic inference, exposure steering, or conversion of critique language into sanction. D is application discipline, not ontological dignity or moral superiority.
    projection_note: 'These projections are not new PMS axes and do not alter base formulas. They only state how critique cases may load the existing derived axes.'
  critique_axes:
    overview: 'PMS-CRITIQUE adds overlay-level reach and scale descriptors. These are not PMS operators and do not alter PMS dependencies.'
    vertical_reach:
      selected_level: V2
      levels:
        V0:
          label: Irritation
          signature: Δ + ∇
          description: Mismatch triggers activation but lacks Χ-stabilized interruption.
          case_application: The case does not remain at irritation only, because the completed Core pass has already stabilized the mismatch through □ and Χ rather than leaving it as raw unease.
        V1:
          label: Reaction
          signature: Δ + ∇ + □
          description: Mismatch becomes framed response pressure but remains insufficiently distanced.
          case_application: The case is not reaction or discharge. ∇ is weak and no impulsive response, outrage, defensive countering, or immediate closure demand is supplied.
        V2:
          label: Minimal critique
          signature: Δ + □ + Χ
          description: Framed mismatch becomes interruptible critique.
          case_application: Minimal critique is reached in a bounded conceptual sense: the mismatch is differentiated, framed, and held under Distance. This does not transform the abstract case into a concrete critique scene.
        V3:
          label: Productive critique
          signature: Δ + □ + Χ + Φ + Σ
          description: Critique crosses into correction through recontextualization and integration.
          case_application: Productive critique is not reached. Φ is present, but Σ is weak and no corrective consolidation, practical change, or action-coordinating step is provided.
        V4:
          label: Stable critique
          signature: Δ + □ + Χ + Φ + Σ + Ψ
          description: Correction becomes bound as follow-up without coercing others.
          case_application: Stable critique is not reached because no non-coercive Ψ follow-up binding, owner, timeline, or accountability trajectory appears in the case material.
      ladder_guardrail: Reach level is not a virtue rank. It only indicates how far the critique chain travels structurally.
    horizontal_scale:
      selected_system: paper_tags
      selected_paper_tag: a
      selected_deployment_tag: not_applicable
      paper_tags:
        a:
          label: generic structural critique
          description: Critique is analyzed as a general praxis form or abstract configuration.
          case_application: The case is generic and structural: it concerns critique-readiness of a conceptual mismatch rather than a named individual, group, institution, or public discourse event.
        b:
          label: single-subject critique
          description: Critique is directed toward or generated by one identifiable subject-position.
          case_application: Single-subject critique is not applicable. No person, self-relation, speaker, target, or subject-position is provided.
        c:
          label: small-group critique
          description: Critique occurs within a small group, team, or bounded interactional scene.
          case_application: Small-group critique is not applicable. No group, team, meeting, or shared correction setting is provided.
        d:
          label: public critique
          description: Critique is public, platformed, reputationally amplified, or mass-mediated.
          case_application: Public critique is not applicable. No public audience, platform, reputational exposure, or mass-scale trace is provided.
      deployment_tags:
        dyadic_micro:
          description: Direct two-party or micro-interactional critique scene.
          case_application: Not applicable; no dyadic interaction or interpersonal critique scene is supplied.
        small_group_team:
          description: Small-group, team, classroom, workshop, or meeting-level critique.
          case_application: Not applicable; no team, small group, or local coordination setting is supplied.
        org_institution:
          description: Organizational, institutional, policy, governance, or bureaucratic critique.
          case_application: Not applicable; no organization, institution, rule system, or policy procedure is supplied.
        public_mass:
          description: Public, platformed, media, or mass-discourse critique.
          case_application: Not applicable; no public or mass-mediated critique setting is supplied.
      scale_guardrail: Scale labels do not determine legitimacy, truth, or moral weight. They only indicate structural loading conditions.
    publicness_overlay:
      id: P
      name: Publicness Overlay
      is_operator: false
      applicability: not_applicable
      amplifies:
      - Ω
      - Θ
      - Α
      description: Publicness magnifies exposure, accelerates stabilization, and hardens temporal residue without creating critique or correction by itself.
      case_application: Publicness does not amplify the case. P remains absent as public exposure, mass trace, platform scale, or reputational hardening. The practical remainder is conceptual, not publicized.
  drift_typology:
    overview: 'Drift classes identify ways critique can fail, deform, or stabilize below its productive or binding thresholds. These classes are overlay-level structural descriptors only.'
    methodological_status:
      exhaustive: false
      diagnostic: false
      person_typing: false
      sanction_logic: false
      open_to_extension: true
    main_classes:
      D1:
        name: Reaction Drift
        signature: Δ + ∇ without Χ
        description: Mismatch discharges as reaction before critique becomes interruptible.
        applicability: not_applicable
        case_application: Reaction drift is not active. The case contains no impulsive discharge, fast outrage, or Δ + ∇ collapse without Χ; the Core pass explicitly maintains Χ.
      D2:
        name: Judgment Drift
        signature: Δ + □ without Φ/Σ
        description: Framed difference becomes judgment without recontextualization or correction.
        applicability: risk
        case_application: Judgment drift is a risk if the framed difference between explanation and reality is converted into verdict or correctness adjudication. The overlay constrains this risk by preserving Χ and non-capture.
      D3:
        name: Narrative Repair Drift
        signature: Φ high, Σ weak
        description: Recontextualization repairs the story without corrective consolidation.
        applicability: risk
        case_application: Narrative repair drift is a risk if explanation re-narrates the practical remainder so smoothly that the remainder is neutralized. The Core pass mitigates this by weakening Σ and preserving non-capture.
      D4:
        name: Commentary Drift
        signature: Χ high, Σ weak, Ψ absent
        description: The scene remains reflectively discussable without correction or follow-up.
        applicability: risk
        case_application: Commentary drift is a risk because the case is abstract and could remain interpretive commentary without correction. This risk is bounded by marking Action_E and productive critique as under-specified rather than pretending correction occurred.
      D5:
        name: Public Pillory
        signature: P amplifies Ω and Α while Χ/Σ weaken
        description: Publicness converts critique into exposure or pile-on rather than correction.
        applicability: not_applicable
        case_application: Public pillory is not active and not a case-supported risk because P is not activated and no public exposure or target exists.
      D6:
        name: Silence Attractor
        signature: Λ + Α with weak Φ/Σ
        description: Non-response stabilizes as a way of steering or dissolving critique.
        applicability: not_applicable
        case_application: Silence attractor is not established. The case includes a meaningful absence, but not a repeated silence script, avoidance pattern, or stabilized non-response practice.
    compact_catalogue:
      C1_Reaction_Drift:
        reduced_signature: Δ + ∇ without Χ
        description: Mismatch discharges before interruption becomes possible.
        applicability: not_applicable
        case_application: 'Rejected: the case is not impulsive reaction and Χ is maintained by the Core pass.'
      C2_Judgment_Drift:
        reduced_signature: Δ + □ without Φ/Σ
        description: Framed difference becomes judgment or evaluation without correction.
        applicability: risk
        case_application: 'Accepted only as a risk: the mismatch could be converted into a verdict that PMS or explanation has decided the matter. The overlay blocks that conversion.'
      C3_Moralization_Drift:
        reduced_signature: Ω + □ with weak Χ
        description: Asymmetry and frame harden into moral ranking.
        applicability: risk
        case_application: 'Accepted only as a risk: ''morally difficult'' could invite moral ranking, but the overlay keeps the reading structural, non-tribunal, and non-person-ranking.'
      C4_Narrative_Reset_Drift:
        reduced_signature: Φ high, Λ neutralized, Σ weak
        description: Recontextualization resets the story without correction.
        applicability: risk
        case_application: 'Accepted only as a risk: interpretive explanation could reset the story so that practical remainder disappears. The Core pass explicitly preserves the remainder.'
      C5_Commentary_Drift:
        reduced_signature: Χ high, Φ active, Σ/Ψ weak
        description: Reflective discussability substitutes for correction.
        applicability: risk
        case_application: 'Accepted as a risk of abstract analysis: the case could remain commentary about critique without correction. This is marked rather than treated as productive critique.'
      C6_Silence_as_Steering:
        reduced_signature: Λ + Α with weak Φ
        description: Non-response becomes a stabilizing script.
        applicability: not_applicable
        case_application: 'Rejected: no silence practice, steering function, or recipient position is specified.'
      C7_Diffusion_Drift:
        reduced_signature: Ω dispersed, Ψ absent
        description: Responsibility diffuses across a scene until follow-up ownership disappears.
        applicability: risk
