operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - boundary_formation
      - object_differentiation
      - structural_contrast
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the primary distinctions required for the case: recurrence versus
      repetition, near-return versus strict identity, recurrence versus
      periodicity, invariance, reversibility, determinism, ergodicity, entropy
      reversal, and structural persistence.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - >
        The relevant distinctions are between types of return, types of
        sameness, formal recurrence conditions, and adjacent but non-equivalent
        dynamical concepts.
      - >
        Δ must not import metaphysical identity or empirical recurrence time
        unless those are separately specified by the case material.
    falsifier_conditions:
      - >
        If recurrence cannot be distinguished from identity, periodicity,
        reversibility, invariance, or repetition, the PMS reading loses
        discriminative force.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - Δ
    provides:
      - activation
      - orientation
      - energetic_gradient
      - proto_agency
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears only weakly as structural directedness of iteration: a
      transformation carries states forward from one iterate to another. It is
      not desire, will, motivation, or subjective impulse.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        The tension is structural and mathematical: repeated transformation
        produces a directed sequence of states or neighborhoods.
      - >
        No subjective desire, agency, pressure, or psychological drive is
        inferred from the recurrence structure.
    falsifier_conditions:
      - >
        If no iterative transformation or directional sequence is specified, ∇
        is under-specified and should be removed or marked inactive.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - Δ
      - ∇
    provides:
      - context
      - boundary_conditions
      - relevance_structuring
      - role_space
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is central: finite state-space, finite measure-space, bounded dynamics,
      measure preservation, and specified definitions of return constrain what
      recurrence can mean.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The active frame is the formal recurrence frame: finite or
        finite-measure space, measure-preserving transformation, bounded
        evolution, and a specified return criterion.
      - >
        Frame shifts between measure-theoretic, topological, finite-state,
        Hamiltonian, thermodynamic, computational, and metaphysical readings
        must be explicitly marked.
    falsifier_conditions:
      - >
        If the relevant space, measure, boundedness, transformation, or return
        criterion is unspecified, the reading becomes too abstract to
        discriminate.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - □
    provides:
      - expectation
      - counterfactual_structure
      - tension_through_absence
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active because recurrence may be guaranteed without practical
      recurrence time, may be absent within observational horizons, may be
      near-return rather than strict return, and may exclude null exceptional
      sets.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The expected occurrence is return or near-return within the formal
        frame; its absence matters only relative to specified temporal horizon,
        tolerance, measure, and exception handling.
      - >
        Non-observed return must not be treated as failure, drift, or defect
        when the recurrence claim does not guarantee practical recurrence time.
    falsifier_conditions:
      - >
        If no structured expectation of return, delay, or practically absent
        return is specified, Λ should not be asserted.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - Δ
      - ∇
      - □
      - Λ
    provides:
      - pattern_formation
      - stability
      - path_dependence
      - role_script_emergence
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is active as recurrent patterning or stabilization through repeated
      structural interaction. It marks recurrence-pattern, not a dissipative
      dynamical-systems attractor or teleological pull.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Recurrence must be shown as return or near-return under repeated
        iteration, not merely named as repetition.
      - >
        PMS Α must be distinguished from mathematical attractors, especially
        dissipative sinks, because Poincaré recurrence is typically framed
        through measure preservation rather than attraction to a sink.
    falsifier_conditions:
      - >
        If no recurrence, near-return, repeated structural interaction, or
        stabilization is present, Α is over-read.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - Α
    provides:
      - role_differentiation
      - responsibility_gradients
      - vulnerability_structures
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak. The case provides no interpersonal power, vulnerability, or
      obligation asymmetry. Only structural asymmetries are available:
      theorem-level guarantee versus practical observability, almost-everywhere
      recurrence versus exceptional null sets, and near-return versus strict
      identity.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        The direction and kind of asymmetry are formal and epistemic-practical,
        not moral or interpersonal: guarantee exceeds practical accessibility;
        measure-one claims leave exceptions.
      - >
        No moralization, blame, vulnerability ranking, role hierarchy, or
        responsibility gradient is inferred.
      - >
        Ω remains weak and removable if the reading does not require structural
        imbalance beyond formal distinctions.
    falsifier_conditions:
      - >
        If no directional imbalance between formal claim, practical access,
        exception handling, or interpretive frames is identifiable, Ω claims
        must be removed or marked inactive.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - Ω
      - Α
    provides:
      - sequence_and_trajectory
      - persistence
      - anticipation_and_delay
      - developmental_arcs
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is central: recurrence depends on temporal iteration, trajectory,
      return, delay, recurrence time, almost-everywhere return over repeated
      transformations, and the distinction between periodic and non-periodic
      return.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        The case must be read diachronically as iterated transformation and
        return-structure, not as static similarity.
      - >
        Temporality is essential, but PMS dependency on Ω creates a calibration
        risk because the mathematical case strongly supports Θ while only
        weakly supporting Ω.
    falsifier_conditions:
      - >
        If temporal iteration, sequence, recurrence time, or trajectory is not
        required, Θ is overextended.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - Θ
      - Ω
      - □
    provides:
      - adaptation
      - reinterpretation
      - developmental_change
      - pattern_shift
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active as conceptual recontextualization: return is shifted from
      intuitive repetition or strict identity into near-return,
      almost-everywhere return, and formal recurrence under specified frames.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Source frames include intuitive repetition, periodicity,
        identity-preservation, reversibility, and metaphysical return; target
        frames include measure-theoretic, topological, finite-state, and
        bounded-dynamical recurrence.
      - >
        Recontextualization clarifies only if it preserves non-fit and rival
        formalisms rather than absorbing all disagreement into PMS vocabulary.
    falsifier_conditions:
      - >
        If rival framings or mathematical distinctions are merely absorbed as
        PMS recontextualization, the reading becomes over-assimilative.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - Φ
      - Θ
      - □
    provides:
      - regulation
      - inhibition
      - reflection_and_meta_position
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as reflective distance and restraint: the analysis suspends
      seductive equivalences between recurrence and identity, periodicity,
      reversibility, entropy cancellation, practical recurrence, or
      metaphysical return.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The analysis preserves reversibility, avoids verdicts, and refuses to
        treat PMS coherence as proof of capture.
      - >
        Distance is not avoidance or empty neutrality; it is the disciplined
        suspension of overclaiming while still making structural distinctions.
    falsifier_conditions:
      - >
        If Χ is suspended to force a metaphysical, empirical, diagnostic,
        implementation, legal, or PMS-validation verdict, the PMS application
        is invalid.
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - Χ
      - Φ
    provides:
      - coherence
      - resolution_of_contradiction
      - multi_level_coordination
      - maturity_of_praxis
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is moderately active as reversible integration of distinctions:
      recurrence, near-return, non-periodicity, boundedness, measure
      preservation, invariance, reversibility, determinism, entropy, ergodicity,
      and identity are coordinated without being collapsed.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Integration must discriminate rather than smooth over real differences
        among mathematical, physical, computational, and metaphysical readings.
      - >
        Σ is not proof of truth, completeness, superiority, or practical
        recurrence. Coherence alone is insufficient.
    falsifier_conditions:
      - >
        If PMS coherence is treated as proof of adequacy or if distinctions are
        flattened into one smooth account, Σ is overclaimed.
    non_capture_note: >
      Integration does not prove adequacy.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - Σ
      - Θ
      - Χ
    provides:
      - self_model
      - responsibility_as_self_commitment
      - stable_normativity
      - autobiographical_coherence
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is not case-internal. Poincaré recurrence does not supply
      self-relation, stable normativity, responsibility-as-self-commitment, or
      autobiographical coherence. Ψ applies only as analytic self-binding of
      this PMS application.
    dependency_status: "not_active"
    analytic_weight: "not_active"
    calibration_points:
      - >
        Ψ is used only as application discipline: the analysis binds itself to
        reversibility, Distance, non-capture, and Dignity-in-Practice.
      - >
        No selfhood, agency, consciousness, or responsibility is attributed to
        the abstract recurrence structure.
    falsifier_conditions:
      - >
        If Ψ is used to attribute selfhood, normativity, responsibility, or
        identity-preservation to recurrence itself, the self-binding reading is
        under-specified or invalid.
    non_capture_note: >
      Self-binding must not be projected onto non-subjects or abstract
      mathematical structures as literal subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - Δ
      - ∇
      - □
      - Λ
      - Α
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the case through distinctions, iterative directedness,
      formal frame, delayed or absent practical return, and recurrence-patterning
      under constrained dynamics.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - Ω
      - Θ
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is uneven: Θ is central through temporal iteration and recurrence time,
      while Ω remains weak and limited to formal/practical asymmetries rather
      than interpersonal asymmetry.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - Φ
      - Χ
      - Σ
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 functions as calibration overlay: Φ reframes return, Χ prevents
      overclaiming, and Σ integrates distinctions only reversibly and without
      treating coherence as sufficiency.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - Ψ
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      Ψ is not primary or case-internal; it is analytic-only as self-binding
      discipline for the PMS application.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
  compositional_reading_used:
    - Ψ
    - Σ
    - Χ
    - Φ
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: Δ
      dependency_check: "root"
      satisfied_by: >
        Stable distinctions are available between recurrence, repetition,
        identity, periodicity, reversibility, determinism, ergodicity, entropy,
        and structural persistence.
    - operator: ∇
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        Weak structural directedness is supplied by repeated transformation or
        iteration from state to state, without psychological impulse.
    - operator: □
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The recurrence claim depends on a finite or finite-measure, bounded,
        measure-preserving formal frame and specified return criterion.
    - operator: Λ
      dependency_check: "depends_on_□"
      satisfied_by: >
        Practical non-return, delay, missing recurrence within finite horizons,
        and almost-everywhere exceptions are structurally meaningful within the
        frame.
    - operator: Α
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Repeated iteration under the constrained frame supplies
        recurrence-patterning or near-return; PMS Α is used as
        recurrence-pattern, not dissipative attraction.
    - operator: Ω
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Only weak structural asymmetry is present: formal guarantee versus
        practical observability, measure-one recurrence versus null exceptions,
        and near-return versus strict identity.
    - operator: Θ
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Temporal iteration, trajectory, return, recurrence time, delay, and
        non-periodicity make Θ central, though its PMS dependency on Ω is only
        weakly satisfied.
    - operator: Φ
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        The case requires recontextualizing intuitive return into formal
        near-return or almost-everywhere recurrence while preserving rival
        frames.
    - operator: Χ
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Reflective distance is satisfied by refusing to collapse recurrence into
        identity, periodicity, reversibility, entropy cancellation, or PMS
        validation.
    - operator: Σ
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Integration is satisfied only as reversible coordination of
        distinctions, not as proof of explanatory sufficiency.
    - operator: Ψ
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Ψ is not satisfied case-internally; it is relevant only as application
        discipline and analytic self-binding.
  dependency_failure_conditions:
    - >
      If a later operator is used while its dependencies are absent, mark the
      reading as under-specified or invalid.
    - >
      If the chain is used as a smooth totalization without discrimination
      tests, mark coherence risk as high.
    - >
      If an operator is not active, state so rather than forcing the full chain.

