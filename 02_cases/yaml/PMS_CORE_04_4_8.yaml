derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - Awareness_A
    - Coherence_C
    - Responsibility_R
    - Action_E
    - Dignity_in_Practice_D
    - SELF_FIXPOINT
    - AD_A_much_greater_E
    - AD_under_integration
  usage_rule: >
    Each derived structure must be marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration
    does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not
    independent axioms, diagnoses, ontological rankings, metaphysical entities,
    or proof of PMS completeness.
  case_status: >
    Awareness_A is analytic_constraint; Coherence_C is active within the formal
    recurrence frame; Responsibility_R is not_applicable case-internally;
    Action_E is under_specified because no concrete praxis action is present;
    Dignity_in_Practice_D is an application_constraint; SELF_FIXPOINT is
    not_applicable; AD_A>>E and AD_Sigma_low are possible_but_not_entailed as
    analysis risks only.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - Θ
      - □
      - Δ
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically. Within PMS it
      can be systematically derived from this operator sequence, but this does
      not imply that all notions of awareness are exhausted by it.
    case_reading: >
      Sustained framed differentiation appears in the analyst-level distinction
      of recurrence from identity, periodicity, reversibility, invariance,
      determinism, entropy reversal, and practical observability across temporal
      iteration.
    status: "analytic_constraint"
    calibration_points:
      - >
        The differentiated field is the formal recurrence domain; the frame is
        finite or finite-measure measure-preserving dynamics; the temporal
        structure is repeated iteration and return or near-return.
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - Θ
      - Λ
      - □
      - ∇
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability of action, including meaningful
      absences and delays, without yet requiring full integration or
      self-binding. Rival theories may formalize coherence differently.
    case_reading: >
      Coherence appears as temporally stabilized structuring of iterative
      directedness, formal frame, expected return, and meaningful non-return
      within practical time horizons. This does not prove mathematical truth or
      explanatory sufficiency.
    status: "active"
    calibration_points:
      - >
        Coherence must be distinguished from theorem validity, empirical
        confirmation, metaphysical truth, forced integration, and narrative
        smoothing.
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - Ψ
      - Φ
      - Θ
      - Ω
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic in this specification.
      It is formally derived within PMS, not asserted as the only valid theory
      of responsibility.
    case_reading: >
      Responsibility_R is not applicable to the recurrence structure because no
      agent, obligation, vulnerability, or self-bound responsibility is present.
      It applies only to the analyst as restraint in using PMS.
    status: "not_applicable"
    calibration_points:
      - >
        Do not claim Responsibility_R unless Ω, Θ, Φ, and Ψ are all
        case-internal; here Ω is weak and Ψ is analytic-only.
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - Σ
      - Θ
      - ∇
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into a coherent enactment."
    notes: >
      Action here is not any behavior; it is integrated and temporally extended.
      Higher operators such as Ω, Φ, and Ψ may enrich it, but are not required
      for its minimal structural definition within PMS.
    case_reading: >
      Action_E is under-specified because mathematical transformation is not
      praxis action. Iteration supplies structural directedness across time, but
      no integrated enactment by an agent is given.
    status: "under_specified"
    calibration_points:
      - >
        Distinguish mathematical evolution or transformation from action as
        integrated realization of directedness across time.
    non_capture_note: "Without a concrete scene, Action_E may remain under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - Ψ
      - Χ
      - Ω
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how
      asymmetry is handled, not the ranking of persons or ontological worth.
    case_reading: >
      Dignity-in-Practice constrains the analysis rather than the recurrence
      structure: no person-ranking, diagnosis, shaming, tribunal use, or
      ontological evaluation is made.
    status: "application_constraint"
    calibration_points:
      - >
        Any weak Ω claim must be handled without moralization, person-ranking,
        irreversible labels, or collapse into responsibility attribution.
    non_capture_note: >
      D is a praxeological application constraint, not an ontological or moral
      superiority claim.

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "not_applicable"
  formula_sequence:
    - Ψ
    - Σ
    - Χ
    - Φ
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of
    praxis being bound into a relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not the primary structure of the case and is not applicable
    to recurrence itself. The case concerns abstract constrained dynamics, not
    selfhood, subjectivity, identity commitment, or self-relation.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence records one derivational strategy within PMS. It should not
    be read as proving that all forms of selfhood reduce without remainder to
    this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or
    institutions as literal subjectivity unless explicitly scoped as structural
    self-binding or analytic self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived
    distortion forms. They are not automatically entailed by a case and must not
    be treated as diagnoses, person-types, or moral verdicts.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - Φ
        - Α
        - Ω
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces drift toward evaluation
        rather than supporting integrative transformation and balanced
        enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: >
      AD_A>>E is not present as a case-internal pattern because there is no
      actor, awareness-axis enactment, or concrete praxis scene. It remains only
      an analysis-risk if conceptual distinctions over-expand while operational
      criteria for recurrence remain under-specified.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - Φ
        - Σ
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis, especially where
        unstable recontextualization and weak integration unfold under
        asymmetrically loaded praxis conditions.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >
      AD_Sigma_low is not present as a case-internal drift pattern. It remains
      only an interpretation-risk if recurrence is alternately reframed as
      identity, periodicity, reversibility, entropy reversal, or metaphysical
      return without integration that preserves distinctions.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "not_applicable"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, or person-type.

example_operator_chains_application:
  note: >
    The chains below apply PMS.yaml example operator chains to the case. They
    are not the only possible formal pathways and do not settle the case by
    themselves.
  minimal_praxis:
    formula:
      - □
      - ∇
      - Δ
    description: "A frame constrains an impulse that arises from a difference."
    case_reading: >
      Minimal praxis applies only weakly by analogy: a formal frame constrains
      iterative directedness arising from distinctions among possible states,
      returns, and non-returns.
    status: "weak"
  pattern_formation:
    formula:
      - Α
      - Λ
      - □
      - ∇
      - Δ
    description: "Attractor formation via repeated framed impulses and non-events."
    case_reading: >
      Pattern formation is active as recurrence or near-return under repeated
      framed iteration, while PMS Α must not be confused with a dissipative
      mathematical attractor.
    status: "active"
  asymmetry_emergence:
    formula:
      - Ω
      - Α
      - Λ
      - □
      - ∇
      - Δ
    description: "Asymmetrical roles emerging from stabilized patterns."
    case_reading: >
      Asymmetry emergence is weak and formal only: recurrence claims can exceed
      practical observability, and almost-everywhere recurrence leaves
      exceptional sets.
    status: "weak"
  developmental_trajectory:
    formula:
      - Θ
      - Ω
      - Α
      - Λ
      - □
      - ∇
      - Δ
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory is weak: there is temporal iteration and
