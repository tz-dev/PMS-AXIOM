analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary: []
    not_claimed:
      - metaphysical_proof
      - phenomenological_account
      - clinical_assessment
      - legal_or_forensic_judgment
      - person_ranking
      - pms_base_validation
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This case type permits structural PMS projection and calibration analysis.
      It does not permit empirical finding, concrete scene judgment, diagnosis,
      legal/forensic conclusion, implementation claim, metaphysical proof, or
      PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The PMS reading fits too smoothly because recurrence language strongly
      activates Δ, □, Λ, Α, and Θ. This creates risk of under-discriminating
      recurrence from identity, periodicity, reversibility, entropy reversal,
      ergodicity, and metaphysical return.
    mitigation: >
      High Χ, explicit rival readings, non-capture zones, formal falsifiers,
      and discrimination tests prevent PMS coherence from becoming proof of
      capture or superiority.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers framed distinction, delayed or practically absent return,
      recurrence-patterning, temporal iteration, and disciplined
      recontextualization well.
    discrimination_requirement: >
      The reading must distinguish recurrence from repetition, invariance,
      periodicity, reversibility, determinism, ergodicity, entropy reversal,
      causality, identity-preservation, and structural persistence.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish recurrence from periodicity and strict identity."
      expected_pms_distinction: >
        Use Δ to separate near-return or almost-everywhere return from exact
        repetition; use Λ to preserve delayed or practically absent return; use
        Χ to prevent identity collapse.
      current_status: "satisfied"
    - id: "DT2"
      test: "Distinguish recurrence from reversibility, entropy reversal, and ergodicity."
      expected_pms_distinction: >
        Use □ to restrict formal assumptions, Φ to mark frame shifts, and Σ to
        integrate without claiming that recurrence entails reversibility,
        entropy cancellation, or ergodicity.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: Δ
      question: >
        Difference is calibrated by explicit separation among recurrence,
        near-return, strict identity, repetition, invariance, periodicity,
        reversibility, determinism, ergodicity, causality, entropy,
        statistical irreversibility, and structural persistence. Δ carries
        major discriminative weight because most overextensions of the case
        arise from collapsing one of these distinctions.
      current_calibration: "satisfied"
    - operator: ∇
      question: >
        Impulse is calibrated only as weak iterative directedness of
        transformation, not subjective drive, will, agency, desire, or
        motivation. In this case ∇ marks that a transformation or flow carries
        the structure from one state, region, or neighborhood toward later
        iterates; it does not introduce praxis in the full human-action sense.
      current_calibration: "weak"
    - operator: □
      question: >
        Frame is calibrated by finite or finite-measure bounded space,
        measure-preserving transformation, and specified return criterion.
        Without this frame the recurrence reading becomes too broad: unbounded
        spaces, dissipative transformations, undefined measures, or unspecified
        tolerance conditions would alter or invalidate the recurrence claim.
      current_calibration: "satisfied"
    - operator: Λ
      question: >
        Non-Event is calibrated by practical non-return, delayed return,
        near-return, absence within finite observational horizons, and
        exceptional-set handling within the formal frame. Λ must not be read as
        failure by default: a recurrence claim may allow structurally guaranteed
        return while supplying no practically usable recurrence time.
      current_calibration: "satisfied"
    - operator: Α
      question: >
        Attractor is calibrated as PMS recurrence-patterning or stabilization
        through repeated structural interaction. It is explicitly distinguished
        from a dissipative mathematical attractor, because Poincaré recurrence
        is framed through constrained, measure-preserving dynamics rather than
        through convergence toward a sink or teleological endpoint.
      current_calibration: "satisfied"
    - operator: Ω
      question: >
        Asymmetry is calibrated only as weak formal/practical imbalance, not
        moral, interpersonal, diagnostic, legal, clinical, or responsibility
        asymmetry. Relevant weak asymmetries include formal guarantee versus
        practical observability, almost-everywhere recurrence versus exceptional
        null sets, and near-return versus strict identity.
      current_calibration: "weak"
    - operator: Θ
      question: >
        Temporality is calibrated by repeated iteration, trajectory,
        recurrence time, delay, return, near-return, and non-periodic
        recurrence. Θ carries major analytic weight, but its PMS dependency on
        Ω remains a calibration risk because the mathematical case strongly
        supports temporal structure while only weakly supporting asymmetry.
      current_calibration: "satisfied"
    - operator: Φ
      question: >
        Recontextualization is calibrated by explicit source and target frames
        for the meaning of return. Source frames include intuitive repetition,
        periodicity, strict identity, reversibility, and metaphysical return;
        target frames include formal recurrence, near-return,
        almost-everywhere return, neighborhood-return, and measure-preserving
        iteration. Φ remains only partial if rival frames are merely absorbed
        rather than preserved.
      current_calibration: "partial"
    - operator: Χ
      question: >
        Distance is calibrated by restraint against identity, metaphysical,
        empirical, diagnostic, legal, implementation, or PMS-validation
        overclaims. Χ is not decorative here; it is required to prevent the
        smooth PMS fit from becoming under-discriminating, totalizing, or
        falsely sufficient.
      current_calibration: "satisfied"
    - operator: Σ
      question: >
        Integration is calibrated by coordination without forced coherence or
        erasure of rival formalisms. Σ may integrate recurrence, boundedness,
        near-return, temporal iteration, entropy questions, and practical
        non-observability only if it preserves their differences. PMS coherence
        alone is insufficient.
      current_calibration: "partial"
    - operator: Ψ
      question: >
        Self-Binding is calibrated as analytic application discipline only, not
        case-internal selfhood, agency, identity-preservation, consciousness,
        or responsibility. Ψ binds the analysis to reversibility, non-capture,
        Distance, and Dignity-in-Practice; it is not attributed to the
        recurrence structure itself.
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Full mathematical proof of Poincaré recurrence, including exact measure-theoretic or topological conditions."
      - "Physical thermodynamic interpretation, entropy debates, and recurrence times for real systems."
      - "Computational simulation and finite-precision recurrence detection."
      - "Metaphysical eternal return, identity-preservation, or subjective recognition of return."
      - "Comparative superiority of PMS over rival mathematical formalisms."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Measure-theoretic recurrence in finite measure spaces under measure-preserving transformations."
      - "Topological recurrence as return to neighborhoods under iterated maps or flows."
      - "Finite-state deterministic cycle formalization."
      - "Hamiltonian or Liouville conservation framing."
      - "Thermodynamic-statistical reading that preserves statistical irreversibility."
      - "Ergodic-theoretic reading distinguishing recurrence from ergodicity."
      - "Metaphysical eternal-return reading, not warranted by this case material unless separately argued."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading is weakened or invalidated if finite or finite-measure
        boundedness, measure preservation, a transformation rule, or a return
        criterion is absent while recurrence is still asserted.
    - id: "F2"
      condition: >
        PMS is under-discriminating if it cannot distinguish recurrence from
        strict identity, periodicity, reversibility, determinism, ergodicity,
        entropy reversal, or invariance.
    - id: "F3"
      condition: >
        The reading loses non-capture if rival mathematical or physical
        formalisms are absorbed as mere PMS recontextualization, drift, or
        incomplete integration.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The application is valid as a reversible, bounded PMS conceptual
      projection with high coherence risk. It is usable only if weak Ω, weak ∇,
      non-case-internal Ψ, rival formalisms, falsifiers, and non-capture zones
      remain explicit.

