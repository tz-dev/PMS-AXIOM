case_synthesis:
  primary_pms_reading: >
    Poincaré recurrence can be read in PMS as framed temporal
    recurrence-patterning under constrained dynamics, with meaningful practical
    non-return and disciplined distance from identity, periodicity,
    reversibility, and metaphysical overclaim. The strongest PMS fit lies in
    Δ, □, Λ, Α, Θ, Χ, and bounded Φ/Σ: the case requires sharp distinctions,
    formal framing, structured absence or delay of observable return,
    recurrence-patterning, temporal iteration, reflective restraint, and
    reversible integration.
  continuity_condition: >
    Continuity is relevant only as structural iteration under a specified
    transformation and frame. It does not imply strict identity-preservation,
    self-continuity, subjective recognition, autobiographical persistence, or
    metaphysical sameness. Continuity here is trajectory-continuity or
    frame-bound recurrence-continuity, not personal or ontological continuity.
  change_condition: >
    Change or recontextualization is relevant when intuitive return is reframed
    as near-return, almost-everywhere return, neighborhood-return, or
    frame-specific recurrence. This change in framing must preserve the
    difference between formal recurrence and practical return, and between
    recurrence and periodicity.
  rupture_or_non_fit_condition: >
    Absence of practical recurrence, disagreement among formalisms, failure of
    strict identity, or non-fit with PMS must remain possible non-capture, not
    automatically drift, failed integration, incomplete calibration,
    immaturity, or structured absence. Λ may mark meaningful non-event only
    when a frame-specific expectation has actually been established.
  responsibility_condition: >
    Responsibility_R is not applicable case-internally because the recurrence
    structure supplies no agent, obligation, vulnerability relation, or
    self-binding subject. Responsibility appears only as analytic restraint in
    the PMS application: the analysis must avoid overclaiming, tribunal use,
    person-ranking, and false PMS Base validation.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by preventing person-ranking,
    diagnosis, moral tribunal use, humiliation, shaming, or ontological
    evaluation. In this case D is not a property of recurrence and not a
    metaphysical dignity claim; it is the praxeological discipline governing how
    the PMS reading is applied.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparison criteria are
    specified and applied outside this PMS projection. Measure-theoretic,
    topological, finite-state, Hamiltonian, thermodynamic-statistical,
    ergodic-theoretic, computational, and metaphysical readings are not
    defeated by PMS translation alone.

