          case_application: >
            Ω is named as uneven distribution, Λ as possible structured
            absence, and □ as parity or institutional frame. None is converted
            into guilt, motive, ideology, moral defect, or legal fault.
        switch_naming_not_person_verdict:
          statement: >
            Asymmetry activation, parity-to-exit, and
            responsibility-to-authority are scene-bound drift handles, not
            diagnoses, motives, or person defects.
          case_application: >
            Switch naming remains risk-only. AS and PTE are possible structural
