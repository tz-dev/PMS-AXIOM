pms_eden_overlay_application:
  schema_version: "PMS-EDEN_1.2"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-EDEN.yaml"
  paper_source_file: "PMS-EDEN - Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–EDEN Application Profile"
    model_short: "PMS-EDEN"
    status: "draft"
    repository_role: "paper_specific_application_profile"
    last_updated: "2026-05-24"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    repo:
      name: "PMS-EDEN"
      url: "https://github.com/tz-dev/PMS-EDEN"
    source_paper:
      title: "PMS–EDEN — Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss"
      version: "PMS-EDEN_1.2"
      status: "final_updated_reference"
      paper_role: "authoritative_overlay_source"
    description: >
      PMS-EDEN is a paper-specific application profile for PMS_1.3. It
      operationalizes the EDEN lens as a machine-first overlay: reduced
      signatures, paper constructs, drift traces, pattern handles, EDEN-MAP
      mapping discipline, boundary conditions, alternative explanations, and
      example-suite scaffolding. It remains strictly subordinate to PMS.yaml.
    methodological_restraint: >
      PMS-EDEN does not claim to exhaust all accounts of Eden, comparison,
      reciprocity, asymmetry, sexed difference, recognition, or relational
      breakdown. It offers a structural drift grammar within PMS and remains
      open to rival framings, partial applicability, and genuine non-capture.

  abbrev_legend:
    A: "Awareness"
    C: "Coherence"
    R: "Responsibility"
    E: "Action / Enactment"
    D: "Dignity-in-practice"
    PS: "Pseudo-Symmetry (paper-internal construct)"
    PFO: "Postfeminist Override / Over-steering (paper-internal regime label; non-operator)"
    NRK: "Negative Responsibility Kernel (paper-internal construct)"
    AS: "Asymmetry Switch / Exception Switch (paper-internal label; non-operator)"
    PES: "Permanentized Exception Switch (paper-internal regime-drift label; non-operator)"
    PTE: "Parity-to-exit (paper-internal drift profile; non-operator)"
    RTA: "Responsibility-to-authority (paper-internal drift profile; non-operator)"
    EDEN_MAP: "EDEN-MAP mapping protocol (paper schema)"

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Pseudo-Symmetry"
    rule: >
      This EDEN block is appended to or integrated with an already completed PMS
      Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS
      operators, alter PMS dependencies, change derived structures, or treat
      EDEN constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The EDEN overlay adds visibility for EDEN-specific pseudo-symmetry
      structure, comparison-dominant framing risk, asymmetry-switch
      availability, reciprocity loss risk, and cost-externalization questions.
      It does not modify the completed PMS Core case, which remains a bounded,
      non-concrete, conceptual PMS projection rather than an empirical scene
      analysis or PMS Base validation.

  overlays: {}

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >
      PMS-EDEN introduces no amplification overlays beyond paper-internal
      descriptors, reduced signatures, drift corridors, regime descriptions,
      cost markers, viability boundaries, EDEN-MAP, alternative-explanation
      discipline, and example-suite schemas. These organize existing PMS
      operators and never become PMS operators, axes, or dependencies. In this
      case, terms such as PS, AS, PES, PTE, RTA, NRK, PFO, devaluation, and
      humiliation remain EDEN overlay handles only and are not added to PMS
      Core.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    note: >
      This gate constrains PMS application only. PMS itself, PMS-EDEN, or the
      case may be criticized, rejected, revised, or ignored without satisfying
      this gate.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          Maintained reflective distance; no fusion into verdict, urgency,
          enforcement, person-level attribution, diagnosis, humiliation, or
          irreversible labeling.
      reversibility:
        id: "reversibility"
        status: "maintained"
        meaning: >
          Scene-bound, revisable, non-final readings; no global person labels,
          no group labels, no irreversible drift classification.
      Dignity_in_Practice_D:
        id: "D"
        name: "Dignity-in-practice"
        status: "maintained"
        meaning: >
          No shaming, ranking, humiliation, or ontological person evaluation.
          Critique applies only to enacted structures, role-position
          configurations, cost handling, and scene-bound drift profiles.
    gate_result: "valid_as_eden_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any use of Χ in reduced signatures is shorthand only. In PMS, Χ
      presupposes Φ, Θ, and □. Reduced signatures do not negate prerequisites,
      replace generativity with explanation, or alter the default dependency
      path recorded in PMS_1.3. In this overlay, EDEN reduced signatures are
      used only as case-specific visibility aids for the completed Core reading
      of Pseudo-Symmetry.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  references:
    pms_github: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
    pms_yaml_raw: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    pms_eden_repo: "https://github.com/tz-dev/PMS-EDEN"

  eden_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-theological, non-clinical, non-diagnostic."
      - "No person-level judgment, no group label, no ideology claim, no ranking, no sanction logic."
      - "No psychology or inner-state explanation."
      - "No moral verdict logic."
      - "No automatic prescriptive authority."
      - "No person-level interpretation of switch-drift handles."
      - "Switch labels are scene-bound structural profiles, not traits, motives, or person defects."
      - "Description and application remain firewalled by Χ + reversibility + D."
    may_add_visibility_to:
      - "Eden as ground-state praxis configuration"
      - "Threshold explicitness / option visibility"
      - "Breach as chain interruption rather than knowledge gain"
      - "Fig leaves as legibility management"
      - "Negative Responsibility Kernel"
      - "False comparison pivot"
      - "Dissatisfaction as system cost"
      - "Pseudo-Symmetry regime"
      - "Asymmetry-switch availability"
      - "Permanentized exception switch"
      - "Parity-to-exit drift"
      - "Responsibility-to-authority drift"
      - "PFO as paper-internal regime label"
      - "Reciprocity as coordinated asymmetry"
      - "Reciprocity loss"
      - "Devaluation and humiliation as structural stabilization modes"
      - "Pattern-library recognition handles"
      - "EDEN-MAP scene-bound mapping"
      - "Boundary conditions and alternative explanations"
    must_not_do:
      - "read Eden as theological doctrine or moral anthropology"
      - "treat paper-internal labels as PMS operators"
      - "treat switch-drift handles as person labels"
      - "treat PFO as group label or ideology claim"
      - "treat humiliation or devaluation as moral accusation"
      - "treat NRK as PMS Action_E"
      - "treat comparison drift as diagnosis"
      - "convert additional responsibility into authority"
      - "convert parity into exit from unequal cost-bearing"
      - "use EDEN-MAP as coercive mapping against persons"
      - "claim PMS Base validation"

  paper_frontmatter_min:
    key_claims:
      - "Eden as a praxeological ground state within PMS: A-availability without deficit pressure in a structurally specified praxis scene."
      - "Breach/Fall as operator-chain interruption, not knowledge gain; consequence-field legibility under Ω/Θ/Λ without epistemic surplus."
      - "Drift pipeline: praxis → comparison-dominant □ → PS → asymmetry-switch availability → PFO/permanentized exception → parity-to-exit / responsibility-to-authority drift → devaluation/humiliation scripts → reciprocity loss."
    pms_conformance:
      - "Uses only PMS_1.3 operators Δ–Ψ."
      - "No redefinitions and no new axioms."
      - "Separates description from application."
      - "Validity gate applies to application only."
    acred_reference:
      A:
        formula:
          - "Θ"
          - "□"
          - "Δ"
        label: "Awareness"
      C:
        formula:
          - "Θ"
          - "Λ"
          - "□"
          - "∇"
        label: "Coherence"
      R:
        formula:
          - "Ψ"
          - "Φ"
          - "Θ"
          - "Ω"
        label: "Responsibility"
      E:
        formula:
          - "Σ"
          - "Θ"
          - "∇"
        label: "Action / Enactment"
      D:
        formula_note: "D = (Ψ ∘ Χ) applied to Ω-handling"
        label: "Dignity-in-practice"
        discipline: "non-metaphysical; non-ranking"
    paper_terms_min:
      pseudo_symmetry_PS:
        status: "active"
        definition: >
          Comparison-dominant □ asserts rhetorical parity while Ω remains
          operative in consequences and may produce asymmetry-switch
          availability. This is a paper-internal structural substitution, not a
          moral claim.
        case_application: >
          PS is active as an EDEN overlay reading because the case material
          directly concerns verbally asserted parity while outcomes, exposure,
          responsibilities, or obligations remain unevenly distributed. This is
          the strongest EDEN fit in the case. Its strength lies at the level of
          conceptual signature: parity-surface and uneven consequence-structure
          are present in the case description itself. Its weakness lies at the
          regime level: the material does not show comparison governance,
          punished Ω-speech, chronic Λ, repeatable Α, blocked Σ, displaced Ψ,
          or concrete switch activation. PS is therefore active, but bounded to
          structural pre-analysis and not elevated into empirical or tribunal
          judgment.
      asymmetry_switch:
        status: "risk"
        definition: >
          Paper-internal label for parity-to-asymmetry activation under real or
          invoked Ω/Θ pressure; valid only where marked, bounded, and re-bound
          into Σ/Ψ.
        case_application: >
          Asymmetry-switch availability is a risk rather than an active finding.
          The Core case names uneven distribution under parity surface, which
          could permit selective activation of asymmetry when obligation,
          exposure, or consequence pressure appears. The material does not show
          whether such activation actually occurs, whether it is claimed by any
          role-position, whether it is marked as exceptional, whether it is
          bounded by Χ, or whether it is re-bound into Σ/Ψ. For that reason AS
          remains an overlay risk handle only and must not be converted into a
          person label, motive attribution, or group diagnosis.
      permanentized_exception_switch:
        status: "risk"
        definition: >
          PFO drift form in which asymmetry activation ceases to be
          emergency-bound and becomes a standing lever under preserved parity
          surface.
        case_application: >
          Permanentized exception-switch structure is only a downstream risk.
          The case does not show a standing lever, repeatable exception
          protocol, permanentized regime, or routine activation under preserved
          parity surface. It only supplies the abstract ingredients from which
          such a drift could develop if parity-language repeatedly preserved
          surface symmetry while uneven cost activation remained available,
          unmarked, and not re-bound into Σ/Ψ.
      parity_to_exit:
        status: "risk"
        definition: >
          Drift pattern in which parity rhetoric is used to deny additional
          responsibility under unequal Ω/Θ consequences.
        case_application: >
          Parity-to-exit is a risk because the case explicitly links parity
          assertions with uneven responsibilities or obligations. It would
          become active only if equality-language were shown to block
          re-internalization of unequal costs, exposure, obligations, or
          responsibilities across Θ. The current material does not show that
          equality language is actually being used to exit from responsibility;
          therefore PTE remains a calibration question and not a finding.
      responsibility_to_authority:
        status: "not_applicable"
        definition: >
          Drift pattern in which required Ψ/Χ self-binding under asymmetry is
          converted into control, protection entitlement, or frame authority.
        case_application: >
          Responsibility-to-authority is not applicable on the provided case
          material. The case names uneven obligations and responsibilities but
          does not show conversion of responsibility into control, frame
          ownership, protection-by-command, entitlement to govern the frame, or
          authority over another role-position. This distinction matters because
          EDEN must not infer authority-drift merely from the presence of
          asymmetrical responsibility.
      PFO:
        status: "weak"
        definition: >
          Paper-internal regime label for □ governance attempting to manage or
          suppress Ω legibility while permanentizing asymmetry-switch
          availability. It is structural, not a group label and not an ideology
          claim.
        case_application: >
          PFO is weak and too strong as a primary case label. The case supports
          a local PS reading and possible switch-availability risk, but it does
          not establish Ω-taboo, comparison governance, permanentized
          exception-switch availability, suppressed Σ, displaced Ψ, protocolized
          Α across Θ, or residual stabilization through devaluation or
          humiliation. PFO remains useful only as a guarded downstream
          comparison point: it shows what would have to be added before the
          case could be read as a regime-drift profile rather than a bounded
          pseudo-symmetry signature.
      reciprocity_loss:
        status: "risk"
        definition: >
          Erosion or failure of Σ/Ψ-supported coordination under real Ω across
          Θ, including switch-drift forms where parity becomes exit, asymmetry
          becomes leverage, or responsibility becomes authority.
        case_application: >
          Reciprocity loss is a risk because pseudo-symmetry can substitute
          parity surface for coordinated asymmetry. It is not an active finding
          because the case does not provide concrete evidence of Σ/Ψ erosion,
          chronic Λ, stabilized Α, Θ accumulation, or enacted cost
          externalization. EDEN therefore marks a viability concern: if
          asymmetry is real but cannot be named, coordinated, and self-bound,
          reciprocity may erode; the present case has not yet shown that this
          erosion has occurred.

    case_application: >
      EDEN is relevant primarily through its pseudo-symmetry, false-comparison,
      switch-availability, parity-to-exit risk, and reciprocity-loss risk
      lenses. Eden ground-state, breach, NRK, dissatisfaction, PFO, devaluation,
      and humiliation remain weak, not applicable, or only analogical unless a
      concrete scene supplies actors, role-positions, temporal sequence,
      recurrence, non-events, binding patterns, and cost-bearing evidence.

  paper_internal_terms_index:
    note: >
      Paper-internal terms are stable handles only. They are not PMS operators,
      not diagnoses, not person labels, and not group labels.
    asymmetry_switch:
      handle: "AS"
      status: "risk"
      definition: >
        Shift from parity claim to asymmetry activation under real or invoked
        Ω/Θ pressure. Valid only where activation is marked, bounded, and
        re-bound into Σ/Ψ; drift where unmarked, repeatable, and
        responsibility-shifting.
      case_application: >
        AS is a risk because verbally asserted parity under uneven outcomes,
        exposure, responsibilities, or obligations can make asymmetry activation
        selectively available. The case does not show actual activation, and it
        does not show whether activation would be marked, bounded, and
        re-bound into Σ/Ψ.
    permanentized_exception_switch:
      handle: "PES"
      status: "risk"
      definition: >
        PFO drift form in which asymmetry activation ceases to be
        emergency-bound and becomes a standing lever under preserved parity
        surface.
      case_application: >
        PES is a risk only at the conceptual level. If parity-language becomes
        a stable surface while asymmetry activation repeatedly remains
        available as an exception, PES could become relevant. The current case
        material does not establish standing regime status.
    parity_to_exit:
      handle: "PTE"
      status: "risk"
      definition: >
        Drift pattern in which parity rhetoric is used to deny additional
        responsibility under unequal Ω/Θ consequences.
      case_application: >
        PTE is a risk because parity-language may function as an exit from
        unequal cost-bearing. The case does not establish that such exit is
        actually occurring, and it must remain distinguishable from formal
        equality, aspirational parity, or justified role differentiation.
    responsibility_to_authority:
      handle: "RTA"
      status: "not_applicable"
      definition: >
        Drift pattern in which required Ψ/Χ self-binding under asymmetry is
        converted into control, frame authority, protection entitlement, or
        governance over another role-position.
      case_application: >
        RTA is not applicable on the supplied material. No conversion of
        responsibility into authority, command, frame ownership, or protective
        entitlement is shown.

  paper_constructs:
    note: >
      The following are EDEN paper constructs. They are non-operators and
      must remain scene-bound, structural, non-diagnostic, and non-personal.
    EDEN_ground_state:
      name: "Eden ground state"
      is_operator: false
      type: "scene_configuration"
      applicability: "not_applicable"
      basis_operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "A"
      definition: >
        Eden is reconstructed as a structurally specified praxis scene without
        deficit pressure: Δ is present, □ is stable, Θ is continuity rather than
        punitive accumulation, A = [Θ, □, Δ] is available, ∇ exists without
        deficit-compulsion dominance, Ω is latent or non-escalated, and Λ is not
        the central engine.
      case_application: >
        An EDEN-like ground state is not applicable as an active case reading.
        The case begins not from stable praxis without deficit pressure but
        from the conceptual problem of asserted parity under uneven
        distribution. At most, EDEN ground state functions as a contrast class:
        coordinated asymmetry without comparison-dominant pseudo-symmetry would
        be a non-drift alternative.
    THRESHOLD_apple:
      name: "Threshold marker / option explicitness"
      is_operator: false
      type: "threshold_marker"
      applicability: "not_applicable"
      basis_operators:
        - "Δ"
        - "□"
        - "Θ"
      basis_axes:
        - "A"
      definition: >
        The threshold marks option visibility: a negative praxis option becomes
        explicitly selectable within □ across Θ under available A. It adds no
        new Δ, A, or Χ and is not treated as knowledge or insight.
      case_application: >
        Threshold explicitness is not applicable as an active case construct.
        The case does not describe a selectable breach option, a marked
        threshold, or a before/after moment in which a negative praxis option
        becomes explicitly available. It only describes a structural pattern of
        parity assertion and uneven distribution.
    BREACH_chain_interruption:
      name: "Praxis breach as chain interruption"
      is_operator: false
      type: "chain_interrupt"
      applicability: "not_applicable"
      basis_operators:
        - "Δ"
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
      definition: >
        Breach is reconstructed as realization under ∇ within □ with available
        A, where Σ does not carry integration and Ψ does not carry durable
        binding. It produces consequence-field legibility under Ω/Θ/Λ and does
        not produce epistemic surplus.
      case_application: >
        Breach-like chain interruption is not applicable as an active reading.
        The case does not provide a breach event, realization under ∇, or
        consequence-field sequence. Because Action_E in PMS requires
        E = [Σ, Θ, ∇], the overlay must not treat the conceptual assertion of
        parity as Action_E or as NRK-like realization.
    FIG_LEAVES_legibility_management:
      name: "Fig leaves as legibility management"
      is_operator: false
      type: "cost_management_response"
      applicability: "weak"
      basis_operators:
        - "Λ"
        - "Ω"
        - "Χ"
        - "□"
        - "Θ"
      definition: >
        Fig leaves mark post-breach legibility management: □ shifts toward
        exposure/vulnerability framing, Χ appears as shielding distance rather
        than Σ-enabled reflection, Λ persists as remainder, Ω becomes
        instrumentally legible, and Α may seed concealment scripts.
      case_application: >
        Fig-leaf-like legibility management is weakly relevant only as an
        analogy. Verbal parity may manage the legibility of uneven exposure or
        obligation by making asymmetry appear less visible. The case does not
        show concealment scripts, shielding distance, shame, exposure handling,
        or post-breach management, so the construct must remain weak.
    NRK:
      name: "Negative Responsibility Kernel"
      is_operator: false
      type: "composite_kernel"
      applicability: "not_applicable"
      basis_operators:
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "R"
        - "E"
      compact_form: >
        NRK = A available + real option-set in □ + Ω effective + Θ
        trajectory-bearing + realization under ∇ within □ with Σ not carrying
        and Ψ absent, aborted, externalized, displaced, or simulated.
      discipline_E_separation: >
        Do not label NRK as E. E remains reserved for integrated action:
        E = [Σ, Θ, ∇].
      case_application: >
        NRK is not applicable as an active construct because the case does not
        describe realization under ∇, a real option-set, or a chain in which Σ
        fails to carry an enacted realization while Ψ is absent, displaced, or
        simulated. The Core case already marked Action_E as under-specified,
        and the EDEN overlay preserves the distinction between realization and
        Action_E.
    FALSE_COMPARISON:
      name: "False comparison pivot"
      is_operator: false
      type: "frame_mutation"
      applicability: "weak"
      basis_operators:
        - "□"
        - "Ω"
        - "Δ"
        - "Λ"
        - "Α"
        - "Θ"
      definition: >
        False comparison is a post-NRK frame inversion in which □ shifts from
        praxis-relation to value-relation. Δ becomes comparative tokenization,
        Ω is read as verdict or grievance surface, and comparison replaces
        coordination where Σ/Ψ cannot carry reciprocity.
      case_application: >
        FALSE_COMPARISON is weakly relevant because pseudo-symmetry can convert
        a praxis question about coordinated asymmetry into a comparison question
        about whether both sides are formally the same. The case does not show
        ranking language, value-relation dominance, grievance conversion, or
        post-NRK frame inversion, so the construct remains weak rather than
        active.
    DISSATISFACTION_system_cost:
      name: "Dissatisfaction as system cost marker"
      is_operator: false
      type: "cost_marker"
      applicability: "not_applicable"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Α"
        - "Λ"
      definition: >
        Dissatisfaction is modeled as system cost of maintaining false
        equivalence inside □ under effective Ω and trajectory-bearing Θ. It is
        not treated as deficit or lack.
      case_application: >
        Dissatisfaction is not applicable as an active construct because the
        case material does not mention dissatisfaction, permanent comparison,
        continuous adjustment, complaint loops, or system cost experience.
        Such cost may become relevant in a concrete scene, but it cannot be
        inferred here.
    PS:
      name: "Pseudo-Symmetry regime"
      is_operator: false
      type: "drift_regime"
      applicability: "active"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
        - "Φ"
        - "Λ"
        - "Α"
      core_operator_signature: >
        PS = [□ comparison/value-relation + Ω real + Ω selectively activatable
        under parity surface + Σ low/blocked + Ψ misbound to
        appearance-management], typically with Φ, Λ, and Α as companions.
      buffer_note: >
        Pseudo-symmetry may function as bounded reversible buffer only insofar
        as it reopens Σ and Ψ under named Ω. As persistent substitution, it
        yields Σ/Ψ failure under Ω and prepares PFO.
      case_application: >
        PS is active as the direct EDEN construct most closely matching the
        case: parity is verbally asserted while consequences, exposure,
        responsibilities, or obligations remain uneven. However, only the
        conceptual PS reading is active. The stronger regime features of
        repeatable Α, chronic Θ, blocked Σ, misbound Ψ, and switch availability
        remain under-specified.
    ASYMMETRY_SWITCH:
      name: "Asymmetry switch / exception switch"
      is_operator: false
      type: "paper_internal_label"
      paper_internal_label: true
      non_person_label: true
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
        - "Χ"
      definition: >
        Shift from parity claim to asymmetry activation under real or invoked
        Ω/Θ pressure. It is valid where marked, bounded, and re-bound into
        Σ/Ψ; it becomes drift where unmarked, repeatable, and
        responsibility-shifting.
      case_application: >
        ASYMMETRY_SWITCH is a risk because a configuration that verbally
        asserts parity while retaining uneven distribution can create selective
        access to asymmetry activation. The case does not show an actual switch,
        so no person, role, or group may be labeled by it.
