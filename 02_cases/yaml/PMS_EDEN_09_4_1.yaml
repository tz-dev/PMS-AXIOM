        note: "Descriptive viability signature only; not a prescription."
        Chi_step: "restore or preserve reversible distance by naming the parity/asymmetry mismatch without converting it into accusation"
        Lambda_to_Sigma_step: "identify one concrete missing acknowledgment, reciprocity, redistribution, or interface move before claiming Λ or Σ failure"
