        - "inferred inner traits or clinical categories"
        - "coercive prescriptions justified by PMS vocabulary"
        - "Ψ→Other under suppressed Χ"
        - "converting responsibility into authority over another role-position"
      case_application: >
        The action firewall is preserved by keeping all EDEN results
        descriptive, conceptual, and reversible. The overlay does not move from
        PS recognition to prescription, diagnosis, sanction, blame, or
        enforcement. No switch-drift handle is treated as a person defect, and
