pms_axiom_eden_overlay_case:
  schema_version: "PMS-AXIOM_EDEN_OVERLAY_CASE_TEMPLATE_v0.2"
  case_schema_version: "PMS-EDEN_CASE_2.0"
  schema_role: "axiom_addon_overlay_case_template"
  overlay_model: "PMS-EDEN"
  overlay_schema_version: "PMS-EDEN_2.0"
  eden_case_template_source: "PMS-EDEN_CASE_2.0"
  base_model: "PMS"
  base_schema_version: "PMS_1.3"
  axiom_status: "addon_layer_only_over_completed_core_case"

  template_purpose: >
    Structure an AXIOM-compatible PMS-EDEN overlay for the already completed
    PMS-Core case "Pseudo-Symmetry." The overlay maps EDEN-relevant questions
    around real Ω, candidate false coordination, responsibility/action-power,
    Σ/Ψ status, cost distribution, non-action/non-binding, counter-scenes,
    falsifiers, and the description/application firewall without modifying the
    completed PMS-Core pass and without converting structural description into
    diagnosis, verdict, prescription, sex truth, person ranking, action
    authorization, or PMS-Base revision.

  source_alignment:
    pms_base:
      source_file: "PMS.yaml"
      schema_version: "PMS_1.3"
      role: "only PMS Base reference; base operator grammar and application guardrails"
    eden_profile:
      source_file: "PMS-EDEN.yaml"
      schema_version: "PMS-EDEN_2.0"
      role: "overlay/application profile only; current paper-repository EDEN application overlay"
    eden_repo_case_template:
      source_file: "PMS-EDEN_CASE_2.0"
      role: "field structure for scene-bound PMS-EDEN example cases"
    completed_core_case:
      title: "Pseudo-Symmetry"
      schema_role: "case_application"
      analysis_mode: "axiomatic"
      status: "already_completed_core_pass"
      handling: "anchor_only_not_rewrite"
    axiom_policy: >
      This output is not a standalone PMS-EDEN example-suite artefact. It is an
      add-on overlay over an existing PMS-Core case. PMS-Core remains the
      already completed base pass.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML"
    core_case_identifier: "PMS-CORE-PSEUDO-SYMMETRY"
    core_case_title: "Pseudo-Symmetry"
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
    rule: >
      The EDEN overlay is appended to or integrated after the already completed
      PMS-Core case. It may refer to Core operators, Core scene framing, and
      Core boundary discipline as anchors, but it must not modify the PMS-Core
      pass, redefine PMS operators, alter PMS dependencies, replace derived PMS
      axes, or treat PMS-EDEN constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory: Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS repository operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application gate: Χ, reversibility, Dignity-in-Practice"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
      - "Completed PMS-Core case content unless a separate PMS.yaml inconsistency has been explicitly identified"

  pms_v13_and_eden_conformity:
    status: "conformant_overlay_with_scene_application_suspended"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    overlay_only: true
    pms_R_axis_preserved: true
    pms_D_axis_preserved: true
    pms_E_strict_action_preserved: true
    eden_responsibility_principle_is_overlay_attribution_rule: true
    eden_constructs_are_not_pms_base: true
    adult_reciprocity_is_not_new_pms_axis: true
    reciprocity_loss_is_not_new_pms_axis: true
    correctability_is_not_new_pms_axis: true
    minimal_recovery_signature_is_not_new_pms_axis: true
    qc_ext_reduced_signatures_are_overlay_shorthand_only: true
    qc_ext_policy:
      status: "overlay_shorthand_only"
      may_do:
        - "compress already available PMS-EDEN scene-mapping relations"
        - "name candidate EDEN relevance after Core anchoring"
        - "support QC readability without replacing dependency reasoning"
      must_not_do:
        - "alter PMS operator order"
        - "alter PMS dependencies"
        - "replace PMS derived-axis formulas"
        - "prove an EDEN finding without a scene packet"
        - "function as an alternative derivation path"
    notes:
      - "Adult Reciprocity is a PMS-EDEN positive baseline / normative benchmark, not a PMS Base operator or axis."
      - "False-Coordinated Real Asymmetry is an EDEN mechanism, not a PMS operator."
      - "Action-Power is an EDEN scene-bound attribution handle, not a PMS operator."
      - "PFO, Eden scene, reciprocity loss, AEP, switch-family, and related labels are overlay constructs or profiles, not PMS Base."
      - "Reduced EDEN signatures organize existing PMS references only; they are not alternative dependency paths."
      - "EDEN may sharpen domain visibility but does not prove exhaustive capture."
      - "Description does not authorize binding use; application requires additional gating."

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Reduced EDEN signatures, formulas, or shortcuts do not alter PMS
      dependencies. In particular, Χ still presupposes Φ, Θ, and □ within PMS;
      EDEN uses PMS operators as references, not as redefined constructs.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >
      PMS-EDEN 2.0 constructs, EDEN-MAP fields, profiles, mechanisms,
      benchmarks, boundaries, falsifiers, and viability signatures organize
      existing PMS operators only. They do not become PMS operators, PMS axes,
      PMS dependencies, additional AXIOM layers, or independent application
      authority.

  eden_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-theological, non-clinical, non-diagnostic."
      - "No person-level judgment, no group label, no ideology claim, no sex ranking, no sanction logic."
      - "No psychology, motive, intention, trauma, or inner-state inference from EDEN mapping."
      - "No moral verdict logic and no application authority from description."
      - "Description and application remain firewalled by Χ, reversibility, D, contextual responsibility, affected-role contestation, and independent application authority."
    may_add_visibility_to:
      - "Adult Reciprocity as truthful coordination of real Ω"
      - "False-Coordinated Real Asymmetry"
      - "real Ω mapping before failure attribution"
      - "responsibility and Action-Power distribution"
      - "Σ/Ψ blockage, simulation, externalization, or openness"
      - "cost distribution under Ω and Θ"
      - "non-action and non-binding relevance under □/Λ/Ω/Θ"
      - "immunization, overexposure, and AEP as scene-bound profiles"
      - "PFO as downstream regime stabilization where separately supported"
      - "Reciprocity Loss as erosion of shared correctability"
      - "counter-scenes, falsifiers, rivals, boundaries, and non-capture"
    must_not_do:
      - "treat EDEN as PMS Base"
      - "treat Adult Reciprocity, Action-Power, PFO, AEP, correctability, or Reciprocity Loss as PMS operators or axes"
      - "start from PFO, Fall, False Comparison, or sex category as master origin"
      - "use EDEN-MAP as a coercive map against persons, couples, groups, sexes, institutions, or political positions"
      - "treat non-action as praxis by default or non-binding as avoidance by default"
      - "treat protection as immunity from R or responsibility as permission to degrade"
      - "claim full capture, final verdict, diagnosis, prescription, or PMS-Core correction"

  axiom_validity_gate:
    status: "suspended"
    gate_type: "PMS_application_plus_EDEN_application_requirements"
    applies_to: "EDEN_overlay_application_in_AXIOM"
    canonical_pms_entry_condition:
      distance_Chi:
        id: "Χ"
        status: "maintained"
        case_application: >
          The overlay remains meta-positioned and non-verdictive. It does not
          fuse the conceptual fit into urgency, enforcement, diagnosis, person
          attribution, or scene-level finding.
      reversibility:
        id: "reversibility"
        status: "maintained"
        case_application: >
          All EDEN mappings remain candidate, weak, indeterminate, suspended,
          or not established because the Core case provides a conceptual domain
          projection rather than a bounded EDEN scene packet.
      dignity_in_practice_D:
        id: "D"
        status: "maintained"
        case_application: >
          No shaming, humiliation, person-ranking, sex-ranking, diagnosis,
          dignity hierarchy, or ontological evaluation is introduced.
    eden_application_requirements:
      scene_packet:
        status: "absent"
        note: >
          The Core case explicitly treats Pseudo-Symmetry as a conceptual
          pattern, not as a concrete praxis scene with actors, roles, temporal
          sequence, evidence, or effect trace.
      counter_scene_exposure:
        status: "present"
        note: >
          Strong counter-scenes remain available: formal equality, justified
          functional asymmetry, aspirational parity, transitional reform,
          symbolic parity, administrative simplification, and contested frame
          selection.
      contextual_responsibility:
        status: "absent"
        note: >
          Responsibility cannot be assigned because structuring effect,
          legibility, capacity, alternatives, Θ trajectory, Action-Power, and Ω
          cost/exposure are not concretely specified.
      evidentiary_answerability:
        status: "partial"
        note: >
          The overlay names what evidence would be required to narrow, suspend,
          revise, or defeat the EDEN map, but the conceptual Core case does not
          supply that evidence.
      affected_role_contestation:
        status: "not_applicable"
        note: >
          No affected roles are identified in the conceptual Core case; in any
          future concrete scene, affected roles would retain standing to contest
          packet, frame, evidence, R trace, or application.
      independent_application_authority:
        status: "not_authorized"
        note: >
          EDEN-MAP itself gives no authority to confront, bind, intervene,
          punish, enforce, prescribe, or obligate.
    invalid_if_any:
      - "core_case_rewritten_by_overlay"
      - "PMS_operator_redefined"
      - "PMS_derived_axis_redefined"
      - "EDEN_construct_treated_as_PMS_base"
      - "EDEN_by_vibe"
      - "PFO_by_vibe"
      - "real_Ω_asserted_without_scene_packet"
      - "false_coordination_claimed_without_real_Ω_displaced_R_and_blocked_or_weakened_or_simulated_or_avoided_or_externalized_Σ_Ψ"
      - "counter_scene_cannot_change_reading"
      - "no_falsifier_named"
      - "description_converted_directly_into_binding_or_obligation"
      - "responsibility_assigned_without_contextual_conditions"
      - "non_action_treated_as_praxis_by_default"
      - "non_binding_treated_as_avoidance_by_default"
      - "sex_or_person_label_substituted_for_scene_analysis"
      - "hidden_motive_or_psychology_inferred_from_operator_trace"
      - "humiliation_or_exposure_used_as_method"
      - "action_recommendation_or_intervention_protocol_added"
      - "legal_clinical_forensic_policy_or_HR_conclusion_added"
      - "D_suspended_for_truth_clarity_efficiency_punishment_or_resolution"

  case_meta:
    id: "PMS-EDEN-OVERLAY-PSEUDO-SYMMETRY"
    title: "Pseudo-Symmetry"
    subtitle: "EDEN overlay over completed PMS Core conceptual projection"
    status: "final_overlay"
    model: "PMS-EDEN"
    model_schema_version: "PMS-EDEN_2.0"
    base_schema: "PMS_1.3"
    file_name: "pms_eden_overlay_pseudo_symmetry.yaml"
    authorship:
      originator: "T. Zöller"
      formalization_assistant: "ChatGPT"
    purpose: "Regenerate only the PMS-EDEN add-on layer for an already completed AXIOM PMS-Core case."
    axiom_part: "not_specified"
    base_core_case_ref: "completed PMS Core case: Pseudo-Symmetry"
    addon: "EDEN"
    output_role: "replace_existing_EDEN_addon_layer_only"
    case_type: "conceptual_domain_projection"
    axiom_overlay_focus: "false_coordination"
    primary_focus:
      construct: "False-Coordinated Real Asymmetry"
      yaml_home: "mechanism_architecture.false_coordinated_real_asymmetry"
      construct_status: "eden_mechanism"
      secondary_constructs:
        - "adult_reciprocity"
        - "responsibility_principle"
        - "description_to_action_firewall"
        - "counter_scene_protocol"
      not_a_case_of:
        - "PFO finding"
        - "AEP finding"
        - "Reciprocity Loss finding"
        - "concrete EDEN scene finding"

  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_sex_ranking: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_legal_forensic_clinical_policy_or_HR_conclusion: true
    no_action_authorization: true
    no_application_authority_from_description: true
    no_humiliation_or_public_exposure_as_method: true
    description_to_action_firewall: "active"
    validity_gate_reference: "axiom_validity_gate"
    required_method_conditions:
      canonical_pms_entry_condition:
        - "Χ"
        - "reversibility"
        - "D"
      eden_application_requirements:
        - "scene_packet"
        - "counter_scene_exposure"
        - "contextual_responsibility"
        - "evidentiary_answerability"
        - "affected_role_contestation"
        - "independent_application_authority"
    core_rule: "Map the scene; do not diagnose persons, prescribe action, rank sexes, authorize intervention, or revise PMS-Core."
    invalid_if_any:
      - "Χ_suspended_for_clarity_or_urgency"
      - "reversibility_suspended_for_verdict"
      - "D_suspended_for_truth_or_efficiency"
      - "scene_packet_replaced_by_impression"
      - "counter_scene_cannot_change_reading"
      - "responsibility_without_scene_conditions"
      - "description_converted_directly_into_binding"
      - "person_or_sex_label_substituted_for_scene_analysis"
      - "Core_layer_rewritten_by_EDEN_overlay"
    prohibited_shortcuts:
      - "EDEN-by-vibe"
      - "PFO-by-vibe"
      - "identity-based_assignment"
      - "sex-truth_inference"
      - "personality_inference"
      - "motive_inference_from_operator_trace"
      - "description_converted_into_obligation"
      - "PMS-Core-correction-by-overlay"

  example_schema_alignment:
    required_fields_from_PMS_EDEN_CASE_2_0:
      case_schema_version: "case_schema_version / mapped to pms_axiom_eden_overlay_case.case_schema_version"
      case_meta: "case_meta"
      guardrails: "case_guardrails"
      vignette: "minimal_vignette"
      scene_packet: "scene_packet"
      pms_operator_trace: "pms_operator_trace"
      eden_map: "eden_map"
      construct_selection: "construct_selection"
      closure: "readable_structural_closure"
    required_eden_map_fields:
      - "scene_packet_summary"
      - "real_omega_mapping"
      - "dominant_false_coordination_frame"
      - "responsibility_and_action_power_distribution"
      - "sigma_psi_status"
      - "cost_distribution"
      - "non_action_and_non_binding"
      - "immunization_overexposure_AEP"
      - "counter_scene_and_falsifier"
      - "description_application_status"
      - "revision_point_or_open_question"
    axiom_adapter_fields:
      - "overlay_relationship_to_core"
      - "core_anchor"
      - "axiom_validity_gate"
      - "axiom_integration"
      - "eden_overlay_quality_control"
    axiom_adapter_note: >
      EDEN CASE 2.0 provides the internal field structure. AXIOM adds the
      completed-Core anchor, replacement-only add-on role, and final QC that
      the overlay did not become a Core rewrite or standalone application
      authority.

  example_suite_schema_alignment:
    status: "reference_only_embedded_in_AXIOM_overlay"
    source: "PMS-EDEN_CASE_2.0 reusable case template"
    axiom_case_policy: >
      AXIOM cases do not generate a standalone PMS-EDEN example-suite artefact
      unless explicitly requested. The EDEN case template is used as the
      internal overlay field structure over a completed PMS-Core case.

  paper_structure_map_alignment:
    status: "reference_only"
    source: "PMS-EDEN.yaml.paper_structure_map"
    case_application: >
      Materially relevant regions are method_and_positive_baseline.adult_reciprocity,
      mechanism_architecture.false_coordinated_real_asymmetry,
      responsibility_and_praxis_architecture.responsibility_principle,
      responsibility_and_praxis_architecture.no_passive_praxis,
      responsibility_and_praxis_architecture.immunization_overexposure_and_AEP,
      regime_test_scene_and_loss_architecture.reciprocity_loss, and
      boundary_and_application_architecture.counter_scene_protocol. The paper
      map is not reproduced as a whole.

  core_anchor:
    completed_core_case_summary:
      use: "anchor_only_not_rewrite"
      core_scene_boundary: >
        The Core case is not a concrete scene. It is a conceptual projection of
        a relational or institutional configuration in which parity is verbally
        asserted while outcomes, exposure, responsibilities, or obligations
        remain unevenly distributed.
      core_primary_operator_profile: >
        Core reads Pseudo-Symmetry as Φ(Ω within □) marked by Δ between
        parity-claim and uneven distribution, with Λ, Α, Θ, Σ, and Ψ
        conditional or weak, and Χ as application constraint.
      core_relevant_asymmetries:
        - "uneven outcomes"
        - "uneven exposure"
        - "uneven responsibilities"
        - "uneven obligations"
      core_relevant_non_events:
        - "possible missing reciprocity"
        - "possible missing acknowledgment"
        - "possible missing redistribution"
        - "possible missing accountability"
      core_relevant_temporalities:
        - "persistence suggested by 'remain'"
        - "no concrete sequence, accumulation, recurrence, or duration established"
      core_boundary_notes:
        - "conceptual projection only"
        - "not empirical"
        - "not diagnostic"
        - "not legal or forensic"
        - "not a PMS Base validation"
        - "rival readings remain open"
    core_to_eden_bridge:
      eden_relevance_trigger: >
        EDEN becomes relevant because the Core structure resembles EDEN's
        target contrast: real Ω may be coordinated through parity language.
        However, the Core case lacks the scene packet required to determine
        whether this is truthful coordination, false coordination, formal
        equality, justified role differentiation, symbolic parity, or a better
        rival framing.
      what_eden_adds_beyond_core_visibility: >
        EDEN sharpens the question of whether asserted parity truthfully
        coordinates real Ω through responsibility, Σ, Ψ, Χ, D, and
        correctability, or whether parity-language functions as a candidate
        false-coordination frame. This remains a question-map, not a finding.
      what_must_remain_core_only: >
        The PMS operator trace, dependency status, derived-axis projection, and
        Core validity judgment remain PMS-Core results and are not converted
        into EDEN-specific proof.

  minimal_vignette:
    scene: >
      No concrete vignette is supplied. The only available case material is the
      conceptual pattern: asserted parity inside a relational or institutional
      frame while outcomes, exposure, responsibilities, or obligations remain
      unevenly distributed.
    temporal_boundary: >
      The boundary is conceptual. Persistence is suggested but not evidenced;
      recurrence, carryover, delay, accumulation, correction history, and
      concrete scene effects are not specified.
    roles:
      - id: "role_A"
        label: "unspecified role-position within the parity claim"
      - id: "role_B"
        label: "unspecified role-position within the uneven distribution"
      - id: "field_or_medium"
        label: "unspecified relational or institutional frame"
    surface_description: >
      The pattern may initially appear as symmetry, equality, mutuality,
      fairness, neutrality, shared responsibility, or formal parity.
    eden_question: >
      Does asserted parity truthfully coordinate real Ω, or does it function as
      a candidate false-coordination frame that leaves responsibility, cost,
      Σ/Ψ, and correctability uneven or opaque?

  scene_packet:
    specified_scene: "absent; conceptual pattern only"
    role_positions:
      role_A:
        scene_position: "abstract parity-asserting or parity-included position"
        not_identity: true
      role_B:
        scene_position: "abstract distributionally exposed or burdened position"
        not_identity: true
      field_or_medium:
        scene_position: "relational or institutional frame in which parity-language and distributional asymmetry become salient"
        not_identity: true
        optional: true

    dominant_frame:
      candidate_frame: "asserted_parity"
      frame_description: >
        Asserted parity makes the situation legible as equality, mutuality,
        neutrality, shared responsibility, or formal symmetry while uneven
        distribution remains conceptually named but not scene-mapped.
      frame_status: "candidate_false_coordination_question"
      false_coordination_boundary: >
        No frame family is categorically false. False coordination requires
        scene-established real Ω, displaced R, and blocked, weakened,
        simulated, avoided, or externalized Σ/Ψ under eroding correctability;
        those conditions are not established here.

    real_Ω:
      present: "candidate_conceptual_not_scene_established"
      summary: >
        Candidate real Ω is visible only at the conceptual level because the
        Core case names uneven outcomes, exposure, responsibilities, and
        obligations. EDEN real Ω is not scene-established because direction,
        bearer, cost, capacity, alternatives, protection, and effect chains are
        absent.
      dimensions:
        outcomes: "named_conceptually_not_scene_mapped"
        exposure: "named_conceptually_not_scene_mapped"
        responsibilities: "named_conceptually_not_scene_mapped"
        obligations: "named_conceptually_not_scene_mapped"
        capacity: "indeterminate"
        dependency: "indeterminate"
        protection: "indeterminate"
        access: "indeterminate"
        timing_control: "indeterminate"
        frame_control: "indeterminate"
        recognition_control: "indeterminate"
        binding_control: "indeterminate"
        language_access: "indeterminate"
        explanation_burden: "indeterminate"
        vulnerability: "indeterminate"
        action_power: "indeterminate"
        risk: "indeterminate"
        cost: "candidate_named_conceptually_not_scene_mapped"
        exit_and_waiting_capacity: "indeterminate"
      mapping_question: >
        A future concrete scene would need to show what the uneven distribution
        changes in options, cost, exposure, responsibility, correction access,
        or protection.
      asymmetry_not_failure_rule: "Asymmetry is not the failure; false coordination of asymmetry is the failure."
      multidimensional_guardrail: >
        Keep crossed asymmetries visible; authority, exit power, embodiment,
        language, timing, protection, and explanation burden may diverge and
        cannot become one rank.

    relevant_Λ:
      present: "candidate_conceptual_not_scene_established"
      non_event_or_absence: "candidate missing reciprocity, acknowledgment, redistribution, accountability, or correction"
      scene_structuring_effect: >
        Possible missing reciprocity, acknowledgment, redistribution,
        accountability, or correction is conceptually relevant but not
        scene-established.
      no_passive_praxis_check: "Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ."

    non_action_relevance:
      status: "indeterminate"
      note: >
        No concrete silence, delay, refusal, non-response, or absence is
        provided; absence of equalization may also be formal equality, bounded
        protection, temporary transition, or non-capture.
      boundary: >
        Silence, delay, refusal, non-response, or absence is not praxis by
        default and never proves motive, manipulation, drift, or responsibility.

    non_binding_relevance:
      status: "indeterminate"
      note: >
        No concrete non-binding is identified. A future scene could test
        whether non-binding preserves legitimate openness or shifts Ψ-load,
        cost, exposure, timing, or responsibility.
      boundary: >
        Non-binding may be legitimate where uncertainty, costs, alternatives,
        and exit/waiting conditions remain legible.

    Θ_trajectory:
      sequence:
        - step: 1
          description: "asserted parity is conceptually named"
        - step: 2
          description: "uneven distribution is conceptually named as remaining"
        - step: 3
          description: "no concrete sequence, recurrence, accumulation, correction attempt, or cost trajectory is supplied"
      trajectory_status: "indeterminate"
      trajectory_origin_note: >
        The word "remain" permits a temporal question but does not establish a
        full Θ trajectory, origin, recurrence, or moral rank.

    structuring_effects:
      role_A_effects:
        - "not established"
      role_B_effects:
        - "not established"
      shared_or_field_effects:
        - "candidate parity frame may make asymmetry less legible"
        - "candidate institutional or relational frame may stabilize the vocabulary of parity"
      unsupported_effects:
        - "motive"
        - "bad faith"
        - "deception"
        - "person type"
        - "institutional guilt"
        - "legal culpability"

    responsibility_distribution:
