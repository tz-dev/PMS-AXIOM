      Alpha_primary: >
        No primary Α is established. A possible parity-surface script is
        hypothesized only if repeated assertions of parity continue to coexist
        with uneven distribution across comparable scenes.
      Costs:
        A: "weak monitoring load: sustained differentiation between parity claim and uneven distribution is conceptually available but not concretely tracked across Θ"
        C: "coherence risk: verbal parity may stabilize apparent coherence while distributional contradiction remains unresolved"
        R: "responsibility risk: unequal obligations may be externalized or obscured, but no durable Ψ pattern is evidenced"
        E: "under-specified enactment: no integrated Action_E is shown"
        D: "application-level restraint load: analysis must avoid humiliation, ranking, diagnosis, and coercive pattern use"
