  eden_overlay_synthesis:
    primary_eden_reading: >
      PMS-EDEN makes visible that the Pseudo-Symmetry case is not merely a
      generic PMS mismatch between parity-claim and uneven distribution; it is
      specifically readable as a PS-core signature in which parity surface may
      substitute for coordinated asymmetry. EDEN adds attention to possible
      false comparison, asymmetry-switch availability, parity-to-exit risk,
      Σ-simulation risk, cost externalization, and reciprocity-loss risk, while
      leaving all stronger regime claims under-specified.
    ground_state_result: >
      EDEN ground-state configuration is absent as an active reading. The case
      does not describe stable praxis without deficit pressure, nor an
      A-available non-escalated scene. Ground state functions only as a contrast
      class: coordinated asymmetry without pseudo-symmetry would be a healthier
      structural alternative, but this is not shown.
    threshold_result: >
      Threshold explicitness is not applicable. The case does not describe a
      selectable negative option becoming explicit across Θ; it begins with an
      abstract structural pattern already named as asserted parity under uneven
      distribution.
    breach_or_NRK_result: >
      Breach and NRK are not applicable. No realization under ∇, breach event,
      consequence-field sequence, or explicit Σ/Ψ failure-in-action is supplied.
      The overlay preserves the distinction that realization is not Action_E
      unless E = [Σ, Θ, ∇] is satisfied.
    legibility_management_result: >
      Fig-leaf-like legibility management is weak and analogical only. Verbal
      parity may manage or reduce visibility of uneven exposure or obligation,
      but the case does not show shielding, concealment, shame, post-breach
      exposure, or legibility-management scripts.
    comparison_result: >
      A comparison or value-relation shift is weakly possible but not
      established. Pseudo-symmetry can transform praxis coordination into
      equivalence-talk, but the case does not show ranking, standing language,
      verdict-surface, or comparison-dominant governance.
    dissatisfaction_cost_result: >
      Dissatisfaction and continuous adjustment do not appear as system cost on
      the supplied material. No recurring complaint, correction loop, comparison
      maintenance, Φ repair spike, retained Λ balance, or Θ accumulation is
