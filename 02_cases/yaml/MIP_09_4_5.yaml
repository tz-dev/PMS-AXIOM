mip_case_analysis:
  schema_version: "MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned"
  file_name: "repair_relationships__mip_analysis.yaml"
  schema_role: "MIP_case_application_over_completed_PMS_Core_and_PMS_EDEN_case_layers"
  analysis_mode: "full"
  reflection_mode: "off"
  output_language: "en"

  source_alignment:
    mip_reference:
      source_file: "MIP - Maturity in Practice.yaml"
      schema_version: "MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned"
      role: "governing model reference and case template for this additional analysis"
    pms_core_case:
      source_file: "completed PMS Core case YAML"
      base_reference: "PMS.yaml"
      base_schema_version: "PMS_1.3"
      case_title: "Repair Relationships"
      role: "completed Core structural trust-repair projection; not rewritten here"
    eden_overlay_case:
      source_file: "completed PMS-EDEN overlay YAML"
      overlay_reference: "PMS-EDEN.yaml"
      overlay_schema_version: "PMS-EDEN_2.0"
      role: "completed EDEN threshold overlay; not rewritten here"
    use_rule: >-
      This MIP analysis reads the PMS Core and PMS-EDEN layers as prior structural
      analyses. It does not redefine PMS operators, does not change PMS
      dependencies, does not revise the EDEN overlay, and does not convert a
      conceptual trust-repair projection into a concrete person assessment.

  mip_application_boundary:
    model_scope: >-
      MIP analyses enactments, roles, structures, maturity-in-practice,
      asymmetry, responsibility distribution, power-to-act, trajectories, and
      dignity-in-practice guardrails. It does not evaluate person-worth,
      ontological dignity, personality, pathology, legal liability, clinical
      status, or moral rank.
    object_of_mip_analysis: >-
      The object is the completed conceptual case-analysis configuration:
      Repair Relationships as a PMS Core trust-repair projection plus an EDEN
      overlay that suspends strong EDEN claims until a concrete scene packet is
      supplied.
    not_object_of_mip_analysis:
      - "a concrete relationship"
      - "a concrete betrayal"
      - "a concrete repair outcome"
      - "an identifiable person"
      - "a clinical, legal, HR, forensic, or therapeutic case"
      - "a final moral verdict"
    consequence: >-
      A-score may be used as a maturity band for the analysis posture and
      structural handling of the conceptual case. M-score for concrete actors is
      withheld. IA-box remains a pre-application asymmetry check. D-module is
      activated only as a guardrail-limited dignity-protection layer, not as a
      dignity score or person profile.

  crosswalk_to_prior_layers:
    PMS_Core_to_MIP:
      A_awareness: "PMS Awareness_A, Χ, non-capture, and frame-sensitive distinctions support MIP A-awareness."
      C_coherence: "PMS Coherence_C, Φ, conditional Σ, and dependency hygiene support MIP C-coherence."
      R_responsibility: "PMS Responsibility_R is weak; MIP therefore withholds concrete responsibility assignment."
      P_power_to_act: "PMS Action_E is under-specified; MIP therefore treats power-to-act as uncalibrated."
      D_dignity_in_practice: "PMS Dignity-in-Practice_D is an application constraint; MIP D is used only as protected qualitative guardrail."
    EDEN_to_MIP:
      real_omega_mapping: "EDEN real Ω remains possible but uncalibrated; MIP IA-box therefore remains pre-application."
      responsibility_action_power_distribution: "EDEN R/Action-Power is indeterminate; MIP M-score for roles remains not assigned."
      sigma_psi_status: "EDEN Σ/Ψ are indeterminate; MIP trajectory and coherence remain conditional."
      cost_distribution: "EDEN cost distribution is indeterminate; MIP publicness, D-P, and IA measures are documented as future requirements."
      counter_scene_falsifier: "EDEN counter-scene openness supports MIP bias, norm, intuition, and revision discipline."
      description_to_action_firewall: "EDEN firewall aligns with MIP transmission guardrails and non-prescriptive output status."

  case:
    meta:
      case_id: "repair_relationships__mip_over_pms_core_eden__v1"
      case_title: "Repair Relationships — MIP Analysis over PMS Core and PMS-EDEN Layers"
      documentation_date: "2026-07-03"
      analysts:
        - name: "ChatGPT"
          role: "formalization_assistant"
          observer_position: >-
            Structural reader applying MIP to the completed PMS Core and
            PMS-EDEN case analyses; not a party, clinician, judge, mediator,
            investigator, HR actor, or enforcement authority.
      language: "en"
      confidentiality_level: "conceptual_internal_working_note_no_identifiable_persons"
      analysis_mode: "full"
      intended_use: >-
        Structural case review, model-comparison reflection, and maturity-in-
        practice audit of the already completed PMS Core and PMS-EDEN analyses.
        Not intended as advice, diagnosis, sanction, reconciliation demand,
        legal assessment, therapy planning, or person evaluation.
      application_zone: "green_with_yellow_sensitivity"
      interaction_profile:
        reflection_mode: "off"
        d_module_preference: "auto"
        output_format: "yaml"
        discipline_profile: "generic"
        d_activation_decision: "activated_as_guardrail_limited_protection_signal_only"
        transmission_default: "working_note_until_checked"

    guardrails:
      profile_not_person: true
      focus_on_roles_structures_enactments: true
      minimal_adulthood_checked: true
      analyst_self_implication_acknowledged: true
      system_axiom_applied: true
      use_context:
        roles_clarified: true
        observer_position_clarified: true
        information_basis_clarified: true
        analysis_purpose_clarified: true
        publicness_clarified: true
      red_zone_check:
        clinical_diagnostics: false
        therapy_planning: false
        forensics: false
        individual_HR_decisions: false
        child_youth_diagnostics: false
        public_pillory_or_ranking: false
        online_shaming_or_doxing: false
        humiliation_diagnostics: false
        public_D_readings_of_identifiable_persons: false
        any_red_zone_touched: false
        if_any_true: "do_not_apply_model"
      dignity_protection:
        D0_untouched: true
        D1_D2_enactments_only: true
        no_dignity_score: true
        no_person_labels_from_D: true
        D_default_off: true
        D_activated: true
        if_D_activated_guardrails_checked: true
        if_D_creates_more_shame_than_clarity: "dial_D_down"
      score_hygiene:
        A_score_band_not_person_score: true
        M_score_shared_responsibility_not_guilt: true
        D_profile_not_dignity_score: true
        IA_box_not_verdict: true
      tragedy_clause_considered: true
      misuse_as_own_finding_acknowledged: true

    information_basis:
      primary_material: >-
        Completed PMS Core case YAML for Repair Relationships; completed
        PMS-EDEN overlay YAML over that Core case; MIP - Maturity in Practice
        YAML as governing model/template for this further analysis.
      secondary_material: >-
        No independent empirical scene, actor testimony, institutional record,
        chronology, legal standard, clinical material, or external evidence is
        supplied. Prior PMS and EDEN outputs are treated as structured source
        analyses, not as empirical proof.
      assumptions_and_inferences: >-
        The analysis assumes that the prior PMS Core and EDEN overlay have been
        accepted as completed layers. It infers only structural consequences for
        MIP: A/C can be read as analysis-posture qualities; R/P/M for concrete
        actors cannot be assigned; IA remains pre-application; D may be used as
        a guardrail-limited protection signal.
      distinction_material_vs_inference_clear: true
      quality_and_limits:
        coverage_estimate: >-
          High coverage for conceptual model-layer alignment and guardrail
          hygiene; low coverage for concrete role responsibility, power-to-act,
          harm trajectory, or repair outcome.
        reliability_estimate: >-
          Reliable as a structured MIP reading of the supplied analyses;
          unreliable for any concrete person, institution, event, betrayal,
          refusal, repair success, or responsibility conclusion.
        known_gaps:
          - "No bounded concrete scene packet."
          - "No identified role-holders or affected persons."
          - "No chronology beyond conceptual trust-repair sequence possibilities."
          - "No evidence for real Ω direction, cost distribution, or action-power vectors."
          - "No enacted repair, refusal, apology, restitution, withdrawal, or renewed reliance."
          - "No independent counter-perspective from affected roles."
          - "No empirical, legal, clinical, organizational, or institutional validation material."
        main_bias_risks_here:
          - "Model-fit bias: PMS, EDEN, and MIP can all make the trust-repair domain appear more structurally captured than it is."
          - "Coherence bias: a clean multi-model YAML stack may feel stronger than the absent scene evidence warrants."
          - "Normative inflation: maturity language may be mistaken for a verdict if guardrails are not kept visible."
          - "Hindsight inflation: later overlay discipline may make the Core pass appear more concretely grounded than it was."
          - "Dignity inflation: D-protection language may be over-read as a D-finding about parties, though there are no parties."

    snapshot:
      short_case_description: >-
        Repair Relationships is a conceptual PMS Core analysis of trust-repair
        relations, extended by a PMS-EDEN overlay that tests only future
        applicability thresholds for real Ω, false coordination,
        responsibility/action-power distribution, Σ/Ψ status, cost distribution,
        and correctability. MIP now reviews the maturity-in-practice profile of
        that layered analysis, especially how it handles awareness, coherence,
        responsibility, power-to-act, asymmetry, dignity protection, trajectory,
        bias, and transmission limits.
      central_actors_and_roles:
        - "Object-role: completed layered case analysis, not a person."
        - "Conceptual role_A: placeholder for relying, affected, withdrawing, or repair-seeking position."
        - "Conceptual role_B: placeholder for trusted, responding, repairing, refusing, or institutionally positioned role."
        - "Field_or_medium: placeholder for relational, epistemic, institutional, contractual, familial, political, or philosophical frame."
        - "Analyst role: formalization assistant applying MIP as an additional structural layer."
      guiding_question: >-
        How mature-in-practice is the completed PMS Core + PMS-EDEN treatment of
        Repair Relationships, and what does MIP require before any stronger
        maturity, responsibility, IA, D, or action-oriented conclusion could be
        transmitted?
      level:
        - "conceptual_domain_projection"
        - "meta-application_over_prior_case_analyses"
        - "structural_case_review"
        - "no_concrete_scene_adjudication"
      first_visible_asymmetry: >-
        The first visible asymmetry is methodological: the analysis has strong
        conceptual structuring power while the case material has no concrete
        scene, affected role voice, chronology, or evidence. This creates a risk
        that the model stack could overpower the under-specified material unless
        Χ, reversibility, D, counter-perspectives, and transmission limits remain
        active.
      first_visible_D_themes_optional:
        - "Dignity protection against person-ranking, shaming, humiliation, and forced reconciliation."
        - "Protection of D0 by refusing dignity scoring or person-level dignity judgment."
        - "D1/D2 only as role-context-time-window enactment signals, not as person worth."
        - "Publicness risk if a conceptual dignity reading were used against identifiable persons."

    role_mapping:
      object_of_observation:
        type: "layered_case_analysis"
        description: >-
          The completed PMS Core case analysis plus completed PMS-EDEN overlay
          for Repair Relationships, treated as a structured conceptual artifact.
        role: "object of MIP maturity-in-practice review"
        not_person_as_whole: true
      observer_position:
        role: "formalization_assistant_and_structural_reader"
        power_relation_to_object: >-
          The observer has interpretive/formalization power over the YAML output
          but no authority over any real person, institution, relationship,
          decision, or intervention.
        possible_effects_of_analysis: >-
          The analysis may increase structural clarity and guardrail hygiene, but
          it could also create false confidence if transmitted without the
          working-note boundary or if mistaken for concrete assessment.
      involved_roles:
        - role: "PMS Core layer"
          mandate: "Map trust-repair phenomena through PMS operators and derived structures without concrete adjudication."
          built_in_asymmetries:
            - "high conceptual coverage versus low empirical specificity"
            - "operator grammar may appear authoritative if non-capture is ignored"
          publicness_level: "internal/conceptual"
          dignity_exposure: "low if kept conceptual; high if misused for person-ranking or forced reconciliation"
        - role: "PMS-EDEN overlay layer"
          mandate: "Map EDEN applicability thresholds without asserting strong EDEN findings."
          built_in_asymmetries:
            - "normative benchmark power versus absent scene packet"
            - "description-to-action firewall required to prevent coercive use"
          publicness_level: "internal/conceptual"
          dignity_exposure: "moderate if EDEN terms are over-read as sex truth, person diagnosis, or verdict"
        - role: "MIP analysis layer"
          mandate: "Review maturity-in-practice, A-C-R-P-D, IA, trajectory, bias, and transmission hygiene."
          built_in_asymmetries:
            - "score language can be misread as person scoring"
            - "D-language can be misread as dignity judgment"
            - "maturity language can be misread as superiority claim"
          publicness_level: "internal/conceptual"
          dignity_exposure: "managed by D0 protection, no person labels, and working-note status"
        - role: "conceptual role_A"
          mandate: "Placeholder for possible affected, relying, withdrawing, or repair-seeking position in a future scene."
          built_in_asymmetries:
            - "possible vulnerability or exposure, not established"
          publicness_level: "not applicable; placeholder only"
          dignity_exposure: "not assessed"
        - role: "conceptual role_B"
          mandate: "Placeholder for possible trusted, responding, repairing, refusing, or institutionally positioned role in a future scene."
          built_in_asymmetries:
            - "possible authority, obligation, or action-power, not established"
          publicness_level: "not applicable; placeholder only"
          dignity_exposure: "not assessed"
      publicness:
        level: "non-public_internal_conceptual_working_note"
        A_P_relevance: >-
          Publicness awareness is important because publishing or operationalizing
          a maturity/D/EDEN reading about identifiable persons would move the use
          toward red-zone misuse.
        P_PU_relevance: >-
          The current analysis has low public power if kept internal, but high
          public power if excerpted, circulated, or used as authority in a real
          conflict.
        D_P_relevance_if_D_active: >-
          D-P is relevant only as a protection guardrail: no public D reading of
          identifiable persons, no humiliation, no dignity label, no ranking.
        public_shaming_risk: >-
          Low within the present conceptual artifact; potentially high if later
          attached to real persons or institutions without consent, moderation,
          and independent authority.
        reversibility_risk: >-
          Low as a revisable working note; high if frozen as a final model-backed
          verdict or used to pressure repair, apology, or reconciliation.

    frame_vs_variability:
      frame_elements:
        - element: "No concrete scene supplied"
          reason_fixed_or_slow: "Inherited from PMS Core and EDEN layers; it defines the current case type."
          protected_goods:
            - "reversibility"
            - "non-capture"
            - "no person assessment"
            - "no responsibility assignment"
        - element: "PMS Core operator/dependency discipline"
          reason_fixed_or_slow: "Required by PMS.yaml and preserved by the prior case analysis."
          protected_goods:
            - "conceptual integrity"
            - "operator hygiene"
            - "avoidance of pseudo-derivation"
        - element: "EDEN description-to-action firewall"
          reason_fixed_or_slow: "Required by PMS-EDEN overlay to prevent structural description becoming action authority."
          protected_goods:
            - "dignity protection"
            - "contestability"
            - "non-coercion"
            - "no verdict"
        - element: "MIP D0 and person/enactment separation"
          reason_fixed_or_slow: "Constitutive MIP guardrail; not optional."
          protected_goods:
            - "ontological dignity remains untouched"
            - "no person labels"
            - "no dignity score"
      variability_elements:
        - element: "Future scene packet"
          possible_change: "A concrete scene could later specify roles, chronology, evidence, real Ω, costs, and alternatives."
          responsible_roles:
            - "future analyst"
            - "affected role positions"
            - "appropriate moderated or accountable process"
        - element: "A-score band for analysis posture"
          possible_change: "Could move up if rival comparison and concrete evidence are supplied; could move down if over-assimilation appears."
          responsible_roles:
            - "analyst"
            - "reviewer"
        - element: "IA-box result"
          possible_change: "Could shift from pre-application IA-risk to functional asymmetry or inadult asymmetry if a scene shows T/J/TB/R conditions."
          responsible_roles:
            - "future scene analyst"
            - "affected roles"
        - element: "D-module scope"
          possible_change: "Could be dialed down if D language creates shame risk; could be deepened only in safe, role-bound, non-public context."
          responsible_roles:
            - "analyst"
            - "moderator"
            - "affected roles if any"
      unfair_high_M_zones:
        - "Assigning high M to role_A or role_B without knowing knowledge, power/control, predictability, alternatives, or integration attempts."
        - "Treating silence, delay, refusal, or non-binding as responsibility evasion by default."
        - "Treating conceptual coherence of the PMS/EDEN/MIP stack as evidence of concrete responsibility."
        - "Treating a desired repair outcome as proof that someone had power or duty to repair."
      system_as_excuse_risk:
        - "The absence of concrete scene data must not be used to erase all responsibility in future scenes."
        - "Structural uncertainty must not become blanket immunity for roles with real action-power."
        - "Model caution must not hide genuine harm if later evidence supplies it."
      D1_D2_realistically_improvable_where:
        - "Improve language discipline: always speak of role/context/time-window enactments, not persons."
        - "Preserve affected-role contestation before any future application."
        - "Keep D as protection and clarity, not shame or rank."
        - "State non-transmissibility for decision use until concrete evidence and review exist."

    acrp_profile:
      A_awareness:
        observations: >-
          Awareness is relatively strong at the analysis-artifact level. The
          prior PMS Core case clearly distinguishes trust/distrust,
          reliance/withdrawal, repair/non-repair, expectation/non-event, and
          conceptual versus concrete scene. The EDEN overlay adds awareness of
          real Ω, action-power, cost distribution, false coordination,
          correctability, and the description/application firewall. MIP adds
          awareness of score hygiene, D0 protection, person/enactment separation,
          IA limits, and transmission risks.
        available_information: >-
          Available information consists of structured case analyses and model
          templates. It includes rich conceptual distinctions but no concrete
          evidence, testimony, sequence, role mandate, action record, cost map,
          or affected-role voice.
        realistically_knowable: >-
          From the current material, it is realistically knowable that the case
          is conceptual, guardrail-heavy, non-diagnostic, non-verdictive, and
          under-specified for concrete responsibility. It is not realistically
          knowable whether betrayal, justified refusal, repair, false
          coordination, or maturity failure occurred.
        blind_spots: >-
          Concrete chronology, real Ω direction, affected-role perception,
          publicness, power-to-act, alternatives, predictability, costs,
          material stakes, and rival domain standards remain blind spots.
        role_awareness_A_R: >-
          Role awareness is strong for analytic roles and placeholders, but weak
          for any future real roles. PMS and EDEN correctly mark placeholders as
          non-identities; MIP must continue that discipline.
        publicness_awareness_A_P: >-
          Publicness awareness is strong enough for a working-note context. The
          main A-P risk is downstream misuse: YAML form and score-like language
          may look more transmissible than the evidence permits.
        bias_awareness: >-
          Bias awareness is active: model-fit bias, coherence bias, normative
          inflation, hindsight inflation, and dignity inflation are explicitly
          named and should constrain interpretation.
      C_coherence:
        observations: >-
          Coherence is strong in preserving the layered structure: PMS Core
          remains Core, EDEN remains overlay, and MIP is now a further
          maturity-in-practice review. The analysis coherently refuses to upgrade
          conceptual relevance into concrete finding. It also coherently aligns
          PMS Dignity-in-Practice, EDEN firewall, and MIP D0/D1/D2 guardrails.
        word_deed_relation: >-
          The stated non-diagnostic and non-verdictive commitments are matched by
          withholding concrete M-score, person labels, D-score, EDEN findings,
          and action authorization.
        role_context_coherence: >-
          Role-context coherence is adequate because the object is identified as
          a case-analysis artifact. The analysis does not pretend that
          placeholders are real role-holders.
        narrative_coherence: >-
          The narrative is coherent: conceptual trust-repair domain -> PMS Core
          structural projection -> EDEN threshold overlay -> MIP maturity and
          transmission audit. The narrative remains open rather than closed.
        breaks_named_or_hidden: >-
          The primary break is openly named: rich conceptual structure exceeds
          available scene evidence. This break is not hidden; it is converted
          into limits, open questions, IA caution, and working-note status.
      R_responsibility:
        observations: >-
          Responsibility is handled cautiously. The prior PMS Core marks
          Responsibility_R as weak, EDEN marks responsibility/action-power as
          indeterminate, and MIP therefore does not assign M to role_A, role_B,
          or any institution. Responsibility remains located in the analysis
          procedure: do not overclaim, do not transmit as decision basis, and do
          not erase future responsibility if evidence appears.
        responsibility_points: >-
          Present responsibility belongs to the analyst/output layer: maintain
          guardrails, preserve non-capture, document limits, distinguish material
          from inference, avoid person labels, and prevent premature application.
          Future responsibility points would require scene-bound knowledge,
          power/control, predictability, alternatives, and integration attempts.
        assumed_responsibility: >-
          The analysis assumes responsibility for its own formalization posture:
          it marks uncertainty, uses working-note status, activates D only as
          protection, and preserves review/falsifier conditions.
        shifted_or_refused_responsibility: >-
          No concrete role is shown to shift or refuse responsibility. A possible
          analytic risk would be shifting responsibility onto the model stack by
          making PMS/EDEN/MIP appear to decide what only evidence and accountable
          process could decide.
        burdens_and_consequences: >-
          The burden of restraint lies with the analyst and any future user. The
          consequence of mishandling would be false authority, model-backed
          pressure, dignity harm, shaming, or premature repair demands.
      P_power_to_act:
        observations: >-
          Power-to-act is clear for the analysis artifact but indeterminate for
          any real role. The analyst can structure the YAML, state limits, and
          define review conditions. No real participant's levers, options,
          constraints, or alternatives are known.
        real_levers: >-
          Current real levers are textual and procedural: mark working-note
          status, withhold concrete scores, preserve guardrails, list missing
          information, define counter-perspectives, and prevent decision use.
        formal_vs_real_options: >-
          Formally, the models can generate rich fields. Really, without a scene
          packet they cannot assign responsibility, prescribe action, or assess
          repair maturity in practice.
        used_options: >-
          Used options include full template completion, A-C-R-P-D separation,
          IA-box caution, D0 protection, non-publicness, counter-perspective
          inclusion, and transmission limits.
        unused_options: >-
          Unused by design: assigning exact scores, diagnosing roles, activating
          D as person reading, treating EDEN as verdict, generating a repair
          protocol, or authorizing intervention.
        ceiling_rule_relevance: >-
          Ceiling-rule relevance is high for future concrete M-scores: if
          predictability or access to alternatives is near zero, M cannot be high.
          In the present conceptual artifact, concrete M is withheld entirely.

    optional_D_observation:
      use_only_if_guardrails_fulfilled: true
      D_not_folded_into_A_score: true
      observations_only_no_evaluation_here: true
      visible_D_enactments:
        self_devaluation: >-
          Not observed. No concrete subject or self-treatment enactment is
          supplied. The only relevant risk is analytic self-overreach: treating
          the model output as more certain than it is.
        self_neglect: >-
          Not observed. No person or embodied/material self-care field is present.
        shame_dynamics: >-
          No concrete shame dynamic is established. A potential downstream risk
          exists if maturity, EDEN, or D language were attached to identifiable
          persons as accusation, exposure, or humiliation.
        degradation_of_others: >-
          Not observed in the analysis as written, because it uses placeholders
          and guardrails. Degradation risk would arise if role placeholders were
          converted into person labels.
        public_shaming: >-
          Not present in the working-note setting. Public shaming risk is a
          future transmission risk if the YAML is used publicly or adversarially.
        protest_or_refusal: >-
          Refusal remains protected as a possible legitimate outcome. The
          analysis does not redescribe refusal as immaturity, drift, avoidance,
          or failed repair by default.
        dignity_protection: >-
          Active. D0 is untouched; D1/D2 are not scored; no person labels are
          made; D is used to protect against humiliation, coercive repair,
          forced reconciliation, public exposure, and verdictive use.
      next_step_if_relevant: "Use D-profile section below."

    acrpd_submodules_profile:
      A:
        A-I: >-
          Information awareness is strong about available model-layer material
          and weak about empirical scene material. The analysis clearly knows
          what it does not know.
        A-R: >-
          Role awareness is strong for analytic roles and placeholders; concrete
          role awareness is unavailable and therefore not inferred.
        A-C: >-
          Context awareness is adequate for a conceptual domain projection and
          meta-application; inadequate for any real relationship, institution,
          or conflict context.
        A-IM: >-
          Impact awareness is active: possible harms of overclaiming,
          score-misuse, EDEN-verdict drift, D-shaming, and public transmission
          are documented.
        A-P: >-
          Publicness awareness is active: the analysis is safe only as internal
          conceptual working note and unsafe as public D/person reading.
      C:
        C-S: >-
          Structural coherence is strong across PMS Core, EDEN, and MIP because
          each layer remains subordinate to its proper scope.
        C-P: >-
          Process coherence is strong: the output moves from source alignment to
          guardrails, information basis, A-C-R-P, IA, D, trajectory, meta notes,
          open questions, possible steps, and transmission check.
        C-N: >-
          Norm coherence is mostly strong: D0 protection, person/enactment
          separation, non-capture, reversibility, and firewall principles are
          consistent.
        C-I: >-
          Integration coherence is conditional: the analysis integrates prior
          layers without collapsing them, but cannot integrate a real scene that
          is not supplied.
      R:
        R-I: >-
          Individual responsibility is not assigned. Any future role-specific R
          requires knowledge, power/control, predictability, alternatives, and
          serious integration attempt evidence.
        R-S: >-
          Social responsibility is not assigned. The trust-repair field may
          involve social expectations, but no social structure is evidenced.
        R-E: >-
          Ethical responsibility exists at the analysis layer: avoid
          degradation, coercion, premature closure, and model-backed verdicts.
        R-P: >-
          Public responsibility is to keep the report non-public and
          non-decisional unless future governance, consent, and review conditions
          are satisfied.
      P:
        P-I: >-
          Inner agency is not assessed for any person. Analyst agency consists
          only in maintaining epistemic restraint.
        P-S: >-
          Social agency is indeterminate for future actors; current social power
          is limited to how the text may influence interpretation.
        P-C: >-
          Cultural agency is present only as model-language influence: maturity,
          dignity, responsibility, and reciprocity terms may shape perception.
        P-PU: >-
          Public agency is currently low but could become high if the analysis is
          circulated, cited, or operationalized.
      D:
        active: true
        D-I: >-
          No concrete inner dignity enactment is assessed. D-I is only a
          reminder not to infer self-worth, self-devaluation, or inner state from
          structural terms.
        D-B: >-
          Not applicable to the current conceptual artifact; no bodily/material
          self-care field is present.
        D-R: >-
          Relational dignity is protected through non-labeling, refusal of
          forced reconciliation, no diagnosis, and no dignity hierarchy.
        D-P: >-
          Public dignity is protected by non-public working-note status and by
          prohibiting public D readings of identifiable persons.
        note: >-
          D-submodules are active only as protection and guardrail signals. They
          do not produce D-scores, dignity levels, or person-status claims.

    scores_and_ia:
      A_score:
        A_band: "6-7 provisional band for the analysis posture; not a person score and not a concrete scene score"
        boundary_confirmed: "A-score describes enactment, not essence."
        time_role_context: >-
          This band refers only to the current layered case-analysis posture on
          2026-07-03: PMS Core + EDEN overlay + MIP review as a conceptual
          working note.
        justification:
          A_awareness: >-
            Strong awareness of scope, role placeholders, non-capture, guardrail
            risk, publicness risk, and missing evidence. Capped because no
            concrete scene or affected-role voice is available.
          C_coherence: >-
            Strong coherence across model layers and refusal of overclaiming.
            Capped because coherence is conceptual rather than enacted in a real
            repair process.
          R_responsibility: >-
            Responsible at the analysis layer through restraint and working-note
            status. No concrete responsibility assignment is made.
          P_power_to_act: >-
            Appropriate use of available textual/procedural levers; no claim to
            real-world intervention power.
          modulators_context: >-
            Conceptual distance, absence of identifiable persons, and strong
            guardrails support a solid band. Missing concrete evidence, possible
            model-fit bias, and transmission risk prevent a higher band.
        D_excluded_from_A_number: true
      M_score:
        M_band: "not_assigned_for_concrete_roles; analysis-layer M is low-to-moderate and bounded by working-note responsibility"
        boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
        role_position_time_frame: >-
          No concrete role-holder/time frame exists. For the analysis layer only,
          responsibility concerns the current output and its possible misuse.
        five_factors:
          knowledge: >-
            The analysis knows the prior YAML layers and MIP template; it does
            not know scene facts.
          power_control: >-
            The analysis controls wording, scope, score hygiene, D activation,
            and transmission status; it controls no real relationship or
            institution.
          predictability: >-
            It is predictable that overclaiming could create false authority or
            dignity harm; it is not predictable what a real scene would show.
          access_to_alternatives: >-
            Alternatives are available at the text level: withhold scores, mark
            uncertainty, require scene packet, use working-note status, list
            counter-perspectives.
          serious_integration_attempt: >-
            Present: the analysis integrates PMS, EDEN, and MIP while preserving
            their boundaries and refusing concrete conclusions.
        ceiling_rule_check:
          predictability_approx_zero: false
          access_to_alternatives_approx_zero: false
          M_capped_at_4: false
          explanation: >-
            The ceiling rule is not used to assign concrete M because concrete
            roles are absent. For the analysis layer, predictability of misuse
            and access to restraint alternatives are present, so the analyst has
            responsibility to keep the output bounded.
        D_link:
          self_devaluation_does_not_raise_M: true
          high_subjective_guilt_triggers_M_check_not_M_increase: true
          low_M_high_harm_means_protection_not_blame: true
      IA_box:
        asymmetry_named: >-
          Methodological asymmetry: high formal structuring capacity of the
          PMS/EDEN/MIP stack versus low concrete scene evidence. Possible future
          role asymmetries remain uncalibrated.
        boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
        T_transparent:
          status: "partial_to_sufficient_for_working_note"
          notes: >-
            The analysis is transparent about source layers, missing scene data,
            and non-decisional status. It is not transparent about concrete role
            facts because none are supplied.
        J_justified:
          status: "yes_for_conceptual_review_only"
          protected_good_or_purpose: >-
            The purpose is model-layer maturity review, guardrail hygiene, and
            prevention of overclaiming.
          notes: >-
            Justification would fail if this were used to pressure persons,
            demand repair, assign blame, or support a decision.
        TB_time_bound:
          status: "working_note_pending_scene_packet_or_review"
          review_points_or_conditions: >-
            Review is required if a concrete scene, affected-role perspective,
            public use, or decision context is introduced.
          notes: >-
            The conceptual analysis should not be treated as final beyond its
            source material.
        R_reversible:
          status: "yes_if_kept_internal_and_revisable"
          real_return_or_exit_options: >-
            Revision, narrowing, suspension, or withdrawal of the reading remain
            available. Reversibility decreases if published or used as authority.
          notes: >-
            Any future application must preserve contestability and a path back
            from the model reading.
        result: "functional_asymmetry_for_internal_working_note_with_IA_risk_if_transmitted_or_operationalized"
        short_justification: >-
          The current asymmetry is acceptable only because the analysis is
          transparent, justified as conceptual review, time/review-bound, and
          reversible. It becomes IA-risk if the same material is used as verdict,
          intervention, or person-facing assessment.
        immediate_action: >-
          Keep as working note; require concrete scene packet, counter-
          perspective, and independent authority before any application.

    ia_localisation:
      knowing:
        issue: >-
          The analysis knows model-layer structure but lacks scene facts,
          affected-role perspectives, and evidence of real Ω, costs,
          alternatives, or repair enactments.
        possible_intervention: >-
          Add a bounded scene packet, explicit material/inference distinction,
          role perspectives, and falsifier conditions before any stronger claim.
      being_able:
        issue: >-
          The analysis can structure concepts but cannot determine real-world
          responsibility, power, maturity, or dignity dynamics.
        possible_intervention: >-
          Limit output to structural reflection and require accountable process
          for any real-world use.
      being_permitted:
        issue: >-
          No permission or authority exists for diagnosis, HR decision,
          sanction, therapy planning, public D-reading, or person evaluation.
        possible_intervention: >-
          Preserve non-authority statement and refuse red-zone use.
      willing:
        issue: >-
          Willingness risk lies in possible overuse of model coherence or desire
          for full-depth completion despite missing concrete material.
        possible_intervention: >-
          Keep refusal-to-overclaim as part of full-depth analysis, not as lack
          of depth.

    ia_protection:
      transparency_measures:
        - "State that the object is a layered conceptual case analysis, not a real person or concrete relationship."
        - "Separate prior PMS/EDEN source findings from MIP inferences."
        - "Mark all concrete role responsibility and action-power as indeterminate."
      justification_measures:
        - "Use MIP only for maturity-in-practice review and guardrail hygiene."
        - "Justify D activation only as protection signal, not as dignity assessment."
        - "Justify A-band only for analysis posture, not for a person or event."
      time_boundedness_measures:
        - "Treat the report as valid only for the current source material."
        - "Require review when new scene data or use context appears."
        - "Do not preserve provisional bands after a concrete scene is introduced without recalibration."
      reversibility_measures:
        - "Maintain revision, narrowing, suspension, and withdrawal options."
        - "Do not use YAML form as finality."
        - "Preserve counter-perspectives as structurally capable of defeating the reading."
      participation_or_voice_measures:
        - "No affected-role voice exists in the current material."
        - "Future application requires affected-role contestation standing."
        - "Disagreement must not be treated as proof of immaturity or EDEN drift."
      dignity_protection_measures:
        - "Keep D0 outside analysis."
        - "Use D1/D2 only qualitatively and role-bound if ever concretized."
        - "Avoid public D-readings of identifiable persons."
        - "Protect refusal, non-repair, silence, and withdrawal from automatic degradation."
      review_or_falsifier:
        date_or_interval: "on_introduction_of_any_concrete_scene_or_before_any_transmission_beyond_internal_reflection"
        falsifier_question: >-
          Does concrete evidence show that the layered PMS/EDEN/MIP reading
          over-assimilates the scene, assigns responsibility without real
          alternatives, or suppresses a stronger rival/counter-perspective?
        responsible_roles:
          - "future analyst"
          - "reviewer or moderator"
          - "affected role positions if a concrete case is introduced"
          - "independent authority if any application is contemplated"

    trajectory:
      principle: "Trajectories, not labels."
      timeline:
        - timepoint: "t0"
          short_description: >-
            PMS Core conceptual trust-repair projection: distinctions,
            expectations, non-events, possible asymmetry, temporality,
            recontextualization, distance, conditional integration, and analytic
            self-binding are mapped without concrete scene adjudication.
          A_band: "6-7 for conceptual awareness discipline; not concrete scene score"
          M_band: "not assigned for roles"
          D_observation_optional: "Dignity-in-Practice present as application constraint only"
          key_context_role_power_situation: "High operator coverage; no concrete role evidence."
        - timepoint: "t1"
          short_description: >-
            PMS-EDEN overlay adds threshold tests for real Ω, false coordination,
            R/Action-Power distribution, Σ/Ψ status, cost distribution,
            non-action/non-binding, counter-scenes, falsifiers, and firewall;
            strong EDEN claims remain suspended.
          A_band: "6-7 for boundary awareness; capped by absent scene packet"
          M_band: "not assigned for roles; analysis-layer responsibility active"
          D_observation_optional: "D protected through no sex truth, no person label, no humiliation, no action authority"
          key_context_role_power_situation: "Normative overlay power managed by description/application firewall."
        - timepoint: "t2"
          short_description: >-
            MIP review evaluates the maturity-in-practice of the layered
            analysis. It preserves A/C strengths, withholds concrete R/P/M,
            activates D only as protection, and sets transmission to working
            note.
          A_band: "6-7 provisional for analysis posture"
          M_band: "concrete M withheld; analysis-layer M bounded"
          D_observation_optional: "D-module active as protection signal only; no D-Quick-Grid level assigned"
          key_context_role_power_situation: "The main maturity task is restraint under high conceptual structuring power."
      A_t:
        pattern: >-
          Awareness increases across layers: PMS differentiates the trust field,
          EDEN sharpens asymmetry/correctability/firewall awareness, and MIP
          adds score/D/transmission hygiene. The trajectory is upward in
          meta-awareness but capped by absent scene evidence.
        notes: >-
          Higher conceptual awareness does not equal higher empirical adequacy.
      M_t_RVR_t:
        RVR_description: >-
          RVR(t) improves at the analysis layer because reversibility,
          reviewability, and falsifiability become more explicit from Core to
          EDEN to MIP. RVR(t) for any real role is unknown.
        knowledge_over_time: >-
          Knowledge of model limits becomes clearer; knowledge of scene facts
          does not increase.
        leverage_over_time: >-
          Textual/procedural leverage improves through guardrails and working-
          note status; real-world leverage remains absent.
        alternatives_over_time: >-
          Alternatives become clearer: suspend, narrow, request scene packet,
          preserve counter-perspective, decline red-zone use.
        ceiling_rule_over_time: >-
          The ceiling rule continues to block high concrete M because
          predictability and alternatives for real roles are unknown.
      D_t_optional:
        active: true
        qualitative_course: >-
          D moves from PMS Dignity-in-Practice as constraint, through EDEN
          dignity/firewall protection, into MIP D0/D1/D2 hygiene. The course is
          protective rather than evaluative.
        D_quick_grid_movement_if_used: "not_used_no_level_assigned"
        note: "No D-score; only qualitative trajectory."

    D_module_optional:
      active: true
      activation_reason: >-
        Activated because the prior PMS and EDEN analyses explicitly involve
        dignity-in-practice, asymmetry, publicness risk, shaming risk,
        non-coercion, and firewall concerns. Activation is strictly protective
        and qualitative.
      communication_space: "internal_structural_review_not_public_not_person_facing"
      guardrails_checked:
        scenic: true
        context_bound: true
        role_bound: true
        time_windowed: true
        no_global_statement_about_persons: true
        no_dignity_score: true
        D0_untouched: true
      D_profile:
        D1_self_treatment_D_I_D_B:
          observed_enactments: >-
            No concrete self-treatment enactments are observed. D-I/D-B remain
            non-applicable except as a prohibition against inferring inner state,
            self-worth, self-neglect, or self-devaluation.
          context_notes: >-
            The case object is a YAML analysis artifact, not a person or body.
          trend_band_qualitative: "not_applicable_no_concrete_D1_scene"
        D2_relational_dignity_D_R:
          observed_enactments: >-
            The analysis itself preserves relational dignity by avoiding person
            labels, refusal-pathologizing, forced reconciliation, diagnosis,
            sex truth, public exposure, and verdictive use.
          context_notes: >-
            D2 is read only as the analysis posture toward possible role
            positions, not as a statement about those positions.
          interpretive_reading_not_judgment: >-
            The dignity-relevant maturity lies in restraint: maintaining
            interpretive distance while keeping possible vulnerability and
            protection goods visible.
        D_P_public_dignity:
          active_if_publicness_relevant: true
          observed_enactments: >-
            Public dignity protection is present as a boundary: no public D
            reading of identifiable persons; no use for shaming, ranking,
            doxing, humiliation, or reputational attack.
          private_public_tension: >-
            The analysis is acceptable as internal conceptual working note but
            becomes risky if publicly attached to real parties.
          publicity_context: "non-public_by_default"
        A_M_D_link_without_mixing:
          A_band_reference: "6-7 provisional for analysis posture only"
          M_band_reference: "concrete role M not assigned; analysis-layer responsibility bounded"
          D_tendency: >-
            Protective D tendency: the stronger the conceptual model power, the
            more important it becomes to protect D0, avoid D-scoring, and refuse
            humiliation.
          protection_or_responsibility_implication: >-
            The responsible implication is not action against anyone but
            disciplined non-transmission and review before any concrete use.
      D_Quick_Grid:
        used: false
        level: "not_assigned"
        preferred_wording: "This constellation currently shows level-__ D stress in this role / context / time window."
        forbidden_wording_avoided: true
        movement_question: >-
          What would be one small, real action that could make this constellation
          one level more dignified — and who has A and M levers for that?

    meta_notes:
      bias_risks:
        confirmation_bias: >-
          Risk: selecting only evidence that supports PMS/EDEN/MIP coherence.
          Control: retain rival readings and concrete-scene requirements.
        hindsight_bias: >-
          Risk: reading the final layered structure as if it had always been
          empirically grounded. Control: maintain the chronology of additions and
          the absent scene packet.
        status_quo_loyalty_bias: >-
          Risk: using guardrails to avoid naming future real responsibility.
          Control: distinguish current non-assignment from future evidence-based
          responsibility mapping.
        halo_horn_effects: >-
          Risk: treating model elegance as maturity, or treating missing scene
          data as failure. Control: evaluate only documented fields.
        in_group_out_group_bias: >-
          Risk: privileging those fluent in the model language. Control: require
          public intelligibility and affected-role contestation for application.
        dignity_bias_effect: >-
          Risk: D-language can either overprotect against accountability or
          become moralized shame. Control: D is protection signal, not score,
          shield, or weapon.
      norm_assumptions:
        explicit_norms:
          - "Enactments, roles, and structures may be analyzed; person worth may not."
          - "D0 is inviolable, immeasurable, non-rankable, and untouched."
          - "Maturity readings must be role-, context-, and time-window-bound."
          - "Asymmetry is not failure by itself; failed transparency, justification, time-boundedness, or reversibility creates IA-risk."
          - "Description does not authorize action."
          - "Refusal, withdrawal, silence, and non-repair are not immature by default."
        implicit_norms:
          - "Trust repair requires adequate distinction between coherence, responsibility, power, and dignity protection."
          - "A strong conceptual grammar increases the duty of restraint."
          - "Concrete application requires affected-role voice and falsifiability."
        dignity_concepts:
          - "D0: ontological dignity, outside metrics."
          - "D1: self-dignity in practice, not assessable here."
          - "D2: relational/public dignity in practice, used here only as protection guardrail."
          - "PMS Dignity-in-Practice and MIP D are aligned as praxeological constraints, not metaphysical rankings."
        normative_position_of_D_reading: >-
          The D-reading is minimal and protective: it exists to prevent shame,
          humiliation, person labels, dignity scoring, and coercive use. It does
          not assess anyone's dignity or maturity as a person.
      intuition:
        initial_intuition: >-
          The layered PMS/EDEN case appears mature in guardrail discipline but
          necessarily incomplete for concrete action, responsibility, and repair
          outcome.
        used_as_sensor_not_judge: true
        checked_afterwards: true
        supporting_evidence: >-
          The prior layers repeatedly suspend concrete claims, preserve
          non-capture, require scene packet, and maintain firewall discipline.
        contradicting_evidence: >-
          The YAML density and formal coherence could still create an impression
          of stronger adequacy than the missing evidence allows.
      possible_alternative_interpretations:
        - "The case could be read as primarily epistemic trust analysis rather than maturity analysis."
        - "It could be read as a legal/institutional accountability problem requiring non-MIP standards."
        - "It could be read as affective or phenomenological vulnerability that structural models only partially capture."
        - "It could be read as justified refusal or irreparable non-fit rather than repair failure."
        - "It could be read as a model documentation exercise rather than a case analysis."
      counter_perspective:
        from_other_side: >-
          A future role criticized by the analysis could say: no concrete action,
          power, knowledge, predictability, or alternative has been shown, so no
          maturity or responsibility conclusion is legitimate.
        from_affected_side: >-
          A future affected role could say: excessive caution may protect the
          analysis but understate real vulnerability, cost, or obstruction if
          those are later evidenced.
        from_external_observer: >-
          An external observer could say: the model stack is internally elegant
          but needs simpler public explanation, explicit evidence thresholds,
          and rival-framework comparison before use.

    open_questions_and_blind_spots:
      missing_information:
        - "Who, if anyone, is involved in a future concrete trust-repair scene?"
        - "What exactly happened, did not happen, or was expected?"
        - "Which frame governs the expectation: interpersonal, institutional, legal, epistemic, familial, political, or other?"
        - "What real Ω exists, in what direction, and with what cost/exposure distribution?"
        - "What knowledge, power/control, predictability, alternatives, and integration attempts are available to each role?"
        - "What repair actions, refusals, withdrawals, or non-actions occurred over time?"
        - "Which affected roles contest the reading, and on what grounds?"
        - "Which rival model discriminates better?"
      uncertain_assumptions:
        - "That the prior PMS Core and EDEN layers are the intended sources for this MIP analysis."
        - "That the use context remains internal and conceptual."
        - "That no identifiable person or active conflict is being targeted."
        - "That D activation as protection signal is safer than leaving D fully off."
      weak_points_in_analysis:
        - "A-score remains provisional because the object is a model-layer artifact rather than a full scene."
        - "M-score cannot be assigned to concrete roles."
        - "IA-box cannot decide functional versus inadult asymmetry for a real scene."
        - "D-module cannot generate a D-profile for real enactments."
        - "Full-depth YAML may itself create false authority if detached from guardrails."
      needed_perspectives:
        - "Affected role perspective if a concrete scene is introduced."
        - "Counterparty or differently positioned role perspective."
        - "External reviewer not invested in PMS/EDEN/MIP coherence."
        - "Domain expert perspective if legal, clinical, organizational, or institutional stakes arise."
        - "Plain-language public intelligibility review before any broader transmission."

    possible_steps_towards_maturity:
      decision_mode: "non_prescriptive_structural_working_note"
      functional_next_step:
        action: >-
          If concrete application is desired later, first create a bounded scene
          packet with roles, chronology, information basis, publicness, real Ω,
          cost distribution, alternatives, counter-perspectives, and falsifiers.
        reversible: true
        responsible_role: "future analyst_or_moderated_review_process"
      short_term_feasible:
        - "Keep this MIP analysis attached to the PMS/EDEN working-note boundary."
        - "Do not quote A-band or D-language without the non-person-score caveat."
        - "Create a separate evidence packet before any concrete application."
        - "State explicitly that refusal, silence, delay, or non-binding is not immature by default."
      medium_term_feasible:
        - "Compare PMS/EDEN/MIP against at least one rival framework if a concrete scene is supplied."
        - "Develop activation thresholds for A, M, IA, and D in future trust-repair scenes."
        - "Add plain-language report rules to prevent YAML authority inflation."
        - "Use a reviewer to test whether counter-perspectives could actually defeat the reading."
      overambitious_or_risky:
        - "Assigning M-bands to role_A or role_B now."
        - "Using D-Quick-Grid levels now."
        - "Producing a repair protocol or reconciliation recommendation from the conceptual case."
        - "Treating EDEN false coordination as present."
        - "Using the analysis for public, HR, legal, clinical, or interpersonal pressure."
      protection_first_if_low_M_high_harm:
        - "If later concrete harm appears but M remains low or unclear, prioritize protection and stabilization over blame."
        - "If affected dignity is at risk, reduce publicity and increase safe review before interpretation."
        - "If alternatives were absent, do not inflate responsibility through hindsight."
      structural_change_if_high_M:
        - "If future evidence shows high knowledge, high power/control, foreseeable consequences, real alternatives, and no serious integration attempt, then structural correction should target roles, processes, and asymmetry conditions rather than person-worth."
        - "If real Ω is falsely coordinated, future steps should restore transparency, justification, time-boundedness, reversibility, voice, and responsibility attachment."

    transmission_check:
      pre_transmission_gate_passed: true
      final_checklist:
        scope_and_guardrails_checked: true
        roles_and_publicness_checked: true
        score_hygiene_checked: true
        bias_norm_intuition_checked: true
        consequences_and_reversibility_checked: true
        D_cleanliness_checked_if_relevant: true
      status: "working_note"
      if_not_transmittable_reason: >-
        Transmittable only as internal conceptual working note. Not
        transmittable as decision basis, person assessment, public D reading,
        responsibility assignment, repair prescription, EDEN finding, or PMS
        validation because no concrete scene packet or affected-role review is
        supplied.
      allowed_use_of_this_analysis:
        - "internal_reflection"
        - "model-layer quality control"
        - "structural_case_review"
        - "template-completion audit"
        - "pre-application checklist for future concrete scenes"
      not_allowed_use:
        - "person_label"
        - "public_shaming"
        - "individual_sanction"
        - "HR_decision"
        - "forensic_use"
        - "clinical_diagnosis"
        - "therapy_planning"
        - "repair_pressure_or_reconciliation_demand"
        - "EDEN_verdict"
        - "dignity_score"
        - "PMS_or_MIP_validation_claim"
      review_required:
        required: true
        review_date_or_condition: "before any use beyond internal conceptual reflection or when concrete scene data appears"
        falsifier: >-
          The analysis must be narrowed, suspended, or rewritten if a concrete
          scene shows no relevant Ω, no structured Λ, no maturity-relevant
          enactment, stronger rival explanation, affected-role contestation that
          defeats the frame, or any D/publicness risk that cannot be safely
          governed.

    uniform_report:
      generate_only_from_structured_fields: true
      title: "MIP Analysis of Repair Relationships over PMS Core and PMS-EDEN Layers"
      overview_4_to_7_sentences: >-
        This MIP analysis treats Repair Relationships as a completed PMS Core
        conceptual trust-repair projection plus a completed PMS-EDEN threshold
        overlay. The object of analysis is the layered case-analysis posture, not
        a concrete relationship or person. MIP finds relatively solid maturity in
        awareness and coherence because the prior layers preserve distinctions,
        non-capture, dependency discipline, EDEN suspension, and the
        description-to-action firewall. Concrete responsibility, power-to-act,
        M-score, IA result, and D-profile cannot be assigned because no scene
        packet, role evidence, chronology, cost map, or affected-role voice is
        supplied. The D-module is active only as a dignity-protection guardrail,
        not as a dignity score or person reading. The report remains a working
        note and must not be used as decision basis, diagnosis, verdict,
        intervention, or repair demand.
      key_findings:
        - "A-awareness is strong at the model-layer level but capped by absent concrete evidence."
        - "C-coherence is strong because PMS Core, EDEN overlay, and MIP review remain properly separated."
        - "Concrete R/M is withheld; responsibility is currently located in analysis restraint and transmission hygiene."
        - "P-power-to-act is textual/procedural for the analyst and unknown for future real roles."
        - "IA-box result is functional only for internal working-note asymmetry; it becomes IA-risk if transmitted as authority."
        - "D is activated only as protection against shame, ranking, coercion, and public dignity harm."
        - "Future application requires a bounded scene packet, counter-perspectives, falsifiers, and independent authority."
      A_summary: >-
        Provisional A-band 6-7 for the analysis posture: strong distinctions,
        bias awareness, publicness awareness, and guardrail awareness, but capped
        by no empirical scene.
      M_summary: >-
        No concrete M-band is assigned. Analysis-layer responsibility is active
        and bounded: the output must remain restrained, revisable, and
        non-decisional.
      IA_box_summary: >-
        The main IA is methodological: high model structuring power versus low
        evidence. It is functional as internal working note because it is
        transparent, justified, review-bound, and reversible; it becomes IA-risk
        if operationalized.
      D_summary_if_activated: >-
