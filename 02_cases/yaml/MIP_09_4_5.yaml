schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
mip_application_status: case_analysis_using_MIP_yaml_as_application_schema_not_PMS_Base
base_and_overlay_alignment:
  pms_base_reference: PMS.yaml remains the only PMS Base reference.
  eden_overlay_reference: PMS-EDEN.yaml is treated as overlay/application profile only.
  mip_role: MIP YAML is used here as a maturity-in-practice case application schema and model reference; it does not redefine PMS operators or EDEN overlay terms.
  core_case_relation: Based on completed PMS Core case YAML and completed PMS-EDEN overlay YAML for Repair Relationships.
  reflection_mode: 'off'
  analysis_depth: full
case:
  meta:
    case_id: MIP-Repair-Relationships-PMS-EDEN-overlay-001
    case_title: Repair Relationships
    documentation_date: '2026-05-29'
    analysts:
      - name: ChatGPT (GPT-5.5 Thinking)
        role: structural formalization assistant
        observer_position: structural analyst applying MIP after PMS Core and PMS-EDEN overlay, without authority over persons, institutions, legal findings, clinical decisions, or PMS Base
    language: English
    confidentiality_level: internal
    analysis_mode: full
    intended_use: structural MIP application based on the completed PMS Core case YAML and PMS-EDEN overlay YAML; working note only, not decision basis
    application_zone: yellow
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto_activated_with_guardrails
      output_format: yaml
      discipline_profile: philosophy_anthropology_with_generic_structural_guardrails
      d_activation_decision: activated_qualitatively_because_trust_repair_involves_vulnerability_asymmetry_devaluation_and_humiliation_risks_but_no_D_score_or_person_level_D_reading_is_made
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: Stop or downgrade to a non-transmittable working note; do not use the analysis for diagnosis, adjudication, ranking, sanction, public exposure, or irreversible decisions.
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: true
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: Dial D down immediately, keep D0 untouched, remove any person-level wording, and work only on structures, protection goods, reversibility, and concrete enactment conditions.
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: 'Conceptual case material: trust may be tested, damaged, withdrawn, or restored through reliance, vulnerability, expectation, confidence, doubt, repair, or betrayal between persons, roles, claims, or institutions.'
    secondary_material: Completed PMS Core case YAML and PMS-EDEN overlay YAML for Repair Relationships, with PMS.yaml retained as PMS Base and PMS-EDEN treated as overlay/application profile only; MIP YAML used here as a separate maturity-in-practice application schema.
    assumptions_and_inferences: The MIP analysis treats the case as a conceptual, non-concrete trust-repair field. It infers role-positions and structural risks only from the supplied case material and from prior PMS/EDEN structural analyses. It does not infer facts about any real person, institution, breach, motive, diagnosis, legal liability, repair outcome, or empirical pattern.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: medium
      reliability_estimate: medium
      known_gaps:
      - High coverage exists for abstract structural mapping, but low coverage exists for concrete scene evaluation because no actors, events, evidence, chronology, institution, role mandate, or repair enactment are supplied.
      - The analysis is reliable as a bounded structural application only if all non-diagnostic, non-tribunal, non-person-ranking, non-empirical, and non-legal limits are preserved.
      - No concrete praxis scene, actor map, chronology, evidence sequence, institutional procedure, or repair outcome is provided.
      - No specified expectation is tied to a particular role or publicness level.
      - No observed enactment is available for Action_E, MIP P, IA classification, or RVR(t) curve calibration.
      - No empirical, legal, clinical, or implementation validation is supplied.
      - No rival framework comparison has been operationalized beyond preserving rival readings.
      main_bias_risks_here:
      - 'Coherence bias: PMS, EDEN, and MIP can all produce a smooth structural reading of trust repair without proving that repair, betrayal, responsibility, or drift occurred.'
      - 'Over-formalization bias: conceptual elegance may hide the absence of concrete evidence.'
      - 'Tribunal drift: trust/betrayal language can easily become verdict language unless Χ, reversibility, D, and MIP guardrails remain active.'
      - 'Dignity-bias effect: the presence of vulnerability, devaluation, or humiliation risks may tempt overuse of the D-module.'
      - 'Overlay inflation risk: EDEN drift handles such as pseudo-symmetry, NRK, or PFO may be over-applied to a non-concrete case.'
  snapshot:
    short_case_description: A conceptual trust-repair case concerning how reliance, vulnerability, expectation, confidence, doubt, repair, withdrawal, or betrayal can test relational, role-based, epistemic, institutional, or claim-based praxis. The case has already been structurally mapped through PMS Core and EDEN overlay; MIP now inspects maturity-in-practice dimensions without turning the case into a concrete scene.
    central_actors_and_roles:
    - 'Relying role-position: a person, role, claim-holder, or institution whose trust or vulnerability may be exposed.'
    - 'Relied-upon role-position: a person, role, claim, or institution from which reliability, acknowledgement, repair, restraint, or continuity may be expected.'
    - 'Repair-bearing role-position: any role-position that may need to acknowledge, re-bind, coordinate, or enact repair under asymmetry.'
    - 'Observer/analyst role-position: a structural analyst who must preserve non-diagnosis, non-ranking, reversibility, and Dignity-in-Practice.'
    guiding_question: What can MIP say, without overclaiming, about awareness, coherence, responsibility, power-to-act, dignity-in-practice, asymmetry handling, and maturity conditions in a conceptual trust-repair field already analyzed through PMS Core and EDEN?
    level:
    - conceptual_domain_projection
    - role_and_structure_level
    - not_a_concrete_praxis_scene
    - not_person_level
    first_visible_asymmetry: Potential asymmetry appears through reliance, vulnerability, role obligation, institutional position, credibility, exposure, and unequal repair burdens, but no direction, magnitude, or responsible role can be concretely assigned.
    first_visible_D_themes_optional:
    - possible dignity stress where vulnerability becomes humiliation, devaluation, shaming, forced reconciliation, or standing loss
    - possible dignity protection where Χ, reversibility, non-ranking, and role-bound self-binding prevent tribunal use
    - D0 remains untouched and no D-score is assigned
  role_mapping:
    object_of_observation:
      type: conceptual_case_field
      description: The object of observation is the trust-repair configuration named Repair Relationships, not a person, not a group, not an institution as such, and not a completed empirical episode.
      role: case-field for structural maturity-in-practice inspection
      not_person_as_whole: true
    observer_position:
      role: structural analyst applying MIP after PMS Core and EDEN overlay
      power_relation_to_object: The analyst has interpretive framing power inside this chat output but no authority over real persons, institutions, legal findings, clinical decisions, or future enactments.
      possible_effects_of_analysis: The analysis may clarify structural conditions and risks, but it could mislead if treated as verdict, score, diagnosis, intervention plan, maturity ranking, legal finding, or empirical proof.
    involved_roles:
    - role: relying role-position
      mandate: Maintain or withdraw trust only within a frame where expectations, vulnerability, and consequences are sufficiently clear.
      built_in_asymmetries:
      - exposure through dependence
      - limited knowledge of the other role-position’s intention or capacity
      - possible unequal cost if trust is misplaced or repair fails
      publicness_level: under_specified; may range from private interpersonal reliance to institutional public trust
      dignity_exposure: possible exposure to shame, standing loss, self-devaluation, or coercive repair pressure if D guardrails fail
    - role: relied-upon or repair-bearing role-position
      mandate: Carry role-specific reliability, acknowledgement, explanation, repair, or boundary-setting where the frame creates such expectations.
      built_in_asymmetries:
      - capacity to fulfill, withhold, delay, or frame repair
      - possible authority over how absence or rupture is interpreted
      - possible temptation to convert responsibility into authority or parity into exit
      publicness_level: under_specified; publicness becomes relevant if institutional claims, public trust, reputation, or standing are involved
      dignity_exposure: possible risk of being globally blamed, pathologized, ranked, or reduced to betrayal if scene-bound limits are lost
    - role: institutional or claim-bearing role-position
      mandate: If present, preserve transparent expectations, procedures, reviewability, and non-humiliating repair channels.
      built_in_asymmetries:
      - formal power may exceed real accountability
      - public legitimacy may obscure private costs
      - procedural closure may suppress Λ rather than convert it into Σ work
      publicness_level: potentially medium to high, but not specified
      dignity_exposure: risk of public shaming or reputational devaluation if institutionality becomes tribunal framing
    publicness:
      level: under_specified_low_to_high_range
      A_P_relevance: Publicness awareness is important because trust repair changes when a private rupture becomes public, institutional, reputational, or role-legible.
      P_PU_relevance: Public power-to-act is under-specified; in concrete scenes, public voice, institutional procedure, or reputational pressure may increase or distort actual levers.
      D_P_relevance_if_D_active: 'D-P is relevant only qualitatively: public exposure, humiliation, status regulation, or public repair language must not become D-score or person judgment.'
      public_shaming_risk: Low in the current abstract chat analysis, potentially high in any public or identifiable application.
      reversibility_risk: Currently controlled by abstraction and non-identifiability; rises sharply if applied to identifiable persons, groups, or institutions without a safe frame.
  frame_vs_variability:
    frame_elements:
      - element: The case is explicitly a philosophical and structural trust-repair field, not an empirical file.
        reason_fixed_or_slow: This follows directly from the case title, case material, and prior PMS Core claim typing; it should not be changed without new case material.
        protected_goods:
          - non-diagnostic analysis
          - non-tribunal interpretation
          - PMS Base discipline
          - non-capture preservation
      - element: PMS Core establishes that the case is not a concrete praxis scene and that empirical, metaphysical, diagnostic, legal, implementation, and PMS Base validation claims are unwarranted.
        reason_fixed_or_slow: This is a governing boundary from the completed PMS Core case YAML and remains binding for MIP use.
        protected_goods:
          - claim-typing hygiene
          - score hygiene
          - reversibility
          - refusal of overclaim
      - element: EDEN overlay adds possible drift-risk visibility but rejects PFO, permanentized exception, NRK-as-action, and active reciprocity loss as unwarranted.
        reason_fixed_or_slow: This follows from the completed PMS-EDEN overlay and prevents EDEN inflation.
        protected_goods:
          - overlay discipline
          - non-person-labeling
          - drift-risk conditionality
          - rival-reading openness
      - element: MIP application must preserve role-bound, enactment-bound, time-windowed interpretation and cannot score persons.
        reason_fixed_or_slow: This follows from MIP guardrails and score hygiene.
        protected_goods:
          - profile-not-person discipline
          - D0 protection
          - no dignity scoring
          - no maturity ranking
    variability_elements:
      - element: Actual trust-repair scenes may be interpersonal, institutional, epistemic, legal, familial, political, professional, or public.
        possible_change: A later concrete scene could shift the dominant frame and change which A-C-R-P-D fields carry analytic weight.
        responsible_roles:
          - future structural analyst
          - safe case reviewer if identifiable persons or institutions are involved
      - element: The same trust rupture may be betrayal, misunderstanding, justified refusal, boundary-setting, legal breach, clinical repair context, institutional stress, or non-capture depending on frame and evidence.
        possible_change: Rival readings may become stronger than PMS, EDEN, or MIP once concrete evidence is supplied.
        responsible_roles:
          - future structural analyst
          - affected role-positions in a safe process if concrete application occurs
      - element: Asymmetry may be minimal, functional, harmful, temporary, reciprocal, public, hidden, or role-structured.
        possible_change: IA-box classification could change if a concrete Ω/Θ/publicness topology is documented.
        responsible_roles:
          - future structural analyst
          - institutional reviewer if formal roles are involved
      - element: Repair may be enacted, simulated, delayed, refused, impossible, coercively demanded, or responsibly withheld.
        possible_change: Action_E, MIP P, M-score, D-profile, and EDEN drift handles could become assessable only after concrete enactment data are supplied.
        responsible_roles:
          - future structural analyst
          - relevant role-holders if a concrete scene is later reviewed
    unfair_high_M_zones:
    - High M-score would be unfair where no concrete actor, predictability, real alternatives, leverage, or serious integration opportunity is documented.
    - High maturity expectations would be unfair under severe uncertainty, lack of information, dependency, coercion, institutional constraint, or absence of safe repair channels.
    - A role-position should not be assigned high shared responsibility merely because it is visible in the narrative or because the structural account is coherent.
    system_as_excuse_risk:
    - System constraints must not become an excuse for avoidable non-repair, unmarked asymmetry activation, or responsibility-to-authority if a concrete scene later shows real levers.
    - Conversely, role-level responsibility must not obscure institutional frames, publicness, scarce information, or asymmetrical cost structures.
    - MIP must keep both system co-causation and role-specific responsibility visible without converting either into blame.
    D1_D2_realistically_improvable_where:
    - D1/D2 could improve through clearer non-humiliating language, explicit role boundaries, named expectations, reversible repair channels, and refusal of person-ranking.
    - D2 could improve through interaction practices that acknowledge vulnerability without converting it into superiority, accusation, or entitlement.
    - D-P could improve through private or moderated review rather than public shaming where identifiable persons or institutions are involved.
  acrp_profile:
    A_awareness:
      observations: 'Awareness is structurally strong at the conceptual level: the case and prior PMS/EDEN analyses distinguish trust, distrust, reliance, withdrawal, repair, betrayal, expectation, meaningful absence, asymmetry, temporality, non-capture, and rival formalizations. Awareness is weak at the concrete level because no scene, actor, chronology, role mandate, or evidence is supplied.'
      available_information: Available information includes the original conceptual case material, the completed PMS Core case YAML, the completed EDEN overlay YAML, and MIP definitions. It does not include empirical testimony, observed behavior, institutional records, legal standards, clinical data, or implementation details.
      realistically_knowable: Realistically knowable at this stage are only structural possibilities, boundary conditions, and required future evidence. Not realistically knowable are who is responsible, whether betrayal occurred, whether repair succeeded, whether refusal is justified, or whether EDEN drift is active.
      blind_spots: Major blind spots include missing scene data, missing role-position histories, missing publicness level, missing power topology, missing timing, missing repair attempts, missing affected perspectives, and missing rival-model testing.
      role_awareness_A_R: 'Role awareness is partial: relying, relied-upon, repair-bearing, claim-bearing, institutional, and observer roles can be named abstractly, but their mandates and burdens cannot be assigned concretely.'
      publicness_awareness_A_P: Publicness awareness is active as a risk boundary. The analysis notes that trust repair changes under public, institutional, reputational, or shame-exposure conditions, but the case provides no actual publicness level.
      bias_awareness: 'Bias awareness is high as a guardrail: coherence bias, over-formalization bias, tribunal drift, D-module inflation, and EDEN overlay inflation are explicitly marked.'
    C_coherence:
      observations: Coherence is strong as a formal case artefact because PMS Core, EDEN overlay, and MIP can be aligned without redefining operators or making overclaims. Coherence is not evidence of concrete repair or truth. The conceptual case remains under-discriminating unless later scenes test the distinctions.
      word_deed_relation: No word-deed relation can be assessed because no concrete promise, statement, apology, refusal, institutional claim, or repair action is supplied.
      role_context_coherence: 'Role-context coherence is partial: the analysis preserves role language and avoids person labels, but actual role obligations are not specified.'
      narrative_coherence: 'Narrative coherence is high in the analytic document: trust repair is presented as a field involving expectation, asymmetry, temporality, non-event, recontextualization, distance, integration, and possible self-binding. However, this narrative remains a structured hypothesis, not a demonstrated case story.'
      breaks_named_or_hidden: 'Breaks are named rather than hidden: missing concrete scene, weak Σ/Ψ, non-assigned A/M bands, no IA result, no Action_E, PFO not applicable, and rival readings preserved.'
    R_responsibility:
      observations: Responsibility is thematically central but not assignable. The case concerns trust repair, but no specific role-position, knowledge, power, predictability, alternatives, or integration attempt is documented.
      responsibility_points: Possible future responsibility points include expectation-setting, timely response, acknowledgement of Λ, repair burden, asymmetry naming, restraint under publicness, and role-specific self-binding. These remain possible points, not findings.
      assumed_responsibility: 'The analysis itself assumes responsibility for not overclaiming: it maintains non-diagnosis, non-ranking, reversibility, D0 protection, and distinction between structural mapping and verdict.'
      shifted_or_refused_responsibility: No concrete shifted or refused responsibility is evidenced. EDEN markers such as parity-to-exit, responsibility-to-authority, or Ψ externalization remain risks only.
      burdens_and_consequences: Potential burdens include vulnerability exposure, repair labor, interpretive uncertainty, publicness risk, dignity stress, and asymmetrical cost-bearing. Actual consequences are unknown.
    P_power_to_act:
      observations: Power-to-act is under-specified at the case level. The analysis can identify possible levers but cannot assign actual capacity, permission, institutional authority, or feasible action.
      real_levers: 'Current real levers belong only to the analytic artefact: keep analysis reversible, require concrete scene data before scoring, mark non-capture, preserve D guardrails, and avoid use as decision basis.'
      formal_vs_real_options: Formal options such as repair, refusal, apology, withdrawal, recontextualization, institutional review, or renewed trust are conceptually available. Real options are unknown because constraints, dependencies, and risks are not supplied.
      used_options: Used analytic options include structural mapping, explicit boundary-setting, refusal of overclaim, D-module activation with guardrails, and non-assignment of maturity or responsibility scores.
      unused_options: Unused and intentionally withheld options include person scoring, legal/forensic conclusion, clinical diagnosis, implementation protocol, public recommendation, PMS Base validation, and EDEN drift classification.
      ceiling_rule_relevance: 'The ceiling rule is highly relevant: because predictability and access to real alternatives are not documented, no high M-band can be assigned to any role-position.'
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: No concrete self-devaluation is evidenced. Conceptually, trust rupture may produce self-blame or loss of standing, but this cannot be inferred.
      self_neglect: No concrete self-neglect is evidenced. It remains outside the case material.
      shame_dynamics: Shame dynamics are a possible risk where vulnerability, betrayal, publicness, devaluation, or humiliation appear, but no such dynamic is established.
      degradation_of_others: No degradation of others is evidenced. EDEN devaluation and humiliation remain residual stabilization risks, not findings.
      public_shaming: No public shaming is present in the abstract analysis. Public shaming risk would rise if applied to identifiable persons or institutions.
      protest_or_refusal: Protest, withdrawal, and refusal remain possible legitimate responses and must not automatically be classified as immaturity, drift, low integration, or failed repair.
      dignity_protection: Dignity protection is active in the analysis through D0 untouchability, no D-score, no person labels, non-public default, Χ, reversibility, and refusal to use trust-repair language as coercion.
    next_step_if_relevant: If a concrete scene is later supplied, perform a role-bound D-profile only in a safe communication space, with D0 untouched, no public person-level D reading, no dignity score, and explicit review of whether D language brings more clarity than shame.
  acrpd_submodules_profile:
    A:
      A-I: Information awareness is high about formal limitations and low about concrete facts. The analysis knows what it does not know.
      A-R: 'Role awareness is partial: role-positions are named abstractly, but mandates and actual obligations remain under-specified.'
      A-C: Context awareness is moderate to high at the conceptual level because PMS, EDEN, and MIP boundaries are distinguished; concrete context is absent.
      A-IM: 'Impact awareness is high for misuse risks: diagnosis, shaming, tribunal drift, public ranking, and over-formalized certainty are explicitly blocked.'
      A-P: Publicness awareness is active as a risk marker but cannot be calibrated to an actual public/private scene.
    C:
      C-S: 'Structural coherence is strong across the analytic artefact: PMS Core, EDEN overlay, and MIP can be layered without redefining Base terms.'
      C-P: Praxis coherence is not assessable because no concrete enactment, promise, repair action, refusal, or institutional practice is provided.
      C-N: Narrative coherence is high but guarded; the account is coherent while explicitly refusing to treat coherence as truth or repair.
      C-I: 'Interface coherence is partial: PMS/EDEN/MIP boundaries are maintained, but no external empirical, legal, clinical, or institutional interface is tested.'
    R:
      R-I: Individual responsibility is not assignable because no individual role-holder, knowledge state, leverage, or options are supplied.
      R-S: Social responsibility is conceptually relevant where trust relations distribute repair burdens, but not assignable without scene evidence.
      R-E: 'Ethical responsibility is relevant as a restraint condition: avoid coercive repair, humiliation, person-ranking, and overclaim. It is not a moral verdict.'
      R-P: Public responsibility is only a potential issue if institutional or public trust frames become concrete.
    P:
      P-I: Inner agency is not assessed because MIP does not infer inner states and the case is non-diagnostic.
      P-S: Social agency is possible but unmapped; roles may affect one another through reliance, recognition, withdrawal, or repair, but no concrete levers are known.
      P-C: Cultural agency is not assessed; cultural meanings of trust remain non-capture or rival-framework territory.
      P-PU: Public agency is under-specified; it becomes relevant only if public claims, institutional trust, reputation, or public repair procedures are supplied.
    D:
      active: true
      D-I: No inner dignity or self-relation claim is made. D-I remains a protected observation category only.
      D-B: No bodily or material self-care claim is made.
      D-R: 'Relational dignity is relevant as a guardrail: trust repair must not humiliate, rank, coerce, pathologize, or force reconciliation.'
      D-P: 'Public dignity is relevant as a risk boundary: publicness can convert repair into shaming or status regulation if D guardrails fail.'
      note: D is active qualitatively because the case concerns vulnerability, asymmetry, devaluation/humiliation risks, and Dignity-in-Practice. D0 is untouched and no D score or person-level D claim is made.
  scores_and_ia:
    A_score:
      A_band: not_assigned_due_to_non_concrete_scene
      boundary_confirmed: A-score would describe the maturity of an enactment, situation, or structure, not a person. Because the case supplies no concrete enactment, no numeric or band score is assigned.
      time_role_context: Conceptual trust-repair field across unspecified time, roles, and publicness; no stable H with enough evidence for A(H) scoring.
      justification:
        A_awareness: Awareness is structurally strong in the analytic artefact because distinctions, limits, biases, publicness risks, PMS/EDEN/MIP boundaries, and missing evidence are explicitly named; nevertheless this does not produce an A-band because no concrete enactment H exists.
        C_coherence: Coherence is strong at document level and guarded by non-overclaim; it remains insufficient for truth, repair, or maturity scoring.
        R_responsibility: Responsibility is thematically relevant but under-specified because no role-holder, knowledge state, options, leverage, or integration attempt is supplied.
        P_power_to_act: Power-to-act is under-specified because real levers, formal permissions, practical options, dependency constraints, and publicness pressures are unknown.
        modulators_context: Time pressure, access to information, role/power differentials, institutional rules, publicity, stress, group dynamics, and social resonance are all uncalibrated; this blocks scoring and requires yellow-zone caution.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned_due_to_missing_actor_role_trajectory_and_option_data
      boundary_confirmed: M-score would describe shared structural responsibility of an actor or role-holder X for trajectory and consequences, not guilt, fault, blame, moral worth, or personhood. No X is available for scoring.
      role_position_time_frame: No concrete role-position and time frame are sufficiently specified for M(X).
      five_factors:
        knowledge: Conceptually, knowledge and awareness are central; concretely, no actor knowledge or realistically knowable information is established.
        power_control: No real levers, permissions, dependencies, or intervention capacity are documented.
        predictability: Consequences of trust damage, repair, refusal, or delay are not predictable from the abstract material alone.
        access_to_alternatives: Alternatives are conceptually listable but not known as real available options for any role-position.
        serious_integration_attempt: No concrete attempt to name, mitigate, correct, or integrate risk is documented; only the analysis itself models such discipline.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: In the absence of a concrete actor, time frame, predictable consequences, and real alternatives, M cannot be high. The appropriate output is non-assignment rather than a low or high blame reading.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: Potential asymmetry is named as reliance, vulnerability, obligation, exposure, credibility, role position, institutional capacity, or repair burden, but not concretely located.
      boundary_confirmed: IA-box is an asymmetry check, not a verdict; R here means reversibility, not responsibility.
      T_transparent:
        status: partly
        notes: The analysis is transparent about its own limits, but the trust-repair scene itself lacks transparent actors, expectations, and information distribution.
      J_justified:
        status: unclear
        protected_good_or_purpose: No concrete protected good or purpose is supplied; possible goods could include reliability, safety, role accountability, procedural trust, or dignity protection, but none is established.
        notes: No concrete asymmetry is supplied; therefore its purpose, legitimacy, and one-sided advantage cannot be tested.
      TB_time_bound:
        status: unclear
        review_points_or_conditions: None supplied; a future concrete scene would need explicit review points, conditions, or time windows.
        notes: No concrete asymmetry, duration, review condition, or repair window is supplied.
      R_reversible:
        status: partly
        real_return_or_exit_options: Analysis-level reversibility is preserved by non-final wording and non-transmission as decision basis; real return or exit options in the trust scene are unknown.
        notes: The analysis remains reversible, non-final, and non-transmittable as a decision basis; reversibility of any real asymmetry is unknown.
      result: unclear
      short_justification: The IA-box cannot classify functional asymmetry, IA risk, or inadult asymmetry because the case is conceptual; it can only mark the questions that a later concrete scene would need to answer.
      immediate_action: Do not classify; preserve Χ, reversibility, D, non-capture, and require scene-bound role, expectation, time, and option data before any IA result.
  ia_localisation:
    knowing:
      issue: The analysis knows the structural template and prior PMS/EDEN outputs but lacks concrete facts about who knew what and when.
      possible_intervention: If a concrete scene is later provided, separate known, realistically knowable, unknown, and unknowable information for each role-position before any M or IA reading.
    being_able:
      issue: Actual capacity to repair, withdraw, acknowledge, review, refuse, or protect dignity is unknown.
      possible_intervention: Map real levers, dependencies, institutional constraints, safety risks, and available alternatives before assigning responsibility or recommending action.
    being_permitted:
      issue: Permissions and role mandates are not specified; formal permission may differ from practical permission or safe permission.
      possible_intervention: Clarify explicit rules, implicit norms, institutional procedures, publicness constraints, and safe communication spaces.
    willing:
      issue: Willingness is not inferred because MIP does not diagnose inner states or motives.
      possible_intervention: 'In concrete work, assess only observable enactments: whether risks are named, repair is attempted, refusal is bounded, or expectations are clarified.'
  ia_protection:
    transparency_measures:
    - Keep material/inference distinctions visible and do not present the structural reading as evidence.
    - Name the absence of concrete scene data in every downstream use.
    - Separate PMS Core, EDEN overlay, and MIP terms so that no model silently validates another.
    justification_measures:
    - Justify any future asymmetry reading by reference to role, frame, expectation, publicness, and consequence data, not by vocabulary fit.
    - Require rival explanations before treating EDEN drift handles as active.
    - Do not justify coercive action from structural mapping alone.
    time_boundedness_measures:
    - Treat this MIP output as a current working note for the abstract case only.
    - Reopen the analysis if a concrete scene, actor map, evidence sequence, or institutional frame is supplied.
    - Do not allow conceptual risk labels to become permanent descriptors.
    reversibility_measures:
    - 'Use non-final language: possible, weak, under-specified, not assigned, risk, boundary, not established.'
    - Preserve falsifier conditions and non-capture zones.
    - Avoid public or identifiable transmission unless a separate safety and purpose review is passed.
    participation_or_voice_measures:
    - In a concrete scene, include affected perspectives before responsibility, repair, or D-profile claims.
    - Give each role-position opportunity to clarify expectations, constraints, and perceived Λ.
    - Do not let the analyst’s frame replace lived or institutional voices.
    dignity_protection_measures:
    - Keep D0 untouched and unmeasured.
    - Use D1/D2 only as enactment language and only where it brings more clarity than shame.
    - Avoid humiliation diagnostics, dignity scores, public D-readings of identifiable persons, and person-level dignity labels.
    review_or_falsifier:
      date_or_interval: Review immediately if concrete case evidence is added; otherwise no operational review date because this is a non-decision working note.
      falsifier_question: Does a concrete scene show that the apparent trust-repair issue is better explained by a rival framework, justified refusal, institutional stress, legal standards, clinical context, or non-capture rather than MIP maturity-in-practice dynamics?
      responsible_roles:
      - structural analyst
      - future case owner if a concrete scene is supplied
      - safe moderator or institutional reviewer if identifiable persons or institutions become involved
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Initial conceptual case: trust may be tested, damaged, withdrawn, or restored through reliance, vulnerability, expectation, confidence, doubt, repair, or betrayal.'
      A_band: not_assigned; conceptual awareness field only
      M_band: not_assigned; no role-holder X or trajectory
      D_observation_optional: D themes possible but not active as facts; D0 untouched
      key_context_role_power_situation: No concrete context, role mandate, power topology, or publicness level supplied.
    - timepoint: t1
      short_description: Completed PMS Core and EDEN overlay analyses establish structural mappings, guardrails, EDEN risk visibility, and multiple non-overclaim boundaries.
      A_band: not_assigned; analytic boundary awareness is strong but not a score
      M_band: not_assigned; responsibility remains unassignable
      D_observation_optional: D module can be used qualitatively as protection discipline, not score or person reading
      key_context_role_power_situation: PMS/EDEN/MIP artefact context; no new empirical scene introduced.
    A_t:
      pattern: 'A(t) increases only at the level of analytic explicitness: more distinctions, guardrails, and drift risks become visible. A(t) does not increase as empirical knowledge of a real case.'
      notes: 'This distinction is critical: the analysis becomes structurally more articulate, but the world-facing information basis remains thin.'
    M_t_RVR_t:
      RVR_description: RVR(t) = f(knowing_t, able_t, permitted_t, acting_t) cannot be calculated for any actor or role-holder because all four components are under-specified in the concrete sense.
      knowledge_over_time: Analytic knowledge grows from PMS to EDEN to MIP, but role-specific knowledge in a real trust scene is unknown.
      leverage_over_time: Analytic leverage increases as conceptual discriminations sharpen; practical leverage in any real relationship or institution is unknown.
      alternatives_over_time: Conceptual alternatives are listed, including repair, refusal, recontextualization, review, and non-capture; real alternatives for role-positions are unknown.
      ceiling_rule_over_time: Because predictability and access to alternatives remain low or unknown, no high M trajectory is allowed.
    D_t_optional:
      active: true
      qualitative_course: 'D(t) is stable as an analytic protection condition: no shame, no ranking, no D-score, no public person-level reading, and explicit attention to vulnerability and humiliation risks.'
      D_quick_grid_movement_if_used: D-Quick-Grid is not used; no level is assigned.
      note: No D-score; only qualitative trajectory.
  D_module_optional:
    active: true
    activation_reason: Activated qualitatively because the case concerns vulnerability, trust repair, asymmetry, possible devaluation, possible humiliation, publicness risk, and Dignity-in-Practice constraints. Activation is protective and descriptive only.
    communication_space: internal_structural_review_in_non_public_chat; not public by default
    guardrails_checked:
      scenic: true
      context_bound: true
      role_bound: true
      time_windowed: true
      no_global_statement_about_persons: true
      no_dignity_score: true
      D0_untouched: true
    D_profile:
      D1_self_treatment_D_I_D_B:
        observed_enactments: None. No self-treatment, inner self-relation, bodily/material self-care, self-neglect, or self-devaluation can be observed because no person or concrete scene is supplied.
        context_notes: D1 remains a protected observation category only. Do not infer self-devaluation from rupture, withdrawal, doubt, refusal, or vulnerability-language.
        trend_band_qualitative: not_assigned
      D2_relational_dignity_D_R:
        observed_enactments: No relational degradation or dignity protection enactment is observed in a concrete scene. At the analysis level, relational dignity is protected through non-ranking, non-diagnosis, no forced reconciliation, and no tribunal language.
        context_notes: Trust repair can become coercive, ranking, humiliating, or tribunal-like, so D2 functions as a guardrail.
        interpretive_reading_not_judgment: Relational dignity risk is structurally relevant, but no role-position is judged to have degraded another.
      D_P_public_dignity:
        active_if_publicness_relevant: true
        observed_enactments: No public D enactment is observed. Public dignity is active only as a risk boundary because future applications to identifiable persons, groups, institutions, or public claims could create shaming or status-regulation risks.
        private_public_tension: The current analysis is private/chat-bound and abstract; public use would require a separate safety, purpose, reversibility, and D-cleanliness review.
        publicity_context: under_specified; no public case context supplied
      A_M_D_link_without_mixing:
        A_band_reference: A_band_not_assigned_due_to_non_concrete_scene
        M_band_reference: M_band_not_assigned_due_to_missing_actor_role_trajectory_and_option_data
        D_tendency: qualitative_protection_layer_active_no_D_score
        protection_or_responsibility_implication: D highlights protection and anti-humiliation constraints but does not alter A or M, does not produce guilt, and does not authorize control over another role-position.
    D_Quick_Grid:
      used: false
      level: not_assigned
      preferred_wording: This conceptual constellation contains dignity-in-practice risk themes, but no D-Quick-Grid level is assigned because there is no concrete role/context/time window.
      forbidden_wording_avoided: true
      movement_question: If a concrete scene is later supplied, what reversible, role-bound, non-public, non-humiliating step would reduce D stress without converting D into a person label?
  meta_notes:
    bias_risks:
      confirmation_bias: 'Risk: selecting PMS/EDEN/MIP evidence that confirms trust-repair drift while ignoring justified refusal, misunderstanding, legal standards, institutional stress, or non-capture. Mitigation: preserve rival readings and falsifiers.'
      hindsight_bias: 'Risk: treating a named rupture or betrayal as obviously predictable after the fact. Mitigation: no predictability claim without concrete Θ sequence and information basis.'
      status_quo_loyalty_bias: 'Risk: treating restored trust or reconciliation as mature by default. Mitigation: refusal, non-repair, and withdrawal remain possible mature or protective outcomes.'
      halo_horn_effects: 'Risk: trust-language may idealize repair-bearing roles or demonize relied-upon roles. Mitigation: use role-position language only and avoid person-level claims.'
      in_group_out_group_bias: 'Risk: institutional, role, gendered, political, or moral frames could polarize the reading if concrete identities appear. Mitigation: no group labels, no ideology claims, and PFO not applied.'
      dignity_bias_effect: 'Risk: D themes may make the case feel morally obvious. Mitigation: D remains qualitative, protected, non-scored, and off-limits for person judgment.'
    norm_assumptions:
      explicit_norms:
      - Structural analysis must remain reversible and non-diagnostic.
      - Trust repair cannot be declared mature from coherence alone.
      - D0 is inviolable and outside measurement.
      - Scores require concrete role/context/time evidence.
      - Repair, refusal, and non-capture must remain distinct possibilities.
      implicit_norms:
      - Vulnerability should not be exploited or humiliated.
      - Asymmetry should be named where relevant but not moralized.
      - Responsibility should remain self-binding before it becomes demand on the other.
      - Publicness increases risk and requires stronger restraint.
      dignity_concepts:
      - D0 ontological dignity remains untouched.
      - D1/D2 refer only to dignity in practice as enactment.
      - Dignity-in-Practice aligns with PMS D as reflective restraint under asymmetry, not with superiority or ranking.
      normative_position_of_D_reading: D reading is protective and anti-humiliation, not perfectionist, punitive, therapeutic, forensic, or rank-based.
    intuition:
      initial_intuition: The case strongly invites a maturity-in-practice reading because trust repair naturally involves awareness, coherence, responsibility, power-to-act, asymmetry, and dignity risks.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: The PMS and EDEN analyses show recurring relevance of expectation, Λ, Ω, Θ, Χ, Σ, Ψ, non-capture, and reciprocity risk.
      contradicting_evidence: The same analyses also show that no concrete scene, actor, repair outcome, EDEN drift regime, or scoreable responsibility structure is present.
    possible_alternative_interpretations:
    - 'Epistemic trust reading: the case concerns credibility, testimony, confidence, and justification rather than maturity.'
    - 'Relational-ethical reading: the case concerns fidelity, apology, forgiveness, and care rather than MIP scoring.'
    - 'Legal-contractual reading: reliance and breach may require legal standards rather than structural maturity analysis.'
    - 'Institutional reading: trust damage may arise from procedures, legitimacy deficits, scarcity, or governance constraints.'
    - 'Phenomenological reading: vulnerability, hurt, fear, hope, and forgiveness may exceed structural representation.'
    - 'Strategic reading: trust repair may be about repeated interaction, incentive, risk, and cooperation.'
    - 'Refusal reading: non-repair or withdrawal may be a legitimate mature response rather than drift or failure.'
    counter_perspective:
      from_other_side: A role-position accused of non-repair might say the expectation was never shared, the absence was not meaningful, the refusal was justified, or repair pressure itself became coercive.
      from_affected_side: A vulnerable role-position might say structural neutrality underplays exposure, cost, delay, publicness, or the burden of carrying repair after trust damage.
      from_external_observer: An external observer might say PMS/EDEN/MIP provide useful distinctions but cannot replace evidence, law, clinical care, institutional procedure, or phenomenological accounts.
  open_questions_and_blind_spots:
    missing_information:
    - Who or what relied on whom or what, and within which frame?
    - What expectation existed, and how was it communicated or made legitimate?
    - What concrete non-event, breach, refusal, delay, or repair action occurred?
    - What asymmetry of knowledge, power, exposure, obligation, publicness, or capacity was operative?
    - What role-position had real alternatives and predictable consequences?
    - Was any repair attempt enacted, simulated, refused, impossible, or coercively demanded?
    - Which rival framework has the strongest discriminative force?
    uncertain_assumptions:
    - That trust-repair is the correct main frame rather than legal, clinical, institutional, epistemic, or phenomenological framing.
    - That vulnerability implies meaningful Ω in a later scene rather than minimal or reciprocal exposure.
    - That repair requires Σ/Ψ rather than being impossible, undesirable, or ethically refused.
    - That EDEN drift handles add clarity rather than over-compressing a broader relational field.
    weak_points_in_analysis:
    - The analysis is structurally rich but empirically thin.
    - A/M/IA scoring cannot be performed without violating MIP score hygiene.
    - D activation is justified as a guardrail but must remain carefully bounded to avoid dignity-bias inflation.
    - The conceptual case may be too broad to discriminate among trust, betrayal, disappointment, refusal, and institutional legitimacy.
    needed_perspectives:
    - Affected role-position perspective if concrete harm or vulnerability is later claimed.
    - Relied-upon role-position perspective if responsibility or repair is later assessed.
    - Institutional or procedural perspective if public trust or governance is involved.
    - External legal, clinical, empirical, or ethical expertise where those domains are actually invoked.
    - Rival model comparison to test whether MIP offers sharper discrimination.
  possible_steps_towards_maturity:
    decision_mode: unclear
    functional_next_step:
      action: 'If a concrete case is later supplied, build a scene packet before any score: roles, frame, expectation, Λ, Ω, Θ, available information, real levers, publicness, repair attempts, and rival explanations.'
      reversible: true
      responsible_role: future structural analyst or safe case reviewer; not any person in the conceptual case
    short_term_feasible:
    - Keep the current output as a working structural note only.
    - Use the MIP analysis to identify what data would be needed, not to decide responsibility.
    - Maintain D guardrails and avoid public or identifiable use.
    - Preserve the distinction between PMS operators, EDEN overlay handles, and MIP A-C-R-P-D fields.
    - Use non-assignment of scores as a positive guardrail rather than a failure of analysis.
    medium_term_feasible:
    - Develop a concrete scene checklist for trust-repair cases using PMS Core, EDEN risk handles, and MIP role/context/time fields.
    - Construct rival-reading comparison criteria before choosing MIP as the primary analytic frame.
    - Define safe communication spaces for any future D-profile work.
    - Specify how repair, refusal, non-repair, and non-capture would each be recognized without person-ranking.
    overambitious_or_risky:
    - Assigning A-score, M-score, D-level, IA result, or RVR(t) curve from the conceptual material.
    - Treating PMS coherence, EDEN risk visibility, or MIP language as proof of betrayal or repair failure.
    - Using pseudo-symmetry, PFO, NRK, devaluation, humiliation, or maturity terms as labels for persons or groups.
    - Converting responsibility analysis into authority over another role-position.
    protection_first_if_low_M_high_harm:
    - If a later concrete case shows high harm but low M due to lack of predictability or options, prioritize protection, stabilization, voice, and reversible support rather than blame.
    - Do not raise M because harm is severe; use the ceiling rule.
    - If publicness or humiliation risk is high, move analysis to a safer, private, moderated, or procedural space.
    structural_change_if_high_M:
    - Only if a later concrete scene shows high knowledge, high leverage, predictable consequences, real alternatives, and no serious integration attempt, consider structural change requirements rather than person condemnation.
    - Possible structural changes would need to be role-specific, time-bound, justified, reversible where possible, and dignity-preserving.
    - High M would still mean shared structural responsibility, not guilt, moral worth, or ontological judgment.
  transmission_check:
    pre_transmission_gate_passed: true
    final_checklist:
      scope_and_guardrails_checked: true
      roles_and_publicness_checked: true
      score_hygiene_checked: true
      bias_norm_intuition_checked: true
      consequences_and_reversibility_checked: true
      D_cleanliness_checked_if_relevant: true
    status: working_note
    if_not_transmittable_reason: Not applicable for this limited internal working-note use; it would become non-transmittable if used for identifiable persons, public ranking, diagnosis, legal/forensic decision, HR decision, therapy planning, or coercive prescription.
    allowed_use_of_this_analysis:
    - Internal structural comparison of PMS Core, EDEN overlay, and MIP maturity-in-practice lenses.
    - Preparation of questions for a later concrete scene analysis.
    - Guardrail documentation showing why scores, diagnoses, verdicts, and EDEN drift classifications are not assigned.
    - Conceptual discussion of trust-repair maturity conditions under strict non-capture and rival-openness discipline.
    not_allowed_use:
    - Clinical diagnosis or therapeutic planning.
    - Legal or forensic judgment.
    - Individual HR decision or competence assessment.
    - Public shaming, ranking, or dignity reading of identifiable persons.
    - Proof that betrayal, repair, pseudo-symmetry, PFO, NRK, humiliation, or reciprocity loss occurred.
    - PMS Base validation or claim that PMS/EDEN/MIP exhaust the case.
    review_required:
      required: true
      review_date_or_condition: Required before any concrete, identifiable, public, legal, clinical, institutional, or action-guiding use.
      falsifier: If concrete evidence shows no framed expectation, no meaningful Λ, no action-relevant Ω, no role-specific options, or a stronger rival explanation, then the MIP trust-repair reading must be downgraded or replaced.
  uniform_report:
    generate_only_from_structured_fields: true
    title: MIP Analysis — Repair Relationships
    overview_4_to_7_sentences: This MIP analysis applies maturity-in-practice categories to the previously completed PMS Core and PMS-EDEN analyses of Repair Relationships. The case remains a conceptual trust-repair field, not a concrete praxis scene. Awareness and coherence are strong as analytic artefact features, but concrete responsibility, power-to-act, IA classification, A-score, M-score, and RVR(t) are not assignable. Dignity-in-Practice is activated only qualitatively as a protection layer because the field concerns vulnerability, asymmetry, devaluation, humiliation risk, and publicness risk. The main maturity finding is therefore negative and protective; do not score, diagnose, rank, adjudicate, prescribe, or classify drift without concrete role, frame, expectation, time, power, publicness, and enactment data.
    key_findings:
    - A-score is not assigned because there is no concrete enactment H.
    - M-score is not assigned because no actor or role-holder X, predictability, real alternatives, or integration opportunity is documented.
    - IA-box cannot classify functional asymmetry, IA risk, or inadult asymmetry; it can only list required future questions.
    - D-module is active qualitatively but no D-score or D-Quick-Grid level is assigned.
    - The strongest MIP contribution is disciplined non-overclaim plus a concrete evidence checklist for later scene-bound analysis.
    - EDEN drift handles remain risk visibility tools only and do not become MIP maturity verdicts.
    A_summary: A is strong as analytic awareness of distinctions, limits, biases, and publicness risks, but weak as concrete scene knowledge. This blocks any A-band assignment.
    M_summary: M is not assignable because knowledge, power/control, predictability, access to alternatives, and serious integration attempts cannot be assessed for any role-position.
    IA_box_summary: 'The IA-box is partial and non-classifying: potential asymmetry is named, transparency is maintained by the analysis, but justification, time-boundedness, and real reversibility of any concrete asymmetry are unknown.'
    D_summary_if_activated: D is active as a qualitative protection layer only. D0 is untouched, D1/D2 are not person labels, no dignity score is assigned, and public shaming or humiliation diagnostics are forbidden.
    trajectory_summary: The trajectory shows increasing analytic explicitness from PMS Core to EDEN overlay to MIP, but not increasing empirical knowledge. A(t) rises only as structural articulation, while M(t) and RVR(t) remain unassigned.
    guardrail_status: 'Guardrails are intact: non-person profile, system axiom, no red-zone use, score hygiene, D cleanliness, tragedy clause, reversibility, non-capture, and rival readings are preserved.'
    transmission_status: Transmittable only as an internal working note and not as a decision basis.
    practical_implications: 'The immediate implication is not an action recommendation but a restraint and preparation rule: gather scene-bound evidence before any maturity, responsibility, IA, D, or drift claim, and keep all future use role-bound, reversible, and dignity-preserving.'
    conclusion: 'MIP confirms the prior PMS/EDEN discipline: Repair Relationships is structurally rich but not yet scoreable, adjudicable, diagnostic, or operational. Mature analysis here consists in refusing premature maturity claims.'