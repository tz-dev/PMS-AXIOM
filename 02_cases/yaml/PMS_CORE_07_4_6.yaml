  possible_non_capture:
    status: kept_open
    zones:
    - moral residue that persists after structurally coherent action
    - tragic remainder not eliminated by integration
    - incommensurable obligations or values that do not reduce to a single higher-order coordination
    - first-person guilt or anguish as phenomenological experience
    - metaphysical or theological accounts of moral contamination
    - legal-forensic distinctions among justification, excuse, duress, necessity, and culpability
    - ethical remainder that may remain normatively significant even where a PMS mapping is internally coherent
    rule: 'These zones must not be automatically redescribed as PMS drift, calibration
