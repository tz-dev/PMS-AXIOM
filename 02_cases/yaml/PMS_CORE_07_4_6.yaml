derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
  - Awareness_A
  - Coherence_C
  - Responsibility_R
  - Action_E
  - Dignity_in_Practice_D
  - SELF_FIXPOINT
  - AD_A_much_greater_E
  - AD_under_integration
  usage_rule: 'Each derived structure must be marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration does
    not imply activation.'
  rule: 'Derived structures are formula-derived PMS constructs. They are not independent
    axioms, diagnoses, ontological rankings, metaphysical entities, or proof of PMS completeness.'
  case_status: Awareness_A is active as abstract framed differentiation across time;
    Coherence_C is weak-to-active and unstable; Responsibility_R is active as a question
    but not settled attribution; Action_E is under-specified; Dignity_in_Practice_D
    is active as an application constraint; SELF_FIXPOINT is analytic-only or secondary
    and not achieved; AD_A>>E and AD_Sigma_low are possible risks but not entailed.
derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ enables distinctions in the field.
    - □ frames distinctions as situationally relevant.
    - Θ maintains these framed distinctions over time.
    notes: 'Awareness is modeled structurally, not phenomenologically. Within PMS it
      can be systematically derived from this operator sequence, but this does not imply
      that all notions of awareness are exhausted by it.'
    case_reading: Awareness_A appears as sustained framed differentiation among available
      and unavailable actions, unresolved loss, responsibility, guilt, reconciliation,
      rival interpretations, and temporal remainder.
    status: active
    calibration_points:
    - Differentiate actions, losses, responsibilities, interpretations, and unresolved
      remainders within the philosophical moral-praxeological frame across the temporal
      structure of irreversibility and aftermath.
    non_capture_note: 'Structural awareness is not phenomenological consciousness.'
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Temporally stabilized structuring of impulse and expectation within
      a frame.
    generative_reasoning:
    - ∇ introduces directional impulse.
    - □ constrains and structures the impulse.
    - Λ encodes expectations and meaningful non-events.
    - Θ temporalizes the configuration into trajectories.
    notes: 'Coherence captures narrative stability of action, including meaningful absences
      and delays, without yet requiring full integration or self-binding. Rival theories
      may formalize coherence differently.'
    case_reading: Coherence_C is unstable because the case asks whether impulse, frame,
      expectation, non-event, and temporality can form a coherent account when no available
      resolution fully removes remainder.
    status: weak
    calibration_points:
    - Distinguish PMS coherence from moral truth, legal validity, metaphysical closure,
      forced integration, or narrative smoothing of tragedy.
    non_capture_note: 'Coherence does not prove adequacy.'
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding orientation toward asymmetry extended across time and
      recontextualization.
    generative_reasoning:
    - Ω creates structural imbalance in exposure, capacity, or obligation.
    - Θ extends this imbalance into enduring commitments.
    - Φ allows reinterpretation of obligations under changing conditions.
    - Ψ binds the agent to these obligations as part of its self-relation.
    notes: 'Responsibility is structural rather than moralistic in this specification.
      It is formally derived within PMS, not asserted as the only valid theory of responsibility.'
    case_reading: Responsibility_R is active as a structural question because Ω, Θ,
      Φ, and possible Ψ are all relevant, but it is not settled as blame, liability,
      guilt assignment, or person-level responsibility.
    status: weak
    calibration_points:
    - Identify the concrete asymmetry, temporal persistence, relevant recontextualizations,
      and self-binding structure before claiming responsibility rather than merely raising
      it.
    non_capture_note: 'Responsibility_R is not moral blame, diagnosis, or legal liability.'
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ provides energetic directedness.
    - Θ structures this directedness as a trajectory rather than a momentary reaction.
    - Σ integrates conflicting impulses, constraints, and roles into a coherent enactment.
    notes: 'Action here is not any behavior; it is integrated and temporally extended.
      Higher operators such as Ω, Φ, and Ψ may enrich it, but are not required for its
      minimal structural definition within PMS.'
    case_reading: Action_E is under-specified because the case describes forced choice
      in general but gives no concrete enacted decision, action trace, temporal sequence,
      or achieved integration.
    status: under_specified
    calibration_points:
    - Distinguish concrete action from abstract moral reflection, possible behavior,
      interpretation, or unresolved structural pressure.
    non_capture_note: 'Without a concrete scene, Action_E may remain under-specified.'
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-bound reflective restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: 'Dignity-in-practice is a structural stance in action. It concerns how asymmetry
      is handled, not the ranking of persons or ontological worth.'
    case_reading: 'Dignity_in_Practice_D constrains the analysis: asymmetry must be
      handled with reflective restraint and without shaming, ranking, humiliation, irreversible
      labeling, or ontological evaluation.'
    status: application_constraint
    calibration_points:
    - Check that persons or possible agents are not ranked, blamed, diagnosed, or reduced
      to the dirty-hands structure.
    non_capture_note: 'D is a praxeological application constraint, not an ontological
      or moral superiority claim.'
self_model_analysis:
  id: SELF_FIXPOINT
  priority_in_this_case: analytic_only
  formula_sequence:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  description: 'Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of praxis being
    bound into a relatively stable self-relation.'
  case_reading: SELF_FIXPOINT is not the primary structure and is not established. It
    remains an analytic horizon for possible self-binding responsibility in a fuller
    scene, while this application uses Ψ mainly as self-binding discipline for the analysis
    itself.
  implications:
  - Within PMS, selfhood can be modeled as the result of structured praxis rather than
    its origin.
  - Identity is represented as relatively stable self-binding to integrated trajectories.
  - No phenomenological or metaphysical claims about subjectivity are implied.
  interpretation_note: 'This sequence records one derivational strategy within PMS.
    It must not be read as proving that all forms of selfhood, agency, identity, or case
    structure reduce without remainder to this exact chain.'
  non_capture_note: 'SELF_FIXPOINT must not be applied to non-subjects, abstract concepts,
    or institutions as literal subjectivity unless explicitly scoped as structural self-binding
    or analytic self-binding.'
asymmetry_drift_patterns:
  status_in_this_case: possible_but_not_entailed
  general_note: 'PMS.yaml includes asymmetry drift patterns as structurally derived distortion
    forms. They are not automatically entailed by a case and must not be treated as diagnoses,
    person-types, or moral verdicts.'
  AD_A_much_greater_E:
    code: AD_A>>E
    name: Excessive Distance between Awareness and Enactment
    applicability: possible_but_not_entailed
    structural_basis:
      formula:
      - Φ
      - Α
      - Ω
      description: 'Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces drift toward evaluation rather
        than supporting integrative transformation and balanced enactment.'
    generative_mechanism:
    - 'Ω: evaluative or positional asymmetry becomes structurally salient.'
    - 'Α: the asymmetry stabilizes into recurrent evaluative patterning.'
    - 'Φ: recontextualization reinforces drift toward evaluative framing rather than
      restoring balance or integration.'
    case_reading: AD_A>>E remains only a conditional risk. Dirty-hands reflection may
      over-expand awareness while action remains delayed or suppressed, but the abstract
      case provides no chronic delay, stabilized evaluative asymmetry, or recurrent drift
      pattern.
    axis_effects:
      awareness_axis: under_specified
      action_axis: under_specified
    guardrail: 'This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.'
  AD_under_integration:
    code: AD_Sigma_low
    name: Fragmented integration
    applicability: possible_but_not_entailed
    structural_basis:
      primary_tension:
      - Φ
      - Σ
      condition: recontextualization_outpaces_integration
      description: 'Frequent recontextualization without sufficient integration leads
        to unstable trajectories and weak coherence of praxis, especially where unstable
        recontextualization and weak integration unfold under asymmetrical pressures.'
    generative_mechanism:
    - 'Φ: frames are frequently shifted or updated in ways that destabilize continuity.'
    - 'Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment.'
    case_reading: AD_Sigma_low remains only a conditional risk. The case involves possible
      fragmentation among rival frames, but it does not show volatile coherence or inconsistent
      responsibility across repeated praxis.
    axis_effects:
      coherence_axis: under_specified
      responsibility_axis: under_specified
    guardrail: 'This pattern describes structural volatility in action forms, not a clinical
      state, diagnosis, or person-type.'
