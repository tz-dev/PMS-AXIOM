operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: 'These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical, or applied
    analysis.'
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: A concrete analysis would require specified alternatives, constraints, losses,
        responsibilities, and interpretive distinctions.
      ∇: A concrete analysis would require evidence of practical, institutional, argumentative,
        or structural pressure toward action or interpretation.
      □: A concrete analysis would require the relevant moral, institutional, relational,
        legal, or philosophical frame to be named and bounded.
      Λ: A concrete analysis would require the expected repair, clean option, reconciliation,
        recognition, or resolution whose absence matters.
      Α: A concrete analysis would require recurrence, stabilization, path dependence,
        routine, or role-script evidence.
      Ω: 'A concrete analysis would require the type and direction of imbalance: power,
        vulnerability, capacity, obligation, exposure, dependency, or role burden.'
      Θ: A concrete analysis would require sequence, duration, irreversibility, aftermath,
        persistence, delay, or anticipation indicators.
      Φ: A concrete analysis would require source and target frames and criteria for
        distinguishing clarification from over-assimilation.
      Χ: A concrete analysis would require procedures preserving reflective distance,
        reversibility, and non-verdictive interpretation.
      Σ: A concrete analysis would require evidence of integration, partial integration,
        failed integration, or non-integrability without treating coherence as proof.
      Ψ: A concrete analysis would require a specified self-binding structure, commitment,
        role continuity, or responsibility relation across time.
    negative_cases:
    - ordinary solvable dilemma with no residual loss or irreversibility
    - tragic accident without agency or responsibility structure
    - pure semantic disagreement with no praxis stakes
    - legal necessity case where forensic criteria, not PMS, determine the relevant
      distinction
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: Operationalization is not fulfilled. The case material is abstract
    and supplies no empirical indicators, concrete scene evidence, comparative testing,
    computational calibration, legal analysis, clinical validation, or applied deployment
    criteria.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about
    persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of
    completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment
    as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice
    (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: Guilt and conflict are treated structurally as case terms, not
      as inferred mental states, symptoms, traits, or subjective experience.
    non_metaphysical: The reading makes no claim about moral essence, ontological contamination,
      consciousness, qualia, metaphysical guilt, or ontological dignity.
    non_diagnostic: No actor is diagnosed, typed, ranked by maturity, pathologized,
      or evaluated clinically.
    non_legal_forensic: Responsibility_R is not legal liability, forensic culpability,
      intent, duress, necessity, justification, excuse, or admissible evidence.
    non_implementation_claim: The YAML case application is not an implementation rule,
      decision system, intervention method, governance tool, or automated moral judgment.
    non_moral_ranking: No person, group, agent, or action is ranked morally by the PMS
      structure.
    non_exhaustive_capture: Dirty-hands residue, tragedy, incommensurability, rival
      ethical theory, and phenomenological guilt may remain outside PMS capture.
    reversibility: All operator activations are bounded to the abstract case material
      and can be weakened, revised, or withdrawn if a concrete scene or rival formalization
      discriminates better.
    dignity_in_practice: Dignity-in-Practice is preserved by handling asymmetry with
      restraint and without shaming, humiliation, irreversible labeling, or ontological
      evaluation.
limits:
- The case is abstract and lacks concrete actors, actions, alternatives, institutional
  frame, evidence, and outcomes, so the PMS reading remains case-type-bound.
- No empirical, metaphysical, diagnostic, clinical, legal-forensic, implementation,
  or PMS Base validation claim is made or warranted.
- Rival readings and non-capture zones remain open, especially tragic ethics, deontology,
  consequentialism, virtue ethics, existential responsibility, phenomenology of guilt,
  theology, and legal-forensic analysis.
- Because Λ, Ω, Θ, Φ, Χ, and Σ fit the theme strongly, there is a high risk of over-smooth
  PMS coherence unless falsifiers and discrimination tests are enforced.
case_synthesis:
  primary_pms_reading: Dirty hands / forced choice is structurally read as a framed
    difference-field under forced directional pressure, structured non-resolution, asymmetry,
    and irreversibility, requiring recontextualization and distance while leaving integration
    and self-binding unresolved.
  continuity_condition: Continuity is present only as temporal persistence of loss,
    guilt, responsibility, or irreversibility; no developmental continuity or stable
    self-relation is established.
  change_condition: 'Change appears as possible Φ: the same forced-choice structure
    may be recontextualized through tragedy, necessity, culpability, role conflict, moral
    residue, or existential responsibility.'
  rupture_or_non_fit_condition: Rupture, resistance, disagreement, absence, and non-fit
    are preserved as possible non-capture or rival framing and are not automatically
    treated as PMS drift, incomplete calibration, failed integration, or maturity failure.
  responsibility_condition: Responsibility_R is active as a structural question under
    Ω, Θ, Φ, and possible Ψ, but not as settled blame, legal culpability, diagnostic
    category, or moral ranking.
  dignity_condition: Dignity-in-Practice constrains the analysis to restrained, reversible,
    non-tribunal handling of asymmetry and possible vulnerability.
  rival_reading_condition: Rival formalizations remain open unless explicit comparison
    criteria show that PMS discriminates better for this case without erasing non-capture.
