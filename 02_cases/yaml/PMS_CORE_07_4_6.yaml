ai_interface_pms_alignment:
  welcome_message: 'This case uses PMS as a structural operator model. PMS is non-psychological,
    non-diagnostic, non-clinical, non-prescriptive, and non-metaphysical in its claims.'
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their
      compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect the Δ–Ψ operator configuration
      and dependency limits without claiming empirical, metaphysical, diagnostic, legal,
      or implementation validity.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual
      diagnosis.
    case_status: active
    case_application: Derived axes mode is used to project A, C, R, E, and D from their
      PMS formulas while marking Action_E and SELF_FIXPOINT as under-specified or analytic-only.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and
      safety without anthropomorphizing.
    case_status: not_applicable
    case_application: AI architecture mode is not used because the case is a philosophical
      conceptual projection, not an agent-design, simulation, or implementation task.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about
      persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof
      of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity
      per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining
      reversibility, distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded
      interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability,
      not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints,
      and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence,
    Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to
    rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Λ
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    - Α
    asymmetries_and_temporal_trajectories_visible: Ω is visible as abstract imbalance
      of responsibility, vulnerability, obligation, capacity, or role burden; Θ is visible
      as irreversibility, aftermath, and persistence of loss or guilt. Both require concrete
      specification before stronger claims.
    recontextualization_distance_integration: Φ is active through rival ways of understanding
      dirty hands; Χ is required to avoid verdictive or closure-forcing analysis; Σ
      remains weak because integration is precisely in question and may fail without
      indicating PMS drift.
    derived_axes_projection: Awareness_A is active; Coherence_C is weak and unstable;
      Responsibility_R is active as a question but weak as attribution; Action_E is
      under-specified; Dignity_in_Practice_D is an active application constraint.
    tentative_calibration_rivalry: Α, Σ, Ψ, Action_E, drift-pattern activation, and any
      responsibility attribution remain tentative. Moral residue, tragic remainder, incommensurability,
      phenomenological guilt, legal responsibility, and rival ethical formalisms remain
      open and possibly non-captured.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - PMS_internal_structural_derivation
    - conceptual_domain_mapping
    explicitly_not:
    - empirical_finding
    - metaphysical_claim
    - diagnostic_claim
    - clinical_claim
    - legal_forensic_claim
    - implementation_claim
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The case permits PMS-internal structural projection and operator calibration,
      but it does not permit empirical findings, concrete scene verdicts, legal-forensic
      conclusions, diagnostic claims, implementation claims, or PMS Base validation.
  coherence_risk:
    status: high
    reason: The case strongly invites a smooth PMS reading through Λ, Ω, Θ, Φ, Χ, and
      Σ, but dirty-hands phenomena may centrally involve remainder that coherence cannot
      resolve. PMS could become over-assimilative if it translates all residue into integration
      failure, recontextualization, calibration deficit, or drift. The central danger
      is not that PMS fails to produce a coherent mapping, but that the mapping becomes
      too fluent and thereby under-discriminates the morally difficult remainder.
    mitigation: The reading is constrained by rival ethical formalisms, explicit non-capture
      zones, weak Α, unresolved Σ, weak Ψ, under-specified Action_E, falsifier conditions,
      and the rule that PMS coherence is insufficient by itself. The analysis should
      therefore treat its own coherence as a hypothesis about structure, not as a proof
      of moral, empirical, legal, phenomenological, or metaphysical adequacy.
  coverage_vs_discrimination:
    coverage_result: PMS covers the structural interaction of difference, forced pressure,
      frame, non-resolution, asymmetry, temporality, reframing, distance, and contested
      integration.
    discrimination_requirement: The reading must distinguish dirty hands from ordinary
      dilemma, mere regret, tragic loss without agency, legal necessity or duress, moral
      blame, psychological guilt, and successful reconciliation.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish dirty hands / forced choice from an ordinary dilemma where a clean
      resolution is available.
