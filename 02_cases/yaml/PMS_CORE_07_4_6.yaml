schema_version: PMS_1.3
schema_role: case_application
analysis_mode: axiomatic
template_status: pms_yaml_aligned_case_application_template
template_purpose: 'Template for rendering a PMS_1.3-conformant case analysis. This template
  applies PMS.yaml as repository reference. It does not replace PMS.yaml, redefine PMS
  Base, introduce new PMS operators, or treat derived structures as independent primitives.'
repository_reference:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  reference_file: PMS.yaml
  reference_status: repository_reference
  repository_role: current_base_schema
  reference_last_updated: '2026-04-06'
  base_schema_status: repository_reference
  compliance_note: 'This case analysis applies PMS_1.3 as the current repository reference.
    It does not redefine PMS operators, alter the default repository order, introduce
    new meta-axioms, treat derived axes as independent primitives, override PMS application
    guardrails, or claim PMS Base validation.'
  referenced_base_sections:
  - pms_entry_condition
  - schema_version
  - schema_meta
  - repository_governance
  - core_principles
  - pms_model_reference
  - derived_structures
  - example_operator_chains
  - computational_representation
  - ai_interface_pms
  application_schema_note: 'This document is an application schema. It is permitted as
    an overlay or application scaffold under PMS repository governance, provided it remains
    explicitly subordinated to PMS.yaml and does not silently revise PMS Base.'
schema_meta_alignment:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  pms_status: repository_reference
  pms_maturity: draft
  repository_role: current_base_schema
  epistemic_status: 'PMS_1.3 is treated as strong, formally disciplined, and portable,
    but not final, complete, uniquely ordered, or immune to revision.'
  description_alignment: 'The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator grammar
    of praxis.'
  intended_use_alignment:
    allowed_profiles:
    - theoretical_reflection
    - structural_action_theory
    - anthropology_and_praxeology
    - systems_theory
    - ai_architecture_and_safety
    - model_documentation_and_specification
    - simulation_scaffolding
    - structural_reasoning
    not_intended_for:
    - clinical_diagnosis
    - personality_typing
    - mental_health_risk_assessment
    - automated_moral_judgement
    - individual_person_evaluation
    - forensic_decision_making
    - policy_enforcement
    - irreversible_labeling
  normative_position_alignment:
    ontology: 'The case analysis makes no PMS-based claims about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological dignity.'
    dignity_clause: 'Dignity-in-Practice is treated as a praxeological constraint on
      handling asymmetry, not as a metaphysical or moral ranking of beings.'
    tragedy_clause: 'Structural maturity, coherence, integration, or responsibility
      do not eliminate tragedy, unresolved tension, rupture, or non-capture.'
    self_binding_clause: 'The case analysis itself remains subject to PMS application
      discipline: Distance (Χ), Self-Binding discipline (Ψ), and Dignity-in-Practice
      (D) must not be suspended in order to force clarity, authority, resolution, truth,
      or action.'
  computational_position_alignment:
    representation_clause: 'YAML representation of the case is a formal encoding of
      a PMS reading, not a direct implementation of praxis, agency, selfhood, subjectivity,
      consciousness, or empirical validity.'
    calibration_clause: 'Any operational use requires architecture-specific calibration,
      implementation constraints, empirical testing where applicable, external evaluation,
      context-sensitive interpretation, and public accountability.'
    accountability_clause: 'Formal translation into PMS terms does not by itself guarantee
      public intelligibility, intersubjective uptake, empirical adequacy, external accountability,
      or explanatory sufficiency.'
    rivalry_clause: 'PMS rendering does not prove superiority over rival grammars or
      formalisms.'
  terminology_alignment:
    praxis: 'Situated, meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through operator
      compositions.'
    meta_axiom: 'One of the eleven PMS operators Δ–Ψ, treated as structurally basic
      within PMS_1.3 and not replaced by case-specific concepts.'
    operator_composition: 'Ordered or structured application of PMS meta-axioms to generate
      complex praxeological formations.'
    derived_construct: 'A higher-order construct systematically derived within PMS from
      operator compositions, not introduced as an independent primitive.'
    asymmetry_drift_pattern: 'A structurally derived distortion pattern within PMS; not
      a diagnosis, person-type, clinical category, ontological attribution, or moral verdict.'
    repository_reference: 'PMS.yaml remains the base reference. This case template is
      subordinate to that reference.'
  last_updated: '2026-04-06'
  authors:
  - name: T. Zöller
    role: originator
  - name: ChatGPT (GPT-5.4 Thinking)
    role: formalization_assistant
repository_governance_alignment:
  role_of_pms_yaml: 'PMS.yaml is the current repository reference specification for
    PMS Base. This case analysis depends on PMS.yaml but does not revise it.'
  this_template_may:
  - depend_on_pms
  - reference_pms_operators
  - define_case_application_structure
  - organize_pms_operators_for_case_analysis
  - specify_case_quality_control
  - support_structural_reasoning
  this_template_must_not:
  - silently_redefine_meta_axioms
  - silently_alter_default_operator_order
  - silently_alter_default_dependency_path
  - present_new_meta_axioms_as_if_already_in_base_pms
  - treat_derived_axes_as_independent_primitives
  - override_application_guardrails_while_claiming_full_pms_conformity
  - claim_pms_base_validation_from_a_case
  governance_status: subordinate_application_schema
pms_entry_condition:
  requirement: 'Any use of PMS as an application presupposes acceptance of distance
    (Χ), reversibility, and dignity-in-practice (D; a praxeological constraint, not
    ontological worth). This condition applies to application, not to critique, refusal,
    revision, or rejection. Applications that suspend these conditions are formally invalid
    as PMS applications within the present usage convention.'
  applies_to: application_only
  does_not_apply_to:
  - critique
  - refusal
  - rejection
  - revision_proposals
  application_gate:
    status: accepted_for_this_application
    conditions:
      Distance_Chi:
        status: maintained
        meaning: 'Reflective distance is maintained; the analysis does not fuse PMS
          into verdict, urgency, enforcement, closure, or person-level attribution.'
      reversibility:
        status: maintained
        meaning: 'Structural readings remain revisable, bounded, non-final, and non-totalizing.'
      Dignity_in_Practice_D:
        status: maintained
        meaning: 'The analysis maintains enacted restraint under asymmetry and does
          not shame, rank, humiliate, or ontologically evaluate persons or groups.'
    gate_result: valid_as_pms_application
application_discipline:
  self_binding_clause:
    status: active
    statement: 'Any application of PMS is itself subject to PMS. Analyses that suspend
      Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in order
      to enforce truth, clarity, authority, resolution, or action are formally invalid
      as PMS applications within the present usage convention, even if PMS terminology
      is retained.'
    application_to_this_case: The analysis remains self-bound by treating dirty hands
      / forced choice as a bounded philosophical case-type projection, not as a verdict
      about persons, a settlement of moral theory, or a resolution of tragic remainder.
      It preserves Distance (Χ), reversibility, rival readings, and possible non-capture.
  application_only_boundary:
    status: active
    statement: 'PMS can be criticized, revised, rejected, ignored, or compared with
      rival formalizations without satisfying the PMS entry condition. The entry condition
      governs only applications that claim to use PMS.'
  non_capture_rule:
    status: active
    statement: 'Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, or rival framing must not automatically be redescribed
      as drift, failed integration, incomplete calibration, or structured absence.'
  no_pms_base_revision:
    status: active
    statement: 'This case does not alter PMS Base, PMS operators, PMS dependencies,
      derived structures, guardrails, or repository governance.'
case:
  title: Dirty hands / forced choice
  interpretation_type: conceptual_domain_projection
  case_type: philosophical structural action-theory case concerning morally difficult
    forced choice under loss, conflict, guilt, responsibility, irreversibility, and possible
    non-resolution
  claim_status: conceptual_pms_projection
  empirical_status: not_empirical
  result_status: reversible_case_bound_projection
  not_a_concrete_scene: true
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  implementation_claim: false
  pms_base_validation: false
  scope: The analysis structurally maps the abstract case material through PMS_1.3
    operators and derived structures, asking how forced-choice moral difficulty can
    be represented where no action, interpretation, or reconciliation fully resolves
    loss, conflict, guilt, responsibility, or irreversibility.
  non_scope: The analysis does not establish empirical facts, metaphysical truths,
    psychological states, clinical or diagnostic categories, legal culpability, forensic
    responsibility, implementation validity, moral ranking, or PMS Base validation. It
    also does not decide which moral theory is correct.
  case_typing_note: This is not a concrete praxis scene because no actor, action trace,
    institutional setting, alternative set, harm distribution, or outcome evidence is
    specified. It is a conceptual domain projection bounded to the philosophical structure
    of dirty hands / forced choice.
template_compliance:
  pms_yaml_alignment_status: complete
  validation_checks:
    valid_yaml: true
    no_new_pms_operators: true
    no_redefined_pms_base: true
    all_operators_present: true
    all_operator_dependencies_preserved: true
    dependency_table_reference_present: true
    dependency_table_reference_matches_pms_yaml: true
    all_derived_axes_formula_based: true
    self_fixpoint_treated_as_derived: true
    drift_patterns_not_diagnostic: true
    quality_control_present: true
    falsifier_conditions_present: true
    possible_non_capture_preserved: true
core_principle_alignment:
  P1_praxeological_focus:
    principle: PMS models praxis structurally rather than persons, inner experience,
      or metaphysical essence.
    status: satisfied
    case_application: The case is treated as a structure of praxis under constrained
      action, asymmetry, temporality, and responsibility, not as a claim about inner
      experience, person essence, psychology, or ontology.
  P2_proposed_operator_minimality:
    principle: PMS uses the eleven operators Δ–Ψ as the current proposed minimal generative
      basis within the framework.
    status: satisfied
    case_application: Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are
      used as PMS operators. No extra operators, axes, layers, or principles are introduced.
  P3_generativity:
    principle: Complex structures are generated through operator compositions, not assumed
      as primitives.
    status: satisfied
    case_application: Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D,
      SELF_FIXPOINT, and drift patterns are considered only through their PMS formulas
      and not as independent primitives.
  P4_temporal_and_asymmetry_awareness:
    principle: PMS explicitly tracks asymmetry and temporality as structural conditions
      of praxis.
    status: satisfied
    case_application: Ω and Θ carry major weight because forced choice is described
      through loss, responsibility, conflict, and irreversibility; both remain abstract
      because the kind of asymmetry and temporal sequence are not concretely specified.
  P5_computational_boundedness:
    principle: PMS can be represented formally, but representation is not implementation
      or validation.
    status: satisfied
    case_application: This YAML representation is a formal case encoding only. It is
      not a computational implementation, empirical test, legal decision tool, clinical
      instrument, or PMS Base validation.
  P6_rival_openness:
    principle: PMS does not claim finality or superiority over all rival formalizations.
    status: satisfied
    case_application: Rival readings remain open, including tragic ethics, deontology,
      consequentialism, virtue ethics, existential responsibility, political-theological
      exception, phenomenology of guilt, and legal-forensic necessity or duress frameworks.
  P7_non_capture_openness:
    principle: PMS translation does not prove exhaustive capture of praxis or meaning.
    status: satisfied
    case_application: Moral residue, tragic remainder, incommensurability, first-person
      guilt, metaphysical contamination, theological meaning, and legal culpability may
      remain outside PMS capture.
  P8_non_diagnostic_use:
    principle: PMS is not a clinical, psychological, diagnostic, personality, or moral-ranking
      system.
    status: satisfied
    case_application: No diagnostic, clinical, psychological, maturity-ranking, person-typing,
      or moral-ranking claim is made from the PMS structure.
  P9_scenic_context_bound_interpretation:
    principle: PMS applications are bounded by scene, case type, scope, and evidence.
    status: satisfied
    case_application: Because the case is not a concrete scene, the reading is explicitly
      case-type-bound and reversible rather than scene-final or evidence-based.
pms_model_reference_application:
  operator_order_used:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  operator_inventory_status: preserved
  operator_order_status: preserved
  dependency_path_status: preserved_with_case_specific_weaknesses_marked
  note: 'The operator inventory and repository order are preserved. Where an operator
    is weak or under-specified in this case, it is marked as such rather than replaced,
    removed, renamed, or supplemented.'
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Difference is active because the case distinguishes available actions,
      non-available clean options, loss and non-loss, responsibility and non-responsibility,
      reconciliation and non-resolution, and interpretations that may not converge.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The primary distinctions are between possible action, impossible full repair,
      unresolved moral remainder, and rival interpretations of forced choice.
    - The distinctions remain abstract and must not be inflated into a determinate moral
      verdict without a concrete scene.
    falsifier_conditions:
    - If no stable distinction exists between alternatives, losses, obligations, or
      interpretations, the PMS reading loses its entry point.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: Impulse is weak-to-active because forced choice implies directional
      pressure toward action or interpretation, but the case does not specify a concrete
      drive, desire, motive, or enacted movement.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - 'The tension is structural and practical-philosophical: pressure to choose or
      understand under conflict rather than evidence of subjective desire.'
    - No psychological impulse is inferred; ∇ marks directionality generated by the
      forced-choice difference-field.
    falsifier_conditions:
    - If the case contains no directional pressure toward choice, action, or interpretation,
      ∇ is under-specified.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: Frame is active because moral difficulty presupposes a relevance
      structure in which loss, conflict, guilt, responsibility, irreversibility, and
      reconciliation matter.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is philosophical moral-praxeological reflection on dirty hands
      / forced choice.
    - Frame shifts among tragic, deontological, consequentialist, virtue-ethical, existential,
      and legal-forensic readings must be marked rather than fused.
    falsifier_conditions:
    - If no moral, praxeological, or interpretive frame constrains relevance, the analysis
      becomes too abstract to discriminate.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence
      within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Non-Event is active because the case centers on unavailable full resolution,
      unavailable clean reconciliation, and the meaningful absence of an action or interpretation
      that would dissolve loss and guilt.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The expected occurrence is a resolving action, interpretation, or reconciliation;
      its absence matters within the moral-praxeological frame.
    - The absence may also mark PMS non-capture and must not automatically be treated
      as failed integration.
    falsifier_conditions:
    - If full resolution, missing repair, unavailable clean choice, or unresolved expectation
      is not structurally relevant, Λ should not be asserted as major.
    non_capture_note: 'Absence must not be automatically translated into incomplete
      integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural
      interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Attractor is weak because the abstract case does not specify recurrence,
      stabilization, routine, role-script emergence, or repeated pattern formation, although
      dirty-hands discourse can stabilize around guilt, necessity, or residue.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Attractor would require evidence of repeated forced-choice patterning, stable
      role scripts, or recurrent interpretive stabilization.
    - A single conceptual case must not be treated as recurrent pattern formation merely
      because the philosophical topic is familiar.
    falsifier_conditions:
    - If recurrence or stabilization is not shown, Α remains weak and must not support
      strong downstream claims by itself.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure,
      capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Asymmetry is active because forced choice under responsibility, loss,
      vulnerability, capacity, obligation, or role burden implies structural imbalance,
      even though the concrete direction of asymmetry is not specified.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - 'The kind and direction of asymmetry must be specified before stronger analysis:
      power, exposure, vulnerability, obligation, capacity, dependency, or role burden
      may diverge.'
    - Ω is structural and must not be moralized as blame, superiority, inferiority,
      corruption, or guilt by default.
    - Because Α is weak, Ω is active at the conceptual case level but dependency-limited
      for any concrete claim.
    falsifier_conditions:
    - If no directional imbalance of exposure, capacity, vulnerability, obligation,
      or role burden is identifiable, Ω must be weakened or removed.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development,
      and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Temporality is active because irreversibility, remaining guilt, continuing
      responsibility, and after-effects require temporal extension beyond the decision
      moment.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The temporal structure is persistence of consequence, loss, guilt, or responsibility
      after the forced choice.
    - Θ must not be inflated into developmental progress or maturity without a trajectory
      and evidence.
    falsifier_conditions:
    - If the case has no temporal extension, irreversibility, persistence, delay, anticipation,
      or aftermath, Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or
      empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Recontextualization is active because the case asks how morally difficult
      choices should be understood, allowing shifts among rival frames such as tragedy,
      necessity, culpability, role conflict, or moral residue.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Source and target frames may include dirty-hands tragedy, dilemma, necessity,
      moral remainder, culpability, role duty, and existential responsibility.
    - Φ must clarify frame movement without absorbing every rupture or rival reading
      into PMS as incomplete calibration.
    falsifier_conditions:
    - If every resistance, rival frame, or moral remainder is absorbed as recontextualization,
      the reading becomes over-assimilative.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Distance is active and required by the PMS entry condition because
      the analysis must suspend verdict, enforcement, closure, person-ranking, and forced
      resolution while retaining reflective restraint.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must preserve reversibility, not collapse into moral verdict, legal
      blame, psychological attribution, or implementation rule.
    - Distance is reflective restraint, not detachment that erases loss, responsibility,
      or tragedy.
    falsifier_conditions:
    - If the analysis becomes verdictive, urgent, punitive, diagnostic, person-ranking,
      or closure-forcing, Χ is compromised and the PMS application fails.
    non_capture_note: 'Distance is not denial or detachment from the case.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Higher-order coherence across differentiated, reframed, and distanced
      structures.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence_across_frames
    - stabilization_of_recontextualization
    - mature_coordination
    examples:
    - integrating multiple role expectations
    - holding conflicting commitments without collapse
    - coordinating revised priorities after reflection
    status_within_pms: treated_as_structurally_basic
    role_in_case: Integration is weak-to-active but unresolved because the case concerns
      whether any integration is possible when loss, conflict, guilt, responsibility,
      and irreversibility remain significant.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Σ can mark attempted coordination of conflict and responsibility, but it cannot
      be claimed as successful moral resolution.
    - Coherence must be distinguished from forced integration, smoothing, adequacy,
      or proof that tragedy has been eliminated.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy or as dissolution of moral remainder,
      Σ is overclaimed.
    non_capture_note: 'Integration does not eliminate tragedy or non-capture.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Binding of integrated praxis into a relatively stable self-relation.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_relation
    - continuity_of_commitment
    - accountability_structure
    examples:
    - keeping a promise across changing circumstances
    - sustaining a chosen role
    - binding oneself to a norm under pressure
    status_within_pms: treated_as_structurally_basic
    role_in_case: Self-Binding is weak-to-active because responsibility may persist
      as self-relation across time, but the case provides no concrete actor, commitment,
      identity, or stable ownership structure.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Ψ applies primarily as analytic self-binding of the PMS application and secondarily
      as possible responsibility-bearing self-binding within a fuller dirty-hands scene.
    - No subjectivity, moral maturity, confession, identity formation, or person-level
      responsibility is attributed without concrete scene evidence.
    falsifier_conditions:
    - If Ψ is applied without adequate Σ, Θ, and Χ, or without a specified responsibility-bearing
      structure, the self-binding reading is under-specified.
    non_capture_note: 'Self-binding is not metaphysical selfhood or person ranking.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions,
      impulses, frames, non-events, and recurrent patterns.'
    case_function: L1 structures the case as an abstract field of distinctions, forced
      directional pressure, moral framing, structured non-resolution, and only weak possible
      stabilization. Δ, ∇, □, and Λ are central; Α remains weak because recurrence is
      not evidenced.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations
      and are temporally extended into trajectories and commitments.'
    case_function: 'L2 carries major conceptual weight because dirty hands / forced
      choice involves asymmetry and temporality: responsibility, exposure, obligation,
      loss, and irreversible aftermath. Both remain dependency-limited because no concrete
      pattern or role relation is specified.'
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.'
    case_function: 'L3 governs the application stance: Φ handles rival reframings, Χ
      preserves distance and reversibility, and Σ is tested but not presumed successful.
      This layer prevents PMS coherence from becoming forced resolution.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively
      stable self-relation maintained across time and contexts.'
    case_function: Ψ is secondary and partly analytic. It constrains the analysis as
      self-bound PMS application and may become relevant to responsibility in a fuller
      concrete scene, but it is not primary or established as SELF_FIXPOINT here.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case explicitly supplies distinctions among action, loss, conflict,
      guilt, responsibility, irreversibility, interpretation, reconciliation, and non-resolution.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: The forced-choice structure supplies directional pressure toward choice
      or interpretation, but no concrete motive or enactment is specified.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: The philosophical moral-praxeological frame supplies relevance conditions
      for why loss, guilt, responsibility, and irreversibility matter.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: The case explicitly supplies non-resolution and unavailable full reconciliation
      as meaningful absences within the frame.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: 'Only weakly satisfied: no recurrence or stabilized role-script is
      given, so Α cannot strongly support later operators at concrete-scene level.'
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Conceptually present through obligation, responsibility, loss, vulnerability,
      or role burden, but dependency-limited by weak Α and lack of concrete direction.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Conceptually present through irreversibility and remaining significance
      across time, but no concrete trajectory is specified.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Satisfied at the interpretive level because the case asks how such
      choices should be understood and permits rival reframings.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Satisfied as an application constraint requiring reflective restraint,
      reversibility, and non-tribunal handling.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Weak because integration is a problem in the case rather than an established
      result; Σ cannot be treated as achieved.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Weak because responsibility may require self-binding, but no concrete
      actor or stable self-relation is specified.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading
    as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark
    coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
