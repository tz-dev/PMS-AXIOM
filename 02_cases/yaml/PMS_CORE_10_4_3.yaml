core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons
      as ontological entities or psychological essences.
    status: satisfied
    case_application: >-
      Boundary Confusion is treated as a praxis-structure concerning roles, responsibilities,
      spaces, decisions, and boundary enactments. It is not treated as an analysis of personal
      essence, psychological interiority, ontology, or worth.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological essence
      claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative
      basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered
      remains open to further formalization and critique.
    status: satisfied
    case_application: >-
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ is used as PMS
      operators. Boundary, role, responsibility, space, and decision remain case terms, not
      new PMS operators.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as
      if they belonged to PMS Base.
  P3_generativity:
    id: P3
    title: Generativity
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and asymmetry drift patterns can be systematically derived
      within PMS from operator compositions rather than introduced as independent primitives.
    status: satisfied
    case_application: >-
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT,
      and asymmetry drift patterns are treated only as PMS-derived structures from the formulas
      in PMS.yaml, not as primitive axioms.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility,
      maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions
      rather than as static attributes.
    status: partial
    case_application: >-
      Ω and Θ are relevant because boundary confusion may involve responsibility gradients
      and recurrence over time, especially where boundaries are repeatedly crossed. They remain
      conditional because the abstract material does not specify direction, duration, sequence,
      or imbalance.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported
      them without calibration.
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply
      direct implementation, guaranteed interoperability, or explanatory adequacy. Operational
      use requires calibration, constraints, and evaluation.
    status: satisfied
    case_application: >-
      The YAML form is a formal representation of a PMS reading only. It is not an implementation,
      empirical test, computational validation, or proof of explanatory adequacy.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy,
      or computational sufficiency.
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper
      discriminative models, or more empirically grounded formalisms remains methodologically
      open.
    status: satisfied
    case_application: >-
      Rival readings remain open, including legal-forensic boundary dispute, relational autonomy,
      care ethics, role theory, institutional governance, semantic ambiguity, and non-PMS formalizations
      of responsibility or consent.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival formalisms
      by default.
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture.
      Some forms of praxis may remain only partially legible or may resist assimilation within
      the current grammar.
    status: satisfied
    case_application: >-
      Possible non-capture is preserved for subjective experience, law, clinical context,
      cultural norms, coercion, safety, and cases where disagreement or refusal is not PMS
      drift but a legitimate rival frame.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration,
      or calibration failure.
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic,
      forensic, or person-ranking decisions.
    status: satisfied
    case_application: >-
      The analysis makes no clinical, psychological, personality, pathology, competence, risk,
      or maturity diagnosis. Drift patterns, where mentioned, are conditional structural risks
      only.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes, roles,
      and structures. Global person-labels and irreversible ontological attributions are out
      of scope.
    status: partial
    case_application: >-
      Because the case is explicitly not a concrete scene, the analysis is bound to the case
      type rather than to a particular episode. No global or irreversible claim about persons
      is made.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized claims.
pms_model_reference_application:
  ordering_status:
    interpretation: >
      The PMS default order is treated as the current repository dependency path. It is not
      treated as uniquely necessary, final, or proof of PMS completeness.
    repository_role: >
      This case follows PMS_1.3 order and dependencies unless explicitly marked as critique
      or rival formalization.
  operator_inventory:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  operator_inventory_status: no_additional_pms_operators_introduced
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Boundary Confusion becomes PMS-legible through distinctions between one person's role,
      responsibility, space, or decision and another's. The core structural issue is whether
      these distinctions are unclear, contested, crossed, or conflated.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - 'Specify which boundary is being differentiated: role, responsibility, space, decision,
      authority, access, obligation, or privacy.'
    - Check whether several distinctions are being conflated under one name, especially unclear
      boundary, contested boundary, crossed boundary, and violated boundary.
    falsifier_conditions:
    - If no stable or case-relevant distinction can be identified, the PMS reading loses its
      entry point and Boundary Confusion becomes too indeterminate for PMS application.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Directional tension is only weakly specified. The case may involve pressure to cross,
      defend, clarify, contest, withdraw, repair, or reassign a boundary, but no concrete
      impulse or enacted orientation is given.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Identify whether the relevant directedness is practical, argumentative, institutional,
      affective, spatial, or responsibility-related.
    - Do not infer subjective desire, motive, hostility, dependency, or pathology from the
      mere fact that a boundary is unclear or crossed.
    falsifier_conditions:
    - If no directional tension arises from the relevant difference, ∇ should remain under-specified
      and should not support later operators except as a weak condition.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      The case centrally requires frames: role frame, responsibility frame, spatial frame,
      decision-authority frame, relational frame, institutional frame, or normative frame.
      Boundary confusion depends on how a frame makes a distinction relevant.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Name the active frame before deciding what counts as boundary crossing.
    - Check whether parties or rival formalisms are using different frames, such as care versus
      control, shared responsibility versus overreach, or autonomy versus abandonment.
    falsifier_conditions:
    - If no frame can be specified, the analysis remains too abstract to discriminate boundary
      ambiguity from generic difference.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence
      within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Non-Event is conditional. It may appear where an expected clarification, refusal, permission,
      restraint, repair, acknowledgment, or decision fails to occur within a frame, but the
      case material does not explicitly state such an absence.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Specify the expected occurrence and the frame within which its absence matters, such
      as missing clarification in a role frame or missing refusal in a decision frame.
    - Preserve the possibility that absence reflects missing evidence or PMS non-capture rather
      than incomplete integration or case defect.
    falsifier_conditions:
    - If no structured expectation, delay, or meaningful absence exists, Λ must not be asserted
      as active.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Attractor is a weak-to-moderate candidate because the case mentions boundaries being
      repeatedly crossed. Recurrence may indicate a stabilized role script or pattern, but
      no concrete episodes are supplied.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Show actual recurrence or stabilization through repeated structurally similar episodes,
      not merely the word repeatedly.
    - Distinguish a stable attractor from accidental aggregation, isolated misunderstanding,
      temporary emergency, or mutually negotiated exception.
    falsifier_conditions:
    - If recurrence or stabilization is not shown, Α is over-read and should be downgraded
      to weak or not active.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity,
      or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Asymmetry may be relevant where roles, responsibilities, exposure, authority, vulnerability,
      access, or obligations are unevenly distributed. The direction and magnitude of asymmetry
      are not specified by the abstract case material.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - 'Specify the direction and kind of asymmetry: power, exposure, capacity, vulnerability,
      obligation, responsibility, interpretive authority, institutional authority, or access.'
    - Do not moralize asymmetry by default and do not assume that the party who crosses, resists,
      refuses, or contests is thereby wrong.
    - Allow Ω to remain weak or absent if the case is merely a symmetrical disagreement about
      ambiguous boundaries.
    falsifier_conditions:
    - If no directional imbalance is identifiable, Ω claims must be removed or marked weak.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development,
      and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Temporality is conditionally relevant because repeated crossing implies duration, sequence,
      anticipation, accumulation, or trajectory. The case does not provide dates, order, escalation,
      repair, or persistence details.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Distinguish diachronic trajectory from static comparison or a single abstract example.
    - Identify whether temporality is essential through recurrence, delay, accumulation, repair
      failure, anticipation, or changing expectations.
    falsifier_conditions:
    - If the case is only a static conceptual ambiguity without temporal extension, Θ is overextended.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Recontextualization is a conditional operator because boundary confusion may arise from
      rival frames: support versus intrusion, help versus control, shared responsibility versus
      overreach, autonomy versus abandonment, or flexibility versus violation.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Name the source frame and target frame before claiming recontextualization.
    - Check whether recontextualization clarifies the case or merely absorbs disagreement,
      refusal, rupture, or non-fit into PMS terminology.
    falsifier_conditions:
    - If every rupture, resistance, disagreement, or rival framing is absorbed as Φ, the reading
      is over-assimilative.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Distance is major as an application constraint. The PMS reading must pause before verdict,
      preserve reversibility, inhibit person-ranking, and avoid converting boundary confusion
      into pathology, blame, or legal judgment.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Check whether the analysis suspends verdict and preserves reversibility instead of forcing
      clarity, blame, or closure.
    - Distinguish distance from avoidance, denial, false neutrality, or refusal to acknowledge
      real asymmetry where a concrete scene later establishes it.
    falsifier_conditions:
    - If Χ is suspended to force a diagnostic, legal, moral, or person-ranking verdict, the
      PMS application is invalid.
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Integration is weak and conditional. A concrete boundary practice might require coordination
      of roles, expectations, responsibilities, and frames, but the abstract case does not show
      an integrated solution or integration failure.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Test whether integration discriminates between legitimate boundary separation and forced
      coherence.
    - Distinguish integration from smoothing over conflict, suppressing refusal, erasing non-capture,
      or treating PMS coherence as sufficient.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy or as automatic resolution of boundary conflict,
      Σ is overclaimed.
    non_capture_note: >
      PMS coherence is insufficient by itself.
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across
      time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Self-Binding is weak and mostly analytic here. Responsibility boundaries may involve
      promises, durable roles, or self-commitments, but no specific agent commitment, self-relation,
      or obligation over time is supplied.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Apply Ψ only where self-binding, durable commitment, stable normativity, or responsibility-as-self-commitment
      is actually in scope.
    - Do not infer selfhood, maturity, identity failure, or person-level responsibility from
      abstract boundary confusion.
    falsifier_conditions:
    - If Ψ is applied without adequate Σ, Θ, and Χ calibration, the self-binding reading is
      under-specified.
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames, non-events,
      and recurrent patterns.
    case_function: >-
      L1 carries the core case structure: distinctions between roles or spaces (Δ), weak directional
      pressures around crossing or clarification (∇), frames that define relevance (□), possible
      meaningful absences such as missing clarification (Λ), and possible recurrence where crossings
      repeat (Α).
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally extended
      into trajectories and commitments.
    case_function: >-
      L2 is conditional. Ω and Θ become important if concrete material shows uneven responsibility,
      authority, exposure, or vulnerability extended across repeated episodes; otherwise they
      remain weak structural candidates.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning and
      more mature forms of praxis.
    case_function: >-
      L3 functions mainly as analytic discipline. Φ tracks rival frames when warranted, Χ restrains
      verdict and preserves reversibility, and Σ remains weak unless a concrete scene shows
      integrative coordination rather than forced coherence.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation
      maintained across time and contexts.
    case_function: >-
      Ψ is not primary for the abstract case. It becomes relevant only if a concrete scene
      shows durable self-binding, role ownership, promise, commitment, or responsibility-as-self-commitment.
dependency_logic:
  status: dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case explicitly concerns distinctions between one person's role, responsibility,
      space, or decision and another's.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: 'Only weakly satisfied: unclear or crossed boundaries imply possible directed
      pressure, but no concrete impulse is specified.'
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: 'Satisfied at the case-type level: roles, responsibilities, spaces, and
      decisions require frames to define boundary relevance.'
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Weakly satisfied only where boundary confusion includes an expected clarification,
      refusal, permission, repair, or restraint that fails to occur.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: Weakly satisfied because the material says boundaries may be repeatedly crossed,
      but recurrence is not evidenced through concrete episodes.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Weakly satisfied where role, responsibility, power, exposure, or obligation
      gradients are present; not established without a concrete scene.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Weakly satisfied because repeated crossing suggests temporal extension, but
      sequence, duration, and accumulation are unspecified.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Weakly satisfied where boundary confusion involves rival frames; not every
      disagreement is recontextualization.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: 'Satisfied as an application condition: the analysis maintains reflective
      distance, reversibility, and non-verdict status.'
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Weakly satisfied only as a possible need to coordinate competing frames; no
      integrated praxis or integration failure is established.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Weakly satisfied only as application self-binding and possible role commitment;
      no case-level SELF_FIXPOINT or durable self-relation is established.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified
    or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence
    risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
