derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
  - Awareness_A
  - Coherence_C
  - Responsibility_R
  - Action_E
  - Dignity_in_Practice_D
  - SELF_FIXPOINT
  - AD_A_much_greater_E
  - AD_under_integration
  usage_rule: >
    Each derived structure must be marked as active, weak, analytic_constraint, possible_but_not_entailed,
    under_specified, or not_applicable. Consideration does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not independent axioms,
    diagnoses, ontological rankings, metaphysical entities, or proof of PMS completeness.
  case_status: >-
    Awareness_A is weak-to-moderate as sustained framed differentiation; Coherence_C is weak;
    Responsibility_R is weak and conditional; Action_E is under-specified; Dignity_in_Practice_D
    is an application constraint; SELF_FIXPOINT is not warranted as a case structure; AD_A>>E
    and AD_Sigma_low are possible structural risks but not entailed.
derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ enables distinctions in the field.
    - □ frames distinctions as situationally relevant.
    - Θ maintains these framed distinctions over time.
    notes: >
      Awareness is modeled structurally, not phenomenologically. Within PMS it can be systematically
      derived from this operator sequence, but this does not imply that all notions of awareness
      are exhausted by it.
    case_reading: >-
      Boundary Confusion involves sustained framed differentiation when a distinction between
      one person's role, responsibility, space, or decision and another's remains relevant
      across time. Because the case lacks a concrete sequence, this is a weak structural projection
      rather than a phenomenological awareness claim.
    status: weak
    calibration_points:
    - Identify what is differentiated, which frame makes it relevant, and whether the distinction
      persists across repeated episodes rather than appearing only as an abstract contrast.
    non_capture_note: >
      Structural awareness is not phenomenological consciousness.
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Temporally stabilized structuring of impulse and expectation within a frame.
    generative_reasoning:
    - ∇ introduces directional impulse.
    - □ constrains and structures the impulse.
    - Λ encodes expectations and meaningful non-events.
    - Θ temporalizes the configuration into trajectories.
    notes: >
      Coherence captures narrative stability of action, including meaningful absences and delays,
      without yet requiring full integration or self-binding. Rival theories may formalize coherence
      differently.
    case_reading: >-
      Coherence_C is weak because the case does not specify an impulse, expectation, non-event,
      or temporal trajectory. It may become relevant if boundary confusion stabilizes around
      expected clarifications, omissions, delays, or repeated unresolved boundary-crossings
      within a frame.
    status: weak
    calibration_points:
    - Distinguish structural coherence from truth, consensus, validity, forced integration,
      or narrative smoothing of unresolved boundary conflict.
    non_capture_note: >
      Coherence does not prove adequacy.
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding orientation toward asymmetry extended across time and recontextualization.
    generative_reasoning:
    - Ω creates structural imbalance in exposure, capacity, or obligation.
    - Θ extends this imbalance into enduring commitments.
    - Φ allows reinterpretation of obligations under changing conditions.
    - Ψ binds the agent to these obligations as part of its self-relation.
    notes: >
      Responsibility is structural rather than moralistic in this specification. It is formally
      derived within PMS, not asserted as the only valid theory of responsibility.
    case_reading: >-
      Responsibility_R is weak and conditional. The word responsibility appears in the case
      material, but the PMS-derived structure requires calibrated Ω, Θ, Φ, and Ψ: asymmetry,
      temporal extension, recontextualization, and self-binding. These are not established
      by the abstract material alone.
    status: weak
    calibration_points:
    - Identify the asymmetry, temporal extension, possible recontextualization, and self-binding
      commitment before claiming PMS Responsibility_R.
    non_capture_note: >
      Responsibility_R is not moral blame, diagnosis, or legal liability.
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ provides energetic directedness.
    - Θ structures this directedness as a trajectory rather than a momentary reaction.
    - Σ integrates conflicting impulses, constraints, and roles into a coherent enactment.
    notes: >
      Action here is not any behavior; it is integrated and temporally extended. Higher operators
      such as Ω, Φ, and Ψ may enrich it, but are not required for its minimal structural definition
      within PMS.
    case_reading: >-
      Action_E is under-specified. Repeated boundary crossing may involve enacted directedness,
      but the case does not identify concrete behavior, temporal trajectory, or integration
      into coherent enactment.
    status: under_specified
    calibration_points:
    - Distinguish integrated action from mere boundary ambiguity, claim-making, isolated behavior,
      conceptual classification, or unresolved tension.
    non_capture_note: >
      Without a concrete scene, Action_E may remain under-specified.
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-bound reflective restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how asymmetry is handled,
      not the ranking of persons or ontological worth.
    case_reading: >-
      Dignity_in_Practice_D constrains the application rather than ranking anyone in the scene.
      The reading must handle possible asymmetry with restraint, avoid shame or person-ranking,
      and refuse diagnostic, legal, or moral verdicts from PMS coherence alone.
    status: application_constraint
    calibration_points:
    - Check whether any asymmetry is handled without ranking, shaming, humiliating, diagnosing,
      blaming, or irreversibly labeling persons.
    non_capture_note: >
      D is a praxeological application constraint, not an ontological or moral superiority
      claim.
self_model_analysis:
  id: SELF_FIXPOINT
  priority_in_this_case: not_applicable
  formula_sequence:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  description: >
    Formal representation of self-binding as the result of integrated, reflexively modulated,
    temporally extended, asymmetry-aware patterns of praxis being bound into a relatively stable
    self-relation.
  case_reading: >-
    SELF_FIXPOINT is not warranted as the primary structure of this abstract case. Boundary
    Confusion does not supply a concrete subject, integrated trajectory, durable self-relation,
    or commitment across time. Ψ remains relevant only as application self-binding and as a
    possible later calibration point if a concrete scene supplies durable obligations.
  implications:
  - Within PMS, selfhood can be modeled as the result of structured praxis rather than its
    origin.
  - Identity is represented as relatively stable self-binding to integrated trajectories.
  - No phenomenological or metaphysical claims about subjectivity are implied.
  interpretation_note: >
    This sequence records one derivational strategy within PMS. It must not be read as proving
    that all forms of selfhood, agency, identity, or case structure reduce without remainder
    to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions as
    literal subjectivity unless explicitly scoped as structural self-binding or analytic self-binding.
asymmetry_drift_patterns:
  status_in_this_case: possible_but_not_entailed
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms. They
    are not automatically entailed by a case and must not be treated as diagnoses, person-types,
    or moral verdicts.
  AD_A_much_greater_E:
    code: AD_A>>E
    name: Excessive Distance between Awareness and Enactment
    applicability: possible_but_not_entailed
    structural_basis:
      formula:
      - Φ
      - Α
      - Ω
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor formation, while
        recontextualization reinforces drift toward evaluation rather than supporting integrative
        transformation and balanced enactment.
    generative_mechanism:
    - 'Ω: evaluative or positional asymmetry becomes structurally salient.'
    - 'Α: the asymmetry stabilizes into recurrent evaluative patterning.'
    - 'Φ: recontextualization reinforces drift toward evaluative framing rather than restoring
      balance or integration.'
    case_reading: >-
      AD_A>>E remains only a risk. Boundary confusion could invite expanded evaluation of
      boundaries without corresponding enactment or repair, but the case material does not
      show awareness inflation, delayed action, or evaluative drift.
    axis_effects:
      awareness_axis: under_specified
      action_axis: under_specified
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state, or moral judgment.
  AD_under_integration:
    code: AD_Sigma_low
    name: Fragmented integration
    applicability: possible_but_not_entailed
    structural_basis:
      primary_tension:
      - Φ
      - Σ
      condition: recontextualization_outpaces_integration
      description: >
        Frequent recontextualization without sufficient integration leads to unstable trajectories
        and weak coherence of praxis, especially where unstable recontextualization and weak
        integration unfold under asymmetrically loaded praxis conditions.
    generative_mechanism:
    - 'Φ: frames are frequently shifted or updated in ways that destabilize continuity.'
    - 'Σ: integration fails to consolidate multiple perspectives and impulses into coherent
      enactment.'
    case_reading: >-
      AD_Sigma_low remains only a risk. Rival frames could outpace integration if role, responsibility,
      space, or decision boundaries are repeatedly reframed without coordination, but the abstract
      material does not establish volatile coherence or inconsistent responsibility.
    axis_effects:
      coherence_axis: under_specified
      responsibility_axis: under_specified
    guardrail: >
      This pattern describes structural volatility in action forms, not a clinical state, diagnosis,
      or person-type.
example_operator_chains_application:
  note: >
    The chains below apply PMS.yaml example operator chains to the case. They are not the only
    possible formal pathways and do not settle the case by themselves.
  minimal_praxis:
    formula:
    - □
    - ∇
    - Δ
    description: A frame constrains an impulse that arises from a difference.
    case_reading: >-
      Minimal praxis appears as a framed distinction: a role, responsibility, space, or decision
      boundary becomes relevant and generates possible directed pressure to cross, defend,
      clarify, contest, or maintain it.
    status: active
  pattern_formation:
    formula:
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Attractor formation via repeated framed impulses and non-events.
    case_reading: >-
      Pattern formation is weak. The phrase repeatedly crossed suggests possible attractor
      formation, but PMS requires recurrence and structured expectation rather than a merely
      named repetition.
    status: weak
  asymmetry_emergence:
    formula:
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Asymmetrical roles emerging from stabilized patterns.
    case_reading: >-
      Asymmetry emergence is weak. It becomes relevant if recurring boundary patterns stabilize
      unequal authority, exposure, access, vulnerability, or responsibility gradients.
    status: weak
  developmental_trajectory:
    formula:
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Temporal extension of asymmetric patterns into trajectories.
    case_reading: >-
      Developmental trajectory is weak. Repeated crossing may unfold over time, but no sequence,
      duration, escalation, repair, or anticipation is supplied.
    status: weak
  reflexive_praxis:
    formula:
    - Σ
    - Χ
    - Φ
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Reflexively integrated praxis with distance, recontextualization, and integration.
    case_reading: >-
      Reflexive praxis is weak and mainly analytic. A concrete case might involve recontextualization,
      distance, and integration of boundary frames; here Χ primarily constrains the analysis
      from becoming a verdict.
    status: weak
  self_binding_chain:
    formula:
    - Ψ
    - Σ
    - Χ
    - Φ
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Default repository chain for self-binding as structured self-relation.
    case_reading: >-
      The self-binding chain is not a case-level model here. It remains an analytic reminder
      that PMS selfhood claims must be derived from full operator calibration and must not
      be imposed on an abstract boundary problem.
    status: analytic_only
computational_representation:
  file_role: case_application_representation
  representation_scope: >
    This YAML encodes a PMS-based case analysis in machine-readable form. It does not implement
    praxis, agency, consciousness, selfhood, morality, diagnosis, legal judgment, or empirical
    validation.
  supports:
  - machine_readable_loading
  - dependency_reasoning
  - operator_chain_validation
  - simulation_scaffolding
  - structural_analysis
  - agent_architecture_modeling
  - export_to_json_xml_graphviz
  - meta_theoretical_inspection
  does_not_guarantee:
  - direct_implementation_of_praxis
  - interoperability_across_architectures
  - explanatory_sufficiency
  - empirical_adequacy_without_testing
  - exhaustive_capture_of_modes_of_praxis
  - consciousness_or_subjective_experience
  - clinical_or_forensic_validity
  - policy_or_governance_validity
  - pms_base_validation
  requirements_for_operational_use:
  - architecture_specific_calibration
  - implementation_constraints
  - empirical_testing_where_applicable
  - external_evaluation
  - context_sensitive_interpretation
  - public_accountability_in_contexts_of_use
  case_operationalization_requirements:
    empirical_validation_required: true
    comparative_validation_required: true
    computational_validation_required: false
    legal_validation_required: false
    clinical_validation_required: false
    applied_validation_required: true
    fulfilled:
      empirical_validation: false
      comparative_validation: false
      computational_validation: false
      legal_validation: false
      clinical_validation: false
      applied_validation: false
    explanation: >-
      Operationalization would require concrete episodes, actor roles, boundary type, frame
      evidence, recurrence evidence, asymmetry direction, temporal sequence, and external standards
      where legal, clinical, institutional, or applied claims are sought. None of those requirements
      are fulfilled by the abstract case material.
  note: >
    Formal translation into YAML makes the case inspectable, but it does not by itself demonstrate
    completeness, finality, direct implementability, empirical adequacy, or superiority over
    rival formal schemas.
ai_interface_pms_alignment:
  welcome_message: >
    This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic,
    non-clinical, non-prescriptive, and non-metaphysical in its claims.
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect the case through Δ–Ψ without treating
      the template, pre-analysis, or any domain application as PMS Base.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual
      diagnosis.
    case_status: active
    case_application: Derived axes mode is used only to project formula-derived structures
      A, C, R, E, and D with weak or conditional statuses, not as independent diagnostic categories.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety
      without anthropomorphizing.
    case_status: not_applicable
    case_application: AI architecture mode is not applied because the case does not ask for
      agent design, system implementation, computational validation, or deployment logic.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity
      per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining
      reversibility, distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not
      to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints,
      and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility,
    Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - □
    - Χ
    - ∇
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Σ
    - Ψ
    asymmetries_and_temporal_trajectories_visible: >-
      Ω and Θ are visible only as conditional structural candidates: boundary confusion may
      involve unequal power, exposure, obligation, or responsibility across repeated episodes,
      but direction, magnitude, sequence, and persistence are not specified.
    recontextualization_distance_integration: >-
      Φ is conditional where rival frames define the boundary differently; Χ is active as
      application restraint and reversibility; Σ is weak because no integrated resolution or
      integration failure is shown.
    derived_axes_projection: >-
      Awareness_A is weak-to-moderate as sustained framed differentiation; Coherence_C and
      Responsibility_R are weak; Action_E is under-specified; Dignity_in_Practice_D is an
      application constraint.
    tentative_calibration_rivalry: >-
      Everything beyond the minimal □ ∘ Δ core remains calibration-dependent. Rival legal,
      ethical, institutional, relational, cultural, semantic, clinical, or non-PMS formalizations
      remain open, and non-capture is preserved.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - case_type_bound_structural_reading
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: >-
      The case type permits a bounded PMS projection over an abstract boundary problem. It
      does not permit empirical finding, concrete scene verdict, diagnosis, legal or forensic
      judgment, implementation claim, person-ranking, or PMS Base validation.
  coherence_risk:
    status: high
    reason: >-
      Boundary Confusion maps easily onto Δ, □, Α, Ω, Θ, Φ, Χ, Σ, and Ψ, so PMS coherence
      may become too smooth and under-discriminating if unclear, contested, crossed, violated,
      negotiated, legal, relational, and institutional boundaries are not separated.
    mitigation: >-
      The reading is constrained by weak operator statuses, explicit dependency checks, rival
      readings, falsifier conditions, operationalization requirements, and preserved non-capture
      zones.
  coverage_vs_discrimination:
    coverage_result: >-
      PMS covers the structural relation among distinction, frame, possible crossing pressure,
      recurrence, asymmetry, temporality, rival framing, reflective distance, and possible
      integration.
    discrimination_requirement: >-
      The PMS reading must distinguish unclear boundaries from contested boundaries, repeated
      crossings from stabilized attractors, asymmetry from moral fault, rival framing from
      drift, absence from non-capture, and coherence from adequacy.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Can the reading distinguish unclear, contested, crossed, violated, shared, negotiated,
      and absent boundaries?
    expected_pms_distinction: >-
      Δ and □ must identify the boundary and frame; Α and Θ must not be activated unless recurrence
      and temporal trajectory are shown; Ω must not be activated unless imbalance is calibrated.
    current_status: partially_satisfied
  - id: DT2
    test: Can the reading distinguish legitimate rival framing or non-capture from PMS drift,
      failed integration, or maturity failure?
    expected_pms_distinction: >-
      Φ must not absorb every rival frame; Χ must preserve distance and reversibility; Σ must
      not force coherence; Ψ must not rank maturity or assign person-level failure.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: Which role, responsibility, space, decision, access, authority, privacy, or obligation
      boundary is being differentiated, and are multiple boundary types being conflated under
      the single phrase Boundary Confusion?
    current_calibration: partial
  - operator: ∇
    question: What directed pressure, crossing, defense, clarification, refusal, repair, withdrawal,
      takeover, yielding, or contestation arises from the distinction, and is this directedness
      observable as praxis rather than inferred as motive?
    current_calibration: weak
  - operator: □
    question: Which frame defines the boundary and makes crossing, contestation, ambiguity,
      or non-response relevant: relational, institutional, familial, spatial, legal, ethical,
      procedural, decision-authority, or responsibility-distribution frame?
    current_calibration: partial
  - operator: Λ
    question: What expected clarification, refusal, permission, repair, restraint, acknowledgment,
      answer, decision, or non-interference is absent or delayed, and who or what frame makes
      that absence meaningful?
    current_calibration: weak
  - operator: Α
    question: What repeated pattern or role script shows stabilization rather than isolated
      ambiguity, accidental misunderstanding, temporary emergency, mutually negotiated exception,
      or merely abstract repetition?
    current_calibration: weak
  - operator: Ω
    question: What directional imbalance of power, exposure, capacity, vulnerability, obligation,
      access, responsibility, interpretive authority, institutional authority, or dependency
      is present, and can its direction be stated without moralizing it?
    current_calibration: weak
  - operator: Θ
    question: What sequence, duration, recurrence, accumulation, anticipation, delay, escalation,
      repair attempt, repair failure, or trajectory structures the case over time rather than
      merely naming it as repeated?
    current_calibration: weak
  - operator: Φ
    question: Which source frame and target frame recontextualize the boundary, and does the
      recontextualization improve discrimination rather than absorbing disagreement, refusal,
      rupture, missing evidence, or rival framing into PMS terms?
    current_calibration: weak
  - operator: Χ
    question: How does the analysis preserve reflective distance, reversibility, non-verdict
      status, and restraint under possible asymmetry while also avoiding false neutrality if
      a later concrete scene establishes harm, coercion, or enforceable obligation?
    current_calibration: satisfied
  - operator: Σ
    question: What conflicting elements are integrated, and does integration preserve difference,
      refusal, separation, rival framing, and possible non-capture rather than smoothing over
      conflict or treating PMS coherence as sufficient?
    current_calibration: weak
  - operator: Ψ
    question: What durable self-binding, promise, role ownership, accountability relation,
      stable normativity, or responsibility-as-self-commitment is actually in scope, and is
      Ψ being used without turning the case into person-ranking or maturity judgment?
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - Legal rights, consent, liability, custody, ownership, institutional jurisdiction, and
      evidentiary standards may require non-PMS legal or procedural frameworks.
    - Clinical or therapeutic boundary issues remain outside PMS diagnosis and would require
      qualified clinical context if clinically relevant.
    - Subjective experience of intrusion, care, fear, autonomy, obligation, or belonging is
      not captured as phenomenology by PMS operators.
    - Cultural, familial, historical, political, or institutional norms may define boundaries
      differently and may require rival frameworks.
    - Coercion, abuse, safety risk, or material vulnerability may require immediate protective
      frameworks beyond PMS structural analysis.
    - Some disagreement or refusal may be legitimate non-fit rather than PMS drift, incomplete
      integration, or incomplete calibration.
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration residue,
      incomplete integration, structured absence, or failed maturity. They may mark genuine
      limits of the PMS reading.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - A legal-forensic reading in which the boundary is defined by rights, contracts, consent,
      jurisdiction, or liability rather than PMS operators.
    - A relational autonomy reading in which the issue is negotiated agency and dependence
      rather than operator-chain drift.
    - A care-ethics reading in which boundary crossing may be support, obligation, abandonment,
      or intrusion depending on context.
    - An institutional role-theory reading in which ambiguity follows from policy, office,
      mandate, or governance design.
    - A semantic or pragmatic reading in which the word boundary conflates multiple concepts
      and needs conceptual clarification before PMS analysis.
    - A non-capture reading in which PMS is too general to discriminate the concrete boundary
      type without additional theory.
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat them unless
      comparison criteria are explicitly specified and applied.
  falsifier_conditions:
  - id: F1
    condition: >-
      The PMS reading is weakened if a concrete scene shows no relevant distinction between
      roles, responsibilities, spaces, decisions, access, authority, privacy, or obligations,
      or if the relevant boundary is already explicit, mutually understood, and neither contested
      nor crossed.
  - id: F2
    condition: >-
      PMS is under-discriminating if it cannot distinguish ordinary ambiguity, negotiated flexibility,
      mutually accepted role-sharing, legal violation, relational disagreement, institutional
      role conflict, accidental misunderstanding, and recurrent boundary-crossing pattern.
  - id: F3
    condition: >-
      The reading becomes over-assimilative if resistance, rupture, refusal, disagreement,
      missing evidence, unresolved absence, or rival framing is automatically redescribed as
      drift, failed integration, incomplete calibration, recontextualization, or maturity failure.
  - id: F4
    condition: >-
      The Ω reading is weakened if no directional imbalance of power, exposure, capacity,
      vulnerability, obligation, responsibility, access, or authority can be identified once
      the concrete scene is specified.
  - id: F5
    condition: >-
      The Α and Θ readings are weakened if the alleged repeated crossing is not supported by
      structurally similar episodes, temporal sequence, persistence, accumulation, anticipation,
      escalation, or failed repair.
  - id: F6
    condition: >-
      The Φ reading is weakened if alleged recontextualization merely renames the case in PMS
      terms without identifying a source frame, target frame, and discriminative gain.
  - id: F7
    condition: >-
      The Σ reading is weakened if integration functions as forced coherence, consensus pressure,
      erasure of separation, suppression of refusal, or premature resolution rather than as
      structurally discriminating coordination.
  - id: F8
    condition: >-
      The Ψ or SELF_FIXPOINT reading is invalid if the case lacks durable self-binding, promise,
      role ownership, stable normativity, or responsibility-as-self-commitment and nevertheless
      produces person-level maturity, identity, or responsibility verdicts.
  final_quality_status:
    result: usable_with_limits
    reason: >-
      The application is valid as a reversible, conceptual PMS projection with strong limits.
      It is not a concrete scene analysis and does not establish empirical, metaphysical,
      phenomenological, diagnostic, clinical, legal-forensic, implementation, or PMS Base
      validation claims. Its strength lies in structural sorting and dependency hygiene; its
      weakness would be over-smooth capture unless concrete calibration and rival readings
      remain active.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: >
    These requirements identify what would be needed to turn the PMS projection into a calibrated
    empirical, comparative, computational, legal, clinical, or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: Identify the specific boundary distinction at issue and separate role, responsibility,
        space, decision, authority, access, privacy, and obligation boundaries.
      ∇: Record observable pressures or directed moves such as crossing, defending, clarifying,
        refusing, repairing, withdrawing, or contesting.
      □: Specify the governing frame or frames, including relational, institutional, legal,
        familial, ethical, spatial, or decision-authority contexts.
      Λ: Identify the expected event whose absence matters, such as missing clarification,
        refusal, permission, restraint, repair, or decision.
      Α: Document repeated structurally similar episodes sufficient to show recurrence, stabilization,
        path dependence, or role-script formation.
      Ω: Calibrate directional imbalance in power, exposure, vulnerability, capacity, responsibility,
        obligation, authority, access, or interpretive control.
      Θ: Establish sequence, duration, recurrence, delay, escalation, repair, accumulation,
        or trajectory over time.
      Φ: Identify source frame and target frame and show whether reframing clarifies the case
        or absorbs non-fit.
      Χ: Specify how reflective distance, suspension of verdict, reversibility, restraint,
        and non-ranking are maintained in analysis or practice.
      Σ: Show concrete coordination of conflicting frames or obligations without forced coherence
        or erasure of non-capture.
      Ψ: Identify durable self-binding, promise, role ownership, stable normativity, or responsibility-as-self-commitment
        before using Ψ substantively.
    negative_cases:
    - A case where boundaries are explicit, mutually understood, and only appear confused because
      an outside observer lacks context.
    - A mutually negotiated boundary exception that is not a crossing, violation, or attractor.
    - A purely legal boundary dispute that is better resolved by statute, contract, policy,
      or evidence than by PMS.
    - A single accidental misunderstanding without recurrence, asymmetry, or meaningful non-event.
    - A symmetrical semantic disagreement about terminology without role, responsibility, space,
      or decision implications.
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: >-
    Operationalization is not fulfilled. The present material is abstract and lacks actors,
    evidence, episodes, frames, temporal sequence, asymmetry calibration, and external validation
    criteria.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity
    per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice
    (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: Boundary Confusion is not interpreted as a mental state, personality
      trait, motive, pathology, or defect in any person.
    non_metaphysical: The analysis does not decide where persons metaphysically begin or end,
      nor does it define ontological selfhood, essence, consciousness, or moral worth.
    non_diagnostic: No clinical, therapeutic, personality, maturity, competence, or risk diagnosis
      is made from the PMS reading.
    non_legal_forensic: No legal right, liability, culpability, consent status, property boundary,
      custody boundary, institutional authority, or evidentiary conclusion is established.
    non_implementation_claim: The YAML analysis is not a procedure, policy, enforcement mechanism,
      software implementation, governance system, or operational decision rule.
    non_moral_ranking: The analysis does not rank persons, sides, roles, communities, or interpretations
      as morally superior or inferior.
    non_exhaustive_capture: PMS captures only a structural projection of boundary confusion
      and may miss legal, clinical, cultural, historical, relational, safety, or phenomenological
      dimensions.
    reversibility: Every substantive claim beyond □ ∘ Δ is marked weak, conditional, or under-specified
      unless a concrete scene supplies calibration; rival readings and falsifiers remain open.
    dignity_in_practice: Dignity-in-Practice is preserved by handling possible asymmetry with
      restraint, avoiding shame and person-ranking, and refusing to turn PMS coherence into
      a verdict.
limits:
- The PMS reading is limited by the absence of a concrete praxis scene, named actors, episodes,
  evidence, boundary type, sequence, frame detail, and asymmetry direction.
- The analysis makes no empirical, metaphysical, phenomenological, diagnostic, clinical, legal,
  forensic, implementation, or PMS Base validation claim.
- Rival readings remain open, including legal, clinical, relational, ethical, institutional,
  cultural, semantic, and non-PMS formalizations; disagreement or refusal is not automatically
  PMS drift.
- The reading has high coherence risk because boundary confusion maps easily onto many PMS
  operators; discriminative force depends on calibration and falsifier testing.
case_synthesis:
  primary_pms_reading: >-
    Boundary Confusion is best modeled minimally as framed difference: □ ∘ Δ. It concerns
    distinctions between one person’s role, responsibility, space, or decision and another’s,
    as made relevant by frames that may be unclear, contested, or repeatedly crossed. This
    minimal formula is deliberately conservative: it captures the structural entry point without
    deciding whether the boundary is violated, negotiated, legally binding, clinically salient,
    morally charged, or exhaustively PMS-legible.
  continuity_condition: >-
    Continuity becomes relevant only if repeated boundary crossings form a stable pattern across
    time. This would require calibrated Α and Θ evidence: structurally similar episodes, temporal
    sequence, persistence, accumulation, anticipation, escalation, repair attempts, or repair
    failures. The abstract case wording suggests this possibility but does not establish it.
  change_condition: >-
    Change or recontextualization becomes relevant if a boundary is shifted from one frame
    to another, such as help to intrusion, shared responsibility to overreach, autonomy to
    abandonment, flexibility to violation, or role support to role capture. This requires an
    identified source frame, target frame, and discriminative gain, and is not automatically
    implied by disagreement.
  rupture_or_non_fit_condition: >-
    Rupture, resistance, disagreement, absence, missing evidence, refusal, or non-fit is preserved
    as possibly legitimate, unresolved, externally governed, or non-capturable rather than
    automatically translated into PMS drift, failed integration, incomplete calibration, deficient
    recontextualization, or maturity failure.
  responsibility_condition: >-
    Responsibility_R is conditional. It requires calibrated Ω, Θ, Φ, and Ψ: asymmetry, temporal
    extension, recontextualization, and self-binding. The abstract case names responsibility
    but does not establish the derived PMS structure. Responsibility here therefore remains
    a possible structural projection, not a moral verdict, legal liability, diagnostic conclusion,
    or selfhood claim.
  dignity_condition: >-
    Dignity-in-Practice constrains the analysis to handle possible asymmetry with reflective
    restraint, non-ranking, reversibility, and avoidance of diagnostic, legal, moral, clinical,
    forensic, or ontological verdicts. It functions as a praxeological application constraint,
    not as an assertion of ontological dignity, moral superiority, or comparative human worth.
  rival_reading_condition: >-
    Rival formalizations remain open unless explicit comparison criteria are supplied and
    applied. PMS translation does not defeat legal, ethical, relational, institutional, clinical,
    cultural, semantic, procedural, safety-oriented, or other structural readings. A stronger
    PMS fit would still need discriminative force, not merely operator coverage.
final_structural_formula:
  primary_formula: □ ∘ Δ
  primary_formula_status: primary_case_model
  compressed_reading: >-
    Boundary Confusion is minimally a framed distinction problem. Conditional extensions into
    ∇, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ become legitimate only where concrete calibration shows
    directed pressure, meaningful absence, recurrence, asymmetry, temporal trajectory, frame
    transformation, reflective distance, integration, or self-binding. The strongest safe
    reading remains conservative because the case is not a concrete scene.
  final_validity_status: valid_with_limits
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It does not establish
    empirical truth, metaphysical truth, phenomenological completeness, diagnostic validity,
    clinical validity, legal or forensic validity, implementation validity, moral ranking,
    person-ranking, or PMS Base validation. It remains reversible, case-type-bound, non-tribunal,
    and open to rival formalizations and possible non-capture.