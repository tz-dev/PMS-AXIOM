derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - Awareness_A
    - Coherence_C
    - Responsibility_R
    - Action_E
    - Dignity_in_Practice_D
    - SELF_FIXPOINT
    - AD_A_much_greater_E
    - AD_under_integration
  usage_rule: >
    Each derived structure must be marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration
    does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not
    independent axioms, diagnoses, ontological rankings, metaphysical entities,
    or proof of PMS completeness.
  case_status: >
    Awareness_A is active as structural trace differentiation. Coherence_C is
    weak. Responsibility_R is not applicable at object level. Action_E is
    under-specified. Dignity_in_Practice_D is active as an application
    constraint. SELF_FIXPOINT is analytic-only. AD_A>>E and AD_Sigma_low are
    possible but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically.
    case_reading: >
      Awareness_A is active as structural trace differentiation if the audit
      trace sustains distinctions across time: oracle boundary, query state,
      control condition, mark state, phase relation, and measurement mapping.
      This is not consciousness.
    status: "active"
    calibration_points:
      - "Specify what is differentiated, in what frame, and across which temporal structure."
    non_capture_note: "Structural awareness is not phenomenological consciousness."

  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures stability of action and expectation without requiring
      full integration or self-binding.
    case_reading: >
      Coherence_C is weak because the case lacks concrete trace semantics and
      because Λ is not fully established. Coherence must not be confused with
      quantum correctness, legal sufficiency, implementation validity, or
      narrative smoothing.
    status: "weak"
    calibration_points:
      - "Distinguish coherence from truth, validity, forced integration, or narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."

  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic and is not legal
      liability.
    case_reading: >
      Responsibility_R is not established because the case specifies no
      accountable agent, role obligation, stable policy commitment, legal duty,
      or governance relation.
    status: "not_applicable"
    calibration_points:
      - "Identify asymmetry, temporality, recontextualization, and self-binding before claiming Responsibility_R."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."

  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory."
      - "Σ integrates conflicting impulses, constraints, and roles into coherent enactment."
    notes: >
      Action here is not any behavior; it requires integration and temporal
      extension.
    case_reading: >
      Action_E is under-specified. The workflow has directed temporal operation,
      but PMS Action_E requires Σ, and concrete integration among circuit logic,
      oracle semantics, measurement mapping, and audit objective is not supplied.
    status: "under_specified"
    calibration_points:
      - "Distinguish action from mere behavior, operation, claim, or abstract structure."
    non_capture_note: "Action_E is not automatically present in every computation."

  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-Practice concerns how asymmetry is handled, not ontological
      worth or moral ranking.
    case_reading: >
      Dignity_in_Practice_D is active as a praxeological application
      constraint. It requires the analysis to handle oracle asymmetry with
      restraint, avoid tribunal posture, avoid person-ranking, and avoid turning
      opacity or non-fit into blame, defect, immaturity, or ontological judgment.
    status: "application_constraint"
    calibration_points:
      - "Check whether asymmetry is handled without ranking, shaming, or irreversible labeling."
    non_capture_note: "Dignity-in-Practice is not ontological dignity or moral superiority."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of
    praxis being bound into a relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not established for the quantum workflow. It is retained
    only as an analytic reference for the full PMS chain and for the
    self-binding discipline of this application. A limited artificial-system
    analogue would require explicit stable policy or constraint binding across
    time, which the case material does not provide.
  implications:
    - "No selfhood is attributed to the workflow."
    - "Artificial-system Ψ would require explicit policy or constraint stability."
    - "No phenomenological or metaphysical claim follows."
  interpretation_note: >
    This sequence records one derivational strategy within PMS and does not
    prove that all forms of selfhood reduce to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT may not capture all selfhood, system constraint structures, or
    rival accounts.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    Drift patterns are conditional structural risks, not diagnoses, person-types,
    clinical categories, moral verdicts, or forensic conclusions.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces evaluation rather than
        supporting integrative transformation or balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces evaluative framing rather than restoring balance, integration, or bounded enactment."
    case_reading: >
      AD_A>>E is a possible structural risk if audit framing expands
      awareness-like evaluation of oracle asymmetry while integrated action
      remains suppressed, chronically delayed, or under-specified. In this case,
      however, the material provides no concrete action axis, no concrete
      audit-response cycle, and no evidence that awareness has actually
      over-expanded. Strong directionality alone is insufficient.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      legal finding, forensic conclusion, or moral judgment.

  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration can produce
        unstable trajectories and weak coherence of praxis, especially where
        multiple frames remain active but are not consolidated into a coherent
        enactment structure.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated across oracle, circuit, DAG, program, measurement, audit, and PMS readings."
      - "Σ: integration would require coordination among these frames, but such coordination is not established by the abstract case material."
    case_reading: >
      AD_Sigma_low is a possible structural risk if the workflow is repeatedly
      recontextualized across oracle, circuit, DAG, program, measurement, and
      audit frames without sufficient integration. The case does not establish
      fragmented integration. Rival formalizations, unresolved technical
      questions, or legitimate non-fit must not be treated as drift by default.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes conditional structural volatility in an action
      form, not a clinical state, diagnosis, person-type, legal-forensic
      finding, or maturity judgment.

