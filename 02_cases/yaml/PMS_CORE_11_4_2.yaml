  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    This case analysis applies PMS_1.3 only. It does not redefine PMS operators,
    alter the default PMS operator order, introduce new meta-axioms, treat
    derived structures as primitives, override PMS guardrails, or claim PMS Base
    validation.
  referenced_base_sections:
