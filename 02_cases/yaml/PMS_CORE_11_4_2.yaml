operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - boundary_formation
      - object_differentiation
      - structural_contrast
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ identifies distinctions that make the case analyzable:
      oracle-like versus non-oracle-like components, black-box versus
      transparent access, queried versus unqueried path, marked versus unmarked
      state, controlled versus uncontrolled operation, phase-shifted versus
      unshifted behavior, and measured versus unmeasured mapping.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify which distinction is actually present in the workflow representation."
      - "Do not conflate black-box opacity, control directionality, phase marking, and measurement mapping."
    falsifier_conditions:
      - "If no stable distinction is identifiable, the PMS reading loses its entry point."
    non_capture_note: "Difference does not by itself prove that PMS captures the case."

  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - activation
      - orientation
      - energetic_gradient
      - proto_agency
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as structural directedness: oracle query flow, control
      activation, marking, phase-kickback relation, or measurement-channel
      mapping. This is not psychological desire or subjective drive.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Treat the tension as structural and computational-representational, not psychological."
      - "Specify whether directionality is query-based, control-based, phase-based, marking-based, or measurement-based."
    falsifier_conditions:
      - "If no directed activation follows from Δ, ∇ is under-specified."
    non_capture_note: "Impulse is structural directedness, not diagnosis."

  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - context
      - boundary_conditions
      - relevance_structuring
      - role_space
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is supplied by the workflow frame: circuit, hybrid DAG, or
      macro-program; by the oracle interface; by the measurement frame; and by
      the audit-trace frame that determines relevance.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame: circuit, DAG, macro-program, oracle interface, measurement mapping, or audit trace."
      - "Mark shifts between technical frame, audit frame, and PMS structural frame."
    falsifier_conditions:
      - "If no frame is specified, the analysis becomes too abstract to discriminate."
    non_capture_note: "A frame can clarify the case without exhausting it."

  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - expectation
      - counterfactual_structure
      - tension_through_absence
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is relevant only where the frame creates an expectation whose absence
      matters: missing trace information, unobserved oracle mapping, unqueried
      branch, non-triggered control, delayed measurement, absent mark, or absent
      explanation. Because the case gives no concrete trace, Λ remains weak.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the expected occurrence and the frame within which its absence matters."
      - "Preserve the possibility that absence marks PMS non-capture rather than case defect."
    falsifier_conditions:
      - "If no structured expectation exists, Λ should not be asserted beyond weak possibility."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."

  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - pattern_formation
      - stability
      - path_dependence
      - role_script_emergence
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α may appear if oracle calls, controls, marks, measurement mappings, or
      audit-trace patterns recur and stabilize. The abstract case states one or
      more oracle-like components but does not specify recurrence.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence or stabilization rather than merely naming one component."
      - "Distinguish genuine attractor from accidental aggregation or analyst-imposed pattern."
    falsifier_conditions:
      - "If recurrence is not shown, Α is over-read."
    non_capture_note: "Pattern formation is not proof of explanatory sufficiency."

  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - role_differentiation
      - responsibility_gradients
      - vulnerability_structures
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is central because the case explicitly names strong directionality.
      The relevant asymmetry may be informational, causal, interpretive,
      control-based, access-based, exposure-based, measurement-based, or
      audit-based, but not automatically moral, legal, or diagnostic.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify the direction and kind of asymmetry."
      - "Do not moralize, juridify, or personify asymmetry by default."
      - "Although Ω is materially suggested, its PMS dependency on Α remains weak until recurrence or stabilization is shown."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: "Asymmetry is structural, not a moral verdict."

  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - sequence_and_trajectory
      - persistence
      - anticipation_and_delay
      - developmental_arcs
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ appears through workflow ordering: circuit sequence, DAG dependence,
      macro-program steps, oracle-query order, controlled-unitary activation,
      phase-kickback effects, measurement timing, hybrid feedback, delayed
      observation, and audit-trace accumulation.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish temporal trajectory from static component description."
      - "Check whether temporality is essential to the audit reading or merely incidental."
    falsifier_conditions:
      - "If temporal extension, ordering, delay, persistence, or accumulated dependency is not required, Θ is overextended."
    non_capture_note: "Temporality does not settle empirical or metaphysical status."

  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - adaptation
      - reinterpretation
      - developmental_change
      - pattern_shift
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ appears when the same oracle-like component is re-read across frames:
      quantum circuit semantics, DAG semantics, macro-program semantics,
      oracle specification, measurement theory, audit trace, and PMS structural
      projection.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name source frame and target frame explicitly."
      - "Check whether recontextualization clarifies a grounded shift or merely absorbs non-fit, missing evidence, or rival formalization."
    falsifier_conditions:
      - "If every rupture, resistance, missing trace, or rival description is absorbed as Φ, the reading is over-assimilative."
    non_capture_note: "Recontextualization does not defeat rival readings."

  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - regulation
      - inhibition
      - reflection_and_meta_position
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as audit discipline. It suspends premature verdict, prevents
      oracle opacity from becoming blame or proof, prevents strong directionality
      from becoming implementation confidence, and prevents PMS coherence from
      becoming validation.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Suspend empirical, legal, forensic, diagnostic, metaphysical, implementation, and PMS Base validation claims unless independently grounded."
      - "Distinguish reflective distance from avoidance, denial, or empty neutrality."
    falsifier_conditions:
      - "If Χ is suspended to force a verdict, produce a tribunal, rank persons, or claim validation from coherence, the PMS application is invalid."
    non_capture_note: "Distance is an application condition, not proof of adequacy."

  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - coherence
      - resolution_of_contradiction
      - multi_level_coordination
      - maturity_of_praxis
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak-to-moderate because concrete coordination among circuit logic,
      oracle semantics, control flow, measurement mapping, trace representation,
      and audit objective is not supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether integration discriminates rather than smooths over conflict."
      - "Distinguish integration from forced coherence."
    falsifier_conditions:
      - "If coherence is treated as proof of technical adequacy, empirical validity, audit sufficiency, or PMS completeness, Σ is overclaimed."
    non_capture_note: "Coherence does not prove adequacy."

  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - self_model
      - responsibility_as_self_commitment
      - stable_normativity
      - autobiographical_coherence
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is not established at object level. It may appear only as analytic
      self-binding of this PMS application, or as artificial-system policy and
      constraint stability if a concrete workflow or audit procedure specifies
      stable commitments across time.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only to explicit analytic self-binding or specified policy, constraint, or audit-commitment stability."
      - "Do not attribute selfhood, consciousness, subjective experience, or person-like responsibility to oracle-like components."
    falsifier_conditions:
      - "If Ψ is applied without established Σ, Θ, and Χ, or if it anthropomorphizes the workflow, the self-binding reading is under-specified."
    non_capture_note: "Self-binding in artificial systems is not consciousness."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 identifies distinctions, directed activations, workflow frames,
      possible meaningful absences, and possible recurrent oracle patterns.
      Δ, ∇, and □ are strong; Λ and Α remain calibration-sensitive.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 structures the case around strong directionality and workflow sequence.
      Ω is central; Θ is important; the dependency on Α remains weak.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration.
    case_function: >
      L3 structures the audit stance: Φ marks frame shifts, Χ preserves
      reversible distance, and Σ remains under-specified until concrete
      integration criteria are supplied.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is analytic-only and weak in this case. Ψ applies to application
      self-binding or to explicit policy/constraint stability only if specified.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Stable oracle-relevant distinctions are supplied by the case material."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Directional query, control, marking, phase, or measurement relations arise from those distinctions."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The workflow and audit-trace frames constrain relevance."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Only weakly satisfied: structured absence is possible but no concrete expected non-event is supplied."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Only weakly satisfied: recurrence or stabilization is possible but not shown."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Strong directionality directly suggests Ω, but the PMS dependency on Α remains weak."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Workflow sequence and trace accumulation suggest Θ, but full trajectory status is under-specified."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Frame shifts among technical, audit, and PMS readings support Φ, but rival formalizations remain open."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Claim typing, reversibility, and non-capture maintain Χ."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Only weakly satisfied: integration among workflow semantics and audit objective is not shown."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Weak and analytic-only: object-level self-binding is not provided."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state weak or not applicable rather than forcing the full chain."

