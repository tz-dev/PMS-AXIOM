    The template is an application schema subordinate to PMS.yaml. It organizes
    the case application but does not revise PMS Base.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as formally disciplined and portable, but not final,
    complete, uniquely ordered, or immune to revision.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - theoretical_reflection
      - structural_action_theory
      - anthropology_and_praxeology
      - systems_theory
      - ai_architecture_and_safety
      - model_documentation_and_specification
      - simulation_scaffolding
      - structural_reasoning
    not_intended_for:
      - clinical_diagnosis
      - personality_typing
      - mental_health_risk_assessment
      - automated_moral_judgement
      - individual_person_evaluation
      - forensic_decision_making
      - policy_enforcement
      - irreversible_labeling
  normative_position_alignment:
    ontology: >
      The case analysis makes no PMS-based claim about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological
      dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological application constraint
      on handling asymmetry, not as an ontological ranking.
    tragedy_clause: >
      Coherence, maturity, responsibility, or integration do not eliminate
      rupture, unresolved tension, tragedy, rival readability, or non-capture.
    self_binding_clause: >
      The application itself remains subject to Distance (Χ), Self-Binding
      discipline (Ψ), and Dignity-in-Practice (D).
  computational_position_alignment:
    representation_clause: >
      This YAML case representation is a formal encoding of a PMS reading, not a
      direct implementation of praxis, agency, selfhood, consciousness, or
      empirical validity.
    calibration_clause: >
      Operational use would require architecture-specific calibration,
      implementation constraints, empirical testing where applicable, external
      evaluation, context-sensitive interpretation, and public accountability.
    accountability_clause: >
      Formal translation into PMS terms does not by itself guarantee empirical
      adequacy, legal sufficiency, implementation validity, public
      intelligibility, or explanatory sufficiency.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars,
      formalisms, or technical analyses.
  terminology_alignment:
    praxis: >
      Situated meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through
      operator compositions.
    meta_axiom: "One of the eleven PMS operators Δ–Ψ."
    operator_composition: "Ordered or structured application of PMS meta-axioms."
    derived_construct: >
      A higher-order construct systematically derived from PMS operator
      compositions, not an independent primitive.
    asymmetry_drift_pattern: >
      A structurally derived distortion pattern within PMS; not a diagnosis,
      person-type, clinical category, ontological attribution, or moral verdict.
    repository_reference: "PMS.yaml remains the base reference."
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.4 Thinking)"
      role: "formalization_assistant"

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the current PMS Base reference. This case analysis depends on
    PMS.yaml but does not revise it.
  this_template_may:
    - depend_on_pms
    - reference_pms_operators
    - define_case_application_structure
    - organize_pms_operators_for_case_analysis
    - specify_case_quality_control
    - support_structural_reasoning
  this_template_must_not:
    - silently_redefine_meta_axioms
    - silently_alter_default_operator_order
    - silently_alter_default_dependency_path
    - present_new_meta_axioms_as_if_already_in_base_pms
    - treat_derived_axes_as_independent_primitives
    - override_application_guardrails_while_claiming_full_pms_conformity
    - claim_pms_base_validation_from_a_case
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >
    Any application of PMS presupposes acceptance of Distance (Χ),
    reversibility, and Dignity-in-Practice (D; a praxeological constraint, not
    ontological worth).
  applies_to: "application_only"
  does_not_apply_to:
    - critique
    - refusal
    - rejection
    - revision_proposals
    - rival_formalization
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >
          Reflective distance is maintained; the analysis does not fuse PMS into
          verdict, urgency, enforcement, closure, implementation confidence, or
          person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          Structural readings remain revisable, bounded, non-final, and
          non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >
          The analysis maintains enacted restraint under asymmetry and does not
          shame, rank, humiliate, anthropomorphize, or ontologically evaluate
          persons, groups, systems, or components.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      Any application of PMS is itself subject to PMS. Analyses that suspend
      Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in
      order to enforce truth, clarity, authority, resolution, or action are
      formally invalid as PMS applications.
    application_to_this_case: >
      The Oracle-Asymmetry Audit is treated as a reversible structural
      projection only. Oracle opacity is not converted into empirical proof,
      legal sufficiency, forensic sufficiency, implementation success,
      metaphysical claim, diagnostic claim, person ranking, or PMS Base
      validation.
  application_only_boundary:
    status: "active"
    statement: >
      PMS can be criticized, revised, rejected, ignored, or compared with rival
      formalizations without satisfying the PMS entry condition. The entry
      condition governs only applications that claim to use PMS.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, rival framing, unresolved absence, or
      missing evidence must not automatically be redescribed as drift, failed
      integration, incomplete calibration, recontextualization, structured
      absence, or maturity failure.
  no_pms_base_revision:
    status: "active"
    statement: >
      This case does not alter PMS Base, PMS operators, PMS dependencies,
      derived structures, guardrails, or repository governance.

case:
  title: "Oracle-Asymmetry Audit (Audit Trace)"
  interpretation_type: "conceptual_domain_projection"
  case_type: "structural audit projection for quantum workflow components with oracle-like directionality"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    The case analyzes, under PMS_1.3 only, the structural form of a quantum
    workflow that contains oracle-like components: black-box functions, marking
    or phase-kickback primitives, controlled unitaries, or measurement mappings
    that impose strong directionality. The PMS scope is limited to framed
    distinctions, directed activation, possible structured absence, possible
    recurrence, asymmetry, temporality, recontextualization, reflective
    distance, possible integration, and limited self-binding only where stable
    policy or constraint commitments are explicitly in scope.
  non_scope: >
    The analysis does not claim quantum-mechanical correctness, empirical
    performance, hardware validity, safety, legal admissibility, forensic
    sufficiency, clinical relevance, metaphysical truth, consciousness, agency,
    implementation success, governance sufficiency, person ranking, or PMS Base
    validation.
  non_goals:
    - metaphysical_proof
    - diagnostic_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - irreversible_labeling
    - pms_base_validation
  case_typing_note: >
    This is not a concrete praxis scene because no specific circuit, DAG,
    macro-program, oracle interface, trace log, measurement record, stakeholder
    role, validation protocol, or failure event is provided. It is a conceptual
    domain projection over a class of oracle-asymmetry audit situations.

