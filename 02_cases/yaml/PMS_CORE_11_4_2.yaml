core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The Oracle-Asymmetry Audit is treated as a structure of praxis-like
      relations: distinction, direction, framing, asymmetry, temporal ordering,
      recontextualization, and audit distance. The quantum workflow is not
      treated as a person, psychological essence, inner experience, conscious
      agent, or metaphysical subject.
    failure_condition: >
      The analysis would fail P1 if it turned oracle opacity, directional
      control, phase marking, measurement mapping, or audit traceability into a
      claim about personhood, psychology, inner state, ontological agency, or
      subjective awareness.

  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis for praxis. Whether they are fully complete, optimally
      minimal, or uniquely ordered remains open to critique and further
      formalization.
    status: "satisfied"
    case_application: >
      Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as
      PMS operators. Domain terms such as oracle, black-box function,
      phase-kickback primitive, controlled unitary, quantum workflow,
      measurement map, hybrid DAG, macro program, and audit trace remain case
      material, not added PMS operators.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes,
      layers, principles, or drift structures in order to make the quantum
      workflow fit PMS more smoothly.

  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: structures such as awareness, coherence,
      responsibility, action, dignity-in-practice, SELF_FIXPOINT, and asymmetry
      drift patterns are derived from operator compositions rather than treated
      as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, AD_A>>E, and AD_Sigma_low are
      treated only as formula-derived PMS structures. Their inclusion does not
      imply activation. Where the case lacks concrete workflow evidence, the
      relevant structure is marked weak, under-specified, not applicable, or
      possible but not entailed.
    failure_condition: >
      The analysis would fail P3 if any derived structure were used as an
      independent axiom, as an empirical finding, as a diagnosis, or as a
      shortcut around the PMS operator dependencies.

  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are central structural operators.
      Responsibility, maturity, coherence, and dignity-in-practice are analyzed
      under temporal and asymmetrical conditions rather than as static
      attributes.
    status: "satisfied"
    case_application: >
      Ω is central because the case explicitly names oracle-like components
      that impose strong directionality. Θ is relevant because workflows,
      circuits, DAGs, macro-programs, queries, controlled activations,
      measurements, and audit traces unfold through order, delay, sequence, or
      accumulation. Both operators are treated structurally, not morally,
      legally, diagnostically, or metaphysically.
    failure_condition: >
      The analysis would fail P4 if it ignored strong directionality, treated
      temporality as irrelevant to workflow traceability, or converted
      structural asymmetry into moral blame, forensic sufficiency, or
      person-ranking.

  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be computationally represented, but representation does not by
      itself imply direct implementation, interoperability, empirical adequacy,
      explanatory sufficiency, consciousness, or selfhood.
    status: "satisfied"
    case_application: >
      The YAML representation is a case-application encoding only. It is not a
      quantum implementation, executable verifier, empirical run, safety proof,
      hardware model, trace validator, legal audit, or implementation guarantee.
    failure_condition: >
      The analysis would fail P5 if the presence of YAML structure, PMS
      coherence, or operator coverage were treated as implementation validity,
      empirical adequacy, or computational sufficiency.

  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS remains open to rival grammars, sharper discriminative models,
      empirical correction, and non-PMS formalizations.
    status: "satisfied"
    case_application: >
      Rival readings remain open: quantum circuit semantics, formal
      verification, black-box testing, oracle-access security, causal DAG
      analysis, type-theoretic or category-theoretic modeling, software
      traceability, measurement theory, and governance or compliance analysis
      if external criteria are later supplied.
    failure_condition: >
      The analysis would fail P6 if PMS translation were treated as defeating,
      absorbing, or superseding rival formalizations merely because the PMS
      reading is coherent.

  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, unresolved absence, and rival framing may
      remain partially or wholly outside the PMS reading.
    status: "satisfied"
    case_application: >
      Possible non-capture is preserved for mathematical quantum semantics,
      hardware behavior, noise, decoherence, error correction, measurement
      statistics, legal standards, implementation constraints, security proof
      obligations, and rival formalisms that may explain the case more sharply.
    failure_condition: >
      The analysis would fail P7 if missing evidence, non-fit, rival
      formalization, or unresolved absence were automatically redescribed as PMS
      drift, failed integration, incomplete calibration, recontextualization, or
      maturity failure.

  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No person, group, mental state, trait, diagnosis, maturity level, clinical
      status, or moral rank is inferred. Drift patterns are handled only as
      conditional structural risks in a conceptual workflow reading.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, competence,
      character, maturity, blameworthiness, risk status, or psychological
      profile from the PMS structure.

  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must remain tied to specific scenes, roles, structures,
      and interpretive boundaries. Decontextualized global labels are out of
      scope.
    status: "partial"
    case_application: >
      Because the case is not a concrete praxis scene, the analysis is
      case-type-bound rather than scene-bound. No specific circuit, DAG,
      macro-program, oracle interface, trace log, measurement result,
      stakeholder role, validation protocol, or failure event is supplied.
      Therefore, all concrete-scene conclusions remain unestablished.
    failure_condition: >
      The analysis would fail P9 if it presented abstract case-type projection
      as a concrete audit verdict, empirical finding, implementation assessment,
      legal-forensic judgment, or final PMS validation.

