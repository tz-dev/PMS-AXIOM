      definition: "Structural assignability of consequences to an agent or trajectory."
      case_relevance: "not_applicable"
    Closure_Non_Closure_Lambda:
      definition: "Closure refers to final explanation or justification; Λ marks the structural impossibility of such finality."
      case_relevance: "active"
    Logic_paper_specific:
      definition: "Discipline of consistency and derivation operating within frames; tool, not final authority."
      case_relevance: "active"
    Moral_Morality:
      definition: "Interpretability of praxis once responsibility is structurally attributable under Ω, Θ, and Λ."
      case_relevance: "not_applicable"
    Norm_Ought:
      definition: "A prescriptive demand; no PMS operator generates norms or ought-statements."
      case_relevance: "active"
    Non_Innocence:
      definition: "Consequences are attributable even without intent or command; distinct from guilt or blame."
      case_relevance: "not_applicable"
    Potential_Capacity:
      definition: "Effective ability to influence outcomes within □ and over Θ; exposure to consequences, not obligation."
      case_relevance: "not_applicable"
    Responsibility:
      definition: "Attribution of consequences to a self-bound trajectory under Ω and Θ; not equivalent to duty."
      case_relevance: "not_applicable"
