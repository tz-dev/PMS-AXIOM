pms_qc_ext_overlay_application:
  schema_version: "PMS-QC_EXT_1.1"
  schema_role: "case_extension_overlay_application"
  overlay_status: "optional_paper_specific_refinement_layer"
  overlay_source_file: "PMS-QC-EXT.yaml"
  base_qc_overlay_source_file: "PMS-QC.yaml"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  extends:
    base_model: "PMS-QC_1.1"
    base_dependency: "PMS_1.3"
    compatibility: "Declared for PMS-QC_1.1 as an optional paper-specific refinement layer. This extension does not override PMS or PMS-QC base semantics."

  pms_application_reference:
    note: "Any use of PMS-QC_EXT that claims PMS-based application remains subordinate to the PMS_1.3 entry condition and self-binding clause. This extension does not suspend, replace, or override PMS application guardrails."
    refers_to:
      - "pms_entry_condition"
      - "schema_meta.normative_position.self_binding_clause"
      - "repository_governance"
    case_application: "The QC-EXT reading remains subordinate to the completed PMS Core case and the PMS-QC base overlay. It adds optional paper-specific measurement-domain refinement only and does not modify PMS operators, PMS dependencies, PMS derived structures, PMS application discipline, or the already completed Core pass."

  extension_meta:
    model_name: "Praxeological Meta-Structure – Quantum Computing Extension Layer"
    model_short: "PMS-QC_EXT"
    status: "draft"
    repository_role: "paper_specific_qc_refinement_layer"
    layer_role: "optional_extension"
    optional_extension: true
    depends_on:
      - "PMS_1.3"
      - "PMS-QC_1.1"
    epistemic_status: "Optional paper-derived refinement layer for bounded structural analysis, annotation, and policy experimentation within the PMS-QC framework."
    boundedness_note: "PMS-QC_EXT is not a generic QC standard and not a canonical part of PMS. It collects paper-specific refinements that remain subordinate to PMS and the PMS-QC base overlay. Use of EXT does not imply comparative superiority, exhaustive capture, deployment adequacy, or validated safety."
    description: "PMS-QC_EXT adds paper-specific macro refinements, Δ–Ψ chain templates, attractor schedule patterns, ladder refinements, measurement-domain modelling refinements, and optional structural policy refinements derived from the present PMS-QC paper. It extends the expressive range available for paper-aligned analysis without altering the semantics of the generic PMS-QC base overlay. Nothing in this file should be read as introducing new PMS meta-axioms, a new operator layer, or a uniquely privileged architecture for AI–QC governance."
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "extension_formalization"
    case_application: "PMS-QC_EXT is used only because the case foregrounds measurement outcomes, unrealized alternatives, delayed readings, and missing trace entries, which make the paper-specific MEASUREMENT_PROJECTION_MODEL relevant as an optional refinement of QMEASURE. QPE ladder, Grover centering, and fixed-point attractor refinements are not triggered by the case material."

  source_header_alignment:
    intended_use:
      - "Attach alongside PMS.yaml and PMS-QC.yaml for paper-specific QC analysis, annotation, and bounded refinement work."
      - "Support optional reasoning about QPE ladders, fixed-point Grover variants, attractor schedules, and bounded governance-oriented experimentation."
      - "Provide paper-derived refinement templates for documentation, orchestration, and compilation-adjacent analysis."
    not_intended_for:
      - "redefining PMS or PMS-QC base semantics"
      - "establishing a generic QC standard"
      - "validated safety architecture"
      - "deployment-ready agent control"
      - "physical correctness guarantees"
      - "architecture-independent implementation claims"
      - "anthropomorphic interpretation of quantum processes"
    repositories:
      PMS_base: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
      PMS_QC: "https://github.com/tz-dev/PMS-QC"
    relationship_to_pms_qc:
      - "Supplements PMS-QC with paper-specific macro refinements, chain templates, and optional structural constraints."
      - "Never overrides base definitions."
      - "Never promotes paper-specific constructs into the generic base layer."
    case_application: "The source-header constraints are satisfied by treating EXT as a narrow append-only measurement-domain refinement. The case does not establish a generic QC standard, validated safety architecture, deployment-ready control system, physical correctness guarantee, architecture-independent implementation, or anthropomorphic quantum interpretation."

  load_order:
    required_order:
      - "PMS.yaml"
      - "PMS-QC.yaml"
      - "PMS-QC-EXT.yaml"
    rule: "PMS-QC_EXT may be applied only after PMS Base and PMS-QC base overlay have been read and preserved. EXT is optional and paper-specific. It cannot substitute for the PMS Core pass or for the generic PMS-QC overlay."
    case_application: "The required load order is satisfied: PMS.yaml remains the only PMS Base reference, the completed PMS Core case remains intact, PMS-QC provides the generic QC overlay, and PMS-QC-EXT is applied only afterward as an optional paper-specific addendum."

  overlay_relationship_to_core_and_qc:
    status: "subordinate_to_completed_pms_core_and_qc_overlay"
    core_case_status: "already_completed"
    qc_base_overlay_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Measurement & Non-Events (Audit Trace)"
    qc_base_overlay_source: "completed PMS-QC overlay YAML for Measurement & Non-Events (Audit Trace)"
    rule: "This QC-EXT block is appended to or integrated with an already completed PMS Core v1.3 case artefact and an already completed PMS-QC base overlay. It does not rewrite the Core pass, redefine PMS operators, alter PMS dependencies, change derived structures, override PMS-QC base semantics, or silently promote paper-specific EXT refinements into the generic QC layer."
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    preserved_qc_base_elements:
      - "PMS-QC generic base macros"
      - "PMS-QC base structural policies"
      - "PMS-QC non-guarantee clauses"
      - "PMS-QC base / extension boundary"
      - "PMS-QC structural-not-physical discipline"
      - "PMS-QC rival-formalism openness"
    integration_rule: "The QC-EXT overlay may add paper-specific refinements for QPE ladders, fixed-point or overshoot-regulated Grover variants, attractor schedules, measurement-domain modelling, and optional AI–QC policy heuristics. It must not modify the completed PMS Core case or PMS-QC base overlay except where a direct consistency error has been separately identified."
    case_application: "The EXT reading depends on the Core and QC base passes by preserving their bounded analysis of measurement records, unrealized alternatives, delayed readings, missing trace entries, Λ-facing audit residues, Θ delay/reconstruction, Φ recontextualization, Χ non-guarantee distance, and conditional Σ/Ψ. It adds only the paper-specific measurement-domain refinement that makes unrealized branches and actual outcome distinctions explicit."

  normative_position:
    non_identity_clause: "EXT mappings and refinements are structural renderings only. They do not imply ontological identity between PMS operators and the specific algorithmic or governance constructs discussed in the paper."
    non_monopoly_clause: "PMS-QC_EXT does not claim monopoly over high-level structural analysis, nor does it imply that rival or complementary formalisms could not capture certain distinctions more effectively."
    anthropomorphism_clause: "Terms such as awareness, attractor, governance, or self-binding remain structural and non-anthropomorphic. EXT constructs do not attribute consciousness, intention, agency, or moral status to quantum systems."
    non_guarantee_clause: "Structural refinement does not imply physical correctness, convergence, stability, safety, or deployment readiness."
    governance_conditionality_clause: "Governance-oriented content in this extension is optional and conditional. It should be read as one bounded architectural path within the paper, not as the natural telos of PMS-QC or as a validated control architecture."
    base_vs_extension_clause: "Generic PMS-QC macros and policies remain in the base overlay. Paper-specific ladder structures, fixed-point Grover refinements, stronger attractor schedules, and additional policy heuristics remain EXT-only."
    case_application: "These clauses constrain the case by allowing only structural measurement-domain refinement. The overlay does not turn measurement branching into ontology, missing trace entries into proof of fault, audit annotation into legal-forensic validity, Ψ into physical stability, or EXT conformity into deployment readiness."

  computational_position:
    representation_clause: "This file is a formal representational addendum for optional paper-specific refinements. It is not executable code, not a proof of implementability, and not a guarantee of interoperability."
    calibration_clause: "Structural well-formedness in PMS-QC_EXT does not by itself establish physical adequacy, numerical correctness, stability, safety, or optimal compilation."
    accountability_clause: "Any operational use of EXT remains dependent on external architectures, implementations, validation procedures, and domain-specific accountability mechanisms."
    deployment_clause: "EXT compliance or EXT policy satisfaction must not be treated as evidence of deployment readiness, safe orchestration, or validated agent control."
    case_application: "The case remains representational and annotation-oriented. It does not provide executable workflow data, circuit semantics, backend constraints, validation procedure, implementation architecture, legal audit standards, or deployment criteria."

  semantic_anchor:
    note: "The workflow model below is one optional organizational abstraction for toolchains and analysis. It is non-canonical and does not redefine PMS or PMS-QC composition logic."
    qc_workflow_model: "A QC workflow may be modeled as a typed directed acyclic graph (DAG), where nodes represent macros, gates, measurements, or policy checks, edges represent causal, temporal, or data dependencies, and scopes are determined by active □-frames. This is a toolchain-oriented aid, not a replacement for canonical PMS composition rules."
    case_application: "DAG-style workflow modelling is weakly relevant because the case describes a workflow with measurement steps and trace entries. It remains non-canonical and under-specified because no nodes, edges, registers, gates, measurement frames, timestamps, or policy-check ordering are supplied."

  extension_governance:
    role_of_this_file: "Optional paper-specific refinement layer within the PMS-QC repository ecosystem."
    extensions_may:
      - "Define paper-specific refinements of generic PMS-QC macros."
      - "Introduce paper-specific chain templates for analysis and annotation."
      - "Add optional structural policy refinements and bounded governance heuristics."
      - "Add organizational or toolchain-oriented helper metadata when explicitly marked as non-canonical."
    extensions_should_not_without_explicit_revision:
      - "Silently redefine PMS or PMS-QC base semantics."
      - "Silently promote EXT refinements into the generic base layer."
      - "Present paper-specific constructs as generic PMS-QC standards."
      - "Treat governance-oriented refinements as validated deployment architecture."
      - "Treat helper metadata as if it modified canonical PMS operator logic."
    case_application: "Extension governance is preserved by selecting MEASUREMENT_PROJECTION_MODEL as EXT-only, leaving QMEASURE base semantics intact, marking all policies as non-guarantee, and refusing to treat the extension as a generic QC standard or validated governance architecture."

  base_vs_extension_boundary:
    note: "This block records the intended separation between the generic PMS-QC base overlay and the paper-specific EXT layer."
    refines_base_macros:
      - "QORACLE_CALL"
      - "QDIFFUSION"
      - "QMEASURE"
    reserved_ext_macros:
      - "QPE_ORACLE_LADDER"
      - "GROVER_CENTERING"
      - "ATTRACTOR_FIXED_POINT"
      - "MEASUREMENT_PROJECTION_MODEL"
    paper_specific_chain_patterns:
      - "qpe_exact"
      - "grover_fixed_point"
      - "attractor_alignment"
    paper_specific_policy_refinements:
      - "qpe_depth_guard"
      - "grover_no_overshoot"
      - "basis_reframe_guard"
      - "attractor_cycle_integrity"
    boundary_status: "preserved"
    case_application: "The case uses only MEASUREMENT_PROJECTION_MODEL as an EXT refinement of QMEASURE. QPE_ORACLE_LADDER, GROVER_CENTERING, ATTRACTOR_FIXED_POINT, qpe_exact, grover_fixed_point, and attractor_alignment are not promoted into the case because the material does not specify QPE, Grover, spectral/Fourier estimation, fixed-point convergence, or attractor schedules."

  application_boundary:
    note: "EXT use remains bounded by the same non-anthropomorphic and non-deployment discipline that governs PMS and PMS-QC."
    constraints:
      - "No clinical, personal or moral interpretation of QC actors or workflows."
      - "No anthropomorphisation of quantum patterns."
      - "No inference from structural refinement to safety or capability."
      - "No deployment claim from EXT compliance alone."
    case_application: "The boundary is satisfied. The case is not clinical, personal, moral, diagnostic, legal-forensic, physical-validity, implementation, safety, capability, or deployment analysis. EXT use is limited to structural annotation of measurement-domain branching and audit-relevant non-events, without anthropomorphising the quantum workflow or treating EXT compliance as evidence of safety, capability, or deployment readiness."

  extended_qc_mappings:
    overview: "This section records paper-specific refinements of selected Δ–Ψ roles in quantum-computational contexts. They are overlay renderings only and do not redefine PMS operators."
    mapping_status: "partial"
    items:
      Delta:
        operator: "Δ"
        applicability: "active"
        refined_roles:
          - "Phase-distinguished alternatives in eigenvalue encodings."
          - "Domain-partitioned initialisation in multi-register workflows."
        case_application: "Δ is active in the measurement-domain sense: recorded outcome, unrealized branch, delayed reading, missing trace entry, and irrelevant absence must remain distinguished. Phase-distinguished eigenvalue encoding and multi-register initialization are not specified, so those more specific roles remain unclaimed."
      Alpha:
        operator: "Α"
        applicability: "not_applicable"
        refined_roles:
          - "Paper-specific fixed-point-oriented attractor schedules for controlled amplitude adjustment."
          - "Centre-aligned attractor regions used in spectral or phase-estimation-style settings."
        case_application: "Α refinement is not applicable because the case does not specify amplitude adjustment, fixed-point schedules, attractor contraction, spectral alignment, phase estimation, or recurrent attractor cycles. The Core case already kept Α weak; QC-EXT does not strengthen it."
      Theta:
        operator: "Θ"
        applicability: "weak"
        refined_roles:
          - "Paper-specific rendering of the controlled-unitary ladder U^(2^j) as a structured Θ–Ω pattern in QPE-related contexts."
          - "Optional iterative attractor-contraction schedules in fixed-point-style refinements."
        case_application: "Θ remains active in the Core/QC sense of sequence, delay, and audit reconstruction, but the QC-EXT refinements are weak or not established because there is no controlled-unitary ladder, QPE depth t, attractor-contraction schedule, or fixed-point iteration."
      Phi:
        operator: "Φ"
        applicability: "weak"
        refined_roles:
          - "Paper-specific two-stage reframing from spectral / phase encoding toward computational readout."
        case_application: "Φ is active in the Core/QC sense of moving between measurement, audit, delayed-reading, and retrospective interpretation frames. The specific spectral/phase-to-computational-readout refinement is not established because no spectral or phase encoding is supplied."
      Psi:
        operator: "Ψ"
        applicability: "weak"
        refined_roles:
          - "Possible structural loci for invariance-bound commitments such as iteration ceilings or bounded coherence conditions."
          - "Paper-specific attractor-cycle validity constraints that aim to prevent runaway structural amplification without guaranteeing physical convergence."
        case_application: "Ψ appears only weakly as possible audit-protocol or policy-bound constraint stability. No iteration ceiling, bounded coherence condition, attractor-cycle validity constraint, or physical stabilisation is supplied."

  macro_extensions:
    overview: "These macros are paper-specific refinements of the generic PMS-QC base layer. They are optional and intended for analysis, annotation, documentation, orchestration, and compilation-adjacent reasoning within the scope of the present paper. They do not claim completeness, physical sufficiency, optimal compilation, or validated control behaviour."
    selected_macro_extensions:
      - "MEASUREMENT_PROJECTION_MODEL"
    macros:
      QPE_ORACLE_LADDER:
        id: "QPE_ORACLE_LADDER"
        applicability: "not_applicable"
        refines_base_macro: "QORACLE_CALL"
        paper_dependency: "PMS-QC paper, QPE reconstruction / ladder refinement"
        params:
          - "unitary_id"
          - "t"
        description: "Paper-specific reusable refinement of the controlled power-of-two ladder U^(2^j) for j in [0, t-1] in QPE-related settings."
        pms_expansion:
          - "Θ"
          - "Ω"
          - "□"
        chain_pattern: "Θ^t( Ω ∘ □ )"
        notes: "This macro captures the paper-specific ladder refinement discussed in the QPE chapter. It does not alter the semantics of QORACLE_CALL in the generic base layer. The ladder itself remains EXT-only and does not imply optimality, necessity, correctness, or physical adequacy."
        case_application: "Not applicable. The case does not specify QPE, controlled powers U^(2^j), unitary_id, ladder depth t, eigenstate preparation, or phase-estimation readout."
      GROVER_CENTERING:
        id: "GROVER_CENTERING"
        applicability: "not_applicable"
        refines_base_macro: "QDIFFUSION"
        paper_dependency: "PMS-QC paper, Grover refinement / fixed-point discussion"
        params: []
        description: "Paper-specific refinement for fixed-point or overshoot-regulated Grover-style centering."
        pms_expansion:
          - "Α"
          - "Σ"
          - "Ψ"
        chain_pattern: "Ψ ∘ Σ ∘ Α"
        notes: "This refinement adds a Ψ-layer after attractor integration in order to model bounded, paper-specific regulation of Grover-style amplification. It is not part of standard Grover, is not required by the base representation, and does not guarantee convergence or overshoot prevention."
        case_application: "Not applicable. The case does not specify Grover search, diffusion, amplitude amplification, centering, fixed-point regulation, or overshoot risk."
      ATTRACTOR_FIXED_POINT:
        id: "ATTRACTOR_FIXED_POINT"
        applicability: "not_applicable"
        refines_base_macro: null
        paper_dependency: "PMS-QC paper, attractor schedule refinement discussion"
        params:
          - "schedule"
        description: "Paper-specific attractor schedule template for bounded fixed-point-oriented convergence modelling."
        pms_expansion:
          - "Α"
          - "Θ"
          - "Σ"
          - "Ψ"
        allowed_schedule_examples:
          - "linear"
          - "exponential"
          - "custom"
          - "under_specified"
        notes: "Supports optional schedule descriptions such as linear, exponential, or custom sequences. This is a structural refinement template only and does not guarantee actual convergence, correctness, stability, or physical adequacy."
        case_application: "Not applicable. The case contains no attractor schedule, convergence model, controlled amplitude adjustment, or fixed-point iteration."
      MEASUREMENT_PROJECTION_MODEL:
        id: "MEASUREMENT_PROJECTION_MODEL"
        applicability: "active"
        refines_base_macro: "QMEASURE"
        paper_dependency: "PMS-QC paper, measurement branching discussion"
        params: []
        description: "Paper-specific structural modelling refinement for branching in measurement domains."
        pms_expansion:
          - "Δ"
          - "Λ"
          - "□"
        notes: "Λ encodes unrealised branches, Δ actual outcome distinctions, and □ the relevant measurement domain. This is a structural modelling aid, not a complete physical theory of measurement, and does not replace the base semantics of QMEASURE."
        case_application: "Active as the only justified QC-EXT refinement. The case explicitly concerns measurement steps, recorded outcomes, unrealized alternatives, delayed readings, and missing trace entries. MEASUREMENT_PROJECTION_MODEL makes this branch/outcome/non-event structure explicit while remaining structural, non-physical, and subordinate to QMEASURE base semantics."

  chain_patterns:
    overview: "These patterns derive directly from the PMS-QC paper and provide paper-specific chain templates for analysis, annotation, and comparison. They are non-canonical and do not override the semantics of the generic PMS-QC base overlay."
    selected_chain_patterns:
      - "none"
    patterns:
      qpe_exact:
        applicability: "not_applicable"
        description: "Paper-specific full QPE chain template with explicit ladder refinement."
        chain:
          - "Δ"
          - "∇"
          - "Α"
          - "Θ^t(Ω ∘ □)"
          - "Φ"
          - "Α"
          - "Σ"
          - "Δ"
          - "Λ"
        notes: "Matches QPE preparation, controlled ladder refinement, Fourier-domain reframing, alignment, and final measurement. The QFT-alignment stage is semantically ordered as Σ(Α(Φ(S))). The ladder component remains paper-specific and EXT-only."
        case_application: "Not applicable. The case does not provide QPE preparation, controlled ladder refinement, Fourier-domain reframing, alignment, or phase-estimation measurement."
      grover_fixed_point:
        applicability: "not_applicable"
        description: "Paper-specific Grover template with EXT-bound fixed-point-style regulation."
        chain:
          - "□"
          - "Δ"
          - "∇"
          - "Α"
          - "Θ^k(Ψ ∘ Σ ∘ Α ∘ Ω ∘ Δ ∘ □)"
          - "Δ"
          - "Λ"
        notes: "Standard Grover remains a base-layer construction without Ψ. This template adds EXT-bound Ψ regulation within the iterated block to model fixed-point or overshoot-regulated variants."
        case_application: "Not applicable. The case does not provide a Grover search space, marked states, diffusion cycles, amplitude amplification, fixed-point regulation, or overshoot control."
      attractor_alignment:
        applicability: "not_applicable"
        description: "Paper-specific reframing-plus-alignment pattern for spectral or Fourier-oriented estimation settings."
        chain:
          - "Δ"
          - "Φ"
          - "Α"
          - "Σ"
        notes: "Useful where reframing and alignment are structurally foregrounded. This pattern is non-canonical and should not be conflated with the generic base macro semantics of QFT_ALIGN."
        case_application: "Not applicable as an EXT chain pattern. The Core/QC case has Φ recontextualization, but no spectral, Fourier, QFT, or attractor-alignment setting is specified."

  extended_policies:
    overview: "These are paper-specific structural guardrails and optional governance-, audit-, and stability-oriented refinements derived from the PMS-QC paper. They compose with, but never replace, PMS-QC base policies. They are non-guarantee refinements, not validated safety defaults."
    global_non_guarantee_clause: "Structural refinement ≠ physical guarantee ≠ safety guarantee."
    policy_status: "partial"
    selected_policies:
      - "basis_reframe_guard"
    policies:
      qpe_depth_guard:
        id: "qpe_depth_guard"
        applicability: "not_applicable"
        policy_kind: "governance"
        paper_specific: true
        non_guarantee: true
        description: "Bounded structural guard on QPE-style ladder depth. t_max expresses a paper-specific governance or audit bound, not a correctness or optimality guarantee."
        params:
          t_max: "not_applicable"
        rule: "Θ^t(Ω ∘ □) requires t <= t_max unless an explicit Ψ-stabilisation section follows."
        case_application: "Not applicable. No QPE ladder depth t, controlled-unitary ladder, or t_max is supplied."
      grover_no_overshoot:
        id: "grover_no_overshoot"
        applicability: "not_applicable"
        policy_kind: "stability"
        paper_specific: true
        non_guarantee: true
        description: "Paper-specific overshoot-avoidance guard for Grover-style cycles with EXT-bound regulation."
        rule: "If Σ is applied after Α in Grover-style cycles, Ψ should follow within the same iteration scope unless alternative paper-specific invariance conditions are explicitly declared."
        case_application: "Not applicable. No Grover-style cycle, diffusion, amplitude amplification, or overshoot-regulated iteration is present."
      basis_reframe_guard:
        id: "basis_reframe_guard"
        applicability: "risk"
        policy_kind: "audit"
        paper_specific: true
        non_guarantee: true
        description: "Paper-specific guard protecting Σ-boundaries against unrestricted reframing."
        rule: "After Σ, Φ may reframe only if accompanied by explicit Ψ invariants."
        case_application: "Risk-level only. The case involves Φ across measurement, audit, delayed-reading, and retrospective frames, and Σ is only provisional. Because no committed Σ boundary or explicit Ψ invariant is supplied, the guard functions as a caution against silent post-Σ reinterpretation rather than as a satisfied operational policy."
      attractor_cycle_integrity:
        id: "attractor_cycle_integrity"
        applicability: "not_applicable"
        policy_kind: "stability"
        paper_specific: true
        non_guarantee: true
        description: "Paper-specific attractor schedule guard for bounded structural admissibility."
        rule: "Α steps repeated under Θ should incorporate Σ checkpoints or Ψ invariants in order to avoid structurally unbounded divergence."
        case_application: "Not applicable. No repeated Α steps, attractor schedule, or Θ-bounded attractor cycle is specified."

  ai_extension:
    status: "weak"
    overview: "This section defines optional reasoning affordances when PMS-QC_EXT is loaded. The capabilities below are advisory only and intended for bounded experimental settings. They do not imply deployment adequacy, validated safety, or full runtime autonomy."
    capabilities_added:
      - "May identify abstract ladder structures (Θ^t) and evaluate associated invariance rules."
      - "May suggest attractor schedules aligned with EXT-bound Ψ policies."
      - "May analyse reframing cascades (Φ → Φ → Φ) for structural consistency."
      - "May transform raw circuits into annotated Δ–Ψ chains using EXT macros and templates."
    guardrails:
      - "AI MUST treat PMS-QC_EXT as advisory and optional; Δ–Ψ fundamentals remain unchanged."
      - "AI MUST preserve the distinction between PMS base, PMS-QC base, and EXT refinements."
      - "AI MUST NOT interpret Ψ-invariants as physical stability guarantees."
      - "AI MUST NOT infer physical correctness, safety, or deployment readiness from EXT compliance."
      - "AI MUST NOT treat governance annotations as validated safety architecture."
      - "AI MUST NOT anthropomorphise quantum patterns."
    case_application: "AI-extension reasoning is weak and advisory. It may flag measurement-branching annotations, under-specified basis/register/timestamp metadata, and possible basis_reframe_guard risk, but it must not infer physical correctness, safety, deployment readiness, validated control, agency, consciousness, or legal-forensic sufficiency."

  meta_notes:
    extensibility:
      - "Further QC-domain modules may be added, e.g. VQE_EXT, QML_EXT, TROTTER_EXT."
      - "All extensions MUST remain optional, Δ–Ψ-compatible and subordinate to PMS and PMS-QC."
      - "Paper-specific refinements MUST NOT be silently promoted into the generic base overlay."
      - "No extension may introduce new PMS meta-axioms."
    neutrality:
      - "Extensions refine interpretation but do not constrain foundational PMS."
      - "Extensions do not redefine PMS-QC base semantics."
      - "Extensions do not imply universality, comparative superiority, or final closure."
    versioning:
      - "Extensions evolve independently, but must declare compatible PMS and PMS-QC base versions."
      - "Semantic changes to a refinement should be versioned explicitly."
      - "Existing refinement semantics must not be silently overridden."
    case_application: "Extensibility, neutrality, and versioning are relevant only as guardrails. This case uses one optional EXT macro refinement and does not add a new module, revise PMS-QC base semantics, claim universality, or override existing refinement semantics."

  qc_ext_case_output:
    output_type: "paper_specific_refinement_trace"
    refinement_trace:
      status: "active"
      elements:
        base_qc_overlay_dependency: "preserved"
        selected_ext_macros:
          - "MEASUREMENT_PROJECTION_MODEL"
        selected_chain_patterns:
          - "none"
        selected_ext_policies:
          - "basis_reframe_guard"
        non_guarantees:
          - "no physical correctness guarantee"
          - "no convergence guarantee"
          - "no stability guarantee"
          - "no safety guarantee"
          - "no deployment readiness claim"
      case_application: "The EXT refinement trace is narrow: preserve the base QC overlay, add MEASUREMENT_PROJECTION_MODEL to specify Δ/Λ/□ measurement-domain branching, select no EXT chain pattern, and keep basis_reframe_guard as a risk-level audit caution against unrestricted post-Σ reframing."
