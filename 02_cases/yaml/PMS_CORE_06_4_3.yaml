operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Δ marks forecast versus outcome, probability versus certainty, model output versus world, bounded input versus decision closure, and scenario versus settled future truth."
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify which distinction does the work: forecast/outcome, probability/certainty, model/world, input/verdict, or scenario/settled future."
      - "Check whether prudent reliance on probabilistic information is being conflated with prophecy drift."
    falsifier_conditions:
      - "If no stable distinction between probabilistic forecast and settled-future treatment can be shown, the PMS reading loses its entry point."
    non_capture_note: "Δ does not determine whether the forecast is accurate, useful, justified, or domain-valid."
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "∇ appears as pressure to prepare, allocate, avoid, intervene, communicate, escalate, delay, revise, or decide under uncertainty."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the tension is practical, institutional, explanatory, risk-related, economic, engineering, or organizational."
      - "Do not infer subjective desire unless evidence and scope allow it."
    falsifier_conditions:
      - "If no orientation, pressure, or practical gradient follows from the forecast, ∇ is under-specified."
    non_capture_note: "∇ does not establish which action is correct, required, moral, legal, or empirically optimal."
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "□ is active because forecast meaning depends on domain frames such as science, risk management, economics, weather, engineering, and organizational planning."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the source forecast-use frame and the target frame in which the forecast may become treated as settled truth."
      - "Check whether the frame shift is explicit or merely projected by the analysis."
    falsifier_conditions:
      - "If no frame of use can be identified, the analysis becomes too abstract to discriminate."
    non_capture_note: "□ does not adjudicate scientific, economic, meteorological, engineering, or organizational standards inside the frame."
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Λ is active but calibration-dependent because forecasts organize expected events, expected non-events, missing updates, absent corrections, or absent uncertainty disclosure."
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the expected occurrence, non-occurrence, update, correction, warning, or uncertainty disclosure and its frame."
      - "Preserve the possibility that absence, delay, silence, or non-fit reflects non-capture or insufficient evidence."
    falsifier_conditions:
      - "If no structured expectation exists within a frame, Λ should remain weak."
    non_capture_note: "Λ does not turn absence, silence, error, delay, or dissent into proof of drift, failure, negligence, or hidden meaning."
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Α is weak-to-active only if forecast-as-truth use recurs, stabilizes, routinizes, or becomes path-dependent. The abstract case does not prove this."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Show recurrence, stabilization, routine, or path dependence before treating prophecy drift as an attractor."
      - "Distinguish stable attractor from a single urgent decision, isolated overstatement, accidental aggregation, or legitimate precaution."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown, Α remains weak and Α-dependent drift claims remain possible but not entailed."
    non_capture_note: "Α does not show institutional culture, habit, or path dependence without concrete evidence."
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ω is active because the case explicitly names asymmetric stakes and time pressure; the imbalance may concern authority, exposure, contestability, vulnerability, obligation, or error cost."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify the direction and kind of asymmetry: power, exposure, capacity, vulnerability, obligation, burden of proof, decision authority, or error cost."
      - "Do not moralize asymmetry by default."
      - "Allow Ω to remain under-specified where concrete actors and cost distributions are not identified."
      - "Keep Ω dependency-calibration weak where Α recurrence or stabilization is not evidenced by a concrete scene."
    falsifier_conditions:
      - "If no directional imbalance is identifiable in a concrete scene, Ω claims must be removed or marked weak."
    non_capture_note: "Ω does not establish blame, exploitation, liability, injustice, or moral hierarchy."
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Θ is strongly active because forecasting projects horizons, anticipates trajectories, depends on updates, operates under deadlines, and can impose consequences before outcomes are known."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish diachronic forecast structure from static model-outcome comparison."
      - "Check whether horizon, deadline, lag, update cadence, reversibility window, and consequence duration are specified or only abstractly implied."
    falsifier_conditions:
      - "If temporal extension, anticipation, delay, or trajectory is not required, Θ is overextended."
    non_capture_note: "Θ does not determine whether deadline pressure justifies action, delay, escalation, or caution."
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Φ is the central operator: a probabilistic forecast is placed into a new frame where it is treated as settled future truth, decision closure, or prophecy-like certainty."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the source frame as forecast-as-bounded-probabilistic-input and the target frame as forecast-as-settled-future-truth."
      - "Check whether recontextualization clarifies the scene or merely absorbs uncertainty, disagreement, urgency, or non-fit."
    falsifier_conditions:
      - "If the forecast remains explicitly probabilistic, revisable, and bounded, Φ-as-prophecy-drift is falsified or sharply weakened."
    non_capture_note: "Φ does not mean every reframing is drift; recontextualization can be legitimate adaptation."
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Χ is active as both safeguard and risk: the application must preserve distance from verdict, while prophecy drift risks fusing forecast output with future truth."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Check whether the analysis suspends verdict, preserves reversibility, and distinguishes probabilistic input from settled truth."
      - "Distinguish distance from avoidance, denial, false neutrality, refusal to act, or unlimited skepticism."
    falsifier_conditions:
      - "If Χ is suspended to force a conclusion that prophecy drift occurred, the PMS application is invalid; if the concrete scene preserves distance, the drift reading weakens."
    non_capture_note: "Χ does not require inaction; high-stakes action can preserve distance if uncertainty and thresholds remain visible."
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
