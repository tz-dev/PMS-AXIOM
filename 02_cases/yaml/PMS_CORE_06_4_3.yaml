core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: "PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological essences."
    status: "satisfied"
    case_application: "The case is treated as forecast-use praxis: production, interpretation, decision pressure, frame movement, and action under uncertainty."
    failure_condition: "Failure would occur if prophecy drift were treated as a psychological type, moral defect, or claim about inner experience."
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: "The eleven meta-axioms Δ through Ψ are treated within PMS as a proposed minimal generative basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization and critique."
    status: "satisfied"
    case_application: "Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators."
    failure_condition: "Failure would occur if extra axes, governance layers, implementation stages, or domain-specific categories were introduced as PMS Base."
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: "PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action, dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator compositions rather than introduced as independent primitives."
    status: "satisfied"
    case_application: "Awareness, Coherence, Responsibility, Action, Dignity-in-Practice, SELF_FIXPOINT status, and drift-pattern risks are derived only from PMS formulas."
    failure_condition: "Failure would occur if a derived structure were asserted without its formula or treated as an independent axiom."
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: "Asymmetry Ω and temporality Θ are treated as central structural operators. Responsibility, maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes."
    status: "satisfied"
    case_application: "Θ is central because forecasting projects across horizons, deadlines, lags, updates, and consequences; Ω is central because the case explicitly names asymmetric stakes and time pressure."
    failure_condition: "Failure would occur if temporal pressure or asymmetry were moralized, psychologized, or treated as proven institutional abuse without evidence."
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: "PMS may be represented computationally, but representation does not by itself imply direct implementation, guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints, and evaluation."
    status: "satisfied"
    case_application: "This YAML representation is not a forecasting system, implementation, validator, or automated decision procedure."
    failure_condition: "Failure would occur if this document were used as a decision tool, legal rule, clinical instrument, or empirical validator."
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: "PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models, or more empirically grounded formalisms remains methodologically open."
    status: "satisfied"
    case_application: "Rival readings remain open, including Bayesian decision theory, risk governance, model epistemology, engineering precaution, organizational sociology, metric drift, and performativity."
    failure_condition: "Failure would occur if PMS displaced rival formalisms merely because it is internally coherent."
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: "Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms of praxis may remain only partially legible or may resist assimilation within the current grammar."
    status: "satisfied"
    case_application: "Non-capture is preserved for probabilistic calibration, forecast accuracy, domain methods, legal standards, institutional incentives, and lived effects."
    failure_condition: "Failure would occur if uncertainty, dissent, absence, resistance, or non-fit were automatically absorbed as PMS drift or incomplete integration."
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: "PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions."
    status: "satisfied"
    case_application: "No person, institution, forecaster, planner, model user, or recipient is diagnosed, ranked, or typed."
    failure_condition: "Failure would occur if operator activation became a person-ranking, clinical category, moral verdict, or irreversible label."
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: "Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global person-labels and irreversible ontological attributions are out of scope."
    status: "satisfied"
    case_application: "Because the material is abstract, the reading is case-type-bound rather than a completed concrete-scene analysis."
    failure_condition: "Failure would occur if the abstract class of forecasting scenes were treated as evidence about specific actors, communications, decisions, or outcomes."

