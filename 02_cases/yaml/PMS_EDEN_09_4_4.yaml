        The case depends on sustained differentiation between confidential and
        public, internal and external, repair and accountability, bounded use
        and public use, across temporal transfer.
    Action_E:
      handle: "16.7_E"
      relevance: "weak"
      definition: "E = [Σ, Θ, ∇]; realization/enactment is not E unless Σ carries integration."
      case_application: >
        Action_E remains weak or under-specified. Publicization, disclosure,
