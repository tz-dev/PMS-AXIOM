  eden_overlay_synthesis:
    primary_eden_reading: >
      PMS-EDEN makes visible that the boundary-eroding movement from
      confidential repair to publicness is not only Φ-driven recontextualization
      but also a threshold problem: once bounded material becomes selectable as
      public accountability material, unequal Ω/Θ costs may be externalized
      unless Χ, Σ, and Ψ carry the transition. EDEN adds specific risk handles:
      false comparison, pseudo-symmetry, asymmetry-switch availability,
      parity-to-exit, responsibility-to-authority, Σ-simulation,
      Ψ-externalization, and reciprocity loss. These remain risks and mapping
      aids, not findings.
    ground_state_result: >
      EDEN ground-state is weak and analogical only. The confidential or
      internal repair frame may function as a bounded, non-public praxis space,
      but the case does not prove non-deficit praxis, restorative legitimacy,
      or Eden-like ground-state configuration. It may also conceal asymmetry.
    threshold_result: >
      Threshold explicitness is active. The relevant threshold is the moment
      when material created for bounded repair or internal resolution becomes
      available as public accountability, public evidence, public accusation,
      public learning, or tribunal-like discourse. This threshold does not
      decide legitimacy or truth.
    breach_or_NRK_result: >
      Breach-like chain interruption is weak and conditional; NRK is also weak.
      A breach reading would require evidence that a confidentiality, repair,
      response, accountability, or proportionality chain was interrupted. NRK
      would require realization under ∇ with Σ not carrying and Ψ absent,
      displaced, externalized, or simulated. The case does not supply that
      evidence, and realization must remain distinct from Action_E.
    legibility_management_result: >
      Fig-leaf-like shielding, concealment, or exposure management appears only
      as a risk. Confidentiality may shield without repair, and publicness may
      expose without context, but neither is established. The overlay must not
      infer shame, concealment motive, or humiliation.
    comparison_result: >
      A shift from praxis-relation to comparison or value-relation is a risk,
      not a finding. It would appear if repair/accountability becomes public
      ranking, credibility contest, standing judgment, or private discrediting
      of accountability demands. The case does not prove comparison dominance.
    dissatisfaction_cost_result: >
      Dissatisfaction or continuous adjustment is not established. The case
      lacks recurrence, adjustment loops, chronic Λ, and Α-load. It remains an
      operationalization requirement rather than an EDEN finding.
    pseudo_symmetry_result: >
      PS is a risk and possible temporary buffer, not an active regime. It
      would become problematic if confidentiality and public accountability are
      treated as formally symmetrical while real exposure, reply, obligation,
      and repair costs remain unequal. It may be useful only if it reopens Σ
      and Ψ under named Ω.
    switch_drift_result: >
      Asymmetry-switch availability, parity-to-exit, and
      responsibility-to-authority are risks. Permanentized exception switch is
      not applicable. Local switch drift without full PFO is the strongest EDEN
      alternative, but actual switch activation is not shown.
    pfo_result: >
      PFO is too strong and not applicable. The case does not show a regime,
      Ω-taboo governance, permanentized exception-switch availability,
      comparison metric control, or Α protocolization. Local switch-risk without
      PFO is the appropriate bounded EDEN reading.
    reciprocity_result: >
      Reciprocity is weak as a demonstrated condition and active as a
      calibration requirement. It should be understood as coordinated asymmetry:
      confidentiality must not externalize accountability costs, and publicness
      must not externalize exposure, context-loss, or reply-capacity costs.
      Loss is a risk, not a finding.
    devaluation_humiliation_result: >
      Devaluation and humiliation are residual stabilization risks only. They
      would appear if standing-in-practice is lowered instead of coordinating
      repair, accountability, exposure, and response. The overlay preserves
      non-moral, non-personal language and does not accuse any actor or frame
      of humiliation.
    pattern_library_result: >
      The main pattern-library handles are P-□-MOR as tribunal/value-frame
      risk, P-Σ-SIM as simulated integration risk, P-Ψ-EXT as externalized
      binding risk, P-Λ-DN as non-event suppression risk, and P-Ω-AC as
      authority-capture risk. In each case, the C5 structure is only partially
      present: the trigger is plausible, but stabilizer and failure are not
      established because Α, concrete Λ, and Ψ evidence are missing.
    eden_map_result: >
      EDEN-MAP yields the formula:
      □hybrid_internal_repair_to_public_accountability →
      Λcandidate_repair_confidentiality_accountability_or_reply_non_event →
      Αnot_established →
      Ωexposure_obligation_reply_capacity_and_frame_control_risk →
      Σweak_or_under_specified →
      Ψconditional_and_unproven. The primary attractor is not established; the
      cost layout is option-visibility load, coherence volatility,
      responsibility ambiguity, under-specified Action_E, and high
      Dignity-in-Practice load.
    alternative_explanations_result: >
      AE5 local switch drift without full PFO is the strongest EDEN-compatible
      alternative, while AE1 drift without regime, AE2 Ω overextension, AE3
      exit/isolation, and AE4 external institutional stress remain weak but
      plausible. Non-EDEN rivals remain highly relevant: information ethics,
      procedural justice, whistleblowing, legal-forensic analysis,
      public-sphere theory, institutional power, and restorative practice.
    boundary_conditions_result: >
      EDEN applicability is reduced by the absence of a concrete scene, absent
      recurrence, absent chronology, absent legal and institutional context,
      absent evidence of comparison dominance, absent chronic Λ, and absent
      stabilized Α. The strongest-applicability condition is only partial.
    non_capture_result: >
      Non-capture remains substantial. The public move may be legitimate,
      consented, legally required, democratic, protective, anonymized, or a
      necessary correction after failed internal repair. The private frame may
      be legitimately restorative or legally required. Rival frameworks may
      discriminate these possibilities better than EDEN.
    final_eden_formula_or_signature: >
      CASE_SIGNATURE =
      THRESHOLD_marker_signature(active) +
      Φ/□ boundary-transfer from bounded repair to public accountability +
      Ω/Θ cost-geometry risk +
      FALSE_COMPARISON(risk) +
      PS_core_signature(risk) +
      AE5_switch_drift_without_full_PFO(active_as_best_overlay_alternative) +
      RECIPROCITY_LOSS(risk) +
      META_self_control_over_other_control(active_as_application_discipline),
      with NRK weak, Action_E under-specified, PFO not applicable, and
      permanentized exception not established.
    final_claim_boundary: >
      This EDEN overlay adds visibility for ground-state praxis, threshold
      explicitness, breach as chain interruption, NRK, comparison drift,
      pseudo-symmetry, switch-drift profiles, PFO, reciprocity loss, EDEN-MAP
      cost mapping, pattern-library handles, alternative explanations, and
      boundary conditions. It does not revise PMS Base, rewrite the PMS Core
      pass, introduce new PMS operators, diagnose persons, rank persons, make
      group or ideology claims, prescribe action, authorize coercion, validate
      PMS, or claim final capture of Eden, reciprocity, or relational drift.