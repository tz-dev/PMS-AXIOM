    PFO:
      handle: "16.12_PFO"
      relevance: "not_applicable"
      definition: "PFO: paper-internal regime label defined by operator behavior; not group label or ideology claim."
      case_application: >
        PFO is not applicable. The case lacks regime-level structure,
