  alternative_explanations:
    note: >
      Alternative explanations are sufficient but non-exclusive. They prevent
      monocausal or regime-exclusive readings and preserve rival-framing
      openness.
    entries:
      AE1_pair_dynamics_without_regime:
        applicability: "weak"
        label: "Drift without regime"
        sufficient_configuration:
          - "□comparison dominance"
          - "Ω salient in consequences"
          - "Σ low/failed"
          - "Ψ weak/misbound"
          - "Λ accumulates across Θ"
          - "Α stabilizes recurring scripts"
        exclusion_note: "No paper-internal regime layer such as PFO is required."
        case_application: >
          AE1 is plausible only as a weak alternative because the case may
          involve local drift without any regime layer. However, comparison
          dominance, chronic Λ, and Α are not established. This alternative
          prevents over-reading the case as PFO.
      AE2_omega_overextension_counter_control:
        applicability: "weak"
        label: "Drift via Ω overextension"
        sufficient_configuration:
          - "Ω enacted as unilateral leverage"
          - "Χ low or absent at leverage moment"
          - "D violated"
          - "□ shifts to comparison/tribunal mode"
          - "Λ increases"
          - "Α stabilizes counter-control scripts"
          - "Σ blocked; Ψ externalized"
        exclusion_note: "Drift genesis can originate from the higher-leverage role-position."
        case_application: >
          AE2 is weak and evidence-dependent. Publicness may overextend Ω if
          exposure becomes unilateral leverage; confidentiality may overextend
          Ω if silence or internal control becomes leverage. The case does not
          show unilateral leverage, D violation, or counter-control scripts.
      AE3_exit_isolation_stabilization:
        applicability: "weak"
        label: "Drift without humiliation"
        sufficient_configuration:
          - "Ω salient but not coordinable"
          - "Σ low/failed"
          - "Ψ collapses or retracts"
          - "Χ increases as withdrawal"
          - "Λ becomes chronic"
          - "Θ locks separation trajectory"
          - "Α stabilizes avoidance/exit scripts"
        exclusion_note: "Status regulation via devaluation is not required."
        case_application: >
          AE3 remains open because boundary erosion may reflect exit,
          withdrawal, failed repair, or escalation after coordination becomes
          unavailable, without humiliation or devaluation. The case does not
          establish chronic separation or avoidance scripts.
      AE4_external_institutional_stress:
        applicability: "weak"
        label: "Drift via external institutional stress"
        sufficient_configuration:
          - "□ already constrained by institutional scarcity, compliance, or sanction logics"
          - "Ω amplified by external role architecture"
          - "Σ crowded out by throughput, fatigue, or administrative interface failure"
          - "Ψ weakened by overextension"
          - "Λ accumulates because repair bandwidth is externally reduced"
          - "Α stabilizes procedural survival scripts"
        exclusion_note: "The primary driver need not be internally stabilized regime logic."
        case_application: >
          AE4 remains open because the case mentions confidential feedback and
          internal resolution, which may be institutional. Boundary erosion may
          result from policy, compliance, HR, legal, media, or administrative
          pressures rather than EDEN-specific drift. No institutional evidence
          is supplied.
      AE5_switch_drift_without_full_PFO:
        applicability: "active"
        label: "Switch drift without full PFO"
        sufficient_configuration:
          - "Ω real and action-relevant in consequences"
          - "parity language remains locally available"
          - "asymmetry activation appears intermittently but is not regime-stabilized"
          - "Σ/Ψ re-binding is partial, weak, or delayed"
          - "parity-to-exit or responsibility-to-authority appears locally"
        exclusion_note: "Switch drift can appear locally without full PFO."
        case_application: >
          AE5 is the strongest EDEN-compatible alternative. The case may show
          local switch-risk without regime-level PFO: confidentiality and
          public accountability are locally available frames, Ω is plausible in
          consequences, Σ/Ψ are weak, and parity-to-exit or
          responsibility-to-authority are risks. But even AE5 remains
          case-type-bound because actual switch activation is not shown.
    methodological_guard:
      rules:
        - "No refutation or ranking among alternative explanations."
        - "No conversion of alternatives into diagnostic claims."
        - "Use role/gradient language, not group labels."
        - "Treat alternatives as generators of similar observables."
        - "Keep all alternative-explanation use scene-bound and structurally revisable."
        - "Treat switch-drift handles as scene-organization profiles, not traits, motives, or person defects."

  boundary_conditions:
    note: >
      Conditions under which the EDEN drift pipeline is reduced, altered, or
      applies only partially. In this case, boundary conditions carry unusual
      weight because the material is explicitly not a concrete praxis scene.
      They prevent the overlay from converting a formally smooth EDEN reading
      into a regime reading, diagnosis, moral verdict, legal judgment, or
      person-level classification.
    BC1_Omega_minimal_or_absent:
      status: "absent_as_total_boundary_but_concrete_Omega_under_specified"
      description: "Ω minimal, absent, or not action-relevant in consequences."
      effect_on_drift: "Asymmetry-driven mechanisms weaken."
      case_application: >
        Ω is not minimal as a structural concern because publicness and
        confidentiality can alter exposure, obligation, capacity, leverage,
        audience power, and reply gradients. However, concrete Ω remains
        under-specified because the case lacks actors, roles, institutional
        position, legal duties, audience scale, and evidence of actual burden
        distribution. EDEN may therefore track Ω-risk but not Ω-finding.
    BC2_Frame_not_comparison_based:
      status: "active_as_open_counter_condition"
      description: "Dominant □ remains praxis-coordination rather than comparison/tribunal."
      effect_on_drift: "False equivalence, PS, switch availability, and devaluation are less likely to stabilize."
      case_application: >
        This boundary condition is active as an open counter-condition rather
        than as an established fact. The public frame may be accountability,
        learning, warning, democratic contestation, or legally required
        disclosure rather than comparison or tribunalization. The private frame
        may be repair, restorative containment, procedural fairness, or legal
        confidentiality rather than concealment. If either frame remains
        praxis-coordinative, EDEN drift mechanisms weaken substantially.
    BC3_Sigma_Psi_established_early:
      status: "not_assessable"
      description: "Σ and Ψ established early and robustly before chronic Λ accumulates across Θ."
      effect_on_drift: "Drift sequence can be interrupted upstream."
      case_application: >
        Early Σ/Ψ cannot be assessed because the case gives no concrete
        sequence, commitments, repair attempts, accountability steps,
        self-binding evidence, consent structure, or response history. This
        condition cannot be used as a positive claim, but it remains an
        important falsifier: if early robust Σ/Ψ existed, EDEN drift readings
        would be weakened.
    BC4_External_institutions_stabilize_roles:
      status: "not_assessable"
      description: "External institutions stabilize roles, interfaces, and obligations."
      effect_on_drift: "External scaffolding may constrain □, support Ψ, and enable Σ."
      case_application: >
        External institutional stabilization cannot be assessed. The case may
        involve internal processes, public discourse, legal duties, HR
        procedures, journalism, whistleblowing protections, moderation rules,
        professional confidentiality, or policy constraints, but none is
        specified. If present, such scaffolding could reduce EDEN drift, change
        the decisive grammar, or move the case primarily into legal,
        procedural, institutional, or information-ethics analysis.
    BC5_Rival_frameworks_retain_explanatory_force:
      status: "active"
      description: "Rival frameworks may retain stronger explanatory force."
      cases_where_rival_frameworks_may_be_stronger:
        - "information ethics and contextual integrity"
        - "confidentiality law or professional privilege"
        - "whistleblowing and public-interest disclosure"
        - "procedural justice, due process, and right of reply"
        - "restorative practice and internal repair failure"
        - "institutional asymmetry with weak EDEN-style comparison coding"
        - "public-sphere theory and democratic accountability"
        - "defamation, retaliation, protected disclosure, or duty-to-warn analysis"
        - "local switch drift where PFO is not the best regime-level description"
      case_application: >
        Rival frameworks remain strongly open and may discriminate the case more
        sharply than EDEN. EDEN is useful where threshold visibility,
        pseudo-symmetry risk, switch availability, cost externalization, and
        reciprocity strain are salient. It is weaker where the decisive issue
        is legal permission, procedural legitimacy, consent, anonymization,
        protected disclosure, public-interest threshold, institutional duty, or
        evidentiary reliability.
    BC6_Genuine_non_capture_cases:
      status: "active"
      description: "Cases where PMS-EDEN applies weakly or risks overreach."
      applies_weakly_or_risks_overreach_when:
        - "genuine mutuality without stable Ω salience"
        - "non-sexed reciprocity collapse"
        - "coordination failure without comparison as dominant mediator"
        - "devaluation absent but coordination still fails"
        - "asymmetry activation clearly marked, bounded, and re-bound into Σ/Ψ"
        - "public disclosure is consented, anonymized, legally required, or originally part of the accountability frame"
        - "confidentiality is procedurally required, restoratively bounded, or protects reply and repair rather than concealment"
        - "PMS or EDEN translation smooths over distinctions preserved by rival framing"
      case_application: >
        Genuine non-capture remains active. Public accountability may be
        warranted disclosure, not drift. Confidentiality may be legally,
        procedurally, or restoratively required, not suppression. The frame
        transfer may be consented, anonymized, proportionate, protective, or
        part of the original process. EDEN applies weakly if comparison is not
        dominant or if the decisive issue is legal, procedural, institutional,
        evidentiary, ethical, or public-interest based rather than EDEN-style
        switch drift.
    BC7_Summary_condition_operator_readable:
      status: "partial"
      strongest_applicability_when:
        - "Ω action-relevant and legible in consequences"
        - "□ becomes comparison-dominant and constrains Ω speakability"
        - "asymmetry-switch availability, parity-to-exit, or responsibility-to-authority is present or plausible"
        - "Σ remains low, blocked, or suppressed"
        - "Ψ is absent, misbound, or externalized"
        - "Λ becomes chronic across Θ"
        - "Α stabilizes repeatable scripts"
      reduced_applicability_when: >
        Where these constraints do not hold, PMS-EDEN applies weakly,
        partially, or by analogy. Reduced applicability is especially likely
        where publicness remains accountability rather than comparison, where
        confidentiality remains repair rather than concealment, where disclosure
        is consented or legally required, where Σ/Ψ are actually carried, or
        where rival frameworks preserve decisive distinctions better.
      case_application: >
        The strongest-applicability condition is not met. Ω is plausible, □ may
        become tribunal-like, Σ is weak, and switch-risk is plausible. But
        comparison dominance, chronic Λ, absent or misbound Ψ, and stabilized Α
        are not established. EDEN therefore applies partially and by analogy;
        the appropriate reading is local threshold and switch-risk, not full
        drift pipeline or regime diagnosis.
    non_normalization_clause:
      statement: "Reduced applicability does not imply acceptability."
      note: >
        Persistent cost externalization remains structurally non-viable under
        PMS criteria as used in this paper regardless of boundary conditions.
        However, reduced EDEN applicability does mean that acceptability or
        unacceptability cannot be decided from EDEN labels alone.

  appendices_alignment:
    appendix_A_positioning:
      status: "reference_only"
      ref: "PMS-EDEN Appendix A"
      note: >
        Appendix A provides positioning, professionalization, adjacent-framework
        comparison, label-risk handling, related-work spine, and final guard.
        It adds no new PMS operators, no new EDEN claims, and no new
        application authority.
      purpose:
        non_argumentative: true
        functions:
          - "situate PMS-EDEN relative to adjacent theoretical frameworks"
          - "make scope boundaries and non-goals explicit"
          - "reduce misclassification as psychological, theological, ideological, or normative"
          - "provide review-stability and auditability"
        adds_no_new_claims: true
      professionalization_definition:
        meaning: >
          Professionalization means making the paper’s structural claims easier
          to classify, audit, compare, and delimit. It does not mean converting
          the overlay into a policy, therapy, moral doctrine, diagnosis, or
          enforcement tool.
        criteria:
          - "clear model status"
          - "clear relation to PMS Base"
          - "explicit non-goals"
          - "adjacent-framework comparison"
          - "label and classification risk handling"
          - "non-capture preserved"
        explicitly_not_claimed:
          - "clinical validity"
          - "legal validity"
          - "moral authority"
          - "empirical completeness"
          - "theological proof"
          - "ideological diagnosis"
          - "PMS Base validation"
      core_identity_summary:
        description: >
          PMS-EDEN is a praxeological operator grammar for describing drift:
          Eden → threshold → NRK → consequence legibility → frame drift →
          pseudo-symmetry → asymmetry-switch availability → PFO/permanentized
          exception → parity-to-exit / responsibility-to-authority →
          reciprocity erosion.
        exclusions:
          - "psychological interiority explanations"
          - "moral verdict logic"
          - "automatic prescriptive authority"
          - "person-level interpretation of switch-drift handles"
      adjacent_frameworks:
        practice_theory:
          relation: "overlap in praxis and situated action; PMS-EDEN adds operator-chain drift mapping."
        structuration:
          relation: "overlap in structure/action recursion; PMS-EDEN foregrounds Ω/Θ/Λ/Σ/Ψ cost geometry."
        ethnomethodology:
          relation: "overlap in scene practices and accountability; PMS-EDEN formalizes non-event and drift traces."
        systems_theory:
          relation: "overlap in stabilization and self-reference; PMS-EDEN remains praxeological and operator-bound."
        pragmatic_sociology:
          relation: "overlap in justification and regimes; PMS-EDEN reconstructs comparison drift and reciprocity loss."
        theological_contrast:
          relation: "Eden is not treated as doctrine or metaphysical origin, but as reconstructed praxis scene."
      comparative_grid:
        focus:
          - "praxis structure"
          - "operator drift"
          - "comparison-dominant framing"
          - "cost externalization"
          - "reciprocity erosion"
        key_axes:
          - "Ω legibility"
          - "Θ cost accumulation"
          - "Λ residue"
          - "Σ/Ψ coordination"
          - "Χ + reversibility + D application gate"
      label_and_classification_risk:
        risk: "External politicization or person-level use of paper-internal labels."
        handling:
          - "labels are operator-defined handles, not group or ideology claims"
          - "switch-drift labels are scene-bound structural profiles"
          - "PFO is not a group label and not an ideology claim"
          - "renaming is permitted to reduce classification entropy while preserving operator definitions"
      related_work_spine:
        purpose: >
          The related-work spine supports classification and comparison only; it
          does not subordinate PMS-EDEN to an external framework or claim
          superiority over it.
        anchors:
          - "practice theory"
          - "structuration"
          - "ethnomethodology"
          - "systems theory"
          - "pragmatic sociology"
          - "theological contrast"
        added_by_pms_eden:
          - "operator-constrained drift trace"
          - "NRK / not-E distinction"
          - "comparison-dominant □ to PS/PFO pipeline"
          - "switch-drift handles"
          - "reciprocity as coordinated asymmetry"
          - "EDEN-MAP audit scaffold"
      final_guard:
        claim: >
          Appendix positioning does not expand PMS-EDEN’s claim scope. It
          strengthens classification, boundary clarity, and review stability.
        viability_note: >
          PMS-EDEN remains strongest where its own limits, rival framings, and
          possible non-capture cases are kept explicit.
      case_application: >
        Appendix-A positioning and classification-risk cautions are highly
        relevant. This case could easily be misread as moral, legal,
        ideological, psychological, or policy analysis. The Appendix guard keeps
        EDEN as a structural overlay only and preserves rival frameworks such as
        legal, procedural, public-interest, whistleblowing, information-ethics,
        and restorative-practice analyses.

