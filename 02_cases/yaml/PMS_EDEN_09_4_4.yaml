pms_axiom_eden_overlay_case:
  schema_version: PMS-AXIOM_EDEN_OVERLAY_CASE_TEMPLATE_v0.2
  case_schema_version: PMS-EDEN_CASE_2.0
  schema_role: axiom_addon_overlay_case_template
  overlay_model: PMS-EDEN
  overlay_schema_version: PMS-EDEN_2.0
  eden_case_template_source: PMS-EDEN_CASE_2.0
  base_model: PMS
  base_schema_version: PMS_1.3
  axiom_status: addon_layer_only_over_completed_core_case

  template_purpose: >
    Structure a PMS-EDEN overlay for an already completed PMS-Core case. The
    overlay maps scene-bound real Ω, possible false coordination, responsibility
    and Action-Power distribution, Σ/Ψ status, cost distribution, non-action and
    non-binding relevance, immunization/overexposure/AEP signals, counter-scenes,
    falsifiers, and description/application firewall status without modifying the
    completed PMS-Core analysis or converting structural description into
    diagnosis, verdict, prescription, action authorization, or PMS-Core revision.

  source_alignment:
    pms_base:
      source_file: PMS.yaml
      schema_version: PMS_1.3
      role: base_operator_grammar_and_application_guardrails
    eden_profile:
      source_file: PMS-EDEN.yaml
      schema_version: PMS-EDEN_2.0
      role: current_paper_repository_eden_application_overlay
    eden_repo_case_template:
      source_file: PMS-EDEN_CASE_2.0
      role: field_structure_for_scene_bound_PMS_EDEN_example_cases
    completed_core_case:
      source: completed_pms_core_case_yaml
      title: "Boundary erosion (Privacy → Publicness)"
      case_type: bounded_repair_frame_to_public_accountability_or_tribunal_frame_transfer
      core_status: already_completed
      core_handling:
        read_core_for_anchor: true
        rewrite_core: false
        revise_core_findings: false
        overwrite_core_formulas: false
        alter_core_qc: false
    axiom_policy: >
      PMS-EDEN functions here only as an add-on layer over the completed PMS-Core
      pass. PMS-Core remains the already completed base analysis.

  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    rule: >
      This EDEN overlay is appended to the completed PMS Core pass. It may use Core
      operators, Core frame distinctions, and Core QC findings as anchors, but it
      does not regenerate, revise, replace, or correct the PMS Core analysis.
    preserved_core_elements:
      - "PMS operator inventory: Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - PMS repository operator order and dependency hygiene
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "Strict Action / Enactment: E = Σ ∘ Θ ∘ ∇"
      - "PMS Responsibility axis: R = Ψ ∘ Φ ∘ Θ ∘ Ω"
      - "PMS Dignity-in-Practice axis: D = Ψ ∘ Χ ∘ Ω"
      - "PMS application gate: Χ, reversibility, Dignity-in-Practice"
      - PMS non-diagnostic, non-person-ranking, non-capture, and rival-openness discipline

  pms_v13_and_eden_conformity:
    status: conformant_overlay_required
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_new_pms_operators: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    overlay_only: true
    overlay_constructs_are_not_pms_base: true
    pms_R_axis_preserved: true
    pms_D_axis_preserved: true
    pms_E_strict_action_preserved: true
    eden_responsibility_principle_is_overlay_attribution_rule: true
    eden_constructs_are_not_pms_base: true
    adult_reciprocity_is_not_new_pms_axis: true
    reciprocity_loss_is_not_new_pms_axis: true
    correctability_is_not_new_pms_axis: true
    minimal_recovery_signature_is_not_new_pms_axis: true
    qc_ext_reduced_signatures:
      status: overlay_shorthand_only
      may_summarize: true
      may_replace_scene_packet: false
      may_replace_counter_scene_or_falsifiers: false
      may_replace_pms_dependencies: false
      may_introduce_new_pms_operator_path: false
      rule: >
        QC-EXT reduced signatures are permitted only as EDEN overlay shorthand
        for already expanded scene-bound checks. They do not modify PMS
        operators, dependencies, derived axes, or the completed Core pass.
    notes:
      - Adult Reciprocity is a PMS-EDEN positive baseline / normative benchmark, not a PMS Base operator or axis.
      - False-Coordinated Real Asymmetry is an EDEN mechanism, not a PMS operator.
      - Action-Power is an EDEN scene-bound attribution handle, not a PMS operator.
      - EDEN may sharpen domain visibility but does not prove exhaustive capture.
      - Description does not authorize binding use; application requires additional gating.

  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
    dependency_hygiene_note: >
      Reduced EDEN signatures, formulas, or shortcuts do not alter PMS
      dependencies. EDEN uses PMS operators as references, not as redefined
      constructs.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >
      PMS-EDEN constructs, EDEN-MAP fields, profiles, mechanisms, benchmarks,
      falsifiers, and viability signatures organize existing PMS operators only.
      They do not become PMS operators, PMS axes, PMS dependencies, additional
      AXIOM layers, or independent application authority.

  eden_overlay_scope:
    scope_guardrails:
      - Non-metaphysical, non-theological, non-clinical, non-diagnostic.
      - No person-level judgment, no group label, no ideology claim, no sex ranking, no sanction logic.
      - No psychology, motive, intention, trauma, or inner-state inference from EDEN mapping.
      - No moral verdict logic and no application authority from description.
      - Description and application remain firewalled by Χ, reversibility, D, contextual responsibility, affected-role contestation, and independent application authority.
    may_add_visibility_to:
      - Adult Reciprocity as truthful coordination of real Ω
      - False-Coordinated Real Asymmetry
      - real Ω mapping before failure attribution
      - responsibility and Action-Power distribution
      - Σ/Ψ blockage, simulation, externalization, or openness
      - cost distribution under Ω and Θ
      - non-action and non-binding relevance under □/Λ/Ω/Θ
      - immunization, overexposure, and AEP as scene-bound profiles
      - Reciprocity Loss as erosion of shared correctability where separately supported
      - counter-scenes, falsifiers, rivals, boundaries, and non-capture
    must_not_do:
      - treat EDEN as PMS Base
      - treat Adult Reciprocity, Action-Power, AEP, correctability, or Reciprocity Loss as PMS operators or axes
      - use EDEN-MAP as a coercive map against persons, groups, institutions, or positions
      - treat non-action as praxis by default or non-binding as avoidance by default
      - treat protection as immunity from R or responsibility as permission to degrade
      - claim full capture, final verdict, diagnosis, prescription, or PMS-Core correction

  case_meta:
    id: PMS_CORE_BOUNDARY_EROSION_PRIVACY_PUBLICNESS__EDEN_OVERLAY
    title: "EDEN overlay: Boundary erosion (Privacy → Publicness)"
    status: description_only_overlay
    model: PMS-EDEN
    model_schema_version: PMS-EDEN_2.0
    base_schema: PMS_1.3
    base_core_case_ref: "Boundary erosion (Privacy → Publicness)"
    output_role: additional_yaml_block_to_append_or_integrate
    case_type: conceptual_domain_projection_not_concrete_scene
    axiom_overlay_focus:
      - real_omega_visibility
      - false_coordination_test
      - responsibility_action_power_distribution
      - sigma_psi_cost_distribution
      - correctability_and_counter_scene
      - description_to_action_firewall
    primary_focus: >
      Test whether the Core case-family of moving bounded repair or confidential
      feedback material into public accountability or tribunal-like publicness can
      be read, under EDEN, as false-coordinated real asymmetry; because the Core
      case is explicitly non-concrete, the EDEN result remains conditional,
      indeterminate, and description-only.

  axiom_validity_gate:
    status: partial
    gate_type: PMS_application_plus_EDEN_application_requirements
    applies_to: EDEN_overlay_application_in_AXIOM
    canonical_pms_entry_condition:
      distance_Chi:
        id: "Χ"
        status: maintained
        case_application: >
          The overlay remains non-verdictive and does not fuse privacy,
          publicness, disclosure, or accountability with final truth, blame,
          closure, or action authorization.
      reversibility:
        id: reversibility
        status: maintained
        case_application: >
          The reading remains scene-bound, revisable, and suspended where the
          Core case lacks actors, chronology, consent terms, legal context,
          audience record, safeguards, or right-of-reply conditions.
      dignity_in_practice_D:
        id: "D"
        status: maintained
        case_application: >
          No shaming, humiliation, person-ranking, sex-ranking, diagnosis, or
          dignity hierarchy is introduced. D remains an application constraint,
          not an ontological claim.
    eden_application_requirements:
      scene_packet:
        status: partial
        note: >
          The Core case provides a conceptual case-family rather than a concrete
          scene packet; therefore EDEN mechanism claims remain suspended.
      counter_scene_exposure:
        status: present
        note: >
          Warranted accountability, whistleblowing, legal disclosure, procedural
          correction, democratic publicness, or confidentiality-as-concealment can
          materially alter or defeat the EDEN reading.
      contextual_responsibility:
        status: partial
        note: >
          R is tied only conditionally to structuring effect, legibility,
          capacity, alternatives, Θ trajectory, and Ω cost/exposure because
          concrete scene evidence is absent.
      evidentiary_answerability:
        status: partial
        note: >
          Consent, confidentiality terms, legal/public-interest basis, prior
          repair failure, safeguards, right of reply, and concrete cost
          distribution could narrow, suspend, revise, or defeat the map.
      affected_role_contestation:
        status: available
        note: >
          Affected role-positions may contest packet, evidence, frame, R trace,
          or application without confirming EDEN by disagreement.
      independent_application_authority:
        status: not_authorized
        note: EDEN-MAP itself gives no authority to confront, bind, intervene, punish, expose, or enforce.
    gate_result: valid_as_bounded_description_overlay_with_limits
    invalid_if_any:
      - core_case_rewritten_by_overlay
      - PMS_operator_redefined
      - PMS_derived_axis_redefined
      - EDEN_construct_treated_as_PMS_base
      - EDEN_by_vibe
      - real_Ω_asserted_without_scene_packet
      - false_coordination_claimed_without_real_Ω_displaced_R_and_blocked_or_weakened_or_simulated_or_avoided_or_externalized_Σ_Ψ
      - counter_scene_cannot_change_reading
      - no_falsifier_named
      - description_converted_directly_into_binding_or_obligation
      - responsibility_assigned_without_contextual_conditions
      - non_action_treated_as_praxis_by_default
      - non_binding_treated_as_avoidance_by_default
      - sex_or_person_label_substituted_for_scene_analysis
      - hidden_motive_or_psychology_inferred_from_operator_trace
      - humiliation_or_exposure_used_as_method
      - action_recommendation_or_intervention_protocol_added
      - legal_clinical_forensic_policy_or_HR_conclusion_added
      - D_suspended_for_truth_clarity_efficiency_punishment_or_resolution

  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_sex_ranking: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_legal_forensic_clinical_policy_or_HR_conclusion: true
    no_action_authorization: true
    no_application_authority_from_description: true
    no_humiliation_or_public_exposure_as_method: true
    description_to_action_firewall: active
    validity_gate_reference: axiom_validity_gate
    required_method_conditions:
      canonical_pms_entry_condition:
        - "Χ"
        - reversibility
        - "D"
      eden_application_requirements:
        - scene_packet
        - counter_scene_exposure
        - contextual_responsibility
        - evidentiary_answerability
        - affected_role_contestation
        - independent_application_authority
    core_rule: >
      Map the scene; do not diagnose persons, prescribe action, rank sexes,
      authorize intervention, or revise PMS-Core.
    prohibited_shortcuts:
      - EDEN-by-vibe
      - PFO-by-vibe
      - identity-based_assignment
      - sex-truth_inference
      - personality_inference
      - motive_inference_from_operator_trace
      - description_converted_into_obligation
      - PMS-Core-correction-by-overlay

  example_schema_alignment:
    required_fields_from_PMS_EDEN_CASE_2_0:
      case_schema_version: case_schema_version / mapped to pms_axiom_eden_overlay_case.case_schema_version
      case_meta: case_meta
      guardrails: case_guardrails
      vignette: minimal_vignette
      scene_packet: scene_packet
      pms_operator_trace: pms_operator_trace
      eden_map: eden_map
      construct_selection: construct_selection
      closure: readable_structural_closure
    required_eden_map_fields:
      - scene_packet_summary
      - real_omega_mapping
      - dominant_false_coordination_frame
      - responsibility_and_action_power_distribution
      - sigma_psi_status
      - cost_distribution
      - non_action_and_non_binding
      - immunization_overexposure_AEP
      - counter_scene_and_falsifier
      - description_application_status
      - revision_point_or_open_question
    axiom_adapter_fields:
      - overlay_relationship_to_core
      - core_anchor
      - axiom_validity_gate
      - axiom_integration
      - eden_overlay_quality_control
    axiom_adapter_note: >
      EDEN CASE 2.0 provides the internal field structure. AXIOM adds the
      completed-Core anchor, replacement-only add-on role, and final QC that the
      overlay did not become a Core rewrite or standalone application authority.

  example_suite_schema_alignment:
    status: reference_only_embedded_in_AXIOM_overlay
    source: PMS-EDEN_CASE_2.0 reusable case template
    axiom_case_policy: >
      AXIOM cases do not generate a standalone PMS-EDEN example-suite artefact
      unless explicitly requested. The EDEN case template is used as the internal
      overlay field structure over a completed PMS-Core case.

  paper_structure_map_alignment:
    status: reference_only
    source: PMS-EDEN.yaml.paper_structure_map
    case_application: >
      Materially relevant regions are Adult Reciprocity, false-coordinated real
      asymmetry, responsibility and praxis architecture, non-action/non-binding
      boundaries, immunization/overexposure/AEP checks, counter-scene protocol,
      and the description-to-action firewall. The overlay does not reproduce the
      whole paper map.

  core_anchor:
    completed_core_case_summary:
      use: anchor_only_not_rewrite
      core_scene_boundary: >
        The Core pass treats the material as a conceptual case-family rather than
        a concrete praxis scene: confidential feedback or internal-resolution
        material is moved into public accountability discourse or tribunal-like
        public framing.
      core_primary_operator_profile: >
        Φ is central, anchored by Δ and □, extended through Θ, and made salient
        under candidate Ω; Λ, Α, Σ, and Ψ remain weak, conditional, or analytic.
      core_relevant_asymmetries:
        - exposure_asymmetry_under_publicness
        - audience_scale_and_reply_capacity
        - possible_internal_confidentiality_asymmetry
        - obligation_and_accountability_distribution
      core_relevant_non_events:
        - possible_failed_internal_repair
        - possible_failed_confidentiality
        - possible_failed_accountability
        - possible_missing_response_or_closure
      core_relevant_temporalities:
        - material_generated_under_source_frame
        - later_transfer_to_target_public_frame
        - possible_delay_escalation_or_reuse
      core_boundary_notes:
        - no_concrete_actors
        - no_chronology
        - no_institutional_record
        - no_consent_conditions
        - no_confidentiality_terms
        - no_legal_context
        - no_harm_context
        - no_audience_record
        - no_evidentiary_record
    core_to_eden_bridge:
      eden_relevance_trigger: >
        EDEN becomes relevant because the Core case already isolates real or
        candidate Ω, altered exposure, responsibility/accountability language,
        public or private frame control, possible non-events, integration risk,
        and conditional self-binding.
      what_eden_adds_beyond_core_visibility: >
        EDEN adds an overlay test for whether the asymmetry is truthfully
        coordinated or falsely coordinated through displaced R, blocked or
        simulated Σ/Ψ, shifted costs, lost correctability, immunization/
        overexposure signals, non-action/non-binding relevance, and a mandatory
        counter-scene/falsifier protocol.
      what_must_remain_core_only: >
        The Core operator derivation, Core dependencies, Core derived axes, and
        Core final formula remain unchanged. EDEN does not convert the Core Φ
        finding into a verdict that publicness is boundary erosion or that
        privacy is concealment.

  minimal_vignette:
    scene: >
      A material, utterance, or expectation initially governed by a bounded repair,
      confidential feedback, or internal-resolution frame is later placed into a
      public accountability or tribunal-like frame. The public frame may make
      previously hidden asymmetry accountable, but it may also change exposure,
      reply capacity, reputational cost, and the burden of explanation. The
      internal frame may preserve repair and D, but it may also conceal power or
      block accountability. EDEN tests only whether real Ω is being falsely
      coordinated through displaced R and weakened or blocked Σ/Ψ; it does not
      decide legitimacy without a concrete scene.
    temporal_boundary: >
      Begins with bounded or confidential source-frame generation, continues
      through later public recontextualization, and ends at the point where costs,
      exposure, responsibility, integration, self-binding, and correctability are
      redistributed. Recurrence is not established by the Core case.
    roles:
      - id: role_A
        label: bounded_repair_or_confidentiality_position
        not_identity: true
      - id: role_B
        label: public_accountability_or_disclosure_position
        not_identity: true
      - id: field_or_medium
        label: public_audience_institutional_or_discursive_medium
        not_identity: true
    surface_description: >
      The scene may appear as a move from privacy to accountability, or as a move
      from repair/confidentiality to exposure/tribunalization.
    eden_question: >
      Does the transfer truthfully coordinate real Ω, R, costs, Σ/Ψ, and
      correctability, or does it falsely coordinate real Ω by shifting exposure,
      responsibility, integration-load, or language access while appearing as
      repair, accountability, protection, or public legitimacy?

  scene_packet:
    specified_scene: conceptual_case_family_only
    role_positions:
      role_A:
        scene_position: bounded_repair_or_confidentiality_position
        not_identity: true
      role_B:
        scene_position: public_accountability_or_disclosure_position
        not_identity: true
      field_or_medium:
        scene_position: public_audience_institutional_or_discursive_medium
        not_identity: true
        optional: false
    dominant_frame:
      candidate_frame: mixed
      frame_description: >
        Competing frames of confidentiality/repair and public accountability/
        tribunal-like publicness make the same material legible under different
        duties, audience conditions, and exposure structures.
      frame_status: indeterminate
      false_coordination_boundary: >
        No frame family is categorically false. False coordination requires real Ω,
        displaced R, and blocked, weakened, simulated, avoided, or externalized
        Σ/Ψ; those conditions are not established by the conceptual Core case.
    real_Ω:
      present: indeterminate
      summary: >
        Candidate Ω is visible as altered exposure, public audience power, reply
        capacity, obligation, reputational cost, confidentiality benefit, and
        possible accountability blockage. Direction and magnitude cannot be fixed
        without a concrete scene.
      dimensions:
        capacity: indeterminate
        exposure: mixed
        dependency: indeterminate
        protection: mixed
        obligation: mixed
        access: indeterminate
        timing_control: indeterminate
        frame_control: mixed
        recognition_control: indeterminate
        binding_control: indeterminate
        language_access: indeterminate
        explanation_burden: mixed
        vulnerability: mixed
        action_power: mixed
        risk: mixed
        cost: mixed
        exit_and_waiting_capacity: indeterminate
      mapping_question: >
        Who becomes exposed, who controls the frame, who can answer, who bears
        explanation cost, who benefits from confidentiality or publicness, and who
        can access proportionate correction?
      asymmetry_not_failure_rule: Asymmetry is not the failure; false coordination of asymmetry is the failure.
      multidimensional_guardrail: >
        Privacy/publicness, protection/accountability, audience power, reply
        capacity, obligation, and explanation burden may diverge and cannot be
        collapsed into one moral rank.
    relevant_Λ:
      present: indeterminate
      non_event_or_absence: possible_missing_repair_confidentiality_response_closure_or_accountability
      scene_structuring_effect: >
        A non-event becomes EDEN-relevant only if failed repair, failed
        confidentiality, failed accountability, missing response, or delayed
        closure traceably changes cost, exposure, options, R, Σ/Ψ, or
        correctability.
      no_passive_praxis_check: Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ.
    non_action_relevance:
      status: indeterminate
      note: >
        The Core case names possible absences but does not specify whether any
        silence, delay, non-response, restraint, refusal, or missing step actually
        structures another role-position's costs or options.
      boundary: >
        Silence, delay, refusal, non-response, or absence is not praxis by default
        and never proves motive, manipulation, drift, or responsibility.
    non_binding_relevance:
      status: indeterminate
      note: >
        Confidentiality promises, repair duties, public-interest duties,
        non-retaliation norms, or accountability commitments are not supplied;
        Ψ-load shift is therefore possible but not established.
      boundary: >
        Non-binding may be legitimate where uncertainty, consent, lawful limits,
        incapacity, boundary-respect, or Χ require continued openness.
    "Θ_trajectory":
      sequence:
        - step: 1
          description: Material is generated, received, or held under a bounded repair or confidential feedback frame.
        - step: 2
          description: The same material or structure is later placed into public accountability discourse or tribunal-like publicness.
        - step: 3
          description: Audience, exposure, reply capacity, obligation, cost, R, Σ/Ψ, and correctability may be redistributed.
      trajectory_status: conceptual_transfer_not_scene_established
      trajectory_origin_note: >
        The sequence is a Core case-family sequence, not an empirical chronology or
        causal proof.
    structuring_effects:
      role_A_effects:
        - candidate_effect_of_internal_frame_on_confidentiality_repair_and_possible_accountability_blockage
      role_B_effects:
        - candidate_effect_of_public_frame_on_exposure_accountability_and_possible_tribunalization
      shared_or_field_effects:
        - audience_expansion
        - context_collapse
        - altered_reply_capacity
        - shifted_explanation_burden
        - possible_correctability_gain_or_loss
      unsupported_effects:
        - motive
        - bad_faith
        - pathology
        - legal_breach
        - moral_blame
        - stable_regime_or_recurrence
        - sex_coded_profile
    responsibility_distribution:
      pms_axis: R
      eden_responsibility_principle: >
        R follows real structuring effect under available legibility, capacity,
        alternative possibility, Θ trajectory, and Ω cost/exposure conditions.
      role_A:
        structuring_effect: weak
        legibility: limited
        capacity: indeterminate
        alternatives: indeterminate
        provisional_R_status: indeterminate
      role_B:
        structuring_effect: weak
        legibility: limited
        capacity: indeterminate
        alternatives: indeterminate
        provisional_R_status: indeterminate
      field_or_medium:
        structuring_effect: weak
        legibility: limited
        capacity: indeterminate
        alternatives: indeterminate
        provisional_R_status: indeterminate
      blame_guardrail: R is not blame, guilt, moral worth, person condemnation, or total liability.
    recognition_and_protection:
      recognition_frame: mixed
      protection_frame: mixed
      D_status: preserved_as_application_constraint_scene_indeterminate
      recognition_structure:
        role_A: >
          May be recognized as needing repair confidentiality or may be made less
          criticizable if confidentiality shields effects.
        role_B: >
          May be recognized as seeking accountability or may become overexposed if
          publicness assigns responsibility without proportionate legibility.
        scene_effect: >
          Recognition and criticizability cannot be distributed until the scene
          specifies harm, consent, obligations, safeguards, and right of reply.
      protection_structure:
        role_A: >
          Privacy may protect D and repair or may protect unaccountable asymmetry.
        role_B: >
          Publicness may protect accountability and affected parties or may
          intensify exposure and explanation cost.
        scene_effect: >
          Protection is not immunity; accountability is not degradation. The Core
          case does not decide which structure is active.
      dignity_guardrail: Responsibility must not degrade; protection must not immunize.
    "Σ_Ψ_status":
      "Σ_integration":
        status: weak_indeterminate
        note: >
          Core identifies integration risk: privacy and accountability may be split
          rather than integrated. EDEN cannot establish blocked or simulated Σ
          without scene evidence.
      "Ψ_self_binding":
        status: conditional_indeterminate
        note: >
          Ψ becomes case-active only if commitments are specified, such as
          confidentiality promises, repair duties, public-interest duties,
          non-retaliation norms, or answerability obligations.
      load_shift:
        present: indeterminate
        formula: "low Ψ on one side → increased Ψ-load on the other."
        shifted_loads:
          - possible_waiting_or_option_preservation
          - possible_explanation_burden
          - possible_repair_or_accountability_load
          - possible_public_reply_or_self_restraint_load
    visible_costs:
      visibility_cost: >
        Public transfer can make one role-position or material highly visible while
        the source-frame conditions or public-frame control remain less visible.
      explanation_cost: >
        Affected positions may have to explain why privacy was protective or why
        publicness was necessary; allocation is scene-dependent.
      reaction_cost: >
        Publicness can make response-form, tone, timing, and recognizability
        costly; confidentiality can also make protest or disclosure costly.
      waiting_cost: >
        Possible if internal repair, response, closure, or accountability is
        delayed; not established.
      binding_cost: >
        Possible where one side remains less bound to confidentiality,
        accountability, repair, or public-interest duties while another must
        organize around that non-binding.
      protection_cost: >
        Possible where protection reduces criticizability or where lack of
        protection creates overexposure.
      speech_cost: >
        Naming either boundary erosion or public-interest disclosure may be
        recoded as concealment, exposure, retaliation, or threat depending on
        scene conditions.
      repair_cost: >
        Possible cost of restoring continuity between repair and accountability;
        no concrete bearer is established.
      dignity_cost: >
        D is preserved by the overlay method; scene-level D cost is indeterminate.
      legibility_cost: >
        The conceptual case lacks legitimate scene language for deciding whether
        publicness corrects or overexposes, and whether privacy repairs or
        conceals.
      option_loss: >
        Possible narrowing of clean alternatives through delayed repair,
        escalation, audience expansion, or confidentiality breach; not established.
