pms_eden_overlay_application:
  schema_version: "PMS-EDEN_1.2"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-EDEN.yaml"
  paper_source_file: "PMS-EDEN - Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–EDEN Application Profile"
    model_short: "PMS-EDEN"
    status: "draft"
    repository_role: "paper_specific_application_profile"
    last_updated: "2026-05-24"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    repo:
      name: "PMS-EDEN"
      url: "https://github.com/tz-dev/PMS-EDEN"
    source_paper:
      title: "PMS–EDEN — Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss"
      version: "PMS-EDEN_1.2"
      status: "final_updated_reference"
      paper_role: "authoritative_overlay_source"
    description: >
      PMS-EDEN is a paper-specific application profile for PMS_1.3. It
      operationalizes the EDEN lens as a machine-first overlay: reduced
      signatures, paper constructs, drift traces, pattern handles, EDEN-MAP
      mapping discipline, boundary conditions, alternative explanations, and
      example-suite scaffolding. It remains strictly subordinate to PMS.yaml.
    methodological_restraint: >
      PMS-EDEN does not claim to exhaust all accounts of Eden, comparison,
      reciprocity, asymmetry, sexed difference, recognition, or relational
      breakdown. In this case, it is used only as an overlay lens on the
      already completed PMS Core case "Boundary erosion (Privacy → Publicness)".
      It adds visibility for possible comparison drift, legibility management,
      pseudo-symmetry risk, switch availability, reciprocity strain, and
      non-externalization requirements, while leaving PMS.yaml as the only PMS
      Base and leaving the completed Core pass unchanged.

  abbrev_legend:
    A: "Awareness"
    C: "Coherence"
    R: "Responsibility"
    E: "Action / Enactment"
    D: "Dignity-in-practice"
    PS: "Pseudo-Symmetry (paper-internal construct)"
    PFO: "Postfeminist Override / Over-steering (paper-internal regime label; non-operator)"
    NRK: "Negative Responsibility Kernel (paper-internal construct)"
    AS: "Asymmetry Switch / Exception Switch (paper-internal label; non-operator)"
    PES: "Permanentized Exception Switch (paper-internal regime-drift label; non-operator)"
    PTE: "Parity-to-exit (paper-internal drift profile; non-operator)"
    RTA: "Responsibility-to-authority (paper-internal drift profile; non-operator)"
    EDEN_MAP: "EDEN-MAP mapping protocol (paper schema)"

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Boundary erosion (Privacy → Publicness), including the accepted textual updates to case scope, Φ calibration, and quality-control calibration points"
    rule: >
      This EDEN block is appended to or integrated with an already completed PMS
      Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS
      operators, alter PMS dependencies, change derived structures, or treat
      EDEN constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The EDEN overlay may add visibility for EDEN ground-state reading,
      threshold explicitness, breach as chain interruption, NRK, false
      comparison, dissatisfaction as system cost, pseudo-symmetry,
      asymmetry-switch availability, PFO, parity-to-exit,
      responsibility-to-authority, reciprocity loss, EDEN-MAP, pattern library,
      viability boundaries, and alternative explanations. It must not modify
      the completed PMS Core case except where a direct PMS.yaml inconsistency
      has been separately identified. No such PMS.yaml inconsistency is asserted
      here. The overlay therefore operates as a secondary, case-bound lens on
      the completed Core reading: a confidential or internal repair frame
      becoming public/accountability-facing under Φ, Ω, Θ, Χ, and Σ-risk.

  overlays: {}

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >
      PMS-EDEN introduces no amplification overlays beyond paper-internal
      descriptors, reduced signatures, drift corridors, regime descriptions,
      cost markers, viability boundaries, EDEN-MAP, alternative-explanation
      discipline, and example-suite schemas. These organize existing PMS
      operators and never become PMS operators, axes, or dependencies. In this
      case, labels such as PS, NRK, AS, PES, PTE, RTA, PFO, devaluation, and
      humiliation remain overlay handles only; they are not PMS operators, not
      person labels, not group labels, not ideology claims, not diagnoses, and
      not legal-forensic conclusions.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    note: >
      This gate constrains PMS application only. PMS itself, PMS-EDEN, or the
      case may be criticized, rejected, revised, or ignored without satisfying
      this gate.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          Maintained reflective distance; no fusion into verdict, urgency,
          enforcement, person-level attribution, diagnosis, humiliation, or
          irreversible labeling. In this EDEN overlay, Χ is maintained by
          refusing to decide whether private containment or public exposure is
          correct by default, refusing to label actors, refusing to treat
          publicness as automatically tribunalizing, and refusing to treat
          confidentiality as automatically restorative.
      reversibility:
        id: "reversibility"
        status: "maintained"
        meaning: >
          Scene-bound, revisable, non-final readings; no global person labels,
          no group labels, no irreversible drift classification. The overlay
          remains reversible because the abstract case provides no concrete
          actors, chronology, legal context, confidentiality agreement, consent
          record, prior repair sequence, audience scale, or harm evidence.
      Dignity_in_Practice_D:
        id: "D"
        name: "Dignity-in-practice"
        status: "maintained"
        meaning: >
          No shaming, ranking, humiliation, or ontological person evaluation.
          Critique applies only to enacted structures, role-position
          configurations, cost handling, and scene-bound drift profiles. In
          this case, D is preserved by treating exposure, accountability,
          privacy, reply capacity, and burden distribution as structural
          conditions rather than as grounds for person-ranking, moral
          superiority, diagnosis, or public condemnation.
    gate_result: "valid_as_eden_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any use of Χ in reduced signatures is shorthand only. In PMS, Χ
      presupposes Φ, Θ, and □. Reduced signatures do not negate prerequisites,
      replace generativity with explanation, or alter the default dependency
      path recorded in PMS_1.3. In this case, any EDEN reduced signature that
      names Χ, Σ, Ψ, Ω, Θ, or Φ is read only as an overlay compression of the
      already preserved PMS Core dependency structure.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  references:
    pms_github: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
    pms_yaml_raw: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    pms_eden_repo: "https://github.com/tz-dev/PMS-EDEN"

  eden_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-theological, non-clinical, non-diagnostic."
      - "No person-level judgment, no group label, no ideology claim, no ranking, no sanction logic."
      - "No psychology or inner-state explanation."
      - "No moral verdict logic."
      - "No automatic prescriptive authority."
      - "No person-level interpretation of switch-drift handles."
      - "Switch labels are scene-bound structural profiles, not traits, motives, or person defects."
      - "Description and application remain firewalled by Χ + reversibility + D."
    may_add_visibility_to:
      - "Eden as ground-state praxis configuration"
      - "Threshold explicitness / option visibility"
      - "Breach as chain interruption rather than knowledge gain"
      - "Fig leaves as legibility management"
      - "Negative Responsibility Kernel"
      - "False comparison pivot"
      - "Dissatisfaction as system cost"
      - "Pseudo-Symmetry regime"
      - "Asymmetry-switch availability"
      - "Permanentized exception switch"
      - "Parity-to-exit drift"
      - "Responsibility-to-authority drift"
      - "PFO as paper-internal regime label"
      - "Reciprocity as coordinated asymmetry"
      - "Reciprocity loss"
      - "Devaluation and humiliation as structural stabilization modes"
      - "Pattern-library recognition handles"
      - "EDEN-MAP scene-bound mapping"
      - "Boundary conditions and alternative explanations"
    must_not_do:
      - "read Eden as theological doctrine or moral anthropology"
      - "treat paper-internal labels as PMS operators"
      - "treat switch-drift handles as person labels"
      - "treat PFO as group label or ideology claim"
      - "treat humiliation or devaluation as moral accusation"
      - "treat NRK as PMS Action_E"
      - "treat comparison drift as diagnosis"
      - "convert additional responsibility into authority"
      - "convert parity into exit from unequal cost-bearing"
      - "use EDEN-MAP as coercive mapping against persons"
      - "claim PMS Base validation"

  paper_frontmatter_min:
    key_claims:
      - "Eden as a praxeological ground state within PMS: A-availability without deficit pressure in a structurally specified praxis scene."
      - "Breach/Fall as operator-chain interruption, not knowledge gain; consequence-field legibility under Ω/Θ/Λ without epistemic surplus."
      - "Drift pipeline: praxis → comparison-dominant □ → PS → asymmetry-switch availability → PFO/permanentized exception → parity-to-exit / responsibility-to-authority drift → devaluation/humiliation scripts → reciprocity loss."
    pms_conformance:
      - "Uses only PMS_1.3 operators Δ–Ψ."
      - "No redefinitions and no new axioms."
      - "Separates description from application."
      - "Validity gate applies to application only."
    acred_reference:
      A:
        formula:
          - "Θ"
          - "□"
          - "Δ"
        label: "Awareness"
      C:
        formula:
          - "Θ"
          - "Λ"
          - "□"
          - "∇"
        label: "Coherence"
      R:
        formula:
          - "Ψ"
          - "Φ"
          - "Θ"
          - "Ω"
        label: "Responsibility"
      E:
        formula:
          - "Σ"
          - "Θ"
          - "∇"
        label: "Action / Enactment"
      D:
        formula_note: "D = (Ψ ∘ Χ) applied to Ω-handling"
        label: "Dignity-in-practice"
        discipline: "non-metaphysical; non-ranking"
    paper_terms_min:
      pseudo_symmetry_PS:
        status: "risk"
        definition: >
          Comparison-dominant □ asserts rhetorical parity while Ω remains
          operative in consequences and may produce asymmetry-switch
          availability. This is a paper-internal structural substitution, not a
          moral claim.
        case_application: >
          PS is not established as active because the abstract case does not
          specify a comparison-dominant frame or a parity claim. It is a risk
          where public accountability discourse treats private repair material
          as if it were immediately equivalent to public evidence, public
          accusation, or tribunal material while real Ω remains unequally
          distributed across exposure, reply capacity, reputational cost, and
          institutional control.
      asymmetry_switch:
        status: "risk"
        definition: >
          Paper-internal label for parity-to-asymmetry activation under real or
          invoked Ω/Θ pressure; valid only where marked, bounded, and re-bound
          into Σ/Ψ.
        case_application: >
          Asymmetry-switch availability is a risk, not a finding. The case may
          involve a switch from a parity surface such as "public accountability
          applies equally" or "confidentiality applies equally" into selective
          asymmetry activation: one side may invoke exposure, vulnerability,
          harm, authority, duty, or public interest to change what counts as
          permissible. The abstract material does not show whether such
          activation is marked, bounded, justified, or re-bound into Σ/Ψ.
      permanentized_exception_switch:
        status: "not_applicable"
        definition: >
          PFO drift form in which asymmetry activation ceases to be
          emergency-bound and becomes a standing lever under preserved parity
          surface.
        case_application: >
          Permanentized exception-switch status is not applicable on the given
          material. The case describes possible drift from confidential repair
          to publicness, but it does not show recurrence, standing availability,
          normalized exception logic, or a stable regime in which asymmetry
          activation becomes a repeatable lever.
      parity_to_exit:
        status: "risk"
        definition: >
          Drift pattern in which parity rhetoric is used to deny additional
          responsibility under unequal Ω/Θ consequences.
        case_application: >
          Parity-to-exit is a conditional risk. A confidentiality frame could
          become parity-to-exit if "everyone agreed this was internal" or
          "bounded feedback must stay bounded" is used to avoid unequal
          accountability costs after internal repair fails. Conversely, a public
          accountability frame could become parity-to-exit if "the public has a
          right to know" is used to bypass additional responsibility for
          context, proportion, reply capacity, anonymization, or exposure
          burdens. The case does not prove either route.
      responsibility_to_authority:
        status: "risk"
        definition: >
          Drift pattern in which required Ψ/Χ self-binding under asymmetry is
          converted into control, protection entitlement, or frame authority.
        case_application: >
          Responsibility-to-authority is a risk where a party or institution
          converts responsibility for repair, confidentiality, accountability,
          or protection into authority over the frame itself: deciding what may
          be said, who may answer, when publicness is allowed, or whose exposure
          counts. The abstract case does not establish such conversion, but the
          boundary-eroding move raises it as a calibration point.
      PFO:
        status: "not_applicable"
        definition: >
          Paper-internal regime label for □ governance attempting to manage or
          suppress Ω legibility while permanentizing asymmetry-switch
          availability. It is structural, not a group label and not an ideology
          claim.
        case_application: >
          PFO is too strong for this case. The material does not warrant a
          regime-level reading, does not show Ω-taboo governance, does not show
          permanentized switch availability, and does not support any group
          label or ideology claim. At most, the case can be inspected for local
          switch risk, pseudo-symmetry risk, and reciprocity strain.
      reciprocity_loss:
        status: "risk"
        definition: >
          Erosion or failure of Σ/Ψ-supported coordination under real Ω across
          Θ, including switch-drift forms where parity becomes exit, asymmetry
          becomes leverage, or responsibility becomes authority.
        case_application: >
          Reciprocity loss is a risk rather than an established outcome. The
          core case already marked Σ as weak and Ω/Θ as important: confidential
          repair and public accountability may fail to coordinate if privacy
          externalizes accountability costs or publicness externalizes exposure
          costs. Reciprocity is not lost merely because a public frame appears;
          loss would require evidence that Σ/Ψ-supported coordination under
          real Ω is eroded across time.

    case_application: >
      The EDEN key claims are relevant only as overlay lenses. The EDEN
      ground-state claim is at most analogical, because the case does not
      present an original non-deficit praxis scene; it presents a conflict
      between confidential repair and public accountability frames. The
      breach-as-chain-interruption claim is weakly relevant where boundary
      transfer interrupts the expected chain from confidential feedback to
      internal repair or from accountability demand to proportionate public
      response. The drift pipeline is not active as a full EDEN trace, but
      parts of it are useful as risk handles: threshold explicitness, legibility
      management, false comparison, pseudo-symmetry, asymmetry-switch
      availability, parity-to-exit, responsibility-to-authority, and
      reciprocity loss. PFO, permanentized exception, devaluation, and
      humiliation remain not established unless a concrete scene supplies
      recurrent regime evidence.

  paper_internal_terms_index:
    note: >
      Paper-internal terms are stable handles only. They are not PMS operators,
      not diagnoses, not person labels, and not group labels.
    asymmetry_switch:
      handle: "AS"
      status: "risk"
      definition: >
        Shift from parity claim to asymmetry activation under real or invoked
        Ω/Θ pressure. Valid only where activation is marked, bounded, and
        re-bound into Σ/Ψ; drift where unmarked, repeatable, and
        responsibility-shifting.
      case_application: >
        AS appears only as a risk. The privacy/publicness boundary can create
        a parity surface: either "confidentiality rules apply" or "public
        accountability applies". The switch risk appears when one frame
        activates asymmetry selectively under pressure: confidentiality becomes
        a shield against accountability, or publicness becomes a lever of
        exposure without proportional safeguards. No concrete scene shows
        whether such activation is marked, bounded, or re-bound into Σ/Ψ.
    permanentized_exception_switch:
      handle: "PES"
      status: "not_applicable"
      definition: >
        PFO drift form in which asymmetry activation ceases to be
        emergency-bound and becomes a standing lever under preserved parity
        surface.
      case_application: >
        PES is not applicable on the abstract material. Boundary erosion may
        involve a single frame transfer, but a permanentized exception switch
        would require evidence of repeated or standing availability: for
        example, routine conversion of internal repair material into public
        pressure, or routine use of confidentiality to block accountability.
        That evidence is absent.
    parity_to_exit:
      handle: "PTE"
      status: "risk"
      definition: >
        Drift pattern in which parity rhetoric is used to deny additional
        responsibility under unequal Ω/Θ consequences.
      case_application: >
        PTE is a bidirectional risk. A privacy frame may use formal equality of
        confidentiality to exit responsibility for unequal harm, exposure, or
        failed repair. A public accountability frame may use formal equality of
        public scrutiny to exit responsibility for unequal reputational,
        procedural, or reply-capacity costs. The case does not show that either
        exit is active.
    responsibility_to_authority:
      handle: "RTA"
      status: "risk"
      definition: >
        Drift pattern in which required Ψ/Χ self-binding under asymmetry is
        converted into control, frame authority, protection entitlement, or
        governance over another role-position.
      case_application: >
        RTA is a risk where the duty to repair, protect confidentiality, answer
        publicly, contextualize, or prevent harm becomes authority to govern
        the frame unilaterally. This could occur in either direction: an
        internal actor may claim authority over silence in the name of repair,
        or a public actor may claim authority over exposure in the name of
        accountability. The abstract case supports only this risk marker, not a
        finding.

  paper_constructs:
    note: >
      The following are EDEN paper constructs. They are non-operators and
      must remain scene-bound, structural, non-diagnostic, and non-personal.
    EDEN_ground_state:
      name: "Eden ground state"
      is_operator: false
      type: "scene_configuration"
      applicability: "weak"
      basis_operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "A"
      definition: >
        Eden is reconstructed as a structurally specified praxis scene without
        deficit pressure: Δ is present, □ is stable, Θ is continuity rather than
        punitive accumulation, A = [Θ, □, Δ] is available, ∇ exists without
        deficit-compulsion dominance, Ω is latent or non-escalated, and Λ is not
        the central engine.
      case_application: >
        An EDEN-like ground-state is weak and analogical only. The case does
        not describe an original Edenic state; it describes confidential
        feedback or internal resolution as a bounded repair frame. That bounded
        frame may resemble an EDEN-like non-public praxis space if it allows
        feedback, repair, and role continuity without deficit pressure,
        reputational exposure, or tribunal comparison. But this is not
        established: the same internal frame may also suppress accountability
        or conceal Ω. Therefore EDEN_ground_state is not a finding, only an
        overlay hypothesis about what the bounded frame might have claimed to
        protect.

    THRESHOLD_apple:
      name: "Threshold marker / option explicitness"
      is_operator: false
      type: "threshold_marker"
      applicability: "active"
      basis_operators:
        - "Δ"
        - "□"
        - "Θ"
      basis_axes:
        - "A"
      definition: >
        The threshold marks option visibility: a negative praxis option becomes
        explicitly selectable within □ across Θ under available A. It adds no
        new Δ, A, or Χ and is not treated as knowledge or insight.
      case_application: >
        Threshold explicitness is active as an overlay reading. The relevant
        threshold is the moment at which material produced for confidential
        feedback or internal resolution becomes available as public
        accountability material. This does not mean a new truth appears; it
        means a previously bounded option becomes selectable: publicizing,
        quoting, framing as evidence, inviting public judgment, or shifting the
        audience. The threshold remains structurally distinct from legitimacy,
        legal permission, empirical truth, or moral insight.

    BREACH_chain_interruption:
      name: "Praxis breach as chain interruption"
      is_operator: false
      type: "chain_interrupt"
      applicability: "weak"
      basis_operators:
        - "Δ"
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
      definition: >
        Breach is reconstructed as realization under ∇ within □ with available
        A, where Σ does not carry integration and Ψ does not carry durable
        binding. It produces consequence-field legibility under Ω/Θ/Λ and does
        not produce epistemic surplus.
      case_application: >
        Breach-like chain interruption is weak. The case may involve an
        interruption of the expected chain from confidential feedback to
        bounded repair, or from internal non-response to proportionate public
        accountability. However, the abstract material does not specify
        whether a promise, duty, expectation, or repair chain was actually
        broken. If a breach occurred, it must not be treated as knowledge gain
        or Action_E. It would be a structural interruption that makes
        consequences, exposure, and missing integration legible under Ω/Θ/Λ.

    FIG_LEAVES_legibility_management:
      name: "Fig leaves as legibility management"
      is_operator: false
      type: "cost_management_response"
      applicability: "risk"
      basis_operators:
        - "Λ"
        - "Ω"
        - "Χ"
        - "□"
        - "Θ"
      definition: >
        Fig leaves mark post-breach legibility management: □ shifts toward
        exposure/vulnerability framing, Χ appears as shielding distance rather
        than Σ-enabled reflection, Λ persists as remainder, Ω becomes
        instrumentally legible, and Α may seed concealment scripts.
      case_application: >
        Legibility management is a risk. In the privacy-to-publicness case,
        confidentiality can function as shielding distance if it reduces
        visibility without enabling Σ-supported repair. Publicness can also
        function as exposure management if it displays selected material while
        obscuring context, proportionality, reply capacity, or repair history.
        The case does not establish concealment or shielding; it only makes
        this EDEN handle relevant for calibration.

    NRK:
      name: "Negative Responsibility Kernel"
      is_operator: false
      type: "composite_kernel"
      applicability: "weak"
      basis_operators:
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "R"
        - "E"
      compact_form: >
        NRK = A available + real option-set in □ + Ω effective + Θ
        trajectory-bearing + realization under ∇ within □ with Σ not carrying
        and Ψ absent, aborted, externalized, displaced, or simulated.
      discipline_E_separation: >
        Do not label NRK as E. E remains reserved for integrated action:
        E = [Σ, Θ, ∇].
      case_application: >
        NRK is weak. It becomes relevant only if the case shows that actors or
        institutions had awareness of the bounded/public option-set, effective
        Ω, trajectory-bearing Θ, and a real possibility of either maintaining
        confidentiality, repairing internally, escalating publicly, or
        contextualizing exposure, while Σ did not carry and Ψ was displaced or
        simulated. The current case material does not supply that evidence.
        Action_E must remain under-specified in accordance with the completed
        PMS Core pass; NRK must not be treated as Action_E, blame, motive, or
        legal responsibility.

    FALSE_COMPARISON:
      name: "False comparison pivot"
      is_operator: false
      type: "frame_mutation"
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Δ"
        - "Λ"
        - "Α"
        - "Θ"
      definition: >
        False comparison is a post-NRK frame inversion in which □ shifts from
        praxis-relation to value-relation. Δ becomes comparative tokenization,
        Ω is read as verdict or grievance surface, and comparison replaces
        coordination where Σ/Ψ cannot carry reciprocity.
      case_application: >
        False comparison is a risk because public accountability discourse may
        convert repair material into a comparative value object: who is right,
        who is exposed, who is credible, who failed, or whose standing should
        be lowered. Conversely, confidentiality discourse may compare public
        accountability demands as disloyal, excessive, or improper without
        coordinating the underlying Ω. The case does not prove such a pivot;
        it only identifies the danger that praxis-relation is replaced by
        standing-comparison before Σ/Ψ coordination occurs.

    DISSATISFACTION_system_cost:
      name: "Dissatisfaction as system cost marker"
      is_operator: false
      type: "cost_marker"
      applicability: "weak"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Α"
        - "Λ"
      definition: >
        Dissatisfaction is modeled as system cost of maintaining false
        equivalence inside □ under effective Ω and trajectory-bearing Θ. It is
        not treated as deficit or lack.
      case_application: >
        Dissatisfaction is weak and not directly evidenced. It would become
        visible if the case showed repeated frustration, unresolved grievance,
        ongoing public/private correction cycles, or continuing cost from
        maintaining equivalence between a bounded repair frame and a public
        accountability frame. The abstract case material does not establish
        dissatisfaction, and EDEN must not infer inner lack or affect.

    PS:
      name: "Pseudo-Symmetry regime"
      is_operator: false
      type: "drift_regime"
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
        - "Φ"
        - "Λ"
        - "Α"
      core_operator_signature: >
        PS = [□ comparison/value-relation + Ω real + Ω selectively activatable
        under parity surface + Σ low/blocked + Ψ misbound to
        appearance-management], typically with Φ, Λ, and Α as companions.
      buffer_note: >
        Pseudo-symmetry may function as bounded reversible buffer only insofar
        as it reopens Σ and Ψ under named Ω. As persistent substitution, it
        yields Σ/Ψ failure under Ω and prepares PFO.
      case_application: >
        PS is a risk, not an active regime finding. The case could become
        pseudo-symmetrical if it presents "confidential repair" and "public
        accountability" as formally equivalent options while real Ω is
        unequally distributed in consequences. For example, the same material
        may not bear the same cost when held privately versus displayed
        publicly. However, the abstract case does not show parity rhetoric,
        selective Ω activation, or misbound Ψ; therefore PS remains a
        calibration handle.

    ASYMMETRY_SWITCH:
      name: "Asymmetry switch / exception switch"
      is_operator: false
      type: "paper_internal_label"
      paper_internal_label: true
      non_person_label: true
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
        - "Χ"
      definition: >
        Shift from parity claim to asymmetry activation under real or invoked
        Ω/Θ pressure. It is valid where marked, bounded, and re-bound into
        Σ/Ψ; it becomes drift where unmarked, repeatable, and
        responsibility-shifting.
      case_application: >
        AS is a risk because both privacy and publicness can invoke asymmetry
        under pressure. Confidentiality may invoke vulnerability, trust, or
        repair to restrict public exposure. Public accountability may invoke
        harm, public interest, or institutional failure to justify exposure.
        Either activation may be valid if marked, bounded, and re-bound into
        Σ/Ψ. It becomes drift only if unmarked, repeatable,
        responsibility-shifting, or used to avoid carrying the relevant costs.

    PERMANENTIZED_EXCEPTION_SWITCH:
      name: "Permanentized exception switch"
      is_operator: false
      type: "regime_drift_label"
      paper_internal_label: true
      non_person_label: true
      applicability: "not_applicable"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
        - "Φ"
        - "Λ"
        - "Α"
      definition: >
        PFO drift form in which asymmetry activation ceases to be
        emergency-bound and becomes a standing lever while parity remains
        rhetorically preserved and Σ/Ψ coordination remains blocked.
      case_application: >
        Permanentized exception switch is not applicable on the provided
        material. There is no evidence of a standing lever, no recurrent
        protocol, no preserved parity surface with repeated asymmetry
        activation, and no established Α. It should not be inferred from the
        single abstract description of boundary erosion.

    PARITY_TO_EXIT:
      name: "Parity-to-exit"
      is_operator: false
      type: "drift_profile"
      paper_internal_label: true
      non_person_label: true
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      definition: >
        Drift pattern in which parity or symmetry is invoked to deny additional
        responsibility under unequal Ω/Θ consequences. Equality-language
        becomes an exit from re-internalizing costs.
      case_application: >
        PTE is a risk because either frame can use parity language to avoid
        unequal cost-bearing. The internal frame can say that all participants
        are equally bound by confidentiality while ignoring unequal harm or
        blocked accountability. The public frame can say that everyone is
        equally subject to public accountability while ignoring unequal
        exposure, context loss, or reply constraints. This remains a risk, not
        a finding.

    RESPONSIBILITY_TO_AUTHORITY:
      name: "Responsibility-to-authority"
      is_operator: false
      type: "drift_profile"
      paper_internal_label: true
      non_person_label: true
      applicability: "risk"
      basis_operators:
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
        - "□"
      definition: >
        Drift pattern in which required self-binding under asymmetry is
        converted into control, frame authority, protection entitlement, or
        governance over another role-position.
      case_application: >
        RTA is a risk because responsibility for repair, confidentiality,
        accountability, or protection may be converted into control over the
        frame: who may speak, when publicness is allowed, what counts as
        accountable, and whose exposure is legitimate. This overlay does not
        assert that such conversion occurred.

    ADULT_RECIPROCITY_NON_EXTERNALIZATION:
      name: "Adult reciprocity as non-externalization of unequal burdens"
      is_operator: false
      type: "viability_principle"
      paper_internal_label: true
      non_person_label: true
      applicability: "active"
      basis_operators:
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
        - "Χ"
      basis_axes:
        - "D"
      definition: >
        Adult reciprocity does not require equal burdens. It requires
        non-externalization of unequal burdens. Each role-position must carry
        the self-binding required by its own cost, capacity, externalization,
        and irreversibility profile.
      case_application: >
        This viability principle is active as a calibration requirement. The
        core case already asks whether privacy and accountability can be
        integrated without concealment or humiliation. EDEN sharpens this as
        non-externalization: the private repair frame must not externalize
        accountability costs onto those harmed or silenced, and the public
        accountability frame must not externalize exposure, context-loss, or
        reply-capacity costs onto the person or institution exposed. This is
        not a prescription; it is a structural test for reciprocity under Ω.

    PFO:
      name: "Postfeminist Override / Over-steering"
      is_operator: false
      type: "meta_frame_regime"
      paper_internal_label: true
      non_group_label: true
      non_ideology_claim: true
      applicability: "not_applicable"
      basis_operators:
        - "□"
        - "Ω"
        - "Φ"
        - "Λ"
        - "Α"
        - "Σ"
        - "Ψ"
        - "Θ"
        - "Χ"
      compact_formalization: >
        PFO = □(Ω-taboo + comparison + permanentized exception-switch
        availability) + Φ-high + Λ-open + Α-protocol with Σ suppressed and Ψ
        displaced or misbound across Θ.
      residual_stabilization_outcome: >
        Humiliation may emerge as remaining low-cost stabilization mode when
        explicit Ω/Σ/Ψ coordination is blocked under Ω-taboo and
        permanentized exception-switch conditions.
      case_application: >
        PFO is not applicable and would be too strong. The case does not show
        Ω-taboo as a governing regime, comparison metrics, permanentized
        exception-switch availability, protocol stabilization, or ideology-like
        meta-frame drift. The overlay therefore prohibits treating PFO as a
        group label, ideology claim, or explanation of the case. At most, local
        pseudo-symmetry or switch-risk may be examined.

    RECIPROCITY:
      name: "Reciprocity"
      is_operator: false
      type: "coordination_structure"
      applicability: "weak"
      basis_operators:
        - "Ω"
        - "Σ"
        - "Ψ"
        - "Θ"
        - "Χ"
      basis_axes:
        - "D"
      definition: >
        Reciprocity is not symmetry; it is coordinated asymmetry. Minimal
        condition: Ω legible as functional gradient + Σ active + Ψ anchored +
        Χ present, with D constraining Ω-handling.
      case_application: >
        Reciprocity is weak because the abstract case does not specify actual
        coordination between confidential repair and public accountability.
        The overlay reading is that reciprocity would require Ω legibility,
        active Σ, anchored Ψ, and Χ restraint: confidentiality would carry its
        accountability burdens, and publicness would carry its exposure and
        contextualization burdens. The provided case material does not show
        whether this coordination is achieved.

    RECIPROCITY_LOSS:
      name: "Reciprocity loss"
      is_operator: false
      type: "drift_outcome"
      applicability: "risk"
      basis_operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Α"
        - "Σ"
        - "Ψ"
        - "□"
        - "Χ"
      definition: >
        Reciprocity loss is Θ-erosion of Σ/Ψ-carried coordination under real Ω
        with chronic Λ and stabilized Α. Switch drift forms may include
        unmarked asymmetry activation, parity-to-exit, and
        responsibility-to-authority.
      case_application: >
        Reciprocity loss is a risk only. Boundary erosion may weaken
        reciprocity if frame transfer erodes Σ/Ψ coordination and leaves
        exposure, silence, accountability, or repair costs externalized. But
        reciprocity may also be restored by public disclosure where the
        internal frame failed. Therefore loss cannot be asserted without
        concrete evidence of chronic Λ, stabilized Α, and failure of Σ/Ψ under
        real Ω.

    DEVALUATION:
      name: "Devaluation"
      is_operator: false
      type: "structural_stabilization_label"
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Α"
        - "Λ"
        - "Σ"
        - "Ψ"
      definition: >
        Devaluation names lowering standing-in-practice as a control move
        substituting for coordination when Σ/Ψ cannot consolidate under named
        Ω. It is a paper-internal structural term, not moral accusation.
      case_application: >
        Devaluation is only a risk. A public tribunal-like frame may lower
        standing-in-practice by making the material function as public status
        evidence rather than repair material. A private containment frame may
        also lower standing by treating public accountability demands as
        improper or disloyal. No such devaluation is established; the term
        remains a structural stabilization handle only.

    HUMILIATION:
      name: "Humiliation"
      is_operator: false
      type: "structural_stabilization_label"
      applicability: "risk"
      basis_operators:
        - "□"
        - "Ω"
        - "Α"
        - "Λ"
        - "Σ"
        - "Ψ"
        - "Θ"
      definition: >
        Humiliation is treated as status regulation via devaluation when Σ/Ψ
        coordination under named Ω is blocked. It is structural, not a moral
        accusation or person judgment.
      case_application: >
        Humiliation is a risk rather than a finding. Publicness can become
        humiliating if exposure replaces proportionate accountability,
        context, reply capacity, and Σ/Ψ coordination. Confidentiality can also
        create humiliation indirectly if it leaves someone without recognized
        repair or answerability. The abstract case does not establish
        humiliation; Dignity-in-Practice requires that the overlay avoid
        converting this risk into accusation.

  reduced_signatures:
    note: >
      Reduced signatures are shorthand lenses and threshold markers, not proof
      chains. They compress dominant operator involvement and do not replace PMS
      dependencies.
    EDEN_linear_spine:
      label: "Linear operator spine"
      applicability: "active"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      reduced: true
      note: "Orientation map; not explanatory proof chain."
      case_application: >
        The linear spine is useful as an orientation map because the completed
        PMS Core case already tracks Δ through Ψ: privacy/publicness
        difference, weak directional pressure, competing frames, possible
        non-event, weak attractor status, exposure asymmetry, temporal drift,
        central recontextualization, required distance, integration risk, and
        conditional self-binding. This is not a proof chain and does not alter
        PMS dependencies.

    master_drift_trace_pipeline:
      label: "Master drift trace pipeline"
      applicability: "weak"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      trace: >
        EDEN → THRESHOLD → NRK → □comparison → PS →
        ASYMMETRY_SWITCH_AVAILABILITY → PFO/PERMANENTIZED_EXCEPTION →
        PARITY_TO_EXIT or RESPONSIBILITY_TO_AUTHORITY →
        residual_stabilization(Λ/Φ/Α) → DEVALUATION or HUMILIATION →
        RECIPROCITY_LOSS.
      note: >
        Consolidated paper-wide trace within this reconstruction; descriptive
        only. Switch labels are non-operators.
      case_application: >
        The master drift trace applies only weakly and partially. The case
        clearly supports THRESHOLD-like frame option visibility and Φ-driven
        movement from bounded repair to publicness. It may support risks of
        false comparison, PS, AS, PTE, RTA, devaluation, humiliation, and
        reciprocity loss. It does not support a full EDEN-to-PFO pipeline, does
        not establish NRK, does not establish permanentized exception, and does
        not warrant regime-level claims.

    threshold_marker_signature:
      label: "Threshold marker"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Θ"
      basis_axes:
        - "A"
      raw: >
        THRESHOLD = Δ within □ across Θ with A = [Θ, □, Δ] available; explicit
        negative option becomes selectable; no new Δ/A/Χ.
      case_application: >
        This signature applies strongly as overlay shorthand. The threshold is
        the point at which confidential or internal repair material becomes
        selectable as public accountability material. That threshold does not
        itself prove knowledge gain, legitimacy, wrongdoing, or maturity
        failure; it only marks option visibility within a changed frame across
        time.

    breach_chain_interrupt_signature:
      label: "Breach as chain interruption"
      applicability: "weak"
      operators:
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
      raw: >
        BREACH = realization under ∇ within □ with A available, while Σ does
        not carry and Ψ is absent, aborted, externalized, displaced, or
        simulated; Ω + Θ render consequences legible and Λ becomes binding.
      case_application: >
        This signature is weak. It could apply if the move into publicness
        interrupts a promised or expected confidential repair chain, or if
        internal containment interrupts an accountability chain. The abstract
        case does not establish breach, Σ failure, or Ψ displacement. Any
        breach reading must therefore remain conditional and must not be treated
        as Action_E, legal breach, moral fault, or person diagnosis.

    fig_leaves_signature:
      label: "Fig leaves / legibility management"
      applicability: "risk"
      operators:
        - "Λ"
        - "Ω"
        - "Χ"
        - "□"
        - "Θ"
      raw: >
        FIG_LEAVES = □ shifts to exposure/vulnerability framing; Χ appears as
        shielding; Λ persists; Ω becomes instrumentally legible; Α seeds
        concealment script across Θ.
      case_application: >
        This signature is a risk. The privacy frame may become shielding if it
        manages exposure without carrying repair or accountability. The public
        frame may become display if it makes selected material legible while
        leaving context, reply capacity, and proportionality opaque. Neither
        concealment nor exposure management is established by the case
        material.

    NRK_compact_signature:
      label: "NRK compact"
      applicability: "weak"
      operators:
        - "∇"
        - "□"
        - "Ω"
        - "Θ"
        - "Σ"
        - "Ψ"
      basis_axes:
        - "R"
        - "E"
      raw: >
        NRK = A available + option-set in □ with Θ trajectory-bearing and Ω
        effective, while realization under ∇ occurs with Σ low/failed and/or Ψ
        absent, aborted, externalized, displaced, or simulated.
      case_application: >
        NRK compact is weak because A and option visibility are plausible, Ω
        and Θ are structurally relevant, and Σ/Ψ are risk-bearing; however,
        the case does not show realization under ∇, actual responsibility
        displacement, or failed self-binding. Action_E remains under-specified
        and must not be replaced by NRK.

    false_comparison_pivot_signature:
      label: "False comparison pivot"
      applicability: "risk"
      operators:
        - "□"
        - "Ω"
        - "Δ"
        - "Λ"
        - "Α"
        - "Θ"
      raw: >
        FALSE_COMPARISON = □ drifts praxis-relation to value-relation; Δ is
        recoded as rank-token; Ω becomes verdict-surface; Σ/Ψ carriers are
        suppressed; Α/Λ stabilization begins across Θ.
      case_application: >
        This signature is a risk where confidential repair material becomes
        public evidence of standing, blame, credibility, or rank, or where
        public accountability demands are recoded as improper status claims
        within the private frame. The case material does not show rank-token
        recoding, verdict surface, or stabilized Α; therefore the signature is
        not active as a finding.

    dissatisfaction_cost_signature:
      label: "Dissatisfaction cost marker"
      applicability: "weak"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Α"
        - "Λ"
      raw: >
        DISSATISFACTION = system cost of enforcing equivalence claims in □ under
        real Ω across Θ: permanent comparison, correction, Φ-repair, Α-loop,
        and accumulating Λ.
      case_application: >
        This signature is weak. The abstract case does not mention
        dissatisfaction, permanent comparison, or recurring correction cycles.
        It would become relevant only if the private/public boundary repeatedly
        generates unresolved costs: failed repair, repeated public escalation,
        recurring context collapse, or chronic dispute about what frame should
        govern the material.

    PS_core_signature:
      label: "Pseudo-Symmetry core signature"
      applicability: "risk"
      operators:
        - "□"
        - "Ω"
        - "Σ"
        - "Ψ"
        - "Θ"
        - "Φ"
        - "Λ"
        - "Α"
      raw: >
        PS = □comparison + Ω real with Σ blocked/simulated and Ψ misbound to
        appearance-management; switch availability may emerge while parity
        surface is preserved.
      buffer_note: >
        PS is viable only as bounded temporary buffer where it reopens Σ and Ψ
        under named Ω.
      case_application: >
        PS core is a risk. The case may generate a parity surface between
        confidentiality and public accountability while actual costs remain
        asymmetrical. It becomes problematic if parity appearance replaces
        actual Ω naming, Σ work, or Ψ commitment. It may also function as a
        temporary buffer if the parity surface slows premature verdict and
        reopens integration. The case does not establish persistent PS.

    PFO_regime_signature:
      label: "PFO regime form"
      applicability: "not_applicable"
      paper_internal_label: true
      non_group_label: true
      non_ideology_claim: true
      operators:
        - "□"
        - "Ω"
        - "Φ"
        - "Λ"
        - "Α"
        - "Σ"
        - "Ψ"
        - "Θ"
        - "Χ"
      raw: >
        PFO = □ enforces Ω-illegibility/taboo + comparison metric +
        permanentized exception-switch availability; Φ repair high; Λ kept
        open; Σ suppressed; Ψ displaced/misbound; Α protocol stabilization
        across Θ.
      case_application: >
        This signature is rejected for the current case. The abstract boundary
        erosion case does not show Ω-illegibility as a governing taboo, does
        not show comparison metric governance, does not show permanentized
        exception-switch availability, and does not show Α-protocol
        stabilization. PFO must not be used as group label, ideology claim, or
        regime explanation here.

    reciprocity_loss_signature:
      label: "Reciprocity loss"
      applicability: "risk"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Α"
        - "Σ"
        - "Ψ"
        - "□"
        - "Χ"
      raw: >
        RECIPROCITY_LOSS = Θ-erosion of Σ/Ψ-carried coordination under real Ω
        with chronic Λ and stabilized Α; switch drift forms include unmarked
        asymmetry activation, parity-to-exit, and responsibility-to-authority.
      case_application: >
        Reciprocity loss is a risk. The case may lose reciprocity if neither
        the private repair frame nor the public accountability frame carries
        its own unequal burdens under Ω across Θ. However, chronic Λ and
        stabilized Α are not established, and public accountability may restore
        rather than erode reciprocity where internal repair failed.

    meta_signature_self_control_over_other_control:
      label: "Self-control over other-control"
      applicability: "active"
      operators:
        - "Χ"
        - "Σ"
        - "Ψ"
        - "Ω"
        - "□"
      basis_axes:
        - "D"
      raw: >
        META = self-control: (Ψ ∘ Χ) applied to Ω-handling, including
        marked/bounded/re-bound asymmetry activation and no parity-to-exit or
        responsibility-to-authority, over other-control: Ψ→Other demands with
        □/Φ/Λ/Α substitutes.
      case_application: >
        This meta-signature is active as an application discipline and
        viability criterion. The overlay must prefer self-binding restraint
        under Ω over control of the other frame: private actors must not use
        confidentiality to command silence without repair, and public actors
        must not use accountability to command exposure without context,
        proportionality, or reply capacity. This is not a policy rule; it is a
        structural guardrail.

    counter_proposals:
      note: "Non-prescriptive viability profiles; not action mandates."
      G1_functional_asymmetry_coordination:
        applicability: "active"
        operators:
          - "Ω"
          - "Σ"
          - "Ψ"
          - "Χ"
          - "Θ"
        raw: >
          Ω legible + asymmetry activation marked/bounded/re-bound + Σ active +
          Ψ anchored + Χ present across Θ.
        case_application: >
          G1 is relevant as a viability profile for handling the privacy to
          publicness boundary. Functional asymmetry coordination would require
          naming who bears exposure, who bears accountability, who controls the
          frame, who can answer, and how public or private handling is bounded
          and re-bound into Σ/Ψ across time. This requirement is not fulfilled
          by the abstract case; it identifies what would be needed.
      G2_symmetry_as_reciprocity_binding:
        applicability: "weak"
        operators:
          - "Ψ"
          - "Χ"
          - "Σ"
          - "Ω"
          - "Θ"
        basis_axes:
          - "D"
        raw: >
          Symmetry as reciprocity-binding: Ψ anchored to Σ under named Ω across
          Θ, constrained by D; no parity-to-exit, no responsibility-to-authority,
          no coercive Ψ→Other.
        case_application: >
          G2 is weak but relevant. The case should not seek simple symmetry
          between privacy and publicness. A viable symmetry would be
          reciprocity-binding: each frame carries its own burdens under named
          Ω, with no parity-to-exit and no responsibility-to-authority. The
          case material does not show whether such binding exists.
      G3_frame_recontextualization:
        applicability: "active"
        operators:
          - "Φ"
          - "□"
          - "Ω"
          - "Σ"
          - "Λ"
          - "Θ"
        raw: >
          Φ shifts □ from value-relation back to praxis-relation; Ω becomes
          speakable and coordinate-able; Λ converted into Σ-work across Θ.
        case_application: >
          G3 is strongly relevant because the completed Core case identifies Φ
          as the central operator. The EDEN viability version asks whether the
          public/private recontextualization can move away from value-relation,
          public verdict, or private concealment and back toward praxis-relation:
          named Ω, specified Λ, and Σ-work across Θ. The abstract case does not
          show fulfilment; it only makes this viability path visible.
      G4_adult_reciprocity_non_externalization:
        applicability: "active"
        operators:
          - "Ω"
          - "Θ"
          - "Σ"
          - "Ψ"
          - "Χ"
          - "□"
        basis_axes:
          - "D"
        raw: >
          Ω/Θ cost topology explicit + asymmetry activation marked/re-bound +
          no parity-to-exit + no responsibility-to-authority + Σ active + Ψ
          role-specific self-binding + Χ restraint.
        case_application: >
          G4 is active as a non-prescriptive requirement for adequate
          operationalization. The relevant costs are confidentiality costs,
          accountability costs, exposure costs, repair costs, context-loss
          costs, reply-capacity costs, and irreversibility costs. The case does
          not prove these are carried; it requires that they be made explicit
          before any EDEN overlay could move from risk mapping to scene
          analysis.
  drift_catalogue:
    note: >
      Drift handles are scene-bound structural readings, not diagnoses, person
      labels, moral verdicts, or enforcement licenses. In this case they are
      used only to inspect whether the completed PMS Core reading of boundary
      erosion can be further specified as threshold visibility, frame transfer,
      pseudo-symmetry risk, local switch drift, reciprocity strain, or cost
      externalization. They do not convert the Core analysis into a verdict on
      confidentiality, publicness, accountability, legality, intent, motive, or
      person-level maturity.
    master_trace:
      applicability: "weak"
      handle: >
        EDEN → THRESHOLD → NRK → □comparison → PS →
        ASYMMETRY_SWITCH_AVAILABILITY → PFO/PERMANENTIZED_EXCEPTION →
        PARITY_TO_EXIT or RESPONSIBILITY_TO_AUTHORITY →
        residual_stabilization(Λ/Φ/Α) → DEVALUATION or HUMILIATION →
        RECIPROCITY_LOSS.
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      case_application: >
        The master trace applies weakly and only in segments. The case is not an
        EDEN-to-PFO regime case. It is a boundary-transfer case in which a
        bounded repair or confidential feedback frame becomes available for
        public accountability discourse. The EDEN-relevant stage is mainly the
        threshold and post-threshold region: option visibility, possible chain
        interruption, possible false comparison, pseudo-symmetry risk, local
        asymmetry-switch risk, parity-to-exit risk, responsibility-to-authority
        risk, and reciprocity strain. NRK is weak and unproven, PFO is too
        strong, permanentized exception is not established, and devaluation or
        humiliation remain only residual stabilization risks if publicness or
        confidentiality becomes a standing-control mechanism.

    chapter_6_false_comparison_pivot:
      applicability: "risk"
      handle: "FALSE_COMPARISON"
      operators:
        - "□"
        - "Ω"
        - "Δ"
        - "Λ"
        - "Α"
        - "Θ"
      markers:
        - "ranking or standing language increases in □"
        - "Ω-talk becomes verdict-talk"
        - "Σ-work replaced by accounting or monitoring"
        - "Λ residues persist"
      case_application: >
        False comparison is a risk but not an established finding. The case may
        drift from praxis-relation to value-relation if confidential repair
        material becomes public standing evidence, public blame material,
        reputational proof, or tribunal-like comparison token. It may also
        drift in the opposite direction if public accountability demand is
        re-coded inside the private frame as disloyalty, impropriety, or
        excessive exposure. The abstract material does not show ranking,
        verdict-talk, persistent Λ, or stabilized Α. Therefore the pivot remains
        a discriminative warning: check whether the frame coordinates repair
        and accountability, or instead ranks actors, standing, credibility, or
        legitimacy.

    chapter_7_dissatisfaction_cost_mechanism:
      applicability: "weak"
      handle: "DISSATISFACTION_system_cost"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Α"
        - "Λ"
        - "Φ"
      markers:
        - "continuous comparison"
        - "continuous adjustment"
        - "continuous dissatisfaction"
        - "Φ spikes without Σ interface change"
        - "Λ retained as running balance"
      case_application: >
        Dissatisfaction as system cost is weak and not directly evidenced. The
        case material names boundary erosion, not a recurring dissatisfaction
        loop. The mechanism would become relevant if confidential repair and
        public accountability repeatedly correct one another without changing
        the interface: repeated publicization, repeated internal containment,
        repeated contextual repair, repeated non-response, or repeated dispute
        over which frame governs the material. Without evidence of recurring
        adjustment, chronic Λ, or stabilized Α, dissatisfaction must not be
        inferred as affect, lack, motive, or system cost.

    chapter_8_drift_genesis_weighting:
      applicability: "active"
      handle: "WEIGHTING_no_blame"
      operators:
        - "Ω"
        - "Θ"
        - "□"
        - "Σ"
        - "Ψ"
        - "Χ"
      discipline: "weighting is not moral verdict"
      markers:
        - "sequence or origin sensitivity under Θ"
        - "cost-bearing vs cost-producing separation"
        - "Σ/Ψ carriage vs substitution"
      case_application: >
        Drift-genesis weighting is active as a methodological constraint. The
        overlay must distinguish who produced costs, who bears exposure, who
        can answer, who controls the frame, who holds confidentiality, and who
        carries accountability duties, without converting that weighting into
        blame. The temporal origin matters: material first exists in a bounded
        repair frame, then becomes public or tribunal-facing. But origin does
        not decide legitimacy. Public transfer may be erosion, warranted
        escalation, whistleblowing, legal disclosure, democratic correction, or
        proportional accountability. Confidential containment may be repair,
        suppression, procedural duty, or power protection. Weighting therefore
        remains structural, reversible, and non-tribunal.

    chapter_9_pseudo_symmetry_regime:
      applicability: "risk"
      handle: "PS"
      operators:
        - "□"
        - "Ω"
        - "Σ"
        - "Ψ"
        - "Φ"
        - "Λ"
        - "Α"
        - "Θ"
        - "Χ"
      markers:
        - "Ω-speech punished or tabooed while Ω governs consequences"
        - "parity surface remains while asymmetry activation is selectively available"
        - "closure-by-agreement statements without Σ interface change"
        - "Λ leveraged as unresolved remainder"
        - "Α repeatable scripts"
      case_application: >
        Pseudo-symmetry is a risk, not an active regime finding. A parity
        surface may appear if privacy and publicness are treated as formally
        equivalent options: "keep it confidential" versus "make it public" as
        if both carried equal cost, exposure, reply capacity, and obligation.
        Real Ω may remain unequal: publicness may create reputational exposure
        and context-loss; confidentiality may impose silence, failed repair, or
        blocked accountability. PS would become stronger if the case showed
        parity rhetoric together with selective asymmetry activation and low
        Σ/Ψ. It may also function as a temporary buffer if the parity surface
        slows premature verdict and reopens Σ under named Ω. Persistent PS is
        not established.

    chapter_10_PFO_regime:
      applicability: "not_applicable"
      handle: "PFO"
      paper_internal_label: true
      operators:
        - "□"
        - "Ω"
        - "Φ"
        - "Λ"
        - "Α"
        - "Σ"
        - "Ψ"
        - "Θ"
        - "Χ"
      markers:
        - "explicit coordination talk penalized"
        - "asymmetry activation becomes standing lever under parity surface"
        - "parity-to-exit or responsibility-to-authority displaces responsibility"
        - "Φ dominates as repair substitute"
        - "persistent Λ and Α with low Σ/Ψ"
      case_application: >
        PFO regime reading is too strong and not applicable. The case material
        does not show a regime that suppresses Ω legibility, does not show
        standing exception-switch availability, does not show a comparison
        metric, does not show protocolized Α, and does not show persistent
        substitution of Φ/Λ/Α for Σ/Ψ under Θ. Treating this boundary-eroding
        case as PFO would overreach, risk politicization, and violate the
        requirement that PFO remain a paper-internal regime label rather than a
        group label, ideology claim, or person label. The better EDEN reading is
        local switch-risk without full PFO.

    chapter_11_reciprocity_loss:
      applicability: "risk"
      handle: "RECIPROCITY_LOSS"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Α"
        - "Σ"
        - "Ψ"
        - "□"
        - "Χ"
      markers:
        - "coordination replaced by status regulation"
        - "unmarked asymmetry activation without Σ/Ψ re-binding"
        - "parity-to-exit or responsibility-to-authority"
        - "Ψ shifts to avoidance or appearance"
        - "Σ stays low or blocked"
        - "Θ accumulation erodes channels"
      case_application: >
        Reciprocity loss is a risk, not an outcome. The completed PMS Core case
        already identifies Σ as weak and Ω/Θ as important. EDEN sharpens this:
        reciprocity is not symmetry between privacy and publicness, but
        coordinated asymmetry in which each frame carries its own unequal
        burdens. Loss would appear if confidentiality externalizes
        accountability costs, publicness externalizes exposure and context-loss
        costs, or both frames use parity-to-exit or responsibility-to-authority
        instead of Σ/Ψ coordination. Because chronic Λ and stabilized Α are not
        shown, reciprocity loss cannot be claimed.

    chapter_12_truth_vs_application_gate:
      applicability: "active"
      handle: "TRUTH_vs_APPLICATION"
      operators:
        - "Χ"
        - "Θ"
        - "□"
        - "Δ"
      markers:
        - "description ≠ prescription firewall"
        - "scene-bound, revisable mapping requirement"
        - "no person-labeling"
        - "no coercion license"
      case_application: >
        The truth/application firewall is active and central. EDEN may describe
        threshold visibility, possible false comparison, switch-risk, and
        reciprocity strain, but this description does not prescribe publicness,
        confidentiality, sanction, disclosure, silence, apology, repair,
        deletion, escalation, or adjudication. Application remains valid only
        under Χ, reversibility, and Dignity-in-Practice. No actor, institution,
        group, public, or private party is labeled. No coercive authority is
        derived from EDEN vocabulary.

  pattern_library:
    note: >
      Scene-bound recognition aids; not diagnoses; not enforcement licenses.
      Pattern usefulness depends on whether differentiating force is preserved
      in application. In this case, the patterns are used conservatively because
      the Core case is explicitly not a concrete praxis scene.
    ref: "PMS-EDEN §13"
    pattern_status_clarification:
      status: "open_structural_index"
      statement: >
        The named patterns collected here are not independent ontological
        entities. They are paper-internal composites that bundle recurrent
        operator constellations into portable analytical forms.
      revisability_note: >
        The library does not claim formal completeness and remains revisable
        under counter-scenes, rival framings, and genuine non-capture.
      rival_framing_note: >
        Rival frameworks may describe some patterns through symbolic order,
        recognition struggle, attachment distortion, institutional asymmetry,
        phenomenological alienation, switch-drift, or responsibility
        externalization. PMS-EDEN renders one structural layer especially
        visible without abolishing such readings.
    use_condition_reminder_13_1:
      statement: >
        Descriptive unless explicitly used for binding or prescription; any
        application use is valid only under the §12 gate.
      application_gate: "Χ + reversibility + D"
      ref: "PMS-EDEN §13.1 and §12.2.2"
      case_application: >
        Use remains descriptive. Pattern names such as authority capture,
        denial, moral frame capture, Σ-simulation, or Ψ-externalization are
        not deployed as findings against persons or institutions. They are
        used as inspection handles for a case-type-bound boundary transfer.
        Any prescriptive or binding use would require a concrete scene,
        external accountability, role-specific evidence, and renewed validity
        gating.
    pattern_index_13_2:
      statement: >
        Index of drift patterns; each pattern is recorded with C5 triad:
        Trigger / Stabilizer / Failure.
      framing_note: >
        These are the core EDEN patterns reconstructed in this paper. They
        organize the field as analyzed here and remain paper-internal.
      record_schema_C5:
        - "Trigger configuration"
        - "Primary stabilizer"
        - "Primary failure"
      ref: "PMS-EDEN §13.2"
    C5_record_schema:
      - "Trigger configuration"
      - "Primary stabilizer"
      - "Primary failure"

    patterns:
      P_Omega_AC:
        code: "P-Ω-AC"
        name: "Ω → Covert Authority / Authority Capture"
        applicability: "risk"
        basis_operators:
          - "Ω"
          - "□"
          - "Α"
          - "Σ"
          - "Ψ"
          - "Λ"
          - "Χ"
          - "Θ"
        operator_signature_readable: >
          Ω↑ + □ to value-relation + Σ low/blocked + Ψ displaced + Λ support
          + Α indirect-steering script under Θ.
        C5:
          trigger_configuration: "Ω high/legible + □ drifts into value-relation while Σ does not form."
          primary_stabilizer: "Α protocolization of indirect steering, often supported by Λ residues."
          primary_failure: "Σ low/blocked and Ψ displaced or misbound."
        case_application: >
          Authority capture is a risk only. It would appear if responsibility
          for confidentiality, repair, accountability, protection, or exposure
          becomes unilateral authority over the frame: deciding who may speak,
          which audience may hear, what evidence counts, and which burdens are
          carried. The abstract case does not show covert authority or Α
          protocolization. Both private containment and public accountability
          could theoretically become authority-capturing, so the pattern must
          remain bidirectional and non-accusatory.

      P_Lambda_DN:
        code: "P-Λ-DN"
        name: "Λ → Denial / Suppression"
        applicability: "risk"
        basis_operators:
          - "Λ"
          - "□"
          - "Φ"
          - "Α"
          - "Σ"
          - "Ψ"
          - "Θ"
          - "Χ"
        operator_signature_readable: >
          Λ present + □ demands closure without repair + Φ reframe + Α
          avoidance script; Σ/Ψ do not convert Λ into repair under Θ.
        C5:
          trigger_configuration: "Λ present + □ demands closure while Σ repair conversion does not occur."
          primary_stabilizer: "Α avoidance default supported by Φ narrative repairs."
          primary_failure: "Σ low/absent and Ψ not bound to explicit repair commitments."
        case_application: >
          Denial or suppression of Λ is a risk. The case may involve an absent
          internal repair, absent answer, absent confidentiality protection, or
          absent accountability step. Suppression would appear if either frame
          demands closure without converting the remainder into Σ-work:
          confidentiality suppresses public answerability, or publicness
          suppresses repair context and reply capacity. The case material does
          not identify the active non-event, so the pattern remains conditional.

      P_Sigma_TOT:
        code: "P-Σ-TOT"
        name: "Σ → Totalization / Dogma / Closure"
        applicability: "risk"
        basis_operators:
          - "Σ"
          - "Ψ"
          - "Χ"
          - "Ω"
          - "□"
          - "Δ"
          - "Λ"
          - "Α"
          - "Θ"
        basis_axes:
          - "D"
        operator_signature_readable: >
          Closure demand under Δ/Λ pressure + Σ invoked as closure-weapon + Χ
          suppressed + D violated + Ψ binds irreversibly + Α final-answer script.
        C5:
          trigger_configuration: "Δ/Λ pressure meets closure demand inside □."
          primary_stabilizer: "Ψ irreversible enforcement, stabilized by Α final-answer scripts."
          primary_failure: "Χ suppressed and D violated."
        case_application: >
          Totalization is a risk of the analysis itself and of either frame.
          PMS or EDEN would totalize if they declare that publicness is
          necessarily erosion or that confidentiality is necessarily
          suppression. The public frame could totalize by converting material
          into final standing judgment; the private frame could totalize by
          converting confidentiality into final closure. The overlay prevents
          this by maintaining Χ, reversibility, D, rival readings, and
          falsifier conditions.

      P_Psi_EXT:
        code: "P-Ψ-EXT"
        name: "Ψ → Externalization"
        applicability: "risk"
        basis_operators:
          - "Ψ"
          - "Χ"
          - "Σ"
          - "Ω"
          - "□"
          - "Λ"
          - "Α"
          - "Θ"
        basis_axes:
          - "D"
        operator_signature_readable: >
          Θ pressure + Λ residue + Ω salient → Ψ externalized as Ψ→Other via
          □; Χ bypassed; Σ replaced by compliance; Α stabilizes demand cycles.
        C5:
          trigger_configuration: "Θ pressure + Λ residue + salient Ω with coordination strain."
          primary_stabilizer: "Α demand/compliance loops through □."
          primary_failure: "Ψ→Self absent; Ψ→Other dominates; Χ bypassed; Σ replaced by compliance."
        case_application: >
          Ψ-externalization is a risk. Confidentiality may become a demand that
          others remain silent without self-binding to repair or accountability.
          Public accountability may become a demand that others accept exposure
          without self-binding to context, proportionality, or right of reply.
          The case does not show demand/compliance loops, so the pattern is not
          active. It remains a calibration test for whether responsibility is
          carried as Ψ→Self or exported as Ψ→Other.

      P_Frame_MOR:
        code: "P-□-MOR"
        name: "□ → Moral Frame Capture"
        applicability: "risk"
        basis_operators:
          - "□"
          - "Ω"
          - "Λ"
          - "Α"
          - "Σ"
          - "Ψ"
          - "Δ"
          - "Θ"
          - "Χ"
          - "Φ"
        basis_axes:
          - "D"
        operator_signature_readable: >
          Ω strain + Λ residue → □ tribunal/value-relation + Α verdict script
          + Λ insinuation + Σ displaced into adjudication + Ψ binds to
          purity/identity rather than reversible coordination.
        C5:
          trigger_configuration: "Ω strain across Θ with Λ residues; □ shifts into tribunal/value-relation."
          primary_stabilizer: "Α verdict scripting and standing control."
          primary_failure: "Σ displaced into adjudication and Ψ binds to identity/purity narratives."
        case_application: >
          Moral frame capture is a salient risk because the Core case already
          contrasts confidential repair with public accountability or
          tribunal-like discourse. The risk is not publicness itself; the risk
          is a frame shift in which repair and accountability are displaced by
          public verdict, insinuation, purity, standing control, or irreversible
          identity claims. Since the case is abstract, moral capture remains a
          warning rather than a finding.

      P_Sigma_SIM:
        code: "P-Σ-SIM"
        name: "Σ-Simulation instead of Integration"
        applicability: "risk"
        basis_operators:
          - "Σ"
          - "Φ"
          - "Α"
          - "□"
          - "Λ"
          - "Ψ"
          - "Θ"
          - "Χ"
        operator_signature_readable: >
          Incentive for coherence-display + Λ persists → Σ simulated in
          discourse; Φ reframes; Α stabilizes performance script; Ψ binds to
          image-management; Σ not enacted under Θ.
        C5:
          trigger_configuration: "High incentive for coherence display inside □ while Λ persists and conflict costs rise under Θ."
          primary_stabilizer: "Α performance/protocol scripts supported by Φ."
          primary_failure: "Σ not enacted as interface consolidation; Ψ binds to appearance-management."
        case_application: >
          Σ-simulation is a risk where the case is rhetorically resolved
          without actually coordinating confidentiality, repair,
          accountability, exposure, context, reply capacity, and proportionality.
          The private frame may simulate integration by claiming that internal
          resolution suffices. The public frame may simulate integration by
          claiming that exposure itself equals accountability. The abstract
          material does not establish simulation, but the Core case's weak Σ
          makes this a relevant EDEN inspection handle.

    meta_signature_13_9:
      applicability: "active"
      label: "Self-control over other-control"
      operator_signature_readable: >
        Prefer Ψ→Self + Χ + D constraints on Ω-handling to enable Σ under
        named Ω inside □; where switch drift is present, asymmetry activation
        must be marked, bounded, and re-bound, parity must not become exit, and
        responsibility must not become authority.
      operators:
        - "Ψ"
        - "Χ"
        - "Σ"
        - "Ω"
        - "□"
        - "Θ"
      basis_axes:
        - "D"
      case_application: >
        Self-control over other-control is preserved as the main overlay
        discipline. The analysis does not instruct one side to control the
        other. It asks each frame to carry its own burdens: confidentiality
        must carry repair and answerability costs; public accountability must
        carry context, proportionality, exposure, and reply-capacity costs.
        This remains descriptive and non-prescriptive.

    chapter_closure_13_10:
      structural_result: >
        The pattern library makes recurring EDEN drift configurations portable
        without turning them into diagnoses, moral verdicts, person labels, or
        enforcement categories.
      cost_distribution: >
        Each pattern should be read through trigger, stabilizer, and failure
        distribution rather than as a trait or motive attribution.
      rational_response_envelope: >
        The rational response envelope is descriptive only: mark the pattern,
        preserve Χ + reversibility + D, and avoid converting pattern
        recognition into coercive action.
      reader_guard: >
        Pattern naming is useful only while it preserves scene-bound
        differentiating force and does not replace the concrete case.
      ref: "PMS-EDEN §13.10"
      case_application: >
        The closure guard is especially important because the case is abstract.
        Pattern names must not replace the missing concrete scene. They help
        preserve differentiating force by asking what would need to be true for
        authority capture, denial, moral capture, Σ-simulation,
        Ψ-externalization, pseudo-symmetry, or reciprocity loss to be active.
        None of these names authorizes a verdict or action.

  viability:
    note: >
      Viability means cost-bearing coordination under Ω across Θ. It is
      structural, non-moral, and internal to PMS criteria as used in the
      EDEN paper.
    viability_status: "under_specified"
    core_viability_question: >
      Does the configuration re-internalize unequal Ω/Θ costs through Σ/Ψ/Χ, or
      does it externalize them through parity, switch drift, PFO, devaluation,
      humiliation, or responsibility-to-authority?
    closure_refs:
      chapter_1_3:
        ref: "PMS-EDEN §1.3"
        viability_readout: >
          The initial problem is viable only where description remains
          structural and does not become moral verdict, psychology, or
          prescription.
        case_application: >
          The case remains viable as EDEN overlay only because it is held as
          structural description: frame transfer, threshold visibility, Ω/Θ
          cost geometry, and Σ/Ψ risk. It does not become a moral account of
          privacy, publicness, betrayal, exposure, or accountability.
      chapter_2_4:
        ref: "PMS-EDEN §2.4"
        viability_readout: >
          Eden ground-state reading is viable only where A-availability and
          praxis configuration are kept separate from metaphysical or
          theological proof claims.
        case_application: >
          Eden ground-state is only analogical here. The bounded internal repair
          frame may claim a protected non-public praxis space, but the case is
          not theological, metaphysical, or Edenic in literal content. It is
          not proof of ground state and does not establish non-deficit praxis.
      chapter_3_5:
        ref: "PMS-EDEN §3.5"
        viability_readout: >
          Breach yields consequence legibility but no epistemic surplus.
        case_application: >
          If publicization or containment interrupts an expected chain, the
          interruption may make consequences legible under Ω/Θ/Λ, but it does
          not create epistemic surplus. Publicness does not automatically reveal
          truth, and confidentiality does not automatically preserve truth.
      chapter_4_4:
        ref: "PMS-EDEN §4.4"
        viability_readout: >
          Fig-leaf-like legibility management is viable as structural reading
          only where shielding, exposure, Λ, Ω, and Χ are distinguished from
          psychology or shame diagnosis.
        case_application: >
          Legibility management is a risk only. Confidentiality may shield
          without repair, and publicness may expose without context, but neither
          shielding nor exposure-management is established. No psychology,
          shame diagnosis, or motive is inferred.
      chapter_5_5:
        ref: "PMS-EDEN §5.5"
        viability_readout: >
          NRK is viable only where realization is not confused with Action_E and
          where Σ/Ψ failure, absence, displacement, or simulation is explicit.
        case_application: >
          NRK is weak because the case does not show realization under ∇ with
          Σ not carrying and Ψ absent, displaced, or simulated. Action_E remains
          under-specified, exactly as in the completed Core case.
      chapter_6_4:
        ref: "PMS-EDEN §6.4"
        viability_readout: >
          False comparison reading is viable only where □ shifts from
          praxis-relation to value-relation under real Ω and unresolved Λ.
        case_application: >
          False comparison is viable only as a risk. The public frame may
          become value-relation or tribunal discourse, but the abstract case
          does not prove this shift. The private frame may also become
          value-protective or status-protective, but this too is not proven.
      chapter_7_3:
        ref: "PMS-EDEN §7.3"
        viability_readout: >
          Dissatisfaction is viable as system-cost marker where maintaining
          false equivalence produces recurring comparison, adjustment, Λ, and
          Α-load across Θ.
        case_application: >
          Dissatisfaction is not established. The case lacks recurrence,
          adjustment cycles, chronic Λ, and Α-load. This viability readout
          remains inactive except as an operationalization requirement.
      chapter_8_4:
        ref: "PMS-EDEN §8.4"
        viability_readout: >
          Drift genesis weighting is viable only as structural weighting, not
          blame assignment or moral origin claim.
        case_application: >
          Drift genesis weighting is active: timing, exposure, frame control,
          and cost-bearing must be specified without assigning blame. The
          analysis does not decide who caused erosion or who is at fault.
      chapter_9_7:
        ref: "PMS-EDEN §9.7"
        viability_readout: >
          PS is viable only as bounded reversible buffer that reopens Σ and Ψ
          under named Ω. As persistent substitution it yields Σ/Ψ failure under
          Ω.
        case_application: >
          PS is viable only as a risk or possible temporary buffer. It would be
          acceptable as a pause or symmetry surface only if it reopens Ω naming,
          Σ coordination, and Ψ commitments. It would become drift if parity
          appearance replaces these.
      chapter_10_9:
        ref: "PMS-EDEN §10.9"
        viability_readout: >
          PFO stabilizes drift by suppressing Ω legibility and substituting
          Φ/Λ/Α for Σ/Ψ under Θ.
        case_application: >
          PFO is not viable as a case reading. The evidence threshold is not
          met. No regime, taboo, standing switch, or protocol stabilization is
          shown.
      chapter_11_5:
        ref: "PMS-EDEN §11.5"
        viability_readout: >
          Reciprocity loss marks Σ/Ψ erosion under real Ω across Θ with chronic
          Λ and stabilized Α.
        case_application: >
          Reciprocity loss is a risk only. The case lacks chronic Λ and
          stabilized Α. It remains possible that public accountability restores
          reciprocity if internal repair failed, or that confidentiality
          preserves reciprocity if publicness would be disproportionate.
      chapter_12_5:
        ref: "PMS-EDEN §12.5"
        viability_readout: >
          Description remains possible without Χ; application is PMS-valid only
          under Χ + reversibility + D.
        case_application: >
          Application is valid because Χ, reversibility, and D are explicitly
          maintained. Without them, EDEN labels would risk becoming verdicts,
          person labels, or coercive handles.
    paper_cost_marker_16_25:
      ref: "PMS-EDEN §16.25"
      handle: >
        Recurrent pattern where integration/binding work is displaced: Σ
        low/simulated, Ψ→Other externalized or Ψ misbound, Ω-legibility
        suppressed or Ω activated without re-binding, parity-to-exit or
        responsibility-to-authority present, Λ retained, Α protocolized, and
        costs accumulate under Θ.
      case_application: >
        The full structural drift cost marker is not established. Only a
        partial risk is visible: Σ is weak, Ω/Θ are relevant, Φ is central, and
        Ψ is conditional. There is no evidence that Ψ→Other is externalized,
        Ω-legibility is suppressed, parity-to-exit or
        responsibility-to-authority is active, Λ is chronic, Α is protocolized,
        or costs accumulate recurrently. The marker should remain an
        operationalization checklist, not a finding.

  eden_map:
    note: >
      EDEN-MAP is a scene-bound mapping protocol, not diagnostic. It respects
      the validity gate and remains cartographic, revisable, and open to rival
      framings.
    cartographic_status:
      statement: >
        EDEN-MAP is not a closed ontology of relational breakdown. It compresses
        PMS-EDEN patterns for portability, comparability, and auditability.
      openness_note: >
        EDEN-MAP remains open to rival framings, counter-scenes, partial
        applicability, and genuine non-capture.
      compression_risk_note: >
        The more portable the map becomes, the greater the risk that
        compression is mistaken for structural completeness.
      case_application: >
        EDEN-MAP is used only as a mapping aid. Compression risk is high because
        the case is abstract and the completed Core case is not a concrete
        scene. The map therefore records under-specification explicitly:
        missing actors, chronology, duties, consent, audience, evidence,
        repair attempts, legal frame, and institutional role structure. It does
        not convert the case into a diagnostic map, governance tool, or final
        account.

    purpose_and_validity_window_15_1:
      purpose:
        - "compress EDEN drift structure for portable scene-bound mapping"
        - "make Ω/Θ/Λ/Α/Σ/Ψ cost geometry inspectable"
        - "separate structural description from diagnosis, moral verdict, or prescription"
        - "support auditability and comparison without claiming completeness"
      validity_window:
        applies_when:
          - "scene-bound role/frame/non-event/binding data are available"
          - "Ω, Θ, Λ, Σ, Ψ, and Χ can be meaningfully checked"
          - "the application gate Χ + reversibility + D is preserved"
        weakens_when:
          - "case material lacks scene or role structure"
          - "comparison-dominant frame is absent or weak"
          - "Ω is minimal or not action-relevant"
          - "rival framing preserves more decisive distinctions"
      case_application: >
        The purpose is to make visible the cost geometry of moving bounded
        repair material into publicness. The validity window is narrow because
        scene-bound data are absent. Ω and Θ are conceptually checkable, but
        Λ, Α, Σ, and Ψ cannot be fully established. Χ, reversibility, and D are
        preserved. Therefore EDEN-MAP is valid as a provisional overlay map,
        not as a completed scene analysis.

    scene_packet:
      status: "partial"
      SceneID:
        theta_window: >
          Under-specified temporal transfer from confidential feedback or
          internal-resolution context to public accountability discourse or
          tribunal-like publicness. The window is conceptually clear but
          empirically incomplete: no dates, sequence, prior repair attempts,
          disclosure moment, delay structure, or accumulation of consequences
          are supplied.
        frame_anchor: >
          □internal_repair_or_confidential_feedback to
          □public_accountability_or_tribunal_discourse. The anchor is
          sufficient for EDEN-MAP overlay use because the case explicitly names
          the privacy-to-publicness transfer, but it is not sufficient for
          deciding whether the transfer is erosion, correction, disclosure,
          whistleblowing, public learning, legal necessity, or tribunalization.
        roles: >
          Role-positions only: material-originating bounded repair position,
          possible institution or process-holder, possible publicizing
          position, possible exposed position, possible harmed or silenced
          position, possible accountability audience, possible public
          interpretation field, and possible procedural or legal frame-holder.
          These are not persons, groups, identities, motives, traits, or
          diagnoses.
      Trigger:
        delta: >
          confidential/public, internal/external, repair/accountability,
          bounded/open, original-use/secondary-use, process/audience,
          contextualized/decontextualized, and repair-material/public-evidence.
        nabla: >
          Structural pressure between containment, repair, disclosure,
          accountability, exposure, public answerability, and procedural
          restraint. No motive, affect, retaliation, courage, fear, strategy,
          or moral intention is inferred.
      Lambda_candidates:
        - "expected internal repair not completed"
        - "expected confidentiality not preserved"
        - "expected accountability not provided"
        - "expected response or closure absent"
        - "expected proportionality, context, or reply capacity missing"
        - "expected consent, anonymization, or boundary clarification absent"
        - "expected public-interest threshold not specified"
      Realizations:
        observed: >
          Only the abstract case-type is observed: material made for, or
          associated with, a bounded repair frame becomes available within a
          public/accountability-facing frame. No concrete act of disclosure,
          quotation, publication, accusation, anonymization, refusal, or
          institutional escalation is evidenced.
        omissions: >
          No concrete actor, chronology, consent record, confidentiality terms,
          legal duties, repair steps, audience scale, harm context, reply
          sequence, anonymization status, institutional process, or public
          framing procedure is supplied.
        escalations: >
          Possible escalation from internal handling to publicness is
          conceptually available, but not empirically established. The same
          movement may be escalation, protection, necessary disclosure,
          democratic accountability, procedural correction, or boundary erosion
          depending on the missing scene data.
      Echeck:
        E_present: "not_applicable"
        Sigma_carrier: "partial"
        notes: >
          Action_E is not established because E requires Σ, Θ, and ∇. The case
          contains temporal drift and structural pressure but no concrete
          integrated enactment. Σ is a risk question, not a carrier shown in
          evidence. EDEN must not treat breach-like realization, disclosure,
          refusal, containment, escalation, or publicization as Action_E unless
          integrated directedness across Θ is actually shown.
      Alpha_stabilizers:
        - "no repeatable script established"
        - "possible but unproven script of converting internal repair material into public pressure"
        - "possible but unproven script of using confidentiality to avoid accountability"
        - "possible but unproven script of treating public accountability as tribunal verdict"
        - "possible but unproven script of using publicness to bypass proportionality, context, or reply capacity"
        - "possible but unproven script of using internal process language to close unresolved Λ"
      Omega_real:
        capacity: >
          Under-specified; possible unequal capacity to frame, disclose,
          contextualize, respond, repair, answer publicly, absorb reputational
          cost, preserve confidentiality, or invoke institutional procedure.
        exposure: >
          Salient but under-specified; publicness can increase reputational,
          contextual, interpretive, and audience exposure, while confidentiality
          can conceal harms, silence accountability, or protect bounded repair.
        obligation: >
          Under-specified; possible duties of confidentiality, repair,
          accountability, public-interest disclosure, proportionality,
          non-retaliation, non-humiliation, contextualization, and right of
          reply.
        leverage: >
          Under-specified; leverage may lie with the holder of confidentiality,
          the publicizing actor, the institution, the exposed party, the harmed
          party, the audience, or the procedural/legal frame. EDEN must not
          assume the direction of leverage from publicness or privacy alone.
      Psi_map:
        declared: >
          Not supplied; possible declared commitments include confidentiality,
          internal resolution, public accountability, repair, transparency,
          non-retaliation, restraint, consent, anonymization, procedural
          fairness, or protection from ongoing harm.
        enacted: >
          Not supplied; no evidence shows commitments carried across Θ through
          actual repair, contextualized disclosure, bounded publicness,
          proportionate response, or maintained right of reply.
        enforced: >
          Not supplied; no enforcement, maintenance, appeal, correction,
          accountability, or re-binding mechanism is specified.
        externalized: >
          Risk only; possible Ψ→Other demand for silence, exposure, trust,
          acceptance of public framing, acceptance of confidentiality, or
          acceptance of procedural closure, but no such externalization is
          established.
      SwitchDrift:
        asymmetry_activation: >
          Unclear. Either privacy or publicness may activate asymmetry under
          pressure, but the case does not show whether activation is marked,
          bounded, justified, proportionate, or re-bound into Σ/Ψ.
        parity_to_exit: >
          Unclear. Parity language may be used to exit responsibility in either
          direction, but no such exit is evidenced.
        responsibility_to_authority: >
          Unclear. Responsibility for repair, confidentiality, protection, or
          accountability may become authority over the frame, but the case does
          not show such conversion.
        re_binding: >
          Partial as an application requirement only. EDEN can state that any
          asymmetry activation would need to be marked, bounded, and re-bound
          into Σ/Ψ, but it cannot claim that this occurred.

    core_questions_required:
      Q1_frame:
        operator: "□"
        status: "answered"
        output: >
          The dominant frame is hybrid and contested: confidential feedback or
          internal resolution on one side, public accountability discourse or
          tribunal-like publicness on the other. The EDEN risk appears if the
          public frame becomes comparison/value-relation or if the private frame
          becomes closure/suppression rather than praxis-coordination.
      Q2_asymmetry:
        operator: "Ω"
        status: "partial"
        output: >
          Real asymmetry is plausible in exposure, capacity, obligation, and
          leverage, but not scene-established. Publicness can intensify
          exposure and reputational cost; confidentiality can intensify silence
          and blocked accountability. Ω is legible as a structural concern, but
          whether it is coordinated or selectively activated remains unknown.
      Q3_non_event:
        operator: "Λ"
        status: "partial"
        output: >
          Λ candidates include failed repair, breached confidentiality, absent
          accountability, absent response, absent context, or absent reply
          capacity. The active non-event cannot be selected without concrete
          scene evidence.
      Q4_distance:
        operator: "Χ"
        status: "answered"
        output: >
          Distance is preserved by the analysis. Case-level distance is unknown.
          Χ would be missing if either frame fuses into verdict, concealment,
          exposure urgency, coercive silence, or irreversible status judgment.
          Χ would be restored by contextual, reversible, non-ranking handling
          of the frame transfer.
      Q5_integration:
        operator: "Σ"
        status: "partial"
        output: >
          Σ is weak and risk-bearing. Minimal Σ would coordinate repair,
          confidentiality, accountability, public interest, exposure, context,
          proportionality, and reply capacity without forcing closure,
          suppressing accountability, or humiliating exposed parties.
      Q6_self_binding:
        operator: "Ψ"
        status: "partial"
        output: >
          Ψ→Self would mean role-specific self-binding: confidentiality carries
          repair and answerability burdens, while public accountability carries
          restraint, context, proportionality, and reply obligations. Ψ→Other
          would appear as demands for silence or exposure without self-carried
          costs. The case does not establish either.
      Q7_switch_drift:
        status: "partial"
        output: >
          Asymmetry activation is unclear. Switch drift would appear if privacy
          or publicness invokes asymmetry selectively without marking, bounding,
          and re-binding it into Σ/Ψ. Parity-to-exit and
          responsibility-to-authority remain risks, not findings.

    synthesis_output_one_page:
      Drift_formula: >
        □hybrid_internal_repair_to_public_accountability →
        Λcandidate_repair_confidentiality_accountability_or_reply_non_event →
        Αnot_established →
        Ωexposure_obligation_reply_capacity_and_frame_control_risk →
        Σweak_or_under_specified →
        Ψconditional_and_unproven
      Alpha_primary: >
        No primary attractor is established. Possible stabilizers include
        repeated boundary transfer, repeated confidentiality-as-closure,
        repeated publicness-as-verdict, or repeated context repair without
        interface change, but none is evidenced.
      Costs:
        A: "high option-visibility load: the bounded material becomes selectable under a public frame across Θ/□/Δ"
        C: "under-specified coherence: possible volatility between repair, confidentiality, accountability, and tribunal framing under Θ/Λ/□/∇"
        R: "conditional responsibility clarity: commitments under Ψ/Φ/Θ/Ω are not supplied and may be outsourced to either privacy or publicness rhetoric"
        E: "integrated enactment not established; Action_E remains under-specified because Σ is not shown to carry"
        D: "Dignity-in-Practice load is high: handling exposure, asymmetry, and publicness without humiliation, ranking, or concealment"
      LowestCostCorrection:
        note: "Descriptive viability signature only; not a prescription."
        Chi_step: "restore reversible distance by holding confidentiality and public accountability as competing frames without converting either into default verdict"
        Lambda_to_Sigma_step: "specify one concrete non-event and convert it into one interface question: repair, accountability, context, consent, or reply capacity"
        switch_step: "mark which asymmetry is being activated, bound its use, and re-bind it into Σ/Ψ; block parity-to-exit and responsibility-to-authority"
        Psi_shift: "move from demanding silence or exposure from the other to role-specific self-binding under the actor's own obligations, preserving reversibility and D"

    diagnostics_to_action_firewall:
      allowed:
        - "scene-bound structural mapping"
        - "role/frame/non-event/binding mapping"
        - "drift-risk and cost geometry"
        - "reversible dignity-preserving viability signatures"
        - "scene-bound switch-drift handles"
      not_allowed:
        - "global person labels"
        - "inferred inner traits or clinical categories"
        - "coercive prescriptions justified by PMS vocabulary"
        - "Ψ→Other under suppressed Χ"
        - "converting responsibility into authority over another role-position"
      case_application: >
        The action firewall is preserved by refusing to derive a recommendation
        to disclose, conceal, punish, repair, apologize, adjudicate, delete, or
        enforce. EDEN labels are not used as action triggers. They are only
        structural prompts for what would need to be specified in a concrete
        scene.

    meta_notes_operational_constraints_15_6:
      constraints:
        clarity_not_humiliation:
          statement: >
            Operator naming can be precise without degrading standing. D remains
            an application constraint.
          case_application: >
            The overlay names frame transfer, switch-risk, and reciprocity
            strain without lowering the standing of any actor, institution,
            audience, or frame. Humiliation remains a risk handle only.
        naming_not_moralizing:
          statement: >
            Ω, Λ, and □ can be specified functionally without verdict logic.
          case_application: >
            Ω is named as exposure, obligation, leverage, capacity, and reply
            gradients; Λ is named as possible failed repair, confidentiality,
            accountability, or response; □ is named as repair/accountability
            framing. None is treated as wrongdoing by itself.
        switch_naming_not_person_verdict:
          statement: >
            Asymmetry activation, parity-to-exit, and
            responsibility-to-authority are scene-bound drift handles, not
            diagnoses, motives, or person defects.
          case_application: >
            Switch naming remains attached to frame behavior and cost geometry.
            It is not attached to a person, group, motive, ideology, or
            character trait.
        responsibility_not_authority:
          statement: >
            Additional Ψ/Χ burden under asymmetry does not authorize control,
            frame ownership, or protection-by-command.
          case_application: >
            Responsibility for repair, confidentiality, public accountability,
            or exposure management does not authorize unilateral control over
            silence, publicness, context, reply, or judgment.
        firmness_not_dignity_break:
          statement: >
            Boundaries can be enacted with Χ and reversibility; hardness becomes
            dignity-violating only when D is suspended.
          case_application: >
            A firm confidentiality boundary or a firm public accountability
            demand is not automatically dignity-breaking. D is at risk only if
            the boundary or demand becomes humiliating, ranking, coercive,
            irreversible, or suppressive of legitimate rival framing.

  glossary_alignment:
    note: "Glossary entries are stable handles only; full definitions remain in the paper."
    Awareness_A:
      handle: "16.1_A"
      relevance: "active"
      definition: "A = [Θ, □, Δ]; structural availability of sustained, framed differentiation across time."
      case_application: >
