  primary_formula: "Χ ∘ Φ ∘ Θ? ∘ Ω? ∘ Α? ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model_with_weak_later_dependencies"
  compressed_reading: >
    Legitimacy without recognized authority is PMS-readable as framed
    moral-practical tension around a structured absence, with conceptual
    recontextualization and required reflective distance. Pattern, asymmetry,
    and temporality are included only as weak or conditional dependencies, not as
