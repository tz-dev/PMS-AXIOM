analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary: []
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The case permits structural PMS projection and dependency hygiene, but it
      does not permit empirical finding, concrete scene adjudication, legal or
      forensic judgment, diagnosis, implementation claim, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The case is abstract and strongly fits several PMS terms, especially Δ, □,
      Λ, Φ, and Χ. That fit may make the reading too smooth, over-assimilative,
      or under-discriminating if PMS coherence is mistaken for legitimacy, truth,
      or explanatory sufficiency.
    mitigation: >
      The reading is constrained by weak downstream operators, explicit
      non-capture zones, rival readings, falsifier conditions, and the rule that
      disagreement, resistance, rupture, absence, or non-fit is not automatically
      PMS drift or failed integration.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural distinction between legitimacy and authority, the
      frame-dependence of recognition, the structured absence of authority,
      possible asymmetry, recontextualization pressure, and the need for
      reflective distance. This coverage is strongest at the level of Δ, ∇, □,
      Λ, Φ, and Χ, and weakest where recurrence, temporality, integration, or
      self-binding would be required.
    discrimination_requirement: >
      The reading must distinguish legitimacy without authority from legal
      invalidity, moral illegitimacy, anti-authoritarian legitimacy, mere
      disagreement, institutional vacuum, coercive pseudo-legitimacy, charismatic
      substitution, procedural failure, non-recognition, and non-capture. It must
      also distinguish absence of recognized authority from absence of
      legitimacy, because the former may be structurally relevant without being
      normatively decisive.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish legitimacy without recognized authority from legal validity or invalidity under an actual authority."
      expected_pms_distinction: >
        Δ and □ must separate legitimacy, authority, recognition frame, and
        legal-forensic standing; Λ must be frame-relative rather than treated as
        automatic illegitimacy. The test fails if authority absence is treated as
        dispositive without specifying the frame in which authority was expected.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish rival framing, disagreement, and non-fit from PMS drift, failed integration, or maturity failure."
      expected_pms_distinction: >
        Φ, Σ, Χ, and the non-capture rule must preserve rival readings without
        absorbing every rupture into recontextualization or under-integration.
        The test fails if PMS smoothness replaces actual discrimination among
        rival legitimacy grammars.
      current_status: "partially_satisfied"
    - id: "DT3"
      test: "Distinguish conceptual PMS readability from concrete scene adequacy."
      expected_pms_distinction: >
        A structurally coherent PMS projection must remain weaker than concrete
        scene analysis. The test fails if the abstract case is treated as if it
        already supplied actors, chronology, asymmetry direction, evidence, legal
        setting, institutional role, or practical consequence.
      current_status: "satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinction is structurally doing work: legitimacy versus authority, recognized versus absent authority, claim versus grant, or grant versus contestation?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What directional moral-practical tension follows from those distinctions without inferring psychological motive?"
      current_calibration: "satisfied"
    - operator: "□"
      question: "Which frame makes authority recognition relevant, optional, absent, contested, or unnecessary?"
      current_calibration: "partial"
    - operator: "Λ"
      question: "Within which frame is absent recognized authority a meaningful non-event rather than a neutral feature?"
      current_calibration: "partial"
    - operator: "Α"
      question: "What recurrence, stabilization, path-dependence, or role-script would show that legitimacy without authority has become a pattern?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "What directional imbalance of power, exposure, capacity, vulnerability, recognition, or obligation is present, and for whom?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "What sequence, persistence, delay, escalation, recognition, erosion, or development is actually supplied?"
      current_calibration: "weak"
    - operator: "Φ"
      question: "What source frame and target frame are involved when legitimacy is recontextualized apart from recognized authority?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "How is reflective distance maintained so that PMS analysis does not become verdict, enforcement, or closure?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "What synthesis of rival frames occurs without forced coherence or erasure of disagreement?"
      current_calibration: "weak"
    - operator: "Ψ"
      question: "Who or what binds itself over time to an integrated legitimacy structure under reflective distance?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "The normative truth of legitimacy may exceed PMS structural readability."
      - "Legal validity, jurisdiction, and recognized authority may require legal-political analysis outside PMS."
      - "Moral difficulty may involve tragedy, rupture, or principled refusal not captured by operator integration."
      - "A frame that rejects recognized authority as a condition of legitimacy may not treat authority absence as a PMS-relevant deficit."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Normative reading: legitimacy depends on moral justification rather than recognized authority."
      - "Recognition reading: legitimacy arises from being granted by relevant participants even without formal authority."
      - "Legal-political reading: legality, jurisdiction, authority, and legitimacy require separate doctrinal or institutional analysis."
      - "Anti-authoritarian reading: legitimacy without authority is not a problem but the central positive structure."
      - "Non-capture reading: legitimacy may not reduce to a praxis-operator grammar."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if later material showed
        that recognized authority is present, dispositive, and not structurally
        absent in the operative frame.
    - id: "F2"
      condition: >
        The PMS reading would be under-discriminating if it could not distinguish
        principled non-authority legitimacy from legal invalidity, coercive
        pseudo-legitimacy, mere disagreement, or frame conflict.
    - id: "F3"
      condition: >
        The PMS reading would be over-assimilative if it converted all
        resistance, rupture, rival framing, or unresolved absence into drift,
        failed integration, incomplete calibration, or PMS maturity failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The projection is usable as a reversible PMS case application because it
      preserves operator dependencies, weakens unsupported downstream claims,
      keeps non-capture open, and avoids empirical, metaphysical, diagnostic,
      legal, implementation, and PMS-validating claims.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical, or
    applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Operational use would need observable distinctions among legitimacy, authority, recognition, claim, grant, contestation, and legal validity in a specified scene."
      "∇": "Operational use would need evidence of directional pressure such as demand, refusal, justification, compliance, resistance, or contestation, without inferring inner motive by default."
      "□": "Operational use would need explicit identification of moral, legal, institutional, communal, theological, or philosophical frames and their boundary conditions."
      "Λ": "Operational use would need evidence that recognized authority was expected, absent, delayed, refused, or unavailable within the identified frame."
      "Α": "Operational use would need repeated occurrences, stabilization, path-dependence, or role-script formation rather than a one-off conceptual contrast."
      "Ω": "Operational use would need directional asymmetry of power, vulnerability, exposure, capacity, recognition, or obligation assigned to concrete roles."
      "Θ": "Operational use would need sequence, duration, delay, persistence, escalation, erosion, or development across time."
      "Φ": "Operational use would need traceable source and target frames showing actual reframing rather than retrospective assimilation."
      "Χ": "Operational use would need procedures preserving reversibility, restraint, context sensitivity, and non-tribunal interpretation."
      "Σ": "Operational use would need evidence of synthesis or coordination that discriminates rather than merely smooths conflict."
      "Ψ": "Operational use would need a self-binding actor, institution, or explicitly modeled agent maintaining commitment across time."
    negative_cases:
      - "A case where recognized authority is present and uncontested, so Λ is not active."
      - "A case where legitimacy is neither claimed, granted, nor contested, so ∇ and Φ are not activated."
      - "A case of purely legal validity where moral legitimacy is not at issue."
      - "A case of principled anti-authoritarian legitimacy where absence of authority is not a deficit in the operative frame."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The current material is philosophical
    and abstract; empirical, comparative, computational, legal, clinical, or
    applied validation would require evidence, indicators, calibration
    thresholds, external review, and rival-model comparison not supplied here.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      The analysis does not infer mental states, motives, traits, maturity,
      pathology, or competence from legitimacy claims or contestation.
    non_metaphysical: >
      The analysis does not decide what legitimacy is in itself or whether
      authority is metaphysically necessary for legitimacy.
    non_diagnostic: >
      The analysis is not a clinical, therapeutic, diagnostic, or
      person-evaluative reading.
    non_legal_forensic: >
      The analysis does not determine legal validity, jurisdiction, authority,
      culpability, evidence, standing, or enforceability.
    non_implementation_claim: >
      The YAML representation is not a governance design, policy mechanism,
      computational implementation, or applied decision procedure.
    non_moral_ranking: >
      No person, party, authority, claimant, granter, or contester is ranked as
      morally higher or lower by this PMS projection.
    non_exhaustive_capture: >
      The PMS reading remains non-exhaustive; legitimacy, authority, recognition,
      and moral difficulty may require rival grammars or remain partly uncaptured.
    reversibility: >
      Every operator assignment remains revisable if a concrete scene, rival
      frame, or falsifying condition changes the calibration.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by maintaining restraint under possible
      asymmetry and refusing humiliation, person-ranking, irreversible labeling,
      or tribunal-like verdicts.

limits:
  - >
    The case lacks concrete actors, roles, institutions, chronology,
    jurisdiction, consequences, and evidence, so the reading is a conceptual
    projection rather than scene adjudication.
  - >
    No empirical, metaphysical, diagnostic, clinical, legal, forensic,
    implementation, or PMS Base validation claim is made or warranted.
  - >
    Rival readings remain open, including normative, recognition-based,
    legal-political, anti-authoritarian, and non-capture readings.
  - >
    Because the abstract case strongly fits several PMS operators, coherence risk
    is high; PMS coherence must not be treated as sufficient by itself.

case_synthesis:
  primary_pms_reading: >
    The case is structurally readable as a frame-dependent legitimacy problem in
    which the absence of recognized authority functions as a possible structured
    non-event, generating moral-practical tension, possible low-resolution
    asymmetry, recontextualization pressure, and a need for reflective distance.
    The strongest reading concerns the relation among Δ, ∇, □, Λ, Φ, and Χ. The
    later operators Α, Ω, Θ, Σ, and Ψ remain weaker because the case does not
    supply recurrence, concrete asymmetry, temporal development, integration, or
    self-binding.
  continuity_condition: >
    Continuity is not established. It would require evidence that claims, grants,
    or contestations persist or stabilize across time. Without such evidence,
    PMS must not infer attractor formation, institutionalization, maturity,
    degeneration, or recurring praxis.
  change_condition: >
    Change is relevant only as conceptual recontextualization: legitimacy is
    considered apart from recognized authority. Stronger change claims would
    require a concrete before-and-after frame shift, including what was
    reinterpreted, by whom, under which asymmetry, and with what temporal
    persistence.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, authority absence, or rival framing is
    preserved as possible non-capture or rival formalization and is not
    automatically redescribed as drift, incomplete integration, or maturity
    failure. Non-fit may indicate a limit of the PMS projection rather than a
    defect in the case.
  responsibility_condition: >
    Responsibility_R is not established. It would require a specified asymmetry,
    temporal extension, recontextualization, and self-binding commitment. The
    case allows the question of responsibility to be structurally prepared, but
    not answered.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring non-ranking,
    non-humiliating, reversible, and restrained handling of possible asymmetry.
    It is an application discipline for how the analysis is conducted, not a
    claim that the case proves dignity, moral superiority, or ontological worth.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparison criteria show
    that PMS discriminates the case better without over-assimilation. PMS
    readability therefore remains compatible with normative, legal-political,
    recognition-based, anti-authoritarian, and non-capture readings.

