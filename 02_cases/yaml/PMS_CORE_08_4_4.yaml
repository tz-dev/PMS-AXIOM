      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory is weak because no chronology, persistence,
