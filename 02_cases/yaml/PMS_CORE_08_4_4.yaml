operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ structures the initial differences that make the case analyzable:
      legitimacy versus authority, recognized versus absent authority, claim
      versus grant, grant versus contestation, and PMS readability versus
      validity.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the distinction concerns legitimacy, authority, recognition, claim, granting, contestation, or PMS projection."
      - "Check that legitimacy is not collapsed into authority and that absence of authority is not treated as proof of illegitimacy."
    falsifier_conditions:
      - "If the case cannot sustain any distinction between legitimacy and recognized authority, the PMS reading loses its primary entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as the directional moral-practical tension generated by
      legitimacy being claimed, granted, or contested in the absence of
      recognized authority. The tension may orient toward justification, refusal,
      acceptance, resistance, or reframing, but no subjective motive is inferred.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify that the tension is structural and argumentative rather than diagnostic or psychological."
      - "Do not infer desire, intention, pathology, or moral superiority from the presence of directional tension."
    falsifier_conditions:
      - "If no pressure to justify, accept, refuse, contest, or reframe follows from the distinction, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because legitimacy and authority become meaningful only within
      frames of recognition, normativity, role, institution, community, moral
      expectation, or philosophical interpretation.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name which frame is being used before assessing the meaning of authority absence."
      - "Mark frame shifts between moral, legal, political, communal, theological, and PMS-internal readings rather than treating them as one frame."
    falsifier_conditions:
      - "If no frame is specified or inferable, the analysis becomes too abstract to discriminate legitimacy without authority from unrelated cases."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active because the case explicitly centers a structured absence:
      recognized authority is absent where some frames may expect authority to
      ground or ratify legitimacy.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected occurrence as recognition by an authority and the frame within which that recognition matters."
      - "Preserve the possibility that a frame not requiring recognized authority would not experience this as a deficit or failure."
    falsifier_conditions:
      - "If recognized authority is not expected within the operative frame, Λ must be weakened or removed rather than treated as a defect."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak because the case mentions claims, grants, and contestations as
      possible modes but does not show recurrence, stabilization,
      path-dependence, or a repeated role-script.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Show recurrence or stabilization before claiming an attractor."
      - "Distinguish a conceptual class of cases from an actual recurrent pattern in a concrete scene."
    falsifier_conditions:
      - "If no repeated pattern or stabilization is supplied, Α remains weak and cannot ground strong downstream claims."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is relevant but low-resolution because legitimacy without recognized
      authority may create asymmetries of power, exposure, vulnerability,
      capacity, obligation, or recognition. The case does not identify parties or
      direction.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the direction and kind of asymmetry before assigning analytic weight."
      - "Do not moralize asymmetry, convert it into blame, or assign victim/perpetrator roles without scene evidence."
      - "Allow Ω to remain weak where recurrence and concrete role differentiation are absent."
    falsifier_conditions:
      - "If no directional imbalance in power, exposure, capacity, vulnerability, recognition, or obligation is identifiable, Ω must be marked weak or not active."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is weak because legitimacy disputes can unfold through persistence,
      delay, escalation, recognition, erosion, or recontextualization, but the
      supplied case contains no chronology or temporal trajectory.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Distinguish temporal possibility from an actual sequence or trajectory."
      - "Do not infer development, persistence, maturation, erosion, or stabilization without temporal material."
    falsifier_conditions:
      - "If the case remains a static conceptual contrast, Θ is only a weak dependency placeholder for higher operators."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active as a conceptual operation because the case reframes legitimacy
      apart from recognized authority and invites rival formalizations of how
      legitimacy may be claimed, granted, or contested without authority.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name the source frame as legitimacy-grounded-by-recognized-authority and the target frame as legitimacy-readable-without-recognized-authority."
      - "Check whether recontextualization clarifies the problem or merely absorbs disagreement and non-fit into PMS."
    falsifier_conditions:
      - "If every rival reading, rupture, or refusal is treated as PMS recontextualization, the analysis becomes over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is major as application discipline and structurally relevant as
      reflective separation between legitimacy claim, authority, legal validity,
      moral truth, and PMS readability. It prevents premature verdict,
      enforcement, or closure.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Check that the analysis suspends verdict and remains reversible."
      - "Distinguish distance from avoidance, neutrality that erases vulnerability, or refusal to specify limits."
    falsifier_conditions:
      - "If Χ is suspended to force a moral, legal, metaphysical, diagnostic, or PMS-validating verdict, the application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak because the case does not show synthesis of rival frames into a
      coherent practical whole. Any integration remains a possible later result
      rather than a current finding.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Test whether integration discriminates between rival legitimacy structures rather than smoothing them into one PMS-readable pattern."
      - "Distinguish integration from forced coherence or premature harmonization of disagreement."
    falsifier_conditions:
      - "If PMS coherence is treated as proof of adequacy or legitimacy, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and analytic-only because no actor, institution, agent, or
      self-relation is supplied. Self-binding would require evidence of sustained
      commitment to an integrated structure across time.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only if a concrete or explicitly modeled agent binds itself to a legitimacy structure over time."
      - "Do not attribute selfhood, consciousness, or subjectivity to legitimacy, authority, or an institution without explicit structural scope."
    falsifier_conditions:
      - "If Ψ is applied without established Σ, Θ, and Χ, the self-binding reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 carries the strongest case structure: legitimacy/authority distinctions,
      moral-practical tension, frames of recognition, and the structured absence
      of recognized authority. Α remains weak because recurrence is not shown.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is relevant but under-specified. Ω is possible as low-resolution
      asymmetry, while Θ is weak because no temporal sequence, persistence, or
      development is supplied.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 is active mainly as conceptual and application discipline: Φ reframes
      legitimacy without authority, Χ keeps the reading reversible and
      non-tribunal, and Σ remains weak because no integration is established.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is analytic-only. Ψ would require self-binding across time by an actor
      or modeled agent, which is not provided by the case material.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case explicitly distinguishes legitimacy from recognized authority
        and claim from grant or contestation.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        Moral difficulty creates structural pressure around justification,
        acceptance, refusal, or contestation.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        Legitimacy, authority, and recognition are intelligible only in frames of
        normativity, role, institution, community, or philosophical
        interpretation.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        The absence of recognized authority is case-given, although its meaning
        depends on the operative frame.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Only weakly supported: recurrence or stabilization is possible but not
        provided in the abstract case material.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Only weakly supported: possible asymmetries of exposure, power,
        recognition, or obligation are relevant but not assigned to parties.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Only weakly supported: temporal trajectories are possible but no
        sequence, duration, or development is supplied.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Supported as a conceptual reframing of legitimacy apart from recognized
        authority, but downstream dependencies remain weak.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Supported as application discipline and reflective separation, while
        case-internal Χ remains dependent on weak Θ and Φ calibration.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Not established as a case result; at most a conditional later synthesis
        if rival frames are coherently coordinated without erasure.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Not established as a case result; requires self-binding across time,
        which the case does not provide.
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

