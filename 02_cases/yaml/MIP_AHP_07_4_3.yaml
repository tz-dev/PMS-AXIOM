  boundary_flags:
    no_hidden_first_order_findings: true
    no_hidden_rescoring: true
    no_hidden_D_activation: true
    no_hidden_transmission_upgrade: true
    formal_neat_misuse_remains_misuse: true

validation_checklist:
  global_term_hygiene:
    expected_final_terms_used:
      - "MIP"
      - "MIP - Maturity in Practice.yaml"
      - "MIP - Maturity in Practice - AHP Module.yaml"
      - "`D₀`"
      - "`D₁/D₂`"
      - "D-module"
      - "D-profile"
      - "IA-box"
      - "A-score"
      - "M-score"
      - "Precision Heuristic"
      - "case.addons.ah_precision"
      - "analysis artifact"
      - "working note"
      - "not mature for transmission"
    deprecated_or_misleading_terms_avoided_or_negated:
      MIPractice_case_v2_0_full_with_model_reference: true
      MIPractice_addon_AH_precision: true
      case_ah_precision_legacy_path: true
      unformatted_D0: true
      unformatted_D1_D2: true
      unhyphenated_D_module: true
      unhyphenated_D_profile: true
      unhyphenated_IA_box: true
      unhyphenated_A_score: true
      unhyphenated_M_score: true
      precision_score_as_base_score: true
      rescore_A: true
      rescore_M: true
      person_level_attack_point: true
  semantic_musts:
    AHP_is_optional: true
    default_activation_is_off: true
    AHP_requires_existing_structured_MIP_analysis_fields: true
    AHP_derives_outputs_only_from_documented_fields: true
    AHP_never_invents_hidden_assumptions: true
    AHP_never_changes_base_A_M_IA_D_results: true
    AHP_never_activates_D: true
    AHP_never_creates_person_level_findings: true
    AHP_never_upgrades_transmission_status: true
  consistency_checks:
    completed_MIP_analysis_present: true
    structured_case_fields_present: true
    PH_checklist_complete: true
    PH_points_match_band: true
    PH_overlay_effect_matches_band: true
    attack_points_have_required_fields: true
    hardening_actions_have_required_fields: true
    each_hardening_action_links_to_attack_point: true
    no_attack_point_targets_person: true
    no_hardening_action_changes_case_or_person: true
    no_boundary_violation_detected: true
  final_AHP_judgment: >
    The previous MIP output has high AHP precision as an analysis artifact. Its
    main vulnerability is not lack of structure but transmission risk: if
    excerpted, its careful score hygiene, D-boundaries, IA partiality, and
    working-note limitation must remain visible. AHP therefore recommends
    hardening for reuse, not rescoring, not D-module activation, and not any
    change to the original MIP findings.