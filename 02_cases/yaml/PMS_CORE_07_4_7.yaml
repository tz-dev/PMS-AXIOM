      remain open.

analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary: []
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The case type permits a reversible PMS structural projection and
      dependency-sensitive operator map. It does not permit empirical, diagnostic,
      legal-forensic, clinical, implementation, or PMS Base validation claims.
  coherence_risk:
    status: "high"
    reason: >
      The case strongly fits PMS vocabulary around Ω, Θ, Α, Λ, Φ, Χ, and Σ, because
      "asymmetry lock-in" almost directly names asymmetry, temporal hardening,
      possible non-events of revision or exit, and the need for reflective
      recontextualization. This fit is analytically useful, but it also creates a
      specific PMS risk: the formal reading may become too smooth, absorb too much
      resistance or ambiguity, and make the case appear more structurally settled
      than the abstract material warrants.
    mitigation: >
      The reading is constrained by weak or under-specified statuses for Λ, Α, Σ,
      Ψ, Action_E, SELF_FIXPOINT, AD_A>>E, and AD_Sigma_low; by explicit
      non-capture zones; by rival formalizations; by falsifier conditions; and by
      the rule that PMS coherence is not sufficient by itself. The case is therefore
      treated as a disciplined projection, not as a completed PMS capture.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the abstract relation between differentiated asymmetries, framed
      pressures, possible non-events, attractor formation, temporal extension,
      recontextualization, distance, and integration. This gives the case a strong
      PMS-readable structure without requiring empirical, diagnostic, legal,
      metaphysical, or implementation claims.
    discrimination_requirement: >
      The reading must distinguish asymmetry lock-in from ordinary commitment,
      temporary delay, caregiving dependency, institutional inertia, coercion,
      domination, tragic responsibility, and merely formal coherence. It must also
      distinguish actual lock-in from the philosophical possibility of lock-in,
      because the case material supplies a conceptual problem rather than a concrete
      sequence of praxis.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish lock-in from ordinary long-term responsibility or commitment."
      expected_pms_distinction: >
        Lock-in requires Ω plus Θ plus weak or active Α and relevant Λ; ordinary
        commitment may involve Θ and Ψ without blocked exit or stabilized asymmetric
        constraint.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish PMS structural coherence from adequate moral, legal, empirical, or phenomenological explanation."
      expected_pms_distinction: >
        Σ and Coherence_C must remain separate from truth, legality, diagnosis,
        lived experience, and exhaustive capture; Χ and non-capture guardrails must
        remain active.
      current_status: "satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What exact differences of position, exposure, dependency, responsibility, or exit are being tracked?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What structural pressures toward revision, interruption, leaving, or responsibility follow from those differences?"
      current_calibration: "partial"
    - operator: "□"
      question: "Which moral, relational, institutional, dependency, or exit frame makes the asymmetry meaningful?"
      current_calibration: "partial"
    - operator: "Λ"
      question: "Which expected revision, interruption, exit, response, or recognition is absent or delayed, and in what frame?"
      current_calibration: "weak"
    - operator: "Α"
      question: "What recurrence, stabilization, path dependence, or role-script formation shows lock-in rather than a single event?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "What kind and direction of asymmetry is present, and is it harmful, protective, necessary, tragic, contested, or ambiguous?"
      current_calibration: "satisfied"
    - operator: "Θ"
      question: "What temporal trajectory, accumulation, delay, persistence, or irreversibility matters?"
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "What recontextualization is available, blocked, contested, or over-assimilative?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "How does the analysis preserve distance, reversibility, and non-tribunal restraint?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "What would count as integration rather than forced coherence or narrative smoothing?"
      current_calibration: "weak"
    - operator: "Ψ"
      question: "What evidence would show stable self-binding rather than merely being placed under responsibility?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "moral remainder that persists after structural mapping"
      - "material, bodily, economic, institutional, or safety constraints on exit"
      - "legal meanings of consent, coercion, liability, rights, negligence, or duty"
      - "phenomenological lived experience of dependency, fear, guilt, care, shame, ambivalence, or exhaustion"
      - "rival normative grammars such as care ethics, domination theory, tragedy, legal theory, or systems theory"
      - "situations where non-exit is not drift but protection, care, obligation, dependency, danger, or lack of viable alternatives"
      - "situations where rupture, refusal, silence, or rival framing marks a limit of PMS capture rather than a PMS-internal deficiency"
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration
      residue, incomplete integration, structured absence, failed maturity, or
      insufficient recontextualization. The PMS reading remains valid only as a
      bounded structural projection and must allow the possibility that another
      grammar describes the morally decisive feature more precisely.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "coercion or domination theory"
      - "care ethics and dependency ethics"
      - "institutional path-dependence or systems-theoretic feedback"
      - "tragedy of responsibility under incompatible obligations"
      - "legal-forensic analysis of consent, coercion, liability, negligence, rights, or duty"
      - "phenomenological analysis of lived vulnerability, fear, guilt, ambivalence, or moral remainder"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat them
      unless comparison criteria are explicitly specified and applied. In this case,
      no such comparison has been carried out, so rival readings are preserved rather
      than subordinated to PMS.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if no meaningful asymmetry,
        no temporal persistence, no stabilized pattern, or no relevant expected
        revision, interruption, or exit can be identified.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if the same formula covered coercion,
        caregiving, tragic duty, ordinary commitment, institutional inertia, and
        temporary delay without operator-level distinctions.
    - id: "F3"
      condition: >
        The reading would over-assimilate if resistance, rupture, disagreement,
        absence, rival framing, or missing evidence were automatically translated
        into PMS drift, incomplete integration, recontextualization, or maturity
        failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The analysis is usable as a reversible conceptual PMS application with strong
      Ω and Θ relevance, but it remains under-specified for concrete scene analysis
      and must preserve rival readings and non-capture.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection into
    calibrated empirical, comparative, computational, legal, clinical, or applied
    analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: "Concrete evidence identifying distinct positions, exposures, dependencies, responsibilities, and exit capacities."
      ∇: "Observable or documentable pressures, incentives, obligations, constraints, or directional tendencies generated by those differences."
      □: "A specified moral, institutional, relational, legal, or practical frame that determines relevance."
      Λ: "Identified expected revisions, interruptions, exits, responses, or recognitions whose absence matters within the frame."
      Α: "Evidence of recurrence, stabilization, path dependence, feedback, or role-script formation."
      Ω: "Evidence of directional imbalance in capacity, exposure, power, dependency, responsibility, or exit."
      Θ: "Evidence of temporal sequence, accumulation, persistence, delay, trajectory, or irreversibility."
      Φ: "Evidence that reframing, revision, or recontextualization is available, blocked, contested, or misused."
      Χ: "Evidence or analytic procedure showing reflective distance, reversibility, inhibition of verdict, and non-tribunal handling."
      Σ: "Criteria showing integration of tensions into coherent enactment rather than forced coherence."
      Ψ: "Evidence of stable self-binding, commitment, or self-relation across time, if responsibility is to be claimed."
    negative_cases:
      - "A temporary asymmetry with clear exit and no path dependence."
      - "Ordinary long-term responsibility without blocked revision or exit."
      - "A single difficult event with no recurrence, stabilization, or temporal trajectory."
      - "A rival legal or empirical explanation that accounts for the case without PMS-specific discriminative gain."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The current material is abstract and
    philosophical; empirical, comparative, legal, clinical, computational, and applied
    validation would require additional evidence and external criteria.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      The case is not read as evidence of motives, personality traits, maturity,
      fear, desire, avoidance, or any psychological state.
    non_metaphysical: >
      The case makes no claim about consciousness, essence, ontological dignity,
      metaphysical freedom, or ultimate moral reality.
    non_diagnostic: >
      No actor, relationship, group, institution, or pattern is diagnosed; asymmetry
      drift patterns remain structural risks only.
    non_legal_forensic: >
      The analysis does not determine coercion, liability, consent, negligence,
      abuse, rights, duties, or legal responsibility.
    non_implementation_claim: >
      The YAML is not an implemented system, algorithm, policy, intervention protocol,
      or operational decision tool.
    non_moral_ranking: >
      No person or position is ranked as morally superior, inferior, mature, immature,
      dignified, or undignified.
    non_exhaustive_capture: >
      PMS translation is not treated as complete capture; moral remainder, rival
      readings, and material constraints remain possible.
    reversibility: >
      All operator statuses are bounded to the abstract case and may be weakened,
      revised, or rejected if concrete scene evidence or rival formalization requires it.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by handling asymmetry through reflective
      restraint, non-ranking, non-diagnosis, and protection against irreversible labeling.

limits:
  - >
    The PMS reading is limited by the absence of a concrete praxis scene, identified
    actors, event sequence, institutional setting, and evidence.
  - >
    The analysis does not establish empirical, metaphysical, phenomenological,
    diagnostic, clinical, legal, forensic, implementation, or PMS Base validation
    status.
  - >
    Rival readings remain open, including coercion, domination, care ethics, tragedy,
    institutional path-dependence, systems theory, and phenomenology.
  - >
    Because the case fits PMS vocabulary strongly, coherence risk is high: PMS may
    become too smooth or under-discriminating unless falsifiers and non-capture zones
    remain active.

case_synthesis:
  primary_pms_reading: >
    Asymmetry lock-in is structurally readable as differentiated positions and
    pressures framed by a moral-practical context, possibly stabilized through
    meaningful non-events into asymmetric temporal trajectories that are difficult
    to revise, interrupt, or exit. The reading is strong at the conceptual level
    because the case explicitly names asymmetry and temporal hardening, but it remains
    incomplete as concrete scene analysis because no actors, events, recurrence
    evidence, obligations, or available alternatives are supplied.
  continuity_condition: >
    Continuity would require evidence that the asymmetry persists through recurrent
    patterns, role scripts, feedback loops, delayed response, postponed revision,
    blocked interruption, or path-dependent constraints rather than a single static
    difference. Without this evidence, Α and Λ remain weak or conditional rather
    than fully active.
  change_condition: >
    Change would require specifying whether Φ is available, blocked, contested, or
    over-assimilative, and whether Χ and Σ support transformation without forced
    coherence. A change reading would also need to distinguish genuine
    recontextualization from rhetorical reframing that leaves the asymmetry intact.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, and rival framing are preserved as
    possible non-capture or rival formalization rather than automatically redescribed
    as drift, failed maturity, incomplete integration, or recontextualization. The
    analysis therefore does not treat PMS non-fit as evidence that the case needs
    more PMS; it treats non-fit as potentially informative in its own right.
  responsibility_condition: >
    Responsibility remains a weak question unless Ω, Θ, Φ, and Ψ are concretely
    grounded through asymmetry, temporal extension, reframing, and stable self-binding.
    The mere mention of responsibility in the case material is not enough to establish
    Responsibility_R, self-binding, culpability, legal duty, moral blame, or mature
    praxis.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective restraint
    under asymmetry and forbidding ontological ranking, diagnosis, humiliation,
    maturity-labeling, person-ranking, or irreversible labeling. Dignity is therefore
    applied as PMS application discipline, not as a metaphysical property inferred
    from the case.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparison criteria show that
    PMS has superior discriminative force for the concrete case. No such comparison
    is completed here, so the PMS formula is recommended as a bounded structural
    projection, not as a victorious or exhaustive interpretation.

final_structural_formula:
  primary_formula: "Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    The case is a PMS-internal projection of differentiated framed pressures whose
    possible non-events and stabilizations generate temporally extended asymmetries
    that may become difficult to revise, interrupt, or exit. The formula gives the
    strongest compact PMS reading of the abstract case while leaving Φ, Χ, Σ, and
    Ψ as calibration or watch structures rather than automatically completed
    achievements.
  calibration_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α"
  calibration_formula_status: "reflexive_constraint_not_independent_case_model"
  calibration_reading: >
    The calibration layer requires that any recontextualization of the lock-in
    structure remain reversible, non-tribunal, non-diagnostic, and open to non-capture.
    Χ prevents the analysis from becoming enforcement; Φ tests whether reframing
    clarifies or merely assimilates; Σ must not be inferred from coherence alone;
    Ψ remains weak unless concrete self-binding is shown.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It does
    not establish empirical truth, metaphysical truth, phenomenological completeness,
    diagnostic validity, clinical validity, legal or forensic validity, implementation
    validity, moral ranking, or PMS Base validation. Its conformity depends on
    preserving operator dependency discipline, derived-structure discipline,
    Dignity-in-Practice, falsifier conditions, rival readings, and possible
    non-capture.