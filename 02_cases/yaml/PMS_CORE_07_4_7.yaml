schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >
  Case application of PMS_1.3 to the conceptual philosophical case "Asymmetry lock-in".
  This document applies PMS.yaml as the only PMS Base reference and does not revise,
  extend, validate, or replace PMS.yaml.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    This case analysis applies PMS_1.3 as the current repository reference. It does
    not redefine PMS operators, alter PMS operator order, introduce new meta-axioms,
    treat derived axes as independent primitives, override PMS application guardrails,
    or claim PMS Base validation.
  referenced_base_sections:
    - "pms_entry_condition"
    - "schema_version"
    - "schema_meta"
    - "repository_governance"
    - "core_principles"
    - "pms_model_reference"
    - "derived_structures"
    - "example_operator_chains"
    - "computational_representation"
    - "ai_interface_pms"
  application_schema_note: >
    The template is used only as an application schema. PMS.yaml remains the only
    PMS Base reference.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as formally disciplined and portable, but not final, complete,
    uniquely ordered, immune to revision, or proven by this case.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - "theoretical_reflection"
      - "structural_action_theory"
      - "anthropology_and_praxeology"
      - "systems_theory"
      - "model_documentation_and_specification"
      - "simulation_scaffolding"
      - "structural_reasoning"
    not_intended_for:
      - "clinical_diagnosis"
      - "personality_typing"
      - "mental_health_risk_assessment"
      - "automated_moral_judgement"
      - "individual_person_evaluation"
      - "forensic_decision_making"
      - "policy_enforcement"
      - "irreversible_labeling"
  normative_position_alignment:
    ontology: >
      The case analysis makes no PMS-based claims about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological application constraint on
      handling asymmetry, not as metaphysical dignity, moral superiority, or ranking.
    tragedy_clause: >
      Structural coherence, integration, responsibility, or maturity does not
      eliminate tragedy, unresolved tension, rupture, loss, or non-capture.
    self_binding_clause: >
      The analysis remains subject to Distance (Χ), Self-Binding discipline (Ψ),
      and Dignity-in-Practice (D), and does not use PMS to force clarity, authority,
      resolution, truth, or action.
  computational_position_alignment:
    representation_clause: >
      YAML representation is a formal encoding of a PMS reading, not an implementation
      of praxis, agency, selfhood, subjectivity, consciousness, morality, empirical
      truth, or validity.
    calibration_clause: >
      Operational use would require architecture-specific calibration, empirical
      testing where applicable, external evaluation, context-sensitive interpretation,
      and public accountability.
    accountability_clause: >
      PMS translation does not by itself guarantee public intelligibility,
      intersubjective uptake, empirical adequacy, external accountability, or
      explanatory sufficiency.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars or formalisms.
  terminology_alignment:
    praxis: >
      Situated meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through PMS
      operator compositions.
    meta_axiom: >
      One of the eleven PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ.
    operator_composition: >
      Ordered or structured application of PMS meta-axioms to generate complex
      praxeological formations.
    derived_construct: >
      A higher-order construct systematically derived within PMS from operator
      compositions, not introduced as an independent primitive.
    asymmetry_drift_pattern: >
      A structurally derived distortion pattern within PMS, not a diagnosis,
      person-type, clinical category, ontological attribution, or moral verdict.
    repository_reference: >
      PMS.yaml remains the PMS Base reference. This case template is subordinate
      to that reference.
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT"
      role: "case_application_assistant"

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the current PMS Base reference. This case analysis depends on it
    but does not modify it.
  this_template_may:
    - "depend_on_pms"
    - "reference_pms_operators"
    - "define_case_application_structure"
    - "organize_pms_operators_for_case_analysis"
    - "specify_case_quality_control"
    - "support_structural_reasoning"
  this_template_must_not:
    - "silently_redefine_meta_axioms"
    - "silently_alter_default_operator_order"
    - "silently_alter_default_dependency_path"
    - "present_new_meta_axioms_as_if_already_in_base_pms"
    - "treat_derived_axes_as_independent_primitives"
    - "override_application_guardrails_while_claiming_full_pms_conformity"
    - "claim_pms_base_validation_from_a_case"
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >
    PMS application presupposes Distance (Χ), reversibility, and Dignity-in-Practice
    as praxeological application constraints. The condition governs application, not
    critique, refusal, revision, or rival formalization.
  applies_to: "application_only"
  does_not_apply_to:
    - "critique"
    - "refusal"
    - "rejection"
    - "revision_proposals"
    - "rival_formalization"
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >
          Reflective distance is maintained; the analysis does not fuse PMS into
          verdict, urgency, enforcement, closure, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          Structural readings remain revisable, bounded, non-final, and non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >
          The analysis maintains restraint under asymmetry and does not shame, rank,
          humiliate, diagnose, or ontologically evaluate persons or groups.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      Any application of PMS is itself subject to PMS discipline. Analyses that suspend
      Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in order
      to enforce truth, clarity, authority, resolution, or action are invalid as PMS
      applications.
    application_to_this_case: >
      The analysis remains self-bound by using PMS only as a reversible structural
      grammar, by withholding empirical, diagnostic, legal, implementation, and PMS
      Base validation claims, and by preserving non-capture and rival formalizations.
  application_only_boundary:
    status: "active"
    statement: >
      PMS can be criticized, revised, rejected, ignored, or compared with rival
      formalizations without satisfying the PMS application gate.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, absence, missing evidence, or rival framing
      must not automatically be redescribed as PMS drift, failed integration,
      incomplete calibration, recontextualization, or maturity failure.
  no_pms_base_revision:
    status: "active"
    statement: >
      This case does not alter PMS Base, PMS operators, PMS dependencies, derived
      structures, guardrails, or repository governance.

case:
  title: "Asymmetry lock-in"
  interpretation_type: "conceptual_domain_projection"
  case_type: "philosophical_structural_pre_application"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: true
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    The case analyzes the abstract philosophical question of how morally difficult
    situations may be structurally understood when asymmetries of position, exposure,
    dependency, responsibility, or available exit become difficult to revise,
    interrupt, or leave.
  non_scope: >
    The analysis does not establish empirical facts, diagnose persons, assign legal
    or forensic responsibility, rank moral worth, validate PMS Base, implement PMS
    computationally, or claim that PMS exhaustively captures the moral difficulty.
  non_goals:
    - "metaphysical_proof"
    - "diagnostic_assessment"
    - "legal_or_forensic_judgment"
    - "person_ranking"
    - "irreversible_labeling"
    - "pms_base_validation"
  case_typing_note: >
    This is a conceptual domain projection and PMS-internal structural derivation
    over an abstract case-type. It is not a concrete praxis scene because no actors,
    events, evidence, institutional setting, or observed sequence are supplied.

