derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >
    Each derived structure must be marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration
    does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not independent
    axioms, diagnoses, ontological rankings, metaphysical entities, or proof of PMS
    completeness.
  case_status: >
    Awareness_A is active as a structural analytic projection; Coherence_C is weak;
    Responsibility_R is weak and question-form only; Action_E is under-specified;
    Dignity_in_Practice_D is an application constraint; SELF_FIXPOINT is not
    established; AD_A>>E and AD_Sigma_low are possible but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically.
    case_reading: >
      Awareness_A appears as sustained framed differentiation across time: the case
      asks that position, exposure, dependency, responsibility, and exit-capacity
      remain distinguishable as asymmetries harden into trajectories.
    status: "active"
    calibration_points:
      - >
        Differentiate position, exposure, dependency, responsibility, and exit within
        the moral-philosophical frame and across the temporal structure of lock-in.
    non_capture_note: >
      Structural awareness is not phenomenological consciousness.
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability without requiring full integration or
      self-binding.
    case_reading: >
      Coherence_C is weak because the case can be narrated as temporally stabilized
      pressure around absence or delay of revision, interruption, or exit within a
      frame. This does not prove adequacy.
    status: "weak"
    calibration_points:
      - >
        Distinguish structural coherence from truth, validity, legal sufficiency,
        forced integration, narrative smoothing, or moral resolution.
    non_capture_note: >
      Coherence does not prove adequacy.
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance."
      - "Θ extends imbalance into enduring trajectories."
      - "Φ allows reinterpretation of obligations under changing frames."
      - "Ψ binds the agent to obligations as self-relation."
    notes: >
      Responsibility_R is structural rather than moralistic, diagnostic, or legal.
    case_reading: >
      Responsibility_R is weak and analytic-only as a question. Ω, Θ, and Φ are in
      scope, but Ψ is not established because no concrete agent, commitment,
      self-relation, or enactment is supplied.
    status: "weak"
    calibration_points:
      - >
        Identify asymmetry, temporality, recontextualization, and actual self-binding
        before claiming responsibility rather than merely responsibility-pressure.
    non_capture_note: >
      Responsibility_R is not moral blame, diagnosis, or legal liability.
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides directedness."
      - "Θ structures directedness as trajectory."
      - "Σ integrates impulses, constraints, and roles into enactment."
    notes: >
      Action_E is not any behavior; it is integrated and temporally extended.
    case_reading: >
      Action_E is under-specified. The case names revision, interruption, and
      leaving, but it does not describe integrated realization of directedness across
      time by any actor.
    status: "under_specified"
    calibration_points:
      - >
        Distinguish action from abstract possibility, moral description, omission,
        pressure, or case-type structure.
    non_capture_note: >
      Without a concrete scene, Action_E remains under-specified.
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and restraint."
      - "Ψ binds the agent to norms protecting standing under asymmetry."
    notes: >
      Dignity-in-Practice concerns how asymmetry is handled, not the ranking of persons.
    case_reading: >
      Dignity_in_Practice_D constrains the application: asymmetry must be handled
      without ranking, shaming, diagnosis, irreversible labeling, or ontological
      claims about persons.
    status: "application_constraint"
    calibration_points:
      - >
        Check that asymmetry is analyzed structurally and reversibly, without
        person-ranking, humiliation, or tribunal-style conclusion.
    non_capture_note: >
      D is a praxeological application constraint, not ontological dignity or moral
      superiority.

self_model_analysis:
