    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces evaluative framing rather than restoring balance or integration."
    case_reading: >
      AD_A>>E remains a risk condition only. The abstract case could involve expanded
      awareness of asymmetry while revision, interruption, or exit is suppressed or
      chronically delayed, but no concrete enactment pattern is given.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state, or
      moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to unstable
        trajectories and weak coherence of praxis, especially under asymmetrically
        loaded praxis conditions.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >
      AD_Sigma_low remains a risk condition only. The case could involve
      recontextualization outpacing integration, but volatility of coherence or
      inconsistent responsibility is not established by the material.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes structural volatility in action forms, not a clinical
      state, diagnosis, or person-type.

