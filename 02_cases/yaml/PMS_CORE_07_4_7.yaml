    - "Χ"
    - "Σ"
    - "Ψ"
  operator_inventory_status: "no_additional_pms_operators_introduced"

operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the differentiations that make the case analyzable: position, exposure,
      dependency, responsibility, and available exit are not treated as interchangeable.
    analytic_weight: "major"
    calibration_points:
      - >
        Specify which difference is being tracked: positional inequality, exposure
        differential, dependency relation, responsibility gradient, or exit asymmetry.
      - >
        Check that distinctions are not imported beyond the case material and are
        not collapsed into moral blame.
    falsifier_conditions:
      - >
        If no stable distinction between positions, exposures, dependencies,
        responsibilities, or exits can be identified, the PMS reading loses its
        entry point.
    non_capture_note: >
      Difference does not itself determine moral, empirical, legal, diagnostic, or
      metaphysical meaning.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ marks the directional pressure generated by the differences: pressure toward
      remaining, leaving, revising, interrupting, assuming responsibility, or being
      held within a pattern.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Specify whether the tension is practical, argumentative, explanatory,
        institutional, or structural.
      - >
        Do not infer subjective desire, fear, motive, pathology, or intention without
        concrete scene evidence.
    falsifier_conditions:
      - >
        If no directional tension arises from the relevant differences, ∇ remains
        under-specified.
    non_capture_note: >
      ∇ is structural directedness, not psychological desire.
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Context, boundary, role-space, rule-space, or interpretive situation."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context_and_role_space"
    examples:
      - "institutional frame"
      - "relationship frame"
      - "moral frame"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ supplies the frame in which asymmetry and lock-in become meaningful: a moral,
      relational, institutional, dependency, responsibility, or exit-structured frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Name the active frame before judging whether an absence, delay, dependency,
        or exit difficulty is meaningful.
      - >
        Mark frame shifts rather than letting coercion, care, tragedy, institution,
        and responsibility silently substitute for one another.
    falsifier_conditions:
      - >
        If no frame is specified, the analysis becomes too abstract to discriminate.
    non_capture_note: >
      A frame is not proof that PMS captures the whole moral case.
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Meaningful absence, non-occurrence, omission, delay, or counterfactual expectation."
    depends_on:
      - "□"
    provides:
      - "meaningful_absence_and_expectation"
    examples:
      - "expected response not occurring"
      - "missing correction"
      - "delayed exit"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ marks possible meaningful non-events: non-revision, non-interruption,
      non-exit, delayed response, absent recognition, or missing transformation.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Specify the expected occurrence and the frame within which its absence matters;
        absence alone is not enough.
      - >
        Preserve the possibility that absence marks PMS non-capture, external
        constraint, tragedy, or missing evidence rather than case defect.
    falsifier_conditions:
      - >
        If no structured expectation of revision, interruption, exit, recognition,
        or response exists, Λ should not be asserted.
    non_capture_note: >
      Absence, silence, or non-fit must not automatically become PMS drift.
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent stabilization, pattern formation, role-script, or path-dependence."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "recurrent_patterns"
    examples:
      - "habitual script"
      - "recurrent role pattern"
      - "stabilized dependency"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α marks stabilization, recurrence, path dependence, or role-script formation
      that could turn asymmetry into lock-in.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Show recurrence, stabilization, or path dependence rather than merely naming
        a single difficult situation.
      - >
        Distinguish a stable attractor from accidental aggregation, temporary
        dependence, or one-off constraint.
    falsifier_conditions:
      - >
        If recurrence or stabilization is not shown in a concrete scene, Α must
        remain weak or analytic.
    non_capture_note: >
      Lock-in cannot be inferred from a single abstract difficulty alone.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Directional imbalance in position, exposure, capacity, obligation, vulnerability, or responsibility."
    depends_on:
      - "Α"
    provides:
      - "asymmetric_roles_and_responsibility_gradients"
    examples:
      - "power difference"
      - "dependency relation"
      - "unequal exposure"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is central. The case explicitly concerns asymmetries of position, exposure,
      dependency, responsibility, and available exit.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Specify the direction and kind of asymmetry rather than treating asymmetry
        as a single moral category.
      - >
        Do not moralize asymmetry by default; it may be harmful, protective, tragic,
        necessary, institutional, ambiguous, or contested.
      - >
        Allow Ω to remain bounded to the abstract case-type until concrete directionality
        is supplied.
    falsifier_conditions:
      - >
        If no directional imbalance of exposure, capacity, obligation, dependency,
        or exit is identifiable, Ω claims must be removed or marked weak.
    non_capture_note: >
      Ω is structural and is not moral condemnation by itself.
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal extension, sequence, trajectory, persistence, development, or delay."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "temporal_trajectories"
    examples:
      - "path-dependent sequence"
      - "long-term commitment"
      - "delayed correction"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is central because lock-in concerns temporal extension, persistence, delayed
      revision, and the hardening of patterns across time.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Distinguish diachronic trajectory, accumulation, delay, path-dependence,
        and irreversibility from static comparison.
      - >
        Check whether temporality is essential to the moral difficulty rather than
        merely incidental.
    falsifier_conditions:
      - >
        If the difficulty is fully static and not temporally extended, Θ is overextended.
    non_capture_note: >
      Duration is not automatically lock-in.
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation of an existing structure by placing it into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "reframing_and_adaptation"
    examples:
      - "role reinterpreted under new conditions"
      - "conflict reframed"
      - "obligation newly situated"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ marks possible recontextualization: the case asks whether asymmetry can be
      revised, interrupted, reframed, or understood under another frame.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Name source frame and possible target frame, such as dependency to domination,
        duty to care, care to coercion, or obligation to exit-constraint.
      - >
        Check whether recontextualization clarifies the case or merely absorbs
        non-fit, resistance, rupture, or rival framing into PMS vocabulary.
    falsifier_conditions:
      - >
        If every rupture, resistance, absence, or disagreement is absorbed as Φ,
        the reading becomes over-assimilative.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal, suspension, inhibition, meta-position, or restraint."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is required as reflective distance in the application itself and may also
      describe scene-level capacity to step back from the asymmetry.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Check whether the analysis suspends verdict, preserves reversibility, and
        avoids tribunal, diagnosis, person-ranking, or forced maturity readings.
      - >
        Distinguish distance from avoidance, denial, detached neutrality, or refusal
        to acknowledge vulnerability.
    falsifier_conditions:
      - >
        If Χ is suspended to force a verdict, moral ranking, diagnosis, or legal
        conclusion, the PMS application is invalid.
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ marks the possible integration of dependency, responsibility, exposure, exit,
      temporality, and rival frames into coherent praxis.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Test whether integration discriminates rather than smooths over conflict,
        moral remainder, material constraint, or rival grammar.
      - >
        Distinguish integration from forced coherence; PMS coherence is not proof
        of adequacy.
    falsifier_conditions:
      - >
        If coherence is treated as proof of adequacy, Σ is overclaimed.
    non_capture_note: >
      PMS coherence is insufficient by itself.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ marks possible self-binding only where responsibility becomes stable
      commitment across time. The abstract case mentions responsibility but does
      not establish self-binding.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Apply Ψ only where self-binding or analytic self-binding is actually in scope.
      - >
        Do not attribute selfhood, moral maturity, or person-level responsibility
        without a concrete scene and the required Σ, Θ, and Χ support.
    falsifier_conditions:
      - >
        If Ψ is applied without Σ, Θ, and Χ, or without evidence of stable self-binding,
        the self-binding reading is under-specified.
    non_capture_note: >
      SELF_FIXPOINT is derived, not a metaphysical proof of subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Distinctions, impulses, frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the case by identifying differences, directed pressures, frames,
      non-events, and possible stabilizations that make lock-in analyzable without
      assigning blame or diagnosis.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Stabilized patterns become asymmetric relations and temporally extended
      trajectories.
    case_function: >
      L2 carries the central case structure: stabilized patterns become asymmetrical
      and temporally extended, producing the abstract possibility of lock-in.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Transformation, distancing, and integration.
    case_function: >
      L3 is the reflexive calibration layer: recontextualization, distance, and
      integration are tested without allowing coherence to become forced resolution.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Integrated structures are bound into relatively stable self-relation across time.
    case_function: >
      Ψ is secondary and weak in this case. Responsibility is mentioned, but no scene
      evidence establishes self-binding.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case explicitly differentiates position, exposure, dependency,
        responsibility, and exit.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        Those differences generate structural pressure around revision,
        interruption, leaving, and responsibility.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The moral-philosophical frame makes asymmetry, responsibility, and
        exit-capacity relevant.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Possible non-events are implied by difficulty of revision, interruption,
        or exit, but concrete expected events are not specified.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Lock-in implies stabilization or path dependence, but recurrence is not
        empirically or scenically demonstrated.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Asymmetry is explicitly named and central to the case material.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Difficulty becoming hard to revise, interrupt, or leave makes temporal
        extension central.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Revision and interruption place recontextualization in scope, but its
        availability is not established.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Distance is required by PMS application discipline and by the requested
        reversible, non-tribunal analysis.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Integration is needed to coordinate responsibility, dependency, exposure,
        exit, and rival frames, but it is not established as enacted.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Self-binding is only a weak responsibility question; the abstract case does
        not establish stable self-relation or commitment.
  dependency_failure_conditions:
    - >
      If a later operator is used while its dependencies are absent, mark the reading
      as under-specified or invalid.
    - >
      If the chain is used as a smooth totalization without discrimination tests,
      mark coherence risk as high.
    - >
      If an operator is not active, state so rather than forcing the full chain.

