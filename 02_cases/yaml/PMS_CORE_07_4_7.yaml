      Ω and Θ are central: the case explicitly concerns asymmetrical position,
      exposure, dependency, responsibility, and exit becoming temporally difficult
      to revise, interrupt, or leave.
    recontextualization_distance_integration: >
      Φ, Χ, and Σ are calibration operators. Φ asks whether reframing or revision
      is possible, Χ keeps the analysis reversible and non-tribunal, and Σ tests
      integration without allowing coherence to substitute for adequacy.
    derived_axes_projection: >
