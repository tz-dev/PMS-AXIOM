  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated, reflexively
    modulated, temporally extended, asymmetry-aware patterns of praxis bound into
