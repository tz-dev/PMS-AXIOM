  logic_overlay_synthesis:
    primary_logic_reading: >
      PMS-LOGIC makes visible that the case is not only a PMS closure-drive
      configuration, but also a logical boundary-management problem: coherent
      explanation remains useful as ordering, yet becomes structurally unstable
      when converted into authority over unresolved Λ.
    non_closure_result: >
      Λ functions as a logical boundary rather than defect, ignorance, nihilism,
      or metaphysical pointer. The case requires sustainable non-assertion where
      evidence remains incomplete and explanation cannot warrant settlement.
    responsibility_attribution_result: >
      Responsibility remains weak and under-specified. It becomes attributable
      only in concrete scenes where effective capacity, calibrated Ω, temporal
      consequence under Θ, and durable self-binding through Ψ are established.
      No obligation, blame, guilt, sanction, or moral demand is derived.
    boundary_management_result: >
      □ defines the inquiry frame; Λ carries unresolved warrant; Χ prevents
      forced closure and authority-smuggling; and Σ integrates only as
      provisional coordination rather than totalization. The overlay therefore
      treats logical coherence as useful but insufficient for warranted closure.
    moral_readability_result: >
      The case may become morally readable only post hoc in concrete
      asymmetrical and temporally extended scenes. Morality is not introduced as
      an operator, norm, value, duty, prescription, evaluative system, or PMS
      Base layer.
    drift_result: >
      The main LOGIC drift risks are dogmatism / Σ-totalization, explanatory
      authority capture, technocratic frame overconstraint, and pseudo-ought
      injection by the analysis itself. These remain structural risks, not
      findings or diagnoses, and are constrained by Λ, Χ, reversibility,
      non-capture, and Dignity-in-Practice.
    final_logic_formula_or_signature: >
      Primary LOGIC signature: LOGIC_boundary_management +
      NON_CLOSURE_stability, with PRE_MORAL_justification active and
      POST_MORAL_effects / MORAL_READABILITY_min only weak or conditional.
      Reduced signatures remain overlay shorthand and do not alter PMS
      dependencies.
    final_claim_boundary: >
      This LOGIC overlay adds boundary-management, non-closure, attributability,
      and drift-risk visibility. It does not revise PMS Base, rewrite the PMS
      Core pass, derive an ought, prescribe action, evaluate persons, assign
      guilt, validate PMS, or claim final philosophical closure.