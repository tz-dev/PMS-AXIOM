pms_logic_overlay_application:
  schema_version: "PMS-LOGIC_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-LOGIC.yaml"
  paper_source_file: "PMS-LOGIC.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–LOGIC Application Profile"
    model_short: "PMS-LOGIC"
    status: "draft"
    last_updated: "2026-04-06"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–LOGIC"
      subtitle: "Pre-Moral Foundations, Logical Limits, and Post-Moral Effects"
      source_file: "PMS-LOGIC.md"
    description: >
      PMS-LOGIC is applied here as an application profile / overlay for the
      completed PMS Core case "Explanation and closure drive." It adds visibility
      to pre-moral justification, logical boundary management, non-closure,
      responsibility-readability, and post-moral effects without redefining PMS
      operators, altering PMS dependencies, rewriting the Core pass, or treating
      LOGIC constructs as PMS Base.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Explanation and closure drive"
    rule: >
      This LOGIC block is appended to or integrated into an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      LOGIC constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The LOGIC overlay may add boundary, non-closure, attribution,
      non-innocence, reduced-signature, and failure-mode visibility. It must not
      modify the already completed PMS Core case except where a direct PMS.yaml
      inconsistency has been separately identified.

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-LOGIC introduces no amplification overlays beyond reduced signatures,
      structural failure modes, and paper-specific non-operator constructs. It
      remains an overlay/application profile only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          A meta-position and stop-capability are maintained. The LOGIC overlay
          does not fuse the case into verdict, authority, enforcement,
          certainty, moral demand, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          The LOGIC reading remains case-type-bound, revisable, and
          configuration-specific. It does not generate global person labels,
          irreversible interpretive claims, or final closure.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The LOGIC overlay does not shame, rank, humiliate, morally evaluate,
          or ontologically assess persons or groups. It remains restricted to
          structural attribution and boundary handling.
    gate_result: "valid_as_logic_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any LOGIC reduced signature is shorthand only. Reduced signatures do not
      replace PMS dependencies. In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or
      Ψ must remain dependency-respecting according to PMS.yaml.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  logic_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgments, no moral evaluation, no sanction logic."
      - "Focus on structures of praxis, not right or good morality."
      - "Audience: analysis of praxis and structure, not action guidance or decision rules."
    may_add_visibility_to:
      - "non-closure"
      - "closure-drive"
      - "logical boundary management"
      - "responsibility as attributability"
      - "non-innocence without guilt"
      - "effective capacity"
      - "moral readability as post-hoc interpretive field"
      - "failure-mode constraints"
      - "LOGIC drift risks"
      - "counter-readings"
    must_not_do:
      - "derive ought from being"
      - "introduce norms, values, duties, prescriptions, or moral rules"
      - "treat morality as a PMS operator"
      - "convert responsibility into blame"
      - "convert non-innocence into guilt"
      - "convert logical coherence into final authority"
      - "convert Σ into totalization"
      - "convert Ω into justificatory authority"
      - "convert Λ into defect, ignorance, nihilism, or metaphysical pointer"
      - "claim PMS Base validation"

  tripartition:
    pre_moral_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators_involved:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      claim: >
        This level identifies the structural conditions under which the case
        becomes praxeologically legible before evaluative or normative
        interpretation appears.
      case_application: >
        The case is pre-morally legible because uncertainty, ambiguity,
        underdetermination, and incomplete evidence introduce Δ; the demand to
        explain anyway introduces ∇; inquiry settings provide □; missing or
        delayed warrant functions as Λ; and repeated conversion of uncertainty
        into coherent closure stabilizes as Α. No norm, value, duty,
        prescription, blame, or moral authority is introduced at this level.
      no_normativity_introduced: true
      notes:
        - "No norms, values, duties, prescriptions, or moral commands are introduced."
        - "Patterns may stabilize without intention, moral assessment, or authority."

    logical_boundary_management:
      label: "Logical level of ordering and boundary management"
      applicability: "active"
      dominant_operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      dependency_note: >
        The listed operators are dominant boundary-management operators. Their
        PMS dependencies remain intact; especially Χ and Σ must not be treated
        as dependency-free shorthand.
      claim: >
        Logic functions as an ordering and integration instrument. It may
        organize coherence within a frame, but it does not become final
        authority or deliver ultimate closure where Λ persists.
      case_application: >
        The case directly concerns logical boundary management because coherent
        narratives or models are treated as sufficient for closure despite
        persistent Λ. LOGIC marks the boundary at which explanation may remain
        coherent without becoming warranted settlement. □ defines the relevant
        inquiry frame; Λ carries unresolved evidence conditions; Χ preserves
        stop-capability; and Σ coordinates available elements without being
        allowed to become totalization.
      aphorism: "Logic is the beginning of everything — not the end."
      boundary_result: >
        The logical boundary is reached where coherent explanation can be
        formed but warrant remains incomplete. Λ must be carried as structured
        non-closure rather than replaced by narrative finality. Χ prevents
        authority-smuggling by requiring that Σ remain provisional, bounded,
        and revisable.

    post_moral_effects:
      label: "Post-moral level of effects"
      applicability: "weak"
      operators_involved:
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      claim: >
        Effects become morally readable once praxis unfolds under asymmetry and
        irreversible time, while responsibility is reconstructed as
        attributability rather than as an ought.
      case_application: >
        Post-moral effects are weak because the Core case is not a concrete
        scene. They become readable only where a closure account is issued under
        calibrated Ω, persists through Θ, and becomes durably bound through Ψ.
        In such variants, effects may become attributable without becoming
        blame, guilt, sanction, prescription, or moral command.
      core_formula: "Pre-moral in justification, logical in boundary management, post-moral in effect."
      no_ought_derived: true

  key_claims:
    C1_non_closure_as_strength:
      status: "active"
      claim: >
        Non-closure is treated as a structural strength rather than a mere
        deficiency. Persistent Λ prevents logical systems from compensating
        uncertainty with dogma or substitute narratives.
      case_application: >
        The case is centered on the risk that uncertainty is treated as a defect
        to be overcome by explanation. LOGIC instead carries Λ as a strength:
        incomplete evidence remains visible and prevents coherent narrative or
        model formation from being mistaken for warranted closure.

    C2_morality_as_readability_field:
      status: "weak"
      claim: >
        Morality is not reconstructed as an operator, but as a readability field
        under constellations involving Ω, Θ, Λ, and Ψ.
      case_application: >
        Moral readability remains weak because no concrete scene supplies
        specific agents, capacities, harms, or durable commitments. It may arise
        only where asymmetrical closure has effects over time and becomes
        attributable through a self-binding trajectory. Morality is not added as
        a PMS operator.

    C3_responsibility_as_attribution_not_prescription:
      status: "weak"
      claim: >
        What everyday language may call obligation is reconstructed as
        attribution of consequences, not prescriptive demand.
      case_application: >
        The case allows only weak responsibility-readability. If a manager,
        journalist, court, evaluator, speaker, or system has effective
        frame-bound capacity to preserve uncertainty yet declares final closure,
        consequences may become attributable. No duty, ought, blame, guilt, or
        sanction follows from the overlay.

    C4_apparent_norms_as_failure_mode_constraints:
      status: "weak"
      claim: >
        Apparent norms can be reconstructed as structural failure-mode
        constraints stabilized by self-binding, without external authority or
        prescriptive ought.
      case_application: >
        Apparent norms such as "do not close prematurely" are not introduced as
        commands. They are reconstructed as failure-mode constraints: if Λ
        persists and Χ is bypassed, forced Σ may produce dogmatization,
        authority overreach, or false certainty.

    C5_logic_as_ordering_tool_not_authority:
      status: "active"
      claim: >
        Logic remains important for consistency and integration, but becomes
        structurally unstable when it attempts final authority or closure beyond
        what the frame can deliver under persistent Λ.
      case_application: >
        This is the central LOGIC reading of the case. Logic can order
        uncertainty, test consistency, and support Σ, but it becomes unstable
        when the coherence of an explanation is treated as authority to settle
        what the frame and evidence do not yet warrant.

  responsibility_readability_chain:
    status: "weak"
    source: "PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain"
    chain_type: "readability_chain_not_dependency_definition"
    sequence:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    note: >
      This sequence is used as a LOGIC readability chain for responsibility,
      non-closure, and moral-readability analysis. It is not a new PMS
      dependency definition; PMS.yaml dependencies remain authoritative.
    case_application: >
      The full readability chain is not fully active because Ψ is conditional
      and Ω/Θ require concrete calibration. The chain is partially readable as
      a boundary sequence: uncertainty and demand enter a frame, missing
      evidence persists, closure stabilizes, and later responsibility becomes
      readable only if asymmetrical, temporal, and self-binding conditions are
      specified.

  theses_and_definitions:
    intermediate_thesis:
      label: "Boundary point of logic"
      quote: "Logic does not end in silence, but in a structurally sustainable non-assertion."
      operator_reading: >
        Non-event Λ, stabilized by Α within □, may mark a disciplined stopping
        point for logic rather than failure or negation.
      case_application: >
        The disciplined stopping point is the point at which explanation remains
        possible but warranted settlement is not yet available. LOGIC reads this
        not as failure, silence, ignorance, or nihilism, but as structurally
        sustainable non-assertion under Λ and Χ.

    central_thesis:
      quote: "From effective capacity follows structural responsibility, not obligation."
      operator_reading:
        responsibility_requires:
          - "effective capacity within □"
          - "irreversibility under Θ"
          - "distribution gradients under Ω"
          - "attributability continuity via Ψ"
      case_application: >
        Effective capacity is under-specified in the abstract case. A concrete
        actor or institution may have capacity to preserve uncertainty, mark
        limits, or avoid premature closure, but the supplied case material does
        not establish such capacity. Therefore responsibility-readability
        remains weak and no obligation is derived.

    conclusion_thesis:
      quote: >
        Logic does not fail as a tool; it becomes structurally unstable when it
        begins to function as authority.
      case_application: >
        The case shows the risk of logic or coherence drifting from tool to
        authority: a coherent narrative or model is treated as if it had the
        authority to settle what remains underdetermined. The overlay preserves
        logic as tool by maintaining Λ, Χ, and reversible Σ.

  boundary_conditions:
    BC_EFFECTIVE_CAPACITY:
      label: "Absence of effective capacity"
      status: "under_specified"
      definition: >
        Responsibility presupposes effective, frame-bound capacity within □ and
        temporal availability under Θ. Where access, means, authority, or the
        relevant temporal window are structurally absent, no responsibility
        attribution arises even if outcomes later appear significant.
      calibration_note: >
        PMS-LOGIC specifies the structural form of attributable capacity, but
        not every concrete threshold of sufficiency in advance.
      case_application: >
        Effective capacity is under-specified. The case mentions domains in
        which actors may have capacity to preserve uncertainty or avoid closure,
        but it does not identify a concrete actor, access, means, authority,
        temporal window, or consequence path. Responsibility attribution is
        therefore not established.

  non_operator_constructs:
    logic_paper_specific:
      status: "active"
      is_operator: false
      definition: >
        Logic is a procedural discipline of consistency, derivation, and
        closure-drive that meets a structural boundary at Λ under □.
      operator_touchpoints:
        - "Σ"
        - "Λ"
        - "□"
        - "∇"
        - "Χ"
      case_application: >
        Logic functions in this case as ordering and boundary management. It
        becomes risky when explanation-drive and integration pressure convert
        coherence into closure. The overlay keeps logic from becoming authority
        by maintaining Λ and Χ.

    morality_readability_field:
      status: "weak"
      is_operator: false
      definition: >
        Morality is the readability of responsibility that emerges post hoc
        from irreversible praxis under structural conditions. No norms, values,
        or duties are introduced.
      minimal_operator_basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      case_application: >
        Moral readability is weak because the case does not specify concrete
        asymmetrical effects, irreversible consequence paths, or durable
        self-binding. It remains possible in concrete scenes but is not claimed
        as a result here.

    responsibility_vs_ought:
      status: "active"
      is_operator: false
      responsibility: "Attribution of consequences."
      ought: "Prescriptive demand; explicitly out of scope."
      pms_logic_position: >
        PMS-LOGIC operates on responsibility-readability and attributability,
        not on ought-statements.
      case_application: >
        The overlay distinguishes possible attribution from prescription. A
        closure account may become attributable if effective capacity,
        asymmetry, temporality, and self-binding are shown, but no ought,
        command, blame, guilt, sanction, or moral demand is generated.

    potential_effective_capacity:
      status: "under_specified"
      is_operator: false
      definition: >
        Effective capacity means capacity within a frame □ plus temporal
        availability Θ. It introduces exposure to consequences, not duty.
      reduced_basis:
        - "□"
        - "Θ"
      case_application: >
        Potential effective capacity is under-specified. The named domains may
        involve actors with capacity to delay closure, mark uncertainty, or
        preserve alternatives, but the abstract case does not supply the
        concrete access, means, role, or temporal window needed for attribution.

    non_innocence:
      status: "under_specified"
      is_operator: false
      definition: >
        Non-innocence is the structural condition in which consequences become
        attributable even without intent, command, guilt, or blame.
      basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "□"
        - "Ψ"
      case_application: >
        Non-innocence is not established. It could arise in a concrete scene
        where an actor with effective capacity treats underdetermination as
        settled and consequences become attributable over time. The abstract
        case lacks sufficient evidence for that claim.

    apparent_norms_as_constraints:
      status: "weak"
      is_operator: false
      definition: >
        Apparent norms are reconstructed as PMS-internal self-binding
        constraints that prevent structural failure modes under irreversible,
        asymmetric conditions. They are not commandments.
      basis:
        - "Χ"
        - "Σ"
        - "Ψ"
        - "Λ"
        - "□"
        - "Ω"
        - "Θ"
      case_application: >
        The apparent norm not to convert coherence into closure is read only as
        a structural failure-mode constraint. It prevents Σ-totalization and
        authority laundering where Λ persists; it does not prescribe conduct or
        introduce moral command.

  reduced_signatures:
    PRE_MORAL_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: "Structural preconditions of praxis; no normativity introduced."
      case_application: >
        The reduced signature applies directly: differentiated uncertainty,
        explanatory drive, inquiry frame, missing warrant, and closure-attractor
        formation are all structurally present before any normative or moral
        layer is introduced.

    LOGIC_boundary_management:
      label: "Logical boundary management"
      applicability: "active"
      operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      reduced: true
      note: >
        Ordering and integration under non-closure; Χ prevents dogmatic
        Σ-totalization.
      dependency_hygiene: >
        This is reduced shorthand only. PMS dependencies remain authoritative.
      case_application: >
        This is the dominant LOGIC signature for the case. The frame defines
        inquiry; Λ marks unresolved warrant; Χ preserves stopping power; and Σ
        must remain integration without totalization.

    POST_MORAL_effects:
      label: "Post-moral effects"
      applicability: "weak"
      operators:
        - "Ω"
        - "Θ"
        - "Ψ"
      reduced: true
      note: >
        Irreversible consequence attribution under asymmetry and time; no norms
        derived.
      case_application: >
        This signature is weak because Ω, Θ, and Ψ are under-specified in the
        abstract case. It becomes applicable only in concrete scenes where
        asymmetrical closure produces temporally extended attributable effects.

    MORAL_READABILITY_min:
      label: "Moral readability field"
      applicability: "weak"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Morality as interpretive field generated post hoc; not an operator.
      case_application: >
        Moral readability remains weak. Λ is present, but Ω, Θ, and Ψ require
        concrete calibration before post-hoc moral readability can be asserted.

    POTENTIAL_effective:
      label: "Effective potential / capacity"
      applicability: "under_specified"
      operators:
        - "□"
        - "Θ"
      reduced: true
      note: >
        Situated capacity plus temporal availability; generates exposure, not
        duty.
      case_application: >
        The case gives domains where effective capacity may matter, but no
        concrete role, access, means, authority, or temporal window is supplied.
        Capacity is therefore under-specified.

    NON_CLOSURE_stability:
      label: "Sustainable non-closure"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: >
        Openness carried within frame; attractor stabilizes non-substitution.
      case_application: >
        This signature applies strongly as a corrective to the closure drive.
        The case requires that differentiated uncertainty and missing warrant be
        held inside the inquiry frame without substitute closure, even where
        closure itself has become an attractor.

    HUME_KNOT_reconstruction:
      label: "Hume knot reconstruction"
      applicability: "weak"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Rewrites potential obligates into non-innocence and attributable
        consequence; preserves the is/ought boundary without crossing it.
      case_application: >
        This signature is weak rather than active. The case concerns closure
        and explanation more than potential obligating action. It becomes
        relevant only if a concrete scene shows effective capacity, asymmetry,
        temporal consequence, persistent Λ, and self-binding sufficient for
        attribution without ought.

  failure_mode_constraints:
    note: >
      The following are frame-dependent PMS-internal self-binding constraints.
      They are not universal prescriptions. They name conditions for coherence
      and non-destructive praxis under non-closure.
    items:
      - id: "FMC1"
        label: "A boundary that cannot be carried becomes structurally unstable."
        applicability: "active"
        operator_basis:
          - "Δ"
          - "Ψ"
        meaning: >
          Marking or occupying a boundary generates exposure. If the
          consequences cannot be sustained across time, the boundary becomes
          destructive rather than orienting.
        failure_mode: "Boundary inflation, authority overreach, collapse into dogma or abandonment."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "authority_capture_omega_inflation"
        case_application: >
          The case applies this constraint because declaring a matter settled
          marks a boundary. If that boundary cannot carry the unresolved Λ it
          excludes, closure becomes unstable and may inflate into authority or
          collapse when challenged.

      - id: "FMC2"
        label: "Forced closure where Λ persists produces structural instability."
        applicability: "active"
        operator_basis:
          - "Λ"
          - "□"
          - "Χ"
        meaning: >
          Where a structure does not yield final explanation, forced closure
          introduces substitute narratives such as dogma, myth, metaphysical
          compensation, or false certainty.
        failure_mode: "Dogmatization, metaphysical compensation, false certainty."
        related_drifts:
          - "dogmatism_sigma_totalization"
        case_application: >
          This is the central failure-mode constraint. The case explicitly
          concerns the demand to explain anyway and declare settlement despite
          persistent Λ. Χ must prevent the conversion of coherent explanation
          into false certainty.

      - id: "FMC3"
        label: "Explanatory power converted into sense-making authority causes structural overreach."
        applicability: "active"
        operator_basis:
          - "∇"
          - "Σ"
          - "□"
          - "Χ"
        meaning: >
          Explanatory success does not confer authority over meaning.
          Integration is coordination, not domination; Χ prevents closure-drive
          from laundering authority through explanation.
        failure_mode: "Epistemic domination, technocratic moralism, authority laundering through explanation."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "technocratic_reduction_frame_overconstraint"
        case_application: >
          The case strongly activates this constraint because coherent
          narratives or models may be treated as if explanatory success itself
          authorizes closure. LOGIC blocks this by preserving Χ and limiting Σ
          to coordination.

      - id: "FMC4"
        label: "Where proximity generates power, viable praxis requires maintained distance."
        applicability: "weak"
        operator_basis:
          - "Χ"
          - "Ω"
        meaning: >
          Closeness increases influence; where influence increases,
          unregulated proximity becomes power. Χ is a condition for dignified
          handling of power.
        failure_mode: "Manipulation, coercive intimacy, moral overreach."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "moralism_pseudo_ought_injection"
        case_application: >
          This constraint is weak because the abstract case does not specify
          proximity. It may apply in conflict talk, managerial reporting, legal
          reasoning, journalism, or AI evaluation where interpretive closeness
          or evaluative authority increases influence over others.

      - id: "FMC5"
        label: "Stable self-binding takes the form of restraint rather than assertion."
        applicability: "weak"
        operator_basis:
          - "Ψ"
          - "Χ"
          - "Λ"
        meaning: >
          Assertions seek closure and authority; restraint preserves openness.
          Self-binding to restraint stabilizes praxis without commanding
          others.
        failure_mode: "Authoritarian certainty, moral exhibitionism, escalation dynamics."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "moralism_pseudo_ought_injection"
        case_application: >
          This constraint is weak because Ψ is not fully established in the
          Core case. It becomes relevant where an actor, institution, or system
          can bind itself to restraint under persistent Λ rather than asserting
          closure.

  drift_catalogue:
    note: >
      LOGIC drift classes describe structural operator distortions. They are not
      personal traits, diagnoses, moral verdicts, or enforcement categories.
    dogmatism_sigma_totalization:
      label: "Dogmatism / Σ-totalization"
      applicability: "risk"
      distorted_operators:
        - "Σ"
      mechanism: >
        Integration is forced into total closure, treating coherence as final
        truth rather than provisional coordination. Λ is denied instead of
        carried.
      symptoms:
        - "claims_of_ultimate_explanation"
        - "immunization_against_revision"
        - "replacement_of_structural_coherence_with_certainty"
      result: >
        Brittle structure under novelty; non-closure treated as error rather
        than constraint.
      case_application: >
        This is the main LOGIC drift risk. The case does not prove active
        dogmatism, but it directly describes the risk of Σ-totalization when a
        coherent narrative or model is treated as warranted closure.

    authority_capture_omega_inflation:
      label: "Authority capture / Ω-inflation"
      applicability: "risk"
      distorted_operators:
        - "Ω"
      mechanism: >
        Asymmetry is converted from descriptive condition into justificatory
        principle. Power gradients are mistaken for epistemic or moral
        authority.
      symptoms:
        - "because_I_can_becomes_because_I_am_right"
        - "suppression_of_Χ"
        - "obscured_responsibility_pathways"
      result: >
        Domination may become masked as necessity; responsibility flows upward
        and becomes opaque.
      case_application: >
        This is a risk in domains where an actor or institution has closure
        authority, such as courts, managers, journalists, evaluators, or public
        debate framers. It remains a risk rather than a finding because concrete
        asymmetry is not specified.

    moralism_pseudo_ought_injection:
      label: "Moralism / pseudo-ought injection"
      applicability: "risk"
      distorted_operators:
        - "Ψ"
        - "Χ"
      mechanism: >
        Responsibility is retranslated into obligation. Self-binding is replaced
        by compliance-seeking enforcement. Non-innocence is moralized into
        blame.
      symptoms:
        - "should_or_must_reintroduced_as_if_structurally_authorized"
        - "attribution_becomes_accusation"
        - "praxis_judged_instead_of_reconstructed"
      result: >
        Covert normativity is reintroduced; responsibility collapses into
        enforcement.
      case_application: >
        This is a risk for the overlay itself: it must not turn structural
        warnings against premature closure into a moral command. The case
        application therefore keeps attribution separate from ought, guilt, and
        blame.

    nihilism_lambda_suppression:
      label: "Nihilism / Λ-suppression"
      applicability: "risk"
      distorted_operators:
        - "Λ"
      mechanism: >
        Non-events, omissions, or restraints are treated as irrelevant. The
        structural significance of omission within frames under time is erased.
      symptoms:
        - "nothing_happened_so_nothing_matters"
        - "denial_of_omission_effects"
        - "flattening_of_temporal_consequence"
      result: >
        False innocence; responsibility dissolves through denial of structural
        impact.
      case_application: >
        This is a secondary risk. The primary case risk is forced closure, not
        nihilistic dismissal, but Λ could also be suppressed if unresolved
        evidence is treated as irrelevant because no decisive event has occurred.

    technocratic_reduction_frame_overconstraint:
      label: "Technocratic reduction / □-overconstraint"
      applicability: "risk"
      distorted_operators:
        - "□"
      mechanism: >
        Frames are treated as exhaustive representations of reality. What is
        unmodeled is dismissed or misrecognized as Λ.
      symptoms:
        - "overconfidence_in_models_or_metrics"
        - "ignoring_unmodeled_effects"
        - "frame_lock_in"
      result: >
        Blind spots are mistaken for non-existence; systemic fragility
        increases.
      case_application: >
        This risk is especially relevant to AI evaluation, managerial reporting,
        journalism formats, and legal or science-adjacent framings where the
        available frame or model may be treated as exhaustive. It remains a risk
        rather than a finding without concrete evidence.

  logic_derived_axes_projection:
    note: >
      This projection is a PMS-LOGIC paper-internal structural localization. It
      is not a measurement of objective quality and not a person evaluation.
    Awareness_A:
      structural_level: "high"
      operator_basis:
        - "Δ"
        - "□"
        - "Θ"
      effect_notes:
        - "Sensitivity to limits and conditions of praxis."
        - "Perception of where explanation reaches a stopping point and responsibility becomes structurally relevant."
      case_application: >
        LOGIC raises the salience of Awareness_A by marking where explanation
        reaches a boundary. The case requires sensitivity to the difference
        between coherent account, warranted closure, missing evidence, and
        sustainable non-assertion.

    Coherence_C:
      structural_level: "high"
      operator_basis:
        - "∇"
        - "□"
        - "Λ"
        - "Θ"
      effect_notes:
        - "Coherence maintained despite non-closure."
        - "Stability from integration of absence, not closure."
      case_application: >
        LOGIC reorients Coherence_C away from smooth narrative closure and
        toward coherence that can carry Λ. The stronger coherence is not the
        most complete story, but the structure that preserves non-closure
        without collapse or dogma.

    Responsibility_R:
      structural_level: "low"
      operator_basis:
        - "Ω"
        - "Θ"
        - "Φ"
        - "Ψ"
      effect_notes:
        - "Responsibility without moral demand."
        - "Accountability without sanction."
        - "Exposure accepted rather than displaced."
        - "Responsibility is structurally attributable rather than obligatory."
      boundary_condition_ref: "BC_EFFECTIVE_CAPACITY"
      case_application: >
        Responsibility_R remains low because effective capacity, durable
        self-binding, and concrete consequence paths are under-specified. LOGIC
        permits only weak responsibility-readability, not obligation, blame, or
        sanction.

    Action_E:
      structural_level: "constrained"
      operator_basis:
        - "∇"
        - "Θ"
        - "Σ"
        - "Χ"
      effect_notes:
        - "Action slowed or filtered."
        - "Preference for restraint over intervention."
        - "Avoidance of irreversible overreach under asymmetry amplification."
      case_application: >
        LOGIC constrains Action_E by treating closure declaration as an act that
        must be filtered by Χ where Λ persists. The relevant action tendency is
        not to settle faster, but to avoid converting Σ into irreversible
        overreach.

    Dignity_in_Practice_D:
      structural_level: "stabilizing"
      operator_basis:
        - "Ω"
        - "Χ"
        - "Ψ"
      effect_notes:
        - "Protection of vulnerable positions without paternalism."
        - "Power exercised without domination."
        - "Self-binding as stable continuity without norm derivation."
      case_application: >
        LOGIC keeps Dignity-in-Practice as a stabilizing praxeological
        constraint. It prevents closure authority, PMS translation, or LOGIC
        readability from becoming shaming, ranking, moral accusation, or
        ontological judgment.

  counter_readings:
    note: >
      Counter-readings are interpretive risks. PMS-LOGIC responds through
      structural clarification rather than polemic.
    items:
      - id: "D1"
        reading: "This is just ethics in disguise."
        relevance: "active"
        pms_response: >
          No PMS operator generates values, norms, or prescriptions. What
          appears ethical is the interpretability of responsibility under Ω, Θ,
          Λ, and Ψ.
        case_application: >
          This counter-reading is active because the case invites talk of
          responsible closure. The overlay avoids disguised ethics by treating
          all such claims as structural attribution or failure-mode constraints,
          not as moral norms.

      - id: "D2"
        reading: "This collapses into relativism."
        relevance: "weak"
        pms_response: >
          Frames are explicit scope constraints, and reversibility is required.
          Structural attribution under Ω, Θ, and Λ is not arbitrary preference.
        case_application: >
          This counter-reading is weak. The overlay does not make every framing
          equally adequate; it requires explicit □, preserved Λ, maintained Χ,
          and open rival readings.

      - id: "D3"
        reading: "This is nihilism with extra steps."
        relevance: "weak"
        pms_response: >
          Λ is not meaninglessness but structured absence. Omission and
          non-action remain relevant under Θ and Ω.
        case_application: >
          This counter-reading is weak because LOGIC treats non-closure as
          structured and stabilizing, not as meaninglessness, resignation, or
          refusal of analysis.

      - id: "D4"
        reading: "This is a hidden theological argument."
        relevance: "not_applicable"
        pms_response: >
          PMS-LOGIC carries non-closure within □ without metaphysical filling.
          No external ground, lawgiver, or ultimate justification is introduced.
        case_application: >
          This counter-reading is not applicable to the present case because no
          external metaphysical ground is introduced. The overlay explicitly
          blocks metaphysical compensation.

      - id: "D5"
        reading: "This makes responsibility unfair."
        relevance: "weak"
        pms_response: >
          PMS does not claim fairness. It models attribution, not moral desert.
          Responsibility is structural, not a reward or punishment scheme.
          Absence of effective capacity implies no responsibility.
        case_application: >
          This counter-reading is weak because responsibility remains
          under-specified. The overlay does not assign responsibility unless
          effective capacity, asymmetry, temporality, and self-binding are
          concretely established.

      - id: "D6"
        reading: "This cannot guide action."
        relevance: "active"
        pms_response: >
          PMS-LOGIC does not instruct; it orients by constraining overreach.
          Guidance is replaced by orientation through Χ, Σ, and Ψ.
        case_application: >
          This counter-reading is active because the case concerns whether
          matters should be closed. LOGIC does not prescribe an action; it
          orients by marking where closure would overreach and where restraint
          is structurally stabilizing.

      - id: "D7"
        reading: "This wins by translation, not necessarily by final superiority."
        relevance: "active"
        pms_response: >
          Translation success is not final settlement. The relevant test is
          whether the grammar preserves differentiating force under pressure.
        case_application: >
          This counter-reading is central. The overlay must not reproduce the
          closure-drive pattern by treating LOGIC translation as final
          superiority. Rival readings and non-capture remain preserved.

      - id: "D8"
        reading: "Relation to adjacent frameworks."
        relevance: "active"
        pms_response: >
          PMS-LOGIC is not virtue ethics, pragmatism, or systems ethics. It
          reconstructs responsibility structurally under asymmetry,
          temporality, and non-closure without ethical evaluation or normative
          optimization.
        case_application: >
          Adjacent frameworks remain open for comparison, especially
          epistemology, rhetoric, legal procedure, institutional theory,
          decision theory, and AI evaluation theory. PMS-LOGIC does not claim
          final superiority.

