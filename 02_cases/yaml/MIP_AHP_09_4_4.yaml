case:
  addons:
    ah_precision:
      enabled: true
      mode: "on"
      requires_completed_mip_analysis: true
      requires_structured_case_fields: true
      PH_points_0_to_6: 6
      PH_band: "high"
      PH_boundary_confirmed: true
      PH_checklist:
        PD-1_term_definition: true
        PD-2_scope_boundaries: true
        PD-3_conditions_and_thresholds: true
        PD-4_evidence_linking: true
        PD-5_reversibility_clause: true
        PD-6_language_hygiene: true
      PH_overlay_effect:
        confidence_shift_for_A_reading: "up"
        confidence_shift_for_C_reading: "up"
        IA_box_decidability: "more_decidable"
        D_R_D_P_misreading_risk: "down"
      attack_surface_annotations:
        - attack_point_id: "AP-001"
          severity: "high"
          title: "Concrete scene packet still missing"
          target_path: "case.information_basis.quality_and_limits.known_gaps"
          note_type: "evidence_gap"
          message: >
            The MIP analysis is structurally precise, but the underlying case
            remains a conceptual domain projection. This makes the artifact
            vulnerable if readers treat the YAML as a concrete scene analysis
            rather than as a scene-packet placeholder over PMS Core and
            PMS-EDEN outputs.
          suggested_action: >
            Add a concrete scene packet before any applied run: role-positions,
            chronology, confidentiality terms, consent or legal/public-interest
            basis, prior repair attempts, harm context, audience scale,
            safeguards, right of reply, correction channels, and evidence limits.
          source_fields:
            - "case.information_basis.primary_material"
            - "case.information_basis.quality_and_limits.known_gaps"
            - "case.open_questions_and_blind_spots.missing_information"
            - "case.transmission_check.status"
          person_level_finding: false
        - attack_point_id: "AP-002"
          severity: "medium"
          title: "A-band could be misread as a person or verdict score"
          target_path: "case.scores_and_ia.A_score"
          note_type: "score_hygiene_risk"
          message: >
            The A-score band is correctly marked as constellation-bound and not a
            person score, but because a numeric band appears, the analysis remains
            vulnerable to misreading as a maturity rating of actors, positions, or
            institutions.
          suggested_action: >
            Keep the A-band wording tied to the analysis artifact and the
            role-constellation. Add an adjacent sentence that the A-band is not a
            finding about any person, role-holder, institution, moral worth, or
            legal responsibility.
          source_fields:
            - "case.scores_and_ia.A_score"
            - "case.guardrails.score_hygiene"
            - "case.uniform_report.A_summary"
          person_level_finding: false
        - attack_point_id: "AP-003"
          severity: "medium"
          title: "M ceiling could be mistaken for low responsibility"
          target_path: "case.scores_and_ia.M_score"
          note_type: "M_ceiling_rule_gap"
          message: >
            The structural M ceiling is methodologically appropriate, but it
            could be misread as saying that role-positions have low
            responsibility. The intended claim is narrower: high M is unsupported
            because knowledge, predictability, alternatives, and levers are not
            evidenced.
          suggested_action: >
            Add a compact M-ceiling clarification: the ceiling is caused by
            missing conditions for attribution, not by a finding that any
            role-position lacked responsibility, knowledge, alternatives, or
            power.
          source_fields:
            - "case.scores_and_ia.M_score"
            - "case.acrp_profile.R_responsibility"
            - "case.acrp_profile.P_power_to_act"
            - "case.uniform_report.M_summary"
          person_level_finding: false
        - attack_point_id: "AP-004"
          severity: "high"
          title: "IA-risk could be over-read as failed asymmetry"
          target_path: "case.scores_and_ia.IA_box"
          note_type: "missing_conditions"
          message: >
            The IA-box result is IA-risk, not an inadult-asymmetry verdict. The
            artifact is vulnerable if IA-risk is read as proof that publicness,
            confidentiality, disclosure, or repair was unjustified.
          suggested_action: >
            Preserve the four IA-box criteria as open thresholds: transparency,
            justification, time-boundedness, and reversibility. For each stronger
            claim, require scene-specific evidence and a counter-scene test.
          source_fields:
            - "case.scores_and_ia.IA_box"
            - "case.ia_localisation"
            - "case.ia_protection"
            - "case.transmission_check.review_required"
          person_level_finding: false
        - attack_point_id: "AP-005"
          severity: "high"
          title: "Publicness context remains too compressed"
          target_path: "case.role_mapping.publicness"
          note_type: "publicity_context_collapse_risk"
          message: >
            Publicness is structurally central, but the concrete publicity
            profile is absent. Without audience scale, medium, identifiability,
            circulation duration, correction access, and reply capacity, the case
            could collapse very different publicness situations into one category.
          suggested_action: >
            Add a publicness gradient before any stronger use: private, bounded,
            semi-public, institutional, platform-public, mass-public; then map
            audience, persistence, identifiability, reversibility, and correction
            access.
          source_fields:
            - "case.role_mapping.publicness"
            - "case.acrpd_submodules_profile.A.A-P"
            - "case.acrpd_submodules_profile.P.P-PU"
            - "case.D_module_optional.D_profile.D_P_public_dignity"
          person_level_finding: false
        - attack_point_id: "AP-006"
          severity: "medium"
          title: "D-language risk under exposure and shame vocabulary"
          target_path: "case.D_module_optional"
          note_type: "dignity_language_risk"
          message: >
            The D-module is correctly activated as a qualitative guardrail, but
            terms such as D-stress, public dignity, shame, exposure, and
            humiliation can become rhetorically heavy. The risk is not that the
            D-module is wrong; the risk is that readers may treat D-language as a
            hidden dignity deficit or moral condemnation.
          suggested_action: >
            Keep every D-formulation explicitly qualitative, role-bound,
            time-windowed, and non-scoring. Pair D-stress with the D₀ boundary
            and the statement that no person-level dignity reading is produced.
          source_fields:
            - "case.guardrails.dignity_protection"
            - "case.optional_D_observation"
            - "case.D_module_optional"
            - "case.uniform_report.D_summary_if_activated"
          person_level_finding: false
        - attack_point_id: "AP-007"
          severity: "medium"
          title: "Counter-readings are present but need operational priority"
          target_path: "case.meta_notes.possible_alternative_interpretations"
          note_type: "counter_reading_missing"
          message: >
            Counter-readings are well listed, but the next iteration needs a
            clearer priority rule: which concrete finding would move the analysis
            from boundary-erosion risk toward warranted accountability,
            whistleblowing, legal disclosure, procedural correction, democratic
            publicness, or protective confidentiality?
          suggested_action: >
            Convert the counter-reading list into an ordered falsifier matrix:
            for each rival reading, state the evidence that would support it and
            the MIP field it would revise, suspend, or defeat.
          source_fields:
            - "case.meta_notes.possible_alternative_interpretations"
            - "case.meta_notes.counter_perspective"
            - "case.transmission_check.review_required.falsifier"
            - "case.uniform_report.key_findings"
          person_level_finding: false
        - attack_point_id: "AP-008"
          severity: "medium"
          title: "Model convergence may be mistaken for validation"
          target_path: "case.uniform_report.conclusion"
          note_type: "weak_justification"
          message: >
            PMS Core, PMS-EDEN, and MIP converge on similar cautionary
            structures. That convergence improves artifact consistency but does
            not validate the case, prove empirical adequacy, or defeat rival
            grammars.
          suggested_action: >
            Add a model-fit caveat wherever the analysis is summarized:
            cross-model coherence demonstrates structured compatibility, not
            truth, final capture, empirical validation, or application authority.
          source_fields:
            - "case.information_basis.quality_and_limits"
            - "case.meta_notes.bias_risks.confirmation_bias"
            - "case.uniform_report.conclusion"
            - "case.transmission_check.not_allowed_use"
          person_level_finding: false
      hardening_actions:
        - hardening_action_id: "HB-001"
          severity: "high"
          action_type: "add_role_context_publicness_precheck"
          instruction: >
            Before any stronger run, add a concrete scene packet with
            role-positions, chronology, confidentiality terms, consent or
            legal/public-interest basis, prior repair attempts, harm context,
            audience scale, safeguards, right of reply, correction channels, and
            evidence limits.
          linked_attack_ref: "AP-001"
          expected_effect: >
            Reduces evidence-gap vulnerability and prevents the conceptual
            PMS/EDEN/MIP structure from being mistaken for a concrete case
            finding.
          feeds_next_iteration: true
        - hardening_action_id: "HB-002"
          severity: "medium"
          action_type: "add_score_hygiene_boundary"
          instruction: >
            Add a repeated score-hygiene boundary beside all A-band and M-band
            summaries: these bands describe the analysis artifact or structural
            constellation only, not persons, institutions, moral worth, legal
            fault, or maturity of actors.
          linked_attack_ref: "AP-002"
          expected_effect: >
            Lowers risk that numerical or band language becomes a hidden person
            rating or verdict.
          feeds_next_iteration: true
        - hardening_action_id: "HB-003"
          severity: "medium"
          action_type: "add_ceiling_rule_check"
          instruction: >
            For each role-position in a concrete future run, explicitly test the
            five M conditions: knowledge, power/control, predictability, access
            to alternatives, and serious integration attempt.
          linked_attack_ref: "AP-003"
          expected_effect: >
            Clarifies that M ceiling logic blocks unsupported attribution rather
            than assigning low responsibility.
          feeds_next_iteration: true
        - hardening_action_id: "HB-004"
          severity: "high"
          action_type: "add_if_then_criteria"
          instruction: >
            Convert IA-risk into a threshold table: for T, J, TB, and R, state
            the minimum evidence needed for transparent, justified, time-bound,
            and reversible asymmetry, and separately state what would defeat each
            threshold.
          linked_attack_ref: "AP-004"
          expected_effect: >
            Improves IA-box decidability while preserving that AHP does not
            change the IA-box result.
          feeds_next_iteration: true
        - hardening_action_id: "HB-005"
          severity: "high"
          action_type: "add_publicity_guardrails"
          instruction: >
            Add a publicness gradient with medium, audience scale, persistence,
            identifiability, reply access, correction access, reversibility, and
            circulation control before making any stronger statement about
            public accountability or tribunalization.
          linked_attack_ref: "AP-005"
          expected_effect: >
            Prevents publicness-context collapse and improves precision for A-P,
            P-PU, D-P, and IA reversibility fields.
          feeds_next_iteration: true
        - hardening_action_id: "HB-006"
          severity: "medium"
          action_type: "tighten_language_hygiene"
          instruction: >
            Keep D-language paired with D₀ untouched, no D-score, no
            person-level dignity reading, and no shame-based clarity. Replace
            any heavy dignity wording with role-bound, qualitative, reversible
            descriptions.
          linked_attack_ref: "AP-006"
          expected_effect: >
            Reduces D-R / D-P misreading risk without deactivating the D-module
            or weakening dignity-in-practice safeguards.
          feeds_next_iteration: true
        - hardening_action_id: "HB-007"
          severity: "medium"
          action_type: "add_counter_reading"
          instruction: >
            Turn the existing counter-reading list into a falsifier matrix for
            warranted accountability, whistleblowing, legal disclosure,
            procedural correction, democratic publicness, protective
            confidentiality, and confidentiality-as-concealment.
          linked_attack_ref: "AP-007"
          expected_effect: >
            Gives rival readings operational priority and prevents model
            coherence from insulating the main reading against defeat.
          feeds_next_iteration: true
        - hardening_action_id: "HB-008"
          severity: "medium"
          action_type: "separate_observation_vs_evaluation"
          instruction: >
            Add a model-convergence caveat to the uniform report: PMS Core,
            PMS-EDEN, and MIP compatibility is an artifact-quality result, not
            empirical validation, truth, final capture, or application authority.
          linked_attack_ref: "AP-008"
          expected_effect: >
            Reduces weak-justification risk and keeps cross-model fit from
            becoming a hidden validation claim.
          feeds_next_iteration: true
      boundaries_checked:
        does_not_change_A_band: true
        does_not_change_M_band: true
        does_not_change_IA_box_result: true
        does_not_activate_D_module: true
        does_not_create_D_profile: true
        does_not_assign_D_quick_grid_level: true
        does_not_change_transmission_status: true
        attack_points_describe_analysis_not_persons: true

