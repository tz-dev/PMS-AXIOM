        case.uniform_report.addon_overlays.ah_precision.attack_surface_summary.
        Eight analysis vulnerabilities were documented: missing concrete scene
        packet, A-band score-hygiene risk, M-ceiling misread risk, IA-risk
        overread risk, compressed publicness context, D-language risk,
        counter-reading priority gap, and model-convergence validation risk.
      hardening_actions_summary: >
        Legacy mirror only. Canonical field:
        case.uniform_report.addon_overlays.ah_precision.hardening_backlog_summary.
        Eight hardening actions feed the next iteration: add scene packet,
        score-hygiene boundary, M-ceiling check, IA threshold table, publicness
