              alternatives, or power.
          - [medium] D-language risk under exposure and shame vocabulary
            - ID: AP-006
            - Target: case.D_module_optional
            - Type: dignity_language_risk
            - Note: The D-module is correctly activated as a qualitative
              guardrail, but terms such as D-stress, public dignity, shame,
              exposure, and humiliation can become rhetorically heavy. The risk
              is not that the D-module is wrong; the risk is that readers may
              treat D-language as a hidden dignity deficit or moral
