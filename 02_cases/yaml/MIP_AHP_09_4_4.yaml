              accountability, whistleblowing, legal disclosure, procedural
              correction, democratic publicness, or protective confidentiality?
            - Suggested patch: Convert the counter-reading list into an ordered
              falsifier matrix: for each rival reading, state the evidence that
              would support it and the MIP field it would revise, suspend, or
              defeat.
        hardening_backlog_summary: >
          **Hardening Backlog (next iteration):**
          - [high] add_role_context_publicness_precheck: Before any stronger
            run, add a concrete scene packet with role-positions, chronology,
            confidentiality terms, consent or legal/public-interest basis, prior
            repair attempts, harm context, audience scale, safeguards, right of
