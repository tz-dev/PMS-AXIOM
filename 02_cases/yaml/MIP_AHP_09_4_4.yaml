validation:
  AHP_module_semantic_musts:
    AHP_is_optional: true
    default_activation_is_off_in_module: true
    activation_explicitly_enabled_here_by_user_request: true
    requires_existing_structured_MIP_analysis_fields: true
    derives_outputs_only_from_documented_fields: true
    never_invents_hidden_assumptions: true
    never_changes_base_A_M_IA_D_results: true
    never_activates_D: true
    never_creates_person_level_findings: true
    never_upgrades_transmission_status: true
  deprecated_term_handling:
    deprecated_terms_not_used_as_schema_claims: true
    plain_D0_D1D2_noted_only_as_attack_point: true
    preferred_final_terms_used:
      - "MIP"
      - "MIP - Maturity in Practice.yaml"
      - "MIP - Maturity in Practice - AHP Module.yaml"
      - "`D₀`"
      - "`D₁/D₂`"
      - "D-module"
      - "D-profile"
      - "IA-box"
      - "A-score"
      - "M-score"
      - "Precision Heuristic"
      - "case.addons.ah_precision"
      - "analysis artifact"
      - "working note"
  final_AHP_conformity_judgment: >
    PASS: the AHP overlay is complete, bounded, non-rescoring, non-diagnostic,
    analysis-artifact-focused, and correctly appends precision, attack-surface,
    and hardening fields without altering the completed MIP case analysis.