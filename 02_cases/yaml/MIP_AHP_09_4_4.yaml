    legacy_flat_uniform_report_fields:
      deprecated: true
      note: "Retained only for migration from v1.2; canonical output path is case.uniform_report.addon_overlays.ah_precision."
      precision_score_summary: >
        Legacy mirror only. Canonical field:
        case.uniform_report.addon_overlays.ah_precision.precision_heuristic_summary.
        Precision Heuristic: high (6/6). This is not a base score and does not
        rescore A, M, IA, or D.
      attack_surface_summary: >
