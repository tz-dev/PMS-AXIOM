schema_meta_alignment:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  pms_status: repository_reference
  pms_maturity: draft
  repository_role: current_base_schema
  epistemic_status: Disciplined and portable, not final, complete, unique, or immune to revision.
  description_alignment: Structural, non-phenomenological, non-psychological, non-clinical, non-diagnostic, non-prescriptive.
  intended_use_alignment:
    allowed_profiles:
    - theoretical_reflection
    - structural_action_theory
    - anthropology_and_praxeology
    - systems_theory
    - ai_architecture_and_safety
    - model_documentation_and_specification
    - simulation_scaffolding
    - structural_reasoning
    not_intended_for:
    - clinical_diagnosis
    - personality_typing
    - mental_health_risk_assessment
    - automated_moral_judgement
    - individual_person_evaluation
    - forensic_decision_making
    - policy_enforcement
    - irreversible_labeling
  normative_position_alignment:
    ontology: No consciousness, qualia, inner-experience, essence, worth, or ontological dignity claim.
    dignity_clause: D is praxeological restraint, not ranking.
    tragedy_clause: Coherence does not eliminate rupture, tragedy, or non-capture.
    self_binding_clause: Χ, Ψ, and D constrain the application.
  computational_position_alignment:
    representation_clause: YAML is formal encoding, not implementation.
    calibration_clause: Operational use requires calibration, constraints, testing where applicable, evaluation, interpretation, accountability.
    accountability_clause: Translation does not guarantee adequacy or accountability.
    rivalry_clause: PMS does not prove superiority over rivals.
  terminology_alignment:
    praxis: Situated meaningful action modeled structurally.
    meta_axiom: One PMS operator Δ–Ψ.
    operator_composition: Ordered use of PMS meta-axioms.
    derived_construct: Formula-derived construct, not primitive.
    asymmetry_drift_pattern: Derived distortion risk, not diagnosis or verdict.
    repository_reference: PMS.yaml is base reference.
  last_updated: '2026-04-06'
  authors:
  - name: T. Zöller
    role: originator
  - name: ChatGPT (GPT-5.4 Thinking)
    role: formalization_assistant
repository_governance_alignment:
