operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ground/grounded, reason/reasoned, explanation/explanandum, sufficient/insufficient ground, closure/further demand.
    dependency_status: root
    analytic_weight: major
    calibration_points:
    - Specify which distinction is operative.
    - Do not conflate metaphysical, epistemic, semantic, and pragmatic contrasts.
    falsifier_conditions:
    - 'No stable distinction: PMS entry fails.'
    non_capture_note: PMS may not capture all formal distinctions.
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: Further-ground demand; structural or argumentative, not psychological desire.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Locate the demand.
    - Do not infer mental drive.
    falsifier_conditions:
    - 'No further-ground demand: ∇ fails.'
    non_capture_note: Demand may be rejected by rival theories.
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: Philosophical grounding/explanation/reason/justification frame.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Name the frame.
    - Mark frame shifts.
    falsifier_conditions:
    - 'No frame: analysis under-discriminates.'
    non_capture_note: Other frames may dominate.
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Non-arrival of terminal ground or closure within a closure-expecting frame.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Specify expected closure.
    - Absence may indicate rival theory or non-capture.
    falsifier_conditions:
    - 'No closure expectation: Λ weakens.'
    non_capture_note: Infinitism or coherentism may legitimize non-closure.
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Recurrent pattern: each ground becomes a new item needing ground.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Show iteration.
    - Distinguish recurrence from one unresolved question.
    falsifier_conditions:
    - 'No recurrence: Α over-read.'
    non_capture_note: Formal recurrence may exceed PMS.
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Weak dependency-asymmetry between ground and grounded only; no social or moral asymmetry.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Specify dependency-direction only.
    - Do not moralize.
    - Keep weak without roles or vulnerability.
    falsifier_conditions:
    - 'Symmetric or accepted circular support: Ω removed or weak.'
    non_capture_note: May be better formalized outside PMS.
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ordered seriality of grounding demand; logical/explanatory, not necessarily chronological.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Distinguish order from empirical time.
    - Treat as continuation only.
    falsifier_conditions:
    - 'No sequence: Θ overextended.'
    non_capture_note: Formal order may not be PMS temporality.
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Conditional reframing: foundationalist, coherentist, infinitist, pragmatic, semantic, deflationary, or PMS.'
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Name source and target frames.
    - Do not absorb all rivals as Φ.
    falsifier_conditions:
    - 'All non-fit as Φ: over-assimilation.'
    non_capture_note: Rivals may displace PMS.
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Application discipline: suspend verdict, preserve reversibility, avoid forced closure.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Prevent tribunal/proof/diagnosis.
    - Distance is active restraint, not neutrality.
    falsifier_conditions:
    - Forcing verdict invalidates application.
    non_capture_note: Distance may reveal PMS limits.
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Weak: integration is at issue but not achieved; PMS coherence is not sufficient.'
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Distinguish integration from smoothing.
    - Compare rival resolutions.
    falsifier_conditions:
    - 'Coherence as proof: Σ overclaimed.'
    non_capture_note: Some resolutions may be non-PMS.
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Not case content; no agent or self-relation. Only application self-binding discipline.
    dependency_status: not_active
    analytic_weight: minor
    calibration_points:
    - Use only for analysis discipline or specified theory.
    - Do not attribute selfhood to regress.
    falsifier_conditions:
    - 'Ψ without Σ, Θ, Χ in scope: under-specified.'
    non_capture_note: Not a selfhood case.
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.
    case_function: 'Primary: distinction, demand, frame, non-closure, recurrence.'
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.
    case_function: 'Partial: weak dependency-asymmetry and ordered seriality.'
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.
    case_function: Conditional reframing, application distance, weak integration.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.
    case_function: Not case content; application discipline only.
dependency_logic:
  status: dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: Ground/grounded distinction.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: Further-ground demand.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: Grounding frame.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Absent closure.
  - operator: Α
    dependency_check: depends_on_Δ_and_∇_and_□_and_Λ
    satisfied_by: Iterated demand.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Weak dependency-asymmetry.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Ordered seriality.
  - operator: Φ
    dependency_check: depends_on_Θ_and_Ω_and_□
    satisfied_by: Conditional reframing.
  - operator: Χ
    dependency_check: depends_on_Φ_and_Θ_and_□
    satisfied_by: Application distance.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Weak integration.
  - operator: Ψ
    dependency_check: depends_on_Σ_and_Θ_and_Χ
    satisfied_by: Application self-binding only.
  dependency_failure_conditions:
  - 'Later operator without dependencies: under-specified or invalid.'
  - 'Smooth full-chain totalization: high coherence risk.'
  - Inactive operators must not be forced.
