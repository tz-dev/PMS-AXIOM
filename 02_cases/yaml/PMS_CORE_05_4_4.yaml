core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: PMS analyzes enactments, roles, and praxis structures, not persons as essences.
    status: satisfied
    case_application: Abstract regress is treated as structure, not psychology or ontology.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: Δ–Ψ are the PMS operator inventory; completeness remains open.
    status: satisfied
    case_application: Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ are used.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P3_generativity:
    id: P3
    title: Generativity
    base_text: Derived structures arise from operator compositions.
    status: satisfied
    case_application: A, C, R, E, D, SELF_FIXPOINT, and drift patterns are formula-derived.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: Ω and Θ are central under asymmetry and time.
    status: partial
    case_application: Θ is seriality; Ω is weak dependency-direction only.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: Representation is not implementation or adequacy.
    status: satisfied
    case_application: YAML is not implementation or validation.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: Rival grammars remain open.
    status: satisfied
    case_application: Metaphysical, epistemic, semantic, foundationalist, coherentist, infinitist, pragmatic, and deflationary readings remain
      open.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: PMS translation is not exhaustive capture.
    status: satisfied
    case_application: Ontology, formal infinitude, brute facts, circularity, infinitism, and deflation may exceed PMS.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: PMS is not diagnostic, clinical, forensic, or person-ranking.
    status: satisfied
    case_application: No diagnosis, maturity verdict, or person evaluation is made.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: Applications stay tied to scenes, roles, and structures.
    status: partial
    case_application: No concrete scene; reading is case-type-bound.
    failure_condition: Fails if PMS is overextended, redefined, or used as verdict.
