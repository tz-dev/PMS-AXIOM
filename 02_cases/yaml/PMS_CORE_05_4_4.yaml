    relative to that frame; the demand recurs; weak dependency-direction may be marked; and the sequence continues as regress.
  formula_caution: The formula is intentionally not extended into full Ψ unless self-binding conditions are supplied. Φ and Σ remain conditional
    because reframing or integration would require an explicit resolution strategy or rival comparison.
  final_validity_status: valid_with_limits
  final_claim_boundary: PMS-internal conceptual projection only; not empirical truth, metaphysical truth, diagnostic truth, clinical assessment,
    legal/forensic validity, implementation validity, moral ranking, ontological claim, or PMS Base validation.