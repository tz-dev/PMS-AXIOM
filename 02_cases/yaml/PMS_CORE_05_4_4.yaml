analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - PMS-internal structural projection
    not_claimed:
    - empirical_finding
    - metaphysical_proof
    - phenomenological_account
    - diagnostic_assessment
    - clinical_assessment
    - legal_or_forensic_judgment
    - implementation_claim
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The analysis may organize the philosophical problem-form structurally, but it cannot infer concrete praxis, lived experience,
      agency, institutional responsibility, empirical recurrence, or metaphysical truth.
  coherence_risk:
    status: high
    reason: Grounding regress maps readily onto Δ, ∇, □, Λ, Α, and Θ, so the PMS reading can become too smooth and may appear stronger than
      its actual discriminative warrant.
    mitigation: Keep Ω, Φ, Σ, and Ψ weak or conditional where the case does not supply their entry conditions; preserve rival readings; require
      falsifiers; do not treat PMS coherence as solution, proof, or validation.
  coverage_vs_discrimination:
    coverage_result: PMS covers the minimal regress-form as differentiation, further-ground demand, framing, absent closure, recurrence, weak
      dependency-direction, and ordered continuation.
    discrimination_requirement: The reading must still distinguish closure-seeking regress, benign infinitism, foundationalist stopping,
      coherentist mutual support, pragmatic stopping, semantic deflation, and cases where the regress is a feature rather than a defect.
    discrimination_status: partial
    under_discrimination_risk: If every form of non-closure is coded as Λ plus Α plus weak Σ, PMS becomes descriptive rather than discriminative.
      The analysis must therefore mark when non-closure is a problem only relative to a closure-expecting frame.
  discrimination_tests:
  - id: DT1
    test: Closure-seeking regress vs no-closure-required frames.
    expected_pms_distinction: Λ is strong only when □ includes an expectation of closure.
    current_status: partially_satisfied
  - id: DT2
    test: Dependency-asymmetry vs social, moral, institutional, or diagnostic asymmetry.
    expected_pms_distinction: Ω remains weak unless the case supplies roles, exposure, capacity imbalance, power, or obligation.
    current_status: satisfied
  - id: DT3
    test: Recontextualization vs rival formalization.
    expected_pms_distinction: Φ may describe a reframing move, but rival metaphysical, epistemic, semantic, infinitist, coherentist, or
      deflationary readings must not be reduced to PMS-internal recontextualization.
    current_status: partially_satisfied
  - id: DT4
    test: Integration vs premature closure.
    expected_pms_distinction: Σ is not achieved merely because the PMS chain is coherent; integration would require explicit criteria for
      resolving or stabilizing the regress without erasing rival readings.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: What distinction is operative?
    current_calibration: satisfied; ground/grounded and explanation/explanandum distinctions are available, but their metaphysical or epistemic
      type remains unspecified.
  - operator: ∇
    question: What demands further ground?
    current_calibration: satisfied; the case supplies a further-ground demand, but this is structural and argumentative, not psychological.
  - operator: □
    question: Which frame is active?
    current_calibration: satisfied at a general level; the frame is grounding, explanation, reason, or justification, but the case does not
      choose one domain.
  - operator: Λ
    question: Is closure expected?
    current_calibration: partial; non-arrival of a terminal ground matters only if the operative frame expects such termination.
  - operator: Α
    question: Does demand recur?
    current_calibration: satisfied; recurrence is central to the regress-form, though no empirical recurrence is claimed.
  - operator: Ω
    question: Is asymmetry more than dependency?
    current_calibration: weak; only dependency-direction is available, not social, moral, diagnostic, or institutional asymmetry.
  - operator: Θ
    question: What kind of sequence is this?
    current_calibration: partial; the sequence may be logical, explanatory, argumentative, or temporal, and the case does not decide among them.
  - operator: Φ
    question: What reframing occurs?
    current_calibration: weak; possible reframings are available, but no single reframing is selected by the case material.
  - operator: Χ
    question: Is distance maintained?
    current_calibration: satisfied; the application avoids verdict, closure, tribunal use, person-ranking, and PMS Base validation.
  - operator: Σ
    question: Is integration discriminative?
    current_calibration: weak; PMS coherence organizes the case but does not by itself integrate or solve the regress.
  - operator: Ψ
    question: Is self-binding in scope?
    current_calibration: weak; no self-binding agent, institution, system, or identity trajectory is supplied.
  possible_non_capture:
    status: kept_open
    zones:
    - metaphysical grounding
    - epistemic justification
    - formal infinitude
    - semantics of because
    - brute facts
    - coherentism
    - infinitism
    - pragmatic closure
    - deflationary dissolution
    - cases where regress is constitutive rather than defective
    rule: Do not redescribe resistance, absence, non-fit, rival framing, unresolvedness, or lack of closure as drift, residue, incomplete
      integration, incomplete calibration, recontextualization, or maturity failure by default.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - metaphysical grounding
    - epistemic justification
    - explanatory regress
    - semantic or linguistic analysis
    - foundationalism
    - coherentism
    - infinitism
    - pragmatism
    - semantic deflation
    rule: Rivals remain open absent explicit comparison; their availability weakens any PMS-only closure claim.
  falsifier_conditions:
  - id: F1
    condition: A purely formal, metaphysical, or semantic account that explains the regress without PMS-relevant praxis would weaken the PMS
      reading.
  - id: F2
    condition: Failure to distinguish vicious regress from benign infinitism, coherentist support, foundationalist stopping, or pragmatic
      closure would show under-discrimination.
  - id: F3
    condition: Treating non-fit, disagreement, unresolved absence, or rival formalization as PMS drift or failed Σ would show over-assimilation.
  - id: F4
    condition: Treating weak dependency-direction as moral, social, diagnostic, or institutional Ω would invalidate the bounded reading.
  - id: F5
    condition: Treating the coherent PMS formula as a solution to grounding regress or as PMS Base validation would be an overclaim.
  final_quality_status:
    result: usable_with_limits
    reason: The case supports a bounded conceptual PMS projection with high coherence risk, preserved rival readings, and no empirical,
      metaphysical, diagnostic, legal, clinical, implementation, or PMS Base validation claim.
