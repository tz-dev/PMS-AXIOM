case_synthesis:
  primary_pms_reading: Grounding regress is structurally legible as a framed, recurrent, ordered further-ground demand in which closure is
    suspended relative to a frame that expects or seeks grounding sufficiency. Ω is included only as weak dependency-direction, not as social,
    moral, institutional, diagnostic, or person-level asymmetry.
  continuity_condition: The PMS reading holds only while the case preserves a differentiated ground/grounded relation, a further-ground demand,
    a frame in which that demand is relevant, a meaningful non-arrival of closure, and recurrence of the demand.
  change_condition: The reading changes if the frame is recontextualized as foundationalist stopping, coherentist mutual support, infinitist
    acceptance, pragmatic sufficiency, semantic deflation, or another rival formalization. Such changes must not automatically be treated as PMS
    drift or incomplete integration.
  rupture_or_non_fit_condition: Rupture, resistance, disagreement, absence, unresolvedness, and non-fit may indicate rival formalization or
    non-capture. They are not by themselves evidence of incomplete calibration, failed Σ, failed maturity, or PMS-invalidating disorder.
  responsibility_condition: R is not applicable unless a self-binding agent, system, institution, theory, or role-position is explicitly supplied
    and can be analyzed through Ψ, Φ, Θ, and Ω without overclaim.
  dignity_condition: D functions only as praxeological application restraint: no ranking, no shaming, no tribunal use, no person-type inference,
    and no ontological dignity claim.
  rival_reading_condition: Rival readings remain open until compared by explicit criteria. PMS organization may clarify the regress-form but does
    not settle the metaphysical, epistemic, semantic, or pragmatic dispute.
