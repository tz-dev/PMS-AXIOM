core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological essences.
    status: satisfied
    case_application: >-
      The case is treated as a structure of praxis and frame-relative trajectory incompatibility, not as a claim about persons, psychological essences, inner states, or ontology.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization and critique.
    status: satisfied
    case_application: >-
      Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators. No new operator, layer, or axiom is introduced.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged to PMS Base.
  P3_generativity:
    id: P3
    title: Generativity
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action, dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator compositions rather than introduced as independent primitives.
    status: satisfied
    case_application: >-
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are treated as formula-derived PMS structures rather than independent primitives.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes.
    status: partial
    case_application: >-
      Θ carries major analytic weight because the case explicitly concerns trajectories. Ω remains weak and conditional because the material does not specify power, exposure, capacity, vulnerability, or obligation imbalance.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without calibration.
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply direct implementation, guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints, and evaluation.
    status: satisfied
    case_application: >-
      This YAML representation is a case-application encoding only. It is not an implementation, empirical validation, computational proof, or direct operational model of conflict.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models, or more empirically grounded formalisms remains methodologically open.
    status: satisfied
    case_application: >-
      Rival readings remain open, including logical contradiction, semantic incommensurability, institutional rule collision, systems differentiation, game-theoretic conflict, material scarcity, and tragic pluralism.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default.
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms of praxis may remain only partially legible or may resist assimilation within the current grammar.
    status: satisfied
    case_application: >-
      The analysis preserves zones where incompatibility may remain outside PMS capture and must not be automatically redescribed as drift, failed integration, incomplete calibration, or maturity failure.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions.
    status: satisfied
    case_application: >-
      No diagnosis, clinical category, personality type, risk assessment, person ranking, or forensic judgment is made.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global person-labels and irreversible ontological attributions are out of scope.
    status: partial
    case_application: >-
      Because no concrete scene is provided, the reading is explicitly case-type-bound as a conceptual projection rather than scene-bound as an applied event analysis.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized claims.
pms_model_reference_application:
  ordering_status:
    interpretation: >
      The PMS default order is treated as the current repository dependency path. It is not treated as uniquely necessary, final, or proof of PMS completeness.
    repository_role: >
      This case follows PMS_1.3 order and dependencies unless explicitly marked as critique or rival formalization.
  operator_inventory:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  operator_inventory_status: no_additional_pms_operators_introduced
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Δ is active because the case requires distinguishable trajectories, frames, norms, concepts, practices, or institutional logics. The primary distinction is between local coherence within a frame and incompatibility across frames.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - 'Specify which trajectories or frames are differentiated: practical, conceptual, institutional, normative, procedural, or interpretive.'
    - Do not treat mere difference as conflict; conflict requires additional conditions such as incompatible coordination, temporal development, frame collision, asymmetry, non-event, or blocked integration.
    falsifier_conditions:
    - If no stable distinction between frames or trajectories can be identified, the PMS reading loses its entry point and should be withdrawn or reframed as non-PMS.
    non_capture_note: >
      Difference alone does not prove PMS capture.
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      ∇ is active because trajectories imply directional tension: each frame tends toward continuation, interpretation, enactment, stabilization, or institutional reproduction. The tension is structural, not a claim about subjective desire.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Specify whether the directional tension is practical, conceptual, institutional, normative, explanatory, or procedural.
    - Do not infer subjective desire, will, affect, intention, or psychology from structural trajectory language.
    falsifier_conditions:
    - If the differentiated frames have no directional pressure, orientation, continuation tendency, or activation, ∇ is under-specified and should be weakened.
    non_capture_note: >
      Impulse is structural directedness, not psychological attribution.
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      □ is active because the case explicitly states that each trajectory remains locally coherent within its own frame. Frames constrain relevance, coherence, and the conditions under which incompatibility appears.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'Name the active frames before making applied claims: practical frame, conceptual frame, institutional frame, normative frame, procedural frame, or interpretive frame.'
    - Mark frame shifts explicitly; do not treat one frame's criteria as automatically valid inside another frame.
    falsifier_conditions:
    - If no frame can be specified, the analysis becomes too abstract to discriminate conflict from generic difference or contradiction.
    non_capture_note: >
      Frame assignment must remain revisable.
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Λ is weak and conditional. It becomes relevant only if structural incompatibility involves a meaningful absence, delayed coordination, failed mediation, missing translation, non-occurring reconciliation, or unresolved expected convergence within a frame.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Specify the expected occurrence and the frame in which its absence matters, such as expected coordination, translation, recognition, mediation, convergence, or decision.
    - Preserve the possibility that absence marks PMS non-capture or rival incommensurability rather than a defect within the case.
    falsifier_conditions:
    - If no structured expectation is present, Λ should remain inactive or weak and should not be asserted as a case finding.
    non_capture_note: >
      Non-event should not be inferred from absence of evidence.
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Α is moderately active because trajectories suggest some stabilization, recurrence, or path dependence. It is not fully established because the case material does not provide repeated episodes, institutional routines, or empirical recurrence.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Show recurrence, stabilization, or path dependence rather than merely naming a trajectory.
    - Distinguish stable attractor formation from one-time incompatibility or accidental aggregation of differences.
    falsifier_conditions:
    - If recurrence, stabilization, or path dependence is not shown, Α is over-read and should remain only a conceptual possibility.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Ω is weak and conditional. Conflict may involve power, exposure, capacity, vulnerability, obligation, or institutional role asymmetry, but the provided material does not specify any such imbalance.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - 'Specify the direction and kind of asymmetry before activating Ω: power, exposure, capacity, obligation, vulnerability, responsibility, or role differentiation.'
    - Do not moralize asymmetry or infer culpability from it.
    - Allow Ω to remain weak or absent where the case only shows incompatibility without structural imbalance.
    falsifier_conditions:
    - If no directional imbalance is identifiable, Ω claims must be removed or marked weak rather than inferred from conflict itself.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Θ is active because the case explicitly concerns trajectories: structures that persist, develop, sequence, or become incompatible over time. PMS dependency hygiene nevertheless requires caution because full Θ depends on Ω and Α, and Ω is only weakly supported here.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Distinguish diachronic trajectory from static comparison or isolated logical contradiction.
    - Check whether temporality is essential to the conflict or whether a non-temporal rival formalization explains it more sharply.
    falsifier_conditions:
    - If temporal extension is not required, Θ is overextended and the case may be better modeled as static contradiction, semantic ambiguity, or local-global inconsistency.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Φ is active as an analytic test because the conflict appears when locally coherent structures are placed across frames, compared, translated, coordinated, or recontextualized. In this case, Φ does not mean that conflict is resolved by reframing. It names the structural operation by which a trajectory that was coherent in one frame becomes newly legible, unstable, incompatible, or falsely assimilated when placed in another frame. It must not be used as automatic repair, automatic higher synthesis, or retrospective absorption of rival frames into PMS.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - 'Name source and target frames before claiming recontextualization: for example, conceptual-to-practical, institutional-to-conceptual, or one institutional frame to another.'
    - Check whether recontextualization clarifies incompatibility, transforms it, worsens it, produces only partial translation, or falsely absorbs a genuine non-fit.
    - Distinguish recontextualization from explanatory victory: a successful PMS reframing may still fail to capture the conflict exhaustively.
    falsifier_conditions:
    - If every rupture, resistance, disagreement, or rival framing is absorbed as Φ, the reading is over-assimilative and loses non-capture discipline.
    - If the source frame and target frame cannot be specified, Φ should be weakened or removed rather than treated as a default explanation.
    non_capture_note: >
      Recontextualization must preserve possible non-capture and must not transform all non-fit into latent PMS integration.
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Χ is active as the application condition and analytic stance. The reading maintains reflective distance by suspending verdict, preserving reversibility, avoiding person-ranking, and refusing to force conflict into PMS drift or failed maturity. In this case, Χ carries special weight because the object is philosophical conflict itself: without Distance, the analysis would too easily become a tribunal deciding which frame is more mature, better integrated, or more PMS-compatible. Χ therefore protects the analysis from premature adjudication, from smoothing incompatibility into coherence, and from converting structural tension into a hidden hierarchy.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Check whether the analysis suspends verdict and preserves reversibility rather than enforcing a single integrative result.
    - Distinguish Distance from avoidance, denial, empty neutrality, disengagement, or refusal to acknowledge consequences in an applied scene.
    - Confirm that Distance is not being used to neutralize conflict politically, institutionally, or morally where a concrete scene would require external standards.
    falsifier_conditions:
    - If Χ is suspended to force a verdict, rank a frame, diagnose a party, or claim exhaustive PMS capture, the PMS application becomes invalid.
    - If Χ becomes a method for evading concrete accountability in an applied scene, the reading must be reclassified and externally constrained.
    non_capture_note: >
      Distance protects against overclaiming and premature closure, but it is not itself proof of adequate understanding.
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Σ is weak and contested. The case raises the question of whether conflicting trajectories can be coordinated or synthesized, but it does not show that integration is possible, required, mature, or adequate. This is one of the central calibration points of the case: the existence of locally coherent but mutually incompatible trajectories may indicate under-integration, but it may also indicate genuine non-integrability, tragic pluralism, incompatible institutional mandates, semantic incommensurability, or a conflict whose resolution would require coercive assimilation. PMS coherence must therefore remain a testable structural proposal, not a sufficient result.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Test whether integration discriminates among genuine synthesis, partial coordination, false smoothing, coercive assimilation, and non-integrable pluralism.
    - Distinguish integration from forced coherence; PMS coherence is not sufficient by itself.
    - Require evidence or formal criteria before treating lack of integration as defect, immaturity, drift, or incomplete calibration.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy or every incompatibility is redescribed as incomplete Σ, Σ is overclaimed.
    - If integration would erase a legitimate rival frame or suppress a structurally valid non-fit, Σ must be marked false, coercive, or not applicable rather than mature.
    non_capture_note: >
      PMS coherence is insufficient by itself, and not every conflict ought to be integrated.
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: >-
      Ψ is weak and conditional. It becomes relevant only if a trajectory is bound into durable commitment, institutional self-relation, stable normativity, responsibility-as-self-commitment, or analytic self-binding. The abstract case does not establish literal selfhood. In this application, Ψ is most securely present as a discipline imposed on the analysis itself: the PMS reading must bind itself to its own guardrails, including reversibility, non-capture, non-diagnosis, and non-validation. As case content, however, Ψ remains unestablished unless a concrete agent, institution, practice, or role is shown to maintain a commitment across time.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Apply Ψ only where durable commitment, self-binding, institutional norm-stability, or analytic self-binding is actually in scope.
    - Do not attribute selfhood, consciousness, or personal identity to abstract conflict, concepts, or institutions unless explicitly scoped as structural self-binding rather than literal subjectivity.
    - Distinguish analytic self-binding of the PMS application from substantive self-binding within the case material.
    falsifier_conditions:
    - If Ψ is applied without Σ, Θ, and Χ, or without a defined self-binding structure, the self-binding reading is under-specified.
    - If SELF_FIXPOINT is treated as evidence of consciousness, metaphysical selfhood, or moral superiority, the reading violates PMS discipline.
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.
    case_function: >-
      L1 structures the case by distinguishing trajectories (Δ), directional tensions (∇), local frames (□), possible missing coordination or translation (Λ), and possible stabilization or path dependence (Α).
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.
    case_function: >-
      L2 is only partially active. Θ is central because the case concerns trajectories, while Ω remains weak because no specific power, exposure, capacity, vulnerability, or obligation asymmetry is provided.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.
    case_function: >-
      L3 provides the main calibration test: Φ examines cross-frame recontextualization, Χ preserves reversible distance, and Σ remains a contested question rather than an assumed resolution.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.
    case_function: >-
      L4 is analytic-only or conditional. Ψ is relevant only where a trajectory is durably self-bound as a commitment, institutional norm-stability, or structural self-relation; the abstract case does not establish that.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case explicitly requires distinguishable practical, conceptual, or institutional trajectories.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: The word trajectory implies directional continuation or tension arising from differentiated frames.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: The material explicitly states that each trajectory remains locally coherent within its own frame.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: 'Only weakly supported: a non-event would require an expected coordination, mediation, translation, or convergence that fails.'
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: 'Only weakly supported: trajectory language suggests stabilization, but recurrence or path dependence is not evidenced.'
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: 'Only weakly supported: structural incompatibility may involve asymmetry, but no imbalance of power, exposure, capacity, vulnerability, or obligation is specified.'
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Strongly indicated by trajectory language, but full PMS dependency remains weak because Ω is not established.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Supported as cross-frame comparison or placement of locally coherent structures into another frame, but full activation remains dependency-limited by weak Ω.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: 'Maintained as application discipline: the reading suspends verdict and preserves non-capture and reversibility.'
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: 'Only weakly supported: integration is at issue but not shown to be possible, required, or sufficient.'
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: 'Only weakly supported: self-binding requires durable commitment or structural self-relation not provided by the abstract case.'
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
