schema_version: PMS_1.3
schema_role: case_application
analysis_mode: axiomatic
template_status: pms_yaml_aligned_case_application_template
template_purpose: >
  Template for rendering a PMS_1.3-conformant case analysis. This template applies PMS.yaml as repository reference. It does not replace PMS.yaml, redefine PMS Base, introduce new PMS operators, or treat derived structures as independent primitives.
repository_reference:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  reference_file: PMS.yaml
  reference_status: repository_reference
  repository_role: current_base_schema
  reference_last_updated: '2026-04-06'
  base_schema_status: repository_reference
  compliance_note: >
    This case analysis applies PMS_1.3 as the current repository reference. It does not redefine PMS operators, alter the default repository order, introduce new meta-axioms, treat derived axes as independent primitives, override PMS application guardrails, or claim PMS Base validation.
  referenced_base_sections:
  - pms_entry_condition
  - schema_version
  - schema_meta
  - repository_governance
  - core_principles
  - pms_model_reference
  - derived_structures
  - example_operator_chains
  - computational_representation
  - ai_interface_pms
  application_schema_note: >
    This document is an application schema. It is permitted as an overlay or application scaffold under PMS repository governance, provided it remains explicitly subordinated to PMS.yaml and does not silently revise PMS Base.
schema_meta_alignment:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  pms_status: repository_reference
  pms_maturity: draft
  repository_role: current_base_schema
  epistemic_status: >
    PMS_1.3 is treated as strong, formally disciplined, and portable, but not final, complete, uniquely ordered, or immune to revision.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological, non-psychological, non-clinical, non-diagnostic, non-prescriptive operator grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
    - theoretical_reflection
    - structural_action_theory
    - anthropology_and_praxeology
    - systems_theory
    - ai_architecture_and_safety
    - model_documentation_and_specification
    - simulation_scaffolding
    - structural_reasoning
    not_intended_for:
    - clinical_diagnosis
    - personality_typing
    - mental_health_risk_assessment
    - automated_moral_judgement
    - individual_person_evaluation
    - forensic_decision_making
    - policy_enforcement
    - irreversible_labeling
  normative_position_alignment:
    ontology: >
      The case analysis makes no PMS-based claims about consciousness, qualia, inner experience, metaphysical essence, moral worth, or ontological dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological application constraint concerning restraint and protection under asymmetry, not as a metaphysical ranking of beings.
    tragedy_clause: >
      The case analysis does not assume that structural maturity, responsibility, or integration eliminates tragedy, loss, conflict, or irreducible tension.
    self_binding_clause: >
      The analysis itself remains subject to PMS application discipline: Distance (Χ), reversibility, self-binding restraint (Ψ), and Dignity-in-Practice (D) must not be suspended in order to force clarity, closure, authority, urgency, or verdict.
  computational_position_alignment:
    representation_clause: >
      YAML representation is a formal case-encoding only. It is not a direct implementation of praxis, cognition, agency, morality, diagnosis, or institutional decision-making.
    calibration_clause: >
      Any operational use of this case analysis would require context-specific calibration, implementation constraints, external evaluation, and accountability.
    accountability_clause: >
      Formal translation into PMS terms does not by itself guarantee public intelligibility, intersubjective uptake, empirical adequacy, legal validity, clinical validity, or external accountability.
    rivalry_clause: >
      Machine-readable PMS representation does not settle whether PMS is more discriminating than rival grammars or simply more assimilative across heterogeneous cases.
repository_governance_alignment:
  pms_yaml_priority: true
  application_schema_subordinate: true
  no_base_revision: true
  no_operator_addition: true
  no_operator_redefinition: true
  no_dependency_revision: true
  no_derived_axis_primitive_status: true
  no_guardrail_override: true
  note: >
    The template is used only as a case-output schema. PMS.yaml remains the only PMS Base reference.
pms_entry_condition:
  requirement: >
    Any use of PMS as an application presupposes acceptance of distance (Χ), reversibility, and dignity-in-practice (D; a praxeological constraint, not ontological worth). This condition applies to application, not to critique, refusal, revision, or rejection. Applications that suspend these conditions are formally invalid as PMS applications within the present usage convention.
  applies_to: application_only
  does_not_apply_to:
  - critique
  - refusal
  - rejection
  - revision_proposals
  - rival_formalization
  application_gate:
    status: accepted_for_this_application
    conditions:
      Distance_Chi:
        status: maintained
        meaning: >
          Reflective distance is maintained; the analysis does not fuse PMS into verdict, urgency, enforcement, closure, or person-level attribution.
      reversibility:
        status: maintained
        meaning: >
          Structural readings remain revisable, bounded, non-final, and non-totalizing.
      Dignity_in_Practice_D:
        status: maintained
        meaning: >
          The analysis maintains enacted restraint under asymmetry and does not shame, rank, humiliate, or ontologically evaluate persons or groups.
    gate_result: valid_as_pms_application
application_discipline:
  self_binding_clause:
    status: active
    statement: >
      Any application of PMS is itself subject to PMS. Analyses that suspend Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in order to enforce truth, clarity, authority, resolution, or action are formally invalid as PMS applications within the present usage convention, even if PMS terminology is retained.
    application_to_this_case: >-
      The analysis remains self-bound by treating the PMS reading as reversible, bounded, non-totalizing, and non-verdictive. It does not force structural incompatibility to become PMS drift, failed integration, maturity failure, diagnosis, legal judgment, implementation claim, or proof of PMS Base. In this case, self-binding primarily constrains the analystic operation itself: the analysis must not use the elegance of the PMS operator sequence to erase rival formalizations, silence non-capture, or convert conceptual incompatibility into a hidden maturity hierarchy.
  application_only_boundary:
    status: active
    statement: >
      PMS can be criticized, revised, rejected, ignored, or compared with rival formalizations without satisfying the PMS entry condition. The entry condition governs only applications that claim to use PMS.
  non_capture_rule:
    status: active
    statement: >
      Translation into PMS terms does not prove exhaustive capture. Resistance, rupture, disagreement, non-fit, or rival framing must not automatically be redescribed as drift, failed integration, incomplete calibration, or structured absence. For this case, non-capture is especially important because structural incompatibility may name genuine pluralism, formal contradiction, institutional rule-collision, semantic incommensurability, or material conflict rather than a PMS-internal failure of integration or recontextualization.
  no_pms_base_revision:
    status: active
    statement: >
      This case does not alter PMS Base, PMS operators, PMS dependencies, derived structures, guardrails, or repository governance.
case:
  title: Conflict as structural incompatibility
  interpretation_type: conceptual_domain_projection
  case_type: philosophical_structural_conceptual_projection
  claim_status: conceptual_pms_projection
  not_a_concrete_scene: true
  empirical_status: not_empirical
  result_status: reversible_case_bound_projection
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >-
    The case analyzes conflict in a philosophical structural sense: practical, conceptual, or institutional trajectories may remain locally coherent within their own frames while becoming structurally incompatible under cross-frame comparison, coordination pressure, temporal extension, or attempted recontextualization.
  non_scope: >-
    The analysis does not claim metaphysical proof, phenomenological description, diagnostic judgment, clinical assessment, legal or forensic criterion, empirical validation, implementation, person-ranking, maturity ranking, or PMS Base validation.
  non_goals:
  - metaphysical_proof
  - diagnostic_assessment
  - legal_or_forensic_judgment
  - person_ranking
  - irreversible_labeling
  - pms_base_validation
  case_typing_note: >-
    This is not a concrete praxis scene. It is a conceptual domain projection that uses PMS_1.3 as an operator grammar for testing whether structural incompatibility can be rendered without erasing rival formalizations or possible non-capture.
