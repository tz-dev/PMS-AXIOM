ai_interface_pms_alignment:
  welcome_message: >
    This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic, non-clinical, non-prescriptive, and non-metaphysical in its claims.
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: >-
      Axiomatic mode is used to inspect how Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ can or cannot be activated by the abstract conflict case without revising PMS Base.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis.
    case_status: active
    case_application: >-
      Derived axes mode is used only formula-derivatively: A, C, R, E, and D are projected from PMS operators and marked active, weak, under-specified, not applicable, or application-constraining.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing.
    case_status: not_applicable
    case_application: >-
      AI architecture mode is not applicable because the case provides no agent architecture, computational design, safety specification, implementation environment, or deployment claim.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Θ
    - Φ
    - Χ
    - Σ
    - Λ_conditional
    - Α_conditional
    - Ω_conditional
    - Ψ_conditional
    asymmetries_and_temporal_trajectories_visible: >-
      Θ is visible because the case is framed in terms of trajectories. Ω is not directly visible; it remains conditional unless specific power, exposure, capacity, vulnerability, obligation, or role-gradient asymmetries are supplied.
    recontextualization_distance_integration: >-
      Φ is relevant where a locally coherent trajectory is placed in another frame or cross-frame coordination is attempted. Χ is required to keep the analysis reversible and non-verdictive. Σ is at issue but weak because integration may be possible, partial, coercive, false, or impossible.
    derived_axes_projection: >-
      Awareness_A is active structurally; Coherence_C is weak-to-active locally but not globally; Responsibility_R is not established; Action_E is under-specified; Dignity_in_Practice_D is an application constraint rather than ontological dignity.
    tentative_calibration_rivalry: >-
      Λ, Α, Ω, Σ, and Ψ remain calibration-dependent. Rival readings such as logical contradiction, semantic incommensurability, institutional rule conflict, systems differentiation, material scarcity, or tragic pluralism remain open.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - pms_internal_operator_mapping
    - reversible_structural_pre_application
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: >-
      This case type permits bounded structural projection and operator calibration. It does not permit empirical findings, concrete scene conclusions, legal or forensic judgments, diagnosis, implementation claims, person-ranking, metaphysical claims, or PMS Base validation.
  coherence_risk:
    status: high
    reason: >-
      The PMS reading risks becoming too smooth because abstract conflict can be mapped onto many PMS operators without enough scene-level discrimination. High coherence would not prove adequacy, sufficiency, or capture.
    mitigation: >-
      The reading is constrained by operator calibration, weak-status marking, rival readings, non-capture zones, falsifier conditions, and the rule that incompatibility is not automatically failed integration or drift.
  coverage_vs_discrimination:
    coverage_result: >-
      PMS covers frame-relative local coherence, trajectory language, cross-frame comparison, possible non-event, possible attractor formation, possible asymmetry, and the discipline required for reversible non-capture.
    discrimination_requirement: >-
      The reading must distinguish structural incompatibility from mere difference, static contradiction, semantic incommensurability, material scarcity, institutional rule collision, power conflict, and genuine non-integrable pluralism.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish structural incompatibility from mere difference.
    expected_pms_distinction: >-
      Δ alone is insufficient; conflict requires additional structure such as ∇, □, Θ, Φ, Λ, Ω, or contested Σ.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish non-integrable pluralism from failed integration or PMS drift.
    expected_pms_distinction: >-
      Σ must remain weak or contested unless integration is shown to be possible and non-coercive; AD_A>>E and AD_Sigma_low require their own structural evidence.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: Difference is calibrated by identifying distinct trajectories or frames rather than assuming opposition.
    current_calibration: satisfied
  - operator: ∇
    question: Impulse is calibrated by showing directional continuation or tension, not subjective desire.
    current_calibration: partial
  - operator: □
    question: Frame is calibrated by naming the local coherence conditions of each trajectory.
    current_calibration: partial
  - operator: Λ
    question: Non-Event is calibrated only by an expected coordination, translation, mediation, or convergence that does not occur.
    current_calibration: weak
  - operator: Α
    question: Attractor is calibrated by recurrence, stabilization, or path dependence beyond a single incompatibility.
    current_calibration: weak
  - operator: Ω
    question: Asymmetry is calibrated by explicit power, exposure, capacity, vulnerability, obligation, or role-gradient evidence.
    current_calibration: weak
  - operator: Θ
    question: Temporality is calibrated by showing diachronic trajectory rather than static contradiction.
    current_calibration: partial
  - operator: Φ
    question: Recontextualization is calibrated by specifying source and target frames and preserving non-capture.
    current_calibration: partial
  - operator: Χ
    question: Distance is calibrated by reversibility, restraint, non-verdict status, and refusal of forced capture.
    current_calibration: satisfied
  - operator: Σ
    question: Integration is calibrated by distinguishing genuine synthesis from forced coherence, partial coordination, or non-integrability.
    current_calibration: weak
  - operator: Ψ
    question: Self-Binding is calibrated only by durable commitment, stable normativity, or analytic self-binding across time.
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - Formal logical contradiction not requiring praxeological operators.
    - Semantic incommensurability between frames without a shared measure.
    - Institutional rule collision or jurisdictional conflict better modeled legally or organizationally.
    - Material scarcity or resource competition rather than structural drift.
    - Tragic pluralism in which mature, coherent trajectories remain incompatible without deficiency.
    - Rival normative frameworks that remain irreducible rather than awaiting integration.
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured absence, or failed maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - Local-global coherence reading.
    - Semantic incommensurability reading.
    - Systems differentiation reading.
    - Game-theoretic or resource-conflict reading.
    - Institutional rule-collision reading.
    - Tragic pluralism reading.
    - Static logical contradiction reading.
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
  - id: F1
    condition: >-
      The PMS reading is weakened if no distinct frames, trajectories, or directional tensions can be specified, or if Θ, Φ, Σ, Ω, Λ, or Ψ are asserted without their PMS dependencies.
  - id: F2
    condition: >-
      PMS is under-discriminating if it cannot distinguish mere difference, static contradiction, semantic incommensurability, institutional collision, material scarcity, and genuine non-integrable pluralism from one another.
  - id: F3
    condition: >-
      The analysis is over-assimilative if rupture, resistance, disagreement, non-fit, absence, or rival framing is automatically translated into drift, incomplete calibration, failed integration, recontextualization, or maturity failure.
  final_quality_status:
    result: usable_with_limits
    reason: >-
      The application is usable as a reversible conceptual PMS projection with high coherence risk and partial discrimination. It is not a concrete scene analysis, empirical result, diagnostic claim, legal or forensic judgment, implementation claim, or PMS Base validation.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: >
    These requirements identify what would be needed to turn the PMS projection into a calibrated empirical, comparative, computational, legal, clinical, or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: Operational use would need identifiable trajectories, frames, roles, claims, rules, practices, or concepts that are actually distinct.
      ∇: Operational use would need evidence of directional tension, continuation pressure, activation, or orientation within each trajectory.
      □: Operational use would need explicit frame boundaries, relevance rules, role spaces, or local coherence criteria.
      Λ: Operational use would need an expected event, coordination, translation, recognition, mediation, decision, or convergence whose non-occurrence is meaningful.
      Α: Operational use would need recurrence, stabilization, routine, path dependence, or repeated structural interaction.
      Ω: Operational use would need measurable or otherwise specified imbalance of power, exposure, capacity, vulnerability, obligation, authority, or role position.
      Θ: Operational use would need sequence data, temporal persistence, developmental arc, accumulation, anticipation, delay, or trajectory evidence.
      Φ: Operational use would need a source frame, target frame, and evidence of transformation or reinterpretation under recontextualization.
      Χ: Operational use would need procedures preserving reflective distance, reversibility, non-verdict status, and safeguards against forced closure.
      Σ: Operational use would need criteria distinguishing genuine integration, partial coordination, false smoothing, coercive assimilation, and non-integrability.
      Ψ: Operational use would need durable commitment, self-binding, stable normativity, policy constraint stability, or explicit structural self-relation.
    negative_cases:
    - A mere verbal disagreement with no distinct frames or trajectories.
    - A static formal contradiction requiring logic rather than praxis grammar.
    - A material scarcity conflict explained by resource limits alone.
    - A legal rule collision better resolved by legal doctrine without PMS claims.
    - An irreducible pluralist conflict where integration would be coercive or false.
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: >-
    Operationalization is not fulfilled. The current output remains a conceptual PMS case application requiring concrete indicators, evidence, comparison, and external validation before any empirical, applied, computational, legal, clinical, or implementation use.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: >-
      The conflict is analyzed as structural incompatibility between trajectories and frames, not as a mental state, personality trait, intention, affective disposition, or psychological essence.
    non_metaphysical: >-
      The analysis does not claim anything about being, consciousness, qualia, ontological dignity, ultimate reality, or metaphysical structure.
    non_diagnostic: >-
      No clinical, therapeutic, mental-health, personality, maturity, pathology, or risk assessment is made.
    non_legal_forensic: >-
      No legal liability, culpability, evidentiary finding, forensic conclusion, policy enforcement, or institutional verdict is made.
    non_implementation_claim: >-
      The YAML document is a structural representation only and does not implement conflict analysis, governance, agency, software behavior, or institutional procedure.
    non_moral_ranking: >-
      No frame, actor, group, institution, or trajectory is ranked as morally superior, more mature, deficient, or ontologically lesser.
    non_exhaustive_capture: >-
      PMS translation is not treated as exhaustive capture; logical, semantic, institutional, material, political, or tragic readings may remain better or complementary.
    reversibility: >-
      All operator statuses remain revisable if concrete scenes, evidence, rival models, or sharper calibration alter the reading.
    dignity_in_practice: >-
      Dignity-in-Practice is preserved by using Χ, restraint, and non-ranking under possible asymmetry; it is not used as ontological dignity or moral superiority.
limits:
- The PMS reading is limited by the abstract case material and cannot establish concrete scene facts, actor roles, institutional history, or empirical causality.
- The analysis makes no empirical, metaphysical, phenomenological, diagnostic, clinical, legal, forensic, implementation, governance, or PMS Base validation claim.
- Rival formalizations remain open, including logical contradiction, semantic incommensurability, institutional rule collision, systems differentiation, material scarcity, game-theoretic conflict, and tragic pluralism.
- Because the case strongly invites smooth operator mapping, coherence risk is high; PMS coherence must not be mistaken for explanatory sufficiency or exhaustive capture.
case_synthesis:
  primary_pms_reading: >-
    Conflict as structural incompatibility can be modeled as differentiated, directionally organized, frame-bound trajectories that remain locally coherent but become incompatible under temporal extension, cross-frame comparison, coordination pressure, or attempted recontextualization.
  continuity_condition: >-
    Continuity is relevant only insofar as trajectories persist, stabilize, or develop over time; without such persistence the case becomes closer to static difference or contradiction.
  change_condition: >-
    Change or recontextualization is relevant where one locally coherent structure is placed into another frame, producing transformation, clarified incompatibility, false assimilation, or possible but not guaranteed integration.
  rupture_or_non_fit_condition: >-
    Rupture, resistance, disagreement, absence, and non-fit are preserved as possible non-capture or rival-formalization zones and are not automatically translated into PMS drift, failed Σ, incomplete calibration, recontextualization, or maturity failure.
  responsibility_condition: >-
    Responsibility_R is not applicable unless asymmetry, temporal obligation, recontextualization, and self-binding are explicitly established in a concrete or sufficiently specified case.
  dignity_condition: >-
    Dignity-in-Practice constrains the analysis by requiring reflective restraint, reversibility, non-ranking, and protection against shame, diagnosis, tribunal framing, and irreversible labeling.
  rival_reading_condition: >-
    Rival formalizations remain open and may supersede the PMS reading if they discriminate the case more sharply or explain the incompatibility without assimilative overreach.
final_structural_formula:
  primary_formula: Χ[(Θ ∘ Α ∘ □ ∘ ∇ ∘ Δ)_Frame_A ↔/⊥ (Θ ∘ Α ∘ □ ∘ ∇ ∘ Δ)_Frame_B] + Φ? + Σ? + Λ? + Ω? + Ψ?
  primary_formula_status: primary_case_model
  notation_note: >-
    The symbols ↔/⊥, +, ?, brackets, and frame subscripts are formula notation for relation, incompatibility, conditionality, grouping, and frame-indexing. They are not introduced as additional PMS operators and do not revise the PMS operator inventory.
  compressed_reading: >-
    Under Χ, structurally distinct trajectories may remain locally coherent within their own frames while becoming incompatible across frames, with Φ, Σ, Λ, Ω, and Ψ remaining conditional rather than automatically active. The formula therefore models a disciplined PMS projection of conflict as structural incompatibility, not a proof that conflict is always failed integration, not a diagnosis of any party, and not a claim that PMS exhausts the phenomenon.
  final_validity_status: valid_with_limits
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It does not establish empirical truth, metaphysical truth, phenomenological completeness, diagnostic validity, legal or forensic validity, clinical validity, implementation validity, moral ranking, institutional verdict, or PMS Base validation.