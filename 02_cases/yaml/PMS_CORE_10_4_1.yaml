operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the basic distinctions that make the case analyzable: agreement
      versus meaningful consent, refusal versus non-response, pressure versus
      free orientation, dependency versus independence, vulnerability versus
      ordinary exposure, unequal capacity versus equal capacity, and given
      versus withheld or contested consent.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - >
        Specify whether the relevant distinction is agreement/consent,
        refusal/silence, pressure/coercion, dependency/constraint,
        vulnerability/capacity, or contestation/withdrawal.
      - >
        Do not collapse neighboring distinctions: pressure is not automatically
        coercion, dependency is not automatically incapacity, agreement is not
        automatically meaningful consent, and later contestation is not
        automatically proof of original invalidity.
    falsifier_conditions:
      - >
        If the case cannot maintain any stable distinction between consent,
        agreement, refusal, pressure, dependency, vulnerability, capacity, and
        contestation, the PMS reading loses its entry point.
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as structural directedness within the consent-field: movement
      toward agreement, refusal, compliance, withdrawal, contestation, or
      pressure-response. This directedness is not treated as subjective desire
      or psychological motive.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Identify whether the relevant directional tension is practical,
        communicative, relational, institutional, explanatory, or structural.
      - >
        Do not infer inner desire, fear, trauma, intention, or authentic
        preference from the abstract material alone.
    falsifier_conditions:
      - >
        If no directional tension arises between agreement, refusal, pressure,
        dependency, vulnerability, or contestation, ∇ is under-specified.
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is the consent-frame that makes agreement, refusal, withholding,
      dependency, pressure, vulnerability, and capacity relevant. The frame is
      abstract and may later need specification as interpersonal,
      institutional, contractual, legal, clinical, relational, or communicative.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Name the active frame as the abstract consent-under-asymmetry frame
        unless a concrete scene later supplies a more specific frame.
      - >
        Mark frame shifts explicitly: legal validity, ethical legitimacy,
        clinical capacity, institutional procedure, and lived experience are
        not the same frame.
    falsifier_conditions:
      - >
        If no consent-frame or relevance-structure is specified, the analysis
        becomes too abstract to discriminate consent from adjacent concepts.
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is weak and conditional. It becomes relevant if a concrete scene
      includes meaningful silence, delayed refusal, absent opportunity to
      withdraw, missing confirmation, omitted protection, unresolved
      expectation, or evidence that a response was expected but absent. The
      supplied case material does not itself establish such a non-event.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Specify the expected occurrence and the frame in which its absence
        matters, such as explicit confirmation, safe refusal, available exit,
        review, or withdrawal opportunity.
      - >
        Preserve the possibility that absence marks missing evidence or PMS
        non-capture rather than consent, refusal, drift, defect, or failed
        integration.
    falsifier_conditions:
      - >
        If no structured expectation exists in the concrete or conceptual
        frame, Λ must remain weak or not active.
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak and conditional. It would mark recurrence or stabilization if
      asymmetrical pressure, dependency, vulnerability, role expectation,
      compliance, or contestation becomes a repeated pattern or role-script.
      The abstract case material does not establish recurrence.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Show recurrence, stabilization, path dependence, or role-script
        formation before treating Α as active.
      - >
        Distinguish a stable attractor from a single agreement, isolated
        refusal, one-time pressure, or general conceptual possibility.
    falsifier_conditions:
      - >
        If recurrence or stabilization is not shown, Α remains weak and cannot
        ground strong claims about pattern formation.
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is central because the case explicitly concerns asymmetry: power,
      exposure, dependency, vulnerability, capacity, obligation, role
      differentiation, or access to refusal and exit may alter whether consent
      is meaningfully given, withheld, or contested.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Specify the direction and kind of asymmetry: power, capacity,
        dependency, vulnerability, obligation, exposure, information, role
        authority, or exit-options.
      - >
        Do not moralize asymmetry by default; asymmetry is structural and does
        not by itself prove coercion, invalidity, abuse, or blame.
      - >
        Because PMS Ω depends on Α, mark the dependency as weak unless a
        concrete scene shows stabilization or pattern formation.
    falsifier_conditions:
      - >
        If no directional imbalance of power, exposure, capacity, dependency,
        obligation, or vulnerability is identifiable, Ω claims must be removed
        or marked weak.
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is structurally important because consent may be offered, withheld,
      revised, delayed, pressured, withdrawn, or contested over time. However,
      no concrete chronology is supplied, so temporal trajectory remains
      under-specified.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Distinguish a static consent snapshot from a diachronic trajectory
        involving prior dependency, accumulated pressure, delayed refusal,
        changed capacity, later withdrawal, or later contestation.
      - >
        Treat temporality as essential to possible consent-contestation, but do
        not infer an actual temporal sequence without scene evidence.
    falsifier_conditions:
      - >
        If temporal extension, delay, revision, persistence, or later
        contestation is irrelevant to the concrete case, Θ is overextended.
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active because the same surface occurrence may change when placed
      into different frames: agreement may be recontextualized as consent,
      compliance, pressure-response, dependency-preserving action, refusal
      under constraint, ambiguous communication, or contested enactment.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Name source and target frames, for example from verbal agreement to
        meaningful consent, from refusal to constrained refusal, or from
        interpersonal exchange to institutional or legal evaluation.
      - >
        Check whether recontextualization clarifies the consent structure or
        merely absorbs non-fit, disagreement, resistance, absence, or rival
        framing into PMS terms.
    falsifier_conditions:
      - >
        If every rupture, resistance, disagreement, or rival framing is
        absorbed as Φ, the reading becomes over-assimilative and must be
        constrained or rejected.
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as an application constraint and analytic operator. It
      requires reflective distance from verdict, urgency, person-ranking, legal
      conclusion, diagnostic interpretation, and premature closure about
      whether consent is valid or invalid.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Check that the analysis suspends verdict, keeps the reading reversible,
        and distinguishes PMS structural modeling from empirical, legal,
        clinical, diagnostic, or metaphysical judgment.
      - >
        Distinguish Distance from empty neutrality: Χ permits careful
        structural discrimination while refusing premature closure.
    falsifier_conditions:
      - >
        If Χ is suspended to force a consent verdict, moral ranking, legal
        conclusion, or diagnostic attribution, the PMS application is invalid.
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak and conditional. It would be relevant if agreement, refusal,
      pressure, dependency, vulnerability, capacity, frame, and temporality were
      integrated into a coherent enactment. The abstract case material does not
      establish such integration.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - >
        Test whether integration discriminates between meaningful consent,
        compliance, coerced agreement, ambiguous agreement, refusal, silence,
        and later contestation rather than smoothing them into one coherent
        story.
      - >
        Do not treat PMS coherence as proof that consent was integrated, valid,
        invalid, mature, or responsibly enacted.
    falsifier_conditions:
      - >
        If coherence is treated as proof of adequacy, consent validity, or
        maturity, Σ is overclaimed.
    non_capture_note: >
      Integration must not become forced coherence.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and conditional for the consent scene, but active as analytic
      self-binding discipline for the PMS application. In the scene, Ψ would
      require evidence that consent becomes a self-binding commitment across
      time; such evidence is not supplied.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Apply Ψ to a case participant only if self-binding, commitment, stable
        normativity, or responsibility-as-self-commitment is explicitly in
        scope.
      - >
        Do not infer selfhood, authentic will, capacity, or responsibility from
        abstract consent language or from verbal agreement alone.
    falsifier_conditions:
      - >
        If Ψ is applied without established Σ, Θ, and Χ, the self-binding
        reading is under-specified.
    non_capture_note: >
      Self-Binding is not a proof of subjectivity, authenticity, or moral worth.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 supplies the minimal structural field: distinctions among
      consent-related terms (Δ), directional tensions among agreement, refusal,
      pressure, and contestation (∇), the consent-frame (□), possible but
      unestablished meaningful absences (Λ), and possible but unestablished
      recurrence or role-script formation (Α).
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 carries the strongest case relevance: Ω is central because the case is
      explicitly about asymmetry, while Θ is important because consent can be
      given, withheld, revised, or contested across time. Both require
      calibration because no concrete scene or chronology is supplied.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 governs how the analysis handles multiple frames: Φ permits
      recontextualization of agreement, refusal, pressure, and dependency; Χ
      constrains premature verdicts; Σ remains weak because integrated
      enactment is not established by the abstract case material.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is analytic-only to weak in this case. Ψ applies to the discipline of
      the analysis itself and would apply to the consent scene only if a
      concrete structure of self-binding commitment across time were shown.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The abstract case supplies structurally relevant distinctions among
        agreement, refusal, pressure, dependency, vulnerability, unequal
        capacity, and contested consent.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        Directional tensions arise from Δ: movement toward agreement, refusal,
        compliance, withdrawal, pressure-response, or contestation.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The abstract consent-under-asymmetry frame constrains which differences
        and tensions are relevant.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Only weakly satisfied: meaningful absence, silence, delay, or omitted
        opportunity may matter, but no concrete non-event is specified.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Only weakly satisfied: recurrence or stabilization is possible in
        asymmetrical consent structures, but no repeated pattern is supplied.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Conceptually active from the case material, but dependency on Α is weak
        because a stabilized pattern is not established.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Conceptually active because consent may be given, withheld, revised, or
        contested over time; weak because no chronology is supplied and Α is
        weak.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Conceptually active because consent can be recontextualized across
        agreement, compliance, pressure-response, refusal, and contestation;
        dependencies are partly under-specified.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Satisfied as application discipline: the analysis maintains reflective
        distance, reversibility, and refusal of verdict or person-ranking.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Weakly satisfied: integration is only a conditional question because no
        concrete integrated enactment is shown.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Weakly satisfied for the case scene and active only as analytic
        self-binding discipline; self-binding consent is not established.
  dependency_failure_conditions:
    - >
      If a later operator is used while its dependencies are absent, mark the
      reading as under-specified or invalid.
    - >
      If the chain is used as a smooth totalization without discrimination, the
      PMS application becomes over-assimilative.
    - >
      If Ω, Θ, Φ, Σ, or Ψ are claimed as concrete findings without scene
      evidence, the reading overextends the case material.

