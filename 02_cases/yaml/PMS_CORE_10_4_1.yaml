analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "pms_internal_structural_derivation"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The case type permits a reversible PMS-internal structural projection of
      consent under asymmetry. It does not permit findings about actual consent,
      evidence, legality, diagnosis, clinical capacity, empirical prevalence,
      implementation, person-ranking, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The case strongly fits PMS language because consent under asymmetry
      naturally activates Δ, ∇, □, Ω, Θ, Φ, and Χ. That fit is analytically
      useful but also risky: the PMS reading can become too smooth if it makes
      every consent difficulty appear as an operator-composable structure,
      every ambiguity as recontextualization, every silence as a non-event,
      every unresolved tension as weak integration, or every rival reading as a
      merely incomplete PMS calibration. Smoothness would reduce rather than
      increase discriminative force.
    mitigation: >
      The reading is constrained by weak dependency markings for Λ, Α, Σ, and
      Ψ; explicit falsifier conditions; rival frameworks; non-capture zones;
      and the rule that PMS coherence is insufficient by itself. The analysis
      must preserve the possibility that a concrete consent dispute may require
      empirical, legal, clinical, political, phenomenological, institutional, or
      ethical frameworks that PMS can only partially model or cannot capture
      without distortion.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the operator-level structure of distinctions, tensions,
      frames, asymmetry, temporality, recontextualization, distance, and
      conditional integration in the abstract consent-field. This coverage is
      structural coverage only: it shows that PMS can organize the problem
      space, not that PMS has resolved the case, validated a consent claim, or
      exhausted the phenomenon.
    discrimination_requirement: >
      The PMS reading must distinguish meaningful consent from surface
      agreement, pressure from coercion, dependency from incapacity,
      vulnerability from lack of agency, silence from refusal or consent, later
      contestation from original invalidity, and PMS coherence from evidentiary
      or normative sufficiency. If those distinctions collapse, the PMS reading
      becomes under-discriminating even if the operator chain remains formally
      coherent.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish surface agreement from meaningful consent under asymmetry."
      expected_pms_distinction: >
        Δ must keep agreement and consent distinct; Ω and Θ must test asymmetry
        and temporality; Σ and Ψ must not be assumed from a verbal or formal
        agreement. A surface agreement may be structurally relevant without
        being sufficient for meaningful consent.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish asymmetry from coercion, incapacity, abuse, or legal invalidity."
      expected_pms_distinction: >
        Ω identifies structural imbalance, while legal, diagnostic, clinical,
        empirical, or moral conclusions require non-PMS standards and evidence
        not supplied here. Asymmetry may heighten the need for calibration
        without automatically determining the outcome.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: >
        Which consent-relevant distinctions are operative:
        agreement/consent, refusal/silence, pressure/coercion,
        dependency/incapacity, vulnerability/agency, contestation/withdrawal?
      current_calibration: "satisfied"
    - operator: "∇"
      question: >
        Which directional tensions are shown: movement toward agreement,
        refusal, compliance, withdrawal, pressure-response, or contestation?
      current_calibration: "satisfied"
    - operator: "□"
      question: >
        Which frame makes the consent claim intelligible: abstract
        consent-under-asymmetry, legal frame, ethical frame, institutional
        frame, relational frame, or clinical capacity frame?
      current_calibration: "partial"
    - operator: "Λ"
      question: >
        Is there a structured absence, silence, delay, missing opportunity to
        refuse, or omitted safeguard that matters within the frame?
      current_calibration: "weak"
    - operator: "Α"
      question: >
        Is there recurrence, stabilization, path dependence, or role-script
        formation rather than a single abstract relation?
      current_calibration: "weak"
    - operator: "Ω"
      question: >
        What kind and direction of asymmetry is present: power, dependency,
        vulnerability, capacity, obligation, exposure, information, or
        exit-options?
      current_calibration: "partial"
    - operator: "Θ"
      question: >
        What temporal sequence matters: prior dependency, accumulated pressure,
        moment of agreement, delayed refusal, withdrawal, later contestation,
        or changed capacity?
      current_calibration: "partial"
    - operator: "Φ"
      question: >
        Which source and target frames are being shifted, and does the shift
        clarify or over-assimilate the case?
      current_calibration: "partial"
    - operator: "Χ"
      question: >
        Does the analysis maintain reflective distance, reversibility, and
        refusal of verdict or person-ranking?
      current_calibration: "satisfied"
    - operator: "Σ"
      question: >
        Is there evidence of integrated enactment, or only abstract coherence
        produced by the analysis?
      current_calibration: "weak"
    - operator: "Ψ"
      question: >
        Is self-binding commitment across time actually in scope, or only the
        analytic self-binding discipline of this PMS application?
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "subjective experience of consent, refusal, pressure, fear, desire, or ambiguity"
      - "legal validity, coercion standards, evidentiary sufficiency, and jurisdiction-specific doctrine"
      - "clinical or capacity assessment, including trauma, vulnerability, impairment, or competence"
      - "political, cultural, relational, or institutional theories of domination that may formalize asymmetry differently"
      - "the possibility that silence, non-fit, disagreement, or later contestation is neither PMS drift nor incomplete integration"
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "legal coercion or undue-influence formalization"
      - "relational autonomy theory"
      - "contractual consent model"
      - "communicative-pragmatic consent model"
      - "power/domination analysis"
      - "capacity-and-vulnerability model"
      - "care ethics reading"
      - "phenomenological agency account"
      - "empirical behavioral or institutional analysis"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or under-specified if no concrete
        distinction, frame, asymmetry, temporal trajectory, or operator
        dependency can be calibrated beyond the abstract title and description.
    - id: "F2"
      condition: >
        The PMS reading would be under-discriminating if it cannot distinguish
        agreement from meaningful consent, pressure from coercion, dependency
        from incapacity, vulnerability from lack of agency, or contestation from
        proof of invalidity.
    - id: "F3"
      condition: >
        The PMS reading would over-assimilate the case if it treats all
        resistance, rupture, silence, non-fit, absence, or rival framing as PMS
        drift, failed integration, incomplete calibration, or maturity failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The application is usable as a bounded conceptual PMS projection because
      it preserves the PMS operator inventory, dependencies, derived-structure
      discipline, guardrails, non-capture, rival readings, falsifiers, and
      reversibility. It remains under-specified for any concrete, empirical,
      legal, clinical, diagnostic, or implementation use.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical,
    or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: >
        Operational use would require observed or documented distinctions among
        agreement, consent, refusal, silence, pressure, dependency,
        vulnerability, capacity, and contestation.
      ∇: >
        Operational use would require observable directional tensions, such as
        pressure to agree, attempts to refuse, compliance, withdrawal,
        contestation, or movement toward or away from participation.
      □: >
        Operational use would require a specified frame: interpersonal,
        institutional, legal, clinical, contractual, relational, communicative,
        or procedural.
      Λ: >
        Operational use would require documented meaningful absence, such as
        missing confirmation, absent safe refusal channel, delayed response,
        omitted safeguard, or silence within an expectation structure.
      Α: >
        Operational use would require evidence of recurrence, stabilization,
        role-script formation, repeated dependency, repeated pressure, or path
        dependence.
      Ω: >
        Operational use would require concrete asymmetry indicators: power,
        capacity, dependency, vulnerability, obligation, exposure, role
        authority, information inequality, or restricted exit.
      Θ: >
        Operational use would require chronology: prior relation, moment of
        agreement or refusal, duration of pressure, delay, withdrawal, revision,
        and later contestation.
      Φ: >
        Operational use would require explicit source and target frames for
        recontextualization and criteria for when reframing clarifies rather
        than absorbs non-fit.
      Χ: >
        Operational use would require procedural safeguards for distance,
        reversibility, non-ranking, and separation of structural analysis from
        verdict or enforcement.
      Σ: >
        Operational use would require evidence that directedness, frame,
        asymmetry, and temporality are integrated rather than merely made
        coherent by the analyst.
      Ψ: >
        Operational use would require evidence of self-binding commitment across
        time or an explicitly scoped analytic self-binding discipline; it
        cannot be inferred from agreement alone.
    negative_cases:
      - "a fully symmetrical low-stakes exchange with clear reversible agreement and no dependency, vulnerability, pressure, or unequal capacity"
      - "a case of explicit refusal with no consent claim and no contested agreement"
      - "a purely legal evidence case where PMS adds no discriminative structure beyond jurisdiction-specific doctrine"
      - "a clinical capacity case requiring specialized assessment beyond PMS structural analysis"
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The case material is abstract and
    lacks concrete scene evidence, comparison criteria, empirical indicators,
    implementation constraints, legal standards, clinical assessment, and
    external validation.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      Do not infer desire, fear, intention, maturity, authenticity, compliance
      motive, or inner state from the abstract consent-asymmetry structure.
    non_metaphysical: >
      Do not infer metaphysical autonomy, consciousness, essence, personhood,
      or ontological dignity from PMS operators or derived structures.
    non_diagnostic: >
      Do not diagnose vulnerability, incapacity, trauma, pathology, competence,
      risk, or personality from the PMS reading.
    non_legal_forensic: >
      Do not treat PMS as deciding legal consent, coercion, culpability,
      evidentiary sufficiency, liability, forensic credibility, or
      jurisdiction-specific standards.
    non_implementation_claim: >
      Do not treat this YAML representation as implemented consent analysis,
      software validation, governance design, institutional policy, or agent
      architecture.
    non_moral_ranking: >
      Do not rank persons or groups as more or less mature, dignified,
      responsible, autonomous, or morally superior based on this PMS projection.
    non_exhaustive_capture: >
      Preserve possible non-capture for lived experience, law, clinical
      reality, cultural power, political domination, evidence, and rival
      formalisms.
    reversibility: >
      Every operator activation remains revisable if a concrete scene changes
      the frame, shows no asymmetry, supplies chronology, negates recurrence,
      or supports a rival formalization.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by handling asymmetry with reflective
      restraint, refusing humiliation and ranking, and keeping the analysis
      non-tribunal and non-diagnostic.

limits:
  - >
    The PMS reading is a conceptual projection over an abstract
    consent-asymmetry field, not a concrete scene analysis.
  - >
    No empirical, metaphysical, diagnostic, clinical, legal, forensic,
    implementation, or PMS Base validation status is claimed.
  - >
    Rival readings remain open, and possible non-capture is preserved where
    subjective experience, law, clinical facts, evidence, politics, culture, or
    institutional practice exceed PMS structural modeling.
  - >
    The case has high coherence risk because PMS can model the abstract
    structure smoothly; this does not establish discriminative sufficiency or
    truth.

case_synthesis:
  primary_pms_reading: >
    Consent Under Asymmetry is a Δ- and □-structured consent-field in which ∇
    tensions around agreement, refusal, pressure, dependency, vulnerability,
    and capacity make Ω central, Θ necessary but under-specified, Φ active, Χ
    required, and Σ/Ψ conditional rather than established.
  continuity_condition: >
    Continuity would require a temporally traceable consent trajectory in which
    distinctions, frame, asymmetry, and possible expectations remain
    identifiable across prior relation, agreement or refusal, withdrawal, and
    contestation. This is not established by the abstract material.
  change_condition: >
    Change or recontextualization occurs when an apparent agreement is placed
    into another frame, such as compliance, pressure-response,
    dependency-preserving action, constrained refusal, ambiguity, or later
    contestation. Such change must be marked rather than treated as automatic
    truth.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, silence, absence, missing evidence, or
    rival framing must remain possible non-capture and must not automatically
    become PMS drift, incomplete calibration, incomplete integration,
    recontextualization, or maturity failure.
  responsibility_condition: >
    Responsibility_R is not attributable here. It would require concrete Ω, Θ,
    Φ, and Ψ calibration showing self-binding orientation toward asymmetry
    across time.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective
    restraint under asymmetry, no ranking or humiliation, no diagnostic or legal
    verdict, and preservation of reversibility.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparison criteria and
    case-specific evidence show that the PMS reading discriminates better
    without over-assimilation.

