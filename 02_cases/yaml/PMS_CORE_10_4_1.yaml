      - "Θ_under_specified"
      - "Φ"
      - "Χ"
      - "Σ_weak"
      - "Ψ_analytic_only_or_weak"
    asymmetries_and_temporal_trajectories_visible: >
      Ω is visible in the abstract case through dependency, vulnerability,
      unequal capacity, pressure, and role imbalance. Θ is visible as a
      structural need to track consent over time, but no concrete chronology is
      supplied.
    recontextualization_distance_integration: >
      Φ is active because agreement can be recontextualized as consent,
      compliance, pressure-response, refusal, or contestation. Χ is active as
      restraint and reversibility. Σ is weak because integrated enactment is not
      established.
    derived_axes_projection: >
      Awareness_A is weak; Coherence_C is weak; Responsibility_R is weak and
      not attributable; Action_E is under-specified; Dignity_in_Practice_D is
