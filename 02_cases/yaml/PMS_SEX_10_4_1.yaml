        - "personality, disposition, or character"
        - "inner motives, drives, or experiential qualities"
        - "developmental histories or causal psychologies"
        - "sexual identity, orientation, or worth"
        - "individual responsibility beyond structural attribution"
        - "direct adultness verdicts"
        - "maturity hierarchy"
        - "dignity hierarchy"
    configuration_scope:
      note: >
        PMS-SEX does not claim isomorphism across all sexual configurations.
        Identical practice labels do not imply identical structure. Internal
        framing does not settle outer form. Public discourse does not exhaust
        scene legibility. Cost topology must be reconstructed scene by scene.
      case_application: >
        The configuration remains abstract: consent under asymmetry as a
        conceptual field. No sexual scene, practice label, internal framing,
        outer form, public discourse, or cost topology is supplied. Therefore
        PMS-SEX can only state what must be reconstructed before sexual
        praxis-specific conclusions become warranted.
    psychology_scope:
      note: >
        Psychology is subordinated, not denied. It may refine a reading only
        after structural reconstruction via Δ–Ψ, cost layout, outer legibility,
        sexual cost topology, and publicness overlays have already been
        reconstructed.
      forbidden_uses:
        - "bypassing Ω accounting"
        - "dissolving Θ irreversibility"
        - "personalizing what remains structurally induced"
        - "erasing outer form with inner narrative"
        - "converting drift into diagnosis"
        - "converting path-cost into identity rank"
        - "converting asymmetry-switch drift into person essence"
        - "converting parity-to-exit into global role blame"
        - "converting responsibility-to-authority into character diagnosis"
        - "short-circuiting Χ and reversibility"
      case_application: >
        Psychology remains out of scope for this overlay. No desire, motive,
        trauma, fear, preference, identity, pathology, or developmental history
        is inferred. Psychology may become a rival or refining lens only if a
        later concrete case supplies appropriate grounds.
    non_capture_openness:
      status: "kept_open"
      note: >
        PMS-SEX does not assume that every sexually marked configuration can be
        fully rendered without remainder in its own grammar.
      guard: >
        Translation into PMS terms does not prove exhaustive capture, and
        refusal of PMS terms does not automatically indicate denial,
        immaturity, pathology, or drift.
      case_application: >
        Non-capture zones include subjective experience of consent or refusal,
        embodied feeling, erotic meaning, legal validity, clinical capacity,
        trauma, cultural and political power, institutional procedure,
        evidentiary sufficiency, rival autonomy theories, communicative consent
        theories, care ethics, domination analysis, and any concrete sexual
        scene details not supplied here. Non-fit remains possible and is not
        automatically drift.
    explicit_exclusions:
      - "no how-to guidance"
      - "no risk-management manual"
      - "no therapeutic, clinical, medical, or forensic authority"
      - "no optimization logic for desire, bonding, or satisfaction"
      - "no taxonomy of sexual identities or orientations"
      - "no diagnosis of persons, groups, practices, or communities"
      - "no moral ranking from statistical default, lower entropy, or stronger canalization"
      - "no sexual cost topology as score"
      - "no asymmetry switch as authority"
      - "no direct adultness verdict"
      - "no maturity hierarchy"
      - "no dignity hierarchy"

