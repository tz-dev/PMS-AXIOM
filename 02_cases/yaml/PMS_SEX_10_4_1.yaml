      whether it is available. Embodiment, withdrawal/binding, publicness, and after-scene dignity remain under-specified because no concrete sexual scene or chronology is supplied.
      The overlay is therefore valid only as a bounded, reversible, non-verdictive add-on layer. This remains a scene-bound structural reading, not a diagnosis, verdict, instruction,
      or person-status claim.'
