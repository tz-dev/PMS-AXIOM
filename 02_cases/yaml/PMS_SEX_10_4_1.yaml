          - "local enactments treated as identity proofs"
          - "non-binding language used to avoid naming accumulated responsibility"
        case_application: >
          Ψ leak is not active as a finding. The case does not state a
          non-binding sexual frame, implicit commitment demand, identity proof,
          or local enactment treated as binding. It remains a risk lens because
