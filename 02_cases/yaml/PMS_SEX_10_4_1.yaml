pms_sex_overlay_application:
  schema_version: "PMS-SEX_1.2"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-SEX.yaml"
  paper_source_file: "PMS-SEX - nach update.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–SEX Application Profile"
    model_short: "PMS-SEX"
    status: "application_overlay"
    profile_role: "paper_specific_profile"
    repository_role: "paper_specific_application_profile"
    last_updated: "2026-05-24"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.5 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
      status: "repository_reference"
    repo:
      name: "PMS-SEX"
      url: "https://github.com/tz-dev/PMS-SEX"
    source_paper:
      title: "PMS-SEX — From Impulse to Self-Binding: A Praxeological Grammar of Sexuality (Δ–Ψ)"
      file: "PMS-SEX - nach update.md"
      status: "updated_paper_reference"
      version: "PMS-SEX_1.2"
      coverage:
        - "Ch. 0: scope, PMS v1.3 operator spine, entry guard, inner/outer distinction, publicness overlay, path-cost guard"
        - "Ch. 1–12: core operator derivation from Δ through Ψ"
        - "Ch. 13: body as non-operator remainder"
        - "Ch. 14: modulators as non-operator weightings"
        - "Ch. 15: deviance as consequence structure"
        - "Ch. 16: high-risk / extreme practices"
        - "Ch. 17: suspended self-binding as boundary condition; EDEN/PFO drift under suspended Ψ"
        - "Ch. 18: dysfunctional expressions and destructive dynamics; asymmetry-switch drift, parity-to-exit, responsibility-to-authority"
        - "Ch. 19: functional conditions and warning signals"
        - "Ch. 20: structural self-check adapter updated for switch drift and cost-topology rereading"
        - "Ch. 21: Dignity-in-Practice module; EDEN/PFO reference; sexual cost topology; cost factors by role-position"
        - "Ch. 22: MIP docking interface; operator-profile-only rule; no direct adultness verdict"
        - "Ch. 23: limits and extensions"
        - "Ch. 24: conclusion and final guard"
        - "Appendix A: positioning and adjacent lenses"
        - "Appendix B: glossary incl. sexual cost topology, EDEN/PFO asymmetry switch, parity-to-exit, responsibility-to-authority"
        - "Appendix C: operator table"
        - "Appendix D: one-page structural map"
    description: >
      PMS-SEX is used here only as an application overlay for the completed PMS
      Core case "Consent Under Asymmetry." The overlay adds a sexual-praxis
      lens for scene framing, internal and outer legibility, publicness,
      path-cost, body remainder, sexual cost topology, asymmetry-switch drift,
      parity-to-exit, responsibility-to-authority, adult sexual reciprocity,
      and MIP docking guards. It does so without redefining PMS operators,
      altering PMS dependencies, rewriting the completed Core pass, or treating
      PMS-SEX constructs as PMS Base. The overlay therefore functions as a
      conditional visibility layer: it can say which SEX-specific questions
      would become relevant if the consent-under-asymmetry structure were
      concretized as sexual praxis, but it cannot itself supply the missing
      scene, body, role, chronology, cost, publicness, or evidence.
    methodological_restraint: >
      The overlay does not claim that the abstract case is a concrete sexual
      scene. It treats the case as a consent-under-asymmetry structure to which
      the SEX profile may add conditional visibility where sexual embodiment,
      exposure, publicness, cost topology, exit cost, binding cost,
      role-position asymmetry, or responsibility externalization would become
      domain-salient. Because no concrete scene is supplied, the overlay
      remains reversible, non-diagnostic, non-forensic, non-clinical,
      non-prescriptive, non-person-ranking, and open to non-capture and rival
      formalizations. It also prevents a premature SEX capture: the fact that a
      consent problem could be sexually instantiated does not mean that this
      case already is sexual, bodily, erotic, public, deviant, high-risk,
      clinically relevant, legally decidable, or maturity-relevant.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Consent Under Asymmetry"
    rule: >
      This SEX block is appended to or integrated with the already completed
      PMS Core v1.3 case artefact. It does not rewrite the Core pass, redefine
      PMS operators, alter PMS dependencies, change PMS derived structures, or
      treat PMS-SEX constructs as PMS Base. The Core finding remains that the
      case is an Ω-active, □-dependent, Φ-contestable, Χ-governed,
      Θ-under-specified consent structure with Δ and ∇ active, Λ/Α/Σ/Ψ
      conditional, derived structures not independently established, and
      non-capture preserved.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
      - "Core claim typing: conceptual projection, not concrete scene analysis"
      - "Core refusal of empirical, metaphysical, diagnostic, legal-forensic, clinical, implementation, and PMS Base validation overclaim"
    integration_rule: >
      The SEX overlay may add visibility for sexuality-specific scene grammar,
      inner/outer/public layer separation, sexual cost topology, body
      remainder, publicness, path-cost, asymmetry-switch drift,
      parity-to-exit, responsibility-to-authority, adult sexual reciprocity,
      dignity-in-practice application constraints, and MIP docking guards. It
      must not modify the completed PMS Core case except where a direct
      PMS.yaml inconsistency has been separately identified. No such
      inconsistency is identified here.

  pms_v13_conformity:
    status: "conformant_overlay"
    base_schema_version: "PMS_1.3"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    no_direct_adultness_verdict: true
    notes:
      - >
        PMS-SEX uses the default PMS repository dependency path as its reference
        spine for domain-specific application. Reduced formulas are shorthand,
        not alternative dependency graphs, and they do not suspend PMS operator
        order or PMS dependency hygiene.
      - >
        Publicness, outer legibility, pre-reflective readability, path-cost,
        stabilization burden, body remainder, sexual cost topology,
        asymmetry-specific responsibility, EDEN/PFO switch language,
        parity-to-exit, responsibility-to-authority, adult sexual reciprocity,
        MIP docking, and any paper-internal SEX terms are overlay/application
        concepts, not PMS operators.
      - >
        Suspended self-binding means Ψ is present as a deliberately suspended
        attribution condition. It is not absent, replaced, removed, or
        transformed into a new operator.
      - >
        Sexual cost topology is a scene-bound Ω/Θ cost layout. It is not a
        score, not a person measure, not a dignity measure, not a maturity
        measure, not a biological taxonomy, and not an orientation taxonomy.
      - >
        PMS–EDEN names the regime-level asymmetry switch. PMS-SEX reads its
        sexual instantiation only where body-, exposure-, reputational-,
        publicness-, and consequence-asymmetries make the mechanism
        domain-salient. In this abstract case, such relevance remains
        conditional and not established as concrete scene fact.
      - >
        Asymmetry-switch drift, parity-to-exit, and
        responsibility-to-authority are PMS-SEX drift profiles. They are not
        person labels, not group labels, not ideology claims, not moral
        verdicts, not maturity rankings, and not new PMS operators.
      - >
        Adult sexual reciprocity is a PMS-SEX viability principle: unequal
        burdens must not be externalized. It does not require equal burdens,
        identical role tasks, symmetry of content, or a direct adultness
        verdict.
      - >
        Dignity-in-Practice remains the PMS-derived construct with canonical
        derivation ["Ψ", "Χ", "Ω"]. PMS-SEX adds application-side D-compliance
        conditions but does not revise PMS-D.
      - >
        No term called NRK is introduced or used here. Nothing in this overlay
        is treated as Action_E unless it satisfies the PMS-derived formula for
        Action_E in PMS.yaml rather than a paper-internal shorthand.

  overlays: {}

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >
      PMS-SEX introduces no PMS operators or dependencies. Its reduced
      signatures, publicness/documentation overlays, path-cost language,
      sexual cost topology, EDEN/PFO switch references, asymmetry-switch drift,
      parity-to-exit, responsibility-to-authority, adult sexual reciprocity,
      modulators, warning signals, MIP docking guards, and any paper-internal
      terms remain application-level constructs only. They may make some
      aspects of the consent-under-asymmetry case more visible if the case is
      later specified as a sexual praxis scene, but they do not change PMS Base
      and do not convert the abstract Core case into a concrete sexual scene.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    paper_refs:
      - "Ch. 0.2"
      - "Ch. 0.4"
      - "Ch. 0.9"
      - "Ch. 21"
      - "Ch. 22"
      - "Appendix B"
    note: >
      This gate constrains PMS application only, not critique, rejection,
      refusal, revision, or rival formalization.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          Maintained meta-position and stop-capability; no fusion into verdict,
          urgency, enforcement, person-level attribution, role, impulse,
          asymmetry activation, parity claim, responsibility claim, or
          self-justifying rhetoric.
        case_application: >
          Distance is maintained by treating the SEX overlay as conditional and
          subordinate to the Core case. The case material does not supply a
          concrete sexual scene, concrete actors, chronology, jurisdiction,
          evidence record, or role history. Therefore the overlay does not
          decide whether consent is valid, invalid, coerced, absent, mature,
          adult, pathological, legally operative, or clinically impaired. Χ
          blocks fusion into sexual verdict, public accusation, person-level
          label, asymmetry authority, or responsibility rhetoric.
      reversibility:
        id: "reversibility"
        status: "maintained"
        meaning: >
          Scene-bound, configuration-specific, revisable readings; no global
          person labels, irreversible interpretive claims, identity verdicts,
          maturity verdicts, or ontological attributions.
        case_application: >
          Reversibility is preserved because every SEX overlay finding is
          marked as abstract, conditional, weak, not applicable, or
          under-specified unless the completed Core case and the given case
          material explicitly support stronger activation. A later concrete
          scene could strengthen, weaken, redirect, or invalidate any overlay
          reading by specifying actors, role-positions, embodied consequences,
          publicness, exit costs, recurrence, self-binding, or rival
          frameworks.
      Dignity_in_Practice_D:
        id: "D"
        name: "Dignity-in-Practice"
        status: "maintained"
        meaning: >
          No shaming, humiliation, person-ranking, diagnosis, orientation
          taxonomy, maturity hierarchy, dignity hierarchy, or person-worth
          evaluation; critique targets enacted structures and cost handling
          only.
        case_application: >
          Dignity-in-Practice is preserved by treating D as a praxeological
          application constraint under Ω, Χ, and Ψ, not as ontological dignity,
          moral superiority, sexual normality, adultness ranking, or person
          value. The overlay does not rank sexual preferences, roles,
          orientations, capacities, vulnerabilities, or identities. It only
          marks how a possible sexual consent configuration would need to
          handle asymmetry, cost distribution, publicness, exit, and
          responsibility without humiliation or externalized burden.
    prohibits:
      - "sexual_cost_topology_as_score"
      - "asymmetry_switch_as_authority"
      - "parity_to_exit_as_reciprocity"
      - "responsibility_to_authority_as_care"
      - "operator_profile_as_direct_adultness_verdict"
      - "outer_legibility_as_public_punishment_license"
      - "path_cost_as_person_value"
      - "disturbance_language_as_orientation_taxonomy"
    gate_result: "valid_as_sex_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    canonical_order:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependencies:
      "Δ": []
      "∇": ["Δ"]
      "□": ["Δ", "∇"]
      "Λ": ["□"]
      "Α": ["Δ", "∇", "□", "Λ"]
      "Ω": ["Α"]
      "Θ": ["Ω", "Α"]
      "Φ": ["Θ", "Ω", "□"]
      "Χ": ["Φ", "Θ", "□"]
      "Σ": ["Χ", "Φ"]
      "Ψ": ["Σ", "Θ", "Χ"]
    dependency_hygiene_note: >
      Reduced signatures may foreground a cluster such as Ω → Θ, Λ → Α → Ω →
      Θ, or Ω/Θ → Χ/Σ/Ψ re-binding. Such foregrounding does not suspend,
      bypass, or reorder PMS dependencies. Any use of Χ in a reduced signature
      presupposes Φ, Θ, and □. Any use of Ψ presupposes Σ, Θ, and Χ. For this
      case, Ω is conceptually active from the Core consent-under-asymmetry
      reading, but the PMS dependency from Α to Ω remains marked as weak
      because the abstract case does not establish stabilized recurrence.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  references:
    pms_github: "https://github.com/tz-dev/Praxeological-Meta-Structure-Theory"
    pms_yaml_raw: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    mip_github: "https://github.com/tz-dev/Maturity-in-Practice"
    pms_eden_github: "https://github.com/tz-dev/PMS-EDEN"
    pms_sex_github: "https://github.com/tz-dev/PMS-SEX"

  sex_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic, non-therapeutic."
      - "No person-level judgment, no person-ranking, no orientation taxonomy, no identity verdict."
      - "No maturity hierarchy, dignity hierarchy, humiliation, or moral pathology."
      - "No direct adultness verdict; maturity-relevant evaluation belongs only to explicit downstream MIP docking."
      - "No how-to guidance, no risk-management manual, no optimization logic, no legal or forensic authority."
      - "Sexual cost topology is scene-bound cost layout, not score or ranking."
      - "Outer legibility is not public-punishment license."
      - "Internal framing is real but not total."
      - "Publicness is overlay, not necessary origin of consequence."
      - "Asymmetry-switch drift, parity-to-exit, and responsibility-to-authority are configuration markers, not person labels."
    may_add_visibility_to:
      - "sexuality as recurring praxis pressure"
      - "scene/frame grammar"
      - "internal framing"
      - "outer legibility"
      - "pre-reflective scene readability"
      - "publicness as □ extension"
      - "path-cost / stabilization burden"
      - "body as non-operator remainder"
      - "sexual cost topology"
      - "EDEN/PFO asymmetry-switch sexual instantiation"
      - "asymmetry-switch drift"
      - "parity-to-exit"
      - "responsibility-to-authority"
      - "adult sexual reciprocity"
      - "asymmetry-specific responsibility"
      - "cost-topology mismatch"
      - "functional minimum conditions"
      - "warning signals"
      - "minimal psychology adapter"
      - "Dignity-in-Practice module"
      - "MIP docking guards"
    must_not_do:
      - "treat sexuality as person essence"
      - "treat structural readability as diagnosis"
      - "treat path-cost as person value"
      - "treat sexual cost topology as maturity or dignity score"
      - "treat body remainder as biological taxonomy"
      - "treat publicness as accusation license"
      - "treat asymmetry activation as automatic drift"
      - "treat parity as automatic reciprocity"
      - "treat responsibility as authority"
      - "treat operator profile as adultness verdict"
      - "claim PMS Base validation"

  overlay_concepts:
    note: >
      Overlay concepts are application-level only. They are not PMS operators,
      not diagnoses, not person labels, not group labels, not ideology claims,
      not sexual-orientation taxonomies, not maturity verdicts, and not moral
      verdicts.
    internal_framing:
      name: "Internal Framing"
      is_operator: false
      applicability: "weak"
      definition: >
        How a scene is inhabited, narrated, or lived from within the
        configuration: as play, service, devotion, experimentation, intimacy,
        kink, discipline, restraint, authenticity, casualness, non-binding
        practice, or otherwise.
      guard: >
        Internal framing may shape experience but does not by itself determine
        or erase outer structural form, sexual cost topology, or Ω/Θ
        consequence distribution.
      case_application: >
        The abstract case does not provide an internal sexual framing. It names
        consent under asymmetry, not a particular scene inhabited as intimacy,
        play, experimentation, commitment, casualness, discipline, restraint, or
        non-binding practice. Internal framing is therefore weak: it is relevant
        only as a later question if a concrete sexual consent scene is supplied.
        It must not be used now to infer desire, authenticity, fear,
        enjoyment, motive, identity, or orientation.
    outer_legibility:
      name: "Outer Legibility"
      is_operator: false
      applicability: "weak"
      definition: >
        The structurally readable action-form a scene presents under visible
        asymmetry, exposure, markedness, repetition, and consequence,
        independent of whether internal framing confirms or contests that
        readability.
      guard: >
        Naming outer legibility does not imply person-ranking, diagnosis, moral
        verdict, denial of consent, public-punishment license, or total
        interpretation of the scene.
      case_application: >
        Outer legibility is weak because no visible sexual scene, marked role,
        exposure pattern, public circulation, repetition, or embodied
        consequence is supplied. The only outer form presently readable is the
        abstract form of a consent relation made structurally contestable by
        asymmetry. This does not permit denial of consent, accusation,
        diagnosis, public punishment, or person-level interpretation.
    pre_reflective_readability:
      name: "Pre-Reflective Scene Readability"
      is_operator: false
      applicability: "not_applicable"
      definition: >
        Early or immediate scene-legibility of certain marked configurations
        before elaborate internal translation or justificatory narration.
      guard: >
        This is a structural readability claim, not a psychology thesis, not a
        theory of innocence, and not a license for person-ranking.
      case_application: >
        Pre-reflective scene readability is not applicable at this level
        because the case contains no concrete scene-image, visible role
        configuration, publicly readable act-form, or marked sexual practice.
        Treating the abstract topic itself as pre-reflectively readable would
        overextend the SEX overlay and reduce Χ distance.
    publicness_as_overlay:
      name: "Publicness as Overlay"
      is_operator: false
      pms_layer: "□ extension"
      applicability: "weak"
      primarily_intensifies:
        - "Ω"
        - "Θ"
      interacts_with:
        - "□"
        - "Α"
        - "Λ"
        - "Φ"
      definition: >
        Publicness as a frame-extension that distributes, amplifies, documents,
        repeats, or sedimentizes a scene’s readability and consequences without
        necessarily generating the scene’s primary form in the first place.
      guard: >
        Publicness is neither always the origin nor automatically irrelevant.
        It modifies the consequence field and can harden cost topology without
        replacing scene reconstruction.
      case_application: >
        Publicness is weak and not evidenced. The Core case leaves open whether
        consent is private, interpersonal, institutional, documented,
        circulated, witnessed, reputationally sedimented, or publicly contested.
        If a later scene includes documentation, publicity, social circulation,
        or reputational consequence, publicness may intensify Ω and Θ. In the
        current abstract case, it cannot be treated as the origin or proof of
        asymmetry.
    path_cost_language:
      name: "Path-Cost / Stabilization Burden"
      is_operator: false
      applicability: "weak"
      definition: >
        Configuration-level language for the operator-work required to keep a
        configuration coherent, reversible, non-coercive, and
        dignity-preserving under recurrence and temporality.
      guard: >
        Path-cost, disturbance, entropy, deviation, and stabilization burden do
        not classify persons, diagnose identities, rank orientations, lower
        dignity, rank maturity, or authorize moral pathology.
      case_application: >
        Path-cost is weakly relevant as an abstract burden of maintaining
        consent under asymmetry without externalizing costs, collapsing into
        coercion, treating parity as exit, or converting responsibility into
        authority. Because no recurrence, chronology, or concrete scene is
        supplied, path-cost cannot be quantified, scored, assigned to persons,
        or used as a maturity or dignity measure.
    body_remainder:
      name: "Body as Non-Operator Remainder"
      is_operator: false
      applicability: "weak"
      paper_refs:
        - "Ch. 13"
      definition: >
        The body is treated as a material remainder or consequence interface
        that forces visibility, irreversibility, and cost recognition without
        becoming a new PMS operator.
      guard: >
        Body remainder is not a person-ranking device and not a biological
        taxonomy. It names material consequence capacity within configurations.
      case_application: >
        Body remainder is weak because the case title and material concern
        consent under asymmetry and do not explicitly describe sexual contact,
        bodily exposure, bodily risk, embodied consequences, or material
        irreversibility. If the case is later specified as a sexual praxis
        scene, body remainder may become important as a non-operator
        consequence interface. It remains non-taxonomic and cannot be used for
        biological ranking or person evaluation.
    sexual_cost_topology:
      name: "Sexual Cost Topology"
      is_operator: false
      claim_type: "DOMAIN_INSTANTIATION"
      applicability: "weak"
      not_a_score: true
      no_person_ranking: true
      no_dignity_ranking: true
      no_maturity_ranking: true
      definition: >
        Scene-bound distribution of bodily, temporal, exposure-related,
        reputational, binding-related, exit-related, publicness-related, and
        responsibility-related costs across sexual role-positions.
      function: >
        Sexual cost topology asks which costs attach where, which costs are
        non-delegable, which can be externalized, which sediment under Θ, who
        can invoke asymmetry as exception, who can invoke parity as exit, and
        who can convert responsibility into authority. In this case it functions
        only as a required later calibration interface: the Core case makes
        consent-under-asymmetry structurally visible, but it does not yet supply
        the sexual role-positions, embodied consequence channels, publicness
        channels, exit channels, or binding channels needed to map topology.
        Therefore topology is neither absent as a possible SEX question nor
        present as a finding.
      dimensions:
        bodily_non_delegability:
          operators:
            - "Ω"
            - "Θ"
          case_application: >
            Bodily or material non-delegability is not established by the
            abstract case. It becomes relevant only if a concrete sexual scene
            includes bodily exposure, physical consequence, material risk, or
            embodied cost. No biological ranking, person evaluation, or
            capacity diagnosis is permitted.
        exposure_and_publicness:
          operators:
            - "Ω"
            - "Θ"
            - "□"
          case_application: >
            Exposure and publicness costs are not established. The case leaves
            open whether consent, refusal, pressure, or contestation becomes
            visible to others, documented, repeated, circulated, reputationally
            sedimented, or institutionalized. Any later exposure analysis must
            remain scene-bound.
        reputational_sedimentation:
          operators:
            - "Ω"
            - "Θ"
            - "Φ"
          case_application: >
            Reputational sedimentation is not evidenced. It is a possible
            later Θ/Φ question if agreement, refusal, or contestation becomes
            recontextualized over time in reputational or public frames. It
            cannot be inferred from the abstract consent-asymmetry description.
        exit_cost:
          operators:
            - "Ω"
            - "Θ"
            - "Χ"
          case_application: >
            Exit cost is structurally relevant in principle because dependency,
            vulnerability, pressure, and unequal capacity may affect the real
            cost of refusal, pause, withdrawal, recovery, or later rereading.
            It remains under-specified because no role-positions, alternatives,
            chronology, dependency facts, or exit channels are supplied.
        responsibility_externalizability:
          operators:
            - "Ω"
            - "Ψ"
            - "Χ"
          case_application: >
            Responsibility externalization is a risk to watch, not a finding.
            A concrete scene would need to show that one role-position shifts
            the cost of asymmetry, exposure, refusal, or repair onto another
            while preserving a parity or autonomy surface. The abstract case
            does not establish such displacement.
        frame_control_capacity:
          operators:
            - "□"
            - "Φ"
            - "Ψ"
          case_application: >
            Frame-control capacity is relevant as a question because consent
            under asymmetry often turns on who can define, redefine, contest,
            close, or reopen the meaning of agreement or refusal. It remains
            weak because the case supplies no actor who controls the frame and
            no evidence of self-binding authority over interpretation.
        asymmetry_activation_capacity:
          operators:
            - "Ω"
            - "Φ"
            - "Ψ"
          case_application: >
            Asymmetry activation capacity is structurally relevant as a
            possible SEX overlay question: who can invoke vulnerability,
            dependency, capacity, exposure, or protection as an exception,
            responsibility claim, or cost claim. The abstract case provides no
            concrete activation, so the reading remains weak and reversible.
      guard: >
        PMS-SEX does not claim equal costs. It requires that unequal costs not
        be externalized. Sexual cost topology must never become a person score,
        dignity ranking, maturity ranking, role-blame totalization, sexual
