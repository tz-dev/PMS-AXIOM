  eden_overlay_synthesis:
    primary_sex_reading: >
      PMS-SEX makes visible that a consent-under-asymmetry case, if specified
      as sexual praxis, would require explicit attention to inner/outer/public
      layer separation, sexual cost topology, body remainder, exit realism,
      publicness, path-cost, asymmetry-switch drift, parity-to-exit,
      responsibility-to-authority, adult sexual reciprocity, and Dignity-in-
      Practice. In the current abstract case, these are visibility requirements
      and risk lenses, not findings.
    scene_frame_result: >
      The bounded frame remains conceptual: consent under asymmetry. It is not
      a concrete sexual scene, not a legal case, not a clinical case, not a
      forensic case, and not an implementation case. PMS-SEX therefore
      operates as an overlay on the Core PMS structure rather than as scene
      adjudication.
    internal_framing_result: >
      Internal framing is not supplied. No claim can be made about desire,
      intimacy, play, commitment, casualness, experimentation, fear,
      authenticity, refusal motive, or subjective experience.
    outer_legibility_result: >
      Outer legibility is weak. The only externally readable form is the
      abstract structure of consent made contestable by asymmetry. No concrete
      sexual act-form, exposure-form, humiliation-form, authority-form,
      possession-form, or public-form is supplied.
    publicness_result: >
      Publicness is not active. No documentation, circulation, audience,
      reputational sedimentation, media layer, or public contestation is
      described. Publicness remains a possible later □ extension, not origin or
      accusation license.
    body_remainder_result: >
      Body remainder is weak. The abstract case does not supply bodily
      contact, bodily exposure, bodily risk, embodied consequence, or material
      irreversibility. It remains a non-operator consequence interface that
      could become relevant only in a concrete sexual scene.
    sexual_cost_topology_result: >
      Sexual cost topology cannot be mapped as a finding. Bodily, temporal,
      exposure, reputational, binding, exit, publicness, and responsibility
      channels are not supplied. The overlay records that these channels would
      need explicit reconstruction before any sexual-praxis conclusion became
      warranted.
    asymmetry_temporality_result: >
      Ω is conceptually active because the Core case explicitly concerns
      asymmetry. Θ is under-specified because the case supplies no chronology.
      PMS-SEX therefore treats exit realism, cost accumulation, temporal
      sedimentation, withdrawal, and later contestation as required calibration
      points rather than findings.
    distance_integration_binding_result: >
      Χ is preserved as the main application guard. Σ remains weak because no
      integrated enactment, coordinated cost topology, or resolved consent
      structure is supplied. Ψ remains weak for the scene and active only as
      analytic self-binding discipline; no self-binding commitment, suspended
      self-binding drift, or Ψ leak is established.
    drift_result: >
      Drift is not active as a finding. The main PMS-SEX drift risks are Φ
      inflation where recontextualization outruns integration, Ω escalation if
      asymmetry becomes steering, Θ cost externalization if consequences
      accumulate asymmetrically, and switch-drift risks if parity or
      responsibility language later mismanages cost topology. All remain
      risk-level only.
    switch_drift_result: >
      Asymmetry-switch drift, parity-to-exit, and responsibility-to-authority
      do not appear as findings. They remain conditional risk profiles because
      the case gives no concrete parity claim, asymmetry activation,
      responsibility claim, authority conversion, unmarked exception lever, or
      cost-topology mismatch.
    reciprocity_result: >
      Adult sexual reciprocity is weak and under-specified. The overlay can
      state the viability principle that unequal burdens must not be
      externalized, but it cannot assess whether reciprocity is satisfied,
      partial, absent, or failed without a concrete sexual cost topology.
    dignity_result: >
      Dignity-in-Practice is preserved as praxeological restraint. The overlay
      avoids shaming, humiliation, person-ranking, orientation taxonomy,
      diagnosis, legal conclusion, moral verdict, maturity ranking, adultness
      verdict, and dignity hierarchy.
    mip_docking_result: >
      MIP docking is not triggered. PMS-SEX records operator profiles and risk
      lenses only. No adultness-relevant or maturity-relevant evaluation is
      issued.
    non_capture_result: >
      Non-capture remains open for subjective experience, law, clinical
      capacity, embodiment, erotic meaning, cultural context, political power,
      institutional procedure, evidence, and rival theories of consent,
      autonomy, care, domination, communication, or vulnerability.
    final_sex_formula_or_signature: >
      Case-specific SEX overlay signature:
      SEX_linear_spine_active + MF_3_2_frame_active + MF_9_2_recontextualization_active +
      MF_10_2_distance_active + D_pms_sex_application_formula_ch21_3_active_as_guard,
