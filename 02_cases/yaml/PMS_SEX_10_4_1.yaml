        - "adultness_verdict"
        - "person_label"
        - "moral_failure_claim"
        - "dignity_hierarchy"
    IA_box:
      Transparent:
        question: "Was the asymmetry legible?"
        case_application: >
          At the conceptual level, asymmetry is legible because the case names
