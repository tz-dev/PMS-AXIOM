        timeline, evidence, effects, alternatives, publicness, counter-scene, and falsifier.'
      reversible: true
      responsible_role: future_case_owner_or_analyst
    short_term_feasible:
    - Preserve this output as a working note only.
    - Keep D-module off and avoid person-level language.
    - Mark A-score provisional and M-score withheld/capped.
    - Add a concrete scene packet only if the user wants a future applied case analysis.
    medium_term_feasible:
    - Develop an evidence table separating observed events, interpretations, role claims, costs, and alternatives.
    - Add affected-role contestation and an independent counter-perspective.
    - Re-run IA-box if publicness or decision use changes.
    - Review whether EDEN remains suspended or becomes materially supported.
    overambitious_or_risky:
    - Using this output to confront someone about immaturity or lack of acknowledgment.
    - Treating role_A or role_B as a person profile.
    - Activating D-module without safe frame.
    - Converting EDEN or MIP shorthand into obligation, intervention, or sanction.
    - Publishing the analysis or applying it to identifiable persons.
    protection_first_if_low_M_high_harm:
    - If a later concrete scene shows high harm but low actor M due lack of predictability/options, prioritize protection
      and clarification over blame.
    - Use reversible support measures before responsibility escalation.
    - Separate harm prevention from dignity ranking.
    structural_change_if_high_M:
    - If a later scene shows high knowledge, high power, clear alternatives, predictable consequences, and no integration
      attempt, focus on structural correction, review, and accountability procedures rather than person condemnation.
    - Make acknowledgment conditions, review points, and responsibility distribution explicit.
    - Ensure affected-role voice and reversibility.
