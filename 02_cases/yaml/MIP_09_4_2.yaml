  uniform_report:
    generate_only_from_structured_fields: true
    title: 'MIP Analysis: Recognition (Acknowledgment) over PMS Core and PMS-EDEN Overlay'
    overview_4_to_7_sentences: This MIP analysis treats the completed PMS Core case as a conceptual recognition-as-acknowledgment
      packet, not as a concrete person or event assessment. The EDEN overlay remains subordinate and suspended as a mechanism
      finding because real Ω, displaced responsibility, cost shift, and blocked/weakened/simulated/avoided/externalized Σ/Ψ
      are not concretely established. MIP therefore maps maturity-in-practice mainly through awareness, coherence, responsibility
      hygiene, power-to-act limits, IA risk, trajectory, and transmission discipline. The A-score is only provisional for
      the case packet, while M-score is withheld or capped because actor-level predictability and alternatives are absent.
      The D-module remains off; dignity functions only as a non-degradation and anti-shaming guardrail. The analysis is structurally
      complete as a working note but not mature for decision use or public transmission.
    key_findings:
    - 'The strongest maturity feature is boundary awareness: the analysis knows what it cannot conclude.'
    - 'The strongest coherence feature is layered discipline: PMS Core, EDEN overlay, and MIP analysis remain separate.'
    - Responsibility cannot be assigned to role_A or role_B without concrete scene evidence.
    - Power-to-act exists mainly at the level of analytical transmission and wording, not real-world intervention.
    - IA risk is present because recognition, timing, language, and analysis can create asymmetry if applied prematurely.
    - Dignity is protected by keeping D0 untouched and the D-module inactive.
    A_summary: 'A(H) is provisionally mapped around 4-5 for the conceptual packet: mature in structural awareness and guardrail
      discipline, limited by absence of concrete enactment evidence.'
    M_summary: M is not assigned to role positions; if documentation forces a band, it must remain <=4 because predictability,
      alternatives, capacity, and effects are not evidenced.
    IA_box_summary: 'IA result: IA_risk. The asymmetry is transparent as an analytical risk, partially justified for structural
      clarification, weakly time-bound, and reversible only while kept private and non-decisional.'
    D_summary_if_activated: 'D-module not activated. D appears only as protection: no dignity score, no D0 assessment, no
      public D reading, no person label.'
    trajectory_summary: Across PMS Core, EDEN overlay, and MIP overlay, structural explicitness increases while substantive
      mechanism and responsibility claims remain suspended.
    guardrail_status: Guardrails passed for private working-note analysis; red zones not touched; D-module off; score hygiene
      preserved.
    transmission_status: working_note; not a decision basis and not suitable for public or person-level use.
    practical_implications: No direct action recommendation follows. Future use requires a concrete scene packet, affected-role
      contestation, evidence boundaries, review point, and falsifier.
    conclusion: 'The MIP reading demonstrates maturity by refusing false precision: it maps awareness, coherence, responsibility
      limits, power-to-act limits, IA risk, and dignity protection without converting the conceptual recognition case into
      a person judgment, EDEN verdict, or action authorization.'