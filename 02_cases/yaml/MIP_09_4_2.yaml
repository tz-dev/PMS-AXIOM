schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
case:
  meta:
    case_id: MIP_RECOGNITION_ACKNOWLEDGMENT_FROM_PMS_CORE_EDEN_09_4_2
    case_title: Recognition as Acknowledgment — MIP case application from PMS Core and PMS-EDEN analyses
    documentation_date: '2026-05-29'
    analysts:
    - name: ChatGPT
      role: secondary structural analyst applying MIP
      observer_position: No direct access to an empirical scene; analysis is derived from the completed PMS Core and PMS-EDEN
        case analyses only.
    language: en
    confidentiality_level: internal
    analysis_mode: full
    intended_use: structural_case_review
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: generic
      d_activation_decision: D_module_not_activated; D retained only as a guardrail and protection lens.
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: Completed PMS Core case analysis PMS_CORE_09_4_2.yaml and completed PMS-EDEN overlay case analysis PMS_EDEN_09_4_2.yaml.
    secondary_material: MIP - Maturity in Practice.yaml used only as the MIP model/template for this further case application.
    assumptions_and_inferences: The underlying case remains a conceptual domain projection of recognition as acknowledgment.
      No concrete actors, motives, institutions, harms, legal obligations, clinical facts, or empirical evidence are inferred
      beyond the two completed analyses.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: medium
      reliability_estimate: medium
      known_gaps:
      - No concrete scene, date, institutional setting, or interaction sequence is supplied.
      - No identifiable actors, affected parties, or counter-party statements are supplied.
      - No empirical evidence establishes recurrence, harm, intention, obligation, or repair.
      - No domain-specific legal, political, clinical, or organisational standard is supplied.
      - Dignity-in-practice dynamics are available only as protection constraints, not as observed enactments.
      main_bias_risks_here:
      - Over-assimilating every absence of acknowledgment into failure, breach, drift, or immaturity.
      - Hindsight inflation of responsibility because denial or delay is easy to name after conceptual analysis.
      - Normative overreach by treating acknowledgment as always owed rather than frame-dependent.
      - Dignity-language inflation that could convert structural caution into moral accusation.
      - False symmetry risk if recognition is reduced to equal validation without naming real asymmetry.
  snapshot:
    short_case_description: 'The case analyses recognition as acknowledgment: a person, claim, situation, or responsibility
      may become differentiated, framed, noticed, accepted, denied, delayed, made explicit, or held in non-fit. PMS Core reads
      this as framed differentiation across time with possible non-event, recontextualization, integration, and self-binding.
      PMS-EDEN adds a reversible overlay in which threshold explicitness is active, while breach, NRK, pseudo-symmetry, false
      comparison, and reciprocity-loss readings remain weak or non-established.'
    central_actors_and_roles:
    - No concrete person is analysed as a whole.
    - 'Conceptual object: recognition-as-acknowledgment.'
    - 'Potential acknowledging role: a role-position that can notice, name, accept, refuse, delay, or make explicit.'
    - 'Potential acknowledged side: a person, claim, situation, vulnerability, or responsibility that may depend on acknowledgment.'
    - 'Frame-setting role: conceptual, institutional, interpersonal, ethical, procedural, or political frame that defines
      what counts as acknowledgment.'
    - 'Analyst role: secondary MIP interpreter constrained by PMS/EDEN guardrails.'
    guiding_question: How does the completed PMS Core and PMS-EDEN analysis of recognition-as-acknowledgment translate into
      MIP terms of awareness, coherence, responsibility, power-to-act, IA protection, trajectory, and dignity-safe transmission?
    level:
    - conceptual
    - structural
    - interpersonal_if_later_specified
    - institutional_if_later_specified
    - cultural_or_political_if_later_specified
    first_visible_asymmetry: A potential but under-specified asymmetry appears between the role that can acknowledge, withhold,
      delay, or define acknowledgment and the side whose claim, situation, responsibility, or vulnerability may depend on
      that acknowledgment.
    first_visible_D_themes_optional:
    - Dignity risk if non-acknowledgment becomes shaming, devaluing, humiliating, or rank-producing.
    - Dignity protection if recognition analysis remains reversible, context-bound, non-tribunal, and non-person-labelling.
    - Dignity caution if acknowledgment is confused with worth, parity, superiority, or coerced validation.
  role_mapping:
    object_of_observation:
      type: discourse
      description: Recognition-as-acknowledgment as a conceptual structural field derived from the PMS Core and PMS-EDEN analyses.
      role: analysed conceptual enactment-pattern, not a person, diagnosis, obligation verdict, or empirical event
      not_person_as_whole: true
    observer_position:
      role: secondary structural analyst applying MIP to already-completed PMS/EDEN case analyses
      power_relation_to_object: Interpretive power over the rendering only; no practical power over concrete actors because
        no concrete actors are supplied.
      possible_effects_of_analysis: Can clarify thresholds, asymmetry risks, responsibility limits, and transmission guardrails;
        can mislead if treated as empirical finding, moral verdict, or decision basis.
    involved_roles:
    - role: Potential acknowledging role
      mandate: To notice, name, accept, refuse, delay, or make explicit only within a defined frame and with reason-giving
        discipline.
      built_in_asymmetries:
      - Can define whether acknowledgment is given, delayed, withheld, or reframed.
      - May control explicitness and timing.
      - May hold authority, procedural gatekeeping power, or narrative power if a later concrete scene supplies it.
      publicness_level: institutional
      dignity_exposure: Medium in potential; low in the present conceptual application because no identifiable person is exposed.
    - role: Potential acknowledged side
      mandate: May present or embody a person, claim, situation, vulnerability, or responsibility seeking or requiring acknowledgment
        within a frame.
      built_in_asymmetries:
      - May be dependent on another role's recognition capacity.
      - May bear the cost of denial, delay, silence, or misrecognition.
      - May be exposed to false comparison if acknowledgment becomes rank or worth.
      publicness_level: semi_public
      dignity_exposure: Potentially high if the recognition field becomes public, shaming, irreversible, or person-labelling.
    - role: Frame-setting role
      mandate: To specify the conceptual, procedural, ethical, legal, political, or interpersonal criteria by which acknowledgment,
        denial, delay, explicitness, or refusal becomes meaningful.
      built_in_asymmetries:
      - Can make some acknowledgment-events visible and others invisible.
      - Can legitimate silence, refusal, or delay, or conversely render them as structured non-events.
      - Can shift the field from praxis-relation to value-relation if poorly handled.
      publicness_level: institutional
      dignity_exposure: Medium because frame-setting can protect dignity or turn dignity language into a tribunal.
    - role: Analyst / model-user role
      mandate: To keep the MIP reading structural, reversible, bounded, non-diagnostic, and free of person labels.
      built_in_asymmetries:
      - Can amplify a conceptual reading into a quasi-verdict if guardrails fail.
      - Can overselect PMS/EDEN terms and underreport rival interpretations.
      - Can protect the case by marking uncertainty, non-capture, and review conditions.
      publicness_level: private
      dignity_exposure: Low if internal and reversible; high if transmitted as shaming, ranking, or moral indictment.
    publicness:
      level: private
      A_P_relevance: Awareness of publicness is necessary because recognition and non-recognition change meaning when made
        public, amplified, archived, or tied to status.
      P_PU_relevance: Power-to-act increases sharply if the analysis is transmitted, institutionalised, or used to pressure
        acknowledgment; present use should remain internal and reversible.
      D_P_relevance_if_D_active: If D were activated in a concrete public scene, public dignity exposure would require stricter
        moderation, no person labels, no score language, and no public D-reading of identifiable persons.
      public_shaming_risk: Low in the present internal conceptual application; non-trivial if exported as a verdict about
        a person or group.
      reversibility_risk: Low while treated as a working structural note; high if copied into an irreversible report, sanction
        logic, or public accusation.
  frame_vs_variability:
    frame_elements:
    - element: Conceptual case status from PMS Core
      reason_fixed_or_slow: The completed PMS Core analysis explicitly marks the case as a conceptual domain projection rather
        than a concrete scene.
      protected_goods:
      - non-overreach
      - no empirical claim without evidence
      - reversibility
      - rival-model openness
    - element: PMS-EDEN overlay validity gate
      reason_fixed_or_slow: The EDEN application is valid only as reversible, non-diagnostic, non-tribunal overlay subordinate
        to PMS Base.
      protected_goods:
      - Distance Χ
      - reversibility
      - Dignity-in-Practice D
      - no person ranking
    - element: MIP score and D guardrails
      reason_fixed_or_slow: A-band, M-band, IA-box, and D language are constrained by MIP as bands, shared responsibility
        checks, asymmetry checks, and qualitative protection lenses.
      protected_goods:
      - score hygiene
      - no dignity score
      - no guilt score
      - no person label
    - element: Absence of concrete scene evidence
      reason_fixed_or_slow: No actors, timeline, power holders, institutional setting, or affected voices are supplied, so
        concrete responsibility and D findings cannot be fixed.
      protected_goods:
      - fairness
      - anti-hindsight discipline
      - non-capture openness
      - contextual humility
    variability_elements:
    - element: Recognition frame calibration
      possible_change: A later concrete application can specify whether acknowledgment is interpersonal, procedural, legal,
        ethical, political, epistemic, or institutional.
      responsible_roles:
      - case owner
      - frame-setting role
      - analyst
      - affected parties if appropriate and safe
    - element: Asymmetry specification
      possible_change: A later scene can specify who has acknowledgment power, who bears exposure, and what capacity, vulnerability,
        obligation, or authority gradient is operative.
      responsible_roles:
      - analyst
      - role holders
      - moderator or supervisor if used
    - element: D-module activation
      possible_change: D can remain off, or be activated only in a protected, non-public, role-bound, time-windowed setting
        with a dignity-protection purpose.
      responsible_roles:
      - analyst
      - moderator
      - case owner
    - element: Transmission status
      possible_change: The analysis can remain a working note, be structurally transmitted with caveats, or be withheld if
        any red-zone use or shaming risk appears.
      responsible_roles:
      - analyst
      - recipient of analysis
      - governance role if institutional
    unfair_high_M_zones:
    - Assigning high M to a concrete role-holder without evidence of knowledge, power, predictability, alternatives, and serious
      integration opportunity.
    - Treating denial, delay, silence, refusal, or rival framing as avoidable failure before the frame and viable alternatives
      are known.
    - Inflating responsibility because EDEN threshold explicitness makes options conceptually visible after the fact.
    system_as_excuse_risk:
    - The absence of a concrete scene could be misused to avoid naming real asymmetry if later evidence supplies it.
    - Frame complexity could become a shield against needed acknowledgment or repair.
    - Reversibility language could be misused to endlessly postpone a justified acknowledgment-event.
    D1_D2_realistically_improvable_where:
    - Use non-shaming language for recognition failure, delay, and refusal.
    - Separate acknowledgment from worth, rank, and moral superiority.
    - Make affected exposure visible before transmitting the analysis.
    - Keep refusal, disagreement, silence, and rival framing available as non-capture possibilities.
  acrp_profile:
    A_awareness:
      observations: 'Awareness is relatively strong at the structural level: PMS Core differentiates recognition objects,
        frames, non-events, temporality, distance, integration, and self-binding; EDEN adds threshold explicitness and weak
        drift handles.'
      available_information: Available information includes the completed Core reading, EDEN overlay gate, EDEN construct
        applicability levels, reduced signatures, and MIP guardrails. It does not include concrete facts.
      realistically_knowable: It is realistically knowable that recognition-as-acknowledgment requires a frame, a differentiated
        object, timing, and care around asymmetry. It is not knowable whether any concrete acknowledgment is owed, failed,
        sincere, manipulative, sufficient, or harmful.
      blind_spots: Concrete actor positions, inner motives, domain norms, legal status, institutional procedure, affected
        perspectives, recurrence, consequences, and available alternatives remain blind spots.
      role_awareness_A_R: The analyst role is not to decide recognition but to mark conditions under which responsibility
        for acknowledgment could become legible.
      publicness_awareness_A_P: The analysis is safe only while internal and non-public; public or institutional use would
        require stronger publicness and D safeguards.
      bias_awareness: Key bias risks are hindsight, confirmation, moralisation of absence, dignity-language escalation, and
        over-identification with the side seeking acknowledgment.
    C_coherence:
      observations: 'The PMS Core and EDEN readings are coherent as bounded structural applications: recognition is treated
        as framed, temporal, reversible, and conditional rather than as metaphysical truth or verdict.'
      word_deed_relation: No concrete word-deed relation can be assessed. Conceptually, coherence would require that acknowledgment
        language be matched by actual uptake, role conduct, and reviewable responsibility handling.
      role_context_coherence: 'Role-context coherence is partial: conceptual roles are identified, but concrete mandates and
        permissions are absent.'
      narrative_coherence: The narrative is coherent as movement from differentiation and frame toward possible non-event,
        explicitness, recontextualization, integration, and self-binding, with EDEN threshold explicitness as the strongest
        overlay.
      breaks_named_or_hidden: 'Breaks are named rather than hidden: Ω, Σ, Ψ, breach, NRK, pseudo-symmetry, reciprocity loss,
        and D findings remain weak or inactive without concrete evidence.'
    R_responsibility:
      observations: Responsibility is conditional and shared. MIP should not assign guilt or person-responsibility; it can
        only mark possible responsibility points if a later scene specifies knowledge, power, predictability, alternatives,
        and integration opportunity.
      responsibility_points: Potential points are frame-setting, making acknowledgment criteria explicit, naming denial or
        delay when appropriate, avoiding false comparison, protecting dignity, and reviewing whether non-acknowledgment is
        legitimate or harmful.
      assumed_responsibility: The present analysis assumes responsibility for disciplined interpretation, not responsibility
        of any concrete actor for a concrete outcome.
      shifted_or_refused_responsibility: No concrete responsibility-shifting is established. EDEN's NRK and responsibility-to-authority
        warnings remain weak risk handles only.
      burdens_and_consequences: 'In a later concrete scene, burdens could fall on the side whose claim or vulnerability remains
        unacknowledged; in this conceptual case the burden is mainly interpretive: not to overstate, shame, or decide.'
    P_power_to_act:
      observations: 'Power-to-act is limited but real at the analysis level: the analyst can clarify frames, mark conditionality,
        keep D off, preserve alternatives, and prevent misuse.'
      real_levers: Real levers include specifying the recognition frame, distinguishing noticing from accepting or validating,
        separating delay from refusal, retaining non-capture, setting review conditions, and limiting transmission.
      formal_vs_real_options: Formally, the model can map many recognition patterns; realistically, it cannot decide a concrete
        event without facts, roles, and counter-perspectives.
      used_options: The analysis uses structural differentiation, IA-checking, EDEN threshold reading, D guardrails, score
        hygiene, and open-question marking.
      unused_options: D-module activation, concrete intervention design, legal/procedural judgment, clinical interpretation,
        public report, and individual sanction logic remain unused.
      ceiling_rule_relevance: Ceiling logic is highly relevant to M-score because predictability and alternatives for any
        concrete actor are not supplied; responsibility must remain capped and conditional.
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: Not observed; no concrete person or self-treatment enactment is supplied.
      self_neglect: Not observed; no concrete practice of self-neglect is supplied.
      shame_dynamics: 'Potential risk only: recognition disputes can become shame-producing if non-acknowledgment is framed
        as worthlessness or if acknowledgment is forced publicly.'
      degradation_of_others: Not established; EDEN devaluation/humiliation constructs are not findings in this case.
      public_shaming: Not present in the internal conceptual application; risk would rise if the analysis were used as a public
        label or tribunal.
      protest_or_refusal: 'Possible but undecided: refusal, silence, or non-fit may be legitimate boundary-setting, prudence,
        incapacity, or rival framing rather than failed maturity.'
      dignity_protection: 'Active as guardrail: preserve D0, avoid D scores, keep readings role-bound, reversible, and non-shaming.'
    next_step_if_relevant: Use D-profile section below.
  acrpd_submodules_profile:
    A:
      A-I: 'Conceptual awareness of the recognition object is strong: person, claim, situation, responsibility, denial, delay,
        and explicitness are differentiated.'
      A-R: 'Role awareness is partial: potential acknowledging, acknowledged, frame-setting, and analyst roles are identified,
        but concrete mandates are absent.'
      A-C: 'Context awareness is moderate: the need for a recognition frame is central, yet the actual domain frame remains
        unspecified.'
      A-IM: Inner motives are not inferred; MIP preserves the PMS/EDEN prohibition on psychological or diagnostic claims.
      A-P: 'Publicness awareness is explicit: internal conceptual use is low-risk, while public or institutional transmission
        would require stricter safeguards.'
    C:
      C-S: Structural coherence is good within the bounded conceptual status; no empirical or legal conclusion is smuggled
        in.
      C-P: Practice coherence is not established because there is no concrete practice sequence; it remains a later-scene
        requirement.
      C-N: 'Narrative coherence is strong enough for a structural reading: recognition moves through frame, time, possible
        absence, explicitness, and conditional integration.'
      C-I: Identity coherence is not assessed; the case does not make identity, essence, motive, or personhood claims.
    R:
      R-I: Individual responsibility is not assigned; any later attribution would require knowledge, power, predictability,
        alternatives, and integration opportunity.
      R-S: 'Structural responsibility is active at the analysis level: frames, roles, publicness, and asymmetry conditions
        must be made explicit before judgments.'
      R-E: 'Effect responsibility is conditional: possible harms of denial, delay, false comparison, or non-recognition are
        visible only as risks, not established outcomes.'
      R-P: 'Public responsibility concerns transmission discipline: do not convert the analysis into public shaming, ranking,
        or coercive acknowledgment pressure.'
    P:
      P-I: Individual power-to-act is not assessed for concrete actors; no personal levers are evidenced.
      P-S: Systemic levers include frame clarification, role clarification, review points, non-capture checks, and protected
        communication settings.
      P-C: 'Constraints are substantial: no concrete scene, no evidence of alternatives, no affected voice, no recurrence
        proof, and no domain standard.'
      P-PU: Public power must remain unused except as anonymised structural learning; publication or decision use would increase
        D and reversibility risks.
    D:
      active: false
      D-I: Not activated; no self-respect or self-treatment finding is made.
      D-B: Not activated; no bodily, practical, or self-neglect dignity finding is made.
      D-R: Not activated; relational dignity remains a protection concern only, especially around non-shaming acknowledgment
        language.
      D-P: Not activated; public dignity is relevant only as a transmission guardrail against public D-readings or humiliation.
      note: D-submodules only if D-module is activated and guardrails are fulfilled.
  scores_and_ia:
    A_score:
      A_band: 5-6 (conceptual structural enactment band; not a person score)
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: Derived analysis of recognition-as-acknowledgment as a conceptual field, using completed PMS Core
        and PMS-EDEN analyses, documented on 2026-05-29.
      justification:
        A_awareness: High structural awareness of difference, frame, non-event, temporality, threshold explicitness, and non-capture
          boundaries.
        C_coherence: Moderate-to-high conceptual coherence, with clear limits around concrete scene absence and weak conditional
          operators.
        R_responsibility: Responsibility is handled cautiously as conditional and shared, not as guilt or individual verdict.
        P_power_to_act: Analytical levers are clear, but concrete practical levers are unavailable without a scene.
        modulators_context: A-band is reduced from a higher range because Ω, Σ, Ψ, recurrence, D enactments, and empirical
          counter-perspectives remain under-specified.
      D_excluded_from_A_number: true
    M_score:
      M_band: 2-3 (conditional structural responsibility band; capped by absent concrete predictability and alternatives)
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No concrete actor role is scored. The band applies only to the present conceptual analysis
        field and its transmission responsibility.
      five_factors:
        knowledge: The analyst has knowledge of the completed PMS/EDEN structural readings but not of concrete facts or affected
          perspectives.
        power_control: The analyst controls only wording, boundaries, and transmission of this analysis; no control over a
          concrete recognition scene is supplied.
        predictability: Predictability of concrete consequences is low because no scene is supplied; predictability of misuse
          risk is moderate and must be managed.
        access_to_alternatives: 'Alternatives exist at the analysis level: keep D off, mark uncertainty, require frame calibration,
          and limit transmission. Alternatives for concrete actors are unknown.'
        serious_integration_attempt: The analysis integrates PMS Core, EDEN overlay, MIP guardrails, and counter-perspective
          requirements while keeping weak findings weak.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: For concrete actors, predictability and alternatives are effectively unavailable in the evidence base;
          therefore any concrete M would be capped. The current 2-3 band applies only to the analyst's structural-transmission
          responsibility.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: 'Potential acknowledgment asymmetry: one role may define, grant, withhold, delay, or make explicit
        acknowledgment while another side may carry exposure, dependence, or cost.'
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: partly
        notes: The conceptual need for a frame is transparent, but the concrete recognition criteria and actor roles are not
          supplied.
      J_justified:
        status: unclear
        protected_good_or_purpose: Possible goods include truthfulness, procedural clarity, role accountability, dignity protection,
          and non-coercive recognition.
        notes: No concrete asymmetry can be justified or rejected without a specific frame and evidence.
      TB_time_bound:
        status: partly
        review_points_or_conditions: Review before any concrete use; review immediately if a concrete actor, public transmission,
          sanction, or D-reading is introduced.
        notes: The conceptual trajectory is time-aware, but no concrete time limit is supplied.
      R_reversible:
        status: 'yes'
        real_return_or_exit_options: The analysis can be weakened, revised, or withdrawn; weak EDEN signatures can be removed;
          D remains off.
        notes: Reversibility is currently maintained because the case is internal, conceptual, and non-decisional.
      result: IA_risk
      short_justification: The asymmetry is not established as inadult, but the field contains a clear IA risk if acknowledgment
        power becomes opaque, unjustified, indefinite, irreversible, public, or dignity-injuring.
      immediate_action: Keep the reading as a reversible working note; require frame, role, evidence, publicness, and counter-perspective
        calibration before any concrete application.
  ia_localisation:
    knowing:
      issue: 'It is unclear what exactly is known or knowable in a concrete recognition scene: claim, frame, obligation, harm,
        refusal reason, and affected perspective are missing.'
      possible_intervention: Name the recognition object, evidence base, frame criteria, and what would count as acknowledgment,
        denial, delay, or legitimate refusal.
    being_able:
      issue: The power or capacity to acknowledge is not assigned to any concrete role.
      possible_intervention: Identify who can speak, decide, repair, name responsibility, open review, or protect the affected
        side.
    being_permitted:
      issue: 'Permission boundaries are unknown: some roles may be barred, constrained, or procedurally required not to acknowledge
        in a particular way.'
      possible_intervention: Clarify institutional, ethical, legal, interpersonal, or confidentiality rules before interpreting
        silence or delay.
    willing:
      issue: Willingness cannot be inferred from the conceptual material; non-acknowledgment may reflect refusal, prudence,
        incapacity, boundary-setting, or rival framing.
      possible_intervention: Separate observed conduct from inferred intention and preserve multiple explanations until concrete
        evidence is available.
  ia_protection:
    transparency_measures:
    - State that the analysis is a conceptual MIP application based on completed PMS/EDEN analyses, not a concrete verdict.
    - Define the recognition frame before applying any IA or M reading to a real scene.
    - Mark all weak EDEN signatures as weak and non-established.
    justification_measures:
    - Require a protected good for any asymmetry of acknowledgment, such as truth, safety, procedure, dignity, or accountability.
    - Distinguish justified delay or refusal from avoidant non-recognition.
    - Require counter-perspectives before concluding that non-acknowledgment is unjustified.
    time_boundedness_measures:
    - Set review points when acknowledgment is delayed or withheld.
    - Prevent indefinite deferral from becoming an unmarked structural non-event.
    - Reassess A/M bands if new facts, roles, or consequences appear.
    reversibility_measures:
    - Keep all conclusions editable and non-final.
    - Do not use the analysis for sanctions, public claims, HR decisions, or legal/forensic judgments.
    - Allow rival readings to replace or limit the MIP reading.
    participation_or_voice_measures:
    - Include the affected side's perspective if a concrete scene is later analysed and if doing so is safe.
    - Include the acknowledging role's constraints and frame commitments.
    - Use moderated review where asymmetry or dignity exposure is high.
    dignity_protection_measures:
    - Do not publish person-level D-readings.
    - Do not describe any person as immature, undignified, guilty, evasive, or humiliating from this analysis.
    - Use D language only to protect against shaming, devaluation, humiliation, and rank conversion.
    - Separate recognition from ontological worth.
    review_or_falsifier:
      date_or_interval: Before any concrete application or external transmission.
      falsifier_question: Does the new material show that silence, delay, refusal, or non-fit is legitimate, constrained,
        protective, procedurally required, or better explained by a rival frame rather than by acknowledgment failure?
      responsible_roles:
      - analyst
      - case owner
      - moderator_or_supervisor_if_concrete_scene_is_used
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Recognition object remains only generally available: person, claim, situation, or responsibility
        is not yet clearly differentiated or explicitly framed.'
