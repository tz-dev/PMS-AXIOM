schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
base_relationships:
  MIP_status: independent praxeological case-analysis model used here as a further analysis layer
  PMS_yaml_status: only PMS Base reference for the prior PMS Core and CRITIQUE analyses
  PMS_CRITIQUE_status: overlay/application profile already applied to the PMS Core case
  no_PMS_redefinition: true
  no_CRITIQUE_rewrite: true
  reflection_mode: 'off'
  analysis_depth: full_depth
case:
  meta:
    case_id: MIP-INTERPRETABILITY-VS-REALITY-001
    case_title: Interpretability vs. Reality
    documentation_date: '2026-05-28'
    analysts:
    - name: ChatGPT
      role: MIP structural case analyst
      observer_position: secondary analyst working only from the case material and the already completed PMS Core and PMS-CRITIQUE
        analyses; no independent empirical access
    language: en
    confidentiality_level: internal_structural_working_note
    analysis_mode: full_depth_non_reflective_structural_case_review
    intended_use: internal model-to-model structural reflection; not a decision basis, not empirical validation, not diagnosis,
      not forensic assessment, not implementation guidance
    application_zone: green_structural_case_review
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto_default_off
      output_format: yaml
      discipline_profile: philosophy_anthropology_with_structural_case_review_lens
      d_activation_decision: D_module_not_activated; dignity protection remains active as guardrail
      transmission_default: working_note_until_concrete_scene_and_review_are_available
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: No red-zone use is touched; if later applied to identifiable persons, sanctions, clinical claims,
        forensic claims, HR decisions, public ranking, shaming, or dignity labelling, the MIP application must stop or
        be downgraded to a non-decisional structural reflection.
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: D remains off; if a later concrete scene activates D and D creates more
        shame than clarity, dial D down and work only on structures, protection goods, and reversible role-context interventions.
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: 'Case title ''Interpretability vs. Reality'' and case material: morally difficult situations may
      involve a gap between what can be interpreted or explained and what remains real in practice; completed PMS Core
      case YAML; completed PMS-CRITIQUE overlay YAML.'
    secondary_material: No empirical data, witness material, legal record, clinical material, implementation record, institutional
      file, or external factual source is used.
    assumptions_and_inferences: 'The analysis assumes only a conceptual case object: a modelled tension between explanation
      and practical remainder. It infers possible MIP-relevant themes such as awareness of limits, coherence risk, responsibility
      boundary, power-to-act limits, and dignity-protection discipline from the prior PMS and CRITIQUE analyses.'
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: High coverage of formal PMS/PMS-CRITIQUE boundary material; low coverage of concrete praxis because
        no actor, role situation, sequence, evidence, harm, obligation, publicness, institution, or action scene is supplied.
      reliability_estimate: Reliable as a structural working note grounded in the provided case analyses; not reliable as
        empirical, legal, diagnostic, clinical, implementation, or person-level assessment.
      known_gaps:
      - No concrete actor or role-holder.
      - No described affected party.
      - No temporal sequence, action, non-action, or consequence chain.
      - No evidence about harm, obligation, alternatives, power, or publicness.
      - No domain frame beyond philosophical-praxeological reflection.
      - No independent validation that MIP is superior to rival formalisms for this case.
      main_bias_risks_here:
      - 'Formal coherence bias: the analysis may look stronger because PMS, CRITIQUE, and MIP mutually reinforce structural
        language.'
      - 'Over-assimilation bias: practical remainder could be absorbed into model vocabulary too smoothly.'
      - 'Score temptation: MIP scoring fields could tempt artificial A/M bands despite the absence of a concrete enactment.'
      - 'Dignity inflation risk: dignity-protection language could be mistaken for a D-profile even though D is not activated.'
  snapshot:
    short_case_description: The case asks how morally difficult situations should be understood when what can be interpreted
      or explained does not fully coincide with what remains real in practice. The completed PMS Core pass framed this
      as a bounded, non-concrete conceptual projection centred on Δ, □, Λ, Φ, and Χ, with Σ held weak and non-capture preserved.
      The PMS-CRITIQUE overlay identified only a minimal conceptual critique threshold; framed mismatch held under Distance,
      not productive or stable correction. MIP now reads the same constellation through A–C–R–P discipline while withholding
      A-score, M-score, concrete IA result, and D-module activation.
    central_actors_and_roles:
    - 'Conceptual case object: interpretability/explanation versus practical reality.'
    - 'Analyst role: applies MIP to the completed PMS Core and CRITIQUE analyses without rewriting them.'
    - 'Absent future scene roles: any affected role, responsible role, institutional role, or public role would need to
      be supplied before concrete MIP scoring.'
    guiding_question: What does MIP add to the already completed PMS Core and CRITIQUE analyses without overclaiming maturity,
      responsibility, dignity, asymmetry, or action where no concrete praxis scene is present?
    level:
    - philosophical
    - conceptual
    - structural_case_review
    - model_to_model_integration
    - not_concrete_praxis_scene
    first_visible_asymmetry: 'No concrete asymmetry is visible. The only structurally relevant possible asymmetry is interpretive
      authority over practical remainder: a model, explanation, or analyst frame may gain legibility while the real practice-consequence
      remains under-specified or non-captured.'
    first_visible_D_themes_optional:
    - 'Dignity-protection appears only as a guardrail: do not shame, rank, diagnose, humiliate, or label persons or rival
      readings.'
    - No D1/D2 enactment is observed because no person, body, relation, public exposure, or role scene is described.
  role_mapping:
    object_of_observation:
      type: conceptual_case_artifact
      description: A philosophical case configuration already analysed through PMS Core and PMS-CRITIQUE, not a person,
        group, institution, or empirical event.
      role: object of structural reflection about interpretability, explanation, practical remainder, critique-readiness,
        and non-capture.
      not_person_as_whole: true
    observer_position:
      role: MIP analyst using a structural case-review lens
      power_relation_to_object: The analyst has framing power over the written artefact but no legitimate power over persons,
        real-world consequences, or the practical remainder itself.
      possible_effects_of_analysis: The analysis may clarify boundaries, but it could also over-stabilize the case by making
        a non-concrete object appear more maturely understood than it is. This effect is controlled by withholding scores,
        preserving non-capture, and keeping transmission status as working_note.
    involved_roles:
    - role: PMS Core application role
      mandate: Preserve PMS operator discipline, non-capture, reversibility, and non-diagnostic case typing.
      built_in_asymmetries:
      - Model language may make practical remainder appear legible.
      - Formula clarity may create a false sense of capture.
      publicness_level: private_or_internal_structural_working_note
      dignity_exposure: low, because no identifiable person is analysed; dignity risk appears only if the structure is
        later used for ranking or dismissal.
    - role: PMS-CRITIQUE overlay role
      mandate: Mark critique thresholds, reach, drift risks, and non-coercive follow-up boundaries without rewriting PMS
        Core.
      built_in_asymmetries:
      - Critique language may turn a conceptual mismatch into a judgment-like frame.
      - Drift labels could be misread as accusations if applied to persons.
      publicness_level: private_or_internal_structural_working_note
      dignity_exposure: low in this case; would increase if drift labels were attached to identifiable actors.
    - role: MIP analysis role
      mandate: Read awareness, coherence, responsibility, power-to-act, dignity protection, IA risk, trajectory, and transmission
        status with score hygiene.
      built_in_asymmetries:
      - A/M scoring fields can create pressure to score despite insufficient scene material.
      - D terminology can create dignity-labelling risk if not kept default-off.
      publicness_level: private_or_internal_structural_working_note
      dignity_exposure: controlled by keeping D0 untouched, D inactive, no D score, no person labels, and working-note status.
    - role: Future concrete scene roles, if supplied later
      mandate: Would need to identify affected parties, responsible roles, power levers, alternatives, knowledge, predictability,
        and review conditions.
      built_in_asymmetries:
      - Unknown until concrete case material is provided.
      - Cannot be inferred from the abstract case alone.
      publicness_level: unknown
      dignity_exposure: unknown and not inferable without a scene.
    publicness:
      level: not_public
      A_P_relevance: 'A-P is low but explicitly noted: the analysis is not a public critique, public D-reading, public
        ranking, or reputational exposure event.'
      P_PU_relevance: P-PU is not active. There is no platform, audience, public target, archival exposure, reputational
        lever, or mass-mediated effect in the case material.
      D_P_relevance_if_D_active: D-P would become relevant only if the analysis were published about identifiable persons
        or used for exposure, ranking, or shaming; this use is not allowed here.
      public_shaming_risk: currently low; would become high if the YAML were used to label persons, shame rival readings,
        or present drift risks as accusations.
      reversibility_risk: low inside the private structural artefact; high if transformed into public, institutional, or
        sanctioning language without concrete review and counter-perspective.
  frame_vs_variability:
    frame_elements:
    - element: PMS.yaml as PMS Base for the prior Core pass
      reason_fixed_or_slow: The user explicitly set PMS.yaml as the only PMS Base reference; MIP must not redefine PMS
        operators, order, dependencies, or derived structures.
      protected_goods:
      - operator discipline
      - non-capture
      - reversibility
      - non-diagnostic use
    - element: PMS-CRITIQUE as overlay/application profile
      reason_fixed_or_slow: The user explicitly treated CRITIQUE reduced signatures as overlay shorthand only; MIP must
        not turn them into PMS operators or rewrite the Core pass.
      protected_goods:
      - overlay hygiene
      - critique threshold clarity
      - non-coercion
      - no sanction logic
    - element: MIP guardrails and red-zone boundaries
      reason_fixed_or_slow: The MIP file makes guardrails constitutive; without guardrails, IA/D analysis is invalid.
      protected_goods:
      - profile not person
      - D0 untouchable
      - score hygiene
      - working-note discipline
    - element: Non-concrete status of the case
      reason_fixed_or_slow: No actor, role, scene, evidence, sequence, action, consequence, or institutional context is
        supplied.
      protected_goods:
      - anti-overclaim
      - no forced scores
      - no false IA verdict
      - no invented responsibility
    variability_elements:
    - element: Future concrete scene specification
      possible_change: A later version could add actors, roles, harms, obligations, evidence, temporality, and alternatives.
      responsible_roles:
      - case provider
      - analyst
      - domain reviewer if applied
    - element: A/M score eligibility
      possible_change: Scores could become eligible only if the object shifts from abstract model-to-model analysis to
        a bounded enactment, situation, or role-context episode.
      responsible_roles:
      - MIP analyst
      - reviewer
    - element: D-module activation
      possible_change: D could be activated only with clear purpose, safe communication space, role/context/time window,
        and evidence that D adds protection and clarity rather than shame.
      responsible_roles:
      - MIP analyst
      - guardrail reviewer
    - element: Transmission status
      possible_change: The analysis could move from working_note to structurally_transmittable only after concrete scene
        material, counter-perspective, falsifier, and review are supplied.
      responsible_roles:
      - MIP analyst
      - reviewer
      - case owner
    unfair_high_M_zones:
    - It would be unfair to assign a high M-score to any actor because no actor, knowledge state, power/control, predictability,
      alternatives, or integration attempt is provided.
    - It would be unfair to treat the analyst's formal clarity as evidence that a practical responsible role has been identified.
    - It would be unfair to infer responsibility from the mere presence of moral difficulty.
    system_as_excuse_risk:
    - 'The model stack itself could become an excuse: PMS, CRITIQUE, and MIP language might neutralize practical remainder
      by saying it has been structurally handled.'
    - 'The opposite risk is also present: the absence of concrete action material could be used to avoid later responsibility
      if a concrete scene is eventually supplied.'
    - MIP therefore marks both over-assimilation and responsibility-evasion risks while refusing concrete findings.
    D1_D2_realistically_improvable_where:
    - No D1/D2 enactment can be improved inside the abstract case because no self-treatment, bodily/material self-care,
      relational dignity, or public dignity practice is described.
    - 'The only current improvement is analytic: maintain D-protection language as guardrail, avoid person labels, avoid
      shaming, and require a safe context before any future D reading.'
  acrp_profile:
    A_awareness:
      observations: The prior PMS and CRITIQUE analyses show strong structural awareness of boundaries, non-capture, rival
        readings, weak operators, and the risk that coherence may become too smooth. MIP confirms this as awareness of
        limits rather than awareness of a concrete scene.
      available_information: The available information consists of the abstract case material and the prior analyses. It
        does not include observed conduct, affected roles, real alternatives, institutional procedures, publicness, harm,
        or follow-up.
      realistically_knowable: It is realistically knowable that the case is conceptual, non-empirical, non-diagnostic,
        non-forensic, non-implementation, and not a PMS Base validation. It is not realistically knowable who is responsible,
        what harm occurred, what alternatives existed, or what action should follow.
      blind_spots: The largest blind spots are actor absence, role absence, concrete consequence absence, missing counter-perspective,
        missing domain standard, and no practical validation that explanation or interpretation helped or harmed.
      role_awareness_A_R: 'The analyst role is clear: secondary structural analyst, not judge, therapist, investigator,
        implementer, or decision-maker.'
      publicness_awareness_A_P: Publicness is low and explicitly controlled; the analysis must not become public ranking
        or public D-reading.
      bias_awareness: Bias awareness is high for formal coherence bias and over-assimilation risk; however, no external
        counter-model has been applied, so rival-formalism bias remains a live concern.
    C_coherence:
      observations: 'The PMS Core, CRITIQUE, and MIP readings are internally coherent if each is kept in its proper role:
        PMS as Core structural grammar, CRITIQUE as overlay profile, MIP as further maturity-in-practice case review. The
        risk is that coherence across models may falsely suggest practical adequacy.'
      word_deed_relation: No word-deed relation exists because no deed, decision, promise, follow-up, or enacted response
        is described.
      role_context_coherence: 'Role-context coherence is good at the analytic level: the document repeatedly marks non-concrete
        status, no scoring, no diagnosis, no tribunal, no D activation, and working-note status.'
      narrative_coherence: 'Narrative coherence is strong: the case consistently turns on the difference between interpretability
        and practical remainder. MIP flags the very strength of this coherence as a possible smoothness risk.'
      breaks_named_or_hidden: 'Major breaks are named rather than hidden: no concrete scene, no A/M score, no IA verdict,
        no D-profile, no action, no responsibility assignment, no empirical or metaphysical validation.'
    R_responsibility:
      observations: 'Concrete responsibility is not established. The only current responsibility is analytic responsibility:
        maintain guardrails, avoid score inflation, preserve non-capture, and prevent model language from becoming verdict
        language.'
      responsibility_points: 'Responsibility points exist at the analyst/application level: claim typing, score hygiene,
        D-off discipline, non-capture, rival openness, and working-note transmission.'
      assumed_responsibility: The analysis assumes responsibility for documenting limits and refusing overclaim. It does
        not assume responsibility for solving the moral situation because no situation is given.
      shifted_or_refused_responsibility: No case actor shifts or refuses responsibility because no actor is present. A possible
        analytic drift would be shifting responsibility to model formalism by treating the YAML as if it had solved practical
        reality.
      burdens_and_consequences: 'The burden is interpretive: preventing formal capture from erasing practical remainder.
        Concrete burdens or consequences cannot be named.'
    P_power_to_act:
      observations: The present power to act is limited to documentation, boundary-marking, refusal of overclaim, and specifying
        requirements for any future concrete application.
      real_levers: Real levers include marking non-scored status, keeping D off, naming operationalization requirements,
        requiring a concrete scene, preserving rival readings, and setting transmission status to working_note.
      formal_vs_real_options: Formal options are plentiful because the YAML schema contains many fields; real options are
        narrow because no concrete action context is supplied. This gap is central to the case.
      used_options: Used options include strict guardrails, no A/M scores, no IA verdict, no D activation, and explicit
        non-capture preservation.
      unused_options: Unused options include numerical scoring, person-level interpretation, D-profile activation, concrete
        IA classification, prescriptive action plan, and public transmission.
      ceiling_rule_relevance: 'The M-score ceiling logic supports withholding responsibility scoring: predictability and
        access to alternatives are effectively unavailable for any actor, so high shared responsibility cannot be assigned.'
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: No self-devaluation enactment is visible because no person or self-relation is described.
      self_neglect: No self-neglect or bodily/material self-care pattern is visible.
      shame_dynamics: No concrete shame dynamic is visible; there is only a misuse risk if the model stack were later used
        to shame or label persons or rival readings.
      degradation_of_others: No degradation of others is visible in the case material; the analysis actively guards against
        degradation through non-person-ranking discipline.
      public_shaming: No public shaming is present; publicness is not active.
      protest_or_refusal: Possible rival refusal of PMS or MIP capture is preserved as non-capture, not pathologized or
        treated as immaturity.
      dignity_protection: 'Dignity protection is active as guardrail: D0 untouched, no D score, no person labels, no public
        D-reading, no coercion, no humiliation.'
    next_step_if_relevant: Keep the D-module off unless a concrete role-context-time-window and safe communication space
      are supplied and D would protect dignity more than it risks shame.
  acrpd_submodules_profile:
    A:
      A-I: Inner awareness is not assessable because there is no person, inner signal, emotion, or self-relation. The analysis
        does not infer interiority.
      A-R: 'Role awareness is strong at the analytic level: PMS Core, CRITIQUE overlay, and MIP analysis roles are separated,
        and the object is not treated as a person.'
      A-C: Context awareness is strong for the abstract philosophical-praxeological frame and weak for any empirical or
        institutional context because none is supplied.
      A-IM: 'Impact awareness is active as risk awareness: formal coherence may erase practical remainder, and score/D language
        may create false authority if misused.'
      A-P: 'Awareness of publicness is explicit: the case is not public, not platformed, and not usable for public D-reading,
        ranking, or reputational exposure.'
    C:
      C-S: Social coherence is not assessable as a scene property because no social interaction is described. Analytic social
        coherence is maintained by avoiding labels and sanctions.
      C-P: 'Coherence in power contexts is weak and hypothetical: interpretive authority may dominate practical remainder,
        but no concrete power differential is given.'
      C-N: 'Narrative coherence is high but risky: the interpretation can be made elegant, and that elegance may itself
        obscure the unresolved practical reality.'
      C-I: Institutional/rule coherence is not applicable as an institutional case. Schema-rule coherence is strong because
        PMS, CRITIQUE, and MIP boundaries are kept distinct.
    R:
      R-I: Individual responsibility is not assigned; there is no individual role-holder. The analyst’s own responsibility
        is limited to boundary discipline.
      R-S: Social responsibility is not assessable; no relationship, group, team, care structure, or social burden distribution
        is described.
      R-E: 'Ethical responsibility is active as analysis ethics: avoid overcapture, diagnosis, person-ranking, public shaming,
        and false maturity claims.'
      R-P: Public responsibility is not active because there is no publicness; the analysis would require stricter review
        if made public.
    P:
      P-I: Inner agency is not assessed; no subject or inner capacity is described. The analyst can only enact small reversible
        documentation choices.
      P-S: No social agency is established; no social intervention or relational action is available.
      P-C: 'Cultural agency is active only as framing power: the analysis can shape how interpretability versus reality is
        discussed, but this must not be mistaken for practical repair.'
      P-PU: Public agency is not active; no platform, reach, archive, reputation, or mass audience is present.
    D:
      active: false
      D-I: Not active; no inner dignity or self-relationship can be assessed.
      D-B: Not active; no bodily/material self-care can be assessed.
      D-R: Not active as a D-profile; relational dignity is protected only by avoiding degradation, shaming, and person labels.
      D-P: Not active; public dignity is protected by keeping the analysis non-public and non-ranking.
      note: D remains default-off. D0 is untouched. Any D1/D2 reading would require a concrete role-context-time-window
        and safe communication space.
  scores_and_ia:
    A_score:
      A_band: not_assigned_non_concrete_case
      boundary_confirmed: A-score is withheld because the object is an abstract conceptual case and completed model-analysis
        artefact, not a bounded enactment, situation, or role-context episode eligible for a maturity band.
      time_role_context: 2026-05-28; internal structural working note; analyst role only; no concrete praxis time window.
      justification:
        A_awareness: Awareness profile is structurally strong about limits and non-capture, but scene-awareness is unavailable.
        C_coherence: Coherence profile is strong as formal documentation, but high coherence increases over-smoothness risk.
        R_responsibility: Responsibility profile is analytic-only; no case actor responsibility is available.
        P_power_to_act: Power-to-act profile is limited to documentation and boundary discipline; no practical intervention
          is available.
        modulators_context: Non-concrete status, no actor, no role, no time window, no publicness, no D activation, and
          no empirical material prevent a legitimate A-band.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned_no_actor_or_role_holder
      boundary_confirmed: M-score is withheld because MIP M-score describes shared structural responsibility of an actor
        or role-holder for trajectory and consequences; no actor, role-holder, trajectory, or consequence chain is supplied.
      role_position_time_frame: No role-position-time-frame exists beyond the analyst's documentation role, which is handled
        as guardrail responsibility rather than M-score.
      five_factors:
        knowledge: No actor knowledge can be assessed. The analyst knows the case is abstract and must not infer beyond
          it.
        power_control: No concrete power/control is assessable. The analyst has only framing and documentation control.
        predictability: No concrete consequences are predictable because no action or scene is specified.
        access_to_alternatives: No actor alternatives can be assessed. The analyst has alternatives only in output discipline,
          not in case action.
        serious_integration_attempt: The prior analyses show serious integration attempt as documentation discipline, but
          this does not create a case-actor M-score.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: If a concrete actor were mistakenly introduced without evidence, the MIP ceiling rule would block high
          shared-responsibility claims because predictability and alternatives are not documented. Since no actor exists,
          even a capped M-score is not assigned.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: 'No concrete IA asymmetry is established. Possible conceptual asymmetry: interpretive/model authority
        may dominate practical remainder or affected reality if treated as capture.'
      boundary_confirmed: IA-box is an asymmetry check, not a verdict; here it is not a concrete IA classification.
      T_transparent:
        status: partially_transparent_at_model_level
        notes: The model relationships and limits are transparent; the concrete practical scene is absent.
      J_justified:
        status: partially_justified_as_working_note
        protected_good_or_purpose: The purpose is to protect against overcapture and preserve non-capture while integrating
          MIP with prior PMS analyses.
        notes: The analysis is justified only as internal structural reflection, not as decision basis or case adjudication.
      TB_time_bound:
        status: time_bound_by_review_condition
        review_points_or_conditions: Review is required if concrete scene material, public use, D activation, score use,
          or decision use is proposed.
        notes: No empirical time window is present; the working note is bounded by its documentation date and the current
          material.
      R_reversible:
        status: reversible_as_analysis
        real_return_or_exit_options: The reading can be revised, downgraded, or rejected; no person or institution is bound
          by it.
        notes: Reversibility would be reduced if the analysis were published, used for sanctioning, or attached to identifiable
          persons.
      result: no_concrete_IA_result; conceptual_IA_risk_only
      short_justification: The IA-box does not classify the case because no concrete asymmetry exists. It flags only the
        conceptual risk that model legibility could become one-sided authority over practical remainder.
      immediate_action: Keep as working_note; do not transmit as decision basis; require concrete scene material before
        IA classification.
  ia_localisation:
    knowing:
      issue: What is known is the formal case and prior analyses; what remains unknown is the concrete practice-reality,
        affected roles, evidence, and consequence chain.
      possible_intervention: Document information basis and gaps; require concrete scene material before any scoring, IA
        classification, D-profile, or practical recommendation.
    being_able:
      issue: The analyst is able to structure the case but not able to repair or decide any practical situation.
      possible_intervention: Restrict output to structural working-note language and avoid action claims beyond reversible
        documentation requirements.
    being_permitted:
      issue: The analysis is permitted as internal structural reflection but not as diagnosis, tribunal, public ranking,
        HR/legal/clinical decision support, or implementation instruction.
      possible_intervention: Maintain allowed-use and not-allowed-use lists; stop if red-zone use is requested.
    willing:
      issue: The application must remain willing to preserve non-capture rather than complete the model at all costs.
      possible_intervention: Keep non-capture and rival readings active; refuse artificial A/M scores or D activation.
  ia_protection:
    transparency_measures:
    - State that the object is a conceptual case artefact, not a person or concrete praxis scene.
    - State that the analysis is based only on the provided case material and completed PMS/PMS-CRITIQUE analyses.
    - State that MIP scores and concrete IA classification are withheld.
    justification_measures:
    - Justify the MIP pass as boundary and maturity-structure analysis, not as truth adjudication.
    - Explain that D remains off because no D1/D2 enactment is available.
    - Explain that working-note status protects against false transmission maturity.
    time_boundedness_measures:
    - Bind the analysis to the current documentation date and provided material.
    - Require review when new case material, publicness, implementation, or decision use appears.
    - Do not let the YAML become a permanent label or standing verdict.
    reversibility_measures:
    - Mark all findings as revisable if concrete scene evidence is supplied.
    - Withhold A-score, M-score, D-profile, and concrete IA result.
    - Keep rival formalisms and non-capture open.
    participation_or_voice_measures:
    - If a concrete scene is later supplied, include affected-side, responsible-role, and external-observer perspectives
      before transmission.
    - Do not infer affected-side experience from the abstract philosophical wording.
    - Do not treat lack of a counter-perspective as confirmation.
    dignity_protection_measures:
    - Keep D0 untouched and outside all metrics.
    - Keep D module inactive unless guardrails are fulfilled.
    - Avoid shaming, dignity labelling, person ranking, and public D-reading.
    review_or_falsifier:
      date_or_interval: At any point before concrete application, public sharing, scoring, D activation, or decision use.
      falsifier_question: Does new material show a concrete role-context-time-window with actors, consequences, alternatives,
        asymmetry, and review conditions, or does it show that MIP under-discriminates the case compared with a rival formalism?
      responsible_roles:
      - MIP analyst
      - case provider
      - domain reviewer if applied outside conceptual reflection
  trajectory:
