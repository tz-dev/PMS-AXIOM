      notes: This is not an A-score trajectory of a person or situation. It is a documentation trajectory showing improved
        boundary discipline.
    M_t_RVR_t:
      RVR_description: Responsibility-viability over time cannot be assessed for a case actor. For the analyst role, viability
        consists in knowing the limits, being able to mark them, being permitted to keep the analysis as working note, and
