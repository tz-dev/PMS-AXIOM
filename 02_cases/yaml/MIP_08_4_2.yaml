  uniform_report:
    generate_only_from_structured_fields: true
    title: 'MIP Analysis: Interpretability vs. Reality'
    overview_4_to_7_sentences: This MIP pass treats the case as a non-concrete conceptual case artefact based on the completed
      PMS Core and PMS-CRITIQUE analyses. MIP adds A–C–R–P discipline by distinguishing structural awareness, coherence
      risk, analytic responsibility, and limited power-to-act from concrete maturity findings. The case is not score-eligible;
      no A-band, M-band, concrete IA result, or D-profile is assigned because no actor, role-context-time-window, consequence
      chain, or affected perspective is supplied. The main maturity signal is not high scoring but disciplined restraint;
      preserve non-capture, avoid formal overreach, keep D off, and maintain working-note transmission. The main risk is
      that a coherent model stack could make interpretability look like practical understanding, which would repeat the
      core problem of the case.
    key_findings:
    - The case is suitable for green-zone structural reflection but not for decision use.
    - A-score and M-score are withheld because the object is not a bounded enactment or actor trajectory.
    - IA-box yields no concrete classification; only a conceptual IA risk is visible.
    - D-module remains inactive; dignity protection remains active as guardrail.
    - The PMS/CRITIQUE/MIP stack is coherent but must not be treated as capture of practical reality.
    A_summary: Awareness is strong at the analytic-boundary level and weak at the concrete-scene level. The analysis knows
      its limits, but it does not know the practical scene.
    M_summary: No M-score is assigned. There is no actor or role-holder whose knowledge, power, predictability, alternatives,
      or integration attempt can be assessed.
    IA_box_summary: The IA-box does not classify a concrete asymmetry. It flags only the conceptual risk that model interpretation
      may become asymmetrically authoritative over practical remainder.
    D_summary_if_activated: D is not activated. D0 remains untouched, no D1/D2 profile is created, and dignity protection
      functions only as guardrail against ranking, shaming, or person-level labelling.
    trajectory_summary: The trajectory is an analysis-artefact trajectory from abstract case prompt to PMS Core pass, CRITIQUE
      overlay, and MIP boundary review. It is not a maturity trajectory of a person or concrete situation.
    guardrail_status: 'Guardrails are maintained: profile-not-person, score hygiene, D-off discipline, red-zone avoidance,
      non-capture, reversibility, and working-note status.'
    transmission_status: working_note; not mature for decision-basis transmission.
    practical_implications: Use this output to identify what would be needed for a future concrete analysis, not to decide
      the case. Any concrete application must add roles, evidence, consequences, alternatives, asymmetry, publicness, counter-perspective,
      and review conditions.
    conclusion: 'MIP confirms the prior PMS and CRITIQUE boundary discipline: the case is structurally interpretable but
      not practically resolved, critique-ready but not correction-complete, and analytically mature only insofar as it refuses
      premature scoring, D activation, IA verdict, or capture claims.'