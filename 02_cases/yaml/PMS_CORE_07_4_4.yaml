operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the distinctions that make tragedy analyzable: loss and
      non-loss, conflict and reconciliation, guilt and innocence,
      responsibility and non-responsibility, reversible and irreversible,
      resolving action and non-resolving remainder, interpretation and
      non-capture.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the relevant distinction is loss, conflict, guilt, responsibility, irreversibility, non-resolution, or non-capture."
      - "Check whether distinctions are imported from rival theories of tragedy rather than warranted by the case material."
    falsifier_conditions:
      - "If no stable distinction can be identified, the PMS reading loses its entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.

  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as weak structural directedness toward repair,
      interpretation, reconciliation, responsibility, answer, or action. It is
      not a psychological desire claim because no concrete subject or scene is
      provided.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Specify whether the tension is practical, argumentative, explanatory, ethical, narrative, affective, institutional, or structural."
      - "Do not infer subjective desire, motivation, avoidance, or drive unless a concrete scene supplies evidence."
    falsifier_conditions:
      - "If no directional tension arises from Δ, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.

  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because the case explicitly asks how tragedy should be
      understood as a category. The relevant frame is the tragic category as a
      philosophical frame for meaningful unresolved loss, conflict, guilt,
      responsibility, and irreversibility.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as the philosophical category of tragedy."
      - "Check whether frame shifts occur between tragedy as category, tragedy as genre, tragedy as metaphysical condition, tragedy as ethical conflict, and tragedy as narrative non-closure."
    falsifier_conditions:
      - "If no frame is specified, the analysis becomes too abstract to discriminate."
    non_capture_note: >
      A frame can clarify a case without exhausting it.

  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is central. The expected occurrence is full resolution,
      reconciliation, interpretation, repair, or action. The case states that
      such an occurrence may not be available while loss, conflict, guilt,
      responsibility, or irreversibility remains meaningful.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected occurrence as resolution, reconciliation, interpretation, repair, answer, forgiveness, restitution, recognition, or action."
      - "Preserve the possibility that unresolved absence marks tragedy or PMS non-capture rather than case defect, immaturity, drift, or failed integration."
    falsifier_conditions:
      - "If no structured expectation exists, Λ should not be asserted."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.

  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak. Tragedy may function as a stabilized interpretive pattern or
      category across many possible situations, but the case supplies no
      repeated concrete interaction, routine, path dependence, or role script
      within a scene.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Show recurrence or stabilization rather than merely naming tragedy as a general category."
      - "Distinguish stable tragic patterning from accidental aggregation of loss, conflict, guilt, or non-resolution."
    falsifier_conditions:
      - "If recurrence is not shown, Α is over-read."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.

  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is active but under-specified. The case names guilt and responsibility,
      and these imply possible asymmetries of burden, exposure, capacity,
      obligation, vulnerability, or agency. No concrete direction of asymmetry
      is given.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the direction and kind of asymmetry before claiming a concrete responsibility gradient."
      - "Do not moralize asymmetry by default or convert guilt into legal culpability."
      - "Allow Ω to remain weak where no concrete agent, role, obligation, or vulnerability relation is supplied."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.

  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is central because irreversibility is explicitly present. The tragic
      category depends on what has happened, what persists, what cannot be
      undone, and what later interpretation or action may fail to reconcile.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish irreversible temporal remainder from a merely static opposition or ordinary chronological sequence."
      - "Check whether temporality is essential to the tragic claim or merely incidental to a broader metaphysical or aesthetic theory."
    falsifier_conditions:
      - "If temporal extension is not required, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.

  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active but bounded. The case itself asks for category-level
      recontextualization: situations of loss, conflict, guilt, responsibility,
      or irreversibility are considered under the frame of tragedy. This
      reframing must not be treated as resolving or assimilating the tragic
      remainder.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name the source frame as unresolved loss, conflict, guilt, responsibility, or irreversibility, and the target frame as tragedy-as-category."
      - "Check whether recontextualization clarifies non-resolution or merely absorbs non-fit into a smooth PMS reading."
    falsifier_conditions:
      - "If every rupture or resistance is absorbed as Φ, the reading is over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.

  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as the main application discipline. The analysis must suspend
      forced verdict, forced closure, forced reconciliation, moral ranking,
      diagnosis, legal judgment, and premature PMS capture.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Check whether the analysis suspends verdict and preserves reversibility, especially around guilt, responsibility, and irreversibility."
      - "Distinguish distance from avoidance, denial, indifference, or empty neutrality that erases tragedy."
    falsifier_conditions:
      - "If Χ is suspended to force a verdict, the PMS application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.

  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is limited. The case permits coherence of a tragic structure, but it
      explicitly refuses full resolving action, interpretation, or
      reconciliation as automatic. Integration cannot be treated as sufficient
      for adequacy.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether integration discriminates tragedy from mere coherent explanation, narrative smoothing, or forced reconciliation."
      - "Distinguish partial structural coherence from full resolution, maturity, reconciliation, or completion."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.

  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and conditional. Responsibility is named, but no concrete agent,
      promise, commitment, self-relation, or stable normativity is supplied.
      Ψ is active only as application discipline, not as a case-internal
      self-model.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only where self-binding or analytic self-binding is actually in scope."
      - "Do not attribute selfhood, identity, or responsibility-as-self-commitment to an abstract category unless the case explicitly warrants a structural self-model claim."
    falsifier_conditions:
      - "If Ψ is applied without Σ, Θ, and Χ, the self-binding reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 carries most of the conceptual entry: tragedy is distinguished from
      non-tragedy through Δ, receives weak directional tension through ∇, is
      framed as a category through □, centers on unavailable resolution through
      Λ, and only weakly stabilizes into Α because no concrete recurring scene
      is supplied.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is thematically important but unevenly calibrated. Θ is strong because
      irreversibility is explicit. Ω is structurally indicated by guilt,
      responsibility, loss, and exposure, but under-specified because no
      concrete asymmetry direction is given.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 governs the application posture. Φ permits tragedy-as-category as a
      bounded reframing, Χ prevents forced verdict or closure, and Σ remains
      limited because tragic coherence cannot be equated with resolution.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      Ψ is not primary as a case-internal structure. It is analytic and
      conditional because the case provides no concrete self-binding agent, but
      it remains active as the analysis's own self-binding discipline.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The case distinguishes loss, conflict, guilt, responsibility, irreversibility, non-resolution, and reconciliation."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "The case implies weak tension toward repair, interpretation, reconciliation, responsibility, or action arising from those differences."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The case explicitly supplies tragedy as the category-frame for interpreting the relevant tensions."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "The case names unavailable full resolution, interpretation, action, or reconciliation within the tragic frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Only weakly satisfied because tragedy may stabilize as a category, but no repeated concrete interaction or path-dependent scene is supplied."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Only weakly satisfied because guilt and responsibility imply asymmetry, but no concrete pattern, direction, or role-gradient is provided."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "The case explicitly invokes irreversibility, but dependency through Ω and Α is weak due to the abstract, non-scenic case material."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "The case recontextualizes unresolved loss, conflict, guilt, responsibility, or irreversibility under tragedy-as-category, but Ω remains under-calibrated."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Distance is satisfied as application discipline: the analysis preserves reversibility, non-capture, and non-tribunal restraint."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Only limited because PMS can coordinate a tragic reading but must not convert coherence into resolution."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Weak or analytic-only because no concrete self-binding agent is supplied, though the application remains self-bound by PMS discipline."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

dependency_table_reference:
  source: "PMS.yaml:pms_model_reference.dependency_table"
  status: "reference_only_not_base_revision"
  purpose: >
    This block mirrors the PMS.yaml dependency table for case-level dependency
    hygiene. It is not a revision of PMS Base and must not be altered by the
    case analysis.
  table:
