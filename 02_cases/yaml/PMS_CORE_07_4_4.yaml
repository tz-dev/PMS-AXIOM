analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "pms_internal_operator_mapping"
      - "derived_axes_inspection"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The case type permits bounded structural category analysis through PMS.
      It does not permit concrete scene findings, empirical findings,
      metaphysical conclusions, diagnostic claims, legal conclusions,
      implementation claims, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      PMS can make tragedy appear too structurally smooth by translating loss,
      irreversibility, guilt, responsibility, non-event, recontextualization,
      and partial coherence into one ordered operator chain. That smoothness can
      under-discriminate tragedy from mere sadness, ordinary conflict, practical
      difficulty, temporary non-closure, ethical dilemma, narrative
      incompletion, metaphysical doctrine, or aesthetic genre classification.
      The specific risk in this case is that PMS coherence may seem to resolve
      the very tragic remainder that the case asks the analysis to preserve.
    mitigation: >
      The reading is constrained by discrimination tests, weak marking of
      under-calibrated operators, rival readings, non-capture zones, falsifier
      conditions, and explicit refusal to treat Σ as sufficiency. PMS coherence
      is explicitly treated as insufficient by itself. A coherent PMS chain may
      show structural intelligibility, but it does not by itself show tragic
      adequacy, explanatory finality, moral truth, metaphysical capture,
      responsibility assignment, or practical resolution.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural relation among framed distinctions, weak
      directed tension, meaningful non-event, irreversibility, possible
      asymmetry, bounded reframing, reflective distance, and limited coherence.
      This is enough for a reversible conceptual projection, but not enough for
      empirical, metaphysical, legal, clinical, diagnostic, implementation, or
      PMS Base validation.
    discrimination_requirement: >
      The PMS reading must distinguish tragedy from ordinary loss, ordinary
      conflict, solvable difficulty, fully resolvable ethical dilemma, purely
      aesthetic genre classification, legal culpability, metaphysical doctrine,
      diagnostic category, generic absence, and mere lack of evidence. Tragedy
      should require at minimum framed meaningful non-resolution under
      temporality and possible asymmetry, while preserving the possibility that
      no PMS integration fully captures the remainder.
    discrimination_status: "partial_but_explicitly_guarded"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish tragedy from ordinary unresolved difficulty."
      expected_pms_distinction: >
        Tragedy requires Λ as structured non-resolution within □ plus Θ as
        irreversibility, not merely a temporary lack, inconvenience, or open
        problem.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish tragic responsibility from legal or moral culpability."
      expected_pms_distinction: >
        Ω and Responsibility_R must remain structural and formula-dependent;
        guilt and responsibility language cannot be converted into legal
        liability, blame verdict, or person-ranking without evidence and
        external legal or ethical criteria.
      current_status: "satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What calibrates Difference in this case?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What calibrates Impulse in this case?"
      current_calibration: "weak"
    - operator: "□"
      question: "What calibrates Frame in this case?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "What calibrates Non-Event in this case?"
      current_calibration: "satisfied"
    - operator: "Α"
      question: "What calibrates Attractor in this case?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "What calibrates Asymmetry in this case?"
      current_calibration: "partial"
    - operator: "Θ"
      question: "What calibrates Temporality in this case?"
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "What calibrates Recontextualization in this case?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "What calibrates Distance in this case?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "What calibrates Integration in this case?"
      current_calibration: "partial"
    - operator: "Ψ"
      question: "What calibrates Self-Binding in this case?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Tragedy as aesthetic genre, including dramatic form, reversal, recognition, catharsis, plot, and spectatorship."
      - "Tragedy as metaphysical or existential condition, including finitude, fate, mortality, absurdity, or being."
      - "Tragedy as religious, theological, ritual, or historical category."
      - "Tragedy as irreducible ethical remainder that may resist formal integration."
      - "Tragedy as affective or phenomenological experience not captured by structural operators."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Tragedy as aesthetic genre centered on plot, reversal, recognition, and catharsis."
      - "Tragedy as ethical conflict among incompatible but partly legitimate obligations."
      - "Tragedy as metaphysical finitude, fate, mortality, or existential absurdity."
      - "Tragedy as legal-moral culpability, fault, guilt, and accountability."
      - "Tragedy as narrative non-closure or irreducible remainder."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if no structured
        expectation of resolution, reconciliation, interpretation, repair, or
        action is present; without such expectation, Λ is not warranted.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if it classified every loss, conflict,
        sadness, dilemma, absence, or non-closure as tragedy without requiring
        framed meaningful non-resolution and irreversible temporal remainder.
    - id: "F3"
      condition: >
        PMS would become over-assimilative if tragic resistance, rupture,
        disagreement, absence, or rival framing were automatically redescribed
        as drift, failed integration, incomplete maturity, or merely bounded
        recontextualization.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The analysis is valid as a reversible conceptual PMS application because
      it preserves operator dependencies, non-capture, rival readings,
      falsifiers, and non-diagnostic discipline. It remains limited because the
      case is abstract and not a concrete scene.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical,
    or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Identify the concrete distinctions at stake, such as loss, responsibility, guilt, reversibility, resolution, and non-resolution."
      "∇": "Identify a concrete directional tension toward repair, answer, action, avoidance, reconciliation, interpretation, or responsibility."
      "□": "Identify the active frame and any frame shifts between tragic, ethical, legal, aesthetic, metaphysical, or narrative interpretation."
      "Λ": "Specify the expected event and the meaningful absence or failure of that event within the frame."
      "Α": "Show recurrence, stabilization, path dependence, routine, or role-script formation rather than a one-time abstract classification."
      "Ω": "Specify the direction and type of asymmetry, including power, vulnerability, exposure, obligation, capacity, or responsibility gradient."
      "Θ": "Specify the temporal sequence, persistence, irreversibility, delay, anticipation, or consequence structure."
      "Φ": "Identify source frame, target frame, and whether reframing clarifies, distorts, preserves, or over-assimilates the tragic remainder."
      "Χ": "Show how reflective distance, restraint, reversibility, and non-tribunal posture are maintained in the analysis or scene."
      "Σ": "Specify what is integrated, what remains unreconciled, and why coherence is not being treated as sufficiency."
      "Ψ": "Identify a concrete self-binding agent, commitment, promise, responsibility-as-self-commitment, or analytic self-binding constraint."
    negative_cases:
      - "A sad event that is fully reparable and lacks meaningful irreversible remainder."
      - "A difficult conflict that has a clear resolving action and no structured non-event."
      - "A purely legal culpability case where tragedy is not the active frame."
      - "A purely aesthetic tragedy classification that does not involve PMS praxis structures."
      - "A case of mere absence without framed expectation."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The present analysis is a conceptual
    PMS projection only and provides no empirical observations, comparative
    study, computational model, legal test, clinical test, or applied
    validation.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      The analysis does not infer subjective suffering, desire, avoidance,
      trauma, pathology, motivation, personality, or inner experience from the
      tragic category.
    non_metaphysical: >
      The analysis does not claim that tragedy is an ontological condition of
      being, fate, mortality, existence, consciousness, or reality.
    non_diagnostic: >
      The analysis does not diagnose any person, group, institution, culture,
      text, or theory.
    non_legal_forensic: >
      The analysis does not convert guilt or responsibility into culpability,
      liability, blameworthiness, evidentiary finding, or forensic conclusion.
    non_implementation_claim: >
      The YAML analysis is not a computational implementation, decision system,
      governance layer, bridge mapping, deployment, or architecture.
    non_moral_ranking: >
      The analysis does not rank tragic subjects, agents, victims, responsible
      parties, interpretations, or rival frameworks by worth or maturity.
    non_exhaustive_capture: >
      PMS may model structural aspects of tragedy, but tragedy may remain partly
      outside PMS as aesthetic genre, metaphysical condition, existential
      problem, religious category, narrative form, historical catastrophe, or
      irreducible remainder.
    reversibility: >
      The analysis remains revisable and case-type-bound. Operators marked
      weak, under-specified, or analytic-only may be recalibrated if a concrete
      scene or rival formalization supplies stronger evidence.
    dignity_in_practice: >
      Dignity-in-Practice is preserved by maintaining restraint under possible
      asymmetry and by refusing shame, humiliation, tribunal posture, person
      ranking, irreversible labeling, or ontological dignity claims.

limits:
  - >
    The PMS reading is conceptual and non-scenic; it lacks concrete actors,
    roles, actions, sequence, evidence, and institutional context.
  - >
    The analysis makes no empirical, metaphysical, diagnostic, legal, forensic,
    clinical, or implementation claim and does not validate PMS Base.
  - >
    Rival readings of tragedy as aesthetic, metaphysical, ethical, theological,
    legal, narrative, or phenomenological remain open and are not defeated by
    PMS translation.
  - >
    The reading carries high coherence risk because PMS can make tragedy appear
    too structurally smooth unless non-capture, falsifiers, and discrimination
    tests are actively preserved.

case_synthesis:
  primary_pms_reading: >
    Tragedy as a category can be projected through PMS as framed difference and
    weak directedness around meaningful non-event, irreversible temporality,
    possible but under-specified asymmetry, bounded recontextualization,
    reflective distance, and limited coherence without guaranteed resolving
    action, reconciliation, integration, or self-binding.
  continuity_condition: >
    Continuity is present only at the conceptual level: the tragic category
    continues across possible cases where loss, conflict, responsibility, guilt,
    or irreversibility remains meaningful without full resolution.
  change_condition: >
    Change appears as bounded Φ: situations of unresolved loss, conflict,
    guilt, responsibility, or irreversibility are recontextualized under
    tragedy-as-category, but the recontextualization must not be treated as a
    cure or closure.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, and non-fit are preserved as
    possible tragic remainder or non-capture rather than automatically
    redescribed as PMS drift, incomplete calibration, failed integration,
    recontextualization, or maturity failure.
  responsibility_condition: >
    Responsibility remains weak and conditional. A stronger Responsibility_R
    reading would require calibrated Ω, Θ, Φ, and Ψ through a concrete agent,
    obligation, asymmetry, and self-binding structure.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective
    restraint under possible asymmetry and prohibiting person-ranking,
    humiliation, diagnosis, tribunal judgment, or ontological dignity claims.
  rival_reading_condition: >
    Rival formalizations remain open. PMS offers one reversible structural
    projection, not a final theory of tragedy and not a proof of superiority
    over aesthetic, ethical, metaphysical, legal, theological, narrative, or
    phenomenological readings.

final_structural_formula:
  primary_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model_with_weak_dependency_marking_explained_in_text"
  compressed_reading: >
    Tragedy as a PMS-projected category is framed difference under weak
    directedness, meaningful non-event, weak category-level attractor status,
    under-specified asymmetry, and irreversible temporality, held through
    bounded recontextualization and reflective distance. Α and Ω are included
    for dependency hygiene but remain weak or under-specified because the case
    supplies no concrete repeated praxis scene, role structure, or directional
    responsibility gradient. Σ and Ψ are not part of the minimal final formula
    unless a concrete case supplies integration and self-binding conditions.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity, clinical
    validity, implementation validity, moral ranking, responsibility verdict,
    or PMS Base validation. It also does not show that PMS exhausts tragedy:
    the formula remains reversible, dependency-bound, non-diagnostic,
    non-tribunal, non-person-ranking, and open to rival formalizations and
    non-capture.