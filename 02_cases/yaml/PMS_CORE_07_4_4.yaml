      provides:
        - "directed_activation"

    - axiom: "□"
      order: 3
      depends_on:
        - "Δ"
        - "∇"
      provides:
        - "context_and_role_space"

    - axiom: "Λ"
      order: 4
      depends_on:
        - "□"
      provides:
        - "meaningful_absence_and_expectation"

    - axiom: "Α"
      order: 5
      depends_on:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
      provides:
        - "recurrent_patterns"

    - axiom: "Ω"
      order: 6
      depends_on:
        - "Α"
      provides:
        - "asymmetric_roles_and_responsibility_gradients"

    - axiom: "Θ"
      order: 7
      depends_on:
        - "Ω"
        - "Α"
      provides:
        - "temporal_trajectories"

    - axiom: "Φ"
      order: 8
      depends_on:
        - "Θ"
        - "Ω"
        - "□"
      provides:
        - "reframing_and_adaptation"

    - axiom: "Χ"
      order: 9
      depends_on:
