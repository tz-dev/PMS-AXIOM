derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - Awareness_A
    - Coherence_C
    - Responsibility_R
    - Action_E
    - Dignity_in_Practice_D
    - SELF_FIXPOINT
    - AD_A_much_greater_E
    - AD_under_integration
  usage_rule: >
    Each derived structure must be marked as active, weak,
    analytic_constraint, application_constraint, possible_but_not_entailed,
    under_specified, or not_applicable. Consideration does not imply
    activation, and activation does not imply completeness, empirical grounding,
    diagnostic validity, moral ranking, or PMS Base validation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not
    independent axioms, diagnoses, ontological rankings, metaphysical entities,
    moral verdicts, clinical categories, legal findings, or proof of PMS
    completeness. Where a derived structure is only weakly supported, the case
    must preserve that weakness rather than upgrading it through conceptual
    coherence alone.
  case_status: >
    Awareness_A is weak-to-active as structural framed differentiation across
    irreversible time, but it does not imply phenomenological consciousness.
    Coherence_C is active but limited because tragic coherence is not
    resolution, reconciliation, truth, adequacy, or final integration.
    Responsibility_R is weak because Ψ and concrete Ω are under-specified:
    responsibility is thematically present in the case material but not
    formula-derived as a concrete responsibility structure. Action_E is
    under-specified because the case explicitly concerns situations without
    fully resolving action; the absence of such action must not be converted
    automatically into drift or immaturity. Dignity_in_Practice_D is an
    application constraint, not a case-internal ontological dignity claim.
    SELF_FIXPOINT is not applicable as a case-internal self-model because no
    concrete self-binding agent is supplied. AD_A>>E and AD_Sigma_low are
    possible risks only, not entailed drift patterns, diagnoses, person-types,
    maturity failures, or moral verdicts.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically. Within PMS it
      can be systematically derived from this operator sequence, but this does
      not imply that all notions of awareness are exhausted by it.
    case_reading: >
      Awareness_A appears as structural awareness of distinctions such as loss,
      guilt, responsibility, irreversibility, resolution, and non-resolution
      within the tragedy frame across time. It is not a claim about subjective
      awareness or consciousness.
    status: "weak"
    calibration_points:
      - "Specify what is being differentiated, in what frame, and across what irreversible temporal structure."
    non_capture_note: >
      Structural awareness is not phenomenological consciousness.

  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability of action, including meaningful
      absences and delays, without yet requiring full integration or
      self-binding. Rival theories may formalize coherence differently.
    case_reading: >
      Coherence_C is active insofar as a tragic configuration can remain
      intelligible through directed tension toward resolution, a tragic frame,
      meaningful non-event, and irreversible time. This coherence is not truth,
      reconciliation, final explanation, or adequacy by itself.
    status: "active"
    calibration_points:
      - "Distinguish coherence from truth, validity, forced integration, explanatory closure, moral verdict, or narrative smoothing."
    non_capture_note: >
      Coherence does not prove adequacy.

  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic in this specification.
      It is formally derived within PMS, not asserted as the only valid theory
      of responsibility.
    case_reading: >
      Responsibility_R is weak. Responsibility is named in the case material,
      but the formula requires calibrated Ω, Θ, Φ, and Ψ. Since no concrete
      agent, obligation, self-binding, or direction of burden is supplied, PMS
      may mark responsibility as thematically relevant but not fully derivable.
    status: "weak"
    calibration_points:
      - "Identify asymmetry, temporality, recontextualization, and self-binding before claiming responsibility."
    non_capture_note: >
      Responsibility_R is not moral blame, diagnosis, or legal liability.

  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into a coherent enactment."
    notes: >
      Action here is not any behavior; it is integrated and temporally extended.
      Higher operators such as Ω, Φ, and Ψ may enrich it, but are not required
      for its minimal structural definition within PMS.
    case_reading: >
      Action_E is under-specified because the case concerns situations in which
      no fully resolving action may be available. Tragic meaning may persist
      where action is blocked, insufficient, non-resolving, or unable to undo
      irreversible loss.
    status: "under_specified"
    calibration_points:
      - "Distinguish action from mere behavior, thought, claim, category formation, or abstract structure."
    non_capture_note: >
      Without a concrete scene, Action_E may remain under-specified.

  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how
      asymmetry is handled, not the ranking of persons or ontological worth.
    case_reading: >
      Dignity_in_Practice_D functions primarily as an application constraint.
      The analysis must handle guilt, responsibility, loss, and asymmetry
      without shaming, ranking, humiliating, diagnosing, or issuing a tribunal
      verdict. It does not establish ontological dignity or moral superiority.
    status: "application_constraint"
    calibration_points:
      - "Check whether asymmetry is handled without ranking, shaming, humiliation, irreversible labeling, or moralized person evaluation."
    non_capture_note: >
      D is a praxeological application constraint, not an ontological or moral
      superiority claim.

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "not_applicable"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of
    praxis being bound into a relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not derivable as a case-internal structure because the
    case concerns tragedy as an abstract category and provides no concrete
    self, self-relation, long-term identity commitment, promise, or stable
    autobiographical trajectory. The chain remains relevant only as a
    dependency reminder for avoiding unsupported responsibility or selfhood
    claims.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence records one derivational strategy within PMS. It must not be
    read as proving that all forms of selfhood, agency, identity, or case
    structure reduce without remainder to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or
    institutions as literal subjectivity unless explicitly scoped as structural
    self-binding or analytic self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived
    distortion forms. They are not automatically entailed by a case and must
    not be treated as diagnoses, person-types, or moral verdicts.

  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces drift toward evaluation
        rather than supporting integrative transformation and balanced
        enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: >
      AD_A>>E is a risk only. The case could tempt an over-expanded tragic
      awareness in which category formation, interpretation, or evaluation
      grows while enactment remains absent. However, the absence of resolving
      action is not automatically drift because the case explicitly allows that
      no fully resolving action may be available.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.

  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis, especially where
        unstable recontextualization and weak integration unfold under
        asymmetrically loaded praxis conditions.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >
      AD_Sigma_low is a risk only. The case could be misread as fragmented
      integration because full reconciliation is unavailable. That inference is
      not warranted. PMS explicitly allows tragedy under maturity, so
      unresolved remainder is not automatically low integration, volatility, or
      maturity failure.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, or person-type.

example_operator_chains_application:
  note: >
    The chains below apply PMS.yaml example operator chains to the case. They
    are not the only possible formal pathways and do not settle the case by
    themselves.

  minimal_praxis:
    formula:
      - "□"
      - "∇"
      - "Δ"
    description: "A frame constrains an impulse that arises from a difference."
    case_reading: >
      Minimal praxis appears as the tragic frame constraining weak directedness
      toward resolution, interpretation, repair, reconciliation, or action that
      arises from distinctions among loss, conflict, guilt, responsibility,
      irreversibility, and non-resolution.
    status: "active"

  pattern_formation:
    formula:
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Attractor formation via repeated framed impulses and non-events."
    case_reading: >
      Pattern formation is weak. Tragedy may stabilize as an interpretive
      category around repeated forms of framed non-resolution, but the case
      provides no concrete repeated scene or path-dependent interaction.
