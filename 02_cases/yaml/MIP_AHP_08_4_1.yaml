          - [medium (relevant uncertainty / visible leverage)] Review requirement lacks a concrete owner
            - ID: AP-005
            - Target: case.transmission_check.review_required
            - Type: missing_reversibility
            - Note: The prior output states that review is required before concrete use, but no concrete review owner can be named because the case is abstract. This is acceptable but should be marked as a limit rather than a completed governance condition.
            - Suggested patch: Mark review ownership as structurally required but presently unassigned; require assignment of a reviewer, case owner, or moderator before applied use.
          - [medium (relevant uncertainty / visible leverage)] Transmission boundary is strong but could be lost in reuse
            - ID: AP-006
            - Target: case.transmission_check.allowed_use_of_this_analysis
            - Type: transmission_status_ambiguity
            - Note: The prior output clearly restricts use to internal structural working-note contexts. However, because the analysis is polished and complete, downstream reuse may detach the output from its non-transmission boundary.
            - Suggested patch: Keep the transmission boundary in the uniform report and add a minimal reuse warning wherever excerpts are exported.
          - [medium (relevant uncertainty / visible leverage)] D-language is safe internally but extractable as dignity assessment
            - ID: AP-007
            - Target: case.D_module_optional.D_profile
            - Type: dignity_language_risk
            - Note: The prior analysis uses D only as guardrail-bound protection and does not score dignity. Still, phrases about shame dynamics, degradation, and public dignity may be misread as person-level dignity findings if quoted without the D₀ boundary.
