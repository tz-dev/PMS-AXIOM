          - [medium (relevant uncertainty / visible leverage)] add_score_hygiene_boundary: Repeat directly beside the A-band that the band applies only to the analysis artifact and must not be transferred to critics, publics, institutions, critique forms, or actual cases.
            - ID: HB-003
            - Linked to attack point: AP-003
            - Expected effect: Score-hygiene risk down; A-reading misread risk down; no change to A-band.
          - [medium (relevant uncertainty / visible leverage)] add_if_then_criteria: Add if/then criteria for IA escalation: if concrete publicness, reversibility, purpose, role, and protected-good evidence are supplied, then IA may be reconsidered in a new MIP run.
            - ID: HB-004
            - Linked to attack point: AP-004
            - Expected effect: IA-box decidability more precise; IA_risk remains unchanged in this run; weak justification risk down.
          - [medium (relevant uncertainty / visible leverage)] add_reversibility_clause: Mark review ownership as structurally required but presently unassigned; require named reviewer, case owner, or moderator before applied use.
            - ID: HB-005
            - Linked to attack point: AP-005
            - Expected effect: Reversibility operational clarity up; transmission safety up; governance overclaim risk down.
          - [medium (relevant uncertainty / visible leverage)] add_transmission_status: Keep the internal-working-note boundary in the uniform report and attach a reuse warning to any exported excerpt.
