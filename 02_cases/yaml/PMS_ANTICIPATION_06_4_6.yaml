            - "Who carries capacity?"
            - "Who bears irreversible cost?"
          invalidity_marker: "Anticipation under Ω without restraint equals latent coercion."
          case_application: "No carrier of exposure, capacity, or irreversible cost is supplied; Ω remains weak and cannot ground responsibility or authority."
        distance_enforcement:
          operator: "Χ"
          status: "satisfied"
          questions:
            - "Where is action pressure rising?"
            - "Where is probability used rhetorically?"
            - "Where is urgency replacing structure?"
          invalidity_marker: "Any analysis that demands action violates PMS entry conditions."
          case_application: "No action pressure or probability rhetoric is accepted. Χ enforces suspension of prophecy, mandate, and closure."
        self_binding_test:
          operator: "Ψ"
          status: "weak"
          questions:
            - "Who is bound by this anticipation?"
            - "Is binding internal or externalized?"
            - "Does the anticipator carry consequence?"
          invalidity_marker: "Others must act now equals Ψ-externalization."
          case_application: "No concrete anticipator is supplied. The overlay binds only the analysis to restraint and does not bind others."
    red_flag_patterns:
      note: "Immediate PMS invalidity markers as phrase-patterns."
      table:
        - pattern: "We must act because…"
          structural_diagnosis: "Λ collapsed"
          case_relevance: "absent"
        - pattern: "The data clearly shows…"
          structural_diagnosis: "Α → certainty"
          case_relevance: "absent"
        - pattern: "Responsibility demands intervention"
          structural_diagnosis: "Ω instrumentalized"
          case_relevance: "absent"
        - pattern: "Delay is irresponsible"
