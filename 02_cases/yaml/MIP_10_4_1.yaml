  meta_notes:
    bias_risks:
      confirmation_bias: Risk of selecting only features that support PMS/PMS-SEX fit and ignoring rival consent theories.
      hindsight_bias: Risk of treating structural clarity after analysis as if role-holders could have predicted the same structure in the moment.
      status_quo_loyalty_bias: Risk of accepting existing consent frames as neutral because they are familiar or formalized.
      halo_horn_effects: Risk of letting one sign of vulnerability, power, or refusal color the entire configuration as either innocent or guilty.
      in_group_out_group_bias: Risk of interpreting one role-position more generously depending on cultural assumptions about autonomy, dependency, gender, authority, sexuality, or vulnerability.
      dignity_bias_effect: Risk of using dignity language as a bonus or penalty. Prevented by not activating D-profile and by keeping D0 untouched.
    norm_assumptions:
      explicit_norms:
      - consent analysis must distinguish agreement from meaningful consent
      - asymmetry requires transparency, justification, time-boundedness, and reversibility checks
      - D0 is non-rankable and untouched
      - maturity language must describe enactments and structures, not persons
      implicit_norms:
      - refusal, withdrawal, silence, protest, and rival framing may carry structural meaning without being reduced to drift
      - formal parity may not equal real parity when dependency or vulnerability is active
      - structural clarity must not replace legal, clinical, empirical, or ethical domain standards
      dignity_concepts:
      - D0 ontological dignity as inviolable and non-measurable
      - D1/D2 dignity in practice as optional qualitative enactment reading, not activated here
      - Dignity-in-Practice from PMS/PMS-SEX as application restraint, not person worth
      normative_position_of_D_reading: 'D is not used as a profile. The normative position is protective and anti-humiliation: D0 remains untouched; D1/D2 are not scored; D language is used only to prevent misuse.'
    intuition:
      initial_intuition: The case intuitively appears maturity-relevant because asymmetry can undermine the practical reality of consent. This intuition is treated as a sensor only.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: The abstract material explicitly names consent, refusal, pressure, dependency, vulnerability, and unequal capacity.
      contradicting_evidence: No concrete scene establishes coercion, inadultness, responsibility failure, D stress, drift, or invalid consent.
    possible_alternative_interpretations:
    - legal consent, coercion, undue influence, or capacity analysis
    - relational autonomy theory
    - contractual or procedural consent model
    - communicative-pragmatic consent theory
    - care ethics or vulnerability ethics
    - political or sociological domination analysis
    - phenomenological account of agency, refusal, or embodied experience
    - clinical or trauma-informed assessment, if a concrete case and appropriate expertise exist
    counter_perspective:
      from_other_side: A counterpart may argue that agreement was explicit, mutual, or formally valid; MIP cannot accept or reject this without scene data and must distinguish formal agreement from meaningful consent conditions.
      from_affected_side: An affected role-position may argue that pressure, dependency, vulnerability, or exit cost made agreement non-meaningful or refusal unsafe; MIP cannot verify this without evidence but must keep it legible.
      from_external_observer: An external observer may see under-specification and demand legal, empirical, clinical, institutional, or ethical standards beyond PMS/PMS-SEX/MIP. This is a valid non-capture boundary.
