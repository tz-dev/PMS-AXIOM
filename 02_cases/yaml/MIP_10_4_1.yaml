  uniform_report:
    generate_only_from_structured_fields: true
    title: 'MIP Working Note: Consent Under Asymmetry'
    overview_4_to_7_sentences: This MIP analysis treats Consent Under Asymmetry as an abstract structural case, not a concrete scene. The prior PMS Core analysis makes asymmetry central while keeping temporality, integration, and self-binding under-specified. The PMS-SEX overlay adds conditional visibility for sexual cost topology, publicness, body remainder, switch-drift risks, and adult sexual reciprocity, but does not convert the case into a sexual scene. MIP therefore does not assign A-score, M-score, D-profile, or adultness judgment. The IA-box is used only as an under-specified asymmetry check. The proper transmission status is working note only.
    key_findings:
    - The object of observation is a consent-under-asymmetry structure, not a person.
    - A/M scoring is not responsible because no concrete role, time frame, knowledge, alternatives, predictability, or power levers are supplied.
    - D-module remains off; D0 is untouched and D1/D2 are not profiled.
    - IA-box detects asymmetry relevance but cannot classify the asymmetry as functional, IA risk, or inadult in a concrete sense.
    - SEX overlay findings remain weak or risk-level and do not support sexual scene conclusions.
    A_summary: A-awareness, C-coherence, R-responsibility, and P-power-to-act are structurally mapped but not scoreable. The analysis has awareness; no participant awareness can be inferred.
    M_summary: No M-band is assigned. Shared structural responsibility cannot be attributed without concrete knowledge, control, predictability, alternatives, and integration attempts.
    IA_box_summary: IA-box result is under-specified IA-risk sensitivity, not a verdict. T, J, TB, and R cannot be assessed without concrete scene evidence.
    D_summary_if_activated: D-module is not activated. D0 remains untouched; D1/D2 enactments are not profiled; Dignity-in-Practice functions only as guardrail against shaming, ranking, and overclaim.
    trajectory_summary: The only trajectory available is a documentation trajectory from abstract case to PMS/PMS-SEX/MIP structuring. No role-holder A(t), M(t), D(t), or RVR(t) can be assessed.
    guardrail_status: 'Guardrails are maintained for working-note use: profile-not-person, no red-zone use, score hygiene, D protection, bias awareness, non-capture, and reversibility are preserved.'
    transmission_status: working_note_not_decision_basis
    practical_implications: Before any stronger claim, reconstruct the concrete scene, roles, publicness, asymmetry channels, knowledge, alternatives, consequences, exit options, and rival frameworks. Keep any later D or SEX-specific analysis non-public, non-ranking, and scene-bound.
    conclusion: MIP can responsibly clarify what must be known before evaluating maturity in practice, but it cannot yet evaluate maturity, responsibility, dignity-in-practice, adultness, consent validity, or sexual cost topology for this abstract case.