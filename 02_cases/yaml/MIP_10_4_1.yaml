case:
  meta:
    case_id: MIP-AXIOM-10_4_1
    case_title: Consent Under Asymmetry — MIP Layer over PMS Core and PMS-SEX Overlay
    documentation_date: '2026-07-06'
    analysts:
    - name: ChatGPT
      role: formalisation assistant applying MIP case template
      observer_position: secondary structural reader of already completed PMS-Core and PMS-SEX analyses; no direct scene access and no person-level mandate
    language: en
    confidentiality_level: working_note_for_scholarly_case_development_not_public_person_assessment
    analysis_mode: full
    intended_use: structural_case_review_and_scholarly_overlay_integration
    application_zone: yellow
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: generic_with_praxeological_ethics_lens
      d_activation_decision: activated_as_guardrailed_dignity_in_practice_observation_only
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: true
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: Completed PMS-Core case 10.4.1 and completed PMS-SEX overlay analysis concerning Consent Under Asymmetry.
    secondary_material: MIP v3.0 case template and model reference; PMS and PMS-SEX are used as prior analytical layers, not as objects rewritten by MIP.
    assumptions_and_inferences: The analysed scene is abstract and conceptual. Role_A and role_B are scene positions, not persons. No legal, clinical, forensic, relational, empirical,
      or concrete incident facts are inferred beyond the PMS-Core and PMS-SEX analyses. Red-zone exclusions describe how this MIP analysis is used and not used; they are not empirical
      findings that the underlying abstract case has no possible legal, clinical, forensic, institutional, public, relational, or policy relevance. MIP evaluates configuration-handling
      under a guarded template, not the worth, identity, sexuality, adulthood, dignity, guilt, motive, or pathology of any person.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: high for structural template coverage; moderate for substantive maturity evaluation because the underlying case is deliberately abstract
      reliability_estimate: reliable as a guarded structural overlay and template-bound working note; not reliable as a concrete event assessment, person assessment, legal consent finding,
        clinical capacity assessment, forensic reconstruction, public judgment, relational instruction, or empirical finding about what happened
      known_gaps:
      - No concrete chronology of approach, agreement, refusal, withdrawal, contestation, or after-scene conduct is supplied.
      - No direct accounts from role_A, role_B, or affected observers are supplied.
      - No concrete power levers, dependency facts, institutional facts, legal facts, bodily facts, or publicness facts are supplied.
      - No evidence is supplied for repeated voluntary configuration, stable intention, motive, identity, or psychological pattern.
      - No concrete reversibility, exit, repair, or review mechanism is evidenced.
      main_bias_risks_here:
      - Over-reading asymmetry as wrongdoing rather than risk structure.
      - Flattening sexual cost topology into consent validity.
      - Treating the maturity lens as a person-ranking tool.
      - Inflating M-score through hindsight, technical density, template completeness, or the seriousness of the topic.
      - Letting the analytic language of Dignity-in-Practice become dignity judgement.
      - Mistaking PMS-SEX drift markers for established MIP responsibility findings.
      - Mistaking analysis-use exclusions for known absence of legal, clinical, forensic, public, or institutional relevance in a future concrete reconstruction.
  snapshot:
    short_case_description: The case is an abstract consent-under-asymmetry configuration already analysed through PMS-Core and PMS-SEX. PMS-Core marked consent distinctions, asymmetry,
      temporality, contestability, and non-capture. PMS-SEX added sexual cost topology, inner/outer/public layer separation, direct otherness, withdrawal/binding, viability, and MIP-docking
      guards. The present MIP layer asks how mature the configuration-handling is when role, knowledge, coherence, responsibility, real power, reversibility, and dignity-in-practice
      are kept distinct.
    central_actors_and_roles:
    - 'role_A: scene-bound position with possible access, frame-control, pressure-capability, or lower-cost externalisation; not a person type'
    - 'role_B: scene-bound position with possible consent/refusal, exposure, dependency, exit constraint, or cost-bearing; not a person type'
    - 'field_or_medium: abstract consent/asymmetry frame that may stabilise parity, autonomy, mutuality, procedural consent, or non-binding descriptions'
    - 'analyst_or_case_reader: observer applying MIP after PMS-Core and PMS-SEX without direct access to a concrete event'
    guiding_question: What does MIP reveal about maturity-in-practice when a sexual-consent field under asymmetry is handled through awareness, coherence, responsibility, power-to-act,
      IA-box criteria, trajectory, and dignity protection without turning the analysis into a person verdict?
    level:
    - structural_case_review
    - role_context_enactment
    - configuration_not_person
    - abstract_scene_with_yellow_zone_sensitivity
    first_visible_asymmetry: Role_A may have more frame-control, access leverage, lower exit cost, or greater ability to externalise cost; role_B may bear higher exposure, dependency,
      ambiguity, exit, bodily, temporal, or after-scene dignity costs. These remain possible structural asymmetries because the case lacks concrete scene evidence.
    first_visible_D_themes_optional:
    - Risk that agreement language erases dignity-relevant cost topology.
    - Risk that direct otherness is converted into access or explanation entitlement.
    - Risk that public readability becomes accusation or shame.
    - Need to protect D0 while reading only D1/D2 enactment dynamics.
  role_mapping:
    object_of_observation:
      type: configuration
      description: Abstract sexual consent-under-asymmetry field as already processed by PMS-Core and PMS-SEX.
      role: case configuration for MIP maturity-in-practice analysis
      not_person_as_whole: true
    observer_position:
      role: secondary analyst using prior PMS/PMS-SEX outputs
      power_relation_to_object: interpretive power only; no authority over persons, relationships, legal status, clinical status, or practice decisions
      possible_effects_of_analysis: May clarify structural maturity conditions, but could be misused as judgement if transmitted without guardrails; therefore output remains a working
        note.
    involved_roles:
    - role: role_A
      mandate: No personal mandate; analytically represents possible access/frame-control/cost-externalisation position.
      built_in_asymmetries:
      - possible greater control over framing or timing
      - possible lower cost of exit or withdrawal from responsibility
      - possible ability to translate surface agreement into closure
      - possible ability to externalise bodily, exposure, temporal, or reputational costs
      publicness_level: indeterminate
      dignity_exposure: indeterminate; dignity risk arises if role_A treats asymmetry, consent, or non-binding language as responsibility exemption
    - role: role_B
      mandate: No personal mandate; analytically represents possible consent/refusal/cost-bearing/exit-constrained position.
      built_in_asymmetries:
      - possible higher exposure or dependency
      - possible higher cost of refusal, withdrawal, or later contestation
      - possible lower control over public or interpretive framing
      - possible pressure to carry ambiguity or after-scene dignity costs
      publicness_level: indeterminate
      dignity_exposure: indeterminate; dignity risk arises if cost-bearing, refusal, delay, or withdrawal is erased, moralised, or made publicly shameful
    - role: field_or_medium
      mandate: Represents the abstract frame that may stabilise consent, autonomy, parity, mutuality, legality, procedure, or non-binding rhetoric.
      built_in_asymmetries:
      - may make formal agreement more legible than cost topology
      - may make outer readability stronger than internal ambiguity
      - may make legal/procedural vocabulary appear to settle ethical or praxeological questions
      publicness_level: indeterminate
      dignity_exposure: indeterminate; risk lies in turning frame language into closure before affected cost and correction channels are mapped
    - role: analyst_or_reader
      mandate: Maintain guardrails, distinguish material from inference, preserve non-capture, and prevent MIP from becoming a person-ranking or maturity-verdict instrument.
      built_in_asymmetries:
      - interpretive asymmetry over an abstract case
      - risk of over-formalising missing facts
      - risk of making a working note appear more settled than the evidence permits
      publicness_level: working_note_only
      dignity_exposure: analysis itself can create dignity risk if language becomes accusatory, humiliating, or person-totalising
    publicness:
      level: not supplied by case; treated as potential amplifier only
      A_P_relevance: Awareness must include the possibility that public framing, documentation, or reputational sediment changes maturity demands, but no such facts are supplied.
      P_PU_relevance: Power-to-act may include public or institutional levers only if later evidence supplies them; otherwise publicness remains non-operative.
      D_P_relevance_if_D_active: D-P is relevant as a guard against shaming, exposure, and public punishment, not as proof that public harm occurred.
      public_shaming_risk: medium as misuse risk of the analysis; indeterminate as scene fact
      reversibility_risk: medium because public readings of sexual-consent asymmetry can become hard to reverse, even when the underlying case is abstract
  frame_vs_variability:
    frame_elements:
    - element: Abstract consent-under-asymmetry frame
      reason_fixed_or_slow: It is inherited from the completed PMS-Core case and must not be rewritten by MIP.
      protected_goods:
      - non-capture
      - reversibility
      - distinction between agreement, consent, pressure-response, refusal, withdrawal, and contestation
    - element: PMS/PMS-SEX operator and overlay constraints
      reason_fixed_or_slow: PMS operators and dependencies are not MIP objects to revise; PMS-SEX constructs remain overlay-level.
      protected_goods:
      - operator hygiene
      - no adultness verdict from PMS-SEX alone
      - no conversion of structural reading into diagnosis or prescription
    - element: D0 protection and person/enactment separation
      reason_fixed_or_slow: MIP constitutively separates ontological dignity and person-worth from role-context enactment.
      protected_goods:
      - D0 inviolability
      - no dignity score
      - no person ranking
    variability_elements:
    - element: Concrete cost topology
      possible_change: Could become clearer if a bounded scene supplied bodily, exposure, exit, temporal, documentation, or after-scene cost evidence.
      responsible_roles:
      - future_case_reconstructor
      - analyst_or_reader
    - element: Role-specific responsibility
      possible_change: Could increase, decrease, or become non-attributable depending on knowledge, power, alternatives, predictability, and integration attempts.
      responsible_roles:
      - role_A_if_concrete
      - role_B_if_concrete
      - field_or_medium_if_institutionalised
      - analyst_or_reader
    - element: IA-box status
      possible_change: Transparency, justification, time-boundedness, and reversibility could move from indeterminate/risk to functional if concrete conditions show real review and exit.
      responsible_roles:
      - scene_participants_if_concrete
      - mediating_context_if_concrete
      - analyst_or_reader
    - element: Dignity-in-practice reading
      possible_change: Could remain guard-only, become a protective warning, or become unnecessary if no dignity-relevant scene facts emerge.
      responsible_roles:
      - analyst_or_reader
    unfair_high_M_zones:
    - Assigning high shared responsibility to any role without concrete predictability and real alternatives.
    - Treating sexual cost seriousness as evidence of responsibility.
    - Treating later contestation as proof of earlier knowledge or culpability.
    - Treating asymmetry itself as inadultness rather than checking transparency, justification, time-boundedness, and reversibility.
    system_as_excuse_risk:
    - Using abstract field conditions to erase role-specific responsibility where real levers were available.
    - Using PMS/PMS-SEX complexity to avoid naming simple cost externalisation if later evidence supports it.
    - Using procedure, consent language, or autonomy language as a blanket substitute for responsibility handling.
    D1_D2_realistically_improvable_where:
    - By preserving refusal, correction, withdrawal, and non-identity of the other as real channels.
    - By naming cost topology before treating agreement as closure.
    - By preventing publicness or analytic language from becoming shame or punishment.
    - By requiring role-specific self-binding where asymmetry and power-to-act are actually present.
  acrp_profile:
    A_awareness:
      observations: 'Awareness is structurally partial. The prior PMS and PMS-SEX analyses make the main awareness demands visible: distinguish surface agreement from meaningful consent,
        name asymmetry, keep Θ open, and map sexual cost topology. However, concrete knowledge, chronology, and available alternatives are not supplied.'
      available_information: 'Available: Core consent distinctions, Ω/Θ asymmetry and temporality anchors, PMS-SEX cost-topology and direct-otherness checks, non-capture guardrails.
        Not available: direct accounts, concrete sequence, exact dependencies, publicness evidence, bodily facts, and actual exit options.'
      realistically_knowable: At the abstract level, it is realistically knowable that consent language alone cannot settle cost topology or maturity-in-practice. At the concrete level,
        it is not realistically knowable who knew what, what options existed, or whether asymmetry was transparent, justified, time-bound, and reversible.
      blind_spots: The largest blind spots are role-specific knowledge, real power, predictability, alternatives, direct-otherness channel, after-scene conduct, and whether the consent
        frame functioned as clarity or as cost erasure.
      role_awareness_A_R: Role_A would require awareness of possible externalised costs if frame-control, access leverage, or lower exit cost were present. Role_B would require no duty
        to carry the whole burden of clarification. The field_or_medium requires awareness that procedural consent can obscure cost distribution.
      publicness_awareness_A_P: Publicness is not evidenced but must be held as possible amplifier; mature analysis must not create public punishment through the report itself.
      bias_awareness: The analysis must resist both consent-sceptical overreach and consent-formalist closure; it must also avoid maturity language as disguised moral ranking.
    C_coherence:
      observations: Coherence is mixed and provisional. The PMS/PMS-SEX case is internally coherent as a guarded structural reading, but the underlying scene is too abstract to establish
        coherence of enactment.
      word_deed_relation: 'No concrete words and deeds are supplied. Therefore, word-deed coherence can only be formulated as a demand: formal agreement, autonomy, or parity language
        must not contradict real cost, exit, and after-scene burden handling.'
      role_context_coherence: Role-context coherence would require each role to carry the responsibilities generated by its actual power, exposure, dependency, and exit profile. This
        remains under-specified.
      narrative_coherence: The narrative is coherent as an analytic arc from consent distinction to sexual cost topology to MIP maturity checks. It is not coherent enough to support
        incident reconstruction.
      breaks_named_or_hidden: The main possible break is between consent/mutuality language and uncalibrated cost topology. The analyses name this as a possible break rather than hiding
        it.
    R_responsibility:
      observations: Responsibility is visible as a structural question but not assignable as guilt or person fault. The configuration demands role-specific responsibility where actual
        power and cost externalisation are present.
      responsibility_points: Possible responsibility points include naming asymmetry, not using consent as closure, preserving refusal and withdrawal, preventing cost externalisation,
        maintaining after-scene dignity, and keeping review/reversibility available.
      assumed_responsibility: The overlay itself assumes analytic responsibility by preserving guardrails, non-capture, and MIP docking. No concrete role is shown to have assumed responsibility
        inside a scene.
      shifted_or_refused_responsibility: Responsibility shift is possible if parity, autonomy, non-binding, or procedural consent language is used to offload cost; this is a risk marker,
        not an established finding.
      burdens_and_consequences: Potential burdens include bodily, exposure, exit, temporal, responsibility, and after-scene dignity costs. Consequences cannot be concretely attributed
        without scene evidence.
    P_power_to_act:
      observations: Power-to-act is central but only partially evidenced. Ω indicates possible asymmetrical levers, but MIP cannot assign high maturity or high responsibility without
        concrete knowledge of real options.
      real_levers: Possible levers include frame-setting, pace, access, refusal channel, withdrawal channel, repair, review, clarification, and public framing. Their actual availability
        is unknown.
      formal_vs_real_options: Formal options such as saying yes/no, consenting, or withdrawing may diverge from real options under dependency, pressure, exposure, or cost. This divergence
        is the main P issue.
      used_options: No concrete used options are supplied. Analytically, the prior overlays used the option of keeping the reading provisional and reversible.
      unused_options: Unknown. Possible unused options would include explicit cost mapping, review points, exit supports, repair, or direct-otherness correction if a concrete scene later
        supplied them.
      ceiling_rule_relevance: High M cannot be assigned where predictability and alternatives are unknown. The M-band is therefore capped in this analysis.
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: not evidenced; possible only if later scene material shows a role internalising cost, shame, or responsibility beyond its real agency
      self_neglect: not evidenced; possible only if refusal, withdrawal, bodily boundary, or after-scene dignity is suppressed by the role itself or by the frame
      shame_dynamics: not evidenced as scene fact; present as analysis-risk if publicness or sexual-cost language becomes humiliating
      degradation_of_others: not evidenced; possible if direct otherness is denied, if access entitlement appears, or if refusal/correction is treated as obstruction
      public_shaming: not evidenced in the scene; explicitly prohibited as use of this analysis
      protest_or_refusal: structurally relevant but not evidenced; refusal, delay, revision, and withdrawal must remain possible correction forms
      dignity_protection: 'active as guardrail: D0 remains untouched; D1/D2 are read only as role-context enactment dynamics'
    next_step_if_relevant: Use D-profile section below.
  acrpd_submodules_profile:
    A:
      A-I: 'Information awareness is partial: the analysis knows the structural grammar but lacks scene facts.'
      A-R: Role awareness is relatively strong at the abstract level because role_A, role_B, field_or_medium, and analyst position are separated.
      A-C: 'Consequence awareness is partial: cost categories are named but concrete consequences remain unknown.'
      A-IM: 'Interpretive-modulator awareness is strong: consent formalism, asymmetry overreach, publicness, and sexuality-specific bias are named as risks.'
      A-P: 'Publicness awareness is guarded: publicness is treated as possible amplifier and misuse risk, not as established fact.'
    C:
      C-S: Structural coherence is strong in the layered analysis; scene coherence remains indeterminate.
      C-P: Practice coherence cannot be established because no concrete enactment sequence is supplied.
      C-N: Narrative coherence is adequate as an abstract case progression from Core to SEX to MIP.
      C-I: 'Integration coherence is partial: PMS/PMS-SEX/MIP are integrated by guardrails, but the lack of scene data limits final integration.'
    R:
      R-I: 'Responsibility for information handling lies primarily with the analyst: do not overstate unknowns.'
      R-S: Structural responsibility is readable as a role-conditioned question, not assigned as guilt.
      R-E: 'Externalisation risk is central: consent or parity language may offload uncalibrated cost.'
      R-P: 'Public responsibility is mainly a transmission duty: keep the analysis non-shaming and non-decisional.'
    P:
      P-I: Informational power is held by the analyst only as interpretive structuring power.
      P-S: Scene power is possible but under-specified; Ω remains active as an abstract asymmetry anchor.
      P-C: Correction power is preserved analytically through reversibility, rival readings, and falsifier conditions.
      P-PU: Public power is not scene-evidenced; the analysis itself must avoid creating public harm.
    D:
      active: true
      D-I: Self-dignity in practice is not assigned to persons; possible self-devaluation or self-neglect remains unproven.
      D-B: Body-boundary dignity is a possible cost interface but not evidenced as a concrete bodily fact.
      D-R: 'Relational dignity is the main D concern: direct otherness, refusal, correction, and withdrawal must not be erased.'
      D-P: Public dignity is active as a guard against shaming and irreversible public interpretation, not as evidence of public harm.
      note: D-submodules are used only as qualitative dignity-in-practice guards; no dignity score or person label is produced.
  scores_and_ia:
    A_score:
      A_band: 4-5 provisional_everyday_mixed_zone_for_configuration_handling
      boundary_confirmed: A-score describes configuration-handling in this abstract analysis object, not personal maturity, character, adulthood, guilt, dignity, sexuality, or scene-level
        factual enactment by role_A or role_B.
      time_role_context: Abstract consent-under-asymmetry configuration as processed through PMS-Core, PMS-SEX, and MIP on 2026-07-06; no concrete incident time window and no person-level
        time-role-context are supplied.
      justification:
        A_awareness: Awareness is strong about structural risks at the analysis level, but weak about concrete role knowledge, concrete chronology, and concrete scene facts.
        C_coherence: Layered analysis is coherent as a guarded analytic construction; concrete word-deed, practice, relational, or incident coherence is unavailable.
        R_responsibility: Responsibility questions are named as role-conditioned structural questions, but not assigned to persons, concrete actors, motives, guilt, or stable traits.
        P_power_to_act: Real power and alternatives are central but under-specified; formal options and real options must not be collapsed.
        modulators_context: Sexuality, consent, asymmetry, publicness, dignity, template-formalism, and PMS-SEX technical vocabulary all create overreading risks.
      D_excluded_from_A_number: true
    M_score:
      M_band: 3-4 provisional_capped_by_missing_predictability_and_alternatives
      boundary_confirmed: M-score describes provisional shared structural responsibility under abstract role conditions, not guilt, blame, adultness, character, dignity, or responsibility
        of role_A, role_B, or any person.
      role_position_time_frame: Role-conditioned structural responsibility within an abstract configuration; not assigned to role_A, role_B, or any person as guilt, character, identity,
        pathology, sexual truth, or maturity verdict.
      five_factors:
        knowledge: Structural knowledge requirements are clear, but actual role knowledge is unknown and not inferable from the operator trace.
        power_control: Possible asymmetrical control is central, but concrete levers, constraints, and available role options are not evidenced.
        predictability: Predictability of consequences cannot be established from the abstract case alone; later contestation or imaginable harm must not be treated as proof of prior
          foreseeability.
        access_to_alternatives: Real alternatives, exit, correction, and review options are not concretely supplied; formal availability and real availability remain distinct.
        serious_integration_attempt: The analytical overlays seriously integrate risk; no scene-level integration attempt, refusal handling, repair, or review practice is evidenced.
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: true
        explanation: Predictability and alternatives are not approximately zero as conceptual variables, but they are unknown or not supplied as scene evidence. The cap therefore prevents
          high M attribution under missing predictability and missing real-alternative evidence; it is not a finding that predictability or alternatives were actually present.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: Possible consent-relevant sexual cost asymmetry under Ω/Θ involving access, exposure, dependency, exit, interpretation, responsibility, and after-scene dignity.
      boundary_confirmed: IA-box is an asymmetry assessability check, not an event verdict, person verdict, legal verdict, clinical verdict, or maturity verdict.
      T_transparent:
        status: partial
        notes: The analysis transparently names possible asymmetry, but the scene itself provides no evidence that asymmetry was transparent, acknowledged, understandable, or reviewable
          to the roles.
      J_justified:
        status: indeterminate
        protected_good_or_purpose: No concrete protected good or purpose is supplied; possible goods would include autonomy, dignity, consent clarity, refusal, correction, and non-externalisation
          of cost.
        notes: Asymmetry is not inherently illegitimate, but its justification cannot be assessed without concrete purpose, role mandate, burden distribution, and real alternatives.
      TB_time_bound:
        status: indeterminate
        review_points_or_conditions: No concrete time boundary, review point, exit condition, withdrawal handling, or after-scene repair mechanism is supplied.
        notes: Θ is structurally central but under-specified; no chronology or review condition supports a stronger time-boundedness claim.
      R_reversible:
        status: at_risk
        real_return_or_exit_options: Formal reversibility is analytically preserved; real reversibility for role positions is unknown and may be constrained by exposure, dependency,
          publicness, after-scene costs, or interpretive lock-in.
        notes: Reversibility is the most maturity-sensitive IA criterion in this case because consent, withdrawal, later contestation, after-scene dignity, and public interpretation may
          not be equally reversible.
      result: IA_risk
      short_justification: Asymmetry is named and analytically bounded, but transparency, justification, time-boundedness, and real reversibility are not established at scene level. IA_risk
        means risk-status of assessability under under-specified asymmetry, not an IA verdict about an event or person.
      immediate_action: No practice action prescribed; keep the result as a working note and require concrete scene evidence before any evaluative, transmissible, legal, clinical, relational,
        forensic, public, or decision use.
  ia_localisation:
    knowing:
      issue: Actual role knowledge of asymmetry, cost, refusal, exit, and after-scene burden is unknown.
      possible_intervention: 'For analysis only: distinguish documented facts from structural inferences and name missing knowledge conditions.'
    being_able:
      issue: Actual ability to refuse, withdraw, correct, pause, exit, or repair is unknown.
      possible_intervention: 'For analysis only: treat formal options and real options as separate until evidence connects them.'
    being_permitted:
      issue: It is unknown whether the frame permitted refusal, delay, correction, or non-identity without penalty.
      possible_intervention: 'For analysis only: test whether the frame converts direct otherness into access entitlement or explanation debt.'
    willing:
      issue: No motive, willingness, desire, pressure, compliance, or refusal state can be inferred.
      possible_intervention: 'For analysis only: do not use hidden motive inference; keep willingness structurally open.'
  ia_protection:
    transparency_measures:
    - Mark all role, power, cost, and chronology claims as abstract unless concrete evidence is supplied.
    - Keep PMS, PMS-SEX, and MIP layers visibly distinct.
    justification_measures:
    - Ask whether any asymmetry serves a protected good or merely one-sided advantage before calling it functional.
    - Do not treat consent, autonomy, parity, or legality as automatic justification.
    time_boundedness_measures:
    - Require explicit review, pause, withdrawal, correction, and after-scene handling points in any later concrete analysis.
    - Keep Θ open where chronology is absent.
    reversibility_measures:
    - Separate formal reversibility from real reversibility under exposure, dependency, publicness, and cost.
    - Use rival readings and falsifier questions before transmission.
    participation_or_voice_measures:
    - Treat direct otherness as correction capacity without access entitlement.
    - Do not infer the voice, desire, refusal, or motive of any role from the abstract operator trace.
    dignity_protection_measures:
    - Keep D0 outside analysis and use D1/D2 only for role-context dignity-in-practice dynamics.
    - Forbid public shaming, person labels, maturity labels, and dignity hierarchy.
    review_or_falsifier:
      date_or_interval: before any use beyond internal scholarly working note
      falsifier_question: Would a concrete bounded scene show explicit cost topology, transparent asymmetry, realistic refusal/exit, no cost externalisation, and intact after-scene dignity?
      responsible_roles:
      - analyst_or_reader
      - future_case_reconstructor_if_any
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: Initial abstract consent-under-asymmetry frame before SEX and MIP overlay.
      A_band: 3-4 provisional_if_consent_language_closes_cost_topology
