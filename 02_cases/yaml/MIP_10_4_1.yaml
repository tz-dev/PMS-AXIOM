      be assigned without predictability and real alternatives. The IA-box result is IA_risk, not a verdict: asymmetry is named, but transparency, justification, time-boundedness, and
      real reversibility are not established. The D-module is activated only as qualitative dignity-in-practice protection for an abstract configuration, not as a dignity score, person
      judgement, public reading, or maturity finding.'
    key_findings:
    - The MIP object is a configuration, not a person, relationship, incident, legal, clinical, or public verdict.
    - Consent language cannot maturely close the case unless cost topology, real options, and after-scene dignity are mapped.
    - A-score is provisional and configuration-bound, not a character assessment, adulthood verdict, or scene finding.
    - M-score is capped because predictability and alternatives are under-specified as scene evidence.
    - IA-box indicates assessability risk due to incomplete T/J/TB/R evidence, especially reversibility.
    - Dignity-in-Practice is relevant as protection language, not as score, shame, hierarchy, or dignity finding.
    - The analysis remains a working note and requires review before any stronger transmission.
