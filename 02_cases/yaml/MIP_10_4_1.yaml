schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
case:
  meta:
    case_id: MIP-CASE-Consent-Under-Asymmetry-001
    case_title: Consent Under Asymmetry
    documentation_date: '2026-05-29'
    analysts:
    - name: ChatGPT (GPT-5.5 Thinking)
      role: structural_application_assistant
      observer_position: external formal analyst applying MIP to prior PMS Core and PMS-SEX overlay analyses, with no access to a concrete scene beyond the supplied abstract case material
    language: en
    confidentiality_level: working_note_non_public_not_for_decision_basis
    analysis_mode: full
    intended_use: structural_case_review_and_ethics_reflection_only; not clinical, forensic, legal, HR, therapeutic, or public ranking use
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: philosophy_anthropology
      d_activation_decision: not_activated_due_to_abstract_non_concrete_scene_and_no_safe_D_communication_space
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: false
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: false
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: 'Abstract case material only: ''Consent Under Asymmetry'' concerns consent where agreement, refusal, pressure, dependency, vulnerability, or unequal capacity may affect whether consent is meaningfully given, withheld, or contested.'
    secondary_material: 'Completed PMS Core case YAML and completed PMS-SEX overlay YAML are used as prior structured application aids. PMS.yaml remains the PMS Base; PMS-SEX remains an overlay/application profile; MIP is applied here as its own praxeological maturity-in-practice analysis grid.'
    assumptions_and_inferences: The analysis assumes no concrete event, no identifiable person, no legal jurisdiction, no clinical record, no institutional file, no chronology, no evidentiary record, no sexual scene, and no publicness layer. Any role, score, IA, D, or trajectory language is therefore structural, hypothetical, and bounded by non-scene status.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: High coverage for abstract structural mapping; low coverage for concrete enactment, role attribution, M-score allocation, D-profile, IA final result, or practical decision basis.
      reliability_estimate: Reliable only as a guardrailed conceptual working note derived from the provided abstract case and prior PMS/PMS-SEX analyses. Not reliable as empirical, legal, clinical, forensic, HR, therapeutic, or implementation assessment.
      known_gaps:
      - no concrete actors or role-holders
      - no scene boundary beyond the abstract consent-under-asymmetry frame
      - no chronology or trajectory of agreement, refusal, withdrawal, pressure, dependency, vulnerability, or contestation
      - no evidence of knowledge, predictability, alternatives, power levers, or serious integration attempts
      - no concrete publicness, documentation, reputation, or institutional visibility layer
      - no concrete sexual cost topology, embodied consequence, exit channel, or binding channel
      - no safe communication space for D-module activation
      main_bias_risks_here:
      - over-formalizing an abstract topic as if it were a concrete case
      - inflating M-score through hindsight or conceptual clarity
      - treating asymmetry as automatic coercion, invalidity, guilt, or inadultness
      - treating agreement as automatic meaningful consent
      - overusing PMS-SEX drift markers because the topic is consent under asymmetry
      - using maturity language as disguised person-ranking
  snapshot:
    short_case_description: 'A philosophical and structural case about consent under asymmetry: agreement, refusal, pressure, dependency, vulnerability, or unequal capacity may change whether consent is meaningfully given, withheld, revised, or contested.'
    central_actors_and_roles:
    - 'abstract role-position A: possible consent-giver, refuser, withholder, reviser, or contesting party'
    - 'abstract role-position B: possible requester, receiver, beneficiary, authority-position, dependency-position, or counterpart'
    - 'abstract frame-holder: possible institutional, relational, communicative, legal, ethical, or cultural frame that defines what counts as consent, refusal, pressure, capacity, or contestation'
    - 'observer/analyst role: structural analyst who must not convert the abstract case into a person verdict'
    guiding_question: How mature, responsible, reversible, and dignity-protective is the handling of consent under asymmetry when no concrete scene is yet supplied?
    level:
    - conceptual domain projection
    - structural case review
    - non-concrete praxis frame
    - MIP working note only
    first_visible_asymmetry: 'Asymmetry is visible as a conceptual issue: unequal power, dependency, vulnerability, capacity, exposure, obligation, role authority, or exit access may affect whether agreement or refusal carries mature practical meaning.'
    first_visible_D_themes_optional:
    - possible dignity exposure through pressure, dependency, humiliation, publicness, or inability to refuse safely, but not established as a concrete D-profile
    - need to protect D0 from any ranking or dignity-score logic
    - need to keep D1/D2 language off unless a safe, scene-bound communication space exists
  role_mapping:
    object_of_observation:
      type: abstract_enactment_structure
      description: 'The observed object is not a person but the structure of consent under asymmetry as previously modeled by PMS Core and PMS-SEX: an Ω-active, □-dependent, Φ-contestable, Χ-governed, Θ-under-specified consent-field.'
      role: conceptual consent-asymmetry configuration
      not_person_as_whole: true
    observer_position:
      role: external formal analyst
      power_relation_to_object: No power over case participants because no participants are identified; interpretive power exists over the written structural artefact and must be restrained.
      possible_effects_of_analysis: The analysis can clarify structural requirements and guardrails, but could also over-authorize maturity language if mistaken for a verdict. Therefore it must remain a working note, not a decision basis.
    involved_roles:
    - role: possible consent role-position
      mandate: To give, withhold, revise, refuse, or contest consent only where awareness, coherence, responsibility distribution, and power-to-act are sufficiently real for that role-position.
      built_in_asymmetries:
      - possible dependency
      - possible vulnerability
      - possible unequal capacity
      - possible exit cost
      - possible exposure or publicness cost
      publicness_level: unknown
      dignity_exposure: possible but unassessed; D-module not activated
    - role: possible counterpart or requester role-position
      mandate: To handle consent claims, refusal, ambiguity, pressure, dependency, and vulnerability without exploiting asymmetry, externalizing burdens, or converting responsibility into authority.
      built_in_asymmetries:
      - possible frame-control
      - possible role authority
      - possible informational advantage
      - possible power to intensify or reduce pressure
      publicness_level: unknown
      dignity_exposure: possible but unassessed; D-module not activated
    - role: frame-holder or institutional-cultural frame
      mandate: To define transparent, justified, time-bound, and reversible conditions under which consent, refusal, withdrawal, and contestation can be understood.
      built_in_asymmetries:
      - definition power
      - procedural control
      - normative authority
      - visibility or documentation power
      publicness_level: unknown to potentially public depending on later scene
      dignity_exposure: possible if the frame shames, silences, exposes, or ranks; not established here
    publicness:
      level: unknown_not_supplied
      A_P_relevance: 'A-P is relevant only as a later question: parties may need awareness of publicity, documentation, symbolic interpretation, or reputational sedimentation if present.'
      P_PU_relevance: P-PU cannot be assessed because no public platform, audience, documentation, institution, or media reach is supplied.
      D_P_relevance_if_D_active: D-P would be relevant if consent or contestation became public, exposed, shaming, reputation-bearing, or institutionally visible; D is not activated here.
      public_shaming_risk: 'Analytic risk only: maturity or dignity language must not be used for public shaming or public D-reading of identifiable persons.'
      reversibility_risk: Unknown at scene level; high at publication level if the analysis were misused as a verdict. Kept as non-public working note.
  frame_vs_variability:
    frame_elements:
    - element: D0 ontological dignity
      reason_fixed_or_slow: MIP treats D0 as inviolable, immeasurable, non-rankable, and not part of any score.
      protected_goods:
      - person-worth remains untouched
      - no dignity hierarchy
      - no humiliation diagnostics
    - element: non-concrete case status
      reason_fixed_or_slow: The supplied case material is abstract and does not include actors, scene, evidence, or chronology.
      protected_goods:
      - reversibility
      - score hygiene
      - no overclaim
    - element: PMS Core boundary
      reason_fixed_or_slow: The completed Core case already typed the claim as conceptual projection and not concrete scene analysis.
      protected_goods:
      - PMS Base discipline
      - operator dependency hygiene
      - non-capture
    - element: PMS-SEX overlay boundary
      reason_fixed_or_slow: The SEX overlay remains an application profile only and does not convert the case into a sexual scene.
      protected_goods:
      - no premature sexualization
      - no orientation taxonomy
      - no adultness verdict
    variability_elements:
    - element: scene specification
      possible_change: A later concrete scene could define actors, roles, consent exchange, refusal options, chronology, and evidence.
      responsible_roles:
      - case presenter
      - analyst
      - domain expert if legal, clinical, institutional, or empirical claims are made
    - element: IA-box calibration
      possible_change: Transparency, justification, time-boundedness, and reversibility could be assessed if a concrete asymmetry is described.
      responsible_roles:
      - frame-holder
      - analyst
      - affected role-positions
    - element: A/M band assignment
      possible_change: Bands could be assigned only after role-position, knowledge, options, predictability, and serious integration attempts are documented.
      responsible_roles:
      - analyst
      - reviewer
      - affected parties where safe and appropriate
    - element: D-module activation
      possible_change: D may be activated only in a safe, context-bound, role-bound, non-public communication space where it brings more clarity than shame.
      responsible_roles:
      - facilitator
      - analyst
      - affected role-positions
    unfair_high_M_zones:
    - assigning high M to an abstract role-position without knowing predictability or real alternatives
    - inferring responsibility from conceptual asymmetry alone
    - treating vulnerability, dependency, or limited capacity as proof of guilt, maturity failure, or responsibility deficit
    - using later conceptual clarity to say a role-position 'should have known'
    system_as_excuse_risk:
    - using 'asymmetry' as a total explanation that erases concrete agency where agency exists
    - using 'the frame' or 'the system' to avoid mapping who could clarify, pause, review, or repair
    - using PMS/PMS-SEX/MIP structure to avoid rival legal, empirical, clinical, ethical, or political frameworks
    D1_D2_realistically_improvable_where:
    - 'in analytic language: avoid ranking, shaming, humiliation, and diagnosis'
    - 'in later concrete scenes: make refusal, withdrawal, review, and protection goods nameable'
    - 'in later public contexts: prevent dignity-language from becoming public punishment'
    - 'in later sexual-praxis contexts: make unequal burdens explicit without converting topology into person score'
  acrp_profile:
    A_awareness:
      observations: Awareness is structurally required but not scene-established. The case itself shows awareness of consent distinctions, asymmetry, and possible contestation; no participant awareness can be inferred.
      available_information: Only abstract information is available; agreement, refusal, pressure, dependency, vulnerability, unequal capacity, meaningful giving/withholding/contestation of consent, plus prior PMS/PMS-SEX structural analyses.
      realistically_knowable: At this stage, only structural questions are knowable. In a concrete scene, role-holders would need to know the frame, their role, the presence of dependency or vulnerability, available refusal/exit options, and possible consequences over time.
      blind_spots: Concrete knowledge, subjective experience, coercion facts, capacity facts, legal standards, chronology, publicness, bodily cost, alternatives, and integration attempts are absent.
      role_awareness_A_R: Role awareness cannot be attributed. Abstractly, role awareness would require each role-position to know whether it is acting as requester, dependent party, authority, affected party, witness, institution, or analyst.
      publicness_awareness_A_P: Publicness awareness is under-specified. There is no evidence of public, mediated, institutional, or reputational visibility.
      bias_awareness: Bias awareness is necessary because asymmetry can be over-read as automatic coercion or under-read as irrelevant when formal agreement exists. SEX overlay terms can also bias the reading toward sexualization or drift detection if not restrained.
    C_coherence:
      observations: Coherence is partial at the analytic level and absent at the scene level. PMS Core coherence is formally disciplined, but scene coherence among words, acts, frames, costs, and responsibility cannot be assessed.
      word_deed_relation: No word-deed relation is supplied. Agreement, refusal, silence, or contestation are described only as possible categories, not enacted statements or deeds.
      role_context_coherence: Role-context coherence is under-specified because roles and context are abstract. A later scene would need to show whether the consent frame matches dependency, vulnerability, capacity, and exit conditions.
      narrative_coherence: Narrative coherence is high only as a formal analysis narrative; it must not be mistaken for case truth. Rival narratives remain open.
      breaks_named_or_hidden: 'Known breaks are named: abstract status, missing scene, missing chronology, weak Λ/Α/Σ/Ψ, no D activation, no M-score allocation, no concrete SEX topology. Hidden breaks may remain in assumptions about consent and asymmetry.'
    R_responsibility:
      observations: Responsibility is structurally relevant but not attributable. The case calls for mapping how burdens and consequences are assumed, refused, shifted, distributed, or repaired under asymmetry; no concrete role-holder responsibility can be assigned.
      responsibility_points: Potential responsibility points include frame clarity, refusal/withdrawal availability, pressure reduction, dependency recognition, capacity protection, publicness restraint, cost topology mapping, and review of contested consent.
      assumed_responsibility: 'The analysis assumes responsibility only at the analyst level: maintain guardrails, avoid overclaim, keep D0 untouched, avoid person labels, and preserve non-capture.'
      shifted_or_refused_responsibility: No scene-level shifted or refused responsibility is evidenced. Analytic risk exists if asymmetry is used either to erase agency or to assign blame without role and option analysis.
      burdens_and_consequences: 'Burdens are conceptually possible: pressure, dependency, vulnerability, unequal capacity, exit cost, publicness cost, embodied cost, reputational cost, and responsibility externalization. None is mapped as concrete consequence.'
    P_power_to_act:
      observations: Power-to-act is central but unknown. The case names unequal capacity and dependency, which may affect real options; it does not specify actual levers, alternatives, or constraints.
      real_levers: No real levers are known. Potential later levers include pausing, explicit clarification, refusal channel, withdrawal, review, third-party support, procedural safeguard, or publicness control.
      formal_vs_real_options: The case warns that formal agreement or formal parity may not equal real options under dependency, vulnerability, pressure, or unequal capacity. This is a structural caution, not a finding.
      used_options: No used options are supplied.
      unused_options: No unused options can be fairly identified. Hindsight inflation must be avoided.
      ceiling_rule_relevance: High M cannot be assigned where predictability or access to alternatives is approximately zero or unknown. Because both are unknown, M-score must remain unassigned.
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: Not observed; no actor or self-treatment enactment is supplied.
      self_neglect: Not observed; no bodily, material, or everyday self-care enactment is supplied.
      shame_dynamics: Not observed as scene fact; analytic risk exists if consent or maturity language becomes shaming.
      degradation_of_others: Not observed; the analysis must avoid converting asymmetry into degradation of any role-position.
      public_shaming: Not observed; red-zone guard prohibits public D-reading, public pillory, ranking, or humiliation.
      protest_or_refusal: Conceptually relevant but not observed; refusal, protest, withholding, or contestation are named as possible consent states only.
      dignity_protection: 'Active as guardrail, not D-module finding: protect D0, keep D1/D2 off as evaluation, avoid person labels, and prevent analytic humiliation.'
    next_step_if_relevant: Use D-profile section below.
  acrpd_submodules_profile:
    A:
      A-I: Inner awareness cannot be assessed; no inner signals, ambivalence, desire, fear, or subjective experience are supplied.
      A-R: Role awareness is structurally required but not attributable; role-positions remain abstract.
      A-C: 'Context awareness is partial at analytic level: the context is consent under asymmetry, but concrete norms, constraints, and protected goods are unspecified.'
      A-IM: Impact awareness is required as a later question; actual consequences are unknown.
      A-P: Publicness awareness is not assessable; publicness is unknown.
    C:
      C-S: Social coherence cannot be assessed because no social scene or relational code is supplied.
      C-P: Power-context coherence is structurally relevant but under-specified; asymmetry is central but not mapped.
      C-N: Narrative coherence is strong as formal analysis but must remain open to rival readings and non-capture.
      C-I: Institutional or rule coherence is not assessable because no legal, institutional, or procedural frame is supplied.
    R:
      R-I: Individual responsibility cannot be assigned to any person or role-holder.
      R-S: Social responsibility is relevant only as a possible later mapping of relational burdens and safeguards.
      R-E: 'Ethical responsibility is active at the analytic level: maintain non-ranking, reversibility, and D-protection.'
      R-P: Public responsibility is not assessable as scene fact; public misuse risk is guarded against.
    P:
      P-I: Inner agency cannot be assessed; no subjective or practical capacity data are supplied.
      P-S: Social agency is unknown; no relational levers or support structures are described.
      P-C: Cultural agency is not assessable; cultural norms may matter but are not provided.
      P-PU: Public agency is not assessable; no public platform, audience, or reputational reach is supplied.
    D:
      active: false
      D-I: Not activated; no inner dignity or self-relationship enactment is observed.
      D-B: Not activated; no bodily or material self-care enactment is observed.
      D-R: Not activated; relational dignity questions remain guarded but not profiled.
      D-P: Not activated; public dignity questions remain guarded but no publicness layer is supplied.
      note: D-submodules only if D-module is activated and guardrails are fulfilled.
  scores_and_ia:
    A_score:
      A_band: not_assigned; abstract_non_concrete_case_not_scoreable
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: No concrete time, role, or context window beyond the abstract conceptual frame; therefore no A-band is assigned.
      justification:
        A_awareness: Awareness is structurally mapped but not attributable to role-holders.
        C_coherence: Analytic coherence is present, but scene coherence is not established.
        R_responsibility: Responsibility points are mapped only as possible structural locations, not assigned.
        P_power_to_act: Power-to-act and alternatives are unknown, making score assignment improper.
        modulators_context: PMS-SEX modulators and cost topology are weak/risk-level only; none supports scoring.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned; role_specific_shared_responsibility_unavailable
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No concrete role-position or time frame is available; M(X) cannot be assigned.
      five_factors:
        knowledge: Unknown at role level; only abstract analytic knowledge exists.
        power_control: Unknown; no actual levers, authority, exit options, or dependency facts are supplied.
        predictability: Unknown; consequences cannot be treated as realistically predictable without scene evidence.
        access_to_alternatives: Unknown; formal and real alternatives are not described.
        serious_integration_attempt: Unknown; no attempts to name, mitigate, correct, or integrate risks are supplied.
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: false
        explanation: The ceiling rule is relevant as a guard, but cannot be numerically applied because predictability and alternatives are unknown rather than known to be approximately zero. Therefore no M-band is assigned instead of capping a score.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: 'Yes, at conceptual level only: consent may be affected by pressure, dependency, vulnerability, or unequal capacity.'
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: under_specified
        notes: Transparency cannot be assessed because no parties, knowledge distribution, communication, or frame disclosure are supplied.
      J_justified:
        status: under_specified
        protected_good_or_purpose: No concrete protected good, purpose, emergency, care duty, or legitimate constraint is supplied.
        notes: Asymmetry may be functional or inadult depending on justification, but no justification field is available.
      TB_time_bound:
        status: under_specified
        review_points_or_conditions: No time window, duration, review point, condition, or ending criterion is supplied.
        notes: Consent contestability across time is relevant, but no temporal structure is available.
      R_reversible:
        status: under_specified
        real_return_or_exit_options: No refusal, withdrawal, exit, repair, appeal, or return options are described.
        notes: Reversibility is preserved in the analysis but not assessable in the scene.
      result: IA_risk_under_specified_not_verdict
      short_justification: The case names asymmetry but lacks the information required to classify it as functional asymmetry, IA risk, or inadult asymmetry in a concrete sense. Therefore the only responsible result is under-specified IA-risk sensitivity, not a verdict.
      immediate_action: Do not adjudicate. Reconstruct scene, roles, knowledge, alternatives, protected goods, time boundaries, reversibility, and publicness before any stronger IA or MIP claim.
  ia_localisation:
    knowing:
      issue: Who knew or could realistically know whether consent was meaningful, pressured, dependent, vulnerable, capacity-limited, or contested is unknown.
      possible_intervention: Document information access, frame clarity, explicit words, silence, refusal, withdrawal, dependency facts, and known risks.
    being_able:
      issue: Real ability to refuse, pause, exit, review, or seek support is unknown.
      possible_intervention: 'Map real levers, not merely formal options: exit channels, support, time, authority, material dependence, publicness, and safety.'
    being_permitted:
      issue: Permission to refuse, contest, withdraw, or reinterpret consent is unknown inside the frame.
      possible_intervention: Clarify whether the frame permits dissent, revision, appeal, delay, protection, and non-punitive contestation.
    willing:
      issue: Willingness cannot be inferred; no motive, desire, fear, intention, or authentic preference is supplied.
      possible_intervention: Keep willingness separate from agreement; use scene evidence and appropriate domain standards without psychologizing.
  ia_protection:
    transparency_measures:
    - make the consent frame explicit before evaluating agreement or refusal
    - separate material facts from inferences and rival readings
    - state who knows what and who could realistically know it
    justification_measures:
    - identify any protected good or legitimate constraint served by asymmetry
    - distinguish functional asymmetry from one-sided advantage
    - do not treat dependency, vulnerability, or capacity difference as self-justifying
    time_boundedness_measures:
    - define the time window of consent, refusal, withdrawal, and contestation
    - add review points where dependency, vulnerability, or pressure may change
    - avoid treating a single moment of agreement as temporally exhaustive
    reversibility_measures:
    - map real exit, pause, withdrawal, repair, and appeal options
    - distinguish theoretical alternatives from live alternatives
    - identify whether publicness or dependency makes return impossible or costly
    participation_or_voice_measures:
    - include affected role-positions where safe and appropriate
    - preserve refusal, silence, protest, and rival framing as possible meanings rather than automatic drift
    - avoid deciding from the strongest frame-holder's narrative alone
    dignity_protection_measures:
    - keep D0 untouched and non-rankable
    - do not activate D-module without safe scene-bound context
    - prevent maturity language from becoming humiliation, public shaming, or person ranking
    review_or_falsifier:
      date_or_interval: before any concrete use or transmission beyond working note
      falsifier_question: Does a concrete scene show that the asymmetry is transparent, justified, time-bound, reversible, and not externalizing unequal burdens?
      responsible_roles:
      - analyst
      - case presenter
      - domain expert where required
      - affected role-positions where safe
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Abstract case formulation: consent under asymmetry is introduced without scene evidence.'
      A_band: not_assigned
      M_band: not_assigned
      D_observation_optional: D not activated; D0 protected; D1/D2 not profiled.
      key_context_role_power_situation: Conceptual consent frame; asymmetry named but not mapped.
    - timepoint: t1
      short_description: PMS Core and PMS-SEX analyses structure the case as Ω-active, Χ-governed, Θ-under-specified, with SEX cost-topology and drift handles mostly weak or risk-level.
      A_band: not_assigned
      M_band: not_assigned
      D_observation_optional: D preserved as guardrail; no D-profile.
      key_context_role_power_situation: Analytic role only; no participant role or power-to-act data.
    A_t:
      pattern: Analytic awareness increases across documentation, but no participant maturity trajectory is available.
      notes: A(t) cannot be scored because the trajectory is a documentation trajectory, not an enactment trajectory by identified role-holders.
    M_t_RVR_t:
      RVR_description: RVR(t) remains uncomputed. Knowing_t, able_t, permitted_t, and acting_t are unknown for any role-holder.
      knowledge_over_time: Only analyst knowledge changes; role-holder knowledge is unknown.
      leverage_over_time: No leverage curve is available.
      alternatives_over_time: No alternatives over time are supplied.
      ceiling_rule_over_time: The ceiling rule remains a guard against inflated responsibility but cannot be applied without predictability and alternatives data.
    D_t_optional:
      active: false
      qualitative_course: No D trajectory is assessed. D remains a guardrail against shaming, ranking, and dignity-score logic.
      D_quick_grid_movement_if_used: not_used
      note: No D-score; only qualitative trajectory.
  D_module_optional:
    active: false
    activation_reason: Not activated. The case is abstract, non-concrete, non-public as a working note, and lacks a safe role-bound communication space. D language would risk overclaim or shame if treated as a profile.
    communication_space: working_note_internal_structural_review_only; not public, not identifiable, not decision basis
    guardrails_checked:
      scenic: false
      context_bound: true
      role_bound: false
      time_windowed: false
      no_global_statement_about_persons: true
      no_dignity_score: true
      D0_untouched: true
    D_profile:
      D1_self_treatment_D_I_D_B:
        observed_enactments: none; no self-treatment enactment supplied
        context_notes: No actor, body, self-relation, or material self-care field is given.
        trend_band_qualitative: not_assessed
      D2_relational_dignity_D_R:
        observed_enactments: none; no relational enactment supplied
        context_notes: Possible dignity protection under asymmetry remains a guardrail question only.
        interpretive_reading_not_judgment: No relational D judgment is made.
      D_P_public_dignity:
        active_if_publicness_relevant: false
        observed_enactments: none; no publicness supplied
        private_public_tension: unknown
        publicity_context: not_supplied
      A_M_D_link_without_mixing:
        A_band_reference: not_assigned
