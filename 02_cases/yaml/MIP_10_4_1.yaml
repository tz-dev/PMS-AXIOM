  meta_notes:
    bias_risks:
      confirmation_bias: 'Risk of reading the case as confirmation that asymmetry invalidates consent. Countermeasure: maintain rival reading of clear, low-asymmetry, reversible agreement.'
      hindsight_bias: 'Risk of inflating predictability because later contestation or cost is imaginable. Countermeasure: M-score capped and scene chronology required.'
      status_quo_loyalty_bias: 'Risk of treating existing consent/procedure language as sufficient because it is familiar. Countermeasure: separate formal and real options.'
      halo_horn_effects: 'Risk of moralising role_A as coercive or role_B as harmed without evidence. Countermeasure: role positions are not persons and not diagnoses.'
      in_group_out_group_bias: 'Risk of importing cultural, sexual, legal, or ideological sympathies. Countermeasure: keep the analysis structural and non-capturing.'
      dignity_bias_effect: 'Risk of using D language to intensify judgement. Countermeasure: D0 untouched, D not scored, D activated only as protection and role-context observation.'
    norm_assumptions:
      explicit_norms:
      - Consent language should not erase real cost topology.
      - Asymmetry requires transparency, justification, time-boundedness, and reversibility checks.
      - Direct otherness must not become access entitlement.
      - Dignity-in-practice analysis must not shame or rank persons.
      - Maturity language must remain role/context/time-bound.
      implicit_norms:
      - Real alternatives matter more than formal alternatives.
      - Reversibility is maturity-relevant in sexual-consent configurations.
      - Analytical restraint is itself part of maturity-in-practice.
      - Unknown concrete facts should lower confidence, not be filled by moral intuition.
      dignity_concepts:
      - D0 as inviolable ontological dignity outside scoring
      - D1 as self-dignity in practice only where observed
      - D2 as relational/public dignity in practice only where role-context enactment is visible
      - Dignity protection as guardrail against shame, public punishment, and person totalisation
      normative_position_of_D_reading: The D-reading is protective and qualitative; it identifies dignity-risk conditions in configuration handling and does not evaluate person worth.
    intuition:
      initial_intuition: Consent under asymmetry is maturity-sensitive because agreement may be formally present while real cost, exit, and correction are uneven.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: PMS-Core names agreement/consent/pressure/withdrawal distinctions and Ω/Θ under-specification; PMS-SEX names cost-topology mismatch, direct otherness, withdrawal/binding,
        and after-scene dignity as structural checks.
      contradicting_evidence: No concrete scene evidence shows actual pressure, cost externalisation, lack of exit, publicness, or dignity violation. A rival scene could be clear, reversible,
        and non-externalising.
    possible_alternative_interpretations:
    - The configuration is a purely philosophical consent problem where MIP adds only cautionary guardrails and no substantive maturity finding.
    - The configuration may become a high-IA-risk case if concrete evidence later shows opaque, unjustified, non-time-bound, or irreversible asymmetry.
    - The configuration may become a functional-asymmetry case if concrete evidence later shows transparent cost naming, justified asymmetry, realistic withdrawal/exit, and intact after-scene
      dignity.
    - A legal, clinical, relational-autonomy, communicative-consent, or empirical reconstruction lens may answer questions that PMS/PMS-SEX/MIP deliberately leave open.
    counter_perspective:
      from_other_side: A role in position_A could argue that formal consent, mutual understanding, low pressure, and real exit were present; the abstract analysis cannot disprove this.
      from_affected_side: A role in position_B could argue that formal agreement did not capture dependency, exposure, pressure, or after-scene cost; the abstract analysis cannot prove
        this but must keep it structurally visible.
      from_external_observer: An external observer should treat the MIP layer as a guarded map of possible maturity conditions, not as event reconstruction or moral finding.
  open_questions_and_blind_spots:
    missing_information:
    - Concrete sequence of approach, agreement, refusal, withdrawal, contestation, and after-scene handling.
    - Actual knowledge and expectations of each role.
    - Actual power, dependency, vulnerability, and exit options.
    - Whether direct otherness was available as correction without penalty.
    - Whether any publicness, documentation, reputation, or institutional medium existed.
    - Whether any concrete body-boundary, health, reproductive, or exposure costs were present.
    - Whether any repair, review, or reversibility mechanism was available.
    uncertain_assumptions:
    - That the consent-under-asymmetry field is sexual-praxeological rather than only abstractly ethical.
    - That role_A and role_B can be mapped without collapsing into person positions.
    - That MIP D-module activation brings more clarity than shame; guardrails make it acceptable only as protection language.
    - That cost-topology mismatch is a useful MIP input despite being only provisional under PMS-SEX.
    weak_points_in_analysis:
    - MIP scoring bands remain provisional because the object is an abstract configuration, not a concrete enactment.
    - IA-box result cannot move beyond IA_risk because T, J, TB, and R are not evidenced inside a scene.
    - D-module can protect dignity but cannot describe observed D enactments in detail.
    - Possible steps toward maturity risk sounding prescriptive and must remain analytical/transmission safeguards.
    needed_perspectives:
    - Bounded empirical scene reconstruction if the case is meant to become concrete.
    - Legal consent doctrine if a legal question is asked.
    - Clinical capacity expertise if capacity is raised.
    - Relational autonomy and communicative consent theory for non-PMS comparison.
    - Affected-role perspectives if ethically and safely obtainable.
    - Independent review before any use beyond internal scholarly analysis.
  possible_steps_towards_maturity:
    decision_mode: analysis_hygiene_only_not_practice_guidance
    functional_next_step:
      action: Before any stronger claim, convert each abstract Ω/Θ cost claim into a documented analysis question with evidence status, counter-reading, prohibited inference, and reversibility
        condition.
      reversible: true
      responsible_role: analyst_or_reader
    short_term_feasible:
    - Keep the MIP layer as working_note, not decision_basis.
    - Mark A-band and M-band as configuration-level provisional bands only.
    - Separate consent language, cost topology, real alternatives, and after-scene dignity in any prose version.
    - Preserve the strongest rival reading alongside the drift reading.
    - Remove or revise any sentence that sounds like a person maturity verdict, practice instruction, legal conclusion, clinical conclusion, relational advice, or public judgement.
    medium_term_feasible:
    - If the case is developed further, add a bounded scene packet with chronology, role knowledge, real options, exit/review, publicness, and direct-otherness evidence before rerunning
      IA, M, or D interpretation.
    - Run the IA-box again only after concrete T, J, TB, and R evidence is present.
    - Keep PMS, PMS-SEX, and MIP layers visibly separated in the final scientific text.
    - Add a non-PMS rival-framework paragraph before transmission.
    overambitious_or_risky:
    - Assigning adultness, immaturity, guilt, dignity failure, or pathology to any role.
    - Treating MIP as legal, clinical, forensic, relational, or sexual practice guidance.
    - Publishing the D-reading as a public judgement.
    - Using scores as precise numbers or as character labels.
    - Inferring motive, desire, or orientation from operator profiles.
    - Treating template completeness or YAML precision as evidentiary completeness.
    protection_first_if_low_M_high_harm:
    - If concrete harm later appears with low role predictability or few alternatives, use protection and repair language rather than blame escalation.
    - If after-scene dignity risk appears, prioritise non-shaming containment of interpretation before responsibility attribution.
    structural_change_if_high_M:
    - If later evidence shows high knowledge, high control, predictable cost, real alternatives, and no serious integration attempt, shift from abstract IA_risk toward stronger role-specific
      responsibility analysis only through a new evidence-grounded MIP run.
    - Any such shift must remain role/context/time-bound and must not become a person or dignity verdict.
