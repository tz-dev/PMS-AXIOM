core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a structure of diachronic self-relation and
      praxis-continuity, not as an ontological essence of a person or
      psychological profile.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis for praxis.
    status: "satisfied"
    case_application: >
      Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as
      PMS operators in the case.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS derives structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and asymmetry drift patterns from operator
      compositions.
    status: "satisfied"
    case_application: >
      Awareness, coherence, responsibility, action, dignity-in-practice,
      SELF_FIXPOINT, and drift patterns are treated as formula-derived
      projections, not primitives.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are central structural operators.
    status: "satisfied"
    case_application: >
      Θ is central because identity is diachronic; Ω is moderate because earlier
      and later phases of life involve directional exposure, consequence, and
      obligation without implying moral hierarchy.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality
      or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not imply
      direct implementation, guaranteed interoperability, or explanatory
      adequacy.
    status: "satisfied"
    case_application: >
      This YAML is a formal case representation only; it is not an
      implementation of identity, selfhood, consciousness, or empirical
      validity.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS remains open to comparison with alternative grammars and sharper
      discriminative models.
    status: "satisfied"
    case_application: >
      Rival readings include bodily-continuity, psychological-continuity,
      narrative-identity, animalist, memory-based, social-recognition, and
      no-self or bundle-theoretic accounts.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating
      rival formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture.
    status: "satisfied"
    case_application: >
      Metaphysical numerical identity, phenomenological first-person
      persistence, biological organism continuity, and legal identity criteria
      may remain only partially captured or outside PMS scope.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool.
    status: "satisfied"
    case_application: >
      No pathology, trait, competence, memory condition, mental state, or
      person-level diagnosis is inferred from the identity-over-time problem.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must remain tied to scenes, roles, and structures.
    status: "partial"
    case_application: >
      Because the case is not a concrete scene, the analysis is explicitly
      bounded as a conceptual domain projection and does not produce
      scene-specific claims.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible,
      decontextualized claims.

