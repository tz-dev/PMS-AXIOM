case_synthesis:
  primary_pms_reading: >
    Personal identity over time can be projected in PMS as a diachronic
    structure in which differences and tensions are framed, patterned,
    temporalized, recontextualized, distanced, integrated, and self-bound into a
    relatively stable self-relation.
  continuity_condition: >
    Continuity holds within the PMS projection where recurrent patterns,
    temporal trajectories, reflective distance, and integration support
    self-binding without erasing relevant differences or ruptures.
  change_condition: >
    Change is handled through Φ when earlier actions, roles, memories, or
    self-descriptions are placed into later frames and integrated without
    forcing identity closure.
  rupture_or_non_fit_condition: >
    Rupture, resistance, forgetting, disagreement, absence, and rival framing
    remain possible non-capture zones and must not automatically be redescribed
    as drift, failed integration, or immaturity.
  responsibility_condition: >
    Responsibility is weakly projected where earlier actions or commitments are
    borne by later self-binding under asymmetry and temporality; it does not
    imply moral blame or legal liability.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by preserving restraint under
    asymmetry and by rejecting person-ranking, shaming, or ontological
    evaluation based on continuity or discontinuity.
  rival_reading_condition: >
    Rival formalizations remain open until explicit comparison criteria show
    that PMS discriminates better rather than merely assimilating more cases.

