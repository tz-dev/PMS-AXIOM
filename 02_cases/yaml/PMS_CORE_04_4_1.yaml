    status: "active"
  reflexive_praxis:
    formula:
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >
      The PMS reading integrates multiple continuity criteria through reflective
