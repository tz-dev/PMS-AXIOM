operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The case becomes analyzable by distinguishing numerical sameness,
      narrative continuity, bodily continuity, psychological continuity, role
      continuity, and structural self-binding across time. PMS treats these as
      distinctions in a conceptual field, not as proof of metaphysical identity.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the contrast is sameness versus change, self versus temporal phase, continuity versus rupture, or identity criterion versus rival criterion."
      - "Check that distinctions between metaphysical identity, practical identity, narrative identity, and PMS self-binding are not conflated."
    falsifier_conditions:
      - "If the case does not require a distinction between persistence and change, the PMS reading loses its entry point."
    non_capture_note: >
      Difference enables the analysis but does not show that PMS captures the
      full philosophical problem of identity.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The active tension is the demand to orient from temporal difference toward
      an identity criterion: how something can change and still be treated as
      the same person, agent, or accountable self. This is an argumentative and
      structural directedness, not an inferred subjective desire.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify that the tension is philosophical and structural: the demand for a criterion of persistence through change."
      - "Do not infer desire, fear, or subjective experience from the conceptual problem alone."
    falsifier_conditions:
      - "If no criterion-seeking or continuity-tension arises from temporal difference, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural criterion-pressure, not a psychological diagnosis or
      existential description.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The primary frame is a philosophical-conceptual inquiry into diachronic
      personal identity. Secondary frames include practical accountability,
      memory, embodiment, social recognition, and narrative continuity, each
      constraining which distinctions count as relevant.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as conceptual analysis of personal identity over time."
      - "Mark shifts among metaphysical, practical, ethical, legal, psychological, and PMS-structural frames instead of merging them."
    falsifier_conditions:
      - "If no identity-over-time frame is specified, the analysis becomes too abstract to discriminate personal identity from any temporal process."
    non_capture_note: >
      A PMS frame can clarify identity discourse without exhausting
      metaphysical, phenomenological, biological, or legal frames.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The case is structured by the absence of a single concrete scene and by
      the expected but not supplied metaphysical identity proof. This absence
      matters only within the identity-over-time frame and must also remain a
      possible marker of PMS non-capture.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the expected occurrence as a decisive identity criterion or concrete scene and the frame in which its absence matters."
      - "Preserve the possibility that absence of a metaphysical proof marks PMS non-capture rather than failure of the identity case."
    falsifier_conditions:
      - "If no structured expectation for identity, continuity, or proof exists, Λ should not be asserted as active."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration;
      it may mark an irreducible gap between PMS structure and metaphysical
      identity questions.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Stable patterns appear as recurring identity criteria: memory continuity,
      bodily persistence, narrative coherence, role continuity, and
      responsibility across time. PMS reads these as attractors in the
      conceptual domain rather than as settled truths.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Show recurrence in identity criteria, commitments, memories, bodily continuities, or narrative patterns rather than merely naming temporal sequence."
      - "Distinguish stable identity attractors from accidental aggregation of life-events."
    falsifier_conditions:
      - "If recurrence in commitments, memory, embodiment, roles, or narrative patterns is not shown, Α is over-read."
    non_capture_note: >
      Pattern formation is not proof that recurrent features are necessary or
      sufficient for identity.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Asymmetry appears in relations between earlier and later phases of a life,
      between the remembered and the forgotten, between the agent who acted and
      the later agent who bears consequences, and between external recognizers
      and the self-relation being recognized.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the direction and kind of asymmetry: earlier action to later accountability, past vulnerability to present interpretation, or recognizer to recognized self-relation."
      - "Do not moralize asymmetry as blame or superiority."
      - "Allow Ω to remain moderate because no concrete relation of power is supplied."
    falsifier_conditions:
      - "If no directional imbalance between temporal phases, obligations, vulnerabilities, or recognitional positions is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: >
      Asymmetry is structural and moderate here, not a moral verdict or
      person-ranking.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Temporality is the central condition of the case: identity is at issue
      only because self-relation, embodiment, memory, action consequences,
      commitments, and recognition persist, shift, or rupture across time.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish diachronic trajectory from static comparison of two moments."
      - "Check that temporality is essential to the identity question and not merely background chronology."
    falsifier_conditions:
      - "If temporal extension is not required for the case, Θ is overextended and the analysis no longer concerns personal identity over time."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical, empirical, or
      phenomenological continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Recontextualization appears when an earlier self-description, action,
      memory, or role is placed into a later frame. The same event may become
      evidence of continuity, transformation, rupture, or reinterpretive repair
      depending on the frame used.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name source frames such as earlier self-description, memory, bodily state, or role, and target frames such as later interpretation, responsibility, or narrative revision."
      - "Check whether recontextualization clarifies continuity or merely absorbs rupture into a smooth story."
    falsifier_conditions:
      - "If every rupture, forgetting, or discontinuity is absorbed as recontextualization, the reading is over-assimilative."
    non_capture_note: >
      Recontextualization must preserve the possibility that some
      discontinuities are not integrable within PMS.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Distance is required to avoid collapsing the case into a verdict such as
      personal identity is memory, body, soul, narrative, or PMS self-binding.
      The analysis suspends metaphysical closure and treats PMS as a reversible
      structural projection.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Check whether the analysis suspends verdict and preserves reversibility among metaphysical, psychological, narrative, and PMS readings."
      - "Distinguish reflective distance from avoidance of the identity question or empty neutrality."
    falsifier_conditions:
      - "If Χ is suspended to force a metaphysical or practical verdict, the PMS application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure of the
      identity question.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Integration appears as the attempted coordination of bodily,
      psychological, narrative, relational, and normative continuities into a
      coherent account of diachronic identity. PMS treats such coherence as
      structurally informative but insufficient as proof.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Test whether integration discriminates among bodily, psychological, narrative, and normative continuities rather than smoothing them into one vague continuity claim."
      - "Distinguish integration from forced coherence imposed on rupture, forgetting, trauma, or discontinuity."
    falsifier_conditions:
      - "If coherence is treated as proof of identity rather than as a structural projection, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself and may become too smooth for hard
      cases of rupture.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Self-binding is the main PMS projection: diachronic identity can be
      modeled as commitment to integrated trajectories across time. This is a
      structural self-relation, not a metaphysical proof that the same subject
      persists without remainder.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Apply Ψ only to structural self-binding across time, not to metaphysical subject-substance unless independently argued."
      - "Do not attribute literal subjectivity to abstract identity criteria; keep SELF_FIXPOINT as a derived PMS self-model."
    falsifier_conditions:
      - "If Ψ is applied without Σ, Θ, and Χ, or if it is treated as metaphysical subject-persistence, the self-binding reading is under-specified or overextended."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity or numerical identity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the identity problem by distinguishing continuity from
      change, activating the demand for criteria, framing that demand as
      personal identity, marking absent decisive proof, and stabilizing
      recurring continuity patterns.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 makes the case specifically diachronic: earlier and later life-phases
      stand in asymmetric relations of exposure, consequence, recognition, and
      obligation, and those relations unfold across temporal trajectories.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 handles reinterpretation of earlier phases, reflective suspension of
      premature identity verdicts, and integration of multiple continuity
      criteria without treating coherence as proof.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      Ψ is primary as the PMS projection of diachronic self-relation, but only
      as structural self-binding, not as metaphysical persistence of a
      subject-substance.

dependency_logic:
  status: "dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The case requires distinctions among identity, change, continuity, rupture, and rival criteria."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Those distinctions create structural pressure to orient toward an account of persistence through change."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The philosophical identity-over-time frame constrains which tensions and distinctions are relevant."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Within that frame, the absence of a decisive metaphysical criterion or concrete scene becomes meaningful."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Recurring criteria such as memory, embodiment, narrative, role, and responsibility stabilize as identity attractors."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Stabilized identity patterns create directional relations between earlier action and later accountability, past self-description and present interpretation, and recognized and recognizing positions."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "The case is diachronic because these patterns and asymmetries persist, shift, or rupture across time."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Earlier structures are reinterpreted in later frames of memory, responsibility, narrative, or transformed self-understanding."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Reflective distance is needed to compare identity criteria without forcing closure."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "The PMS reading integrates multiple continuity criteria while keeping them discriminated and reversible."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Self-binding can be projected only after integration, temporality, and distance are maintained."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

