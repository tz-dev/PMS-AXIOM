operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: Difference is active in the distinctions among belief, truth, justification, knowledge, sufficiency, accidental truth, and epistemic luck. These distinctions create the structural entry point for the case.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The primary distinction is between justified true belief and knowledge, with secondary distinctions between non-accidental knowledge and accidentally true belief.
    - The distinctions are imported from the case material itself and must not be conflated into a single PMS category or treated as already resolved by PMS.
    falsifier_conditions:
    - If the case did not distinguish justified true belief from knowledge, Δ would no longer provide the structural entry point for a Gettier reading.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Impulse appears as argumentative and explanatory pressure: the difference between JTB and knowledge activates the question whether the traditional criteria are sufficient.'
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - The tension is philosophical and structural, not an inferred subjective desire or behavioral drive.
    - The pressure is to explain the apparent insufficiency of JTB without converting that pressure into practical urgency or moral demand.
    falsifier_conditions:
    - If the JTB/knowledge distinction produced no explanatory or argumentative pressure, ∇ would be under-specified.
    non_capture_note: 'Impulse does not imply conscious desire, psychological motivation, or moral urgency unless independently warranted.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: Frame is active as the epistemological JTB frame within which belief, truth, justification, and knowledge are evaluated for sufficiency.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is epistemological evaluation of knowledge under the justified-true-belief account.
    - The analysis marks a frame shift from JTB sufficiency to a luck-sensitive or accidental-truth-sensitive evaluation rather than silently changing criteria.
    falsifier_conditions:
    - If no epistemological frame or JTB criterion-frame is specified, the PMS reading cannot discriminate Gettier problems from ordinary uncertainty or disagreement.
    non_capture_note: 'Frame selection is interpretive and may be contested.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Non-Event is active as the meaningful failure of expected knowledge-attribution: the subject appears to have justified true belief, yet knowledge is withheld or remains absent.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The expected occurrence is knowledge-attribution under the JTB frame; its absence matters only because JTB is treated as a candidate sufficient condition.
    - The withheld attribution may mark an epistemological limit or PMS non-capture, not a defect in a person or theory by default.
    falsifier_conditions:
    - If the case lacks a structured expectation that JTB should yield knowledge, Λ should not be asserted as central.
    non_capture_note: 'Absence may mark case structure, insufficient evidence, or a limit of PMS capture; it must not be forced into a drift or deficiency reading.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Attractor is weakly active because Gettier problems name a recurrent problem-family of structurally similar counterexamples, not merely one isolated assertion.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Recurrence is shown only at the level of a philosophical problem-family and should not be treated as a behavioral routine, institution, or psychological pattern.
    - The attractor is a stabilized argumentative pattern, not accidental aggregation and not a clinical or social script.
    falsifier_conditions:
    - If only a single unsystematic example were present and no recurrence or family resemblance were warranted, Α would be over-read.
    non_capture_note: 'Attractor claims require recurrence; one scene does not automatically create a pattern.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Asymmetry is weak and limited. The case may show imbalance between justificatory route and truth-condition, or exposure of belief to luck, but it does not establish interpersonal power, capacity, vulnerability, obligation, or responsibility asymmetry.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - 'The only available asymmetry is epistemic-structural: the belief can satisfy JTB while remaining vulnerable to accidental truth.'
    - This asymmetry must not be moralized, person-ranked, or converted into blame.
    - Ω remains weak because the case material lacks roles, power relations, institutional asymmetry, and concrete vulnerability structures.
    falsifier_conditions:
    - If no directional imbalance between justification, truth, luck, or evaluative position is identifiable, Ω must be removed or marked not active.
    non_capture_note: 'Asymmetry is structural, not moral hierarchy or blame by default.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Temporality is weak. The case minimally involves sequence among belief formation, truth-condition, justification, and later knowledge evaluation, but no full trajectory, development, or long-term commitment is supplied.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - The temporal structure is minimal sequencing rather than a diachronic development narrative.
    - Temporality is useful only where the scenario specifies when belief, justification, truth, and evaluation occur.
    falsifier_conditions:
    - If the case is treated as a purely static logical relation with no sequence relevant to belief formation or evaluation, Θ is overextended.
    non_capture_note: 'Temporality must not be inflated into development, maturity, or destiny without evidence.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Recontextualization is active because the JTB structure is placed into a luck-sensitive frame, changing the significance of justified true belief without thereby solving the problem.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The source frame is JTB sufficiency; the target frame is epistemic luck or accidental truth as a challenge to sufficiency.
    - Recontextualization must clarify the challenge without absorbing every non-fit as PMS-resolvable Φ.
    falsifier_conditions:
    - If every rupture, rival theory, or unresolved epistemological issue is absorbed as Φ, the reading becomes over-assimilative.
    non_capture_note: 'Recontextualization may clarify, but it may also over-assimilate. Rival reframings remain possible.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Distance is active as a required analytic restraint: the PMS reading suspends premature verdicts about knowledge, PMS sufficiency, and rival theories.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis preserves reversibility and does not convert PMS mapping into a verdict that JTB fails in all cases or that PMS solves the problem.
    - Distance is not empty neutrality; it is disciplined restraint that preserves distinctions, rival readings, and non-capture.
    falsifier_conditions:
    - If Χ is suspended to force PMS closure, empirical authority, metaphysical authority, or a final epistemological verdict, the PMS application is invalid.
    non_capture_note: 'Distance must not become evasion; it is reflective restraint that keeps the analysis reversible.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Integration is contested and only weakly active. The problem concerns the failure or incompleteness of integration among belief, truth, justification, anti-luck structure, and knowledge.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Integration must discriminate among JTB, knowledge, lucky true belief, and justified false belief rather than smoothing them into one coherent PMS story.
    - Integration is not forced coherence and does not prove adequacy, truth, or epistemological resolution.
    falsifier_conditions:
    - If coherence is treated as proof that PMS captures Gettier problems exhaustively or solves knowledge, Σ is overclaimed.
    non_capture_note: 'Integration is not equivalent to truth, goodness, or final resolution.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Self-Binding is not case-central. The Gettier subject is not described as forming a self-relation, stable normativity, autobiographical coherence, or responsibility-as-self-commitment; Ψ applies only as analytic self-discipline of this PMS application.
    dependency_status: not_active
    analytic_weight: not_active
    calibration_points:
    - 'Apply Ψ only to the application discipline: the analysis remains bound to reversibility, non-capture, and non-ranking.'
    - Do not attribute selfhood, maturity, responsibility, or failure of self-binding to the Gettier subject or to rival theorists.
    falsifier_conditions:
    - If Ψ is applied to the case subject without evidence of Σ, Θ, Χ, and self-binding structures, the self-binding reading is under-specified.
    non_capture_note: 'Self-binding must not be equated with consciousness, personhood, or metaphysical selfhood.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.'
    case_function: 'L1 carries the main structure: Δ separates JTB from knowledge, ∇ supplies philosophical pressure, □ frames the epistemological evaluation, Λ marks failed knowledge-attribution, and Α weakly marks the recurrence of Gettier-style counterexamples.'
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.'
    case_function: L2 is weak. Ω and Θ are present only as limited epistemic imbalance and minimal sequencing; the case does not establish interpersonal asymmetry, durable role structure, or developmental trajectory.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.'
    case_function: 'L3 carries major analytic weight through Φ, Χ, and contested Σ: JTB is recontextualized through luck, the analysis maintains distance from verdicts, and integration remains unresolved rather than completed.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.'
    case_function: Ψ is not primary for the case itself. It functions only as analytic self-binding of the PMS application, not as a self-model or person-level claim about the Gettier subject.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case explicitly distinguishes justified true belief, knowledge, justification, truth, belief, sufficiency, and luck.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: The JTB/knowledge distinction generates the philosophical pressure to ask whether JTB is sufficient for knowledge.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: The epistemological JTB frame constrains which distinctions and expectations matter.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Knowledge-attribution is expected under the JTB frame but appears absent or withheld in Gettier cases.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: The problem is named as a class of Gettier problems, giving weak recurrence at the problem-family level.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Only a weak epistemic-structural imbalance is available; interpersonal or institutional asymmetry is not established.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Only minimal sequencing of belief formation, justification, truth-condition, and evaluation is available.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: The JTB frame is re-read through luck or accidental truth, but the prerequisites Ω and Θ remain weak.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Reflective distance is maintained by refusing empirical, metaphysical, diagnostic, legal, implementation, or PMS Base validation claims.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Integration is considered as unresolved coordination among belief, truth, justification, luck, and knowledge, not as achieved solution.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Case-internal self-binding is not activated; only application-level self-binding discipline is maintained.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
