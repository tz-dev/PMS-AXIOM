ai_interface_pms_alignment:
  welcome_message: 'This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic, non-clinical, non-prescriptive, and non-metaphysical in its claims.'
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect the case through Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ without adding operators or revising PMS Base.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis.
    case_status: active
    case_application: Derived axes mode is used to mark Awareness_A, Coherence_C, Responsibility_R, Action_E, and Dignity_in_Practice_D according to their PMS formulas and case limits, without individual diagnosis.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing.
    case_status: not_applicable
    case_application: AI architecture mode is not applicable because the case material does not specify an agent architecture, implementation design, simulation, deployment, or safety system.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    asymmetries_and_temporal_trajectories_visible: Ω is weak and limited to epistemic-structural imbalance or exposure to luck; Θ is weak and limited to minimal sequencing of belief, justification, truth, and evaluation. Neither supports a role hierarchy, developmental trajectory, or responsibility gradient.
    recontextualization_distance_integration: Φ is active as the JTB frame is re-read through luck or accidental truth; Χ is active as analytic restraint and reversibility; Σ is contested because the integration of truth, belief, justification, anti-luck structure, and knowledge is precisely unresolved.
    derived_axes_projection: Awareness_A is weak, Coherence_C is active as problem-structure, Responsibility_R is not applicable, Action_E is under-specified, and Dignity_in_Practice_D is an application constraint rather than an ontological ranking.
    tentative_calibration_rivalry: The PMS reading remains tentative around Ω, Θ, Σ, and Ψ, and it does not defeat anti-luck, modal-stability, reliabilist, internalist, externalist, or justification-defect formalizations.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary: []
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The case permits a bounded PMS structural projection of an epistemological problem-family. It does not permit empirical findings, metaphysical conclusions, diagnosis, legal or forensic judgment, implementation claims, person-ranking, or PMS Base validation.
  coherence_risk:
    status: high
    reason: The PMS reading can become too smooth because Δ, □, Λ, Φ, Χ, and contested Σ map naturally onto the Gettier structure, risking under-discrimination between Gettier cases and adjacent epistemic cases.
    mitigation: The reading is constrained by discrimination tests, non-capture zones, rival formalizations, weak marking of Ω and Θ, non-activation of Ψ, and falsifier conditions that prevent PMS coherence from counting as epistemological sufficiency.
  coverage_vs_discrimination:
    coverage_result: PMS covers the structural gap between JTB and knowledge, the framed expectation of knowledge-attribution, the meaningful non-event of withheld knowledge, and the recontextualization of JTB through luck.
    discrimination_requirement: The PMS reading must distinguish Gettier problems from lucky guesses, unjustified true beliefs, justified false beliefs, ordinary ignorance, simple disagreement, and general theory revision.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish Gettier cases from ordinary lucky guesses.
    expected_pms_distinction: 'A Gettier reading requires □ and Λ inside a JTB frame: justified true belief is present and knowledge-attribution is meaningfully withheld. A lucky guess lacks the same justified-belief frame.'
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish Gettier cases from ordinary justified false belief or simple uncertainty.
    expected_pms_distinction: A Gettier reading requires truth plus justification and a Λ failure of knowledge-attribution; justified false belief lacks truth, while simple uncertainty lacks the same structured JTB sufficiency expectation.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: Difference is calibrated by explicit separation of JTB from knowledge and by preserving distinctions among truth, belief, justification, sufficiency, and luck.
    current_calibration: satisfied
  - operator: ∇
    question: Impulse is calibrated by the argumentative pressure generated by the apparent insufficiency of JTB.
    current_calibration: satisfied
  - operator: □
    question: Frame is calibrated by the epistemological JTB account and its luck-sensitive re-reading.
    current_calibration: satisfied
  - operator: Λ
    question: Non-Event is calibrated by the expected knowledge-attribution under JTB and the apparent failure or withholding of that attribution.
    current_calibration: satisfied
  - operator: Α
    question: Attractor is calibrated only by recurrence of Gettier problems as a problem-family, not by behavioral repetition.
    current_calibration: weak
  - operator: Ω
    question: Asymmetry is calibrated weakly by epistemic imbalance or exposure to luck, not by interpersonal power or obligation.
    current_calibration: weak
  - operator: Θ
    question: Temporality is calibrated weakly by sequence among belief formation, justification, truth, and evaluation.
    current_calibration: weak
  - operator: Φ
    question: Recontextualization is calibrated by movement from JTB sufficiency to luck-sensitive evaluation.
    current_calibration: satisfied
  - operator: Χ
    question: Distance is calibrated by reversible, non-tribunal, non-totalizing analysis that does not claim PMS sufficiency.
    current_calibration: satisfied
  - operator: Σ
    question: Integration is calibrated by whether the reading distinguishes unresolved epistemic integration from forced coherence.
    current_calibration: partial
  - operator: Ψ
    question: Self-Binding is calibrated only as application discipline; it is not calibrated as a case-internal structure.
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - The exact epistemological nature of knowledge, justification, truth, epistemic luck, modal safety, reliability, defeasibility, and anti-luck conditions may remain outside PMS capture or require rival formalization.
    - PMS can mark the structured absence of knowledge-attribution under a JTB frame, but that does not by itself determine whether the decisive deficit is luck, defective justification, modal instability, reliability failure, semantic ambiguity, or a non-PMS feature.
    - The case may remain only partially legible in PMS terms because Gettier problems are designed to pressure the sufficiency of epistemic criteria rather than to present a concrete praxis scene.
    rule: 'These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured absence, recontextualization success, or failed maturity. They may mark genuine limits of the PMS reading or domains where another formal grammar discriminates more sharply.

      '
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - Anti-luck epistemology may formalize the Gettier deficit more directly than PMS Λ, Φ, or Σ by treating accidental truth as the central disqualifying feature.
    - Modal-safety or sensitivity accounts may locate the decisive issue in nearby possible error rather than in PMS non-event, integration, or recontextualization.
    - Reliabilist or externalist accounts may treat the belief-forming process as decisive in a way not exhausted by the current PMS operator projection.
    - Internalist accounts may preserve the subject's justificatory position while still denying that PMS captures the full epistemological norm of knowledge.
    - Justification-defect readings may deny that the belief was justified in the relevant knowledge-conferring sense, rather than accepting JTB and adding an anti-luck condition.
    rule: 'Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria are explicitly specified and applied. The presence of rival readings is not itself PMS drift, failed integration, or incomplete maturity.

      '
  falsifier_conditions:
  - id: F1
    condition: The PMS reading would be weakened if the case does not actually involve justified true belief, truth, or a meaningful expectation that JTB should yield knowledge.
  - id: F2
    condition: PMS would be under-discriminating if the same operator configuration equally classified lucky guesses, unjustified true beliefs, justified false beliefs, ordinary uncertainty, and Gettier cases without additional distinctions.
  - id: F3
    condition: The reading would over-assimilate the case if it treated every rival epistemological account, unresolved absence, or non-fit as PMS drift, incomplete integration, or successful recontextualization.
  - id: F4
    condition: The reading would be overextended if Ω were treated as interpersonal power, moral hierarchy, responsibility gradient, or vulnerability asymmetry without a concrete scene supplying those structures.
  - id: F5
    condition: The reading would be invalid as a strict PMS application if Χ were suspended in order to force PMS sufficiency, final epistemological resolution, PMS Base validation, or tribunal-style ranking of rival theories.
  final_quality_status:
    result: usable_with_limits
    reason: The case is usable as a reversible conceptual PMS projection with high coherence risk, weak Ω and Θ, contested Σ, non-active case-level Ψ, preserved non-capture, and no empirical, metaphysical, diagnostic, legal, implementation, or PMS Base validation claim.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: 'These requirements identify what would be needed to turn the PMS projection into a calibrated empirical, comparative, computational, legal, clinical, or applied analysis.'
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: A concrete scenario must identify the exact belief, truth-condition, justification, knowledge claim, and luck relation being distinguished.
      ∇: A calibrated analysis must identify the argumentative, explanatory, or practical pressure generated by the JTB/knowledge gap.
      □: The active epistemological frame must be explicit, including whether JTB, anti-luck, reliability, modal safety, or another account is being used.
      Λ: The expected knowledge-attribution and the reason for its withholding must be specified in the scenario.
      Α: Recurrence must be shown by multiple structurally similar cases or an explicit problem-family criterion.
      Ω: Any asymmetry must be specified as epistemic, modal, role-based, institutional, interpersonal, or otherwise; weak metaphorical imbalance is insufficient for strong Ω.
      Θ: The temporal order of belief formation, justification, truth-making condition, and evaluation must be specified.
      Φ: The source frame and target frame of recontextualization must be named and compared.
      Χ: The analysis must document reversible thresholds, rival readings, and limits that prevent forced closure.
      Σ: A discrimination test must show whether integration separates Gettier cases from adjacent epistemic cases rather than smoothing them together.
      Ψ: Self-binding indicators must be absent, analytic-only, or explicitly specified; no person-level self-binding may be inferred from abstract case material.
    negative_cases:
    - A lucky guess that is true but unjustified, a justified false belief, an ordinary justified true belief without luck, and an unresolved philosophical disagreement that is not a Gettier case.
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: Operationalization is not fulfilled in this conceptual projection. Empirical, computational, legal, clinical, and applied validation are not claimed; comparative philosophical validation against rival epistemological models remains required for any stronger claim.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: The Gettier subject is not interpreted as having a psychological trait, disorder, competence deficit, or inner-state profile; PMS describes the epistemic structure only.
    non_metaphysical: The analysis does not state what knowledge, truth, belief, or justification metaphysically are; it only maps the structural problem raised by the case material.
    non_diagnostic: No diagnostic, clinical, therapeutic, forensic, risk, maturity, or person-type inference is drawn from the case.
    non_legal_forensic: The case does not provide evidence, liability, culpability, testimony standards, or forensic decision criteria, and PMS is not used as such.
    non_implementation_claim: No AI system, computational model, software architecture, simulation, or operational procedure is implemented or validated by this YAML.
    non_moral_ranking: The subject, theorists, and rival epistemological accounts are not ranked morally or ontologically.
    non_exhaustive_capture: PMS translation is not treated as an exhaustive account of Gettier problems; anti-luck, modal, reliabilist, internalist, externalist, and justification-defect readings remain possible.
    reversibility: All operator statuses remain revisable if a concrete Gettier scenario supplies different details about justification, truth, luck, sequence, or evaluative frame.
    dignity_in_practice: Dignity-in-Practice is preserved by maintaining restraint under weak asymmetry, avoiding shaming or ranking, and refusing tribunal-style verdicts about persons or rival theorists.
limits:
- The PMS reading captures a structural tension in the Gettier problem-family but does not solve the epistemological problem of knowledge.
- The analysis is not empirical, metaphysical, phenomenological, diagnostic, clinical, legal, forensic, computational, implementation-based, or PMS Base validation.
- Rival readings may formalize the decisive issue as anti-luck, modal safety, reliability, or justification defect rather than PMS Λ, Φ, or Σ.
- Because the PMS mapping is coherent, it carries a high over-assimilation risk unless discrimination tests and non-capture zones remain active.
case_synthesis:
  primary_pms_reading: Gettier problems are structurally read as a framed epistemic sufficiency failure in which the distinction between JTB and knowledge generates explanatory pressure, expected knowledge-attribution fails, and JTB is recontextualized through luck under required analytic distance.
  continuity_condition: Continuity is weak and applies only to the recurrence of Gettier-style problem structures across the problem-family, not to a concrete praxis trajectory or self-relation.
  change_condition: 'Change appears as Φ: the JTB frame is recontextualized through epistemic luck or accidental truth, shifting the evaluation of justified true belief.'
  rupture_or_non_fit_condition: The apparent rupture between JTB and knowledge is preserved as a genuine philosophical non-fit or possible non-capture zone; it is not automatically redescribed as drift, incomplete calibration, incomplete integration, or maturity failure.
  responsibility_condition: Responsibility_R is not applicable to the Gettier subject. Only the application itself carries responsibility to remain reversible, restrained, and open to rival formalizations.
  dignity_condition: Dignity-in-Practice constrains the analysis by prohibiting person-ranking, diagnosis, moral tribunal framing, and ontological claims about subjects or theorists.
  rival_reading_condition: Rival epistemological formalizations remain open unless explicit comparative criteria show that the PMS projection discriminates the case more adequately.
final_structural_formula:
  primary_formula: Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  primary_formula_status: primary_case_model
  compressed_reading: Maintain reflective distance while recontextualizing the JTB frame around the structured absence of knowledge-attribution despite justified true belief, with ∇, Α, Ω, and Θ included only as bounded dependency supports rather than as empirical, diagnostic, drift-pattern, legal, metaphysical, implementation, or person-ranking claims.
  final_validity_status: valid_with_limits
  final_claim_boundary: 'This formula states a PMS-internal structural projection of the case. It does not establish empirical truth, metaphysical truth, phenomenological completeness, diagnostic validity, legal or forensic validity, implementation validity, moral ranking, epistemological sufficiency, superiority over rival formalizations, or PMS Base validation.'