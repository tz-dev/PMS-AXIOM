pms_logic_overlay_application:
  schema_version: "PMS-LOGIC_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-LOGIC.yaml"
  paper_source_file: "PMS-LOGIC.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–LOGIC Application Profile"
    model_short: "PMS-LOGIC"
    status: "draft"
    last_updated: "2026-04-06"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–LOGIC"
      subtitle: "Pre-Moral Foundations, Logical Limits, and Post-Moral Effects"
      source_file: "PMS-LOGIC.md"
    description: >
      PMS-LOGIC is used here only as an application profile / overlay for the
      already completed PMS Core case "Hermeneutic circle." It adds visibility
      to pre-moral structural legibility, logical boundary management,
      non-closure, closure-drive, responsibility-readability limits, and
      LOGIC-specific drift risks without redefining PMS operators, dependencies,
      derived axes, guardrails, or PMS Base.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Hermeneutic circle"
    rule: >
      This LOGIC block is appended to or integrated into an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      LOGIC constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The LOGIC overlay may add boundary, non-closure, attribution,
      non-innocence, reduced-signature, and failure-mode visibility. It must not
      modify the already completed PMS Core case except where a direct
      PMS.yaml inconsistency has been separately identified.

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-LOGIC introduces no amplification overlays beyond reduced signatures,
      structural failure modes, and paper-specific non-operator constructs. It
      remains an overlay/application profile only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          A meta-position and stop-capability are maintained. The LOGIC overlay
          does not fuse the case into verdict, authority, enforcement,
          certainty, moral demand, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          The LOGIC reading remains case-type-bound, revisable, and
          configuration-specific. It does not generate global person labels,
          irreversible interpretive claims, or final philosophical settlement.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The LOGIC overlay does not shame, rank, humiliate, morally evaluate,
          or ontologically assess persons or groups. It remains restricted to
          structural boundary handling and non-capture discipline.
    gate_result: "valid_as_logic_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any LOGIC reduced signature is shorthand only. Reduced signatures do not
      replace PMS dependencies. In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or
      Ψ must remain dependency-respecting according to PMS.yaml.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  logic_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgments, no moral evaluation, no sanction logic."
      - "Focus on structures of praxis, not right or good morality."
      - "Audience: analysis of praxis and structure, not action guidance or decision rules."
    may_add_visibility_to:
      - "non-closure"
      - "closure-drive"
      - "logical boundary management"
      - "responsibility as attributability"
      - "non-innocence without guilt"
      - "effective capacity"
      - "moral readability as post-hoc interpretive field"
      - "failure-mode constraints"
      - "LOGIC drift risks"
      - "counter-readings"
    must_not_do:
      - "derive ought from being"
      - "introduce norms, values, duties, prescriptions, or moral rules"
      - "treat morality as a PMS operator"
      - "convert responsibility into blame"
      - "convert non-innocence into guilt"
      - "convert logical coherence into final authority"
      - "convert Σ into totalization"
      - "convert Ω into justificatory authority"
      - "convert Λ into defect, ignorance, nihilism, or metaphysical pointer"
      - "claim PMS Base validation"

  tripartition:
    pre_moral_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators_involved:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      claim: >
        This level identifies the structural conditions under which the case
        becomes praxeologically legible before evaluative, normative, moral, or
        responsibility-oriented interpretation appears.
      case_application: >
        The hermeneutic circle is structurally legible before any moral or
        normative layer is introduced. Δ marks the part-whole distinction; ∇
        marks the interpretive pressure generated by that distinction; □ marks
        horizon, context, and fore-structure; Λ marks the absent or delayed
        fully given whole; Α marks the recurrent part-whole movement that
        stabilizes as circularity or recursion. This does not yet say whether
        the recursion is good, bad, rationally valid, historically necessary, or
        philosophically sufficient.
      no_normativity_introduced: true
      notes:
        - "No norms, values, duties, prescriptions, sanctions, or moral commands are introduced."
        - "Patterns may stabilize without intention, moral assessment, authority, guilt, or obligation."
        - "The pre-moral level makes the case structurally readable without deciding its philosophical adequacy."

    logical_boundary_management:
      label: "Logical level of ordering and boundary management"
      applicability: "active"
      dominant_operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      dependency_note: >
        The listed operators are dominant boundary-management operators. Their
        PMS dependencies remain intact; especially Χ and Σ must not be treated
        as dependency-free shorthand. Reduced LOGIC signatures are overlay
        shorthand only and do not replace PMS Core dependency hygiene.
      claim: >
        Logic functions as an ordering and integration instrument. It may
        organize coherence within a frame, expose circular dependence, and help
        distinguish recursive interpretation from invalid circular proof. It
        does not thereby become final authority or deliver ultimate closure
        where Λ persists.
      case_application: >
        The case directly concerns closure pressure: understanding appears to
        require a whole that is not initially available, while the whole appears
        to require the parts it is supposed to illuminate. LOGIC therefore reads
        the case as a boundary-management problem, not as a demand for final
        closure. □ sets the scope of interpretation, Λ preserves the unresolved
        whole, Χ prevents forced closure or authority-smuggling, and Σ remains
        conditional rather than automatically achieved. The overlay’s added
        value is to make the stopping point legible: the analysis may remain
        structurally disciplined without pretending that the hermeneutic circle
        has been solved.
      aphorism: "Logic is the beginning of everything — not the end."
      boundary_result: >
        The logical boundary is reached where the relation between part and
        whole cannot be finally closed without presupposing what is being
        interpreted. Λ is carried as structured non-closure within □, while Χ
        blocks the conversion of coherence, recursion, PMS translation, or
        conditional Σ into final authority. This boundary is not failure,
        silence, nihilism, or metaphysical lack; it is the point at which logic
        remains honest by not overclaiming.

    post_moral_effects:
      label: "Post-moral level of effects"
      applicability: "weak"
      operators_involved:
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      claim: >
        Effects become morally readable once praxis unfolds under asymmetry and
        irreversible time, while responsibility is reconstructed as
        attributability rather than as an ought.
      case_application: >
        Post-moral effects are weak because the case is not a concrete praxis
        scene and supplies no agent, action, consequence, effective capacity, or
        role obligation. Θ is active as interpretive temporality, Ω is weak as
        structural dependence between part, whole, and horizon, Ψ is only
        analytic or conditional, and no responsibility, blame, duty, sanction,
        guilt, or moral verdict follows. The post-moral layer is therefore
        mostly protective: it prevents later readers from smuggling obligation,
        guilt, or blame into a case that only provides abstract interpretive
        recursion.
      core_formula: "Pre-moral in justification, logical in boundary management, post-moral in effect."
      no_ought_derived: true

  key_claims:
    C1_non_closure_as_strength:
      status: "active"
      claim: >
        Non-closure is treated as a structural strength rather than a mere
        deficiency. Persistent Λ prevents logical systems from compensating
        uncertainty with dogma, substitute narratives, premature integration, or
        metaphysical filling.
      case_application: >
        The hermeneutic circle is not treated as mere ignorance, defect, failure
        of reasoning, or proof that interpretation is impossible. Its unresolved
        part-whole relation can be carried as structured non-closure: the
        absence of a fully given whole constrains interpretation without
        licensing dogmatic replacement, metaphysical completion, nihilistic
        flattening, or premature Σ. The strength of LOGIC here is not that it
        closes the circle, but that it makes disciplined non-closure readable.

    C2_morality_as_readability_field:
      status: "weak"
      claim: >
        Morality is not reconstructed as an operator, but as a readability field
        under constellations involving Ω, Θ, Λ, and Ψ.
      case_application: >
        Moral readability is weak and mostly boundary-relevant here. The case
        does not itself become morally readable because no concrete
        consequence-attribution, effective capacity, role asymmetry, or
        self-bound responsibility is supplied. The overlay only prevents a later
        reading from converting weak Ω, Λ, or Ψ into moral evaluation, guilt,
        blame, duty, sanction, or person-ranking.

    C3_responsibility_as_attribution_not_prescription:
      status: "not_applicable"
      claim: >
        What everyday language may call obligation is reconstructed as
        attribution of consequences, not prescriptive demand.
      case_application: >
        The case does not involve an agent whose consequences can be attributed.
        No duty, command, blame, sanction, guilt, or prescription is derived.
        Any responsibility-language remains out of scope unless a concrete
        interpreter, role, action, effective capacity, temporal opportunity, and
        consequence pathway are added. Even then, LOGIC would reconstruct
        responsibility as attributability rather than as moral obligation.

    C4_apparent_norms_as_failure_mode_constraints:
      status: "weak"
      claim: >
        Apparent norms can be reconstructed as structural failure-mode
        constraints stabilized by self-binding, without external authority or
        prescriptive ought.
      case_application: >
        The only relevant apparent norm is methodological: do not force closure
        where Λ persists. LOGIC reconstructs this not as a moral command but as
        a failure-mode constraint against dogmatism, Σ-totalization,
        Λ-suppression, and authority-smuggling. The restraint is internal to the
        validity of the overlay application; it is not an ethical rule imposed
        on interpreters or rival theories.

    C5_logic_as_ordering_tool_not_authority:
      status: "active"
      claim: >
        Logic remains important for consistency, distinction, ordering, and
        integration, but becomes structurally unstable when it attempts final
        authority or closure beyond what the frame can deliver under persistent
        Λ.
      case_application: >
        The hermeneutic circle directly tests whether logical ordering can
        distinguish productive recursion from vicious circularity without
        claiming ultimate closure. LOGIC remains useful as boundary management
        when it clarifies frame, absence, recurrence, and closure pressure. It
        becomes unstable if it declares the circle solved merely because the PMS
        rendering is coherent, or if it treats Σ as a substitute for
        philosophical adequacy.

  responsibility_readability_chain:
    status: "weak"
    source: "PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain"
    chain_type: "readability_chain_not_dependency_definition"
    sequence:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    note: >
      This sequence is used as a LOGIC readability chain for responsibility,
      non-closure, and moral-readability analysis. It is not a new PMS
      dependency definition; PMS.yaml dependencies remain authoritative.
    case_application: >
      The full sequence is not active as responsibility-readability. The case
      strongly supports Δ, ∇, □, Λ, Α, Θ, Φ, and Χ; Ω remains weak, Σ remains
      conditional, and Ψ remains analytic or conditional. The chain therefore
      functions as a boundary-checking readability chain, not as a responsibility
      attribution.

  theses_and_definitions:
    intermediate_thesis:
      label: "Boundary point of logic"
      quote: "Logic does not end in silence, but in a structurally sustainable non-assertion."
      operator_reading: >
        Non-event Λ, stabilized by Α within □, may mark a disciplined stopping
        point for logic rather than failure or negation.
      case_application: >
        The disciplined stopping point is the refusal to decide, from the
        abstract material alone, whether the hermeneutic circle is vicious,
        productive, resolved, or exhaustively PMS-captured. This non-assertion
        is not silence but Χ-stabilized boundary discipline.

    central_thesis:
      quote: "From effective capacity follows structural responsibility, not obligation."
      operator_reading:
        responsibility_requires:
          - "effective capacity within □"
          - "irreversibility under Θ"
          - "distribution gradients under Ω"
          - "attributability continuity via Ψ"
      case_application: >
        Effective capacity is under-specified because no concrete interpreter,
        institutional role, action possibility, or consequence pathway is
        supplied. Responsibility-readability therefore does not follow. The
        thesis remains a LOGIC boundary reference only.

    conclusion_thesis:
      quote: >
        Logic does not fail as a tool; it becomes structurally unstable when it
        begins to function as authority.
      case_application: >
        The case shows logic remaining a tool when it clarifies boundary,
        recursion, and non-closure. It drifts toward authority if it claims that
        formal coherence, PMS translation, or Σ-like integration finally settles
        the hermeneutic problem.

  boundary_conditions:
    BC_EFFECTIVE_CAPACITY:
      label: "Absence of effective capacity"
      status: "under_specified"
      definition: >
        Responsibility presupposes effective, frame-bound capacity within □ and
        temporal availability under Θ. Where access, means, authority, or the
        relevant temporal window are structurally absent, no responsibility
        attribution arises even if outcomes later appear significant.
      calibration_note: >
        PMS-LOGIC specifies the structural form of attributable capacity, but
        not every concrete threshold of sufficiency in advance.
      case_application: >
        Effective capacity is not established. The philosophical case has frames
        and temporality, but no agent, access, means, authority, role, decision,
        or temporal window sufficient for responsibility attribution.

  non_operator_constructs:
    logic_paper_specific:
      status: "active"
      is_operator: false
      definition: >
        Logic is a procedural discipline of consistency, derivation, and
        closure-drive that meets a structural boundary at Λ under □.
      operator_touchpoints:
        - "Σ"
        - "Λ"
        - "□"
        - "∇"
        - "Χ"
      case_application: >
        Logic functions as ordering and boundary management: it can track
        part-whole dependence, distinguish recursion from vicious circularity,
        and prevent incoherent closure. It becomes risky only if closure-drive
        turns coherence into final authority.

    morality_readability_field:
      status: "weak"
      is_operator: false
      definition: >
        Morality is the readability of responsibility that emerges post hoc
        from irreversible praxis under structural conditions. No norms, values,
        or duties are introduced.
      minimal_operator_basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      case_application: >
        Moral readability does not substantially emerge because the case lacks a
        concrete action scene and responsibility pathway. The field is relevant
        only as a guardrail preventing the analysis from moralizing interpretive
        disagreement or non-closure.

    responsibility_vs_ought:
      status: "weak"
      is_operator: false
      responsibility: "Attribution of consequences."
      ought: "Prescriptive demand; explicitly out of scope."
      pms_logic_position: >
        PMS-LOGIC operates on responsibility-readability and attributability,
        not on ought-statements.
      case_application: >
        No consequence-attribution is established, and no prescription follows.
        If later applied to an interpreter or institution, responsibility would
        require effective capacity, temporal availability, asymmetry, and
        self-binding; it would still not become an ought.

    potential_effective_capacity:
      status: "under_specified"
      is_operator: false
      definition: >
        Effective capacity means capacity within a frame □ plus temporal
        availability Θ. It introduces exposure to consequences, not duty.
      reduced_basis:
        - "□"
        - "Θ"
      case_application: >
        The case contains □ and Θ in a structural sense, but not capacity in the
        sense required for attribution. No access, means, authority, role, or
        concrete temporal opportunity is supplied.

    non_innocence:
      status: "absent"
      is_operator: false
      definition: >
        Non-innocence is the structural condition in which consequences become
        attributable even without intent, command, guilt, or blame.
      basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "□"
        - "Ψ"
      case_application: >
        Non-action, omission, and attributable consequence are not present in
        the case material. Unresolved absence remains Λ as interpretive
        non-closure, not non-innocence.

    apparent_norms_as_constraints:
      status: "weak"
      is_operator: false
      definition: >
        Apparent norms are reconstructed as PMS-internal self-binding
        constraints that prevent structural failure modes under irreversible,
        asymmetric conditions. They are not commandments.
      basis:
        - "Χ"
        - "Σ"
        - "Ψ"
        - "Λ"
        - "□"
        - "Ω"
        - "Θ"
      case_application: >
        The relevant apparent norm is only methodological restraint: do not
        force closure, totalize Σ, or convert PMS coherence into final
        authority. LOGIC reads this as a structural failure-mode constraint, not
        as a commandment.

  reduced_signatures:
    PRE_MORAL_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: "Structural preconditions of praxis; no normativity introduced."
      case_application: >
        This signature fits the case strongly as shorthand: the part-whole
        distinction, interpretive pressure, horizon, absent whole, and recurring
        circular movement make the case legible before moral or normative
        interpretation.

    LOGIC_boundary_management:
      label: "Logical boundary management"
      applicability: "active"
      operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      reduced: true
      note: >
        Ordering and integration under non-closure; Χ prevents dogmatic
        Σ-totalization.
      dependency_hygiene: >
        This is reduced shorthand only. PMS dependencies remain authoritative.
      case_application: >
        This signature is the main LOGIC overlay fit. The case concerns how
        logical and interpretive ordering can carry non-closure within a frame
        without forcing total integration or final authority.

    POST_MORAL_effects:
      label: "Post-moral effects"
      applicability: "weak"
      operators:
        - "Ω"
        - "Θ"
        - "Ψ"
      reduced: true
      note: >
        Irreversible consequence attribution under asymmetry and time; no norms
        derived.
      case_application: >
        This signature is weak because Θ is active but Ω and Ψ are weak or
        conditional, and no concrete consequences are supplied. No post-moral
        responsibility attribution follows.

    MORAL_READABILITY_min:
      label: "Moral readability field"
      applicability: "weak"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Morality as interpretive field generated post hoc; not an operator.
      case_application: >
        The signature is weak and guardrail-only. The case does not become a
        moral field unless a concrete praxis scene with consequence-attribution
        is added.

    POTENTIAL_effective:
      label: "Effective potential / capacity"
      applicability: "under_specified"
      operators:
        - "□"
        - "Θ"
      reduced: true
      note: >
        Situated capacity plus temporal availability; generates exposure, not
        duty.
      case_application: >
        □ and Θ are present structurally, but effective capacity is not
        established. The abstract case does not identify an agent, means,
        authority, access, or action window.

    NON_CLOSURE_stability:
      label: "Sustainable non-closure"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: >
        Openness carried within frame; attractor stabilizes non-substitution.
      case_application: >
        This signature fits strongly. The hermeneutic circle stabilizes a
        structured openness: the part-whole difference remains framed, the fully
        given whole remains absent or delayed, and recurrence need not be filled
        with dogma or substitute closure.

    HUME_KNOT_reconstruction:
      label: "Hume knot reconstruction"
      applicability: "not_applicable"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Rewrites potential obligates into non-innocence and attributable
        consequence; preserves the is/ought boundary without crossing it.
      case_application: >
        This signature is not applicable because the case does not contain the
        "potential obligates" structure, effective capacity, non-innocence,
        consequence attribution, or responsibility pathway.

  failure_mode_constraints:
    note: >
      The following are frame-dependent PMS-internal self-binding constraints.
      They are not universal prescriptions. They name conditions for coherence
      and non-destructive praxis under non-closure.
    items:
      - id: "FMC1"
        label: "A boundary that cannot be carried becomes structurally unstable."
        applicability: "weak"
        operator_basis:
          - "Δ"
          - "Ψ"
        meaning: >
          Marking or occupying a boundary generates exposure. If the
          consequences cannot be sustained across time, the boundary becomes
          destructive rather than orienting.
        failure_mode: "Boundary inflation, authority overreach, collapse into dogma or abandonment."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "authority_capture_omega_inflation"
        case_application: >
          Weakly applicable. The case marks a conceptual boundary between part
          and whole, but does not supply self-binding or consequences. The
          constraint matters mainly as a warning against boundary inflation.

      - id: "FMC2"
        label: "Forced closure where Λ persists produces structural instability."
        applicability: "active"
        operator_basis:
          - "Λ"
          - "□"
          - "Χ"
        meaning: >
          Where a structure does not yield final explanation, forced closure
          introduces substitute narratives such as dogma, myth, metaphysical
          compensation, or false certainty.
        failure_mode: "Dogmatization, metaphysical compensation, false certainty."
        related_drifts:
          - "dogmatism_sigma_totalization"
        case_application: >
          Actively applicable. The hermeneutic circle should not be closed by
          declaring it merely vicious, merely productive, or already integrated
          without preserving Λ and Χ.

      - id: "FMC3"
        label: "Explanatory power converted into sense-making authority causes structural overreach."
        applicability: "active"
        operator_basis:
          - "∇"
          - "Σ"
          - "□"
          - "Χ"
        meaning: >
          Explanatory success does not confer authority over meaning.
          Integration is coordination, not domination; Χ prevents closure-drive
          from laundering authority through explanation.
        failure_mode: "Epistemic domination, technocratic moralism, authority laundering through explanation."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "technocratic_reduction_frame_overconstraint"
        case_application: >
          Actively applicable as a guardrail. PMS-LOGIC may explain why the
          hermeneutic circle can be structurally productive, but explanatory
          elegance must not become authority over all rival hermeneutic,
          logical, phenomenological, or deconstructive readings.

      - id: "FMC4"
        label: "Where proximity generates power, viable praxis requires maintained distance."
        applicability: "not_applicable"
        operator_basis:
          - "Χ"
          - "Ω"
        meaning: >
          Closeness increases influence; where influence increases,
          unregulated proximity becomes power. Χ is a condition for dignified
          handling of power.
        failure_mode: "Manipulation, coercive intimacy, moral overreach."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "moralism_pseudo_ought_injection"
        case_application: >
          Not applicable as stated. The case contains no interpersonal proximity
          or power relation. Χ remains active as reflective distance, but not as
          regulation of proximity-generated power.

      - id: "FMC5"
        label: "Stable self-binding takes the form of restraint rather than assertion."
        applicability: "active"
        operator_basis:
          - "Ψ"
          - "Χ"
          - "Λ"
        meaning: >
          Assertions seek closure and authority; restraint preserves openness.
          Self-binding to restraint stabilizes praxis without commanding
          others.
        failure_mode: "Authoritarian certainty, moral exhibitionism, escalation dynamics."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "moralism_pseudo_ought_injection"
        case_application: >
          Actively applicable to the overlay itself. The analysis is self-bound
          to restraint: it preserves non-closure, denies final settlement, and
          does not command rival readings to integrate into PMS.

  drift_catalogue:
    note: >
      LOGIC drift classes describe structural operator distortions. They are not
      personal traits, diagnoses, moral verdicts, or enforcement categories.
    dogmatism_sigma_totalization:
      label: "Dogmatism / Σ-totalization"
      applicability: "risk"
      distorted_operators:
        - "Σ"
      mechanism: >
        Integration is forced into total closure, treating coherence as final
        truth rather than provisional coordination. Λ is denied instead of
        carried.
      symptoms:
        - "claims_of_ultimate_explanation"
        - "immunization_against_revision"
        - "replacement_of_structural_coherence_with_certainty"
      result: >
        Brittle structure under novelty; non-closure treated as error rather
        than constraint.
      case_application: >
        This is the main LOGIC drift risk. The PMS rendering is coherent enough
        that it could falsely appear to solve the hermeneutic circle. The
        overlay constrains this by keeping Σ conditional and Λ active.

    authority_capture_omega_inflation:
      label: "Authority capture / Ω-inflation"
      applicability: "risk"
      distorted_operators:
        - "Ω"
      mechanism: >
        Asymmetry is converted from descriptive condition into justificatory
        principle. Power gradients are mistaken for epistemic or moral
        authority.
      symptoms:
        - "because_I_can_becomes_because_I_am_right"
        - "suppression_of_Χ"
        - "obscured_responsibility_pathways"
      result: >
        Domination may become masked as necessity; responsibility flows upward
        and becomes opaque.
      case_application: >
        This is a risk only by over-reading. The case supports weak structural
        dependence between part, whole, and horizon, but not authority, power,
        or moral priority. The overlay keeps Ω weak.

    moralism_pseudo_ought_injection:
      label: "Moralism / pseudo-ought injection"
      applicability: "risk"
      distorted_operators:
        - "Ψ"
        - "Χ"
      mechanism: >
        Responsibility is retranslated into obligation. Self-binding is replaced
        by compliance-seeking enforcement. Non-innocence is moralized into
        blame.
      symptoms:
        - "should_or_must_reintroduced_as_if_structurally_authorized"
        - "attribution_becomes_accusation"
        - "praxis_judged_instead_of_reconstructed"
      result: >
        Covert normativity is reintroduced; responsibility collapses into
        enforcement.
      case_application: >
        This is a guardrail risk, not an active case structure. The overlay must
        not turn methodological restraint or non-closure into a moral command.

    nihilism_lambda_suppression:
      label: "Nihilism / Λ-suppression"
      applicability: "risk"
      distorted_operators:
        - "Λ"
      mechanism: >
        Non-events, omissions, or restraints are treated as irrelevant. The
        structural significance of omission within frames under time is erased.
      symptoms:
        - "nothing_happened_so_nothing_matters"
        - "denial_of_omission_effects"
        - "flattening_of_temporal_consequence"
      result: >
        False innocence; responsibility dissolves through denial of structural
        impact.
      case_application: >
        The relevant risk is narrower than responsibility-denial: Λ could be
        flattened into mere ignorance, defect, silence, or nihilistic absence.
        LOGIC instead treats Λ as structured non-closure within a frame.

    technocratic_reduction_frame_overconstraint:
      label: "Technocratic reduction / □-overconstraint"
      applicability: "risk"
      distorted_operators:
        - "□"
      mechanism: >
        Frames are treated as exhaustive representations of reality. What is
        unmodeled is dismissed or misrecognized as Λ.
      symptoms:
        - "overconfidence_in_models_or_metrics"
        - "ignoring_unmodeled_effects"
        - "frame_lock_in"
      result: >
        Blind spots are mistaken for non-existence; systemic fragility
        increases.
      case_application: >
        The LOGIC overlay itself could become overconstrained if it treats PMS
        vocabulary as exhaustive. Non-capture and rival readings remain the
        constraint against this drift.

  logic_derived_axes_projection:
    note: >
      This projection is a PMS-LOGIC paper-internal structural localization. It
      is not a measurement of objective quality and not a person evaluation.
    Awareness_A:
      structural_level: "high"
      operator_basis:
        - "Δ"
        - "□"
        - "Θ"
      effect_notes:
        - "Sensitivity to limits and conditions of praxis."
        - "Perception of where explanation reaches a stopping point and responsibility becomes structurally relevant."
      case_application: >
        LOGIC raises structural awareness of the boundary between part and
        whole, of frame-bounded interpretation, and of the temporal return by
        which understanding remains revisable.

    Coherence_C:
      structural_level: "high"
      operator_basis:
        - "∇"
        - "□"
        - "Λ"
        - "Θ"
      effect_notes:
        - "Coherence maintained despite non-closure."
        - "Stability from integration of absence, not closure."
      case_application: >
        LOGIC clarifies that coherence can be maintained by carrying Λ rather
        than erasing it. Coherence is therefore not final closure, but disciplined
        stability under unresolved part-whole dependence.

    Responsibility_R:
      structural_level: "low"
      operator_basis:
        - "Ω"
        - "Θ"
        - "Φ"
        - "Ψ"
      effect_notes:
        - "Responsibility without moral demand."
        - "Accountability without sanction."
        - "Exposure accepted rather than displaced."
        - "Responsibility is structurally attributable rather than obligatory."
      boundary_condition_ref: "BC_EFFECTIVE_CAPACITY"
      case_application: >
        Responsibility_R remains low because the case does not provide effective
        capacity, consequence-attribution, or self-binding by an agent. LOGIC
        mainly prevents responsibility-language from becoming obligation or
        blame.

    Action_E:
      structural_level: "weak"
      operator_basis:
        - "∇"
        - "Θ"
        - "Σ"
        - "Χ"
      effect_notes:
        - "Action slowed or filtered."
        - "Preference for restraint over intervention."
        - "Avoidance of irreversible overreach under asymmetry amplification."
      case_application: >
        Action_E is weak because the case is conceptual rather than a concrete
        praxis scene. LOGIC contributes restraint: it filters the impulse toward
        final closure and keeps integration conditional.

    Dignity_in_Practice_D:
      structural_level: "stabilizing"
      operator_basis:
        - "Ω"
        - "Χ"
        - "Ψ"
      effect_notes:
        - "Protection of vulnerable positions without paternalism."
        - "Power exercised without domination."
        - "Self-binding as stable continuity without norm derivation."
      case_application: >
        D stabilizes the overlay as an application constraint. It prevents the
        analysis from ranking interpreters, traditions, or rival formalisms, and
        prevents weak Ω from being moralized or tribunalized.

  counter_readings:
    note: >
      Counter-readings are interpretive risks. PMS-LOGIC responds through
      structural clarification rather than polemic.
    items:
      - id: "D1"
        reading: "This is just ethics in disguise."
        relevance: "weak"
        pms_response: >
          No PMS operator generates values, norms, or prescriptions. What
          appears ethical is the interpretability of responsibility under Ω, Θ,
          Λ, and Ψ.
        case_application: >
          This reading is weak because the case is not primarily ethical.
          LOGIC avoids it by keeping morality_readability_field weak and by
          deriving no ought, duty, blame, or sanction.

      - id: "D2"
        reading: "This collapses into relativism."
        relevance: "active"
        pms_response: >
          Frames are explicit scope constraints, and reversibility is required.
          Structural attribution under Ω, Θ, and Λ is not arbitrary preference.
        case_application: >
          This counter-reading is active because hermeneutic circularity can be
          mistaken for arbitrary interpretation. LOGIC responds by treating
          frames as scope constraints and Λ as structured non-closure, while
          still preserving rival formalizations.

      - id: "D3"
        reading: "This is nihilism with extra steps."
        relevance: "weak"
        pms_response: >
          Λ is not meaninglessness but structured absence. Omission and
          non-action remain relevant under Θ and Ω.
        case_application: >
          This reading is weak. The case involves unresolved whole-understanding,
          but LOGIC reads that unresolvedness as structured absence within a
          frame, not meaninglessness.

      - id: "D4"
        reading: "This is a hidden theological argument."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC carries non-closure within □ without metaphysical filling.
          No external ground, lawgiver, or ultimate justification is introduced.
        case_application: >
          This reading is weak but relevant as a guardrail. The overlay does not
          fill the absent whole with an external ground, final meaning, lawgiver,
          or metaphysical completion.

      - id: "D5"
        reading: "This makes responsibility unfair."
        relevance: "not_applicable"
        pms_response: >
          PMS does not claim fairness. It models attribution, not moral desert.
          Responsibility is structural, not a reward or punishment scheme.
          Absence of effective capacity implies no responsibility.
        case_application: >
          Not applicable because responsibility is not attributed in this case.
          Effective capacity is under-specified and no consequence pathway is
          supplied.

      - id: "D6"
        reading: "This cannot guide action."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC does not instruct; it orients by constraining overreach.
          Guidance is replaced by orientation through Χ, Σ, and Ψ.
        case_application: >
          Weakly relevant because the case is conceptual. LOGIC does not guide
          action, but orients the analysis by constraining closure overreach and
          preserving Χ.

      - id: "D7"
        reading: "This wins by translation, not necessarily by final superiority."
        relevance: "active"
        pms_response: >
          Translation success is not final settlement. The relevant test is
          whether the grammar preserves differentiating force under pressure.
        case_application: >
          Actively relevant. PMS-LOGIC may translate the hermeneutic circle
          elegantly, but this does not prove final superiority over logical,
          phenomenological, coherentist, contextualist, systems, or
          deconstructive readings.

      - id: "D8"
        reading: "Relation to adjacent frameworks."
        relevance: "active"
        pms_response: >
          PMS-LOGIC is not virtue ethics, pragmatism, or systems ethics. It
          reconstructs responsibility structurally under asymmetry,
          temporality, and non-closure without ethical evaluation or normative
          optimization.
        case_application: >
          Adjacent frameworks remain open for comparison. In this case,
          especially formal logic, phenomenological hermeneutics,
          epistemological coherentism, contextualism, systems recursion, and
          deconstructive non-closure remain live rivals.

  example_suite_schema_alignment:
    status: "reference_only_not_used_as_case_output"
    source: "PMS-LOGIC.yaml:example_suite_schema"
    required_blocks_reference:
      - "Minimal vignette (scene-bound)"
      - "Why this is repo-useful (structural focus)"
      - "Operator mapping (reduced signature)"
      - "Tripartition tag (pre-moral / logical / post-moral)"
      - "Typical drift markers"
      - "Failure-mode constraint reference"
      - "Validity gate reminder (Χ + reversibility + D)"
      - "Readable structural closure"
    axiom_case_policy: >
      AXIOM cases do not generate a separate PMS-LOGIC example suite. The
      schema is retained as a reference for scene-bound, non-instructional
      rendering discipline only.

  glossary_alignment:
    Attributability:
      definition: "Structural assignability of consequences to an agent or trajectory."
      case_relevance: "not_applicable"
    Closure_Non_Closure_Lambda:
      definition: "Closure refers to final explanation or justification; Λ marks the structural impossibility of such finality."
      case_relevance: "active"
    Logic_paper_specific:
      definition: "Discipline of consistency and derivation operating within frames; tool, not final authority."
      case_relevance: "active"
    Moral_Morality:
      definition: "Interpretability of praxis once responsibility is structurally attributable under Ω, Θ, and Λ."
      case_relevance: "weak"
    Norm_Ought:
      definition: "A prescriptive demand; no PMS operator generates norms or ought-statements."
      case_relevance: "active"
    Non_Innocence:
      definition: "Consequences are attributable even without intent or command; distinct from guilt or blame."
      case_relevance: "absent"
    Potential_Capacity:
      definition: "Effective ability to influence outcomes within □ and over Θ; exposure to consequences, not obligation."
      case_relevance: "under_specified"
    Responsibility:
      definition: "Attribution of consequences to a self-bound trajectory under Ω and Θ; not equivalent to duty."
      case_relevance: "weak"
    Self_Binding_Psi:
      definition: "Commitment to integrated structures over time; accountability without external authority or moral command."
      case_relevance: "weak"
    Structural_Failure_Mode:
      definition: "Operator distortion leading to structural instability; not clinical or moral label."
      case_relevance: "risk"

  logic_overlay_quality_control:
    status: "passed"
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      no_ought_derived: true
      no_norms_or_prescriptions_introduced: true
      morality_not_treated_as_operator: true
      responsibility_distinguished_from_ought: true
      non_closure_preserved_as_lambda_boundary: true
      effective_capacity_boundary_checked: true
      non_innocence_not_confused_with_guilt: true
      failure_modes_not_person_labels: true
      counter_readings_preserved: true
      non_capture_preserved: true
      overlay_metadata_present: true
      no_nested_overlay_policy_present: true
      responsibility_readability_chain_present: true
      effective_capacity_boundary_present: true
      example_suite_schema_alignment_present: true
    issues_found:
      - "none"
    correction_required: false
    final_overlay_judgment: >
      The LOGIC overlay is valid, bounded, and correctly subordinated to the
      completed PMS Core case; it adds non-closure and boundary-management
      visibility without rewriting PMS Core, deriving ought, or claiming final
      closure.

  logic_overlay_synthesis:
    primary_logic_reading: >
      PMS-LOGIC makes explicit that the hermeneutic circle is not only a
      part-whole recursive structure but also a logical boundary-management
      case: it tests how reasoning can preserve consistency, revision, and
      non-closure without turning coherence into authority.
    non_closure_result: >
      Λ functions as logical boundary rather than defect, ignorance, nihilism,
      or metaphysical pointer. The absent fully given whole remains structurally
      meaningful and must be carried rather than replaced.
    responsibility_attribution_result: >
      Responsibility is not attributable at case level. Effective capacity is
      under-specified, Ω and Ψ are weak or conditional, and no concrete action,
      consequence, or agent trajectory is supplied.
    boundary_management_result: >
      □, Λ, Χ, and conditional Σ manage closure pressure by framing the
      part-whole relation, preserving structured absence, maintaining reflective
      distance, and preventing totalizing integration.
    moral_readability_result: >
      The case is only weakly morally readable as a post-hoc interpretive field.
      No norm, ought, duty, blame, guilt, prescription, or sanction is derived.
    drift_result: >
      The main LOGIC drift risks are Σ-totalization, frame overconstraint,
      Λ-suppression, and weak Ω-inflation. They are constrained by Χ,
      non-capture, rival readings, and explicit treatment of reduced signatures
      as overlay shorthand only.
    final_logic_formula_or_signature: >
      LOGIC_boundary_management + NON_CLOSURE_stability, with
      PRE_MORAL_justification active, POST_MORAL_effects weak,
      MORAL_READABILITY_min weak, POTENTIAL_effective under-specified, and
      HUME_KNOT_reconstruction not applicable.
    final_claim_boundary: >
      This LOGIC overlay adds boundary-management, non-closure, attributability,
      and drift-risk visibility. It does not revise PMS Base, rewrite the PMS
      Core pass, derive an ought, prescribe action, evaluate persons, assign
      guilt, validate PMS, or claim final philosophical closure.