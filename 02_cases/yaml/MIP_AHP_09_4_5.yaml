mip_ahp_overlay_analysis:
  schema_version: "MIP_AHP_module_v2.0"
  file_name: "repair_relationships__mip_ahp_overlay_analysis.yaml"
  schema_role: "AHP_second_order_quality_overlay_over_completed_MIP_case_analysis"
  output_language: "en"
  reflection_mode: "off"
  analysis_mode: "full_depth"
  analysis_target: "last_assistant_output__mip_case_analysis"
  integration_mode: "standalone_overlay_artifact_with_mergeable_case_patch_paths"
  target_merge_paths:
    primary_storage_path: "case.addons.ah_precision"
    primary_report_path: "case.uniform_report.addon_overlays.ah_precision"
    legacy_report_path: "case.uniform_report.legacy_flat_uniform_report_fields"
  reference_scope_note: >-
    The AHP module reference sections are treated as governing reference
    material. The output reproduces the operative overlay fields needed for
    second-order analysis quality, storage, report rendering, boundaries, and
    validation, but it does not duplicate the full AHP model-reference file.
  base_analysis_reference:
    target_schema_version: "MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned"
    target_case_id: "repair_relationships__mip_over_pms_core_eden__v1"
    target_case_title: "Repair Relationships — MIP Analysis over PMS Core and PMS-EDEN Layers"
    target_status: "working_note_only"
    target_object: "completed MIP analysis over completed PMS Core and PMS-EDEN case layers"
    base_results_preserved: true
    base_results_not_reopened: true

  addon_meta:
    canonical_name: "MIP - A&H Precision Module"
    short_name: "AHP Module"
    module_id: "MIP-AHP"
    version: "v2.0"
    status: "stable_working_overlay"
    model_status: "optional_second_order_overlay"
    last_update: "2026-05-23"
    language: "en"
    compatible_with:
      - "MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned"
      - "MIP - Maturity in Practice.yaml"
    legacy_compatibility:
      previous_schema_versions:
        - "MIPractice_addon_AH_precision_v1.2"
        - "MIPractice_case_v2.0_full_with_model_reference"
      note: >-
        Legacy references are retained for migration only. The canonical target
        is now "MIP - Maturity in Practice.yaml".
    loading_mode: "optional_companion"
    required_position:
      order: "after_base_MIP_analysis_fields_exist"
      requires_existing_mip_analysis: true
      requires_structured_case_fields: true
    non_interference:
      does_not_modify_axioms: true
      does_not_modify_guardrails: true
      does_not_modify_A_score: true
      does_not_modify_M_score: true
      does_not_modify_IA_box_result: true
      does_not_modify_D_profile: true
      does_not_activate_D_module: true
      does_not_assign_D_quick_grid_level: true
      does_not_change_transmission_status: true
      adds_overlay_only: true
    overlay_boundary: >-
      AHP may lower or raise confidence in the quality of the completed MIP
      analysis artifact, but it may not change the base A/M/IA/D results. Any
      base revision must occur in a new MIP analysis run, not inside this module.
    clarification_note: >-
      This overlay provides an analysis-quality audit including Precision
      Heuristic, Attack Points, and Hardening Backlog. It introduces no new
      first-order inference layer and does not alter base model logic.

  AHP_module:
    id: "AHP-OUT-2"
    label: "A&H Precision Module — output, storage, heuristic"
    purpose: >-
      Provide consistent, auto-renderable overlays for Precision Heuristic,
      Attack Points as analysis attack-surface, and Hardening Backlog as
      next-iteration actions. These overlays derive strictly from the completed
      MIP case fields and introduce no new base inferences or score changes to
      A-score, M-score, IA-box, or D-profile.
    PH_boundary: >-
      PH is a precision heuristic for the analysis artifact. It is not an
      A-score, not an M-score, not a D-score, and not an IA verdict.
    attack_surface_boundary: >-
      Attack Points identify vulnerabilities in the completed analysis artifact:
      wording, scope, inference, evidence linkage, reversibility, publicness,
      transmission risk, or dignity language. They never identify
      vulnerabilities, defects, maturity deficits, or dignity deficits in
      persons.
    hardening_boundary: >-
      Hardening actions improve the next analysis iteration. They do not repair
      the case, change persons, create evidence, decide responsibility, or make
      the previous working note transmittable.
    rendering_controls:
      max_attack_points_in_text: 7
      max_hardening_actions_in_text: 7
      show_link_to_target_path: true
      show_severity: true
      show_expected_effect: true
      bullet_style: "-"
      ordering:
        attack_points:
          - "high"
          - "medium"
          - "low"
        hardening_actions:
          - "high"
          - "medium"
          - "low"
      recursion_guard:
        do_not_render_notes_on_annotations: true
        bounded_recursion: true
        rule: "No annotations on annotations; address or consciously accept attack points as limits."
      inline_comment_limits:
        max_inline_comments: 3
        inline_comment_boundary: >-
          Inline AH notes may mark analysis-language risks only. They must not
          add person-level interpretations or D-readings.
        if_D_context_active:
          avoid_public_inline_D_comments_about_identifiable_persons: true
    severity_lexicon:
      low: "low (minor noise / easy patch)"
      medium: "medium (relevant uncertainty / visible leverage)"
      high: "high (structural vulnerability / likely misread)"
      severity_meaning: >-
        Severity describes the magnitude of interpretive or communicative risk
        inside the analysis. It is not moral fault and not harm severity in the
        case itself.
    language_guardrail:
      no_moralised_attack_language: true
      no_person_defect_language: true
      no_dignity_labelling: true
      no_severity_escalation_beyond_lexicon: true
      attack_points_describe: "analysis_artifact"
      attack_points_do_not_describe: "persons"

  derivation_context:
    completed_MIP_analysis_summary:
      source_status: "structured_case_fields_exist"
      required_MIP_fields_present: true
      working_note_status_present: true
      D_language_present: true
      score_hygiene_present: true
      IA_box_present: true
      transmission_status_present: true
      open_questions_present: true
      counter_perspective_present: true
      trajectory_present: true
      uniform_report_present: true
    activation_reason:
      user_requested_AHP_application: true
      model_used_iteratively_next_run_planned: true
      D_language_present: true
      score_hygiene_risk_present: true
      transmission_status_non_public_working_note: true
      contested_model_terms_present:
        - "maturity"
        - "dignity"
        - "responsibility"
        - "Adult Reciprocity"
        - "false coordination"
        - "repair"
        - "trust"
      boundary_setting_claims_present: true
      public_or_semi_public_risk: "potential_only_if_transmitted"
    derivation_rule_applied: >-
      All AHP fields below are derived from the completed MIP output itself and
      from its documented source alignment to PMS Core and PMS-EDEN. No new
      scene evidence, no hidden assumptions, no person-level findings, and no
      first-order conclusions are introduced.

  case:
    addons:
      ah_precision:
        enabled: true
        mode: "on"
        requires_completed_mip_analysis: true
        requires_structured_case_fields: true

        PH_points_0_to_6: 6
        PH_band: "high"
        PH_boundary_confirmed: true
        PH_checklist:
          PD-1_term_definition:
            satisfied: true
            point_awarded: 1
            assessment: >-
              Key working terms are sufficiently defined or bounded through the
              completed MIP analysis: A-awareness, C-coherence, R-responsibility,
              P-power-to-act, D as protection signal, IA-box, working-note
              status, non-public transmission, M-score non-assignment, and
              person/enactment separation. EDEN and PMS terms are not redefined
              but are crosswalked as source-layer terms.
            evidence_paths:
              - "mip_case_analysis.mip_application_boundary"
              - "mip_case_analysis.crosswalk_to_prior_layers"
              - "mip_case_analysis.case.scores_and_ia"
              - "mip_case_analysis.case.D_module_optional"
            residual_risk: >-
              Some terms remain model-dense and may require plain-language
              glossing if transmitted outside expert or internal model-review
              contexts.
          PD-2_scope_boundaries:
            satisfied: true
            point_awarded: 1
            assessment: >-
              Role, context, level, and publicness are repeatedly stated. The
              completed analysis clearly says that the object is a layered
              conceptual case-analysis artifact, not a person or concrete
              relationship, and that transmission is limited to working-note use.
            evidence_paths:
              - "mip_case_analysis.mip_application_boundary"
              - "mip_case_analysis.case.role_mapping"
              - "mip_case_analysis.case.transmission_check"
              - "mip_case_analysis.case.uniform_report"
            residual_risk: >-
              YAML density and formal structure may still make the artifact feel
              more complete or more externally usable than the scope boundaries
              permit.
          PD-3_conditions_and_thresholds:
            satisfied: true
            point_awarded: 1
            assessment: >-
              If/then conditions, IA thresholds, future scene-packet
              requirements, D activation limits, M ceiling relevance, red-zone
              exclusions, and review triggers are stated with sufficient
              precision for a conceptual working note.
            evidence_paths:
              - "mip_case_analysis.case.guardrails"
              - "mip_case_analysis.case.scores_and_ia.IA_box"
              - "mip_case_analysis.case.ia_protection"
              - "mip_case_analysis.case.transmission_check"
              - "mip_case_analysis.final_status"
            residual_risk: >-
              Thresholds are adequate for non-application, but not yet
              operational enough for concrete future scene scoring without a new
              calibration pass.
          PD-4_evidence_linking:
            satisfied: true
            point_awarded: 1
            assessment: >-
              The completed analysis separates source material, inference,
              assumptions, blind spots, and missing information. It does not
              claim empirical evidence where none is present.
            evidence_paths:
              - "mip_case_analysis.case.information_basis"
              - "mip_case_analysis.case.open_questions_and_blind_spots"
              - "mip_case_analysis.case.meta_notes"
              - "mip_case_analysis.case.uniform_report"
            residual_risk: >-
              Because the source material is itself generated model analysis,
              there remains a second-order evidence risk: internally coherent
              prior layers may be mistaken for empirical grounding.
          PD-5_reversibility_clause:
            satisfied: true
            point_awarded: 1
            assessment: >-
              The completed analysis includes working-note status, review
              requirements, falsifiers, revision conditions, and reversibility
              measures. It explicitly says the reading must be narrowed,
              suspended, or rewritten if concrete scene data defeats it.
            evidence_paths:
              - "mip_case_analysis.case.IA_box.R_reversible"
              - "mip_case_analysis.case.ia_protection.reversibility_measures"
              - "mip_case_analysis.case.transmission_check.review_required"
              - "mip_case_analysis.final_status"
            residual_risk: >-
              Reversibility is strong in wording but remains vulnerable if the
              YAML artifact is detached from its transmission limits.
          PD-6_language_hygiene:
            satisfied: true
            point_awarded: 1
            assessment: >-
              The completed analysis avoids global person labels, dignity
              labels, diagnosis, shame language, sex-truth claims, person-level
              responsibility assignment, and coercive repair language. D₀ is
              protected, and D₁/D₂ are kept qualitative and non-scoring.
            evidence_paths:
              - "mip_case_analysis.case.guardrails"
              - "mip_case_analysis.case.optional_D_observation"
              - "mip_case_analysis.case.D_module_optional"
              - "mip_case_analysis.case.transmission_check.not_allowed_use"
            residual_risk: >-
              D-language remains intrinsically sensitive and should be rendered
              cautiously, especially if any future output becomes public or
              person-facing.

        PH_overlay_effect:
          confidence_shift_for_A_reading: "up"
          confidence_shift_for_C_reading: "up"
          IA_box_decidability: "more_decidable"
          D_R_D_P_misreading_risk: "down"
          explanation: >-
            Because all six PH dimensions are satisfied, confidence in the
            analysis-artifact reading of A and C increases. IA-box decidability
            improves because transparency, justification, time-boundedness, and
            reversibility are explicit. D-R/D-P misreading risk decreases because
            scope boundaries and language hygiene are strong. This does not
            rescore A, M, IA, or D.

        attack_surface_annotations:
          - attack_point_id: "AP-001"
            severity: "high"
            severity_label: "high (structural vulnerability / likely misread)"
            title: "Formal coherence may be mistaken for empirical grounding"
            target_path: "mip_case_analysis.case.information_basis"
            note_type: "evidence_gap"
            message: >-
              The completed MIP analysis is highly coherent across PMS Core,
              PMS-EDEN, and MIP, but all substantive material remains generated
              conceptual analysis rather than a concrete scene packet. The
              artifact is vulnerable to being over-read as evidence-backed
              because its structure is complete and technically disciplined.
            suggested_action: >-
              Add an explicit line before any future use: "The source material is
              structured prior analysis, not independent scene evidence."
            source_fields:
              - "mip_case_analysis.source_alignment"
              - "mip_case_analysis.case.information_basis.primary_material"
              - "mip_case_analysis.case.information_basis.known_gaps"
              - "mip_case_analysis.case.uniform_report.overview_4_to_7_sentences"
            person_level_finding: false

          - attack_point_id: "AP-002"
            severity: "high"
            severity_label: "high (structural vulnerability / likely misread)"
            title: "A-band can be misread as a score for the case or persons"
            target_path: "mip_case_analysis.case.scores_and_ia.A_score"
            note_type: "score_hygiene_risk"
            message: >-
              The completed analysis clearly states that the provisional A-band
              refers to the analysis posture, not a person or concrete scene.
              Still, the numeric-looking phrase "6-7" is a likely extraction
              risk if quoted without the boundary.
            suggested_action: >-
              In any future summary, render the A-band as
              "analysis-posture PH-adjacent confidence band, not person/case
              score" or keep the caveat on the same line.
            source_fields:
              - "mip_case_analysis.case.scores_and_ia.A_score.A_band"
              - "mip_case_analysis.case.uniform_report.A_summary"
              - "mip_case_analysis.case.transmission_check.not_allowed_use"
            person_level_finding: false

          - attack_point_id: "AP-003"
            severity: "high"
            severity_label: "high (structural vulnerability / likely misread)"
            title: "D-module wording may be mistaken for a D-profile finding"
            target_path: "mip_case_analysis.case.D_module_optional"
            note_type: "D_profile_boundary_risk"
            message: >-
              The completed analysis activates the D-module as a protection
              signal only and does not assign a D-profile or D-Quick-Grid level.
              Because the section still contains D-profile-shaped fields, a
              careless reader could misread the structure as a dignity assessment.
            suggested_action: >-
              Add a local boundary note inside the D-module section: "Fields are
              stored for guardrail completeness; no D-profile finding is made."
            source_fields:
              - "mip_case_analysis.case.optional_D_observation"
              - "mip_case_analysis.case.D_module_optional"
              - "mip_case_analysis.case.uniform_report.D_summary_if_activated"
            person_level_finding: false

          - attack_point_id: "AP-004"
            severity: "medium"
            severity_label: "medium (relevant uncertainty / visible leverage)"
            title: "IA-box result could be misread as application clearance"
            target_path: "mip_case_analysis.case.scores_and_ia.IA_box.result"
            note_type: "transmission_status_ambiguity"
            message: >-
              The completed analysis says the methodological asymmetry is
              functional for an internal working note and becomes IA-risk if
              transmitted. The phrase "functional asymmetry" may still be read
              too positively if separated from the internal-only condition.
            suggested_action: >-
              Keep "internal working note only" in the same scalar phrase as
              every IA-box result.
            source_fields:
              - "mip_case_analysis.case.scores_and_ia.IA_box.result"
              - "mip_case_analysis.case.uniform_report.IA_box_summary"
              - "mip_case_analysis.case.transmission_check.status"
            person_level_finding: false

          - attack_point_id: "AP-005"
            severity: "medium"
            severity_label: "medium (relevant uncertainty / visible leverage)"
            title: "Full-depth form may imply exhaustiveness"
            target_path: "mip_case_analysis.analysis_mode"
            note_type: "scope_leakage"
            message: >-
              The completed analysis is full-depth relative to the available
              template and supplied model layers, not full-depth relative to a
              real-world trust-repair scene. The phrase "full" could be
              misread as exhaustive capture.
            suggested_action: >-
              Qualify future references as "full-depth within supplied
              conceptual materials; not exhaustive of any concrete scene."
            source_fields:
              - "mip_case_analysis.analysis_mode"
              - "mip_case_analysis.case.information_basis.quality_and_limits"
              - "mip_case_analysis.case.open_questions_and_blind_spots"
            person_level_finding: false

          - attack_point_id: "AP-006"
            severity: "medium"
            severity_label: "medium (relevant uncertainty / visible leverage)"
            title: "Counter-perspective is structurally present but not voice-grounded"
            target_path: "mip_case_analysis.case.meta_notes.counter_perspective"
            note_type: "counter_reading_missing"
            message: >-
              The completed analysis includes counter-perspectives, but they are
              analyst-generated placeholders rather than actual affected-role
              contestation. This is acceptable for the current artifact but
              remains a vulnerability for any future application.
            suggested_action: >-
              Mark future counter-perspective fields as "constructed
              counter-perspective until affected-role voice is available."
            source_fields:
              - "mip_case_analysis.case.meta_notes.counter_perspective"
              - "mip_case_analysis.case.open_questions_and_blind_spots.needed_perspectives"
              - "mip_case_analysis.case.ia_protection.participation_or_voice_measures"
            person_level_finding: false

          - attack_point_id: "AP-007"
            severity: "low"
            severity_label: "low (minor noise / easy patch)"
            title: "Plain-language portability is underdeveloped"
            target_path: "mip_case_analysis.case.uniform_report"
            note_type: "term_ambiguity"
            message: >-
              The completed uniform report is clear for model-literate use, but
              it remains dense. If reused beyond the modeling context, terms
              such as IA-box, D₀, D₁/D₂, EDEN, PMS Core, A-band, and M-band need
              short plain-language glosses.
            suggested_action: >-
              Add a short glossary if the analysis is ever shared outside the
              internal model-development context.
            source_fields:
              - "mip_case_analysis.case.uniform_report"
              - "mip_case_analysis.crosswalk_to_prior_layers"
              - "mip_case_analysis.case.acrpd_submodules_profile"
            person_level_finding: false

        hardening_actions:
          - hardening_action_id: "HB-001"
            severity: "high"
            severity_label: "high (structural vulnerability / likely misread)"
            action_type: "separate_observation_vs_evaluation"
            instruction: >-
              Add a source-status line to the next iteration distinguishing
              "structured prior analysis" from "independent concrete scene
              evidence."
            linked_attack_ref: "AP-001"
            expected_effect: "PH remains high; evidence-linking becomes less vulnerable; A-reading confidence safer; false empirical-grounding risk down."
            feeds_next_iteration: true

          - hardening_action_id: "HB-002"
            severity: "high"
            severity_label: "high (structural vulnerability / likely misread)"
            action_type: "add_score_hygiene_boundary"
            instruction: >-
              Keep every A-band reference syntactically attached to the phrase
              "analysis posture only; not a person score and not a concrete case
              score."
            linked_attack_ref: "AP-002"
            expected_effect: "Score-hygiene risk down; D-R/D-P misreading risk down; extraction risk reduced."
            feeds_next_iteration: true

          - hardening_action_id: "HB-003"
            severity: "high"
            severity_label: "high (structural vulnerability / likely misread)"
            action_type: "add_D_profile_boundary"
            instruction: >-
              Add a local D-module boundary: "D fields are stored for guardrail
              completeness only; no D-profile finding, dignity level, or
              D-Quick-Grid level is assigned."
            linked_attack_ref: "AP-003"
            expected_effect: "D-profile boundary clearer; D-language misreading risk down; public dignity risk down."
            feeds_next_iteration: true

          - hardening_action_id: "HB-004"
            severity: "medium"
            severity_label: "medium (relevant uncertainty / visible leverage)"
            action_type: "add_transmission_status"
            instruction: >-
              Bind the IA-box result phrase to "internal working note only" and
              repeat that it is not application clearance.
            linked_attack_ref: "AP-004"
            expected_effect: "IA-box decidability remains high while transmission upgrade risk decreases."
            feeds_next_iteration: true

          - hardening_action_id: "HB-005"
            severity: "medium"
            severity_label: "medium (relevant uncertainty / visible leverage)"
            action_type: "add_scope_statement"
            instruction: >-
              Replace unqualified "full-depth" references with "full-depth
              within supplied conceptual materials; not exhaustive of a concrete
              scene."
            linked_attack_ref: "AP-005"
            expected_effect: "Scope leakage down; false exhaustiveness risk down; C-reading confidence safer."
            feeds_next_iteration: true

          - hardening_action_id: "HB-006"
            severity: "medium"
            severity_label: "medium (relevant uncertainty / visible leverage)"
            action_type: "add_counter_reading"
            instruction: >-
              Mark all generated counter-perspectives as constructed until a
              real affected-role perspective or independent review is available.
            linked_attack_ref: "AP-006"
            expected_effect: "Counter-reading status clearer; participation/voice gap less hidden; IA reversibility stronger."
            feeds_next_iteration: true

          - hardening_action_id: "HB-007"
            severity: "low"
            severity_label: "low (minor noise / easy patch)"
            action_type: "define_terms"
            instruction: >-
              Add a short plain-language glossary for IA-box, A-band, M-band,
              D₀, D₁/D₂, D-module, PMS Core, PMS-EDEN, and working-note status
              if the report is shared beyond model-literate readers.
            linked_attack_ref: "AP-007"
            expected_effect: "Term ambiguity down; publicness hygiene improved; D-language risk further reduced."
            feeds_next_iteration: true

        boundaries_checked:
          does_not_change_A_band: true
          does_not_change_M_band: true
          does_not_change_IA_box_result: true
          does_not_activate_D_module: true
          does_not_create_D_profile: true
          does_not_assign_D_quick_grid_level: true
          does_not_change_transmission_status: true
          attack_points_describe_analysis_not_persons: true

    uniform_report:
      addon_overlays:
        ah_precision:
          precision_heuristic_summary: >-
            **Precision Heuristic (PH):** high (6/6)
            - Satisfied precision dimensions: 6/6
            - Expected overlay effect: A-reading confidence up, C-reading confidence up, IA-box decidability more_decidable, D-R/D-P misreading risk down
            - Boundary: PH does not rescore A, M, IA or D.
          attack_surface_summary: >-
            **Attack Points (analysis vulnerabilities, not person findings):**
            - [high (structural vulnerability / likely misread)] Formal coherence may be mistaken for empirical grounding
              - ID: AP-001
              - Target: mip_case_analysis.case.information_basis
              - Type: evidence_gap
              - Note: The completed analysis is structurally coherent but still based on prior conceptual model layers, not independent scene evidence.
              - Suggested patch: Add an explicit source-status line separating structured prior analysis from independent scene evidence.
            - [high (structural vulnerability / likely misread)] A-band can be misread as a score for the case or persons
              - ID: AP-002
              - Target: mip_case_analysis.case.scores_and_ia.A_score
              - Type: score_hygiene_risk
              - Note: The numeric-looking "6-7" band is bounded, but likely extractable without its caveat.
              - Suggested patch: Attach "analysis posture only; not person/case score" to every A-band reference.
            - [high (structural vulnerability / likely misread)] D-module wording may be mistaken for a D-profile finding
              - ID: AP-003
              - Target: mip_case_analysis.case.D_module_optional
              - Type: D_profile_boundary_risk
              - Note: D is activated only as protection, but D-profile-shaped storage fields can be misread as an actual dignity reading.
              - Suggested patch: Add a local boundary note that fields are for guardrail completeness only and no D-profile finding is made.
            - [medium (relevant uncertainty / visible leverage)] IA-box result could be misread as application clearance
              - ID: AP-004
              - Target: mip_case_analysis.case.scores_and_ia.IA_box.result
              - Type: transmission_status_ambiguity
              - Note: "Functional asymmetry" is safe only under internal working-note conditions.
              - Suggested patch: Keep "internal working note only" in the same phrase as the IA-box result.
            - [medium (relevant uncertainty / visible leverage)] Full-depth form may imply exhaustiveness
              - ID: AP-005
              - Target: mip_case_analysis.analysis_mode
              - Type: scope_leakage
              - Note: Full-depth applies to supplied conceptual materials, not to any concrete scene.
              - Suggested patch: Qualify future references accordingly.
            - [medium (relevant uncertainty / visible leverage)] Counter-perspective is structurally present but not voice-grounded
              - ID: AP-006
