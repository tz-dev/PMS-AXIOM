AHP_quality_control:
  validation_checklist:
    AHP_is_optional: true
    default_activation_is_off: true
    activation_is_user_requested_here: true
    requires_existing_structured_MIP_analysis_fields: true
    derives_outputs_only_from_documented_fields: true
    does_not_invent_hidden_assumptions: true
    never_changes_base_A_M_IA_D_results: true
    never_activates_D: true
    never_creates_person_level_findings: true
    never_upgrades_transmission_status: true
    attack_points_are_analysis_vulnerabilities_not_person_findings: true
    hardening_actions_are_next_iteration_actions_not_case_repairs: true
    severity_is_interpretive_risk_not_moral_fault: true
    bounded_recursion_preserved: true
    no_annotations_on_annotations: true
  deprecated_term_handling:
    checked: true
    note: >-
      Final terminology uses AHP Module v2.0 concepts. Legacy flat fields are present only because the storage
      spec includes them for migration, and they are explicitly marked deprecated. Terms such as A-score, M-score,
      IA-box, D-module, D-profile, and D₀/D₁/D₂ appear only as boundary terms, negated claims, or required
      MIP/AHP terminology, not as hidden scores or person-level findings.
  final_conformity_statement: >-
    This AHP analysis conforms to the AHP Module as a second-order analysis-quality overlay: it gives PH = high,
    identifies attack points in the previous MIP artifact, supplies linked hardening actions, preserves all
    first-order MIP non-assignments, and keeps PMS, EDEN, MIP, and AHP boundaries intact.