schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
analysis_name: "MIP application to PMS Core and PMS-CONFLICT case analyses: Trolley dilemmas"
language: "en"
documentation_date: "2026-05-28"

source_alignment:
  mip_reference_file: "MIP - Maturity in Practice.yaml"
  mip_status: "application_model_reference_and_case_template"
  pms_base_reference_file: "PMS.yaml"
  pms_base_status: "only PMS Base reference"
  conflict_overlay_reference_file: "PMS-CONFLICT.yaml"
  conflict_overlay_status: "overlay_application_profile_only"
  source_case_title: "Trolley dilemmas"
  relationship_to_prior_outputs: >
    This MIP case application is based on the completed PMS Core case YAML and
    the appended PMS-CONFLICT overlay application. It does not redefine PMS
    operators, does not change PMS dependencies, does not rewrite the Core pass,
    and does not treat PMS-CONFLICT reduced signatures as PMS Base.
  reflection_mode: "off"
  analysis_depth: "full"
  output_type: "yaml_case_application"
  no_base_revision: true
  no_pms_operator_redefinition: true
  no_conflict_overlay_redefinition: true
  no_person_ranking: true
  no_diagnostic_use: true
  no_legal_forensic_use: true
  no_implementation_claim: true
  no_pms_base_validation_claim: true

case:
  meta:
    case_id: "MIP-TROLLEY-DILEMMAS-2026-05-28"
    case_title: "Trolley dilemmas"
    documentation_date: "2026-05-28"
    analysts:
      - name: "ChatGPT"
        role: "MIP structural case analyst"
        observer_position: >
          External structural analyst working from the user-provided case
          material, the completed PMS Core case YAML, the PMS-CONFLICT overlay,
          and the uploaded MIP model reference. No access to concrete actors,
          events, institutions, empirical records, or affected real persons is
          assumed.
    language: "en"
    confidentiality_level: "private_structural_working_note"
    analysis_mode: "full"
    intended_use: "structural_case_review_and_philosophical_ethics_reflection"
    application_zone: "green"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "philosophy_anthropology"
      d_activation_decision: "D_module_not_fully_activated_guardrail_signal_only"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      The philosophical case material: forced-choice situations in which an
      action or omission appears to affect who is harmed, who is saved, and how
      responsibility for foreseeable consequences is assigned. The completed
      PMS Core case YAML and PMS-CONFLICT overlay application are used as prior
      structural analyses.
    secondary_material: >
      MIP - Maturity in Practice.yaml is used as the application model and case
      schema. PMS.yaml remains the only PMS Base reference. PMS-CONFLICT.yaml is
      used only as an overlay/application profile. No external empirical,
      legal, clinical, or historical material is introduced.
    assumptions_and_inferences: >
      The analysis assumes that the trolley-dilemma case remains abstract,
      conceptual, and non-concrete. It infers only structural MIP relevance:
      awareness of consequence-branches, coherence pressure across rival
      frames, responsibility-ascription pressure, limited power-to-act
      modelling, IA risk around asymmetry, and a dignity-protection concern
      against life-ranking or chooser-shaming. No empirical motivation,
      psychological state, legal liability, moral verdict, metaphysical truth,
      or implementation rule is inferred.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: >
        High coverage for abstract structural analysis; low coverage for
        concrete scene analysis because the case supplies no concrete actor,
        institutional frame, probability structure, legal standard, role duty,
        real alternative, empirical evidence, or affected person.
      reliability_estimate: >
        Reliable as a bounded MIP structural projection based on the supplied
        PMS and CONFLICT analyses; not reliable for concrete moral decision,
        legal attribution, empirical prediction, diagnosis, governance, or
        implementation.
      known_gaps:
        - "No concrete chooser, institution, role, duty, or mandate is specified."
        - "No empirical probabilities, causal evidence, or outcome evidence are supplied."
        - "No jurisdiction, legal doctrine, liability standard, or forensic burden is supplied."
        - "No affected persons are concrete, identifiable, or available for perspective-taking."
        - "No actual time sequence, review point, reversibility path, or exit option is specified."
        - "No concrete self-binding commitment, promise, institutional obligation, or role-continuity is supplied."
        - "No evidence is supplied for terminal PMS-CONFLICT conditions such as priced distance, binding collision, or stabilized conflict regime."
      main_bias_risks_here:
        - "Confirmation bias: the PMS and MIP structures may fit the case so well that under-discrimination is overlooked."
        - "Hindsight bias: foreseeable consequences may be treated as certain or obvious without concrete probability calibration."
        - "Moral-intuition capture: initial intuitions about action, omission, sacrifice, or rescue may be mistaken for analysis."
        - "Frame dominance bias: one ethical framing may silently dominate rival formalizations."
        - "Dignity bias effect: dignity language may drift into life-ranking unless guardrails remain active."

  snapshot:
    short_case_description: >
      The case concerns trolley dilemmas as abstract forced-choice situations:
      action or omission appears to affect who is harmed, who is saved, and how
      responsibility for foreseeable consequences is assigned. It is not a
      concrete praxis scene but a philosophical dilemma-form already analysed
      through PMS Core and PMS-CONFLICT.
    central_actors_and_roles:
      - "abstract chooser-position or decision-position"
      - "affected parties exposed to harm or rescue"
      - "observer or analyst interpreting the dilemma"
      - "rival ethical or structural frames"
      - "possible downstream users of the analysis"
    guiding_question: >
      How mature is the handling of this dilemma-form in practice when analysed
      structurally, without turning PMS coherence, CONFLICT legibility, or MIP
      maturity language into moral verdict, diagnosis, legal attribution,
      person-ranking, or implementation rule?
    level:
      - "philosophical"
      - "conceptual_domain_projection"
      - "structural_case_review"
      - "ethics_reflection"
      - "non_concrete_scene"
    first_visible_asymmetry: >
      The first visible asymmetry is conceptual: a chooser-position appears to
      have consequence-shaping capacity while affected parties are exposed to
      harm or rescue. This is an asymmetry of structural position, not a moral
      ranking of persons and not proof of responsibility, blame, guilt, or
      authority.
    first_visible_D_themes_optional:
      - "risk of ranking lives or persons"
      - "risk of shaming a hypothetical chooser"
      - "risk of treating harmed parties as abstract quantities"
      - "need to preserve D0 as untouched and non-rankable"
      - "need to keep dignity-in-practice as guardrail rather than score"

  role_mapping:
    object_of_observation:
      type: "abstract_dilemma_form"
      description: >
        The object of observation is not a person or event but the structural
        form of trolley dilemmas as already mapped through PMS Core and
        PMS-CONFLICT: forced choice, harm allocation, action/omission,
        asymmetry, temporality, rival frames, and conflict-legibility.
      role: "conceptual object of structural maturity analysis"
      not_person_as_whole: true
    observer_position:
      role: "structural analyst applying MIP after PMS Core and PMS-CONFLICT"
      power_relation_to_object: >
        The analyst has interpretive power over the written case artefact but no
        power over any real person, institution, court, clinical context, or
        decision procedure. The main power risk lies in language transfer:
        structural interpretation could be mistaken for verdict or rule.
      possible_effects_of_analysis: >
        The analysis may clarify how A-C-R-P, IA checks, trajectory thinking,
        and dignity guardrails apply to an abstract dilemma. It could also
        create misuse risk if excerpted as a moral calculus, governance rule,
        maturity ranking, or PMS/MIP validation claim.
    involved_roles:
      - role: "abstract chooser-position"
        mandate: >
          No concrete mandate is supplied. In the thought-structure, this
          position is imagined as able to act, refrain, redirect, or omit in a
          way that affects harm distribution.
        built_in_asymmetries:
          - "possible consequence-shaping capacity"
          - "possible information advantage over affected parties"
          - "possible burden of foreseeable outcomes"
          - "possible lack of real alternatives depending on variant"
        publicness_level: "conceptual_private_in_this_analysis"
        dignity_exposure: >
          No concrete dignity exposure is established. Dignity exposure is a
          guardrail concern only: avoid chooser-shaming, blame inflation, or
          maturity ranking.
      - role: "affected parties"
        mandate: >
          No active mandate is supplied by the case. They function structurally
          as parties exposed to harm, rescue, sacrifice, or non-rescue.
        built_in_asymmetries:
          - "high exposure to consequence"
          - "low or absent control within the abstract dilemma frame"
          - "risk of being reduced to quantities or outcome positions"
        publicness_level: "conceptual_private_in_this_analysis"
        dignity_exposure: >
          Dignity exposure is significant at the level of analysis because
          trolley dilemmas can tempt abstraction, commensuration, or ranking of
          persons. D0 remains untouched and non-rankable.
      - role: "analyst or interpreter"
        mandate: >
          Maintain structural clarity, reversibility, non-capture, rival
          readings, and guardrail discipline while applying MIP to the prior PMS
          and CONFLICT analyses.
        built_in_asymmetries:
          - "interpretive control over framing"
          - "ability to over-smooth rival readings"
          - "ability to create transmission risk through wording"
        publicness_level: "private_working_note"
        dignity_exposure: >
          The analyst must not convert structural legibility into dignity
          judgment, person-label, life-ranking, or humiliation dynamic.
      - role: "downstream reader or user"
        mandate: >
          Use the analysis only as structural reflection, training, or
          philosophical ethics review; not as decision rule, moral tribunal,
          legal standard, clinical assessment, or governance procedure.
        built_in_asymmetries:
          - "possible ability to excerpt or operationalize analysis"
          - "possible publicness amplification"
          - "possible misuse of scores, IA-box, or D-language"
        publicness_level: "potentially_variable_if_reused"
        dignity_exposure: >
          Dignity exposure rises if the analysis is applied to real identifiable
          persons, public debate, institutions, or coercive settings.
    publicness:
      level: "private_working_note"
      A_P_relevance: >
        Awareness of publicness is currently low-to-moderate because the
        analysis is private and conceptual, but A-P becomes important if the
        YAML is excerpted, taught, published, or used in institutional contexts.
      P_PU_relevance: >
        Public power-to-act is low in the present setting. It becomes relevant
        if the analysis is used to frame public debate, governance decisions,
        moral education, AI policy, or legal reasoning.
      D_P_relevance_if_D_active: >
        D-P is not activated as a full D-module reading here. As a guardrail,
        public dignity becomes relevant if the analysis publicly labels
        choosers, ranks lives, shames positions, or turns dilemma structures
        into reputational pressure.
      public_shaming_risk: >
        Low in the current private abstract case; medium-to-high if transferred
        into public person-near contexts or if trolley positions are attached
        to identifiable persons, groups, or moral camps.
      reversibility_risk: >
        Low in the current reversible working note; higher if the analysis is
        archived, excerpted, institutionalized, used as a score, or treated as
        a final moral or procedural classification.

  frame_vs_variability:
    frame_elements:
      - element: "abstract forced-choice structure"
        reason_fixed_or_slow: >
          The core case is defined by a constrained action/omission structure
          in which branches appear to affect harm and rescue outcomes.
        protected_goods:
          - "clarity of structural analysis"
          - "preservation of rival readings"
          - "avoidance of false concrete verdicts"
      - element: "PMS Core operator discipline"
        reason_fixed_or_slow: >
          PMS.yaml remains the only PMS Base reference; operators, dependencies,
          derived structures, and guardrails are not revised by MIP or CONFLICT.
        protected_goods:
          - "model integrity"
          - "dependency hygiene"
          - "non-diagnostic use"
          - "non-capture"
      - element: "CONFLICT overlay subordination"
        reason_fixed_or_slow: >
          PMS-CONFLICT is an overlay profile only; reduced signatures are
          shorthand and do not replace PMS dependencies.
        protected_goods:
          - "overlay discipline"
          - "prevention of terminality inflation"
          - "prevention of solution-manual drift"
      - element: "MIP guardrail structure"
        reason_fixed_or_slow: >
          MIP requires profile-not-person, score hygiene, D0 untouched,
          D-profile not score, IA-box not verdict, and trajectories over labels.
        protected_goods:
          - "dignity protection"
          - "non-ranking"
          - "reversibility"
          - "transmission safety"
      - element: "non-concrete-scene boundary"
        reason_fixed_or_slow: >
          The supplied case lacks concrete actors, institutions, evidence,
          duties, probabilities, and outcomes; this boundary cannot be
          bypassed without new material.
        protected_goods:
          - "claim typing"
          - "non-overclaim"
          - "empirical restraint"
          - "legal and diagnostic restraint"
    variability_elements:
      - element: "ethical framing"
        possible_change: >
          The same dilemma may be framed as consequentialist, deontological,
          causal, role-duty-based, tragedy-oriented, legal, phenomenological,
          or non-PMS.
        responsible_roles:
          - "analyst"
          - "reader"
          - "disciplinary community"
      - element: "calibration of action and omission"
        possible_change: >
          Concrete variants may change whether omission is structurally,
          morally, or legally meaningful.
        responsible_roles:
          - "case designer"
          - "ethical theorist"
          - "legal analyst if legally framed"
      - element: "foreseeability and probability"
        possible_change: >
          Concrete scenarios could specify uncertainty, probability,
          counterfactuals, timing, and causal reliability.
        responsible_roles:
          - "empirical investigator if empirical"
          - "case framer"
          - "analyst"
      - element: "responsibility attribution"
        possible_change: >
          Responsibility may be causal, moral, role-based, institutional,
          legal, tragic, shared, or not applicable, depending on additional
          standards.
        responsible_roles:
          - "ethical theorist"
          - "institutional role-holder"
          - "legal authority if legally framed"
          - "analyst"
      - element: "publicness and transmission"
        possible_change: >
          A private working note may become public, institutional, educational,
          or governance-facing, thereby raising A-P, P-PU, D-P, and misuse
          gradient.
        responsible_roles:
          - "document owner"
          - "publisher"
          - "educator"
          - "institutional user"
      - element: "D-module activation"
        possible_change: >
          A full D-profile could become appropriate only if concrete
          enactments, safe communication space, role/context/time window, and
          clarity-over-shame conditions are fulfilled.
        responsible_roles:
          - "analyst"
          - "moderator"
          - "affected participants if real persons are involved"
      - element: "operationalization"
        possible_change: >
          The analysis could be kept as reflection or moved into applied
          decision contexts; the latter would require separate validation and
          may be prohibited in red zones.
        responsible_roles:
          - "downstream user"
          - "institutional authority"
          - "governance reviewer"
    unfair_high_M_zones:
      - >
        Assigning high M-score to a hypothetical chooser without concrete
        knowledge, predictability, real alternatives, role mandate, or power
        calibration would be unfair and structurally invalid.
      - >
        Treating responsibility-ascription in the philosophical case as guilt,
        fault, blame, legal liability, or moral worth would be an unfair high-M
        zone.
      - >
        Treating local frame coherence as proof that a chooser had mature
        alternatives would inflate M beyond the supplied evidence.
    system_as_excuse_risk:
      - >
        The abstract forced-choice frame must not be used to excuse all
        responsibility automatically; it shows structural constraint but does
        not by itself settle responsibility.
      - >
        PMS-CONFLICT weak legibility must not be used to say that terminality
        or tragedy eliminates responsibility by default.
      - >
        Missing concrete evidence must not become a blanket excuse; it is a
        reason to keep M under-specified and avoid verdict.
    D1_D2_realistically_improvable_where:
      - >
        In this abstract case, D1/D2 are not concrete enactments to be improved.
        The realistic improvement lies in analytical language: avoid
        life-ranking, chooser-shaming, humiliation, person-labeling, and
        dignity-score language.
      - >
        If a concrete educational or public setting uses the case, dignity in
        practice can be improved by explicit non-ranking, voice for affected
        perspectives, reversible framing, and refusal of public shaming.
      - >
        If a concrete institution applies the dilemma, D1/D2 improvement would
        require participation, transparency, justification, review, and
        safeguards against reducing persons to numerical outcomes.

  acrp_profile:
    A_awareness:
      observations: >
        Awareness is structurally high at the conceptual level: the case makes
        visible action/omission distinctions, harm/rescue branches,
        responsibility-ascription, asymmetry, temporal consequence, rival
        framing, non-capture, and transfer risks. Awareness is not empirical
        knowledge of a concrete scene.
      available_information: >
        Available information includes the abstract case description, PMS Core
        analysis, PMS-CONFLICT overlay, and the MIP schema. It does not include
        concrete actor knowledge, probability data, legal context, institutional
        duties, psychological states, or affected-party perspectives.
      realistically_knowable: >
        In this abstract setting, it is realistically knowable that the case is
        structurally under-specified for verdicts. It is also realistically
        knowable that action/omission, consequence, asymmetry, and responsibility
        frames must be distinguished. It is not realistically knowable which
        concrete action would be morally, legally, or practically required.
      blind_spots: >
        Major blind spots include concrete causation, probabilities, agent
        capacity, actual alternatives, legal standards, role obligations,
        affected-party voice, embodied distress, social context, and whether a
        specific trolley variant changes the moral structure.
      role_awareness_A_R: >
        Role awareness is strong for the analyst role and weak for the imagined
        chooser-position. The analyst role is to maintain structural clarity and
        guardrails; the chooser-position has no concrete role mandate.
      publicness_awareness_A_P: >
        Publicness awareness is adequate in the current private working note and
        explicitly marked as a transfer risk. If published or institutionalized,
        A-P would need stronger calibration.
      bias_awareness: >
        Bias awareness is active: the analysis names risks of over-smooth PMS
        fit, frame dominance, moral-intuition capture, hindsight bias, and
        dignity-language drift.
    C_coherence:
      observations: >
        Coherence is moderate-to-strong as an analysis artefact: the PMS Core
        and CONFLICT readings are compatible with MIP guardrails. Coherence is
        not treated as moral solution or complete capture.
      word_deed_relation: >
        Since the case is abstract, there is no concrete word-deed relation to
        assess. At the analysis level, the document's stated guardrails are
        coherent with its refusal of verdict, ranking, diagnosis, and
        implementation.
      role_context_coherence: >
        Role-context coherence is good for a private philosophical structural
        review. It would become weaker if the analysis were transferred into
        concrete decision-making without new evidence and validation.
      narrative_coherence: >
        The narrative is coherent: trolley dilemmas are treated as abstract
        forced-choice structures, then as PMS operator structures, then as weak
        CONFLICT-legible incompatibility, and finally as MIP maturity-in-practice
        reflection with score hygiene.
      breaks_named_or_hidden: >
        Breaks are named rather than hidden: no concrete scene, no full M-score,
        no full D-module activation, weak Ψ, weak Σ, weak terminal conflict,
        and preserved rival readings are explicitly stated.
    R_responsibility:
      observations: >
        Responsibility is structurally salient but not fully assignable.
        Responsibility-ascription appears in the case material, but MIP R and
        PMS Responsibility_R require concrete knowledge, power, predictability,
        alternatives, role, and self-binding conditions not supplied here.
      responsibility_points: >
        Responsibility points include the analyst's responsibility for clean
        framing, the downstream user's responsibility not to operationalize the
        analysis improperly, and the hypothetical chooser-position's possible
        responsibility only if concrete scene conditions are later specified.
      assumed_responsibility: >
        The analysis assumes responsibility for guardrail discipline,
        non-overclaim, score hygiene, non-capture, and preventing D-language or
        conflict-language from becoming ranking or verdict.
      shifted_or_refused_responsibility: >
        The analysis refuses to assign responsibility where evidence is absent.
        It also refuses to let the abstract system frame excuse all possible
        responsibility by default.
      burdens_and_consequences: >
        The main burdens are interpretive: careless analysis could harden into
        moral tribunal, life-ranking, governance rule, or person-near label.
        Concrete burdens for imagined choosers or affected parties remain
        under-specified.
    P_power_to_act:
      observations: >
        Power-to-act is split between the abstract dilemma-position and the
        analyst/document-position. The abstract chooser has possible
        consequence-shaping capacity but no calibrated options; the analyst has
        real power to maintain or violate guardrails.
      real_levers: >
        Real levers in this analysis include framing, claim typing, score
        hygiene, refusing overclaim, preserving rival readings, marking
        non-capture, and restricting transmission. No concrete trolley action is
        prescribed.
      formal_vs_real_options: >
        Formal options in trolley dilemmas may include acting, omitting,
        redirecting, or refusing a frame. Real options are unknown because no
        concrete variant is specified. In the analysis, real options are limited
        to reversible structural interpretation.
      used_options: >
        The analysis uses options of restraint: D-module not fully activated,
        M-score not assigned as concrete responsibility, IA-box kept as risk
        check, CONFLICT terminality not activated, and PMS coherence not treated
        as sufficient.
      unused_options: >
        The analysis deliberately does not choose a moral solution, does not
        assign blame, does not score persons, does not propose implementation,
        and does not convert trolley analysis into a decision algorithm.
      ceiling_rule_relevance: >
        The M-score ceiling rule is highly relevant: without concrete
        predictability and access to alternatives, high shared structural
        responsibility for an imagined actor would be invalid. Therefore M is
        under-specified rather than high.

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: >
        No concrete self-devaluation is observed because no real person or
        self-relation is present. A misuse risk would arise if a hypothetical
        chooser were described as morally deficient, immature, or unworthy.
      self_neglect: >
        No concrete self-neglect is observed. In abstract analysis, this field
        remains not applicable except as a caution against ignoring the burden
        that forced-choice structures may place on agents.
      shame_dynamics: >
        No active shame dynamic is observed in the case material. Shame risk
        exists if trolley analysis is used to shame choosers, victims,
        philosophers, moral positions, or groups.
      degradation_of_others: >
        No degradation is enacted by the abstract case itself. A dignity risk
        arises if affected parties are reduced to ranked quantities or if
        persons are treated as commensurable objects without remainder.
      public_shaming: >
        Public shaming is absent in this private working note. It becomes a
        risk if the analysis is publicized as a verdict, ranking, or moral
        label.
      protest_or_refusal: >
        Refusal or resistance to trolley framing may be dignity-relevant and
        must not be automatically treated as immaturity, evasion, drift, or
        failed integration.
      dignity_protection: >
        Dignity protection is active as a guardrail: D0 remains untouched, no
        dignity score is assigned, D1/D2 are not used as person labels, and the
        analysis refuses ranking, humiliation, and public shaming.
    next_step_if_relevant: >
      Do not activate a full D-profile unless a concrete role/context/time
      window and safe communication space are supplied. Keep D as protection
      signal only.

  acrpd_submodules_profile:
    A:
      A-I: >
        Inner awareness is not attributed to any person. At the analysis level,
        A-I means noticing the pull of moral intuition, urgency, and discomfort
        without treating them as judgment.
      A-R: >
        Role awareness is strong for the analyst role and under-specified for
        the abstract chooser-position. No concrete duty or mandate is supplied.
      A-C: >
        Context awareness is strong for the philosophical, conceptual, and
        non-concrete nature of the case; weak for any empirical, legal,
        institutional, or operational context.
      A-IM: >
        Impact awareness is structurally salient because the case concerns harm
        and rescue consequences, but concrete impact magnitude, probability,
        and evidence are absent.
      A-P: >
        Publicness awareness is active as a transfer-risk check. The current
        case is private; public reuse would require stronger guardrails.
    C:
      C-S: >
        Social coherence is not concretely assessable. The analysis remains
        socially cautious by avoiding person labels, shaming, and factional
        moral ranking.
      C-P: >
        Coherence in power contexts is partially assessable: the analysis names
        asymmetry but refuses to turn asymmetry into authority, blame, or
        ranking.
      C-N: >
        Narrative coherence is solid as a layered reading: PMS Core,
        PMS-CONFLICT, and MIP each remain in their proper role.
      C-I: >
        Institutional/rule coherence is not applicable as a concrete standard.
        The analysis explicitly blocks institutional or legal use without
        separate validation.
    R:
      R-I: >
        Individual responsibility is not assigned to any concrete person.
        Hypothetical responsibility remains conditional on knowledge, options,
        predictability, and role.
      R-S: >
        Social responsibility is relevant only as transmission responsibility:
        readers and analysts should not convert the case into shaming or
        ranking.
      R-E: >
        Ethical responsibility is relevant as guardrail discipline: preserve
        rival readings, avoid false verdicts, and protect dignity in practice.
      R-P: >
        Public responsibility is low in the private working note and high if
        the analysis is circulated publicly or institutionally.
    P:
      P-I: >
        Inner agency is not attributed to a concrete person. At analysis level,
        it means the capacity to pause, avoid overclaim, and maintain reflective
        restraint.
      P-S: >
        Social agency is limited to communication choices: wording can protect
        or damage dignity and reversibility.
      P-C: >
        Cultural agency is relevant because trolley dilemmas are culturally
        recognizable philosophical scripts and may shape moral imagination.
      P-PU: >
        Public agency is currently low but could become significant if the
        YAML, signatures, or scores are used in education, governance, media,
        or institutional contexts.
    D:
      active: false
      D-I: >
        Not activated as a full D-submodule. No inner dignity enactment is
        assessed because no concrete self-treatment is present.
      D-B: >
        Not activated. No bodily or material self-care enactment is present.
      D-R: >
        Not activated as relational D-profile. Relational dignity appears only
        as a guardrail against degrading affected parties, choosers, or rival
        positions.
      D-P: >
        Not activated as public D-profile. Public dignity is treated only as a
        transmission risk if the analysis is publicized or person-near.
      note: >
        D-submodules are not used to score or judge dignity. D remains a
        protection signal and guardrail because the case is abstract and not a
        concrete role/context/time-windowed enactment.

  scores_and_ia:
    A_score:
      A_band: "not_assigned_as_concrete_case_score; analytic_handling_band_6-7_with_limits"
      boundary_confirmed: "A-score describes enactment, not essence."
      time_role_context: >
        Time/context for the analytic handling: private structural review on
        2026-05-28 of an abstract philosophical dilemma-form, based on PMS Core
        and PMS-CONFLICT prior analyses. No concrete event or person is scored.
      justification:
        A_awareness: >
          Strong structural awareness is shown by distinguishing material from
          inference, case type from concrete scene, PMS Core from CONFLICT
          overlay, and MIP guardrail function from verdict.
        C_coherence: >
          Coherence is solid because the analysis keeps PMS, CONFLICT, and MIP
          roles separate while preserving non-capture and rivalry. Coherence is
          not treated as moral sufficiency.
        R_responsibility: >
          Responsibility handling is cautious: responsibility-ascription is
          recognized but not assigned without concrete knowledge, power,
          predictability, alternatives, and role.
        P_power_to_act: >
          Power-to-act is responsibly limited to analysis levers: claim typing,
          guardrails, non-operationalization, and transmission boundaries.
        modulators_context: >
          The band remains limited because the underlying case is abstract and
          lacks concrete actors, evidence, probabilities, role duties, and
          outcomes. The analytic handling is mature enough for structural
          review but not for concrete decision.
      D_excluded_from_A_number: true
    M_score:
      M_band: "not_assigned_to_actor; shared_structural_responsibility_under_specified_and_capped_by_missing_concrete_predictability_and_alternatives"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
      role_position_time_frame: >
        No concrete actor or role-holder is scored. The only role-position with
        assessable responsibility is the analyst/document role in the current
        private working note. Hypothetical chooser responsibility remains
        under-specified.
      five_factors:
        knowledge: >
          Abstract knowledge of the dilemma form is present; concrete knowledge
          of probabilities, duties, causal mechanisms, and alternatives is
          absent.
        power_control: >
          The analyst controls framing and transmission discipline. The
          hypothetical chooser's power is conceptually visible but not
          calibrated.
        predictability: >
          Conceptual foreseeability is present. Empirical or legal
          predictability is absent and must not be inferred.
        access_to_alternatives: >
          Abstract alternatives such as action or omission are mentioned, but
          real alternatives, costs, timing, and feasibility are not specified.
        serious_integration_attempt: >
          The prior PMS Core and CONFLICT analyses show serious structural
          integration attempts while preserving weak Σ, weak Ψ, rival readings,
          and non-capture.
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: true
        explanation: >
          For the abstract chooser-position, high M cannot be assigned because
          concrete predictability and access to alternatives are not supplied.
          The ceiling rule therefore blocks high shared-responsibility claims.
          For the analyst role, responsibility is limited to disciplined
          framing and transmission hygiene.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: >
        Conceptual asymmetry between consequence-shaping decision-position and
        affected parties exposed to harm or rescue; plus interpretive asymmetry
        between analyst/document and downstream readers.
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "partial"
        notes: >
          The abstract structure and analysis boundaries are transparent. The
          concrete scene is not transparent because no concrete agents, duties,
          facts, probabilities, or affected perspectives are supplied.
      J_justified:
        status: "partial"
        protected_good_or_purpose: >
          The justified purpose of the analysis is structural clarification,
          guardrail discipline, non-capture preservation, and prevention of
          misuse.
        notes: >
          The asymmetry within the hypothetical dilemma cannot be justified or
          unjustified without concrete context. The interpretive asymmetry of
          the analysis is justified only while it remains reversible and
          non-operational.
      TB_time_bound:
        status: "partial"
        review_points_or_conditions: >
          Review is required if a concrete variant, public use, institutional
          use, legal context, affected-person perspective, probability
          structure, or operational purpose is introduced.
        notes: >
          The current working note is time-stamped and bounded to the present
          abstract case. Concrete reuse requires re-analysis.
      R_reversible:
        status: "partial"
        real_return_or_exit_options: >
          The interpretation is reversible as a private working note. It becomes
          less reversible if published, archived, scored, institutionalized, or
          used in decision contexts.
        notes: >
          Reversibility is currently maintained by refusing verdicts, scores of
          persons, legal claims, diagnostic claims, and implementation claims.
      result: "IA_risk"
      short_justification: >
        IA risk is present because asymmetry is central and under-specified. The
        risk is controlled in this analysis by transparency, non-verdict
        posture, review conditions, and transmission limits.
      immediate_action: >
        Keep the analysis as structural reflection only. Do not use it as a
        moral decision rule, legal standard, clinical tool, governance policy,
        person label, or PMS/MIP validation claim.

  ia_localisation:
    knowing:
      issue: >
        The analysis knows the abstract dilemma form and the prior PMS/CONFLICT
        readings but does not know concrete facts, probabilities, duties, or
        affected-party perspectives.
      possible_intervention: >
        Mark all concrete claims as unavailable; separate conceptual
        foreseeability from empirical or legal foreseeability.
    being_able:
      issue: >
        The analyst is able to frame the case but not able to decide a concrete
        action, assign responsibility, or validate an implementation.
      possible_intervention: >
        Restrict power-to-act to reversible wording, boundary discipline, and
        transmission control.
    being_permitted:
      issue: >
        The analysis is permitted as private structural review and philosophical
        reflection, not as red-zone use.
      possible_intervention: >
        Keep application zone green; if the case becomes person-near,
        institutional, forensic, clinical, HR, or public-shaming related, stop
        or reframe under stricter conditions.
    willing:
      issue: >
        The analysis must resist the temptation to solve the dilemma, rank
        persons, or over-activate MIP scoring.
      possible_intervention: >
        Maintain reflection-mode-off output discipline while preserving
        restraint, non-capture, rival readings, and falsifier conditions.

  ia_protection:
    transparency_measures:
      - "State that the case is not a concrete scene."
      - "State that A/M bands are not person scores."
      - "State that D-module is not fully activated and D0 remains untouched."
      - "State that PMS-CONFLICT terminality is not activated."
      - "State that IA-box is not a verdict."
    justification_measures:
      - "Justify all structural claims by reference to the abstract case material and prior PMS/CONFLICT analyses."
      - "Do not justify any empirical, legal, diagnostic, or implementation claim because evidence is absent."
      - "Treat the analysis purpose as structural clarification only."
    time_boundedness_measures:
      - "Bind the analysis to the current abstract case and documentation date."
      - "Require re-analysis if concrete scene facts, publicness, affected persons, or operational purposes are introduced."
      - "Treat transmission status as review-dependent."
    reversibility_measures:
      - "Avoid irreversible labels, scores of persons, and final moral classifications."
      - "Keep rival readings and non-capture explicit."
      - "Use under-specified or not-assigned status where evidence is absent."
    participation_or_voice_measures:
      - "Acknowledge that affected-party perspectives are missing."
      - "Do not simulate consent, voice, distress, preference, or subjective experience."
      - "If a concrete case is introduced, include affected perspectives where safe and appropriate."
    dignity_protection_measures:
      - "Do not rank lives, persons, victims, choosers, or moral positions."
      - "Do not use D as a score."
      - "Do not convert resistance to trolley framing into immaturity."
      - "Preserve D0 as inviolable and outside metrics."
    review_or_falsifier:
      date_or_interval: "before any reuse outside private structural reflection"
      falsifier_question: >
        Does the intended reuse introduce concrete persons, publicness,
        institutional authority, legal consequences, clinical meaning, or
        operational decision-making that the current analysis explicitly does
        not support?
      responsible_roles:
        - "analyst"
        - "document owner"
        - "downstream user"
        - "moderator or reviewer if used in teaching or institutional settings"

  trajectory:
    principle: "Trajectories, not labels."
    timeline:
      - timepoint: "t0"
        short_description: >
          Initial abstract trolley-dilemma formulation: action or omission
          appears to affect who is harmed, who is saved, and how responsibility
          for foreseeable consequences is assigned.
        A_band: "not_assigned; structural awareness demand visible"
        M_band: "not_assigned; responsibility under-specified"
        D_observation_optional: >
          D not activated; dignity risk appears as possible life-ranking or
          chooser-shaming.
        key_context_role_power_situation: >
          Abstract philosophical frame with no concrete actor, duty,
          probability, or institution.
      - timepoint: "t1"
        short_description: >
          PMS Core pre-analysis and Core YAML: operators, dependencies, derived
          structures, non-capture, rival readings, falsifiers, and boundaries
          are articulated.
        A_band: "analytic_handling_6-7_with_limits"
        M_band: "analyst_responsibility_limited_to_framing; actor_M_not_assigned"
        D_observation_optional: >
          PMS Dignity-in-Practice appears as application constraint; MIP
          D-module still not fully activated.
        key_context_role_power_situation: >
          Structural analyst controls framing but keeps PMS coherence from
          becoming verdict.
      - timepoint: "t2"
        short_description: >
          PMS-CONFLICT overlay adds weak conflict-legibility, transfer risks,
          dignity-collapse misuse risk, and terminality limits.
        A_band: "analytic_handling_6-7_with_limits"
        M_band: "actor_M_not_assigned; transmission_responsibility_increases"
        D_observation_optional: >
          Dignity protection becomes more salient as a guardrail against
          ranking, shaming, exposure capture, and terminality inflation.
        key_context_role_power_situation: >
          Overlay remains subordinate; conflict-legibility is not terminal
          CONFLICT or solution procedure.
      - timepoint: "t3"
        short_description: >
          MIP application reviews maturity-in-practice handling through A-C-R-P,
          IA-box, score hygiene, trajectory, D guardrails, and transmission
          controls.
        A_band: "not_concrete_case_score; analytic_handling_6-7_with_limits"
        M_band: "not_assigned_to_hypothetical_actor; high_M_blocked_by_missing_predictability_and_alternatives"
        D_observation_optional: >
          Full D-module remains off; D functions as protection signal and
          guardrail only.
        key_context_role_power_situation: >
          Private structural working note, green application zone, no red-zone
          use, no concrete persons.
    A_t:
      pattern: >
        Awareness increases from abstract dilemma recognition to layered
        structural differentiation: PMS Core clarifies operators, CONFLICT
        clarifies weak incompatibility and transfer risk, and MIP clarifies
        maturity handling and guardrails.
      notes: >
        The A-trajectory is mature as analysis only. It does not establish
        awareness of any concrete actor.
    M_t_RVR_t:
      RVR_description: >
        Reversibility remains high while the analysis is private, conceptual,
        and non-operational. RVR would decrease if the analysis were excerpted,
        scored, publicized, institutionalized, or applied to identifiable
        persons.
      knowledge_over_time: >
        Knowledge grows structurally across PMS, CONFLICT, and MIP layers, but
        concrete evidence remains absent throughout.
      leverage_over_time: >
        Analyst leverage grows through richer schema articulation, increasing
        responsibility for guardrail discipline and transmission boundaries.
      alternatives_over_time: >
        Analytical alternatives remain available: preserve rival readings,
        revise formulae, mark under-specification, keep D off, and refuse
        operationalization.
      ceiling_rule_over_time: >
        The ceiling rule continues to block high M for any hypothetical actor
        because predictability, alternatives, role, and power are not concretely
        calibrated.
    D_t_optional:
      active: false
      qualitative_course: >
        D-salience increases as a protection concern but does not become a full
        D-profile. The trajectory moves from possible dignity risk to explicit
        dignity guardrail.
      D_quick_grid_movement_if_used: >
        Not used. If used in a concrete educational setting, the movement
        question would be how to discuss trolley dilemmas one step more
        dignifying without ranking lives or shaming positions.
      note: "No D-score; only qualitative trajectory."

  D_module_optional:
    active: false
    activation_reason: >
      Full D-module is not activated because the case is not a concrete
      role/context/time-windowed enactment and no identifiable persons,
      self-treatment, relational interaction, or public dignity event are
      supplied. D remains active only as a guardrail and protection signal.
    communication_space: >
      Private structural working note. Safe enough for dignity-protection
      language, not sufficient for full D-profile of persons or concrete
      dignity dynamics.
    guardrails_checked:
      scenic: false
      context_bound: true
      role_bound: false
      time_windowed: false
      no_global_statement_about_persons: true
      no_dignity_score: true
      D0_untouched: true
    D_profile:
      D1_self_treatment_D_I_D_B:
        observed_enactments: >
          No observed self-treatment enactments. No concrete person or self
          relation is present.
        context_notes: >
          D1 is not assessed. Any language about guilt, shame, maturity, or
          deficiency of a hypothetical chooser is avoided.
        trend_band_qualitative: "not_applicable_full_D_module_off"
      D2_relational_dignity_D_R:
        observed_enactments: >
          No concrete relational enactments are observed. At the analysis level,
          dignity protection is maintained by refusing degradation, ranking,
          shaming, or person-labeling.
        context_notes: >
          D2 is not assessed as a profile. It remains a qualitative guardrail
          against reducing affected parties to abstract quantities or moral
          instruments.
        interpretive_reading_not_judgment: >
          The analysis reads dignity risk as a structural transmission concern,
          not as a judgment about persons, choices, or moral theories.
      D_P_public_dignity:
        active_if_publicness_relevant: false
        observed_enactments: >
          No public dignity event is present. Public dignity risk would become
          relevant if the analysis were excerpted or attached to identifiable
          persons, groups, or moral camps.
        private_public_tension: >
          Currently low. It would rise sharply under publication, scoring,
          institutional use, or public debate.
        publicity_context: "private_working_note; no public D-reading"
      A_M_D_link_without_mixing:
        A_band_reference: "analytic_handling_6-7_with_limits; not a person score"
        M_band_reference: "not_assigned_to_actor; under-specified and ceiling-limited"
        D_tendency: >
          D remains protective and qualitative. It must not be folded into A or
          M and must not become a dignity score.
        protection_or_responsibility_implication: >
          Protection implication: maintain non-ranking and non-shaming language.
          Responsibility implication: analysts and downstream users must not
          operationalize or publicize D-language irresponsibly.
    D_Quick_Grid:
      used: false
      level: "not_used"
      preferred_wording: >
        This abstract analysis shows dignity-protection relevance in the
        analytical role and transmission context; no D-level is assigned to
        persons, parties, or positions.
      forbidden_wording_avoided: true
      movement_question: >
        If a concrete or public use is introduced, what is one small,
        reversible change in wording, framing, participation, or review that
        would reduce ranking, shame, exposure, or irreversibility?

  meta_notes:
    bias_risks:
      confirmation_bias: >
        Risk: because PMS Core, CONFLICT, and MIP all map parts of the dilemma,
        the analyst may overconfirm the framework. Mitigation: preserve
        non-capture, rival readings, weak operators, and under-specified scores.
      hindsight_bias: >
        Risk: foreseeable consequences may be treated as certain. Mitigation:
        distinguish conceptual foreseeability from empirical or legal
        predictability.
      status_quo_loyalty_bias: >
        Risk: familiar trolley framing may be treated as the natural or only
        frame. Mitigation: preserve rival formalizations and refusal of
        trolley framing as possibly legitimate.
      halo_horn_effects: >
        Risk: positions associated with action or omission may be treated as
        better or worse. Mitigation: no person ranking, no maturity labels, no
        moral tribunal.
      in_group_out_group_bias: >
        Risk: consequentialist, deontological, legal, or tragic readings may be
        treated as camps. Mitigation: keep formal rival readings open and
        non-personal.
      dignity_bias_effect: >
        Risk: dignity language could smuggle in life-ranking or moral
        superiority. Mitigation: D0 untouched, D-module off, D used only as
        protection signal.
    norm_assumptions:
      explicit_norms:
        - "Profile is not person."
        - "A-score is a band, not person score."
        - "M-score is shared structural responsibility, not guilt."
        - "D0 is inviolable, immeasurable, and non-rankable."
        - "D-profile is qualitative and not a dignity score."
        - "IA-box is an asymmetry check, not a verdict."
        - "Trajectories are preferred over labels."
        - "PMS coherence is insufficient by itself."
        - "PMS-CONFLICT reduced signatures are overlay shorthand only."
      implicit_norms:
        - "Structural clarity should not erase tragedy."
        - "Maturity language should not be used as a moral weapon."
        - "Responsibility requires knowledge, power, predictability, and alternatives."
        - "Public transmission increases obligations of restraint."
        - "Rival framings may be legitimate rather than immature."
      dignity_concepts:
        - "D0 ontological dignity remains untouched and outside all metrics."
        - "D1/D2 are not activated as full profile in this abstract case."
        - "Dignity in practice functions here as protection signal and guardrail."
        - "No ranking of lives, persons, victims, choosers, or theories is permitted."
      normative_position_of_D_reading: >
        The D reading is minimal and protective: it does not evaluate dignity,
        but it blocks degradation, humiliation, public shaming, person ranking,
        and reduction of persons to calculable objects.
    intuition:
      initial_intuition: >
        Initial intuition may pull toward solving the trolley dilemma or
        classifying action/omission as morally decisive. In MIP terms, this
        intuition is treated as a sensor of pressure, not as judge.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: >
        The case material explicitly concerns forced choice, harm, rescue, and
        responsibility-ascription, supporting the intuition that maturity
        pressure and asymmetry are relevant.
      contradicting_evidence: >
        The case lacks concrete scene evidence, so intuition cannot decide
        responsibility, moral rightness, legal duty, M-score, or D-profile.
    possible_alternative_interpretations:
      - "Consequentialist reading: the case is primarily about outcome comparison."
      - "Deontological reading: the case is primarily about prohibition, duty, and direct harm."
      - "Action/omission asymmetry reading: doing and allowing are structurally or morally distinct."
      - "Causal-responsibility reading: intervention and redirection matter more than outcome count."
      - "Role-duty reading: responsibility depends on mandate, office, or obligation."
      - "Tragedy reading: the case exposes unavoidable loss rather than solvable choice."
      - "Legal reading: causation, liability, justification, and evidentiary standards would govern if jurisdiction were supplied."
      - "Phenomenological reading: lived burden and distress may exceed structural modelling."
      - "Non-PMS/MIP reading: the dilemma may resist capture by these grammars."
    counter_perspective:
      from_other_side: >
        A rival theorist may argue that MIP maturity language is inappropriate
        for trolley dilemmas because the central issue is moral truth, not
        maturity-in-practice.
      from_affected_side: >
        Affected parties might reject being represented as abstract branches,
        quantities, or protected goods without voice.
      from_external_observer: >
        An external observer may accept the guardrail value of MIP while
        questioning whether A/M bands add discriminative force in a non-concrete
        philosophical case.

  open_questions_and_blind_spots:
    missing_information:
      - "Concrete variant of the trolley dilemma."
      - "Identity, role, mandate, and knowledge of the chooser-position."
      - "Actual available alternatives and feasibility."
      - "Foreseeability standard and probability structure."
      - "Causal mechanism and timing."
      - "Affected-party perspectives and vulnerability structure."
      - "Legal, institutional, or ethical standard if one is intended."
      - "Publicness and transmission context for any reuse."
      - "Whether a full D-module should ever be activated in a concrete use."
    uncertain_assumptions:
      - "That the case should remain purely conceptual and not operational."
      - "That weak CONFLICT-legibility adds clarity rather than unnecessary overlay weight."
      - "That MIP A/M language is useful despite the absence of concrete enactment."
      - "That non-capture zones are sufficiently protected by the current wording."
      - "That publicness remains private unless later reused."
    weak_points_in_analysis:
      - "A-score cannot be assigned as a true case score because no concrete enactment exists."
      - "M-score cannot be assigned to an actor because role, knowledge, power, and alternatives are absent."
      - "IA-box can only mark conceptual IA risk, not functional or inadult asymmetry."
      - "D-module cannot be fully activated because no concrete dignity enactments are present."
      - "Trajectory is a trajectory of analysis, not of an actor or event."
      - "The strong fit between frameworks may create under-discrimination risk."
    needed_perspectives:
      - "Ethical theorist for rival moral formalizations."
      - "Legal theorist if legal responsibility is introduced."
      - "Empirical decision researcher if psychological or behavioral claims are introduced."
      - "Affected-party perspective if a concrete case is introduced."
      - "Governance or AI safety reviewer if operational use is proposed."
      - "Dignity-sensitive moderator if the case is used publicly or pedagogically."

  possible_steps_towards_maturity:
    decision_mode: "non_operational_structural_reflection_only"
    functional_next_step:
      action: >
        Preserve the MIP analysis as a private structural working note and add
        explicit review before any teaching, publication, governance, legal, or
        implementation use.
      reversible: true
      responsible_role: "analyst_or_document_owner"
    short_term_feasible:
      - "Keep A/M bands clearly non-personal and non-concrete."
      - "Use the IA-box only as asymmetry risk check."
      - "Keep D-module off unless concrete guardrails are fulfilled."
      - "Preserve rival readings in any excerpt."
      - "Mark trolley-specific moral conclusions as outside this analysis."
    medium_term_feasible:
      - "Create separate concrete-case calibration rules if a specific trolley variant is later supplied."
      - "Compare PMS/MIP reading with consequentialist, deontological, legal, and tragedy-based models."
      - "Develop a transmission header for public or educational reuse."
      - "Define strict stop conditions for red-zone contexts."
    overambitious_or_risky:
      - "Using this analysis as a moral decision rule."
      - "Assigning high M to a hypothetical actor."
      - "Activating full D-profile without concrete scene and safe communication space."
      - "Treating CONFLICT weak legibility as terminal CONFLICT."
      - "Treating PMS/MIP coherence as validation of PMS Base or MIP."
      - "Ranking lives, persons, choosers, or moral theories."
    protection_first_if_low_M_high_harm:
      - >
        If a concrete case has high harm but low calibrated M due to missing
        predictability or alternatives, prioritize protection, voice, review,
        and harm limitation rather than blame.
      - >
        Do not let severe harm automatically raise M if knowledge, power,
        alternatives, and predictability were absent or uncalibrated.
    structural_change_if_high_M:
      - >
        If a later concrete case shows high knowledge, high power, clear
        predictability, real alternatives, and failed integration attempts,
        structural change should focus on transparency, justification,
        time-bounded review, reversibility, participation, and dignity
        protection.
      - >
        High M in a concrete institutional setting would require external
        accountability and cannot be inferred from the present abstract case.

  transmission_check:
    pre_transmission_gate_passed: true
    final_checklist:
      scope_and_guardrails_checked: true
      roles_and_publicness_checked: true
      score_hygiene_checked: true
      bias_norm_intuition_checked: true
      consequences_and_reversibility_checked: true
      D_cleanliness_checked_if_relevant: true
    status: "structurally_transmittable"
    if_not_transmittable_reason: "not_applicable_currently_transmittable_only_as_bounded_structural_working_note"
    allowed_use_of_this_analysis:
      - "internal_reflection"
      - "structural_case_review"
      - "ethics_reflection"
      - "training_simulation_without_person_ranking"
      - "model_comparison_with_explicit_boundaries"
    not_allowed_use:
      - "person_label"
      - "public_shaming"
      - "individual_sanction"
      - "HR_decision"
      - "forensic_use"
      - "clinical_diagnosis"
      - "legal_decision_support"
      - "moral_decision_algorithm"
      - "AI_policy_without_separate_validation"
      - "PMS_or_MIP_base_validation_claim"
