          distinction by marking Action_E under-specified and Responsibility_R
          weak. EDEN therefore refuses to treat NRK as enacted trust-action.
        activation_requirements:
          - "A real option-set inside a trust frame."
          - "Effective vulnerability or obligation asymmetry."
          - "A trajectory-bearing temporal sequence."
          - "Realization under directional praxis."
          - "Failure, absence, displacement, externalization, or simulation of Ψ."
          - "Failure of Σ to carry integration."
        non_activation_reasons:
