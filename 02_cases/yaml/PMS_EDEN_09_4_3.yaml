  eden_map_application:
    status: "completed_as_overlay"
    map_role: "scene_bound_mapping_protocol"
    map_rule: >
      EDEN-MAP is used only as a mapping discipline for the completed PMS Core
      case. It does not replace PMS dependencies, does not convert EDEN terms
      into PMS operators, and does not authorize person-level application. Each
      mapping result must remain reversible, evidence-sensitive, and open to
      alternative explanations.
    case_material_type: "abstract_conceptual_domain_projection"
    not_a_concrete_scene: true
    mapping_limits: >
      Because the trust case is not a concrete praxis scene, EDEN-MAP can
      identify possible structural locations and calibration requirements but
      cannot determine active drift, responsibility, breach, reciprocity loss,
      humiliation, devaluation, PFO, or switch permanentization.
    map_steps:
      step_1_core_scene_identification:
        question: "What is the scene or case-field being mapped?"
        answer: >
          The mapped field is Trust (Relational Regimes), an abstract
          philosophical case concerning reliance, vulnerability, expectation,
          confidence, doubt, withdrawal, repair, and betrayal among persons,
          roles, claims, or institutions. It is not a concrete scene with
          specified actors, event sequence, duty, evidence, institution, or
          enacted breach.
        status: "available_but_abstract"
        consequence: >
          EDEN can operate only as an overlay on the Core conceptual projection,
          not as an adjudication of an actual trust relation.
      step_2_core_pms_operator_anchors:
        question: "Which PMS operators anchor the Core case before EDEN is applied?"
        answer: >
          The Core case anchors trust primarily through □, Λ, Ω, Θ, Φ, and Χ,
          with Δ and ∇ structurally present, Α relevant but scene-dependent,
          Σ weak, and Ψ weak or conditional. This anchor pattern is preserved
          without rewriting the Core pass.
        status: "available"
        preserved_core_formula: "Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
        reflexive_extension: "Σ? ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
        self_binding_extension: "Ψ? ∘ Σ? ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
      step_3_threshold_and_breach_scan:
        question: "Is threshold explicitness or breach-as-chain-interruption visible?"
        threshold_result: "weak"
        breach_result: "weak"
        answer: >
          Threshold explicitness is weakly visible because trust includes the
          possibility that reliance, doubt, withdrawal, repair, or betrayal
          become explicit options. Breach-as-chain-interruption is weakly
          visible only because betrayal is named as possible case material.
          Neither is established as active because no event sequence is
          provided.
      step_4_nrk_scan:
        question: "Is NRK visible without confusing it with Action_E?"
        result: "weak_not_action_e"
        answer: >
          NRK is not active. The case lacks realization under ∇, failed Σ, and
          absent or displaced Ψ. The Core case explicitly marks Action_E as
          under-specified, so EDEN must keep NRK separate from PMS Action_E.
      step_5_comparison_and_pseudo_symmetry_scan:
        question: "Does the trust relation drift into comparison, pseudo-symmetry, or parity surface?"
        result: "risk_only"
        answer: >
          The case contains no comparison-dominant frame, value-relation pivot,
          parity surface, or appearance-management. EDEN marks false comparison
          and pseudo-symmetry only as possible trust-regime risks.
      step_6_asymmetry_switch_scan:
        question: "Is asymmetry activation valid, drifting, or absent?"
        result: "risk_only"
        answer: >
          Asymmetry is central to the Core trust case, but asymmetry-switch
          activation is not shown. A later concrete scene would need to show
          whether asymmetry activation is marked, bounded, and re-bound into
          Σ/Ψ or unmarked, repeatable, and responsibility-shifting.
      step_7_pfo_and_permanentization_scan:
        question: "Is PFO or permanentized exception switch applicable?"
        result: "not_applicable"
        answer: >
          PFO and permanentized exception switch are not applicable. The case
          lacks postfeminist regime context, Ω-taboo, comparison governance,
          protocol stabilization, permanentized switch availability, and blocked
          Σ/Ψ under a preserved parity surface.
      step_8_reciprocity_viability_scan:
        question: "What is the EDEN-positive viability reading?"
        result: "weak_viability_profile"
        answer: >
          Trust can be positively read as coordinated asymmetry rather than
          symmetry. EDEN therefore adds a viability profile: Ω must be legible,
          Χ must preserve distance, Σ must coordinate vulnerability and
          expectation, Ψ must anchor role-specific responsibility where
          warranted, and Dignity-in-Practice must constrain Ω-handling.
      step_9_reciprocity_loss_scan:
        question: "Is reciprocity loss active?"
        result: "risk_only"
        answer: >
          Reciprocity loss is not active but is a relevant risk. It would
          require chronic Λ, stabilized Α, Θ-erosion, real Ω, and failed or
          displaced Σ/Ψ. The abstract case does not supply those conditions.
      step_10_description_application_firewall:
        question: "Does the EDEN overlay preserve description/application separation?"
        result: "preserved"
        answer: >
          The overlay remains descriptive and structural. It does not prescribe
          action, assign blame, diagnose persons, label groups, infer ideology,
          rank moral standing, or claim PMS Base validation.
    eden_map_result:
      result_status: "usable_with_limits"
      strongest_overlay_contributions:
        - "threshold explicitness as weak option-visibility lens"
        - "breach as possible chain interruption, not knowledge gain"
        - "NRK kept separate from Action_E"
        - "trust as possible coordinated asymmetry rather than simple symmetry"
        - "reciprocity loss as risk requiring further evidence"
        - "strict rejection of PFO, PES, PTE, RTA, devaluation, and humiliation as active findings"
      weakest_or_non_applicable_overlay_contributions:
        - "PFO regime label"
        - "permanentized exception switch"
        - "parity-to-exit"
        - "responsibility-to-authority"
        - "dissatisfaction as system cost"
        - "fig leaves as legibility management"
        - "devaluation"
        - "humiliation"
      final_map_status: "bounded_overlay_projection_not_core_revision"

  pattern_library_application:
    status: "case_specific_selection"
    selection_rule: >
      Pattern handles are selected only where they add case-specific
      discrimination to the completed Core case. A pattern handle marked weak or
      risk does not become an active drift finding.
    selected_patterns:
      trust_as_coordinated_asymmetry:
        status: "weak_positive_profile"
        description: >
          Trust is not simple symmetry. It may require coordinated asymmetry:
          vulnerability, role, capacity, exposure, and repair burden must be
          made legible and coordinated rather than hidden behind parity or
          converted into authority.
        pms_basis:
          operators:
            - "Ω"
            - "Θ"
            - "Σ"
            - "Ψ"
            - "Χ"
          derived_axes:
            - "D"
        case_specific_value: >
          This is the most constructive EDEN addition to the trust case. It
          sharpens the Core warning that Ω is central but not moral blame:
          trust becomes viable only where asymmetry can be handled through
          distance, integration, and conditional self-binding without
          humiliation or ranking.
      trust_breach_as_interruption_not_enlightenment:
        status: "weak"
        description: >
          Betrayal or breach should not be romanticized as knowledge gain or
          maturity proof. EDEN treats breach as possible interruption of praxis
          continuity, generating consequence-field legibility rather than
          epistemic surplus.
        pms_basis:
          operators:
            - "∇"
            - "□"
            - "Λ"
            - "Ω"
            - "Θ"
            - "Σ"
            - "Ψ"
        case_specific_value: >
          The Core case already avoids treating rupture as automatic maturity
          failure. EDEN adds that breach should also not be treated as automatic
          insight, progress, or higher knowledge.
      trust_repair_without_forced_reconciliation:
        status: "weak"
        description: >
          Repair may require Φ, Χ, Σ, and Ψ, but repair is not identical with
          recontextualization, forgiveness, restoration, or renewed reliance.
          Repair may also involve bounded withdrawal or refusal.
        pms_basis:
          operators:
            - "Φ"
            - "Χ"
            - "Σ"
            - "Ψ"
            - "Ω"
            - "Θ"
        case_specific_value: >
          This pattern supports the Core discipline that Φ must not absorb
          rupture too smoothly and that Χ may preserve dignity by delaying or
          refusing restoration.
      false_reciprocity_warning:
        status: "risk"
        description: >
          A trust relation can claim reciprocity while externalizing unequal
          costs. EDEN marks this as a risk only where parity surface and real
          Ω are both present.
        pms_basis:
          operators:
            - "□"
            - "Ω"
            - "Θ"
            - "Σ"
            - "Ψ"
        case_specific_value: >
          The case does not supply false reciprocity, but the warning is useful
          for later trust scenes involving institutions, roles, promises, or
          repair burdens.
      refusal_as_possible_dignity_preservation:
        status: "active_as_guardrail"
        description: >
          Refusal, withdrawal, hesitation, or non-repair may preserve
          Dignity-in-Practice where renewed trust would erase Ω, override Χ, or
          force premature Σ.
        pms_basis:
          operators:
            - "Χ"
            - "Ω"
            - "Ψ"
          derived_axes:
            - "D"
        case_specific_value: >
          This pattern is important because EDEN drift language could otherwise
          overread refusal as reciprocity loss. The overlay preserves refusal as
          possible adequate praxis.
      pfo_rejection_pattern:
        status: "active_as_boundary"
        description: >
          Do not use PFO unless the specific EDEN regime conditions are present:
          Ω-taboo, comparison governance, permanentized exception-switch
          availability, protocol stabilization, suppressed Σ, and displaced
          Ψ across Θ.
        pms_basis:
          operators:
            - "□"
            - "Ω"
            - "Φ"
            - "Λ"
            - "Α"
            - "Σ"
            - "Ψ"
            - "Θ"
            - "Χ"
        case_specific_value: >
          This pattern prevents overextension. The trust case is too general to
          warrant PFO, and applying the label would violate EDEN restraint.

  overlay_claim_typing:
    claim_status: "overlay_case_projection"
    case_type: "conceptual_domain_projection_with_eden_overlay"
    empirical_status: "not_empirical"
    result_status: "reversible_overlay_projection"
    not_a_concrete_scene: true
    pms_base_validation: false
    eden_profile_validation: false
    core_rewrite: false
    implementation_claim: false
    diagnostic_claim: false
    legal_forensic_claim: false
    metaphysical_claim: false
    clinical_claim: false
    ideology_claim: false
    group_label_claim: false
    person_label_claim: false
    claim_boundary: >
      The EDEN overlay adds paper-internal structural visibility to the
      completed PMS Core case but does not validate PMS Base, validate
      PMS-EDEN, decide empirical truth, establish metaphysical claims, diagnose
      persons, identify ideology, classify groups, adjudicate legal breach, or
      implement any operational system.
    positive_claims:
      - "EDEN can weakly illuminate threshold explicitness in trust."
      - "EDEN can weakly illuminate breach as possible chain interruption."
      - "EDEN can clarify that NRK is not PMS Action_E."
      - "EDEN can sharpen trust as coordinated asymmetry rather than simple symmetry."
      - "EDEN can identify reciprocity loss as a risk requiring further evidence."
    negative_claims:
      - "PFO is not applicable to the abstract case."
      - "Permanentized exception switch is not applicable to the abstract case."
      - "Parity-to-exit is not applicable to the abstract case."
      - "Responsibility-to-authority is not applicable to the abstract case."
      - "Devaluation and humiliation are not active findings."
      - "No switch label is a person label."
      - "No EDEN term becomes a PMS operator."

  boundary_conditions:
    status: "active"
    general_boundary_rule: >
      Boundary conditions determine where the EDEN overlay must stop, weaken,
      reverse, or defer to alternative explanations. They preserve Χ,
      reversibility, Dignity-in-Practice, non-capture, and PMS Base discipline.
    case_boundary_conditions:
      non_concrete_scene_boundary:
        status: "active"
        meaning: >
          The trust case is abstract. EDEN can map possible structures but
          cannot identify active drift, actual breach, culpability,
          reciprocity loss, PFO, humiliation, or devaluation.
      threshold_boundary:
        status: "active"
        meaning: >
          Threshold explicitness requires a concrete shift in option visibility.
          Naming betrayal as possible is not enough.
      breach_boundary:
        status: "active"
        meaning: >
          Breach requires framed expectation and an enacted or omitted
          realization under ∇ within □, with consequence-field legibility under
          Ω/Θ/Λ. Absence alone is insufficient.
      nrk_boundary:
        status: "active"
        meaning: >
          NRK requires failed or absent Σ/Ψ in a concrete realization sequence.
          It must not be treated as Action_E.
      pseudo_symmetry_boundary:
        status: "active"
        meaning: >
          PS requires a parity surface plus real Ω and blocked or simulated
          Σ/Ψ. General reciprocity, mutual vulnerability, or equality language
          is not enough.
      asymmetry_switch_boundary:
        status: "active"
        meaning: >
          Asymmetry activation is not automatically drift. It becomes drift only
          if unmarked, repeatable, and responsibility-shifting rather than
          marked, bounded, and re-bound into Σ/Ψ.
      pfo_boundary:
        status: "active"
        meaning: >
          PFO requires EDEN-specific regime evidence. It cannot be inferred
          from trust, vulnerability, institutional asymmetry, gendered
          discourse, conflict, or comparison alone.
      reciprocity_loss_boundary:
        status: "active"
        meaning: >
          Reciprocity loss requires Θ-erosion of Σ/Ψ-carried coordination under
          real Ω with chronic Λ and stabilized Α. A single rupture, refusal, or
          delay is not sufficient.
      dignity_boundary:
        status: "active"
        meaning: >
          Dignity-in-Practice is a constraint on analysis and application. It
          does not assert ontological dignity, rank persons, or assign moral
          superiority.
      non_capture_boundary:
        status: "active"
        meaning: >
          If EDEN does not explain a trust scene, the residue may be genuine
          non-capture rather than failed calibration or hidden drift.
    stop_conditions:
      - "Stop EDEN drift labeling if concrete operator evidence is absent."
      - "Stop PFO use unless regime-level conditions are supplied."
      - "Stop switch labeling if activation is valid, marked, bounded, and re-bound."
      - "Stop reciprocity-loss claims where refusal or withdrawal preserves Dignity-in-Practice."
      - "Stop NRK claims where Action_E is merely under-specified rather than failed."
      - "Stop humiliation or devaluation claims where no standing-lowering script is evidenced."

  alternative_explanations:
    status: "preserved"
    rule: >
      Alternative explanations must remain open. EDEN overlay fit is not
      sufficient to displace other readings, and EDEN terms must not absorb
      every rupture, refusal, disagreement, or non-fit into drift.
    alternatives:
      phenomenological_account:
        status: "open"
        description: >
          Trust may be better explained in a concrete case as lived openness,
          exposure, confidence, vulnerability, or affective relation rather than
          through EDEN drift grammar.
        relation_to_eden: >
          EDEN can structure some relational conditions but does not exhaust the
          lived phenomenology of trust.
      moral_philosophical_account:
        status: "open"
        description: >
          Trust may be analyzed as fidelity, promise, virtue, betrayal,
          responsibility, forgiveness, or repair within moral philosophy.
        relation_to_eden: >
          EDEN can clarify structural asymmetry and drift risk but does not
          settle moral status, blame, or obligation.
      legal_institutional_account:
        status: "open"
        description: >
          Trust may involve legal reliance, fiduciary duty, procedural
          legitimacy, evidentiary breach, or institutional accountability.
        relation_to_eden: >
          EDEN does not determine legal duty, breach, liability, evidence
          threshold, or forensic responsibility.
      sociological_account:
        status: "open"
        description: >
          Trust may be analyzed as social capital, norm stabilization,
          institutional legitimacy, role confidence, or public order.
        relation_to_eden: >
          EDEN may illuminate reciprocity loss or pseudo-symmetry risk but does
          not replace empirical sociology.
      psychological_account:
        status: "open"
        description: >
          Trust may be studied empirically or clinically in relation to
          attachment, trauma, expectation, confidence, or threat response.
        relation_to_eden: >
          EDEN does not diagnose attachment, trauma, personality, pathology, or
          mental state.
      game_theoretic_account:
        status: "open"
        description: >
          Trust may be modeled as risk under uncertainty, repeated interaction,
          cooperation, defection, or incentive structure.
        relation_to_eden: >
          EDEN provides a praxeological overlay but does not replace formal
          strategic modeling.
      linguistic_pragmatic_account:
        status: "open"
        description: >
          Trust may concern testimony, sincerity, uptake, speech acts,
          credibility, promise, or communicative repair.
        relation_to_eden: >
          EDEN can map some frame and breach dynamics but does not exhaust
          linguistic-pragmatic analysis.
      political_theory_account:
        status: "open"
        description: >
          Trust may concern legitimacy, representation, institutional authority,
          public confidence, power, or domination.
        relation_to_eden: >
          EDEN does not convert political conflict into PFO or switch drift
          without concrete operator evidence.
      cultural_or_religious_account:
        status: "open"
        description: >
          Trust may carry cultural, theological, symbolic, ritual, or historical
          meanings not reducible to EDEN overlay terms.
        relation_to_eden: >
          EDEN uses Eden as a praxeological overlay profile and does not make
          theological or metaphysical claims.
    alternative_explanation_result: >
      All listed alternatives remain open. The EDEN overlay is a disciplined
      supplementary projection, not a displacement of rival formalizations.

  non_capture_zones:
    status: "preserved"
    rule: >
      Non-capture zones are not failures to be automatically repaired by EDEN.
      They mark areas where EDEN may be partial, inapplicable, or less
      discriminating than another framework.
    zones:
      affective_texture:
        description: >
          Trust may involve warmth, fear, grief, shame, relief, hope,
          tenderness, dread, or felt betrayal in ways EDEN does not capture.
        eden_status: "partial_capture_only"
      lived_vulnerability:
        description: >
          The lived exposure of relying on another may exceed structural Ω,
