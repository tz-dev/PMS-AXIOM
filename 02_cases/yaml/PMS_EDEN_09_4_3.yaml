pms_axiom_eden_overlay_case:
  schema_version: "PMS-AXIOM_EDEN_OVERLAY_CASE_TEMPLATE_v0.2"
  case_schema_version: "PMS-EDEN_CASE_2.0"
  schema_role: "axiom_addon_overlay_case_application"
  overlay_model: "PMS-EDEN"
  overlay_schema_version: "PMS-EDEN_2.0"
  eden_case_template_source: "PMS-EDEN_CASE_2.0"
  base_model: "PMS"
  base_schema_version: "PMS_1.3"
  axiom_status: "addon_layer_only_over_completed_core_case"
  output_role: "append_or_integrate_after_completed_pms_core_case"

  template_purpose: >
    Provide an AXIOM-compatible PMS-EDEN overlay for one already completed
    PMS-Core case. The overlay demonstrates the EDEN case-template structure
    over the Core trust projection without regenerating the Core pass,
    redefining PMS operators, changing PMS dependencies, replacing derived PMS
    axes, or converting structural description into diagnosis, verdict,
    prescription, advice, intervention, person-status claim, sex truth, moral
    ranking, legal/clinical/forensic conclusion, or PMS-Base validation.

  source_alignment:
    pms_base:
      source_file: "PMS.yaml"
      schema_version: "PMS_1.3"
      role: "base operator grammar and application guardrails"
    eden_profile:
      source_file: "PMS-EDEN.yaml"
      schema_version: "PMS-EDEN_2.0"
      role: "current EDEN application overlay/profile"
    eden_repo_case_template:
      source_file: "PMS-EDEN_CASE_2.0"
      role: "field structure for PMS-EDEN scene-bound case mapping"
    axiom_policy: >
      PMS-EDEN is used here only as an add-on overlay over an existing PMS-Core
      case. PMS-Core remains the completed base pass; this block adds EDEN
      visibility, boundary testing, and quality-control fields only.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML: Trust (Relational Regimes)"
    core_case_identifier: "trust_relational_regimes"
    core_case_title: "Trust (Relational Regimes)"
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
    rule: >
      This EDEN block is an overlay/application profile only. It may use the
      completed PMS Core pass as an anchor, but it does not regenerate,
      correct, or replace that pass; it does not redefine PMS operators, alter
      PMS dependencies, revise derived PMS axes, or treat EDEN constructs as PMS
      Base.
    preserved_core_elements:
      - "PMS operator inventory: Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS repository operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application gate: Χ, reversibility, Dignity-in-Practice"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
      - "Completed Core claim boundary: conceptual projection, not concrete scene adjudication"

  pms_v13_and_eden_conformity:
    status: "conformant_overlay_with_case_limits"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    overlay_only: true
    pms_R_axis_preserved: true
    pms_D_axis_preserved: true
    pms_E_strict_action_preserved: true
    eden_responsibility_principle_is_overlay_attribution_rule: true
    eden_constructs_are_not_pms_base: true
    adult_reciprocity_is_not_new_pms_axis: true
    reciprocity_loss_is_not_new_pms_axis: true
    correctability_is_not_new_pms_axis: true
    minimal_recovery_signature_is_not_new_pms_axis: true
    reduced_signature_policy:
      QC_EXT_reduced_signatures_are_overlay_shorthand_only: true
      reduced_signatures_do_not_replace_full_PMS_dependencies: true
      reduced_signatures_do_not_define_new_dependency_paths: true
      chi_dependency_preserved: "Χ still presupposes Φ, Θ, and □ within PMS."
      sigma_dependency_preserved: "Σ still presupposes Χ and Φ within PMS."
      psi_dependency_preserved: "Ψ still presupposes Σ, Θ, and Χ within PMS."
      note: >
        EDEN formulas, traces, QC-EXT markers, and reduced signatures are used
        only as overlay shorthand for already defined PMS operators and derived
        axes. They are not PMS operator redefinitions, dependency changes,
        alternative derivations, or additional axioms.

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    status: "pms_operator_reference_only"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      The overlay uses PMS operators as references only. EDEN labels such as
      Adult Reciprocity, False-Coordinated Real Asymmetry, Action-Power,
      correctability, PFO, AEP, Immunization, Overexposure, and Reciprocity
      Loss do not become PMS operators, PMS axes, or dependency nodes.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >
      PMS-EDEN_2.0 constructs, EDEN-MAP fields, profiles, mechanisms,
      benchmarks, boundaries, falsifiers, and viability signatures organize
      existing PMS operators only. They do not become PMS operators, PMS axes,
      PMS dependencies, additional AXIOM layers, or independent application
      authority.

  eden_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-theological, non-clinical, non-diagnostic."
      - "No person-level judgment, no group label, no ideology claim, no sex ranking, no sanction logic."
      - "No psychology, motive, intention, trauma, or inner-state inference from EDEN mapping."
      - "No moral verdict logic and no application authority from description."
      - "Description and application remain firewalled by Χ, reversibility, D, contextual responsibility, affected-role contestation, and independent application authority."
    may_add_visibility_to:
      - "Adult Reciprocity as truthful coordination of real Ω in trust relations"
      - "Real Ω mapping before betrayal, repair, or responsibility attribution"
      - "Responsibility and Action-Power distribution in reliance, withdrawal, non-response, repair, and institutional trust"
      - "Σ/Ψ openness, weakness, blockage, simulation, avoidance, or externalization around trust effects"
      - "Cost distribution under Ω and Θ: exposure, waiting, explanation, speech, repair, dignity, legibility, and option loss"
      - "Non-action and non-binding relevance under □/Λ/Ω/Θ"
      - "Possible Immunization, Overexposure, AEP, PFO, or Reciprocity Loss only where scene evidence separately supports them"
      - "Counter-scenes, falsifiers, rivals, boundaries, and non-capture zones"
    must_not_do:
      - "treat EDEN as PMS Base"
      - "treat Adult Reciprocity, Action-Power, PFO, AEP, correctability, or Reciprocity Loss as PMS operators or axes"
      - "start from PFO, Fall, False Comparison, or sex category as master origin"
      - "infer person type, motive, moral rank, pathology, sex truth, or legal breach from trust structure"
      - "treat non-action as praxis by default or non-binding as avoidance by default"
      - "treat protection as immunity from R or responsibility as permission to degrade"
      - "claim full capture, final verdict, diagnosis, prescription, application authority, or PMS-Core correction"

  axiom_validity_gate:
    status: "partial"
    gate_type: "PMS_application_plus_EDEN_application_requirements"
    applies_to: "EDEN_overlay_application_in_AXIOM"
    canonical_pms_entry_condition:
      distance_Chi:
        id: "Χ"
        status: "maintained"
        case_application: >
          The overlay preserves non-verdictive distance by treating trust as a
          conceptual relational regime and by refusing betrayal, repair,
          responsibility, false coordination, or reciprocity loss as concrete
          findings without a bounded scene.
      reversibility:
        id: "reversibility"
        status: "maintained"
        case_application: >
          All EDEN mappings remain revisable, narrowable, suspendable, and
          defeasible. Rival accounts and non-capture zones from the Core pass
          remain open.
      dignity_in_practice_D:
        id: "D"
        status: "maintained"
        case_application: >
          The overlay does not shame, humiliate, rank, diagnose, sex-code, or
          person-label any trusting, relying, withdrawing, refusing, repairing,
          or institutionally positioned role.
    eden_application_requirements:
      scene_packet:
        status: "partial"
        note: >
          The Core case is a conceptual domain projection, not a bounded
          concrete scene. Role-positions can be stated generically, but no
          evidentiary scene packet is available.
      counter_scene_exposure:
        status: "present"
        note: >
          Counter-scenes include genuine vulnerability, legitimate refusal,
          bounded protection, honest non-binding, incapacity, rival trust
          theories, and PMS non-capture.
      contextual_responsibility:
        status: "partial"
        note: >
          R can be described only as a calibration requirement. No concrete
          structuring effect, legibility, capacity, alternatives, Θ trajectory,
          or Ω cost/exposure distribution is supplied.
      evidentiary_answerability:
        status: "present"
        note: >
          The overlay names falsifiers: absence of real Ω, no displaced R, open
          Σ/Ψ, legitimate non-action, rival account superiority, or lack of
          recurrence/correctability erosion.
      affected_role_contestation:
        status: "not_applicable"
        note: >
          No concrete affected parties are supplied. In any later scene use,
          affected roles must be able to contest packet, evidence, frame, R
          trace, and application without their contestation confirming EDEN.
      independent_application_authority:
        status: "not_authorized"
        note: >
          EDEN-MAP supplies no authority to confront, bind, diagnose, intervene,
          punish, prescribe, enforce, or convert description into obligation.
    invalid_if_any:
      - "core_case_rewritten_by_overlay"
      - "PMS_operator_redefined"
      - "PMS_derived_axis_redefined"
      - "PMS_dependency_altered"
      - "EDEN_construct_treated_as_PMS_base"
      - "QC_EXT_reduced_signature_treated_as_full_dependency_replacement"
      - "EDEN_by_vibe"
      - "PFO_by_vibe"
      - "real_Ω_asserted_without_scene_packet"
      - "false_coordination_claimed_without_real_Ω_displaced_R_and_blocked_or_weakened_or_simulated_or_avoided_or_externalized_Σ_Ψ"
      - "counter_scene_cannot_change_reading"
      - "no_falsifier_named"
      - "description_converted_directly_into_binding_or_obligation"
      - "responsibility_assigned_without_contextual_conditions"
      - "non_action_treated_as_praxis_by_default"
      - "non_binding_treated_as_avoidance_by_default"
      - "sex_or_person_label_substituted_for_scene_analysis"
      - "hidden_motive_or_psychology_inferred_from_operator_trace"
      - "humiliation_or_exposure_used_as_method"
      - "action_recommendation_or_intervention_protocol_added"
      - "legal_clinical_forensic_policy_or_HR_conclusion_added"
      - "D_suspended_for_truth_clarity_efficiency_punishment_or_resolution"

  case_meta:
    id: "eden_overlay_trust_relational_regimes"
    title: "Trust (Relational Regimes) — PMS-EDEN Overlay"
    subtitle: "EDEN application profile over completed PMS Core conceptual projection"
    status: "final_overlay"
    model: "PMS-EDEN"
    model_schema_version: "PMS-EDEN_2.0"
    base_schema: "PMS_1.3"
    file_name: "trust_relational_regimes_eden_overlay.yaml"
    authorship:
      originator: "T. Zöller"
      formalization_assistant: "ChatGPT"
    purpose: >
      Provide only the EDEN add-on layer for an already completed PMS Core case.
      The Core pass remains unchanged.
    base_core_case_ref: "Trust (Relational Regimes) / PMS_1.3 case_application"
    addon: "EDEN"
    output_role: "additional_EDEN_overlay_block_only"
    case_type: "legibility_case"
    axiom_overlay_focus: "mixed"
    primary_focus:
      construct: "Adult Reciprocity as truthful coordination of real Ω in trust"
      yaml_home: "PMS-EDEN.yaml.method_and_positive_baseline.adult_reciprocity"
      construct_status: "eden_normative_benchmark"
      secondary_constructs:
        - "false_coordinated_real_asymmetry"
        - "responsibility_principle"
        - "non_passivity_and_non_binding"
        - "sigma_psi_and_cost_distribution"
        - "description_to_action_firewall"
      not_a_case_of:
        - "PFO finding"
        - "AEP profile finding"
        - "sex-coded profile"
        - "diagnosis"
        - "legal breach determination"
        - "PMS Base validation"

  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_sex_ranking: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_legal_forensic_clinical_policy_or_HR_conclusion: true
    no_action_authorization: true
    no_application_authority_from_description: true
    no_humiliation_or_public_exposure_as_method: true
    description_to_action_firewall: "active"
    validity_gate_reference: "axiom_validity_gate"
    required_method_conditions:
      canonical_pms_entry_condition:
        - "Χ"
        - "reversibility"
        - "D"
      eden_application_requirements:
        - "scene_packet"
        - "counter_scene_exposure"
        - "contextual_responsibility"
        - "evidentiary_answerability"
        - "affected_role_contestation"
        - "independent_application_authority"
    core_rule: >
      Map EDEN relevance only as an overlay over the conceptual trust case; do
      not diagnose persons, prescribe action, rank sexes, authorize
      intervention, adjudicate betrayal, or revise PMS-Core.
    invalid_if_any:
      - "Χ_suspended_for_clarity_or_urgency"
      - "reversibility_suspended_for_verdict"
      - "D_suspended_for_truth_efficiency_resolution_or_punishment"
      - "scene_packet_replaced_by_impression"
      - "counter_scene_cannot_change_reading"
      - "responsibility_without_scene_conditions"
      - "description_converted_directly_into_binding"
      - "person_or_sex_label_substituted_for_scene_analysis"
      - "Core_layer_rewritten_by_EDEN_overlay"
      - "QC_EXT_reduced_signature_treated_as_PMS_dependency_replacement"
    prohibited_shortcuts:
      - "EDEN-by-vibe"
      - "PFO-by-vibe"
      - "identity-based_assignment"
      - "sex-truth_inference"
      - "personality_inference"
      - "motive_inference_from_operator_trace"
      - "description_converted_into_obligation"
      - "PMS-Core-correction-by-overlay"

  example_schema_alignment:
    status: "respected_with_conceptual_case_limits"
    required_fields_from_PMS_EDEN_CASE_2_0:
      case_schema_version: "case_schema_version / mapped to pms_axiom_eden_overlay_case.case_schema_version"
      case_meta: "case_meta"
      guardrails: "case_guardrails"
      vignette: "minimal_vignette"
      scene_packet: "scene_packet"
      pms_operator_trace: "pms_operator_trace"
      eden_map: "eden_map"
      construct_selection: "construct_selection"
      closure: "readable_structural_closure"
    required_eden_map_fields_present:
      - "scene_packet_summary"
      - "real_omega_mapping"
      - "dominant_false_coordination_frame"
      - "responsibility_and_action_power_distribution"
      - "sigma_psi_status"
      - "cost_distribution"
      - "non_action_and_non_binding"
      - "immunization_overexposure_AEP"
      - "counter_scene_and_falsifier"
      - "description_application_status"
      - "revision_point_or_open_question"
    axiom_adapter_fields_present:
      - "overlay_relationship_to_core"
      - "core_anchor"
      - "axiom_validity_gate"
      - "axiom_integration"
      - "eden_overlay_quality_control"
    axiom_adapter_note: >
      EDEN CASE 2.0 supplies the internal case-field structure. AXIOM adds the
      completed-Core anchor, overlay-only role, and final QC proving that the
      EDEN pass did not become a PMS-Core rewrite, PMS-Base revision, or
      independent application authority.

  example_suite_schema_alignment:
    status: "reference_only_embedded_in_AXIOM_overlay"
    source: "PMS-EDEN_CASE_2.0 reusable case template"
    axiom_case_policy: >
      This output is not a standalone PMS-EDEN example-suite artefact. The EDEN
      case template is used only as the internal overlay field structure over
      the already completed PMS-Core case.

  paper_structure_map_alignment:
    status: "reference_only"
    source: "PMS-EDEN.yaml.paper_structure_map"
    materially_relevant_regions:
      - "method_and_positive_baseline.adult_reciprocity"
      - "mechanism_architecture.false_coordinated_real_asymmetry"
      - "responsibility_and_praxis_architecture.responsibility_principle"
      - "responsibility_and_praxis_architecture.no_passive_praxis"
      - "responsibility_and_praxis_architecture.immunization_overexposure_and_AEP"
      - "regime_test_scene_and_loss_architecture.reciprocity_loss"
      - "boundary_and_application_architecture.counter_scene_protocol"
      - "boundary_and_application_architecture.falsifiers"
      - "boundary_and_application_architecture.eden_map"
    non_reproduced: true

  core_anchor:
    completed_core_case_summary:
      use: "anchor_only_not_rewrite"
      core_scene_boundary: >
        The completed Core case is explicitly not a concrete scene. It is a
        conceptual domain projection of trust as a relational praxis
        configuration involving reliance, vulnerability, expectation,
        confidence, doubt, withdrawal, repair, and betrayal.
      core_primary_operator_profile: >
        Core primary formula: Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ. Core treats Φ, Χ, Σ,
        and Ψ as available but not forced; Σ and Ψ remain weak or conditional.
      core_relevant_asymmetries:
        - "vulnerability"
        - "exposure"
        - "dependence"
        - "authority"
        - "capacity"
        - "information"
        - "role obligation"
        - "institutional power"
      core_relevant_non_events:
        - "absent expected reply"
        - "delayed or absent protection"
        - "unmet fidelity"
        - "missing recognition"
        - "unperformed repair"
        - "unresolved institutional response"
      core_relevant_temporalities:
        - "accumulated reliability"
        - "persistent confidence"
        - "growing doubt"
        - "remembered betrayal"
        - "repair trajectory"
        - "institutional history"
      core_boundary_notes:
        - "not empirical"
        - "not diagnostic"
        - "not legal or forensic"
        - "not implementation"
        - "not person ranking"
        - "not PMS Base validation"
        - "rival readings and non-capture remain open"
    core_to_eden_bridge:
      eden_relevance_trigger: >
        Trust centrally involves real Ω, cost/exposure distribution, framed
        expectation, non-events, temporality, repair, responsibility, and
        correctability. These make EDEN relevant as an overlay lens for asking
        whether real asymmetry is truthfully coordinated or falsely coordinated.
      what_eden_adds_beyond_core_visibility: >
        EDEN makes explicit the Adult Reciprocity benchmark, real Ω before
        failure attribution, responsibility/action-power distribution, Σ/Ψ cost
        entry, non-action/non-binding classification, immunization/overexposure
        guardrails, shared correctability, and the description/application
        firewall.
      what_must_remain_core_only: >
        The Core projection's general trust grammar, operator weights,
        dependency logic, derived axes, and quality-control findings remain Core
        findings. They are not converted into EDEN-specific claims of false
        coordination, PFO, AEP, or Reciprocity Loss.

  minimal_vignette:
    scene: >
      A generic trust relation is considered as a conceptual regime rather than
      a concrete event: one role relies, waits, exposes itself, or expects
      fidelity, response, protection, recognition, or repair; another role,
      institution, claim, or relational field is relied upon and may respond,
      fail, delay, clarify, refuse, repair, or remain non-bound. EDEN tests how
      real vulnerability and asymmetry can remain truthfully coordinated without
      converting reliance into rank, protection into immunity, responsibility
      into degradation, or non-response into automatic betrayal.
    temporal_boundary: >
      The boundary is the abstract trust trajectory from framed expectation
      through reliance, non-event, doubt, withdrawal, repair possibility, or
      rupture. No concrete beginning, recurrence threshold, or endpoint is
      evidenced.
    roles:
      - id: "role_A"
        label: "relying_or_exposed_position"
      - id: "role_B"
        label: "relied_upon_or_answerable_position"
      - id: "field_or_medium"
        label: "relational_institutional_or_testimonial_trust_frame"
    surface_description: >
      The surface phenomenon may appear as confidence, doubt, breach, repair,
      refusal, or institutional reliability. EDEN suspends any immediate verdict
      and first asks how Ω, R, costs, Σ/Ψ, non-action, and correctability are
      distributed.
    eden_question: >
      Does the trust regime show truthful coordination of real Ω, or does it
      become false coordination through displaced R and weakened, simulated,
      avoided, blocked, or externalized Σ/Ψ?

  scene_packet:
    specified_scene: "conceptual_trust_relation_only_not_concrete_scene"
    packet_status: "partial"
    role_positions:
      role_A:
        scene_position: "relying_or_exposed_position"
        not_identity: true
      role_B:
        scene_position: "relied_upon_or_answerable_position"
        not_identity: true
      field_or_medium:
        scene_position: "relational_institutional_testimonial_or_moral_trust_frame"
        not_identity: true
        optional: true
    dominant_frame:
      candidate_frame: "mixed"
      frame_description: >
        Trust may be framed as reliance, protection, recognition, fidelity,
        credibility, institutional reliability, repair, or refusal. No single
        EDEN false-coordination frame is established by the abstract material.
      frame_status: "indeterminate"
      false_coordination_boundary: >
        No trust frame is categorically false. False coordination would require
        concrete evidence of real Ω, displaced R, and blocked, weakened,
        simulated, avoided, or externalized Σ/Ψ.
    real_Ω:
      present: "partial"
      summary: >
        Real Ω is structurally relevant because trust entails vulnerability,
        exposure, dependence, capacity difference, obligation, information
        asymmetry, or institutional power. Its direction and magnitude remain
        uncalibrated without a concrete scene.
      dimensions:
        capacity: "mixed"
        exposure: "mixed"
        dependency: "mixed"
        protection: "mixed"
        obligation: "mixed"
        access: "indeterminate"
        timing_control: "indeterminate"
        frame_control: "indeterminate"
        recognition_control: "indeterminate"
        binding_control: "indeterminate"
        language_access: "indeterminate"
        explanation_burden: "indeterminate"
        vulnerability: "mixed"
        action_power: "indeterminate"
        risk: "mixed"
        cost: "mixed"
        exit_and_waiting_capacity: "indeterminate"
      mapping_question: >
        A later concrete case must specify what each asymmetry changes in
        options, exposure, cost, responsibility, repair access, criticizability,
        and correction access.
      asymmetry_not_failure_rule: "Asymmetry is not the failure; false coordination of asymmetry is the failure."
      multidimensional_guardrail: >
        Crossed asymmetries must remain visible; vulnerability, power,
        information, exit, timing, and obligation cannot be compressed into one
        rank.
    relevant_Λ:
      present: "partial"
      non_event_or_absence: "missing_response_or_repair_or_recognition_or_protection"
      scene_structuring_effect: >
        In trust, absence can matter where an expected response, fidelity,
        protection, recognition, explanation, or repair does not occur within a
        frame. The abstract case does not prove any concrete absence.
      no_passive_praxis_check: "Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ."
    non_action_relevance:
      status: "indeterminate"
      note: >
        Silence, delay, refusal, withdrawal, or non-response may be structuring
        non-events, integrated abstentions, legitimate boundaries, incapacity,
        restraint, or non-capture. The conceptual case cannot decide among
        these.
      boundary: >
        Non-action is not praxis by default and never proves motive,
        manipulation, drift, or responsibility.
    non_binding_relevance:
      status: "indeterminate"
      note: >
        Non-binding may preserve genuine openness, mark uncertainty, set a
        legitimate boundary, or shift Ψ-load through waiting, explanation, or
        suspended repair. No concrete distribution is established.
      boundary: >
        Non-binding may be legitimate where uncertainty, costs, alternatives,
        and exit or waiting conditions remain legible.
    Θ_trajectory:
      sequence:
        - step: 1
          description: "framed trust expectation or reliance becomes relevant"
        - step: 2
          description: "response, non-response, repair, refusal, doubt, or withdrawal may alter the relation"
        - step: 3
          description: "confidence, rupture, repair, responsibility, or non-capture remains case-dependent"
      trajectory_status: "indeterminate"
      trajectory_origin_note: >
