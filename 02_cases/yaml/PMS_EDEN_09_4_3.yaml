  eden_overlay_synthesis:
    primary_eden_reading: >
      EDEN makes trust legible as a domain where Adult Reciprocity would mean
      truthful coordination of real vulnerability, exposure, dependency,
      obligation, protection, and correction access. Because the Core case is a
      conceptual projection rather than a concrete scene, EDEN functions here as
      an overlay benchmark and falsifiable test architecture, not as a finding
      of false coordination.
    adult_reciprocity_result: "indeterminate_as_finding_but_available_as_benchmark"
    real_omega_result: >
      Real Ω is structurally relevant to trust but not concretely mapped in
      direction, magnitude, cost, or role distribution.
    false_coordination_result: >
      Not established. The abstract case does not show a false coordination
      frame, displaced R, or blocked/weakened/simulated/avoided/externalized
      Σ/Ψ.
    responsibility_action_power_result: >
      R and Action-Power remain scene-bound calibration requirements. No guilt,
      motive, moral rank, person type, or liability is assigned.
    sigma_psi_cost_result: >
      Σ/Ψ and cost distribution are indeterminate because Core marks Σ and Ψ as
      weak/conditional and no concrete cost-bearing scene is supplied.
    non_action_non_binding_result: >
      Non-action and non-binding are relevant test categories but cannot be
      classified without traceable □/Λ/Ω/Θ effects; legitimate openness,
      restraint, incapacity, boundary, and non-capture remain possible.
    immunization_overexposure_AEP_result: "not_supported"
    pfo_or_regime_result: "not_claimed"
    reciprocity_loss_result: "not_established"
    counter_scene_falsifier_result: >
      Strong counter-scenes include genuine vulnerability, legitimate refusal,
      bounded protection, honest uncertainty, lawful institutional procedure,
      rival theories of trust, and PMS non-capture. Principal falsifiers are no
      real Ω, no displaced R, open Σ/Ψ, legitimate non-action/non-binding, or a
      better rival explanation.
    boundary_non_capture_result: >
      Lived affect, culture, law, empirical trust dynamics, political theory,
      sociology, psychology, linguistic pragmatics, and principled refusal may
      remain outside EDEN capture.
    final_claim_boundary: >
      This EDEN overlay does not revise PMS Base, rewrite PMS-Core, introduce
      new PMS operators, change dependencies, treat QC-EXT reduced signatures as
      dependency replacements, diagnose persons, rank sexes, prescribe action,
      authorize intervention, validate PMS, or claim final capture.

  readable_structural_closure:
    summary: >
      The EDEN overlay reads the completed Trust Core case as a conceptual
      regime in which real Ω is structurally relevant through vulnerability,
      exposure, dependence, obligation, protection, and correction access. Adult
      Reciprocity is available as the positive benchmark: real Ω would need to
      remain visible, D preserved, R tied to real structuring effect, costs and
      effects integrated through Σ, and relevant positions Ψ-bound to their
      effects while Χ keeps revision possible. No dominant false-coordination
      frame is established because the Core case supplies no concrete scene, no
      displaced R, and no blocked Σ/Ψ evidence. Non-action and non-binding
      remain indeterminate test categories rather than findings. Immunization,
      Overexposure, AEP, PFO, and Reciprocity Loss are not claimed. The overlay
      is provisional, description-only, and bounded by counter-scenes,
      falsifiers, rival readings, and non-capture.
    main_formula_used: "Adult Reciprocity = real Ω visible + D preserved + R follows real structuring effect + Σ integrates costs/effects + Ψ binds relevant positions to effects + Χ keeps revision possible"
    support_level: "provisional"
    final_status: "description_only"
    final_guardrail: >
      This overlay maps a conceptual trust regime. It does not diagnose persons,
      rank sexes, prescribe action, authorize intervention, adjudicate breach or
      betrayal, or revise the completed PMS-Core case.
    required_final_phrase: >
      This remains a scene-bound structural EDEN overlay, not a diagnosis,
      verdict, prescription, application authority, person-status claim, sex
      truth, or PMS-Core revision.

