      case_application: >
        Reciprocity is weakly relevant as the positive EDEN overlay for trust:
        trust can be understood as coordinated asymmetry rather than simple
        symmetry. This is especially important because trust often involves
        unequal exposure, unequal capacity, unequal repair burden, unequal
        informational access, or unequal institutional power, while still
        requiring a relation that is not domination, ranking, humiliation, or
        unilateral control. EDEN therefore sharpens the Core PMS reading by
        asking whether Ω is made legible, whether Χ prevents premature coercive
        restoration, whether Σ actually coordinates vulnerability and
        expectation, and whether Ψ is anchored as role-specific self-binding
