          vulnerability is central.
        eden_status: "partial_capture_only"
      cultural_semantics:
        description: >
          Trust, betrayal, faith, loyalty, fidelity, honor, and repair may have
          cultural and linguistic meanings not reducible to EDEN signatures.
        eden_status: "partial_capture_only"
      legal_thresholds:
        description: >
          Legal trust, fiduciary duty, negligence, fraud, evidentiary burden,
          and breach require external legal standards outside EDEN.
        eden_status: "outside_overlay_authority"
      empirical_dynamics:
        description: >
          Actual trust formation, breakdown, and repair require empirical
          evidence and may follow patterns not captured by the overlay.
        eden_status: "requires_empirical_validation"
      legitimate_refusal:
        description: >
          Refusal to trust, refusal to repair, or withdrawal may be adequate
