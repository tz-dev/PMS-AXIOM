  eden_overlay_synthesis:
    synthesis_status: "complete"
    core_case_preserved: true
    overlay_role: "supplementary_structural_visibility"
    final_summary: >
      Applied to Trust (Relational Regimes), PMS-EDEN functions as a disciplined
      overlay that sharpens a few structural questions already latent in the
      PMS Core case: when trust becomes an explicit threshold field; when
      betrayal would count as praxis-chain interruption rather than knowledge
      gain; when responsibility-kernel language must be kept separate from
      integrated Action_E; when trust should be understood as coordinated
      asymmetry rather than simple symmetry; and when reciprocity loss would
      require chronic, stabilized, temporally erosive evidence rather than a
      single rupture, refusal, absence, or disagreement. The overlay therefore
      does not make the trust case more dramatic; it makes the limits of
      dramatic readings more visible. It prevents betrayal-language from
      becoming automatic Fall-logic, asymmetry-language from becoming PFO logic,
      refusal from becoming reciprocity-loss, and responsibility-language from
      becoming authority or diagnosis.
    primary_eden_overlay_formula:
      formula: >
        TRUST_EDEN_overlay = RECIPROCITY? as coordinated Ω across Θ with Χ,
        Σ?, and Ψ? under D, while THRESHOLD?, BREACH?, NRK?, PS?, and
        RECIPROCITY_LOSS? remain evidence-dependent risk or calibration
        handles.
      formula_status: "overlay_shorthand_only"
      dependency_note: >
        The formula is not a PMS operator chain and does not replace PMS
        dependencies. It is an EDEN shorthand for case-relevant overlay
        visibility. Question marks are essential: they mark conditional
        applicability, not hidden activation. Reduced EDEN signatures remain
        overlay compression only and must be expanded against PMS.yaml before
        any stronger claim is made.
    recommended_overlay_reading: >
      The recommended EDEN reading is conservative: keep trust primarily under
      the completed Core PMS formula, then add EDEN only to test whether
      threshold explicitness, breach-chain interruption, false comparison,
      pseudo-symmetry, asymmetry-switch drift, or reciprocity loss are
      warranted. For the current abstract case, only threshold explicitness,
      breach possibility, reciprocity as coordinated asymmetry, and
      reciprocity-loss risk are weakly relevant. The stronger EDEN drift
      profiles are not applicable. This means that EDEN is most useful here not
      as an amplifier of drift claims, but as a restraint mechanism: it demands
      concrete evidence before breach, NRK, pseudo-symmetry, PFO, reciprocity
      loss, devaluation, or humiliation are activated.
    final_conformity_statement: >
      This EDEN overlay conforms to PMS.yaml as the sole PMS Base reference,
      treats PMS-EDEN as an overlay/application profile only, preserves all PMS
      operators and dependencies, keeps reduced signatures as shorthand, avoids
      person labels and group labels, preserves Χ, reversibility, and
      Dignity-in-Practice, and leaves alternative explanations and non-capture
      open. Its strongest result is therefore negative as much as positive:
      EDEN can illuminate trust, but in this abstract case it mostly prevents
      over-reading.