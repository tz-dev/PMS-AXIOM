  drift_catalogue:
    catalogue_status: "overlay_only"
    catalogue_rule: >
      The EDEN drift catalogue supplies paper-internal drift handles for
      additional inspection of the completed PMS Core case. These handles are
      not PMS operators, not person labels, not group labels, not diagnoses,
      not ideology claims, not moral verdicts, and not PMS Base revisions.
      They may identify possible structural risks only where the completed Core
      case or a later concrete scene supplies the required PMS operator
      evidence.
    application_summary: >
      For Trust (Relational Regimes), EDEN drift visibility is limited because
      the case is abstract and not a concrete praxis scene. The most relevant
      EDEN additions are threshold explicitness, breach as possible
      chain-interruption, reciprocity as coordinated asymmetry, and
      reciprocity-loss risk. The stronger drift regimes, including PFO,
      permanentized exception switch, parity-to-exit, responsibility-to-authority,
      devaluation, and humiliation, are not established.
    drift_items:
      eden_ground_state_drift_from_non_deficit_relation:
        label: "Ground-state loss from non-deficit relation"
        status: "weak"
        not_a_diagnosis: true
        not_a_person_label: true
        description: >
          A trust relation can be read in EDEN terms as beginning from or
          aspiring toward a non-deficit relational condition: reliance is
          possible without immediate suspicion, comparison pressure, coercive
          verification, or anticipated betrayal. Drift would occur if trust
          loses this non-deficit availability and becomes organized primarily
          around deficit, suspicion, comparison, or defensive exposure
          management.
        pms_basis:
          operators:
            - "Δ"
            - "∇"
            - "□"
            - "Λ"
            - "Α"
            - "Ω"
            - "Θ"
            - "Χ"
            - "Σ"
            - "Ψ"
          derived_axes:
            - "A"
            - "C"
            - "D"
        case_application: >
          The Core case supports this only weakly. It describes trust as a
          relational condition involving reliance, vulnerability, expectation,
          confidence, doubt, withdrawal, repair, or betrayal, but it does not
          provide an initial non-deficit scene or show its loss. EDEN therefore
          treats the ground-state reading as a possible overlay lens, not as an
          active drift finding.
        activation_requirements:
          - "A specified relational frame in which trust is initially available without deficit pressure."
          - "Evidence that reliance, vulnerability, and expectation were not yet governed by comparison, suspicion, or coercive repair pressure."
          - "A temporal sequence showing movement away from that condition."
        non_activation_reasons:
          - "No concrete initial scene is supplied."
          - "No sequence of ground-state loss is supplied."
          - "No comparison-dominant or deficit-pressure regime is supplied."
        boundary_conditions:
          - "Healthy caution or reflective distance must not be misread as loss of Edenic trust."
          - "Refusal to trust may be adequate praxis and not necessarily drift."
          - "A non-deficit relation is not the same as naivety, innocence, ignorance, or absence of Difference."
        alternative_explanations:
          - "ordinary prudence"
          - "role-appropriate confidentiality"
          - "trauma-informed boundary without diagnostic inference"
          - "institutional risk management"
          - "legitimate refusal of trust"

      threshold_explicitness_drift:
        label: "Threshold explicitness"
        status: "weak"
        not_a_diagnosis: true
        not_a_person_label: true
        description: >
          Threshold explicitness marks the moment or condition in which a
          negative praxis option becomes visible as selectable within a frame
          across time. In trust, this may mean that betrayal, withdrawal,
          refusal, strategic doubt, or non-repair becomes a visible option
          inside the relation.
        pms_basis:
          operators:
            - "Δ"
            - "□"
            - "Θ"
          derived_axes:
            - "A"
        case_application: >
          The abstract case makes threshold explicitness weakly relevant because
          trust includes reliance, doubt, withdrawal, repair, and betrayal as
          available relational terms. However, no concrete threshold event is
          provided. EDEN therefore does not claim a breach, fall, or action; it
          only marks that option-visibility may be structurally important in a
          later scene.
        activation_requirements:
          - "A framed trust relation with a previously unavailable or unselected negative option."
          - "A temporal point or interval in which betrayal, withdrawal, refusal, or non-repair becomes explicitly selectable."
          - "Evidence that the option becomes relevant within □ and not merely as external speculation."
        non_activation_reasons:
          - "No threshold scene is supplied."
          - "No actor, role, or institution is shown selecting a negative option."
          - "No transition from unmarked to explicit option-visibility is shown."
        boundary_conditions:
          - "Awareness of possible betrayal is not itself betrayal."
          - "Doubt is not itself breach."
          - "Explicit options may increase responsibility without automatically producing drift."
        alternative_explanations:
          - "ordinary maturation of expectation"
          - "risk literacy"
          - "transparent boundary-setting"
          - "role clarification"
          - "procedural due diligence"

      breach_as_chain_interruption:
        label: "Breach as chain interruption"
        status: "weak"
        not_a_diagnosis: true
        not_a_person_label: true
        description: >
          EDEN treats breach not as knowledge gain but as interruption of a
          praxis chain: realization occurs under ∇ within □ while Σ does not
          carry integration and Ψ does not carry durable binding. In trust, this
          can correspond to betrayal, non-repair, or violation of reliance only
          where a concrete framed expectation and action sequence are supplied.
        pms_basis:
          operators:
            - "∇"
            - "□"
            - "Ω"
            - "Θ"
            - "Λ"
            - "Σ"
            - "Ψ"
          derived_axes:
            - "C"
            - "R"
            - "E"
        case_application: >
          Betrayal is named in the Core case, but no concrete betrayal is shown.
          Therefore breach-as-chain-interruption is not an active conclusion.
          It remains a weak overlay lens for later concrete analysis: a trust
          breach would need to show framed expectation, realization or omission,
          consequence-field legibility under Ω/Θ/Λ, and absent or failed Σ/Ψ.
        activation_requirements:
          - "Specified trust frame and expectation."
          - "A realization, omission, or refusal occurring under ∇ within □."
          - "Evidence that Σ does not integrate the conflict."
          - "Evidence that Ψ is absent, aborted, displaced, simulated, or externalized."
          - "Consequence-field legibility under Ω and Θ."
        non_activation_reasons:
          - "The Core case is not a concrete scene."
          - "No enacted breach is supplied."
          - "Action_E is already marked under-specified in the Core case."
        boundary_conditions:
          - "Breach cannot be inferred from absence alone."
          - "A legitimate refusal of trust is not automatically chain interruption."
          - "Non-response may be boundary, incapacity, ambiguity, rival framing, or non-capture."
        alternative_explanations:
