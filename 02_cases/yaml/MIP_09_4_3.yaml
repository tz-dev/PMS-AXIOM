    D_summary_if_activated: 'D is activated as a qualitative protection layer only: protect D0, avoid person labels, keep
      D1/D2 role-bound, and prevent humiliation, degradation, or public shaming through the analysis.'
    trajectory_summary: The trajectory moves from abstract case material to PMS Core mapping, EDEN overlay restraint, and
      MIP synthesis. Documentation maturity increases, but concrete case evidence does not.
    guardrail_status: 'Guardrails are fulfilled for green-zone theoretical use: profile-not-person, score hygiene, red-zone
      exclusion, D protection, reversibility, and system awareness are maintained.'
    transmission_status: working_note; not a decision basis
    practical_implications: 'Use this analysis to prepare future scene-specific inquiry: specify roles, expectations, timeline,
      asymmetry, publicness, alternatives, and affected perspectives before any score, IA result, responsibility reading,
      or D-profile is transmitted.'
    conclusion: 'MIP confirms the prior PMS and EDEN discipline: trust is structurally rich but must not be over-scored, over-moralized,
