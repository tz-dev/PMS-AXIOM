schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
analysis_profile:
  model_used: MIP - Maturity in Practice
  mode: full_depth_analysis
  reflection_mode: 'off'
  output_format: yaml
  language: en
  basis:
  - MIP YAML as model reference and case-output schema
  - completed PMS Core case YAML for Trust (Relational Regimes)
  - completed PMS-EDEN overlay application for Trust (Relational Regimes)
  relation_to_pms: MIP is applied here as a separate praxeological analysis layer over the completed PMS Core and PMS-EDEN
    case analyses. It does not redefine PMS operators, PMS dependencies, PMS derived structures or PMS guardrails.
  case_status: abstract_conceptual_domain_projection_not_concrete_scene
case:
  meta:
    case_id: MIP-TRUST-RELATIONAL-REGIMES-2026-05-29
    case_title: Trust (Relational Regimes) — MIP analysis based on PMS Core and PMS-EDEN overlay
    documentation_date: '2026-05-29'
    analysts:
    - name: ChatGPT (GPT-5.5 Thinking)
      role: structural analysis assistant applying MIP case template
      observer_position: external formalization role; not a participant, witness, adjudicator, clinician, legal evaluator,
        or affected party
    language: en
    confidentiality_level: internal_structural_working_note; no identifiable persons; no public D-reading about persons
    analysis_mode: full
    intended_use: structural_case_review_and_theoretical_reflection_based_on_prior_PMS_and_EDEN_outputs
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: philosophy_anthropology
      d_activation_decision: activated_as_protection_oriented_qualitative_layer_only
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: true
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: 'The case material defines trust as a relational condition: reliance, vulnerability, expectation, confidence,
      doubt, withdrawal, repair, or betrayal shaping relations between persons, roles, claims, or institutions.'
    secondary_material: The completed PMS Core case YAML treats trust as a reversible conceptual PMS projection, not a concrete
      scene. It marks □, Λ, Ω, Θ, Φ and Χ as major; Δ and ∇ as structurally active; Α as recurrence-dependent; Σ and Ψ as
      weak or conditional; Action_E as under-specified; Dignity-in-Practice as application constraint. The completed PMS-EDEN
      overlay treats EDEN as an application profile only and adds weak threshold, breach, reciprocity, and reciprocity-loss
      lenses while rejecting PFO, permanentized exception switch, parity-to-exit, responsibility-to-authority, devaluation,
      humiliation, and active NRK as findings.
    assumptions_and_inferences: This MIP pass assumes that the object of observation is not a person, group, institution,
      legal event, clinical case, or empirical dataset, but an abstract structural case-field. MIP A-C-R-P-D terms are not
      identical to PMS derived Awareness/Coherence/Responsibility/Action/Dignity structures; overlap is handled by explicit
      translation discipline. Any score-like field is treated as non-assigned or qualitative because the case lacks concrete
      enactment evidence.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: high for conceptual structure; low for scene-specific adjudication
      reliability_estimate: reliable as bounded structural synthesis of prior YAML analyses; not reliable for empirical, legal,
        clinical, organizational, or person-level conclusions
      known_gaps:
      - No concrete actors, roles, event sequence, institution, duty, harm, communication act, repair attempt, or betrayal
        scene are supplied.
      - No empirical evidence is supplied for trust formation, breach, withdrawal, or repair.
      - No affected-party perspective, counterparty perspective, institutional record, timeline, or publicness context is
        supplied.
      - No operational context is supplied for using the analysis in practice.
      main_bias_risks_here:
      - 'Conceptual smoothness bias: trust fits MIP and PMS categories easily, which may hide under-discrimination.'
      - 'Maturity inflation bias: a coherent model output might be mistaken for mature praxis.'
      - 'Asymmetry moralization bias: vulnerability might be mistaken for automatic blame, authority, or responsibility.'
      - 'Repair normativity bias: trust analysis might overvalue reconciliation and undervalue legitimate refusal or withdrawal.'
      - 'Overlay amplification bias: EDEN risk terms might be over-read as active drift findings.'
  snapshot:
    short_case_description: Trust is analyzed as a relational regime in which reliance, vulnerability, expectation, confidence,
      doubt, withdrawal, repair, and betrayal become structurally meaningful. The MIP question is not who is mature or immature,
      but what maturity-in-practice would require when trust involves asymmetry, temporal expectation, possible non-event,
      possible rupture, and possible repair.
    central_actors_and_roles:
    - relying role or trust-giver, abstract and not person-identified
    - relied-upon role or trust-receiver, abstract and not person-identified
    - role, claim, institution, or relation that carries expectation
    - observer or analyst applying PMS, EDEN, and MIP at structural distance
    guiding_question: What does a mature handling of trust require in practice when a relation includes reliance, vulnerability,
      expectation, doubt, withdrawal, repair, or betrayal, without turning the analysis into diagnosis, person ranking, legal
      verdict, forced reconciliation, or PMS/EDEN overclaim?
    level:
    - conceptual
    - relational
    - praxeological
    - structural_case_review
    first_visible_asymmetry: 'The first visible asymmetry is exposure under reliance: one role may become vulnerable to another
      role''s action, omission, delay, interpretation, institutional capacity, or repair willingness. This asymmetry is structural,
      not automatically moral, legal, diagnostic, or culpability-bearing.'
    first_visible_D_themes_optional:
    - Dignity-in-practice is relevant as protection against shaming, humiliation, coercive restoration of trust, person ranking,
      and dignity loss through analysis.
    - Refusal, withdrawal, or doubt may preserve dignity rather than signal immature trust.
    - D0 remains untouched and outside all metrics; D1/D2 are qualitative enactment readings only.
  role_mapping:
    object_of_observation:
      type: abstract relational regime
      description: Trust as a structural case-field rather than a concrete event or identifiable relationship.
      role: conceptual object of praxeological analysis
      not_person_as_whole: true
    observer_position:
      role: external structural analyst using MIP after PMS Core and EDEN overlay have already been completed
      power_relation_to_object: no direct power over persons; interpretive power over the written case representation only
      possible_effects_of_analysis: may shape future theoretical framing of trust, repair, reciprocity, asymmetry, and dignity;
        must therefore avoid turning structural language into labels or verdicts
    involved_roles:
    - role: relying role
      mandate: enters or maintains trust under expectation, exposure, and possible vulnerability
      built_in_asymmetries:
      - exposure to omission or betrayal
      - limited control over the relied-upon role
      - possible higher cost of non-event or delayed repair
      publicness_level: unspecified; abstract case only
      dignity_exposure: risk of shame, self-devaluation, or humiliation if vulnerability is mishandled or publicly interpreted
    - role: relied-upon role
      mandate: carries expectation, responsiveness, reliability, repair capacity, or role-specific accountability where warranted
      built_in_asymmetries:
      - capacity to act, omit, delay, repair, clarify, or withdraw
      - possible informational or institutional advantage
      - possible higher responsibility if role-specific obligation is established
      publicness_level: unspecified; abstract case only
      dignity_exposure: risk of being over-blamed, diagnosed, or treated as morally defined by breach-language if analysis
        overreaches
    - role: institutional or claim-bearing role
      mandate: stabilizes expectations, procedures, promises, credibility, or public trust where the case is later concretized
      built_in_asymmetries:
      - formal authority or procedural power
      - unequal access to records, rules, or repair mechanisms
      - public legitimacy effects
      publicness_level: potentially medium to high in later institutional cases; not specified here
      dignity_exposure: risk of depersonalizing affected parties or hiding vulnerability behind procedures
    - role: analyst role
      mandate: keep analysis reversible, non-diagnostic, non-tribunal, non-person-ranking, and open to alternatives
      built_in_asymmetries:
      - interpretive authority in naming structures
      - risk of making abstract classifications sound decisive
      - risk of importing PMS, EDEN, or MIP coherence as practical truth
      publicness_level: chat-based working context; not a public D-reading
      dignity_exposure: must protect against humiliating or labeling absent or hypothetical parties
    publicness:
      level: low_current_publicness; no identifiable persons; theoretical working note
      A_P_relevance: Awareness of publicness is still relevant because case language could later be reused in public or institutional
        analysis.
      P_PU_relevance: Public power-to-act is low in the current abstract case but could become high if the template is used
        to evaluate identifiable persons or institutions.
      D_P_relevance_if_D_active: 'D-P is active only as a guardrail: avoid public shaming, reputational injury, humiliation
        diagnostics, or dignity labeling.'
      public_shaming_risk: currently low; structurally high if applied to identifiable persons without consent, moderation,
        and review
      reversibility_risk: currently low because no person is labeled; increases if EDEN or MIP terms are treated as fixed
        classifications
  frame_vs_variability:
    frame_elements:
    - element: The case is abstract, not a concrete praxis scene.
      reason_fixed_or_slow: This follows from the supplied material and from the completed PMS Core and EDEN analyses.
      protected_goods:
      - reversibility
      - non-diagnostic reading
      - no overclaim
    - element: MIP analyzes enactments, roles, and structures, not persons as wholes.
      reason_fixed_or_slow: This is a constitutive MIP guardrail.
      protected_goods:
      - D0
      - profile-not-person discipline
      - score hygiene
    - element: Trust involves structural vulnerability and temporal expectation.
      reason_fixed_or_slow: This is the stable case field shared by PMS Core, EDEN, and MIP analysis.
      protected_goods:
      - fair responsibility distribution
      - dignity protection
      - non-capture
    - element: PMS and EDEN conclusions remain prior bounded analyses, not empirical facts.
      reason_fixed_or_slow: They supply structural reference points but not concrete evidence.
      protected_goods:
      - model discipline
      - alternative explanations
      - anti-amplification
    variability_elements:
    - element: specific trust frame
      possible_change: interpersonal, institutional, testimonial, fiduciary, public, professional, or intimate trust could
        be specified in a later scene
      responsible_roles:
      - analyst
      - case-provider
      - affected roles if concretized
    - element: degree and direction of asymmetry
      possible_change: Ω may become minor, reciprocal, one-sided, institutional, temporal, informational, or authority-based
        depending on evidence
      responsible_roles:
      - analyst
      - role-holders
      - institutional record if applicable
    - element: repair or refusal pathway
      possible_change: repair may be possible, inappropriate, delayed, partial, or replaced by dignified withdrawal
      responsible_roles:
      - relying role
      - relied-upon role
      - mediating or institutional role if applicable
    - element: publicness and dignity risk
      possible_change: private reflection may become public accusation or institutional report if transmission guardrails
        fail
      responsible_roles:
      - analyst
      - publisher or process owner
      - moderator if applicable
    unfair_high_M_zones:
    - It would be unfair to assign high M-score where no concrete role-holder, knowledge, power, predictability, alternative,
      or integration attempt is evidenced.
    - It would be unfair to convert vulnerability into automatic responsibility or guilt for the relied-upon role.
    - It would be unfair to treat non-response, withdrawal, refusal, or doubt as immature without frame-specific evidence.
    - It would be unfair to use EDEN drift labels as maturity verdicts without concrete operator evidence.
    system_as_excuse_risk:
    - Because the case is structural, there is a risk of using 'the system' to avoid role-specific responsibility where a
      later concrete scene would show real levers.
    - There is also a risk of using abstract asymmetry to excuse avoidable non-repair, opacity, or harmful institutional routine.
    - This risk is not active as a finding now; it is a calibration warning for later application.
    D1_D2_realistically_improvable_where:
    - through non-humiliating language around vulnerability, rupture, and repair
    - through preservation of withdrawal or refusal as possible dignity-preserving praxis
    - through explicit separation of breach analysis from person-worth
    - through reviewability and reversibility of all maturity readings
    - through avoiding public D-readings about identifiable persons
  acrp_profile:
    A_awareness:
      observations: Awareness is high at the conceptual level and low at the concrete-scene level. The prior PMS analysis
        carefully identified distinctions, frames, non-events, asymmetries, temporality, recontextualization, distance, integration
        limits, and non-capture. The EDEN overlay further identified threshold, breach, reciprocity, and drift-risk questions.
        However, there is no situational awareness of actual actors, timelines, evidence, or affected perspectives.
      available_information: Case statement, completed PMS Core analysis, completed PMS-EDEN overlay analysis, and MIP model
        reference.
      realistically_knowable: At this stage only structural possibilities, not facts about a real relation. A later concrete
        scene could make role awareness, publicness, knowledge, alternatives, and consequences more knowable.
      blind_spots: No lived perspective, no counterparty response, no institutional documents, no chronology, no evidence
        of repair or breach, no empirical trust data.
      role_awareness_A_R: Strong for the analyst role and abstract role types; weak for real role-holders because none are
        specified.
      publicness_awareness_A_P: 'Adequate as a guardrail: current publicness is low, but public use would increase dignity
        and reversibility risks.'
      bias_awareness: 'Explicitly named: model-fit bias, repair normativity, asymmetry moralization, maturity inflation, and
        EDEN amplification risk.'
    C_coherence:
      observations: 'The analysis is coherent as a model-to-case mapping: PMS Core supplies the structural base, EDEN adds
        an overlay without rewriting the base, and MIP reorganizes the result around awareness, coherence, responsibility,
        power-to-act, and dignity-in-practice. Coherence remains procedural and conceptual, not proof of truth.'
      word_deed_relation: No actual deed is available. The analysis can only assess coherence among stated claims, template
        fields, and model boundaries.
      role_context_coherence: The analyst role remains coherent by refusing diagnosis, person ranking, empirical overclaim,
        legal finding, and forced repair.
      narrative_coherence: 'The narrative is coherent: trust is a vulnerable temporal relation; mature handling requires awareness,
        bounded asymmetry, transparent responsibility, real options, distance, and dignity protection.'
      breaks_named_or_hidden: Named breaks include lack of concrete scene, under-specified Action_E/P, weak responsibility,
        non-assigned scores, and risk that model coherence becomes too smooth. No hidden break is resolved by assumption.
    R_responsibility:
      observations: Responsibility is structurally relevant but not assignable. MIP Responsibility_R asks how burdens and
        consequences are assumed, refused, shifted, distributed, or repaired. The current case can identify responsibility
        conditions but cannot attribute responsibility to a role-holder.
      responsibility_points: Potential points include expectation-setting, transparency, repair effort, non-humiliating handling
        of vulnerability, refusal boundaries, and responsibility not becoming authority.
      assumed_responsibility: The analysis assumes responsibility for its own wording, guardrails, reversibility, D0 protection,
        and non-overclaim.
      shifted_or_refused_responsibility: No role-holder responsibility is shown as shifted or refused. EDEN risks such as
        parity-to-exit and responsibility-to-authority are explicitly not applied.
      burdens_and_consequences: Abstract burdens include exposure of the relying role, repair burden of the relied-upon or
        institutional role where warranted, and interpretive burden of the analyst not to over-label. Consequences remain
        hypothetical.
    P_power_to_act:
      observations: Power-to-act is low in the concrete sense because there is no scene to intervene in. It is moderate in
        the analytic sense because the template can clarify frames, separate claims, specify evidence needs, protect dignity,
        and prevent premature transmission.
      real_levers: 'Analytic levers: preserve non-capture, require concrete evidence, avoid active drift labels, mark scores
        as non-assigned, define conditions for IA and repair, and keep D as protection rather than judgment.'
      formal_vs_real_options: Formal options include mapping many MIP fields; real options are limited to improving the analysis
        and specifying requirements for future cases.
      used_options: Used options include full YAML documentation, red-zone check, D activation as guardrail, non-scoring,
        IA non-assessment, alternative explanations, and transmission limits.
      unused_options: Unused options include concrete intervention, mediation design, legal analysis, clinical support, empirical
        testing, or institutional policy recommendation.
      ceiling_rule_relevance: 'The M-score ceiling rule is relevant: predictability and alternatives for any concrete role
        are approximately unknown, so high M-band assignment would be invalid.'
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: Not observed. The abstract case does not show self-treatment by any person or role-holder.
      self_neglect: Not observed. No bodily, material, or everyday self-care context is supplied.
      shame_dynamics: Potentially relevant as a risk if trust rupture is publicly framed as humiliation or person failure,
        but not active in the case.
      degradation_of_others: Not observed. Devaluation and humiliation were rejected as active EDEN findings.
      public_shaming: Not observed. Public D-reading risk is controlled by the abstract, non-identifiable setting.
      protest_or_refusal: Relevant as possible dignity-preserving praxis. Refusal or withdrawal must not be automatically
        treated as immaturity or reciprocity loss.
      dignity_protection: 'Active as an application constraint: protect D0, avoid person labels, and keep D1/D2 qualitative
        and role-bound.'
    next_step_if_relevant: Use D-profile section below as a protection-oriented qualitative reading, not as a dignity score.
  acrpd_submodules_profile:
    A:
      A-I: Inner awareness is not assessable because no inner life or person-perspective is supplied; any psychological inference
        is blocked.
      A-R: Role awareness is structurally strong for abstract roles and the analyst role; concrete role awareness remains
        unknown.
      A-C: 'Context awareness is strong at model level: philosophical, conceptual, non-concrete, green-zone structural analysis;
        weak at event level.'
      A-IM: Impact awareness is present as caution about overclaim, public misuse, humiliation, and forced repair; actual
        impact on real parties is unknown.
      A-P: 'Publicness awareness is present as a guardrail: no identifiable persons, no public D-reading, and transmission
        limited to working-note/theoretical use.'
    C:
      C-S: 'Social coherence is hypothetical: trust is relational, but no actual social navigation is supplied.'
      C-P: Coherence in power contexts is central but not proven; Ω is marked as structural exposure while blame and authority
        claims are withheld.
      C-N: Narrative coherence is strong as a bounded conceptual reading, with explicit warnings against smooth over-assimilation.
      C-I: Institutional/rule coherence is only conditional because institutions are named as possible trust objects but no
        institutional frame is supplied.
    R:
      R-I: Individual responsibility is not assigned; no individual role-holder is present.
      R-S: 'Social responsibility is a possible later field: relational repair, boundary respect, and non-externalization
        of vulnerability would matter if concretized.'
      R-E: 'Ethical responsibility is active for the analysis itself: protect dignity, avoid labels, keep alternatives open,
        and prevent model misuse.'
      R-P: Public responsibility is low now but would become important if the analysis were transmitted into public, institutional,
        or reputational contexts.
    P:
      P-I: Inner agency is not assessed; no person perspective is supplied.
      P-S: 'Social agency is abstract: future actors might clarify expectations, set boundaries, repair, or withdraw, but
        no real levers are shown.'
      P-C: Cultural agency is present in the analysis because trust-language, betrayal-language, and EDEN terms can shape
        meaning; therefore restraint matters.
      P-PU: Public agency is currently low; it would increase if the YAML were used publicly or institutionally.
    D:
      active: true
      D-I: No self-dignity enactment by a person is observed; D-I functions only as a protection warning against self-devaluation
        readings.
      D-B: Not applicable; no bodily or material self-care field is supplied.
      D-R: 'Relational dignity is relevant as a guardrail: trust analysis must not humiliate, degrade, rank, or coerce restoration.'
      D-P: 'Public dignity is relevant as a transmission guardrail: no public dignity reading about identifiable persons is
        allowed.'
      note: D-submodules are used because D was activated as a protection-oriented qualitative layer; D0 remains untouched
        and no D-score is produced.
  scores_and_ia:
    A_score:
      A_band: not_assigned; conceptual working note rather than scored enactment
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: Abstract conceptual case; no concrete role-holder, event sequence, or time window beyond the written
        analyses.
      justification:
        A_awareness: Conceptual awareness is high, but scene awareness is absent; assigning a numeric or banded A-score would
          misrepresent the evidence.
        C_coherence: The analysis is internally coherent, but MIP score hygiene forbids treating coherence as a maturity measurement
          without concrete enactment.
        R_responsibility: Responsibility conditions are identified but not attributable to a role-holder.
        P_power_to_act: Analytic levers exist, but concrete power-to-act is unknown.
        modulators_context: Modulators such as publicness, asymmetry, system constraints, and norm change are recognized but
          not measurable here.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned; no shared structural responsibility band without concrete scene evidence
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No concrete role-position or time frame is supplied; only abstract roles and possible trajectories
        are named.
      five_factors:
        knowledge: Unknown for real actors; conceptually high for the analyst's model-awareness but not transferable to case
          parties.
        power_control: Unknown for real actors; analytic control exists only over the wording and boundaries of the analysis.
        predictability: Unknown; consequences of trust, breach, withdrawal, or repair cannot be predicted without scene detail.
        access_to_alternatives: Unknown for case parties; alternatives such as repair or refusal are conceptually available
          but not evidenced as real options.
        serious_integration_attempt: Unknown for case parties; the analysis itself attempts integration while preserving non-capture.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: For any concrete role-holder, predictability and access to alternatives are unknown or approximately
          zero in the supplied material; therefore high M-band would be invalid. Because the case is abstract, the cleaner
          result is non-assignment rather than even a low band.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: Trust involves possible asymmetry of vulnerability, exposure, information, role obligation, institutional
        authority, and repair burden.
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: under_specified
        notes: No concrete information distribution is supplied. Transparency cannot be assessed beyond noting that trust
          requires framed expectation and legibility.
      J_justified:
        status: under_specified
        protected_good_or_purpose: Possible protected goods include reliability, safety, dignity, truthful expectation, and
          repairability, but none is concretely at issue.
        notes: Asymmetry may be functional or harmful depending on frame, role, and evidence; no justification finding is
          made.
      TB_time_bound:
        status: under_specified
        review_points_or_conditions: Would require concrete temporal markers for expectation, delay, repair, refusal, or review.
        notes: The PMS Core case marks Θ as central, but MIP cannot assess time-boundedness without a timeline.
      R_reversible:
        status: partially_preserved_in_analysis_only
        real_return_or_exit_options: Analytic reversibility is preserved. Real relation-level reversibility is unknown.
        notes: The analysis remains reversible, but no role-holder exit or repair option is evidenced.
      result: not_assessable_as_IA; asymmetry is structurally visible but no inadult asymmetry finding is warranted
      short_justification: T, J, TB, and real R are under-specified; only analytic reversibility is maintained.
      immediate_action: Do not transmit as decision basis; use only as conceptual working note and require scene evidence
        before IA analysis.
  ia_localisation:
    knowing:
      issue: Concrete knowledge distribution is absent.
      possible_intervention: Ask what each role knew, could realistically know, and was entitled or expected to know within
        the trust frame.
    being_able:
      issue: Concrete capacity, leverage, and repair options are absent.
      possible_intervention: 'Map real levers: response, disclosure, repair, refusal, boundary-setting, institutional review,
        or exit.'
    being_permitted:
      issue: No norms, permissions, duties, or constraints are specified.
      possible_intervention: Clarify role permissions, institutional rules, relational boundaries, and protected goods.
    willing:
      issue: No intention, willingness, refusal, or motivation can be inferred.
      possible_intervention: Do not infer motives; document observable choices, omissions, and stated reasons if a concrete
        case is later supplied.
  ia_protection:
    transparency_measures:
    - Keep the distinction between case material, PMS Core inference, EDEN overlay inference, and MIP inference explicit.
    - State that no concrete IA finding is made.
    - Require evidence before activating breach, NRK, pseudo-symmetry, PFO, reciprocity loss, devaluation, or humiliation.
    justification_measures:
    - Name the protected good before treating asymmetry as justified or unjustified.
    - Check whether asymmetry serves safety, care, role responsibility, procedural fairness, or only one side's advantage.
    - Keep tragedy and non-capture open where goods conflict.
    time_boundedness_measures:
    - Specify expectation, delay, rupture, repair, refusal, and review points in any later concrete case.
    - Avoid reading a single rupture as chronic reciprocity loss without trajectory evidence.
    - Define when a repair attempt remains open and when closure or withdrawal becomes appropriate.
    reversibility_measures:
    - Preserve reversible wording and avoid labels.
    - Allow rival readings and alternative explanations to remain live.
    - Keep refusal, withdrawal, and non-repair as possible dignity-preserving options.
    participation_or_voice_measures:
    - In any concrete case, include the perspectives of relying, relied-upon, and affected institutional roles.
    - Do not let the analyst's model-fit replace affected-party account.
    - Give room for counter-perspective before assigning maturity or IA bands.
    dignity_protection_measures:
    - No public D-reading of identifiable persons.
    - No dignity score and no person-worth language.
    - Do not use betrayal or humiliation language unless concretely evidenced.
    - Prefer protection-first language where vulnerability is high and responsibility is uncertain.
    review_or_falsifier:
      date_or_interval: before any concrete application or public transmission
      falsifier_question: What evidence would show that this is not a trust-asymmetry problem but a different phenomenon such
        as ordinary uncertainty, legitimate boundary-setting, legal duty, strategic interaction, cultural norm conflict, or
        non-capture?
      responsible_roles:
      - analyst
      - case-provider
      - reviewer or moderator if used beyond theory
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Abstract trust field is introduced: reliance, vulnerability, expectation, confidence, doubt, withdrawal,
        repair, and betrayal.'
      A_band: not_assigned; conceptual awareness only
      M_band: not_assigned; no concrete responsibility carrier
      D_observation_optional: D activated only as protection guardrail; no D stress finding.
      key_context_role_power_situation: No actors or concrete power relations supplied.
    - timepoint: t1
      short_description: PMS Core analysis maps trust through operators and derived structures while preserving non-capture
        and weak Σ/Ψ.
      A_band: not_assigned; high structural mapping discipline but no score
      M_band: not_assigned; responsibility remains conditional
      D_observation_optional: Dignity-in-Practice functions as application constraint.
      key_context_role_power_situation: Ω and Θ are central, but no scene-level IA is assessable.
    - timepoint: t2
      short_description: PMS-EDEN overlay adds threshold, breach, reciprocity, and reciprocity-loss questions while rejecting
        strong drift labels as findings.
      A_band: not_assigned; overlay awareness improved but not scored
      M_band: not_assigned; no EDEN drift activates responsibility bands
      D_observation_optional: Humiliation and devaluation are not active; D protects against overreading.
      key_context_role_power_situation: Reduced signatures are shorthand only; PFO and switch labels not applied.
    - timepoint: t3
      short_description: MIP analysis reorganizes the prior work into A-C-R-P-D, score hygiene, IA protection, trajectory,
        D-profile, and transmission discipline.
      A_band: not_assigned; score hygiene maintained
      M_band: not_assigned; M ceiling rule prevents high responsibility claim
      D_observation_optional: D module active as protection-oriented qualitative layer only.
      key_context_role_power_situation: Analysis remains green-zone structural working note, not decision basis.
    A_t:
      pattern: A(t) increases in structural articulation from basic case material to PMS Core, EDEN overlay, and MIP synthesis,
        but this is analysis-awareness rather than actor-awareness.
      notes: The trajectory improves documentation and discrimination; it does not improve evidence about a real trust scene.
    M_t_RVR_t:
      RVR_description: RVR(t) cannot be calculated for any role-holder. For the analyst role, responsibility-viability consists
        in maintaining guardrails, reversibility, alternatives, and non-overclaim.
      knowledge_over_time: Analytic knowledge grows across outputs; concrete case knowledge remains absent.
      leverage_over_time: Analytic leverage increases through templates and guardrails; practical leverage over a real relation
        remains absent.
      alternatives_over_time: 'Alternatives become clearer: repair, refusal, boundary-setting, empirical validation, rival
        formalization, or non-capture; none is enacted.'
      ceiling_rule_over_time: High M remains blocked throughout because concrete predictability and real alternatives are
        not supplied.
    D_t_optional:
      active: true
      qualitative_course: 'D(t) remains protective and stable: no active humiliation, devaluation, or D stress finding; increasing
        clarity about avoiding dignity misuse.'
      D_quick_grid_movement_if_used: 'level_0_to_level_1_caution_only: D is not in focus as an observed harm, but caution
        is warranted because trust analysis can become shaming if misused.'
      note: No D-score; only qualitative trajectory.
  D_module_optional:
    active: true
    activation_reason: Activated because the trust case centrally involves vulnerability, exposure, refusal, repair, possible
      betrayal, humiliation risk as non-finding, and the need to protect D0 and D1/D2 boundaries during analysis.
    communication_space: internal_structural_review; non-public; non-identifiable; not a public D-reading
    guardrails_checked:
      scenic: true
      context_bound: true
      role_bound: true
      time_windowed: true
      no_global_statement_about_persons: true
      no_dignity_score: true
      D0_untouched: true
    D_profile:
      D1_self_treatment_D_I_D_B:
        observed_enactments: No self-treatment enactments are observed. D1 is therefore not assessed for any person.
        context_notes: 'The only relevant D1 warning is methodological: do not interpret vulnerability, doubt, or refusal
          as self-devaluation without evidence.'
        trend_band_qualitative: not_observed; protection_watch_only
      D2_relational_dignity_D_R:
        observed_enactments: Relational dignity is not observed in a scene but is structurally protected by refusing humiliation,
          degradation, forced reconciliation, person labels, and coercive model use.
        context_notes: Trust rupture, betrayal, and repair are dignity-sensitive; analysis must separate accountability from
          degradation and refusal from immaturity.
        interpretive_reading_not_judgment: The case calls for dignity-preserving handling, not a judgment that any party acted
          with or without dignity.
      D_P_public_dignity:
        active_if_publicness_relevant: true
        observed_enactments: No public enactment is observed. Public dignity is relevant because any later transmission could
          expose identifiable parties to reputational harm.
        private_public_tension: Theoretical reflection is safe; public application to identifiable persons would move toward
          yellow or red zone depending on context.
        publicity_context: current context is non-public working analysis; no public D-reading allowed
      A_M_D_link_without_mixing:
        A_band_reference: A-band not assigned; conceptual awareness is documented but not scored.
        M_band_reference: M-band not assigned; shared structural responsibility is not scored.
        D_tendency: protective qualitative D-layer; no D stress finding beyond misuse caution
        protection_or_responsibility_implication: Use D to prevent shaming and overclaim; do not use D to increase A or M
          scores.
    D_Quick_Grid:
      used: true
      level: 0_with_level_1_watch_for_misuse
      preferred_wording: This abstract constellation currently shows no observed D break; it carries a level-1 caution only
        if the analysis is transmitted into public or person-related contexts.
      forbidden_wording_avoided: true
      movement_question: What would be one small, real action that keeps this trust analysis dignity-protective rather than
        shaming, ranking, or coercive?
  meta_notes:
    bias_risks:
      confirmation_bias: The prior PMS and EDEN outputs were strong and coherent, which may tempt the analyst to confirm rather
        than retest them.
      hindsight_bias: Betrayal-language can make later rupture appear inevitable; this must be avoided without a timeline.
      status_quo_loyalty_bias: Institutional trust frames may be over-protected if the analysis assumes procedural stability
        is already justified.
      halo_horn_effects: Trust-giver or trust-receiver roles may be idealized or demonized in later concrete use; current
        analysis blocks this.
      in_group_out_group_bias: No group is named; EDEN terms such as PFO must not become group or ideology labels.
      dignity_bias_effect: Dignity language can become moral weapon; D is kept as protection signal only.
    norm_assumptions:
      explicit_norms:
      - Profiles are not persons.
      - Scores are not person scores.
      - D0 is inviolable and not measured.
      - Asymmetry can be functional and is not automatically injustice.
      - Refusal and withdrawal may be mature or dignity-preserving.
      implicit_norms:
      - Trust relations should be handled with transparency, repairability, reversibility, and non-humiliation where possible.
      - Maturity includes the ability to name limits and not force integration.
      - Conceptual models should reduce harm from overinterpretation, not amplify it.
      dignity_concepts:
      - D0 ontological dignity is untouched and outside all metrics.
      - D1/D2 are dignity-in-practice enactment readings only.
      - PMS Dignity-in-Practice and MIP D-profile are both guardrail-bound but not identical structures.
      normative_position_of_D_reading: D is used to protect against shaming, humiliation, degradation, person labeling, and
        coercive restoration of trust; it is not used to judge worth.
    intuition:
      initial_intuition: Trust strongly fits MIP because maturity in trust requires awareness, coherence, responsibility,
        power-to-act, and dignity protection under asymmetry.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: The PMS Core and EDEN analyses both emphasize vulnerability, asymmetry, temporality, distance,
        repair, non-capture, and drift-overread risk.
      contradicting_evidence: The case is abstract, and fit alone does not justify scoring, IA findings, or strong EDEN drift
        activation.
    possible_alternative_interpretations:
    - A phenomenological reading may better capture lived trust and felt vulnerability.
    - A moral-philosophical reading may better handle fidelity, promise, forgiveness, and betrayal.
    - A legal-institutional reading may better handle fiduciary duty, reliance, breach, evidence, and liability.
    - A sociological reading may better handle social capital, institutional legitimacy, and role confidence.
    - A game-theoretic reading may better handle risk, cooperation, defection, and incentives.
    - A linguistic-pragmatic reading may better handle testimony, sincerity, credibility, and uptake.
    - A cultural or theological reading may better handle symbolic meanings of Eden or trust.
    counter_perspective:
      from_other_side: A concrete relied-upon role might say that withdrawal or non-response was a legitimate boundary, incapacity,
        confidentiality requirement, or frame disagreement rather than betrayal.
      from_affected_side: A relying role might say that abstract non-capture language underplays real harm, vulnerability,
        or repair needs.
      from_external_observer: An external observer might argue that MIP is still too broad for an abstract trust case and
        that empirical or legal tools are needed before practical use.
  open_questions_and_blind_spots:
    missing_information:
    - Who relies on whom, in which role and frame?
    - What expectation was explicit, implicit, reasonable, contested, or absent?
    - What action, omission, delay, refusal, or repair attempt occurred?
    - What asymmetry of knowledge, power, vulnerability, authority, or dependence was present?
    - What timeline connects expectation, non-event, rupture, withdrawal, and possible repair?
    - What publicness and reputational exposure exist?
    - What affected-party and counterparty perspectives are available?
    uncertain_assumptions:
    - That the abstract trust field is stable enough for MIP mapping.
    - That D activation as protection layer adds clarity rather than unnecessary moral weight.
    - That MIP A-C-R-P-D can be usefully applied without numeric bands in a non-concrete case.
    - That EDEN overlay risk markers remain restrained in later use.
    weak_points_in_analysis:
    - No A-score or M-score can be responsibly assigned, which limits the standard MIP scoring function.
    - IA-box cannot produce a result beyond under-specification.
    - D-profile is protection-oriented rather than scene-observational.
    - Practical next steps remain methodological rather than relational interventions.
    needed_perspectives:
    - relying-role perspective
    - relied-upon-role perspective
    - institutional or procedural perspective if applicable
    - affected-party dignity and publicness perspective
    - external reviewer checking for model overfit
    - domain expert if legal, clinical, organizational, or empirical claims are later attempted
  possible_steps_towards_maturity:
    decision_mode: non-prescriptive_structural_working_note; no direct intervention or decision basis
    functional_next_step:
      action: If a concrete trust scene is later supplied, first specify roles, frame, expectation, timeline, asymmetry, publicness,
        and affected perspectives before assigning any A/M band or IA result.
      reversible: true
      responsible_role: future analyst or case-provider
    short_term_feasible:
    - Maintain non-scoring status for the abstract case.
    - Use the IA-box only as a list of evidence requirements, not as verdict.
    - Keep D active only as protection against shaming and overclaim.
    - Preserve refusal and withdrawal as possible mature responses.
    - Keep EDEN strong drift terms non-applied unless concrete evidence is added.
    medium_term_feasible:
    - Develop separate concrete-scene templates for interpersonal, institutional, testimonial, and legal trust contexts.
    - Add counter-perspective collection before any responsibility or IA analysis.
    - Create falsifier prompts that distinguish breach from legitimate boundary, delay, role conflict, or non-capture.
    - Compare MIP results with PMS Core, EDEN, and at least one rival framework for discriminative force.
    overambitious_or_risky:
    - Assigning A-score or M-score to abstract trust as if it were an enactment.
    - Using EDEN PFO or pseudo-symmetry labels without scene evidence.
    - Treating betrayal-language as proof of breach.
    - Turning D-profile into dignity diagnosis or public moral assessment.
    - Making repair, forgiveness, or renewed trust the presumed mature outcome.
    protection_first_if_low_M_high_harm:
    - If a later case shows high harm but low responsibility due to low predictability or no alternatives, prioritize protection,
      clarity, and boundary support rather than blame.
    - If vulnerability is high and facts are uncertain, avoid public attribution and preserve dignity first.
    - If refusal protects safety or dignity, do not force reconciliation under maturity language.
    structural_change_if_high_M:
    - If a later case shows high knowledge, high power, predictable harm, real alternatives, and failed integration attempts,
      focus on transparent responsibility, repair architecture, review points, and non-humiliating accountability.
    - If institutional trust is involved, improve procedures for expectation-setting, response duties, documentation, and
      reversible appeal or exit.
    - If publicness is involved, reduce shaming dynamics and increase accountable, reviewable communication.
  transmission_check:
    pre_transmission_gate_passed: true
    final_checklist:
      scope_and_guardrails_checked: true
      roles_and_publicness_checked: true
      score_hygiene_checked: true
      bias_norm_intuition_checked: true
      consequences_and_reversibility_checked: true
      D_cleanliness_checked_if_relevant: true
    status: working_note
    if_not_transmittable_reason: The analysis is suitable as a theoretical working note only. It is not a decision basis because
