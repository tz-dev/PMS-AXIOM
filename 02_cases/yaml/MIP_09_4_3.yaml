    - dignity_score
    - public_D_reading_about_identifiable_persons
    - clinical_diagnosis
    - forensic_or_legal_decision_basis
    - individual_HR_decision
    - humiliation_diagnostic
    - PFO_or_switch_label_for_persons_or_groups
    - empirical_claim_without_evidence
    - forced_reconciliation_or_repair_mandate
    review_required:
      required: true
      review_date_or_condition: before any concrete application, public transmission, institutional use, or score assignment
      falsifier: If a concrete scene lacks framed expectation, meaningful asymmetry, real options, or temporal trajectory,
        the MIP trust reading must be narrowed or withdrawn.
  uniform_report:
    generate_only_from_structured_fields: true
    title: MIP Report — Trust (Relational Regimes)
