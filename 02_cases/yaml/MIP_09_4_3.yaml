    allowed_use_of_this_analysis:
    - internal_reflection
    - theoretical_structural_review
    - template_quality_check
    - preparation_for_later_concrete_scene_analysis
    - comparison_with_PMS_Core_and_EDEN_outputs
    not_allowed_use:
