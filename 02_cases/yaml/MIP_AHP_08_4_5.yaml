AHP_impact_overlay:
  principle: >
    PH affects confidence in the analysis artifact and in the clarity of IA/D decidability,
    not the base score scales and not the underlying case.
  PH_band_applied: "high"
  PH_points_applied: 6
  PH_max: 6
  expected_effect_by_band:
    confidence_shift:
      A_reading: "up"
      C_reading: "up"
      IA_box_decidability: "more_decidable"
    risk_shift:
      D_R_D_P_misreading_risk: "down"
  interpretation_limits:
    A_reading_confidence: >
      Confidence rises only in the quality of the artifact's A-reading: the analysis clearly
      states what is knowable, unknown, framed, and inferred. It does not create actor-level
      awareness evidence.
    C_reading_confidence: >
      Confidence rises only in the artifact's coherence reading: the analysis is internally
      coherent and boundary-disciplined. It does not prove that the case itself is coherent,
      resolved, integrated, or empirically supported.
    IA_box_decidability: >
      IA-box decidability is clearer in the sense that the missing conditions are transparent.
      The IA-box result remains conceptual IA-risk and is not upgraded.
    D_R_D_P_misreading_risk: >
      D-R/D-P misreading risk is reduced because D-language is repeatedly bounded, but it is
      not eliminated because publicness, exposure, shame, and dignity-protection language are
      inherently sensitive.

AHP_distinction_from_open_questions:
  open_questions_and_blind_spots: >
    The previous MIP analysis already listed gaps in case material, evidence, perspective,
    scene structure, and context.
  attack_surface_annotations: >
    This AHP overlay identifies vulnerabilities in the analysis artifact itself: how its
    wording, scope, inference structure, publicness terminology, D-language, and transmission
    polish could be attacked or misread.
  relation_between_both: >
    Open questions document what the case does not provide. Attack points document how the
    analysis may still be vulnerable despite having documented those gaps.

AHP_validation_checklist:
  activation_valid:
    AHP_is_optional: true
    default_activation_was_off_in_module: true
    user_requested_activation: true
    existing_structured_MIP_analysis_available: true
    structured_case_fields_available: true
    red_zone_detected: false
    public_AHP_report_allowed: true
  semantic_musts:
    AHP_derives_outputs_only_from_documented_fields: true
    AHP_does_not_invent_hidden_assumptions: true
    AHP_never_changes_base_A_M_IA_D_results: true
    AHP_never_activates_D: true
    AHP_never_creates_person_level_findings: true
    AHP_never_upgrades_transmission_status: true
    attack_points_are_analysis_vulnerabilities_not_person_findings: true
    hardening_actions_feed_next_iteration: true
    formal_neat_misuse_remains_misuse: true
  deprecated_term_hygiene:
    legacy_terms_used_only_in_legacy_or_negated_context: true
    expected_terms_used:
      - "MIP"
      - "MIP - Maturity in Practice.yaml"
      - "MIP - Maturity in Practice - AHP Module.yaml"
      - "D₀"
      - "D₁/D₂"
      - "D-module"
      - "D-profile"
      - "IA-box"
      - "A-score"
      - "M-score"
      - "Precision Heuristic"
      - "case.addons.ah_precision"
      - "analysis artifact"
      - "working note"
  boundary_flags:
    no_hidden_first_order_findings: true
    no_hidden_rescoring: true
    no_hidden_D_activation: true
    no_hidden_transmission_upgrade: true
    no_person_level_attack_points: true
    no_moralised_attack_language: true
    no_dignity_labelling: true
    no_severity_escalation_beyond_lexicon: true
    no_annotations_on_annotations: true
  final_AHP_conformity_judgment: >
    The AHP overlay is conformant: it hardens the previous MIP analysis as an analysis
    artifact, preserves all base MIP results and boundaries, identifies seven bounded
    attack points, links each to a next-iteration hardening action, and does not convert
    precision into a case verdict.