  conflict_overlay_quality_control:
    status: "passed"
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      no_person_level_judgment: true
      no_solution_or_intervention_script: true
      no_sanction_logic: true
      no_diagnosis_or_person_typing: true
      conflict_not_treated_as_essence: true
      terminality_not_treated_as_finality: true
      downstream_docking_marked_as_mode_shift: true
      publicness_overlay_not_operator: true
      misuse_gradient_not_operator: true
      conflict_attractor_not_operator: true
      dignity_in_practice_preserved: true
      reversibility_preserved: true
      distance_chi_preserved: true
      drift_patterns_not_person_labels: true
      scale_matrices_not_scores: true
      red_zone_checked: true
      non_capture_preserved: true
    issues_found:
      - "none"
    correction_required: false
    final_overlay_judgment: >
      The CONFLICT overlay is valid, bounded, subordinate to the completed PMS
      Core case, and conservative: it adds conflict-specific visibility without
      activating terminal or diagnostic conflict claims beyond the supplied
      abstract case material.

  conflict_overlay_synthesis:
    primary_conflict_reading: >
      PMS-CONFLICT makes visible that trolley dilemmas can be read as abstract
      incompatibility structures: branch outcomes cannot be jointly realized,
      harm allocation is temporally consequential, and rival frames can become
      locally coherent without producing shared Σ. The overlay does not convert
      that visibility into a solution, verdict, diagnosis, implementation rule,
      or terminal conflict regime. Its strongest contribution is discriminative:
      it separates weak dilemma-legibility from stabilized conflict, binding
      collision, asymmetry lock-in, exposure capture, dignity collapse, and
      terminal CONFLICT.
    stabilized_incompatibility_result: >
      Incompatibility is conceptually present but not concretely stabilized.
      The trolley-dilemma problem-form is recurrent, yet the case material does
      not establish binding persistence, priced distance, exposure capture, or
      terminal Σ exhaustion. The incompatibility is therefore readable as an
      abstract branch-structure rather than as an established conflict regime.
      A stronger claim would require concrete persistence across time, concrete
      role or self-binding, asymmetric cost distribution, and evidence that
      integration no longer carries under load.
    sigma_result: >
      Σ remains weak. Rival framings may be locally coherent, but the case does
      not establish shared integration, failed integration under load, or
      morally decisive non-integrability. This is important because the absence
      of a shared solution is not automatically Σ-failure: it may also indicate
      rival formalization, moral non-capture, tragic remainder, missing
      evidence, or an intentionally unresolved philosophical structure.
    binding_result: >
      Ψ-binding is weak and not concrete. No binding collision is active because
      no agent, duty, role commitment, promise, institutional obligation, or
      self-binding structure is specified. Responsibility-ascription appears in
      the case material, but PMS-CONFLICT binding requires more than the
      abstract fact that consequences are foreseeable or that action and
      omission are distinguishable.
    asymmetry_result: >
      Ω is conceptually relevant as consequence-shaping capacity versus
      affected-party exposure, but asymmetry lock-in is not established because
      exit, delay, reflection, and liability costs are not specified. The
      overlay therefore marks asymmetry without converting it into authority,
      blame, ranking, or a claim that one position controls the terms of
      withdrawal or interpretation.
    temporality_result: >
      Θ is conceptually relevant through foreseeable consequence trajectories,
      compressed choice windows, and irreversibility of harm branches. It is
      not empirically calibrated as accumulated history, repeated regime
      hardening, durable institutional memory, or path-dependent conflict
      stabilization. The temporal structure remains conceptual unless a
      concrete variant supplies sequence evidence, probability, delay, history,
      or role-continuity.
    distance_exit_result: >
      Χ is maintained as analytic distance. It is not shown to be priced,
      asymmetric, institutionalized, or coercively enforced within the case.
      This prevents the overlay from treating reflective analysis itself as
      evidence of available exit inside a concrete dilemma, while also
      preventing the dilemma's urgency from collapsing the analysis into
      verdict, enforcement, or premature closure.
    exposure_publicness_result: >
      Publicness P and misuse gradient MG are low inside the present descriptive
      setting. They become risk-relevant if the overlay is excerpted into public
      or institutional circulation, where reversible interpretation may harden
      into pressure. The main transfer risk is that trolley conflict signatures
      could be misread as moral calculus, governance authority, life-ranking,
      maturity assessment, or PMS validation.
    dignity_result: >
      Dignity-in-Practice is preserved and stabilizing. The overlay blocks
      ranking of lives or persons, chooser-shaming, moral tribunal posture,
      diagnosis, enforcement, and ontological claims. Dignity here remains a
      praxeological application constraint: it governs how asymmetry and
      conflict-legibility are handled, not what persons metaphysically are or
      how their worth should be compared.
    terminality_result: >
      The case remains below terminal CONFLICT threshold. Terminal regime
      positioning is not activated because stabilized Θ/Ω/Ψ load with failed Σ
      and costly or asymmetric Χ is not established. The abstract trolley
      dilemma may remain unresolved, tragic, or morally contested without
      thereby becoming terminal in the PMS-CONFLICT sense.
    downstream_docking_result: >
      Downstream docking is not triggered. Any move into governance,
      institutionalization, legal decision, moral decision procedure, AI policy,
      or evaluation would be a mode shift beyond this descriptive overlay. Such
      a move would require explicit declaration of mode, publicness, misuse
      gradient, accountability conditions, and non-PMS validation standards.
    non_capture_result: >
      Non-capture remains open for moral rightness, commensurability of lives,
      legal causation, metaphysical value, phenomenological burden, tragic
      remainder, and rival ethical or conflict grammars. CONFLICT overlay
      legibility must not be used to absorb these remainders as drift,
      incomplete Σ, failed maturity, or hidden terminality.
    final_conflict_formula_or_signature: >
      CONFLICT_weak_dilemma_legibility = weak(CONFLICT_stabilized_pattern) +
      risk(DRIFT_exposure_capture) + risk(DRIFT_dignity_collapse), with
      CONFLICT_terminal_core, DRIFT_binding_collision, and
      DRIFT_asymmetry_lock_in not_applicable as established case structures.
    final_claim_boundary: >
      This CONFLICT overlay adds visibility for abstract incompatibility,
      weak dilemma-pattern stabilization, transfer-risk exposure capture,
      dignity-collapse misuse risk, application-boundary scaling, and
      downstream docking limits. It does not revise PMS Base, rewrite the PMS
      Core pass, diagnose persons, rank persons, prescribe intervention,
      generate solution procedures, validate PMS, activate terminal conflict,
      or claim final capture of conflict. Its claim is intentionally narrower:
      the trolley-dilemma case is conflict-legible under the overlay, but not
      terminally conflict-classified.