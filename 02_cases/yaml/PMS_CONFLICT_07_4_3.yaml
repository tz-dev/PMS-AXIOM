          - "excerpting without mode, publicness, misuse-gradient, and boundary declarations"
          - "treating downstream governance as if it were still PMS-CONFLICT analysis"
        case_application: >
          The case satisfies this firewall in the present descriptive use. The
          main risks are solution-manual drift, moral-tribunal drift,
          governance-authority drift, PMS-Base-validation drift, and
          person-near labeling drift if the analysis is reused outside its
          descriptive boundary. All red-zone prohibited uses are explicitly
