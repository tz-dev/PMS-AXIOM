core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: 'PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities
      or psychological essences.

      '
    status: satisfied
    case_application: The case is handled as a praxis-structure of inquiry, explanation, and closure, not as psychology, personality,
      ontology, or essence of any speaker, profession, institution, or evaluator.
    failure_condition: 'The analysis would fail P1 if it generated global person-labels, psychological essence claims, or
      ontological person rankings.

      '
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: 'The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis. Whether
      they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization and critique.

      '
    status: satisfied
    case_application: Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators. Domain terms
      such as journalism, legal reasoning, and AI evaluation are treated as scene frames or examples, not as added PMS primitives.
    failure_condition: 'The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged
      to PMS Base.

      '
  P3_generativity:
    id: P3
    title: Generativity
    base_text: 'PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility, action,
      dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator compositions
      rather than introduced as independent primitives.

      '
    status: satisfied
    case_application: Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and asymmetry
      drift patterns are treated only as derived structures generated from PMS operator compositions, not as independent axioms.
    failure_condition: 'The analysis would fail P3 if derived structures were treated as independent axioms.

      '
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: 'Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, maturity, and
      dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes.

      '
    status: satisfied
    case_application: Ω and Θ are relevant but calibration-dependent. Ω appears where closure authority, exposure, evaluation,
      or burden-setting is uneven; Θ appears where deadlines, cycles, procedural sequences, repeated reporting, or durable
      settlement commitments shape the closure drive.
    failure_condition: 'The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without
      calibration.

      '
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: 'PMS may be represented computationally, but representation does not by itself imply direct implementation,
      guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints, and evaluation.

      '
    status: satisfied
    case_application: This YAML representation is a structural case application only. It is not an implementation, benchmark,
      empirical test, model deployment, legal rule, or validation of PMS adequacy.
    failure_condition: 'The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational
      sufficiency.

      '
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: 'PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative models,
      or more empirically grounded formalisms remains methodologically open.

      '
    status: satisfied
    case_application: Rival readings remain open, including epistemic-risk analysis, institutional-incentive analysis, rhetoric-of-persuasion
      analysis, legal-procedural analysis, decision-theoretic analysis, and AI metric-compression analysis.
    failure_condition: 'The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default.

      '
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: 'Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms of praxis
      may remain only partially legible or may resist assimilation within the current grammar.

      '
    status: satisfied
    case_application: Unresolved absence, disagreement, resistance to closure, rival explanation, or domain-specific evidentiary
      standards may remain outside PMS capture and must not be automatically redescribed as drift, failed integration, or incomplete
      calibration.
    failure_condition: 'The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration
      failure.

      '
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: 'PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking
      decisions.

      '
    status: satisfied
    case_application: No person, group, institution, profession, or system is diagnosed. PMS terms here do not imply pathology,
      trait, competence ranking, clinical state, moral defect, or forensic responsibility.
    failure_condition: 'The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.

      '
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: 'Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures. Global
      person-labels and irreversible ontological attributions are out of scope.

      '
    status: satisfied
    case_application: Because the case is not a concrete scene, the analysis is explicitly marked as a non-concrete, case-type-bound
      conceptual projection. Any concrete application would require a specified scene, roles, evidence record, timeline, and
      closure act.
    failure_condition: 'The analysis would fail P9 if it generated global, irreversible, decontextualized claims.

      '
