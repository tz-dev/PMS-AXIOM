operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Uncertainty, ambiguity, underdetermination, and incomplete evidence generate the primary distinctions that
      make the case analyzable: explained versus unexplained, settled versus unsettled, coherent versus warranted, and absence
      of proof versus presence of closure.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The relevant distinctions are uncertainty/closure, ambiguity/narrative settlement, incomplete evidence/coherent account,
      and explanation/warrant.
    - The analysis must not conflate coherence with truth, settlement with warrant, or incomplete evidence with proof of absence.
    falsifier_conditions:
    - If a concrete scene contains no meaningful distinction between uncertainty and closure, or if the evidence is already
      sufficient by the relevant standard, Δ would not support this case reading.
    non_capture_note: 'Difference is an entry condition, not proof of full PMS capture.

      '
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: The demand to explain it anyway supplies directional activation: the scene moves from unresolved difference
      toward explanation, narrative completion, declarative settlement, or model-based closure.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The impulse is explanatory, argumentative, institutional, and structural; it need not be read as subjective desire unless
      a concrete scene provides such evidence.
    - The directional pressure must be grounded in the case material as demand for explanation and closure, not inferred as
      a hidden motive.
    falsifier_conditions:
    - If no directional pressure from uncertainty toward explanation or settlement is present, ∇ is under-specified and the
      closure-drive reading weakens.
    non_capture_note: 'Impulse must not be psychologized unless the case independently warrants that reading.

      '
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: The active frames are inquiry scenes across everyday conflict talk, public debate, journalism cycles, managerial
      reporting, legal reasoning, and AI evaluation. These frames constrain what counts as explanation, evidence, acceptable
      uncertainty, and closure.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is inquiry-under-uncertainty, with domain-specific subframes for conflict talk, debate, journalism,
      management, law, and AI evaluation.
    - Frame shifts must be marked because legal sufficiency, journalistic narrative, managerial reporting, scientific explanation,
      and AI evaluation do not share identical closure standards.
    falsifier_conditions:
    - If no frame defines relevance, evidence, or closure, the PMS reading becomes too abstract to discriminate among domains.
    non_capture_note: 'A frame can clarify a case without exhausting it.

      '
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Missing decisive evidence, delayed clarification, unresolved ambiguity, underdetermined proof, silence of
      the record, or non-arrival of certainty functions as structured absence within the inquiry frame.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The expected occurrence is adequate warrant, decisive evidence, clarification, or domain-valid closure within a specific
      inquiry frame.
    - The absence may also mark PMS non-capture or legitimate indeterminacy; it must not automatically be converted into a
      defect, drift, or hidden meaning.
    falsifier_conditions:
    - If no structured expectation of evidence, explanation, or closure exists in a concrete scene, Λ should not be asserted
      as active.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.

      '
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: The closure demand stabilizes as an attractor when repeated inquiry situations favor coherent narrative
      or model formation as the preferred endpoint despite incomplete evidence.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Recurrence is supported conceptually by the case description across several inquiry domains, but empirical recurrence
      would require corpus or scene evidence.
    - The attractor must be distinguished from a single responsible act of provisional explanation or a procedural requirement
      for decision under uncertainty.
    falsifier_conditions:
    - If a concrete scene shows only an isolated explanation without recurrence, stabilization, or closure preference, Α is
      over-read.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.

      '
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω appears where closure authority, evaluative position, burden-setting, institutional power, public exposure,
      or differential vulnerability makes one party, office, medium, evaluator, or system more able to declare settlement
      than another.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - 'The direction and kind of asymmetry must be specified per scene: evaluator/evaluated, manager/reportee, journalist/public,
      court/party, expert/audience, model/benchmark, or speaker/hearer.'
    - Asymmetry is not moralized by default; it may be legitimate, procedural, institutional, rhetorical, or merely positional.
    - Ω remains weak if a concrete scene lacks role imbalance or if closure is jointly and reversibly held.
    falsifier_conditions:
    - If no directional imbalance of authority, exposure, capacity, obligation, or burden is identifiable, Ω claims must be
      removed or marked not active.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.

      '
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ appears through cycles, deadlines, procedural sequences, repeated public uptake, reporting timelines,
      evaluation loops, and durable effects of declaring a matter settled.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Temporal structure must be shown as a sequence from uncertainty to explanation to closure, not merely as a static comparison
      between uncertainty and settlement.
    - Temporality is central where cycles, deadlines, accumulated commitments, records, or repeated evaluations make closure
      persist over time.
    falsifier_conditions:
    - If a concrete scene has no temporal extension, trajectory, anticipation, delay, cycle, or persistence, Θ is overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.

      '
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ appears when unresolved uncertainty is recontextualized as a coherent narrative, model, report, verdict-like
      account, explanatory frame, or evaluation result that can be treated as closure.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The source frame is underdetermined inquiry; the target frame is narratively or model-coherently settled explanation.
    - The analysis must distinguish clarifying recontextualization from absorption of non-fit, disagreement, or missing evidence
      into a premature closure account.
    falsifier_conditions:
    - If a concrete scene preserves the old uncertainty frame and presents the new frame only as provisional, Φ_closure is
      weakened or not active.
    non_capture_note: 'Recontextualization must preserve possible non-capture.

      '
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is analytically central because the target pattern pressures reflective suspension. Distance is weak in
      the closure-drive scene when the demand for explanation overrides reversibility, but it must remain maintained in this
      PMS application.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The PMS analysis itself must suspend verdict, preserve reversibility, and avoid treating coherent PMS derivation as sufficient
      closure.
    - Distance in the scene must be distinguished from avoidance, denial, procedural delay, or legitimate withholding of judgment.
    falsifier_conditions:
    - If Χ is suspended by the analysis in order to force the case into a final PMS verdict, the PMS application is invalid.
    non_capture_note: 'Distance protects against overclaiming and premature closure.

      '
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ appears as the synthesis of scattered signs, ambiguities, and expectations into a coherent narrative or
      model. The major risk is over-integration: coherence is treated as adequate warrant.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'Integration must be tested for discriminative force: it must preserve unresolved evidence conditions rather than smooth
      them into a satisfying story.'
    - The case specifically requires distinguishing integration from forced coherence and distinguishing PMS coherence from
      proof of adequacy.
    falsifier_conditions:
    - If coherence is explicitly treated as provisional and not as warrant, finality, legal sufficiency, or empirical adequacy,
      Σ_overclaim is not supported.
    non_capture_note: 'PMS coherence is insufficient by itself.

      '
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is conditional. It becomes relevant only if a closure account becomes self-binding through durable commitment,
      institutional record, public narrative, legal position, managerial account, benchmark conclusion, or repeated self-relation.
      The abstract case does not establish full Ψ.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Apply Ψ only where durable self-binding or analytic self-binding is shown; do not infer it from one coherent explanation.
    - Do not attribute literal subjectivity to institutions, media cycles, legal systems, or AI evaluations; use only structural
      or analytic self-binding where explicitly scoped.
    falsifier_conditions:
    - If no durable commitment, stable normativity, or self-binding to the closure account appears, Ψ remains conditional and
      should not be included in the primary asserted chain.
    non_capture_note: 'Self-binding must not be inflated into metaphysical subjectivity or person-ranking.

      '
