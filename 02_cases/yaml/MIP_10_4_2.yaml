schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
reflection_mode: "off"
analysis_depth: "full"
content_language: "en"
model_reference_used:
  primary_model: "MIP - Maturity in Practice"
  source_file: "MIP - Maturity in Practice(2).yaml"
  model_status: "application_reference_for_this_analysis"
  relation_to_pms:
    pms_base_reference: "PMS.yaml remains the only PMS Base reference."
    pms_sex_reference: "PMS-SEX.yaml is treated only as an overlay/application profile."
    mip_reference: "MIP is applied as a further praxeological maturity-in-practice analysis layer."
  no_base_revision: true
  reflection_mode: "off"
  output_language: "English"

case:
  meta:
    case_id: "MIP-Consent-Laundering-001"
    case_title: "Consent Laundering"
    documentation_date: "2026-05-29"
    analysts:
      - name: "ChatGPT (GPT-5.5 Thinking)"
        role: "structural MIP application assistant"
        observer_position: "External structural analyst applying MIP to the already completed PMS Core and PMS-SEX overlay analyses without rewriting either analysis and without treating MIP as PMS Base."
    language: "English"
    confidentiality_level: "working_note_not_for_public_person_assessment"
    analysis_mode: "full"
    intended_use: "Conceptual structural clarification of maturity-in-practice requirements and limits for the case configuration, not evaluation of any person or concrete scene."
    application_zone: "philosophy_anthropology_with_structural_description"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "philosophy_anthropology"
      d_activation_decision: "not_activated_because_no_concrete_scene_and_D_risk_outweighs_added_clarity"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      The primary material consists of the original philosophical case material:
      "The case concerns situations in which an apparent act of consent is used
      to legitimize, sanitize, or obscure the conditions under which that consent
      was obtained, framed, or later invoked"; the completed PMS Core case YAML;
      and the completed PMS-SEX overlay YAML after the accepted textual
      refinements.
    secondary_material: >
      No external empirical record, legal record, clinical file, witness account,
      institutional policy, concrete sexual scene, body-consequence record,
      publicness record, or role-specific testimony is supplied. PMS.yaml remains
      the only PMS Base reference. PMS-SEX is used only as an overlay and MIP is
      used here only as an application layer for maturity-in-practice analysis.
    assumptions_and_inferences: >
      The analysis assumes only that "Consent Laundering" is a conceptual
      phenomenon-class, not a concrete praxis scene. Any MIP language about
      awareness, coherence, responsibility, power-to-act, asymmetry, dignity in
      practice, A-score, M-score, IA-box, or trajectory is therefore applied to
      the structural configuration and to the analysis discipline, not to a
      person, party, institution, or adjudicated event.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: >
        The conceptual structure is covered with high formal discipline, but
        concrete scene coverage is absent. The analysis can describe what would
        have to be reconstructed for a MIP maturity-in-practice assessment, but
        it cannot assign mature or inadult enactment to any person or role-holder.
      reliability_estimate: >
        Reliable as a bounded structural working note; unreliable for empirical,
        legal, clinical, forensic, organizational, interpersonal, or public
        decision-making because no concrete scene evidence is provided.
      known_gaps:
        - "No identified actors or role-holders."
        - "No concrete consent event."
        - "No sequence of actions beyond the abstract structure of obtaining, framing, and later invocation."
        - "No evidence of what was known, knowable, hidden, disclosed, refused, or revisable."
        - "No concrete asymmetry of power, exposure, capacity, dependency, publicness, bodily cost, legal status, or institutional authority."
        - "No concrete sexual scene, body remainder, publicness record, cost topology, or role-position distribution."
        - "No basis for A-score, M-score, D-profile, D-Quick-Grid, or IA verdict-style conclusion."
      main_bias_risks_here:
        - "Overfitting MIP to a conceptual case and thereby producing false maturity precision."
        - "Treating apparent consent as automatically suspicious rather than preserving ordinary bounded consent as a rival reading."
        - "Treating asymmetry as blame, diagnosis, or invalidity instead of a structural calibration requirement."
        - "Treating MIP scores as if they were required even when the model conditions for scoring are not met."
        - "Letting the prior PMS and PMS-SEX coherence make the MIP reading too smooth or under-discriminating."

  snapshot:
    short_case_description: >
      Consent Laundering names a conceptual configuration in which an apparent
      act of consent is used to legitimate, sanitize, or obscure the conditions
      under which that consent was obtained, framed, or later invoked. The MIP
      question is not whether any real person acted maturely or immaturely, but
      which awareness, coherence, responsibility, power-to-act, asymmetry, and
      dignity-in-practice requirements would have to be met before such a
      configuration could be judged in a concrete scene.
    central_actors_and_roles:
      - "No concrete actors are supplied."
      - "Conceptual role 1: consent-invoking role or frame-holder, not identified as a person."
      - "Conceptual role 2: consent-giving or consent-attributed role, not identified as a person."
      - "Conceptual role 3: observer, analyst, institution, or later audience, only hypothetical."
      - "Conceptual role 4: PMS/PMS-SEX/MIP analyst, constrained by guardrails."
    guiding_question: >
      Under MIP, what maturity-in-practice requirements and limits appear when a
      consent-sign is used as later legitimating closure, while no concrete
      scene, actor, evidence, or role-specific responsibility basis is supplied?
    level:
      - "conceptual phenomenon-class"
      - "structural application to completed PMS Core case"
      - "structural application to completed PMS-SEX overlay"
      - "non-concrete MIP working note"
    first_visible_asymmetry: >
      The first visible asymmetry is only candidate-level: a possible asymmetry
      between whoever can frame, archive, invoke, or interpret apparent consent
      and whoever bears the conditions, costs, exposure, or later consequences
      of that consent being invoked. This asymmetry is not established as an
      empirical fact.
    first_visible_D_themes_optional:
      - "Risk that a consent-sign could be used to close voice, refusal, revision, or recognition."
      - "Risk that dignity-in-practice language could itself become shaming if applied without a concrete scene."
      - "Need to preserve D0 as untouched and D1/D2 as enactment-only if D were ever activated."

  role_mapping:
    object_of_observation:
      type: "configuration_not_person"
      description: >
        The object of observation is the consent-laundering configuration as
        rendered by the PMS Core and PMS-SEX analyses: apparent consent may be
        detached from its acquisition, framing, or later invocation conditions.
      role: "conceptual case configuration"
      not_person_as_whole: true
    observer_position:
      role: "external structural analyst"
      power_relation_to_object: >
        The analyst has interpretive power over the written model output but no
        legitimate power over any person, legal status, concrete event, or
        empirical fact. This creates an analysis-side obligation to avoid false
        precision, person-labelling, and public verdict language.
      possible_effects_of_analysis: >
        The analysis could clarify structural requirements, but it could also
        mislead if interpreted as a maturity verdict, legal judgment, sexual
        accusation, or diagnosis. Therefore it must remain a working note and
        not a decision basis.
    involved_roles:
      - role: "consent-invoking or frame-holding role"
        mandate: >
          Hypothetically, this role would define, preserve, cite, or later invoke
          consent as legitimating evidence. No actual mandate or actor is
          supplied.
        built_in_asymmetries:
          - "Possible frame-control capacity."
          - "Possible interpretive advantage."
          - "Possible archival or publicness advantage."
          - "Possible ability to convert consent into closure."
        publicness_level: "unspecified"
        dignity_exposure: "unknown; potentially relevant only if a concrete scene shows humiliation, silencing, exposure, or degradation."
      - role: "consent-giving or consent-attributed role"
        mandate: >
          Hypothetically, this role is the one whose apparent consent is later
          invoked. No actual person, statement, capacity, or scene is supplied.
        built_in_asymmetries:
          - "Possible exposure to later framing."
          - "Possible reduced ability to revise, refuse, contextualize, or contest the consent-sign."
          - "Possible burden of proving the relevance of acquisition conditions."
        publicness_level: "unspecified"
        dignity_exposure: "unknown; not inferable without concrete evidence."
      - role: "analyst"
        mandate: >
          Apply MIP structurally while preserving PMS Base discipline, PMS-SEX
          overlay limits, non-capture, score hygiene, D0 inviolability,
          non-diagnostic use, and non-person-ranking.
        built_in_asymmetries:
          - "Interpretive asymmetry created by the act of formal analysis."
          - "Risk of model authority over an under-specified case."
        publicness_level: "chat-output working note"
        dignity_exposure: "managed by avoiding person labels, shaming, public D-readings, and score overclaim."
    publicness:
      level: "not_public_case_material; publicness_of_hypothetical_scene_unspecified"
      A_P_relevance: >
        Awareness of publicness is relevant only as a future reconstruction
        requirement. The PMS-SEX overlay correctly treated publicness as weak and
        overlay-only because no documentation, circulation, media exposure, or
        reputational sedimentation is given.
      P_PU_relevance: >
        Public power-to-act cannot be assessed. No participant, institution,
        platform, audience, archive, media field, or reputational mechanism is
        supplied.
      D_P_relevance_if_D_active: >
        If D were activated in a future concrete case, D-P would require careful
        protection against public shaming and humiliation. In the present case
        D-P is not activated.
      public_shaming_risk: >
        The main risk lies in misuse of the analysis: reading consent-laundering
        language or PMS-SEX drift vocabulary as public accusation without scene
        evidence.
      reversibility_risk: >
        Reversibility risk is moderate at the level of language because labels
        such as laundering, drift, asymmetry-switch, or inadultness can harden
        quickly. The analysis reduces this risk by withholding scores and
        verdicts.

  frame_vs_variability:
    frame_elements:
      - element: "PMS Base discipline"
        reason_fixed_or_slow: "PMS.yaml remains the only PMS Base reference and cannot be rewritten by MIP or PMS-SEX."
        protected_goods:
          - "operator discipline"
          - "non-diagnostic use"
          - "Dignity-in-Practice"
          - "reversibility"
          - "non-capture"
      - element: "MIP guardrails"
        reason_fixed_or_slow: "MIP requires person/enactment separation, score hygiene, D0 protection, red-zone avoidance, and documentation of standpoint."
        protected_goods:
          - "D0 inviolability"
          - "no person labels"
          - "no dignity score"
          - "no forensic, clinical, HR, or public-shaming use"
      - element: "Non-concrete case status"
        reason_fixed_or_slow: "The original material supplies a phenomenon-class, not actors, scene, evidence, sequence, or role-specific conduct."
        protected_goods:
          - "fairness of interpretation"
          - "avoidance of false precision"
          - "protection from overclaim"
      - element: "Consent-frame as conceptual object"
        reason_fixed_or_slow: "The only stable object is the conceptual structure in which apparent consent may be used to obscure its own conditions."
        protected_goods:
          - "clarity about consent-sign versus consent validity"
          - "preservation of rival readings"
          - "avoidance of automatic suspicion"
    variability_elements:
      - element: "Concrete scene reconstruction"
        possible_change: "A future case could supply actors, roles, sequence, evidence, publicness, cost topology, and alternative accounts."
        responsible_roles:
          - "future analyst"
          - "case owner"
          - "context-specific accountable institution, if any"
      - element: "A-/M-/IA assessment status"
        possible_change: "Scores and IA classification could become possible if a concrete enactment H and role-holder X were documented."
        responsible_roles:
          - "future MIP analyst"
          - "scene participants or accountable record-holders"
      - element: "D-module activation"
        possible_change: "D may be activated only if there is a clear protective purpose, safe communication space, documented role-context-time window, and more clarity than shame."
        responsible_roles:
          - "future MIP analyst under guardrails"
      - element: "PMS-SEX overlay relevance"
        possible_change: "SEX-specific fields may become active if the case is concretely sexual and supplies body remainder, sexual cost topology, inner/outer/public layers, or switch-drift evidence."
        responsible_roles:
          - "future PMS-SEX/MIP analyst"
    unfair_high_M_zones:
      - "Assigning high M-score to any hypothetical role would be unfair because no actor, knowledge, predictability, alternatives, power-to-act, or integration attempt is documented."
      - "Interpreting the consent-invoking role as blameworthy would be unfair without knowing whether the later invocation was transparent, justified, bounded, and reversible."
      - "Interpreting the consent-giving or consent-attributed role as responsible for later consequences would be unfair without knowing capacity, alternatives, dependencies, information, and exit conditions."
    system_as_excuse_risk:
      - "Because there is no concrete system, structural language could become an excuse for avoiding role-specific responsibility if future evidence is supplied."
      - "Conversely, abstract system language could become a way to imply hidden fault without evidence; both risks must be avoided."
    D1_D2_realistically_improvable_where:
      - "In the analysis itself: maintain non-shaming language, avoid labels, preserve D0, and refuse public accusation."
      - "In a future concrete scene: improve D1/D2 only through specific enactments such as voice, refusal-space, transparency, reviewability, non-humiliation, and repair pathways."

  acrp_profile:
    A_awareness:
      observations: >
        Awareness is structurally present in the analysis, not in any identified
        actor. The PMS Core case already required distinguishing apparent
        consent from acquisition, framing, absence, asymmetry, and later
        invocation. MIP adds that any concrete maturity reading would require
        knowing who knew what, who could realistically know it, and whether
        publicness and role-specific effects were visible.
      available_information: >
        Available information includes only the abstract case formulation and
        the prior PMS/PMS-SEX analyses. It does not include participant
        knowledge, intent, access to information, scene details, or evidence.
      realistically_knowable: >
        At this stage, only structural requirements are knowable. It is
        realistically knowable that scoring would be premature, that Ω and SEX
        cost topology are under-specified, and that D must remain guardrail-only
        unless a safe and concrete purpose is supplied.
      blind_spots: >
        The main blind spots are concrete knowledge distribution, role-specific
        awareness, publicness awareness, asymmetry awareness, body consequences,
        legal frame, cultural frame, and alternative readings of the consent act.
      role_awareness_A_R: >
        Role awareness is available only for the analyst role. Hypothetical
        consent-invoking and consent-attributed roles are not documented enough
        to assess their role awareness.
      publicness_awareness_A_P: >
        Publicness awareness cannot be assessed for any scene actor. The
        analysis itself is aware that publicness is unspecified and that public
        use would increase dignity and reversibility risks.
      bias_awareness: >
        Bias awareness must remain high because the terms "laundering" and
        "consent" can invite strong moral intuitions. The analysis treats those
        intuitions as signals requiring structural discrimination, not as proof.
    C_coherence:
      observations: >
        The conceptual PMS and PMS-SEX readings are coherent, but MIP treats
        coherence as insufficient by itself. The central coherence question is
        whether consent, conditions, frame, later invocation, costs, and
        revisability can be held together without smoothing over missing
        evidence.
      word_deed_relation: >
        No word-deed relation can be assessed because no concrete words, deeds,
        commitments, refusals, or repairs are supplied. At the analysis level,
        the wording remains coherent with the declared boundaries.
      role_context_coherence: >
        Role-context coherence is partial at the analysis level and absent at
        the scene level. The analyst role is coherent because it avoids verdicts;
        hypothetical scene roles cannot be assessed.
      narrative_coherence: >
        The narrative "apparent consent is used to legitimate or obscure
        conditions" is structurally coherent. It remains a candidate narrative,
        not a finding. Rival narratives remain possible, including ordinary
        consent continuity and lawful bounded invocation.
      breaks_named_or_hidden: >
        Breaks are named rather than hidden: absent concrete scene, absent role
        distribution, absent cost topology, absent evidence, weak Ω, weak Σ, and
        non-active Ψ.
    R_responsibility:
      observations: >
        Responsibility cannot be assigned to persons or concrete roles. MIP can
        only identify responsibility questions: who controlled the frame, who
        could disclose conditions, who could preserve revisability, who could
        prevent later misuse, and who could repair obscuration.
      responsibility_points: >
        Potential responsibility points include acquisition conditions, framing,
        documentation, later invocation, public circulation, refusal-space,
        asymmetry marking, cost handling, and correction pathways. None is
        assigned as a finding.
      assumed_responsibility: >
        The analysis assumes responsibility only for its own discipline: no
        overclaim, no score misuse, no D misuse, no person labels, and no public
        accusation.
      shifted_or_refused_responsibility: >
        No concrete shifted or refused responsibility is found. Conceptually,
        consent laundering may involve shifting responsibility away from consent
        conditions by invoking apparent consent, but this remains a structural
        hypothesis.
      burdens_and_consequences: >
        Burdens and consequences are not documented. PMS-SEX identified sexual
        cost topology as weak and not active; MIP therefore cannot map actual
        burdens.
    P_power_to_act:
      observations: >
        Power-to-act is assessable only for the analysis itself. The analyst can
        maintain boundaries, avoid scoring, preserve rival readings, and state
        operationalization requirements. Scene-level power-to-act is unknown.
      real_levers: >
        Real levers at this stage include careful documentation, explicit
        non-scoring, D deactivation, role-bound language, and preserving the
        future requirement for concrete evidence.
      formal_vs_real_options: >
        Formally, the model permits A/M/IA/D fields; realistically, those fields
        must mostly remain not scored or not activated because the input lacks
        the evidence required for fair assessment.
      used_options: >
        The analysis uses the option to mark fields as not applicable,
        under-specified, risk-only, or guardrail-only where evidence is missing.
      unused_options: >
        The analysis does not use direct A-score, M-score, IA classification,
        D-profile, D-Quick-Grid, adultness verdict, maturity verdict, legal
        conclusion, or clinical framing.
      ceiling_rule_relevance: >
        The M-score ceiling rule is not directly applied because there is no
        role-holder X. Its spirit is relevant: without predictability and real
        alternatives, high M would be invalid.

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: "No self-devaluation enactment is visible because no person or scene is supplied."
      self_neglect: "No self-neglect enactment is visible."
      shame_dynamics: "No concrete shame dynamic is evidenced; however, the analysis itself could create shame if misused as public accusation, so D remains off."
      degradation_of_others: "No concrete degradation of others is evidenced."
      public_shaming: "No public shaming is present in the material; public shaming remains a prohibited misuse of the analysis."
      protest_or_refusal: "No concrete protest or refusal is supplied. Absence of protest must not be interpreted as consent, maturity, immaturity, or drift."
      dignity_protection: "Dignity protection is enacted by refusing person labels, scores as verdicts, public D-readings, and sexual diagnosis."
    next_step_if_relevant: "Use D-profile section below only if a future concrete scene supplies a safe, protective, role-bound purpose."

  acrpd_submodules_profile:
    A:
      A-I: >
        Inner awareness is not assessable. No actor's impulses, ambivalence,
        inner signals, or self-description are supplied. MIP must not infer
        motive, denial, desire, bad faith, or inner consent.
      A-R: >
        Role awareness is assessable only for the analyst role: the analysis
        knows it is applying MIP to a conceptual configuration and not to a
        person. Scene-role awareness is unknown.
      A-C: >
        Context awareness is partial. The analysis is aware that PMS Core,
        PMS-SEX overlay, and MIP have different statuses and that the case lacks
        a concrete context.
      A-IM: >
        Impact awareness is high at the analysis level: the analysis recognizes
        that terms such as laundering, drift, asymmetry, and maturity can have
        harmful effects if misused.
      A-P: >
        Publicness awareness is present as a guardrail. Publicness of any scene
        is unknown; public use of this analysis would increase risk and is not
        authorized.
    C:
      C-S: >
        Social coherence cannot be assessed for participants. The analysis
        remains socially cautious by avoiding accusation and preserving rival
        readings.
      C-P: >
        Coherence in power contexts is partial. Possible power asymmetry is
        named but not moralized or treated as established.
      C-N: >
        Narrative coherence is structurally strong but deliberately limited. The
        laundering narrative is not allowed to absorb all rival readings.
      C-I: >
        Institutional or rule coherence is not assessable because no legal,
        institutional, contractual, or procedural frame is supplied.
    R:
      R-I: >
        Individual responsibility is not assigned. No individual actor, knowledge
        profile, alternative, or action sequence is supplied.
      R-S: >
        Social responsibility is not assigned. A future case might examine
        relational or group responsibility for consent framing, but not here.
      R-E: >
        Ethical responsibility remains a structural question: preserve
        transparency, revisability, non-shaming, and non-externalization of
        burdens where a concrete scene shows them.
      R-P: >
        Public responsibility is not active as a scene finding. The analysis
        does carry public-responsibility guardrails because written outputs can
        be misused.
    P:
      P-I: >
        Inner agency is not assessable for any participant. At the analysis
        level, the available agency is to remain disciplined and avoid false
        precision.
      P-S: >
        Social agency is unknown because no relationships, dependencies, or
        social options are supplied.
      P-C: >
        Cultural agency is relevant only as a caution: consent and laundering
        carry cultural meanings that PMS/MIP may not exhaust.
      P-PU: >
        Public agency is not assessable for scene roles. Public agency of the
        analysis is limited by its working-note status and not-for-public-verdict
        boundary.
    D:
      active: false
      D-I: "Not activated. No inner dignity or self-treatment reading is justified."
      D-B: "Not activated. No bodily or material self-care reading is justified."
      D-R: "Not activated as a profile. Relational dignity is preserved only as a guardrail against shaming and degradation."
      D-P: "Not activated as a public D reading. Public dignity protection is relevant only as a prohibition on public shaming or identifiable D-labelling."
      note: "D-submodules are not activated because the case is non-concrete and D would create more risk of shame or false authority than added clarity."

  scores_and_ia:
    A_score:
      A_band: "not_scored"
      boundary_confirmed: "A-score describes enactment, not essence."
      time_role_context: >
        No concrete enactment H, role rho, context K, or time window is supplied.
        Therefore A(H) is not assigned. The analysis itself shows disciplined
        maturity of method, but that is not scored as the case's A-score.
      justification:
        A_awareness: >
          Awareness requirements are identified, but no actor awareness is
          assessable. This supports not scoring rather than a low or high band.
        C_coherence: >
          The conceptual reading is coherent, but MIP coherence is insufficient
          for scoring because it lacks scene evidence.
        R_responsibility: >
          Responsibility questions are mapped, but no responsibility is assigned.
        P_power_to_act: >
          Power-to-act is unknown for scene roles and available only for the
          analyst's documentation discipline.
        modulators_context: >
          Possible modulators such as publicness, role-power, information
          access, dependency, and stress are not supplied. PMS-SEX modulators
          remain weak or not applicable.
      D_excluded_from_A_number: true
    M_score:
      M_band: "not_scored"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
      role_position_time_frame: >
        No actor or role-holder X, role position, or concrete time frame is
        supplied. M(X) is therefore not assigned.
      five_factors:
        knowledge: "Unknown. No evidence of what any role knew or could realistically know."
        power_control: "Unknown. No real levers, authority, dependency, or control position is documented."
        predictability: "Unknown. No concrete consequence trajectory is supplied."
        access_to_alternatives: "Unknown. No refusal-space, exit path, or alternative action set is documented."
        serious_integration_attempt: "Unknown. No repair, disclosure, mitigation, review, or integration attempt is supplied."
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: false
        explanation: >
          The ceiling rule is not applied because there is no role-holder to
          score. The correct result is not "low M" but "no M-score." If a future
          scene showed predictability or alternatives approximately zero, then
          high M would be invalid under the ceiling rule.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: >
        Candidate asymmetry is named only abstractly: possible imbalance in who
        can frame, invoke, archive, publicize, or close interpretation of consent
        versus who bears acquisition conditions, exposure, cost, or later
        consequences.
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "not_assessable"
