    being_permitted:
      issue: >
        Permission and frame authorization are unresolved: no rule, norm,
        institution, relationship frame, or legal context is supplied.
      possible_intervention: >
        Identify the operative frame and whether it permits refusal, revision,
        withdrawal, later contestation, and scope limitation.
    willing:
      issue: >
        Willingness is unresolved and must not be inferred. No actor's intention,
        desire, motive, bad faith, or corrective willingness is supplied.
      possible_intervention: >
        Do not psychologize. If a future scene supplies statements or actions,
        read them as enactments under context, not as essence.

  ia_protection:
    transparency_measures:
      - "Separate apparent consent from acquisition conditions, framing, scope, later invocation, and evidence."
      - "Name all assumptions and unknowns before any maturity or responsibility language is used."
      - "Make clear that PMS-SEX drift vocabulary is conditional and not a person label."
    justification_measures:
      - "Require a concrete protected good or legitimate purpose before treating an asymmetry as justified."
      - "Distinguish ordinary bounded consent invocation from laundering recontextualization."
      - "Preserve legal, ethical, cultural, and discourse-theoretic rival readings."
    time_boundedness_measures:
      - "Specify the time window of consent acquisition, consent framing, later invocation, and possible review."
      - "Identify whether consent scope, withdrawal, revision, or contestation is time-limited or open."
    reversibility_measures:
      - "Identify real exit, repair, correction, refusal, and re-reading pathways."
      - "Do not let a consent-sign function as irreversible closure without evidence that the frame legitimately supports that closure."
    participation_or_voice_measures:
      - "Ensure that the consent-attributed role has possible voice in reconstructing conditions if a concrete case is analyzed."
      - "Treat absence of objection, silence, rupture, or non-fit as non-conclusive unless frame-specific meaning is shown."
    dignity_protection_measures:
      - "Keep D0 untouched and do not issue D-scores."
      - "Do not use MIP, PMS, or PMS-SEX language for public shaming, accusation, humiliation, or person-ranking."
      - "Use D only if a concrete protective purpose and safe communication space exist."
    review_or_falsifier:
      date_or_interval: "Before any external or practical use of this analysis."
      falsifier_question: >
        Does the available scene evidence show transparent continuity between
        the original consent-frame and later invocation, with no meaningful
        obscured condition, no unmarked asymmetry, and real reversibility?
      responsible_roles:
        - "future analyst"
        - "case owner"
        - "context-specific accountable reviewer if the analysis leaves conceptual use"

  trajectory:
    principle: "Trajectories, not labels."
    timeline:
      - timepoint: "t0"
        short_description: >
          Conceptual moment of apparent consent being obtained or framed. No
          concrete actor, statement, condition, or role is supplied.
        A_band: "not_scored"
        M_band: "not_scored"
        D_observation_optional: "D not activated; no dignity enactment visible."
        key_context_role_power_situation: >
          Only the consent-frame is conceptually present. Role power, context,
          publicness, body consequence, and alternatives are unknown.
      - timepoint: "t1"
        short_description: >
          Conceptual later invocation of apparent consent as legitimating,
          sanitizing, or obscuring the conditions of t0.
        A_band: "not_scored"
        M_band: "not_scored"
        D_observation_optional: "D not activated; risk of dignity misuse lies mainly in over-reading the analysis."
        key_context_role_power_situation: >
          Temporal displacement is present as a conceptual structure, but no
          actual invocation event, actor, institution, or consequence is supplied.
    A_t:
      pattern: "not_scored_across_time"
      notes: >
        A(t) cannot be charted as maturity in practice because there is no
        concrete series of enactments. The only temporal pattern is structural:
        apparent consent at t0 may be invoked at t1 in a transformed frame.
    M_t_RVR_t:
      RVR_description: >
        RVR(t) cannot be assigned for any role-holder. At the conceptual level,
        future RVR analysis would ask how knowing_t, able_t, permitted_t, and
        acting_t changed between consent acquisition and later invocation.
      knowledge_over_time: "Unknown for all roles."
      leverage_over_time: "Unknown for all roles."
      alternatives_over_time: "Unknown for all roles."
      ceiling_rule_over_time: >
        The ceiling rule cannot be applied without a role-holder. It remains a
