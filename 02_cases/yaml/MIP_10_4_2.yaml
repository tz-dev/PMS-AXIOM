case:
  meta:
    case_id: MIP_CONSENT_LAUNDERING_PMS_SEX_OVERLAY_2026_07_07
    case_title: Consent Laundering — MIP Analysis over PMS Core and PMS-SEX Overlay
    documentation_date: '2026-07-07'
    analysts:
    - name: T. Zöller
      role: originator / repository authorial source
      observer_position: model-originating theoretical standpoint; not a party to a concrete consent scene
    - name: ChatGPT (GPT-5.5 Thinking)
      role: formalization assistant
      observer_position: secondary structural analyst using supplied PMS, PMS-SEX, and MIP YAML materials
    language: en
    confidentiality_level: anonymised_public
    analysis_mode: full
    intended_use: structural_case_review_for_scientific_publication
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: philosophy_anthropology
      d_activation_decision: activated_as_structural_protection_layer_only
      transmission_default: working_note_until_checked

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: true
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: Completed PMS Core case analysis of Consent Laundering; completed PMS-SEX overlay for the same case; MIP - Maturity in Practice YAML v3.0 as the present analysis template and model reference.
    secondary_material: No independent empirical scene record, legal record, actor testimony, institutional file, clinical record, or forensic evidence is supplied.
    assumptions_and_inferences: The case is treated as a conceptual domain projection and phenomenon-class, not as a concrete event. MIP therefore analyses structural maturity conditions of a consent-laundering configuration and not any person, relationship, institution, legal dispute, or empirical case.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: medium
      reliability_estimate: medium
      known_gaps:
      - No concrete actors or role-holders are supplied.
      - No bounded sexual or non-sexual consent scene is supplied.
      - No evidence of actual consent validity, coercion, refusal, alternatives, capacity, publicness, or after-scene consequences is supplied.
      - No institutional, legal, cultural, or procedural frame is selected as binding.
      - No chronology beyond conceptual obtaining, framing, and later invocation is evidenced.
      - No affected-side counter-perspective is available.
      main_bias_risks_here:
      - conceptual_overfit_to_PMS_and_PMS_SEX_vocabulary
      - hindsight_bias_from_laundering_label
      - normative_inflation_of_consent_language
      - false_precision_from_yaml_form
      - dignity_language_becoming_moral_weapon
      - confusing_structural_risk_with_case_finding

  snapshot:
    short_case_description: Consent Laundering names a configuration in which an apparent consent-sign is later invoked to legitimate, sanitize, or obscure the conditions, costs, asymmetries, absences, or frame shifts under which that consent-sign became meaningful. PMS Core frames this as a conceptual operator projection; PMS-SEX adds sexual cost topology, direct otherness, publicness, embodiment/boundary, withdrawal/binding, and after-scene dignity as conditional overlay readouts.
    central_actors_and_roles:
    - 'role_A: possible later-invocation, frame-control, warranting, or narrative-continuity position'
    - 'role_B: possible condition-bearing, cost-bearing, refusal-space, exposure, exit, or after-scene position'
    - 'field_or_medium: optional sexualized, institutional, publicness, documentation, category, or shared-narrative layer'
    - 'observer_or_analyst: structural reader applying PMS, PMS-SEX, and MIP without person verdicts'
    guiding_question: What does MIP reveal about maturity in practice when a consent-sign remains formally legible while the conditions, costs, asymmetries, publicness, reversibility, or dignity effects of its later invocation may become less reconstructable?
    level:
    - conceptual
    - structural
    - dyadic_possible
    - institutional_possible
    - cultural_possible
    - sexual_domain_possible
    first_visible_asymmetry: Potential asymmetry between the position able to invoke consent as closure and the position carrying the cost, exposure, refusal-space, after-scene, or publicness burden of that invocation.
    first_visible_D_themes_optional:
    - Dignity-in-Practice risk if consent language becomes a tool of shaming, silencing, exposure, or person-shrinking.
    - D-P risk if publicness or documentation converts a consent-sign into reputational measure or public pressure.
    - D-R risk if relational dignity is reduced to formal permission while cost, boundary, withdrawal, or protest is made unreadable.
    - D0 remains untouched and outside the analysis.

  role_mapping:
    object_of_observation:
      type: narrative
      description: A consent-invocation configuration described by PMS Core and PMS-SEX, not an individual person or empirical scene.
      role: conceptual phenomenon-class used for structural maturity analysis
      not_person_as_whole: true
    observer_position:
      role: external structural analyst and formalization layer
      power_relation_to_object: No direct power over a concrete person or event; interpretive power over the conceptual formulation exists and must be self-bound by guardrails.
      possible_effects_of_analysis: Could clarify structural risks for publication, but could also over-authorize moralized consent, sex, or dignity claims if not kept conceptual and non-verdictive.
    involved_roles:
    - role: later_invocation_or_frame_control_position
      mandate: If present in a concrete scene, this role would need to preserve transparency, scope, alternatives, cost visibility, and reversibility when invoking consent.
      built_in_asymmetries:
      - framing_control_possible
      - narrative_authority_possible
      - documentation_or_publicness_leverage_possible
      - access_to_legitimating_language_possible
      publicness_level: indeterminate
      dignity_exposure: Risk of externalizing dignity cost if consent-language becomes closure over another role’s burden or protest.
    - role: condition_cost_or_after_scene_carrying_position
      mandate: If present in a concrete scene, this role should remain legible as a real other with voice, refusal-space, boundary, and after-scene standing; no access or explanation obligation is inferred.
      built_in_asymmetries:
      - exposure_possible
      - exit_cost_possible
      - reputational_cost_possible
      - body_boundary_cost_possible
      - after_scene_burden_possible
      publicness_level: indeterminate
      dignity_exposure: Risk of being reduced to a prior consent-sign rather than treated as a continuing dignity-bearing participant in the scene structure.
    - role: field_or_medium
      mandate: If present, the institutional, cultural, legal, archival, platform, or public narrative layer must not amplify closure, shaming, or false symmetry.
      built_in_asymmetries:
      - visibility_scaling_possible
      - archival_fixation_possible
      - institutional_authority_possible
      - normative_category_pressure_possible
      publicness_level: indeterminate
      dignity_exposure: Risk of converting private or bounded consent language into public measure, confession demand, or reputational pressure.
    publicness:
      level: conceptual_publication_context; concrete scene publicness indeterminate
      A_P_relevance: High for the analysis itself, because publication can stabilize categories; indeterminate for the case scene because no publicness layer is supplied.
      P_PU_relevance: Analyst and publication have cultural-symbolic power to frame consent laundering; concrete actors’ public agency is not supplied.
      D_P_relevance_if_D_active: D-P is relevant as a guard against public shaming, humiliation, person-ranking, or forced confession; no identifiable person is evaluated.
      public_shaming_risk: Low in the conceptual publication form if anonymized and non-personal; high if later applied to identifiable persons without moderation.
      reversibility_risk: 'Moderate: concepts can harden into labels; mitigated by explicit non-capture, no-score, no-person-verdict, and review clauses.'

  frame_vs_variability:
    frame_elements:
    - element: D0 ontological dignity remains inviolable
      reason_fixed_or_slow: MIP axiom; not open to scoring, ranking, increase, loss, or comparative evaluation.
      protected_goods:
      - person_worth
      - non_rankability
      - anti_humiliation
    - element: PMS operator dependencies remain unchanged
      reason_fixed_or_slow: Repository discipline; MIP must not rewrite PMS Core or PMS-SEX dependency logic.
      protected_goods:
      - formal_integrity
      - dependency_hygiene
      - non_overwrite
    - element: Consent validity is not decided by this analysis
      reason_fixed_or_slow: MIP is not legal, forensic, clinical, or procedural authority.
      protected_goods:
      - due_process
      - rival_readings
      - non_capture
    - element: Person-enactment separation
      reason_fixed_or_slow: Constitutive MIP guardrail; the object is a configuration, not a person.
      protected_goods:
      - dignity_protection
      - score_hygiene
      - anti_labeling
    variability_elements:
    - element: Transparency of consent invocation
      possible_change: A concrete scene could make scope, conditions, alternatives, and later use explicit.
      responsible_roles:
      - later_invocation_position
      - field_or_medium
      - moderating_or_review_role_if_present
    - element: Cost-topology reconstruction
      possible_change: A concrete application could name bodily, exposure, exit, access, publicness, responsibility, and after-scene costs without scoring persons.
      responsible_roles:
      - analyst
      - roles_with_information_access
      - affected_side_if_safe_and_voluntary
    - element: Reversibility and review
      possible_change: A scene-bound process could add review points, correction channels, withdrawal recognition, or falsifier tests.
      responsible_roles:
      - frame_holder
      - institutional_role_if_present
      - observer_or_auditor
    - element: Dignity-protective language
      possible_change: The analysis can use D only to protect dignity and reveal dynamics, not to shame or rank.
      responsible_roles:
      - analyst
      - publication_editor
      - moderator_if_concrete_use
    unfair_high_M_zones:
    - Any attempt to assign high M to role_B without knowing predictability, alternatives, access, dependency, or refusal-space.
    - Any attempt to assign high M to role_A solely because the label consent laundering sounds normatively negative.
    - Any attempt to infer maturity or adultness from sexual cost topology without MIP docking and concrete scene evidence.
    - Any attempt to treat the system or field as fully responsible while erasing real individual levers where they exist.
    system_as_excuse_risk:
    - Calling the pattern structural could become a way to avoid naming who holds frame-control or publicness power in a concrete scene.
    - Calling the case conceptual could become a way to avoid protection questions where actual affected persons exist.
    - Using PMS/PMS-SEX terminology could make the analysis appear complete while costs, alternatives, and counter-perspectives remain missing.
    D1_D2_realistically_improvable_where:
    - D-R can be improved by refusing humiliating, shaming, or person-reducing interpretations.
    - D-P can be improved by keeping publication and publicness anonymized, reversible, and non-punitive.
    - D-I and D-B remain non-assessed because no person’s self-treatment or bodily self-care is supplied.
    - Dignity protection can be improved by clearly separating consent-sign, cost topology, legal validity, moral legitimacy, and person worth.

  acrp_profile:
    A_awareness:
      observations: 'The analysis has high conceptual awareness of distinctions: apparent consent versus conditions, source frame versus later invocation, structural absence versus missing evidence, sexual cost topology versus consent validity, and D0 versus D1/D2. Awareness is limited by absence of concrete scene data.'
      available_information: PMS Core operator reading, PMS-SEX overlay, and MIP template are available; empirical facts, actors, testimony, legal standards, and concrete publicness are not.
      realistically_knowable: At the conceptual level, it is realistically knowable that later invocation of consent can alter transparency, cost visibility, reversibility, and dignity effects. It is not realistically knowable whether any specific consent was laundered.
      blind_spots: Concrete role asymmetry, actual alternatives, actual power to act, body-boundary facts, publicness reach, and affected-side interpretation remain unknown.
      role_awareness_A_R: 'Strong at the analytic level: roles are explicitly kept as role positions rather than persons. Weak at the scene level because no real role mandates are supplied.'
      publicness_awareness_A_P: 'Strong for the publication context: the analysis recognizes the risk of concept-hardening and public shaming. Indeterminate for the original case scene.'
      bias_awareness: 'Explicitly marked: overfit, hindsight, moralization, false precision, dignity weaponization, and PMS/PMS-SEX vocabulary inflation are named as risks.'
    C_coherence:
      observations: 'The PMS, PMS-SEX, and MIP layers cohere if each remains in its lane: PMS supplies operator grammar, PMS-SEX supplies sexual-domain overlay, and MIP supplies maturity-in-practice and dignity guardrails. Coherence fails if any layer becomes a verdict machine.'
      word_deed_relation: The declared non-diagnostic and non-verdictive stance is coherent only if the analysis avoids person labels, legal conclusions, maturity verdicts, and practice instructions.
      role_context_coherence: The case is coherent as conceptual-domain analysis; it would become incoherent if treated as a concrete finding without scene evidence.
      narrative_coherence: 'The narrative is structurally coherent: consent-sign, later invocation, opacity of conditions, and possible dignity cost are linked. The risk is excessive smoothness: coherence could hide non-capture or rival readings.'
      breaks_named_or_hidden: 'Breaks are named: no concrete scene, weak Ω, weak Σ, withheld Ψ, indeterminate publicness, no consent verdict, and no M-score for persons.'
    R_responsibility:
      observations: Responsibility appears as shared structural responsibility for transparency, cost visibility, reversibility, review, and dignity-protective handling of asymmetry. No guilt or blame is assigned.
      responsibility_points: Frame holders must preserve scope and conditions; later invokers must avoid closure by consent-sign; analysts must avoid overfit and person verdicts; publication contexts must prevent public shaming or concept-hardening.
      assumed_responsibility: The analysis assumes responsibility for guardrails, distinction between material and inference, non-capture, and reversible transmission status.
      shifted_or_refused_responsibility: A laundering configuration would shift responsibility if it used apparent consent to move costs, opacity, or repair burdens onto the cost-bearing role while preserving formal legitimacy for the invoking role. This remains conditional, not found.
      burdens_and_consequences: Possible burdens include loss of voice, loss of refusal-space, reputational exposure, body-boundary invisibility, publicness cost, after-scene dignity cost, and confusion between consent validity and cost topology.
    P_power_to_act:
      observations: Power to act is strong for the analyst in structuring the concept responsibly; unknown for concrete role positions. The conceptual analysis can create clarity but cannot restore scene-level reversibility by itself.
      real_levers: Available levers include preserving conceptual boundaries, naming missing data, refusing person labels, requiring scene evidence for M or IA escalation, and setting transmission as working note rather than decision basis.
      formal_vs_real_options: Formal options exist to map A–C–R–P–D, IA, and D; real options concerning concrete consent, exit, correction, or protection are unknown without scene data.
      used_options: The analysis uses non-personal role mapping, provisional bands, IA-risk rather than verdict, D activation under guardrails, and non-capture notes.
      unused_options: It does not decide consent validity, identify persons, prescribe relationship or legal action, or assign adultness/maturity to persons.
      ceiling_rule_relevance: 'High: without predictability and real alternatives, M cannot be high. Since no concrete actor has documented knowledge, leverage, or alternatives, M is capped and largely not assignable.'

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: Not observable; no person’s self-relation is supplied.
      self_neglect: Not observable; no bodily or material self-care data is supplied.
      shame_dynamics: Possible at configuration level if publicness, exposure, or later invocation turns consent into humiliation or silencing; not established.
      degradation_of_others: Possible at configuration level if a role is reduced to a consent-sign or permission-image; not established as a person act.
      public_shaming: Publication risk is controlled by conceptual and anonymized framing; concrete scene public shaming is indeterminate.
      protest_or_refusal: PMS Core preserves refusal and non-capture; concrete protest or refusal is not supplied.
      dignity_protection: 'Strong as an analytic guard: D0 untouched, D1/D2 qualitative only, no person labels, no public D-reading of identifiable persons.'
    next_step_if_relevant: Use D-profile section below.

  acrpd_submodules_profile:
    A:
      A-I: Not applied to inner states; no subjective awareness is inferred.
      A-R: 'Strong analytically: role positions are marked and not persons; weak empirically because no concrete mandates are supplied.'
      A-C: 'Strong conceptually: PMS, PMS-SEX, and MIP frames are separated; concrete legal, institutional, relational, or cultural context remains unspecified.'
      A-IM: 'Moderate-to-strong conceptually: potential impacts of closure, cost opacity, publicness, and dignity stress are named; actual impacts are unknown.'
      A-P: Strong for publication/publicness guardrails; indeterminate for the original scene.
    C:
      C-S: 'Conditional: social coherence depends on whether later consent invocation remains intelligible and non-shaming in a concrete social setting.'
      C-P: 'Weak-to-risk: power-context coherence is not established because Ω is weak; the reading names possible asymmetry without assuming it.'
      C-N: 'Moderate: the narrative is coherent as a conceptual risk model, but it may become over-assimilative if rival readings are not preserved.'
      C-I: 'Indeterminate: institutional/rule coherence depends on external procedural standards not supplied by PMS or MIP.'
    R:
      R-I: Not person-assignable; individual responsibility requires concrete knowledge, leverage, predictability, alternatives, and integration attempt.
      R-S: 'Conceptually relevant: relational responsibility would require keeping voice, refusal-space, and cost distribution visible.'
      R-E: 'High as analytic responsibility: dignity, reversibility, non-capture, and anti-shaming guardrails must be carried.'
      R-P: High for publication and conceptual dissemination; concrete public responsibility remains indeterminate.
    P:
      P-I: Not applied to inner agency of persons; no subjective power-to-act is inferred.
      P-S: Indeterminate for concrete roles; conceptually relevant where social alternatives, correction, or withdrawal channels exist.
      P-C: 'High for the analysis itself: it shapes categories and symbolic readability of consent-laundering structures.'
      P-PU: 'Moderate: publication can amplify concept use; must remain anonymized, reversible, and non-punitive.'
    D:
      active: true
      D-I: Not assessed; no self-treatment data is supplied.
      D-B: Not assessed; no bodily or material self-care data is supplied.
      D-R: 'Active as protection lens: avoid reducing any role to consent-sign, cost-bearer, offender, victim, pathology, or maturity type.'
      D-P: 'Active as publicness guard: prevent public shaming, dignity labelling, confession pressure, or reputational punishment.'
      note: D-submodules are used qualitatively and only as dignity-in-practice guardrails; D0 remains untouched and outside all metrics.

  scores_and_ia:
    A_score:
      A_band: 4-5_provisional_for_analysis_artifact_only
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: Conceptual consent-laundering configuration as analysed through PMS Core and PMS-SEX on 2026-07-07; the band applies to the maturity of the analytic handling of this configuration, not to any person, consent act, sexual scene, legal validity question, or moral status question.
      justification:
        A_awareness: High distinction-awareness at model level, especially between consent-sign, conditions, later invocation, cost topology, publicness, and dignity protection; scene-awareness remains incomplete because actors, facts, and counter-perspectives are absent.
        C_coherence: Coherent conceptual architecture with explicit PMS, PMS-SEX, and MIP guardrails, but with high risk of over-smoothness if model language is used beyond conceptual scope.
        R_responsibility: Strong analytic responsibility for distinction, non-capture, score hygiene, and dignity protection; no assignable concrete responsibility without scene data.
        P_power_to_act: The analyst and publication context have real power to frame the concept responsibly; concrete actors’ power to act, exit, correct, review, or refuse remains unknown.
        modulators_context: Conceptuality, sexual-domain sensitivity, publicness risk, missing scene data, and dignity-language risk keep the band in the mixed provisional zone rather than a solid adultness zone.
      D_excluded_from_A_number: true
    M_score:
      M_band: 0-4_ceiling_for_any_later_concrete_role_application
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No concrete X is supplied; M is therefore not assigned to a person or role-holder here, but only used as a ceiling rule for any later scene-bound role analysis.
      five_factors:
        knowledge: Unknown for concrete actors; at the conceptual level, mature handling would require recognizing that consent invocation may obscure conditions, costs, publicness, or after-scene effects.
        power_control: Unknown for concrete actors; potentially relevant only for a role that controls framing, documentation, later invocation, publicness, review, or access to correction.
        predictability: Unknown empirically; the pattern is conceptually foreseeable as a structural risk, but not predictable as a concrete consequence for any actor in the supplied material.
        access_to_alternatives: Unknown for concrete actors; alternatives such as clarification, review, withdrawal recognition, cost-topology naming, or counter-perspective inclusion are only analytic possibilities at this level.
        serious_integration_attempt: Not evidenced for any concrete actor; the analysis itself attempts integration by preserving PMS, PMS-SEX, MIP, non-capture, falsifiers, rival readings, and dignity guardrails.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: For the present conceptual material, concrete predictability and real alternatives are not established. Therefore no high M-band may be assigned to any role; the analysis may mark a structural risk but not strong responsibility.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: Possible asymmetry between later-invocation/frame-control position and condition-cost/after-scene-carrying position; concrete direction and magnitude are not established.
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: partly
        notes: The conceptual analysis is transparent about its own limits; concrete consent conditions, cost distribution, and publicness are not transparent because no scene data is supplied.
      J_justified:
        status: unclear
        protected_good_or_purpose: Possible legitimate purpose of later consent invocation could be scope clarification or procedural record; laundering risk arises where the purpose becomes closure or sanitation.
        notes: Justification cannot be judged without concrete frame, purpose, and affected-side visibility.
      TB_time_bound:
        status: unclear
        review_points_or_conditions: Conceptual review points are listed through falsifiers and non-capture; concrete review points are absent.
        notes: No real scene time limit or correction interval is supplied.
      R_reversible:
        status: unclear
        real_return_or_exit_options: The analysis remains reversible; concrete role exit, correction, refusal, withdrawal, or reputational repair options are unknown.
        notes: Reversibility is a guardrail requirement for future application, not a finding here.
      result: IA_risk
      short_justification: The pattern is not identified as inadult asymmetry because no concrete asymmetry is established; it is an IA-risk configuration because consent invocation can become opaque, non-transparent, non-time-bound, or non-reversible.
      immediate_action: Keep the analysis as a working structural note and require scene-bound reconstruction before any stronger IA, M, D, legal, or ethical conclusion.

  ia_localisation:
    knowing:
      issue: Concrete knowledge distribution is unknown; conceptually, the key risk is failure to know or name consent conditions and cost topology.
      possible_intervention: 'For analysis only: require explicit separation of material facts, inference, scope, conditions, and later invocation.'
    being_able:
      issue: Concrete levers are unknown; conceptually, power may lie in framing, documenting, invoking, publicizing, or refusing correction.
      possible_intervention: 'For analysis only: map actual levers before M or IA escalation.'
    being_permitted:
      issue: Permission structures are unknown; conceptually, some roles may be formally permitted to invoke consent while others lack real voice or exit.
      possible_intervention: 'For analysis only: distinguish formal permission from real reversibility and voice.'
    willing:
      issue: No motives or willingness are inferred; conceptual resistance to review would be relevant only if documented.
      possible_intervention: 'For analysis only: do not infer motive; look for documented refusal of transparency, review, or integration.'

  ia_protection:
    transparency_measures:
    - State whether the analysis concerns a conceptual configuration or a concrete scene.
    - Separate consent-sign, consent conditions, later invocation, cost topology, and validity standards.
    - Mark all unknown role, power, publicness, and evidence conditions.
    justification_measures:
    - Ask what legitimate protected good a later consent invocation serves.
    - Reject invocation that merely closes inquiry over costs or absences.
    - Keep rival legal, ethical, procedural, cultural, and non-laundering readings available.
    time_boundedness_measures:
    - Use review points before moving from conceptual risk to case finding.
    - Prevent a prior consent-sign from becoming indefinite authorization or indefinite reputational measure.
    - Track difference between source frame, invocation frame, and after-scene carryover.
    reversibility_measures:
    - Require correction, withdrawal, clarification, and counter-perspective channels where concrete application is attempted.
    - Keep YAML analysis revisable and non-decisional.
    - Do not publish identifiable D-readings or person-level conclusions.
    participation_or_voice_measures:
    - Do not infer affected-side meaning without safe, voluntary, context-aware perspective-taking.
    - Preserve direct otherness and do not replace it with permission-image or category script.
    - Name missing counter-perspectives as a limitation rather than filling them with model language.
    dignity_protection_measures:
    - Keep D0 untouched.
    - Use D1/D2 only qualitatively and only for dignity-protective clarity.
    - Block shaming, humiliation, maturity hierarchy, and dignity ranking.
    - Dial D down if D-language creates more shame than clarity.
    review_or_falsifier:
      date_or_interval: before_any_scene_bound_or_public_application
      falsifier_question: Does a concrete case show transparent scope, visible costs, real alternatives, marked asymmetry, reviewability, and frame continuity such that later consent invocation is ordinary rather than laundering?
      responsible_roles:
      - analyst
      - publication_editor
      - moderator_or_reviewer_if_concrete_application_occurs

  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: Consent conditions and source frame exist or are presumed in the conceptual structure.
      A_band: not_scoreable_scene_absent
      M_band: not_scoreable_scene_absent
      D_observation_optional: D not assessed; D0 untouched.
      key_context_role_power_situation: No concrete roles or facts supplied.
    - timepoint: t1
      short_description: Apparent consent-sign becomes legible as permission, warrant, or closure within a frame.
      A_band: 4-5_provisional_if_configuration_hides_conditions
      M_band: 0-4_ceiling_without_predictability_and_alternatives
      D_observation_optional: Possible D-R/D-P risk if personhood or voice is reduced to consent-sign; not established.
      key_context_role_power_situation: Frame and scope matter; concrete power distribution unknown.
    - timepoint: t2
      short_description: Later invocation recontextualizes the consent-sign and may legitimate, sanitize, or obscure conditions and costs.
      A_band: 4-5_provisional_for_analysis_artifact_only
      M_band: 0-4_ceiling_for_any_later_concrete_role_application
      D_observation_optional: Dignity protection becomes salient if later invocation blocks protest, refusal, cost visibility, or public reversibility.
