  uniform_report:
    generate_only_from_structured_fields: true
    title: 'MIP Analysis: Consent Laundering over PMS Core and PMS-SEX Overlay'
    overview_4_to_7_sentences: This MIP analysis treats Consent Laundering as a conceptual configuration, not a person, diagnosis, legal case, or empirical event. The central maturity question is whether an apparent consent-sign remains transparent to its conditions, costs, asymmetries, publicness, and after-scene effects when later invoked. The A-profile is conceptually strong in distinctions but limited by missing scene data, producing only a provisional structural A-band. The M-profile is capped because no concrete actor, predictability, alternatives, or leverage profile is supplied. The IA-box returns IA-risk rather than inadult asymmetry because asymmetry is possible but not established. The D-module is activated only as a qualitative dignity-protection layer, with D0 untouched and no D-score or person label. Transmission is structurally permissible only for anonymized theoretical publication or internal structural review, not for sanctions, public shaming, legal judgment, or person evaluation.
    key_findings:
    - The case is maturely analysable only as a conceptual configuration unless a concrete scene is supplied.
    - A-awareness is relatively high at model level but incomplete at scene level.
    - Coherence depends on keeping PMS, PMS-SEX, and MIP in distinct roles and preserving non-capture.
    - M-score cannot be high without concrete knowledge, control, predictability, alternatives, and integration attempt.
    - IA result is IA_risk, not inadult_asymmetry.
    - D-module is valid only as a protection guard, not as dignity evaluation.
    - The strongest maturation move is not a verdict but improved transparency, reversibility, cost-topology mapping, and anti-shaming discipline.
    A_summary: 'A ≈ 4-5 as a provisional structural band: the analysis names key distinctions and publicness risks, but no concrete scene allows full awareness calibration.'
    M_summary: M remains capped at 0-4 and largely not assignable because no actor-specific knowledge, leverage, predictability, alternatives, or integration attempt is supplied.
    IA_box_summary: 'IA_box = IA_risk: asymmetry is possible and structurally relevant, but transparency, justification, time-boundedness, and reversibility cannot be fully assessed without a concrete scene.'
    D_summary_if_activated: D is activated qualitatively as a protection layer. D0 remains untouched; D1 is not assessed; D2/D-P are used only to prevent shaming, public punishment, person-reduction, and dignity ranking.
    trajectory_summary: The conceptual trajectory moves from consent conditions to apparent consent-sign to later invocation. Maturity risk increases where later invocation reduces cost visibility, reversibility, or dignity protection, but this remains a risk trajectory rather than an empirical finding.
    guardrail_status: Guardrails passed for anonymized conceptual publication; they fail immediately if used for person labelling, legal or forensic judgment, public D-reading, humiliation, or sanctions.
    transmission_status: working_note_until_publication_review_with_anonymized_conceptual_use_only
    practical_implications: For publication, preserve no-verdict boundaries, keep A/M bands provisional, name missing scene data, retain rival readings, and treat D-language as protective only. Treat this as structurally usable publication material only after review confirms that it remains anonymized, conceptual, non-sanctioning, and non-person-ranking. For any concrete application, redo the analysis from a bounded scene packet before using MIP terms.
    conclusion: MIP adds a maturity-in-practice layer to the PMS and PMS-SEX analyses by showing that the central problem is not consent as such, but the maturity of handling consent-signs under asymmetry, time, publicness, cost distribution, reversibility, and dignity protection. The analysis remains a structural working model, not a verdict about persons.
    