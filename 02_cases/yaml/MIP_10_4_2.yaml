  meta_notes:
    bias_risks:
      confirmation_bias: >
        High risk. Once the term "Consent Laundering" is accepted, an analyst may
        search only for evidence of laundering and miss transparent or ordinary
        consent continuity.
      hindsight_bias: >
        High risk in any future concrete case. Later harmful consequences could
        make the original conditions appear more predictable than they were.
      status_quo_loyalty_bias: >
        Medium risk. An institutional or procedural frame might be defended too
        quickly as valid because consent was formally recorded.
      halo_horn_effects: >
        Medium risk. If actors were later supplied, one positive or negative
        trait could distort structural reading. The current analysis avoids this
        by not naming persons.
      in_group_out_group_bias: >
        Medium risk. Consent debates can polarize observers into role-loyalty
        positions. The analysis preserves rival readings and non-capture.
      dignity_bias_effect: >
        High risk if D language were activated publicly. D could become a moral
        weapon; therefore D remains off.
    norm_assumptions:
      explicit_norms:
        - "Consent should not automatically erase the conditions under which it was obtained, framed, or invoked."
        - "A maturity-in-practice analysis must separate structures and enactments from person worth."
        - "A-score and M-score must not be used without concrete role and context evidence."
        - "D0 is inviolable and not measurable."
        - "D1/D2 readings require guardrails and must remain qualitative."
      implicit_norms:
        - "Transparency, reversibility, and voice are important where consent is later invoked."
        - "Ordinary bounded consent remains possible and must not be collapsed into laundering."
        - "Structural analysis should protect against both under-reading and over-reading asymmetry."
      dignity_concepts:
        - "D0 as untouchable ontological dignity."
        - "D1/D2 as dignity in practice, optional and enactment-bound."
        - "Dignity-in-Practice from PMS as praxeological restraint under asymmetry."
      normative_position_of_D_reading: >
        D is not used as a moral superiority language, person-worth language, or
        public accusation tool. The normative position is protective and
        anti-humiliation: use D only when it increases clarity and protection
        more than shame.
    intuition:
      initial_intuition: >
        The initial intuition is that the case is structurally important because
        consent can become too smooth a closure-token when separated from its
        conditions.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: >
        PMS Core and PMS-SEX both show that Δ, □, Θ, Φ, Χ, and Λ-related
        questions are structurally relevant, while Ω, Α, Σ, Ψ, cost topology,
        and drift remain conditional.
      contradicting_evidence: >
        No concrete case evidence shows actual laundering. Rival readings remain
        possible, including transparent later invocation, legal validity,
        ordinary consent continuity, or benign clarification.
    possible_alternative_interpretations:
      - "Ordinary bounded later invocation of valid consent."
      - "Formal-procedural account in which consent counts because explicit procedural requirements were satisfied."
      - "Legal account governed by standards external to PMS, PMS-SEX, and MIP."
      - "Normative ethics account focused on autonomy, coercion, exploitation, or legitimacy outside PMS Base."
      - "Discourse-theoretic account focused on communicative recognition and contestability."
      - "Evidence-gap account in which the material is too abstract for any maturity reading."
      - "Non-capture account in which consent meaning exceeds the PMS/MIP grammar."
    counter_perspective:
      from_other_side: >
        A consent-invoking role might argue that later invocation is not
        laundering but ordinary reliance on a valid, bounded, transparent
        consent act.
      from_affected_side: >
        A consent-attributed role might argue that the later invocation erases
        conditions, dependency, missing alternatives, or the real cost of refusal
        and revision.
      from_external_observer: >
        An external observer should say that both possibilities remain open
        until role, frame, evidence, asymmetry, publicness, and reversibility are
        reconstructed.

