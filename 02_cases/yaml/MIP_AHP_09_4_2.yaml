          _Additional stored hardening action not rendered due to AHP text limit: HB-008._

        boundary_note: "AHP hardens the analysis; it does not rescore A, M, IA or D."

    legacy_flat_uniform_report_fields:
      deprecated: true
      note: "Retained only for migration from v1.2; canonical output path is case.uniform_report.addon_overlays.ah_precision."
      precision_score_summary: "Deprecated field name retained only for migration. Use Precision Heuristic instead: PH high (6/6). This is not a base score and does not re-evaluate A, M, IA or D."
      attack_surface_summary: "Deprecated flat field. Canonical attack surface summary is stored under case.uniform_report.addon_overlays.ah_precision.attack_surface_summary."
      hardening_actions_summary: "Deprecated flat field. Canonical hardening backlog summary is stored under case.uniform_report.addon_overlays.ah_precision.hardening_backlog_summary."

  validation_checklist:
    AHP_is_optional: true
    explicit_user_activation_present: true
    existing_structured_MIP_analysis_present: true
    structured_case_fields_available: true
    derives_only_from_documented_fields: true
    no_hidden_assumptions_added: true
    no_hidden_first_order_findings: true
    never_changes_base_A_M_IA_D_results: true
    never_activates_D: true
    never_creates_person_level_findings: true
    never_upgrades_transmission_status: true
    attack_points_describe_analysis_artifact_only: true
    hardening_actions_feed_next_iteration_only: true
    no_annotations_on_annotations: true
    no_moralised_attack_language: true
    no_person_defect_language: true
    no_dignity_labelling: true
    no_severity_escalation_beyond_lexicon: true
    D₀_status:
      preserved: true
      note: "Ontological dignity is untouched. AHP does not evaluate dignity."
    D₁_D₂_status:
      not_profiled: true
      note: "D₁/D₂ are not profiled or scored. D-language risk is only an analysis-language risk."
    IA_box_status:
      unchanged: true
      base_result_remains: "IA_risk"
    A_score_status:
      unchanged: true
      base_A_band_remains: "5-6"
    M_score_status:
      unchanged: true
      base_M_band_remains: "2-3"
    transmission_status_status:
      unchanged: true
      base_status_remains: "structurally_transmittable_as_internal_conceptual_working_note_only"
      AHP_note: "AHP flags possible misreading of the status label but does not change it."

  conclusion:
    short_result: "The previous MIP output has high AHP precision, with PH high at 6/6."
    strongest_quality: "The artifact is explicit about scope, guardrails, score hygiene, D inactivity, reversibility and non-person-labelling."
    main_vulnerability: "The artifact is technically precise but dense; several correct labels can still be over-read if separated from their caveats."
    main_hardening_move: "In the next iteration, make the internal-only transmission status, IA_risk boundary, inactive-D boundary and A/M score-hygiene qualifiers more visually inseparable from the fields they qualify."
    final_boundary: "This AHP overlay analyses and hardens the previous analysis artifact only. It does not alter the underlying MIP analysis, does not rescore anything, does not activate D, and creates no person-level findings."