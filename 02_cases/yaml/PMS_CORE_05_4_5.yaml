analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "PMS-internal structural derivation"
      - "reversible philosophical case mapping"
    not_claimed:
      - "empirical_claim"
      - "metaphysical_claim"
      - "diagnostic_claim"
      - "legal_forensic_claim"
      - "implementation_claim"
      - "PMS Base validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The case type permits conceptual PMS mapping of operators and derived
      structures, but it does not permit empirical findings, concrete scene
      judgment, metaphysical proof, diagnosis, legal-forensic conclusion,
      implementation claim, person-ranking, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The PMS reading can become too smooth because Δ, □, Λ, Φ, Χ, and weak Σ
      map naturally onto the paradox. That smoothness risks
      under-discriminating this case from many interpretive, hermeneutic,
      semantic, or normative problems.
    mitigation: >
      The reading is constrained by explicit weak status for Α, Ω, and Ψ; by
      treating Σ as at issue rather than achieved; by preserving rival
      formalizations; by listing falsifier conditions; and by refusing to treat
      PMS coherence as sufficient.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the framed differentiation between rule and action, the
      pressure toward application, the absence of final closure,
      recontextualization through interpretation, temporality of repeatable
      rule-use, and reflective distance from immediate use.
    discrimination_requirement: >
      The PMS reading must distinguish the rule-following paradox from generic
      ambiguity, ordinary interpretation, mere semantic indeterminacy, legal
      rule interpretation, computational rule execution, clinical indecision,
      and asymmetry drift in concrete praxis.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: >
        Can PMS distinguish the rule-following paradox from ordinary rule
        interpretation in which an interpretation successfully guides
        application without regress?
      expected_pms_distinction: >
        The PMS reading must use Λ and weak Σ to mark missing final closure,
        while not treating every Φ as destabilizing regress.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: >
        Can PMS distinguish a philosophical regress from a concrete asymmetry
        drift pattern involving over-expanded awareness or low integration?
      expected_pms_distinction: >
        The PMS reading must keep AD_A>>E and AD_Sigma_low as possible but not
        entailed because Ω, Α, Responsibility_R, and Action_E lack concrete
        support.
      current_status: "satisfied"
  calibration_points:
    - operator: "Δ"
      question: >
        What calibrates Difference in this case? Rule/following/action/
        interpretation/compatibility distinctions are explicit in the case
        material.
      current_calibration: "satisfied"
    - operator: "∇"
      question: >
        What calibrates Impulse in this case? Application-pressure is present
        structurally, but no concrete motivation or subjective impulse is given.
      current_calibration: "partial"
    - operator: "□"
      question: >
        What calibrates Frame in this case? The rule, interpretation, and
        application contexts provide the relevant frames.
      current_calibration: "satisfied"
    - operator: "Λ"
      question: >
        What calibrates Non-Event in this case? The missing expected closure of
        rule-determined application is central to the paradox.
      current_calibration: "satisfied"
    - operator: "Α"
      question: >
        What calibrates Attractor in this case? Recursive interpretive regress
        suggests recurrence, but no empirical pattern or stable routine is
        supplied.
      current_calibration: "weak"
    - operator: "Ω"
      question: >
        What calibrates Asymmetry in this case? Only formal imbalance between
        rule-guidance and interpretive flexibility is warranted; concrete
        asymmetry is absent.
      current_calibration: "weak"
    - operator: "Θ"
      question: >
        What calibrates Temporality in this case? Repeatability and possible
        future application are central, but no concrete temporal sequence is
        given.
      current_calibration: "partial"
    - operator: "Φ"
      question: >
        What calibrates Recontextualization in this case? Successive
        interpretation is active, but the Ω dependency is weak and Φ must not
        absorb all rival framing.
      current_calibration: "partial"
    - operator: "Χ"
      question: >
        What calibrates Distance in this case? The paradox and the analysis both
        require reflective withdrawal and suspension of final verdict.
      current_calibration: "satisfied"
    - operator: "Σ"
      question: >
        What calibrates Integration in this case? Integration is the problem's
        target, not an achieved result; coherence alone is insufficient.
      current_calibration: "partial"
    - operator: "Ψ"
      question: >
        What calibrates Self-Binding in this case? No self-binding agent is
        specified; Ψ is only a conditional extension.
      current_calibration: "weak"
  possible_non_capture:
    status: "preserved"
    zones:
      - "The normative force of following rather than merely matching may resist PMS capture."
      - "The semantic question of what fixes meaning may require a non-PMS formalism."
      - "The communal-practice reading of rule-following may not reduce to operator composition."
      - "The skeptical reading may deny the kind of closure PMS is structurally modeling."
    rule: >
      Non-capture zones must not be automatically translated into PMS drift,
      incomplete calibration, incomplete integration, or maturity failure.
  rival_reading_placeholder:
    status: "open"
    examples:
      - "Semantic reading: the paradox concerns meaning and reference rather than praxis structure."
      - "Normative reading: the central issue is correctness or oughtness, not interpretation-regress alone."
      - "Communal-practice reading: rule-following depends on shared practices and public criteria."
      - "Skeptical reading: no fact fixes rule-following beyond compatible interpretation."
      - "Anti-regress reading: ordinary rule use does not require an interpretation at every step."
      - "Formal-logical reading: rule-following is modeled as relation among symbol, function, and output."
      - "Pragmatic reading: training, correction, and use stabilize rule-following without metaphysical closure."
    rule: >
      Rival readings remain open and are not defeated by PMS coherence.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if the case is shown
        not to involve rule/action differentiation, interpretation, application
        pressure, or meaningful non-closure.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if the same Δ-□-Λ-Φ-Χ-Σ pattern were
        applied equally to ordinary ambiguity, legal interpretation, semantic
        indeterminacy, and concrete action failure without distinguishing their
        different structures.
    - id: "F3"
      condition: >
        The reading would become over-assimilative if resistance, rival framing,
        unresolved absence, or non-fit were automatically converted into PMS
        drift, incomplete integration, recontextualization, or maturity failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The analysis is usable as a reversible PMS conceptual projection. It is
      limited by the lack of concrete scene, weak Ω and Α, under-specified
      Action_E, non-applicable Responsibility_R and SELF_FIXPOINT, and
      unresolved Σ.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    Operationalization requirements state what would be needed before the PMS
    reading could be used empirically, comparatively, computationally, legally,
    clinically, or in applied settings.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: >
        A specified rule, action, interpretation, and criterion that allow
        observers to distinguish following from mere compatibility.
      ∇: >
        Evidence of practical, argumentative, institutional, or agentic pressure
        toward applying or settling the rule.
      □: >
        An explicit application frame, such as a practice, language-game,
        institution, formal system, or concrete context of relevance.
      Λ: >
        A specified expected closure or determination that fails, is delayed, or
        remains meaningfully absent within the frame.
      Α: >
        Repeated cases, routines, recursive interpretations, or stabilized
        patterns showing more than a single abstract regress.
      Ω: >
        A concrete direction of power, exposure, capacity, obligation,
        authority, or responsibility, if asymmetry is to be claimed beyond
        formal imbalance.
      Θ: >
        A temporal sequence or repeatable application structure across past,
        present, or future cases.
      Φ: >
        Identifiable source and target frames showing how interpretation
        recontextualizes rule use.
      Χ: >
        Observable or formally specified reflective distance, suspension,
        inhibition, or meta-position.
      Σ: >
        Criteria showing whether rule, interpretation, action, and criterion are
        integrated without forced coherence.
      Ψ: >
        A specified agent, collective, self-model, or commitment structure
        binding itself to rule-guided action across time.
    negative_cases:
      - "A case of ordinary rule application where no interpretation-regress occurs."
      - "A case of mere ambiguity without rule-following normativity."
      - "A legal interpretation case with institutional authority and sanctioning."
      - "A computational rule-execution case with specified formal semantics."
      - "A concrete praxis scene where an agent fails or succeeds in following a rule."
    comparison_needs:
      - "semantic accounts of rule-following"
      - "normative accounts of correctness"
      - "communal-practice accounts"
      - "skeptical accounts"
      - "formal-logical or computational accounts"
  current_status: >
    Operationalization is not fulfilled. The present case provides a
    philosophical problem statement, not empirical data, comparative cases,
    computational specification, legal record, clinical evidence, or applied
    validation.

guardrails:
  general:
    - "Use PMS structurally, not diagnostically."
    - "Do not claim empirical validity without evidence."
    - "Do not claim metaphysical truth."
    - "Do not treat PMS coherence as sufficient."
    - "Do not treat derived structures as primitives."
    - "Do not treat drift patterns as diagnoses."
    - "Preserve possible non-capture."
    - "Keep rival readings open."
    - "Maintain reversibility."
  case_specific:
    non_psychological: >
      The analysis does not infer mental states, desires, traits, indecision,
      pathology, or psychological capacities from the rule-following paradox.
    non_metaphysical: >
      The analysis does not claim that PMS settles the metaphysical nature of
      rules, meaning, normativity, intention, or facts about rule-following.
    non_diagnostic: >
      The analysis does not diagnose an individual, community, tradition, or
      interpretive position.
    non_legal_forensic: >
      The analysis does not determine legal rule interpretation, liability,
      evidence, intent, culpability, or forensic responsibility.
    non_implementation_claim: >
      The analysis does not claim that PMS implements rule-following in
      software, formal logic, AI systems, or institutional procedures.
    non_moral_ranking: >
      The analysis does not rank persons, practices, philosophers, interpretive
      communities, or forms of rule use by maturity, dignity, or moral worth.
    non_exhaustive_capture: >
      The analysis preserves the possibility that rule-following normativity,
      communal practice, semantic meaning, or skeptical force exceeds PMS
      capture.
    reversibility: >
      Every operator claim remains case-type-bound and reversible: Α, Ω, and Ψ
      may be weakened or removed; Σ remains at issue; rival formalisms remain
      open.
    dignity_in_practice: >
      Dignity-in-Practice is preserved as reflective restraint in handling weak
      asymmetry and disagreement, not as ontological dignity or moral
      superiority.

limits:
  - >
    The PMS reading is a conceptual structural projection, not a resolution of
    the rule-following paradox.
  - >
    The case does not warrant empirical, metaphysical, diagnostic, clinical,
    legal-forensic, implementation, or PMS Base validation claims.
  - >
    Rival semantic, normative, communal-practice, skeptical, anti-regress,
    formal-logical, and pragmatic readings may capture features that PMS does
    not.
  - >
    The apparent smoothness of the PMS mapping creates a high coherence risk:
    the reading may under-discriminate unless constrained by falsifiers,
    non-capture zones, and weak-operator status.

case_synthesis:
  primary_pms_reading: >
    The rule-following paradox is structurally readable as a framed distinction
    between rule and action that generates pressure toward application,
    encounters the non-event of final determination, and undergoes interpretive
    recontextualization under reflective distance while integration remains
    unresolved. The PMS reading is strongest where the case concerns the
    relation among rule-frame, interpretive frame, expected application, and
    delayed closure; it is weakest where the philosophical issue turns on
    meaning, normativity, communal practice, or semantic facts that may not be
    exhausted by praxeological operator composition.
  continuity_condition: >
    Continuity would require a temporally stable account of how the same rule
    constrains present and future applications without relying on an endless
    sequence of interpretations. This condition is conceptually relevant because
    rule-following normally involves possible repetition across cases, but it is
    not fulfilled by the case material as an empirical trajectory, institutional
    sequence, or concrete praxis scene.
  change_condition: >
    Change appears as Φ: a stated rule is placed into successive interpretive
    frames, and each interpretive frame may itself become available for further
    recontextualization. The analysis must distinguish clarifying
    recontextualization from regress, over-assimilation, or a PMS-internal
    smoothing of a philosophical difficulty.
  rupture_or_non_fit_condition: >
    Unresolved absence, rival framing, disagreement, and non-fit are preserved
    as possible philosophical non-capture rather than automatically translated
    into PMS drift, incomplete calibration, incomplete integration,
    recontextualization success, or maturity failure.
  responsibility_condition: >
    Responsibility_R is not applicable as a finding because the case supplies no
    accountable agent, role, institution, obligation, sanction, vulnerability
    structure, or self-binding commitment. Responsibility could become relevant
    only in a later concrete scene of rule application, correction, enforcement,
    or answerability.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective
    restraint, non-ranking, non-diagnosis, non-tribunal treatment, and
    reversibility under weak Ω. It does not add ontological dignity, moral
    superiority, or person-ranking to the philosophical case.
  rival_reading_condition: >
    Rival formalizations remain open and are not defeated by PMS coherence; PMS
    provides one bounded structural projection among possible semantic,
    normative, practice-based, skeptical, formal-logical, anti-regress, or
    pragmatic readings.

final_structural_formula:
  primary_formula: "Χ ∘ Φ ∘ Θ ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model_with_weak_conditional_extensions"
  conditional_extensions:
    weak_conditional_formula: "Ω ∘ Α"
    at_issue_operator: "Σ"
    not_established_operator: "Ψ"
    note: >
      Α and Ω are not removed from the analysis, but they are not treated as
      fully active case-core operators because the case provides no concrete
      recurrent praxis pattern and no concrete asymmetry of power, exposure,
      capacity, obligation, or responsibility. Σ remains the contested
      integration site, and Ψ is not established.
  compressed_reading: >
    Within PMS, the case is a reflective rule-application problem in which
    framed difference and application-pressure encounter structured
    non-closure, temporally extended interpretability, and recontextualization.
    Recursive patterning and formal asymmetry remain weak or conditional, while
    integration and self-binding remain unclaimed.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity,
    implementation validity, moral ranking, or PMS Base validation.