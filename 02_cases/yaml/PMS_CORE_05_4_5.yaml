schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >
  Template-conformant PMS_1.3 case application for the philosophical case
  "Rule-following paradox." PMS.yaml is treated as the only PMS Base reference.
  This document applies PMS.yaml without redefining PMS Base, extending the PMS
  operator inventory, or treating derived structures as primitives.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    This case analysis applies PMS_1.3 as the current repository reference. It
    does not redefine PMS operators, alter the default repository order,
    introduce new meta-axioms, treat derived axes as independent primitives,
    override PMS application guardrails, or claim PMS Base validation.
  referenced_base_sections:
    - "pms_entry_condition"
    - "schema_version"
    - "schema_meta"
    - "repository_governance"
    - "core_principles"
    - "pms_model_reference"
    - "derived_structures"
    - "example_operator_chains"
    - "computational_representation"
    - "ai_interface_pms"
  application_schema_note: >
    This document is an application schema. It remains subordinated to PMS.yaml
    and does not silently revise PMS Base.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as strong, formally disciplined, and portable, but not
    final, complete, uniquely ordered, or immune to revision.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - "theoretical_reflection"
      - "structural_action_theory"
      - "anthropology_and_praxeology"
      - "systems_theory"
      - "ai_architecture_and_safety"
      - "model_documentation_and_specification"
      - "simulation_scaffolding"
      - "structural_reasoning"
    not_intended_for:
      - "clinical_diagnosis"
      - "personality_typing"
      - "mental_health_risk_assessment"
      - "automated_moral_judgement"
      - "individual_person_evaluation"
      - "forensic_decision_making"
      - "policy_enforcement"
      - "irreversible_labeling"
  normative_position_alignment:
    ontology: >
      The case analysis makes no PMS-based claims about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological
      dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological constraint on handling
      asymmetry, not as a metaphysical or moral ranking of beings.
    tragedy_clause: >
      Structural maturity, coherence, integration, or responsibility do not
      eliminate tragedy, unresolved tension, rupture, or non-capture.
    self_binding_clause: >
      The case analysis itself remains subject to PMS application discipline:
      Distance (Χ), Self-Binding discipline (Ψ), and Dignity-in-Practice (D)
      must not be suspended in order to force clarity, authority, resolution,
      truth, or action.
  computational_position_alignment:
    representation_clause: >
      YAML representation of the case is a formal encoding of a PMS reading,
      not a direct implementation of praxis, agency, selfhood, subjectivity,
      consciousness, or empirical validity.
    calibration_clause: >
      Any operational use would require architecture-specific calibration,
      implementation constraints, empirical testing where applicable, external
      evaluation, context-sensitive interpretation, and public accountability.
    accountability_clause: >
      Formal translation into PMS terms does not by itself guarantee public
      intelligibility, intersubjective uptake, empirical adequacy, external
      accountability, or explanatory sufficiency.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars or
      formalisms.
  terminology_alignment:
    praxis: >
      Situated, meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through
      operator compositions.
    meta_axiom: >
      One of the eleven PMS operators Δ–Ψ, treated as structurally basic within
      PMS_1.3 and not replaced by case-specific concepts.
    operator_composition: >
      Ordered or structured application of PMS meta-axioms to generate complex
      praxeological formations.
    derived_construct: >
      A higher-order construct systematically derived from PMS operators rather
      than introduced as an independent primitive.
    asymmetry_drift_pattern: >
      A conditional structural risk pattern derived within PMS, not a diagnosis,
      person-type, moral verdict, or clinical category.
    repository_reference: >
      The PMS.yaml base specification used for this application.
  last_updated: "2026-04-06"
  authors:
    - name: "PMS repository authorship"
      role: "base_reference"
    - name: "case application"
      role: "bounded_application"

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the only PMS Base reference for this application.
  this_template_may:
    - "structure a PMS case application"
    - "render PMS operators in case-specific terms"
    - "mark operator status, dependency status, and analytic weight"
    - "derive PMS structures from PMS formulas"
    - "preserve non-capture and rival readings"
    - "state operationalization requirements"
  this_template_must_not:
    - "revise PMS.yaml"
    - "add PMS operators"
    - "replace PMS dependencies"
    - "turn derived structures into primitives"
    - "claim PMS Base validation"
    - "turn PMS coherence into proof of adequacy"
    - "convert non-fit automatically into drift or failure"
  governance_status: "aligned_with_pms_yaml_as_repository_reference"

pms_entry_condition:
  requirement: >
    PMS may be applied only where Distance (Χ), reversibility, and
    Dignity-in-Practice (D) are maintained.
  applies_to: >
    This requirement applies to the present conceptual PMS case application.
  does_not_apply_to:
    - "PMS Base revision"
    - "diagnostic classification"
    - "legal or forensic decision"
    - "metaphysical proof"
    - "implementation validation"
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        reason: >
          The analysis suspends final verdict on rule-following and treats PMS
          as a reversible structural projection.
      reversibility:
        status: "maintained"
        reason: >
          Operator statuses remain defeasible, especially for Α, Ω, Σ, and Ψ.
      Dignity_in_Practice_D:
        status: "maintained"
        reason: >
          No person, philosophical position, community, or practice is ranked,
          diagnosed, shamed, or tribunalized.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      PMS application remains bound by its own guardrails.
    application_to_this_case: >
      The case analysis remains self-bound by treating the rule-following
      paradox as a reversible conceptual projection, not as a settled tribunal
      on meaning, rulehood, interpretation, practice, or PMS sufficiency. It
      uses Χ to suspend final verdict, preserves rival readings, and does not
      convert unresolved non-fit into PMS drift or maturity failure.
  application_only_boundary:
    status: "active"
    statement: >
      This document is an application of PMS.yaml, not a PMS Base revision.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture of the
      philosophical case.
  no_pms_base_revision:
    status: "active"
    statement: >
      PMS operators, order, dependency logic, derived structures, and guardrails
      are preserved.

case:
  title: "Rule-following paradox"
  interpretation_type: "conceptual_domain_projection"
  case_type: "philosophical structural problem about rule application, interpretation, and criteria of following"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: true
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    This application analyzes only the stated philosophical case material: the
    rule-following paradox in which applying a rule appears to require an
    interpretation, while that interpretation may itself require further
    interpretation, raising the question of what makes an action count as
    following a rule rather than merely being compatible with some possible
    interpretation.
  non_scope: >
    The analysis does not prove a metaphysical theory of rules or meaning, does
    not diagnose any agent, does not decide a legal or forensic question, does
    not validate a computational implementation, does not rank persons or
    practices, does not resolve all versions of the rule-following problem, and
    does not validate PMS Base.
  non_goals:
    - "no empirical claim"
    - "no metaphysical proof"
    - "no diagnostic judgment"
    - "no legal or forensic criterion"
    - "no implementation claim"
    - "no PMS Base validation"
  case_typing_note: >
    This is not a concrete praxis scene. It is a conceptual domain projection
    onto a philosophical problem. PMS may structurally map frame, difference,
    interpretive recontextualization, temporality, non-event, and
    integration-pressure, but the mapping remains reversible and open to rival
    formalizations.

