core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The paradox is treated as a structure of rule-guided praxis: the relation
      among rule, interpretation, application, and action-counting. It is not
      treated as a psychological profile, clinical condition, person essence, or
      ontology of subjectivity.
    failure_condition: >
      This principle would fail if the analysis became psychological,
      diagnostic, person-ranking, or ontological.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal
      generative basis for praxis. Whether they are fully complete, optimally
      minimal, or uniquely ordered remains open to further formalization and
      critique.
    status: "satisfied"
    case_application: >
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ is used
      as PMS operator vocabulary. No extra PMS axis, layer, primitive, or add-on
      is introduced.
    failure_condition: >
      This principle would fail if the case invented new PMS operators or
      treated external concepts as PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness,
      coherence, responsibility, action, dignity-in-practice, and asymmetry
      drift patterns can be systematically derived within PMS from operator
      compositions rather than introduced as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are considered
      only as derived structures from PMS formulas, not as independent axioms.
    failure_condition: >
      This principle would fail if derived structures were treated as primitives
      or as independently authoritative claims.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural
      operators. Responsibility, maturity, and dignity-in-practice are analyzed
      under temporal and asymmetrical conditions rather than as static
      attributes.
    status: "partial"
    case_application: >
      Θ is structurally important because rule-following involves repeatable
      application across actual or possible cases. Ω remains weak because the
      case supplies only a formal imbalance between rule, interpretation,
      criterion, and act, not a concrete power, exposure, capacity, or
      obligation asymmetry.
    failure_condition: >
      This principle would fail if weak Ω were inflated into a concrete
      asymmetry or if temporality were ignored.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by
      itself imply direct implementation, guaranteed interoperability, or
      explanatory adequacy. Operational use requires calibration, constraints,
      and evaluation.
    status: "satisfied"
    case_application: >
      The YAML rendering is a formal case encoding only. It is not a software
      implementation, not an AI architecture claim, not a test of
      interoperability, and not empirical validation.
    failure_condition: >
      This principle would fail if the YAML application were treated as an
      implemented model or validated computational architecture.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative
      grammars, sharper discriminative models, or more empirically grounded
      formalisms remains methodologically open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including semantic, normative,
      communal-practice, skeptical, anti-regress, formal-logical, and pragmatic
      readings of the paradox.
    failure_condition: >
      This principle would fail if PMS coherence were treated as defeating rival
      formalisms.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove
      exhaustive capture. Some forms of praxis may remain only partially
      legible or may resist assimilation within the current grammar.
    status: "satisfied"
    case_application: >
      The analysis preserves the possibility that the philosophical force of
      rule-following, normativity, meaning, or practice is only partially
      legible in PMS terms or resists PMS capture.
    failure_condition: >
      This principle would fail if unresolved absence or rival framing were
      automatically absorbed as PMS drift or incomplete integration.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No individual, group, subject, institution, or philosophical opponent is
      diagnosed, ranked, pathologized, or assessed for maturity.
    failure_condition: >
      This principle would fail if the paradox were turned into a diagnosis,
      clinical category, person-type, or moral verdict.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological
      scenes, roles, and structures. Global person-labels and irreversible
      ontological attributions are out of scope.
    status: "partial"
    case_application: >
      Because the case is not a concrete scene, findings are bound to the
      supplied conceptual case type rather than to a lived scene. No global
      person-label or irreversible attribution is made.
    failure_condition: >
      This principle would fail if a conceptual projection were treated as a
      concrete scene finding.

