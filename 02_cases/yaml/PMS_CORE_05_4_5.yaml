operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ is active because the paradox depends on minimal structural
      distinctions: rule versus application, following versus merely matching,
      interpretation versus action, correct application versus compatibility
      with some possible interpretation, and rule-governed enactment versus
      retrospective rationalization.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The primary distinction is between an action counting as following a
        rule and an action being merely compatible with at least one
        interpretation of that rule.
      - >
        The PMS reading must not conflate rule, interpretation, criterion, and
        action; if those distinctions are flattened, the paradox loses its entry
        point.
    falsifier_conditions:
      - >
        If the case is reformulated so that no distinction between rule,
        interpretation, application, and action-counting is operative, the Δ
        entry point for this PMS reading fails.
    non_capture_note: >
      Δ names structural differentiations in the case; it does not decide the
      philosophical theory of meaning or normativity.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is weak-active as structural pressure toward application, determinacy,
      justification, or settlement. The case does not supply a concrete desire,
      affective drive, institutional demand, or actor-specific motivation.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - >
        The tension is argumentative and structural: once rule and act are
        distinguished, the case generates pressure to explain what makes an act
        count as rule-following.
      - >
        No subjective desire, psychological impulse, or clinical drive is
        inferred; ∇ is limited to application-pressure within the conceptual
        problem.
    falsifier_conditions:
      - >
        If the problem is shown to involve no pressure toward application,
        justification, or determinacy, ∇ should be reduced to not_active.
    non_capture_note: "∇ does not by itself show that a practical agent is present."
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because the rule functions as a frame and each interpretation
      may function as a subordinate or successor frame constraining relevance,
      admissible continuation, and criteria of application.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The active frames are the rule-frame, the interpretation-frame, and the
        application-frame in which an action is judged as following or not
        following.
      - >
        Frame shifts must be explicitly marked: moving from rule to
        interpretation is not automatically the same as moving from
        interpretation to actual practice.
    falsifier_conditions:
      - >
        If no rule-frame or application-frame can be specified, the PMS analysis
        becomes too abstract to discriminate this case from generic uncertainty.
    non_capture_note: "□ describes case intelligibility; it does not prove that rules are only frames."
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active because the expected event, "the rule determines its
      application," is delayed, missing, or indefinitely deferred by the
      apparent need for further interpretation. The absence is meaningful only
      within the rule-application frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        The expected occurrence is determinate application of the rule; the
        meaningful absence is the failure of that determination to terminate the
        interpretive regress.
      - >
        This absence may be a site of PMS non-capture or a feature of
        philosophical normativity, not automatically a defect, drift, or failure
        of maturity.
    falsifier_conditions:
      - >
        If the relevant account denies that rule application requires any
        expected interpretive closure, Λ must be weakened or removed.
    non_capture_note: "Λ marks structured non-closure without treating non-closure as error."
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak and conditional. The regress can be read as a recurrent
      structural pattern: rule calls for interpretation, interpretation calls
      for further interpretation, and so on. However, the case material does not
      provide an empirical sequence, stable routine, or concrete path
      dependence.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        Recurrence is shown only at the level of philosophical regress, not as
        an observed practice, habit, institution, or role-script.
      - >
        The analysis must distinguish a formal recursive problem from an
        attractor in concrete praxis.
    falsifier_conditions:
      - >
        If the paradox is treated as a one-step logical puzzle without
        recurrence or stabilization, Α should remain not_active.
    non_capture_note: >
      Α is not used to diagnose a person, community, or practice as trapped in a
      pattern.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak and conditional. A formal imbalance may be named between rule
      and application, criterion and performance, or rule-authority and
      interpretive flexibility. The case does not provide a concrete asymmetry
      of power, exposure, vulnerability, capacity, obligation, or
      responsibility.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - >
        The only warranted asymmetry is formal: rule or criterion appears to
        claim guidance over action, while interpretation can unsettle that
        guidance.
      - "No moralized hierarchy is inferred from the formal asymmetry."
      - >
        Ω remains weak because no social, legal, institutional, interpersonal,
        or bodily asymmetry is specified.
    falsifier_conditions:
      - >
        If no directional imbalance between rule, interpretation, criterion,
        and action is identifiable, Ω must be marked not_active rather than
        treated as hidden power.
    non_capture_note: "Ω does not authorize person-ranking or tribunal judgment."
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is active because rule-following implies repeatability, persistence of
      criteria, possible future applications, and continuity across cases. The
      paradox asks how an action can count as following the same rule across
      temporal extension.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        The temporal structure is possible diachronic application of a rule
        across cases, not an observed chronological episode.
      - >
        Temporality is essential to the problem because the force of a rule
        concerns how present and future applications are connected.
    falsifier_conditions:
      - >
        If the case is restricted to a timeless semantic relation with no
        repeatability, trajectory, anticipation, or future application, Θ is
        overextended.
    non_capture_note: "Θ is structural rather than empirical chronology."
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active because interpretation places the rule into a new frame, and
      further interpretation can recontextualize the interpretation itself. The
      paradox arises when such recontextualization threatens indefinite regress
      rather than stable application.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        The source frame is the rule as stated; the target frames are successive
        interpretations or application contexts.
      - >
        The analysis must test whether Φ clarifies rule use or merely absorbs
        unresolved non-fit into an endlessly reframeable PMS description.
    falsifier_conditions:
      - >
        If every rival framing, disagreement, absence, or resistance is
        automatically redescribed as Φ, the reading becomes over-assimilative.
    non_capture_note: "Φ does not automatically mean maturity, adaptation, or successful integration."
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as reflective distance. The paradox requires stepping back
      from immediate rule-use to ask what makes rule-following possible, and the
      PMS application itself uses Χ to suspend verdict and preserve
      reversibility.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - >
        Χ is calibrated by the analysis maintaining suspension of final
        metaphysical, diagnostic, legal, implementation, and PMS-validation
        claims.
      - >
        Distance must be distinguished from empty neutrality: the analysis still
        identifies structural tensions while refusing tribunal closure.
    falsifier_conditions:
      - >
        If Χ is suspended in order to force a final verdict that PMS resolves
        the rule-following paradox, the PMS application is invalid.
    non_capture_note: "Χ preserves philosophical non-capture rather than evacuating the problem."
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is the central contested operator in this case, not an achieved result.
      The paradox asks whether rule, interpretation, action, and criterion can
      be integrated into a coherent account of following without circularity,
      infinite regress, hidden appeal to practice, or premature closure. PMS may
      mark this integration-pressure, but it must not treat its own structural
      coherence as the missing philosophical integration.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - >
        Integration must discriminate between genuine resolution, forced
        coherence, pragmatic stabilization, formal closure, communal
        stabilization, and mere redescriptive smoothness.
      - >
        The analysis must not treat PMS coherence as proof that the philosophical
        problem has been solved.
      - >
        Σ is calibrated negatively as much as positively: where the paradox
        remains unresolved, the correct PMS move is to mark integration as
        contested rather than to repair the case by adding maturity,
        responsibility, drift, or self-binding.
    falsifier_conditions:
      - >
        If coherence is treated as sufficient proof of adequacy, Σ is
        overclaimed and the PMS reading fails its quality-control boundary.
      - >
        If Σ is used to collapse rival semantic, normative, skeptical,
        communal-practice, or pragmatic readings into one PMS solution, the
        reading becomes under-discriminating.
    non_capture_note: >
      Σ names the contested site of integration; it is not a completed result
      and does not remove possible philosophical non-capture.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is not active as a case-core operator. It would become relevant only if
      the case introduced an agent, community, or self-model bound to a rule
      across time. The given material does not specify such self-binding.
    dependency_status: "not_active"
    analytic_weight: "not_active"
    calibration_points:
      - >
        Ψ may be considered only as a conditional extension where rule-following
        is explicitly framed as self-commitment or stable normativity of an
        agent.
      - >
        No selfhood, autobiographical coherence, or
        responsibility-as-self-commitment is attributed to the paradox itself.
    falsifier_conditions:
      - >
        If Ψ is applied without an established Σ, a specified self-relation, and
        temporally extended commitment, the self-binding reading is
        under-specified.
    non_capture_note: "Ψ remains available for rival or later applications but is not asserted here."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the conceptual problem by distinguishing rule from action,
      generating pressure toward application, framing relevance through the
      rule, marking the non-event of final determination, and weakly suggesting
      recursive patterning when interpretation calls for further interpretation.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is partially active: Θ is important because rule-following is
      temporally repeatable across cases, while Ω remains weak because the case
      supplies only formal imbalance between rule, interpretation, and action
      rather than a concrete asymmetry of power, exposure, capacity, or
      obligation.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 carries major analytic weight: Φ marks successive interpretation and
      reframing, Χ marks reflective distance from immediate rule-use and from
      final verdict, and Σ is the unresolved target rather than an achieved
      synthesis.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is not primary. Ψ is not applicable as a case-core operator because the
      material does not specify an agent, self-relation, promise, identity, or
      temporally extended commitment to a rule.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
  chain_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "no prior dependency"
      satisfied_by: >
        Satisfied by the case's explicit distinction between following a rule
        and merely being compatible with an interpretation.
    - operator: "∇"
      dependency_check: "depends on Δ"
      satisfied_by: >
        Satisfied as structural pressure to explain, apply, or settle what
        counts as following once rule and action are differentiated.
    - operator: "□"
      dependency_check: "depends on Δ and ∇"
      satisfied_by: >
        Satisfied by the rule-frame, interpretation-frame, and application-frame
        that make the paradox intelligible.
    - operator: "Λ"
      dependency_check: "depends on □"
      satisfied_by: >
        Satisfied by the missing or deferred closure of rule-determined
        application within the rule-frame.
    - operator: "Α"
      dependency_check: "depends on Δ, ∇, □, and Λ"
      satisfied_by: >
        Weakly satisfied only as formal recursive regress; no concrete recurrent
        practice or stabilized routine is provided.
    - operator: "Ω"
      dependency_check: "depends on Α"
      satisfied_by: >
        Weakly satisfied only as formal imbalance between rule-guidance and
        interpretive flexibility; no concrete asymmetry is provided.
    - operator: "Θ"
      dependency_check: "depends on Ω and Α"
      satisfied_by: >
        Partially satisfied by repeatability and future-oriented application of
        rules, while its PMS dependencies on Ω and Α remain weak in this case.
    - operator: "Φ"
      dependency_check: "depends on Θ, Ω, and □"
      satisfied_by: >
        Partially satisfied by successive interpretation as recontextualization,
        while Ω remains only formally and weakly present.
    - operator: "Χ"
      dependency_check: "depends on Φ, Θ, and □"
      satisfied_by: >
        Satisfied by the reflective stance required to examine rule-use and by
        the analysis's suspension of final verdict.
    - operator: "Σ"
      dependency_check: "depends on Χ and Φ"
      satisfied_by: >
        Weakly satisfied as the contested integration target; not satisfied as
        achieved integration.
    - operator: "Ψ"
      dependency_check: "depends on Σ, Θ, and Χ"
      satisfied_by: >
        Not satisfied for the case core because no agentic self-binding, stable
        self-relation, or commitment-bearing subject is specified.
  dependency_failure_conditions:
    - >
      If weak Ω and weak Α were treated as fully satisfied concrete praxis
      structures, dependency discipline would fail.
    - >
      If Σ were claimed as achieved integration, dependency discipline would
      overclaim the case.
    - >
      If Ψ were claimed without agentic self-binding, the application would
      exceed the case material.

