derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A>>E"
    - "AD_Sigma_low"
  usage_rule: >
    Derived structures are used only through PMS.yaml formulas and are not
    independent axioms.
  rule: >
    Dignity-in-Practice is treated as a praxeological application constraint,
    not as ontological dignity or moral superiority.
  case_status: >
    Awareness_A is active structurally; Coherence_C is weak and at issue;
    Responsibility_R is not applicable as a finding; Action_E is
    under-specified because no concrete action is provided;
    Dignity_in_Practice_D functions as an application constraint;
    SELF_FIXPOINT is not applicable; AD_A>>E and AD_Sigma_low remain possible
    but not entailed drift-risk analogies, not diagnoses.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ supplies differentiation."
      - "□ frames the differentiation."
      - "Θ sustains the framed differentiation across temporal extension."
    notes: >
      Awareness is modeled structurally, not phenomenologically. This does not
      imply that all notions of awareness are exhausted by PMS.
    case_reading: >
      Awareness_A is active in a structural, non-phenomenological sense: the
      case sustains framed distinctions across time between rule,
      interpretation, action, correctness, compatibility, and application.
    status: "active"
    calibration_points:
      - >
        Differentiate rule versus interpretation versus action within the
        rule-application frame and across possible repeated applications; do
        not infer conscious experience or phenomenological awareness.
    non_capture_note: >
      Awareness_A does not settle the philosophical problem of meaning or
      intentionality.
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ supplies directional pressure."
      - "□ frames the pressure."
      - "Λ marks meaningful absence or delay within the frame."
      - "Θ gives temporal stabilization or continuation."
    notes: >
      Coherence captures narrative stability of action, including meaningful
      absences and delays, without yet requiring full integration or
      self-binding.
    case_reading: >
      Coherence_C is weak and at issue. The case contains pressure toward a
      coherent relation among rule, expectation, application, and absence of
      closure, but the paradox is precisely that coherence is not secured by
      interpretation alone.
    status: "weak"
    calibration_points:
      - >
        Distinguish conceptual coherence from truth, metaphysical adequacy,
        practice-based resolution, forced integration, or narrative smoothing.
    non_capture_note: >
      Coherence_C is not treated as sufficient to solve the paradox.
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω supplies asymmetry."
      - "Θ extends asymmetry across time."
      - "Φ permits recontextualization of the relation."
      - "Ψ binds the structure into responsibility as self-commitment."
    notes: >
      Responsibility is structural rather than moralistic in this specification.
    case_reading: >
      Responsibility_R is not applicable as a case finding. The case does not
      specify an accountable agent, asymmetrical obligation, self-binding
      commitment, institution, sanction, or responsible party.
    status: "not_applicable"
    calibration_points:
      - >
        Claim Responsibility_R only if Ψ, Φ, Θ, and Ω are all case-supported by
        an agentic or role-based responsibility structure; they are not
        supported here.
    non_capture_note: >
      Responsibility_R is not inferred from philosophical difficulty.
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ supplies directedness."
      - "Θ extends directedness across time."
      - "Σ integrates directedness into action."
    notes: >
      Action here is not any behavior; it is integrated and temporally extended.
    case_reading: >
      Action_E is under-specified. The paradox concerns what would make an
      action count as rule-following, but it does not provide a concrete action,
      integrated realization, actor, sequence, or observable enactment.
    status: "under_specified"
    calibration_points:
      - >
        Distinguish the abstract problem of action-counting from an actual
        action that can be structurally analyzed as integrated directedness
        across time.
    non_capture_note: >
      Action_E cannot be evaluated without a concrete action or action-sequence.
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω marks asymmetry."
      - "Χ introduces reflective distance and restraint."
      - "Ψ binds restraint into stable practice."
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how
      asymmetry is handled, not the ranking of persons or ontological worth.
    case_reading: >
      Dignity_in_Practice_D operates as an application constraint rather than a
      scene finding: the analysis handles weak asymmetry and philosophical
      disagreement without ranking, shaming, diagnosing, or irreversibly
      labeling persons or positions.
    status: "application_constraint"
    calibration_points:
      - >
        Maintain reflective restraint in relation to weak Ω; do not convert a
        philosophical paradox into a hierarchy of persons, traditions, or
        interpretive communities.
    non_capture_note: >
      Dignity-in-Practice does not turn PMS into a moral-ranking system.

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "not_applicable"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of
    praxis being bound into a relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not established. The case does not provide selfhood,
    autobiographical continuity, identity commitment, agent-specific
    accountability, or self-binding across time. The full sequence remains a
    PMS reference structure, not a case result.
  implications:
    - "No subject or self-model is inferred from the paradox."
    - "No autobiographical coherence claim is made."
    - "No responsibility-as-self-commitment claim is made."
  interpretation_note: >
    This sequence records one derivational strategy within PMS and is not
    applied as a primary structure in this case.
  non_capture_note: >
    The absence of SELF_FIXPOINT does not weaken the philosophical case; it
    marks a boundary of the present PMS application.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    Asymmetry drift patterns are conditional structural risks, not diagnoses,
    person-types, moral verdicts, or clinical categories.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Ω"
        - "Α"
        - "Φ"
      description: >
        Pattern in which asymmetrically loaded structures may produce excessive
        reflective or awareness expansion while enactment is delayed or
        suppressed.
    generative_mechanism:
      - "asymmetry creates pressure"
      - "recontextualization expands awareness or reflective framing"
      - "action may be delayed where integration is not achieved"
    case_reading: >
      AD_A>>E is not asserted as a drift pattern. The paradox may resemble
      expanded reflection with delayed enactment, but the case provides no
      concrete awareness-axis overexpansion, no agent, no chronic delay of
      action, and no asymmetrically loaded praxis scene.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      Do not convert philosophical reflection or unresolved paradox into a drift
      diagnosis.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization outpaces integration under relevant structural pressure"
      description: >
        Pattern in which repeated or unstable reframing is not integrated into a
        coherent praxis structure.
    generative_mechanism:
      - "recontextualization proliferates"
      - "integration remains weak or unstable"
    case_reading: >
      AD_Sigma_low is not asserted as a drift pattern. The paradox can be read
      as recontextualization outpacing integration, but this remains a formal
      risk analogy because no concrete responsibility axis, asymmetrical scene,
      or empirical trajectory is supplied.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "not_applicable"
    guardrail: >
      Do not automatically translate unresolved non-fit or philosophical
      disagreement into incomplete integration or maturity failure.

example_operator_chains_application:
  note: >
    The chains below apply PMS.yaml example operator chains to the case. They
    are not the only possible formal pathways and do not settle the case by
    themselves.
  minimal_praxis:
    formula:
      - "□"
      - "∇"
      - "Δ"
    description: "A frame constrains an impulse that arises from a difference."
    case_reading: >
      Minimal praxis appears conceptually as a rule-frame constraining the
      pressure to apply a distinction between following and merely matching;
      this is active only at the abstract rule-application level.
    status: "active"
  pattern_formation:
    formula:
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Attractor formation via repeated framed impulses and non-events."
