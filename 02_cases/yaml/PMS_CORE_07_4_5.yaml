ai_interface_pms_alignment:
  welcome_message: >
    This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic,
    non-clinical, non-prescriptive, and non-metaphysical in its claims.
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: >
      Axiomatic mode is active because the case is analyzed through the PMS operator inventory
      Δ through Ψ and their dependency logic without adding operators or treating the template
      as PMS Base.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual
      diagnosis.
    case_status: active
    case_application: >
      Derived axes mode is active only as formula-based projection: A, C, R, E, and D are derived
      from PMS formulas and marked weak, under-specified, conditional, or application-constraint
      as appropriate.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety
      without anthropomorphizing.
    case_status: not_applicable
    case_application: >
      AI architecture mode is not applicable because the case does not ask for agent design,
      computational implementation, simulation, safety architecture, or deployment.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per
      se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility,
      distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not
      to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints,
      and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility,
    Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
