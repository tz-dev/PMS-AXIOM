      inheritance, delay, and historical arrangement. Both remain conceptual rather than empirically
      demonstrated.
    recontextualization_distance_integration: >
      Φ names the shift from isolated-agent or isolated-act framing to structural-arrangement
      framing. Χ is maintained as verdict-suspension, reversibility, and non-tribunal discipline.
      Σ remains weak because a coherent PMS projection is not by itself a completed theory or
      validated account.
    derived_axes_projection: >
      Awareness_A and Coherence_C are weakly available; Responsibility_R is weak and conditional
      on Ψ; Action_E is under-specified without a concrete enactment; Dignity_in_Practice_D
