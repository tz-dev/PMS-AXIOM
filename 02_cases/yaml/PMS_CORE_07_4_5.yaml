analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - pms_internal_structural_derivation
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: >
      The case type permits a reversible PMS structural projection of a philosophical category.
      It does not permit empirical findings, legal or forensic conclusions, diagnostic judgments,
      implementation claims, metaphysical proof, or PMS Base validation.
  coherence_risk:
    status: high
    reason: >
      The case strongly fits a PMS pattern of □, Α, Ω, and Θ, with Φ and Χ as reflective framing.
      That fit risks becoming too smooth because many different phenomena could be mapped into
      the same structural chain without enough discriminative evidence.
    mitigation: >
      The reading is constrained by explicit operator calibration, weak status for under-specified
      operators, rival readings, falsifier conditions, operationalization requirements, and
      non-capture zones. Coherence is not treated as proof.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural shift from individual act or intention to social, institutional,
      and historical arrangements; it also covers patterned recurrence, asymmetry, temporality,
      recontextualization, and application discipline under distance. This coverage is structural
      coverage only: it supplies a disciplined operator grammar for the case category, not an
      empirical demonstration, legal finding, moral proof, metaphysical theory, or exhaustive
      philosophical account of injustice.
    discrimination_requirement: >
      The PMS reading must distinguish structural injustice from isolated wrongdoing, accidental
      misfortune, ordinary inequality, lawful but non-injurious asymmetry, empirical social pattern,
      legal liability, moral blame, and purely metaphysical accounts of justice. It must also
      distinguish structural explanation from exculpation, distributed responsibility from
      undifferentiated blame, and meaningful absence from missing evidence or mere non-occurrence.
    discrimination_status: partial_but_explicitly_guarded
  discrimination_tests:
  - id: DT1
    test: Distinguish structural injustice from isolated individual wrongdoing.
    expected_pms_distinction: >
      The reading must show □, Α, Ω, and Θ rather than only Δ and ∇ around a single act or intention.
      If the case can be fully explained as one agent, one intention, and one isolated wrongful
      act, the structural-injustice reading becomes unnecessary or overextended.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish structural injustice from accidental aggregation or vague background inequality.
    expected_pms_distinction: >
      The reading must calibrate Α as recurrence or stabilization, Ω as directional imbalance,
      and Θ as temporal trajectory; without concrete evidence this remains conceptual. A mere
      plurality of bad outcomes is not yet an attractor, and a mere difference in outcome is
      not yet an injustice-relevant asymmetry.
    current_status: partially_satisfied
  - id: DT3
    test: Distinguish PMS structural responsibility from moral blame or legal liability.
    expected_pms_distinction: >
      Responsibility_R requires Ψ, Φ, Θ, and Ω. In the present case, Ω, Θ, and Φ are structurally
      available, but Ψ is not specified because no self-binding bearer is supplied. Therefore
      PMS may mark possible responsibility-structure, but not blame, guilt, culpability, legal
      liability, or institutional fault.
    current_status: satisfied_as_boundary
  - id: DT4
    test: Distinguish PMS coherence from adequate capture.
    expected_pms_distinction: >
      A smooth chain through □, Α, Ω, Θ, Φ, and Χ must not be treated as proof that PMS has
      captured the phenomenon without remainder. Coherence must remain tested against rival
      readings, falsifier conditions, operationalization requirements, and possible non-capture.
    current_status: satisfied_as_guardrail
  calibration_points:
  - operator: Δ
    question: What calibrates Difference in this case?
    current_calibration: satisfied
    calibration_note: >
      Δ is calibrated by the case's explicit distinction between single agent, intention, isolated
      wrongful act, harm, disadvantage, responsibility, constraint, and social, institutional,
      or historical arrangement.
  - operator: ∇
    question: What calibrates Impulse in this case?
    current_calibration: weak
    calibration_note: >
      ∇ is only conceptual: the case generates pressure to explain injustice structurally, but
      it does not identify a concrete drive, motive, demand, affect, decision, or enacted impulse.
  - operator: □
    question: What calibrates Frame in this case?
    current_calibration: satisfied
    calibration_note: >
      □ is calibrated by the explicit reference to social, institutional, and historical arrangements.
      A concrete application would still need to identify which frame is operative and how its
      expectations are structured.
  - operator: Λ
    question: What calibrates Non-Event in this case?
    current_calibration: partial
    calibration_note: >
      Λ is possible where structural injustice involves absent recognition, absent protection,
      delayed remedy, excluded opportunity, or institutional non-response. It remains partial
      because the case provides no specific expected event whose absence is established within
      a determinate frame.
  - operator: Α
    question: What calibrates Attractor in this case?
    current_calibration: partial
    calibration_note: >
      Α is category-relevant because structural injustice implies recurrence, stabilization,
      path-dependence, or role-script reproduction. It remains partial because the abstract case
      supplies no empirical recurrence, institutional routine, or repeated scene.
  - operator: Ω
    question: What calibrates Asymmetry in this case?
    current_calibration: satisfied
    calibration_note: >
      Ω is calibrated by the case's concern with harms, disadvantages, responsibilities, and
      constraints. The calibration remains structural and must not become person-ranking, blame,
      humiliation, or moral superiority.
  - operator: Θ
    question: What calibrates Temporality in this case?
    current_calibration: satisfied
    calibration_note: >
      Θ is calibrated by the reference to historical arrangements and by the category's dependence
      on persistence, accumulation, inheritance, delay, or trajectory. No concrete chronology
      is nevertheless established.
  - operator: Φ
    question: What calibrates Recontextualization in this case?
    current_calibration: satisfied
    calibration_note: >
      Φ is calibrated by the shift from isolated-agent or isolated-act framing to structural-arrangement
      framing. The shift is analytic and reversible, not proof that rival theories are deficient.
  - operator: Χ
    question: What calibrates Distance in this case?
    current_calibration: satisfied
    calibration_note: >
      Χ is calibrated by explicit refusal of empirical, legal, diagnostic, metaphysical, clinical,
      implementation, PMS Base validation, person-ranking, and tribunal-style claims.
  - operator: Σ
    question: What calibrates Integration in this case?
    current_calibration: weak
    calibration_note: >
      Σ remains weak because the case does not provide a complete theory integrating agency,
      structure, causation, harm, responsibility, frame, non-event, and temporal trajectory.
      A coherent PMS reading is not sufficient evidence of integration.
  - operator: Ψ
    question: What calibrates Self-Binding in this case?
    current_calibration: weak
    calibration_note: >
      Ψ remains weak because no self-binding bearer is identified. Responsibility is mentioned,
      but PMS Responsibility_R cannot be fully derived without specifying who or what is bound
      to which obligation across time and under which reflective constraints.
  possible_non_capture:
    status: kept_open
    zones:
    - normative theories of justice that require principles outside PMS operator grammar
    - empirical social-scientific accounts requiring data, causal identification, and measurement
    - legal-forensic theories requiring doctrine-specific standards of duty, causation, liability,
      and remedy
    - phenomenological accounts of lived harm, recognition, exclusion, and experience
    - political theories in which rupture, resistance, refusal, or disagreement are not integration
      failures
    - metaphysical theories of agency, collective responsibility, dignity, or personhood
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete
      integration, structured absence, or failed maturity. They may mark genuine limits of the
      PMS reading. Preserving them is not a weakness of the application but part of PMS discipline
      under Χ, reversibility, and rival openness.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - agent-centered moral reading focused on intention, negligence, or culpable action
    - institutional reading focused on rules, procedures, offices, access structures, and role
      allocation
    - historical-causal reading focused on inheritance, path-dependence, accumulation, and delayed
      effects
    - distributional reading focused on allocation of goods, burdens, risks, opportunities,
      and vulnerabilities
    - recognition-based reading focused on invisibility, misrecognition, exclusion, and standing
    - legal-forensic reading focused on evidence, duty, causation, liability, and remedy
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat them unless
      comparison criteria are explicitly specified and applied. A rival reading may mark a genuine
      alternative formalization, not merely an under-integrated PMS residue.
  falsifier_conditions:
  - id: F1
    condition: >
      The PMS reading is weakened if no relevant social, institutional, historical, or normative
      frame can be specified beyond a vague background.
  - id: F2
    condition: >
      The PMS reading is under-discriminating if it cannot distinguish structural injustice from
      isolated wrongdoing, accidental aggregation, ordinary inequality, or lawful asymmetry without
      injustice-relevant patterning.
  - id: F3
    condition: >
      The PMS reading over-assimilates if resistance, rupture, disagreement, rival framing,
      unresolved absence, or missing evidence is automatically translated into PMS drift, failed
      integration, incomplete calibration, or recontextualization.
  - id: F4
    condition: >
      The PMS reading is overextended if Ω is used to infer blame, guilt, legal liability, moral
      inferiority, moral superiority, or person-ranking without independent domain grounds.
  - id: F5
    condition: >
      The PMS reading is invalid as a PMS application if Χ, reversibility, or Dignity-in-Practice
      is suspended in order to force closure, enforce a verdict, suppress rival readings, or
      transform a conceptual projection into a tribunal.
  final_quality_status:
    result: usable_with_limits
    reason: >
      The analysis is usable as a reversible PMS_1.3 conceptual projection of structural injustice,
      but it remains non-empirical, non-legal, non-diagnostic, non-metaphysical, non-implementational,
      and non-validating with respect to PMS Base. Major operators are calibrated, but concrete
      evidence and rival-model comparison are not supplied.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: >
    These requirements identify what would be needed to turn the PMS projection into a calibrated
    empirical, comparative, computational, legal, clinical, or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: >
        Operational use would need explicit coding of distinctions among actor, role, institution,
        arrangement, act, intention, harm, disadvantage, responsibility, and constraint.
      ∇: >
        Operational use would need observable or formally specified directional pressure, such
        as claims, demands, institutional incentives, explanatory tensions, or response pressures,
        without inferring inner motives.
      □: >
        Operational use would need identified social, institutional, historical, legal, or normative
        frames and rules for when a frame is active.
      Λ: >
        Operational use would need specified expected events, protections, recognitions, remedies,
        opportunities, or responses, plus evidence of absence or delay within a frame.
      Α: >
        Operational use would need evidence of recurrence, stabilization, routine, path-dependence,
        or role-script emergence rather than isolated occurrence.
      Ω: >
        Operational use would need calibrated indicators of power, exposure, capacity, vulnerability,
        obligation, responsibility-gradient, or role-position asymmetry.
      Θ: >
        Operational use would need a temporal record showing sequence, persistence, accumulation,
        inheritance, anticipation, delay, or trajectory.
      Φ: >
        Operational use would need explicit source and target frames and criteria distinguishing
        clarifying recontextualization from over-assimilation.
      Χ: >
        Operational use would need procedural checks for verdict-suspension, reversibility,
        non-person-ranking, and refusal of tribunal-style closure.
      Σ: >
        Operational use would need criteria for discriminative integration that do not treat
        coherence as proof or smooth over conflict.
      Ψ: >
        Operational use would need an identified self-binding bearer, commitment, temporal scope,
        and reflective constraint before responsibility-as-self-commitment is claimed.
    negative_cases:
    - a single isolated wrongful act fully explainable without structural recurrence or temporal
      trajectory
    - an accidental disadvantage without stable frame, expectation, attractor, or directional
      asymmetry
    - a legal liability case where doctrinal standards, not PMS structural operators, determine
      the result
    - a rival normative theory that rejects structural framing on principled grounds rather
      than through missing calibration
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: >
    Operationalization is not fulfilled. The present case provides no empirical dataset, institutional
    map, historical chronology, legal record, implementation architecture, clinical context,
    or applied validation procedure. Requirements are listed only to mark what would be needed
    before operational use.
