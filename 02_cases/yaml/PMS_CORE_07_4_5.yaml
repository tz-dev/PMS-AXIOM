derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
  - Awareness_A
  - Coherence_C
  - Responsibility_R
  - Action_E
  - Dignity_in_Practice_D
  - SELF_FIXPOINT
  - AD_A_much_greater_E
  - AD_under_integration
  usage_rule: >
    Each derived structure must be marked as active, weak, analytic_constraint, possible_but_not_entailed,
    under_specified, or not_applicable. Consideration does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not independent axioms,
    diagnoses, ontological rankings, metaphysical entities, or proof of PMS completeness.
  case_status: >
    Awareness_A is weakly available as sustained framed differentiation; Coherence_C is weakly
    available as a possible stabilization of expectation and frame; Responsibility_R is weak
    and conditional because Ψ is not specified; Action_E is under-specified because no concrete
    enactment is supplied; Dignity_in_Practice_D is active as an application constraint; SELF_FIXPOINT
    is not applicable to the abstract category; AD_A>>E and AD_Sigma_low remain possible structural
    risks but are not entailed.
derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ enables distinctions in the field.
    - □ frames distinctions as situationally relevant.
    - Θ maintains these framed distinctions over time.
    notes: >
      Awareness is modeled structurally, not phenomenologically. Within PMS it can be systematically
      derived from this operator sequence, but this does not imply that all notions of awareness
      are exhausted by it.
    case_reading: >
      A appears as the conceptual capacity to keep distinctions between agent, structure, act,
      arrangement, harm, responsibility, and constraint framed across historical or institutional
      time. It is structural awareness, not consciousness or empirical observation.
    status: weak
    calibration_points:
    - Differentiate isolated act, agent intention, social arrangement, institutional frame,
      historical trajectory, harm, disadvantage, responsibility, and constraint within the conceptual
      frame of structural injustice.
    - Specify the temporal scope before treating awareness as sustained rather than merely definitional.
    non_capture_note: >
      Structural awareness is not phenomenological consciousness and does not capture all normative,
      political, or lived meanings of injustice.
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Temporally stabilized structuring of impulse and expectation within a frame.
    generative_reasoning:
    - ∇ introduces directional impulse.
    - □ constrains and structures the impulse.
    - Λ encodes expectations and meaningful non-events.
    - Θ temporalizes the configuration into trajectories.
    notes: >
      Coherence captures narrative stability of action, including meaningful absences and delays,
      without yet requiring full integration or self-binding. Rival theories may formalize coherence
      differently.
    case_reading: >
      C is weakly available if the category stabilizes a narrative in which explanatory pressure,
      frame, expected protections or responses, meaningful absences, and historical persistence
      hang together. At this abstraction level, coherence remains a reading rather than a validated
      account.
    status: weak
    calibration_points:
    - Distinguish a coherent PMS reading from truth, adequacy, legal validity, empirical proof,
      or forced harmonization.
    - Check whether expected non-events are specified or merely assumed.
    non_capture_note: >
      Coherence does not prove adequacy and may hide under-discrimination if rival accounts
      are not compared.
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding orientation toward asymmetry extended across time and recontextualization.
    generative_reasoning:
    - Ω creates structural imbalance in exposure, capacity, or obligation.
    - Θ extends this imbalance into enduring commitments.
    - Φ allows reinterpretation of obligations under changing conditions.
    - Ψ binds the agent to these obligations as part of its self-relation.
    notes: >
      Responsibility is structural rather than moralistic in this specification. It is formally
      derived within PMS, not asserted as the only valid theory of responsibility.
    case_reading: >
      R is weak and conditional. The case names responsibilities, but PMS Responsibility_R requires
      Ω, Θ, Φ, and Ψ. Ω, Θ, and Φ are structurally available, while Ψ requires a specified self-binding
      bearer and is not supplied by the case material.
    status: weak
    calibration_points:
    - Identify a specific asymmetry, temporal extension, recontextualization, and self-binding
      bearer before claiming Responsibility_R.
    - Keep Responsibility_R distinct from moral blame, legal liability, causal explanation,
      or institutional accountability unless those domains are independently supplied.
    non_capture_note: >
      Responsibility_R is not moral blame, diagnosis, legal liability, or proof that PMS exhausts
      theories of responsibility.
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ provides energetic directedness.
    - Θ structures this directedness as a trajectory rather than a momentary reaction.
    - Σ integrates conflicting impulses, constraints, and roles into a coherent enactment.
    notes: >
      Action here is not any behavior; it is integrated and temporally extended. Higher operators
      such as Ω, Φ, and Ψ may enrich it, but are not required for its minimal structural definition
      within PMS.
    case_reading: >
      E is under-specified because the case provides no concrete act, policy, intervention,
      omission, repair, refusal, or enactment. Directional pressure and temporal structure can
      be described conceptually, but integrated realization in action cannot be established.
    status: under_specified
    calibration_points:
    - Identify a concrete enactment, institutional procedure, repair action, omission, or practice
      before claiming Action_E.
    - Distinguish philosophical categorization from action, behavior, intervention, or implementation.
    non_capture_note: >
      Without a concrete scene, Action_E remains under-specified and should not be inferred
      from conceptual coherence.
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-bound reflective restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how asymmetry is handled,
      not the ranking of persons or ontological worth.
    case_reading: >
      D is active as an application constraint. The PMS reading must handle asymmetry without
      shaming, ranking, humiliating, or ontologically evaluating persons or groups; it must also
      avoid turning structural disadvantage into person-type, defect, or diagnostic classification.
    status: application_constraint
    calibration_points:
    - Check that Ω is treated as structural imbalance and not as moral superiority, inferiority,
      blame, or person-ranking.
    - Maintain Χ and Ψ-discipline in the analysis itself by refusing irreversible labeling and
      tribunal-style closure.
    non_capture_note: >
      D is a praxeological application constraint, not an ontological or moral superiority claim
      and not a complete theory of dignity.
self_model_analysis:
  id: SELF_FIXPOINT
  priority_in_this_case: not_applicable
  formula_sequence:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  description: >
    Formal representation of self-binding as the result of integrated, reflexively modulated,
    temporally extended, asymmetry-aware patterns of praxis being bound into a relatively stable
    self-relation.
  case_reading: >
    SELF_FIXPOINT is not established. The case concerns an abstract philosophical category,
    not a self-relation or identity-formation process. The chain can be retained as a PMS reference
    for how self-binding would be derived, but applying it here would overextend Ψ unless a
    specific self-binding bearer is later introduced.
  implications:
  - Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin.
  - Identity is represented as relatively stable self-binding to integrated trajectories.
  - No phenomenological or metaphysical claims about subjectivity are implied.
  interpretation_note: >
    This sequence records one derivational strategy within PMS. It must not be read as proving
    that all forms of selfhood, agency, identity, or case structure reduce without remainder
    to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions as
    literal subjectivity unless explicitly scoped as structural self-binding or analytic self-binding.
asymmetry_drift_patterns:
  status_in_this_case: possible_but_not_entailed
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms. They
    are not automatically entailed by a case and must not be treated as diagnoses, person-types,
    or moral verdicts.
  AD_A_much_greater_E:
    code: AD_A>>E
    name: Excessive Distance between Awareness and Enactment
    applicability: possible_but_not_entailed
    structural_basis:
      formula:
      - Φ
      - Α
      - Ω
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor formation, while
        recontextualization reinforces drift toward evaluation rather than supporting integrative
        transformation and balanced enactment.
    generative_mechanism:
    - 'Ω: evaluative or positional asymmetry becomes structurally salient.'
    - 'Α: the asymmetry stabilizes into recurrent evaluative patterning.'
    - 'Φ: recontextualization reinforces drift toward evaluative framing rather than restoring
      balance or integration.'
    case_reading: >
      AD_A>>E is only a structural risk. A theory of structural injustice could over-expand
      awareness, evaluation, or critique while action remains delayed or suppressed, but the
      supplied case material contains no concrete enactment failure and no evidence of chronic
      delay.
    axis_effects:
      awareness_axis: under_specified
      action_axis: under_specified
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state, or moral judgment.
  AD_under_integration:
    code: AD_Sigma_low
    name: Fragmented integration
    applicability: possible_but_not_entailed
    structural_basis:
      primary_tension:
      - Φ
      - Σ
      condition: recontextualization_outpaces_integration
      description: >
        Frequent recontextualization without sufficient integration leads to unstable trajectories
        and weak coherence of praxis, especially where unstable recontextualization and weak
        integration unfold under asymmetrically loaded praxis conditions.
    generative_mechanism:
    - 'Φ: frames are frequently shifted or updated in ways that destabilize continuity.'
    - 'Σ: integration fails to consolidate multiple perspectives and impulses into coherent
      enactment.'
    case_reading: >
      AD_Sigma_low is only a structural risk. The concept may proliferate recontextualizations
      across moral, legal, institutional, historical, and political frames without sufficient
      integration, but the abstract case does not show actual fragmented praxis.
    axis_effects:
      coherence_axis: under_specified
      responsibility_axis: under_specified
    guardrail: >
      This pattern describes structural volatility in action forms, not a clinical state, diagnosis,
      or person-type.
example_operator_chains_application:
  note: >
    The chains below apply PMS.yaml example operator chains to the case. They are not the only
    possible formal pathways and do not settle the case by themselves.
  minimal_praxis:
    formula:
    - □
    - ∇
    - Δ
    description: A frame constrains an impulse that arises from a difference.
    case_reading: >
      Minimal praxis appears as the framing of a conceptual difference: the case asks how the
      impulse to understand harm or disadvantage changes when the frame shifts from isolated
      wrongful act to social, institutional, or historical arrangement.
    status: active
  pattern_formation:
    formula:
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Attractor formation via repeated framed impulses and non-events.
    case_reading: >
      Pattern formation is conceptually relevant because structural injustice presupposes more
      than an isolated event: it requires arrangements that can stabilize expectations, absences,
      routines, or path-dependent role spaces. Empirical recurrence is not shown.
    status: weak
  asymmetry_emergence:
    formula:
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Asymmetrical roles emerging from stabilized patterns.
    case_reading: >
      Asymmetry emergence is central at category level because harms, disadvantages, responsibilities,
      and constraints imply possible imbalances of exposure, capacity, vulnerability, obligation,
      or role position arising from stabilized arrangements.
    status: active
  developmental_trajectory:
    formula:
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Temporal extension of asymmetric patterns into trajectories.
    case_reading: >
      Developmental trajectory is active at category level because historical arrangements and
      cumulative or persistent disadvantage require temporal extension, although no concrete
      chronology is supplied.
    status: active
  reflexive_praxis:
    formula:
    - Σ
    - Χ
    - Φ
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Reflexively integrated praxis with distance, recontextualization, and integration.
    case_reading: >
      Reflexive praxis is weak. Φ and Χ are active as analytic discipline, but Σ remains under-specified
      because the case does not provide a completed integrated account or concrete action plan.
    status: weak
  self_binding_chain:
    formula:
    - Ψ
    - Σ
    - Χ
    - Φ
    - Θ
    - Ω
    - Α
    - Λ
    - □
    - ∇
    - Δ
    description: Default repository chain for self-binding as structured self-relation.
    case_reading: >
      The self-binding chain is analytic-only and not applied as a finding. Ψ would require
      a specified bearer of self-binding responsibility, which the abstract case does not provide.
    status: analytic_only
computational_representation:
  file_role: case_application_representation
  representation_scope: >
    This YAML encodes a PMS-based case analysis in machine-readable form. It does not implement
    praxis, agency, consciousness, selfhood, morality, diagnosis, legal judgment, or empirical
    validation.
  supports:
  - machine_readable_loading
  - dependency_reasoning
  - operator_chain_validation
