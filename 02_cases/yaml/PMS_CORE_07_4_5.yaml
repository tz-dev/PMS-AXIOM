case_synthesis:
  primary_pms_reading: >
    Structural injustice is modeled as a conceptual category in which framed arrangements can
    stabilize into recurrent patterns that generate or maintain asymmetries across time. The
    PMS reading is strongest where □, Α, Ω, and Θ can be jointly calibrated: a relevant frame,
    a recurrent or stabilized pattern, a directional asymmetry, and a temporal trajectory must
    all be identifiable. Reflective recontextualization then shifts analysis away from isolated
    agent-intention or single-act models, while Χ prevents that shift from becoming a verdict,
    a total explanation, or an erasure of rival readings.
  continuity_condition: >
    Continuity would require showing that relevant arrangements persist, recur, or remain path-dependent
    across time rather than appearing as isolated, accidental, episodic, or merely aggregated
    events. In this conceptual case, continuity is structurally required by the category but
    not empirically demonstrated.
  change_condition: >
    Change is modeled through Φ when the case moves from an isolated-wrong frame to a social,
    institutional, or historical arrangement frame. This change remains reversible and does
    not prove superiority over rival frames. A rival account may reject the structural recontextualization
    on principled moral, legal, political, metaphysical, or empirical grounds.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, unresolved absence, missing evidence, and rival formalization
    are preserved as possible non-capture or genuine disagreement and are not automatically
    treated as drift, failed integration, incomplete calibration, recontextualization, or maturity
    failure. This condition is especially important because structural injustice is a broad
    category and may otherwise be too easily absorbed into a smooth PMS chain.
  responsibility_condition: >
    Responsibility_R is only conditional. It requires a specified asymmetry, temporal extension,
    recontextualization, and self-binding bearer; the abstract case names responsibility but
    does not supply a bearer of Ψ. Therefore PMS can mark a possible responsibility-structure,
    but not moral blame, legal liability, guilt, culpability, collective personhood, or institutional
    selfhood.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective restraint under asymmetry
    and by forbidding person-ranking, shaming, diagnosis, humiliation, irreversible labeling,
    or tribunal-style closure. It is an application constraint on how asymmetry is handled,
    not an ontological dignity claim or a moral superiority claim.
  rival_reading_condition: >
    Agent-centered, institutional, historical-causal, distributional, recognition-based, legal-forensic,
    and non-PMS formalizations remain open and are not defeated by PMS translation. Their persistence
    should be read as methodological rivalry or possible non-capture, not as PMS drift unless
    a separate PMS-grounded reason is explicitly supplied.
final_structural_formula:
  primary_formula: Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  primary_formula_status: primary_case_model
  compressed_reading: >
    Structural injustice is projected as framed difference and weak explanatory pressure becoming
    possible structured absence, recurrent arrangement, asymmetry, and temporal trajectory,
    then recontextualized under reflective distance without claiming full integration or self-binding.
  final_validity_status: valid_with_limits
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It does not establish
    empirical truth, metaphysical truth, phenomenological completeness, diagnostic validity,
    legal or forensic validity, implementation validity, moral ranking, or PMS Base validation.