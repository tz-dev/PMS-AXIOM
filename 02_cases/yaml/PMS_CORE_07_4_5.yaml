core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons
      as ontological entities or psychological essences.
    status: satisfied
    case_application: >
      The case is treated as a structure of praxis involving arrangements, roles, constraints,
      asymmetries, expectations, and temporal patterns. It is not treated as a claim about the
      essence, psychology, virtue, vice, or ontological status of any person or group.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological essence
      claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative
      basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered
      remains open to further formalization and critique.
    status: satisfied
    case_application: >
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ is used as PMS
      operator vocabulary. No additional PMS operator, axis, layer, primitive, or governance
      add-on is introduced.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as
      if they belonged to PMS Base.
  P3_generativity:
    id: P3
    title: Generativity
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and asymmetry drift patterns can be systematically derived
      within PMS from operator compositions rather than introduced as independent primitives.
    status: satisfied
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT,
      and asymmetry drift patterns are considered only through the formulas supplied by PMS.
      They are not asserted as primitive structures or independent axioms.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility,
      maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions
      rather than as static attributes.
    status: satisfied
    case_application: >
      Ω and Θ carry major analytic weight because the case concerns harms, disadvantages, responsibilities,
      or constraints arising from social, institutional, or historical arrangements. Ω remains
      structural rather than moralistic, and Θ remains a temporal trajectory condition rather
      than proof of historical causation.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported
      them without calibration.
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply direct
      implementation, guaranteed interoperability, or explanatory adequacy. Operational use
      requires calibration, constraints, and evaluation.
    status: satisfied
    case_application: >
      The YAML representation is a formal encoding of a reversible PMS projection. It is not
      a software implementation, empirical model, legal engine, governance system, or proof
      of computational adequacy.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy,
      or computational sufficiency.
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper
      discriminative models, or more empirically grounded formalisms remains methodologically
      open.
    status: satisfied
    case_application: >
      Rival readings remain open, including agent-centered moral readings, institutional readings,
      historical-causal readings, distributional readings, recognition-based readings, legal-forensic
      readings, and other non-PMS formalisms.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival formalisms
      by default.
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture.
      Some forms of praxis may remain only partially legible or may resist assimilation within
      the current grammar.
    status: satisfied
    case_application: >
      Possible non-capture is preserved for normative theories of justice, empirical social
      science, legal doctrine, phenomenological accounts of lived harm, metaphysical accounts
      of agency, and political theories of rupture or resistance.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration,
      or calibration failure.
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic,
      forensic, or person-ranking decisions.
    status: satisfied
    case_application: >
      The analysis makes no clinical, psychological, forensic, personality, risk, maturity-ranking,
      or individual competence claim. Drift patterns, if mentioned, are conditional structural
      risks only.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes, roles,
      and structures. Global person-labels and irreversible ontological attributions are out
      of scope.
    status: partial
    case_application: >
      Because the case is not a concrete scene, the analysis is bound to the conceptual case
      type rather than to observed roles and events. This limitation is explicit, and no global
      person-label or irreversible attribution is generated.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized claims.
pms_model_reference_application:
  ordering_status:
    interpretation: >
      The PMS default order is treated as the current repository dependency path. It is not
      treated as uniquely necessary, final, or proof of PMS completeness.
    repository_role: >
      This case follows PMS_1.3 order and dependencies unless explicitly marked as critique
      or rival formalization.
  operator_inventory:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  operator_inventory_status: no_additional_pms_operators_introduced
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Δ differentiates single agent from structure, intention from consequence, isolated wrongful
      act from patterned arrangement, harm from disadvantage, responsibility from blame, and
      social, institutional, or historical arrangement from concrete event.
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - The primary distinctions are agent versus structure, act versus arrangement, intention
      versus consequence, isolated event versus patterned reproduction, and empirical finding
      versus conceptual projection.
    - The analysis must not conflate structural explanation with excuse, blame, empirical proof,
      legal liability, or metaphysical truth.
    falsifier_conditions:
    - If the case cannot sustain any distinction between isolated wrongful act and structurally
      mediated arrangement, the PMS reading loses its entry point.
    non_capture_note: >
      Difference makes the category structurally analyzable, but it does not prove that PMS
      exhausts the philosophical concept of structural injustice.
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      ∇ is weakly present as the argumentative and practical pressure to explain how harms or
      disadvantages can matter when they are not reducible to a single intention or isolated
      wrongful act. It is not treated as subjective desire or psychological drive.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - 'The relevant tension is conceptual and explanatory: the case presses from the agent-act
      model toward a structural-account model.'
    - No subjective impulse, affective state, institutional motive, or agentic intention is
      inferred from the abstract material.
    falsifier_conditions:
    - If no explanatory or practical pressure arises from the agent-versus-structure distinction,
      ∇ remains inactive or under-specified.
    non_capture_note: Impulse is only structural directedness here; it does not diagnose motivation
      or prove moral urgency.
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      □ is central because the case explicitly names social, institutional, and historical arrangements
      as frames that make harms, disadvantages, responsibilities, or constraints intelligible
      without reduction to a single wrongdoer.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frames are social arrangement, institutional arrangement, and historical arrangement.
    - Frame shifts between moral-philosophical, institutional, historical, empirical, and legal
      vocabularies must be marked rather than silently merged.
    falsifier_conditions:
    - If no frame can be specified beyond a vague background, the analysis becomes too abstract
      to discriminate structural injustice from ordinary misfortune, individual wrongdoing,
      or mere inequality.
    non_capture_note: >
      Frame clarifies relevance, but a PMS frame does not exhaust legal, sociological, historical,
      or normative accounts.
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within
      a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Λ is active but calibration-dependent because structural injustice may involve meaningful
      absences such as absent recognition, missing protection, delayed remedy, excluded opportunity,
      unasked question, or non-response within an institutional or historical frame. The abstract
      case does not identify a concrete absent event.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - A valid Λ claim would require specifying the expected occurrence, the frame that makes
      it expected, and why its absence matters structurally.
    - Absence must remain capable of marking PMS non-capture, missing evidence, or rival framing
      rather than automatically becoming incomplete integration or drift.
    falsifier_conditions:
    - If no structured expectation is present within a defined frame, Λ should be removed or
      marked inactive.
    non_capture_note: >
      Non-event analysis may miss forms of injustice that rival theories treat as positive imposition,
      symbolic domination, legal defect, or lived experience rather than absence.
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Α marks the category-level possibility that arrangements stabilize into recurrent patterns,
      path-dependence, routines, role scripts, or self-reproducing distributions. Because no
      empirical pattern is supplied, this is structural and not evidentiary.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Recurrence must be shown by stabilization, path-dependence, repeated role-space, or reproduced
      constraints, not by simply naming a structure.
    - The analysis must distinguish stable attractor from accidental aggregation or one-time
      harm.
    falsifier_conditions:
    - If the alleged injustice is fully isolated, accidental, and non-recurring, Α is over-read.
    non_capture_note: >
      Pattern formation is compatible with PMS analysis but does not by itself prove injustice,
      culpability, or explanatory sufficiency.
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity,
      or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Ω is central because the case names harms, disadvantages, responsibilities, and constraints.
      PMS reads these as possible asymmetries of power, exposure, capacity, vulnerability, obligation,
      or role position, without converting them into moral verdicts.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'The asymmetry must specify its kind and direction: exposure, vulnerability, constraint,
      capacity, responsibility-gradient, or institutional position.'
    - Ω must not be moralized by default; structural imbalance is not automatically blame, legal
      liability, or person-ranking.
    - Where the case lacks concrete parties, Ω remains a category-level operator rather than
      a measured empirical asymmetry.
    falsifier_conditions:
    - If no directional imbalance of power, exposure, capacity, vulnerability, obligation, or
      role position is identifiable, Ω claims must be removed or marked weak.
    non_capture_note: >
      Asymmetry is a structural operator and may fail to capture normative wrongness, lived
      harm, legal causation, or political conflict.
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and
      longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Θ is central because the case explicitly includes historical arrangements and because structural
      injustice typically requires persistence, accumulation, inheritance, delay, sequence, or
      temporally extended constraint.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must distinguish temporal trajectory from static comparison and historical
      persistence from empirical proof of causation.
    - Θ is essential where disadvantage accumulates or arrangements persist, but it must not
      be used to infer a concrete history not supplied by the case.
    falsifier_conditions:
    - If the case can be fully analyzed without sequence, persistence, delay, inheritance, or
      accumulation, Θ is overextended.
    non_capture_note: >
      PMS temporality does not settle metaphysical continuity, historical causation, archival
      truth, or empirical sequence.
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Φ is central because the category recontextualizes injustice from an isolated-agent or
      isolated-act frame into a structural-arrangement frame. This recontextualization is analytic,
      not proof that the new frame is superior.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The source frame is individual agent, intention, or isolated wrongful act; the target
      frame is social, institutional, or historical arrangement.
    - 'Φ must be checked for over-assimilation: rival theories may reject the structural frame
      rather than merely needing recontextualization.'
    falsifier_conditions:
    - If every resistance, rupture, disagreement, or rival framing is absorbed as recontextualization
      residue, the PMS reading becomes over-assimilative.
    non_capture_note: >
      Recontextualization may clarify the category but must preserve the possibility that some
      normative, empirical, or legal dimensions remain outside PMS capture.
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Χ is a major application condition. It suspends immediate verdict, person attribution,
      empirical claim, legal finding, and closure so the structural category can remain reversible,
      bounded, and non-tribunal.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must preserve verdict-suspension, reversibility, and refusal to fuse structural
      modeling with blame, enforcement, or closure.
    - Distance must be distinguished from avoidance, neutrality that hides asymmetry, or denial
      of harms named by the conceptual case.
    falsifier_conditions:
    - If Χ is suspended to force a verdict, rank persons, declare legal liability, or close
      rival interpretations, the PMS application becomes invalid.
    non_capture_note: >
      Distance protects against overclaiming but does not guarantee justice, truth, empirical
      adequacy, or political sufficiency.
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Σ is weak and aspirational. A fuller theory of structural injustice would integrate frame,
      pattern, asymmetry, temporality, non-event, and responsibility, but the case material supplies
      only a conceptual prompt, not a completed synthesis.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Integration must discriminate rather than smooth over unresolved tensions among agency,
      causation, responsibility, harm, and institutional history.
    - The PMS reading must not treat coherence as proof of adequacy or as defeat of rival formalisms.
    falsifier_conditions:
    - If PMS coherence is treated as proof that the concept is fully captured, Σ is overclaimed.
    non_capture_note: PMS coherence is insufficient by itself; non-capture and rival readings
      remain open.
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across
      time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: >
      Ψ is weak and conditional. The case mentions responsibilities, but it does not identify
      a self-binding agent, institution, collective, role-bearer, or stable norm commitment.
      Ψ can apply only if a later concrete or theoretical account specifies a bearer of self-binding
      responsibility.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Ψ requires specifying who or what is structurally self-bound, to which obligation, across
      what time, and under what reflective constraints.
    - The analysis must not attribute literal selfhood, subjectivity, or autobiographical coherence
      to an abstract category, institution, or collective unless explicitly scoped as structural
      self-binding.
    falsifier_conditions:
    - If Ψ is applied without adequate Σ, Θ, and Χ, or without a specified bearer of responsibility-as-self-commitment,
      the self-binding reading is under-specified.
    non_capture_note: >
      SELF_FIXPOINT is not established by this conceptual case and must not be treated as metaphysical
      proof of subjectivity, collective mind, or moral personhood.
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames, non-events,
      and recurrent patterns.
    case_function: >
      L1 structures the conceptual category by distinguishing agent, act, arrangement, harm,
      disadvantage, responsibility, and constraint; by marking weak explanatory pressure toward
      a structural account; by placing that pressure in social, institutional, and historical
      frames; by allowing meaningful absences where expectations can be specified; and by requiring
      evidence of recurrence before attractor claims become empirical.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally extended
      into trajectories and commitments.
    case_function: >
      L2 carries the main conceptual weight: stabilized arrangements are read as potentially
      producing asymmetrical exposure, capacity, vulnerability, obligation, or role position,
      and those asymmetries become significant through persistence, accumulation, inheritance,
      or delay across time.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning and
      more mature forms of praxis.
    case_function: >
      L3 is used as analytic discipline. Φ names the recontextualization from isolated wrong
      to structural arrangement; Χ maintains distance, reversibility, and non-tribunal status;
      Σ remains weak because the case does not supply a fully integrated theory or concrete
      synthesis.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation
      maintained across time and contexts.
    case_function: >
      L4 is secondary and conditional only. Ψ is not primary because the case does not identify
      a self-binding agent, institution, collective, or role-bearer. It becomes relevant only
      if a later account specifies responsibility-as-self-commitment across time.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case explicitly requires distinctions between structure and agent, intention
      and consequence, arrangement and isolated act.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: A weak explanatory pressure arises from the difference between isolated wrong
      and structurally mediated harm, but no concrete impulse is supplied.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: The case explicitly supplies social, institutional, and historical arrangements
      as frames.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Possible structured absences are relevant only if a frame-based expectation
      is specified; the abstract material does not supply a concrete absent event.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: The category implies recurrent or stabilized arrangements, but empirical recurrence
      is not demonstrated.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Harms, disadvantages, responsibilities, and constraints support category-level
      asymmetry analysis.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Historical arrangements and accumulated structural effects support category-level
      temporal analysis.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: The case recontextualizes injustice from agent-intention or isolated-act framing
      to structural-arrangement framing.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: The application explicitly suspends verdict, person-ranking, diagnosis, legal
      finding, and empirical closure.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: A possible integrated account is sought, but the supplied material does not
      provide full synthesis; Σ remains weak.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Responsibility is mentioned, but no self-binding bearer is specified; Ψ remains
      conditional.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified
    or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence
    risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
