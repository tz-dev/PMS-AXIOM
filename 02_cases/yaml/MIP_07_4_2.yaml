schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
base_case_references:
  pms_base_reference:
    file: "PMS.yaml"
    role: "only PMS Base reference"
    status: "preserved; not redefined by this MIP application"
  pms_core_case:
    case_title: "Escalation vs Repair"
    role: "completed PMS Core case YAML"
    status: "used as primary structured material; not rewritten"
  pms_conflict_overlay:
    file: "PMS-CONFLICT.yaml"
    role: "overlay/application profile only"
    status: "used as secondary overlay material; reduced signatures remain shorthand only"

case:
  meta:
    case_id: "MIP-EVR-001"
    case_title: "Escalation vs Repair"
    documentation_date: "2026-05-28"
    analysts:
      - name: "ChatGPT (GPT-5.5 Thinking)"
        role: "MIP application assistant"
        observer_position: "External structural analyst applying MIP to already completed PMS Core and PMS-CONFLICT case analyses without rewriting them."
    language: "en"
    confidentiality_level: "internal"
    analysis_mode: "full"
    intended_use: "structural_case_review"
    application_zone: "green"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "full_depth_structural_non_diagnostic"
      d_activation_decision: "not_activated_as_full_D_module_due_to_abstract_non_scene_case; D remains guardrail and optional observation layer"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: "Completed PMS Core case YAML for 'Escalation vs Repair', especially its classification as conceptual_domain_projection, its non-scene status, its active Θ/Χ/conditional Σ reading, and its weak Α/Ω/Ψ findings."
    secondary_material: "Completed PMS-CONFLICT overlay YAML, especially its threshold-watch reading: Θ/Χ/conditional Σ active; Α/Ω/Ψ weak or analytic-only; terminal conflict, binding collision, asymmetry lock-in, exposure capture, and dignity collapse not active findings."
    assumptions_and_inferences: "MIP is applied as an additional case-analysis lens to the already completed PMS and CONFLICT material. The object is the abstract case structure, not a concrete actor. Any A/M band is therefore a case-structure band, not a person score or legal/moral attribution."
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: "high"
      reliability_estimate: "medium"
      known_gaps:
        - "No concrete decision-maker, affected party, institution, time-stamped event, repair practice, or acceptance/refusal scene is specified."
        - "No observable enactments are supplied for D1/D2 dignity-in-practice profiling."
        - "No evidence is supplied for recurrence, stabilized attractor formation, asymmetry direction, self-binding, or priced distance."
        - "No rival-model comparison has been performed beyond keeping rival readings open."
      main_bias_risks_here:
        - "Coherence bias: the PMS Θ-Φ-Χ-Σ reading may appear smoother than the abstract material warrants."
        - "Hindsight bias: later repair possibility could be retroactively treated as if it were available or predictable at the time of decision."
        - "Normative smoothing: repair could be treated as morally sufficient without affected-party, material, or relational criteria."
        - "Template completion pressure: MIP fields may invite actor-level or score-like readings even though the case is non-scene and conceptual."

  snapshot:
    short_case_description: "The case models the abstract problem of how a decision can generate consequences across time while still allowing interruption, revision, recontextualization, or repair without reducing consequence to fate or repair to erasure. PMS Core reads Θ, Χ, Φ, and conditional Σ as central, while Α, Ω, and Ψ remain weak. PMS-CONFLICT adds a threshold lens: the case would become conflict-legible only if repairable consequence hardened into stabilized incompatibility under binding, asymmetry, time, and costly distance."
    central_actors_and_roles:
      - "Abstract decision-structure: the formal place where an initial distinction and directional consequence path arise."
      - "Consequence-bearing position: a placeholder for any role or party that would bear effects if a concrete scene were supplied."
      - "Repair-oriented position: a placeholder for interruption, revision, recontextualization, or repair practices if enacted."
      - "Analyst/model-user role: the role applying PMS, CONFLICT, and MIP while preserving reversibility, distance, and non-person-ranking discipline."
    guiding_question: "Under MIP, how mature is the structural handling of consequence and repair when the case is conceptually coherent but lacks concrete actors, asymmetry, recurrence, and enactment evidence?"
    level:
      - "conceptual_domain_projection"
      - "structural_case_review"
      - "non_empirical"
      - "non_diagnostic"
      - "non_prescriptive"
    first_visible_asymmetry: "Only possible and weak: if concretized, asymmetry would concern who decides, who bears consequences, who can interrupt or reframe, who can exit, and who is owed repair."
    first_visible_D_themes_optional:
      - "Potential dignity risk if repair language becomes erasure of consequence."
      - "Potential dignity risk if conflict terminology becomes person-near verdict, shame, or irreversible labeling."
      - "Potential dignity-protection theme: preserve standing under possible asymmetry by keeping all readings reversible and non-totalizing."

  role_mapping:
    object_of_observation:
      type: "abstract praxeological case structure"
      description: "The object is the structural relation among decision, consequence, interruption, revision, repair, and possible escalation into conflict."
      role: "case-structure, not person or institution"
      not_person_as_whole: true
    observer_position:
      role: "MIP structural analyst"
      power_relation_to_object: "No direct power over any concrete actor is exercised; however, the analysis has framing power and could create misuse risk if exported as verdict or template authority."
      possible_effects_of_analysis: "Can clarify structural maturity conditions and misuse risks; can also over-stabilize a smooth reading if A/M bands are mistaken for person scores or if abstract repair is treated as achieved repair."
    involved_roles:
      - role: "decision-position"
        mandate: "Marks the point where an initial decision or distinction initiates a consequence trajectory."
        built_in_asymmetries:
          - "Possible control over initial action if concretized."
          - "Possible informational advantage or framing power if concretized."
        publicness_level: "private / conceptual"
        dignity_exposure: "Not scene-active; exposure would arise only if a concrete affected party is identified."
      - role: "affected-position"
        mandate: "Marks the position that may bear consequences and may require recognition, protection, or repair if concretized."
        built_in_asymmetries:
          - "Possible vulnerability to consequence without equal control over decision."
          - "Possible dependency on whether repair is material, relational, or merely interpretive."
        publicness_level: "private / conceptual"
        dignity_exposure: "Potential but not established; D readings must remain off unless a scene supplies enactments."
      - role: "repair-position"
        mandate: "Marks interruption, revision, recontextualization, and possible repair without erasing consequence."
        built_in_asymmetries:
          - "Possible risk of controlling the meaning of repair."
          - "Possible risk that one side can reframe or exit more cheaply than another."
        publicness_level: "private / conceptual"
        dignity_exposure: "Potential where repair becomes denial, humiliation, pressure, or non-recognition."
      - role: "analyst/model-user"
        mandate: "Apply MIP to PMS and CONFLICT outputs while preserving guardrails, reversibility, and scope."
        built_in_asymmetries:
          - "Interpretive authority over the written case."
          - "Risk of forcing scores, maturity language, or conflict labels onto an abstract non-scene."
        publicness_level: "private_working_note"
        dignity_exposure: "Low if kept abstract and non-personal; higher if excerpted into public or person-near contexts."
    publicness:
      level: "private_working_note"
      A_P_relevance: "Publicness awareness is necessary because PMS-CONFLICT already identifies exposure capture and misuse gradient risks under transfer."
      P_PU_relevance: "Power-to-act through publicness is low inside the case but could rise sharply if the analysis is circulated, quoted, institutionalized, or person-near."
      D_P_relevance_if_D_active: "D_P is not activated as profile evidence; it remains a guardrail warning against public dignity readings of identifiable persons."
      public_shaming_risk: "Absent inside the abstract case; present as a misuse risk under public or person-near transfer."
      reversibility_risk: "Low in private descriptive use; medium to high if reduced signatures, A/M bands, or terminality language are excerpted without boundary declarations."

  frame_vs_variability:
    frame_elements:
      - element: "PMS Base remains PMS.yaml only."
        reason_fixed_or_slow: "The user explicitly fixed PMS.yaml as the only PMS Base reference; PMS-CONFLICT and MIP are applications/overlays, not base revisions."
        protected_goods:
          - "operator discipline"
          - "dependency hygiene"
          - "non-redefinition"
          - "model integrity"
      - element: "The Core case is not a concrete scene."
        reason_fixed_or_slow: "The completed PMS Core pass explicitly identifies the case as conceptual_domain_projection and non_empirical."
        protected_goods:
          - "non-diagnostic use"
          - "non-forensic use"
          - "reversibility"
          - "scene-bound restraint"
      - element: "CONFLICT signatures remain overlay shorthand."
        reason_fixed_or_slow: "The CONFLICT overlay is subordinate and cannot upgrade weak PMS operators into active findings."
        protected_goods:
          - "no hidden operator creation"
          - "no terminality overclaim"
          - "non-capture openness"
    variability_elements:
      - element: "Concrete role specification"
        possible_change: "A later case could specify decision-maker, affected party, repair agent, institution, publicness, and time sequence."
        responsible_roles:
          - "case author"
          - "analyst/model-user"
          - "domain-specific evaluator if empirical use is intended"
      - element: "Repair criteria"
        possible_change: "A later case could define whether repair is material, relational, legal, symbolic, accepted, refused, partial, or impossible."
        responsible_roles:
          - "affected-position if concretized"
          - "repair-position if concretized"
          - "institutional role if relevant"
      - element: "Maturity trajectory"
        possible_change: "A later scene could show whether awareness, coherence, responsibility, and power-to-act improve, collapse, or remain blocked."
        responsible_roles:
          - "concrete role-holders"
          - "analyst/model-user"
    unfair_high_M_zones:
      - "It would be unfair to assign high M-responsibility to any actor because no actor, knowledge state, control lever, predictability condition, or real alternative is specified."
      - "It would be unfair to treat failure of repair as blame because repair sufficiency, affected-party acceptance, and material feasibility are unspecified."
    system_as_excuse_risk:
      - "The abstract status of the case must not be used to excuse harm if a later concrete scene shows exposure, power, and alternatives."
      - "The model's structural elegance must not become an excuse to avoid naming concrete asymmetry if later supplied."
    D1_D2_realistically_improvable_where:
      - "In the current abstract case, D1/D2 cannot be improved as enactments because no concrete dignity practice is observed."
      - "In a later concrete scene, D1/D2 could improve through non-shaming recognition, affected-party voice, reversible framing, and repair that does not erase consequence."

  acrp_profile:
    A_awareness:
      observations: "Awareness is structurally strong at the level of distinctions: the PMS Core pass separates consequence from fate, repair from erasure, interruption from avoidance, and integration from forced closure. CONFLICT adds awareness of the threshold where repairable consequence could become stabilized incompatibility."
      available_information: "Available information consists of the PMS Core case and CONFLICT overlay, not raw scene evidence."
      realistically_knowable: "It is realistically knowable that the case is abstract, non-scene, non-empirical, and dependency-sensitive. It is not realistically knowable who is responsible, harmed, repaired, or exposed."
      blind_spots: "Actor-level knowledge, material consequences, concrete asymmetries, publicness dynamics, recurrence, self-binding, and acceptance/refusal of repair remain unknown."
      role_awareness_A_R: "Role awareness is present for model roles and analytic roles, but absent for concrete decision-maker, affected party, or repair agent roles."
      publicness_awareness_A_P: "Publicness is recognized as low in the case and risky under transfer; this matches CONFLICT's P/MG overlay concerns."
      bias_awareness: "Bias risks are explicitly visible: coherence bias, hindsight bias, normative smoothing, template completion pressure, and over-assimilation of refusal or rupture into repair."
    C_coherence:
      observations: "Coherence is high as a structural reading but must remain limited. PMS Core provides a coherent Θ-Φ-Χ-Σ path, while CONFLICT warns that coherence must not become proof of achieved repair or non-terminality."
      word_deed_relation: "No word-deed relation is observable because no concrete speech, promise, action, apology, refusal, or repair deed is supplied."
      role_context_coherence: "The analysis is coherent within the role of conceptual structural projection. It would become incoherent if used as empirical, diagnostic, legal, or prescriptive case judgment."
      narrative_coherence: "The narrative is intelligible: decision produces consequences; interruption or repair may recontextualize without erasing consequence; conflict threshold appears if integration fails under binding, asymmetry, and costly distance."
      breaks_named_or_hidden: "Breaks are named rather than hidden: weak Α, Ω, Ψ; under-specified Action_E; non-activated D-module; non-capture zones; no terminal conflict finding."
    R_responsibility:
      observations: "Responsibility is structurally possible but not attributable. PMS Core already marks Responsibility_R as weak because Ω and Ψ are weak; MIP must not convert possible responsibility into blame or score."
      responsibility_points: "If concretized, responsibility points would include initial decision, foreseeability of consequences, ability to interrupt escalation, obligation to repair, and responsibility not to erase harm through recontextualization."
      assumed_responsibility: "Only analytic responsibility is assumed: the model-user must keep boundaries, guardrails, reversibility, and non-person-labeling intact."
      shifted_or_refused_responsibility: "No concrete shifting or refusal of responsibility is evidenced. A possible risk is that abstract repair language could shift responsibility away from consequences."
      burdens_and_consequences: "Burdens are unknown at scene level. Structurally, consequence must remain real even after revision; repair cannot remove the need to account for temporal effects."
    P_power_to_act:
      observations: "Power-to-act is high for the analyst's ability to frame the YAML carefully, but low for any concrete repair action because no scene is provided."
      real_levers: "Real levers inside the analysis include preserving boundaries, refusing person scores, marking weak operators, maintaining non-capture, and blocking transmission into red-zone contexts."
      formal_vs_real_options: "Formal options include assigning A/M bands, IA status, and D observations; real responsible use requires keeping them non-personal, conceptual, and bounded."
      used_options: "The analysis uses the option to apply MIP as a structural review rather than as diagnosis, intervention, or judgment."
      unused_options: "The analysis does not activate full D profiling, does not generate a solution procedure, does not decide repair sufficiency, and does not classify any person or institution."
      ceiling_rule_relevance: "M-responsibility is capped or unassignable because predictability, alternatives, concrete power, and role position are absent."

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: "No self-devaluation enactment is observed; no concrete self or actor is supplied."
      self_neglect: "No self-neglect enactment is observed; the abstract case does not contain bodily, relational, or role-level care practices."
      shame_dynamics: "No active shame dynamic is observed; misuse risk exists if conflict or maturity language becomes shaming."
      degradation_of_others: "No degradation of others is observed in the case material; guardrails prohibit using repair-failure or conflict language as degradation."
      public_shaming: "Absent in the current private conceptual case; a risk under public/person-near transfer."
      protest_or_refusal: "Possible non-capture zone: refusal or rupture must not be automatically redescribed as immaturity, drift, or failed integration."
      dignity_protection: "Dignity protection is active as restraint: no person labels, no dignity score, no humiliation, no irreversible ranking, and no public D reading."
    next_step_if_relevant: "Do not activate full D-profile unless a concrete scene supplies role-bound, context-bound, time-windowed dignity enactments and all D guardrails pass."

  acrpd_submodules_profile:
    A:
      A-I: "Information awareness is strong for the model materials but weak for empirical facts; PMS and CONFLICT outputs are available, while scene evidence is absent."
      A-R: "Role awareness is strong for analytic and model roles; weak for concrete roles because decision-maker, affected party, and repair agent are placeholders."
      A-C: "Context awareness is strong for distinguishing conceptual projection from empirical scene; the key context is theoretical structural analysis."
      A-IM: "Impact awareness is partial: the analysis sees possible misuse, exposure capture, and dignity risks, but cannot assess actual consequences."
      A-P: "Publicness awareness is explicit: current publicness is private/working-note, with higher risk if excerpted or institutionalized."
    C:
      C-S: "Structural coherence is strong inside the PMS/MIP frame, provided weak operators remain weak and no scene findings are invented."
      C-P: "Practice coherence is under-specified because no concrete practice or repair enactment is supplied."
      C-N: "Narrative coherence is solid but risk-prone: consequence-to-repair can be told coherently, yet must not smooth over tragedy, refusal, or unresolved rupture."
      C-I: "Integration coherence is conditional: repair may integrate consequence only if it preserves the old consequence and does not become denial, evasion, or forced closure."
    R:
      R-I: "Individual responsibility is not assignable because no individual actor is specified."
      R-S: "Systemic or structural responsibility is only conceptual: responsibility questions depend on later specification of asymmetry, role, and alternatives."
      R-E: "Enactment responsibility is absent as a finding because no action sequence, repair procedure, or refusal act is observed."
      R-P: "Public responsibility is limited to transmission discipline: the analysis must not be used publicly as person-near judgment or conflict label."
    P:
      P-I: "Individual power-to-act is not assignable; no actor with levers is specified."
      P-S: "Structural power-to-act lies in the grammar: the analysis can preserve boundaries, name weak points, and block misuse."
      P-C: "Constraint awareness is high: missing evidence, weak operators, and non-capture zones constrain any conclusion."
      P-PU: "Publicness power is latent; if circulated, the YAML could gain framing force and must carry boundary declarations."
    D:
      active: false
      D-I: "Not activated as individual dignity profile; no self-treatment enactments are supplied."
      D-B: "Not activated as bodily/basic dignity profile; no embodied care, neglect, or basic protection scene is supplied."
      D-R: "Not activated as relational dignity profile; only a guardrail against shaming, ranking, and person-near verdicts is active."
      D-P: "Not activated as public dignity profile; publicness is low, but transfer risk is recognized."
      note: "D-submodules remain protective guardrails and optional observations only; D0 is untouched and no D score is produced."

  scores_and_ia:
    A_score:
      A_band: "4-5 everyday mixed zone, case-structure only"
      boundary_confirmed: "A-score describes enactment or structural handling, not essence; here it is a case-structure band, not a person score."
      time_role_context: "Abstract decision-repair structure across the PMS Core and CONFLICT overlay, not a real-time actor trajectory."
      justification:
        A_awareness: "Strong conceptual awareness of distinctions, temporal consequence, repair threshold, and misuse risk."
        C_coherence: "Coherent but vulnerable to over-smoothing; integration is conditional and not achieved as scene fact."
        R_responsibility: "Weak as attribution because concrete role, obligation, asymmetry, and self-binding are absent."
        P_power_to_act: "High for analytic boundary-setting, low for concrete repair or intervention."
        modulators_context: "The abstract non-scene status lowers the band because MIP maturity normally requires situated enactment, not only conceptual clarity."
      D_excluded_from_A_number: true
    M_score:
      M_band: "not_assignable_as_actor_score; structural responsibility reading capped at <=4 if a later actor is introduced without predictability and alternatives"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt; here no actor-level M-score is assigned."
      role_position_time_frame: "No concrete role-position or time frame is specified beyond the conceptual sequence decision -> consequence -> interruption/revision/repair."
      five_factors:
        knowledge: "No actor knowledge is specified; only analyst knowledge of PMS/MIP/CONFLICT materials is available."
        power_control: "No concrete control levers are specified; the only current lever is analytic boundary discipline."
        predictability: "Predictability of concrete consequences cannot be assessed; abstractly, consequences across time are central but not empirically specified."
        access_to_alternatives: "No concrete alternatives are specified; only conceptual alternatives such as repair, interruption, refusal, or non-capture are distinguished."
        serious_integration_attempt: "The Core and overlay analyses seriously attempt integration without erasure, but no enacted repair attempt is evidenced."
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: "Because no concrete actor, foreseeability, control, or real alternatives are specified, any actor-level responsibility reading would be capped or withheld."
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: "Potential asymmetry of decision, exposure, repair authority, exit cost, and public framing; not established as scene finding."
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "partly"
        notes: "The analysis transparently marks its material basis and weak operators, but a concrete scene would require explicit role, evidence, and affected-party transparency."
      J_justified:
        status: "partly"
        protected_good_or_purpose: "Preservation of consequence without determinism, repair without erasure, and dignity without person-ranking."
        notes: "The analytic frame is justified as conceptual review; no concrete asymmetry or intervention is justified."
      TB_time_bound:
        status: "partly"
        review_points_or_conditions: "Review required if a concrete scene, public transfer, actor role, or applied repair criterion is introduced."
        notes: "Θ is central, but no actual time window or review date exists."
      R_reversible:
        status: "partly"
        real_return_or_exit_options: "Current YAML reading can be revised; concrete reversibility would depend on scene, publicness, records, and material consequences."
        notes: "Reversibility is a guardrail of the analysis, not proof that real consequences are reversible."
      result: "unclear"
      short_justification: "IA remains a watch condition rather than a verdict because Ω is weak in PMS Core and CONFLICT; MIP must not upgrade possible asymmetry into established imbalance."
      immediate_action: "Keep the analysis private, reversible, non-personal, and non-prescriptive; require scene evidence before any applied IA judgment."

  ia_localisation:
    knowing:
      issue: "The analysis knows the model outputs but lacks scene evidence, actor knowledge, affected-party perspective, and concrete repair criteria."
      possible_intervention: "Before any applied use, specify material basis, roles, time windows, affected positions, and what counts as repair versus erasure."
    being_able:
      issue: "The current analysis can maintain conceptual discipline but cannot enact repair or assess concrete power."
      possible_intervention: "Limit the present output to structural review; do not convert it into action guidance except for guardrail preservation."
    being_permitted:
      issue: "The analysis is permitted as private structural reflection, not as diagnosis, public label, HR/forensic decision, or sanction logic."
      possible_intervention: "Declare mode and publicness if reused; block red-zone uses and require separate governance if moving into applied contexts."
    willing:
      issue: "The model-user may be tempted to force closure because the templates are coherent and full-depth."
      possible_intervention: "Maintain non-capture, rival openness, and explicit weak statuses even when the YAML form appears complete."

  ia_protection:
    transparency_measures:
      - "State that the MIP analysis is based on PMS Core and CONFLICT overlay materials, not on direct scene evidence."
      - "Keep A/M bands explicitly non-personal and case-structure-bound."
    justification_measures:
      - "Justify every maturity claim by reference to structural distinctions, not to assumed motives or traits."
      - "Mark weak or absent evidence where concrete responsibility, asymmetry, or repair would normally be required."
    time_boundedness_measures:
      - "Treat the analysis as valid only for the current abstract case material."
      - "Trigger review if new scene data, publicness, actor roles, or applied consequences appear."
    reversibility_measures:
      - "Allow revision of all A/M/IA statuses if concrete facts are supplied."
      - "Do not publish reduced conflict signatures without boundary declarations."
    participation_or_voice_measures:
      - "If concretized, include affected-party perspective before claiming repair adequacy."
      - "If institutionalized, include role-holder and exposed-position voice before any evaluation overlay."
    dignity_protection_measures:
      - "Keep D0 untouched and immeasurable."
      - "Do not activate D-profile for identifiable persons in public contexts."
      - "Avoid shaming, ranking, maturity-labeling, and person-near terminality claims."
    review_or_falsifier:
      date_or_interval: "Review upon introduction of any concrete scene, public transfer, or applied decision context."
      falsifier_question: "Would any part of this MIP reading change if the affected party refused repair, if exit costs were asymmetric, or if consequence remained materially unrepaired?"
      responsible_roles:
        - "analyst/model-user"
        - "case author"
        - "domain-specific reviewer if the case becomes applied"

  trajectory:
    principle: "Trajectories, not labels."
    timeline:
      - timepoint: "t0"
        short_description: "Initial decision/consequence structure becomes legible through Δ, ∇, □, Λ, and Θ in PMS Core."
        A_band: "4-5 case-structure only"
        M_band: "not assignable; no actor-level knowledge/control/alternatives"
        D_observation_optional: "D off; dignity guardrails active only."
        key_context_role_power_situation: "Abstract conceptual frame; no concrete role or power distribution."
      - timepoint: "t1"
        short_description: "Repair possibility appears through interruption, recontextualization, distance, and conditional integration."
        A_band: "4-5 with stronger conceptual awareness but still non-scene"
        M_band: "not assignable; ceiling <=4 if later actor introduced without predictability and alternatives"
        D_observation_optional: "D off; protect against repair-as-erasure and conflict-as-shaming."
        key_context_role_power_situation: "Repair remains conceptual; no affected-party acceptance, material repair, or obligation is specified."
      - timepoint: "t2"
        short_description: "CONFLICT overlay identifies threshold conditions for stabilized incompatibility but does not find them active."
        A_band: "4-5 case-structure only; threshold awareness improved"
        M_band: "not assignable; no established binding collision or asymmetry lock-in"
        D_observation_optional: "D off; exposure capture and dignity collapse are misuse risks only."
