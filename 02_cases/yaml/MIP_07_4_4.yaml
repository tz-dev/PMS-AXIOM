    - IA-box remains an asymmetry check only and cannot classify the abstract case.
    - D-module remains off; dignity protection is active only as guardrail.
    - Tragic non-resolution must not be converted into immaturity, guilt, blame, or failure of integration.
    - CONFLICT terminality remains weak and conceptual, not a concrete terminal conflict regime.
    - Non-capture and rival readings remain open.
