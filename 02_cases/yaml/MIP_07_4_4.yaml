    M_summary: M is not assigned because there is no actor, role-holder, knowledge field, predictability field, alternatives field, or power/control distribution.
    IA_box_summary: IA-box is not applied as a verdict; possible asymmetry is named but under-specified and remains a calibration requirement for future concrete cases.
    D_summary_if_activated: D is not activated. D0 is untouched, D1/D2 are not profiled, and dignity functions only as a guardrail against shaming, ranking, humiliation, public pillory, and person-near labeling.
    trajectory_summary: The document trajectory moves from PMS Core conceptual structure to CONFLICT weak overlay to MIP guardrail review; this is a documentation trajectory, not a maturity trajectory of a person or concrete enactment.
    guardrail_status: 'Guardrails are satisfied for private working-note use: profile-not-person, no score misuse, no D-score, no IA verdict, no red-zone application, and publicness risk acknowledged.'
    transmission_status: working_note_only
    practical_implications: Do not use this MIP analysis as decision basis. Use it only to preserve structural clarity, guardrails, no-score discipline, non-capture, and future review conditions.
