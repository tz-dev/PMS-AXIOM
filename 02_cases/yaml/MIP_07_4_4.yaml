      hindsight_bias: 'Risk of treating irreversibility as if responsibility or predictability were already established. Mitigation: no M-score and no culpability inference.'
      status_quo_loyalty_bias: 'Risk of accepting PMS/MIP formal order as sufficient because it is internally coherent. Mitigation: rival readings remain open.'
      halo_horn_effects: 'Risk of giving the analysis a halo effect due to elegant YAML coherence or a horn effect to tragedy as non-integrable. Mitigation: distinguish coherence from adequacy.'
      in_group_out_group_bias: Low in the abstract case; could rise if rival theories are treated as outsiders or as merely incomplete PMS/MIP versions.
      dignity_bias_effect: 'Risk of using dignity-protection language to moralize the analysis. Mitigation: D remains off as profile and active only as guardrail.'
