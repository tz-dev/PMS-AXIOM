schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >
  Filled PMS_1.3 case application for the philosophical case "Hermeneutic
  circle." This document applies PMS.yaml as the only PMS Base reference and
  does not revise PMS Base, add operators, add derived structures, or claim PMS
  validation.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    PMS.yaml remains the sole PMS Base reference. This case application does not
    redefine operators, alter order or dependency logic, treat derived structures
    as primitives, override guardrails, or validate PMS Base.
  referenced_base_sections:
    - "pms_entry_condition"
    - "schema_version"
    - "schema_meta"
    - "repository_governance"
    - "core_principles"
    - "pms_model_reference"
    - "derived_structures"
    - "example_operator_chains"
    - "computational_representation"
    - "ai_interface_pms"
  application_schema_note: >
    The template is used only as a case-output schema. PMS.yaml has priority over
    the template and over the prior pre-analysis.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as a disciplined repository reference, not as final,
    complete, uniquely ordered, or immune to revision.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - "theoretical_reflection"
      - "structural_action_theory"
      - "anthropology_and_praxeology"
      - "systems_theory"
      - "ai_architecture_and_safety"
      - "model_documentation_and_specification"
      - "simulation_scaffolding"
      - "structural_reasoning"
    not_intended_for:
      - "clinical_diagnosis"
      - "personality_typing"
      - "mental_health_risk_assessment"
      - "automated_moral_judgement"
      - "individual_person_evaluation"
      - "forensic_decision_making"
      - "policy_enforcement"
      - "irreversible_labeling"
  normative_position_alignment:
    ontology: >
      No PMS-based claim is made about consciousness, qualia, inner experience,
      metaphysical essence, moral worth, or ontological dignity.
    dignity_clause: >
      Dignity-in-Practice is treated only as a praxeological application
      constraint on handling asymmetry.
    tragedy_clause: >
      Coherence, integration, maturity, or responsibility do not eliminate
      tragedy, unresolved tension, rupture, disagreement, or non-capture.
    self_binding_clause: >
      This case application remains subject to Distance (Χ), Self-Binding
      discipline (Ψ), and Dignity-in-Practice (D), and must not force closure.
  computational_position_alignment:
    representation_clause: >
      YAML representation is not implementation of praxis, agency, selfhood,
      consciousness, subjectivity, empirical validity, or philosophical truth.
    calibration_clause: >
      Operational use would require context-sensitive calibration, implementation
      constraints, testing where applicable, external evaluation, and public
      accountability.
    accountability_clause: >
      Formal translation into PMS terms does not guarantee intelligibility,
      empirical adequacy, public accountability, or explanatory sufficiency.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars or
      formalisms.
  terminology_alignment:
    praxis: >
      Situated, meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation, modeled structurally through
      operator compositions.
    meta_axiom: >
      One of the eleven PMS operators Δ–Ψ, treated as structurally basic within
      PMS_1.3 and not replaced by case-specific concepts.
    operator_composition: >
      Ordered application of PMS operators to generate more complex
      praxeological formations.
    derived_construct: >
      A higher-order PMS construct derived from operator compositions, not an
      independent primitive.
    asymmetry_drift_pattern: >
      A structurally derived distortion pattern within PMS, not a diagnosis,
      person-type, clinical category, ontological attribution, or moral verdict.
    repository_reference: >
      PMS.yaml remains the base reference; this case template is subordinate.
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.4 Thinking)"
      role: "formalization_assistant"

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the current repository reference for PMS Base. This case depends
    on PMS.yaml but does not revise it.
  this_template_may:
    - "depend_on_pms"
    - "reference_pms_operators"
    - "define_case_application_structure"
    - "organize_pms_operators_for_case_analysis"
    - "specify_case_quality_control"
    - "support_structural_reasoning"
  this_template_must_not:
    - "silently_redefine_meta_axioms"
    - "silently_alter_default_operator_order"
    - "silently_alter_default_dependency_path"
    - "present_new_meta_axioms_as_if_already_in_base_pms"
    - "treat_derived_axes_as_independent_primitives"
    - "override_application_guardrails_while_claiming_full_pms_conformity"
    - "claim_pms_base_validation_from_a_case"
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >
    PMS application presupposes Distance (Χ), reversibility, and
    Dignity-in-Practice (D) as application constraints.
  applies_to: "application_only"
  does_not_apply_to:
    - "critique"
    - "refusal"
    - "rejection"
    - "revision_proposals"
    - "rival_formalization"
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >
          The analysis does not fuse PMS into verdict, enforcement, closure, or
          person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          Structural readings remain revisable, bounded, non-final, and
          non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >
          The analysis does not shame, rank, humiliate, diagnose, tribunalize,
          or ontologically evaluate persons or groups.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      PMS application is itself subject to PMS. Distance, Self-Binding
      discipline, and Dignity-in-Practice must not be suspended to force truth,
      clarity, authority, resolution, or action.
    application_to_this_case: >
      The hermeneutic-circle reading is kept reversible and bounded. It does not
      force the conclusion that the circle is vicious, productive, resolved, or
      exhaustively captured by PMS.
  application_only_boundary:
    status: "active"
    statement: >
      PMS may be criticized, revised, rejected, ignored, or compared with rival
      formalizations without satisfying PMS application conditions.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, rival framing, or unresolved absence must
      not automatically become PMS drift, incomplete calibration, failed
      integration, or maturity failure.
  no_pms_base_revision:
    status: "active"
    statement: >
      This case does not alter PMS Base, operators, dependencies, derived
      structures, guardrails, or governance.

case:
  title: "Hermeneutic circle"
  interpretation_type: "comparative_theoretical_case"
  case_type: "philosophical_conceptual_domain_projection_about_part_whole_interpretation"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    The analysis concerns the abstract philosophical structure in which
    understanding a part appears to require understanding the whole, while
    understanding the whole appears to require understanding its parts.
  non_scope: >
    The analysis does not prove a metaphysical theory of meaning, settle
    hermeneutics, diagnose interpreters, provide a legal or forensic criterion,
    implement an interpretive system, rank persons or traditions, or validate
    PMS Base.
  non_goals:
    - "metaphysical_proof"
    - "diagnostic_assessment"
    - "legal_or_forensic_judgment"
    - "person_ranking"
    - "irreversible_labeling"
    - "pms_base_validation"
  case_typing_note: >
    The case is not a concrete praxis scene. It is a philosophical conceptual
    projection with comparative-theoretical implications because rival logical,
    phenomenological, coherentist, systems, contextualist, and deconstructive
    readings remain open.

