core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as an interpretive praxis-structure, not as psychology,
      ontology, or person essence.
    failure_condition: >
      The analysis would fail P1 if it generated psychological essence claims or
      global person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis for praxis, while completeness and unique ordering remain
      open.
    status: "satisfied"
    case_application: >
      Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators.
      Horizon, fore-structure, recursion, and interpretation remain case terms.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators or axes.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      Awareness, coherence, responsibility, action, dignity-in-practice, and
      drift patterns are derived from operator compositions rather than added as
      independent primitives.
    status: "satisfied"
    case_application: >
      Derived structures are considered only through PMS formulas and not as
      independent axioms.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as primitive.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Ω and Θ are central structural operators, and responsibility, maturity, and
      dignity-in-practice are analyzed under temporal and asymmetrical
      conditions.
    status: "satisfied"
    case_application: >
      Θ is central because interpretation unfolds through return and revision.
      Ω is weak and limited to structural priority or dependence between part,
      whole, and frame.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant temporality or inflated
      weak Ω into social power, diagnosis, or moral rank.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not imply
      implementation, interoperability, or explanatory adequacy.
    status: "satisfied"
    case_application: >
      YAML form is not implementation, empirical adequacy, or computational
      sufficiency.
    failure_condition: >
      The analysis would fail P5 if YAML encoding were treated as implemented
      praxis or validation.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS remains open to comparison with alternative grammars, sharper models,
      and empirically grounded formalisms.
    status: "satisfied"
    case_application: >
      Rival readings include formal-logical circularity, phenomenological
      hermeneutics, coherentism, systems recursion, contextualism, and
      deconstructive non-closure.
    failure_condition: >
      The analysis would fail P6 if PMS translation were treated as defeating
      rivals by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture.
    status: "satisfied"
    case_application: >
      Phenomenology, historicity, truth-conditions, and constitutive non-closure
      may exceed PMS capture.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No traits, disorders, capacities, maturity levels, or clinical states are
      inferred.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, risk, competence, or
      diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must remain tied to specific praxeological scenes, roles,
      and structures, and must avoid global person-labels.
    status: "satisfied"
    case_application: >
      Because no concrete scene is supplied, the reading is explicitly
      case-type-bound to an abstract philosophical structure.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, or
      decontextualized claims.

pms_model_reference_application:
  ordering_status:
