ai_interface_pms_alignment:
  welcome_message: >
    This case uses PMS as a structural operator model. PMS is
    non-psychological, non-diagnostic, non-clinical, non-prescriptive, and
    non-metaphysical in its claims.
  modes:
    - id: "axiomatic"
      title: "Axiomatic / theory mode"
      description: "Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions."
      case_status: "active"
      case_application: >
        Axiomatic mode inspects the hermeneutic circle through PMS operators and
        dependencies while preserving claim boundaries.
    - id: "derived_axes_inspection"
      title: "Derived axes mode"
      description: "Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis."
      case_status: "active"
      case_application: >
        Derived axes mode projects formula-derived structures only; it does not
        diagnose or rank persons.
    - id: "ai_architecture"
      title: "AI architecture mode"
      description: "Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing."
      case_status: "not_applicable"
      case_application: >
        AI architecture mode is not applicable because no agent design,
        implementation, or deployment claim is made.
  guardrails:
    general:
      - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
      - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
      - "Treat Ω as structural, not moral judgement."
      - "Do not use PMS to rank or compare human beings."
      - "Do not treat PMS translation as exhaustive capture."
      - "Do not treat absence of rival models as proof of completeness."
      - "Do not frame resistance, disagreement, or non-alignment as immaturity per se."
      - "Maintain reversibility, Χ, D, and external accountability for truth claims."
      - "Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation."
    ai_specific:
      - "PMS operators may be abstract modules, not evidence of subjective experience."
      - "Encoding PMS in YAML does not implement praxis or selfhood."
      - "Ψ in artificial systems refers to policy and constraint stability, not consciousness."
      - "Deployment requires architecture-specific calibration and evaluation."
      - "Maintain distinction between structural agency models and human vulnerability."
  suggested_questions:
    - "What structural operators are involved in this pattern of praxis?"
    - "Which asymmetries (Ω) and temporal trajectories (Θ) are visible?"
    - "Where do Φ, Χ, and Σ appear or fail?"
    - "How does this project onto Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?"
    - "Which parts remain tentative, calibration-dependent, or open to rivals?"
  case_answer_to_suggested_questions:
    structural_operators_involved: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
    asymmetries_and_temporal_trajectories_visible: >
      Ω is weak as structural dependence between part, whole, and horizon. Θ is
      strong as return, revision, anticipation, and delayed stabilization.
    recontextualization_distance_integration: >
      Φ is central in re-reading parts and wholes through revised frames. Χ is
      central in preserving suspension and reversibility. Σ is possible but not
      entailed.
    derived_axes_projection: >
      Awareness_A and Coherence_C are active; Responsibility_R is weak; Action_E
      is under-specified; Dignity_in_Practice_D is an application constraint.
    tentative_calibration_rivalry: >
      Ω, Σ, Ψ, and any claim that the circle is productive rather than vicious
      remain tentative. Rival formalizations remain open.

analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "operator_dependency_inspection"
      - "derived_axes_projection"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This permits bounded structural projection and comparison. It does not
      permit empirical findings, concrete scene adjudication, metaphysical
      conclusions, diagnosis, legal/forensic claims, implementation claims, or
      PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The case fits PMS terms of frame, temporality, recontextualization,
      distance, and possible integration so smoothly that PMS may under-
      discriminate vicious circularity, productive recursion, coherentism, and
      non-closure.
    mitigation: >
      Weak markings for Ω, Σ, Ψ, rival readings, non-capture zones, falsifiers,
      and the insufficiency of PMS coherence constrain the reading.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the recursive part-whole movement, the role of frames and
      horizons, the absence or delay of a fully given whole, temporal return,
      re-reading, and the need for reflective distance before claiming
      integration.
    discrimination_requirement: >
      PMS must not merely redescribe the hermeneutic circle in its own operator
      vocabulary. It must distinguish vicious circular justification from
      productive interpretive recursion, recontextualization from assimilation of
      non-fit, integration from forced coherence, structural dependence from
      interpersonal asymmetry, and unresolved non-closure from failed maturity.
    discrimination_status: "partial"
    discrimination_limit: >
      The PMS reading has strong coverage but only partial discriminative force
      unless the analysis can specify what changes between interpretive
      iterations, which frame is being revised, and what would count as genuine
      clarification rather than circular reinforcement.
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish productive hermeneutic recursion from vicious circularity."
      expected_pms_distinction: >
        Productive recursion requires Φ and Χ to support revisable re-reading
        without forcing Σ. Vicious circularity would show repetitive Α and
        frame-locking □ in which the initial frame protects itself from
        correction.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish PMS integration from philosophical adequacy or truth."
      expected_pms_distinction: >
        Σ may model structural synthesis, but it cannot establish validity,
        truth, exhaustive meaning, or resolution of the hermeneutic problem.
        Integration is therefore a conditional structural possibility, not a
        success verdict.
      current_status: "satisfied"
    - id: "DT3"
      test: "Distinguish recontextualization from absorption of rival framing."
      expected_pms_distinction: >
        Φ is warranted only where a source frame and a revised target frame can
        be identified. Rival readings, resistance, or refusal of the PMS frame
        must not automatically be redescribed as recontextualization.
      current_status: "partially_satisfied"
    - id: "DT4"
      test: "Distinguish weak structural asymmetry from social, moral, or practical asymmetry."
      expected_pms_distinction: >
        Ω remains weak in this case because the material shows dependence
        between part, whole, and horizon, but does not show power, exposure,
        vulnerability, obligation, institutional role difference, or person-level
        asymmetry.
      current_status: "satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What is the active distinction: part versus whole, initial versus revised horizon, or vicious versus productive circularity?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What interpretive pressure follows from the part-whole distinction without inferring psychological desire?"
      current_calibration: "satisfied"
    - operator: "□"
      question: "Which horizon, context, or fore-structure constrains relevance?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "What expected whole-understanding is absent or delayed within the frame?"
      current_calibration: "satisfied"
    - operator: "Α"
      question: "What recurrence or stabilization makes the relation circular or recursive?"
      current_calibration: "satisfied"
    - operator: "Ω"
      question: "What asymmetry is present, and is it only structural dependence rather than power or obligation?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "What temporal sequence, revision, return, or delay is essential?"
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "What source and target frames define recontextualization, and does Φ clarify rather than absorb non-fit?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "How is reflective distance maintained against premature verdicts?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "What would count as integration rather than forced coherence?"
      current_calibration: "partial"
    - operator: "Ψ"
      question: "What self-binding is actually in scope: analytic discipline, interpretive method, or none?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - >
        Phenomenological accounts of lived understanding, historicity,
        fore-having, and horizonality may exceed a structural PMS projection.
      - >
        Formal-logical accounts of circular justification may treat the case as
        a validity problem rather than as praxis, temporality, or
        recontextualization.
      - >
        Hermeneutic accounts may understand the circle as a condition of
        interpretation rather than as a defect to be integrated or overcome.
      - >
        Deconstructive or non-closure readings may reject Σ as the wrong target
        and may treat unresolvedness as constitutive rather than deficient.
      - >
        Truth-conditions for interpretation may require criteria not supplied by
        PMS coherence, frame movement, recontextualization, or integration.
    rule: >
      These zones must not be redescribed automatically as PMS drift,
      calibration residue, incomplete integration, structured absence, immature
      praxis, or failed self-binding. They may mark real limits of PMS capture,
      rival formalization, or a philosophical issue whose decisive criteria lie
      outside this PMS application.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "formal_logical_circularity_reading"
      - "phenomenological_hermeneutics_reading"
      - "coherentist_epistemology_reading"
      - "systems_feedback_or_recursive_model"
      - "deconstructive_non_closure_reading"
      - "contextualist_semantic_reading"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless explicit comparison criteria are specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened if the case is strictly formal logical
        circularity with no praxis, frame movement, temporality, or
        recontextualization.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if it cannot distinguish vicious
        circularity from productive recursion.
    - id: "F3"
      condition: >
        The reading would be over-assimilative if rival framings, unresolved
        absence, non-fit, or refusal of integration were automatically
        redescribed as PMS drift or maturity failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The application is valid as a reversible conceptual PMS projection, with
      high coherence risk controlled by weak markings, non-capture zones, rival
      readings, and falsifier conditions.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the projection into
    empirical, comparative, computational, legal, clinical, or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Explicit coding of part, whole, frame, and relevant contrast in a concrete interpretive scene."
      "∇": "Observable markers of directed interpretive pressure, such as questions, revision attempts, or problem-solving movement."
      "□": "Identification of the active horizon, context, convention, method, or relevance frame."
      "Λ": "Evidence that an expected whole, context, answer, or interpretive completion is meaningfully absent or delayed."
      "Α": "Repeated iterations or stable recurrence rather than a single dependency."
      "Ω": "Specified imbalance of priority, role, capacity, power, exposure, or obligation; currently only weak structural dependence is supplied."
      "Θ": "Temporal sequencing of interpretive revisions, returns, anticipations, and delays."
      "Φ": "Traceable source and target frames showing meaning change through recontextualization."
      "Χ": "Indicators of reflective suspension, restraint, or preserved reversibility."
      "Σ": "Criteria for achieved integration that distinguish synthesis from forced coherence."
      "Ψ": "Evidence of self-binding by an interpreter, method, institution, or agent across time."
    negative_cases:
      - "A purely formal circular argument with no interpretive horizon or temporal revision."
      - "A one-time contextual clarification that does not recur between part and whole."
      - "A deconstructive reading that treats non-closure as constitutive and rejects integration."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. No empirical data, comparative scoring,
    computational architecture, legal criteria, clinical indicators, or applied
    decision context are supplied or claimed.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not ontological claims."
    - "Treat Ω as structural, not moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat PMS translation as exhaustive capture."
    - "Do not treat absence of rival models as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Χ, D, and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      The analysis does not infer mental states, motives, capacities, or traits
      of any interpreter.
    non_metaphysical: >
      The analysis does not claim that PMS resolves the metaphysics of meaning,
      subjectivity, understanding, or being.
    non_diagnostic: >
      No pathology, maturity failure, cognitive deficit, or clinical category is
      inferred.
    non_legal_forensic: >
      The analysis supplies no evidentiary standard, culpability criterion,
      liability claim, or forensic assessment.
    non_implementation_claim: >
      The YAML case application is not an implemented interpreter, architecture,
      validation, or deployable system.
    non_moral_ranking: >
      No interpreter, tradition, school, or rival formalization is ranked as
      morally superior or inferior.
    non_exhaustive_capture: >
      PMS may leave phenomenological, logical, semantic, historical, and
      deconstructive aspects outside capture.
    reversibility: >
      Vicious, productive, coherentist, contextualist, and non-closure readings
      remain possible unless additional criteria decide among them.
    dignity_in_practice: >
      Weak asymmetry and disagreement are not used to shame, rank, diagnose, or
      tribunalize persons or traditions.

limits:
  - >
    PMS gives a structural projection of the hermeneutic circle, not a
    philosophical settlement of it.
  - >
    The case provides no empirical, metaphysical, diagnostic, clinical, legal,
    forensic, implementation, or PMS Base validation grounds.
  - >
    Rival readings and non-capture remain open, especially for logic,
    phenomenology, historicity, truth-conditions, and non-closure.
  - >
    Because PMS fits the case smoothly, over-assimilation risk is high unless Χ,
    non-capture, falsifiers, and discrimination tests remain active.

case_synthesis:
  primary_pms_reading: >
    The hermeneutic circle can be projected as a bounded PMS structure in which
    part-whole Difference generates directed interpretive tension within frames,
    under the structured absence of the fully given whole. This absence recurs
    as an interpretive attractor over time and calls for recontextualization and
    reflective distance before any integration can be claimed.
  minimal_positive_claim: >
    PMS can make visible why the circle need not be read only as a simple
    logical defect: it can also be modeled as a temporally extended,
    frame-sensitive recursive structure in which parts and wholes mutually
    revise one another. This is a structural possibility, not a proof that every
    hermeneutic circle is productive.
  continuity_condition: >
    Continuity holds only insofar as the part-whole distinction and interpretive
    horizon persist across iterations without collapsing into a single static
    relation or a merely verbal restatement of the same frame.
  change_condition: >
    Change occurs when a part is re-read through a revised whole or a whole is
    re-read through revised parts. This counts as Φ only if source and target
    frames are distinguishable and the revision is not merely the old frame
    protecting itself from contradiction.
  integration_condition: >
    Σ may be considered only if the recursive movement yields a more coherent
    coordination of part, whole, frame, absence, and temporal revision. It must
    not be assumed merely because the PMS rendering itself appears coherent.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, unresolved absence, or refusal of
    integration remains possible non-capture or rival formalization, not
    automatic PMS drift, incomplete calibration, incomplete integration,
    recontextualization, or maturity failure.
  responsibility_condition: >
    Responsibility_R is not active as a case-level claim unless an interpreter,
    method, tradition, or institution is explicitly modeled as self-bound to
    obligations under asymmetry across time. The abstract philosophical case
    does not itself supply those conditions.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis against person-ranking,
    diagnosis, shaming, tribunalization, or moralized treatment of weak
    structural asymmetry. It is an application constraint, not an ontological
    dignity thesis.
  rival_reading_condition: >
    Rival formalizations remain open and require explicit comparison criteria
    before PMS can claim stronger discrimination than logical,
    phenomenological, coherentist, systems-theoretical, contextualist, or
    deconstructive accounts.

final_structural_formula:
  primary_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model_with_weak_Ω"
  reduced_formula_without_weak_asymmetry: "Χ ∘ Φ ∘ Θ ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  conditional_integration_formula: "Σ? ∘ Χ ∘ Φ ∘ Θ ∘ Ω? ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  compressed_reading: >
    The hermeneutic circle is modeled here as reversible interpretive recursion:
    framed part-whole difference and structured absence recur over time, with
    strong recontextualization and strong distance. Ω remains weak and
    structural; Σ remains conditional; Ψ is not entailed by the case material.
  formula_selection_note: >
    The primary formula preserves PMS operator order while marking Ω as weak.
    Where no asymmetry beyond structural dependence is accepted, the reduced
    formula is cleaner. Where integration is examined, Σ must remain explicitly
    conditional rather than silently achieved.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection only. It does not
    establish empirical truth, metaphysical truth, phenomenological completeness,
    diagnostic validity, legal or forensic validity, clinical validity,
    implementation validity, moral ranking, or PMS Base validation.