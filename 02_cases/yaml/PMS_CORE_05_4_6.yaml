    status: "weak"
  self_binding_chain:
    formula: ["Ψ", "Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Default repository chain for self-binding as structured self-relation."
    case_reading: >
      The self-binding chain is analytic-only and constrains the application; the
      circle itself is not treated as a subject.
    status: "analytic_only"

computational_representation:
