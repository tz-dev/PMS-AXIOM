    repository_role: >
      This case follows PMS_1.3 order and dependencies unless a weakness is
      explicitly marked.
  operator_inventory:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  operator_inventory_status: "no_additional_pms_operators_introduced"

operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides: ["boundary_formation", "object_differentiation", "structural_contrast"]
    examples: ["self vs. other", "inside vs. outside a role", "allowed vs. forbidden action"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the part-whole distinction, the contrast between prior and revised
      understanding, and the difference between vicious circularity and
      productive recursion.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the distinction is part versus whole, initial horizon versus revised horizon, or vicious versus productive circularity."
      - "Do not conflate logical invalidity, interpretive recursion, and contextual dependence."
    falsifier_conditions:
      - "If no meaningful distinction between part, whole, frame, or revision can be identified, PMS loses its entry point."
    non_capture_note: "Difference does not by itself prove PMS capture."
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on: ["Δ"]
    provides: ["activation", "orientation", "energetic_gradient", "proto_agency"]
    examples: ["desire triggered by perceived lack", "urge to correct an imbalance", "movement toward or away from a signal"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as structural directedness toward understanding when the part is
      insufficient without the whole and the whole is insufficient without its
      parts.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "Treat the tension as explanatory and interpretive, not as subjective desire."
      - "Keep directedness tied to the part-whole difference rather than invented motivation."
    falsifier_conditions:
      - "If the relation is static and generates no interpretive pressure, ∇ is under-specified."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on: ["Δ", "∇"]
    provides: ["context", "boundary_conditions", "relevance_structuring", "role_space"]
    examples: ["institutional rules", "family role expectations", "conversation context"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is strongly active as horizon, context, fore-structure, and relevance
      field that lets parts and wholes become interpretable.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as interpretive horizon or context."
      - "Mark frame shifts when parts or wholes are re-read."
    falsifier_conditions:
      - "If no horizon, context, or relevance structure is involved, PMS becomes under-discriminating."
    non_capture_note: "A frame can clarify a case without exhausting it."
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on: ["□"]
    provides: ["expectation", "counterfactual_structure", "tension_through_absence"]
    examples: ["a promised reply that never arrives", "silence where a response is expected", "postponed decision that reshapes the situation"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ appears because the fully understood whole is not initially given yet is
      presupposed as relevant within the interpretive frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence is full whole-understanding within an interpretive horizon."
      - "Absence may mark productive delay, vicious circularity, or PMS non-capture."
    falsifier_conditions:
      - "If no structured expectation of whole-understanding exists, Λ should not be active."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on: ["Δ", "∇", "□", "Λ"]
    provides: ["pattern_formation", "stability", "path_dependence", "role_script_emergence"]
    examples: ["repeated avoidance of conflict", "reliable punctuality", "stable institutional routine"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is active as the recurrent part-whole movement through which
      interpretation stabilizes as circular or recursive.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Show iterative part-whole revision rather than merely naming circularity."
      - "Distinguish stable recursion from accidental repetition."
    falsifier_conditions:
      - "If there is no recurrence or stabilization, Α is over-read."
    non_capture_note: "Pattern formation is not explanatory sufficiency."
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on: ["Α"]
    provides: ["role_differentiation", "responsibility_gradients", "vulnerability_structures"]
    examples: ["parent-child relation", "mentor-apprentice dynamics", "leader-follower position"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak and bounded. The case supports only structural priority or
      dependence between part, whole, and horizon, not social power, moral
      obligation, vulnerability, or person-ranking.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Specify asymmetry as structural dependence, not domination."
      - "Do not moralize asymmetry by default."
      - "Allow Ω to remain weak because the case is abstract and not interpersonal."
    falsifier_conditions:
      - "If no directional imbalance or priority relation is identifiable, Ω must be removed or marked not active."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on: ["Ω", "Α"]
    provides: ["sequence_and_trajectory", "persistence", "anticipation_and_delay", "developmental_arcs"]
    examples: ["long-term responsibility", "accumulating consequences", "ongoing development of a role"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is strongly active because interpretation unfolds through return,
      revision, anticipation, delay, and possible stabilization.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish diachronic interpretive revision from timeless logical paradox."
      - "Check whether temporality is essential or imported by the PMS reading."
      - "Because Ω is weak, the temporal reading remains bounded."
    falsifier_conditions:
      - "If the case is purely synchronic circularity with no return or revision, Θ is overextended."
    non_capture_note: "Temporality does not settle metaphysical or empirical continuity."
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on: ["Θ", "Ω", "□"]
    provides: ["adaptation", "reinterpretation", "developmental_change", "pattern_shift"]
    examples: ["reframing conflict as misunderstanding", "seeing a failure as a learning step", "renegotiating role expectations"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is strongly active where parts are re-read through revised wholes and
      wholes are re-read through revised parts.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name source and target frames as initial and revised horizons."
      - "Check whether recontextualization clarifies or merely absorbs non-fit."
      - "Do not treat every disagreement or rupture as successful Φ."
    falsifier_conditions:
      - "If all resistance is absorbed as recontextualization, the reading is over-assimilative."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on: ["Φ", "Θ", "□"]
    provides: ["regulation", "inhibition", "reflection_and_meta_position"]
    examples: ["pausing before reacting", "stepping out of a role to reflect", "deliberately suspending a habitual script"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is strongly active as reflective suspension of premature closure on
      whether the circle is vicious, productive, resolved, or fully PMS-captured.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Suspend verdict and preserve reversibility among rival readings."
      - "Distinguish distance from empty neutrality or avoidance."
    falsifier_conditions:
      - "If Χ is suspended to force PMS resolution, the PMS application is invalid or overextended."
    non_capture_note: "Distance protects against overclaiming and premature closure."
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on: ["Χ", "Φ"]
    provides: ["coherence", "resolution_of_contradiction", "multi_level_coordination", "maturity_of_praxis"]
    examples: ["aligning motives and roles", "integrating emotional impulse and norm", "forming a coherent action plan"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is conditional. Part and whole may be synthesized into coherent
      interpretation, but recurrence and PMS coherence do not guarantee
      integration, truth, or resolution.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether integration discriminates rather than smoothing conflict."
      - "Distinguish achieved integration from forced coherence."
      - "Keep open that non-closure may be constitutive rather than failed Σ."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, Σ is overclaimed."
    non_capture_note: "PMS coherence is insufficient by itself."
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on: ["Σ", "Θ", "Χ"]
    provides: ["self_model", "responsibility_as_self_commitment", "stable_normativity", "autobiographical_coherence"]
    examples: ["holding oneself accountable", "owning a caregiving role", "long-term identity commitments and promises"]
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and conditional. It applies mainly to analytic self-binding of
      the PMS application; the case does not establish selfhood, identity, or
      responsibility-as-self-commitment.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only where an interpreter, method, or analysis is self-bound over time."
      - "Do not attribute selfhood to the hermeneutic circle itself."
    falsifier_conditions:
      - "If Ψ is applied without actual self-binding and without adequate Σ, Θ, and Χ, it is under-specified."
    non_capture_note: "SELF_FIXPOINT is derived, not metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains: ["Δ", "∇", "□", "Λ", "Α"]
    base_description: >
      Base layer of distinctions, impulses, frames, non-events, and recurrent
      patterns.
    case_function: >
      L1 structures the part-whole distinction, directed interpretive tension,
      horizon, absent fully given whole, and recurrent circular movement.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains: ["Ω", "Θ"]
    base_description: >
      Stabilized patterns become asymmetrical relations and temporal
      trajectories.
    case_function: >
      Θ is central; Ω is weak and limited to structural dependence rather than
      interpersonal or institutional asymmetry.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains: ["Φ", "Χ", "Σ"]
    base_description: >
      Transformation, distancing, and integration enable reflexive praxis.
    case_function: >
      Φ and Χ carry major weight; Σ remains possible but not established.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains: ["Ψ"]
    base_description: >
      Integrated structures become bound into stable self-relation across time.
    case_function: >
      Ψ is secondary and analytic-only unless an interpreter, method, or practice
      is explicitly modeled as self-bound.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
  compositional_reading_used: ["Ψ", "Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Clear part-whole and vicious-productive distinctions."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Part-whole difference generates interpretive pressure."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Horizon, context, and fore-structure constrain relevance."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "The fully understood whole is expected but not initially given."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "The part-whole movement recurs as a circular or recursive pattern."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Only weak structural priority or dependence is supplied."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Interpretation unfolds through return and revision, but Ω remains weak."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Parts and wholes are re-read across revised horizons, with weak Ω."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Reflective suspension prevents premature verdict."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Integration is only conditional and not entailed."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Self-binding is weak and analytic-only because Σ is not established."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading under-specified or invalid."
    - "If the chain becomes smooth totalization without discrimination tests, mark coherence risk high."
    - "If an operator is not active, state so rather than forcing the full chain."

dependency_table_reference:
  source: "PMS.yaml:pms_model_reference.dependency_table"
  status: "reference_only_not_base_revision"
  purpose: >
    This block mirrors PMS.yaml dependency logic for case-level hygiene and is
    not a revision of PMS Base.
  table:
    - axiom: "Δ"
      order: 1
      depends_on: []
      provides: ["initial_condition_for_structured_differentiation"]
    - axiom: "∇"
      order: 2
      depends_on: ["Δ"]
      provides: ["directed_activation"]
    - axiom: "□"
      order: 3
      depends_on: ["Δ", "∇"]
      provides: ["context_and_role_space"]
    - axiom: "Λ"
      order: 4
      depends_on: ["□"]
      provides: ["meaningful_absence_and_expectation"]
    - axiom: "Α"
      order: 5
      depends_on: ["Δ", "∇", "□", "Λ"]
      provides: ["recurrent_patterns"]
    - axiom: "Ω"
      order: 6
      depends_on: ["Α"]
      provides: ["asymmetric_roles_and_responsibility_gradients"]
    - axiom: "Θ"
      order: 7
      depends_on: ["Ω", "Α"]
      provides: ["temporal_trajectories"]
    - axiom: "Φ"
      order: 8
      depends_on: ["Θ", "Ω", "□"]
      provides: ["reframing_and_adaptation"]
    - axiom: "Χ"
      order: 9
      depends_on: ["Φ", "Θ", "□"]
      provides: ["reflexive_distance"]
    - axiom: "Σ"
      order: 10
      depends_on: ["Χ", "Φ"]
      provides: ["integration_and_higher_order_coherence"]
    - axiom: "Ψ"
      order: 11
      depends_on: ["Σ", "Θ", "Χ"]
      provides: ["self_binding_and_structured_self_relation"]

derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >
    Derived structures must be marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable.
  rule: >
    Derived structures are formula-derived PMS constructs, not independent
    axioms, diagnoses, ontological rankings, metaphysical entities, or proof of
    PMS completeness.
  case_status: >
    Awareness_A and Coherence_C are active. Responsibility_R is weak. Action_E
    is under-specified. Dignity_in_Practice_D is an application constraint.
    SELF_FIXPOINT is analytic-only. AD_A>>E and AD_Sigma_low are possible risks
    but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula: ["Θ", "□", "Δ"]
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is structural, not phenomenological, and does not exhaust all
      notions of awareness.
    case_reading: >
      Awareness_A appears as sustained framed differentiation between part and
      whole across temporal interpretive revision.
    status: "active"
    calibration_points:
      - "Differentiate part, whole, initial frame, and revised frame across interpretive time."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula: ["Θ", "Λ", "□", "∇"]
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence does not require full integration or self-binding and may be
      formalized differently by rivals.
    case_reading: >
      Coherence_C appears as an attempt to stabilize interpretive directedness
      and expectation despite the absent fully given whole.
    status: "active"
    calibration_points:
      - "Distinguish coherence from truth, validity, forced integration, and narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula: ["Ψ", "Φ", "Θ", "Ω"]
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural, not moralistic, diagnostic, legal, or
      forensic.
    case_reading: >
      Responsibility_R is weak because no agent, role obligation, vulnerability
      relation, or self-binding commitment is supplied.
    status: "weak"
    calibration_points:
      - "Identify actual asymmetry, temporal commitment, recontextualizing obligation, and self-binding before claiming Responsibility_R."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula: ["Σ", "Θ", "∇"]
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures directedness as a trajectory."
      - "Σ integrates conflicting impulses, constraints, and roles into coherent enactment."
    notes: >
      Action is integrated and temporally extended, not any behavior or abstract
      thought.
    case_reading: >
      Action_E is under-specified because the material describes abstract
      understanding rather than concrete integrated enactment.
    status: "weak"
    calibration_points:
      - "Distinguish interpretive movement from concrete action or integrated enactment."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula: ["Ψ", "Χ", "Ω"]
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-Practice is about handling asymmetry, not ranking persons or
      assigning ontological worth.
    case_reading: >
      D constrains this application: weak asymmetry and interpretive disagreement
      must not be used to rank interpreters, traditions, or rival theories.
    status: "analytic_constraint"
    calibration_points:
      - "Check that asymmetry is handled without ranking, shaming, diagnosis, or irreversible labeling."
    non_capture_note: "D is a praxeological application constraint, not an ontological dignity claim."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence: ["Ψ", "Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as integrated, reflexively modulated,
    temporally extended, asymmetry-aware praxis bound into stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not the primary structure of the case. It functions only as
    analytic discipline for maintaining PMS self-binding, reversibility, and
    non-capture.
  implications:
    - "Within PMS, selfhood can be modeled as structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence does not prove that all selfhood, agency, identity, or case
    structure reduces to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to the hermeneutic circle as literal
    subjectivity.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS drift patterns are structurally derived risks, not diagnoses,
    person-types, moral verdicts, or clinical categories.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula: ["Φ", "Α", "Ω"]
      description: >
        Evaluative or power asymmetry stabilizes through attractor formation,
        while recontextualization reinforces evaluative drift rather than
        balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces evaluative framing rather than balance."
    case_reading: >
      AD_A>>E remains only a possible risk. Abstract hermeneutic recursion can
      expand reflection while delaying closure, but no concrete suppressed action
      or evaluative asymmetry is shown.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension: ["Φ", "Σ"]
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration can produce
        unstable trajectories and weak coherence of praxis.
    generative_mechanism:
      - "Φ: frames shift or update in ways that may destabilize continuity."
      - "Σ: integration may fail to consolidate perspectives into coherent enactment."
    case_reading: >
      AD_Sigma_low remains only a possible risk. The case does not establish
      fragmented integration, inconsistent responsibility, or a concrete praxis
      distortion.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, or person-type.

example_operator_chains_application:
  note: >
    These chains apply PMS.yaml example chains to the case. They do not settle
    the case by themselves.
  minimal_praxis:
    formula: ["□", "∇", "Δ"]
    description: "A frame constrains an impulse that arises from a difference."
    case_reading: >
      Minimal praxis appears as an interpretive frame constraining the pressure
      generated by the part-whole distinction.
    status: "active"
  pattern_formation:
    formula: ["Α", "Λ", "□", "∇", "Δ"]
    description: "Attractor formation via repeated framed impulses and non-events."
    case_reading: >
      Pattern formation appears as repeated movement between parts and whole
      under the absence of a fully given whole.
    status: "active"
  asymmetry_emergence:
    formula: ["Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Asymmetrical roles emerging from stabilized patterns."
    case_reading: >
      Asymmetry emergence is weak: only structural dependence or priority
      appears, not interpersonal or institutional asymmetry.
    status: "weak"
  developmental_trajectory:
    formula: ["Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory appears as sequential revision and return, while
      its Ω dependency remains weak.
    status: "weak"
  reflexive_praxis:
    formula: ["Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >
      Reflexive praxis is active with limits: Φ and Χ are central, while Σ is
