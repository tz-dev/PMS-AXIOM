  meta_notes:
    bias_risks:
      confirmation_bias: Risk of seeing MIP maturity categories as confirming the prior PMS/PMS-CRITIQUE structure.
      hindsight_bias: Risk of treating the completed Core and CRITIQUE analyses as if they already implied MIP conclusions.
      status_quo_loyalty_bias: Risk of assuming recognized authority is required because existing legitimacy frames often privilege institutional recognition.
      halo_horn_effects: Risk of idealizing legitimacy without authority as emancipatory or demonizing it as illegitimate without scene evidence.
      in_group_out_group_bias: Risk of aligning with claimant, granter, contester, or authority-skeptical frame by default.
      dignity_bias_effect: Risk of activating D prematurely because legitimacy conflict sounds morally charged; controlled by keeping D off.
    norm_assumptions:
      explicit_norms:
        - Profile is not person.
        - A-score and M-score are bands and not person scores.
        - M-score is shared structural responsibility and not guilt.
        - D0 is inviolable and not measurable.
        - D1/D2 are dignity-in-practice enactments only and are not activated without scene evidence.
        - PMS structural coherence is insufficient by itself.
        - PMS-CRITIQUE reduced signatures are overlay shorthand only.
      implicit_norms:
        - Legitimacy disputes require frame clarity before evaluation.
        - Authority absence is not automatically legitimacy absence.
        - Rival formalizations should remain open.
        - Concrete responsibility requires knowledge, power, predictability, alternatives, and integration attempts.
      dignity_concepts:
        - D0 ontological dignity remains untouched and outside metrics.
        - Dignity-in-practice is protected as guardrail, not used as score.
        - Public or person-level D readings are avoided.
      normative_position_of_D_reading: D is not activated as profile; D functions only as a protective constraint on the analysis.
    intuition:
      initial_intuition: The case feels structurally mature as a philosophical problem but too abstract for maturity scoring.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: The case has strong conceptual distinctions and prior PMS/CRITIQUE guardrails, but lacks scene data required by MIP scores and IA classification.
      contradicting_evidence: None contradicts the decision to keep scoring and D activation under-specified; the template pressure to fill bands is not enough evidence.
    possible_alternative_interpretations:
      - The case could be read normatively as a theory of legitimacy independent of authority.
      - The case could be read politically as a critique of institutional authority.
      - The case could be read legally as a question of validity or standing, but that would require legal facts.
      - The case could be read sociologically as recognition without formal authority, but that would require role and group data.
