derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >
    Each derived structure must be marked as active, weak,
    analytic_constraint, possible_but_not_entailed, under_specified, or
    not_applicable. Consideration does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not
    independent axioms, diagnoses, ontological rankings, metaphysical entities,
    or proof of PMS completeness.
  case_status: >
    Awareness_A is weak-to-active as a structural projection from Θ, □, and Δ,
    but not phenomenological awareness. Coherence_C is weak. Responsibility_R
    is not applicable. Action_E is under-specified. Dignity_in_Practice_D is an
    application constraint. SELF_FIXPOINT is not applicable. AD_A>>E and
    AD_Sigma_low are not applicable as case findings.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically.
    case_reading: >
      Meaning/sense appears as sustained, framed differentiation only in a
      structural sense: a distinction becomes relevant within situated praxis
      and must persist long enough to orient intelligibility.
    status: "weak"
    calibration_points:
      - "Specify what is being differentiated, in what praxis frame, and across what temporal structure."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence does not prove adequacy.
    case_reading: >
      Coherence_C is weak because meaning/sense may stabilize orientation and
      expectation within a frame, but no concrete impulse, non-event, delay, or
      expectation is supplied.
    status: "weak"
    calibration_points:
      - "Distinguish local structural coherence from truth, validity, exhaustive capture, forced integration, or narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic.
    case_reading: >
      Responsibility_R is not applicable as an object-level structure because
      the case provides no agent, obligation, asymmetry, recontextualized
      commitment, or self-binding.
    status: "not_applicable"
    calibration_points:
      - "Do not claim responsibility unless asymmetry, temporality, recontextualization, and self-binding are all specified."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory."
      - "Σ integrates conflicting impulses, constraints, and roles into coherent enactment."
    notes: >
      Action here is not any behavior; it is integrated and temporally
      extended.
    case_reading: >
      Action_E is under-specified. Meaning/sense may orient action, but the
      case supplies no enacted trajectory, integrated realization, conflict,
      role, or concrete praxis sequence.
    status: "under_specified"
    calibration_points:
      - "Distinguish possible action-orientation from actual action, behavior, thought, claim, or abstract structure."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-practice concerns how asymmetry is handled, not ontological
      ranking.
    case_reading: >
      Dignity-in-Practice constrains the analysis rather than describing an
      object-level scene. The PMS application must avoid ranking, humiliation,
      pathologizing disagreement, or converting conceptual fit into moral
      superiority.
    status: "application_constraint"
    calibration_points:
      - "Check whether possible asymmetry is handled without ranking, shaming, or irreversible labeling."
    non_capture_note: "D is a praxeological application constraint, not an ontological or moral superiority claim."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "not_applicable"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated,
    reflexively modulated, temporally extended, asymmetry-aware patterns of
    praxis bound into relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not the primary structure of this case. Meaning/sense as
    a conceptual domain does not by itself provide self-relation, commitment to
    integrated structures, autobiographical coherence, or
    responsibility-as-self-commitment.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence records one derivational strategy within PMS and must not be
    read as reducing all selfhood, agency, identity, or case structure to this
    exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to abstract concepts as literal
    subjectivity.

asymmetry_drift_patterns:
  status_in_this_case: "not_applicable"
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived
    distortion forms. They are not automatically entailed by a case and must
    not be treated as diagnoses, person-types, clinical categories, or moral
    verdicts.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "not_applicable"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation, while recontextualization reinforces drift toward
        evaluation rather than supporting integrative transformation and
        balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing."
    case_reading: >
      AD_A>>E is not applicable as a case finding because no concrete awareness
      over-expansion, evaluative asymmetry, stabilized attractor,
      recontextualization drift, or suppressed enactment is supplied.
    axis_effects:
      awareness_axis: "not_applicable"
      action_axis: "not_applicable"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "not_applicable"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >
      AD_Sigma_low is not applicable as a case finding because no concrete
      pattern of frequent recontextualization, failed consolidation, volatile
      coherence, or inconsistent responsibility is supplied.
    axis_effects:
      coherence_axis: "not_applicable"
      responsibility_axis: "not_applicable"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, person-type, or moral verdict.

example_operator_chains_application:
  note: >
