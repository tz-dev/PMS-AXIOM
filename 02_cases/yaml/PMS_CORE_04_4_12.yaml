  minimal_praxis:
    formula:
      - "□"
      - "∇"
      - "Δ"
    description: "A frame constrains an impulse that arises from a difference."
    case_reading: >
      Minimal praxis is available in a conservative sense: situated praxis
      constrains a possible orientation arising from differentiating
      meaning/sense as praxis-relevant.
    status: "active"
  pattern_formation:
    formula:
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Attractor formation via repeated framed impulses and non-events."
    case_reading: >
      Pattern formation is weak. Meaning/sense can stabilize into recurring
      interpretive habits or role-scripts, but recurrence and non-events are
