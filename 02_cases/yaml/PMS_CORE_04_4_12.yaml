analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "pms_internal_structural_derivation_of_selected_derived_axes_as_formula_references"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This case type permits a reversible PMS projection of meaning/sense as
      praxeologically framed structure. It does not permit empirical findings,
      concrete scene judgments, diagnosis, metaphysical conclusions, legal or
      forensic claims, implementation claims, person-ranking, or PMS Base
      validation.
  coherence_risk:
    status: "high"
    reason: >
      Meaning/sense is broad and can too easily be made to fit a PMS formula.
      A smooth operator mapping could under-discriminate between semantic,
      phenomenological, existential, symbolic, and praxeological senses of
      meaning.
    mitigation: >
      The reading is constrained by a conservative formula, weak or
      not-applicable status for unsupported operators, explicit non-capture
      zones, rival readings, falsifier conditions, and refusal to treat PMS
      coherence as sufficient.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural minimum of meaning/sense as differentiated,
      framed, and temporally maintained intelligibility within situated praxis.
    discrimination_requirement: >
      The PMS reading must distinguish praxeological sense from semantic
      reference, phenomenological lived meaning, metaphysical meaning,
      existential value, symbolic depth, and concrete action-guidance.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish praxeological meaning/sense from semantic meaning or reference."
      expected_pms_distinction: >
        Δ must separate praxis-relevant framed intelligibility from semantic
        content, while □ must restrict the frame to situated praxis rather than
        language theory as such.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish PMS structural capture from phenomenological or existential lived sense."
      expected_pms_distinction: >
        Χ and the non-capture rule must preserve the difference between
        structural operator projection and lived, metaphysical, or existential
        meaning that may exceed PMS.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinction makes meaning/sense praxeologically analyzable rather than unrestrictedly semantic, phenomenological, metaphysical, or existential?"
      current_calibration: "satisfied"
      calibration_note: >
        Δ carries major weight because the case must first distinguish
        meaning/sense as praxis-relevant intelligibility from meaning/sense as
        semantic reference, lived experience, existential value, symbolic
        depth, or metaphysical ground.
    - operator: "∇"
      question: "What orientation or directedness arises from meaning/sense in praxis without inferring subjective desire?"
      current_calibration: "partial"
      calibration_note: >
        ∇ may be used only as structural directedness or orientation within
        praxis. It must not be inflated into desire, motivation, affect,
        consciousness, need, intention, or psychological drive.
    - operator: "□"
      question: "What frame constrains relevance and prevents overgeneralization?"
      current_calibration: "satisfied"
      calibration_note: >
        □ carries major weight because situated praxis is the condition that
        makes the case PMS-analyzable. Without a constraining frame, the case
        becomes too broad and the PMS reading risks becoming merely verbal.
    - operator: "Λ"
      question: "What expected occurrence or absence would make non-event structurally active?"
      current_calibration: "weak"
      calibration_note: >
        Λ must remain weak because the case gives no expected occurrence,
        delayed response, omission, silence, or failed event. Absence,
        ambiguity, or non-fit may indicate non-capture rather than a PMS-coded
        non-event.
    - operator: "Α"
      question: "What recurrence or stabilization would show an attractor rather than an abstract concept?"
      current_calibration: "weak"
      calibration_note: >
        Α requires repeated structural interaction or stabilization. A broad
        concept such as meaning/sense does not by itself establish an attractor
        unless a recurrent praxis-pattern is specified.
    - operator: "Ω"
      question: "What directional imbalance of power, exposure, capacity, role, or obligation is actually present?"
      current_calibration: "weak"
      calibration_note: >
        Ω must not be inferred merely because praxis is situated. A concrete
        asymmetry of power, exposure, capacity, authority, interpretive
        position, or obligation would have to be shown before responsibility
        gradients or drift risks become object-level claims.
    - operator: "Θ"
      question: "What temporal maintenance, sequence, expectation, or trajectory makes sense more than a static distinction?"
      current_calibration: "partial"
      calibration_note: >
        Θ is the most delicate active operator. It is warranted only as
        temporal maintainability of framed sense, not as empirical history,
        existential temporality, development, responsibility, or long-term
        trajectory. Because Α and Ω are weak, Θ must remain bounded to the
        minimal temporal condition that sense persists or becomes intelligible
        across more than an instantaneous distinction.
    - operator: "Φ"
      question: "What source frame and target frame define an actual recontextualization?"
      current_calibration: "weak"
      calibration_note: >
        Φ is relevant as a possibility because meaning often shifts under
        reframing, but the case supplies no concrete source frame, target
        frame, or transformation. Rival readings must not be absorbed
        automatically as PMS recontextualizations.
    - operator: "Χ"
      question: "How does the analysis maintain distance, reversibility, and non-capture?"
      current_calibration: "satisfied"
      calibration_note: >
        Χ is satisfied primarily at the level of application discipline. It
        prevents the analysis from treating PMS coherence as capture,
        metaphysical truth, empirical finding, diagnostic insight, legal
        judgment, implementation result, or validation of PMS Base.
    - operator: "Σ"
      question: "What concrete conflict or plurality is synthesized without forced coherence?"
      current_calibration: "weak"
      calibration_note: >
        Σ must remain weak because no concrete plurality, contradiction, or
        integration process is supplied. A coherent PMS rendering is not yet
        integration; it may instead signal that the case is too broad or the
        formalization too smooth.
    - operator: "Ψ"
      question: "What self-binding, commitment, or stable self-relation is actually in scope?"
      current_calibration: "weak"
      calibration_note: >
        Ψ is not object-level active because meaning/sense is not itself a
        self-binding agent, promise, identity, commitment, or responsibility
        structure. Ψ applies only as analytic self-binding of the PMS
        application unless a concrete praxis scene supplies commitment across
        time.
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Phenomenological lived sense or felt meaningfulness."
      - "Semantic theories of reference, truth-conditions, use, inferential role, or linguistic meaning."
      - "Metaphysical, theological, existential, symbolic, poetic, or cultural meanings not reducible to situated praxis."
      - "Rival formalizations that explain meaning/sense with sharper discrimination or different primitives."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or
      failed maturity.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Phenomenological reading of meaning as lived sense prior to structural praxis-analysis."
      - "Hermeneutic reading of meaning as interpretive horizon, tradition, or historical understanding."
      - "Semantic or pragmatist reading of meaning as reference, use, inference, consequence, or language-game."
      - "Anti-capture reading according to which meaning/sense partly exceeds PMS operator representation."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or under-specified if meaning/sense
        in the target case cannot be tied to any situated praxis, frame,
        distinction, orientation, or temporal maintenance.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if the same formula cannot
        distinguish praxeological sense from semantic reference,
        phenomenological lived meaning, existential value, or symbolic order.
    - id: "F3"
      condition: >
        The reading would over-assimilate if resistance, disagreement,
        non-fit, absence, or rival theories were automatically redescribed as
        drift, incomplete integration, recontextualization, or maturity
        failure.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The analysis is usable as a bounded conceptual PMS projection with high
      coherence risk. It is not a concrete scene analysis and cannot support
      empirical, metaphysical, diagnostic, legal, forensic, implementation, or
      PMS Base validation claims.

operationalization_requirements:
  status: "not_fulfilled_in_this_conceptual_projection"
  purpose: >
    These requirements identify what would be needed to turn the PMS projection
    into a calibrated empirical, comparative, computational, legal, clinical,
    or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Observable or explicitly coded distinctions between praxis-relevant sense and non-praxeological meanings."
      "∇": "Evidence that a distinction generates orientation, pressure, attention, interpretation, or action-direction without inferring unobserved desire."
      "□": "A specified scene frame, role-space, institutional context, conversation context, or relevance boundary."
      "Λ": "An expected occurrence and documented absence, delay, silence, omission, or non-event within the frame."
      "Α": "Repeated interactions, stabilized patterns, routines, path-dependence, or role-scripts."
      "Ω": "A specified directional imbalance of power, exposure, vulnerability, capacity, obligation, or interpretive authority."
      "Θ": "Temporal sequence, persistence, anticipation, delay, development, or trajectory in the case material."
      "Φ": "Identifiable source and target frames plus evidence of transformation through reframing."
      "Χ": "Observable or procedural reflective distance, suspension of verdict, reversibility, or restraint."
      "Σ": "Evidence of synthesis or coordination of disparate elements without smoothing over conflict."
      "Ψ": "Self-binding, commitment across time, stable normativity, or explicit analytic self-binding in scope."
    negative_cases:
      - "A purely semantic case of word reference with no situated praxis frame."
      - "A purely phenomenological report of lived meaningfulness with no praxeological structure supplied."
      - "A concrete praxis scene in which framed distinctions do not persist or orient action."
      - "A rival formalization that distinguishes types of meaning more sharply than the PMS projection."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The supplied case material is
    conceptual and contains no observable indicators, concrete scene, empirical
    corpus, comparative test, computational architecture, legal context,
    clinical context, or applied validation setting.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      The case does not infer mental states, motives, subjective experience,
      cognition, desire, pathology, or personality from meaning/sense.
    non_metaphysical: >
      The case does not claim what meaning ultimately is; it only projects how
      meaning/sense may be structurally analyzable within situated praxis.
    non_diagnostic: >
      No person, group, culture, or theory is diagnosed, ranked by maturity, or
      classified clinically.
    non_legal_forensic: >
      The analysis provides no evidence standard, culpability finding,
      liability criterion, intent assessment, or forensic reconstruction.
    non_implementation_claim: >
      The YAML analysis is not a software implementation, AI architecture,
      simulation, agent design, deployment, or validation artifact.
    non_moral_ranking: >
      The analysis does not rank persons, positions, or rival theories as
      morally higher or lower because of PMS fit.
    non_exhaustive_capture: >
      PMS translation is not exhaustive capture of meaning/sense; non-capture
      zones and rival formalizations remain open.
    reversibility: >
      Reversibility is preserved by marking the case as a conceptual
      projection, keeping unsupported operators weak or not applicable, and
      listing falsifier conditions.
    dignity_in_practice: >
      Dignity-in-Practice is preserved as analytic restraint: no shaming,
      humiliation, ranking, irreversible labeling, or ontological evaluation
      follows from the PMS reading.

limits:
  - >
    The PMS reading is limited by the absence of a concrete praxis scene; it
    can only state a conservative conceptual structure.
  - >
    The analysis makes no empirical, metaphysical, diagnostic, clinical, legal,
    forensic, implementation, or PMS Base validation claim.
  - >
    Rival readings and possible non-capture remain open, especially
    phenomenological, hermeneutic, semantic, pragmatist, existential, symbolic,
    and anti-capture approaches to meaning/sense.
  - >
    Because meaning/sense is broad, PMS coherence may become too smooth;
    discriminative force must be tested before stronger claims are made.

case_synthesis:
  primary_pms_reading: >
    Meaning/sense, restricted to situated praxis, can be minimally projected as
    a temporally maintained framed distinction that may orient praxis but is
    not exhausted by PMS.
  continuity_condition: >
    Continuity is relevant only as the persistence of framed distinction or
    relevance across a temporal trajectory; no concrete continuity is
    evidenced.
  change_condition: >
    Change or recontextualization is conditionally relevant if meaning/sense is
    explicitly shifted from one frame to another, but no such shift is supplied
    as case material.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, rival framing, or non-fit must
    remain possible non-capture unless a specific PMS operator condition is
    independently satisfied.
  responsibility_condition: >
    Responsibility is not applicable unless a concrete scene supplies
    asymmetry, temporal obligation, recontextualization, and self-binding.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by preventing overreach,
    person-ranking, shaming, ontological claims, or forced capture under
    conceptual asymmetry.
  rival_reading_condition: >
    Rival formalizations remain open and may distinguish meaning/sense more
    sharply; PMS translation alone does not defeat them.

final_structural_formula:
  primary_formula: "Θ ∘ □ ∘ Δ"
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    Meaning/sense within situated praxis is minimally modeled as temporally
    maintainable framed differentiation. Δ marks that meaning requires a
    distinction; □ marks that the distinction becomes relevant only within a
    frame; Θ marks that sense must be maintainable across at least minimal
    temporal continuity rather than appearing as an isolated distinction. ∇
    becomes relevant only if the framed distinction orients interpretation,
    expectation, or enactment. Φ becomes relevant only if a structure is moved
    between frames. Λ, Α, Ω, Χ, Σ, and Ψ are not object-level components of the
    case unless a concrete scene supplies expectation-failure, recurrence,
    asymmetry, reflective distance, integration, or self-binding.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity,
    implementation validity, moral ranking, or PMS Base validation. Its value
    is discriminative only if it keeps the praxeological reading separate from
    semantic, phenomenological, existential, symbolic, and metaphysical
    accounts of meaning/sense, all of which remain possible rival or
    non-captured readings.