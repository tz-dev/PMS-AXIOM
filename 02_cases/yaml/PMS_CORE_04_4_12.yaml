      asymmetrically, but the case material does not identify such a relation.
    status: "weak"
  developmental_trajectory:
    formula:
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory is weak. Meaning/sense may persist or transform
