schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >
  Template-conformant PMS_1.3 case application for the case Meaning / Sense.
  This document applies PMS.yaml as PMS Base and does not revise, extend,
  validate, or replace PMS Base.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    This case analysis applies PMS_1.3 as the current repository reference.
    It does not redefine PMS operators, alter the repository order, introduce
    meta-axioms, treat derived structures as primitives, override PMS
    application guardrails, or claim PMS Base validation.
  referenced_base_sections:
    - "pms_entry_condition"
    - "schema_version"
    - "schema_meta"
    - "repository_governance"
    - "core_principles"
    - "pms_model_reference"
    - "derived_structures"
    - "example_operator_chains"
    - "computational_representation"
    - "ai_interface_pms"
  application_schema_note: >
    The template is used only as an application schema. PMS.yaml remains the
    only PMS Base reference for this case.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as a formally disciplined repository reference, not as
    final, complete, uniquely ordered, immune to revision, or superior to all
    rival formalizations.
  description_alignment: >
    The case is analyzed through PMS as a structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive operator
    grammar of praxis.
  intended_use_alignment:
    allowed_profiles:
      - "theoretical_reflection"
      - "structural_action_theory"
      - "anthropology_and_praxeology"
      - "systems_theory"
      - "ai_architecture_and_safety"
      - "model_documentation_and_specification"
      - "simulation_scaffolding"
      - "structural_reasoning"
    not_intended_for:
      - "clinical_diagnosis"
      - "personality_typing"
      - "mental_health_risk_assessment"
      - "automated_moral_judgement"
      - "individual_person_evaluation"
      - "forensic_decision_making"
      - "policy_enforcement"
      - "irreversible_labeling"
  normative_position_alignment:
    ontology: >
      The case analysis makes no PMS-based claim about consciousness, qualia,
      inner experience, metaphysical essence, moral worth, or ontological
      dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological constraint on handling
      asymmetry, not as a metaphysical or moral ranking of beings.
    tragedy_clause: >
      Structural coherence, integration, or responsibility would not eliminate
      tragedy, rupture, unresolved tension, or non-capture.
    self_binding_clause: >
      The PMS application remains subject to Distance (Χ), Self-Binding
      discipline (Ψ), and Dignity-in-Practice (D), and must not force clarity,
      authority, truth, or action.
  computational_position_alignment:
    representation_clause: >
      YAML representation is a formal encoding of a PMS reading, not a direct
      implementation of praxis, agency, subjectivity, consciousness, empirical
      validity, or software behavior.
    calibration_clause: >
      Operational use would require architecture-specific calibration,
      implementation constraints, external evaluation, context-sensitive
      interpretation, and public accountability where relevant.
    accountability_clause: >
      Formal translation into PMS terms does not itself guarantee public
      intelligibility, empirical adequacy, intersubjective uptake, external
      accountability, or explanatory sufficiency.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars or
      formalisms.
  terminology_alignment:
    praxis: >
      Situated meaningful action under constraints, expectations, temporality,
      and possible asymmetry, modeled structurally through PMS operator
      compositions.
    meta_axiom: >
      One of the eleven PMS operators Δ–Ψ, treated as structurally basic within
      PMS_1.3 and not replaced by case-specific concepts.
    operator_composition: >
      Ordered or structured application of PMS meta-axioms to generate complex
      praxeological formations.
    derived_construct: >
      A higher-order construct systematically derived within PMS from operator
      compositions, not introduced as an independent primitive.
    asymmetry_drift_pattern: >
      A structurally derived distortion pattern within PMS; not a diagnosis,
      person-type, clinical category, ontological attribution, or moral verdict.
    repository_reference: >
      PMS.yaml remains the base reference. This case template is subordinate to
      that reference.
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT"
      role: "case_application_assistant"

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the current repository reference specification for PMS Base.
    This case analysis depends on PMS.yaml but does not revise it.
  this_template_may:
    - "depend_on_pms"
    - "reference_pms_operators"
    - "define_case_application_structure"
    - "organize_pms_operators_for_case_analysis"
    - "specify_case_quality_control"
    - "support_structural_reasoning"
  this_template_must_not:
    - "silently_redefine_meta_axioms"
    - "silently_alter_default_operator_order"
    - "silently_alter_default_dependency_path"
    - "present_new_meta_axioms_as_if_already_in_base_pms"
    - "treat_derived_axes_as_independent_primitives"
    - "override_application_guardrails_while_claiming_full_pms_conformity"
    - "claim_pms_base_validation_from_a_case"
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >
    Any use of PMS as an application presupposes acceptance of distance (Χ),
    reversibility, and dignity-in-practice (D; a praxeological constraint, not
    ontological worth). This condition applies to application, not to critique,
    refusal, revision, or rejection.
  applies_to: "application_only"
  does_not_apply_to:
    - "critique"
    - "refusal"
    - "rejection"
    - "revision_proposals"
    - "rival_formalization"
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >
          Reflective distance is maintained. The analysis does not fuse PMS
          into verdict, urgency, enforcement, closure, or person-level
          attribution.
      reversibility:
        status: "maintained"
        meaning: >
          Structural readings remain revisable, bounded, non-final, and
          non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >
          The analysis maintains enacted restraint under asymmetry and does
          not shame, rank, humiliate, or ontologically evaluate persons or
          groups.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      Any application of PMS is itself subject to PMS. Analyses that suspend
      Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in
      order to enforce truth, clarity, authority, resolution, or action are
      formally invalid as PMS applications.
    application_to_this_case: >
      The analysis remains self-bound by treating the reading as a reversible
      conceptual projection of meaning/sense within situated praxis. It does
      not convert PMS coherence into capture, verdict, metaphysical truth,
      empirical finding, implementation claim, diagnostic judgment, legal
      criterion, or person-ranking.
  application_only_boundary:
    status: "active"
    statement: >
      PMS can be criticized, revised, rejected, ignored, or compared with rival
      formalizations without satisfying the PMS entry condition. The entry
      condition governs only applications that claim to use PMS.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture.
      Resistance, rupture, disagreement, non-fit, rival framing, or missing
      evidence must not automatically be redescribed as drift, failed
      integration, incomplete calibration, or structured absence.
  no_pms_base_revision:
    status: "active"
    statement: >
      This case does not alter PMS Base, PMS operators, PMS dependencies,
      derived structures, guardrails, or repository governance.

case:
  title: "Meaning / Sense"
  interpretation_type: "conceptual_domain_projection"
  case_type: "philosophical structural concept case"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    The case analyzes meaning or sense only as a structural praxeological
    formation: a differentiated, framed, temporally maintainable
    intelligibility that becomes analyzable when it is situated within praxis.
    The analysis is therefore limited to the structural conditions under which
    something counts as sense-bearing for orientation, relevance, expectation,
    or enactability within a frame. It does not analyze meaning as such in an
    unrestricted philosophical, semantic, phenomenological, theological, or
    existential sense.
  non_scope: >
    The case does not claim metaphysical truth about meaning, phenomenological
    access to lived sense, semantic theory of reference, diagnostic judgment,
    legal or forensic criterion, empirical validation, clinical assessment,
    implementation validity, person-ranking, moral superiority, or PMS Base
    validation. It also does not claim that all meaning is reducible to
    praxis, that PMS exhausts meaning/sense, or that rival accounts of meaning
    are merely incomplete PMS renderings.
  non_goals:
    - "do_not_analyze_a_person"
    - "do_not_make_a_clinical_or_diagnostic_claim"
    - "do_not_make_a_legal_or_forensic_claim"
    - "do_not_claim_empirical_validation"
    - "do_not_claim_metaphysical_capture"
    - "do_not_claim_pms_base_validation"
  case_typing_note: >
    This is not a concrete praxis scene. It is a conceptual domain projection
    asking how meaning or sense becomes structurally analyzable in PMS terms
    when restricted to situated praxis. Because no concrete scene is supplied,
    operator activation remains bounded, reversible, and
    calibration-dependent. The case therefore permits a structural grammar of
    possible analyzability, not a finding about an actual situation, actor,
    institution, utterance, conflict, legal event, empirical pattern, or
    implementation target.

