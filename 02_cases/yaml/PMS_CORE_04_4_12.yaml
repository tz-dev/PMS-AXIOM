core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as praxis-structure only where meaning or sense
      becomes analyzable as framed, differentiated, temporally maintained
      intelligibility. No person essence, psychology, consciousness, or
      ontology is inferred.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed
      minimal generative basis for praxis. Whether they are complete, optimally
      minimal, or uniquely ordered remains open.
    status: "satisfied"
    case_application: >
      Only the eleven PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are
      used as PMS operators.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS derives awareness, coherence, responsibility, action,
      dignity-in-practice, and asymmetry drift patterns from operator
      compositions rather than introducing them as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are treated
      only as formula-derived structures.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are central structural operators.
    status: "partial"
    case_application: >
      Θ is relevant because meaning/sense in praxis requires temporal
      maintenance, expectation, or trajectory. Ω is weak because the case
      material does not identify power, exposure, capacity, obligation, or
      role asymmetry.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or
      temporality or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by
      itself imply implementation, interoperability, or explanatory adequacy.
    status: "satisfied"
    case_application: >
      This YAML representation is a formal case encoding only. It is not an
      implementation, simulation, architecture, empirical validation, or proof
      of explanatory adequacy.
    failure_condition: >
      The analysis would fail P5 if YAML form were treated as implemented
      praxis, empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not exempt from rivalry. Comparison with alternative grammars or
      sharper models remains open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including phenomenological, hermeneutic,
      semantic, pragmatist, systems-theoretic, existential, social-theoretical,
      and anti-capture readings.
    failure_condition: >
      The analysis would fail P6 if PMS translation were treated as defeating
      rival formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture.
    status: "satisfied"
    case_application: >
      The analysis preserves possible non-capture of lived sense, metaphysical
      meaning, semantic reference, existential value, symbolic depth, and rival
      formalizations.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual
      clinical, therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No diagnosis, clinical category, maturity ranking, psychological state,
      personality type, pathology, or individual assessment is inferred.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must keep findings tied to specific praxeological
      scenes, roles, and structures.
    status: "partial"
    case_application: >
      Because no concrete scene is supplied, the analysis is explicitly marked
      as a non-concrete, case-type-bound conceptual projection. Scene-level
      findings would require a specified praxis context.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible,
      decontextualized claims.

