    status: "weak"
  asymmetry_emergence:
    formula:
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Asymmetrical roles emerging from stabilized patterns."
    case_reading: >
      Asymmetry emergence is weak. A situated praxis scene could distribute
