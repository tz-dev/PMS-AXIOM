operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Meaning/sense becomes structurally analyzable by drawing distinctions
      such as meaningful versus meaningless, relevant versus irrelevant,
      sense-bearing versus non-sense-bearing, framed versus unframed, and
      praxis-relevant versus merely abstract.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify the distinction between meaning/sense as praxeologically analyzable and meaning/sense as metaphysical, phenomenological, semantic, or existential object outside present PMS scope."
      - "Do not conflate semantic reference, lived sense, existential value, and praxeological intelligibility merely because all may be called meaning."
    falsifier_conditions:
      - "If no stable distinction can be maintained between praxeologically analyzable sense and broader meanings, the PMS reading loses its entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures meaning/sense.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is weak-to-active as structural orientation: meaning/sense may direct
      attention, expectation, interpretation, or enactment within praxis. No
      concrete pressure, desire, affect, or practical urgency is supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Treat the tension as structural and praxeological, not as subjective desire."
      - "Do not infer affective drive, personal motivation, or psychological need from the mere concept of meaning/sense."
    falsifier_conditions:
      - "If meaning/sense in the target use does not orient interpretation, expectation, or enactment, ∇ should be removed or marked not active."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is major because the case material restricts the analysis to meaning or
      sense insofar as it becomes analyzable within situated praxis. The frame
      constrains relevance and prevents unrestricted metaphysical or semantic
      expansion.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is situated praxis."
      - "Frame shifts to phenomenology, metaphysics, semantics, theology, or existential interpretation must be explicitly marked rather than silently absorbed."
    falsifier_conditions:
      - "If no frame can be specified beyond the word meaning itself, the analysis becomes too abstract to discriminate."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is weak. Meaning can be structured through absence, silence, omission,
      missing evidence, unrealized expectation, or non-event, but the supplied
      case material does not identify any expected occurrence whose failure or
      delay matters within a frame.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Λ would require an identifiable expectation within a praxis frame."
      - "Unspecified absence, resistance, ambiguity, or non-fit may indicate PMS non-capture rather than a PMS-coded non-event."
    falsifier_conditions:
      - "If no structured expectation exists in a concrete scene, Λ must not be asserted as active."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak. Meaning/sense can stabilize into interpretive routines,
      role-scripts, habits of relevance, or repeated patterns of praxis, but
      the case material supplies no recurrence or repeated structural
      interaction.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Α requires recurrence or stabilization of a meaning-pattern within repeated praxis."
      - "A broad philosophical topic is not by itself an attractor."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown, Α remains weak and any attractor reading is over-read."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak and not automatic. Situated praxis can involve asymmetry of
      power, exposure, capacity, obligation, authority, or role-position, but
      the case material gives no concrete asymmetrical relation.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Specify the direction and kind of imbalance before activating Ω strongly."
      - "Do not moralize asymmetry by default."
      - "Do not infer responsibility gradients from the mere fact that meaning is situated."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or kept explicitly weak."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is analytically important because meaning/sense in praxis requires
      temporal maintenance: relevance must persist, expectations may unfold,
      and sense may guide trajectories rather than appear as a static
      distinction. No concrete sequence or duration is supplied.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish temporal maintenance of framed sense from a static comparison of concepts."
      - "Treat Θ here as structural persistence of framed distinction, not as empirical history or existential temporality."
    falsifier_conditions:
      - "If the target meaning/sense is entirely atemporal or only a static semantic relation, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not settle metaphysical or empirical continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is weak-to-moderate. Meaning/sense often changes when a structure is
      placed into a new frame, but the supplied case does not specify a source
      frame, target frame, or actual transformation.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "A valid Φ reading must name both source and target frames."
      - "Recontextualization must not absorb every rival reading, rupture, disagreement, or non-fit into PMS."
    falsifier_conditions:
      - "If every resistance or rival theory is redescribed as Φ, the reading becomes over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as application discipline and analytic restraint. The
      analysis must suspend verdict, avoid totalization, preserve
      reversibility, and keep distance between PMS translation and possession
      of meaning/sense. Case-internally, no specific reflective actor is
      supplied.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Maintain suspension of metaphysical, empirical, diagnostic, legal, implementation, and validation claims."
      - "Distance is not avoidance; it is disciplined refusal to convert coherent PMS rendering into final capture."
    falsifier_conditions:
      - "If Χ is suspended to force a definitive theory of meaning or declare rival readings immature, the PMS application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak. PMS can integrate distinction, frame, temporal maintenance,
      and possible orientation into a coherent formula, but the case supplies
      no concrete conflict, synthesis, or integration process. PMS coherence
      is not sufficient by itself.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Test whether integration discriminates among semantic, phenomenological, existential, and praxeological uses of meaning."
      - "Distinguish structural integration from forced coherence or explanatory neatness."
    falsifier_conditions:
      - "If coherence is treated as proof that PMS adequately captures meaning/sense, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is not active as an object-level operator. The case does not specify
      self-relation, commitment, identity, responsibility-as-self-commitment,
      or stable normativity. Ψ is present only as part of the application
      discipline that keeps the analysis self-bound.
    dependency_status: "not_active"
    analytic_weight: "not_active"
    calibration_points:
      - "Apply Ψ only if a concrete case shows self-binding, commitment across time, or analytic self-binding explicitly in scope."
      - "Do not attribute selfhood, identity, maturity, or responsibility to the abstract concept of meaning/sense."
    falsifier_conditions:
      - "If Ψ is applied to meaning/sense without Σ, Θ, Χ, and a concrete self-binding structure, the reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is derived, not a metaphysical proof of subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the case through Δ and □ most strongly, ∇ weakly, and Λ
      and Α only conditionally because no concrete expectation or recurrence
      is supplied.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is partially available. Θ is important as temporal maintenance of
      framed sense. Ω remains weak because no concrete asymmetry is identified.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 functions mostly as analytic discipline: Φ is conditional, Χ is
      active as application restraint, and Σ is weak because integration is not
      shown beyond a cautious conceptual formula.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      Ψ is not object-level primary. It is not applicable to meaning/sense as
      such except as analytic self-binding of this PMS application.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Θ"
    - "□"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The case distinguishes praxeologically analyzable meaning/sense from broader meanings."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Weakly satisfied by possible orientation of interpretation or enactment."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Satisfied by the case boundary within situated praxis."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Weak because meaningful absence is possible but no expected occurrence is supplied."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Weak because recurring sense-patterns are possible but no recurrence is evidenced."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Weak because situated praxis may contain asymmetry but no directional imbalance is given."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Weakly satisfied as temporal maintenance of framed distinction; full dependency through Α and Ω is under-specified."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Weak because conceptual recontextualization is possible but no explicit frame shift is supplied."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied as application discipline; object-level Χ remains under-specified."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Weak because no concrete synthesis of tensions is shown."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Not active because no self-binding structure, commitment, or stable self-relation is provided."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

dependency_table_reference:
