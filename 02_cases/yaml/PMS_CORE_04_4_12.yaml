      consequence is given.
    status: "weak"
  reflexive_praxis:
    formula:
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >
      Reflexive praxis is weak and mostly analytic. The application uses Χ to
      keep distance and may use Φ and Σ cautiously, but no concrete reflexive
