    primary: conceptual_projection
    secondary:
    - case_type_bound_structural_mapping
    - operator_calibration_exercise
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The case type permits reversible PMS operator mapping, calibration, rivalry preservation, and discrimination tests. It does not permit empirical, metaphysical, diagnostic, legal-forensic, clinical, implementation, or PMS Base validation claims.
  coherence_risk:
    status: high
    reason: Causality is broad enough that many causal theories can be translated into PMS terms. The reading may become too smooth if Δ, □, Λ, Α, Θ, Φ, and Σ fit every theory without discriminating among correlation, regularity, necessity, agency, explanation, and event-structure. The danger is not that PMS fails to generate a coherent reading, but that the generated coherence could become under-discriminating, especially where different causal theories use similar structural vocabulary for very different commitments.
    mitigation: The analysis preserves rival readings, states possible non-capture zones, marks Ω and Ψ as conditional or not applicable, requires discrimination tests, and includes falsifier conditions. The analysis also treats Σ as limited and calibration-dependent, uses Χ to suspend closure, and refuses to treat PMS coherence as sufficient evidence for metaphysical, empirical, legal-forensic, implementation, or PMS Base validation.
  coverage_vs_discrimination:
    coverage_result: PMS covers distinctions, framing, counterfactual absence, recurrence, temporality, recontextualization, reflective distance, and partial integration of causal problem-types. This gives the case a strong PMS-readable structure, especially for sorting contrasts among relation, sequence, dependence, explanation, correlation, regularity, agency, and event-structure.
    discrimination_requirement: The PMS reading must distinguish causal dependence from correlation, temporal priority from causal explanation, regularity from necessity, agency from impersonal event-structure, and integration from forced coherence. It must also show where PMS mapping remains only formal, where additional empirical or metaphysical commitments would be required, and where rival causal theories may remain better specified than the PMS projection.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish correlation or repeated conjunction from causal dependence.
    expected_pms_distinction: Α can mark recurrence or stable patterning, but causal dependence requires additional frame, counterfactual, temporal, or explanatory calibration through □, Λ, Θ, and Χ.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish temporal sequence from causality.
    expected_pms_distinction: Θ marks sequence and trajectory, but Δ and □ must specify the causal contrast, while Λ may test counterfactual dependence and Χ prevents temporal priority from being treated as sufficient.
    current_status: partially_satisfied
  - id: DT3
    test: Distinguish agency-causation from impersonal event-structure.
    expected_pms_distinction: Ω, ∇, Action_E, Responsibility_R, and Ψ remain weak or not applicable unless agency, capacity, obligation, or self-binding are explicitly introduced.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: Difference is calibrated by explicit contrasts among cause/effect, correlation/causation, sequence/dependence, regularity/necessity, agency/event-structure, and explanation/event-order.
    current_calibration: satisfied
  - operator: ∇
    question: Impulse is calibrated only as explanatory directedness or agency-causal production, not as psychological drive.
    current_calibration: weak
  - operator: □
    question: Frame is calibrated by specifying which causal theory or explanatory context is active.
    current_calibration: satisfied
  - operator: Λ
    question: Non-Event is calibrated by counterfactual dependence, prevention, omission, expected effects, and structured absence within a frame.
    current_calibration: partial
  - operator: Α
    question: Attractor is calibrated by recurrence, regularity, stable conjunction, and pattern expectation without treating repetition as proof.
    current_calibration: partial
  - operator: Ω
    question: Asymmetry is calibrated only by power, exposure, capacity, obligation, vulnerability, or agency, not by cause-effect direction alone.
    current_calibration: weak
  - operator: Θ
    question: Temporality is calibrated by sequence, trajectory, persistence, delay, and event ordering while refusing 'before equals because'.
    current_calibration: satisfied
  - operator: Φ
    question: Recontextualization is calibrated by explicit source and target causal frames and by preservation of rival readings.
    current_calibration: partial
  - operator: Χ
    question: Distance is calibrated by suspension of verdict, reversibility, non-totalization, and refusal to claim PMS validation.
    current_calibration: satisfied
  - operator: Σ
    question: Integration is calibrated by discrimination among causal theories rather than smooth assimilation.
    current_calibration: partial
  - operator: Ψ
    question: Self-Binding is calibrated only by agency-responsibility or application self-binding, not by generic causality.
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - metaphysical_necessity
    - causal_powers
    - physical_causation
    - probabilistic_causal_inference
    - formal_causal_logic
    - counterfactual_semantics
    - interventionist_causation
    - event_ontology
    - legal_causation
    - moral_responsibility
    - agency_causation
    - scientific_explanation
    rule: 'These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration, structured absence, or failed maturity. They may mark genuine limits of the PMS reading.'
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - regularity_theory
    - counterfactual_dependence_theory
    - interventionist_formalization
    - probabilistic_causation
    - causal_power_or_dispositional_account
    - agency_causal_account
    - event_ontological_account
    - explanatory_pragmatic_account
    rule: 'Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria are explicitly specified and applied.'
  falsifier_conditions:
  - id: F1
    condition: The PMS reading would be weakened or under-specified if no stable distinction can be maintained between correlation, sequence, dependence, regularity, necessity, agency, and explanation.
  - id: F2
    condition: The PMS reading would be under-discriminating if the same formula fit all rival causal theories equally well without explaining their differences.
  - id: F3
    condition: The PMS reading would be over-assimilative if resistance, rival framing, metaphysical residue, empirical requirements, or non-fit were automatically redescribed as PMS drift, incomplete integration, or calibration failure.
  - id: F4
    condition: The PMS reading would be overextended if it claimed empirical, metaphysical, legal-forensic, clinical, implementation, or PMS Base validation without additional grounds.
  final_quality_status:
    result: usable_with_limits
    reason: The analysis is usable as a reversible conceptual PMS projection, with high coherence risk and partial discrimination. It remains non-empirical, non-metaphysical, non-diagnostic, non-legal-forensic, non-implementation, non-tribunal, and non-validating.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: 'These requirements identify what would be needed to turn the PMS projection into a calibrated empirical, comparative, computational, legal, clinical, or applied analysis.'
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: Operational use would require explicit coding rules for distinguishing cause, effect, sequence, dependence, correlation, regularity, necessity, agency, and explanation.
      ∇: Operational use would require evidence of directed explanatory pressure, intervention, production, or agency rather than mere co-occurrence.
      □: Operational use would require a declared causal frame and rules for detecting frame shifts.
      Λ: Operational use would require specified expected events, counterfactual contrasts, omissions, preventions, or structured absences.
      Α: Operational use would require evidence of recurrence, stabilization, pattern strength, or regularity beyond isolated examples.
      Ω: Operational use would require evidence of power, capacity, vulnerability, exposure, obligation, or responsibility asymmetry.
      Θ: Operational use would require temporally ordered event data or defined diachronic relations.
      Φ: Operational use would require traceable source and target frames for recontextualization.
      Χ: Operational use would require explicit safeguards for reversibility, non-totalization, and suspension of unwarranted verdicts.
      Σ: Operational use would require criteria showing that integration improves discrimination rather than merely increasing coherence.
      Ψ: Operational use would require explicit self-binding, commitment, responsibility, or stable normative constraint; otherwise Ψ must remain inactive.
    negative_cases:
    - mere_correlation_without_dependence
    - temporal_sequence_without_causal_relation
    - regularity_without_necessity
    - agency_language_without_agent_or_obligation
    - coherent_theory_translation_without_discriminative_force
    - rival_formalization_not_captured_by_pms
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: Operationalization is not fulfilled. The case material provides no data, scene, causal graph, intervention record, legal record, clinical material, implementation architecture, or comparative evaluation criteria.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: Causality is analyzed as a philosophical and structural problem-field, not as a mental state, trait, motive, pathology, or personality pattern.
    non_metaphysical: The analysis does not decide whether causality is metaphysical necessity, causal power, real production, regularity, counterfactual dependence, or event ontology.
    non_diagnostic: No person, agent, group, maturity level, pathology, competence, or clinical risk is diagnosed.
    non_legal_forensic: No legal cause, liability, culpability, intent, negligence, evidentiary standard, or forensic attribution is claimed.
    non_implementation_claim: No causal model, software architecture, AI system, simulator, causal graph, or intervention engine is implemented or validated.
    non_moral_ranking: The analysis does not rank causal theories, agents, persons, or forms of explanation as morally superior or inferior.
    non_exhaustive_capture: PMS mapping is not treated as exhaustive capture of causality; rival and non-captured accounts remain open.
    reversibility: All operator assignments are reversible and case-type-bound; later evidence, a concrete scene, or a specified causal theory could change the mapping.
    dignity_in_practice: Dignity-in-Practice is preserved by using restraint under possible asymmetry and by avoiding shaming, ranking, diagnosing, or tribunal-style judgment.
limits:
- The PMS reading is limited to a conceptual projection over the philosophical problem-field of causality; it is not a concrete scene analysis.
- The reading does not establish empirical, metaphysical, diagnostic, legal-forensic, clinical, implementation, or PMS Base validation status.
- Rival readings remain open, including regularity, counterfactual, interventionist, probabilistic, causal-power, agency-causal, event-ontological, and explanatory-pragmatic accounts.
- The reading has high coherence risk because PMS can map many causal distinctions smoothly; discriminative force remains partial and must not be replaced by coherence.
case_synthesis:
  primary_pms_reading: Causality can be pre-analyzed through PMS as a structured problem-field organized by distinctions, weak explanatory directedness, frames, counterfactual absence, recurrence, conditional asymmetry, temporality, recontextualization, and reflective distance, with integration only limited and self-binding not applicable to generic causality.
  continuity_condition: Continuity is relevant only where causal relations are modeled as recurrent regularities, stable event patterns, or temporally persistent dependencies.
  change_condition: Change occurs when the causal problem is recontextualized among regularity, counterfactual, interventionist, agency, probabilistic, event-structural, explanatory, and metaphysical frames.
  rupture_or_non_fit_condition: Rupture, disagreement, missing evidence, unresolved absence, or rival framing is preserved as possible non-capture or under-specification, not automatically translated into PMS drift, failed integration, or maturity failure.
  responsibility_condition: Responsibility is not applicable unless the case is reframed as an agency scene with asymmetry, temporal obligation, recontextualization, and self-binding.
  dignity_condition: Dignity-in-Practice constrains the analysis by preventing person-ranking, diagnosis, shaming, irreversible labeling, or moralized asymmetry.
  rival_reading_condition: Rival formalizations remain open until explicit comparison criteria and evidence show superior discrimination; PMS coherence alone is insufficient.
final_structural_formula:
  primary_formula: Χ ∘ Φ ∘ Θ ∘ Α ∘ Λ ∘ □ ∘ Δ
  primary_formula_status: bounded_primary_case_model_with_conditional_extensions
  compressed_reading: Causality is modeled as a reversible PMS conceptual projection in which differentiated causal contrasts are placed in frames, tested through structured absence and recurrence, temporalized, recontextualized across rival causal theories, and held under reflective distance. ∇ remains weak and conditional where causality is read as directed production or agency. Ω remains weak and conditional where causality involves power, capacity, exposure, vulnerability, obligation, or responsibility. Σ remains limited because coherence is not proof. Ψ remains inactive for generic causality except as application self-binding or in a separate agency-responsibility subcase.
  final_validity_status: valid_with_limits
  final_claim_boundary: 'This formula states a PMS-internal structural projection of the case. It does not establish empirical truth, metaphysical truth, phenomenological completeness, diagnostic validity, legal or forensic validity, implementation validity, moral ranking, or PMS Base validation. The formula is intentionally non-totalizing: it marks the strongest PMS-readable structure of the case while leaving weak, conditional, or non-applicable operators explicitly bounded.'