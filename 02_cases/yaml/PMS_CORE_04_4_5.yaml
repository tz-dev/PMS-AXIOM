operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Δ marks the distinctions that make the problem-field analyzable: cause versus effect, sequence versus dependence, correlation versus causation, regularity versus necessity, agency versus non-agentic event-structure, and explanation versus mere event order.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - Specify whether the distinction concerns event order, dependence, explanatory role, necessity, regularity, agency, or correlation.
    - Check that correlation is not conflated with causation and that sequence is not conflated with dependence.
    falsifier_conditions:
    - If no stable distinction between causal and non-causal relation can be made, the PMS reading loses its structural entry point.
    - If all distinctions collapse into one undifferentiated notion of relation, the case becomes under-specified for PMS mapping.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ appears weakly as the explanatory directional pressure from a distinguished condition toward a consequence, or as agency-directed production in agency-causal readings. It is not treated as psychological desire or subjective drive.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - 'The relevant tension is explanatory and structural: why one event, condition, or agency is treated as directed toward another.'
    - Do not infer subjective desire, will, or motivation from generic causal relation.
    falsifier_conditions:
    - If the causal frame is purely logical, statistical, or regularity-based with no directed production or explanatory pressure, ∇ remains weak.
    - If ∇ is used to personify impersonal event-structure, the reading is overextended.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: '□ marks the frame within which ''cause'' becomes meaningful: regularity theory, counterfactual dependence, explanation, agency, event ontology, probabilistic inference, intervention, or metaphysical necessity.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Name the active causal frame before assigning operator weight.
    - Mark frame shifts among regularity, counterfactual, interventionist, agency, event-structural, and metaphysical readings.
    falsifier_conditions:
    - If no causal frame is specified, the PMS analysis becomes too abstract to discriminate among rival theories.
    - If frame shifts are unmarked, Φ and Σ may smooth over real theoretical differences.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Λ is relevant to counterfactual dependence, prevention, omission, failure, absence of an expected effect, and the question of whether the effect would have occurred without the alleged cause.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Specify the expected occurrence and the causal frame within which its absence or counterfactual non-occurrence matters.
    - Preserve the possibility that unresolved absence marks a limit of PMS capture rather than a defect in the case.
    falsifier_conditions:
    - If no structured expectation, counterfactual contrast, omission, prevention, or failure is involved, Λ should not be asserted as central.
    - If counterfactual absence is treated as metaphysical necessity without warrant, Λ is overclaimed.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α captures recurrence, regularity, stable conjunction, pattern expectation, and the attraction of causal thinking toward repeated event-pairing.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Show recurrence or stabilization rather than merely naming an isolated sequence.
    - Distinguish stable attractor, regularity, and pattern expectation from accidental aggregation or bare correlation.
    falsifier_conditions:
    - If recurrence, stabilization, or pattern expectation is not part of the causal reading, Α is over-read.
    - If repeated conjunction is treated as sufficient proof of causality, the reading under-discriminates correlation and causation.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is weak and conditional. It becomes relevant where causality is framed through agency, intervention, capacity, power, exposure, vulnerability, obligation, or responsibility. It is not automatically entailed by cause-effect direction.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Specify whether the asymmetry is power, exposure, vulnerability, capacity, obligation, or responsibility rather than mere temporal direction.
    - Do not moralize asymmetry by default.
    - Allow Ω to remain weak where the case supplies only generic causal sequence or relation.
    falsifier_conditions:
    - If no directional imbalance of power, exposure, capacity, or obligation is identifiable, Ω claims must be removed or marked weak.
    - If causal priority is treated as PMS asymmetry without further structure, Ω is overextended.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: Θ is central because causality involves sequence, before-and-after structure, trajectories, persistence, delay, anticipation, and temporal ordering of events or explanations.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Distinguish diachronic trajectory from static comparison.
    - Check whether temporality is essential to the causal claim or only incidental to a logical dependence reading.
    - Do not treat temporal priority as sufficient for causality.
    falsifier_conditions:
    - If temporal extension or sequence is irrelevant to the chosen causal theory, Θ is overextended.
    - If 'before' is treated as 'because' without dependence, frame, or counterfactual structure, the analysis fails to discriminate.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is active because the same causal problem can be recontextualized across regularity, counterfactual, interventionist, agency, event-structural, probabilistic, explanatory, and metaphysical frames.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Name source frame and target frame when recontextualizing a causal reading.
    - Check whether recontextualization clarifies distinctions or merely absorbs rival theories into PMS vocabulary.
    falsifier_conditions:
    - If every rupture, disagreement, or theoretical resistance is absorbed as Φ, the reading is over-assimilative.
    - If frame shifts erase rather than preserve rival causal theories, Φ is being misused.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Χ is a major application discipline: the analysis must suspend premature verdicts about what causality really is, preserve reversibility, and avoid converting PMS coherence into proof.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Check whether the analysis suspends verdict and preserves reversibility.
    - Distinguish distance from avoidance, denial, or empty neutrality by using it to maintain discriminative tests and non-capture.
    falsifier_conditions:
    - If Χ is suspended to force a metaphysical, empirical, legal, or PMS-validating verdict, the PMS application is invalid.
    - If the analysis treats rival readings as immature or failed integration merely because they resist PMS mapping, Χ has failed.
    non_capture_note: 'Distance protects against overclaiming and premature closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Σ is weak-to-moderate: it can coordinate the contrasts among relation, sequence, dependence, explanation, regularity, necessity, agency, and event-structure, but it must not convert coherence into proof or erase rival formalizations.'
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Test whether integration discriminates among correlation, regularity, necessity, counterfactual dependence, agency, and explanation rather than smoothing over conflict.
    - Distinguish integration from forced coherence or PMS-totalization.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy, Σ is overclaimed.
    - If the PMS formula can fit every causal theory equally well without discriminating among them, Σ is under-discriminating.
    non_capture_note: 'PMS coherence is insufficient by itself.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is not active for causality in general. It becomes relevant only in an agency-responsibility subcase or as analytic self-binding of the PMS application itself.
    dependency_status: not_active
    analytic_weight: not_active
    calibration_points:
    - Apply Ψ only where self-binding, stable normativity, responsibility-as-self-commitment, or analytic self-binding is actually in scope.
    - Do not attribute selfhood, commitment, or responsibility to generic causal structures or impersonal events.
    falsifier_conditions:
    - If Ψ is applied without Σ, Θ, and Χ, the self-binding reading is under-specified.
    - If the abstract concept of causality is treated as a self-binding subject, the PMS reading is invalidly personified.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.'
    case_function: 'L1 provides the main conceptual scaffolding: distinctions among causal and non-causal relations, explanatory directedness, causal frames, counterfactual or absent effects, and recurrent regularities.'
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.'
    case_function: 'L2 is mixed: Θ is central for sequence and trajectory, while Ω is only conditional where causality is framed through agency, power, capacity, obligation, or vulnerability.'
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.'
    case_function: L3 governs the philosophical pre-analysis by allowing causal frames to be recontextualized, held at reflective distance, and partially coordinated without forced closure.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.'
    case_function: L4 is not primary for the case. Ψ is not applicable to generic causality except as application-level discipline or in a separate agency-responsibility subcase.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: The case requires distinctions among cause, effect, correlation, sequence, dependence, regularity, necessity, agency, and explanation.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: Weakly satisfied by explanatory directional pressure or agency-causal readings; not satisfied as psychological impulse.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: Satisfied by the need to specify causal frames such as regularity, counterfactual, interventionist, agency, event-structural, or metaphysical readings.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Satisfied by counterfactual dependence, prevention, omission, and expected non-occurrence within a causal frame.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: Satisfied by recurrence, regularity, stable patterning, and repeated conjunction as causal problem components.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Weakly satisfied only for agency, capacity, power, vulnerability, obligation, or responsibility readings; not satisfied by generic causal direction alone.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Satisfied as temporality, sequence, trajectory, delay, and event-order; dependency on Ω remains weak because generic causality need not involve PMS asymmetry.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Satisfied as frame-shifting among rival theories of causality, with Ω-dependent readings marked conditional.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Satisfied as the reflective discipline that keeps the analysis reversible, bounded, and non-totalizing.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Weakly satisfied as partial coordination of causal contrasts; not satisfied as proof of an integrated causal theory.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Not active for generic causality; satisfied only as application self-binding or if a separate agency-responsibility subcase is introduced.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
