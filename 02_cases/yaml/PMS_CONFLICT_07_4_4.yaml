  conflict_overlay_quality_control:
    status: "passed"
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      no_person_level_judgment: true
      no_solution_or_intervention_script: true
      no_sanction_logic: true
      no_diagnosis_or_person_typing: true
      conflict_not_treated_as_essence: true
      terminality_not_treated_as_finality: true
      downstream_docking_marked_as_mode_shift: true
      publicness_overlay_not_operator: true
      misuse_gradient_not_operator: true
      conflict_attractor_not_operator: true
      dignity_in_practice_preserved: true
      reversibility_preserved: true
      distance_chi_preserved: true
      drift_patterns_not_person_labels: true
      scale_matrices_not_scores: true
      red_zone_checked: true
      non_capture_preserved: true
    issues_found:
      - "none"
    correction_required: false
    final_overlay_judgment: >
      The CONFLICT overlay is valid, bounded, descriptive, and correctly
      subordinated to the completed PMS Core case, with conflict terminality
      marked only weakly and conceptually rather than as a concrete scene
      finding.

  conflict_overlay_synthesis:
    primary_conflict_reading: >
      PMS-CONFLICT makes visible that the tragedy category can be read as
      conflict-legible where meaningful incompatibility persists despite
      reflective distance and where Σ may not restore shared reintegration. In
      this case, that visibility remains conceptual and weak because the
      material does not provide concrete bindings, asymmetric costs, exposure
      conditions, or a stabilized conflict attractor. The overlay therefore
      strengthens legibility without strengthening the claim-status of the Core
      case.
    stabilized_incompatibility_result: >
      Stabilized incompatibility is weak and under-specified. The category of
      tragedy implies possible persistent incompatibility, but no concrete
      conflict regime is shown. The case may be read as asking about the
      category under which such incompatibility could remain meaningful; it does
      not demonstrate a stabilized incompatibility field.
    sigma_result: >
      Σ is limited. The case permits tragic coherence but not full
      reconciliation. However, Σ is not shown to fail across concrete local
      integrations, colliding bindings, institutional frames, or role-specific
      obligations. The overlay must therefore preserve the distinction between
      non-resolution as tragic condition and Σ-failure as demonstrated conflict
      structure.
    binding_result: >
      Ψ-binding is weak. Responsibility is thematically present, but binding
      collision is not active without concrete commitments, promises,
      self-relations, institutional obligations, or self-binding structures.
      The overlay may mark responsibility-pressure as a possible conflict
      channel; it may not infer blame, guilt verdict, culpability, or failed
      self-binding.
    asymmetry_result: >
      Ω is under-specified. Guilt, responsibility, loss, and exposure imply
      possible asymmetry, but the case gives no distribution of cost,
      liability, capacity, vulnerability, authority, dependency, publicity, or
      exit conditions. Asymmetry remains a calibration requirement rather than a
      completed finding.
    temporality_result: >
      Θ is central through irreversibility. The case is temporally marked by
      persistence of consequence and non-repair, but no concrete trajectory,
      lock-in sequence, historical scale, reversibility window, or Θ-pressure
      band is supplied.
    distance_exit_result: >
      Χ is maintained as analytic distance and application discipline. Priced
      or asymmetric exit is not established. The overlay therefore cannot infer
      asymmetry lock-in, coercive distance, imposed continuity, or unequal
      withdrawal costs from the abstract case material.
    exposure_publicness_result: >
      Publicness P is not active in the case. MG is low within the private
      descriptive overlay and becomes mixed if the language is excerpted or
      reused in public, institutional, legal, diagnostic, disciplinary,
      governance, or person-near settings. Exposure capture remains a transfer
      risk, not a case finding.
    dignity_result: >
      Dignity-in-Practice is preserved. Dignity collapse is not active and is
      marked only as a transfer or misuse risk. The overlay remains valid only
      so long as tragedy, guilt, responsibility, terminality, and conflict
      language are not converted into shaming, ranking, humiliation,
      diagnosis, sanction, or irreversible person-near labeling.
    terminality_result: >
      Terminality is weak and conceptual. The case is tragically legible as
      possible non-integrability, but it does not reach a full terminal
      CONFLICT regime. Terminality names a possible grammar-internal limit of
      reintegration, not finality, metaphysical closure, legal closure,
      diagnostic closure, or proof that no rival formalization can continue.
    downstream_docking_result: >
      Downstream docking is not triggered. Any governance, institutional,
      decision, evaluation, legal, clinical, policy, or implementation use would
      be a mode shift and not a continuation of PMS-CONFLICT analysis. Such a
      shift would require its own explicit authority, evidence, procedure,
      accountability, and boundary conditions.
    non_capture_result: >
      Non-capture remains open for tragedy as aesthetic genre, metaphysical
      condition, religious or theological category, existential structure,
      phenomenological experience, historical catastrophe, legal-moral
      responsibility, narrative form, or irreducible ethical remainder. The
      overlay does not absorb these zones as merely incomplete CONFLICT
      calibration.
    final_conflict_formula_or_signature: >
      CONFLICT_terminal_core: weak; CONFLICT_stabilized_pattern: weak;
      DRIFT_binding_collision: risk; DRIFT_asymmetry_lock_in: not_applicable;
      DRIFT_exposure_capture: risk; DRIFT_dignity_collapse: risk. All reduced
      signatures are overlay shorthand only and do not alter PMS operator order,
      dependencies, derived structures, or Core case findings.
    final_claim_boundary: >
      This CONFLICT overlay adds visibility for stabilized incompatibility,
      binding collision, asymmetry lock-in, exposure capture, dignity collapse,
      scale/cost regimes, terminal descriptive positioning, and downstream
      docking boundaries. It does not revise PMS Base, rewrite the PMS Core
      pass, diagnose persons, rank persons, prescribe intervention, generate
      solution procedures, authorize governance, validate PMS, or claim final
      capture of conflict or tragedy.