core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons
      as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a structure of praxis: competing claims around privacy,
      publicness, concealment, exposure, access, and accountability. No person, group, or
      institution is analyzed as an essence or psychological object.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological essence
      claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative
      basis for praxis. Whether they are fully complete, optimally minimal, or uniquely ordered
      remains open to further formalization and critique.
    status: "satisfied"
    case_application: >
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ is used as PMS
      operator vocabulary. No new operator, axis, layer, or primitive is added.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as
      if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence,
      responsibility, action, dignity-in-practice, and asymmetry drift patterns can be
      systematically derived within PMS from operator compositions rather than introduced as
      independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D,
      SELF_FIXPOINT, and asymmetry drift patterns are considered only as formula-derived PMS
      structures, not as independent axioms.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators.
      Responsibility, maturity, and dignity-in-practice are analyzed under temporal and
      asymmetrical conditions rather than as static attributes.
    status: "partial"
    case_application: >
      Ω is materially salient because exposure, access, vulnerability, and accountability are
      asymmetrical concepts. Θ is relevant because concealment, delay, exposure, and
      accountability normally unfold over time, but the case gives no concrete sequence, so Θ
      remains weak.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported
      them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply
      direct implementation, guaranteed interoperability, or explanatory adequacy.
      Operational use requires calibration, constraints, and evaluation.
    status: "satisfied"
    case_application: >
      This YAML is a representation of a PMS reading. It is not an implementation, empirical
      validation, automated decision rule, governance system, or proof of explanatory adequacy.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical
      adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper
      discriminative models, or more empirically grounded formalisms remains methodologically
      open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including privacy-protective, accountability-publicness,
      consent/access, legal-procedural, surveillance-critical, and pluralist non-integrative
      formalizations.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival formalisms
      by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture.
      Some forms of praxis may remain only partially legible or may resist assimilation within
      the current grammar.
    status: "satisfied"
    case_application: >
      Possible non-capture is preserved for intimacy, opacity, refusal, legitimate secrecy,
      protected disclosure, public reason, legal process, cultural difference, and tragic
      conflict that may resist PMS integration.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration,
      or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic,
      forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      The analysis makes no diagnostic, clinical, psychological, personality, competence,
      pathology, risk, or maturity attribution to any person or group.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence, risk, or
      diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes, roles,
      and structures. Global person-labels and irreversible ontological attributions are out
      of scope.
    status: "partial"
    case_application: >
      Because the case is not a concrete scene, the analysis is case-type-bound rather than
      scene-bound. It therefore avoids global findings and marks concrete scene analysis as
      false.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized claims.

