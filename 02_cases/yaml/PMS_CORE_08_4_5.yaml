operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ makes the case analyzable by distinguishing privacy from publicness and by
      differentiating concealment from exposure, access from limitation, and accountability
      from non-accountability. These distinctions are structural entry points only, not
      verdicts.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the distinction is privacy/publicness, concealment/exposure, access/limitation, accountability/non-accountability, or another case-specific contrast."
      - "Check that the distinction is not reduced to a simple binary where layered access, partial disclosure, confidentiality, consent, or protected accountability may be relevant."
    falsifier_conditions:
      - "If no stable distinction can be identified, the PMS reading loses its entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as the abstract directional pressure to conceal, expose, access, withhold,
      justify, limit, or demand accountability once privacy/publicness distinctions are
      introduced.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Treat the tension as structural and argumentative rather than as subjective desire or motive."
      - "Identify whether directedness runs toward protection, exposure, access, refusal, justification, accountability, or limitation without inferring psychology."
    falsifier_conditions:
      - "If no directional tension arises from Δ, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is central because privacy, publicness, concealment, access, exposure, and accountability
      are frame-dependent. What counts as private, public, legitimate secrecy, harmful exposure,
      or accountable disclosure depends on the relevant praxeological frame.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame when concrete material is supplied: interpersonal, institutional, political, legal, technological, familial, professional, or public-discursive."
      - "Mark frame shifts explicitly so privacy-as-protection is not conflated with privacy-as-evasion and publicness-as-accountability is not conflated with publicness-as-violation."
    falsifier_conditions:
      - "If no frame is specified, the analysis becomes too abstract to discriminate."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active because the case concerns concealment, withheld access, non-disclosure,
      silence, delayed exposure, missing public explanation, and contested accountability. These
      are meaningful only when an expected disclosure, refusal, access, or response is framed
      as due or not due.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected event before asserting Λ: disclosure, access, explanation, protective non-disclosure, refusal, institutional review, or accountability response."
      - "Preserve the possibility that absence, silence, refusal, or non-disclosure may be legitimate, non-capturable, or outside PMS scope rather than failed integration."
    falsifier_conditions:
      - "If no structured expectation exists, Λ should not be asserted."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak because the case material does not show recurrence or stabilization. It can
      only mark possible patterning if privacy claims, exposure practices, access denials, or
      accountability demands become repeated role scripts.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Show actual recurrence or stabilization before treating secrecy, exposure, surveillance, or accountability demand as an attractor."
      - "Distinguish stable attractor from accidental aggregation or a one-time conceptual contrast."
    falsifier_conditions:
      - "If recurrence is not shown, Α is over-read."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is materially salient because privacy and publicness often distribute exposure,
      vulnerability, access, capacity, obligation, and accountability unevenly. In this
      abstract case, Ω marks possible structural imbalance without assigning blame or
      superiority.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify who is exposed, who controls access, who is protected, who is made accountable, who can contest the frame, and who bears vulnerability."
      - "Do not moralize asymmetry by default."
      - "Because Α is weak, Ω must remain dependency-sensitive and cannot be treated as fully established role-gradient evidence."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is weak but relevant because concealment, exposure, delay, access, accountability,
      and public uptake usually depend on sequence and duration. The case material provides
      no concrete before/after structure, so no trajectory can be claimed.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Distinguish diachronic trajectory from static comparison by identifying sequence, delay, persistence, accumulation, or change across time."
      - "Check whether temporality is essential to the claim or only implied by terms such as concealment, exposure, and accountability."
    falsifier_conditions:
      - "If temporal extension is not required, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is major because the case is constituted by rival reframings: privacy may be
      protection, intimacy, refusal, privilege, or evasion; publicness may be accountability,
      truth-telling, spectacle, surveillance, or harm.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name source and target frames when material is provided: privacy-as-protection versus privacy-as-concealment; publicness-as-accountability versus publicness-as-exposure; access-as-right versus access-as-violation."
      - "Check whether recontextualization clarifies the case or merely absorbs disagreement, rupture, or non-fit into PMS terms."
    falsifier_conditions:
      - "If every rupture or resistance is absorbed as Φ, the reading is over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is an application guardrail and analytic operator here. It requires reflective
      withdrawal from premature verdicts about whether privacy or publicness should prevail,
      and inhibits forced exposure, forced secrecy, forced integration, or person-ranking.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Check that the analysis suspends verdict, preserves reversibility, and does not convert PMS structure into moral, legal, diagnostic, or implementation authority."
      - "Distinguish reflective distance from avoidance, denial, empty neutrality, or refusal to recognize urgent accountability when a concrete scene would warrant it."
    falsifier_conditions:
      - "If Χ is suspended to force a verdict, the PMS application is invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is desired but not achieved by the material. The case concerns integration pressure
      between privacy and publicness, but no concrete synthesis, coordination, or resolution
      is supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether any integration actually discriminates between protection, evasion, accountability, exposure, consent, access, and harm."
      - "Distinguish integration from forced coherence, premature compromise, or PMS smoothness that erases genuine conflict."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and guardrail-only because the case material identifies no self-relation,
      promise, role commitment, institution, or agent binding itself across time. It may
      apply only as analytic self-binding of the PMS application to its own limits.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only where concrete material identifies a self-binding agent, role, institution, norm, or enduring commitment."
      - "Do not attribute selfhood, stable normativity, or responsibility-as-self-commitment to the abstract privacy/publicness tension itself."
    falsifier_conditions:
      - "If Ψ is applied without Σ, Θ, and Χ, the self-binding reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames,
      non-events, and recurrent patterns.
    case_function: >
      L1 gives the abstract grammar of the case: distinctions between privacy and publicness
      activate pressures to conceal, expose, access, limit, or account within frames where
      non-disclosure or exposure can matter. Α remains weak because no recurrence is supplied.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally
      extended into trajectories and commitments.
    case_function: >
      L2 is dependency-sensitive. Ω is salient because exposure, access, vulnerability, and
      accountability are asymmetrical; Θ is weak because no sequence or trajectory is specified.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning and
      more mature forms of praxis.
    case_function: >
      L3 carries major analytic discipline. Φ keeps rival framings visible, Χ suspends
      premature verdict and preserves reversibility, and Σ remains unresolved rather than
      claimed as achieved.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation
      maintained across time and contexts.
    case_function: >
      L4 is not a primary case structure. Ψ applies only as analytic self-binding of this PMS
      application to its limits unless later material supplies an agent, institution, or role
      commitment.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The case explicitly supplies distinctions around privacy/publicness, concealment/exposure, access/limitation, and accountability."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "The distinctions carry structural tension toward concealment, exposure, access, refusal, or accountability, without implying subjective motive."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The meaning of privacy, publicness, access, exposure, and accountability is frame-dependent; however concrete frames are not specified."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Concealment, withheld access, non-disclosure, and accountability demands imply possible expected events, but the expected event is not concretely named."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Only weakly satisfied as possible recurrence; the material does not show stabilized patterns or repeated role scripts."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Conceptually salient through exposure, vulnerability, access, capacity, obligation, and accountability asymmetries, but dependency on Α remains weak."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Only weakly satisfied through implied delay, sequence, and duration in concealment/exposure/accountability; no concrete trajectory is supplied."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Satisfied as a major interpretive need because privacy and publicness can be reframed in rival ways, but temporal and asymmetry dependencies remain under-specified."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied as application discipline through reflective distance, reversibility, and inhibition of premature verdict, while case-content dependency remains weak."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Weakly satisfied as an unresolved integration demand; no integrated praxis or resolution is established."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Weak and analytic-only because no self-binding agent or stable commitment is supplied; the analysis itself remains self-bound to PMS guardrails."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

