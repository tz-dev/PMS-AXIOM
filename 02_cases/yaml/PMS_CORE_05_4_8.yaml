operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the distinctions that make closure-seeking structurally legible:
      uncertainty versus resolution, unstable concept versus stabilized concept,
      incomplete argument versus completed argument, unsecured foundation versus secured
      foundation, open inquiry versus final account, and indeterminate justification
      versus settled justification.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "The distinctions are case-internal contrasts named by the material, not PMS proof that closure is superior to openness."
      - "The analysis must not conflate different closures: argument completion, conceptual stabilization, foundational security, and final truth-account may diverge."
    falsifier_conditions:
      - "If the case does not actually distinguish uncertainty from closure or instability from stabilization, Δ would no longer provide a reliable entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is active as the stated drive toward resolving, stabilizing, completing, securing,
      or finalizing. It is a structural directedness generated by the closure/open-endedness
      difference rather than a claim about subjective desire, anxiety, or psychology.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The tension is argumentative and explanatory at the conceptual level, not established as affective, psychological, institutional, or clinical."
      - "Subjective motive must not be inferred unless a concrete philosopher, text, or practice supplies evidence."
    falsifier_conditions:
      - "If no directional tension toward resolution, stabilization, completion, foundation, or finality is present, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because closure only counts as closure within frames of philosophical
      inquiry: concept analysis, argument, justification, truth, meaning, knowledge,
      reality, value, or foundation. Each frame constrains what would count as uncertain,
      complete, stable, secure, or final.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is philosophical inquiry as described by the case material, with subframes such as argument completion and foundation-seeking."
      - "Frame shifts must be marked because closure in a concept-analysis frame is not identical to closure in a metaphysical or justificatory frame."
    falsifier_conditions:
      - "If no frame specifies what counts as resolution, stability, completion, foundation, or finality, the analysis becomes too abstract to discriminate."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active where unresolved uncertainty, conceptual instability, incomplete
      argument, unsecured foundation, or absent final account functions as a meaningful
      absence within a philosophical frame. The missing closure matters only when the
      frame expects, seeks, or values some form of resolution.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence is closure as resolution, stabilization, completion, security, or final account within a specified philosophical frame."
      - "Unresolvedness must also remain available as legitimate openness or PMS non-capture, not automatically as failure or incomplete integration."
    falsifier_conditions:
      - "If uncertainty or open-endedness is not framed as an expected but absent closure, Λ should be weakened or removed."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is active as the case material explicitly presents a tendency: philosophy repeatedly
      returns to closure-seeking patterns such as grounding, conceptual stabilization,
      completion of argument, and final-account formation.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Recurrence is case-stated rather than empirically demonstrated; it is a structural projection, not a historical finding."
      - "The reading must distinguish a stable attractor from an accidental list of philosophical tasks."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown in a concrete or comparative case, Α remains a projection rather than an established pattern."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is weak and conditional. Possible asymmetries may arise where closure establishes
      gradients such as justified versus unjustified, grounded versus ungrounded,
      authoritative account versus deficient account, or obligation to justify. The case
      material does not yet show concrete power, exposure, vulnerability, capacity, or role
      asymmetry.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "The direction and kind of asymmetry are not yet established; possible gradients concern justification, authority, exposure, or obligation."
      - "Conceptual contrast must not be inflated into power asymmetry without concrete scene evidence."
      - "Ω should remain weak or absent unless the case supplies a structural imbalance of power, exposure, capacity, vulnerability, or obligation."
    falsifier_conditions:
      - "If no directional imbalance of power, exposure, capacity, vulnerability, or obligation is identifiable, Ω claims must remain weak or be removed."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is active because closure-seeking is temporally extended: inquiry proceeds through
      uncertainty, argument development, conceptual stabilization, foundation-seeking,
      completion, revision, and possible reopening of questions.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The temporal structure is a trajectory of inquiry and stabilization, not an empirical history of all philosophy."
      - "Temporality is essential to the case because closure is something approached, delayed, revised, or reopened, but Ω-dependent temporal claims remain cautious."
    falsifier_conditions:
      - "If closure is not temporally pursued, delayed, stabilized, or revised, Θ would be overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active where philosophy seeks closure by changing the frame of a problem:
      transforming uncertainty into a concept, objection into distinction, paradox into
      framework, lack into foundation, or disagreement into higher-order account.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Source frames include uncertainty, contradiction, paradox, disagreement, or lack of ground; target frames include concept, distinction, system, foundation, or account."
      - "Recontextualization must be tested for clarification rather than automatic absorption of rupture, resistance, non-fit, or rival framing."
    falsifier_conditions:
      - "If every rupture, resistance, disagreement, or rival frame is absorbed as Φ, the reading becomes over-assimilative and should be invalidated or revised."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active both as a case structure and as an application guardrail. Philosophical
      closure-seeking may require reflective withdrawal from immediate opinion,
      contradiction, impulse, or confusion. However, closure can also collapse Χ if
      reflection hardens into final verdict, authority, enforcement, or premature
      resolution.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The analysis must suspend verdict and preserve reversibility rather than using PMS to close the case about closure."
      - "Distance must be distinguished from avoidance, empty neutrality, denial of conflict, or premature theoretical finality."
    falsifier_conditions:
      - "If Χ is suspended to force a final verdict that philosophy seeks closure necessarily or defectively, the PMS application becomes invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is active because the case centrally concerns synthesis: resolving uncertainty,
      stabilizing concepts, completing arguments, securing foundations, and forming final
      accounts. This is the strongest case fit but also the highest coherence-risk point.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Integration must discriminate among valid synthesis, local argumentative closure, forced coherence, foundational closure, and premature totalization."
      - "PMS coherence is insufficient by itself and cannot prove truth, adequacy, maturity, or philosophical success."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, or if forced synthesis is not distinguished from integration, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak and conditional. It becomes relevant only when closure is bound across
      time into a durable philosophical system, method, doctrine, foundational stance,
      norm of justification, or analytic self-binding of inquiry. The supplied case does
      not establish a concrete self-binding subject or institution.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Ψ should be applied only where a concrete or explicitly scoped structural commitment across time is present."
      - "Do not attribute literal selfhood to philosophy, a field, a concept, or PMS unless the claim is explicitly limited to structural or analytic self-binding."
    falsifier_conditions:
      - "If no durable commitment, system, method, doctrine, norm, or self-relation is supplied, Ψ remains weak, conditional, or analytic-only."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses, frames,
      non-events, and recurrent patterns.
    case_function: >
      L1 structures the case by differentiating open-endedness from closure, generating a
      drive toward resolution, placing that drive inside philosophical frames, marking
      unresolved closure as meaningful absence, and stabilizing the repeated tendency to
      seek resolution or foundation.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are temporally
      extended into trajectories and commitments.
    case_function: >
      L2 is partially active. Θ is central because the tendency unfolds through temporal
      trajectories of inquiry and stabilization. Ω remains weak because the case does not
      yet establish concrete asymmetry beyond possible justificatory or authority gradients.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive learning
      and more mature forms of praxis.
    case_function: >
      L3 carries major analytic weight: philosophy may recontextualize problems, hold
      reflective distance from immediacy, and seek integration. The layer must be
      calibrated carefully so that reframing and integration do not erase non-fit or rival
      forms of openness.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable self-relation
      maintained across time and contexts.
    case_function: >
      L4 is analytic-only and conditional. Ψ may appear where closure becomes a durable
      philosophical system, doctrine, method, or norm of justification, but the abstract
      case material does not establish literal self-binding.

dependency_logic:
  status: "dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case supplies explicit structural distinctions between uncertainty and
        resolution, instability and stabilization, incompletion and completion, unsecured
        foundation and secured foundation, and openness and final account.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        The case explicitly names a drive toward resolving, stabilizing, completing,
        securing, and finalizing.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The drive is framed by philosophical inquiry and by subframes of concept,
        argument, foundation, truth, meaning, knowledge, reality, value, and justification.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Within those frames, unresolvedness, instability, incompletion, and unsecured
        foundation can function as meaningful absences only where closure is expected or
        sought.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        The case describes closure-seeking as a tendency, allowing a structural attractor
        reading while withholding empirical proof of recurrence.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Only weakly satisfied as a possible justificatory, authoritative, or obligation
        gradient; no concrete asymmetry is established.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Satisfied for the trajectory of inquiry, completion, revision, stabilization, and
        reopening; Ω-dependent temporal claims remain cautious because Ω is weak.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Satisfied as a conditional account of reframing uncertainty, paradox, objection,
        lack, or disagreement into a new philosophical frame; dependency on Ω remains weak.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Satisfied as reflective distance in philosophical inquiry and as an application
        guardrail preserving reversibility and non-totalization.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Satisfied as the case's central closure-seeking structure of synthesis, completion,
        stabilization, and coordination; coherence risk remains high.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Weakly satisfied only where closure is bound into durable systems, methods,
        doctrines, or norms; not established for the abstract case as such.
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

