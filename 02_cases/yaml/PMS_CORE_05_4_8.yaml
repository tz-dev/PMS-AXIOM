core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons
      as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a structure of philosophical praxis: inquiry is organized
      around differences, frames, absences, recurrence, temporality, reflection, reframing,
      and integration. No person, philosopher, tradition, or group is analyzed as an
      ontological essence or psychological type.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels, psychological
      essence claims, ontological person rankings, or diagnoses of philosophical agents.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative
      basis for praxis. Whether they are fully complete, optimally minimal, or uniquely
      ordered remains open to further formalization and critique.
    status: "satisfied"
    case_application: >
      Only the PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS
      operators. Closure, uncertainty, foundation, argument completion, and conceptual
      stabilization are case terms mapped through PMS operators rather than added as new
      PMS primitives.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, layers, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness, coherence,
      responsibility, action, dignity-in-practice, and asymmetry drift patterns can be
      systematically derived within PMS from operator compositions rather than introduced
      as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D,
      SELF_FIXPOINT, and drift patterns are considered only through the PMS formulas
      supplied by PMS Base and the template. They are not treated as independent axes,
      diagnoses, moral measures, or metaphysical properties.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as independent axioms
      or used to overrule operator dependencies.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural operators.
      Responsibility, maturity, and dignity-in-practice are analyzed under temporal and
      asymmetrical conditions rather than as static attributes.
    status: "partial"
    case_application: >
      Θ is central because closure-seeking implies trajectories of inquiry, completion,
      revision, and stabilization over time. Ω is only weak and conditional because the
      case material does not yet show a concrete asymmetry of power, exposure, capacity,
      vulnerability, or obligation.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant temporality or inflated conceptual
      contrast into Ω without concrete asymmetry.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by itself imply
      direct implementation, guaranteed interoperability, or explanatory adequacy.
      Operational use requires calibration, constraints, and evaluation.
    status: "satisfied"
    case_application: >
      This YAML is a formal representation of a PMS reading. It is not an implementation
      of philosophical praxis, not an empirical test, not a computational model of agency,
      and not proof of explanatory adequacy.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical
      adequacy, computational sufficiency, or PMS Base validation.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative grammars,
      sharper discriminative models, or more empirically grounded formalisms remains
      methodologically open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including readings that treat philosophy as
      aporia-preserving, hermeneutic, linguistic, historical, institutional, epistemic,
      metaphysical, or anti-foundational rather than closure-seeking.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival
      formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove exhaustive
      capture. Some forms of praxis may remain only partially legible or may resist
      assimilation within the current grammar.
    status: "satisfied"
    case_application: >
      Possible non-capture is preserved for philosophical traditions and practices that
      cultivate unresolvedness, paradox, rupture, disagreement, undecidability, or ongoing
      questioning without treating these as drift or failed integration.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete
      integration, recontextualization, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      The analysis makes no diagnosis of philosophers, philosophical schools, institutions,
      disciplines, or persons. Closure-seeking is not treated as pathology, trait, risk,
      immaturity, or clinical condition.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence, risk,
      diagnosis, clinical status, or forensic status.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological scenes,
      roles, and structures. Global person-labels and irreversible ontological attributions
      are out of scope.
    status: "partial"
    case_application: >
      Because the case is not a concrete scene, the reading is explicitly case-type-bound
      as a conceptual projection. No irreversible, global, or decontextualized claim about
      philosophy as a whole is made.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, decontextualized,
      empirical, metaphysical, or person-level claims from this abstract case.

