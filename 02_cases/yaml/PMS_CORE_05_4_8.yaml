derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >
    Each derived structure must be marked as active, weak, analytic_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration does
    not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs. They are not independent
    axioms, diagnoses, ontological rankings, metaphysical entities, or proof of PMS
    completeness.
  case_status: >
    Awareness_A and Coherence_C are active as formula-derived structures. Action_E is
    under-specified because no concrete enactment scene is supplied. Responsibility_R is
    weak and conditional because Ω and Ψ are not concretely established.
    Dignity_in_Practice_D functions primarily as an application constraint rather than a
    case property. SELF_FIXPOINT is analytic-only and conditional. AD_A>>E and
    AD_Sigma_low are possible structural risks or rival drift formalizations, not
    findings, diagnoses, or verdicts.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically. Within PMS it can be
      systematically derived from this operator sequence, but this does not imply that all
      notions of awareness are exhausted by it.
    case_reading: >
      A is active as sustained, framed differentiation across time: philosophical inquiry
      keeps distinctions such as uncertain/resolved, unstable/stabilized,
      incomplete/complete, and ungrounded/grounded available for repeated examination.
    status: "active"
    calibration_points:
      - "Differentiate forms of closure within the philosophical inquiry frame across the temporal sequence of questioning, argument, stabilization, and possible revision."
    non_capture_note: >
      Structural awareness is not phenomenological consciousness.
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability of action, including meaningful absences and
      delays, without yet requiring full integration or self-binding. Rival theories may
      formalize coherence differently.
    case_reading: >
      C is active because the drive toward closure stabilizes impulse and expectation
      within philosophical frames: uncertainty creates directed tension, the frame defines
      what closure would count as, Λ marks missing closure, and Θ sustains the trajectory.
    status: "active"
    calibration_points:
      - "Coherence must be distinguished from truth, validity, metaphysical adequacy, forced integration, narrative smoothing, or final philosophical success."
    non_capture_note: >
      Coherence does not prove adequacy.
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic in this specification. It is
      formally derived within PMS, not asserted as the only valid theory of responsibility.
    case_reading: >
      R is weak and conditional. It would become active only where closure-seeking is tied
      to self-bound obligations of justification under asymmetry, for example accountability
      to objections, exposure of the ungrounded position, or durable commitment to a
      method. The abstract case does not establish this.
    status: "weak"
    calibration_points:
      - "Identify a concrete Ω gradient, a temporal obligation, a recontextualization of that obligation, and Ψ self-binding before claiming Responsibility_R."
    non_capture_note: >
      Responsibility_R is not moral blame, diagnosis, or legal liability.
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into a coherent enactment."
    notes: >
      Action here is not any behavior; it is integrated and temporally extended. Higher
      operators such as Ω, Φ, and Ψ may enrich it, but are not required for its minimal
      structural definition within PMS.
    case_reading: >
      E is under-specified. The case describes directed closure-seeking across time and
      possible integration, but no concrete enactment, institutional practice, textual move,
      argument performance, or decision scene is supplied.
    status: "under_specified"
    calibration_points:
      - "Distinguish abstract philosophical tendency from enacted argument, teaching practice, publication, institutional rule, or concrete decision."
    non_capture_note: >
      Without a concrete scene, Action_E may remain under-specified.
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-practice is a structural stance in action. It concerns how asymmetry is
      handled, not the ranking of persons or ontological worth.
    case_reading: >
      D functions as an application constraint. The analysis must handle possible asymmetry
      without ranking philosophers, shaming non-closure, treating openness as immaturity,
      or turning PMS into a tribunal of philosophical worth.
    status: "application_constraint"
    calibration_points:
      - "Maintain restraint under possible justificatory asymmetry and avoid ranking, shaming, diagnosing, or irreversibly labeling philosophical positions or persons."
    non_capture_note: >
      D is a praxeological application constraint, not an ontological or moral superiority
      claim.

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as the result of integrated, reflexively
    modulated, temporally extended, asymmetry-aware patterns of praxis being bound into a
    relatively stable self-relation.
  case_reading: >
    SELF_FIXPOINT is not the primary structure of this case. It is relevant only as an
    analytic possibility where a philosophical practice, school, system, method, or norm
    binds itself across time to integrated closure structures. The case material alone does
    not warrant treating philosophy, a concept, or a field as literal subjectivity or
    completed self-relation.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence records one derivational strategy within PMS. It must not be read as
    proving that all forms of selfhood, agency, identity, or case structure reduce without
    remainder to this exact chain.
  non_capture_note: >
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions
    as literal subjectivity unless explicitly scoped as structural self-binding or analytic
    self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms.
    They are not automatically entailed by a case and must not be treated as diagnoses,
    person-types, clinical categories, moral verdicts, or philosophical rankings.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor formation, while
        recontextualization reinforces drift toward evaluation rather than supporting
        integrative transformation and balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: >
      AD_A>>E is a conditional risk, not a finding. Philosophy's closure-seeking could
      drift toward over-expanded reflective evaluation and delayed enactment if conceptual
      awareness grows while concrete action remains suppressed or chronically deferred.
      The abstract case does not show this concretely.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state, moral
      judgment, or evaluation of philosophers.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
