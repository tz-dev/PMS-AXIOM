analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "case_type_bound_structural_reading"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The analysis may structurally project PMS operators onto the stated philosophical
      tendency, but it cannot establish empirical prevalence, diagnose agents, decide
      metaphysical truth, make legal findings, validate PMS Base, or operationalize the
      result.
  coherence_risk:
    status: "high"
    reason: >
      The case topic, closure, strongly fits PMS terms such as Λ, Φ, Χ, and especially Σ.
      This creates a risk that the PMS reading becomes too smooth, over-assimilative, or
      unable to distinguish genuine integration from forced closure. The risk is heightened
      because PMS itself has a strong integrative grammar, while the case asks why a
      philosophical practice might seek integration, completion, foundation, or finality.
    mitigation: >
      The reading is constrained by operator calibration, weak marking of Ω and Ψ, explicit
      non-capture zones, rival readings, falsifier conditions, and the rule that PMS
      coherence is insufficient by itself. The analysis must therefore preserve the
      possibility that some philosophical openness, aporia, disagreement, or non-finality
      is not a failure of Σ and not a residue waiting to be absorbed by Φ.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural movement from difference and directedness through framing,
      meaningful absence, recurrence, temporality, recontextualization, distance, and
      integration. This gives the case a strong PMS fit at the level of structural
      intelligibility.
    discrimination_requirement: >
      The reading must distinguish local argumentative closure from metaphysical finality,
      valid integration from forced coherence, reflective distance from premature verdict,
      and openness from failed integration. It must also distinguish philosophy's possible
      tendency to seek closure from any claim that philosophy is essentially, always, or
      properly closure-seeking.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish integration from forced closure."
      expected_pms_distinction: >
        Σ may describe integration only when Χ and Φ preserve discrimination and
        reversibility; forced closure collapses Χ or absorbs rival frames without testing.
        A PMS-coherent description that cannot mark this difference is too smooth for the
        case.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish unresolved openness from PMS drift or incomplete integration."
      expected_pms_distinction: >
        Λ marks structured absence only inside a frame where closure is expected; openness,
        aporia, rupture, or rival framing may remain non-captured rather than becoming
        AD_Sigma_low or failed Σ. Non-closure must therefore remain available as a valid
        rival structure, not merely as an incomplete PMS trajectory.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "What distinctions make closure-seeking structurally analyzable?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What directional tension or drive is stated without psychologizing it?"
      current_calibration: "satisfied"
    - operator: "□"
      question: "Which philosophical frames define what counts as closure?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "When does unresolvedness function as meaningful absence rather than legitimate openness?"
      current_calibration: "partial"
    - operator: "Α"
      question: "What supports recurrence or stabilization of the closure-seeking pattern?"
      current_calibration: "partial"
    - operator: "Ω"
      question: "Is there a concrete asymmetry of power, exposure, capacity, vulnerability, or obligation?"
      current_calibration: "weak"
    - operator: "Θ"
      question: "What temporal trajectory of inquiry, completion, revision, or reopening is involved?"
      current_calibration: "partial"
    - operator: "Φ"
      question: "What source and target frames structure recontextualization, and does it clarify rather than absorb non-fit?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "Is reflective distance maintained without forcing a final verdict about closure?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "Does integration discriminate rather than smooth over or prematurely totalize?"
      current_calibration: "partial"
    - operator: "Ψ"
      question: "Is durable self-binding actually supplied by the case material?"
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "philosophical practices that cultivate aporia, paradox, undecidability, or non-finality"
      - "forms of disagreement that are not failed integration or immature resistance"
      - "metaphysical truth claims beyond structural PMS projection"
      - "historical, linguistic, institutional, sociological, or textual explanations of closure-seeking"
      - "rival formalizations that explain closure without PMS operators"
      - "uncertainties that are legitimate openness rather than structured absence"
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration residue,
      incomplete integration, structured absence, or failed maturity. They may mark genuine
      limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "anti-closure or aporetic reading in which philosophy preserves questions rather than seeking final accounts"
      - "epistemological reading in which closure is a norm of justification rather than a praxeological attractor"
      - "hermeneutic or historical reading in which closure-seeking varies by tradition, text, institution, and period"
      - "linguistic or conceptual-engineering reading in which stabilization is a function of language use rather than PMS integration"
      - "metaphysical reading in which finality is assessed by truth conditions rather than praxis structure"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat them unless
      comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading is weakened if no operative distinction between uncertainty and
        closure, no directional drive, no philosophical frame, or no meaningful absence can
        be identified. Without Δ, ∇, □, and Λ the primary formula loses its entry
        conditions.
    - id: "F2"
      condition: >
        The PMS reading is under-discriminating if it cannot distinguish valid integration
        from forced coherence, local argument completion from metaphysical finality,
        reflective distance from premature verdict, or conceptual stabilization from
        closure imposed by authority or institutional habit.
    - id: "F3"
      condition: >
        The PMS reading is over-assimilative if rupture, disagreement, resistance, non-fit,
        openness, or rival framing is automatically redescribed as drift, incomplete
        integration, recontextualization, or maturity failure.
    - id: "F4"
      condition: >
        The PMS reading is overextended if it treats Ω or Ψ as fully active without a
        concrete asymmetry of power, exposure, capacity, vulnerability, obligation, or
        durable self-binding commitment.
    - id: "F5"
      condition: >
        The PMS reading is invalid as a PMS application if it uses the case itself to enact
        the closure it analyzes: for example by treating PMS coherence as sufficient,
        denying possible non-capture, or converting the projection into a final verdict on
        philosophy.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The case is usable as a bounded conceptual PMS projection because the core operators
      are structurally legible, but it remains limited by absence of a concrete scene, weak
      Ω and Ψ, high coherence risk, and open rival formalizations.

