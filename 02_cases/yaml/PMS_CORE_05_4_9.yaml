operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Dogmatism becomes analyzable through distinctions between final and
      revisable, settled and unsettled, admissible and rival, foundation and
      challenge, inside-frame and outside-frame, integration and forced closure.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Identify the operative distinction as finality versus revisability of an account, not as truth versus error by default."
      - "Check whether PMS is importing a binary too quickly; firm commitment, principled closure, and dogmatic protection must remain distinguishable."
    falsifier_conditions:
      - "If the case cannot distinguish a protected settled account from ordinary disagreement, the PMS reading loses its entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The relevant directedness is a structural pressure toward closure,
      stabilization, protection of the accepted account, and reduction or
      containment of uncertainty and rival interpretation. This is not a claim
      about subjective desire.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify the tension as argumentative, explanatory, and structural: movement from unresolved contestability toward protected settlement."
      - "Do not infer psychological need for certainty, fear, anxiety, or motive; the case material supports only structural directedness."
    falsifier_conditions:
      - "If no pressure toward finalization or protection arises from Δ, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      The active frame is the conceptual or argumentative framework within which
      certain interpretations count as legitimate, revision is admitted or
      excluded, and uncertainty is either preserved or contained.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as the concept, argument, framework, foundation, or account treated as settled."
      - "Check whether rival frames are actually considered, rejected for reasons, or excluded in advance."
    falsifier_conditions:
      - "If no framework of admissibility is identifiable, the analysis becomes too abstract to discriminate dogmatism from ordinary confidence."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ appears as the meaningful non-occurrence of expected revision,
      answerability, interpretive reopening, or engagement with unresolved
      uncertainty within a frame that would otherwise make such openness
      relevant.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the expected occurrence as revision, reconsideration, answer to objections, or acknowledgment of unresolved uncertainty within the given conceptual frame."
      - "Preserve the possibility that an absence of revision reflects legitimate closure or PMS non-capture rather than a defect in the case."
    falsifier_conditions:
      - "If the frame does not create any expectation of revision, response, or openness, Λ should not be asserted."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is the possible stabilization of closure into a recurrent pattern:
      repeated protection of the account, recurrent pre-containment of
      objections, or path-dependent exclusion of rival interpretations.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence, stabilization, or path dependence; the abstract description alone suggests a tendency but does not demonstrate repeated episodes."
      - "Distinguish a stable attractor from a single principled refusal, a one-time boundary, or an accidental aggregation of similar claims."
    falsifier_conditions:
      - "If recurrence or stabilization cannot be shown in a concrete or textual sequence, Α must remain weak rather than established."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is not established by the case material alone. It becomes relevant only
      if dogmatism is situated in authority, teaching, gatekeeping, dependency,
      institutional power, vulnerability, exposure, or obligation such that one
      position can protect the frame against weaker or exposed rivals.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Specify direction and kind of asymmetry only if evidence supplies authority, power, exposure, capacity, obligation, or vulnerability."
      - "Do not moralize asymmetry or treat the stronger position as culpable by default."
      - "Allow Ω to remain weak because the supplied case is a conceptual pattern, not a role relation."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or left explicitly weak and conditional."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ appears as the temporal persistence implied by resistance to revision:
      the account is not merely asserted once, but treated as settled across
      possible future challenges. No concrete trajectory is supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Distinguish actual diachronic persistence from a static description of finality."
      - "Check whether temporality is essential to the dogmatic tendency or merely inferred from the wording resistant to revision."
    falsifier_conditions:
      - "If the pattern does not persist across challenge, time, or recurrence, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is central because dogmatism concerns the inhibited, refused, or
      pre-contained transformation of an existing account when placed into a
      rival frame, new context, objection, or unresolved uncertainty. The case
      does not warrant the simple claim that every refusal of reframing is
      dogmatic. The relevant question is whether the rival frame is made
      admissible as a possible context of reinterpretation, or whether it is
      excluded in advance by the already settled frame.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name the source frame as the settled account and the target frames as rival interpretations, objections, contexts of uncertainty, or later scenes in which the original account might require reinterpretation."
      - "Check whether rejection of a rival frame is justified within explicit scope conditions rather than automatically treating all resistance, non-fit, or disagreement as Φ-failure."
      - "Preserve the possibility that a frame refuses recontextualization legitimately because the rival frame is incoherent, irrelevant, methodologically out of scope, or already considered."
    falsifier_conditions:
      - "If every rupture, disagreement, or refusal is absorbed as failed Φ, the reading becomes over-assimilative and violates non-capture."
      - "If the account can enter rival frames without automatic delegitimation and can specify conditions under which reinterpretation would be accepted, Φ-blockage is weakened."
    non_capture_note: >
      Recontextualization must preserve possible non-capture. PMS must not
      convert all resistance to reframing into incomplete development,
      immaturity, drift, or failed Integration.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is the reflective distance needed to hold the account as bounded,
      revisable, accountable to uncertainty, and open to rival formalization
      without immediately collapsing into either total acceptance or total
      rejection. In dogmatism, Χ may be weak because the frame is fused with
      finality and protected from suspension. At the same time, Χ is also the
      discipline required of this PMS application: the analysis must not become
      a dogmatic capture of dogmatism.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Check whether the PMS application suspends verdict and preserves reversibility rather than mirroring dogmatism through PMS certainty."
      - "Distinguish distance from avoidance, denial, empty neutrality, relativism, or refusal to make any structural claim."
      - "Ask whether the settled account can be held, used, or defended while still being marked as conditional, revisable, or scope-limited."
    falsifier_conditions:
      - "If Χ is suspended to force the dogmatism verdict or to treat PMS as exhaustive, the PMS application is invalid."
      - "If the case shows explicit reflective distance toward its own foundations, the low-Χ reading must be weakened or withdrawn."
    non_capture_note: >
      Distance protects against overclaiming and premature closure, including
      premature PMS closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is the major risk-point. Dogmatism can appear as claimed integration:
      a concept or framework is treated as if conflicts, rival readings, and
      uncertainties are already synthesized, when they may instead be excluded,
      neutralized, pre-contained, or declared irrelevant by the frame. The case
      should therefore not be read as mature PMS Integration. Its central PMS
      question is whether apparent coherence is produced through Χ-supported
      and Φ-capable synthesis, or through closure that merely imitates
      Integration.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Test whether integration discriminates and preserves conflict rather than smoothing over it."
      - "Distinguish PMS Integration from forced coherence, closure, totalization, or protection of the preferred account."
      - "Ask whether unresolved uncertainty and rival interpretation remain structurally legible inside the account after integration, rather than being treated as already defeated by definition."
      - "Keep Σ dependent on Χ and Φ; do not allow the case title Σ-Totalization to imply that Σ has actually been achieved."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy or if the label Σ-Totalization is treated as a new PMS operator, Σ is overclaimed."
      - "If the case shows active preservation of rival readings, explicit revision conditions, and genuine synthesis of objections, the pseudo-Σ reading is weakened."
    non_capture_note: >
      PMS coherence is insufficient by itself. A smooth PMS formula may be
      formally coherent while still under-discriminating the philosophical case.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is conditional. It applies only if the settled account becomes a durable
      self-binding, identity-like commitment, stable normativity, or
      responsibility-as-self-commitment for an agent, group, institution, or
      analytic stance. The abstract case does not establish that condition.
      Ψ is nevertheless relevant as an application discipline: the PMS analysis
      must bind itself to reversibility, Distance Χ, non-capture, and
      Dignity-in-Practice rather than binding itself to a totalizing verdict.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only where self-binding, stable normativity, or analytic self-binding is actually in scope."
      - "Do not attribute selfhood, subjectivity, or identity to an abstract concept unless explicitly scoped as structural self-binding by an agent, group, institution, or application stance."
      - "Distinguish doctrinal commitment from PMS Self-Binding: not every enduring commitment is a Ψ failure, and not every identity-bound foundation is dogmatism."
    falsifier_conditions:
      - "If Ψ is applied without established Σ, Θ, and Χ, or without a subject or structural self-model in scope, the self-binding reading is under-specified."
      - "If a concrete subject binds itself to fallibility, explicit revision, and accountable uncertainty, the dogmatic Ψ reading is weakened."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity, identity, consciousness, or personhood.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the case by differentiating settled from revisable claims,
      giving directional pressure toward closure, locating that pressure within
      an argumentative frame, marking expected but absent revision as Λ, and
      allowing closure to stabilize as a possible attractor.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is only partially supported. Θ is relevant because resistance to
      revision implies persistence across possible challenges. Ω remains weak
      unless the dogmatic structure occurs within authority, dependency,
      institutional enforcement, or another directional imbalance.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 carries the major analytic weight. Φ names the problem of blocked or
      pre-contained reframing, Χ names the need for reflective distance and
      reversibility, and Σ names the difference between genuine integration and
      forced or claimed integration.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is secondary and conditional. Ψ is not a primary claim about the
      concept itself; it becomes relevant only if a person, group, institution,
      or analytic stance binds itself over time to the protected finality of the
      account.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case supplies stable conceptual distinctions between settled and
        revisable, protected and open, accepted account and rival interpretation.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        The tendency toward finality and protection supplies structural
        directedness from difference toward closure.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The concept, argument, framework, foundation, or account supplies the
        frame within which admissibility and revision are organized.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Weakly satisfied by the meaningful absence of expected revision or
        openness where uncertainty or rival interpretation would otherwise call
        for response.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        Weakly satisfied by the case wording as a tendency, but recurrence is
        not empirically shown.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Weak and conditional; satisfied only as a dependency-sensitive
        calibration point where closure may occur in asymmetrical authority or
        exposure relations, not by the abstract case alone.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Weakly satisfied by resistance to revision across possible challenges,
        but no concrete temporal sequence is supplied.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Weakly satisfied by the projected blockage or pre-containment of rival
        frames and recontextualization attempts.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Weak as a feature of the dogmatic pattern and actively maintained as an
        application discipline; reflective distance is precisely the calibration
        issue.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Weakly satisfied as claimed or overextended integration, not as
        established mature Integration.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Weak and conditional; the case does not show self-binding unless an
        agent, group, institution, or analytic application binds itself to the
        closure over time.
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

