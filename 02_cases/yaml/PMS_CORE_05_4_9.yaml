    exposure, vulnerability, obligation, enforcement, or concrete role asymmetry.
    The formula therefore names a bounded PMS projection of closure around
    claimed Σ, not a final verdict that the phenomenon has been exhaustively
    captured.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity, clinical
    validity, implementation validity, moral ranking, or PMS Base validation.
    It remains reversible if later material shows explicit fallibility,
