core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is handled as a structure of praxis: a way in which claims,
      frames, uncertainty, and rival interpretations are handled within a
      conceptual field. No person, psyche, essence, or ontological rank is
      inferred.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal
      generative basis for praxis. Whether they are fully complete, optimally
      minimal, or uniquely ordered remains open to further formalization and
      critique.
    status: "satisfied"
    case_application: >
      Only PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS
      operators. The descriptive label Σ-Totalization names a case pattern of
      claimed or overextended integration; it is not introduced as a new PMS
      operator, axis, primitive, or Base structure.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: a wide range of praxis structures such as awareness,
      coherence, responsibility, action, dignity-in-practice, and asymmetry drift
      patterns can be systematically derived within PMS from operator
      compositions rather than introduced as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and asymmetry drift patterns are
      treated only through their PMS formulas. They are not assumed as
      independent primitives or diagnostic classes.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry Ω and temporality Θ are treated as central structural operators.
      Responsibility, maturity, and dignity-in-practice are analyzed under
      temporal and asymmetrical conditions rather than as static attributes.
    status: "partial"
    case_application: >
      Θ is relevant because resistance to revision implies persistence or
      recurrence across time, but the material gives no concrete sequence. Ω is
      weak and conditional: dogmatism may become asymmetrical when protected by
      authority, exposure, obligation, vulnerability, or enforcement, but mere
      disagreement, firmness, certainty, or rival framing does not establish Ω.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality
      or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by
      itself imply direct implementation, guaranteed interoperability, or
      explanatory adequacy. Operational use requires calibration, constraints,
      and evaluation.
    status: "satisfied"
    case_application: >
      This YAML is an application representation of a conceptual PMS reading.
      It is not an implementation of praxis, an empirical validation, a
      computational model of dogmatism, or a claim of architecture-level
      sufficiency.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative
      grammars, sharper discriminative models, or more empirically grounded
      formalisms remains methodologically open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including epistemic vice theory,
      anti-fallibilism, ideology critique, foundationalism, paradigm-protection,
      theological or axiomatic closure, institutional gatekeeping, and non-PMS
      formalizations of argumentative rigidity.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating
      rival formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove
      exhaustive capture. Some forms of praxis may remain only partially legible
      or may resist assimilation within the current grammar.
    status: "satisfied"
    case_application: >
      Possible non-capture is preserved for justified closure, axiomatic
      stipulation, rational refusal of weak objections, principled commitment,
      metaphysical conviction, disciplinary method, and philosophical accounts
      of dogmatism that PMS may not discriminate adequately.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      The reading is non-diagnostic. It does not infer pathology, mental state,
      personality trait, competence, risk, maturity level, or clinical condition
      from the described philosophical tendency.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological
      scenes, roles, and structures. Global person-labels and irreversible
      ontological attributions are out of scope.
    status: "partial"
    case_application: >
      Because the case is explicitly not a concrete scene, the analysis is bound
      to the supplied conceptual case-type rather than to a lived scene. It
      avoids global person-labels and marks concrete-scene conclusions as
      unavailable.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible,
      decontextualized claims.

