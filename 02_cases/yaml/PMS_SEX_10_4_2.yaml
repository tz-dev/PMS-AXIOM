        asymmetry-switch drift remain risks only because sexual cost topology is
        not supplied.
    demarcation_ch14_6:
      rules:
        - "Modulator ≠ character."
        - "Modulator ≠ blame."
        - "Modulator ≠ diagnosis."
        - "Modulator ≠ sexual identity."
        - "Modulator ≠ orientation taxonomy."
        - "Modulator ≠ maturity verdict."
        - "Modulator ≠ dignity ranking."
      case_application: >
        Modulator language remains configuration-language. It weights how
        consent-framing, absence, temporality, recontextualization, distance,
        and possible cost topology could pull in a sexual scene. It does not
        classify any person, identity, orientation, character, maturity, or
        dignity.
    guard: >
      Modulators are not personality types, causes, diagnoses, role essences,
      sexual identities, orientation taxonomies, maturity verdicts, dignity
      rankings, or moral explanations.

