        PMS-SEX_1.2 includes the sexual drift triad:
        asymmetry-switch drift, parity-to-exit, and responsibility-to-authority.
        These are drift profiles, not operators or person labels. For Consent
        Laundering, the triad is relevant only as a conditional overlay risk:
        apparent consent could, in a concrete sexual scene, preserve parity
        language while costs distribute asymmetrically, or could shift
        responsibility away from the conditions of consent. The supplied
        material does not show that this has occurred. The correct overlay use
        is therefore to keep the triad available as a scene-reconstruction
        checklist while withholding all drift findings that would require
        concrete evidence.
