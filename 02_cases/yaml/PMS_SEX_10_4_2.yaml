pms_sex_overlay_application:
  schema_version: PMS-SEX_1.2
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-SEX.yaml
  paper_source_file: PMS-SEX - nach update.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: PMS–SEX Application Profile
    model_short: PMS-SEX
    status: application_overlay
    profile_role: paper_specific_profile
    repository_role: paper_specific_application_profile
    last_updated: '2026-05-24'
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.5 Thinking)
      role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      status: repository_reference
    repo:
      name: PMS-SEX
      url: https://github.com/tz-dev/PMS-SEX
    source_paper:
      title: 'PMS-SEX — From Impulse to Self-Binding: A Praxeological Grammar of Sexuality (Δ–Ψ)'
      file: PMS-SEX - nach update.md
      status: updated_paper_reference
      version: PMS-SEX_1.2
      coverage:
      - 'Ch. 0: scope, PMS v1.3 operator spine, entry guard, inner/outer distinction, publicness overlay, path-cost guard'
      - 'Ch. 1–12: core operator derivation from Δ through Ψ'
      - 'Ch. 13: body as non-operator remainder'
      - 'Ch. 14: modulators as non-operator weightings'
      - 'Ch. 15: deviance as consequence structure'
      - 'Ch. 16: high-risk / extreme practices'
      - 'Ch. 17: suspended self-binding as boundary condition; EDEN/PFO drift under suspended Ψ'
      - 'Ch. 18: dysfunctional expressions and destructive dynamics; asymmetry-switch drift, parity-to-exit, responsibility-to-authority'
      - 'Ch. 19: functional conditions and warning signals'
      - 'Ch. 20: structural self-check adapter updated for switch drift and cost-topology rereading'
      - 'Ch. 21: Dignity-in-Practice module; EDEN/PFO reference; sexual cost topology; cost factors by role-position'
      - 'Ch. 22: MIP docking interface; operator-profile-only rule; no direct adultness verdict'
      - 'Ch. 23: limits and extensions'
      - 'Ch. 24: conclusion and final guard'
      - 'Appendix A: positioning and adjacent lenses'
      - 'Appendix B: glossary incl. sexual cost topology, EDEN/PFO asymmetry switch, parity-to-exit, responsibility-to-authority'
      - 'Appendix C: operator table'
      - 'Appendix D: one-page structural map'
    description: 'PMS-SEX is an application profile for PMS that specifies the structural lens of sexuality using the canonical PMS operator grammar Δ–Ψ, without redefining operators or altering dependencies. It provides reduced signatures, overlay concepts, modulators, drift markers, viability corridors, sexual cost topology, EDEN/PFO sexual-instantiation handles, MIP-docking guards, appendix terms, and example-suite scaffolding. All constructs remain scene-bound and subordinate to PMS v1.3.

      '
    methodological_restraint: 'PMS-SEX does not claim to exhaust sexuality, intimacy, desire, consent, embodiment, publicness, identity, orientation, or relational meaning. It offers a structural grammar for scene-bound sexual praxis under PMS and remains open to rival framings, partial applicability, and genuine non-capture.

      '
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for Consent Laundering
    rule: >
      This SEX block is applied to the already completed PMS Core v1.3 case
      artefact for Consent Laundering. It does not rewrite the core pass,
      redefine PMS operators, alter PMS dependencies, change derived structures,
      or treat PMS-SEX constructs as PMS Base. Because the Core case is a
      philosophical phenomenon-class rather than a concrete sexual scene, the
      overlay remains a scene-bound and case-type-bound application profile
      rather than an empirical, legal, diagnostic, clinical, implementation, or
      PMS Base validation claim. The overlay also does not sexualize the Core
      case merely because consent is mentioned; it only records what PMS-SEX
      would make structurally visible if a concrete sexual instantiation were
      later supplied.
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures A, C, R, E, D as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: >
      The SEX overlay may add visibility for scene framing, inner/outer/public
      layer separation, sexual cost topology, body remainder, publicness,
      path-cost, drift corridors, asymmetry-switch drift, parity-to-exit,
      responsibility-to-authority, adult sexual reciprocity,
      dignity-in-practice constraints, and MIP docking guards. In this case
      those additions remain conditional because the supplied case material
      names consent laundering in general and does not provide a concrete sexual
      scene, body consequence, public circulation, role-position, internal
      framing, outer legibility, exit condition, or sexual cost distribution.
      The overlay must therefore preserve the Core result as the controlling
      pass and may only add overlay-level conditional visibility, not a second
      adjudication of the case. The overlay must not modify the completed PMS
      Core case except where a direct PMS.yaml inconsistency has been separately
      identified.
  pms_v13_conformity:
    status: conformant_overlay
    base_schema_version: PMS_1.3
    canonical_operator_spine: Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    no_direct_adultness_verdict: true
    notes:
    - 'PMS-SEX uses the default PMS repository dependency path as its reference spine for domain-specific application. Reduced formulas are shorthand, not alternative dependency graphs.

      '
    - 'Publicness, outer legibility, pre-reflective readability, path-cost, stabilization burden, body remainder, sexual cost topology, and asymmetry-specific responsibility are overlay/application concepts, not PMS operators.

      '
    - 'Suspended self-binding means Ψ is present as a deliberately suspended attribution condition. It is not absent, replaced, removed, or transformed into a new operator.

      '
    - 'Sexual cost topology is a scene-bound Ω/Θ cost layout. It is not a score, not a person measure, not a dignity measure, and not a maturity measure.

      '
    - 'PMS–EDEN names the regime-level asymmetry switch. PMS-SEX reads its sexual instantiation only where body-, exposure-, reputational-, publicness-, and consequence-asymmetries make the mechanism domain-salient.

      '
    - 'Asymmetry-switch drift, parity-to-exit, and responsibility-to-authority are PMS-SEX drift profiles. They are not person labels, not moral verdicts, not maturity rankings, and not new PMS operators.

      '
    - 'Adult sexual reciprocity is a PMS-SEX viability principle: unequal burdens must not be externalized. It does not require equal burdens, identical role tasks, or symmetry of content.

      '
    - 'Dignity-in-Practice remains the PMS-derived construct with canonical derivation ["Ψ", "Χ", "Ω"]. PMS-SEX adds application-side D-compliance conditions but does not revise PMS-D.

      '
  overlays: {}
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: 'PMS-SEX introduces no PMS operators or dependencies. Its reduced signatures, publicness/documentation overlays, path-cost language, sexual cost topology, EDEN/PFO switch references, asymmetry-switch drift, parity-to-exit, responsibility-to-authority, adult sexual reciprocity, modulators, warning signals, and MIP docking guards remain application-level constructs only.

      '
  validity_gate:
    status: passed
    gate_type: PMS_application_only
    paper_refs:
    - Ch. 0.2
    - Ch. 0.4
    - Ch. 0.9
    - Ch. 21
    - Ch. 22
    - Appendix B
    note: 'This gate constrains PMS application only, not critique, rejection, refusal, revision, or rival formalization.

      '
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: 'Maintained meta-position and stop-capability; no fusion into verdict, urgency, enforcement, person-level attribution, role, impulse, asymmetry activation, parity claim, responsibility claim, or self-justifying rhetoric.

          '
        case_application: Distance is maintained because the SEX overlay does not convert apparent consent, sexual possibility, asymmetry risk, publicness, cost topology, or drift vocabulary into verdict, urgency, enforcement, person-level attribution, role-rank, diagnostic language, or sexualized accusation. The completed Core case remains a reversible PMS projection of a phenomenon-class, and the SEX overlay only records what would become structurally visible if the consent-laundering configuration were instantiated in sexual praxis.
      reversibility:
        id: reversibility
        status: maintained
        meaning: 'Scene-bound, configuration-specific, revisable readings; no global person labels, irreversible interpretive claims, identity verdicts, maturity verdicts, or ontological attributions.

          '
        case_application: Reversibility is preserved by marking the case as not a concrete praxis scene, by treating SEX reduced signatures as shorthand overlays only, by keeping body remainder, publicness, sexual cost topology, asymmetry-switch drift, parity-to-exit, responsibility-to-authority, adult sexual reciprocity, and asymmetry-specific responsibility conditional or not applicable where the case gives no evidence, and by preserving rival readings in which later consent invocation is ordinary, bounded, transparent, or legally valid under criteria outside PMS.
      Dignity_in_Practice_D:
        id: D
        name: Dignity-in-Practice
        status: maintained
        meaning: 'No shaming, humiliation, person-ranking, diagnosis, orientation taxonomy, maturity hierarchy, dignity hierarchy, or person-worth evaluation; critique targets enacted structures and cost handling only.

          '
        case_application: Dignity-in-Practice is preserved as a praxeological application constraint. The overlay does not shame, humiliate, rank persons, diagnose identities, classify orientations, assign maturity levels, or convert sexual cost topology into a person score. Any critique targets only enacted structures and possible cost handling in a scene, not the worth, dignity, identity, orientation, or character of any participant.
    prohibits:
    - sexual_cost_topology_as_score
    - asymmetry_switch_as_authority
    - parity_to_exit_as_reciprocity
    - responsibility_to_authority_as_care
    - operator_profile_as_direct_adultness_verdict
    - outer_legibility_as_public_punishment_license
    - path_cost_as_person_value
    - disturbance_language_as_orientation_taxonomy
    gate_result: valid_as_sex_overlay_application
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    canonical_source_url: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
