  sex_overlay_synthesis:
    primary_sex_reading: >
      PMS-SEX makes visible that, if Consent Laundering were instantiated in
      sexual praxis, the key additional questions would concern inner versus
      outer framing, publicness, sexual cost topology, exit realism,
      asymmetry-switch risk, parity-to-exit, responsibility-to-authority,
      Dignity-in-Practice, and MIP-docking restraint. Because the Core case is a
      philosophical phenomenon-class and not a concrete sexual scene, these SEX
      structures remain overlay requirements, risks, or guardrails rather than
      findings. The overlay's main contribution is therefore negative as well as
      positive: it clarifies what must not be inferred from the Core case. It
      prevents consent-language from becoming automatic sexual-legibility,
      prevents sexual-legibility from becoming diagnosis or accusation, and
      prevents PMS-SEX drift vocabulary from becoming a substitute for scene
      reconstruction.
    scene_frame_result: >
      No bounded sexual scene is present. The frame is a conceptual
      consent-frame in which apparent consent may be invoked later to legitimate
      or obscure acquisition conditions. A concrete SEX application would need
      scene boundaries, participants or role-positions, internal framing, outer
      form, publicness conditions, exit conditions, asymmetry channels, and
      sexual cost distribution. Without those elements, the overlay can only
      identify the form of a possible sexual application: whether apparent
      consent is being used to detach a consent-sign from the conditions,
      burdens, exposures, refusability, or later consequences that would make
      the sexual scene structurally intelligible.
    internal_framing_result: >
      Internal framing is weak and unfilled. The overlay cannot infer whether
      the scene is lived as mutual consent, play, intimacy, non-binding
      autonomy, service, discipline, experimentation, or anything else. It only
      preserves the rule that internal framing would not by itself erase outer
      form or cost topology. Conversely, the absence of internal framing in the
      material also prevents PMS-SEX from claiming bad faith, manipulation,
      coercive intent, denial, immaturity, or hidden desire. Internal framing
      remains a required future input, not a reconstructed fact.
    outer_legibility_result: >
      Outer legibility is weak. The apparent consent-act may become structurally
      readable as a closure or legitimating token, but no sexual outer form,
      exposure pattern, repetition, publicness, or consequence field is supplied.
      No accusation, diagnosis, or person-ranking follows.
    publicness_result: >
      Publicness is weak and overlay-only. Later invocation could in some cases
      document, circulate, expose, or sediment consequences, but the material
      does not establish publicity, media, reputational spread, or public
      amplification. Publicness is not treated as origin, proof, or accusation
      license.
    body_remainder_result: >
      Body remainder is not applicable. The case provides no bodily material
      consequence, embodied exposure, injury, pregnancy, touch, pleasure,
      trauma, visibility, or other body-mediated cost interface. No biological
      taxonomy or bodily inference is made.
    sexual_cost_topology_result: >
      Sexual cost topology is weak as a required future reconstruction and not
      active as a finding. Bodily, temporal, exposure-related, reputational,
      binding-related, exit-related, publicness-related, and
      responsibility-related costs are not supplied. The overlay therefore makes
      no cost score, role blame, maturity rank, dignity rank, or adultness
      verdict.
    asymmetry_temporality_result: >
      Θ is active at the conceptual level because apparent consent is obtained,
      framed, and later invoked. Ω is weak and conditional because no sexual
      role imbalance, body burden, exposure gradient, publicness asymmetry,
      capacity asymmetry, exit asymmetry, or responsibility asymmetry is
      specified.
    distance_integration_binding_result: >
      Χ is active as application discipline and preserves reversibility,
      non-tribunal status, and Dignity-in-Practice. Σ is weak because the case
      does not show integration of consent, conditions, costs, asymmetries, and
      temporal change. Ψ is not applicable as a case structure because no
      self-binding subject, relationship commitment, institutional commitment,
      or deliberate suspension-and-rebinding structure is supplied.
    drift_result: >
      The main PMS-SEX drift risks are Φ narrative inflation, pseudo-symmetry,
      parity-to-exit, asymmetry-switch drift, and cost-topology mismatch. These
      are risks only, not active findings. Responsibility-to-authority, body
      remainder drift, publicness weaponization, and high-risk practice analysis
      are not applicable or absent on the present material.
    switch_drift_result: >
      Asymmetry-switch drift is a risk only. Parity-to-exit is a risk only.
      Responsibility-to-authority is not applicable. No PFO group label,
      ideology claim, authority claim, person label, or moral verdict is made.
    reciprocity_result: >
      Adult sexual reciprocity is not applicable as a finding because no adult
      sexual scene or unequal burden distribution is provided. The principle
      remains available only as a future viability criterion: unequal burdens
      must not be externalized.
    dignity_result: >
      Dignity-in-Practice is preserved. The overlay treats D as a
      praxeological application constraint derived from PMS, not ontological
      dignity, moral superiority, sexual normality, maturity rank, or person
      worth. It forbids humiliation, shaming, diagnosis, person-ranking,
      identity verdicts, and orientation taxonomy.
    mip_docking_result: >
      MIP docking is not triggered. PMS-SEX records only an operator profile and
      conditional drift risks. It does not issue adultness, maturity, dignity,
      moral, legal, clinical, or person-status judgments.
    non_capture_result: >
      Non-capture remains open for subjective consent experience, embodied and
      relational meaning, legal validity, moral legitimacy, cultural and
      institutional readings, trauma-informed accounts, queer and feminist
      theory, discourse-theoretic accounts, and ordinary non-laundering
      interpretations in which later consent invocation remains transparent,
      bounded, and frame-continuous.
    final_sex_formula_or_signature: >
      Case-specific SEX overlay signature:
      MF_9_2(Recontextualization) + MF_7_2(Non-Event) + MF_10_2(Distance)
      with weak MF_4_2(Sexual Cost Topology / Ω-Θ layout), risk-only
      EDEN/PFO sexual-instantiation signature, and D_pms_sex_application_formula
      as application guard. Reduced signature status: shorthand only; PMS Base
      operator order and dependencies remain Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ →
      Χ → Σ → Ψ.
    final_claim_boundary: >
      This SEX overlay adds visibility for sexual praxis as scene-bound
      structure, internal/outer/public layer separation, sexual cost topology,
      body remainder, publicness, path-cost, drift corridors, asymmetry-switch
      drift, parity-to-exit, responsibility-to-authority, adult sexual
