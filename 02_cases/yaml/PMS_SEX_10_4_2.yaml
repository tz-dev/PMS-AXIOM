        applicability: risk
        structural_result: >
          Asymmetry no longer reopens coordination; it replaces coordination.
          The scene preserves parity language while distributing costs
          asymmetrically.
        eden_pfo_note: >
          Asymmetry-switch drift names the sexual instantiation of the EDEN/PFO
          switch: asymmetry is activated under real or invoked Ω/Θ pressure
          without being marked, bounded, and re-bound into Σ/Ψ.
        case_application: >
          Asymmetry-switch drift is a risk, not a finding. Consent laundering
          could instantiate the switch where parity is claimed for consent,
          access, or non-binding freedom while asymmetry is activated for
          protection, exposure, cost, or responsibility. The case provides no
          role-positions, costs, or switch evidence, and PFO is not treated as a
          group label, ideology claim, or authority claim.
      parity_to_exit_drift:
        applicability: risk
        structural_result: >
          Parity ceases to bind reciprocity and becomes an exit from
          responsibility. The frame remains rhetorically equal while unequal
          Ω/Θ costs remain uncoordinated.
        case_application: >
          Parity-to-exit is a risk. Apparent consent can become equality
          language that exits inquiry: it was mutual, therefore no further
          responsibility is owed. PMS-SEX does not treat mutuality as false by
          default; it only requires that parity language not bypass unequal cost
          topology where such costs are shown. No such concrete topology is
          supplied.
      responsibility_to_authority_drift:
        applicability: not_applicable
        structural_result: >
          Responsibility stops functioning as Ψ/Χ self-binding and becomes
          authority over the other role-position or over the frame.
        guard: >
          Responsibility-to-authority is not the recognition of asymmetry. It is
          the mistranslation of required restraint into entitlement.
        case_application: >
          Responsibility-to-authority is not applicable. The Core case does not
          describe a role converting care, protection, responsibility, or
          restraint into control, paternalistic authority, frame ownership, or
          entitlement to define another participant.

    dynamic_chains_ch18_4:
      primary_chain:
        applicability: risk
        raw: "Ψ leak → Ω escalation → Χ loss → Α fixation → Θ overload → exit collapse"
        reading: >
          Binding leaks into a frame that claims suspension; asymmetry
          escalates; distance collapses; scripts fixate; time overloads the
          configuration; exit ceases to function as low-cost correction.
        case_application: >
          The primary chain is a risk only. The conceptual case could become
          this chain if apparent consent silently binds future meaning, amplifies
          asymmetry, disables distance, stabilizes into script, accumulates
          temporal cost, and collapses exit. The present material does not
          evidence these steps and therefore cannot activate the chain.
      secondary_chain:
        applicability: risk
        raw: "outer-form denial → publicness confusion → Φ inflation → Σ bypass → D risk"
        reading: >
          The scene cannot re-read its enacted form; publicness is misread as
          origin or nothing; recontextualization inflates; integration is
          bypassed; Dignity-in-Practice becomes fragile.
        case_application: >
          The secondary chain is a risk because Consent Laundering is centrally
          Φ-sensitive: later recontextualization may inflate while Σ is bypassed.
          Publicness and outer form are not supplied, so the chain remains only
          a structural warning against allowing a coherent consent narrative to
          erase scene readability, cost distribution, or Dignity-in-Practice.
      eden_pfo_sexual_drift_chain:
        applicability: risk
        raw: "real/invoked Ω/Θ pressure → asymmetry activation → unmarked/unbounded/unrebound activation → parity-to-exit or responsibility-to-authority → cost-topology mismatch"
        reading: >
          Sexual asymmetry activation becomes drift where it is not marked,
          bounded, and re-bound into Σ/Ψ. Parity may become responsibility-exit;
          responsibility may become authority; the cost topology no longer
          matches the declared frame.
        case_application: >
          The EDEN/PFO sexual drift chain is a risk marker only. Consent
          laundering could become this chain if Ω/Θ pressure is activated by
          sexual cost distribution and then routed through parity-to-exit or
          responsibility-to-authority. The case does not establish real or
          invoked sexual Ω/Θ pressure, so the chain is not active.
      compact_triads:
        sexual_drift_triad:
          applicability: risk
          raw: "asymmetry-switch drift → parity-to-exit and/or responsibility-to-authority → cost-topology mismatch"
          case_application: >
            The sexual drift triad is only a risk. The most plausible risk
            profile for this case is asymmetry-switch drift plus parity-to-exit:
            apparent consent could preserve a mutuality surface while obscuring
            cost distribution. Responsibility-to-authority is not evidenced.

