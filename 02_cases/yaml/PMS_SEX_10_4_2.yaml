    configuration_scope:
      note: >
        PMS-SEX does not claim isomorphism across all sexual configurations.
        Identical practice labels do not imply identical structure. Internal
        framing does not settle outer form. Public discourse does not exhaust
        scene legibility. Cost topology must be reconstructed scene by scene.
      case_application: >
        The configuration scope is conceptual and not scene-bound. Consent
        Laundering may have sexual instantiations, but the supplied case does
        not identify practice labels, scene boundaries, internal framing, outer
        form, public discourse, or cost topology. PMS-SEX therefore remains an
        overlay lens rather than a completed sexual praxis analysis.
    psychology_scope:
      note: >
        Psychology is subordinated, not denied. It may refine a reading only
        after structural reconstruction via Δ–Ψ, cost layout, outer legibility,
        sexual cost topology, and publicness overlays have already been
        reconstructed.
      forbidden_uses:
        - "bypassing Ω accounting"
        - "dissolving Θ irreversibility"
        - "personalizing what remains structurally induced"
        - "erasing outer form with inner narrative"
        - "converting drift into diagnosis"
        - "converting path-cost into identity rank"
        - "converting asymmetry-switch drift into person essence"
        - "converting parity-to-exit into global role blame"
        - "converting responsibility-to-authority into character diagnosis"
        - "short-circuiting Χ and reversibility"
      case_application: >
        Psychology remains out of scope. No motive, desire, personality,
        orientation, developmental history, trauma history, pathology, or
        clinical claim is inferred. Psychology could be a rival or refining lens
        only after scene reconstruction, and even then not as a replacement for
        Ω, Θ, Χ, Σ, Ψ, cost topology, or D discipline.
    non_capture_openness:
      status: "kept_open"
      note: >
        PMS-SEX does not assume that every sexually marked configuration can be
        fully rendered without remainder in its own grammar.
      guard: >
        Translation into PMS terms does not prove exhaustive capture, and
        refusal of PMS terms does not automatically indicate denial,
        immaturity, pathology, or drift.
      case_application: >
        Non-capture remains open for subjective consent experience, embodied
        meaning, legal validity, moral legitimacy, cultural readings of
        sexuality, relational context, trauma-informed accounts, discourse
        ethics, feminist or queer theoretical accounts, and ordinary
        non-laundering readings where later consent invocation remains
        transparent and bounded.
    explicit_exclusions:
      - "no how-to guidance"
      - "no risk-management manual"
      - "no therapeutic, clinical, medical, or forensic authority"
      - "no optimization logic for desire, bonding, or satisfaction"
      - "no taxonomy of sexual identities or orientations"
