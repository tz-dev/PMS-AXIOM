        applicability: risk
        structural_result: >
          Ψ(binding) becomes operative although suspension is asserted;
          attribution is silently demanded while the frame cannot carry binding
          explicitly.
        typical_indicators:
          - "implicit expectations"
          - "meaning claims without explicit frame legibility"
          - "local enactments treated as identity proofs"
          - "non-binding language used to avoid naming accumulated responsibility"
        case_application: >
