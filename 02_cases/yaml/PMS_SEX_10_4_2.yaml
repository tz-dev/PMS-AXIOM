      - Χ
    dependency_hygiene_note: 'Reduced signatures may foreground a cluster such as Ω → Θ, Λ → Α → Ω → Θ, or Ω/Θ → Χ/Σ/Ψ re-binding. Such foregrounding does not suspend, bypass, or reorder PMS dependencies. Any use of Χ in a reduced signature presupposes Φ, Θ, and □. Any use of Ψ presupposes Σ, Θ, and Χ.

      '
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  references:
    pms_github: https://github.com/tz-dev/Praxeological-Meta-Structure-Theory
    pms_yaml_raw: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
    mip_github: https://github.com/tz-dev/Maturity-in-Practice
    pms_eden_github: https://github.com/tz-dev/PMS-EDEN
    pms_sex_github: https://github.com/tz-dev/PMS-SEX
  sex_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic, non-therapeutic.
    - No person-level judgment, no person-ranking, no orientation taxonomy, no identity verdict.
    - No maturity hierarchy, dignity hierarchy, humiliation, or moral pathology.
    - No direct adultness verdict; maturity-relevant evaluation belongs only to explicit downstream MIP docking.
    - No how-to guidance, no risk-management manual, no optimization logic, no legal or forensic authority.
    - Sexual cost topology is scene-bound cost layout, not score or ranking.
    - Outer legibility is not public-punishment license.
    - Internal framing is real but not total.
    - Publicness is overlay, not necessary origin of consequence.
    - Asymmetry-switch drift, parity-to-exit, and responsibility-to-authority are configuration markers, not person labels.
    may_add_visibility_to:
    - sexuality as recurring praxis pressure
    - scene/frame grammar
    - internal framing
    - outer legibility
    - pre-reflective scene readability
    - publicness as □ extension
    - path-cost / stabilization burden
    - body as non-operator remainder
    - sexual cost topology
    - EDEN/PFO asymmetry-switch sexual instantiation
    - asymmetry-switch drift
    - parity-to-exit
    - responsibility-to-authority
    - adult sexual reciprocity
    - asymmetry-specific responsibility
    - cost-topology mismatch
    - functional minimum conditions
    - warning signals
    - minimal psychology adapter
    - Dignity-in-Practice module
    - MIP docking guards
    must_not_do:
    - treat sexuality as person essence
    - treat structural readability as diagnosis
    - treat path-cost as person value
    - treat sexual cost topology as maturity or dignity score
    - treat body remainder as biological taxonomy
    - treat publicness as accusation license
    - treat asymmetry activation as automatic drift
    - treat parity as automatic reciprocity
    - treat responsibility as authority
    - treat operator profile as adultness verdict
    - claim PMS Base validation
  overlay_concepts:
    note: 'Overlay concepts are application-level only. They are not PMS operators, not diagnoses, not person labels, and not moral verdicts.

      '
    internal_framing:
      name: Internal Framing
      is_operator: false
      applicability: weak
      definition: 'How a scene is inhabited, narrated, or lived from within the configuration: as play, service, devotion, experimentation, intimacy, kink, discipline, restraint, authenticity, casualness, non-binding practice, or otherwise.

        '
      guard: 'Internal framing may shape experience but does not by itself determine or erase outer structural form, sexual cost topology, or Ω/Θ consequence distribution.

        '
      case_application: Internal framing is weakly relevant because a consent-laundering configuration may be inhabited or narrated from within as mutual consent, play, autonomy, agreement, non-binding practice, ordinary permission, or shared understanding. In the present Core case, however, no sexual scene or internal participant account is supplied. The overlay therefore cannot infer desire, authenticity, motive, subjective consent, coercion, bad faith, or inner meaning; it can only note that internal framing would have to be compared with outer structural form and cost distribution in any concrete sexual instantiation.
    outer_legibility:
      name: Outer Legibility
      is_operator: false
      applicability: weak
      definition: 'The structurally readable action-form a scene presents under visible asymmetry, exposure, markedness, repetition, and consequence, independent of whether internal framing confirms or contests that readability.

        '
      guard: 'Naming outer legibility does not imply person-ranking, diagnosis, moral verdict, denial of consent, public-punishment license, or total interpretation of the scene.

        '
      case_application: Outer legibility is weakly relevant because the apparent consent-act may become structurally readable from outside as a legitimating token that closes inquiry into acquisition conditions. In a sexual instantiation, outer legibility would ask what the scene presents under visible asymmetry, exposure, repetition, and consequence. The Core case does not supply such visible sexual form, so outer legibility remains a conditional overlay question rather than a finding.
    pre_reflective_readability:
      name: Pre-Reflective Scene Readability
      is_operator: false
      applicability: weak
      definition: 'Early or immediate scene-legibility of certain marked configurations before elaborate internal translation or justificatory narration.

        '
      guard: 'This is a structural readability claim, not a psychology thesis, not a theory of innocence, and not a license for person-ranking.

        '
      case_application: 'Pre-reflective scene readability is weakly relevant only at the level of a general warning: consent-language can sometimes make a configuration appear immediately settled before its conditions are examined. PMS-SEX must not treat that immediate readability as proof of consent laundering, invalidity, coercion, person fault, or sexual diagnosis. No concrete scene is provided from which a pre-reflective sexual readability claim could be made.'
    publicness_as_overlay:
      name: Publicness as Overlay
      is_operator: false
      pms_layer: □ extension
      applicability: weak
      primarily_intensifies:
      - Ω
      - Θ
      interacts_with:
      - □
      - Α
      - Λ
      - Φ
      definition: 'Publicness as a frame-extension that distributes, amplifies, documents, repeats, or sedimentizes a scene’s readability and consequences without necessarily generating the scene’s primary form in the first place.

        '
      guard: 'Publicness is neither always the origin nor automatically irrelevant. It modifies the consequence field and can harden cost topology without replacing scene reconstruction.

        '
      case_application: Publicness is weak because the Core case mentions later invocation but does not say whether the consent-act is circulated, documented, institutionalized, exposed, or publicly sedimented. In a sexual instantiation, publicness could amplify reputational, exposure-related, and temporal costs; here it remains an unfulfilled overlay possibility, not the origin of the structure and not a license for public accusation.
    path_cost_language:
      name: Path-Cost / Stabilization Burden
      is_operator: false
      applicability: weak
      definition: 'Configuration-level language for the operator-work required to keep a configuration coherent, reversible, non-coercive, and dignity-preserving under recurrence and temporality.

        '
      guard: 'Path-cost, disturbance, entropy, deviation, and stabilization burden do not classify persons, diagnose identities, rank orientations, lower dignity, rank maturity, or authorize moral pathology.

        '
      case_application: Path-cost language is weakly useful as configuration language. A consent-laundering structure would require additional Χ, Σ, and possibly Ψ work to keep consent, conditions, scope, absences, asymmetries, and later invocation coherent without externalizing costs. Because no concrete sexual practice or recurring pattern is supplied, the overlay records only a stabilization burden that would need evidence before becoming an applied path-cost claim.
    body_remainder:
      name: Body as Non-Operator Remainder
      is_operator: false
      applicability: not_applicable
      paper_refs:
      - Ch. 13
      definition: 'The body is treated as a material remainder or consequence interface that forces visibility, irreversibility, and cost recognition without becoming a new PMS operator.

        '
      guard: 'Body remainder is not a person-ranking device and not a biological taxonomy. It names material consequence capacity within configurations.

        '
      case_application: Body remainder is not applicable on the supplied material. The Core case does not describe bodily exposure, touch, risk, irreversibility, pregnancy, injury, visibility, trauma, pleasure, embodiment, or any material consequence interface. PMS-SEX therefore must not infer bodily cost or biological taxonomy from the abstract concept of consent laundering.
    sexual_cost_topology:
      name: Sexual Cost Topology
      is_operator: false
      claim_type: DOMAIN_INSTANTIATION
      applicability: weak
      not_a_score: true
      no_person_ranking: true
      no_dignity_ranking: true
      no_maturity_ranking: true
      definition: 'Scene-bound distribution of bodily, temporal, exposure-related, reputational, binding-related, exit-related, publicness-related, and responsibility-related costs across sexual role-positions.

        '
      function: 'Sexual cost topology asks which costs attach where, which costs are non-delegable, which can be externalized, which sediment under Θ, who can invoke asymmetry as exception, who can invoke parity as exit, and who can convert responsibility into authority.

        '
      dimensions:
        bodily_non_delegability:
          operators:
          - Ω
          - Θ
          case_application: No bodily or material non-delegability is established. If a sexual scene were supplied, this field would ask which bodily consequences cannot be delegated or rhetorically neutralized by later consent invocation; here that question remains open and non-evidenced.
        exposure_and_publicness:
          operators:
          - Ω
          - Θ
          - □
          case_application: Exposure and publicness costs are not specified. The only overlay-relevant possibility is that later invocation of apparent consent could document, circulate, or harden exposure costs in a sexual case, but the present material does not show such distribution.
        reputational_sedimentation:
          operators:
          - Ω
          - Θ
          - Φ
          case_application: Reputational sedimentation is not evidenced. A sexual instantiation could make later consent invocation recontextualize reputation, credibility, shame, or social readability; the abstract Core case does not establish this.
        exit_cost:
          operators:
          - Ω
          - Θ
          - Χ
          case_application: Exit, refusal, pause, recovery, or rereading costs are not specified. The Core case asks whether consent later closes scrutiny, but it does not show who can exit, revise, refuse, pause, or recover at what cost.
        responsibility_externalizability:
          operators:
          - Ω
          - Ψ
          - Χ
          case_application: Responsibility externalization is a risk only. The phrase consent laundering suggests that responsibility for acquisition conditions may be shifted away by invoking apparent consent, but no sexual role-position or self-binding structure is supplied.
        frame_control_capacity:
          operators:
          - □
          - Φ
          - Ψ
          case_application: Frame-control capacity is conceptually relevant but not evidenced. The overlay asks who can define the scene as consensual, redefine its scope, close inquiry, or govern later meaning; the Core case supplies no actor, institution, or concrete frame owner.
        asymmetry_activation_capacity:
          operators:
          - Ω
          - Φ
          - Ψ
          case_application: Asymmetry activation capacity is weak and conditional. If a participant can activate autonomy or parity to justify access while activating asymmetry to avoid cost or responsibility, SEX drift analysis would matter; the Core case does not evidence that switch.
      guard: 'PMS-SEX does not claim equal costs. It requires that unequal costs not be externalized. Sexual cost topology must never become a person score, dignity ranking, maturity ranking, or role-blame totalization.

        '
      case_application: Sexual cost topology is weak as an overlay, not active as a finding. The Core case is not explicitly sexual and provides no bodily, exposure-related, reputational, binding-related, exit-related, publicness-related, or responsibility-related cost distribution. If consent laundering were instantiated in sexual praxis, SEX would ask whether apparent consent is used to externalize unequal costs or close inquiry into non-delegable consequences. On the present material, cost topology remains a conditional scene-reconstruction requirement, not a score, ranking, or proof of drift.
    eden_pfo_asymmetry_switch:
      name: EDEN/PFO Asymmetry Switch
      is_operator: false
      claim_type: CROSS_DOMAIN_REFERENCE
      source_model: PMS-EDEN
      applicability: risk
      definition: 'Cross-domain reference to PMS–EDEN. In PMS-SEX, the term names the sexual instantiation of a regime-level drift: parity is claimed for autonomy, status, access, or non-binding freedom, while asymmetry is activated for protection, cost, exposure, or responsibility.

        '
      legitimate_when:
      - marked
      - bounded
      - emergency_bound_or_structurally_necessary
      - linked_to_real_omega_theta_burden
      - re_bound_into_sigma_psi
      drifting_when:
      - unmarked
      - repeatable
      - responsibility_shifting
      - sigma_coordination_absent_or_failed
      - psi_re_binding_absent_or_failed
      guard: 'PMS-SEX does not derive its sexual grammar from PMS-EDEN. It reads the sexual instantiation of a mechanism defined there. The switch is not a new PMS operator and not an authority claim.

        '
      case_application: EDEN/PFO switch logic is relevant only as a risk. Consent laundering can resemble a switch where parity or autonomy is invoked to secure non-binding freedom or legitimacy, while asymmetry is later activated to distribute protection, exposure, cost, or responsibility in one direction. The present case does not establish this mechanism, and PFO is not treated as a group label, ideology claim, person label, or authority claim.
    asymmetry_switch_drift:
      name: Asymmetry-Switch Drift
      is_operator: false
      claim_type: DRIFT_PROFILE
      applicability: risk
      definition: 'A drift pattern in which asymmetry is activated under real or invoked Ω/Θ pressure without being marked, bounded, and re-bound into Σ/Ψ. In PMS-SEX this is the sexual instantiation of the EDEN/PFO switch.

        '
      becomes_dysfunctional_where:
      - activation_used_as_repeatable_leverage
      - responsibility_displacement_present
      - unacknowledged_psi_externalization_present
      - parity_surface_preserved_while_costs_distribute_asymmetrically
      guard: 'Names a scene-level drift profile only. It is not a person label, not a motive claim, not a maturity verdict, and not a moral accusation.

        '
      case_application: Asymmetry-switch drift is a risk, not a finding. It would appear if apparent consent created a parity surface while unmarked Ω/Θ costs were activated, displaced, or shielded from Σ/Ψ re-binding. The Core case lacks the scene evidence required to say that such drift occurred.
    parity_to_exit:
      name: Parity-to-Exit
      is_operator: false
      claim_type: DRIFT_PROFILE
      applicability: risk
      definition: 'A drift pattern in which parity rhetoric is used to deny additional responsibility under unequal sexual cost topology.

        '
      typical_forms:
      - it_was_mutual
      - we_are_equal
      - no_one_owes_anything
      - the_other_is_autonomous
      - it_was_only_casual
      guard: 'Parity-to-exit names equality-language functioning as responsibility displacement. It is not a person essence claim and not a denial of autonomy or consent as frame conditions.

        '
      case_application: 'Parity-to-exit is a risk because consent-language can function as equality-language: it was mutual, no one owes anything, the other was autonomous. In this case, however, the material does not supply explicit parity rhetoric or unequal sexual cost topology. The overlay therefore records a possible drift profile without denying consent, autonomy, or ordinary mutuality.'
    responsibility_to_authority:
      name: Responsibility-to-Authority
      is_operator: false
      claim_type: DRIFT_PROFILE
      applicability: not_applicable
      definition: 'A drift pattern in which required self-binding under asymmetry is converted into control, frame authority, protection entitlement, or paternalistic governance.

        '
      typical_forms:
      - care_becomes_control
      - protection_becomes_governance
      - responsibility_becomes_frame_ownership
      - restraint_becomes_entitlement_to_define_the_other
      guard: 'Responsibility-to-authority is the mistranslation of required restraint into entitlement. Greater responsibility under asymmetry does not generate a right to control.

        '
      case_application: Responsibility-to-authority is not applicable on the present material. No role-position is described as converting care, protection, or responsibility into control, frame ownership, paternalistic governance, or entitlement to define another person. If such a structure were later supplied, it would have to be analyzed as scene-level drift, not as a person essence claim.
    adult_sexual_reciprocity:
      name: Adult Sexual Reciprocity
      is_operator: false
      claim_type: VIABILITY_PRINCIPLE
      applicability: not_applicable
      principle: unequal burdens must not be externalized
      not_required:
      - equal_burdens
      - identical_role_tasks
      - symmetry_of_content
      required:
      - explicit_cost_topology
      - marked_asymmetry_activation
      - bounded_asymmetry_activation
      - no_unmarked_exception_lever
