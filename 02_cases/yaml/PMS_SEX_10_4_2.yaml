  modulators:
    note: >
      Modulators are praxeological, not psychological. They are non-operator
      weightings: types without typing.
    basic_rule_ch14_2: >
      A modulator is best read as a weighting that makes a particular operator
      chain pull faster or more persistently in a configuration, without typing
      persons or explaining inner causes.
    minimal_formula_ch14_3: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    central_modulators_ch14_4:
      early_framing_box0:
        source_label: "14.4.1 □₀ Early framing"
        status: weak
        effect: >
          Weights how later frames can be set and maintained, including
          speakability, boundary clarity, internal naming, outer-form
          accountability, and whether cost topology can be named without
          moralization.
        case_application: >
          Early framing weakly weights the case because consent laundering
          depends on how the original consent-frame was set, named, and made
          speakable. No concrete early sexual frame is provided, so this remains
          a reconstruction requirement.
      omega0_asymmetry_calibration:
        source_label: "14.4.2 Ω₀ Asymmetry calibration"
        status: weak
        effect: >
          Weights how asymmetry is noticed, named, regulated, and re-bound,
          including bodily, reputational, exposure-related, publicness-related,
          exit-related, and responsibility-related cost topology.
        case_application: >
          Ω₀ calibration weakly weights the case because possible asymmetry is a
          major PMS Core calibration point. The overlay cannot determine whether
          asymmetry was noticed, denied, moralized, regulated, or re-bound
          without scene evidence.
      lambda_density:
        source_label: "14.4.3 Λ density"
        status: weak
        effect: >
          Weights how often non-occurrence becomes structurally active:
          withdrawal, rejection, hesitation, cancellation, indeterminacy,
          chronic mismatch, or non-clarification of cost topology.
        case_application: >
          Λ density weakly weights the case because the concept of laundering
          involves possible omitted or obscured conditions. Density, recurrence,
          and chronic non-clarification are not evidenced.
      theta_stability:
        source_label: "14.4.4 Θ stability"
        status: active
        effect: >
          Weights how sequences connect over time, including continuity,
          repeatability, commitment, publicness/documentation sedimentation, and
          whether non-binding language hides accumulated Ω/Θ consequences.
        case_application: >
          Θ stability is active at the conceptual level because the case
          explicitly connects consent acquisition, framing, and later invocation.
          It is not active as a sexual consequence finding because no sexual
          sedimentation, repeatability, or commitment trajectory is supplied.
      phi_habituation:
        source_label: "14.4.5 Φ habituation"
        status: weak
        effect: >
          Weights how often tension is handled by re-framing, narrative repair,
          switching of what the scene “really was,” erasure of outer form, or
          conversion of responsibility into authority / equality into exit.
        case_application: >
          Φ habituation weakly weights the case because recontextualization is
          central to consent laundering. Habituation is not shown; the case
          provides no repeated narrative repair, scene-switching, or stabilized
          reinterpretive habit.
      chi_mode:
        source_label: "14.4.6 Χ mode"
        status: active
        effect: >
          Weights what distance does in practice: protection, control,
          devaluation, meta-capacity, outer-form awareness, switch
          clarification, and whether asymmetry activation can be paused, named,
          and re-bound.
        case_application: >
          Χ mode is active as application discipline. Distance functions as
          restraint, meta-capacity, and anti-verdict discipline. It does not
          become control, devaluation, public accusation, or authority over the
          scene.
      publicness_media_modulators:
        source_label: "14.4.7 Publicness / media modulators"
        status: weak
        effect: >
          Publicness and media modulators function as □ frame extensions, not
          causes. They weight visibility, documentation, comparison pressure,
          reputational stakes, circulation, sedimentation, and reputational
          after-costs.
        case_application: >
          Publicness/media modulation is weak. Later invocation may involve
          documentation or social circulation in some cases, but the Core case
          does not specify publicity, media, reputational spread, or
          sedimentation.
      cost_topology_modulators:
        source_label: "14.4.8 Cost-topology modulators"
        status: weak
        effect: >
          Weights how costs attach to role-positions before and after enactment:
          bodily non-delegability, exposure and publicness, reputational
          sedimentation, exit cost, responsibility externalizability,
          frame-control capacity, and asymmetry activation capacity.
        case_application: >
          Cost-topology modulation is weak. It identifies what would need to be
          reconstructed in a sexual scene, but the supplied material gives no
          role-position or cost-channel data.
    interplay_ch14_5:
      status: weak
      typical_configuration_patterns:
        - "Λ-dense + Χ-weak + Θ-fragmented: brittle stabilization."
        - "Ω₀ blurred + □ unstable: pseudo-symmetry."
        - "Φ-high + Σ-weak: narrative inflation."
        - "internal-label capture + publicness confusion."
        - "sexual cost topology unequal + parity rhetoric dominant: parity-to-exit risk."
        - "real Ω/Θ burden + weak Χ/Σ/Ψ re-binding: asymmetry-switch drift risk."
        - "responsibility recognized + frame-control capacity high: responsibility-to-authority risk."
      note: "These patterns are legibility shortcuts, not predictions about persons."
      case_application: >
        The most relevant interplay pattern is Φ-high + Σ-weak: a later consent
        narrative may inflate while integration of conditions remains weak. A
        second weak pattern is Ω₀ blurred + □ unstable, because consent framing
