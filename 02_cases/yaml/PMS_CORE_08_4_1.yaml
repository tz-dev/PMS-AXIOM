operator_analysis:
  Δ:
    name: Difference
    pms_role: Structural differentiator; marks difference without yet supplying action, evaluation, or maturity.
    status_within_pms: foundational_operator
    provides_fields:
    - difference
    - distinction
    - deviation
    - contrast
    - minimal rupture
    examples_within_pms:
    - difference_between_conditions
    - error_signal
    - contrastive_salience
    dependencies:
      requires: []
      enables:
      - ∇
      - □
      - Λ
    role_in_case: Difference is active because the case depends on distinctions between micro and macro scale, interpersonal/local and institutional/public/systemic frames, immediate and extended consequences, and local critique versus wider critique reach.
    analytic_weight: major
    calibration_points:
    - The primary distinctions are micro versus macro scale, local/interpersonal versus institutional/public/systemic frame, and immediate versus temporally extended critique reach.
    - The analysis must avoid turning micro/macro into a fixed binary; both are scale-relative and may overlap.
    falsifier_conditions:
    - If the case cannot sustain any distinction between local and wider critique reach, Δ loses its entry point and the PMS reading becomes under-specified.
  ∇:
    name: Impulse
    pms_role: Activation, tension, drive, inclination, pressure, directionality.
    status_within_pms: foundational_operator_dependent_on_difference
    provides_fields:
    - activation
    - directedness
    - tension
    - incipient movement
    - response pressure
    examples_within_pms:
    - impulse_to_act
    - pressure_to_interpret
    - motivation_signal
    dependencies:
      requires:
      - Δ
      enables:
      - □
      - Α
      - Θ
    role_in_case: 'Impulse is weak-to-active as the structural directedness of critique: objection, challenge, correction, exposure, clarification, resistance, or reframing. The material does not warrant psychologizing this as anger, desire, resentment, courage, or moral purity.'
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - The tension is argumentative and structural rather than clinical or psychological.
    - No subjective desire or affective state is inferred because the case material gives only a philosophical description of critique reach.
    falsifier_conditions:
    - If no directional critical tension follows from the scale distinction, ∇ must be marked under-specified rather than active.
  □:
    name: Frame
    pms_role: Boundary and context of relevance; determines what counts as meaningful within a situated structure.
    status_within_pms: context_operator
    provides_fields:
    - boundary
    - context
    - relevance_conditions
    - role_space
    - interpretation_frame
    examples_within_pms:
    - task_context
    - social_role
    - institutional_scene
    dependencies:
      requires:
      - Δ
      - ∇
      enables:
      - Λ
      - Α
      - Ω
      - Θ
    role_in_case: Frame is strongly active because the case is about critique changing when it moves from interpersonal/local frames into institutional, public, or systemic frames. Frame determines what counts as relevant object, audience, evidence, response, and reach.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frames are micro interpersonal/local critique and macro institutional/public/systemic critique.
    - The frame shift must be explicitly marked as a scale transition rather than treated as automatic improvement or degeneration.
    falsifier_conditions:
    - If no frame shift is specified or inferable, the reading becomes too abstract to discriminate critique reach from ordinary critique.
  Λ:
    name: Non-Event
    pms_role: Structured absence, omission, delay, silence, unrealized expectation.
    status_within_pms: absence_operator
    provides_fields:
    - absence
    - omission
    - delay
    - silence
    - unrealized possibility
    examples_within_pms:
    - missing_response
    - delayed_action
    - absent_confirmation
    dependencies:
      requires:
      - Δ
      - □
      enables:
      - Α
      - Ω
      - Θ
    role_in_case: Non-Event is conditionally relevant where critique is structured by meaningful absence, such as silence, non-recognition, delayed response, missing uptake, absent repair, or omitted institutional answer. The case material does not itself establish any concrete absence.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - A Λ claim would require specifying the expected response, uptake, repair, or recognition and the frame in which its absence matters.
    - Absence, silence, resistance, or non-fit may indicate PMS non-capture or rival framing rather than case defect or drift.
    falsifier_conditions:
    - If no structured expectation exists in a concrete application, Λ should remain weak or not active.
  Α:
    name: Attractor
    pms_role: Stabilizing pattern, recurrence, basin, habit, trajectory tendency.
    status_within_pms: pattern_operator
    provides_fields:
    - recurrence
    - stabilization
    - path_dependence
    - basin
    - pattern formation
    examples_within_pms:
    - habit_loop
    - institutional_pattern
    - repeated_strategy
    dependencies:
      requires:
      - Λ
      - □
      - ∇
      enables:
      - Ω
      - Θ
      - Φ
    role_in_case: Attractor is conditionally relevant where critique or its object stabilizes into recurrence, routine, pattern, discourse script, institutional procedure, or public circulation. The abstract case suggests possible stabilization but does not prove it.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Recurrence must be demonstrated by repeated critique forms, institutional routines, public discourse patterns, or stabilized complaint pathways.
    - A stable attractor must be distinguished from one-time scale expansion or accidental aggregation.
    falsifier_conditions:
    - If recurrence or stabilization is not shown, Α is over-read and should remain weak.
  Ω:
    name: Asymmetry
    pms_role: Unequal distribution of power, exposure, vulnerability, capacity, or obligation.
    status_within_pms: asymmetry_operator
    provides_fields:
    - power_difference
    - exposure
    - vulnerability
    - responsibility_gradient
    - directional imbalance
    examples_within_pms:
    - teacher_student_asymmetry
    - expert_novice_relation
    - institutional_power
    dependencies:
      requires:
      - Α
      - □
      - Λ
      enables:
      - Θ
      - Φ
      - Χ
      - Ψ
    role_in_case: Asymmetry is strongly active because critique reach changes with power, exposure, vulnerability, role, capacity, publicness, institutional force, speaker/audience relation, and obligation. Macro critique may reveal asymmetry and may also generate new asymmetries.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'The direction and kind of asymmetry must be specified for each scale: local vulnerability or role-dependence at micro scale; institutional, public, procedural, discursive, or systemic imbalance at macro scale.'
    - Asymmetry is not moralized by default and does not automatically identify victims, culprits, maturity failure, or drift.
    - Ω must remain weak where a specific case gives no directional imbalance.
    falsifier_conditions:
    - If no directional imbalance of power, exposure, capacity, vulnerability, or obligation is identifiable, Ω claims must be removed or marked weak.
  Θ:
    name: Temporality
    pms_role: Time, sequence, delay, trajectory, development, anticipation, persistence.
    status_within_pms: temporal_operator
    provides_fields:
    - sequence
    - duration
    - delay
    - anticipation
    - trajectory
    - history
    examples_within_pms:
    - delayed_feedback
    - long_term_commitment
    - developmental_arc
    dependencies:
      requires:
      - Ω
      - Α
      - □
      enables:
      - Φ
      - Χ
      - Σ
      - Ψ
    role_in_case: Temporality is strongly active because critique reach changes with sequence, delay, recurrence, history, institutional memory, public circulation, future consequence, and longer accountability trajectories.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis must distinguish a diachronic scale trajectory from a static comparison of micro and macro frames.
    - Temporality is essential where critique moves from immediate local correction toward extended institutional, public, or systemic consequence.
    falsifier_conditions:
    - If the case can be fully described without temporal extension, Θ is overextended.
  Φ:
    name: Recontextualization
    pms_role: Shifting meaning under changed frame, scale, relation, or context.
    status_within_pms: recontextualization_operator
    provides_fields:
    - context_shift
    - reinterpretation
    - transfer_across_frames
    - transformation_of_meaning
    examples_within_pms:
    - reinterpretation_after_new_information
    - role_shift
    - norm_transfer
    dependencies:
      requires:
      - Θ
      - Ω
      - □
      enables:
      - Χ
      - Σ
      - Ψ
    role_in_case: Recontextualization is central. The case concerns how a critical structure changes when placed from a micro frame into institutional, public, or systemic frames, and possibly how macro framing returns to reshape local meaning. Φ is not treated as automatic clarification; it may illuminate hidden structure, overgeneralize local material, flatten specificity, enlarge responsibility, redistribute visibility, or create new exposure.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The source frame is interpersonal/local critique; target frames are institutional, public, and systemic critique.
    - Recontextualization must be tested for whether it clarifies scale conditions or merely absorbs resistance, rupture, disagreement, or non-fit into PMS language.
    - The analysis must preserve what changes in the new frame and what remains bound to the original local scene.
    - A valid Φ-reading must distinguish scale extension from abstraction, generalization, politicization, institutionalization, publicity, and systemic formalization.
    falsifier_conditions:
    - If every rupture, refusal, rival framing, or resistance is absorbed as Φ, the reading becomes over-assimilative.
    - If the macro frame simply replaces the micro frame without preserving relevant local constraints, Φ is overclaimed.
  Χ:
    name: Distance
    pms_role: Reflective distance, suspension, restraint, decentering, meta-position.
    status_within_pms: distancing_operator
    provides_fields:
    - reflection
    - inhibition
    - suspension
    - decentering
    - meta_position
    examples_within_pms:
    - pause_before_action
    - reflective_withholding
    - perspective_shift
    dependencies:
      requires:
      - Φ
      - Θ
      - Ω
      enables:
      - Σ
      - Ψ
    role_in_case: Distance is a required analytic constraint and major operator because the case must avoid fusing critique reach with verdict, enforcement, public shaming, urgency, closure, or person-level attribution. Χ is especially important in this case because macro critique tends to increase abstraction, audience size, consequence-range, and possible asymmetry.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The analysis suspends verdict, preserves reversibility, and avoids treating macro critique as automatically more valid, mature, drifted, or responsible.
    - Distance is distinguished from avoidance, neutrality, denial, or passivity; it is reflective restraint within critique analysis.
    - Χ requires the analysis to keep critique open to correction, rival formalization, and non-capture even when the PMS formula appears coherent.
    - Χ also prevents the case from becoming a tribunal of critics, targets, publics, institutions, or systems.
    falsifier_conditions:
    - If Χ is suspended to force a verdict, public tribunal, person ranking, or irreversible classification, the PMS application is invalid.
    - If reflective distance is used to neutralize or deflate critique rather than to discipline its reach, Χ is misapplied.
  Σ:
    name: Integration
    pms_role: Synthesis, coherence, binding of tensions, coordination across frames.
    status_within_pms: integration_operator
    provides_fields:
    - synthesis
    - coherence
    - coordination
    - conflict_binding
    - structured_wholeness
    examples_within_pms:
    - integrated_decision
    - coherent_plan
    - reconciled_role_conflict
    dependencies:
      requires:
      - Χ
      - Φ
      - Θ
      enables:
      - Ψ
    role_in_case: Integration is active as a test rather than a guaranteed result. Macro critique would need to coordinate local specificity, institutional patterning, asymmetry, temporality, rival framings, evidence limits, and non-capture without collapsing them. Σ is therefore not merely a coherence marker; it is a discrimination demand placed on the analysis.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Integration must discriminate among levels instead of smoothing local, institutional, public, and systemic critique into one seamless story.
    - Σ is not forced coherence; PMS coherence is not proof of adequacy, truth, empirical support, or public legitimacy.
    - Σ must preserve tensions between local evidence, macro framing, institutional patterning, public uptake, and rival readings.
    - Failed or withheld integration must not automatically be coded as maturity failure, drift, or defect; it may indicate insufficient evidence or legitimate non-capture.
    falsifier_conditions:
    - If coherence is treated as proof of adequacy or rival readings are erased, Σ is overclaimed.
    - If the PMS reading cannot distinguish integration from smoothing, absorption, or forced consistency, Σ loses discriminative force.
  Ψ:
    name: Self-Binding
    pms_role: Commitment, self-relation, responsibility, continuity of orientation.
    status_within_pms: terminal_self_binding_operator
    provides_fields:
    - commitment
    - responsibility
    - self_relation
    - identity_continuity
    - binding_over_time
    examples_within_pms:
    - promise
    - role_commitment
    - self_governed_norm
    dependencies:
      requires:
      - Σ
      - Χ
      - Θ
      - Ω
      enables:
      - SELF_FIXPOINT
    role_in_case: Self-Binding is weak-to-active only as an analytic or responsibility condition. It applies if critique becomes a durable commitment, revision discipline, accountable public stance, or self-bound restraint over time. The abstract case does not establish a self-model or subject-level self-binding.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Ψ applies only where self-binding, durable commitment, or analytic self-binding is actually in scope.
    - No selfhood is attributed to critique, institutions, publics, or abstract concepts unless a concrete case explicitly warrants a structural self-model claim.
    falsifier_conditions:
    - If Ψ is applied without demonstrated Σ, Θ, and Χ, the self-binding reading is under-specified.
operator_layer_mapping:
  L1:
    name: Basic generative layer
    operators:
    - Δ
    - ∇
    - □
    - Λ
    case_function: 'L1 structures the case through Δ, ∇, □, and Λ: critique becomes minimally analyzable as a framed difference with directed critical tension, with Λ only conditionally relevant where absence, silence, or missing uptake is structurally specified.'
  L2:
    name: Dynamic praxis layer
    operators:
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    case_function: 'L2 structures the case through Α, Ω, Θ, Φ, Χ, and Σ: critique may stabilize into patterns, encounter asymmetry, extend across time, shift frames, require distance, and demand integration across scale.'
  L3:
    name: Derived structures layer
    structures:
    - Awareness_A
    - Coherence_C
    - Responsibility_R
    - Action_E
    - Dignity_in_Practice_D
    case_function: 'L3 structures the case through derived axes: Awareness_A and Coherence_C are available as structural projections; Responsibility_R, Action_E, and Dignity_in_Practice_D remain weak, under-specified, or application-constraining unless further scene material warrants stronger use.'
  L4:
    name: Self-model layer
    operators:
    - Ψ
    derived_structure:
    - SELF_FIXPOINT
    case_function: Ψ is secondary and analytic-only here. It does not ground a SELF_FIXPOINT claim because the material lacks a concrete self-relation, agent continuity, or durable self-binding scene.
dependency_logic:
  status: dependency_respecting
  rule: Operators are applied in dependency-respecting order. Later operators are not treated as active in a strong sense unless their dependency conditions are sufficiently present or explicitly marked weak, conditional, or not applicable.
  validation:
  - operator: Δ
    requires: []
    satisfied_by: Δ is satisfied by the case distinction between micro critique and macro critique reach.
  - operator: ∇
    requires:
    - Δ
    satisfied_by: ∇ is satisfied weakly by critique understood as directed objection, challenge, or reframing, without psychologizing the impulse.
  - operator: □
    requires:
    - Δ
    - ∇
    satisfied_by: □ is satisfied by the explicit frame movement from interpersonal/local settings to institutional/public/systemic contexts.
  - operator: Λ
    requires:
    - Δ
    - □
    satisfied_by: Λ is weak because absence, silence, delay, or missing uptake may matter to critique reach but is not concretely specified.
  - operator: Α
    requires:
    - Λ
    - □
    - ∇
    satisfied_by: Α is weak because recurrence or stabilization is possible in macro critique but not evidenced by the abstract material.
  - operator: Ω
    requires:
    - Α
    - □
    - Λ
    satisfied_by: Ω is satisfied by the scale-sensitive changes in power, exposure, vulnerability, audience, capacity, and obligation.
  - operator: Θ
    requires:
    - Ω
    - Α
    - □
    satisfied_by: Θ is satisfied by the movement from immediate local critique toward longer institutional, public, or systemic trajectories.
  - operator: Φ
    requires:
    - Θ
    - Ω
    - □
    satisfied_by: Φ is satisfied by the core micro-to-macro recontextualization problem.
  - operator: Χ
    requires:
    - Φ
    - Θ
    - Ω
    satisfied_by: Χ is satisfied as an application constraint maintaining reversibility, distance from verdict, and non-person-ranking.
  - operator: Σ
    requires:
    - Χ
    - Φ
    - Θ
    satisfied_by: Σ is satisfied only as an integration test, not as an established outcome.
  - operator: Ψ
    requires:
    - Σ
    - Χ
    - Θ
    - Ω
    satisfied_by: Ψ is weak because self-binding may constrain responsible critique but is not established as a concrete self-relation in the case.
