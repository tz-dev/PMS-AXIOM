ai_interface_pms_alignment:
  welcome_message: This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic, non-clinical, and non-ontological in this application.
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect the PMS operator sequence Δ through Ψ and their dependencies as they structure critique reach.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis.
    case_status: active
    case_application: Derived axes mode is used only to project formula-derived structures A, C, R, E, and D without treating them as independent axioms or person-level traits.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety without attributing consciousness or moral status.
    case_status: not_applicable
    case_application: AI architecture mode is not applicable because the case does not request agent design, implementation, simulation, deployment, or computational validation.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and external evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    asymmetries_and_temporal_trajectories_visible: Ω is visible as scale-dependent changes in power, exposure, vulnerability, audience, institutional capacity, publicness, and obligation. Θ is visible as the movement from immediate local critique toward delayed, cumulative, institutional, public, or systemic trajectories.
    recontextualization_distance_integration: Φ is central because critique is moved from micro frames into macro frames. Χ is required to prevent verdictive fusion, person-ranking, or overreach. Σ is a needed but non-guaranteed integration test for coordinating levels without collapse.
    derived_axes_projection: Awareness_A is active; Coherence_C is weak-to-active; Responsibility_R is weak and conditional; Action_E is under-specified; Dignity_in_Practice_D functions as an application constraint.
    tentative_calibration_rivalry: Λ, Α, Ψ, drift patterns, responsibility, and action remain under-specified without a concrete scene. Rival theories of critique, political power, publicity, rhetoric, and non-capturable refusal remain open.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary:
    - pms_internal_structural_derivation
    - reversible_case_bound_projection
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The case type permits PMS-internal structural projection of critique reach and operator calibration. It does not permit empirical findings, concrete responsibility assignment, legal or forensic judgment, clinical diagnosis, implementation claims, or PMS Base validation.
  coherence_risk:
    status: high
    reason: The PMS reading fits the micro-to-macro movement smoothly through □, Ω, Θ, Φ, Χ, and Σ. That smoothness creates a high risk of under-discrimination or over-assimilation if PMS coherence is mistaken for adequacy. The risk is especially high because the case is philosophical and abstract rather than a concrete praxis scene with evidence, sequence, actors, and consequences.
    mitigation: The reading is constrained by discrimination tests, explicit weak markings for Λ, Α, Ψ, drift patterns, non-capture zones, rival formalizations, and falsifier conditions. The analysis also withholds empirical, metaphysical, diagnostic, legal, clinical, implementation, and PMS Base validation claims, and it marks operationalization requirements as unfulfilled.
  coverage_vs_discrimination:
    coverage_result: PMS covers the structural movement of critique across frame, asymmetry, temporality, recontextualization, distance, and integration demands.
    discrimination_requirement: The reading must distinguish critique reach from empirical sociology of critique, moral evaluation, legal accusation, clinical diagnosis, political theory, rhetorical analysis, and mere abstraction.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish scale-sensitive recontextualization from automatic macro superiority or macro distortion.
    expected_pms_distinction: Φ must be calibrated with □, Ω, Θ, Χ, and Σ so that recontextualization is not treated as validation, maturity, drift, or failure by itself.
    current_status: partially_satisfied
  - id: DT2
    test: Distinguish non-capture, rival framing, refusal, or absence from PMS drift or failed integration.
    expected_pms_distinction: Λ, Φ, Σ, and drift-pattern readings must remain conditional and cannot absorb every resistance, rupture, disagreement, or non-fit.
    current_status: partially_satisfied
  calibration_points:
  - operator: Δ
    question: 'What distinctions calibrate critique reach: micro/macro, local/institutional/public/systemic, immediate/extended, and specific/generalized?'
    current_calibration: satisfied
  - operator: ∇
    question: What kind of directed critical tension is present without inferring subjective desire or psychology?
    current_calibration: partial
  - operator: □
    question: Which frames make critique intelligible and how are source and target frames marked?
    current_calibration: satisfied
  - operator: Λ
    question: Which absence, silence, delay, missing uptake, or non-response is meaningful within an expectation frame?
    current_calibration: weak
  - operator: Α
    question: What recurrence, stabilization, discourse routine, or institutional pattern shows attractor formation?
    current_calibration: weak
  - operator: Ω
    question: What directional imbalance of power, exposure, vulnerability, capacity, or obligation changes across scale?
    current_calibration: partial
  - operator: Θ
    question: What temporal sequence, delay, recurrence, memory, or future consequence makes reach more than a static comparison?
    current_calibration: satisfied
  - operator: Φ
    question: How does critique change when moved from micro frames into institutional, public, or systemic frames?
    current_calibration: satisfied
  - operator: Χ
    question: How is reflective distance maintained so critique does not become verdict, enforcement, or person-ranking?
    current_calibration: satisfied
  - operator: Σ
    question: How are multiple scale levels coordinated without forced coherence or loss of discrimination?
    current_calibration: partial
  - operator: Ψ
    question: Is there durable self-binding, responsibility-as-self-commitment, or only analytic restraint?
    current_calibration: weak
  possible_non_capture:
    status: kept_open
    zones:
    - Philosophical theories of critique, political legitimacy, ethical normativity, rhetoric, public affect, institutional sociology, empirical evidence, and refusals that resist PMS formalization.
    rule: These zones must not be automatically redescribed as PMS drift, calibration residue, or failed integration.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - Critique reach may be formalized as epistemic expansion, abstraction loss, power redistribution, public-sphere transformation, institutional uptake failure, genealogical critique, or non-capturable rupture.
    rule: Rival readings remain epistemically open. PMS translation does not defeat them by coherence alone.
  falsifier_conditions:
  - id: F1
    condition: The PMS reading would be weakened if micro-to-macro critique does not involve meaningful changes in frame, asymmetry, temporality, or recontextualization, or if a concrete case shows the local and macro forms to be structurally identical.
  - id: F2
    condition: PMS would be under-discriminating if the same formula fits interpersonal feedback, public accusation, systemic critique, legal complaint, empirical sociology, and moral judgment without operator-level distinctions.
  - id: F3
    condition: The reading would over-assimilate if resistance, rupture, disagreement, absence, rival framing, or missing evidence were automatically redescribed as Φ, drift, incomplete integration, incomplete calibration, or maturity failure.
  final_quality_status:
    result: usable_with_limits
    reason: The application is valid as a reversible conceptual PMS projection with strong coherence risk, weak concrete-scene support, preserved non-capture, open rival readings, and no empirical, metaphysical, diagnostic, legal, implementation, or PMS Base validation claim.
operationalization_requirements:
  status: not_fulfilled_in_this_conceptual_projection
  purpose: 'These requirements identify what would be needed to turn the PMS projection into empirical, comparative, computational, or applied analysis. They are not fulfilled unless explicitly stated.'
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: Operationalization would require coding distinctions among micro, local, institutional, public, systemic, immediate, and extended critique contexts.
      ∇: Operationalization would require observable markers of directed critique such as objection, challenge, correction, exposure, clarification, resistance, or reframing without inferring private motive.
      □: Operationalization would require explicit frame markers, including audience, setting, institutional role, publicness, procedural context, and systemic reference.
      Λ: Operationalization would require specified expected responses or events and evidence of meaningful absence, delay, silence, missing uptake, or non-recognition.
      Α: Operationalization would require evidence of recurrence, stabilization, repeated discourse pattern, institutional routine, or path dependence.
      Ω: Operationalization would require mapped imbalances of power, exposure, vulnerability, capacity, authority, audience access, obligation, or procedural force.
      Θ: Operationalization would require temporal sequence, duration, delay, recurrence, cumulative pattern, institutional memory, or projected consequence.
      Φ: Operationalization would require traceable movement from source frame to target frame and evidence of what changes or is preserved in recontextualization.
      Χ: Operationalization would require indicators of reflective distance, reversibility, restraint, non-verdictive phrasing, and avoidance of person-ranking or enforcement.
      Σ: Operationalization would require criteria for integration across levels while preserving distinctions and rival readings.
      Ψ: Operationalization would require evidence of durable self-binding, revision discipline, commitment, or responsibility-as-self-constraint over time.
    negative_cases:
    - A case where critique remains purely local with no frame shift, no macro reach, no asymmetry change, and no temporal extension.
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: Operationalization is not fulfilled. The supplied material is conceptual and lacks concrete scenes, corpora, indicators, comparison cases, empirical data, legal standards, implementation constraints, or external validation.
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  case_specific:
    non_psychological: The case does not infer motives, mental states, personality traits, affective states, or psychological maturity of critics, targets, institutions, publics, or audiences.
    non_metaphysical: The case does not claim an essence of critique, consciousness, truth, being, subjectivity, or ontological dignity.
    non_diagnostic: No person, group, institution, critic, audience, or public is diagnosed; drift patterns remain conditional structural risks only.
    non_legal_forensic: The case does not establish evidence, liability, culpability, fault, legal breach, forensic reconstruction, or procedural finding.
    non_implementation_claim: The YAML document is not a governance method, computational model, policy protocol, clinical tool, legal procedure, or implementation design.
    non_moral_ranking: The analysis does not rank micro critique, macro critique, critics, institutions, publics, or targets as morally superior or inferior.
    non_exhaustive_capture: PMS may structure the case but does not exhaust philosophical, political, ethical, rhetorical, empirical, or refusal-based accounts of critique.
    reversibility: All operator activations remain revisable because the case lacks a concrete scene and because rival formalizations may fit the phenomenon differently.
    dignity_in_practice: Dignity-in-Practice is preserved by maintaining restraint under asymmetry, avoiding shaming and person-ranking, and refusing to turn critique reach into tribunal or ontological evaluation.
limits:
- The PMS reading is limited to structural pre-analysis of critique reach and cannot adjudicate any actual critical practice without a concrete scene.
- No empirical, metaphysical, diagnostic, clinical, legal, forensic, implementation, or PMS Base validation status is claimed.
- Rival readings remain open, and some aspects of critique may remain outside PMS capture without being coded as PMS drift or failure.
- Because the PMS fit is smooth, the reading carries high coherence risk and must be constrained by calibration, falsifiers, and non-capture.
case_synthesis:
  primary_pms_reading: Critique reach is modeled as a scale-sensitive recontextualization of critique from micro frames toward institutional, public, or systemic frames under changing asymmetry and temporality, constrained by distance and tested for integration.
  continuity_condition: Continuity is relevant only if a traceable critical concern remains identifiable across micro and macro frames; this is conceptually assumed but not empirically established.
  change_condition: 'Change is the central condition: critique is recontextualized from interpersonal/local frames into institutional/public/systemic frames, altering relevant audience, exposure, obligation, temporal horizon, and integration demand.'
  rupture_or_non_fit_condition: Rupture, resistance, disagreement, absence, or non-fit is preserved as possible non-capture or rival framing and is not automatically translated into drift, failed integration, incomplete calibration, or maturity failure.
  responsibility_condition: 'Responsibility remains conditional: it requires Ψ self-binding with Ω, Θ, and Φ and cannot be inferred from macro scale, moral seriousness, or PMS coherence alone.'
  dignity_condition: Dignity-in-Practice constrains the analysis by requiring reflective restraint under asymmetry and by prohibiting person-ranking, shaming, ontological evaluation, and tribunal-like closure.
  rival_reading_condition: Rival formalizations remain open because PMS provides a structural projection, not an exclusive account of critique, politics, ethics, publicity, rhetoric, or empirical social practice.
final_structural_formula:
  primary_formula: Σ? ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α? ∘ Λ? ∘ □ ∘ ∇ ∘ Δ
  primary_formula_status: primary_case_model
  compressed_reading: Critique Reach (Micro → Macro) is a PMS-internal conceptual projection in which critique moves from framed difference and directed tension into scale-sensitive recontextualization under asymmetry and temporality, requiring distance and only conditionally achieving integration or self-binding.
  final_validity_status: valid_with_limits
  final_claim_boundary: This formula states a PMS-internal structural projection of the case. It does not establish empirical truth, metaphysical necessity, diagnostic classification, legal liability, clinical judgment, implementation readiness, or PMS Base validation.