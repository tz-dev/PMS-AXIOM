derived_structure_discipline:
  rule: Derived structures are not primitives. They are used only by formula-based projection from PMS operators.
  case_status: Awareness_A is active; Coherence_C is weak-to-active; Responsibility_R is weak and conditional; Action_E is under-specified; Dignity_in_Practice_D is an application constraint; SELF_FIXPOINT is not established except as an analytic non-claim.
derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ supplies difference.
    - □ situates difference in a frame.
    - Θ stabilizes it across temporal extension.
    notes: 'Awareness is not consciousness, sentience, or phenomenology. It is a structural capacity for framed temporal differentiation.'
    case_reading: 'Awareness_A appears as sustained framed differentiation across time: critique distinguishes local interpersonal frames from institutional, public, and systemic frames while tracking how reach and consequence change over temporal extension.'
    status: active
    calibration_points:
    - Differentiate critique objects, scale levels, relevant frames, and temporal horizons without treating micro/macro as a rigid binary.
    non_capture_note: Awareness_A is a structural projection only; it does not prove subjective awareness.
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Stability of directed structure across framed time and absence.
    generative_reasoning:
    - ∇ gives directed impulse.
    - □ constrains the impulse in a frame.
    - Λ introduces structured absence or expectation.
    - Θ stabilizes the relation across time.
    notes: 'Coherence is structural, not necessarily truth, adequacy, or moral correctness.'
    case_reading: Coherence_C is conditionally active where directed critique remains framed over time and where meaningful absence or expectation can be specified. Because Λ is only weakly supported, coherence remains a structural possibility rather than a confirmed case result.
    status: weak
    calibration_points:
    - Coherence must be distinguished from truth, validity, empirical support, forced integration, or narrative smoothing.
    non_capture_note: 'Coherence does not prove adequacy.'
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding orientation toward asymmetry extended across time and recontextualized conditions.
    generative_reasoning:
    - Ω creates structural imbalance in exposure, capacity, or obligation.
    - Θ extends this imbalance into enduring commitments.
    - Φ allows reinterpretation of obligations under changing conditions.
    - Ψ binds the agent to these obligations as part of its self-relation.
    notes: 'Responsibility is structural rather than moralistic in this specification. It is not legal liability, blame, diagnosis, or moral superiority.'
    case_reading: Responsibility_R is weak and conditional. It would require Ψ self-binding together with Ω asymmetry, Θ temporality, and Φ recontextualized obligation. The abstract case raises responsibility questions for macro critique but does not establish them.
    status: weak
    calibration_points:
    - Identify concrete asymmetry, temporal extension, recontextualized obligation, and self-binding before claiming Responsibility_R.
    non_capture_note: 'Responsibility_R is not moral blame, diagnosis, or legal liability.'
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ provides energetic directedness.
    - Θ structures this directedness as a trajectory rather than a momentary reaction.
    - Σ integrates conflicting impulses, constraints, and roles into a coherent enactment.
    notes: 'Action here is not any behavior; it is integrated and temporally extended. High awareness without Action_E may indicate under-realization only where the case warrants that claim.'
    case_reading: Action_E is under-specified because the case concerns critique reach rather than concrete enactment. It would become active only if critique is shown as integrated realization across time, such as response, repair, publication, policy change, withdrawal, or institutional action.
    status: under_specified
    calibration_points:
    - Distinguish critique as abstract directedness from integrated action, practical enactment, implementation, or institutional intervention.
    non_capture_note: 'Without a concrete scene, Action_E may remain under-specified.'
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-bound reflective restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: 'Dignity-in-practice is a structural stance in action. It concerns how asymmetry is handled, not what beings are metaphysically worth.'
    case_reading: 'Dignity-in-Practice constrains the analysis by requiring restraint under asymmetry: no shaming, person-ranking, irreversible labeling, ontological dignity claim, or public tribunal is derived from critique reach.'
    status: application_constraint
    calibration_points:
    - Check that asymmetry is handled without ranking persons, humiliating targets, erasing vulnerability, or converting structural analysis into moral superiority.
    non_capture_note: D is a praxeological application constraint, not an ontological or moral superiority claim.
self_model_analysis:
  id: SELF_FIXPOINT
  priority_in_this_case: not_applicable
  formula_sequence:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  description: Formal representation of self-binding as the result of integrated, reflexively distanced, temporally extended praxis under asymmetry.
  case_reading: SELF_FIXPOINT is not the primary structure of this case. The material concerns critique reach rather than a self-relation or enduring subject. The SELF_FIXPOINT chain is retained as a PMS reference but is not applied beyond noting that Ψ would require concrete self-binding evidence.
  implications:
  - Within PMS, selfhood can be modeled as the result of structured praxis rather than assumed as a primitive.
  - Identity is represented as relatively stable self-binding to integrated trajectories.
  - No phenomenological or metaphysical claims about subjectivity are implied.
  interpretation_note: 'This sequence records one derivational strategy within PMS. It must not be read as a claim that all selves, agents, systems, or humans are reducible to this formula.'
  non_capture_note: 'SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions unless the case explicitly warrants such a structural self-model projection.'
asymmetry_drift_patterns:
  status_in_this_case: possible_but_not_entailed
  general_note: 'PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms. They must never be used as diagnoses, person-types, clinical states, moral verdicts, or maturity rankings.'
  AD_A_much_greater_E:
    code: AD_A>>E
    name: Excessive Distance between Awareness and Enactment
    applicability: possible_but_not_entailed
    structural_basis:
      formula:
      - Ω
      - Α
      - Φ
      description: Evaluative or power asymmetry becomes stabilized through attractor formation, while recontextualization reinforces evaluation instead of enactment.
    generative_mechanism:
    - 'Ω: evaluative or positional asymmetry becomes structurally salient.'
    - 'Α: the asymmetry stabilizes into recurrent evaluative patterning.'
    - 'Φ: recontextualization reinforces drift toward evaluative framing rather than realized action.'
    case_reading: AD_A>>E remains only a conditional risk. It could appear if macro critique expands awareness and evaluative framing while integrated action is suppressed, chronically delayed, or structurally disconnected. The case material does not establish that pattern.
    axis_effects:
      awareness_axis: under_specified
      action_axis: under_specified
    guardrail: This is not a personality trait, diagnosis, person-label, clinical state, or moral defect.
  AD_under_integration:
    code: AD_Sigma_low
    name: Fragmented integration
    applicability: possible_but_not_entailed
    structural_basis:
      primary_tension:
      - Φ
      - Σ
      condition: recontextualization_outpaces_integration
      description: Frequent recontextualization without sufficient integration leads to unstable trajectories.
    generative_mechanism:
    - 'Φ: frames are frequently shifted or updated in ways that destabilize continuity.'
    - 'Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment.'
    case_reading: AD_Sigma_low remains only a conditional risk. It could appear if critique repeatedly shifts frames from local to systemic without integrating scale relations. The abstract material does not establish volatility or inconsistent responsibility.
    axis_effects:
      coherence_axis: under_specified
      responsibility_axis: under_specified
    guardrail: This pattern describes structural volatility in action forms, not a clinical state, personal defect, or moral verdict.
