    dependency_table_reference_matches_pms_yaml: true
    all_derived_axes_formula_based: true
    self_fixpoint_treated_as_derived: true
    drift_patterns_not_diagnostic: true
    quality_control_present: true
    falsifier_conditions_present: true
    possible_non_capture_preserved: true
core_principle_alignment:
  P1_praxeological_focus:
    principle: PMS models praxis structurally, not inner psychology or ontology.
    status: satisfied
    case_application: The case is treated as a structure of critique-as-praxis across scale, not as an essence of persons, psychological state, phenomenological report, or ontological theory of critique.
  P2_proposed_operator_minimality:
    principle: PMS_1.3 proposes eleven operators as a minimal generative basis within the repository reference.
    status: satisfied
    case_application: Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ is used as PMS operator vocabulary. No additional PMS operator, axis, layer, or primitive is introduced.
  P3_generativity:
    principle: Complex structures are derived by operator composition rather than assumed as primitives.
    status: satisfied
    case_application: Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are treated only through their PMS.yaml formulas and dependency logic, not as independent primitives.
  P4_temporal_and_asymmetry_awareness:
    principle: Praxis requires attention to temporality (Θ) and asymmetry (Ω).
    status: satisfied
    case_application: Ω and Θ carry major analytic weight because the reach of critique changes with exposure, power, vulnerability, obligation, publicness, institutional capacity, delay, recurrence, historical accumulation, and future consequences.
  P5_computational_boundedness:
    principle: Formal representation is not implementation, consciousness, or validation.
    status: satisfied
    case_application: This YAML is a formal case representation only. It is not an implementation, simulation result, empirical validation, computational deployment, or PMS Base validation.
  P6_rival_openness:
    principle: Rival grammars and formalizations remain possible.
    status: satisfied
    case_application: Rival readings remain open, including critique as epistemic expansion, abstraction loss, power redistribution, publicity transformation, institutional uptake problem, or non-capturable rupture.
  P7_non_capture_openness:
    principle: PMS analysis must preserve possible non-capture.
    status: satisfied
    case_application: The analysis preserves zones where philosophical, political, ethical, rhetorical, empirical, or refusal-based aspects of critique may exceed PMS capture.
  P8_non_diagnostic_use:
    principle: PMS must not be used as diagnosis, person-ranking, or clinical typology.
    status: satisfied
    case_application: No critic, target, group, institution, public, or audience is diagnosed, ranked, pathologized, or treated as a person-type. Asymmetry drift patterns are only conditional structural risks.
  P9_scenic_context_bound_interpretation:
    principle: Application readings must remain bound to scene, case type, and evidence.
    status: satisfied
    case_application: Because the material is not a concrete scene, the interpretation is explicitly case-type-bound as a conceptual projection. Concrete scene analysis would require specified actors, claims, institutions, evidence, sequence, and consequences.
pms_model_reference_application:
  operator_inventory:
  - symbol: Δ
    name: Difference
  - symbol: ∇
    name: Impulse
  - symbol: □
    name: Frame
  - symbol: Λ
    name: Non-Event
  - symbol: Α
    name: Attractor
  - symbol: Ω
    name: Asymmetry
  - symbol: Θ
    name: Temporality
  - symbol: Φ
    name: Recontextualization
  - symbol: Χ
    name: Distance
  - symbol: Σ
    name: Integration
  - symbol: Ψ
