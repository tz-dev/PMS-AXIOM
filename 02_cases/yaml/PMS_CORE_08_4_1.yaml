  model_name: Praxeological Meta-Structure
  model_short: PMS
  reference_file: PMS.yaml
  reference_status: repository_reference
  repository_role: current_base_schema
  reference_last_updated: '2026-04-06'
  base_schema_status: repository_reference
  compliance_note: 'This case analysis applies PMS_1.3 as the current repository reference. It does not redefine PMS operators, alter the default repository order, introduce new meta-axioms, treat derived axes as independent primitives, override PMS application guardrails, or claim PMS Base validation.'
  referenced_base_sections:
  - pms_entry_condition
  - schema_version
  - schema_meta
  - repository_governance
  - core_principles
  - pms_model_reference
  - derived_structures
  - example_operator_chains
  - computational_representation
  - ai_interface_pms
  application_schema_note: 'This document is an application schema. It is permitted as an overlay or application scaffold under PMS repository governance, provided it remains explicitly subordinated to PMS.yaml and does not silently revise PMS Base.'
schema_meta_alignment:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  pms_status: repository_reference
  pms_maturity: draft
  repository_role: current_base_schema
  epistemic_status: 'PMS_1.3 is treated as strong, formally disciplined, and portable, but not final, complete, uniquely ordered, or immune to revision.'
  description_alignment: 'The case is analyzed through PMS as a structural, non-phenomenological, non-psychological, non-clinical, non-diagnostic, non-prescriptive operator grammar of praxis.'
  intended_use_alignment:
    allowed_profiles:
    - theoretical_reflection
    - structural_action_theory
    - anthropology_and_praxeology
    - systems_theory
    - ai_architecture_and_safety
    - model_documentation_and_specification
    - simulation_scaffolding
    - structural_reasoning
    not_intended_for:
    - clinical_diagnosis
    - personality_typing
    - mental_health_risk_assessment
    - automated_moral_judgement
    - individual_person_evaluation
    - forensic_decision_making
    - policy_enforcement
    - irreversible_labeling
  normative_position_alignment:
    ontology: 'The case analysis makes no PMS-based claims about consciousness, qualia, inner experience, metaphysical essence, moral worth, or ontological dignity.'
    dignity_clause: 'Dignity-in-Practice is treated as a praxeological constraint on handling asymmetry, not as a metaphysical or moral ranking of beings.'
    tragedy_clause: 'Structural maturity, coherence, integration, or responsibility do not eliminate tragedy, unresolved tension, rupture, or non-capture.'
    self_binding_clause: 'The case analysis itself remains subject to PMS application discipline: Distance (Χ), Self-Binding discipline (Ψ), and Dignity-in-Practice (D) must not be suspended in order to force clarity, authority, resolution, truth, or action.'
  computational_position_alignment:
    representation_clause: 'YAML representation of the case is a formal encoding of a PMS reading, not a direct implementation of praxis, agency, selfhood, subjectivity, consciousness, or empirical validity.'
    calibration_clause: 'Any operational use requires architecture-specific calibration, implementation constraints, empirical testing where applicable, external evaluation, context-sensitive interpretation, and public accountability.'
    accountability_clause: 'Formal translation into PMS terms does not by itself guarantee public intelligibility, intersubjective uptake, empirical adequacy, external accountability, or explanatory sufficiency.'
    rivalry_clause: 'PMS rendering does not prove superiority over rival grammars or formalisms.'
  terminology_alignment:
    praxis: 'Situated, meaningful action under asymmetry, constraints, expectations, temporal extension, and self-interpretation, modeled structurally through operator compositions.'
    meta_axiom: 'One of the eleven PMS operators Δ–Ψ, treated as structurally basic within PMS_1.3 and not replaced by case-specific concepts.'
    operator_composition: 'Ordered or structured application of PMS meta-axioms to generate complex praxeological formations.'
    derived_construct: 'A higher-order construct systematically derived within PMS from operator compositions, not introduced as an independent primitive.'
    asymmetry_drift_pattern: 'A structurally derived distortion pattern within PMS; not a diagnosis, person-type, clinical category, ontological attribution, or moral verdict.'
    repository_reference: 'PMS.yaml remains the base reference. This case template is subordinate to that reference.'
  last_updated: '2026-04-06'
  authors:
  - name: T. Zöller
    role: originator
  - name: ChatGPT (GPT-5.4 Thinking)
    role: formalization_assistant
repository_governance_alignment:
  role_of_pms_yaml: 'PMS.yaml is the current repository reference specification for PMS Base. This case analysis depends on PMS.yaml but does not revise it.'
  this_template_may:
  - depend_on_pms
  - reference_pms_operators
  - define_case_application_structure
  - organize_pms_operators_for_case_analysis
  - specify_case_quality_control
  - support_structural_reasoning
  this_template_must_not:
  - silently_redefine_meta_axioms
  - silently_alter_default_operator_order
  - silently_alter_default_dependency_path
  - present_new_meta_axioms_as_if_already_in_base_pms
  - treat_derived_axes_as_independent_primitives
  - override_application_guardrails_while_claiming_full_pms_conformity
  - claim_pms_base_validation_from_a_case
  governance_status: subordinate_application_schema
pms_entry_condition:
  requirement: 'Any use of PMS as an application presupposes acceptance of distance (Χ), reversibility, and dignity-in-practice (D; a praxeological constraint, not ontological worth). This condition applies to application, not to critique, refusal, revision, or rejection. Applications that suspend these conditions are formally invalid as PMS applications within the present usage convention.'
  applies_to: application_only
  does_not_apply_to:
  - critique
  - refusal
  - rejection
  - revision_proposals
  - rival_formalization
  application_gate:
    status: accepted_for_this_application
    conditions:
      Distance_Chi:
        status: maintained
        meaning: 'Reflective distance is maintained; the analysis does not fuse PMS into verdict, urgency, enforcement, closure, or person-level attribution.'
      reversibility:
        status: maintained
        meaning: 'Structural readings remain revisable, bounded, non-final, and non-totalizing.'
      Dignity_in_Practice_D:
        status: maintained
        meaning: 'The analysis maintains enacted restraint under asymmetry and does not shame, rank, humiliate, or ontologically evaluate persons or groups.'
    gate_result: valid_as_pms_application
application_discipline:
  self_binding_clause:
    status: active
    statement: 'Any application of PMS is itself subject to PMS. Analyses that suspend Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in order to enforce truth, clarity, authority, resolution, or action are formally invalid as PMS applications within the present usage convention, even if PMS terminology is retained.'
    application_to_this_case: The analysis is self-bound by treating the case as a reversible conceptual projection, maintaining Χ-distance, preserving non-capture, avoiding person-ranking, and refusing to convert PMS coherence into empirical, metaphysical, diagnostic, legal, implementation, or validation authority.
  application_only_boundary:
    status: active
    statement: 'PMS entry conditions constrain applications. They do not invalidate critique, refusal, rejection, or revision of PMS.'
  non_capture_rule:
    status: active
    statement: 'Non-fit, rupture, ambiguity, resistance, disagreement, or absence must not automatically be redescribed as PMS drift, incomplete calibration, incomplete integration, or maturity failure.'
  no_pms_base_revision:
    status: active
    statement: 'This case analysis does not rewrite PMS.yaml, extend the operator inventory, add derived structures, add drift patterns, or silently alter PMS Base.'
case:
  title: Critique Reach (Micro → Macro)
  interpretation_type: conceptual_domain_projection
  case_type: philosophical scale-transition case concerning critique reach from interpersonal/local settings toward institutional/public/systemic settings
  claim_status: conceptual_pms_projection
  not_a_concrete_scene: true
  empirical_status: not_empirical
  result_status: reversible_case_bound_projection
  pms_base_validation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  clinical_claim: false
  scope: The analysis concerns the PMS-structural conditions under which critique changes as its reach moves from micro interpersonal or local frames toward wider institutional, public, or systemic frames. It analyzes operator involvement, dependency risks, derived-structure status, drift-pattern risk, calibration needs, non-capture zones, rival readings, falsifiers, and the final bounded PMS formula for this conceptual case. The scope is limited to the structural transformation of critique-reach, not to the truth, justice, political adequacy, ethical superiority, institutional legitimacy, or empirical effectiveness of any particular critique.
  non_scope: The analysis does not claim metaphysical proof, empirical finding, diagnostic judgment, clinical assessment, legal or forensic determination, implementation design, policy prescription, public tribunal, moral ranking of persons, exhaustive theory of critique, or PMS Base validation. It also does not decide whether macro critique is more mature, more accurate, more distorted, more emancipatory, more dangerous, or more responsible than micro critique.
  case_material: 'The case concerns critique reach in a philosophical sense: how critique changes as it moves from small-scale interpersonal or local settings toward wider institutional, public, or systemic contexts.'
  case_typing_note: This is not a concrete praxis scene. It is a conceptual domain projection because the supplied material describes a philosophical scale movement rather than a specific event, actor, institution, utterance, evidence set, or enacted sequence. Therefore all scene-level, empirical, diagnostic, legal, and implementation claims remain withheld. The case can be structurally projected through PMS because it explicitly concerns frame movement, scale change, temporality, and possible asymmetry; however, that projection remains reversible and does not prove that PMS exhausts the phenomenon of critique.
