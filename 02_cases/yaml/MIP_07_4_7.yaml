      - "discipline_profiles"
      - "IA_box"
      - "scores"
      - "dignity_module"
      - "trajectories"
      - "bias_intuition_norm_change"
      - "guardrails"
      - "frame_vs_variability"
      - "transmission_check"
      - "formal_notation"
      - "uniform_report"
  case_application_note: >
    This block records which MIP components were applied. It does not reproduce
    the MIP Base schema wholesale and does not revise MIP, PMS, or PMS-CONFLICT.
    The schema-conform case application begins at the top-level `case:` block.

case:
  meta:
    case_id: "MIP-ASL-001"
    case_title: "Asymmetry lock-in"
    documentation_date: "2026-05-28"
    analysts:
      - name: "ChatGPT"
        role: "MIP case-application assistant"
        observer_position: >
          External structural analyst working from the user-provided case material
          and the already completed PMS Core and PMS-CONFLICT analyses. The analyst
          is not a party to a concrete scene and has no empirical access beyond the
          supplied abstract material.
    language: "en"
    confidentiality_level: "private_working_note"
    analysis_mode: "full"
    intended_use: >
      Full-depth MIP maturity-in-practice analysis of an abstract philosophical
      case-type, based on PMS Core and PMS-CONFLICT case analyses, for structural
      clarification only.
    application_zone: "philosophy_anthropology"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "philosophy_anthropology"
      d_activation_decision: "limited_observation_only"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: "dial_D_down"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      The abstract case material: "The case concerns the philosophical question of
      how morally difficult situations should be understood when asymmetries of
      position, exposure, dependency, responsibility, or available exit may become
      difficult to revise, interrupt, or leave."
    secondary_material: >
      The already completed PMS Core case analysis for "Asymmetry lock-in" and the
      already completed PMS-CONFLICT overlay application. These are treated as
      application aids and prior structural readings, not as empirical evidence and
      not as PMS Base.
    assumptions_and_inferences: >
      The analysis assumes only that the case is an abstract philosophical case-type
      and not a concrete scene. It infers that MIP may inspect the maturity-in-practice
      profile of the case-structure itself: awareness, coherence, responsibility,
      power-to-act, asymmetry hygiene, reversibility, and qualitative dignity-in-practice
      protections. It does not infer any concrete actor, intention, culpability,
      diagnosis, legal status, or empirical occurrence.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: >
        High coverage for conceptual structure; low coverage for concrete enactment,
        actor-specific responsibility, empirical trajectory, legal status, clinical
        status, institutional context, and actual available alternatives.
      reliability_estimate: >
        Reliable as a bounded structural MIP projection based on supplied text and
        prior PMS/PMS-CONFLICT analyses; not reliable as empirical, legal, clinical,
        forensic, or implementation analysis.
      known_gaps:
        - "No concrete actors or roles are supplied."
        - "No event sequence is supplied."
        - "No institution, relationship, or legal frame is supplied."
        - "No observed behavior, decision, communication, or omission is supplied."
        - "No evidence of actual recurrence, path-dependence, or cost distribution is supplied."
        - "No concrete self-binding, role-binding, or binding collision is supplied."
        - "No publicness or exposure channel is supplied."
        - "No affected-side report is supplied."
      main_bias_risks_here:
        - "Overfitting the case to PMS or CONFLICT because the title strongly matches their vocabulary."
        - "Mistaking conceptual legibility for empirical evidence."
        - "Treating asymmetry as moral blame by default."
        - "Treating non-exit as coercion without evidence."
        - "Treating PMS/MIP coherence as sufficient by itself."
        - "Under-reading rival grammars such as care ethics, domination theory, legal analysis, or phenomenology."

  snapshot:
    short_case_description: >
      "Asymmetry lock-in" is an abstract philosophical case-type about morally
      difficult situations in which position, exposure, dependency, responsibility,
      or available exit may become asymmetrical and difficult to revise, interrupt,
      or leave. It is not a concrete scene but a structural problem-space for
      analyzing lock-in, reversibility, responsibility pressure, and dignity-preserving
      handling of asymmetry.
    central_actors_and_roles:
      - "abstract role-position with greater capacity for delay, withdrawal, reframing, or exit"
      - "abstract role-position with greater exposure, dependency, liability, or lower exit capacity"
      - "observer or analyst role applying PMS, PMS-CONFLICT, and MIP structurally"
      - "possible affected-side role not concretely specified"
      - "possible institutional or relational frame not concretely specified"
    guiding_question: >
      How can MIP describe the maturity-in-practice profile of a case-type in which
      asymmetry hardens over time, while preserving reversibility, non-capture,
      dignity protection, and the distinction between structural responsibility and
      guilt?
    level:
      - "conceptual"
      - "structural"
      - "role-context"
      - "asymmetry-hygiene"
      - "not_concrete_scene"
    first_visible_asymmetry: >
      The first visible asymmetry is uneven position under temporal hardening:
      one side or role may have different exposure, dependency, responsibility,
      exit capacity, or ability to revise, interrupt, delay, reframe, or leave.
    first_visible_D_themes_optional:
      - "risk of dignity stress if asymmetry language becomes shaming, ranking, or person-near verdict"
      - "risk of public or relational degradation if non-exit is framed as failure"
      - "need to protect D0 from any scoring or ranking"
      - "need to handle D1/D2 only as qualitative enactment or protection questions"

  role_mapping:
    object_of_observation:
      type: "abstract_case_type"
      description: >
        The object of observation is not a person, group, institution, or actual
        episode, but a philosophical case structure: asymmetry may become temporally
        hardened and difficult to revise, interrupt, or leave.
      role: "case_structure_under_MIP_analysis"
      not_person_as_whole: true
    observer_position:
      role: "external_structural_application_analyst"
      power_relation_to_object: >
        The analyst has interpretive power over the YAML representation but no
        authority over concrete persons or situations. This creates a method-level
        responsibility to avoid overclaiming, diagnosis, tribunal logic, or hidden
        governance use.
      possible_effects_of_analysis: >
        The analysis may clarify structural maturity risks, but it may also create
        misuse risk if excerpted as verdict, person label, proof of coercion, or
        proof of maturity failure. Therefore the transmission status remains a
        private working note unless explicitly rechecked.
    involved_roles:
      - role: "higher-exit-capacity position"
        mandate: >
          Abstract role-position that may be able to delay, withdraw, reframe, or
          exit with lower cost.
        built_in_asymmetries:
          - "lower cost of distance"
          - "greater control over timing"
          - "greater ability to reframe"
          - "greater access to alternatives"
        publicness_level: "not_specified"
        dignity_exposure: >
          Not concretely observable. Dignity risk would arise if the role were
          morally ranked or publicly accused without scene evidence.
      - role: "higher-exposure-or-dependency position"
        mandate: >
          Abstract role-position that may carry greater exposure, dependency,
          liability, reduced exit capacity, or higher cost of interruption.
        built_in_asymmetries:
          - "higher exposure"
          - "dependency"
          - "reduced real exit"
          - "higher cost of delay"
          - "higher consequence burden"
        publicness_level: "not_specified"
        dignity_exposure: >
          Potentially high if the case were concretized, but currently not evidenced.
          The analysis must not convert vulnerability into shame, incapacity, or
          person-level labeling.
      - role: "responsibility-bearing position"
        mandate: >
          Abstract role-position in which responsibility may be structurally relevant
          under asymmetry and temporality.
        built_in_asymmetries:
          - "responsibility may be distributed unevenly"
          - "responsibility may be formally assigned but materially unsupported"
          - "burden may increase as exit becomes difficult"
        publicness_level: "not_specified"
        dignity_exposure: >
          Responsibility language carries dignity risk if converted into guilt,
          blame, or maturity ranking without evidence.
      - role: "frame-maintaining or institutional position"
        mandate: >
          Possible but unspecified role responsible for frame, review, rules,
          alternatives, or reversibility conditions.
        built_in_asymmetries:
          - "possible control over process"
          - "possible control over review points"
          - "possible control over formal exit criteria"
        publicness_level: "not_specified"
        dignity_exposure: >
          Not assessable from the case material.
      - role: "analyst or model-user position"
        mandate: >
          Maintain MIP guardrails, distinguish material from inference, avoid red
          zones, preserve D0, keep D qualitative, and prevent case language from
          becoming a verdict.
        built_in_asymmetries:
          - "interpretive authority"
          - "risk of model-imposed framing"
          - "risk of over-smoothing through coherent YAML"
        publicness_level: "private_working_note"
        dignity_exposure: >
          Low if kept private and structural; higher if publicly excerpted or used
          person-near.
    publicness:
      level: "private_working_note"
      A_P_relevance: >
        Publicness awareness is required because the same language would be much
        riskier in a public, institutional, or person-near context. Within the
        current private structural analysis, A-P is active as a guardrail rather
        than as a scene feature.
      P_PU_relevance: >
        Public power is not active as a case-scene feature. It becomes relevant
        only if the analysis is transferred into public, institutional, governance,
        legal, or evaluative contexts.
      D_P_relevance_if_D_active: >
        Public dignity risk is not active in the abstract case, but it is a misuse
        risk: public labeling of identifiable persons through "lock-in" or "conflict"
        language would violate D hygiene.
      public_shaming_risk: >
        Currently low because the analysis is private and abstract. It would become
        high if applied to identifiable persons, public conflict, HR decisions,
        legal proceedings, or online discourse.
      reversibility_risk: >
        Low in the private YAML setting; potentially high if excerpted into durable
        record, reputational context, or institutional decision-making.

  frame_vs_variability:
    frame_elements:
      - element: "Abstract philosophical case-type"
        reason_fixed_or_slow: >
          The supplied material defines the case as conceptual and does not provide
          a concrete scene. This frame constrains the analysis to structural projection.
        protected_goods:
          - "reversibility"
          - "non-capture"
          - "claim-typing accuracy"
      - element: "PMS Core operator discipline"
        reason_fixed_or_slow: >
          PMS.yaml remains the only PMS Base reference; MIP must not redefine PMS
          operators or dependencies.
        protected_goods:
          - "PMS Base integrity"
          - "dependency hygiene"
          - "non-invented structures"
      - element: "CONFLICT overlay discipline"
        reason_fixed_or_slow: >
          PMS-CONFLICT is already applied as overlay shorthand only; MIP must not
          convert reduced signatures into base operators or findings.
        protected_goods:
          - "overlay subordination"
          - "no hidden conflict verdict"
      - element: "D0 inalienability"
        reason_fixed_or_slow: >
          MIP treats D0 as untouched, incomparable, non-measurable, non-rankable,
          and outside metrics.
        protected_goods:
          - "person worth"
          - "anti-ranking"
          - "dignity protection"
      - element: "No concrete scene"
        reason_fixed_or_slow: >
          Absence of scene evidence is not a minor gap but a structural boundary.
          It prevents empirical scoring, actor-specific M attribution, and legal or
          diagnostic claims.
        protected_goods:
          - "fairness"
          - "anti-overclaiming"
          - "methodological cleanliness"
    variability_elements:
      - element: "Degree of A–C–R–P specificity"
        possible_change: >
          Could increase if a concrete scene supplied actors, roles, decisions,
          information access, alternatives, and consequences.
        responsible_roles:
          - "future analyst"
          - "case provider"
          - "affected roles if safe and appropriate"
      - element: "IA-box result"
        possible_change: >
          Could move from IA_risk to functional_asymmetry or inadult_asymmetry if
          transparency, justification, time-boundedness, and reversibility evidence
          were supplied.
        responsible_roles:
          - "future analyst"
          - "frame-maintaining role"
      - element: "M-score assignability"
        possible_change: >
          Could become assignable if concrete knowledge, levers, predictability,
          alternatives, and integration attempts were documented.
        responsible_roles:
          - "future analyst"
          - "role holders"
          - "system or institution if present"
      - element: "D-module activation"
        possible_change: >
          Could be activated only in a safe, role-bound, time-windowed, non-public,
          non-shaming communication space where D would bring more clarity than shame.
        responsible_roles:
          - "analyst"
          - "moderated review role"
          - "affected-side protection role"
      - element: "Transmission status"
        possible_change: >
          Could move from working note to limited internal use if publicness, bias,
          consequences, reversibility, and D hygiene are rechecked.
        responsible_roles:
          - "analyst"
          - "reviewer"
    unfair_high_M_zones:
      - >
        It would be unfair to assign high M to any role because no concrete knowledge,
        predictability, control, alternatives, or integration attempt is documented.
      - >
        It would be unfair to infer culpability from being situated in asymmetry
        without scene evidence.
      - >
        It would be unfair to treat non-exit as failure if exit was materially,
        institutionally, economically, bodily, relationally, or safely unavailable.
    system_as_excuse_risk:
      - >
        The abstract system-level reading could be misused to excuse actual harm
        by saying "the structure did it" while ignoring concrete agency.
      - >
        Conversely, the absence of concrete scene evidence could be misused to
        erase structural conditions. Both risks remain open and must be checked
        in any later application.
    D1_D2_realistically_improvable_where:
      - >
        In the current abstract case, D1/D2 improvement cannot be assigned to
        concrete persons. Realistic improvement lies only in the analysis practice:
        avoid shaming, preserve non-capture, keep roles distinct, and protect
        reversibility.
      - >
        In a later concrete scene, D1/D2 may be improvable through safer review,
        clearer role boundaries, non-public handling, participation, real exit
        options, and language that does not humiliate or rank.

  acrp_profile:
    A_awareness:
      observations: >
        Awareness is structurally high at the conceptual level because the case
        explicitly names multiple asymmetry dimensions: position, exposure,
        dependency, responsibility, and exit. PMS Core already identified Awareness_A
        as active through framed differentiation across time. MIP confirms that
        awareness is the strongest maturity-in-practice dimension of the abstract
        case.
      available_information: >
        Available information includes the case material, PMS Core analysis, and
        PMS-CONFLICT overlay. This information is sufficient for structural awareness
        of the case-type but insufficient for concrete actor awareness, institutional
        awareness, or affected-side awareness.
      realistically_knowable: >
        It is realistically knowable that the case is abstract, that asymmetry and
        temporality are central, that exit/revision/interruption are the main points
        of concern, and that overclaiming would violate guardrails. It is not
        realistically knowable which actor knew what, which alternatives existed,
        or whether lock-in occurred empirically.
      blind_spots: >
        Main blind spots are concrete role distribution, lived experience, material
        constraints, actual publicness, legal status, recurrence evidence, and whether
        rival grammars would describe the decisive feature better than PMS/MIP.
      role_awareness_A_R: >
        Role awareness is partial. The analysis can distinguish abstract role
        positions but cannot specify actual mandates, duties, authority, or role
        conflicts.
      publicness_awareness_A_P: >
        Publicness awareness is methodologically active. The case itself is not
        public, but the analysis recognizes that public transfer would increase
        dignity and reversibility risk.
      bias_awareness: >
        Bias awareness is active. The analysis explicitly marks overfitting,
        coherence inflation, hindsight, status quo bias, dignity bias, and model
        loyalty as risks.
    C_coherence:
      observations: >
        Coherence is moderate and structurally useful but limited. PMS Core and
        CONFLICT yield a coherent reading: asymmetry may harden over time when
        revision, interruption, distance, or exit become difficult or unevenly priced.
        However, MIP treats this coherence as insufficient by itself.
      word_deed_relation: >
        No word-deed relation is available because no concrete speaker, decision,
        promise, communication, or enactment is supplied.
      role_context_coherence: >
        Role-context coherence is partial. The abstract role mapping is internally
        coherent, but the absence of concrete roles prevents assessment of actual
        coherence between mandate, context, and action.
      narrative_coherence: >
        Narrative coherence is high as an abstract structural story, but this is
        also the main risk: the story may become too smooth and under-discriminating
        if used as a substitute for evidence.
      breaks_named_or_hidden: >
        Breaks are named rather than hidden: missing scene evidence, missing role
        data, missing chronology, missing M attribution grounds, missing D activation
        conditions, and rival readings are all explicitly preserved.
    R_responsibility:
      observations: >
        Responsibility is thematically present but not assignable. PMS Core treated
        Responsibility_R as weak because Ψ was not established. CONFLICT treated
        binding collision as a risk only. MIP therefore keeps R as a structural
        question rather than a finding.
      responsibility_points: >
        Potential responsibility points include who controls exit, who controls
        timing, who bears exposure, who can revise the frame, who must carry
        consequences, and who can make asymmetry transparent, justified, time-bound,
        and reversible. None can be assigned to a concrete actor here.
      assumed_responsibility: >
        The only assumed responsibility in this analysis is analyst responsibility:
        preserve guardrails, distinguish material from inference, avoid D misuse,
        keep the analysis reversible, and mark non-capture.
      shifted_or_refused_responsibility: >
        No concrete shifting or refusal can be claimed. A possible structural risk
        is that one side could formalize responsibility while externalizing cost,
        but this remains hypothetical.
      burdens_and_consequences: >
        Burdens and consequences are conceptually central but empirically unknown.
        The case asks how burden may harden under asymmetry; it does not show who
        actually bears which burden.
    P_power_to_act:
      observations: >
        Power to act is the most under-specified A–C–R–P dimension. The case is
        about available exit, revision, and interruption, but it gives no concrete
        levers, options, constraints, or action history.
      real_levers: >
        Real levers are not known. Possible levers in a later scene might include
        review points, exit pathways, role renegotiation, procedural transparency,
        reduction of exposure, and shared access to recontextualization.
      formal_vs_real_options: >
        This distinction is central. The case specifically warns that formal exit,
        formal revision, or formal distance may not equal real availability under
        asymmetry and temporal pressure.
      used_options: >
        No used options are documented.
      unused_options: >
        No unused options can be identified without unfair hindsight. Any claim that
        an actor "could have left", "should have interrupted", or "failed to revise"
        would require concrete evidence of real alternatives.
      ceiling_rule_relevance: >
        High. Because predictability and access to alternatives are not established,
        high M attribution would be barred. If access to alternatives is approximately
        zero in a later concrete scene, M should be capped according to the MIP
        ceiling rule.

