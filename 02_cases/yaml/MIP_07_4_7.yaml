schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
schema_meta:
  canonical_name: "MIP — Maturity in Practice"
  short_name: "MIP"
  version: "v3.0_blocks_appendices_aligned"
  status: "case_application"
  model_status: "MIP_schema_applied_to_existing_PMS_and_CONFLICT_case"
  language: "en"
  last_update: "2026-05-28"
  basis:
    core_blocks:
      - "axiomatic_core"
      - "parameters"
      - "submodule_matrix"
      - "modulators"
      - "discipline_profiles"
      - "IA_box"
      - "scores"
      - "dignity_module"
      - "trajectories"
      - "bias_intuition_norm_change"
      - "guardrails"
      - "case_schema"
    appendices:
      - "frame_vs_variability"
      - "transmission_check"
      - "formal_notation"
      - "uniform_report"
    case_examples_status: >
      This case application uses the uploaded MIP schema as an application schema
      for the already completed PMS Core and PMS-CONFLICT analyses. It does not
      treat MIP as PMS Base and does not modify PMS.yaml.
  intended_use_profiles:
    - "structural maturity-in-practice analysis"
    - "role/context/enactment analysis"
    - "asymmetry hygiene"
    - "guardrail-bound A–C–R–P profiling"
    - "qualitative D observation only if safe and relevant"
    - "transmission-readiness check"
  not_intended_for:
    - "clinical diagnosis"
    - "therapy planning"
    - "forensic judgment"
    - "legal determination"
    - "individual HR decision"
    - "public shaming"
    - "person ranking"
    - "dignity scoring"
    - "PMS Base validation"
    - "CONFLICT Base validation"
    - "implementation or governance authorization"
  governing_principles:
    - "Maturity is an enactment state, not a person type."
    - "Profiles describe structures, roles, and enactments, not persons as wholes."
    - "A-score describes enactment maturity, not essence."
    - "M-score describes shared structural responsibility, not guilt."
    - "D0 is untouched; D1/D2 are qualitative dignity-in-practice observations only."
    - "IA-box is an asymmetry check, not a verdict."
    - "Reflection mode is off; the analysis proceeds without eliciting introspective answers."
    - "No field is used to override PMS Core or PMS-CONFLICT guardrails."
  application_zones:
    green:
      description: >
        Suitable for private structural clarification, philosophical analysis,
        ethical reflection, role-context analysis, supervision-like reflection,
        and non-decisional maturity-in-practice documentation.
      typical_uses:
        - "internal_reflection"
        - "conceptual_structural_clarification"
        - "template_demonstration"
        - "pre-analysis_for_future_scene_documentation"
        - "private_methodological_review"
    yellow:
      description: >
        Conditional use only. Requires strong guardrails, clear publicness
        boundaries, role/context clarity, and explicit transmission review.
      conditions:
        - "no_person_ranking"
        - "no_diagnostic_use"
        - "no_forensic_use"
        - "no_HR_decision_use"
        - "no_public_shaming"
        - "explicit_transmission_check"
    red:
      description: >
        Prohibited use zones for this case application.
      includes:
        - "clinical_diagnosis"
        - "therapy_planning"
        - "forensic_judgment"
        - "legal_determination"
        - "individual_HR_decision"
        - "public_pillory_or_ranking"
        - "online_shaming_or_doxing"
        - "humiliation_diagnostics"
        - "public_D_readings_of_identifiable_persons"
        - "PMS_or_MIP_validation_claim"

agent_interface:
  welcome_message:
    enabled: true
    message_text: >
      This analysis uses MIP as a structured maturity-in-practice case schema. It
      does not judge persons, diagnose actors, rank dignity, assign guilt, or
      authorize action. It analyzes only the abstract case structure already
      examined through PMS Core and PMS-CONFLICT.
  pre_analysis_questions:
    ask_reflection_mode_if_unspecified: false
    ask_d_module_if_unspecified: false
    ask_analysis_mode_if_unspecified: false
    ask_output_format_if_unspecified: false
    ask_discipline_profile_if_unspecified: false
    ask_application_zone_if_unspecified: false
    ask_intended_use_if_unspecified: false
  defaults:
    reflection_mode: "off"
    d_module_preference: "auto"
    analysis_mode: "full"
    output_format: "yaml"
    discipline_profile: "philosophy_anthropology"
    application_zone: "philosophy_anthropology"
    d_activation_rule: "limited_observation_only"
    transmission_default: "working_note_until_checked"
  safe_response_rules:
    if_red_zone_detected: >
      Do not apply the model as an assessment, score, decision basis, public
      judgment, diagnosis, or forensic instrument.
    if_d_module_unclear: >
      Keep the D-module off and use only qualitative dignity-in-practice guardrail
      language.
    if_information_missing: >
      Mark the relevant field as unknown, under-specified, non-assignable, or
      not assessable rather than inferring.
    if_guardrails_fail: >
      Treat the output as non-transmittable and do not use it as decision basis.
    if_user_requests_person_label: >
      Refuse person-labeling and redirect to role-, context-, and enactment-bound
      structural analysis.

model_reference:
  reference_mode: "external_schema_reference_not_reproduced"
  source_file: "MIP - Maturity in Practice.yaml"
  schema_version: "MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned"
  relation_to_pms:
    PMS_yaml: "only_PMS_Base_reference"
    PMS_CONFLICT_yaml: "overlay_application_profile_only"
    MIP_yaml: "additional_maturity_in_practice_application_schema"
    no_operator_redefinition: true
    no_dependency_change: true
  applied_components:
    axiomatic_core:
      - "D0_inalienable"
      - "person_enactment_separation"
      - "five_parameters_A_C_R_P_D"
      - "D1_D2_not_D0"
      - "role_context_publicness"
      - "asymmetry_rule"
      - "maturity_state_not_type"
      - "score_rule"
      - "M_not_guilt"
      - "system_axiom"
      - "documentation_axiom"
      - "bias_norm_intuition_axiom"
      - "tragedy_clause"
      - "guardrail_axiom"
    parameters:
      - "A"
      - "C"
      - "R"
      - "P"
      - "D"
    submodules:
      A:
        - "A-I"
        - "A-R"
        - "A-C"
        - "A-IM"
        - "A-P"
      C:
        - "C-S"
        - "C-P"
        - "C-N"
        - "C-I"
      R:
        - "R-I"
        - "R-S"
        - "R-E"
        - "R-P"
      P:
        - "P-I"
        - "P-S"
        - "P-C"
        - "P-PU"
      D:
        - "D-I"
        - "D-B"
        - "D-R"
        - "D-P"
    modules:
