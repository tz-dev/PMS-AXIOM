pms_anticipation_overlay_application:
  schema_version: "PMS-ANTICIPATION_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-ANTICIPATION.yaml"
  paper_source_file: "PMS-ANTICIPATION.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–ANTICIPATION Application Profile"
    model_short: "PMS-ANTICIPATION"
    status: "draft"
    repository_role: "paper_specific_overlay"
    last_updated: "2026-04-06"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–ANTICIPATION"
      subtitle: "Structural Conditions, Risks, and Viability of Anticipatory Praxis"
      source_file: "PMS-ANTICIPATION.md"
    description: >
      PMS-ANTICIPATION is an application profile / overlay for PMS. It
      formalizes anticipation as a structurally disciplined present stance under
      Λ and Θ in the presence of Ω, sustained by Χ, Σ, and Ψ, without
      redefining PMS operators, canonical dependencies, derived axes, or
      guardrails.
    methodological_restraint: >
      This overlay does not claim monopoly over anticipation analysis. Rival
      framings such as predictive processing, scenario planning, future-state
      estimation, precautionary ethics, or strategic foresight may address
      dimensions that PMS does not foreground. Structural drift here means drift
      relative to PMS criteria, not failure under every possible anticipatory
      standard.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for case title: Calibrating trust correctly"
    rule: >
      This ANTICIPATION block is appended to or integrated with an already
      completed PMS Core v1.3 case artefact. It does not rewrite the core pass,
      redefine PMS operators, alter PMS dependencies, change derived
      structures, or treat ANTICIPATION constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The ANTICIPATION overlay adds visibility for future-oriented trust
      calibration under opacity, possible future confirmation or disconfirmation,
      irreversibility under Θ, asymmetrical exposure under Ω, restraint through
      Χ, integration without closure through Σ, and possible self-binding through
      Ψ. It does not modify the completed PMS Core case and does not convert the
      philosophical case into a concrete praxis scene.

  overlays: {}

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-ANTICIPATION introduces no amplification overlays beyond reduced
      signatures, viability criteria, contrast frames, drift markers,
      post-confirmation discipline, scope limitations, and minimal
      application-protocol constructs. It remains an overlay/application profile
      only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    note: >
      This gate constrains PMS application only. It does not constrain critique,
      refusal, rejection, or rival formalization.
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          A maintained meta-position and stop-capability are present. The
          ANTICIPATION overlay does not fuse the case into verdict, urgency,
          ideology, future-truth authority, action mandate, or role authority.
      reversibility:
        status: "maintained"
        meaning: >
          The anticipatory reading remains case-type-bound, revisable, and
          configuration-specific. It does not generate global person labels,
          irreversible interpretive claims, or future-closure claims.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The ANTICIPATION overlay does not shame, rank, humiliate, coerce,
          ontologically evaluate, or morally assess persons or groups. It
          remains restricted to structural handling of risk, exposure, capacity,
          restraint, and non-coercive consequence awareness under Ω and Θ.
    gate_result: "valid_as_anticipation_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    canonical_source_url: "https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any ANTICIPATION reduced signature is shorthand only. Reduced signatures,
      protocols, comparison profiles, drift markers, and viability criteria do
      not replace PMS dependencies and must not be read as alternative
      dependency paths.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  anticipation_overlay_scope:
    scope_guardrails:
      - "Scene-bound or case-type-bound structural analysis only."
      - "Non-metaphysical, non-psychological, non-clinical, non-diagnostic."
      - "No person-level judgments, no person-ranking, no shaming, no humiliation."
      - "No action mandates, no certainty claims, no future-truth authority."
      - "No conversion of probability into authorization."
      - "No conversion of prognosis into command."
      - "No replacement of justification by anticipatory stance."
      - "No erosion of Dignity-in-Practice under Ω and Θ."
    may_add_visibility_to:
      - "possible future events and non-events"
      - "Λ carried inside □ rather than closed into future truth"
      - "irreversibility under Θ"
      - "asymmetry and exposure under Ω"
      - "restraint through Χ"
      - "integration without totalization through Σ"
      - "self-binding of the anticipator through Ψ"
      - "anticipation versus prognosis contrast"
      - "preparedness and planning constraints"
      - "risk and drift markers"
      - "post-confirmation discipline"
      - "capacity-bounded responsibility"
      - "non-capture and rival framings"
    must_not_do:
      - "treat anticipation as prediction or future-truth claim"
      - "treat probability as authorization"
      - "treat prognosis as command"
      - "replace PMS generativity with explanatory closure"
      - "collapse Λ into certainty"
      - "suspend Χ under urgency"
      - "instrumentalize Ω as coercive authority"
      - "externalize Ψ onto others"
      - "convert anticipation into action mandate"
      - "convert prognosis into command"
      - "claim predictive correctness as PMS validity"
      - "claim PMS Base validation"

  paper_lens:
    name: "Anticipation"
    definition: >
      Anticipation is the structurally disciplined handling of possible future
      events and non-events under irreversibility Θ and asymmetry Ω, without
      closure claims.
    case_application: >
      The case involves anticipation because trust-calibration under inaccessible
      inner experience is oriented toward possible future confirmation,
      disconfirmation, harm, reliability, disappointment, repair, or continued
      opacity. The anticipatory object is not a predicted future fact but a
      present stance toward future-relevant uncertainty in interpersonal praxis.
      ANTICIPATION therefore does not add a new PMS operator and does not
      convert the Core reading into prognosis. It makes visible that the trust
      question already carries a future-facing structure: a present relation to
      what may later become clearer, remain opaque, be repaired, be betrayed,
      be confirmed, or never become decidable.
    non_negotiable_constraints:
      discipline:
        status: "active"
        meaning: >
          Anticipation is regulated by Χ, Σ, and Ψ. Impulses, uncertainties,
          frames, and future-oriented pressures are coordinated without
          totalization or authority claims.
        case_application: >
          Discipline is maintained by keeping the trust question reversible and
          non-authorizing. The overlay does not turn opacity into evidence, does
          not decide trustworthiness, and does not require action merely because
          future consequences are possible. The relevant discipline is not
          passivity, indifference, or refusal to decide; it is the structural
          capacity to keep possible futures present without letting them become
          present-tense verdicts, demands, or permissions.
      non_event_centrality:
        status: "active"
        meaning: >
          Anticipation carries Λ inside □ rather than converting absence,
          uncertainty, or possibility into settled future truth.
        case_application: >
          The central non-event is direct access to the other person's inner
          experience. Future confirmation or disconfirmation may occur, but it
          is not available in the present and must not be treated as already
          settled.
      no_closure_claims:
        status: "active"
        meaning: >
          Anticipation does not translate the possible into certainty, nor the
          probable into authorization, especially under Ω and Θ.
        case_application: >
          The case avoids future-closure by treating trust-calibration as a
          restrained present stance rather than as a forecast, verdict, or
          authority to act upon the other person.
      non_capture_openness:
        status: "active"
        meaning: >
          Some anticipatory configurations may resist clean translation into PMS
          operator chains. Coherent translation alone does not prove exhaustive
          capture.
        case_application: >
          The phenomenology of trust, the other person's actual inner
          experience, and rival epistemic or ethical accounts of opacity remain
          outside exhaustive PMS-ANTICIPATION capture.

  lens_operator_roles:
    note: >
      These are ANTICIPATION-specific overlay roles, not operator
      redefinitions.
    roles:
      "Δ":
        anticipation_role: "Marks a bounded anticipatory object without valuation or truth-claim."
        case_application: >
          Δ bounds the anticipatory object as the difference between present
          opacity and possible future trust-relevant disclosure, confirmation,
          disconfirmation, reliability, non-reliability, repair, or continued
          uncertainty.
      "∇":
        anticipation_role: "Introduces directional tension and closure-drive that must be regulated downstream."
        case_application: >
          ∇ appears as the pressure to decide how much trust is appropriate
          despite incomplete access. This pressure is structural, not a
          psychological diagnosis or proof of urgency.
      "□":
        anticipation_role: "Binds anticipation to a concrete role-space and scope; prevents global projection."
        case_application: >
          □ remains the philosophical and interpersonal trust-calibration frame.
          Because no concrete role-space is supplied, the overlay is
          case-type-bound rather than scene-bound.
      "Λ":
        anticipation_role: "Carries meaningful absence or possibility as structurally decisive."
        case_application: >
          Λ carries both the absence of direct access to the other's inner
          experience and the openness of possible future confirmation,
          disconfirmation, or continued non-availability.
      "Α":
        anticipation_role: "Encodes repetition, patterning, and path-dependence in anticipatory configurations."
        case_application: >
          Α is weak. The abstract case does not show repeated conduct,
          stabilized expectations, or path-dependence; such patterning would be
          required before a stronger anticipatory reliability or drift claim
          could be made.
      "Ω":
        anticipation_role: "Makes restraint consequential by tracking uneven exposure, capacity, or vulnerability."
        case_application: >
          Ω appears as uneven exposure under trust: the trusting party may be
          vulnerable before certainty is available, while the other person's
          inner experience remains inaccessible. No domination, blame, or
          hierarchy is inferred.
      "Θ":
        anticipation_role: "Introduces irreversibility, accumulating cost, closing windows, and durable consequences."
        case_application: >
          Θ marks that trust and distrust can have durable relational
          consequences over time. The case does not specify a concrete temporal
          sequence, so irreversibility is conceptually relevant but not
          empirically established.
      "Φ":
        anticipation_role: "Allows adaptation to new information without retroactive innocence or narrative collapse."
        case_application: >
          Φ is possible where future information changes the frame of trust
          calibration. Such reframing must not retroactively erase the openness
          of the earlier state or pretend that uncertainty was certainty.
      "Χ":
        anticipation_role: "Stop-capability that prevents closure, coercion, and premature enactment under pressure."
        case_application: >
          Χ is central. It suspends premature trust verdicts, distrust verdicts,
          action mandates, and authority claims while allowing the trust problem
          to remain structurally visible.
      "Σ":
        anticipation_role: "Coordinates multiple signals and pressures while keeping Λ open."
        case_application: >
          Σ coordinates opacity, vulnerability, temporal consequence, and rival
          readings into a bounded stance. It does not convert coherence into
          proof of correct trust.
      "Ψ":
        anticipation_role: "Binds the anticipator to restraint and consequence-handling rather than binding others."
        case_application: >
          Ψ is weak and conditional at the case level. It may bind the analyst
          or anticipator to restraint, revisability, and consequence-handling,
          but it does not bind the other person or authorize demands upon them.

  reduced_signatures:
    ANT_min:
      label: "Minimal anticipatory stance"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Θ"
        - "Χ"
      reduced: true
      note: >
        Minimal anticipation is present when a bounded possibility Δ in □
        remains structurally open Λ under irreversibility Θ with sustained
        restraint Χ. This chain is explicitly not action-authorizing.
      case_application: >
        The case meets ANT_min: trust under inaccessible inner experience is a
        bounded possibility in an interpersonal-philosophical frame, Λ remains
        open, Θ matters because trust unfolds through future consequences, and
        Χ prevents the possible future from becoming a present verdict.
    ANT_viable_full:
      label: "Viable anticipatory configuration"
      applicability: "weak"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
      reduced: false
      note: >
        Mature anticipation disciplines impulse, carries openness, recognizes
        pattern stabilization, handles asymmetry across time, adapts, preserves
        distance, integrates without closure, and binds the anticipator.
      case_application: >
        ANT_viable_full is too strong as an established case claim because Α,
        concrete Θ, concrete Ω, enacted Σ, and case-level Ψ are under-specified.
        The full configuration is present only as a possible framework for a
        future concrete trust scene.
    ANT_to_planning_constraint:
      label: "Constraint for downstream planning or preparedness"
      applicability: "weak"
      is_operator: false
      requires:
        - "Χ"
        - "D"
        - "reversibility"
      note: >
        Planning may emerge downstream as a derived praxis form, but must not
        convert probability into compulsion or authority while Λ persists under
        Θ.
      case_application: >
        The present case does not require planning or preparedness. If later
        applied to a concrete trust decision, any downstream planning would have
        to remain constrained by Χ, D, and reversibility and could not convert
        anticipated trust outcomes into compulsion.

  viability_criteria:
    viability_definition:
      label: "Viability"
      definition: >
        An anticipatory configuration is viable if it remains coherent under Λ
        and responsibility-bearing under Ω and Θ, without collapsing Χ.
      success_independence_note: >
        Viability is independent of being right. It remains accountable and
        structurally stable even if the anticipated event does not occur.
      case_application: >
        The case has weak viability as an anticipatory stance. It can remain
        viable if it carries opacity without closure, respects temporal
        consequence, maintains distance, and binds the anticipator to restraint
        rather than predictive correctness. The decisive question is therefore
        not whether the future trust outcome is later confirmed, but whether the
        anticipatory stance remained non-coercive, reversible, dignity-preserving,
        and structurally honest while the outcome was still open.
    positive_criteria:
      Λ_carried:
        status: "satisfied"
        meaning: "Λ is carried, not resolved; openness remains structurally active."
        case_application: >
          The absence of direct access to inner experience remains structurally
          active and is not resolved into certainty, suspicion, or proof.
      Θ_respected:
        status: "weak"
        meaning: "Θ is respected, not compressed; irreversibility and delayed feedback are acknowledged."
        case_application: >
          The case acknowledges that trust calibration has temporal consequence,
          but no concrete sequence, delay, feedback loop, or irreversible window
          is supplied.
      Χ_active:
        status: "satisfied"
        meaning: "Χ remains active even under high probability; likely does not become authorized."
        case_application: >
          Distance remains active by refusing trustworthiness verdicts, distrust
          verdicts, probability-based authorization, or action mandates.
      Ψ_binds_self:
        status: "weak"
        meaning: "Ψ binds the anticipator, not others; binding is not externalized as obligation."
        case_application: >
          Ψ weakly binds the analyst or anticipator to restraint and
          consequence-handling. The case does not show a concrete agent's
          durable self-binding practice.
      Σ_integrates_openness:
        status: "weak"
        meaning: "Σ coordinates uncertainty and conflict without producing false certainty."
        case_application: >
          Σ coordinates opacity, asymmetry, temporality, and distance only as a
          bounded conceptual integration. It remains insufficient to determine
          correct trust. In this case, a viable Σ would have to keep together
          several tensions without dissolving them: the need to trust or withhold
          trust, the impossibility of inner access, the possible future costs of
          error, the dignity of the other person, and the continued legitimacy
          of rival interpretations.
    formal_invalidity_markers:
      certainty_replaces_Λ:
        status: "absent"
        marker: "Λ replaced by certainty"
        structural_effect: "Closure shift; future treated as settled."
        case_application: >
          The overlay does not treat future reliability, betrayal,
          confirmation, or disconfirmation as settled.
      actionism_neutralizes_Θ:
        status: "absent"
        marker: "Θ neutralized by action compulsion"
        structural_effect: "Irreversibility denied; trajectory weight ignored."
        case_application: >
          No action compulsion is introduced; Θ is acknowledged as a reason for
          restraint rather than urgency.
      Χ_suspended:
        status: "absent"
        marker: "Χ suspended through assumed superior knowledge"
        structural_effect: "Distance collapses into authority."
        case_application: >
          The overlay does not claim superior access to inner experience or
          predictive authority over future trust outcomes.
      Ω_instrumentalized:
        status: "absent"
        marker: "Ω instrumentalized"
        structural_effect: "Power gradient used to enforce compliance."
        case_application: >
          Ω is treated as exposure and vulnerability, not as authority to
          pressure, rank, accuse, or command.
      Ψ_externalized:
        status: "absent"
        marker: "Ψ externalized"
        structural_effect: "Binding shifted outward; pathway to coercion or moralization."
        case_application: >
          Ψ is not shifted onto the other person. No one is required to trust,
          disclose, prove, or act because of the anticipatory mapping.

  contrast_frames:
    anticipation_vs_prognosis:
      prognosis:
        applicability: "not_applicable"
        characterization: >
          Prognosis is a future-truth claim posture: a specific future state is
          treated as sufficiently settled to justify coordination.
        core_features:
          - "Claim about future truth; closure pressure on Λ."
          - "Hit/miss evaluation by correspondence."
          - "Success-oriented pull toward near-term optimization and action."
        pms_status_note: >
          Prognosis may be used as descriptive input, but becomes formally
          invalid within PMS anticipatory criteria when it supplies authority,
          especially by closing Λ, suspending Χ, or eroding D.
        case_application: >
          The case contains no statistical, clinical, strategic, or behavioral
          prognosis. It asks how trust may be calibrated under opacity, not what
          the other person will do.
      anticipation:
        applicability: "active"
        characterization: >
          Anticipation is a present structural stance: carrying uncertainty
          without closure claims.
        core_features:
          - "Operates in the present as stance, not forecast."
          - "Viable under non-occurrence because Λ is explicitly retained."
          - "Responsibility without event-dependence because Ψ binds under Ω and Θ."
        preparedness_distinction_note: >
          Preparedness or planning may emerge downstream; anticipation itself
          does not mandate readiness, execution, or intervention.
        downstream_constraints:
          - "Χ"
          - "D"
          - "reversibility"
        case_application: >
          The case remains anticipation because it concerns a present stance
          toward possible future trust-relevant outcomes while preserving Λ,
          Χ, and reversibility.

  prognosis_contrast:
    handling_rule:
      note: >
        Prognoses may inform anticipation only as descriptive material,
        reprocessed through □ and Α under Θ. Prognosis may supply content, but
        must not supply authority.
      invalidity_triggers:
        - "Λ becomes settled future truth."
        - "Ω becomes coercion warrant and erodes D."
      case_application: >
        No prognosis-like content is supplied. If a concrete case later added
        evidence about likely future conduct, it would remain descriptive input
        only and could not supply authority.
    types:
      statistical:
        structural_basis:
          - "Α"
          - "Θ"
        pms_status: "Permitted as descriptive input, non-authorizing."
        case_application: >
          Statistical prognosis does not appear; no data, frequency, probability,
          or prediction base is supplied.
      scenario_based:
        structural_basis:
          - "□"
          - "Λ"
          - "Χ"
        pms_status: "Compatible if Λ remains open and Χ remains active."
        case_application: >
          Scenario-based anticipation appears weakly as the possibility that
          future trust-relevant events or non-events may matter, but no concrete
          scenario set is developed.
      strategic:
        structural_basis:
          - "Ω"
          - "Θ"
        pms_status: "Viability requires explicit Χ and D."
        case_application: >
          Strategic anticipation is not established. The case does not specify
          objectives, tactics, planning horizons, or optimization problems.
      preventive:
        structural_basis:
          - "Λ"
          - "Ω"
          - "Θ"
        pms_status: "Invalid if Λ is closed into certainty or reversibility is suspended."
        case_application: >
          Preventive logic is not active. The overlay does not recommend
          preventive intervention, withdrawal, testing, or control.
      moralized:
        structural_basis:
          - "Ω"
          - "Ψ"
        pms_status: "Excluded where normative escalation authorizes closure or coercion."
        case_application: >
          Moralized anticipation is absent. The case does not frame trust,
          distrust, delay, or uncertainty as virtue, vice, blame, or duty.

  configuration_comparison:
    note: "This comparison concerns configurations, not persons."
    action_proximate:
      applicability: "not_applicable"
      descriptors:
        - "anticipatory"
        - "probabilistic"
        - "outcome-bound"
        - "action-proximate"
      structural_strength: "Early Action_E effectiveness."
      primary_risk: "Outcome-binding of Ψ; closure drift; escalation-prone Ω."
      typical_drift_pattern: "Preventive overreach through Ω instrumentalization."
      case_application: >
        The case does not lean toward action-proximate anticipation because it
        supplies no concrete action, probability, readiness requirement, or
        intervention context.
    restraint_oriented:
      applicability: "active"
      descriptors:
        - "suspensive"
        - "criterial"
        - "outcome-agnostic"
        - "stability-oriented"
      structural_strength: "Long-term stability via Σ and Ψ without collapsing Λ."
      primary_risk: "Loss of momentum due to prolonged Χ; delayed intervention."
      typical_drift_pattern: "Delayed action despite rising Ω and closing Θ-windows."
      case_application: >
        The case leans toward restraint-oriented anticipation because correct
        calibration under inaccessible inner experience requires holding Λ open,
        maintaining Χ, and avoiding premature trust or distrust verdicts.
    core_tradeoff:
      statement: >
        Effectiveness tends to increase as Ψ binds toward E; stability tends to
        increase as Χ precedes E. These are incompatible optimizations,
        structural rather than simply corrigible by better information.
      case_application: >
        In this case the tradeoff is mostly theoretical: moving toward action
        would require concrete scene evidence, while maintaining restraint
        preserves stability but may leave practical enactment under-specified.

  risk_and_drift_patterns:
    note: >
      ANTICIPATION drift patterns are configuration markers, not diagnoses,
      person-types, moral verdicts, or enforcement categories.
    structural_drift_patterns:
      preemptive_authoritarian_drift:
        label: "Preemptive authoritarian drift / Ω-inflation"
        applicability: "not_applicable"
        typical_marker: "Anticipatory stance becomes power instrument."
        invalidity_links:
          - "Ω_instrumentalized"
          - "Χ_suspended"
          - "Ψ_externalized"
        case_application: >
          This drift is not active because the overlay does not use trust
          anticipation as a power instrument or coercive authority.
      probability_action_compulsion:
        label: "Probability-induced action compulsion"
        applicability: "not_applicable"
        typical_marker: "Probability rhetoric produces must-act compulsion."
        invalidity_links:
          - "actionism_neutralizes_Θ"
          - "Χ_suspended"
          - "certainty_replaces_Λ"
        case_application: >
          Probability does not appear in the case, and no must-act compulsion is
          generated.
      moralization_of_uncertainty:
        label: "Moralization of uncertainty"
        applicability: "risk"
        typical_marker: "Λ is treated as normative warrant; pressure framed as virtue."
        invalidity_links:
          - "certainty_replaces_Λ"
          - "Ψ_externalized"
          - "Ω_instrumentalized"
        case_application: >
          The main risk is that uncertainty about inner experience could be
          moralized as an obligation to trust, distrust, disclose, or prove.
          The overlay blocks this by preserving Λ, Χ, D, and reversibility.
          This is especially important because trust language can easily become
          normatively loaded: refusal to trust may be framed as failure, trust
          may be framed as virtue, and requests for distance may be framed as
          deficiency. PMS-ANTICIPATION must not endorse any of these escalations
          without a concrete scene and independent warrant.
      preventive_escalation:
        label: "Preventive escalation"
        applicability: "not_applicable"
        typical_marker: "Irreversible commitments justified before Λ is resolved."
        invalidity_links:
          - "actionism_neutralizes_Θ"
          - "Ω_instrumentalized"
          - "reversibility"
        case_application: >
          Preventive escalation is not active because the case contains no
          proposed intervention or irreversible commitment.
      AD_A_much_greater_E:
        label: "AD_A≫E / over-reflection, under-enactment"
        applicability: "risk"
        related_pms_pattern: "AD_A>>E from PMS Base"
        typical_marker: "Chronic delay of E due to sustained distancing without consolidation."
        note: >
          Structural drift pattern where evaluative or reflective space expands
          while integrated enactment remains chronically delayed or suppressed.
        case_application: >
          This is a risk only. The philosophical case could over-expand
          reflective trust awareness while leaving enactment suspended, but no
          concrete chronic delay is evidenced.
    most_dangerous_error:
      status: "risk"
      statement: "Using anticipation to legitimate intervention instead of binding oneself to restraint."
      structural_diagnosis: >
        This externalizes Ψ and collapses Χ under Ω/Θ pressure, producing a
        critical breach of PMS entry conditions and eroding D.
      pms_conclusion: >
        Anticipation is structurally valid only when it increases the
        anticipator’s obligation to restraint and consequence-handling, not when
        it supplies authority.
      case_application: >
        The risk would arise if the opaque inner experience of the other were
        used to justify testing, coercing, ranking, or forcing disclosure. The
        present overlay does not do this.

  post_confirmation_discipline:
    applicability: "weak"
    structural_shift_after_confirmation:
      notes:
        - "Λ partially collapses into an event; pressure for immediacy increases under Θ."
        - "Ω may be socially reinterpreted as epistemic authority."
        - "Confirmation is a second-order test: validation must restore restraint, not accelerate dominance."
      case_application: >
        Post-confirmation discipline is weakly relevant because trust may later
        be confirmed or disconfirmed by conduct. The case does not provide such
        confirmation, so this remains a future guardrail only.
    typical_drift_patterns:
      psi_overbinding:
        label: "Ψ-overbinding"
        applicability: "risk"
        meaning: "Binding identity to correctness."
        case_application: >
          Risk appears only if a later correct trust or distrust judgment
          becomes identity-binding or proof of superior judgment.
      omega_epistemic_inflation:
        label: "Ω-inflation at epistemic level"
        applicability: "risk"
        meaning: "Validation becomes superiority claim."
        case_application: >
          Risk appears only if later being right about trust is converted into
          epistemic superiority over the other or over rival readers.
      chi_erosion:
        label: "Χ-erosion"
        applicability: "risk"
        meaning: "Loss of distance after being right."
        case_application: >
          Risk appears only if later confirmation weakens distance and produces
          retrospective closure.
      lambda_rewrite:
        label: "Λ-denial retroactively"
        applicability: "risk"
        meaning: "Uncertainty is rewritten as inevitability."
        case_application: >
          Risk appears only if later events are used to claim that the outcome
          was already knowable or inevitable.
    requirement_reopen_distance:
      core_claim: >
        Confirmation makes visible whether restraint was maintained under the
        structural pressures tracked here.
      required_moves:
        - "Re-suspend closure claims; Λ is never fully eliminated."
        - "Renew contingency acknowledgment under Θ."
        - "Refuse generalization from single confirmations into enduring Ω dominance."
      pms_note: >
        Within PMS criteria, confirmation calls for renewed distance rather than
        accelerated entitlement to act.
      case_application: >
        If future conduct confirms or disconfirms trust, the overlay would
        reopen Χ by refusing retrospective inevitability, refusing superiority
        claims, and preserving the difference between being confirmed and having
        had future-truth authority. Later confirmation may justify revising the
        trust stance, but it does not prove that the earlier opacity was already
        resolved, that rival framings were invalid, or that the anticipator had
        a right to coerce, accuse, demand proof, or claim epistemic dominance.

  structural_potentials_and_costs:
    possible_advantages:
      reduced_surprise_amplitude:
        applicability: "weak"
        meaning: "Carrying Λ under Θ can soften discontinuities."
        case_application: >
          Carrying the possibility of future confirmation, disconfirmation, or
          continued opacity may soften surprise, but no concrete event sequence
          is supplied.
      crisis_resilience:
        applicability: "weak"
        meaning: "Χ + Σ can reduce drift into reactive actionism."
        case_application: >
          Crisis resilience is weakly relevant because Χ and Σ can prevent
          reactive trust or distrust closure under uncertainty.
      early_self_binding:
        applicability: "weak"
        meaning: "Ψ may stabilize responsibility independently of outcomes."
        case_application: >
          Early self-binding is relevant only as self-binding to restraint and
          revisability, not as predictive commitment.
      escalation_dampening:
        applicability: "active"
        meaning: "Disciplined Ω handling can reduce power inflation."
        case_application: >
          Escalation dampening is active as a guardrail: asymmetry under trust
          opacity is not used to authorize coercion, accusation, or ranking.
      protection_of_vulnerable_positions:
        applicability: "active"
        meaning: "D is more likely to be preserved, especially after confirmation."
        case_application: >
          Protection of vulnerable positions is active because both the trusting
          party and the opaque other can be harmed by premature closure,
          coercive demands, or person-level verdicts.
    possible_disadvantages:
      increased_structural_load:
        applicability: "active"
        meaning: "Carrying Λ under Θ is demanding."
        case_application: >
          The overlay increases structural load by requiring opacity, future
          openness, asymmetry, distance, and rival readings to be held together
          without closure.
      self_overstabilization:
        applicability: "risk"
        meaning: "Confirmation may harden Α and misplace Ψ."
        case_application: >
          If future confirmation occurs, a person might over-stabilize the
          anticipatory stance into identity or authority. This is only a risk,
          not a current claim.
      delayed_action:
        applicability: "risk"
        meaning: "Strong Χ/Σ can overshoot favorable Θ-windows."
        case_application: >
          Delayed action is a theoretical risk if a concrete scene later
          requires timely action; the current philosophical case provides no
          such window.
      misuse_as_power_instrument:
        applicability: "risk"
        meaning: "Anticipatory stance may be weaponized and erode D."
        case_application: >
          Misuse is possible if the anticipatory language of trust becomes a
          way to pressure the other into disclosure, proof, or compliance.
      misinterpretation_as_knowing_better:
        applicability: "risk"
        meaning: "Others may project dominance onto restraint."
        case_application: >
          Restraint could be misread as epistemic superiority if the analyst
          appears to hold the other person's future in advance. The overlay
          blocks this by denying future-truth authority.
    conclusion_note: >
      Anticipation loses viability within PMS not by being wrong, but by losing
      restraint when rightness tempts authority.

  responsibility_and_dignity_links:
    responsibility:
      core_claim: "Anticipation does not authorize action — it deepens responsibility for restraint."
      status: "weak"
      constraints:
        capacity_bounded_attribution:
          status: "weak"
          meaning: "Responsibility attaches only where effective, frame-bound influence exists."
          case_application: >
            Effective influence is not concretely specified. Responsibility
            therefore attaches only to the analyst's or anticipator's handling
            of the interpretation, not to the other person.
        non_outcome_dependency:
          status: "satisfied"
          meaning: "Responsibility is grounded in Ψ, not correctness."
          case_application: >
            The overlay remains responsible by maintaining restraint whether
            trust is later confirmed, disconfirmed, or left unresolved.
        asymmetry_discipline:
          status: "satisfied"
          meaning: "Anticipatory insight increases protection-discipline under Ω, not entitlement to act."
          case_application: >
            Ω requires more restraint because opacity and exposure can harm
            both sides if converted into verdict or coercive demand.
        distance_sustained:
          status: "satisfied"
          meaning: "Responsibility remains viable only if Χ stays active under Θ and Ω."
          case_application: >
            Χ is sustained by refusing action mandates, certainty claims,
            person-ranking, and predictive authority.
    dignity_in_practice:
      core_claim: "Anticipation is PMS-valid only if it preserves D under Ω, especially after confirmation."
      status: "active"
      non_negotiable_conditions:
        no_fear_production:
          status: "satisfied"
          meaning: "Must not amplify threat narratives or urgency in ways that convert Λ into inevitability."
          case_application: >
            The overlay does not turn opacity into threat, inevitable betrayal,
            inevitable harm, or urgent suspicion.
        no_coercion_generation:
          status: "satisfied"
          meaning: "Must not justify pressure or compulsion; prevents Ω dominance and dignity erosion."
          case_application: >
            The overlay does not justify forcing disclosure, proof, trust,
            distrust, confrontation, or compliance.
        no_replacement_of_justification:
          status: "satisfied"
          meaning: "Cannot substitute for reasons; justification must be recontextualized through Φ rather than imported as authority."
          case_application: >
            Anticipation is not used as justification. It only marks structural
            constraints on any future justification that might be attempted in a
            concrete scene.

  derived_axes_reference:
    note: >
      Axes are canonical PMS derived structures. This overlay states relevance
      under the anticipation lens only and does not redefine A/C/R/E/D.
    Awareness_A:
      status: "active"
      note: "Sustains framed differentiation over time without escalating into certainty."
      case_application: >
        Awareness_A is sharpened as the capacity to hold the distinction between
        present opacity and possible future trust-relevant outcomes without
        escalating that distinction into certainty.
    Coherence_C:
      status: "weak"
      note: "Maintains anticipatory narratives under non-occurrence and delay."
      case_application: >
        Coherence_C is weak because the case can form a coherent anticipatory
        stance, but no temporal history tests whether coherence remains stable
        under delay, non-occurrence, confirmation, or disconfirmation.
    Responsibility_R:
      status: "weak"
      note: "Attaches where capacity exists; binds through Ψ under Ω and Θ, not through being right."
      case_application: >
        Responsibility_R attaches only to restraint in the interpretation. It
        does not attach as a concrete duty toward action or as responsibility
        for the other person's inner experience.
    Action_E:
      status: "under_specified"
      note: "May follow downstream, but does not arise from anticipation without Χ, D, and reversibility."
      case_application: >
        Action_E remains under-specified because no concrete trust action,
        withholding action, disclosure request, repair practice, or decision
        procedure is supplied.
    Dignity_in_Practice_D:
      status: "active"
      note: "Non-coercive handling of Ω; tested especially after confirmation."
      case_application: >
        D constrains the overlay by keeping asymmetry non-coercive and by
        blocking person-ranking, shaming, forced disclosure, and retrospective
        superiority claims.

  scope_limitations_and_rival_framings:
    where_this_analysis_ends:
      note: >
        This overlay analyzes anticipation as a praxeological configuration
        under Ω, Θ, Λ, and Χ. It does not claim to exhaust what anticipation is
        or how it may be analyzed.
      rival_domains:
        epistemic_anticipation:
          relevance: "active"
          description: "Forecasting, Bayesian updating, and evidence-based prediction address future-state estimation."
          case_application: >
            Epistemic anticipation remains a rival or complementary frame
            because trust can also be analyzed in terms of evidence, belief,
            credibility, and updating.
        phenomenological_anticipation:
          relevance: "active"
          description: "Lived futurity, affective orientation, and projection lie outside PMS by design."
          case_application: >
            Phenomenological anticipation remains a non-capture zone because
            PMS-ANTICIPATION does not claim to describe lived futurity,
            anxiety, hope, care, or encounter with another subject.
        strategic_anticipation:
          relevance: "weak"
          description: "Foresight, optimization, and scenario gaming may overlap, but strategic success is not a PMS criterion."
          case_application: >
            Strategic anticipation is weakly relevant only if the trust problem
            becomes an applied planning or risk-management case. It is not
            established by the abstract material.
    genuine_non_capture:
      status: "kept_open"
      note: >
        Not all anticipatory phenomena must translate cleanly into PMS operator
        chains. Non-capture becomes plausible where PMS generates a coherent
        reading but weakens what is structurally decisive in the case.
      examples:
        - "Closure as viability condition in emergency response, triage, wartime command, or rapidly escalating safety scenarios."
        - "Configurations where Ω is too weak for restraint-under-asymmetry to be structurally central."
        - "Extreme temporal compression where Φ, Χ, Σ, and Ψ do not stabilize."
      case_application: >
        Non-capture remains open for the other person's actual inner
        experience, the phenomenology of trusting, ethical recognition of
        opacity, and any concrete evidence-based account of warranted trust.
    complementarity:
      note: >
        PMS-ANTICIPATION should not be presented as the only legitimate
        analysis of anticipation. The relevant question is where each framing
        becomes structurally productive and where it obscures what other
        framings make visible.
      comparisons:
        - "Predictive processing / Active Inference"
        - "Scenario planning / futures studies"
        - "Precautionary ethics"
      case_application: >
        Complementary frames remain open: predictive or Bayesian accounts may
        address evidence and probability, phenomenology may address lived
        opacity, and ethics may address recognition, care, or permissible
        reliance.
    what_this_overlay_does_not_claim:
      - "that all non-PMS anticipatory framings are structurally wrong"
      - "that predictive or strategic anticipation are invalid as such"
      - "that restraint is always the dominant criterion in every anticipatory configuration"
      - "that PMS-ANTICIPATION exhausts the field of future-oriented praxis"

  methodological_appendix_alignment:
    minimal_application_protocol_MAP:
      status: "completed"
      note: >
        Any PMS-ANTICIPATION application should answer all five questions in a
        scene-bound or case-type-bound way.
      steps:
        frame_validity_check:
          operator: "□"
          status: "satisfied"
          questions:
            - "What is the concrete role space?"
            - "Where does influence actually exist?"
            - "What is out of scope?"
          invalidity_marker: "Global anticipation without a frame violates PMS frame-boundedness."
          case_application: >
            The frame is a philosophical and interpersonal trust-calibration
            frame, not a concrete role-space. Influence exists only at the
            level of interpretation and restraint. Empirical, diagnostic,
            legal, clinical, and implementation uses remain out of scope.
        non_event_integrity_check:
          operator: "Λ"
          status: "satisfied"
          questions:
            - "What might not happen?"
            - "What absences are structurally decisive?"
            - "Where is closure pressure appearing?"
          invalidity_marker: "Treating absence as unlikely but irrelevant equals prognosis drift."
          case_application: >
            Direct access to inner experience may never occur, and future
            confirmation or disconfirmation may not occur. The decisive absence
            is preserved rather than closed into certainty. Closure pressure
            appears as the temptation to decide trustworthiness from opacity
            alone.
        asymmetry_audit:
          operator: "Ω"
          status: "weak"
          questions:
            - "Who carries exposure?"
            - "Who carries capacity?"
            - "Who bears irreversible cost?"
          invalidity_marker: "Anticipation under Ω without restraint equals latent coercion."
          case_application: >
            Exposure is structurally present for a trusting party under opacity,
            while the other may be vulnerable to being judged or pressured. No
            concrete capacity or irreversible cost is specified, so the audit
            remains weak.
        distance_enforcement:
          operator: "Χ"
          status: "satisfied"
          questions:
            - "Where is action pressure rising?"
            - "Where is probability used rhetorically?"
            - "Where is urgency replacing structure?"
          invalidity_marker: "Any analysis that demands action violates PMS entry conditions."
          case_application: >
            Action pressure is not accepted. Probability rhetoric is absent.
            Urgency is not allowed to replace structure; the overlay preserves
            stop-capability and reversible interpretation.
        self_binding_test:
          operator: "Ψ"
          status: "weak"
          questions:
            - "Who is bound by this anticipation?"
            - "Is binding internal or externalized?"
            - "Does the anticipator carry consequence?"
          invalidity_marker: "Others must act now equals Ψ-externalization."
          case_application: >
            Binding is internal to the analyst or anticipator as restraint and
            consequence-handling. It is not externalized onto the other person
            as an obligation to disclose, prove, trust, or act.

    red_flag_patterns:
      note: "Immediate PMS invalidity markers as phrase-patterns."
      table:
        - pattern: "We must act because…"
          structural_diagnosis: "Λ collapsed"
          case_relevance: "absent"
        - pattern: "The data clearly shows…"
          structural_diagnosis: "Α → certainty"
          case_relevance: "absent"
        - pattern: "Responsibility demands intervention"
          structural_diagnosis: "Ω instrumentalized"
          case_relevance: "absent"
        - pattern: "Delay is irresponsible"
          structural_diagnosis: "Χ suspended"
          case_relevance: "absent"
        - pattern: "They should have known"
          structural_diagnosis: "retroactive guilt"
          case_relevance: "absent"

    pms_compatible_outputs:
      allowed:
        - "Structural mappings"
        - "Risk articulation without prescriptions"
        - "Constraint descriptions"
        - "Capacity-bounded responsibility attribution"
        - "Post-confirmation restraint requirements"
      disallowed:
        - "Action mandates"
        - "Moral imperatives"
        - "Optimization advice"
        - "Agent ranking"
        - "Certainty claims"
      case_output_boundary: >
        This case produces structural mapping, constraint description, and
        non-prescriptive risk articulation. It does not produce an action
        mandate, moral imperative, optimization advice, ranking, or certainty
        claim.

    self_application_meta_rule:
      status: "satisfied"
      statement: "Any use of PMS-ANTICIPATION is itself subject to PMS."
      formal_invalidity_triggers:
        - "Χ dropped to be clearer"
        - "Ψ shifted to others"
        - "D relaxed for efficiency"
      consequence: "Analysis is not mistaken, but formally invalid."
      case_application: >
        The overlay keeps its own anticipation disciplined by preserving Χ,
        binding only the analysis to restraint, maintaining D, and refusing to
        strengthen the Core case into a concrete verdict.

    cannot_do_can_do:
      cannot:
        - "supply action mandates or prescriptions"
        - "evaluate anticipatory success by predictive accuracy alone"
        - "replace epistemic, phenomenological, or strategic anticipatory analysis"
        - "determine that every closure-demand is structurally illegitimate"
        - "decide when action must occur in non-PMS terms"
      can:
        - "make structural drift visible under PMS criteria"
        - "track how Λ, Ω, Θ, and Χ interact in anticipatory configurations"
        - "distinguish self-binding from other-binding under anticipatory load"
        - "show when anticipation becomes structurally coercive, prematurely closed, or externally authorized"
      case_application: >
        The overlay can show how trust-calibration carries future-oriented
        openness under opacity and how drift toward closure, coercion, or
        prognosis would violate PMS-ANTICIPATION discipline. It cannot decide
        whether to trust, distrust, intervene, wait, ask, disclose, or withdraw.

  example_suite_schema_alignment:
    status: "reference_only_not_used_as_case_output"
    source: "PMS-ANTICIPATION.yaml:example_suite_schema"
    required_blocks_reference:
      - "Minimal vignette (scene-bound)"
      - "Why this is repo-useful (structural focus)"
      - "Operator mapping (reduced signature)"
      - "Typical drift markers (max 2–3; non-moral)"
      - "Validity gate reminder (Χ + reversibility + D)"
      - "Readable structural closure (2–5 sentences; non-instructional)"
    axiom_case_policy: >
      AXIOM cases do not generate a separate PMS-ANTICIPATION example suite.
      The schema is retained as a reference for scene-bound, non-instructional
      rendering discipline only.

  anticipation_overlay_quality_control:
    status: "passed"
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      validity_gate_checked: true
      no_future_truth_claim: true
      no_probability_authorization: true
      no_action_mandate: true
      lambda_carried_not_closed: true
      theta_respected_not_compressed: true
      chi_active_under_probability_or_pressure: true
      psi_binds_self_not_others: true
      omega_not_instrumentalized: true
      dignity_in_practice_preserved: true
      prognosis_contrast_checked: true
      viability_criteria_checked: true
      formal_invalidity_markers_checked: true
      drift_patterns_not_person_labels: true
      post_confirmation_discipline_checked: true
      methodological_protocol_checked: true
      rival_framings_preserved: true
      non_capture_preserved: true
      example_suite_schema_alignment_present: true
    issues_found:
      - "none"
    correction_required: false
    final_overlay_judgment: >
      The ANTICIPATION overlay is valid, bounded, non-authorizing, and correctly
      subordinated to the completed PMS Core case and PMS.yaml.

  anticipation_overlay_synthesis:
    primary_anticipation_reading: >
      PMS-ANTICIPATION makes visible that trust-calibration under inaccessible
      inner experience is not only a present epistemic or relational problem but
      also a future-oriented stance: it carries possible future confirmation,
      disconfirmation, harm, reliability, repair, or continued opacity without
      converting these possibilities into prognosis or authority. Its main
      contribution to the Core case is therefore not additional content about
      the other person, but stricter discipline around how possible futures are
      held before they become events, evidence, or non-events.
    anticipation_vs_prognosis_result: >
      The case remains anticipation rather than prognosis. It does not forecast
      what the other person will do, does not estimate probability, and does not
      treat future conduct as settled.
    non_event_result: >
      Λ remains active as the absence of direct access to inner experience and
      as the openness of possible future events or non-events relevant to trust.
      This openness is carried rather than closed.
    temporality_result: >
      Θ structures the case as future-relevant because trust stances can have
      durable consequences and may be confirmed, disconfirmed, revised, repaired,
      or left unresolved over time. Concrete irreversibility remains
      under-specified.
    asymmetry_result: >
      Ω distributes exposure unevenly: a trusting party may be vulnerable before
      certainty is available, while the other person may be vulnerable to
      premature judgment or pressure. Ω remains disciplined by Χ and D.
    distance_and_restraint_result: >
      Χ prevents opacity, probability, urgency, or later confirmation from
      becoming authorization. It keeps the overlay reversible, non-coercive, and
      non-tribunal.
    self_binding_result: >
      Ψ weakly binds the analyst or anticipator to restraint and
      consequence-handling. It does not bind the other person and does not
      authorize demands, disclosure pressure, trust demands, or distrust
      verdicts.
    viability_result: >
      The anticipatory configuration is minimally viable under ANT_min and weak
      under ANT_viable_full. Full viability would require a concrete scene,
      recurrence, temporal sequence, specified asymmetry, and enacted
      self-binding.
    drift_result: >
      The main ANTICIPATION drift risks are moralization of uncertainty,
      AD_A≫E-style over-reflection without enactment, and later
      post-confirmation authority inflation. These are constrained by Λ, Χ, D,
      reversibility, and non-externalized Ψ.
    post_confirmation_result: >
      Post-confirmation discipline is weakly relevant as a future guardrail. If
      trust is later confirmed or disconfirmed, distance must be reopened so
      that confirmation does not become superiority, inevitability, or
      retrospective authority.
    final_anticipation_formula_or_signature: >
      ANT_min active; ANT_viable_full weak; ANT_to_planning_constraint weak and
      non-authorizing. The case supports a minimal anticipatory stance because
      Λ, Θ, and Χ are structurally central, but it does not yet support a full
      viable anticipatory configuration because recurrence, concrete asymmetry,
      enacted integration, and durable self-binding remain under-specified.
    closing_formula:
      quote: "Anticipation is not about being early — it is about being bound before acting."
      case_application: >
        The formula applies insofar as correct trust-calibration under opacity
        requires the anticipator to be bound to restraint, reversibility, and
        consequence-awareness before any action or verdict is justified.