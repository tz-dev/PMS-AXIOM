  meta_notes:
    bias_risks:
      confirmation_bias: >
        Risk of reading every parity/asymmetry mismatch as pseudo-symmetry
        because PMS and EDEN already fit the pattern.
      hindsight_bias: >
        Risk of treating uneven consequences as predictable without evidence of
        what role-positions could realistically know in advance.
      status_quo_loyalty_bias: >
        Risk of treating institutional or formal parity as legitimate merely
        because it is established.
      halo_horn_effects: >
        Risk of letting the term pseudo-symmetry cast a negative shadow on
        unspecified actors or institutions.
      in_group_out_group_bias: >
        Risk of judging the parity-asserting side or uneven-cost-bearing side
        differently depending on prior sympathies.
      dignity_bias_effect: >
        Risk of giving dignity bonus or penalty to a role-position despite the
        absence of D-module activation.
