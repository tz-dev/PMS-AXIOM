schema_version: "MIP_Maturity_in_Practice_v3.0_case_analysis"
schema_role: "mip_case_analysis_over_completed_pms_core_and_pms_eden_overlay"
analysis_mode: "full"
reflection_mode: "off"
output_format: "yaml"
language: "en"

source_alignment:
  mip_profile:
    source_file: "MIP - Maturity in Practice.yaml"
    schema_version: "MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned"
    role: "model reference and case template for this additional analysis"
  pms_base:
    source_file: "PMS.yaml"
    schema_version: "PMS_1.3"
    role: "only PMS Base reference"
    handling: "not_redefined_not_reordered_not_revised"
  eden_overlay:
    source_file: "PMS-EDEN.yaml"
    schema_version: "PMS-EDEN_2.0"
    role: "overlay/application profile only"
    handling: "used_as_completed_overlay_anchor_not_as_PMS_Base"
  completed_core_case:
    title: "Pseudo-Symmetry"
    role: "completed PMS-Core case analysis"
    handling: "anchor_only_not_rewritten"
  completed_eden_case_overlay:
    title: "Pseudo-Symmetry — PMS-EDEN Overlay"
    role: "completed EDEN overlay over PMS-Core case"
    handling: "anchor_only_not_rewritten"
  analysis_boundary: >
    This MIP layer is an additional structural analysis over the completed
    PMS-Core and PMS-EDEN case analyses. It does not revise PMS Base, redefine
    PMS operators, change PMS dependencies, overwrite the PMS-Core pass, or turn
    EDEN overlay constructs into MIP scores, person labels, prescriptions, or
    application authority.

case:
  meta:
    case_id: "MIP-PSEUDO-SYMMETRY-PMS-EDEN-OVERLAY"
    case_title: "Pseudo-Symmetry — MIP Analysis over PMS-Core and PMS-EDEN Overlay"
    documentation_date: "2026-07-01"
    analysts:
      - name: "ChatGPT"
        role: "formalization_assistant"
        observer_position: >
          External structural analyst; no access to private motives, lived
          experience, empirical scene evidence, affected-role testimony, legal
          facts, clinical facts, or institutional records.
    language: "en"
    confidentiality_level: "conceptual_internal_working_note_non_person_specific"
    analysis_mode: "full"
    intended_use: >
      Structural case review and model integration only; not a decision basis,
      sanction basis, diagnosis, clinical assessment, HR assessment, legal or
      forensic assessment, intervention protocol, person label, or prescription.
    application_zone: "green_with_yellow_caution_if_later_applied_to_real_identifiable_persons"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: "auto"
      output_format: "yaml"
      discipline_profile: "generic_structural_case_review"
      d_activation_decision: >
        Activated only as limited protection signal and communication guardrail;
        not activated as a person-level, group-level, sex-level, institutional,
        or concrete-scene D finding.
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      D_protection_signal_active: true
      if_D_activated_guardrails_checked: "not_applicable_full_D_module_not_activated"
      if_D_creates_more_shame_than_clarity: "dial_D_down"
      D_boundary_note: >
        D is used only as a protection and communication-hygiene signal in this
        conceptual case. The full D-module is not activated as a D-profile,
        D-Quick-Grid reading, dignity assessment, or person-level D finding.
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      Completed PMS-Core case analysis of Pseudo-Symmetry and the completed
      PMS-EDEN overlay over that Core case.
    secondary_material: >
      PMS.yaml as the only PMS Base reference; PMS-EDEN.yaml as
      overlay/application profile only; MIP - Maturity in Practice.yaml as the
      current MIP model reference and case template.
    assumptions_and_inferences: >
      The analysis treats Pseudo-Symmetry as a conceptual domain projection:
      asserted parity within a relational or institutional frame while outcomes,
      exposure, responsibilities, or obligations remain unevenly distributed. No
      concrete actors, motives, clinical facts, legal facts, evidence record,
      scene sequence, or action sequence are inferred.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: >
        High for structural cross-model mapping; low for empirical, personal,
        legal, clinical, forensic, HR, policy, or operational conclusions.
      reliability_estimate: >
        Reliable as a guarded conceptual MIP reading; not reliable as a concrete
        scene finding, person-level assessment, external transmission basis, or
        decision basis.
      known_gaps:
        - "no concrete scene packet"
        - "no identified actors or affected persons"
        - "no role-holder testimony"
        - "no temporal sequence beyond the abstract word 'remain'"
        - "no evidence of recurrence, cost distribution, alternatives, action-power, or correction pathway"
        - "no counter-perspective from affected roles"
        - "no empirical validation"
        - "no rival-model comparison performed"
      main_bias_risks_here:
        - "smooth-fit bias because PMS, EDEN, and MIP all attend to asymmetry, responsibility, and dignity-in-practice"
        - "over-assimilation of rival frames into model vocabulary"
        - "normative inflation from parity/asymmetry language"
        - "hindsight inflation of responsibility despite absent options and predictability"
        - "D-language becoming a moral weapon if detached from guardrails"
        - "mistaking formal YAML completeness for practical or empirical maturity"

  snapshot:
    short_case_description: >
      Pseudo-Symmetry names a conceptual pattern in which parity is verbally
      asserted while outcomes, exposure, responsibilities, or obligations remain
      unevenly distributed.
    central_actors_and_roles:
      - "abstract parity-claim position"
      - "abstract distributionally exposed or burdened position"
      - "relational or institutional frame"
      - "formal analyst applying PMS, EDEN, and MIP under guardrails"
    guiding_question: >
      How mature is the practice-structure of asserted parity under candidate
      uneven distribution when read through A–C–R–P–D, IA-box, trajectory, and
      transmission guardrails?
    level:
      - "conceptual"
      - "structural"
      - "relational_or_institutional"
      - "model_integration"
      - "not_person_specific"
    first_visible_asymmetry: >
      Candidate asymmetry between parity-language and uneven distribution of
      outcomes, exposure, responsibilities, or obligations.
    first_visible_D_themes_optional:
      - "dignity-in-practice must remain a protection signal rather than a dignity score"
      - "risk of humiliation or person-ranking if parity/asymmetry language is weaponized"
      - "need to preserve D0 as untouched and D1/D2 as enactment-only if D is discussed"
      - "risk that conceptual elegance may conceal affected-role voice if later applied"

  role_mapping:
    object_of_observation:
      type: "conceptual_praxis_configuration"
      description: >
        The structure called Pseudo-Symmetry as previously mapped by PMS-Core
        and PMS-EDEN, not any person, group, sex, institution, or legal actor as
        a whole.
      role: "case pattern under structural analysis"
      not_person_as_whole: true
    observer_position:
      role: "external model analyst"
      power_relation_to_object: >
        High interpretive power over an abstract schema but no authority over
        persons, institutions, relations, affected roles, policy, or action.
      possible_effects_of_analysis: >
        Can clarify structural questions and guardrails; could also
        over-legitimate model fit if transmitted without limits, used for
        labeling, or treated as application authority.
    involved_roles:
      - role: "parity-asserting_or_parity-included_position"
        mandate: "abstract position within the parity claim"
        built_in_asymmetries:
          - "possible frame-control"
          - "possible language-control"
          - "possible responsibility-distribution ambiguity"
          - "possible correction-access ambiguity"
        publicness_level: "not specified"
        dignity_exposure: "not assessable; D only as guardrail"
      - role: "distributionally_exposed_or_burdened_position"
        mandate: >
          Abstract position bearing or appearing to bear uneven outcomes,
          exposure, responsibilities, or obligations.
        built_in_asymmetries:
          - "possible cost-bearing"
          - "possible explanation burden"
          - "possible reduced correction access"
          - "possible visibility burden"
        publicness_level: "not specified"
        dignity_exposure: "not assessable; possible protection concern only"
      - role: "relational_or_institutional_frame"
        mandate: >
          Defines what parity, obligation, exposure, role differentiation,
          correction, review, and justification mean.
        built_in_asymmetries:
          - "norm-setting power"
          - "visibility control"
          - "review-point control"
          - "rule/coherence control"
        publicness_level: "abstract"
        dignity_exposure: "depends on future concrete publicness"
      - role: "formal_analyst"
        mandate: >
          Map structures without diagnosis, verdict, person ranking, sex truth,
          dignity scoring, or action authorization.
        built_in_asymmetries:
          - "interpretive control"
          - "selection of model vocabulary"
          - "risk of excessive coherence"
          - "risk of hidden prescription through structural language"
        publicness_level: "internal chat / working-note context"
        dignity_exposure: >
          Must avoid shaming, totalizing, or assigning person status to any
          future affected role.
    publicness:
      level: "non-public conceptual working note"
      A_P_relevance: >
        Analyst must notice that later public use would change the case and
        raise D-P, P-PU, reversibility, reputational, and shaming risks.
      P_PU_relevance: >
        No public action power is authorized; publication would require a new
        publicness analysis.
      D_P_relevance_if_D_active: >
        D-P is active only as a warning against public dignity harm, shaming,
        humiliation, ranking, or exposure.
      public_shaming_risk: "low in abstract form; high if mapped onto identifiable persons or groups"
      reversibility_risk: "low as internal YAML; high if converted into labels, sanctions, or public claims"

  frame_vs_variability:
    frame_elements:
      - element: "PMS.yaml remains the only PMS Base reference"
        reason_fixed_or_slow: >
          Base operator grammar and dependencies are not revised by EDEN or MIP.
        protected_goods:
          - "formal consistency"
          - "dependency hygiene"
          - "non-capture discipline"
      - element: "PMS-EDEN is overlay/application profile only"
        reason_fixed_or_slow: >
          EDEN constructs must not become PMS operators or independent decision
          authority.
        protected_goods:
          - "model boundary"
          - "description-to-action firewall"
          - "counter-scene openness"
      - element: "MIP analyses enactments, roles, and structures rather than person-worth"
        reason_fixed_or_slow: >
          D0 is inviolable and scores are not person scores.
        protected_goods:
          - "dignity"
          - "anti-humiliation"
          - "score hygiene"
      - element: "The case is conceptual, not a concrete scene"
        reason_fixed_or_slow: >
          The earlier Core and EDEN analyses explicitly suspend empirical and
          scene findings.
        protected_goods:
          - "reversibility"
          - "non-diagnosis"
          - "transmission restraint"
    variability_elements:
      - element: "operative parity frame"
        possible_change: >
          Future evidence may show formal equality, aspirational parity,
          justified functional asymmetry, symbolic parity, contested frame
          selection, or false coordination.
        responsible_roles:
          - "future analyst"
          - "affected roles in a concrete scene"
          - "context authority if applicable"
      - element: "real Ω specification"
        possible_change: >
          Future scene packet may specify direction, bearer, cost, capacity,
          alternatives, exposure, protection, and correction access.
        responsible_roles:
          - "future analyst"
          - "documenting observer"
          - "affected roles"
      - element: "responsibility and action-power distribution"
        possible_change: >
          Can only be assessed after knowledge, levers, predictability,
          alternatives, and integration attempts are documented.
        responsible_roles:
          - "future analyst"
          - "role holders"
          - "structural reviewers"
      - element: "correction and review pathway"
        possible_change: >
          Can be made transparent, time-bound, revisable, contestable, and
          dignity-preserving in future concrete use.
        responsible_roles:
          - "frame-holder"
          - "process owner"
          - "affected roles"
    unfair_high_M_zones:
      - "assigning high M-score to abstract roles without predictability, alternatives, or action-power"
      - "treating uneven distribution as guilt or failed maturity by default"
      - "using the smooth PMS/EDEN fit as evidence of responsibility"
      - "inflating responsibility through hindsight or model coherence"
      - "treating absence of correction as culpable refusal without knowing permission, capacity, or alternatives"
    system_as_excuse_risk:
      - "the relational or institutional frame could be used to erase concrete role action if a future scene shows available levers"
      - "conceptual suspension could become avoidance if later evidence establishes real Ω and correction capacity"
      - "model guardrails must not become a reason to ignore protection goods"
    D1_D2_realistically_improvable_where:
      - "language can avoid ranking, shaming, and person labels"
      - "review procedures can preserve affected-role contestation"
      - "correction pathways can be made more transparent and reversible"
      - "publicness can be kept bounded unless a safe frame exists"
      - "future scene packets can separate dignity protection from responsibility-as-blame"

  acrp_profile:
    A_awareness:
      observations: >
        Awareness is structurally present in the distinction between asserted
        parity and uneven distribution, but it remains conceptual rather than
        scene-based.
      available_information: >
        Available information includes the PMS-Core case reading, EDEN overlay,
        and MIP profile. It does not include concrete role testimony, evidence,
        institutional record, or temporal records.
      realistically_knowable: >
        At this stage, one can know the structural question and the required
        evidence, not whether a concrete case is false-coordinated or
        mature/immature.
      blind_spots: >
        Direction of asymmetry, actual cost-bearing, awareness of role holders,
        alternatives, predictability, permission, and affected-role perspectives
        are unknown.
      role_awareness_A_R: >
        The analysis is role-aware at the abstract level: parity-position,
        burden-position, frame, and analyst are separated.
      publicness_awareness_A_P: >
        Publicness is recognized as currently bounded and future-sensitive.
      bias_awareness: >
        Smooth-fit, model-confirmation, normative inflation, dignity-language
        misuse, and hindsight responsibility bias are explicitly marked.
    C_coherence:
      observations: >
        The conceptual case contains a coherence tension: verbal parity may
        coexist with uneven distribution.
      word_deed_relation: >
        Word-deed coherence is not scene-assessable because no concrete deeds,
        policies, effects, correction attempts, or role responses are
        documented.
      role_context_coherence: >
        Role-context coherence is indeterminate until the relevant frame
        clarifies whether parity is formal, practical, aspirational,
        transitional, symbolic, justified, contested, or false-coordinating.
      narrative_coherence: >
        The narrative is structurally coherent as a model example, but this
        coherence must not be mistaken for empirical adequacy or mature practice.
      breaks_named_or_hidden: >
        The main break is named as parity/asymmetry mismatch; whether it is
        hidden, justified, transitional, symbolic, contested, or better captured
        by another model remains open.
    R_responsibility:
      observations: >
        Responsibility is weak and conditional. Neither PMS-Core, EDEN, nor MIP
        can assign responsibility without a concrete scene packet.
      responsibility_points: >
        Potential points include frame maintenance, parity assertion, cost
        distribution, correction access, review responsibility, and
        transmission responsibility, but none is assigned to a role.
      assumed_responsibility: >
        The analysis assumes responsibility for its own method: keep distance,
        reversibility, D protection, counter-scenes, score hygiene, and
        transmission limits active.
      shifted_or_refused_responsibility: >
        No actual shifted or refused responsibility is established; only
        candidate responsibility displacement is structurally visible.
      burdens_and_consequences: >
        Candidate burdens include visibility, explanation, cost, obligation,
        correction burden, waiting burden, and legibility burden; bearer,
        magnitude, and reversibility are unknown.
    P_power_to_act:
      observations: >
        Power to act is under-specified because no concrete levers, options,
        sanctions, exit routes, permissions, or timing controls are documented.
      real_levers: >
        Only analytical levers are available: preserve model boundaries, request
        a scene packet in future, mark blind spots, maintain counter-scenes, and
        avoid transmission misuse.
      formal_vs_real_options: >
        Formal options may include parity language and model mapping; real
        options for affected roles are unknown.
      used_options: >
        The current analysis uses reversible structural description only.
      unused_options: >
        Concrete intervention, diagnosis, prescription, enforcement,
        responsibility assignment, and action authorization are deliberately
        unused because they are not authorized.
      ceiling_rule_relevance: >
        Strong M responsibility is capped or suspended because predictability
        and real alternatives are not established.

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: "not observed; no person or self-relation is present"
      self_neglect: "not observed"
      shame_dynamics: >
        Risk exists only if the analysis is used to rank, expose, or shame; no
        scene-level shame dynamic is established.
      degradation_of_others: "not observed; prohibited as an interpretive move"
      public_shaming: >
        Not present in this working note; must remain prohibited for
        identifiable persons.
      protest_or_refusal: >
        Not observed; future resistance, disagreement, refusal, or non-fit must
        not be treated as immaturity by default.
      dignity_protection: >
        Active as methodological guardrail: D0 untouched, D1/D2 enactment-only,
        no dignity score, no person labels, no public D reading.
    next_step_if_relevant: >
      Use the D-profile section only as a protection and communication-hygiene
      check; do not turn it into a person, group, sex, or institution
      assessment.

  acrpd_submodules_profile:
    A:
      A-I: >
        Not applicable as inner awareness of persons; relevant only as analyst
        awareness of interpretive limits.
      A-R: >
        Strong at the abstract level: roles are mapped as parity-position,
        burden-position, frame, and analyst.
      A-C: >
        Moderate-to-strong: PMS-Core, EDEN, and MIP boundaries are explicitly
        named.
      A-IM: >
        Moderate: potential effects of overclaiming, shaming, transmission
        misuse, and model over-coherence are marked.
      A-P: >
        Moderate: publicness is not part of the scene, but public misuse risk is
        recognized.
    C:
      C-S: >
        Indeterminate at scene level; no social practice details are available.
      C-P: >
        Structurally salient: the case centers on possible asymmetry under
        parity language.
      C-N: >
        Mixed: the model narrative is coherent, but may over-smooth rival
        readings.
      C-I: >
        Indeterminate: institutional/rule coherence cannot be assessed without
        a frame record.
    R:
      R-I: >
        Not assignable; no individual role-holder is assessed.
      R-S: >
        Candidate only; responsibility distribution in relational structures
        remains unknown.
      R-E: >
        Active as analyst responsibility to preserve guardrails, D protection,
        counter-scenes, and non-capture.
      R-P: >
        Potentially relevant if the analysis is transmitted publicly; currently
        bounded as working note.
    P:
      P-I: >
        Not applicable to persons; analyst has the capacity to keep the output
        reversible and non-prescriptive.
      P-S: >
        No concrete social agency mapped.
      P-C: >
        Moderate analytical agency: the YAML can shape conceptual vocabulary and
        therefore must be bounded.
      P-PU: >
        Dormant but risk-relevant: public use would create additional power and
        dignity exposure.
    D:
      active: true
      D-I: >
        No inner dignity reading of any person; only analyst self-restraint
        against shame or rank language.
      D-B: >
        Not applicable; no bodily/material self-care scene is present.
      D-R: >
        Methodologically active: relational dignity is protected by refusing
        degradation, humiliation, diagnosis, and person labels.
      D-P: >
        Latent publicness guardrail: do not publish identifiable D-readings or
        use the case for public shaming.
      note: >
        D-submodules are used only as protection signals and communication
        guardrails, not as dignity scores or person assessments.

  scores_and_ia:
    A_score:
      A_band: >
        not scene-scoreable; conceptual structural tendency: 4-5 everyday mixed
        zone if treated only as an abstract practice-pattern
      boundary_confirmed: "A-score describes enactment, not essence."
      time_role_context: >
        Conceptual PMS/EDEN/MIP integration; no concrete time window or
        role-holder.
      justification:
        A_awareness: >
          The analysis notices the parity/asymmetry distinction and its limits.
        C_coherence: >
          Coherence is mixed: structurally elegant but empirically
          under-specified.
        R_responsibility: >
          Responsibility is handled cautiously and not assigned.
        P_power_to_act: >
          Analytical power is used for guarded description; concrete
          action-power is unknown.
        modulators_context: >
          Conceptual case type, missing scene packet, high over-assimilation
          risk, strong guardrails, and non-public working-note context.
      D_excluded_from_A_number: true
    M_score:
      M_band: "not assignable; suspended, with high-M blocked by ceiling-rule concerns"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
      role_position_time_frame: >
        No concrete role-position or time frame; only abstract positions are
        mapped.
      five_factors:
        knowledge: >
          Unknown for any role-holder; known only for analyst as model-boundary
          awareness.
        power_control: >
          Unknown for scene roles; analyst controls only wording, structure, and
          transmission restraint.
        predictability: >
          Unknown; no concrete consequences or temporal pathway.
        access_to_alternatives: >
          Unknown; no alternatives documented.
        serious_integration_attempt: >
          Unknown for scene roles; present in the analysis as guardrail
          integration.
      ceiling_rule_check:
        predictability_approx_zero: true
        access_to_alternatives_approx_zero: true
        M_capped_at_4: true
        explanation: >
          Without predictability and real alternatives, MIP does not permit high
          shared responsibility assignment.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: >
        Candidate asymmetry between asserted parity and uneven distribution of
        outcomes, exposure, responsibilities, or obligations.
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "partial"
        notes: >
          The conceptual asymmetry is transparent in the analysis, but not in
          any concrete scene.
      J_justified:
        status: "undetermined"
        protected_good_or_purpose: >
          Unknown; possible counter-scenes include formal equality, justified
          functional asymmetry, aspirational parity, symbolic parity, or
          transitional reform.
        notes: >
          No conclusion about justification can be drawn without frame
          specification.
      TB_time_bound:
        status: "undetermined"
        review_points_or_conditions: "none specified"
        notes: >
          The word "remain" suggests persistence but not a review structure.
      R_reversible:
        status: "undetermined"
        real_return_or_exit_options: "none specified"
        notes: >
          No real reversal, correction, exit, appeal, or redistribution options
          are documented.
      result: "IA_risk_suspended"
      short_justification: >
        The asymmetry is conceptually visible, but transparency, justification,
        time-boundedness, and reversibility are not scene-established.
      immediate_action: >
        No external action authorized; analytical next step would be to
        construct a concrete scene packet and counter-scene before any applied
        use.

  ia_localisation:
    knowing:
      issue: >
        No role-holder knowledge or realistic knowability is documented.
      possible_intervention: >
        In a future application, document who could know the parity claim,
        uneven distribution, costs, and correction options.
    being_able:
      issue: >
        No real levers, capacities, permissions, or constraints are documented.
      possible_intervention: >
        Map action-power, options, exit routes, timing control, and actual
        control before assigning responsibility.
    being_permitted:
      issue: >
        No permission structure or institutional constraint is documented.
      possible_intervention: >
        Clarify whether roles are allowed to name asymmetry, contest parity,
        request review, refuse burden, or correct distribution.
    willing:
      issue: >
        No willingness, refusal, avoidance, bad faith, manipulation, or motive
        can be inferred.
      possible_intervention: >
        Do not infer will; if relevant, use documented enactments and
        counter-perspectives only.

  ia_protection:
    transparency_measures:
      - "Name the operative frame: formal parity, practical parity, aspirational parity, transitional parity, symbolic parity, or claimed mutuality."
      - "Separate parity-language from observed cost, exposure, responsibility, and obligation distribution."
      - "Mark all assumptions as assumptions."
      - "Document who can see the asymmetry and who cannot."
    justification_measures:
      - "Require a protected good or functional purpose before treating asymmetry as justified."
      - "Test whether asymmetry benefits one side only or supports a transparent role function."
      - "Keep rival models and counter-scenes active."
    time_boundedness_measures:
      - "Specify whether the uneven distribution is temporary, recurring, accumulating, or indefinite."
      - "Define review points and correction thresholds for future concrete cases."
    reversibility_measures:
      - "Document real exit, appeal, correction, redistribution, or voice options."
      - "Check whether a burdened role can actually return from exposure or cost, not merely in theory."
    participation_or_voice_measures:
      - "Affected roles must be able to contest the scene packet, frame, evidence, and R trace."
      - "Disagreement must not count as proof of immaturity or EDEN confirmation."
    dignity_protection_measures:
      - "No person labels, sex truths, dignity scores, or public shaming."
      - "Use D only to protect dignity and identify communication risks."
      - "Dial D down if it increases shame more than clarity."
      - "Do not publish identifiable D-readings."
    review_or_falsifier:
      date_or_interval: >
        before any concrete application or transmission beyond internal
        working-note use
      falsifier_question: >
        Can a transparent formal, functional, aspirational, transitional,
        symbolic, or rival-frame account explain the uneven distribution better
        than pseudo-symmetry / EDEN false coordination?
      responsible_roles:
        - "future analyst"
        - "affected roles in any concrete scene"
        - "independent reviewer if applied institutionally"

  trajectory:
    principle: "Trajectories, not labels."
    timeline:
      - timepoint: "t0"
        short_description: "Conceptual parity assertion becomes the surface frame."
        A_band: "not scoreable; structural awareness question opens"
        M_band: "not assignable"
        D_observation_optional: "D only as guardrail against rank or shame"
        key_context_role_power_situation: "No concrete scene; parity language is abstractly available."
      - timepoint: "t1"
        short_description: "Uneven distribution is named as remaining under the parity frame."
        A_band: "4-5 structural tendency if treated as abstract enactment; formally suspended"
        M_band: "suspended; ceiling-rule blocks high M without predictability/options"
        D_observation_optional: >
          possible dignity-protection concern if unevenness is made illegible or
          shaming occurs; not established
        key_context_role_power_situation: "Candidate Ω becomes visible but not scene-mapped."
      - timepoint: "t2"
        short_description: >
          Future concrete scene packet could either support, narrow, revise, or
          defeat the reading.
        A_band: "to be determined by evidence"
        M_band: >
          to be determined role-by-role under knowledge, power, predictability,
          alternatives, and integration attempt
        D_observation_optional: "only if safe frame and guardrails are fulfilled"
        key_context_role_power_situation: "Counter-scenes and falsifiers become decisive."
    A_t:
      pattern: >
        A(t) cannot be plotted as a real trajectory; only a conceptual movement
        from distinction to evidence requirement is available.
      notes: >
        The analysis should not transform the word "remain" into a full temporal
        maturity curve.
    M_t_RVR_t:
      RVR_description: >
        Responsibility–viability–range is not calculable; knowing, ability,
        permission, and acting are all unknown for scene roles.
      knowledge_over_time: "unknown"
      leverage_over_time: "unknown"
      alternatives_over_time: "unknown"
      ceiling_rule_over_time: >
        high M remains capped or suspended until predictability and alternatives
        are evidenced
    D_t_optional:
      active: true
      qualitative_course: >
        No D trajectory is established; D remains a qualitative protection
        guardrail across all timepoints.
      D_quick_grid_movement_if_used: "not used"
      note: "No D-score; only qualitative trajectory."

  D_module_optional:
    active: true
    activation_reason: >
      D is activated only in a limited protection-signal capacity because PMS
      and EDEN both require dignity-in-practice restraint and the MIP case
      touches risks of humiliation, ranking, publicness, and responsibility
      under asymmetry.
    communication_space: "internal_structural_review_non_public_not_person_specific"
    guardrails_checked:
      scenic: true
      context_bound: true
      role_bound: true
      time_windowed: true
      no_global_statement_about_persons: true
      no_dignity_score: true
      D0_untouched: true
    D_profile:
      D1_self_treatment_D_I_D_B:
        observed_enactments: "none; no person or self-treatment scene is present"
        context_notes: >
          D1 is not assessed; analyst self-restraint against overclaiming is the
          only relevant practice.
        trend_band_qualitative: "not_applicable"
      D2_relational_dignity_D_R:
        observed_enactments: >
          no scene-level relational dignity enactments; methodological
          protection of affected roles is active
        context_notes: >
          The analysis refuses degradation, humiliation, person labels, and
          responsibility-as-blame.
        interpretive_reading_not_judgment: >
          D2 is protected as a model-use condition, not diagnosed in the case.
      D_P_public_dignity:
        active_if_publicness_relevant: true
        observed_enactments: >
          no public enactment; risk would arise if the YAML were used to expose,
          rank, or shame identifiable persons
        private_public_tension: "currently low; would become high under public application"
        publicity_context: "internal chat / working note only"
      A_M_D_link_without_mixing:
        A_band_reference: >
          A not scene-scoreable; conceptual structural tendency 4-5 if forced,
          but formally suspended.
        M_band_reference: >
          M not assignable; capped/suspended by missing predictability and
          alternatives.
        D_tendency: "protective guardrail only"
        protection_or_responsibility_implication: >
          Use protection without blame: keep D clean, avoid labels, and require
          scene evidence before responsibility claims.
    D_Quick_Grid:
      used: false
      level: "not_used"
      preferred_wording: >
        This constellation currently shows level-__ D stress in this role /
        context / time window.
      forbidden_wording_avoided: true
      movement_question: >
        What would be one small, real action that could make this constellation
        one level more dignified — and who has A and M levers for that?

  meta_notes:
    bias_risks:
      confirmation_bias: >
        High risk: the prior PMS and EDEN analyses already fit the
        parity/asymmetry pattern strongly.
      hindsight_bias: >
        High if responsibility is inferred from the mere fact that uneven
        distribution is named.
      status_quo_loyalty_bias: >
        Possible if formal parity or institutional framing is accepted too
        quickly as justification.
      halo_horn_effects: >
        Possible if parity-language or asymmetry-language is morally loaded.
      in_group_out_group_bias: >
        Possible if future roles are mapped onto real social groups, sexes,
        institutions, or political positions.
      dignity_bias_effect: >
        D-language can sharpen protection but also become a shaming tool;
        therefore D remains bounded.
    norm_assumptions:
      explicit_norms:
        - "asymmetry must be transparent, justified, time-bound, and reversible where possible"
        - "responsibility requires knowledge, power/control, predictability, alternatives, and integration attempt"
        - "D0 is untouched and non-rankable"
        - "model outputs must remain reversible and non-diagnostic"
      implicit_norms:
        - "verbal parity should not erase real cost or exposure"
        - "formal coherence is insufficient without lived or structural correction access"
        - "affected-role contestation matters"
        - "tools must not become authority"
        - "maturity is shown in correction, not in rhetorical symmetry"
      dignity_concepts:
        - "D0 ontological dignity: inviolable and outside analysis"
        - "D1/D2 dignity in practice: enactment-only and qualitative"
        - "D-P public dignity risk under exposure or shaming"
      normative_position_of_D_reading: >
        D is used as a protection and communication-hygiene lens, not as a moral
        score or person-status claim.
    intuition:
      initial_intuition: >
        The case is structurally relevant for MIP because it concerns maturity
        under asymmetry: awareness of mismatch, coherence of parity language,
        responsibility distribution, and power to correct.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: >
        PMS-Core and EDEN both mark candidate asymmetry, weak responsibility,
        under-specified action-power, and strong guardrail requirements.
      contradicting_evidence: >
        No concrete scene is provided; rival frames remain open; therefore no
        maturity, IA, EDEN, or D finding can be finalized.
    possible_alternative_interpretations:
      - "formal equality with material difference"
      - "justified functional asymmetry"
      - "aspirational parity"
      - "temporary transitional asymmetry"
      - "symbolic parity"
      - "administrative simplification"
      - "discourse conflict over the relevant frame"
      - "distributive justice or recognition-theory formalization"
      - "non-capture by PMS/EDEN/MIP"
    counter_perspective:
      from_other_side: >
        The parity claim may be formal, aspirational, transitional, or
        norm-setting rather than false-coordinating.
      from_affected_side: >
        Uneven distribution may impose real costs, explanation burdens, or
        reduced correction access even when parity is verbally asserted.
      from_external_observer: >
        The model fit is strong but could be too smooth; a rival framework may
        discriminate the case better.

  open_questions_and_blind_spots:
    missing_information:
      - "What exact parity statement is made?"
      - "Which outcomes, exposures, responsibilities, or obligations are uneven?"
      - "Who bears which cost, with what options and protections?"
      - "Is the asymmetry transparent, justified, time-bound, and reversible?"
      - "Are there review points, correction attempts, or affected-role contestation?"
      - "What counter-scene best explains the pattern?"
    uncertain_assumptions:
      - "that parity-language is practically rather than merely formally relevant"
      - "that uneven distribution persists beyond a static comparison"
      - "that cost or responsibility is displaced rather than transparently role-differentiated"
      - "that EDEN and MIP add discrimination rather than only vocabulary"
    weak_points_in_analysis:
      - "no scene packet"
      - "no empirical evidence"
      - "no role-holder perspective"
      - "no temporal data"
      - "no measurable action-power"
      - "no concrete D communication space beyond internal working note"
      - "high risk of theoretical over-coherence"
    needed_perspectives:
      - "affected role perspective"
      - "frame-holder perspective"
      - "external observer or rival-model reviewer"
      - "evidence of actual cost/exposure distribution"
      - "process or institutional record if later applied"

  possible_steps_towards_maturity:
    decision_mode: "non-prescriptive_analytical_next_steps_only"
    functional_next_step:
      action: >
        Construct a bounded scene packet before any applied MIP, EDEN, or PMS
        conclusion: roles, frame, parity claim, uneven distribution, costs,
        alternatives, temporal sequence, correction access, and counter-scenes.
      reversible: true
      responsible_role: "future analyst or process owner, not any abstract case role"
    short_term_feasible:
      - "Keep the current result as a working note, not a decision basis."
      - "Preserve the distinction between conceptual candidate and scene finding."
      - "Add a counter-scene section before any future concrete application."
      - "Avoid person labels, sex truths, dignity scores, and public transmission."
    medium_term_feasible:
      - "Develop explicit activation thresholds for A, C, R, P, IA-box, and EDEN false coordination in concrete cases."
      - "Test the MIP reading against rival frameworks such as formal equality, distributive justice, recognition theory, or institutional analysis."
      - "Define review and reversibility criteria for future applied cases."
    overambitious_or_risky:
      - "Assigning an A-score or M-score as if a concrete scene existed."
      - "Treating the conceptual case as evidence of immaturity, guilt, or dignity failure."
      - "Using EDEN false coordination as a verdict without scene-established real Ω and displaced R."
      - "Publishing a person-level D-reading."
    protection_first_if_low_M_high_harm:
      - >
        If a future case shows high harm but low predictability or alternatives
        for a role, prioritize protection, correction, and support over blame.
    structural_change_if_high_M:
      - >
        If a future case shows high knowledge, real power/control,
        predictability, alternatives, and failed integration attempts, focus on
        transparent role responsibility, correction pathways, review points, and
        reversibility rather than person condemnation.

  transmission_check:
    pre_transmission_gate_passed: false
    final_checklist:
      scope_and_guardrails_checked: true
      roles_and_publicness_checked: true
      score_hygiene_checked: true
      bias_norm_intuition_checked: true
      consequences_and_reversibility_checked: true
      D_cleanliness_checked_if_relevant: true
    status: "working_note"
    if_not_transmittable_reason: >
      The analysis is structurally complete as a MIP working note but not mature
      for external decision use because no concrete scene packet, affected-role
      contestation, empirical evidence, or independent review is present.
    allowed_use_of_this_analysis:
      - "internal_reflection"
      - "structural_case_review"
      - "template_testing"
      - "model_boundary_check"
      - "pre-analytic_scene_packet_design"
    not_allowed_use:
