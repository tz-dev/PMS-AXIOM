  uniform_report:
    generate_only_from_structured_fields: true
    title: "MIP Analysis of Pseudo-Symmetry after PMS and PMS-EDEN"
    overview_4_to_7_sentences: >
      This MIP analysis treats Pseudo-Symmetry as a conceptual structural
      pattern, not as a concrete case. PMS already marked the pattern as a
      parity/asymmetry mismatch centered on structural asymmetry within a frame,
      with several operators weak or conditional. PMS-EDEN added that the case
      fits a bounded PS signature while leaving switch drift, PFO, reciprocity
      loss, devaluation, and humiliation unproven. MIP translates this into an
      A-C-R-P question: what is known, how coherent the parity claim is with
      practice, how responsibility is handled, and what real power-to-act exists
      for correction or externalization. Because no concrete roles, evidence,
      timeline, or alternatives are supplied, A-score and M-score are not
      assigned. The IA-box remains unclear with visible IA-risk questions, and
      the D-module stays off except as a dignity-protection guardrail.
    key_findings:
      - "The strongest MIP issue is coherence between parity language and uneven practical distribution."
      - "Awareness is structurally available in the analysis but unknown inside any concrete scene."
      - "Responsibility cannot be scored because knowledge, control, predictability, alternatives, and integration attempts are not supplied."
      - "Power-to-act is under-specified; formal parity may or may not hide real asymmetry."
      - "IA-box questions are highly relevant, but the result remains unclear without T-J-TB-R evidence."
      - "Dignity is protected by guardrails only; no D-profile, D-score, or person-level dignity reading is made."
      - "The analysis remains a working note, not a decision basis."
    A_summary: >
      A is partial: the structural distinction is clear at the analytic level,
      but scene-level awareness, role awareness, impact awareness, and
      publicness awareness cannot be assessed for concrete actors.
    M_summary: >
      M is not assigned. The ceiling rule blocks high responsibility readings
      because predictability and real alternatives are unknown. Any future M
      reading must remain shared structural responsibility, not guilt.
    IA_box_summary: >
      IA-box is relevant but unresolved. The named asymmetry may become IA if it
      is non-transparent, unjustified, unbounded, and irreversible; it may be
      functional if transparent, justified, time-bound, reversible, and
      coordinated.
    D_summary_if_activated: >
      D-module is not activated. D0 remains untouched; D1/D2 are not assessed.
      D functions only as protection against shaming, ranking, humiliation,
      public dignity readings, and person labels.
    trajectory_summary: >
      No concrete trajectory is available. A future trajectory would need to
      track whether parity/asymmetry becomes more transparent, more justified,
      more reversible, and more integrated across time.
    guardrail_status: >
      Guardrails are maintained: profile-not-person, system axiom, score
      hygiene, red-zone exclusion, dignity protection, bias awareness,
      reversibility, and working-note status.
    transmission_status: "working_note"
    practical_implications: >
      The only justified implication is methodological: before any stronger
      MIP conclusion, build a concrete scene packet and test transparency,
      justification, time-boundedness, reversibility, alternatives, and affected
      perspectives. Do not score persons or use the analysis for sanctions.
    conclusion: >
      MIP confirms the prior PMS and EDEN boundary: Pseudo-Symmetry is a strong
      conceptual signal for maturity-in-practice questions around awareness,
      coherence, responsibility, and power under asymmetry. It is not yet a
      scored case, not an IA verdict, not a D-reading, and not a basis for
      action against persons. Its mature use is as a reversible structural map
      for future scene-bound calibration.