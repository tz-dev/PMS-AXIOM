      - "therapy_planning"
      - "legal_conclusion"
      - "policy_enforcement"
      - "sex_truth"
      - "dignity_score"
      - "action_authorization"
    review_required:
      required: true
      review_date_or_condition: >
        before any concrete application, external transmission, or use involving
        identifiable persons
      falsifier: >
        A transparent, justified, time-bound, reversible, or rival-frame account
        explains the uneven distribution better than pseudo-symmetry / EDEN
        false coordination.

  uniform_report:
    generate_only_from_structured_fields: true
    title: "MIP Analysis: Pseudo-Symmetry over PMS-Core and PMS-EDEN"
    overview_4_to_7_sentences: >
      Pseudo-Symmetry is treated here as a conceptual practice-structure, not a
      concrete scene or person-level finding. Through MIP, the case shows a
      maturity question around awareness of parity/asymmetry, coherence between
      parity-language and distribution, responsibility under unknown
      action-power, and the capacity to correct asymmetry without humiliation.
      A-score and M-score are not scene-assignable; at most, the abstract
      structure resembles an everyday mixed maturity zone if forced, but the
      formal result remains suspended. The IA-box names a candidate asymmetry
      but cannot determine transparency, justification, time-boundedness, or
      reversibility without evidence. D is activated only as a protection signal
      and communication guardrail, not as a dignity profile of any person. The
      analysis is therefore a working note for structural clarification, not a
      verdict, diagnosis, prescription, or application authority.
    key_findings:
      - "The central MIP issue is not asymmetry itself but whether parity-language makes asymmetry transparent, justified, time-bound, reversible, and correctable."
      - "A-awareness is structurally present but scene-limited; C-coherence is mixed because verbal parity does not prove integrated practice."
      - "R-responsibility and P-power-to-act are not assignable without concrete knowledge, levers, alternatives, predictability, and integration attempts."
      - "The IA-box result is suspended IA-risk, not a verdict."
      - "D remains a protection guardrail: D0 untouched, no D-score, no person labels, no public shaming."
    A_summary: >
      A is partially present as structural awareness of the parity/asymmetry
      mismatch, but no scene-based awareness of role holders can be assessed.
    M_summary: >
      M is not assignable; high M is blocked by the ceiling rule because
      predictability and alternatives are not established.
    IA_box_summary: >
      Candidate asymmetry is named, while transparency is partial and
      justification, time-boundedness, and reversibility remain undetermined.
    D_summary_if_activated: >
      The full D-module is not activated. D remains active only as a limited
      protection signal and communication-hygiene guardrail; no D-profile,
      D-Quick-Grid level, dignity score, or person-level D-reading is made.
    trajectory_summary: >
      The only available trajectory is conceptual: parity assertion, named
      uneven distribution, and a future need for scene evidence; no real A(t),
      M(t), or D(t) curve exists.
    guardrail_status: >
      Guardrails are active and largely satisfied for internal conceptual
      analysis, but they block external decision use.
    transmission_status: "working_note"
    practical_implications: >
      Use this output to design a future scene packet and falsifier protocol,
      not to assign blame, prescribe action, or validate an EDEN finding.
    conclusion: >
      MIP confirms that the PMS-Core and EDEN readings are structurally
      meaningful but not mature for applied judgment: the case remains a
      guarded, reversible, non-diagnostic working note centered on awareness,
      coherence, responsibility, power-to-act, IA risk, D protection, and open
      counter-scenes.

mip_bridge_to_pms_and_eden:
  relationship_to_pms_core: >
    MIP does not redefine PMS operators or dependencies. It translates the
    completed PMS-Core reading into A–C–R–P–D, IA-box, trajectory, score
    hygiene, and transmission discipline.
  relationship_to_eden_overlay: >
    MIP treats EDEN false-coordination relevance as a candidate structural
    question. It does not turn EDEN overlay shorthand into maturity scores or
    responsibility findings.
  primary_bridge:
    PMS_Delta: "A-awareness of difference between asserted parity and uneven distribution"
    PMS_Nabla: "possible activation pressure, but no motive inference"
    PMS_Box: "MIP frame/context and IA-box setting"
    PMS_Lambda: "candidate absence/non-event requiring no-passive-praxis caution"
    PMS_Alpha: "pattern or recurrence question; not established"
    PMS_Omega: "IA asymmetry and P/R distribution question"
    PMS_Theta: "trajectory and RVR(t) question; weak because temporality is not evidenced"
    PMS_Phi: "C-narrative and frame recontextualization question"
    PMS_Chi: "MIP guardrails, reversibility, publicness restraint, and transmission brake"
    PMS_Sigma: "C integration question"
    PMS_Psi: "R/P commitment and self-binding question, not established"
  eden_bridge:
    Adult_Reciprocity: >
      MIP mature practice baseline: truthful coordination of asymmetry with
      responsibility, protection, and correction.
    False_Coordinated_Real_Asymmetry: >
      MIP IA-risk question: parity frame may obscure asymmetry if not
      transparent, justified, time-bound, reversible, and correctable.
    Action_Power: "MIP P-power-to-act and M-score factor"
    Responsibility_Principle: "MIP R responsibility plus M-score factors"
    Description_to_Action_Firewall: "MIP transmission guardrail and non-prescriptive status"
    Counter_Scene_Protocol: "MIP bias check, alternative interpretations, and falsifier requirement"
  final_boundary: >
    This MIP analysis is an additional structural layer over PMS-Core and
    PMS-EDEN; it is not a PMS Base revision, EDEN finding, person diagnosis,
    dignity score, action recommendation, or decision basis.