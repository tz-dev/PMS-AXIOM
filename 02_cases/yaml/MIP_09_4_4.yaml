case:
  meta:
    case_id: MIP_BOUNDARY_EROSION_PRIVACY_PUBLICNESS__PMS_CORE_EDEN_BASED
    case_title: "MIP analysis: Boundary erosion (Privacy → Publicness) based on completed PMS Core and PMS-EDEN overlay"
    documentation_date: "2026-07-03"
    analysts:
      - name: "ChatGPT (GPT-5.5 Thinking)"
        role: "MIP application assistant"
        observer_position: "Second-order structural analyst using the completed PMS Core case and appended PMS-EDEN overlay as source material."
    language: "en"
    confidentiality_level: "public_generalised"
    analysis_mode: full
    intended_use: "structural_case_review_and_model_interoperability_check"
    application_zone: "green"
    interaction_profile:
      reflection_mode: "off"
      d_module_preference: auto
      output_format: yaml
      discipline_profile: "ethics_public_communication_structural_case_review"
      d_activation_decision: "activated_guardrail_bound_qualitative_only"
      transmission_default: "working_note_until_checked"

  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: "do_not_apply_model_or_reduce_to_nontransmittable_working_note"
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: true
      if_D_activated_guardrails_checked: true
      if_D_creates_more_shame_than_clarity: "dial_D_down_or_deactivate_D_and_retain_only_D0_guardrail"
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true

  information_basis:
    primary_material: >
      Completed PMS Core case YAML for "Boundary erosion (Privacy → Publicness)"
      plus the appended PMS-EDEN overlay block after structural patches.
    secondary_material: >
      PMS.yaml repository reference and PMS-EDEN.yaml overlay/application profile
      are used only through the completed Core and EDEN case analyses. MIP is
      applied as an additional praxeological maturity-in-practice grid.
    assumptions_and_inferences: >
      The object is a conceptual case-family, not a concrete scene. Role
      positions are abstract: bounded repair/confidentiality position, public
      accountability/disclosure position, and public/institutional/discursive
      medium. No motives, legal facts, diagnoses, person traits, empirical
      chronology, or concrete responsibility distribution are inferred.
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: "High coverage for structural categories; low coverage for concrete scene evidence."
      reliability_estimate: "Reliable as a template-grounded structural reading; not reliable for actor-specific, legal, clinical, HR, forensic, or policy conclusions."
      known_gaps:
        - "No concrete actors, chronology, institution, confidentiality terms, consent conditions, legal/public-interest basis, harm context, audience record, safeguards, or right-of-reply record."
        - "No evidence about actual knowledge, real alternatives, predictability, recurrence, or integration attempts by any role-position."
        - "No empirical record distinguishing boundary erosion from warranted public accountability, whistleblowing, legal disclosure, procedural correction, democratic publicness, or confidentiality-as-concealment."
      main_bias_risks_here:
        - "Coherence bias: the case fits PMS, EDEN, and MIP structures too smoothly."
        - "Frame loyalty bias: privacy may be over-read as repair or publicness may be over-read as accountability."
        - "Hindsight inflation: missing alternatives may be retroactively treated as obvious."
        - "Dignity bias effect: exposure and shame may be over-weighted or under-weighted depending on observer identification."

  snapshot:
    short_case_description: >
      A material, utterance, or expectation initially held under a bounded repair,
      confidential feedback, or internal-resolution frame is later placed into
      public accountability discourse or a tribunal-like public frame. PMS Core
      treats this as a conceptual frame-transfer projection with Φ central, Ω and
      Θ salient, Σ/Ψ weak or conditional, and non-capture preserved. PMS-EDEN
      treats false-coordinated real Ω as only a suspended test because the case
      lacks concrete scene evidence.
    central_actors_and_roles:
      - "role_A: bounded repair or confidentiality position"
      - "role_B: public accountability or disclosure position"
      - "field_or_medium: public audience, institution, platform, or discourse medium"
      - "observer_or_analyst: structural case reader applying MIP without person-level judgment"
    guiding_question: >
      How mature-in-practice is the frame-transfer constellation when evaluated
      through A–C–R–P, optional D, IA-box, trajectory, and transmission
      guardrails, while preserving the PMS Core and PMS-EDEN conclusions as
      non-verdictive and scene-bound?
    level:
      - conceptual_domain_projection
      - structural_case_review
      - publicness_and_asymmetry_analysis
      - not_concrete_scene_analysis
    first_visible_asymmetry: >
      Candidate crossed asymmetry between confidentiality/repair protection and
      public accountability/exposure: who controls the frame, who becomes visible,
      who can answer, who bears explanation cost, and who benefits from
      boundedness or publicness remains indeterminate.
    first_visible_D_themes_optional:
      - "Possible public-shaming or overexposure risk under publicness."
      - "Possible dignity-protection function of confidentiality."
      - "Possible dignity-cost where confidentiality blocks accountability or affected voice."
      - "Need to preserve D0 and avoid person-level dignity readings."

  role_mapping:
    object_of_observation:
      type: "case-family / structural frame-transfer constellation"
      description: >
        Transfer of bounded repair or confidential/internal material into public
        accountability or tribunal-like publicness, as already analyzed through
        PMS Core and PMS-EDEN.
      role: "object of structural maturity analysis, not a person or institution as a whole"
      not_person_as_whole: true
    observer_position:
      role: "second-order model user applying MIP after PMS Core and EDEN overlay"
      power_relation_to_object: >
        The analyst can stabilize language, highlight risks, and shape later
        interpretation; therefore the analysis must remain non-verdictive and
        non-operational.
      possible_effects_of_analysis: >
        Could improve structural clarity and guardrails, but could also
        over-legitimate one frame, increase tribunalization, or turn conceptual
        mapping into pseudo-decision authority if transmitted carelessly.
    involved_roles:
      - role: "role_A: bounded repair / confidentiality position"
        mandate: >
          Hold material within a repair, feedback, or internal-resolution frame
          where boundedness may protect trust, dignity, process, or contextual
          integrity.
        built_in_asymmetries:
          - "possible control over confidentiality terms"
          - "possible capacity to delay or block public accountability"
          - "possible protection from reputational exposure"
          - "possible dependence on trust and role-bound discretion"
        publicness_level: "initially low or bounded; may become indirectly public if the frame is contested"
        dignity_exposure: >
          Possible protection from shaming, but also possible dignity risk for
          affected parties if confidentiality suppresses accountability.
      - role: "role_B: public accountability / disclosure position"
        mandate: >
          Move or interpret material under a public-interest, accountability,
          correction, disclosure, or answerability frame.
        built_in_asymmetries:
          - "possible control over timing and audience of disclosure"
          - "possible power to expand exposure"
          - "possible dependence on public legibility and right of reply"
          - "possible burden to justify publicness as proportionate"
        publicness_level: "medium to high depending on audience, circulation, identifiability, and institutional consequences"
        dignity_exposure: >
          Possible protection of affected voice and accountability, but also
          possible overexposure, public shaming, or tribunalization.
      - role: "field_or_medium: public audience / institution / discourse medium"
        mandate: >
          Receives, circulates, legitimates, contests, or amplifies the
          recontextualized material.
        built_in_asymmetries:
          - audience_scale
          - circulation_speed
          - reputational_pressure
          - unequal_access_to_context
          - unequal_ability_to_correct_or_exit
        publicness_level: "potentially high even when the original material was bounded"
        dignity_exposure: >
          May intensify dignity risks by converting repair material into spectacle
          or may enable dignity protection by making hidden asymmetry visible.
      - role: "observer_or_analyst"
        mandate: "Map structures without diagnosis, verdict, prescription, or PMS/EDEN/Core revision."
        built_in_asymmetries:
          - interpretive_authority
          - template_power
          - risk_of_coherence_overreach
          - risk_of_creating_pseudo_objectivity
        publicness_level: "analysis should remain working-note level unless transmission guardrails are met"
        dignity_exposure: "Must not create shame, labels, or person-level dignity readings."
    publicness:
      level: "structurally central; concrete level indeterminate"
      A_P_relevance: >
        Publicness changes what is knowable and by whom: the same material may
        gain accountability relevance while losing source-frame context.
      P_PU_relevance: >
        Power-to-act is partly mediated by publicness: the ability to disclose,
        contain, answer, correct, amplify, anonymize, contextualize, or withdraw
        depends on audience and medium.
      D_P_relevance_if_D_active: >
        D is relevant because publicity can protect recognition and accountability
        or produce humiliation, overexposure, and irreversible reputational effects.
      public_shaming_risk: "Present as a structural risk, not established as a fact."
      reversibility_risk: >
        Potentially high once material enters public circulation; actual
        reversibility depends on safeguards, anonymity, correction channels, and
        right of reply.

  frame_vs_variability:
    frame_elements:
      - element: "The case remains a conceptual domain projection, not a concrete scene."
        reason_fixed_or_slow: "Completed PMS Core and EDEN overlay explicitly set the scene evidence as under-specified."
        protected_goods:
          - reversibility
          - non_capture
          - no_person_labeling
          - no_false_empirical_precision
      - element: "PMS Core operator structure remains unchanged."
        reason_fixed_or_slow: "The MIP analysis is downstream and does not redefine Δ–Ψ, PMS dependencies, or derived PMS axes."
        protected_goods:
          - model_integrity
          - dependency_hygiene
          - no_overlay_overreach
      - element: "EDEN false-coordinated real Ω remains suspended, not affirmed."
        reason_fixed_or_slow: "The EDEN overlay requires scene packet, counter-scene, real Ω, displaced R, and Σ/Ψ evidence before a mechanism finding."
        protected_goods:
          - fairness
          - falsifiability
          - affected_role_contestation
          - no_EDEN_by_vibe
      - element: "D0 is untouched and non-rankable."
        reason_fixed_or_slow: "MIP dignity guardrails forbid person-worth inference and dignity scoring."
        protected_goods:
          - ontological_dignity
          - anti_humiliation_discipline
          - public_transmission_safety
    variability_elements:
      - element: "Concrete scene packet"
        possible_change: "Could specify actors, chronology, consent, confidentiality terms, legal/public-interest basis, audience, safeguards, harms, and reply channels."
        responsible_roles:
          - case_reviewer
          - source_holder
          - disclosure_accountability_role
          - institutional_process_owner
      - element: "Transparency of frame shift"
        possible_change: "Could name source frame, target frame, intended audience, limits of use, and conditions under which publicness is justified."
        responsible_roles:
          - role_A
          - role_B
          - field_or_medium
          - observer_or_analyst
      - element: "Correctability and reversibility"
        possible_change: "Could add review points, contextualization, anonymization, reply opportunities, correction channels, or de-escalation paths."
        responsible_roles:
          - field_or_medium
          - institutional_process_owner
          - analyst
          - affected_role_positions
      - element: "Integration of repair and accountability"
        possible_change: "Could coordinate privacy without concealment and publicness without humiliation through explicit safeguards."
        responsible_roles:
          - role_A
          - role_B
          - institutional_or_discourse_medium
    unfair_high_M_zones:
      - "Assigning high M to any role-position without evidence of knowledge, predictability, alternatives, power/control, and serious integration attempt."
      - "Treating public disclosure as automatically mature accountability or automatically immature boundary erosion."
      - "Treating confidentiality as automatically mature repair or automatically immature concealment."
      - "Using PMS/EDEN structural coherence to infer concrete blame, motive, legal fault, or dignity failure."
    system_as_excuse_risk:
      - "The abstract lack of scene evidence must not excuse real effects if a concrete scene later shows avoidable exposure, suppression, or accountability blockage."
      - "Institutional confidentiality must not disappear behind 'system rules' if it structures harm or blocks answerability."
      - "Public-accountability discourse must not disappear behind 'the public' if circulation, audience scale, or tribunalization creates avoidable dignity cost."
    D1_D2_realistically_improvable_where:
      - "Use non-shaming language that names role-positions and structural effects rather than persons."
      - "Preserve right of reply, contextualization, and correction channels when publicness is involved."
      - "Avoid both concealment-by-confidentiality and degradation-by-publicity."
      - "Keep D observations qualitative, time-windowed, role-bound, and reversible."

  acrp_profile:
    A_awareness:
      observations: >
        Awareness is structurally strong at the model level: PMS Core distinguishes
        private/public, repair/accountability, source/target frame, and
        original/secondary use; EDEN adds real Ω, cost, R, Σ/Ψ, correctability, and
        counter-scene checks; MIP adds A–C–R–P, IA, D, trajectory, and transmission
        hygiene. Scene-level awareness remains incomplete because concrete evidence
        is absent.
      available_information: "Completed PMS Core case, EDEN overlay, and the MIP model/template. No empirical case packet."
      realistically_knowable: >
        From current material, one can know the structural questions and
        non-capture zones; one cannot know legitimacy, proportionality, motive,
        legal status, actual harm, or concrete responsibility distribution.
      blind_spots: "Concrete consent, confidentiality terms, prior repair failure, legal/public-interest duties, audience, safeguards, right of reply, recurrence, and actual costs."
      role_awareness_A_R: "Roles are conceptually mapped, but role-specific responsibilities are not attributable beyond conditional structural possibilities."
      publicness_awareness_A_P: "Publicness is recognized as changing both knowledge and power-to-act; however its actual scale and reversibility are unknown."
      bias_awareness: "High risk of coherence bias, privacy/publicness loyalty bias, hindsight inflation, and dignity-bias effects has been named."
    C_coherence:
      observations: >
        Coherence is mixed: the PMS/EDEN/MIP readings are internally coherent and
        guardrail-rich, but the case itself remains under-discriminated because
        the same frame transfer can be erosion, correction, disclosure,
        whistleblowing, legal necessity, democratic publicness, or concealment
        exposure.
      word_deed_relation: >
        No concrete words or deeds are supplied. At the structural level, the main
        coherence test is whether a frame called "repair" actually preserves
        answerability and whether a frame called "accountability" actually
        preserves dignity and correctability.
      role_context_coherence: "Role-context coherence is not established; bounded repair, confidentiality, public accountability, and tribunal-like publicness remain possible frames rather than verified scene functions."
      narrative_coherence: "The narrative 'privacy to publicness' is coherent as a conceptual trajectory, but it is not yet discriminative enough to settle maturity, legitimacy, or responsibility."
      breaks_named_or_hidden: "Breaks are explicitly named: weak Λ, weak Α, conditional Ω, weak Σ, conditional Ψ, absent scene packet, and suspended EDEN false-coordination finding."
    R_responsibility:
      observations: >
        Responsibility is conditional and must remain distributed rather than
        person-assigned. MIP aligns with EDEN: R follows structuring effect under
        legibility, capacity, alternatives, Θ trajectory, and Ω cost/exposure, not
        guilt or moral worth.
      responsibility_points: "Potential responsibility points include holding confidentiality terms clearly, not suppressing accountability, avoiding disproportionate exposure, providing right of reply, contextualizing material, preserving correction channels, and reviewing whether publicness or privacy is still justified."
      assumed_responsibility: "No role-position can be said to have actually assumed responsibility on the current record."
      shifted_or_refused_responsibility: "Possible but not established: privacy may shift accountability burden to affected parties; publicness may shift explanation and reputational burden to the exposed position; the medium may shift circulation cost while appearing neutral."
      burdens_and_consequences: "Candidate burdens include exposure cost, explanation cost, reply-capacity cost, protection cost, accountability-access cost, repair cost, speech cost, and correctability cost. Actual bearers are unknown."
    P_power_to_act:
      observations: "Power-to-act is real as a structural question but not concretely allocated. The key MIP addition is to separate formal options from real levers under publicity, confidentiality, timing, audience, and correction conditions."
      real_levers: "Possible levers include containment, disclosure, anonymization, timing control, contextualization, procedural escalation, reply access, review points, correction, withdrawal, and safeguard design."
      formal_vs_real_options: "A formal right to speak, remain private, answer, or correct may be ineffective if audience scale, institutional power, legal constraints, fear of exposure, or lack of context make the option unreal."
      used_options: "Not established."
      unused_options: "Not established; cannot be retroactively imposed as obvious."
      ceiling_rule_relevance: "High M is not supportable without demonstrated predictability and real alternatives. The current conceptual record caps responsibility claims methodologically."

  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: "Not evidenced. No self-treatment of an identifiable person or role-holder is available."
      self_neglect: "Not evidenced."
      shame_dynamics: "Structurally possible if publicness becomes tribunal-like, humiliating, or irreversible; also possible if confidentiality silences affected voice and forces private shame. Not established."
      degradation_of_others: "Not evidenced. The analysis must avoid creating degradation by naming either role-position as immature, undignified, or culpable."
      public_shaming: "Possible structural risk under public accountability discourse or audience amplification; not established as an event."
      protest_or_refusal: "May be principled rather than immature: refusal of either privacy or publicness can mark non-capture, legal necessity, public interest, or dignity protection."
      dignity_protection: "Dignity protection consists in preserving D0, avoiding public verdict, maintaining role-bound language, keeping right of reply and correction visible, and refusing shame-based clarity."
    next_step_if_relevant: "Use D-profile section below only as qualitative, role-bound D-stress observation; do not convert it into a dignity score or person label."

  acrpd_submodules_profile:
    A:
      A-I: "Information awareness is strong at model level but incomplete at scene level: structural distinctions are known; concrete evidence is missing."
      A-R: "Role awareness is adequate for abstract role positions, not for concrete actors or institutions."
      A-C: "Context awareness is high regarding frame transfer and publicness, but low regarding legal, institutional, consent, harm, and audience specifics."
      A-IM: "Impact awareness is conditional: possible exposure, accountability access, explanation burden, and dignity risk are named but not empirically allocated."
      A-P: "Publicness awareness is central and active; publicness is treated as a maturity-relevant condition, not merely as communication scale."
    C:
      C-S: "Structural coherence is good across PMS Core, EDEN overlay, and MIP, but the fit itself creates over-coherence risk."
      C-P: "Praxis coherence is under-specified because no concrete enactment, sequence, or role decision is available."
      C-N: "Narrative coherence is mixed: 'privacy to publicness' is intelligible but must not smooth over rival readings."
      C-I: "Integration coherence is weak: repair and accountability, privacy and publicness, protection and answerability are not yet coordinated in a concrete scene."
    R:
      R-I: "Individual responsibility is not assigned because no individuals are analyzed."
      R-S: "Structural responsibility remains the relevant level: frame control, audience control, confidentiality control, and correction control may structure effects."
      R-E: "Responsibility for effects is conditional on real effect, knowledge, capacity, predictability, alternatives, and integration attempt."
      R-P: "Public responsibility is possible where publicness is used or withheld, but no public-duty finding is made."
    P:
      P-I: "Individual power is not assessed."
      P-S: "Structural power appears in frame-setting, confidentiality, disclosure, audience, timing, circulation, and correction channels."
      P-C: "Contextual power is indeterminate because institutional rules, legal constraints, dependencies, and medium affordances are absent."
      P-PU: "Public power is highly relevant: publicness may amplify accountability or exposure and may reduce reversibility."
    D:
      active: true
      D-I: "No individual self-dignity enactment is assessed."
      D-B: "Boundary-related dignity risk is visible: both boundary loss and boundary misuse can threaten dignity in practice."
      D-R: "Relational dignity depends on whether the frame transfer preserves answerability without humiliation and protection without concealment."
      D-P: "Public dignity is central: publicness can correct hidden asymmetry or produce irreversible shame."
      note: "D is activated only as qualitative dignity-in-practice protection for a conceptual role constellation. D0 remains untouched; no dignity score or person label is produced."

  scores_and_ia:
    A_score:
      A_band: "4-5 (everyday mixed zone) for the case-constellation only; not a person score"
      boundary_confirmed: "A-score describes enactment, not essence."
      time_role_context: "Conceptual privacy-to-publicness frame-transfer constellation, after PMS Core and EDEN overlay, without concrete scene packet."
      justification:
        A_awareness: "Awareness is comparatively strong at structural/model level because frame transfer, Ω, publicness, non-capture, rival readings, and guardrails are explicit."
        C_coherence: "Coherence remains mixed: the model readings are coherent, but the case lacks discriminating scene evidence."
        R_responsibility: "Responsibility is weak/conditional because no role-position has documented knowledge, capacity, alternatives, or commitments."
        P_power_to_act: "Power-to-act is structurally visible but not allocated; real levers are possible, not evidenced."
        modulators_context: "Publicness, asymmetry, confidentiality, audience scale, timing, legal/institutional context, and D risk are major modulators but mostly unspecified."
      D_excluded_from_A_number: true
    M_score:
      M_band: "not assignable to persons; provisional structural M ceiling ≤4 for any role-position on current evidence"
      boundary_confirmed: "M-score describes shared structural responsibility, not guilt."
      role_position_time_frame: "Abstract role-positions across the conceptual trajectory from bounded source frame to public target frame."
      five_factors:
        knowledge: "Current record does not show what any role-position knew or could realistically know."
        power_control: "Possible powers are visible—contain, disclose, contextualize, anonymize, correct, review—but no actual control distribution is evidenced."
        predictability: "Predictability of public exposure, repair failure, accountability need, or dignity cost is not established."
        access_to_alternatives: "Real alternatives are unknown; formal alternatives must not be inflated into real options."
        serious_integration_attempt: "No documented attempt to integrate privacy with accountability or repair with publicness is available."
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: true
        explanation: "The cap is methodological rather than a factual finding of zero predictability/options: high M is unsupported until predictability, alternatives, and real levers are shown."
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: "Candidate crossed asymmetry between bounded repair/confidentiality and public accountability/disclosure, mediated by audience scale, reply capacity, frame control, protection, accountability access, and reversibility."
      boundary_confirmed: "IA-box is an asymmetry check, not a verdict."
      T_transparent:
        status: "partial / not scene-established"
        notes: "The structural asymmetry is named, but who knew what, who could know it, and who controlled the terms are unknown."
      J_justified:
        status: "undetermined"
        protected_good_or_purpose: "Possible protected goods include repair, contextual integrity, accountability, harm prevention, public interest, dignity protection, and right of reply."
        notes: "Justification cannot be determined without consent, legal/public-interest basis, prior repair failure, proportionality, safeguards, and harm context."
      TB_time_bound:
        status: "not established"
        review_points_or_conditions: "Would require explicit review conditions: when confidentiality expires or continues, when publicness is proportionate, and when correction/withdrawal/reply is available."
        notes: "No time-boundedness is provided by the conceptual case."
      R_reversible:
        status: "at risk / not established"
        real_return_or_exit_options: "Possible but unspecified: anonymization, contextual correction, right of reply, de-escalation, review, withdrawal, limited audience, or repair process."
        notes: "Public circulation often reduces reversibility; confidentiality may also reduce reversibility for affected parties if accountability is blocked."
      result: IA_risk
      short_justification: "The asymmetry is structurally visible but not yet transparent, justified, time-bound, or reversible in a scene-specific way. This is an IA-risk reading, not a verdict."
      immediate_action: "For analysis only: do not operationalize; require a concrete scene packet and counter-scene before any use beyond working-note reflection."

  ia_localisation:
    knowing:
      issue: "The main knowing issue is missing scene packet: who knew the confidentiality terms, accountability need, harm context, and publicness consequences?"
      possible_intervention: "Document source frame, target frame, consent terms, legal/public-interest basis, prior repair attempts, audience, and evidence limits before interpretation."
    being_able:
      issue: "The main ability issue is whether role-positions had real, not merely formal, levers to repair, disclose, answer, contextualize, or correct."
      possible_intervention: "Map actual levers and constraints: platform/institutional rules, timing, dependencies, retaliation risk, reply access, and correction channels."
    being_permitted:
      issue: "The permission issue concerns whether confidentiality, disclosure, publicness, or withholding were authorized, prohibited, required, or ethically contested."
      possible_intervention: "Separate legal/procedural permission, role mandate, public-interest permission, and dignity-preserving restraint without replacing legal analysis."
    willing:
      issue: "Willingness cannot be inferred; refusal, silence, disclosure, or non-disclosure may have multiple legitimate or illegitimate meanings."
      possible_intervention: "Do not infer motive. Ask only what role commitments, review points, and correction conditions were actually taken up if a concrete scene is later supplied."

  ia_protection:
    transparency_measures:
      - "State source frame, target frame, audience, evidence limits, and whether material was bounded, consented, public, or legally required."
    justification_measures:
      - "Name the protected good claimed by privacy or publicness and test it against proportionality, accountability access, D protection, and rival readings."
    time_boundedness_measures:
      - "Define review points for confidentiality, disclosure, public circulation, correction, and ongoing relevance."
    reversibility_measures:
      - "Preserve right of reply, contextualization, anonymization where appropriate, correction channels, de-escalation paths, and the ability to revise the interpretation."
    participation_or_voice_measures:
      - "Allow affected role-positions to contest frame, evidence, R trace, publicness, and application without their contestation being treated as confirmation of immaturity or EDEN drift."
    dignity_protection_measures:
      - "Avoid person labels, shame-based formulations, public dignity readings of identifiable persons, and any claim that structural maturity equals person worth."
    review_or_falsifier:
      date_or_interval: "Before any transmission beyond working note, or whenever concrete scene evidence is added."
