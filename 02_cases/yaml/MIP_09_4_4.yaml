  trajectory:
    principle: "Trajectories, not labels."
    timeline:
      - timepoint: t0
        short_description: "Material, utterance, or expectation is generated, received, or held under a bounded repair, confidential feedback, or internal-resolution frame."
        A_band: "4-5 conceptual: distinctions can be named, but scene awareness is incomplete."
        M_band: "not assignable; high M unsupported without knowledge, predictability, alternatives, and levers."
        D_observation_optional: "D may be protected by boundedness or threatened if boundedness suppresses affected voice."
        key_context_role_power_situation: "Source-frame control, confidentiality terms, repair expectations, and accountability access are decisive but unspecified."
      - timepoint: t1
        short_description: "The same material or structure is later placed into public accountability discourse or tribunal-like publicness."
        A_band: "4-5 conceptual: publicness and recontextualization are visible, but legitimacy is unresolved."
        M_band: "not assignable; provisional structural ceiling ≤4 on current evidence."
        D_observation_optional: "D may be protected through accountability or stressed through exposure, shame, and reduced reversibility."
        key_context_role_power_situation: "Audience scale, right of reply, proportionality, safeguards, and correction channels become decisive."
      - timepoint: t2
        short_description: "Costs, explanation burden, reply capacity, R, Σ/Ψ load, and correctability may be redistributed."
        A_band: "4-5 unless concrete integration and safeguards raise it or concrete suppression/exposure lowers it."
        M_band: "conditional only; role-specific M depends on documented structuring effects and real alternatives."
        D_observation_optional: "D-stress level may rise if publicness becomes humiliating or if confidentiality blocks recognition and accountability."
        key_context_role_power_situation: "Maturity turns on whether repair and accountability are integrated without concealment or humiliation."
    A_t:
      pattern: "A(t) improves at the model level as PMS → EDEN → MIP adds discriminating checks, but scene-level A(t) remains limited by missing evidence."
      notes: "The analysis should not mistake improved formal visibility for improved factual knowledge."
    M_t_RVR_t:
      RVR_description: "Role-Variability-Responsibility over time remains indeterminate: responsibility may increase only where role-position knowledge, levers, alternatives, and integration attempts become evidenced."
      knowledge_over_time: "Unknown; t0/t1/t2 knowledge cannot be inferred."
      leverage_over_time: "Potential leverage shifts from source-frame confidentiality to public-frame audience/circulation and correction mechanisms, but actual leverage is unknown."
      alternatives_over_time: "Alternatives may shrink after public circulation and may also shrink under prolonged confidentiality; neither trajectory is established."
      ceiling_rule_over_time: "High M remains capped until predictability and real alternatives are shown at the relevant timepoint."
    D_t_optional:
      active: true
      qualitative_course: "D-stress is structurally possible across the trajectory: low or protected at t0 if bounded repair is real, rising if confidentiality suppresses accountability; rising at t1/t2 if publicness produces humiliation, but potentially improving if publicness restores recognition and correctability."
      D_quick_grid_movement_if_used: "Conditional level 1-2 D stress for the constellation, not for persons; level depends on concrete exposure, shame, protection, and reply conditions."
      note: "No D-score; only qualitative trajectory."

