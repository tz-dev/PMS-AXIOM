  meta_notes:
    bias_risks:
      confirmation_bias: "Risk of confirming the already coherent PMS/EDEN reading rather than letting counter-scenes defeat it."
      hindsight_bias: "Risk of treating publicness consequences, failed repair, or available alternatives as obvious after the fact."
      status_quo_loyalty_bias: "Risk of privileging confidentiality or institutional containment because it appears orderly."
      halo_horn_effects: "Risk of idealizing public accountability as democratic courage or demonizing it as tribunalization; inverse risk for privacy as repair or concealment."
      in_group_out_group_bias: "Observers may identify with disclosed/exposed parties, affected parties, institutions, public audiences, or confidentiality norms."
      dignity_bias_effect: "D concerns may either overprotect against accountability or underprotect against shame and irreversible exposure."
    norm_assumptions:
      explicit_norms:
        - "D0 is inviolable and non-rankable."
        - "Profiles are not persons."
        - "A/M bands describe enactments or structures, not character."
        - "Publicness requires heightened reversibility and dignity checks."
        - "Responsibility is not guilt."
      implicit_norms:
