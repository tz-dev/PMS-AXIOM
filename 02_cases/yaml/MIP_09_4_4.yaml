  uniform_report:
    generate_only_from_structured_fields: true
    title: "MIP working-note analysis: Boundary erosion (Privacy → Publicness)"
    overview_4_to_7_sentences: >
      This MIP pass analyzes the completed PMS Core and PMS-EDEN case as a
      conceptual role-and-frame constellation, not as a concrete scene or person
      evaluation. The central structure is a transfer from bounded repair or
      confidentiality into public accountability or tribunal-like publicness.
      A-score is provisionally placed in the 4-5 mixed zone for the constellation
      because structural awareness is strong but scene-level coherence,
      responsibility, and power-to-act remain under-specified. M-score is not
      assignable to persons; role-position responsibility is methodologically
      capped because knowledge, predictability, alternatives, and levers are not
      evidenced. The IA-box returns IA-risk because asymmetry is visible but
      transparency, justification, time-boundedness, and reversibility are not
      scene-established. D is activated only as qualitative dignity-in-practice
      protection because publicness, exposure, shame risk, reply capacity, and
      confidentiality-as-protection-or-concealment are structurally central.
    key_findings:
      - "The analysis is valid only as a structural working note over an abstract case-family."
      - "Privacy and publicness are both ambivalent: either can protect dignity and accountability or distort them."
      - "A(H) is provisionally 4-5 for the constellation, not for persons."
      - "M is not assignable; high responsibility is unsupported without concrete knowledge, predictability, alternatives, levers, and integration attempts."
      - "IA risk is present because crossed asymmetry is visible but not yet transparent, justified, time-bound, or reversible."
      - "D-stress is conditional and qualitative; no dignity score or person-level dignity reading is made."
      - "The strongest falsifiers are warranted public accountability, whistleblowing, legal disclosure, procedural correction, democratic publicness, or genuinely protective confidentiality."
    A_summary: "A is structurally developed at model level but incomplete at scene level; provisional A(H) = 4-5 mixed zone for the constellation only."
    M_summary: "M is not assigned to persons or concrete role-holders. On the current record, high M is unsupported and any role-position M is capped methodologically until scene evidence shows knowledge, power/control, predictability, alternatives, and integration attempt."
    IA_box_summary: "IA-box result: IA_risk. The asymmetry is named but not sufficiently transparent, justified, time-bound, or reversible."
    D_summary_if_activated: "D is active only as qualitative protection. Publicness and confidentiality can each protect or threaten dignity-in-practice; D0 is untouched, and no D-score or person label is produced."
    trajectory_summary: "The trajectory runs from bounded source frame to public target frame to redistributed costs and correctability. Maturity would increase only if the scene integrates repair and accountability without concealment or humiliation and preserves correction space."
    guardrail_status: "Guardrails passed for working-note use: profile-not-person, score hygiene, D0 protection, no diagnosis, no verdict, no action authority, and non-capture are preserved."
    transmission_status: "working_note only; not decision basis."
    practical_implications: "No applied instruction follows from this YAML. The only structurally safe next step is to require a concrete scene packet and counter-scene before any stronger analysis."
    conclusion: "MIP confirms the Core/EDEN caution: the case is structurally rich but empirically under-specified. It shows conditional maturity risks around awareness, coherence, responsibility, power-to-act, IA, and dignity-in-practice, but it does not authorize blame, diagnosis, legal judgment, intervention, or public attribution."