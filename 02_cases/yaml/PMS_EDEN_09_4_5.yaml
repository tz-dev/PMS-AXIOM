        role_B: "not established; no role-specific protection, immunity, exposure, or criticizability pattern is supplied"
        scene_effect: "protection remains a future calibration field and cannot be read as immunity from R"
      dignity_guardrail: "Responsibility must not degrade; protection must not immunize."

    visible_costs:
      visibility_cost: "indeterminate"
      explanation_cost: "indeterminate"
      reaction_cost: "indeterminate"
      waiting_cost: "indeterminate"
      binding_cost: "indeterminate"
      protection_cost: "indeterminate"
      speech_cost: "indeterminate"
      repair_cost: "indeterminate"
      dignity_cost: "methodologically protected by D; no concrete dignity strain is asserted"
      legibility_cost: "indeterminate"
      option_loss: "indeterminate"

    available_language:
