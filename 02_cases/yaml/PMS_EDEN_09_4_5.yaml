pms_eden_overlay_application:
  schema_version: PMS-EDEN_1.2
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-EDEN.yaml
  paper_source_file: PMS-EDEN - Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: PMS–EDEN Application Profile
    model_short: PMS-EDEN
    status: draft
    repository_role: paper_specific_application_profile
    last_updated: '2026-05-24'
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.4 Thinking)
      role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
    repo:
      name: PMS-EDEN
      url: https://github.com/tz-dev/PMS-EDEN
    source_paper:
      title: PMS–EDEN — Structural Drift from Praxis to Comparison, Pseudo-Symmetry, and Reciprocity Loss
      version: PMS-EDEN_1.2
      status: final_updated_reference
      paper_role: authoritative_overlay_source
    description: 'PMS-EDEN is a paper-specific application profile for PMS_1.3. It operationalizes the EDEN lens as a machine-first overlay: reduced signatures, paper constructs, drift traces, pattern handles, EDEN-MAP mapping discipline, boundary conditions, alternative explanations, and example-suite scaffolding. It remains strictly subordinate to PMS.yaml.

      '
    methodological_restraint: 'PMS-EDEN does not claim to exhaust all accounts of Eden, comparison, reciprocity, asymmetry, sexed difference, recognition, or relational breakdown. It offers a structural drift grammar within PMS and remains open to rival framings, partial applicability, and genuine non-capture.

      '
  abbrev_legend:
    A: Awareness
    C: Coherence
    R: Responsibility
    E: Action / Enactment
    D: Dignity-in-practice
    PS: Pseudo-Symmetry (paper-internal construct)
    PFO: Postfeminist Override / Over-steering (paper-internal regime label; non-operator)
    NRK: Negative Responsibility Kernel (paper-internal construct)
    AS: Asymmetry Switch / Exception Switch (paper-internal label; non-operator)
    PES: Permanentized Exception Switch (paper-internal regime-drift label; non-operator)
    PTE: Parity-to-exit (paper-internal drift profile; non-operator)
    RTA: Responsibility-to-authority (paper-internal drift profile; non-operator)
    EDEN_MAP: EDEN-MAP mapping protocol (paper schema)
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for case title Repair Relationships
    rule: 'This EDEN block is appended to or integrated with an already completed PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat EDEN constructs as PMS Base.

      '
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures A, C, R, E, D as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: 'The EDEN overlay may add visibility for EDEN ground-state reading, threshold explicitness, breach as chain interruption, NRK, false comparison, dissatisfaction as system cost, pseudo-symmetry, asymmetry-switch availability, PFO, parity-to-exit, responsibility-to-authority, reciprocity loss, EDEN-MAP, pattern library, viability boundaries, and alternative explanations. It must not modify the completed PMS Core case except where a direct PMS.yaml inconsistency has been separately identified.

      '
  overlays: {}
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: 'PMS-EDEN introduces no amplification overlays beyond paper-internal descriptors, reduced signatures, drift corridors, regime descriptions, cost markers, viability boundaries, EDEN-MAP, alternative-explanation discipline, and example-suite schemas. These organize existing PMS operators and never become PMS operators, axes, or dependencies.

      '
  validity_gate:
    status: passed
    gate_type: PMS_application_only
    note: 'This gate constrains PMS application only. PMS itself, PMS-EDEN, or the case may be criticized, rejected, revised, or ignored without satisfying this gate.

      '
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: 'Maintained reflective distance; no fusion into verdict, urgency, enforcement, person-level attribution, diagnosis, humiliation, or irreversible labeling.

          '
      reversibility:
        id: reversibility
        status: maintained
        meaning: 'Scene-bound, revisable, non-final readings; no global person labels, no group labels, no irreversible drift classification.

          '
      Dignity_in_Practice_D:
        id: D
        name: Dignity-in-practice
        status: maintained
        meaning: 'No shaming, ranking, humiliation, or ontological person evaluation. Critique applies only to enacted structures, role-position configurations, cost handling, and scene-bound drift profiles.

          '
    gate_result: valid_as_eden_overlay_application
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    canonical_source_url: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependency_hygiene_note: 'Any use of Χ in reduced signatures is shorthand only. In PMS, Χ presupposes Φ, Θ, and □. Reduced signatures do not negate prerequisites, replace generativity with explanation, or alter the default dependency path recorded in PMS_1.3.

      '
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  references:
    pms_github: https://github.com/tz-dev/Praxeological-Meta-Structure-Theory
    pms_yaml_raw: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
    pms_eden_repo: https://github.com/tz-dev/PMS-EDEN
  eden_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-theological, non-clinical, non-diagnostic.
    - No person-level judgment, no group label, no ideology claim, no ranking, no sanction logic.
    - No psychology or inner-state explanation.
    - No moral verdict logic.
    - No automatic prescriptive authority.
    - No person-level interpretation of switch-drift handles.
    - Switch labels are scene-bound structural profiles, not traits, motives, or person defects.
    - Description and application remain firewalled by Χ + reversibility + D.
    may_add_visibility_to:
    - Eden as ground-state praxis configuration
    - Threshold explicitness / option visibility
    - Breach as chain interruption rather than knowledge gain
    - Fig leaves as legibility management
    - Negative Responsibility Kernel
    - False comparison pivot
    - Dissatisfaction as system cost
    - Pseudo-Symmetry regime
    - Asymmetry-switch availability
    - Permanentized exception switch
    - Parity-to-exit drift
    - Responsibility-to-authority drift
    - PFO as paper-internal regime label
    - Reciprocity as coordinated asymmetry
    - Reciprocity loss
    - Devaluation and humiliation as structural stabilization modes
    - Pattern-library recognition handles
    - EDEN-MAP scene-bound mapping
    - Boundary conditions and alternative explanations
    must_not_do:
    - read Eden as theological doctrine or moral anthropology
    - treat paper-internal labels as PMS operators
    - treat switch-drift handles as person labels
    - treat PFO as group label or ideology claim
    - treat humiliation or devaluation as moral accusation
    - treat NRK as PMS Action_E
    - treat comparison drift as diagnosis
    - convert additional responsibility into authority
    - convert parity into exit from unequal cost-bearing
    - use EDEN-MAP as coercive mapping against persons
    - claim PMS Base validation
  paper_frontmatter_min:
    key_claims:
    - 'Eden as a praxeological ground state within PMS: A-availability without deficit pressure in a structurally specified praxis scene.'
    - Breach/Fall as operator-chain interruption, not knowledge gain; consequence-field legibility under Ω/Θ/Λ without epistemic surplus.
    - 'Drift pipeline: praxis → comparison-dominant □ → PS → asymmetry-switch availability → PFO/permanentized exception → parity-to-exit / responsibility-to-authority drift → devaluation/humiliation scripts → reciprocity loss.'
    pms_conformance:
    - Uses only PMS_1.3 operators Δ–Ψ.
    - No redefinitions and no new axioms.
    - Separates description from application.
    - Validity gate applies to application only.
    acred_reference:
      A:
        formula:
        - Θ
        - □
        - Δ
        label: Awareness
      C:
        formula:
        - Θ
        - Λ
        - □
        - ∇
        label: Coherence
      R:
        formula:
        - Ψ
        - Φ
        - Θ
        - Ω
        label: Responsibility
      E:
        formula:
        - Σ
        - Θ
        - ∇
        label: Action / Enactment
      D:
        formula_note: D = (Ψ ∘ Χ) applied to Ω-handling
        label: Dignity-in-practice
        discipline: non-metaphysical; non-ranking
    paper_terms_min:
      pseudo_symmetry_PS:
        status: risk
        definition: 'Comparison-dominant □ asserts rhetorical parity while Ω remains operative in consequences and may produce asymmetry-switch availability. This is a paper-internal structural substitution, not a moral claim.

          '
        case_application: Pseudo-symmetry is not active as an established regime because the completed Core case is not a concrete scene. It remains a risk marker: trust repair could drift into a comparison-dominant frame where rhetorical parity or mutuality is preserved while real vulnerability, reliance, obligation, or exposure remains asymmetrical and Σ/Ψ repair is only simulated.
      asymmetry_switch:
        status: risk
        definition: 'Paper-internal label for parity-to-asymmetry activation under real or invoked Ω/Θ pressure; valid only where marked, bounded, and re-bound into Σ/Ψ.

          '
        case_application: Asymmetry-switch activation is not established. It remains a risk where a party, role, claim, or institution shifts from parity-language to vulnerability or authority-language under Ω/Θ pressure without marking, bounding, and re-binding that activation into Σ and Ψ.
      permanentized_exception_switch:
        status: not_applicable
        definition: 'PFO drift form in which asymmetry activation ceases to be emergency-bound and becomes a standing lever under preserved parity surface.

          '
        case_application: The case material does not show a standing exception-switch regime. Permanentization would require repeated availability of asymmetry activation under preserved parity surface across Θ, which the conceptual trust-repair case does not supply.
      parity_to_exit:
        status: risk
        definition: 'Drift pattern in which parity rhetoric is used to deny additional responsibility under unequal Ω/Θ consequences.

          '
        case_application: Parity-to-exit is not demonstrated, but it is a relevant risk if equality, symmetry, mutual hurt, or mutual responsibility rhetoric becomes a way to avoid differentiated cost-bearing under concrete Ω/Θ consequences.
      responsibility_to_authority:
        status: risk
        definition: 'Drift pattern in which required Ψ/Χ self-binding under asymmetry is converted into control, protection entitlement, or frame authority.

          '
        case_application: Responsibility-to-authority is not demonstrated, but it is a relevant risk if responsibility for repair, protection, or institutional role obligation is converted into control over the other party, control of the frame, or entitlement to decide the meaning of rupture.
      PFO:
        status: not_applicable
        definition: 'Paper-internal regime label for □ governance attempting to manage or suppress Ω legibility while permanentizing asymmetry-switch availability. It is structural, not a group label and not an ideology claim.

          '
        case_application: PFO is too strong and not applicable to the supplied case material. The case concerns a general trust-repair field, not a paper-specific regime in which Ω-illegibility, comparison metrics, permanentized exception-switch availability, suppressed Σ, and displaced Ψ are stabilized.
      reciprocity_loss:
        status: risk
        definition: 'Erosion or failure of Σ/Ψ-supported coordination under real Ω across Θ, including switch-drift forms where parity becomes exit, asymmetry becomes leverage, or responsibility becomes authority.

          '
        case_application: Reciprocity loss remains a risk rather than an established outcome. It would appear if trust repair ceases to coordinate asymmetry through Σ/Ψ and instead stabilizes chronic Λ, comparison, unmarked asymmetry activation, parity-to-exit, or responsibility-to-authority.
    case_application: EDEN is relevant only as an overlay lens for possible drift in trust repair: ground-state reciprocity is weakly analogical, threshold and breach are conceptual, pseudo-symmetry and reciprocity loss are risk markers, and PFO/permanentized exception are not warranted by the non-concrete Core case. The overlay must not rewrite the Core pass, convert trust rupture into EDEN drift by default, or treat EDEN terms as PMS Base. In this case, EDEN contributes mainly a sharper vocabulary for boundary risks: comparison replacing praxis coordination, apparent parity masking operative Ω, repair-language simulating Σ, and responsibility shifting away from Ψ/Χ self-binding. These remain overlay-level visibility gains only; they do not establish that the trust-repair field has actually entered an EDEN drift corridor.
  paper_internal_terms_index:
    note: 'Paper-internal terms are stable handles only. They are not PMS operators, not diagnoses, not person labels, and not group labels.

      '
    asymmetry_switch:
      handle: AS
      status: risk
      definition: 'Shift from parity claim to asymmetry activation under real or invoked Ω/Θ pressure. Valid only where activation is marked, bounded, and re-bound into Σ/Ψ; drift where unmarked, repeatable, and responsibility-shifting.

        '
      case_application: Asymmetry-switch activation appears only as a risk marker. Trust repair may require naming vulnerability or role obligation, but the case gives no scene showing whether that activation is marked, bounded, and re-bound into Σ/Ψ or whether it becomes responsibility-shifting drift.
    permanentized_exception_switch:
      handle: PES
      status: not_applicable
      definition: 'PFO drift form in which asymmetry activation ceases to be emergency-bound and becomes a standing lever under preserved parity surface.

        '
      case_application: No standing exception-switch availability is evidenced. The conceptual case does not show repeated, unbounded, or regime-level exception activation under a preserved parity surface.
    parity_to_exit:
      handle: PTE
      status: risk
      definition: 'Drift pattern in which parity rhetoric is used to deny additional responsibility under unequal Ω/Θ consequences.

        '
      case_application: Parity-to-exit remains a risk where equality or mutuality language could be used to avoid re-internalizing unequal repair burdens. It is not active without a concrete frame, cost topology, and refusal pattern.
    responsibility_to_authority:
      handle: RTA
      status: risk
      definition: 'Drift pattern in which required Ψ/Χ self-binding under asymmetry is converted into control, frame authority, protection entitlement, or governance over another role-position.

        '
      case_application: Responsibility-to-authority remains a risk where repair responsibility becomes control, frame authority, protection entitlement, or governance over another role-position. It is not established by the case material.
  paper_constructs:
    note: 'The following are EDEN paper constructs. They are non-operators and must remain scene-bound, structural, non-diagnostic, and non-personal.

      '
    EDEN_ground_state:
      name: Eden ground state
      is_operator: false
      type: scene_configuration
      applicability: weak
      basis_operators:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
      basis_axes:
      - A
      definition: 'Eden is reconstructed as a structurally specified praxis scene without deficit pressure: Δ is present, □ is stable, Θ is continuity rather than punitive accumulation, A = [Θ, □, Δ] is available, ∇ exists without deficit-compulsion dominance, Ω is latent or non-escalated, and Λ is not the central engine.

        '
      case_application: An EDEN-like ground-state is present only weakly and analogically as the background idea of non-deficit trust: reliance can be stable, expectation can be framed, and vulnerability need not be escalated into comparison or accusation. The completed Core case does not supply an actual Edenic scene, stable □, non-escalated Ω, or continuity across Θ.
    THRESHOLD_apple:
      name: Threshold marker / option explicitness
      is_operator: false
      type: threshold_marker
      applicability: weak
      basis_operators:
      - Δ
      - □
      - Θ
      basis_axes:
      - A
      definition: 'The threshold marks option visibility: a negative praxis option becomes explicitly selectable within □ across Θ under available A. It adds no new Δ, A, or Χ and is not treated as knowledge or insight.

        '
      case_application: Threshold explicitness is weakly relevant because trust repair often turns on when withdrawal, betrayal, refusal, renewed reliance, apology, or repair becomes a selectable option within a frame. The case does not specify a concrete threshold event or option becoming newly explicit.
    BREACH_chain_interruption:
      name: Praxis breach as chain interruption
      is_operator: false
      type: chain_interrupt
      applicability: weak
      basis_operators:
      - Δ
      - ∇
      - □
      - Ω
      - Θ
      definition: 'Breach is reconstructed as realization under ∇ within □ with available A, where Σ does not carry integration and Ψ does not carry durable binding. It produces consequence-field legibility under Ω/Θ/Λ and does not produce epistemic surplus.

        '
      case_application: Breach-like chain interruption is conceptually relevant but not established. The case names damage, betrayal, and repair, but no realization under ∇ within □ is supplied; therefore NRK must not be inferred and Action_E remains under-specified rather than achieved.
    FIG_LEAVES_legibility_management:
      name: Fig leaves as legibility management
      is_operator: false
      type: cost_management_response
      applicability: weak
      basis_operators:
      - Λ
      - Ω
      - Χ
      - □
      - Θ
      definition: 'Fig leaves mark post-breach legibility management: □ shifts toward exposure/vulnerability framing, Χ appears as shielding distance rather than Σ-enabled reflection, Λ persists as remainder, Ω becomes instrumentally legible, and Α may seed concealment scripts.

        '
      case_application: Legibility management is weakly relevant where damaged trust leads to shielding, withdrawal, concealment, reputation management, institutional messaging, or reduced exposure. The case material does not show concrete fig-leaf dynamics, so this remains a possible overlay reading only.
    NRK:
      name: Negative Responsibility Kernel
      is_operator: false
      type: composite_kernel
      applicability: weak
      basis_operators:
      - ∇
      - □
      - Ω
      - Θ
      - Σ
      - Ψ
      basis_axes:
      - R
      - E
      compact_form: 'NRK = A available + real option-set in □ + Ω effective + Θ trajectory-bearing + realization under ∇ within □ with Σ not carrying and Ψ absent, aborted, externalized, displaced, or simulated.

        '
      discipline_E_separation: 'Do not label NRK as E. E remains reserved for integrated action: E = [Σ, Θ, ∇].

        '
      case_application: NRK is weak and boundary-marking only. The Core case already keeps Action_E under-specified and refuses to treat rupture as integrated action. NRK would require a concrete realization under ∇ with Ω effective across Θ while Σ does not carry and Ψ is absent, externalized, displaced, or simulated; those conditions are not supplied.
    FALSE_COMPARISON:
      name: False comparison pivot
      is_operator: false
      type: frame_mutation
      applicability: weak
      basis_operators:
      - □
      - Ω
      - Δ
      - Λ
      - Α
      - Θ
      definition: 'False comparison is a post-NRK frame inversion in which □ shifts from praxis-relation to value-relation. Δ becomes comparative tokenization, Ω is read as verdict or grievance surface, and comparison replaces coordination where Σ/Ψ cannot carry reciprocity.

        '
      case_application: 'False comparison is weakly relevant as a risk if trust repair shifts from praxis-relation to value-relation: who is more betrayed, more vulnerable, more owed, more mature, or more entitled. The case does not establish that this pivot has occurred.'
    DISSATISFACTION_system_cost:
      name: Dissatisfaction as system cost marker
      is_operator: false
      type: cost_marker
      applicability: weak
      basis_operators:
      - □
      - Ω
      - Θ
      - Α
      - Λ
      definition: 'Dissatisfaction is modeled as system cost of maintaining false equivalence inside □ under effective Ω and trajectory-bearing Θ. It is not treated as deficit or lack.

        '
      case_application: Dissatisfaction as system cost is weakly relevant where repeated repair attempts, comparison, correction, and unresolved Λ accumulate under real Ω. The conceptual case does not show permanent comparison or accumulated system cost.
    PS:
      name: Pseudo-Symmetry regime
      is_operator: false
      type: drift_regime
      applicability: weak
      basis_operators:
      - □
      - Ω
      - Θ
      - Σ
      - Ψ
      - Φ
      - Λ
      - Α
      core_operator_signature: 'PS = [□ comparison/value-relation + Ω real + Ω selectively activatable under parity surface + Σ low/blocked + Ψ misbound to appearance-management], typically with Φ, Λ, and Α as companions.

        '
      buffer_note: 'Pseudo-symmetry may function as bounded reversible buffer only insofar as it reopens Σ and Ψ under named Ω. As persistent substitution, it yields Σ/Ψ failure under Ω and prepares PFO.

        '
      case_application: Pseudo-symmetry is weak as a risk lens, not an active regime. It would apply if the repair frame preserved a surface of mutuality while real asymmetry of vulnerability, obligation, or exposure remained operative and Σ/Ψ were blocked, simulated, or redirected into appearance management.
    ASYMMETRY_SWITCH:
      name: Asymmetry switch / exception switch
      is_operator: false
      type: paper_internal_label
      paper_internal_label: true
      non_person_label: true
      applicability: risk
      basis_operators:
      - □
      - Ω
      - Θ
      - Σ
      - Ψ
      - Χ
      definition: 'Shift from parity claim to asymmetry activation under real or invoked Ω/Θ pressure. It is valid where marked, bounded, and re-bound into Σ/Ψ; it becomes drift where unmarked, repeatable, and responsibility-shifting.

        '
      case_application: Asymmetry activation is a risk, not an established switch. A trust-repair scene may validly name asymmetry when vulnerability or role obligation is real; it drifts only if activation is unmarked, repeatable, responsibility-shifting, and not re-bound into Σ/Ψ.
    PERMANENTIZED_EXCEPTION_SWITCH:
      name: Permanentized exception switch
      is_operator: false
      type: regime_drift_label
      paper_internal_label: true
      non_person_label: true
      applicability: not_applicable
      basis_operators:
      - □
      - Ω
      - Θ
      - Σ
      - Ψ
      - Φ
      - Λ
      - Α
      definition: 'PFO drift form in which asymmetry activation ceases to be emergency-bound and becomes a standing lever while parity remains rhetorically preserved and Σ/Ψ coordination remains blocked.

        '
      case_application: Permanentized exception-switch is not applicable to the supplied case. There is no evidence of a repeated, standing, regime-level exception lever under preserved parity surface.
    PARITY_TO_EXIT:
      name: Parity-to-exit
      is_operator: false
      type: drift_profile
      paper_internal_label: true
      non_person_label: true
      applicability: risk
      basis_operators:
      - □
      - Ω
      - Θ
      - Ψ
      - Χ
      definition: 'Drift pattern in which parity or symmetry is invoked to deny additional responsibility under unequal Ω/Θ consequences. Equality-language becomes an exit from re-internalizing costs.

        '
      case_application: Parity-to-exit is a risk marker where claims of equality, mutuality, symmetry, or shared fault are used to avoid differentiated repair obligations under unequal Ω/Θ consequences. The case material does not show this as active.
    RESPONSIBILITY_TO_AUTHORITY:
      name: Responsibility-to-authority
      is_operator: false
      type: drift_profile
      paper_internal_label: true
      non_person_label: true
      applicability: risk
      basis_operators:
      - Ω
      - Θ
      - Ψ
      - Χ
      - □
      definition: 'Drift pattern in which required self-binding under asymmetry is converted into control, frame authority, protection entitlement, or governance over another role-position.

        '
      case_application: Responsibility-to-authority is a risk marker where the duty to repair, protect, acknowledge, or carry asymmetrical cost becomes authority over the other party or over the interpretive frame. It is not active without a concrete scene.
    ADULT_RECIPROCITY_NON_EXTERNALIZATION:
      name: Adult reciprocity as non-externalization of unequal burdens
      is_operator: false
      type: viability_principle
      paper_internal_label: true
      non_person_label: true
      applicability: weak
      basis_operators:
      - Ω
      - Θ
      - Σ
      - Ψ
      - Χ
      basis_axes:
      - D
      definition: 'Adult reciprocity does not require equal burdens. It requires non-externalization of unequal burdens. Each role-position must carry the self-binding required by its own cost, capacity, externalization, and irreversibility profile.

        '
      case_application: 'Adult reciprocity as non-externalization is weakly relevant as a viability criterion for trust repair: burdens need not be equal, but each role-position must carry its own cost, capacity, and irreversibility profile without offloading it. The case does not show whether this occurs.'
    PFO:
      name: Postfeminist Override / Over-steering
      is_operator: false
      type: meta_frame_regime
      paper_internal_label: true
      non_group_label: true
      non_ideology_claim: true
      applicability: not_applicable
      basis_operators:
      - □
      - Ω
      - Φ
      - Λ
      - Α
      - Σ
      - Ψ
      - Θ
      - Χ
      compact_formalization: 'PFO = □(Ω-taboo + comparison + permanentized exception-switch availability) + Φ-high + Λ-open + Α-protocol with Σ suppressed and Ψ displaced or misbound across Θ.

        '
      residual_stabilization_outcome: 'Humiliation may emerge as remaining low-cost stabilization mode when explicit Ω/Σ/Ψ coordination is blocked under Ω-taboo and permanentized exception-switch conditions.

        '
      case_application: PFO is not applicable. The case does not supply a postfeminist or paper-specific regime, an Ω-taboo, a stabilized comparison protocol, permanentized exception-switch availability, or suppressed Σ and displaced Ψ across Θ. At most, local switch-drift risks are conceptually possible.
    RECIPROCITY:
      name: Reciprocity
      is_operator: false
      type: coordination_structure
      applicability: weak
      basis_operators:
      - Ω
      - Σ
      - Ψ
      - Θ
      - Χ
      basis_axes:
      - D
      definition: 'Reciprocity is not symmetry; it is coordinated asymmetry. Minimal condition: Ω legible as functional gradient + Σ active + Ψ anchored + Χ present, with D constraining Ω-handling.

        '
      case_application: Reciprocity is weakly active as the conceptual target of trust repair, but not established as coordinated. The Core case marks Σ and Ψ as weak, so reciprocity cannot be claimed as achieved; it remains a structural aim requiring named Ω, active Σ, anchored Ψ, Χ restraint, and D-constrained Ω-handling.
    RECIPROCITY_LOSS:
      name: Reciprocity loss
      is_operator: false
      type: drift_outcome
      applicability: risk
      basis_operators:
      - Ω
      - Θ
      - Λ
      - Α
      - Σ
      - Ψ
      - □
      - Χ
