  eden_overlay_synthesis:
    primary_eden_reading: >
      PMS-EDEN makes visible that "Repair Relationships" can be read as a
      trust-repair field vulnerable to EDEN-specific drift: threshold
      explicitness, breach-like interruption, comparison pivot,
      pseudo-symmetry, local switch drift, simulated integration,
      externalized binding, and reciprocity loss. The overlay does not claim
      that any of these are active. Its main contribution is to sharpen the
      boundary between coordinated repair and drift into comparison,
      appearance-management, or responsibility displacement. Because the Core
      case is conceptual and not a concrete praxis scene, EDEN should be read
      here as a disciplined risk-visibility layer rather than as a drift
      classification. The strongest result is not a diagnosis of relational
      failure, but a clearer account of what would have to become visible before
      pseudo-symmetry, switch drift, NRK, reciprocity loss, or PFO could be
      responsibly asserted.
    ground_state_result: >
      EDEN ground-state configuration is weak and only analogical. The case
      gestures toward stable non-deficit trust as a background possibility, but
      it supplies no actual Edenic praxis scene, no stable □, no non-escalated
      Ω, and no continuity across Θ.
    threshold_result: >
      Threshold explicitness is weakly relevant. Repair, refusal, withdrawal,
      accusation, apology, and renewed reliance may become selectable options
      in a trust frame, but no concrete threshold event is supplied.
    breach_or_NRK_result: >
      Breach-like chain interruption is conceptually relevant but not
      established. NRK is not claimed. Realization must remain distinct from
      Action_E because Action_E requires Σ-carried integration across Θ under
      ∇, and the case provides no concrete enactment or Σ carrier.
    legibility_management_result: >
      Fig-leaf-like shielding, concealment, or exposure management is a weak
      risk only. Damaged trust may produce shielding or reputation management,
      but no concrete post-breach exposure-management structure is provided.
    comparison_result: >
      No actual shift from praxis-relation to comparison/value-relation is
      established. False comparison remains a risk where repair turns into
      ranking of hurt, credibility, betrayal, maturity, responsibility, or
      standing.
    dissatisfaction_cost_result: >
      Dissatisfaction as system cost is not established. It would require
      recurring comparison, adjustment, unresolved Λ, and Α-load across Θ. The
      conceptual case provides only the possibility of such accumulation.
    pseudo_symmetry_result: >
      Pseudo-symmetry is weak and risk-bound. It would become active if a
      surface of mutuality or parity concealed operative Ω while Σ/Ψ were
      blocked, simulated, or bound to appearance management. The case does not
      show this regime.
    switch_drift_result: >
      Asymmetry-switch, parity-to-exit, and responsibility-to-authority are
      possible local risk handles but not findings. Permanentized exception
      switch is not applicable. Any later concrete use must check whether
      asymmetry activation is marked, bounded, and re-bound into Σ/Ψ.
    pfo_result: >
      PFO is not applicable and would be too strong. The more appropriate
      EDEN-level caution is AE5: possible local switch drift without full PFO,
      and even that remains weak because no concrete switch activation is
      supplied.
    reciprocity_result: >
      Reciprocity is weakly relevant as coordinated asymmetry and as a repair
      horizon. It is neither achieved nor lost in the case material. The Core
      case's weak Σ and Ψ status prevents any claim of restored reciprocity.
    devaluation_humiliation_result: >
      Devaluation and humiliation are only residual stabilization risks. They
      are not active findings and are not moral accusations. They would require
      concrete standing-lowering or status regulation substituting for Σ/Ψ
      coordination under named Ω.
    pattern_library_result: >
      The main applicable pattern-library handles are P-Λ-DN as denial or
      suppression risk, P-Σ-TOT as totalizing integration risk, P-Σ-SIM as
      simulated integration risk, P-Ψ-EXT as externalized binding risk, and
      P-□-MOR as tribunal-frame risk. In C5 terms, all triggers, stabilizers,
      and failures remain conditional because the case lacks concrete scene
      evidence.
    eden_map_result: >
      The EDEN-MAP formula is: □trust-repair frame → Λ candidates under
      expectation → Α under_specified → Ω possible but unmapped → switch_drift
      unclear → Σ weak/conditional → Ψ weak/unclaimed. The primary attractor is
      not evidenced. The cost layout shows active A-load and coherence risk,
      weak R, absent E, and high D restraint load.
    alternative_explanations_result: >
      AE1 drift without regime, AE3 exit or isolation without humiliation, AE4
      external institutional stress, and AE5 switch drift without full PFO all
      remain plausible but weak. Rival non-EDEN readings also remain open:
      epistemic, relational-ethical, institutional, legal, phenomenological,
      strategic, and refusal-based interpretations.
    boundary_conditions_result: >
      EDEN applicability is reduced by the lack of a concrete scene, by the
      absence of comparison-dominant □, by the absence of stabilized Α, by
      unfulfilled Σ/Ψ evidence, and by active rival-framework force. The active
      boundary BC2 keeps the case primarily within praxis-coordination rather
      than comparison/tribunal drift.
    non_capture_result: >
      Outside PMS-EDEN capture remain lived vulnerability, forgiveness,
      justified non-repair, irreparable rupture, legal breach, institutional
      legitimacy, clinical repair, cultural meanings of trust, and rival
      formalisms that may preserve distinctions EDEN compresses.
    final_eden_formula_or_signature: >
      case_specific_signature = weak_threshold_marker + breach_boundary_not_NRK
      + false_comparison_risk + PS_risk + AE5_switch_drift_without_full_PFO_weak
      + reciprocity_loss_risk + meta_signature_self_control_over_other_control,
      with PFO_not_applicable and Action_E_not_established.
    final_claim_boundary: >
      This EDEN overlay adds visibility for ground-state praxis, threshold
      explicitness, breach as chain interruption, NRK, comparison drift,
      pseudo-symmetry, switch-drift profiles, PFO, reciprocity loss, EDEN-MAP
      cost mapping, pattern-library handles, alternative explanations, and
      boundary conditions. It does not revise PMS Base, rewrite the PMS Core
      pass, introduce new PMS operators, diagnose persons, rank persons, make
      group or ideology claims, prescribe action, authorize coercion, validate
      PMS, or claim final capture of Eden, reciprocity, or relational drift.