pms_axiom_eden_overlay_case:
  schema_version: "PMS-AXIOM_EDEN_OVERLAY_CASE_TEMPLATE_v0.2"
  case_schema_version: "PMS-EDEN_CASE_2.0"
  schema_role: "eden_addon_overlay_over_completed_pms_core_case"
  overlay_model: "PMS-EDEN"
  overlay_schema_version: "PMS-EDEN_2.0"
  eden_case_template_source: "PMS-EDEN_CASE_2.0"
  base_model: "PMS"
  base_schema_version: "PMS_1.3"
  axiom_status: "addon_layer_only_over_completed_core_case"
  template_purpose: >-
    Structure an AXIOM-compatible PMS-EDEN overlay for the already completed
    PMS-Core Repair Relationships case. The overlay maps EDEN applicability
    thresholds for real Ω, responsibility/action-power distribution, Σ/Ψ status,
    cost distribution, non-action/non-binding relevance, counter-scenes,
    falsifiers, and the description/application firewall without modifying the
    completed PMS-Core analysis and without converting structural description
    into diagnosis, verdict, sex truth, prescription, intervention, or PMS-Base
    revision.

  source_alignment:
    pms_base:
      source_file: "PMS.yaml"
      schema_version: "PMS_1.3"
      role: "unchanged base operator grammar and application guardrails"
    eden_profile:
      source_file: "PMS-EDEN.yaml"
      schema_version: "PMS-EDEN_2.0"
      role: "paper-specific overlay/application profile"
    eden_repo_case_template:
      source_file: "PMS-EDEN_CASE_2.0"
      role: "field structure for scene-bound PMS-EDEN example cases"
    completed_core_case:
      title: "Repair Relationships"
      source_file: "completed PMS Core case YAML"
      role: "already completed PMS-Core pass; anchor only"
    axiom_policy: >-
      AXIOM does not generate a standalone PMS-EDEN example-suite artefact unless
      explicitly requested. PMS-EDEN functions here only as an add-on layer over
      an existing PMS-Core case. PMS-Core remains the already completed base pass.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_title: "Repair Relationships"
    core_case_type: "conceptual_domain_projection"
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
    rule: >-
      The EDEN overlay is appended after the completed PMS-Core case. It may
      reference Core distinctions, frames, non-events, possible Ω, Θ, Χ,
      conditional Σ, and analytic Ψ only as anchors. It does not redefine PMS
      operators, alter dependencies, replace derived PMS axes, correct the Core
      pass, or validate PMS Base.
    preserved_core_elements:
      - "PMS operator inventory: Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS repository operator order and dependency hygiene"
      - "PMS derived structures A, C, R, E, D as derived, not primitive"
      - "PMS application gate: Χ, reversibility, Dignity-in-Practice"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
      - "Completed Core status that Repair Relationships is not a concrete scene"

  pms_v13_and_eden_conformity:
    status: "conformant_overlay_with_application_suspension_for_strong_EDEN_claims"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    overlay_only: true
    pms_R_axis_preserved: true
    pms_D_axis_preserved: true
    pms_E_strict_action_preserved: true
    eden_responsibility_principle_is_overlay_attribution_rule: true
    eden_constructs_are_not_pms_base: true
    adult_reciprocity_is_not_new_pms_axis: true
    reciprocity_loss_is_not_new_pms_axis: true
    correctability_is_not_new_pms_axis: true
    minimal_recovery_signature_is_not_new_pms_axis: true
    reduced_signatures_are_overlay_shorthand_only: true
    notes:
      - "Adult Reciprocity is used only as an EDEN normative benchmark for truthful coordination of real Ω."
      - "False-Coordinated Real Asymmetry is an EDEN mechanism, not a PMS operator."
      - "Action-Power is an EDEN scene-bound attribution handle, not a PMS operator."
      - "AEP, PFO, Reciprocity Loss, Correctability, and Minimal Recovery Signature are overlay constructs or theoretical compressions only."
      - "Because the Core case supplies no concrete scene, EDEN-MAP can only mark applicability thresholds, non-capture zones, and evidence requirements; it cannot affirm a strong EDEN finding."

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
    dependency_hygiene_note: >-
      Reduced EDEN signatures or QC-EXT shortcuts do not alter PMS dependencies.
      Any reference to Χ, Σ, Ψ, R, E, or D presupposes the canonical PMS formulas
      and dependencies even when an EDEN overlay line abbreviates them.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >-
      PMS-EDEN 2.0 constructs, EDEN-MAP fields, profiles, mechanisms,
      benchmarks, boundaries, falsifiers, and viability signatures organize
      existing PMS operators only. They do not become PMS operators, PMS axes,
      PMS dependencies, additional AXIOM layers, or independent application
      authority.

  eden_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-theological, non-clinical, non-diagnostic."
      - "No person-level judgment, group label, ideology claim, sex ranking, sanction logic, or hidden motive inference."
      - "No action authorization from description."
      - "Description and application remain firewalled by Χ, reversibility, D, contextual responsibility, contestability, and independent application authority."
    may_add_visibility_to:
      - "Adult Reciprocity as truthful coordination of real Ω"
      - "False-Coordinated Real Asymmetry"
      - "real Ω mapping before failure attribution"
      - "responsibility and Action-Power distribution"
      - "Σ/Ψ openness, blockage, simulation, avoidance, or externalization"
      - "cost distribution under Ω and Θ"
      - "non-action and non-binding relevance under □/Λ/Ω/Θ"
      - "counter-scenes, falsifiers, rivals, boundaries, and non-capture"
    must_not_do:
      - "treat EDEN as PMS Base"
      - "treat Adult Reciprocity, Action-Power, PFO, AEP, correctability, or Reciprocity Loss as PMS operators or axes"
      - "start from PFO, Fall, False Comparison, or sex category as master origin"
      - "treat non-action as praxis by default or non-binding as avoidance by default"
      - "claim full capture, final verdict, diagnosis, prescription, PMS-Core correction, or application authority"

  qc_ext_reduced_signatures_policy:
    status: "overlay_shorthand_only"
    applies_to: "EDEN overlay readability and QC compression only"
    does_not_modify_pms: true
    does_not_replace_full_operator_trace: true
    does_not_license_application: true
    reduced_signatures:
      adult_reciprocity_RS:
        shorthand: "truthful coordination of real Ω with R following effect, Σ/Ψ open, Χ/reversibility maintained, and D protected"
        status_in_this_case: "not_established_due_to_absent_concrete_scene"
        dependency_note: "Shorthand does not replace PMS formulas for R, Σ, Ψ, Χ, or D."
      reciprocity_loss_RS:
        shorthand: "real Ω falsely coordinated through displaced R, weakened/blocked/simulated/avoided/externalized Σ/Ψ, and eroded shared correctability"
        status_in_this_case: "not_established"
        dependency_note: "Requires scene-bound support; cannot be inferred from trust rupture vocabulary."
      minimal_recovery_signature_RS:
        shorthand: "Ω named; R reattached to real effect; Λ made speakable; Χ restored; Σ reopened; Ψ self-bound; D protected"
        status_in_this_case: "viability_threshold_only"
        dependency_note: "This is not a sequence, duty, intervention protocol, repair guarantee, or PMS-derived axis."

  axiom_validity_gate:
    status: "partial_for_description_only_suspended_for_application"
    gate_type: "PMS_application_plus_EDEN_application_requirements"
    applies_to: "EDEN_overlay_application_in_AXIOM"
    canonical_pms_entry_condition:
      distance_Chi:
        id: "Χ"
        status: "maintained"
        case_application: >-
          The overlay suspends verdict, keeps the Core pass unchanged, and does
          not infer betrayal, repair success, false coordination,
          responsibility, or Reciprocity Loss from the conceptual domain alone.
      reversibility:
        id: "reversibility"
        status: "maintained"
        case_application: >-
          All EDEN results remain revisable, indeterminate, or not established
          until a concrete scene, role map, evidence sequence, and counter-scene
          are supplied.
      dignity_in_practice_D:
        id: "D"
        status: "maintained"
        case_application: >-
          No shaming, humiliation, person-ranking, sex-ranking, diagnosis, or
          dignity hierarchy is introduced; repair refusal, doubt, absence, and
          non-fit remain non-diagnostic and non-verdictive.
    eden_application_requirements:
      scene_packet:
        status: "absent_as_concrete_scene"
        note: "The Core case is explicitly a conceptual domain projection and not a concrete praxis scene."
      counter_scene_exposure:
        status: "present_as_method_requirement_only"
        note: "Counter-scenes are named below, but no evidence is available to choose among them."
      contextual_responsibility:
        status: "absent"
        note: "No actor, role-position, real structuring effect, legibility, capacity, alternatives, Θ sequence, or Ω cost/exposure distribution is concretely supplied."
      evidentiary_answerability:
        status: "partial"
        note: "Falsifier and evidence requirements are specified, but not fulfilled by the conceptual Core case."
      affected_role_contestation:
        status: "not_applicable"
        note: "No affected concrete role-position is present in the supplied Core case; any future application must preserve contestation standing."
      independent_application_authority:
        status: "not_authorized"
        note: "EDEN-MAP supplies no authority to confront, bind, intervene, punish, prescribe, or enforce."

  case_meta:
    id: "repair_relationships__eden_overlay"
    title: "Repair Relationships"
    subtitle: "EDEN overlay over completed PMS-Core trust-repair projection"
    status: "final_overlay_with_limits"
    model: "PMS-EDEN"
    model_schema_version: "PMS-EDEN_2.0"
    base_schema: "PMS_1.3"
    file_name: "repair_relationships__pms_eden_overlay.yaml"
    authorship:
      originator: "T. Zöller"
      formalization_assistant: "ChatGPT"
    purpose: "Append an EDEN add-on layer to the completed PMS-Core Repair Relationships case without regenerating or correcting the Core pass."
    base_core_case_ref: "completed PMS-Core case YAML: Repair Relationships"
    addon: "EDEN"
    output_role: "append_or_integrate_EDEN_overlay_layer_only"
    case_type: "conceptual_domain_projection_overlay"
    axiom_overlay_focus: "adult_reciprocity_boundary_and_EDEN_MAP_applicability_threshold"
    primary_focus:
      construct: "Adult Reciprocity / Reciprocity Loss boundary for trust-repair phenomena"
      yaml_home: "PMS-EDEN.yaml.core_thesis + boundary_and_application_architecture.eden_map"
      construct_status: "eden_normative_benchmark_and_application_protocol"
      secondary_constructs:
        - "false_coordinated_real_asymmetry"
        - "minimal_recovery_signature"
        - "description_to_action_firewall"
      not_a_case_of:
        - "concrete_EDEN_scene"
        - "PFO_finding"
        - "AEP_finding"
        - "Reciprocity_Loss_finding"
        - "repair_protocol"
        - "PMS_Core_revision"

  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_sex_ranking: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_legal_forensic_clinical_policy_or_HR_conclusion: true
    no_action_authorization: true
    no_application_authority_from_description: true
    no_humiliation_or_public_exposure_as_method: true
    description_to_action_firewall: "active"
    validity_gate_reference: "axiom_validity_gate"
    required_method_conditions:
      canonical_pms_entry_condition:
        - "Χ"
        - "reversibility"
        - "Dignity_in_Practice_D"
      eden_application_requirements:
        - "scene_packet"
        - "counter_scene_exposure"
        - "contextual_responsibility"
        - "evidentiary_answerability"
        - "affected_role_contestation"
        - "independent_application_authority"
    core_rule: >-
      Map EDEN applicability thresholds over the completed Core projection; do
      not diagnose persons, prescribe action, rank sexes, authorize intervention,
      or revise PMS-Core.
    invalid_if_any:
      - "EDEN overlay rewrites, corrects, or replaces the completed PMS-Core pass."
      - "EDEN constructs are treated as PMS operators, PMS dependencies, or PMS derived axes."
      - "Reduced signatures are used as replacement formulas rather than overlay shorthand."
      - "A concrete EDEN finding is asserted without a bounded scene packet, real Ω mapping, and counter-scene exposure."
      - "Description is converted into obligation, confrontation, intervention, punishment, exposure, or enforcement."
    prohibited_shortcuts:
      - "EDEN-by-vibe"
      - "PFO-by-vibe"
      - "identity-based_assignment"
      - "sex-truth_inference"
      - "personality_inference"
      - "motive_inference_from_operator_trace"
      - "description_converted_into_obligation"
      - "PMS-Core-correction-by-overlay"

  example_schema_alignment:
    required_fields_from_PMS_EDEN_CASE_2_0:
      case_schema_version: "case_schema_version / mapped to pms_axiom_eden_overlay_case.case_schema_version"
      case_meta: "case_meta"
      guardrails: "case_guardrails"
      vignette: "minimal_vignette"
      scene_packet: "scene_packet"
      pms_operator_trace: "pms_operator_trace"
      eden_map: "eden_map"
      construct_selection: "construct_selection"
      closure: "readable_structural_closure"
    required_eden_map_fields:
      - "scene_packet_summary"
      - "real_omega_mapping"
      - "dominant_false_coordination_frame"
      - "responsibility_and_action_power_distribution"
      - "sigma_psi_status"
      - "cost_distribution"
      - "non_action_and_non_binding"
      - "immunization_overexposure_AEP"
      - "counter_scene_and_falsifier"
      - "description_application_status"
      - "revision_point_or_open_question"
    axiom_adapter_fields:
      - "overlay_relationship_to_core"
      - "core_anchor"
      - "axiom_validity_gate"
      - "axiom_integration"
      - "eden_overlay_quality_control"
    axiom_adapter_note: >-
      EDEN CASE 2.0 provides the internal field structure. AXIOM adds the
      completed-Core anchor, replacement-only add-on role, and final QC that the
      overlay did not become a Core rewrite or standalone application authority.

  example_suite_schema_alignment:
    status: "reference_only_embedded_in_AXIOM_overlay"
    source: "PMS-EDEN_CASE_2.0 reusable case template"
    axiom_case_policy: >-
      AXIOM cases do not generate a standalone PMS-EDEN example-suite artefact
      unless explicitly requested. The EDEN case template is used as the internal
      overlay field structure over a completed PMS-Core case.

  paper_structure_map_alignment:
    status: "reference_only"
    source: "PMS-EDEN.yaml.paper_structure_map"
    case_application: >-
      Materially relevant EDEN regions are the positive baseline of Adult
      Reciprocity, false-coordinated real Ω, responsibility/action-power
      architecture, non-action/non-binding boundaries, Reciprocity Loss as
      correctability erosion, EDEN-MAP, counter-scene/falsifier discipline, and
      the description-to-action firewall. The paper map is not reproduced or
      treated as an additional PMS layer.

  core_anchor:
    completed_core_case_summary:
      use: "anchor_only_not_rewrite"
      core_scene_boundary: "No concrete scene is supplied; the Core case is a conceptual PMS projection of trust-repair relations."
      core_primary_operator_profile: >-
        Δ/∇/□/Λ are active as trust distinctions, reliance or withdrawal
        tensions, frames, and possible meaningful non-events; Ω/Θ/Φ are relevant
        but calibration-dependent; Χ is maintained; Σ and Ψ remain weak or
        analytic-only.
      core_relevant_asymmetries:
        - "possible vulnerability"
        - "possible exposure"
        - "possible obligation"
        - "possible role or institutional position"
      core_relevant_non_events:
        - "possible silence"
        - "possible delay"
        - "possible missing response"
        - "possible failed acknowledgment"
        - "possible withheld repair"
      core_relevant_temporalities:
        - "possible rupture sequence"
        - "delay"
        - "persistence"
        - "repair attempt"
        - "withdrawal"
        - "restoration trajectory"
      core_boundary_notes:
        - "no betrayal finding"
        - "no repair-success finding"
        - "no responsibility assignment"
        - "no legal or diagnostic conclusion"
        - "possible non-capture and rival readings preserved"
    core_to_eden_bridge:
      eden_relevance_trigger: >-
        Trust repair is EDEN-relevant only where a concrete scene shows real Ω,
        cost/exposure distribution, responsibility/action-power distribution,
        and possible false coordination of repair, protection, recognition,
        non-action, or non-binding.
      what_eden_adds_beyond_core_visibility: >-
        EDEN adds a stricter test for whether repair depends on truthful
        coordination of real Ω, whether R follows structuring effect, whether
        Σ/Ψ remain open, whether shared correctability survives, and whether
        description remains firewalled from application.
      what_must_remain_core_only: "The existing PMS operator analysis, dependency logic, derived-axis projection, and final PMS formula remain unchanged."

  minimal_vignette:
    scene: >-
      No concrete EDEN scene is supplied. The bounded material is the completed
      PMS-Core conceptual projection of trust-repair relations, where reliance,
      withdrawal, silence, delay, failed acknowledgment, repair, refusal, and
      renewed confidence are possible trust-field structures rather than
      adjudicated events.
    temporal_boundary: >-
      The reading begins and ends at the conceptual trust-repair domain. No
      concrete beginning, recurrence, rupture sequence, carryover, repair action,
      or closure point is established.
    roles:
      - id: "role_A"
        label: "placeholder for relying, affected, withdrawing, or repair-seeking position"
      - id: "role_B"
        label: "placeholder for trusted, responding, repairing, refusing, or institutionally positioned role"
      - id: "field_or_medium"
        label: "placeholder for relational, epistemic, institutional, contractual, familial, political, or philosophical frame"
    surface_description: >-
      The domain may initially appear as trust rupture or trust repair, but EDEN
      cannot determine false coordination, responsibility distribution, cost
      shifting, Σ/Ψ blockage, or correctability erosion without a concrete scene.
    eden_question: >-
      Would a future concrete trust-repair scene truthfully coordinate real Ω, or
      would it falsely coordinate real Ω through displaced R, shifted costs,
      blocked/externalized Σ/Ψ, and weakened shared correctability?

  scene_packet:
    specified_scene: "absent_as_concrete_scene; conceptual trust-repair domain only"
    role_positions:
      role_A:
        scene_position: "placeholder for relying, affected, withdrawing, or repair-seeking position"
        not_identity: true
      role_B:
        scene_position: "placeholder for trusted, responding, repairing, refusing, or institutionally positioned role"
        not_identity: true
      field_or_medium:
        scene_position: "placeholder for relational, epistemic, institutional, contractual, familial, political, or philosophical frame"
        not_identity: true
        optional: true
    dominant_frame:
      candidate_frame: "mixed"
      frame_description: "Core supplies possible trust, repair, recognition, refusal, reliance, and institutional frames but does not select a concrete dominant frame."
      frame_status: "not_established"
      false_coordination_boundary: "No frame family is categorically false; false coordination requires real Ω, displaced R, and blocked/weakened/simulated/avoided/externalized Σ/Ψ."
    real_Ω:
      present: "indeterminate"
      summary: "Possible vulnerability, exposure, obligation, role authority, credibility, dependency, or institutional position is conceptually relevant, but no real Ω direction or cost distribution is established."
      dimensions:
        capacity: "indeterminate"
        exposure: "indeterminate"
        dependency: "indeterminate"
        protection: "indeterminate"
        obligation: "indeterminate"
        access: "indeterminate"
        timing_control: "indeterminate"
        frame_control: "indeterminate"
        recognition_control: "indeterminate"
        binding_control: "indeterminate"
        language_access: "indeterminate"
        explanation_burden: "indeterminate"
        vulnerability: "indeterminate"
        action_power: "indeterminate"
        risk: "indeterminate"
        cost: "indeterminate"
        exit_and_waiting_capacity: "indeterminate"
      mapping_question: "A future scene must show what each asymmetry changes in options, cost, exposure, responsibility, correction access, and repair possibility."
      asymmetry_not_failure_rule: "Asymmetry is not the failure; false coordination of asymmetry is the failure."
      multidimensional_guardrail: "Keep crossed asymmetries visible; authority, exit power, embodiment, language, timing, protection, and explanation burden may diverge and cannot become one rank."
    relevant_Λ:
      present: "indeterminate"
      non_event_or_absence: "possible silence, delay, non-response, missing acknowledgment, withheld repair, justified refusal, boundary, incapacity, or non-capture"
      scene_structuring_effect: "Conceptually relevant but not concretely established; no absence is yet traceable as structuring praxis."
      no_passive_praxis_check: "Non-action becomes praxis only when it structures a scene under □/Λ/Ω/Θ."
    non_action_relevance:
      status: "indeterminate"
      note: "The Core case treats absence as possible meaningful non-event, but no specific silence, delay, refusal, or non-response is supplied."
      boundary: "Silence, delay, refusal, non-response, or absence is not praxis by default and never proves motive, manipulation, drift, or responsibility."
    non_binding_relevance:
      status: "indeterminate"
      note: "Repair may require self-binding, but no actor, role, institution, promise, apology, policy, or future commitment is concretely supplied."
      boundary: "Non-binding may be legitimate where uncertainty, costs, alternatives, and exit/waiting conditions remain legible."
    Θ_trajectory:
      sequence:
        - step: 1
          description: "conceptual possibility of reliance or trust expectation"
        - step: 2
          description: "conceptual possibility of rupture, non-event, doubt, refusal, or failed acknowledgment"
        - step: 3
          description: "conceptual possibility of repair, withdrawal, recontextualization, integration, or non-capture"
      trajectory_status: "indeterminate"
      trajectory_origin_note: "No concrete chronology or origin of rupture is established."

    structuring_effects:
