      protection_frame: "indeterminate"
      D_status: "preserved_as_application_constraint"
      recognition_structure:
        role_A: "not established; no role-specific recognition, misrecognition, or criticizability pattern is supplied"
        role_B: "not established; no role-specific recognition, misrecognition, or criticizability pattern is supplied"
        scene_effect: "recognition remains a future calibration field, not a present EDEN finding"
      protection_structure:
