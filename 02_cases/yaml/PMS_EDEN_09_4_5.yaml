          AE4 remains plausible where institutions are involved. Trust damage
          may arise from external role architecture, scarcity, procedure, or
          compliance limits rather than local comparison drift. The supplied
          material merely mentions institutions, so AE4 stays weak.
      AE5_switch_drift_without_full_PFO:
        applicability: "weak"
        label: "Switch drift without full PFO"
        sufficient_configuration:
          - "Ω real and action-relevant in consequences"
          - "parity language remains locally available"
          - "asymmetry activation appears intermittently but is not regime-stabilized"
          - "Σ/Ψ re-binding is partial, weak, or delayed"
          - "parity-to-exit or responsibility-to-authority appears locally"
        exclusion_note: "Switch drift can appear locally without full PFO."
        case_application: >
          AE5 is the most useful EDEN alternative if a later concrete scene
          shows local asymmetry-switch risk but not full PFO. For the current
          case it remains weak because no local switch activation is evidenced.
    methodological_guard:
      rules:
        - "No refutation or ranking among alternative explanations."
        - "No conversion of alternatives into diagnostic claims."
        - "Use role/gradient language, not group labels."
        - "Treat alternatives as generators of similar observables."
        - "Keep all alternative-explanation use scene-bound and structurally revisable."
        - "Treat switch-drift handles as scene-organization profiles, not traits, motives, or person defects."

  boundary_conditions:
    note: "Conditions under which the EDEN drift pipeline is reduced, altered, or applies only partially."
    BC1_Omega_minimal_or_absent:
      status: "not_applicable"
      description: "Ω minimal, absent, or not action-relevant in consequences."
      effect_on_drift: "Asymmetry-driven mechanisms weaken."
      case_application: >
        Ω is not minimal by topic because reliance and vulnerability make
        asymmetry relevant, but it is not concretely mapped. Therefore this
        boundary is not applicable as a finding, while Ω remains
        under-specified.
    BC2_Frame_not_comparison_based:
      status: "active"
      description: "Dominant □ remains praxis-coordination rather than comparison/tribunal."
      effect_on_drift: "False equivalence, PS, switch availability, and devaluation are less likely to stabilize."
      case_application: >
        This boundary is active. The supplied case is framed as trust repair,
        not as comparison, tribunal, or value-ranking. This reduces the strength
        of PS, PFO, devaluation, humiliation, and false comparison readings.
    BC3_Sigma_Psi_established_early:
      status: "absent"
      description: "Σ and Ψ established early and robustly before chronic Λ accumulates across Θ."
      effect_on_drift: "Drift sequence can be interrupted upstream."
      case_application: >
        Early Σ/Ψ cannot be claimed. The Core case marks Σ and Ψ as weak or
        conditional, so this protective boundary is absent as evidence, though
        not contradicted by the conceptual material.
    BC4_External_institutions_stabilize_roles:
      status: "not_applicable"
      description: "External institutions stabilize roles, interfaces, and obligations."
      effect_on_drift: "External scaffolding may constrain □, support Ψ, and enable Σ."
      case_application: >
        Institutions are mentioned as possible trust sites, but no external
        scaffolding is described. This boundary is not applicable unless a later
        institutional scene supplies procedural roles and obligations.
    BC5_Rival_frameworks_retain_explanatory_force:
      status: "active"
      description: "Rival frameworks may retain stronger explanatory force."
      cases_where_rival_frameworks_may_be_stronger:
        - "trauma or attachment structures"
        - "symbolic recognition conflict"
        - "institutional asymmetry with weak dyadic coding"
        - "historical or theological anthropology"
        - "phenomenological alienation without comparison-dominant drift"
        - "local switch drift where PFO is not the best regime-level description"
      case_application: >
        Rival frameworks remain active and open: epistemic trust, relational
        ethics, institutional legitimacy, legal reliance, phenomenological
        vulnerability, affective repair, strategic cooperation, and justified
        refusal may all explain parts of the field better than EDEN.
    BC6_Genuine_non_capture_cases:
      status: "active"
      description: "Cases where PMS-EDEN applies weakly or risks overreach."
      applies_weakly_or_risks_overreach_when:
        - "genuine mutuality without stable Ω salience"
        - "non-sexed reciprocity collapse"
        - "coordination failure without comparison as dominant mediator"
        - "devaluation absent but coordination still fails"
        - "asymmetry activation clearly marked, bounded, and re-bound into Σ/Ψ"
        - "PMS translation smooths over distinctions preserved by rival framing"
      case_application: >
        Genuine non-capture is active. Repair may fail without comparison,
        devaluation, humiliation, PFO, or switch drift; refusal may be justified;
        trust may be irreparable; and rival frames may preserve distinctions
        that EDEN compresses.
    BC7_Summary_condition_operator_readable:
      status: "partial"
      strongest_applicability_when:
        - "Ω action-relevant and legible in consequences"
        - "□ becomes comparison-dominant and constrains Ω speakability"
        - "asymmetry-switch availability, parity-to-exit, or responsibility-to-authority is present or plausible"
        - "Σ remains low, blocked, or suppressed"
        - "Ψ is absent, misbound, or externalized"
        - "Λ becomes chronic across Θ"
        - "Α stabilizes repeatable scripts"
      reduced_applicability_when: "Where these constraints do not hold, PMS-EDEN applies weakly, partially, or by analogy."
      case_application: >
        The strongest-applicability condition is not met. Only some ingredients
        are conceptually relevant: Ω, Θ, Λ, weak Σ, and weak Ψ. The case does
        not establish comparison-dominant □, chronic Λ, stabilized Α, switch
        drift, or PFO.
    non_normalization_clause:
      statement: "Reduced applicability does not imply acceptability."
      note: >
        Persistent cost externalization remains structurally non-viable under
        PMS criteria as used in this paper regardless of boundary conditions.

  appendices_alignment:
    appendix_A_positioning:
      status: "reference_only"
      ref: "PMS-EDEN Appendix A"
      note: >
        Appendix A provides positioning, professionalization, adjacent-framework
        comparison, label-risk handling, related-work spine, and final guard.
        It adds no new PMS operators, no new EDEN claims, and no new
        application authority.
      purpose:
        non_argumentative: true
        functions:
          - "situate PMS-EDEN relative to adjacent theoretical frameworks"
          - "make scope boundaries and non-goals explicit"
          - "reduce misclassification as psychological, theological, ideological, or normative"
          - "provide review-stability and auditability"
        adds_no_new_claims: true
      professionalization_definition:
        meaning: >
          Professionalization means making the paper’s structural claims easier
          to classify, audit, compare, and delimit. It does not mean converting
          the overlay into a policy, therapy, moral doctrine, diagnosis, or
          enforcement tool.
        criteria:
          - "clear model status"
          - "clear relation to PMS Base"
          - "explicit non-goals"
          - "adjacent-framework comparison"
          - "label and classification risk handling"
          - "non-capture preserved"
        explicitly_not_claimed:
          - "clinical validity"
          - "legal validity"
          - "moral authority"
          - "empirical completeness"
          - "theological proof"
          - "ideological diagnosis"
          - "PMS Base validation"
      core_identity_summary:
        description: >
          PMS-EDEN is a praxeological operator grammar for describing drift:
          Eden → threshold → NRK → consequence legibility → frame drift →
          pseudo-symmetry → asymmetry-switch availability → PFO/permanentized
          exception → parity-to-exit / responsibility-to-authority →
          reciprocity erosion.
        exclusions:
          - "psychological interiority explanations"
          - "moral verdict logic"
          - "automatic prescriptive authority"
          - "person-level interpretation of switch-drift handles"
      adjacent_frameworks:
        practice_theory:
          relation: "overlap in praxis and situated action; PMS-EDEN adds operator-chain drift mapping."
        structuration:
          relation: "overlap in structure/action recursion; PMS-EDEN foregrounds Ω/Θ/Λ/Σ/Ψ cost geometry."
        ethnomethodology:
          relation: "overlap in scene practices and accountability; PMS-EDEN formalizes non-event and drift traces."
        systems_theory:
          relation: "overlap in stabilization and self-reference; PMS-EDEN remains praxeological and operator-bound."
        pragmatic_sociology:
          relation: "overlap in justification and regimes; PMS-EDEN reconstructs comparison drift and reciprocity loss."
        theological_contrast:
          relation: "Eden is not treated as doctrine or metaphysical origin, but as reconstructed praxis scene."
      comparative_grid:
        focus:
          - "praxis structure"
          - "operator drift"
          - "comparison-dominant framing"
          - "cost externalization"
          - "reciprocity erosion"
        key_axes:
          - "Ω legibility"
          - "Θ cost accumulation"
          - "Λ residue"
          - "Σ/Ψ coordination"
          - "Χ + reversibility + D application gate"
      label_and_classification_risk:
        risk: "External politicization or person-level use of paper-internal labels."
        handling:
          - "labels are operator-defined handles, not group or ideology claims"
          - "switch-drift labels are scene-bound structural profiles"
          - "PFO is not a group label and not an ideology claim"
          - "renaming is permitted to reduce classification entropy while preserving operator definitions"
      related_work_spine:
        purpose: >
          The related-work spine supports classification and comparison only; it
          does not subordinate PMS-EDEN to an external framework or claim
          superiority over it.
        anchors:
          - "practice theory"
          - "structuration"
          - "ethnomethodology"
          - "systems theory"
          - "pragmatic sociology"
          - "theological contrast"
        added_by_pms_eden:
          - "operator-constrained drift trace"
          - "NRK / not-E distinction"
          - "comparison-dominant □ to PS/PFO pipeline"
          - "switch-drift handles"
          - "reciprocity as coordinated asymmetry"
          - "EDEN-MAP audit scaffold"
      final_guard:
        claim: >
          Appendix positioning does not expand PMS-EDEN’s claim scope. It
          strengthens classification, boundary clarity, and review stability.
        viability_note: >
          PMS-EDEN remains strongest where its own limits, rival framings, and
          possible non-capture cases are kept explicit.
      case_application: >
        Appendix-A positioning is relevant as a classification guard. Because
        "Repair Relationships" is broad and conceptually attractive to EDEN,
        label-risk handling is especially important: PFO remains not applicable,
        switch labels remain non-personal, theological readings are not claimed,
        and adjacent frameworks remain available.

