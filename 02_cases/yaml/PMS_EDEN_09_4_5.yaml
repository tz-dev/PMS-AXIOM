        - "indeterminate; no concrete act, omission, frame-control, timing-control, or repair effect is supplied"
      role_B_effects:
        - "indeterminate; no concrete act, omission, frame-control, timing-control, or repair effect is supplied"
      shared_or_field_effects:
        - "the conceptual trust-repair field makes reliance, absence, repair, refusal, and renewed confidence structurally discussable"
      unsupported_effects:
