pms_conflict_overlay_application:
  schema_version: PMS-CONFLICT_1.1
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-CONFLICT.yaml
  paper_source_file: PMS-CONFLICT.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: PMS–CONFLICT Application Profile
    model_short: PMS-CONFLICT
    status: production_overlay
    repository_role: paper_specific_application_overlay
    epistemic_status: 'This specification records the current paper-specific application overlay for PMS-CONFLICT. It is intended
      to be formally disciplined, portable, and fully subordinate to PMS_1.3, but not final, complete, uniquely ordered, or
      immune to revision.

      '
    last_updated: '2026-04-11'
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.4 Thinking)
      role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      repository_role: current_base_schema
    paper_source:
      title: PMS–CONFLICT
      subtitle: Conflict as Stabilized Incompatibility Under Binding, Time, Cost, and Exposure
      source_file: PMS-CONFLICT.md
    description: 'PMS-CONFLICT is an application profile for PMS that formalizes the conflict lens: how incompatibility stabilizes
      once binding persists, trajectories accumulate, distance/exit becomes priced or asymmetric, and exposure converts description
      into pressure. The profile expresses the paper strictly in the canonical PMS operator grammar Δ–Ψ, without redefining
      operators or altering dependencies. It provides reduced signatures, core drift classes, scale/cost overlays, non-operator
      constructs, and reusable safety interfaces for application-bound contexts.

      '
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: 'completed PMS Core case YAML: Conflict as structural incompatibility'
    rule: 'This CONFLICT block is appended to or integrated with an already completed PMS Core v1.3 case artefact. It does
      not rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat CONFLICT
      constructs as PMS Base.

      '
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: 'The CONFLICT overlay may add visibility for stabilized incompatibility, binding collision, asymmetry
      lock-in, exposure capture, dignity collapse, priced or asymmetric distance, terminal regime positioning, publicness,
      misuse gradients, and downstream docking. It must not modify the completed PMS Core case except where a direct PMS.yaml
      inconsistency has been separately identified.

      '
  overlays:
    P:
      name: Publicness Overlay
      is_operator: false
      amplifies:
      - Ω
      - Θ
      - Α
      - Φ
      note: 'Amplification only. Higher publicness increases exposure coupling and raises the cost of revision. It introduces
        no new operators.

        '
      case_application: Publicness does not amplify the case as case content because the material is an abstract philosophical
        projection with no public scene, audience coupling, durable record, or enforcement channel. P remains relevant only
        as a boundary warning if the overlay is excerpted or transferred into public or institutional circulation.
    MG:
      name: Misuse Gradient / Transmission Risk
      is_operator: false
      amplifies:
      - Ω
      - Θ
      note: 'Classification of predictable misuse risk when operator language travels through excerpt dynamics, audience coupling,
        or enforcement affordances. Not an operator.

        '
      case_application: 'The misuse gradient is low inside the descriptive case application, but not zero under reuse: CONFLICT
        language could be misused if reduced signatures are detached from non-diagnostic, non-tribunal, non-person-ranking,
        non-solution, and non-validation guardrails.'
  nested_overlay_policy:
    no_base_extension: true
    rule: 'PMS-CONFLICT introduces overlay-level constructs only: reduced signatures, drift classes, scale matrices, publicness/misuse
      overlays, and non-operator conflict constructs. These organize existing PMS operators. They never replace PMS generativity
      with explanation, never bypass Ω, Θ, or Χ, and never become PMS operators or dependencies.

      '
  validity_gate:
    status: passed
    gate_type: PMS_application_only
    note: 'This gate constrains PMS application only, not critique, refusal, rejection, or revision proposals.

      '
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: 'Reflective distance is maintained. The CONFLICT overlay does not fuse the case into verdict, urgency, enforcement,
          or person-level attribution.

          '
      reversibility:
        id: reversibility
        status: maintained
        meaning: 'Readings remain scene-bound, revisable, and non-final. The overlay does not produce global person labels,
          irreversible labels, or final judgments.

          '
      Dignity_in_Practice_D:
        id: D
        name: Dignity-in-Practice
        status: maintained
        meaning: 'Enacted restraint under asymmetry is preserved. The overlay does not shame, rank, humiliate, or ontologically
          evaluate persons or groups.

          '
    pms_entry_condition_ref: PMS.yaml#/pms_entry_condition
    gate_result: valid_as_conflict_overlay_application
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependency_hygiene_note: 'Any use of Χ in reduced signatures is shorthand only. In PMS, Χ depends on Φ, Θ, and □. Reduced
      signatures do not negate prerequisites or alter the default dependency path recorded in PMS_1.3.

      '
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  conflict_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic.
    - No person-level judgment, no ranking, no sanction logic.
    - Describes structural regimes and operator drift under load.
    - 'No procedure manual: no intervention scripts, no solutions section.'
    - Bounded to this grammar; no monopoly claim over conflict intelligibility as such.
    may_add_visibility_to:
    - stabilized incompatibility
    - binding collisions under Ψ
    - Σ-failure or Σ-incompatibility under load
    - asymmetry gradients under Ω
    - temporal hardening under Θ
    - priced or asymmetric distance under Χ
    - conflict attractor stabilization under Α
    - exposure capture under Ω/Θ/Φ with publicness amplification
    - dignity collapse under Ω/Θ/Χ/Ψ pressure
    - young Α-field dynamics
    - institutionalized distance regimes
    - application-boundary and misuse-gradient red zones
    - terminal regime positioning
    - downstream docking into governance or evaluation layers
    must_not_do:
    - treat conflict as personal essence
    - treat incompatibility as diagnosis
    - translate conflict legibility into verdict
    - produce intervention scripts or solution procedures
    - convert Σ-failure into moral failure
    - convert Ω-gradient into authority claim
    - convert publicness into enforcement warrant
    - convert terminality into finality
    - treat downstream governance as continuation of PMS-CONFLICT
    - claim PMS Base validation
  paper_lens:
    methodological_boundedness:
      status: active
      note: 'PMS-CONFLICT develops a structural grammar of stabilized incompatibility under binding, asymmetry, and temporality.
        It does not claim to exhaust everything conflict is or could become under other analytical grammars.

        '
      constraints:
      - Conflict legibility here is internal to the PMS grammar.
      - Terminality here names the end of reintegration resources within this grammar.
      - Where classification and attractor logic preserve coherence, non-capture remains open.
      case_application: The overlay remains bounded to PMS-CONFLICT grammar by treating stabilized incompatibility, binding
        collision, asymmetry lock-in, exposure capture, dignity collapse, scale/cost regimes, and terminality as overlay-level
        visibility aids only. Rival conflict grammars remain open, including logical contradiction, semantic incommensurability,
        institutional rule collision, systems differentiation, material scarcity, game-theoretic conflict, political antagonism,
        and tragic pluralism.
    scope_limit_of_tragic_legibility:
      status: weak
      note: 'The tragedy clause should not be read as an inflationary claim that mature conflict is always or finally tragic.
        Its narrower claim is that tragedy remains structurally possible even under maintained distance, reflexivity, and
        responsibility constraints, and that some conflicts become more legible without becoming more integrable.

        '
      openings:
      - Not every hard conflict is tragic in the strong sense developed here.
      - Tragic legibility does not eliminate rival conflict grammars.
      case_application: The case is conflict-legible in the weak PMS-CONFLICT sense because it concerns locally coherent trajectories
        becoming structurally incompatible. It is not tragically legible in the strong CONFLICT sense, because binding Ψ,
        asymmetry Ω, priced or asymmetric distance Χ, exposure pressure, and terminal Σ exhaustion are not established by
        the abstract material.
    core_definition:
      conflict_domain_layer:
        is_operator: false
        applicability: weak
        definition: 'Within this descriptive architecture, CONFLICT names a terminal descriptive regime in which incompatibility
          is stabilized under binding, temporality, asymmetry, and costly or asymmetric distance. The model increases legibility
          of this regime but does not generate an additional internal operator that restores integrability once Σ no longer
          carries under Θ/Ω with priced or asymmetric Χ.

          '
        minimal_operator_touchpoints:
        - Σ
        - Ψ
        - Ω
        - Θ
        - Χ
        case_application: The case approaches the conflict-domain layer only as a conceptual projection. It is conflict-legible
          because it explicitly concerns locally coherent trajectories that may become structurally incompatible across frames.
          However, CONFLICT in the strong overlay sense requires more than cross-frame non-fit: it requires stabilized
          incompatibility under binding Ψ, temporality Θ, asymmetry Ω, and costly or asymmetric distance Χ, with Σ no longer
          carrying as shared integration. In the present case, Σ is at issue because local coherence may fail to become shared
          integration; Θ is active because trajectories are central; Χ is maintained as analytic distance. Ψ and Ω are
          under-specified, and Χ is not shown to be priced or asymmetric. The full CONFLICT terminal layer is therefore not
          reached. The correct result is weak CONFLICT projection, not terminal CONFLICT classification.
    terminal_positioning:
      applicability: not_applicable
      terminal_stack_claim: 'Within the PMS-domain stack developed here, CONFLICT functions as the terminal domain layer:
        beyond maximal Δ–Ψ load under Θ/Ω/Χ, the model yields no further internal reintegration grammar — only downstream
        governance, institutionalization, decision, or evaluation.

        '
      structural_full_stop_sentence: 'This paper does not continue into solutions. It ends where praxis becomes tragically
        legible but no longer integrable within this descriptive pathway.

        '
      terminality_without_finality: 'Terminality here is stack-internal and grammar-internal. It does not claim that conflict
        as such admits no further analysis, only that this operator grammar does not generate an additional internal reintegration
        layer once Σ has failed under sustained Θ/Ω/Ψ with costly or asymmetric Χ.

        '
      case_application: Terminal positioning is not applicable as a case result. The abstract case names possible structural
        incompatibility but does not show maximal Δ–Ψ load, failed Σ under sustained Θ/Ω/Ψ, or costly/asymmetric Χ. The analysis
        therefore remains descriptive and below the terminal-regime threshold.
    downstream_docking:
      status: not_triggered
      note: 'Within this stack architecture, CONFLICT terminates the PMS domain grammar. Any continuation constitutes a mode
        shift into downstream governance, institutionalization, decision, or evaluation layers, not a further descriptive
        extension of PMS-CONFLICT itself.

        '
      allowed_continuations:
      - governance frameworks
      - institutional rule-setting
      - decision procedures
      - evaluation overlays
      disallowed_continuations:
      - implicit solution derivation
      - hidden intervention logic
      - operator extension beyond Δ–Ψ
      case_application: The case remains descriptive. Governance, institutionalization, decision, evaluation, intervention,
        or resolution would require a mode shift and external criteria; no downstream docking is triggered by the supplied
        material.
  non_operator_constructs:
    conflict_attractor_A_conflict:
      is_operator: false
      applicability: weak
      definition: 'Stabilized conflict pattern Α_conflict in which incompatibility itself becomes a repeatable orientation
        field under asymmetric cost and temporal pressure; distance or exit remains formally available but priced or asymmetric.

        '
      operator_touchpoints:
      - Α
      - Ω
      - Θ
      - Ψ
      - Χ
      case_application: Conflict itself is not shown to stabilize as an attractor. The abstract term trajectories suggests
        possible Α formation, but no recurrence, temporal hardening, asymmetric cost, binding persistence, or priced Χ is
        evidenced. Α_conflict remains a weak candidate only.
    binding_collision:
      is_operator: false
      applicability: weak
      definition: 'Two or more bindings Ψ collide and remain jointly non-viable under the same frame and time trajectory;
        integration Σ cannot produce a shared spine at acceptable cost.

        '
      operator_touchpoints:
      - Ψ
      - Ω
      - Θ
      - Σ
      case_application: Binding collision is not established. Practical, conceptual, or institutional trajectories may imply
        commitments, but the case does not identify two or more explicit Ψ-bindings that collide under a shared frame and
        time trajectory. Σ may remain local, but shared-spine failure across bindings is only a possible reading.
    asymmetry_lock_in:
      is_operator: false
      applicability: not_applicable
      definition: 'Exit or reflection costs Χ become structurally asymmetric under Ω and Θ: one role position can withdraw,
        delay, or reframe at lower price, turning Χ-availability into a power gradient rather than a shared stabilizing resource.

        '
      operator_touchpoints:
      - Ω
      - Θ
      - Χ
      case_application: Asymmetry lock-in is not applicable as a finding. The material does not specify uneven exit, reflection,
        delay, liability, exposure, or withdrawal costs; Ω and priced/asymmetric Χ remain unestablished.
    exposure_capture:
      is_operator: false
      applicability: not_applicable
      definition: 'Recontextualization Φ under scaled exposure converts interpretation into enforcement affordances: statements
        harden into irreversible pressure rather than remaining revisable, scene-bound readings.

        '
      operator_touchpoints:
      - Ω
      - Θ
      - Φ
      overlays:
      - P
      - MG
      case_application: Exposure capture is not applicable as case content. There is no publicness scale, audience coupling,
        durable record, enforcement affordance, or irreversible pressure channel. It remains only a misuse-boundary risk under
        excerpting or institutional transfer.
    dignity_collapse:
      is_operator: false
      applicability: not_applicable
      definition: 'Dignity-in-practice constraints fail under load: Χ is delegitimized or priced, Ψ no longer binds restraint,
        and language drifts toward shaming, ranking, and coercive transfer under Ω/Θ pressure.

        '
      operator_touchpoints:
      - Ω
      - Θ
      - Χ
      - Ψ
      overlays:
      - MG
      case_application: Dignity-in-Practice is preserved rather than collapsed. The overlay does not shame, rank, diagnose,
        tribunalize, person-label, or convert conflict legibility into coercive transfer. Collapse would require compromised
        Χ or Ψ under Ω/Θ pressure, which is not present.
  reduced_signatures:
    note: 'Reduced signatures are shorthand lenses and threshold markers, not proof chains. They compress dominant operator
      involvement for scene-bound readings and do not replace PMS dependencies.

      '
    CONFLICT_terminal_core:
      label: CONFLICT terminal core
      applicability: not_applicable
      operators:
      - Σ
      - Ψ
      - Ω
      - Θ
      - Χ
      reduced: true
      note: 'Marks the terminal descriptive regime within PMS-CONFLICT: Σ under load with binding Ψ and priced or asymmetric
        distance Χ under Ω/Θ.

        '
      case_application: Reject as active signature. The case does not establish binding Ψ, asymmetry Ω, priced or asymmetric
        Χ, or terminal Σ failure under Θ. The signature may remain a future comparison threshold, but it is not fulfilled
        here.
    CONFLICT_stabilized_pattern:
      label: Stabilized conflict attractor
      applicability: weak
      operators:
      - Α
      - Ω
      - Θ
      - Ψ
      - Χ
      reduced: true
      note: 'Conflict regime stabilized as an attractor; distance remains present but priced or asymmetric, preventing Σ from
        carrying as reintegration.

        '
      case_application: Apply only weakly as shorthand for the possibility that incompatibility could stabilize across trajectories.
        The supplied case does not show the full stabilized conflict attractor signature Α/Ω/Θ/Ψ/Χ; it supports only conceptual
        visibility for potential stabilization.
    DRIFT_binding_collision:
      label: Binding collision
      applicability: risk
      operators:
      - Ψ
      - Ω
      - Θ
      - Σ
      reduced: true
      note: 'Colliding bindings with non-viable joint integration; Σ becomes internally incompatible under shared Θ with asymmetric
        cost gradients Ω.

        '
      case_application: Treat as a structural risk rather than an active drift. If the practical, conceptual, or institutional
        trajectories are later shown to carry incompatible Ψ-bindings, shared Σ may become non-viable. The present abstract
        case does not prove this.
    DRIFT_asymmetry_lock_in:
      label: Asymmetry lock-in
      applicability: not_applicable
      operators:
      - Ω
      - Θ
      - Χ
      reduced: true
      note: 'Exit, distance, or reflection becomes asymmetrically priced under Ω/Θ. Χ availability becomes a power gradient
        rather than shared stabilizing resource.

        '
      case_application: Reject as active drift. No Ω/Θ distribution of exit, distance, reflection, delay, exposure, or withdrawal
        cost is supplied.
    DRIFT_exposure_capture:
      label: Exposure capture
      applicability: not_applicable
      operators:
      - Ω
      - Θ
      - Φ
      overlays:
      - P
      - MG
      reduced: true
      note: 'Publicness and transmission risk amplify Ω/Θ while Φ turns interpretation into enforcement affordance or irreversible
        pressure.

        '
      case_application: Reject as active drift. No publicness amplification, audience coupling, durable record, or enforcement
        affordance is present in the case material.
    DRIFT_dignity_collapse:
      label: Dignity collapse
      applicability: not_applicable
      operators:
      - Ω
      - Θ
      - Χ
      - Ψ
      overlays:
      - MG
      reduced: true
      note: 'Dignity-in-Practice constraints fail under Ω/Θ pressure when Χ becomes delegitimized or coercively priced and
        Ψ no longer binds restraint.

        '
      case_application: Reject as active drift. The application preserves Χ, reversibility, and Dignity-in-Practice; there
        is no shaming, ranking, humiliation, person-near verdict, coercive exposure, or diagnostic use.
  drift_catalogue:
    note: 'CONFLICT drift classes describe structural operator distortions. They are not personal traits, diagnoses, moral
      verdicts, or enforcement categories. Their structural signatures distinguish operators that are present, missing, failed,
      priced, under load, or amplified by overlays.

      '
    sigma_incompatibility_clash:
      label: Σ-incompatibility clash
      applicability: risk
      structural_signature:
        present:
        - Σ_local
        missing_or_failed:
        - Σ_shared
        under_load:
        - Ψ
        - Ω
        - Θ
        often_present:
        - Χ_priced_or_asymmetric
      typical_markers:
      - local integrations remain coherent but mutually non-integrable
      - shared continuation cannot be produced without unacceptable cost
      - conflict is misread as misunderstanding or communication failure
      guardrail_reminder: 'Do not treat Σ-failure as moral failure, immaturity, or person defect.

        '
      case_application: This is the strongest CONFLICT-relevant risk. The case explicitly names local coherence with cross-frame
        structural incompatibility, which resembles Σ_local without established Σ_shared. The overlay therefore usefully
        sharpens a distinction already present in the PMS Core pass: local coherence inside a frame is not the same as shared
        integration across frames. Still, this remains a risk classification rather than an active drift finding. The case
        does not establish binding Ψ, asymmetry Ω, priced or asymmetric Χ, unacceptable integration cost, recurrence, or
        terminal exhaustion of Σ. It would be overreach to conclude that integration has failed, that a party is immature,
        that the conflict is merely a misunderstanding, or that the incompatibility must be repaired through a higher PMS
        synthesis. The correct status is: Σ_local/Σ_shared tension is visible; Σ-incompatibility clash remains conditional.
    binding_collision_drift:
      label: Binding collision drift
      applicability: risk
      structural_signature:
        present:
        - Ψ
        failed_or_conflicted:
        - Σ
        under_load:
        - Ω
        - Θ
        often_present:
        - Χ_priced_or_asymmetric
      typical_markers:
      - two or more commitments cannot be jointly carried
      - shared frame cannot integrate incompatible bindings
      - repair attempts increase rather than reduce cost
      guardrail_reminder: 'Do not translate binding collision into guilt, betrayal, or person inadequacy without explicit
        non-PMS grounds.

        '
      case_application: Binding collision drift remains a conditional risk if later specification shows incompatible durable
        commitments or institutional self-bindings. It is not active in the abstract case because explicit Ψ-bindings and
        shared-frame integration failure under load are absent.
    asymmetry_lock_in_drift:
      label: Asymmetry lock-in drift
      applicability: not_applicable
      structural_signature:
        present:
        - Ω
        - Θ
        missing_or_priced:
        - Χ
        often_present:
        - Ψ
      typical_markers:
      - exit or delay is cheap for one position and costly for another
      - reflection or withdrawal becomes a power differential
      - pseudo-symmetry hides unequal exposure or liability
      guardrail_reminder: 'Do not treat formal availability of exit or distance as equal availability under Ω/Θ.

        '
      case_application: Not applicable as a finding. The case lacks concrete Ω/Θ evidence showing asymmetric exit, reflection,
        delay, exposure, or liability costs.
    exposure_capture_drift:
      label: Exposure capture drift
      applicability: not_applicable
      structural_signature:
        present:
        - Ω
        - Θ
        - Φ
        amplified_by_overlays:
        - P
        - MG
        often_present:
        - Α
        - Ψ
        risk_channel:
        - public_record_hardening
        - interpretation_to_enforcement_affordance
        - revision_cost_increase
      typical_markers:
      - scene-bound reading hardens into durable record
      - interpretation becomes enforcement affordance
      - revision becomes publicly or institutionally costly
      guardrail_reminder: 'Public or institutional transfer requires explicit mode, publicness, and misuse-gradient declarations.

        '
      case_application: Not applicable as case content. The overlay remains descriptive and private; no P/MG-amplified recontextualization
        converts interpretation into enforcement pressure.
    dignity_collapse_drift:
      label: Dignity collapse drift
      applicability: not_applicable
      structural_signature:
        present:
        - Ω
        - Θ
        compromised_or_missing:
        - Χ
        - Ψ
        amplified_by_overlays:
        - MG
        risk_channel:
        - shaming
        - ranking
        - humiliation
        - person_near_verdict
      typical_markers:
      - language drifts toward shaming, ranking, or humiliation
      - distance is delegitimized or coercively imposed
      - conflict reading becomes person-near verdict
      guardrail_reminder: 'Dignity collapse invalidates the PMS application as a PMS application, even if terminology remains
        structurally correct.

        '
      case_application: Not applicable as a drift. Dignity-in-Practice is maintained as a praxeological constraint; the analysis
        does not drift toward shaming, ranking, humiliation, or person-near verdict.
  scale_matrices:
    note: 'Paper-derived scale overlays and projections are structural only. They must not become person evaluation, maturity
      scoring, diagnosis, or enforcement logic.

      '
    firewall_matrices:
      second_firewall_what_conflict_is_not:
        status: satisfied
        note: 'CONFLICT must remain a descriptive structural lens. It must not become a solution manual, diagnostic tool,
          moral tribunal, personality model, enforcement script, governance authority, or proof of PMS Base.

          '
        not_conflict:
        - diagnosis
        - personality_typing
        - moral_verdict
        - sanction_logic
        - solution_procedure
        - governance_authority
        - pms_base_validation
        misuse_patterns:
          solution_manual_drift:
            pattern: CONFLICT language is used to imply repair steps or intervention scripts.
            prohibited_use: solution_procedure
            case_relevance: absent
          diagnostic_drift:
            pattern: Conflict structure is converted into a diagnosis, trait, or person-type.
            prohibited_use: diagnosis_or_personality_typing
            case_relevance: absent
          moral_tribunal_drift:
            pattern: Σ-failure, binding collision, or asymmetry is used to assign blame or virtue.
            prohibited_use: moral_verdict
            case_relevance: absent
          sanction_logic_drift:
            pattern: Conflict legibility is treated as a warrant for punishment, exclusion, or enforcement.
            prohibited_use: sanction_logic
            case_relevance: absent
          governance_authority_drift:
            pattern: PMS-CONFLICT is treated as if it can itself authorize institutional decisions.
            prohibited_use: governance_authority
            case_relevance: absent
          pms_base_validation_drift:
            pattern: Successful conflict mapping is treated as validation of PMS Base.
            prohibited_use: pms_base_validation
            case_relevance: risk
          person_near_labeling_drift:
            pattern: Scene-bound conflict descriptors are attached to persons, groups, or identities.
            prohibited_use: irreversible_person_labeling
            case_relevance: risk
        red_zone_prohibited_uses:
        - public or media-amplified person-near conflict labeling
        - use in hiring, sanction, disciplinary, custody, forensic, or coercive decision contexts
        - conversion of conflict signatures into guilt, competence, maturity, dignity, or risk scores
        - use of exposure capture or asymmetry lock-in language to justify enforcement
        - use of terminal-regime language to claim no further analysis, appeal, or repair is possible
        - excerpting without mode, publicness, misuse-gradient, and boundary declarations
        - treating downstream governance as if it were still PMS-CONFLICT analysis
        case_application: The firewall is satisfied. The overlay remains descriptive, non-diagnostic, non-tribunal, non-person-ranking,
          non-prescriptive, and non-validating. The main risks are pms_base_validation_drift, because a smooth CONFLICT mapping
          could be mistaken for proof of PMS Base, and person_near_labeling_drift if abstract conflict descriptors are later
          attached to actors, groups, or institutions. Red-zone uses are explicitly blocked.
    theta_history_scaling:
      label: Θ-history scaling / young Α-field
      applicability: weak
      scope: regime_description_not_actor_attribute
      methodological_boundary: 'Θ-history scaling describes regime production conditions. It does not essentialize persons,
        groups, or roles.

        '
      operators_under_load:
      - Α
      - Θ
      - Ω
      - Φ
      non_operator_constructs_reference:
        young_A_field:
          is_operator: false
          applicability: not_applicable
          definition: 'Young Α-field names a regime in which the enabling conditions for attractor stabilization are recent
            or recently intensified. Patterns appear volatile, rapidly re-labeled, and exposure-sensitive because Θ is compressed
            and Φ is accelerated faster than Σ can consolidate.

            '
          operator_touchpoints:
          - Α
          - Θ
          - Φ
          - Ω
          - Λ
          note: Regime diagnosis only; not a person or group attribute.
