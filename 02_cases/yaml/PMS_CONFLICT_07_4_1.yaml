    correction_required: false
    final_overlay_judgment: The CONFLICT overlay is valid, bounded, non-diagnostic, and correctly subordinated to the completed
      PMS Core case and PMS.yaml.
  conflict_overlay_synthesis:
    primary_conflict_reading: 'PMS-CONFLICT makes visible that the core case most strongly resembles a local/shared Σ tension:
      locally coherent trajectories may fail to consolidate into a shared integration, but the full CONFLICT terminal regime
      is not reached because binding Ψ, asymmetry Ω, priced/asymmetric Χ, exposure capture, and terminal Σ exhaustion are
      not established. The overlay therefore strengthens discrimination rather than classification: it helps prevent the
      core case from being too quickly read either as mere disagreement or as terminal conflict.'
    stabilized_incompatibility_result: Stabilized incompatibility is weak and under-specified. The case is about possible
      structural incompatibility, but recurrence, hardening, attractor stabilization, binding persistence, exposure pressure,
      and asymmetric cost are not supplied. The word incompatibility alone does not establish Α_conflict or a stabilized
      conflict regime.
    sigma_result: Σ remains local only as a conceptual possibility and shared Σ is unresolved. The overlay must not treat
      this as proven Σ-failure, moral failure, maturity failure, communication failure, or terminal non-integrability. The
      most disciplined formulation is that local coherence and shared integration have been separated as analytic problems,
      not that shared integration has been proven impossible.
    binding_result: Ψ-binding is weak and conditional. Binding collision is a structural risk only if the trajectories are
      later shown to carry durable commitments or institutional self-bindings that cannot be jointly integrated. Without such
      commitments, the case remains a conflict-readable structural projection rather than a binding-collision case.
    asymmetry_result: Ω is not established. The case does not specify exposure, capacity, authority, liability, vulnerability,
      obligation, enforcement, or exit-cost gradients. CONFLICT must therefore not convert incompatibility into asymmetry
      lock-in or responsibility attribution.
    temporality_result: Θ is conceptually active because the case speaks of trajectories, but no temporal scaling, compression,
      accumulated cost, path hardening, or lock-in rate is provided. The case supports trajectory language, not Θ-history
      classification.
    distance_exit_result: Χ is maintained as analytic distance in the overlay. The case does not show priced, asymmetric,
      institutionalized, or coercively enforced distance or exit. Χ functions here primarily as a validity condition that
      keeps the overlay reversible, non-tribunal, and non-solution-oriented.
    exposure_publicness_result: Publicness P does not amplify the case content, and MG remains low within the descriptive
      private application. Both become relevant as boundary controls if the overlay is excerpted, publicized, institutionalized,
      attached to actors, or transferred into evaluative settings.
    dignity_result: Dignity-in-Practice is preserved as a stabilizing application constraint. No dignity collapse is present.
      The overlay does not shame, rank, diagnose, expose, tribunalize, or convert structural legibility into person-near verdict.
    terminality_result: The case remains below terminal regime positioning. It is conflict-legible in a weak structural sense
      but not terminally or tragically legible in the strong PMS-CONFLICT sense, because the required configuration of Ψ,
      Ω, Θ, costly/asymmetric Χ, and exhausted Σ is not present.
    downstream_docking_result: Downstream docking is not triggered. Governance, institutionalization, decision, evaluation,
      intervention, repair, or solution design would be a mode shift rather than continuation of PMS-CONFLICT analysis.
    non_capture_result: Open non-capture zones include logical contradiction, semantic incommensurability, institutional rule
      collision, material scarcity, systems differentiation, game-theoretic conflict, political antagonism, and tragic pluralism.
      These must not be automatically redescribed as PMS drift, failed integration, incomplete calibration, exposure capture,
      or terminal incompatibility.
    final_conflict_formula_or_signature: CONFLICT_weak_projection := Σ_local_without_established_Σ_shared + Θ_trajectory +
      Χ_application_guardrail + Φ_cross_frame_test + Ψ?/Ω?/Α?/Λ?; not CONFLICT_terminal_core and not active DRIFT_asymmetry_lock_in,
      DRIFT_exposure_capture, DRIFT_binding_collision, or DRIFT_dignity_collapse.
    final_claim_boundary: This CONFLICT overlay adds visibility for stabilized incompatibility, binding collision, asymmetry
      lock-in, exposure capture, dignity collapse, scale/cost regimes, terminal descriptive positioning, and downstream docking
      boundaries. In this case, however, most of those constructs remain boundary controls or conditional risks rather than
      active findings. The overlay does not revise PMS Base, rewrite the PMS Core pass, diagnose persons, rank persons,
      prescribe intervention, generate solution procedures, validate PMS, or claim final capture of conflict.