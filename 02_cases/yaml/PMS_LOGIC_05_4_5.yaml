pms_logic_overlay_application:
  schema_version: "PMS-LOGIC_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-LOGIC.yaml"
  paper_source_file: "PMS-LOGIC.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–LOGIC Application Profile"
    model_short: "PMS-LOGIC"
    status: "draft"
    last_updated: "2026-04-06"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–LOGIC"
      subtitle: "Pre-Moral Foundations, Logical Limits, and Post-Moral Effects"
      source_file: "PMS-LOGIC.md"
    description: >
      PMS-LOGIC is applied here only as an overlay/application profile for the
      completed PMS Core case "Rule-following paradox." It adds visibility for
      pre-moral structural legibility, logical boundary management, sustainable
      non-closure, and LOGIC-specific drift risks without redefining PMS
      operators, modifying PMS dependencies, rewriting the Core pass, deriving
      an ought, or claiming final philosophical closure.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for the case title: Rule-following paradox"
    rule: >
      This LOGIC block is appended to or integrated into an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      LOGIC constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The LOGIC overlay adds boundary, non-closure, attribution,
      non-innocence, reduced-signature, and failure-mode visibility only where
      warranted by the completed Core pass. It does not modify the already
      completed PMS Core case and does not treat reduced signatures as PMS
      dependency replacements.

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-LOGIC introduces no amplification overlays beyond reduced signatures,
      structural failure modes, and paper-specific non-operator constructs. It
      remains an overlay/application profile only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          A meta-position and stop-capability are maintained. The LOGIC overlay
          does not fuse the case into verdict, authority, enforcement,
          certainty, moral demand, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          The LOGIC reading remains case-type-bound, revisable, and
          configuration-specific. It does not generate global person labels or
          irreversible interpretive claims.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The LOGIC overlay does not shame, rank, humiliate, morally evaluate,
          or ontologically assess persons or groups. It remains restricted to
          structural attribution and boundary handling.
    gate_result: "valid_as_logic_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any LOGIC reduced signature is shorthand only. Reduced signatures do not
      replace PMS dependencies. In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or
      Ψ remains dependency-respecting according to PMS.yaml and to the completed
      PMS Core pass.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  logic_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgments, no moral evaluation, no sanction logic."
      - "Focus on structures of praxis, not right or good morality."
      - "Audience: analysis of praxis and structure, not action guidance or decision rules."
    may_add_visibility_to:
      - "non-closure"
      - "closure-drive"
      - "logical boundary management"
      - "responsibility as attributability"
      - "non-innocence without guilt"
      - "effective capacity"
      - "moral readability as post-hoc interpretive field"
      - "failure-mode constraints"
      - "LOGIC drift risks"
      - "counter-readings"
    must_not_do:
      - "derive ought from being"
      - "introduce norms, values, duties, prescriptions, or moral rules"
      - "treat morality as a PMS operator"
      - "convert responsibility into blame"
      - "convert non-innocence into guilt"
      - "convert logical coherence into final authority"
      - "convert Σ into totalization"
      - "convert Ω into justificatory authority"
      - "convert Λ into defect, ignorance, nihilism, or metaphysical pointer"
      - "claim PMS Base validation"

  tripartition:
    pre_moral_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators_involved:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      claim: >
        This level identifies the structural conditions under which the case
        becomes praxeologically legible before evaluative or normative
        interpretation appears.
      case_application: >
        The rule-following paradox is pre-morally legible as a structure of
        differentiation, application-pressure, framing, and meaningful
        non-closure. The difference between rule-following and mere
        compatibility activates the case; the rule and its interpretations
        provide frames; the missing final determination of application marks Λ.
        Α is present only weakly as formal recursive regress, not as an
        empirical or concrete praxis attractor.
      no_normativity_introduced: true
      notes:
        - "No norms, values, duties, prescriptions, or moral commands are introduced."
        - "Patterns may stabilize without intention, moral assessment, or authority."
        - "The pre-moral level is structural legibility only, not ethical evaluation."

    logical_boundary_management:
      label: "Logical level of ordering and boundary management"
      applicability: "active"
      dominant_operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      dependency_note: >
        The listed operators are dominant boundary-management operators. Their
        PMS dependencies remain intact; especially Χ and Σ are not treated as
        dependency-free shorthand.
      claim: >
        Logic functions as an ordering and integration instrument. It may
        organize coherence within a frame, but it does not become final
        authority or deliver ultimate closure where Λ persists. In this case,
        LOGIC is strongest not as a solution to rule-following, but as a
        discipline for identifying where rule, interpretation, derivation, and
        application reach a structural boundary.
      case_application: >
        The case directly concerns the limit of rule-based ordering: applying a
        rule appears to require interpretation, and interpretation may require
        further interpretation. LOGIC therefore highlights the boundary at which
        consistency, derivation, and interpretive ordering remain useful but
        cannot by themselves provide final authority. Χ maintains distance from
        forced closure, while Σ remains contested rather than achieved. This
        means that LOGIC does not replace the philosophical problem with a
        formal answer; it preserves the difference between clarifying the
        structure of the regress and resolving what ultimately makes an action
        count as following a rule.
      aphorism: "Logic is the beginning of everything — not the end."
      boundary_result: >
        The logical boundary is the point at which the rule cannot finally
        determine its own application merely by being interpreted again. Λ is
        carried as sustainable non-closure rather than treated as defect,
        nihilism, ignorance, or metaphysical pointer. Χ prevents the PMS-LOGIC
        reading from smuggling in final authority through coherence, and Σ is
        held as a contested integration demand rather than as completed
        synthesis. The result is a disciplined non-assertion: the overlay can
        show why closure is structurally demanded and structurally withheld, but
        it cannot claim that this withholding has been overcome.

    post_moral_effects:
      label: "Post-moral level of effects"
      applicability: "not_applicable"
      operators_involved:
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      claim: >
        Effects become morally readable once praxis unfolds under asymmetry and
        irreversible time, while responsibility is reconstructed as
        attributability rather than as an ought.
      case_application: >
        The completed PMS Core case is not a concrete praxis scene and does not
        provide an agent, effective capacity, irreversible consequence,
        concrete asymmetry, sanction, obligation, or self-binding commitment.
        Therefore post-moral effects are not claimed. The case may become
        morally readable only in a later concrete scene of rule application,
        correction, enforcement, answerability, or consequence attribution.
      core_formula: "Pre-moral in justification, logical in boundary management, post-moral in effect."
      no_ought_derived: true

  key_claims:
    C1_non_closure_as_strength:
      status: "active"
      claim: >
        Non-closure is treated as a structural strength rather than a mere
        deficiency. Persistent Λ prevents logical systems from compensating
        uncertainty with dogma or substitute narratives.
      case_application: >
        The paradox is not repaired by forcing a final interpretation. Its
        sustained Λ is carried as the structurally meaningful absence of final
        rule-determined closure. This prevents the LOGIC overlay from replacing
        philosophical difficulty with dogma, false certainty, or a substitute
        PMS narrative.

    C2_morality_as_readability_field:
      status: "not_applicable"
      claim: >
        Morality is not reconstructed as an operator, but as a readability field
        under constellations involving Ω, Θ, Λ, and Ψ.
      case_application: >
        The case does not supply the Ω, Θ, and Ψ configuration required for
        moral readability as a post-hoc interpretive field. Λ is active and Θ
        is structurally relevant, but Ω is weak/formal and Ψ is not established.
        Morality is therefore not activated and is not introduced as an operator
        or normative system.

    C3_responsibility_as_attribution_not_prescription:
      status: "not_applicable"
      claim: >
        What everyday language may call obligation is reconstructed as
        attribution of consequences, not prescriptive demand.
      case_application: >
        The case contains no concrete consequence, responsible agent, effective
        capacity, role, obligation, or self-binding trajectory. Responsibility
        as attribution is therefore not claimed, and no duty, command, blame, or
        sanction is derived.

    C4_apparent_norms_as_failure_mode_constraints:
      status: "weak"
      claim: >
        Apparent norms can be reconstructed as structural failure-mode
        constraints stabilized by self-binding, without external authority or
        prescriptive ought.
      case_application: >
        The case contains a weak apparent norm-pressure in the phrase "following
        a rule," because rule-following can invite questions of correctness.
        PMS-LOGIC does not convert that pressure into an ought. At most, it
        marks a failure-mode constraint: do not force closure where Λ persists,
        and do not treat successful interpretation as authority over meaning.

    C5_logic_as_ordering_tool_not_authority:
      status: "active"
      claim: >
        Logic remains important for consistency and integration, but becomes
        structurally unstable when it attempts final authority or closure beyond
        what the frame can deliver under persistent Λ.
      case_application: >
        The rule-following paradox is a direct test of logic as ordering tool
        rather than final authority. Logical reconstruction can clarify the
        frame, the regress, and the boundary of closure, but it becomes unstable
        if it claims to decide once and for all what makes rule-following
        possible.

  responsibility_readability_chain:
    status: "weak"
    source: "PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain"
    chain_type: "readability_chain_not_dependency_definition"
    sequence:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    note: >
      This sequence is used as a LOGIC readability chain for responsibility,
      non-closure, and moral-readability analysis. It is not a new PMS
      dependency definition; PMS.yaml dependencies remain authoritative.
    case_application: >
      The full chain is not active as responsibility-readability. Δ, ∇, □, Λ,
      Θ, Φ, and Χ are structurally relevant; Α and Ω remain weak or conditional;
      Σ remains at issue; Ψ is not established. The chain is therefore useful as
      a readability check for where responsibility would require more case
      material, but it does not license responsibility attribution here.

  theses_and_definitions:
    intermediate_thesis:
      label: "Boundary point of logic"
      quote: "Logic does not end in silence, but in a structurally sustainable non-assertion."
      operator_reading: >
        Non-event Λ, stabilized by Α within □, may mark a disciplined stopping
        point for logic rather than failure or negation.
      case_application: >
        The disciplined stopping point is the refusal to force a final
        interpretation of the rule when the case itself concerns the regress of
        interpretation. The overlay can say that the paradox reaches a logical
        boundary, but it must not assert that PMS-LOGIC has resolved the
        philosophical problem.

    central_thesis:
      quote: "From effective capacity follows structural responsibility, not obligation."
      operator_reading:
        responsibility_requires:
          - "effective capacity within □"
          - "irreversibility under Θ"
          - "distribution gradients under Ω"
          - "attributability continuity via Ψ"
      case_application: >
        Effective capacity is absent as a case finding. The case contains a
        rule-frame and structural temporality, but it does not supply an agent
        with capacity, means, authority, access, temporal window, or
        self-binding continuity. Therefore responsibility-readability does not
        follow.

    conclusion_thesis:
      quote: >
        Logic does not fail as a tool; it becomes structurally unstable when it
        begins to function as authority.
      case_application: >
        The case shows logic remaining legitimate as a tool for identifying the
        interpretive regress and the boundary of closure. It also shows an
        authority-risk: if logic claims final determination of rule-following
        merely through further formal interpretation, it risks becoming the kind
        of authority PMS-LOGIC refuses.

  boundary_conditions:
    BC_EFFECTIVE_CAPACITY:
      label: "Absence of effective capacity"
      status: "absent"
      definition: >
        Responsibility presupposes effective, frame-bound capacity within □ and
        temporal availability under Θ. Where access, means, authority, or the
        relevant temporal window are structurally absent, no responsibility
        attribution arises even if outcomes later appear significant.
      calibration_note: >
        PMS-LOGIC specifies the structural form of attributable capacity, but
        not every concrete threshold of sufficiency in advance. In this case,
        the absence of effective capacity is not a weakness of the philosophical
        case; it is a boundary against importing responsibility, blame,
        obligation, enforcement, or moral readability where only a conceptual
        rule-application problem has been supplied.
      case_application: >
        Effective capacity is absent as a warranted case finding because the
        material gives no concrete actor, no capacity, no means, no authority,
        no institutional position, no temporal window, and no consequence to
        attribute. The philosophical possibility of applying a rule is not yet
        a responsibility-bearing capacity structure. A later concrete scene
        could change this if it specified who applies which rule, under which
        frame, with which authority or exposure, across which temporal window,
        and with which consequences; the present case does not provide those
        conditions.

  non_operator_constructs:
    logic_paper_specific:
      status: "active"
      is_operator: false
      definition: >
        Logic is a procedural discipline of consistency, derivation, and
        closure-drive that meets a structural boundary at Λ under □.
      operator_touchpoints:
        - "Σ"
        - "Λ"
        - "□"
        - "∇"
        - "Χ"
      case_application: >
        Logic functions here as ordering, derivation, and closure-drive in the
        face of rule-application uncertainty. It clarifies why interpretation
        cannot simply be multiplied until closure appears. Its boundary is Λ,
        and Χ prevents the closure-drive from becoming authority.

    morality_readability_field:
      status: "not_applicable"
      is_operator: false
      definition: >
        Morality is the readability of responsibility that emerges post hoc
        from irreversible praxis under structural conditions. No norms, values,
        or duties are introduced.
      minimal_operator_basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      case_application: >
        Moral readability does not emerge in the given case because the case is
        not a concrete praxis scene and lacks effective capacity, self-binding,
        concrete asymmetry, and consequence-attribution. The overlay therefore
        does not moralize the paradox.

    responsibility_vs_ought:
      status: "not_applicable"
      is_operator: false
      responsibility: "Attribution of consequences."
      ought: "Prescriptive demand; explicitly out of scope."
      pms_logic_position: >
        PMS-LOGIC operates on responsibility-readability and attributability,
        not on ought-statements.
      case_application: >
        The case does not support consequence-attribution, so responsibility is
        not claimed. It also does not support prescription, so no ought,
        command, duty, sanction, blame, or enforcement is derived.

    potential_effective_capacity:
      status: "absent"
      is_operator: false
      definition: >
        Effective capacity means capacity within a frame □ plus temporal
        availability Θ. It introduces exposure to consequences, not duty.
      reduced_basis:
        - "□"
        - "Θ"
      case_application: >
        A rule-frame and temporal repeatability are conceptually present, but
        effective capacity is absent because no actor, access, means, authority,
        temporal window, or consequence structure is specified.

    non_innocence:
      status: "not_applicable"
      is_operator: false
      definition: >
        Non-innocence is the structural condition in which consequences become
        attributable even without intent, command, guilt, or blame.
      basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "□"
        - "Ψ"
      case_application: >
        Non-action, omission, or unresolved absence does not become
        non-neutral in the responsibility sense because no actor, consequence,
        or self-binding trajectory is present. Λ remains a logical boundary,
        not non-innocence.

    apparent_norms_as_constraints:
      status: "weak"
      is_operator: false
      definition: >
        Apparent norms are reconstructed as PMS-internal self-binding
        constraints that prevent structural failure modes under irreversible,
        asymmetric conditions. They are not commandments.
      basis:
        - "Χ"
        - "Σ"
        - "Ψ"
        - "Λ"
        - "□"
        - "Ω"
        - "Θ"
      case_application: >
        The apparent normative pressure of "following a rule" is not converted
        into an ought. In this case, the relevant constraint is mainly
        boundary-management: do not force Σ where Λ persists, and do not convert
        interpretive success into final authority. Ψ remains unestablished.

  reduced_signatures:
    PRE_MORAL_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: "Structural preconditions of praxis; no normativity introduced."
      case_application: >
        This reduced signature applies because the case is intelligible through
        difference, application-pressure, framing, and meaningful non-closure.
        Α is included only as weak shorthand for the recursive form of
        interpretive regress, not as a concrete attractor.

    LOGIC_boundary_management:
      label: "Logical boundary management"
      applicability: "active"
      operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      reduced: true
      note: >
        Ordering and integration under non-closure; Χ prevents dogmatic
        Σ-totalization.
      dependency_hygiene: >
        This is reduced shorthand only. PMS dependencies remain authoritative.
      case_application: >
        This is the strongest LOGIC signature for the case. The paradox is a
        boundary-management problem: the rule-frame asks for application, Λ
        marks missing final closure, Χ preserves reflective distance, and Σ
        remains contested rather than totalized.

    POST_MORAL_effects:
      label: "Post-moral effects"
      applicability: "not_applicable"
      operators:
        - "Ω"
        - "Θ"
        - "Ψ"
      reduced: true
      note: >
        Irreversible consequence attribution under asymmetry and time; no norms
        derived.
      case_application: >
        This signature does not apply as a case finding because no concrete
        asymmetry, irreversible consequence, effective capacity, or
        self-binding agent is provided.

    MORAL_READABILITY_min:
      label: "Moral readability field"
      applicability: "not_applicable"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Morality as interpretive field generated post hoc; not an operator.
      case_application: >
        The signature is not applicable because Ψ is not established and Ω is
        only weak/formal. Λ and Θ alone do not generate moral readability.

    POTENTIAL_effective:
      label: "Effective potential / capacity"
      applicability: "absent"
      operators:
        - "□"
        - "Θ"
      reduced: true
      note: >
        Situated capacity plus temporal availability; generates exposure, not
        duty.
      case_application: >
        The case has a rule-frame and possible temporal repeatability, but it
        does not supply an agent with effective capacity. Therefore effective
        potential is absent as a warranted LOGIC construct.

    NON_CLOSURE_stability:
      label: "Sustainable non-closure"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: >
        Openness carried within frame; attractor stabilizes non-substitution.
      case_application: >
        This signature applies with a caveat. The case strongly supports
        carrying Λ within the rule-application frame without replacing it by
        dogma or metaphysical filling. Α is weak because the recurrence is a
        formal regress rather than a concrete stabilized praxis pattern.

    HUME_KNOT_reconstruction:
      label: "Hume knot reconstruction"
      applicability: "not_applicable"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Rewrites potential obligates into non-innocence and attributable
        consequence; preserves the is/ought boundary without crossing it.
      case_application: >
        This signature is not applicable because the case does not claim that
        potential obligates, does not establish effective capacity, and does not
        provide Ω and Ψ strongly enough for attributable consequence or
        non-innocence.

  failure_mode_constraints:
    note: >
      The following are frame-dependent PMS-internal self-binding constraints.
      They are not universal prescriptions. They name conditions for coherence
      and non-destructive praxis under non-closure.
    items:
      - id: "FMC1"
        label: "A boundary that cannot be carried becomes structurally unstable."
        applicability: "weak"
        operator_basis:
          - "Δ"
          - "Ψ"
        meaning: >
          Marking or occupying a boundary generates exposure. If the
          consequences cannot be sustained across time, the boundary becomes
          destructive rather than orienting.
        failure_mode: "Boundary inflation, authority overreach, collapse into dogma or abandonment."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "authority_capture_omega_inflation"
        case_application: >
          The constraint applies only weakly because Ψ is not established. The
          relevant boundary is conceptual: distinguishing rule-following from
          mere compatibility must be carried without turning that distinction
          into dogmatic authority.

      - id: "FMC2"
        label: "Forced closure where Λ persists produces structural instability."
        applicability: "active"
        operator_basis:
          - "Λ"
          - "□"
          - "Χ"
        meaning: >
          Where a structure does not yield final explanation, forced closure
          introduces substitute narratives such as dogma, myth, metaphysical
          compensation, or false certainty.
        failure_mode: "Dogmatization, metaphysical compensation, false certainty."
        related_drifts:
          - "dogmatism_sigma_totalization"
        case_application: >
          This is the primary failure-mode constraint for the case. The paradox
          should not be closed by asserting that rule, interpretation, community,
          logic, or PMS itself finally settles the issue without remainder.

      - id: "FMC3"
        label: "Explanatory power converted into sense-making authority causes structural overreach."
        applicability: "active"
        operator_basis:
          - "∇"
          - "Σ"
          - "□"
          - "Χ"
        meaning: >
          Explanatory success does not confer authority over meaning.
          Integration is coordination, not domination; Χ prevents closure-drive
          from laundering authority through explanation.
        failure_mode: "Epistemic domination, technocratic moralism, authority laundering through explanation."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "technocratic_reduction_frame_overconstraint"
        case_application: >
          The constraint applies because the PMS-LOGIC overlay may explain the
          regress elegantly. That explanatory success must not be converted into
          authority over the philosophical meaning of rule-following.

      - id: "FMC4"
        label: "Where proximity generates power, viable praxis requires maintained distance."
        applicability: "not_applicable"
        operator_basis:
          - "Χ"
          - "Ω"
        meaning: >
          Closeness increases influence; where influence increases,
          unregulated proximity becomes power. Χ is a condition for dignified
          handling of power.
        failure_mode: "Manipulation, coercive intimacy, moral overreach."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "moralism_pseudo_ought_injection"
        case_application: >
          This constraint is not applicable as a scene finding because the case
          contains no interpersonal proximity, influence relation, coercive
          intimacy, or concrete power asymmetry. Χ remains active only as
          reflective distance in analysis.

      - id: "FMC5"
        label: "Stable self-binding takes the form of restraint rather than assertion."
        applicability: "weak"
        operator_basis:
          - "Ψ"
          - "Χ"
          - "Λ"
        meaning: >
          Assertions seek closure and authority; restraint preserves openness.
          Self-binding to restraint stabilizes praxis without commanding
          others.
        failure_mode: "Authoritarian certainty, moral exhibitionism, escalation dynamics."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "moralism_pseudo_ought_injection"
        case_application: >
          The constraint applies weakly as application discipline rather than
          case content. The overlay itself must practice restraint by carrying Λ
          and avoiding final assertion, while Ψ is not claimed inside the case.

  drift_catalogue:
    note: >
      LOGIC drift classes describe structural operator distortions. They are not
      personal traits, diagnoses, moral verdicts, or enforcement categories.
    dogmatism_sigma_totalization:
      label: "Dogmatism / Σ-totalization"
      applicability: "risk"
      distorted_operators:
        - "Σ"
      mechanism: >
        Integration is forced into total closure, treating coherence as final
        truth rather than provisional coordination. Λ is denied instead of
        carried.
      symptoms:
        - "claims_of_ultimate_explanation"
        - "immunization_against_revision"
        - "replacement_of_structural_coherence_with_certainty"
      result: >
        Brittle structure under novelty; non-closure treated as error rather
        than constraint.
      case_application: >
        This is the main LOGIC drift risk. The PMS Core pass and the LOGIC
        overlay may become too smooth if Σ is treated as achieved resolution
        rather than as a contested operator.

    authority_capture_omega_inflation:
      label: "Authority capture / Ω-inflation"
      applicability: "risk"
      distorted_operators:
        - "Ω"
      mechanism: >
        Asymmetry is converted from descriptive condition into justificatory
        principle. Power gradients are mistaken for epistemic or moral
        authority.
      symptoms:
        - "because_I_can_becomes_because_I_am_right"
        - "suppression_of_Χ"
        - "obscured_responsibility_pathways"
      result: >
        Domination may become masked as necessity; responsibility flows upward
        and becomes opaque.
      case_application: >
        This is a risk only at the level of formalization: weak formal Ω could
        be inflated into authority of rule, interpretation, logic, PMS, or
        analyst. The overlay blocks this by preserving weak Ω and Χ.

    moralism_pseudo_ought_injection:
      label: "Moralism / pseudo-ought injection"
      applicability: "risk"
      distorted_operators:
        - "Ψ"
        - "Χ"
      mechanism: >
        Responsibility is retranslated into obligation. Self-binding is replaced
        by compliance-seeking enforcement. Non-innocence is moralized into
        blame.
      symptoms:
        - "should_or_must_reintroduced_as_if_structurally_authorized"
        - "attribution_becomes_accusation"
        - "praxis_judged_instead_of_reconstructed"
      result: >
        Covert normativity is reintroduced; responsibility collapses into
        enforcement.
      case_application: >
        This remains a risk if "following a rule" is smuggled into a
        prescriptive demand. The overlay avoids this by treating correctness
        pressure structurally and by not deriving obligation, blame, or sanction.

    nihilism_lambda_suppression:
      label: "Nihilism / Λ-suppression"
      applicability: "risk"
      distorted_operators:
        - "Λ"
      mechanism: >
        Non-events, omissions, or restraints are treated as irrelevant. The
        structural significance of omission within frames under time is erased.
      symptoms:
        - "nothing_happened_so_nothing_matters"
        - "denial_of_omission_effects"
        - "flattening_of_temporal_consequence"
      result: >
        False innocence; responsibility dissolves through denial of structural
        impact.
      case_application: >
        The risk is not responsibility-denial but boundary-denial: treating Λ as
        mere failure or meaningless absence would erase the paradox's structural
        force. The overlay therefore carries Λ as meaningful non-closure.

    technocratic_reduction_frame_overconstraint:
      label: "Technocratic reduction / □-overconstraint"
      applicability: "risk"
      distorted_operators:
        - "□"
      mechanism: >
        Frames are treated as exhaustive representations of reality. What is
        unmodeled is dismissed or misrecognized as Λ.
      symptoms:
        - "overconfidence_in_models_or_metrics"
        - "ignoring_unmodeled_effects"
        - "frame_lock_in"
      result: >
        Blind spots are mistaken for non-existence; systemic fragility
        increases.
      case_application: >
        This risk appears if the PMS or LOGIC frame is treated as exhaustive of
        the rule-following paradox. The overlay avoids this by preserving rival
        semantic, normative, skeptical, communal-practice, formal-logical, and
        pragmatic readings.

  logic_derived_axes_projection:
    note: >
      This projection is a PMS-LOGIC paper-internal structural localization. It
      is not a measurement of objective quality and not a person evaluation.
    Awareness_A:
      structural_level: "high"
      operator_basis:
        - "Δ"
        - "□"
        - "Θ"
      effect_notes:
        - "Sensitivity to limits and conditions of praxis."
        - "Perception of where explanation reaches a stopping point and responsibility becomes structurally relevant."
      case_application: >
        LOGIC sharpens Awareness_A by making the rule/action distinction, the
        frame of application, and the temporal repeatability of rule-following
        more explicit. This is structural awareness only, not phenomenological
        awareness or person evaluation.

    Coherence_C:
      structural_level: "medium"
      operator_basis:
        - "∇"
        - "□"
        - "Λ"
        - "Θ"
      effect_notes:
        - "Coherence maintained despite non-closure."
        - "Stability from integration of absence, not closure."
      case_application: >
        LOGIC supports a medium structural coherence by showing how the case can
        carry Λ without forced closure. Coherence remains limited because Σ is
        contested and because PMS coherence is not treated as philosophical
        resolution.

    Responsibility_R:
      structural_level: "not_applicable"
      operator_basis:
        - "Ω"
        - "Θ"
        - "Φ"
        - "Ψ"
      effect_notes:
        - "Responsibility without moral demand."
        - "Accountability without sanction."
        - "Exposure accepted rather than displaced."
        - "Responsibility is structurally attributable rather than obligatory."
      boundary_condition_ref: "BC_EFFECTIVE_CAPACITY"
      case_application: >
        Responsibility_R is not applicable because effective capacity,
        concrete Ω, consequence-attribution, and Ψ are absent. LOGIC therefore
        blocks responsibility overclaim rather than amplifying it.

    Action_E:
      structural_level: "weak"
      operator_basis:
        - "∇"
        - "Θ"
        - "Σ"
        - "Χ"
      effect_notes:
        - "Action slowed or filtered."
        - "Preference for restraint over intervention."
        - "Avoidance of irreversible overreach under asymmetry amplification."
      case_application: >
        Action_E remains weak because no concrete action is provided. LOGIC
        affects Action_E only indirectly by showing why any future action claim
        would need criteria for integration, temporality, and closure-pressure
        management.

    Dignity_in_Practice_D:
      structural_level: "stabilizing"
      operator_basis:
        - "Ω"
        - "Χ"
        - "Ψ"
      effect_notes:
        - "Protection of vulnerable positions without paternalism."
        - "Power exercised without domination."
        - "Self-binding as stable continuity without norm derivation."
      case_application: >
        LOGIC constrains Dignity_in_Practice_D as application discipline: the
        overlay maintains distance, avoids person-ranking, avoids moralization,
        and refuses final authority. It does not claim ontological dignity or
        moral superiority.

  counter_readings:
    note: >
      Counter-readings are interpretive risks. PMS-LOGIC responds through
      structural clarification rather than polemic.
    items:
      - id: "D1"
        reading: "This is just ethics in disguise."
        relevance: "weak"
        pms_response: >
          No PMS operator generates values, norms, or prescriptions. What
          appears ethical is the interpretability of responsibility under Ω, Θ,
          Λ, and Ψ.
        case_application: >
          The counter-reading is weakly relevant because rule-following can
          sound normatively charged. The overlay avoids ethics-in-disguise by
          making no ought claim and by not activating responsibility or moral
          readability.

      - id: "D2"
        reading: "This collapses into relativism."
        relevance: "weak"
        pms_response: >
          Frames are explicit scope constraints, and reversibility is required.
          Structural attribution under Ω, Θ, and Λ is not arbitrary preference.
        case_application: >
          The risk is weak because the case preserves frames and distinctions
          rather than arbitrary preference. However, PMS-LOGIC does not settle
          the philosophical question of whether rule-following requires
          communal, semantic, or formal criteria.

      - id: "D3"
        reading: "This is nihilism with extra steps."
        relevance: "weak"
        pms_response: >
          Λ is not meaninglessness but structured absence. Omission and
          non-action remain relevant under Θ and Ω.
        case_application: >
          The counter-reading is weakly relevant because non-closure could be
          mistaken for meaninglessness. The overlay treats Λ as structured
          non-closure within a frame, not as nihilism.

      - id: "D4"
        reading: "This is a hidden theological argument."
        relevance: "not_applicable"
        pms_response: >
          PMS-LOGIC carries non-closure within □ without metaphysical filling.
          No external ground, lawgiver, or ultimate justification is introduced.
        case_application: >
          The overlay introduces no external ground, lawgiver, ultimate
          authority, or metaphysical completion. Theological closure is not
          invoked.

      - id: "D5"
        reading: "This makes responsibility unfair."
        relevance: "not_applicable"
        pms_response: >
          PMS does not claim fairness. It models attribution, not moral desert.
          Responsibility is structural, not a reward or punishment scheme.
          Absence of effective capacity implies no responsibility.
        case_application: >
          The counter-reading is not applicable because responsibility is not
          attributed in this case and effective capacity is absent.

      - id: "D6"
        reading: "This cannot guide action."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC does not instruct; it orients by constraining overreach.
          Guidance is replaced by orientation through Χ, Σ, and Ψ.
        case_application: >
          This is weakly relevant because the case is not action-guidance. The
          overlay offers orientation by constraining forced closure and
          authority-overreach, not by prescribing what to do.

      - id: "D7"
        reading: "This wins by translation, not necessarily by final superiority."
        relevance: "active"
        pms_response: >
          Translation success is not final settlement. The relevant test is
          whether the grammar preserves differentiating force under pressure.
        case_application: >
          This is the main methodological counter-reading. The overlay
          preserves it by treating LOGIC success as boundary clarification, not
          proof of final superiority over rival accounts of rule-following.

      - id: "D8"
        reading: "Relation to adjacent frameworks."
        relevance: "active"
        pms_response: >
          PMS-LOGIC is not virtue ethics, pragmatism, or systems ethics. It
          reconstructs responsibility structurally under asymmetry,
          temporality, and non-closure without ethical evaluation or normative
          optimization.
        case_application: >
          Adjacent frameworks remain open for comparison, especially semantic,
          normative, pragmatic, communal-practice, skeptical, anti-regress, and
          formal-logical readings of the rule-following paradox.

