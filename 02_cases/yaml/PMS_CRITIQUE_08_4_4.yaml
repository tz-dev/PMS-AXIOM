  repository_examples_alignment:
    status: reference_only_not_used_as_case_output
    source: PMS-CRITIQUE.yaml:example_suite.repository_examples
    note: >
      Repository examples may exist as optional training material for structural
      reading discipline, but PMS-CRITIQUE does not depend on them and AXIOM
      case overlays do not generate them unless explicitly requested.
    paths_reference:
    - examples/Example 1 - The Missing Reply Becomes the Story.md
    - examples/Example 2 - Fast Outrage, No Stop-Capability.md
    - examples/Example 3 - Endless Reframing Meeting.md
    - examples/Example 4 - Policy Without Follow-Up.md
    - examples/Example 5 - Role Asymmetry Turns Feedback Into Exposure.md

  load_order_and_meta_notes:
    load_order:
    - PMS.yaml
    - PMS-CRITIQUE.yaml
    - pms-critique-ext.yaml (optional; paper-specific additions)
    compatibility:
    - This layer is PMS_1.3-conform and does not add new operators.
    - All constructs are mappable to Δ–Ψ signatures and scene-bound records.
    - Derived critique projections do not override base PMS derived axes.
    extensibility:
    - Future versions may add optional paper-specific extensions without overriding this base
      layer.
    - Extensions should remain modular, explicit, and overlay-level.
    neutrality:
    - All mappings remain structural; no psychologizing, moral ranking, or prescriptive claims
      are encoded.
    boundedness:
    - Translation into PMS-CRITIQUE terms does not by itself prove exhaustive capture.
    - Absence of rival models in a given use context does not prove superiority.
    - Formal YAML representation does not by itself secure direct implementation, legitimacy,
      or explanatory sufficiency.

  critique_overlay_quality_control:
    status: passed
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      chi_dependency_hygiene_preserved: true
      critique_thresholds_checked: true
      vertical_reach_checked: true
      horizontal_scale_checked: true
      publicness_overlay_not_operator: true
      drift_classes_not_person_labels: true
      modulators_not_person_types: true
      no_truth_adjudication: true
      no_motive_verification: true
      no_normative_tribunal: true
      no_sanction_logic: true
      no_coercive_binding: true
      dignity_in_practice_preserved: true
      reversibility_preserved: true
      distance_chi_preserved: true
      non_capture_preserved: true
      rival_framings_preserved: true
      optional_mip_docking_separated: true
      example_suite_schema_alignment_present: true
    issues_found:
    - none
    correction_required: false
    final_overlay_judgment: >
      The CRITIQUE overlay is valid, bounded, and correctly subordinated to the
      completed PMS Core case without redefining PMS operators, dependencies, or
      derived structures.

  critique_overlay_synthesis:
    primary_critique_reading: >
      PMS-CRITIQUE makes visible that the case is not yet productive critique
      but a conceptual critique-threshold problem: mismatch and frame are
      legible, Χ is maintained by the application, Φ is available as reframing,
      while Σ and Ψ are not established. The overlay therefore clarifies
      threshold reach and drift sensitivity without rewriting the Core PMS pass.
      Its central contribution is negative as much as positive: it shows what
      the case does not yet warrant, namely correction, follow-up binding,
      public amplification, diagnosis, sanction, legal adjudication, or
      legitimacy verdict.
    threshold_result: >
      The case reaches a weak conceptual version of minimal critique, not
      productive or stable critique. It is not reaction-only, because mismatch,
      frame, and distance are present at the overlay level. It also does not
      supply correction, follow-up binding, or a concrete critique scene.
      Minimal critique is therefore readable as a threshold possibility, not
      demonstrated as a full praxis event.
    mismatch_result: >
      Δ becomes critique-relevant as the mismatch between legitimacy claims,
      grants, or contestations and the absence of recognized authority. This
      mismatch remains abstract and must not be treated as evidence of
      illegitimacy, validity, authority failure, or moral superiority. It is the
      object of structural differentiation, not a conclusion.
    frame_result: >
      □ defines a philosophical frame in which legitimacy and authority are
      distinguished and authority absence becomes structurally meaningful. It
      does not define a concrete response role, correction path, institutional
      procedure, jurisdiction, evidence standard, or public accountability
      setting. Any such frame would need to be supplied separately.
    distance_result: >
      Χ is real as application discipline and weak as case-internal
      stop-capability. The overlay remains reversible and non-tribunal, but no
      scene demonstrates practical interruptibility. Χ therefore protects the
      analysis from verdict logic without pretending that the case itself has
      already enacted critique discipline.
    recontextualization_result: >
      Φ bridges toward conceptual reframing by making legitimacy readable apart
      from recognized authority. It does not yet bridge toward correction
      because no Σ-level consolidation is supplied. Φ must therefore remain a
      reframing capacity, not a substitute for settlement, integration, or
      practical repair.
    integration_result: >
      Σ remains absent or weak as a case result. No corrective step, coordinated
      resolution, implementation unit, integrated practice, or shared action path
      is supplied. This absence should not be redescribed as failure; it is a
      limit of what the abstract case material provides.
    self_binding_result: >
      Ψ remains absent. No actor binds itself to follow-up over time, and the
      overlay explicitly avoids converting Ψ into a coercive demand that others
      accept a PMS-CRITIQUE verdict, legitimacy theory, authority claim, or
      corrective obligation.
    asymmetry_temporality_result: >
      Ω and Θ are weak background parameters. Possible exposure, obligation, or
      recognition gradients may matter in later scenes, but no direction of
      asymmetry, accumulation, residue, irreversibility, or temporal trajectory
      is provided. They remain calibration requirements rather than results.
    scale_publicness_result: >
      Horizontal scale is selected as paper tag a: generic structural critique
      without actor binding. Deployment scale and publicness overlay P are not
      applicable. The case must not be treated as public critique, institutional
      procedure, platform exposure, or mass-amplified contestation without added
      scene material.
    drift_result: >
      The main bounded drift risks are D2 judgment drift, D3 narrative repair
      drift, and D4 commentary drift, with compact risks C2, C4, C5, and C9.
      They are not active diagnoses; they are constrained by Χ, reversibility,
      D, non-capture, and refusal of verdict logic. Their function is to prevent
      over-smooth critique application, not to label the case as deficient.
    dignity_result: >
      Dignity-in-Practice is preserved by keeping the overlay non-ranking,
      non-diagnostic, non-humiliating, non-coercive, and structural. The case
      contains no persons to rank and no exposure mechanism to use as correction.
      D remains an application constraint on how the analysis is conducted, not
      a metaphysical dignity claim or moral elevation of any reading.
    non_capture_result: >
      Outside PMS-CRITIQUE capture remain the normative truth of legitimacy,
      legal authority, institutional recognition, symbolic refusal, theological
      or communal authorization, public rupture, and rival critique grammars that
      do not treat critique as correction-oriented coordination. These are not
      treated as mere calibration residue.
    optional_mip_docking_result: >
      MIP docking is optional but not triggered. It would become relevant only
      if a later task explicitly sought evaluative adjudication of legitimacy,
      attribution, asymmetry, or regime conditions under separate criteria.
      Nothing in this overlay requires that such docking occur.
    final_critique_formula_or_signature: >
      weak CRITIQUE_MIN with Φ-active / Σ-weak: Δ + □ + Χ as
      overlay-stabilized framed differentiation, plus Φ as conceptual
      recontextualization, with bounded risks D2, D3, and D4; no CRITIQUE_PROD,
      no CRITIQUE_STABLE, no P amplification. This signature is overlay
      shorthand only and does not alter PMS operator dependencies.
