pms_critique_overlay_application:
  schema_version: PMS-CRITIQUE_1.1
  schema_role: case_overlay_application
  overlay_status: application_profile_only
  overlay_source_file: PMS-CRITIQUE.yaml
  paper_source_file: PMS-CRITIQUE.md
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  overlay_metadata:
    model_name: Praxeological Meta-Structure – Critique Layer
    model_short: PMS-CRITIQUE
    status: repository_overlay_draft
    maturity: draft
    repository_role: paper_specific_application_schema
    last_updated: '2026-04-06'
    doi: 10.5281/zenodo.18175456
    repositories:
      pms_base: https://github.com/tz-dev/Praxeological-Meta-Structure-Theory
      this_repo: https://github.com/tz-dev/PMS-CRITIQUE
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.4 Thinking)
      role: formalization_assistant
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      repository_role: current_base_schema
    description: >
      PMS-CRITIQUE is a PMS-conform application layer that reconstructs critique
      as a structurally constrained praxis form: how mismatch becomes
      interruptible through Χ-stabilized framed differentiation, how critique
      becomes productive through Φ and Σ, and how follow-up may become bound
      across time through Ψ without coercion.
    epistemic_status: >
      This overlay is structurally disciplined and portable, but not final,
      exhaustive, uniquely sufficient, immune to revision, or superior to all
      rival critique grammars.
    methodological_restraint: >
      PMS-CRITIQUE does not claim monopoly on critique analysis. Rival grammars
      may remain stronger where normativity, institutional legitimacy,
      rhetorical force, discourse ethics, public rupture, resistance, or lived
      experience are the primary object.

  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for "Legitimacy Without Authority"
    rule: >
      This CRITIQUE block is appended to or integrated with an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      CRITIQUE constructs as PMS Base.
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: >
      The CRITIQUE overlay may add visibility for critique thresholds, reach,
      scale, publicness, drift classes, modulators, critique-facing derived-axis
      projections, optional MIP docking, and misuse guardrails. It must not
      modify the completed PMS Core case except where a direct PMS.yaml
      inconsistency has been separately identified.

  pms_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    canonical_source_url: https://raw.githubusercontent.com/tz-dev/Praxeological-Meta-Structure-Theory/refs/heads/main/model/PMS.yaml
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
    dependency_hygiene:
      chi_note: >
        Χ is used here as a reduced signature for critique interruptibility. In
        PMS terms, Χ presupposes Φ, Θ, and □; it is not treated as a standalone
        trait.
      no_operator_override: >
        Any operator gloss in this overlay is an application-facing excerpt
        only. Canonical operator definitions and dependencies remain in
        PMS.yaml.
      overlay_discipline: >
        Derived critique constructs remain overlay-level and do not alter the
        base PMS derivation path.

  nested_overlay_policy:
    overlays:
      P:
        name: Publicness Overlay
        type: overlay_modulator
        is_operator: false
        amplifies:
        - Ω
        - Θ
        - Α
        note: >
          Publicness amplifies exposure gradients, hardens irreversibility, and
          accelerates script stabilization without creating critique or
          correction by itself.
        case_application: >
          Publicness is not activated by the supplied case material. The case is
          abstract and philosophical rather than public, mediated, or
          exposure-amplified; therefore P remains an overlay modulator only and
          does not amplify Ω, Θ, or Α in this application.
    no_base_extension: true
    rule: >
      PMS-CRITIQUE introduces overlay-level constructs only: critique formulas,
      reach and scale ladders, publicness overlay, drift classes, modulators,
      projections, docking interfaces, and example-packet discipline. These
      organize existing PMS operators and never become PMS operators or
      dependencies.

  validity_gate:
    status: passed
    gate_type: PMS_application_only
    note: >
      This gate constrains PMS application only. It does not constrain critique,
      refusal, rejection, revision proposals, or rival formalizations.
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: maintained
        meaning: >
          A maintained meta-position and stop-capability are present. The
          CRITIQUE overlay does not fuse the case into reaction, verdict,
          sanction, exposure-punishment, authority, or person-level attribution.
      reversibility:
        status: maintained
        meaning: >
          Readings remain scene-bound, revisable, and non-final. The overlay
          does not produce global person labels, irreversible labels, or final
          judgments.
      Dignity_in_Practice_D:
        id: D
        status: maintained
        meaning: >
          Dignity-in-Practice is preserved. The overlay does not shame, rank,
          humiliate, morally evaluate, diagnose, or ontologically assess persons
          or groups.
    gate_result: valid_as_critique_overlay_application

  critique_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic.
    - No person-level judgment, no person-ranking, no sanction logic.
    - No adjudication of correctness, truth, motives, sincerity, or moral rightness.
    - No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal,
      or enforcement script.
    - Critique remains structural, scene-bound, reversible, and non-coercive.
    - Drift labels remain structural descriptors, not accusations.
    - Resistant cases must not be treated as invalid merely because they exceed PMS-CRITIQUE.
    may_add_visibility_to:
    - mismatch as Δ
    - response pressure as ∇
    - frame relevance and role space as □
    - non-response or missing follow-up as Λ
    - stabilized critique scripts as Α
    - exposure gradients as Ω
    - accumulation and irreversibility as Θ
    - recontextualization as Φ
    - stop-capability and interruptibility as Χ
    - correction consolidation as Σ
    - non-coercive follow-up binding as Ψ
    - minimal, productive, and stable critique thresholds
    - vertical reach and horizontal scale
    - publicness amplification
    - critique drift patterns
    - modulator conditions
    - critique-facing A/C/R/E/D projections
    - optional MIP docking boundaries
    must_not_do:
    - treat critique as personal essence
    - treat reaction as weaker critique
    - treat judgment as strict critique without Χ, Φ, or Σ
    - translate critique legibility into verdict
    - convert Ψ into Ψ→Other coercive demand
    - treat public exposure as correction
    - use drift labels as sanctions
    - collapse scene-bounded critique into person-typing
    - use explanation-first language to neutralize accountability
    - use evaluation-first labels to bypass structural explanation
    - claim PMS Base validation

  critique_core:
    scope_note: >
      PMS-CRITIQUE models structural conditions of critique and drift under
      load. It does not adjudicate correctness of opinions, establish truth,
      verify motives, or provide normative discourse ethics. In this case, the
      overlay is used only to test critique-threshold reach: whether the
      legitimacy/authority mismatch becomes interruptible, whether it becomes
      corrective, and whether any follow-up is self-bound over time. The overlay
      does not decide whether legitimacy without recognized authority is valid,
      invalid, emancipatory, defective, or normatively superior.
    definitions:
      CRITIQUE_MIN:
        label: Minimal Critique
        applicability: weak
        formula:
          required:
          - Δ
          - □
          - Χ
          background_typically_active:
          - Ω
          - Θ
        gloss: >
          Minimal critique is Χ-stabilized framed differentiation: a mismatch Δ
          becomes legible as relevant inside a frame □, and the configuration
          remains interruptible Χ rather than collapsing into impulse discharge,
          frame policing, verdict, or paralysis. This is an overlay threshold
          using a reduced signature; it does not redefine PMS operator
          dependencies, because Χ remains dependent on Φ, Θ, and □ within PMS
          Base.
        threshold_status: strict_structural_minimum
        non_equivalences:
        - Reaction Δ + ∇ without Χ is not a weaker critique; it is structurally different.
        - Judgment □ + Δ without Φ/Σ does not count as critique in the strict sense used here.
        - Silence or paralysis under mismatch are not low-grade critique; they are distinct
          stabilizations.
        - PMS readability of a mismatch is not yet critique unless the mismatch remains framed
          and interruptible.
        case_application: >
          The case reaches only a weak, conceptual version of minimal critique.
          Δ is visible as the mismatch between legitimacy-claiming,
          legitimacy-granting, legitimacy-contestation, and absent recognized
          authority; □ is visible as the frame in which authority is expected,
          refused, bracketed, or contested; Χ is maintained by the application as
          reversible distance. The case does not yet supply a concrete critique
          episode in which stop-capability is enacted inside a scene. Therefore
          CRITIQUE_MIN is present only as overlay-level threshold readability,
          not as demonstrated practical critique.
      CRITIQUE_PROD:
        label: Productive Critique
        applicability: weak
        formula:
          required:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          background_typically_active:
          - Ω
          - Θ
        gloss: >
          Productive critique crosses from interruption into correction. Φ
          recontextualizes the mismatch into an actionable context; Σ
          consolidates a coherent corrective step that is coordinatable rather
          than merely asserted. Productive critique therefore requires more than
          a new interpretation: it requires some integrated correction path,
          however minimal, without turning correction into coercion or verdict.
        threshold_status: productive_correction_threshold
        case_application: >
          Productive critique is not reached as a case result. Φ is active as
          conceptual recontextualization of legitimacy apart from recognized
          authority, but Σ is weak because no corrective step, coordination unit,
          decision, repair path, or actionable consolidation is supplied. The
          case therefore remains closer to bounded interruption and conceptual
          reframing than to correction. This is not a failure of the case; it is
          a boundary of what the supplied material warrants.
      CRITIQUE_STABLE:
        label: Stable Critique / Follow-up Binding
        applicability: not_applicable
        formula:
          required:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          - Ψ
          background_typically_active:
          - Ω
          - Θ
        gloss: >
          Stable critique binds correction into a trajectory without coercing
          others. Follow-up becomes structurally owned over time Θ while
          remaining revisable and restrained by Dignity-in-Practice. Ψ therefore
          marks self-binding or own-follow-up binding, not a demand that others
          submit to the critic's frame or to PMS-CRITIQUE terminology.
        threshold_status: follow_up_binding_threshold
        binding_rule: Ψ must bind self or own follow-up, not become Ψ→Other demand.
        case_application: >
          Stable critique is not established. The case supplies no self-binding
          actor, follow-up loop, durable correction trajectory, review interval,
          or non-coercive ownership over time. Ψ remains unavailable except as a
          later conditional requirement if a concrete scene were supplied. The
          overlay therefore must not convert the abstract legitimacy problem into
          a duty for any party to accept a particular critique, authority claim,
          or PMS formalization.
    non_goals:
    - No moral ranking of positions, speakers, or outcomes.
    - No psychological typing, motive attribution, sincerity judgment, trait claim, or diagnostic
      claim.
    - No prescriptive how-to manual, coaching protocol, therapy method, legitimacy tribunal,
      or sanctioning logic.
    - No coercive enforcement: Ψ must not be converted into Ψ→Other demands.
    - No truth adjudication, correctness verdict, or final settlement of critique legitimacy.
    reach_ladder_note: >
      The vertical reach ladder is not a virtue ladder. It describes how far a
      critique chain structurally travels from mismatch to interruption to
      correction to binding before breaking.
    boundedness_note: >
      These critique formulas are paper-specific overlay constructs. They do not
      establish that all critique-relevant phenomena must be captured in exactly
      these terms.

  critique_mapping:
    overview: >
      Operator-to-critique mappings are one-to-many: each PMS operator may
      realize multiple critique-relevant functions depending on frame and scale.
      This mapping is descriptive and does not treat operators as psychological
      traits or personal capacities.
    operator_roles:
      Δ:
        name: Difference
        critique_role: Legible mismatch.
        typical_realizations:
        - Error vs. standard.
        - Claim vs. evidence mismatch.
        - Expectation vs. non-response mismatch carried by Λ.
        case_application: >
          The critique-relevant mismatch is legitimacy without recognized
          authority: legitimacy may be claimed, granted, or contested while the
          authority that would usually ratify, authorize, or settle the matter
          is absent or not recognized.
      ∇:
        name: Impulse
        critique_role: Directional pressure to respond.
        typical_realizations:
        - Fast-response pressure.
        - Defensive countering.
        - Demand for immediate explanation as closure substitute.
        case_application: >
          The response pressure is the structural pull to justify, accept,
          refuse, contest, or reframe legitimacy in the absence of recognized
          authority. This remains structural activation, not a motive
          attribution.
      □:
        name: Frame
        critique_role: Relevance and role space.
        typical_realizations:
        - Meeting / review frame.
        - Training / evaluation frame.
        - Platform discourse frame.
        case_application: >
          The operative frame is philosophical and conceptual: it asks how
          legitimacy should be understood where authority is unavailable,
          unrecognized, or contested. A concrete correction frame is not
          supplied.
      Λ:
        name: Non-Event
        critique_role: Structured absence under expectation.
        typical_realizations:
        - Promised follow-up does not occur.
        - Repeated silence after raised concerns.
        - Ambiguity sustained by not-deciding.
        case_application: >
          The meaningful absence is recognized authority. It is a PMS-relevant
          non-event only relative to a frame that expects authority to ground,
          ratify, or settle legitimacy; it is not automatically a defect in
          frames that do not require authority.
      Α:
        name: Attractor
        critique_role: Stabilized scripts that handle critique pressure without correction.
        typical_realizations:
        - Pile-on pattern.
        - Silence script.
        - Routine deflection.
        - Process-talk without outcome.
        case_application: >
          No critique-handling pattern is shown to stabilize. Claims, grants,
          and contestations may become recurrent scripts in later material, but
          the present case does not establish an attractor.
      Ω:
        name: Asymmetry
        critique_role: Exposure gradients.
        typical_realizations:
        - Public target vs. diffuse crowd.
        - Junior exposed under senior correction.
        - Raiser bears cost; manager bears less cost.
        case_application: >
          Asymmetry is possible but low-resolution. Legitimacy without
          recognized authority may distribute exposure, obligation,
          vulnerability, or recognition costs unevenly, but no parties or
          directions are specified.
      Θ:
        name: Temporality
        critique_role: Accumulation and irreversibility.
        typical_realizations:
        - Durable residue.
        - Repeated non-follow-up hardens silence norm.
        - No review windows; correction never consolidates.
        case_application: >
          Time, residue, repetition, and review windows are not supplied. Θ
          remains weak; no accumulation, hardening, delay, or durable critique
          trajectory can be claimed.
      Φ:
        name: Recontextualization
        critique_role: Reframing toward correction or substitute.
        typical_realizations:
        - Constraint context makes fix actionable.
        - Endless explanation expansion without action plan.
        - Reframing mismatch as tone problem.
        case_application: >
          Recontextualization is active conceptually: the case moves legitimacy
          out of a simple authority-grounded frame and into a frame where
          authority may be absent, refused, or contested. This bridges toward
          analysis, not toward correction, because Σ is not established.
      Χ:
        name: Distance
        critique_role: Stop-capability / interruptibility.
        typical_realizations:
        - Legitimate pauses and renegotiations.
        - Non-penalized meta-position.
        - Protected revision windows.
        case_application: >
          Stop-capability is maintained in the overlay application: the reading
          remains reversible, non-tribunal, non-sanctioning, and separable from
          verdict. Case-internal stop-capability remains under-specified because
          no concrete critique scene is supplied.
      Σ:
        name: Integration
        critique_role: Consolidation of a corrective step.
        typical_realizations:
        - Concrete fix, decision, or implementation unit.
        - Aligned meaning that becomes actionable.
        - Defined correction path with roles and constraints.
        case_application: >
          No corrective step consolidates. The case does not provide a decision,
          implementation unit, repair path, shared coordination, or integrated
          action result.
      Ψ:
        name: Self-Binding
        critique_role: Non-coercive trajectory ownership.
        typical_realizations:
        - Assigned responsibility points and scheduled review.
        - Audit loop or feedback loop.
        - Bounded escalation rules that remain reversible.
        case_application: >
          No follow-up is self-bound. There is no actor or institution binding
          itself to a correction trajectory over time; Ψ must not be converted
          into a demand that others accept the PMS-CRITIQUE framing.

  critique_projections:
    overview: >
      These critique-facing projections reuse the base PMS derived axes as
      readability aids for critique scenes. They do not redefine PMS formulas
      and do not create scoring, diagnosis, maturity labels, or person
      evaluation.
    reuse_status: overlay_level_reuse_of_base_PMS_derived_axes
    axes:
      Awareness_A:
        symbol: A
        formula:
        - Θ
        - □
        - Δ
        description: Sustained, framed differentiation across time.
        base_status: reuse_of_base_PMS_derived_axis
        case_application: >
          Critique-facing Awareness_A is weak: the case supports framed
          differentiation between legitimacy and authority, but it does not show
          sustained critique differentiation across time.
      Coherence_C:
        symbol: C
        formula:
        - Θ
        - Λ
        - □
        - ∇
        description: Narrative and expectation stability under time, framing, and non-events.
        base_status: reuse_of_base_PMS_derived_axis
        case_application: >
          Critique-facing Coherence_C is weak: response pressure, frame, and
          structured absence are present, but temporal stabilization is not
          supplied, and PMS coherence must not be treated as legitimacy or
          truth.
      Responsibility_R:
        symbol: R
        formula:
        - Ψ
        - Φ
        - Θ
        - Ω
        description: Bound follow-up ownership under asymmetry over time.
        base_status: reuse_of_base_PMS_derived_axis
        case_application: >
          Responsibility_R does not appear as established follow-up ownership.
          Ω and Φ are relevant, but Ψ and Θ are not supplied, so responsibility
          remains a later conditional question rather than a result.
      Action_E:
        symbol: E
        formula:
        - Σ
        - Θ
        - ∇
        description: Enactable correction rather than commentary.
        base_status: reuse_of_base_PMS_derived_axis
        docking_note: >
          Within PMS-CRITIQUE, E can function as a critique-internal bridging
          descriptor for correction reach. It is not thereby elevated into a
          separate MIP core parameter.
        case_application: >
          Action_E is under-specified. The case remains at conceptual
          interruption and reframing; it does not become enactable correction
          because Σ and Θ are not established.
      Dignity_in_Practice_D:
        symbol: D
        formula:
        - Ψ
        - Χ
        - Ω
        description: Restrained handling of asymmetry under self-binding.
        base_status: reuse_of_base_PMS_derived_axis
        case_application: >
          Dignity-in-Practice constrains the critique overlay by keeping the
          reading non-ranking, non-diagnostic, non-humiliating, reversible, and
          non-coercive under possible asymmetry. It is not treated as
          ontological dignity or moral superiority.
    projection_note: >
      These projections increase readability within this framework but do not
      prove exhaustive critique representation.

  critique_axes:
    overview: >
      PMS-CRITIQUE uses two descriptive axes: vertical reach and horizontal
      scale, plus publicness overlay P. Reach and scale are structural, not
      virtue, status, moral rank, or person quality.
    vertical_reach:
      selected_level: mixed
      levels:
        V0:
          name: Irritation only
          signature:
          - Δ
          description: Mismatch is registered but not interruptible or framed into a critique
            episode.
          case_application: >
            The case is not merely irritation because the mismatch is framed
            conceptually and held under application-level Χ. However, as a
            non-concrete scene, it retains some V0-like abstraction.
        V1:
          name: Reaction / discharge
          signature:
          - Δ
          - ∇
          description: Directional response without Χ; critique in the strict sense does not
            occur.
          case_application: >
            The case is not reaction or discharge. No impulsive enactment,
            affective expression, or non-interruptible response sequence is
            supplied.
        V2:
          name: Minimal critique
          signature:
          - Δ
          - □
          - Χ
          description: Interruption becomes possible inside a frame and remains revisable.
          case_application: >
            Minimal critique is weakly reached only at the level of overlay
            analysis: Δ, □, and Χ are visible, but no concrete critique episode
            demonstrates scene-internal interruptibility.
        V3:
          name: Productive critique
          signature:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          description: Recontextualization and integration consolidate a corrective step.
          case_application: >
            Productive critique is not reached as a case result because no
            Σ-level corrective step or coordinatable action path is supplied.
        V4:
          name: Stable critique
          signature:
          - Δ
          - □
          - Χ
          - Φ
          - Σ
          - Ψ
          description: Follow-up binding anchors correction into time without coercion.
          case_application: >
            Stable critique is not reached because no Ψ-level follow-up binding,
            review loop, or durable correction trajectory is supplied.
    horizontal_scale:
      selected_system: paper_tags
      selected_paper_tag: a
      selected_deployment_tag: not_applicable
      note: >
        A case may carry both a paper tag and a deployment tag, but the systems
        themselves remain paper_tags and deployment_tags. No additional scale
        system is introduced.
      paper_tags:
        a:
          label: Generic / Structural Critique (No Actor Binding)
          description: >
            Critique is treated as formal structural possibility. No actor, role,
            or scene is bound. Ω/Θ appear only as abstract parameters.
          case_application: >
            The case is best treated as generic or structural critique with no
            actor binding. Ω and Θ appear only as abstract parameters, and the
            analysis remains case-type-bound rather than scene-bound.
        b:
          label: Single-Subject Critique (Self / Support / Learning)
          description: >
            Critique is inwardly bound. The subject occupies both poles. Ω is
            internalized; Χ must be self-generated unless scaffolded. Ψ is
            optional but decisive for durable trajectory change.
          typical_drifts:
          - Under-questioning
          - Over-framing
          - Φ without Σ
          - Avoidance of Σ due to anticipated self-exposure costs
          case_application: >
            Single-subject critique is not applicable because no inwardly bound
            subject, self-support relation, or learning trajectory is supplied.
        c:
          label: Small Group Critique (Peers / Team / Family)
          description: >
            Critique becomes relational. Ω is distributed across roles; Χ is
            harder because interruption affects belonging and status. Λ becomes
            central; repeated Λ stabilizes Α scripts.
          typical_drifts:
          - Λ → Α silence script
          - Judgment drift in evaluative micro-hierarchies
          - Diffusion drift via unclear role space
          case_application: >
            Small-group critique is not applicable because no peers, team,
            family, meeting, or relational micro-frame is supplied.
        d:
          label: Public Critique (Street / Media / Online)
          description: >
            Critique often operates under maximal amplification: Ω gradients
            steepen, Θ hardens irreversibility, Α stabilizes quickly, Χ becomes
            fragile, Σ is costly, and Ψ is rare or substituted by performative
            alignment signals.
          typical_drifts:
          - Reaction drift under time pressure
          - Public pillory
          - Bystander paralysis → Λ persistence → silence attractor
          case_application: >
            Public critique is not applicable because no street, media,
            platform, crowd, audience, or public exposure scene is supplied.
      chapter_marker_quote_ready: >
        The operators stay the same, but scale decides the cost: as critique
        moves into publicness, exposure and irreversibility amplify drift without
        adding new structure.
      deployment_tags:
        dyadic_micro:
          label: dyadic / micro
          description: Small, direct interaction.
          case_application: >
            Not applicable. No dyadic or direct interactional scene is supplied.
        small_group_team:
          label: small group / team
          description: Teams, meetings, families.
          case_application: >
            Not applicable. No small-group, team, meeting, or family scene is
            supplied.
        org_institution:
          label: organization / institution
          description: Formal or semi-formal organizational contexts.
          case_application: >
            Not applicable as a deployment tag. Authority and legitimacy may be
            institutionally suggestive, but no organization, institution,
            jurisdiction, or role system is specified as a concrete scene.
        public_mass:
          label: public / mass
          description: Public or platform-amplified contexts.
          case_application: >
            Not applicable. No public-mass, media, platform, or crowd-amplified
            critique scene is supplied.
    publicness_overlay:
      applicability: not_applicable
      overlay_symbol: P
      is_operator: false
      amplifies:
      - Ω
      - Θ
      - Α
      does_not_create:
      - critique
      - correction
      - legitimacy
      case_application: >
        Publicness does not amplify critique, drift, exposure, or residue in
        this case. Any later public setting would require a separate scene-bound
        calibration of P as an overlay modulator rather than as a PMS operator.

  drift_typology:
    overview: >
      Drift labels are not accusations; they are operator-readable stabilization
      forms.
    methodological_status:
      type: open_structural_index
      note: >
        The drift typology is not exhaustive. Some cases may resist clean
        classification without this constituting mere deficiency.
    main_classes:
      D1:
        name: Reaction masquerading as critique
        applicability: not_applicable
        minimal_signature: Δ + ∇ present / Χ absent
        description: >
          Impulse discharge replaces interruption; expression is fast and
          non-interruptible.
        typical_markers:
        - tempo pressure substitutes for framing
        - no stop-capability once launched
        case_application: >
          Reaction drift is not active because the application maintains Χ and
          the case does not supply impulse discharge or non-interruptible
          response.
      D2:
        name: Judgment masquerading as critique
        applicability: risk
        minimal_signature: □ + Δ present / Φ and Σ absent, often Ω leveraged
        description: >
          Evaluation replaces coordination; labels stabilize clarity at the cost
          of actionability. In legitimacy cases, this drift can appear when the
          absence of recognized authority is treated as if it already settled
          legitimacy, illegitimacy, moral standing, or admissibility of the
          claim.
        typical_markers:
        - evaluation replaces correction path
        - exposure increases while actionability decreases
        case_application: >
          Judgment drift is a bounded risk because legitimacy contestation can
          become verdict-like if □ + Δ are used to label positions without Φ/Σ
          coordination. In this case, the risk would be overclaiming that
          legitimacy without authority is either already valid or already invalid
          merely because it is PMS-readable. The current overlay constrains this
          risk by refusing truth adjudication, legal judgment, moral ranking,
          person-ranking, and any conversion of the analysis into a legitimacy
          tribunal.
      D3:
        name: Narrative repair masquerading as critique
        applicability: risk
        minimal_signature: Φ high / Σ absent
        description: >
          Recontextualization becomes endpoint; explanation expands while
          correction remains unreachable. In a conceptual case, this can happen
          when the ability to redescribe the legitimacy problem is mistaken for
          having resolved the problem.
        typical_markers:
        - endless reframing
        - no consolidated corrective step
        case_application: >
          Narrative repair drift is a bounded risk because Φ is conceptually
          active while Σ is weak. Reframing legitimacy without authority could
          become explanation expansion without correction if each rival frame is
          absorbed as another PMS-readable recontextualization. The case does not
          show an active drift pattern, because no repeated reframing sequence or
          failed correction loop is supplied; the risk is therefore analytic and
          preventive, not diagnostic.
      D4:
        name: Commentary / analysis paralysis
        applicability: risk
        minimal_signature: Χ present / Σ absent
        description: >
          Meta-commentary stabilizes; interruption suspends correction
          indefinitely. The risk is not that distance is bad, but that distance
          becomes a substitute for specifying whether a concrete case requires
          action, further evidence, rival formalization, or abstention.
        typical_markers:
        - meta-position replaces integration
        - revision windows exist but never close
        case_application: >
          Commentary or analysis-paralysis drift is a bounded risk because Χ is
          maintained while Σ is absent. The overlay marks this as a risk of
          abstract analysis, not as a diagnosis or failure of any actor. In the
          present case, this risk is controlled by explicitly marking the case as
          non-concrete, withholding action and responsibility conclusions, and
          preserving operationalization requirements for any later applied use.
      D5:
        name: Public pillory
        applicability: not_applicable
        minimal_signature: Ω + Θ + Α under P, restraint collapsed
        description: >
          Exposure replaces coordination; interruption fuses with degradation.
        typical_markers:
        - visibility-as-sanction
        - irreversible residue fields dominate
        case_application: >
          Public pillory is not applicable because P is not active, public
          exposure is not supplied, and restraint has not collapsed.
      D6:
        name: Silence attractor
        applicability: not_applicable
        minimal_signature: Λ persistent, often Λ → Α, under Ω/Θ
        description: >
          Repeated non-intervention stabilizes as default; non-critique becomes
          the expected script.
        typical_markers:
        - non-event load accumulates
        - raising costs increase over time
        case_application: >
          Silence attractor is not applicable because no repeated
          non-intervention, persistent non-response, or stabilized silence script
          is supplied.
    compact_catalogue:
      C1_Reaction_Drift:
        minimal_signature: Δ + ∇ present / Χ absent
        applicability: not_applicable
        case_application: >
          Rejected for the current overlay because Χ is maintained and no impulse
          discharge is supplied.
      C2_Judgment_Drift:
        minimal_signature: □ + Δ present / Φ and Σ absent / Ω leveraged
        applicability: risk
        case_application: >
          Applied only as a bounded risk: □ + Δ are salient and Σ is absent, but
          Ω is not concretely leveraged and no verdict is issued.
      C3_Moralization_Drift:
        minimal_signature: Ω high / Χ collapsed
        applicability: not_applicable
        case_application: >
          Rejected because Ω is not high and Χ has not collapsed.
      C4_Narrative_Reset_Drift:
        minimal_signature: Φ high / Σ absent
        applicability: risk
        case_application: >
          Applied only as a bounded risk: Φ is salient and Σ is absent, so
          recontextualization could substitute for correction if overextended.
      C5_Commentary_Drift:
        minimal_signature: Χ present / Σ absent
        applicability: risk
        case_application: >
          Applied only as a bounded risk: Χ is present as application discipline
          while Σ is absent as case result.
      C6_Silence_as_Steering:
        minimal_signature: Λ persistent / Ω unacknowledged
        applicability: not_applicable
        case_application: >
          Rejected because Λ is present as authority absence, not as persistent
          silence under unacknowledged Ω.
      C7_Diffusion_Drift:
        minimal_signature: Ω distributed / □ unclear / Χ not triggered
        applicability: not_applicable
        case_application: >
          Rejected because Ω is not distributed across concrete roles and Χ is
          not absent.
      C8_Public_Pillory:
        minimal_signature: Ω + Θ + Α under P
        applicability: not_applicable
        case_application: >
          Rejected because P is not active and no public exposure or stabilized
          sanction field is supplied.
      C9_Integration_Bypass:
        minimal_signature: ∇ + Φ present / Σ bypassed
        applicability: risk
        case_application: >
          Applied only as a bounded risk: ∇ and Φ are present while Σ is not
          established, so integration bypass must be watched without being
          diagnosed.
      C10_Commitment_Evasion:
        minimal_signature: Σ partial / Ψ absent
        applicability: not_applicable
        case_application: >
          Rejected because Σ is not sufficiently established to make absent Ψ a
          commitment-evasion signature.
    typical_drift_chains:
      chain_public:
        applicability: not_applicable
        description: >
          Ω salience increases → Χ erodes → reaction stabilizes Α → Θ hardens
          residue.
        case_application: >
          The public drift chain does not appear because publicness, crowd
          exposure, fast stabilization, and residue hardening are not supplied.
      chain_narrative_to_silence:
        applicability: not_applicable
        description: >
          Φ inflation delays Σ until attention shifts → Λ repetition → silence
          stabilizes Α.
        case_application: >
          The narrative-to-silence chain is not established because there is no
          Φ inflation over time, no repeated Λ, and no stabilized silence
          attractor. Narrative repair remains only a bounded drift risk.

  modulators:
    overview: >
      Modulators are operator weightings that shift reachability and
      stabilization without adding new primitives. They are not person types and
      not prescriptions.
    selectivity_note: >
      These modulators are a selective set of recurrent weighting conditions
      legible in critique configurations, not a complete inventory of all
      possible scene-load variables.
    items:
      M1_frame_clarity:
        name: Frame clarity
        applicability: weak
        description: >
          How clearly □ defines who may interrupt, what counts as response, and
          what correction could be.
        case_application: >
          Frame clarity is partial. The philosophical frame is clear enough for
          PMS-CRITIQUE projection, but no scene frame defines who may interrupt,
          what counts as response, or what correction would be.
      M2_non_event_density:
        name: Non-event density
        applicability: weak
        description: >
          How often expected responses fail Λ and how much coordination shifts
          into absence.
        case_application: >
          Non-event density is weak. Recognized authority is absent as a
          conceptual Λ, but repeated missed responses or accumulated absences are
          not supplied.
      M3_asymmetry_visibility:
        name: Asymmetry visibility
        applicability: weak
        description: >
          Salience of exposure gradients Ω and status or retaliation risk in the
          scene.
        case_application: >
          Asymmetry visibility is weak. Possible exposure, obligation, or
          recognition gradients are structurally relevant but not concretely
          visible.
      M4_temporal_compression:
        name: Temporal compression
        applicability: not_applicable
        description: >
          Degree of time pressure versus availability of review windows Θ.
        case_application: >
          Temporal compression is not applicable because no urgency, time
          pressure, review window, or irreversible sequence is supplied.
      M5_recontextualization_habituation:
        name: Recontextualization habituation
        applicability: weak
        description: >
          Whether Φ is routinely used as bridge or becomes the default
          substitute.
        case_application: >
          Recontextualization is active conceptually, but there is no habituated
          use of Φ as either bridge or substitute across repeated scenes.
      M6_distance_availability:
        name: Distance availability
        applicability: weak
        description: >
          Whether Χ stop-capability is practically activatable without penalty
          inside the frame.
        case_application: >
          Distance is available in the overlay application, but practical
          scene-internal stop-capability is under-specified because no concrete
          frame is supplied.
      M7_attractor_inertia:
        name: Attractor inertia
        applicability: not_applicable
        description: >
          Speed with which scripts Α harden into default handling such as
          outrage, silence, mockery, or judgment.
        case_application: >
          Attractor inertia is not applicable because no critique script has
          hardened into default handling.
      M8_publicness_overlay:
        name: Publicness overlay
        applicability: not_applicable
        description: >
          P overlay amplifies Ω/Θ/Α and increases drift sensitivity without
          changing primitives.
        case_application: >
          The publicness overlay is not applicable because the case lacks public
          exposure, amplification, audience dynamics, or residue hardening.

  mip_docking_interface:
    status: optional
    purpose: >
      Optional controlled handoff from structural explanation PMS-CRITIQUE to
      explicit evaluation MIP when legitimacy, attribution, or regime conditions
      are the stated object.
    non_implication: >
      Docking does not imply that PMS-CRITIQUE naturally culminates in
      evaluation. PMS-CRITIQUE remains complete as a structural grammar without
      downstream docking.
    separation_rule:
      pms_critique_role: >
        Explains how critique emerges, stabilizes, drifts, and binds at the
        level of operator grammar.
      mip_role: >
        Evaluates enactments, attribution, and regime conditions under explicit
        criteria, documentation, and guardrails.
      non_substitution:
      - PMS-CRITIQUE must not be used to decide legitimacy.
      - MIP must not be used to explain critique emergence or mutation.
      - No back-projection of MIP verdicts into PMS causal language.
      - No retrofitting of PMS structures into evaluative scores.
    docking_points:
      DP1_projection_input:
        applicability: weak
        description: >
          PMS critique-facing projections A/C/R/E/D may serve as scene-bound
          inputs for MIP-style case description without becoming trait claims.
        case_application: >
          Projection input docking is weakly relevant only if a later evaluative
          framework needs the PMS A/C/R/E/D projection as scene-bound
          description. It is not triggered by the abstract case itself.
      DP2_asymmetry_evaluation:
        applicability: weak
        description: >
          PMS may describe asymmetry structurally; MIP may evaluate enactment of
          that asymmetry under its own explicit criteria.
        case_application: >
          Asymmetry evaluation docking is weakly relevant because legitimacy
          without authority may involve exposure or obligation gradients, but no
          concrete asymmetry is available for evaluation.
      DP3_regime_publicity_constraint:
        applicability: not_applicable
        description: >
          Publicness and transmission conditions may be imported as explicit
          admissibility constraints for evaluative use.
        case_application: >
          Regime or publicity docking is not relevant because no publicness,
          transmission regime, legal regime, or institutional publicity condition
          is supplied.
      DP4_shared_critique_readiness:
        applicability: weak
        description: >
          Docking is valid only when structural explanation and evaluation
          remain documented, reversible, bounded, and non-weaponizable.
        case_application: >
          Shared critique-readiness is weakly relevant as a guardrail only. The
          overlay remains documented, reversible, bounded, and non-weaponizable,
          but no shared scene demonstrates such readiness.

  limits_and_boundedness:
    structural_limits:
    - Does not establish truth.
    - Does not verify motives, sincerity, or inner states.
    - Does not adjudicate moral rightness.
    - Does not rank persons, roles, or groups.
    - Does not function as clinical, forensic, HR, compliance, or sanctioning tool.
    - Does not dissolve accountability into 'just structure'.
    - Does not promise exhaustive capture of lived experience, normative disagreement, or
      social reality.
    genuine_non_capture:
      status: kept_open
      possible_when:
      - the grammar produces a coherent reading but weakens what is structurally decisive in
        the case
      - critique functions more as symbolic refusal, public rupture, ethical contestation,
        or resistance than as correction-oriented coordination
      - rival framings preserve dimensions that PMS-CRITIQUE backgrounds by design
      anti_absorption_rule:
      - Do not prematurely redescribe resistant cases as mere drift.
      - Do not treat resistant cases as calibration noise by default.
      - Do not treat incomplete capture as proof that the scene is defective.
      case_application: >
        Non-capture remains open where legitimacy functions as symbolic refusal,
        moral contestation, legal-political status, recognition practice,
        anti-authoritarian stance, theological or communal authorization, or
        public rupture rather than correction-oriented critique. PMS-CRITIQUE
        must not absorb such resistance as drift by default.
    rival_framings:
      status: kept_open
      note: >
        Rival critique grammars remain methodologically open. PMS-CRITIQUE may
        be more structurally legible in some cases without thereby being superior
        in all respects.
      case_application: >
        Open rival critique grammars include discourse ethics, recognition
        theory, legal-political legitimacy theory, rhetoric and argumentation
        theory, anti-authoritarian critique, deconstructive refusal,
        institutional analysis, and moral philosophy accounts that treat
        legitimacy as normatively prior to critique grammar.
    final_boundedness_statement: >
      Nothing in this overlay requires PMS-CRITIQUE to be treated as final,
      exhaustive, or uniquely sufficient. Its strength remains most credible
      where its own limits, rival framings, and possible non-capture cases are
      kept explicit.

  guardrails:
    application_gate:
      required:
      - Χ + reversibility + D is a validity constraint on PMS application, not on critique,
        refusal, revision, or rejection.
      - Χ remains practically activatable; stop-capability is real, not merely formal.
      - 'Reversibility: readings remain scene-bound and revisable; Θ accumulation is treated
        as real.'
      - 'Dignity-in-Practice: no shaming, humiliation, or actor-ranking; critique stays structural.'
      - Applications remain scene-bound rather than person-bound.
      disallowed_uses:
      - Person-labeling, motive attribution, psychological diagnosis.
      - Verdict logic as an output of the model.
      - Coercive binding Ψ→Other, threats, or exposure-as-punishment.
      - Using drift labels as sanctions rather than structural descriptors.
      - Using structure-talk to suspend accountability where responsibility was structurally
        available.
      - Treating resistant cases as invalid merely because they exceed this grammar.
      case_application: >
        The gate is preserved by keeping the overlay subordinate to the
        completed PMS Core pass, maintaining Χ, reversibility, and D, refusing
        verdict logic, and marking drift categories as conditional structural
        risks rather than accusations or person labels.
    dignity_in_practice:
      status: maintained
      note: >
        D constrains application mode, not content: analysis must not become a
        pile-on and must preserve restraint even when Ω or P are high.
      invalidity_clause: >
        Critique becomes structurally invalid as a PMS-CRITIQUE enactment when
        degradation, humiliation, or exposure steering replaces correction.
      case_application: >
        Dignity-in-Practice is preserved by refusing shaming, humiliation,
        exposure steering, moral ranking, diagnosis, and coercive binding. The
        overlay critiques only structures and threshold reach, not persons or
        positions.
    misuse_signatures_to_flag:
      chi_as_coercion:
        signature: Using Χ-language to demand compliance.
        status: absent
        case_application: >
          Χ-language does not drift into coercion. Distance is used to preserve
          reversibility and stop-capability, not to demand compliance.
      exposure_as_correction:
        signature: Treating public exposure as correction; P substituted for Σ/Ψ.
        status: absent
        case_application: >
          Exposure is not substituted for correction because no publicness or
          exposure mechanism is supplied and Σ is not faked through visibility.
      drift_labels_as_moral_rank:
        signature: Turning drift labels into moral rank tokens.
        status: absent
        case_application: >
          Drift labels are not used as moral rank tokens. They remain conditional
          structural risks and several are rejected as not applicable.
      scene_to_person_typing:
        signature: Collapsing scene-bounded critique into person-typing.
        status: absent
        case_application: >
          Scene descriptors do not become person labels. The case contains no
          persons and the overlay remains case-type-bound.
      irreversible_binding_demands:
        signature: Using drift language to justify irreversible binding demands.
        status: absent
        case_application: >
          Drift language is not used to justify coercive or irreversible binding.
          Ψ remains unavailable and is not converted into a demand on others.
      explanation_neutralizes_accountability:
        signature: Using explanation-first language to neutralize accountability.
        status: risk
        case_application: >
          There is a bounded risk that structural explanation could neutralize
          accountability if applied to a concrete case without evaluating
          responsibility. The current overlay controls this by refusing concrete
          responsibility claims and marking MIP docking as optional rather than
          triggered.
      evaluation_bypasses_structure:
        signature: Using evaluation-first labels to bypass structural explanation.
        status: absent
        case_application: >
          Evaluative labels do not bypass structural explanation. The overlay
          does not adjudicate legitimacy, correctness, truth, motives, or moral
          rightness.

