    - scale
    optional_fields_reference:
    - impulse_pressure (∇)
    - non_event_candidates (Λ)
    - drift_class
    - two_drift_markers_max
    - cost_distribution (Ω/Θ)
    - publicness_overlay (P) note
    - reach_level (V0–V4)
    - modulators (M1–M8)
    - projection_notes (A/C/R/E/D)
    - non_capture_flag
    constraints:
    - Roles, practices, constraints only; no person-typing or motives.
