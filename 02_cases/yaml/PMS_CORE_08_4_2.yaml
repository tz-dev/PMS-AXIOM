operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Δ is the primary entry point: the case is analyzable because it distinguishes interpretable or explainable structure from what remains real in practice."
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "The relevant distinction is between interpretability or explanation and practical remainder, not between true and false persons or mature and immature agents."
      - "The distinction is abstract and must not be conflated with a metaphysical split between appearance and reality unless a separate non-PMS argument supplies that claim."
    falsifier_conditions:
      - "If the case cannot sustain a stable distinction between explanation and practical remainder, the PMS reading loses its entry point."
    non_capture_note: "Difference does not by itself prove that PMS captures the case."
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "∇ is weakly present as the conceptual pressure to understand morally difficult situations when explanation does not coincide with practice. It is not read as subjective desire."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "The tension is philosophical and structural: a pressure toward intelligibility, not an observed affect, intention, or agency claim."
      - "No psychological drive or motivation is inferred because the case contains no actor or concrete scene."
    falsifier_conditions:
      - "If no directional pressure toward understanding, explanation, or resolution is part of the case framing, ∇ should be removed or left under-specified."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "□ is active because the case depends on a frame in which interpretation, explanation, moral difficulty, practical reality, and non-coincidence become relevant."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is a philosophical-praxeological frame concerning interpretation versus practical remainder in morally difficult situations."
      - "Any shift from philosophical frame to empirical, legal, metaphysical, clinical, or implementation frame must be explicitly marked and is not currently warranted."
    falsifier_conditions:
      - "If no stable interpretive or praxeological frame is specified, the analysis becomes too abstract to discriminate beyond a loose theme."
    non_capture_note: "A frame can clarify a case without exhausting it."
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Λ is active as the possible structured absence of coincidence between what can be explained and what remains real in practice."
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence is coincidence between intelligible explanation and practical reality; the case marks that expected coincidence as absent or incomplete."
      - "The gap may be a PMS-legible non-event, but it may also mark genuine non-capture rather than a defect to be integrated."
    falsifier_conditions:
      - "If there is no expectation that interpretation and practice should coincide, Λ should be weakened because the case would no longer center on meaningful absence."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Α is weak. The case does not show recurrence, but it carries a risk that explanatory framing could stabilize into a habitual substitute for practical reality."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "No recurrent pattern is evidenced; any attractor claim is only a possible risk of repeated explanatory substitution."
      - "A stable attractor would require repeated scenes or documented pattern formation, neither of which is provided."
    falsifier_conditions:
      - "If no recurrence, stabilization, or path dependence is supplied by later case material, Α must remain weak or not active."
    non_capture_note: "Pattern formation is not proof of explanatory sufficiency."
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ω is weak and conditionally relevant. Morally difficult situations often involve exposure, vulnerability, power, capacity, or obligation, but this case names none concretely."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "No direction of asymmetry is specified; Ω can only mark a possible moral-structural background, not an established imbalance."
      - "Asymmetry is not moralized; it is not blame, superiority, inferiority, or legal responsibility."
      - "Ω remains weak unless concrete scene material identifies who is exposed, obligated, empowered, or constrained."
    falsifier_conditions:
      - "If no directional imbalance of power, exposure, capacity, or obligation is identifiable, Ω claims must be removed or retained only as a non-asserted condition."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Θ is weak and conditionally relevant. 'Remains real in practice' suggests persistence beyond explanation, but no temporal sequence or trajectory is provided."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "The case offers persistence as a conceptual possibility, not a diachronic scene or developmental arc."
      - "Temporality becomes active only if later material shows sequence, delay, enduring consequence, anticipation, or trajectory."
    falsifier_conditions:
      - "If the case is only a static contrast between concepts with no persistence or sequence, Θ is overextended."
    non_capture_note: "Temporality in PMS does not by itself settle metaphysical or empirical continuity."
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Φ is active as interpretation and explanation are forms of placing morally difficult practical reality into an intelligible frame."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The source field is morally difficult practical reality; the target frame is interpretation or explanation. The reverse frame, practice resisting interpretation, must also remain available."
      - "Φ must clarify how framing changes legibility without absorbing non-fit or converting every remainder into a PMS-readable defect."
    falsifier_conditions:
      - "If every remainder, rupture, disagreement, or rival framing is absorbed as recontextualization, the reading becomes over-assimilative and invalid as a disciplined PMS application."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Χ is active and required as the analytic stance: the PMS reading suspends verdict, avoids enforcement, and keeps distance between structural interpretation and reality-claim."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The analysis must preserve reversibility, non-finality, and non-person-ranking; this is the main calibration point for the case."
      - "Χ is reflective restraint, not avoidance, denial, indifference, or empty neutrality. It permits analysis while refusing closure."
    falsifier_conditions:
      - "If Χ is suspended in order to force a verdict that PMS captures reality, resolves the moral difficulty, or ranks actors, the PMS application is invalid."
    non_capture_note: "Distance protects against overclaiming and premature closure."
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Σ is weak and risky. The case explicitly warns that interpretive coherence may not equal practical reality, so integration cannot be claimed as resolution."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Any integration must be tested for discriminative force rather than narrative smoothness."
      - "PMS coherence is insufficient by itself; a coherent formula may still under-discriminate or over-assimilate the practical remainder."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, reality capture, maturity, or successful resolution, Σ is overclaimed."
    non_capture_note: "PMS coherence is insufficient by itself."
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ψ is weak and analytic-only. No case agent is specified; self-binding applies primarily to the analyst’s discipline in maintaining PMS guardrails."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Ψ is applied only as analytic self-binding: commitment to restraint, reversibility, and non-capture in the use of PMS."
      - "No selfhood, identity, stable normativity, or responsibility-as-self-commitment is attributed to a person, institution, or abstract case object."
    falsifier_conditions:
      - "If Ψ is used to infer subjectivity, identity, moral worth, or responsibility without Σ, Θ, Χ and a concrete agent, the self-binding reading is under-specified."
    non_capture_note: "SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: "Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns."
    case_function: "L1 structures the abstract entry into the case: Δ separates explanation from practical remainder, ∇ gives weak pressure toward intelligibility, □ frames the moral-philosophical question, Λ marks the absent coincidence, and Α remains only a weak risk of stabilized explanatory substitution."
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: "Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments."
    case_function: "L2 is weak. Ω and Θ are relevant to morally difficult praxis only conditionally because the case material does not identify a directional imbalance or temporal sequence, although practical remainder may imply persistence and exposure."
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: "Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis."
    case_function: "L3 carries the main analytic work: Φ names explanatory reframing, Χ protects distance and reversibility, and Σ is deliberately weakened so that coherence does not become a substitute for reality."
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: "Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts."
    case_function: "L4 is analytic-only. Ψ binds the PMS application to restraint and non-capture; it is not applied as a self-model of any case actor."

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Χ"
    - "Φ"
    - "Λ"
    - "□"
    - "Δ"
  chain_formula: "Χ ∘ Φ ∘ Λ ∘ □ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Satisfied by the stable conceptual contrast between interpretable or explainable structure and practical remainder."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Weakly satisfied by the case’s structural pressure toward understanding morally difficult situations; no subjective drive is inferred."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Satisfied by the philosophical-praxeological frame that constrains what counts as interpretation, explanation, reality, and practice."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Satisfied by the expected-but-incomplete coincidence between explanation and practical reality within that frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Weak only; recurrence or stabilization is not shown, except as a possible risk that explanation becomes a stable substitute for practice."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Weak only; moral difficulty may involve asymmetry, but no directional power, vulnerability, capacity, or obligation is specified."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Weak only; practical remainder suggests possible persistence, but no sequence, delay, or trajectory is supplied."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Active as explanatory reframing, but dependency support through Ω and Θ remains weak because the case is non-concrete."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Active as analytic distance; dependency support is sufficient for application discipline but not for a concrete scene verdict."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Weak; integration is not asserted as resolution because PMS coherence is insufficient by itself."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Analytic-only; self-binding governs the analyst’s PMS use, not an attributed self-model in the case."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

