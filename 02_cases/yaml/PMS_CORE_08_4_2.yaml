core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: "PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological essences."
    status: "satisfied"
    case_application: "The case is treated as a structure of praxis-under-interpretation: a relation between explanatory frames and practical remainder. No person essence, inner psychology, consciousness claim, or ontology of reality is inferred."
    failure_condition: "The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings."
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: "The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal generative basis for praxis, while completeness and unique optimal order remain open to critique."
    status: "satisfied"
    case_application: "Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ is used as PMS operators. No new operators, axes, layers, or PMS Base add-ons are introduced."
    failure_condition: "The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged to PMS Base."
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: "PMS derives awareness, coherence, responsibility, action, dignity-in-practice, and asymmetry drift patterns from operator compositions rather than treating them as independent primitives."
    status: "satisfied"
    case_application: "Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and the asymmetry drift patterns are treated as formula-derived PMS structures, not as independent axioms or primitive case facts."
    failure_condition: "The analysis would fail P3 if derived structures were treated as independent axioms."
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: "Asymmetry (Ω) and temporality (Θ) are central structural operators in PMS."
    status: "partial"
    case_application: "Ω and Θ are kept visible but weak. Moral difficulty suggests possible exposure or obligation, and 'remains real in practice' suggests persistence, but the case provides no concrete imbalance, sequence, or trajectory."
    failure_condition: "The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without calibration."
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: "PMS may be represented computationally, but representation does not by itself imply implementation, interoperability, or explanatory adequacy."
    status: "satisfied"
    case_application: "This YAML is a formal case rendering only. It is not an implementation, not an empirical model, not a computational validation, and not a proof of PMS adequacy."
    failure_condition: "The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational sufficiency."
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: "PMS remains open to comparison with alternative grammars, sharper discriminative models, or more empirically grounded formalisms."
    status: "satisfied"
    case_application: "Rival readings remain open, including epistemic-humility, moral-remainder, anti-formalist, praxis-priority, phenomenological, hermeneutic, and pragmatic readings."
    failure_condition: "The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default."
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: "Translation of a phenomenon into PMS terms does not prove exhaustive capture."
    status: "satisfied"
    case_application: "The practical reality that remains after interpretation is preserved as a possible non-capture zone and is not automatically redescribed as drift, incomplete calibration, incomplete integration, or failed maturity."
    failure_condition: "The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure."
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: "PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions."
    status: "satisfied"
    case_application: "No diagnosis, trait attribution, competence judgment, clinical risk assessment, forensic conclusion, or person-ranking is drawn from the case."
    failure_condition: "The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis."
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: "Any PMS application must keep findings tied to specific praxeological scenes, roles, and structures; global person-labels and irreversible ontological attributions are out of scope."
    status: "partial"
    case_application: "Because no concrete scene is provided, the analysis is explicitly case-type-bound rather than scene-bound. Any later concrete application would require actors, roles, sequence, asymmetry, expectations, and enacted consequences."
    failure_condition: "The analysis would fail P9 if it presented this abstract conceptual projection as a concrete scene verdict."

