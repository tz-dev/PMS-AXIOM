derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A>>E"
    - "AD_Sigma_low"
  usage_rule: "Derived structures are used only through PMS.yaml formulas and are not treated as independent axioms."
  rule: "Dignity-in-Practice is a praxeological application constraint, not ontological dignity or moral superiority."
  case_status: "Derived structures are considered only as formula-based projections. Awareness_A and Coherence_C are weak; Responsibility_R is not established; Action_E is under-specified; Dignity_in_Practice_D is an application constraint; SELF_FIXPOINT is analytic-only or not applicable to the case object."

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: "Awareness is modeled structurally, not phenomenologically."
    case_reading: "Awareness_A is weakly projected as sustained framed differentiation between interpretation and practical remainder. It lacks strong Θ because no temporal scene is provided."
    status: "weak"
    calibration_points:
      - "Differentiate interpretability from practical remainder within the philosophical-praxeological frame, while treating temporal maintenance as weak and not empirically shown."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: "Coherence captures narrative stability without proving truth, validity, or integration."
    case_reading: "Coherence_C is weak and contested. The case is about the risk that explanatory coherence may not coincide with practical reality, so coherence must not be treated as truth or adequacy."
    status: "weak"
    calibration_points:
      - "Coherence must be distinguished from truth, adequacy, validation, forced integration, and narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: "Responsibility is structural rather than moralistic in PMS and is not legal liability or blame."
    case_reading: "Responsibility_R is not established because no agent, obligation, asymmetry, temporal commitment, or self-binding is given. It may become relevant only in a later concrete scene."
    status: "not_applicable"
    calibration_points:
      - "Before claiming Responsibility_R, identify Ω, Θ, Φ, and Ψ in a concrete scene without converting moral difficulty into blame or legal liability."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into a coherent enactment."
    notes: "Action here is not any behavior; it is integrated and temporally extended."
    case_reading: "Action_E is under-specified. The case concerns understanding and framing, not integrated realization of directedness across time through a concrete act."
    status: "under_specified"
    calibration_points:
      - "Distinguish practical action from explanation, interpretation, conceptual assertion, or abstract moral concern."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: "Dignity-in-practice concerns how asymmetry is handled, not the ranking of persons or ontological worth."
    case_reading: "Dignity_in_Practice_D functions as an application constraint: the analysis must not rank persons, shame, diagnose, impose closure, or erase vulnerability under possible asymmetry."
    status: "application_constraint"
    calibration_points:
      - "Maintain restraint under possible asymmetry without treating D as ontological dignity or moral superiority."
    non_capture_note: "D is a praxeological application constraint, not an ontological or moral superiority claim."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: "Formal representation of self-binding as the result of integrated, reflexively modulated, temporally extended, asymmetry-aware patterns of praxis being bound into a relatively stable self-relation."
  case_reading: "SELF_FIXPOINT is not the primary structure of the case because the material provides no self-relation, identity trajectory, or agent commitment. It is relevant only as an analytic reminder that PMS application itself must remain self-bound to Χ, reversibility, and non-capture."
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: "This sequence records one derivational strategy within PMS and must not be read as proving that all forms of selfhood, agency, identity, or case structure reduce without remainder to this chain."
  non_capture_note: "SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions as literal subjectivity unless explicitly scoped as structural self-binding or analytic self-binding."

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: "PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms. They are not automatically entailed by a case and must not be treated as diagnoses, person-types, or moral verdicts."
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: "Evaluative or power asymmetry becomes stabilized through attractor formation, while recontextualization reinforces drift toward evaluation rather than supporting integrative transformation and balanced enactment."
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: "AD_A>>E remains only a risk: interpretive awareness could become over-expanded while enactment remains suppressed or absent, but the case supplies no concrete action axis, recurrent pattern, or asymmetry sufficient to assert the drift pattern."
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: "This is not a personality trait, diagnosis, person-label, clinical state, or moral judgment."
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: "Frequent recontextualization without sufficient integration can lead to unstable trajectories and weak coherence of praxis, especially under asymmetrically loaded praxis conditions."
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: "AD_Sigma_low remains only a risk: repeated reframing without integration could fragment praxis, but the case may instead mark legitimate non-capture. It must not be inferred from non-fit alone."
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: "This pattern describes structural volatility in action forms, not a clinical state, diagnosis, or person-type."

