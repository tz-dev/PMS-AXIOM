  meta_notes:
    bias_risks:
      confirmation_bias: The analyst may see epistemic injustice everywhere once the credibility frame is activated.
      hindsight_bias: A later-known label such as epistemic injustice may make the structural wrong look more obvious than it was to participants at the time.
      status_quo_loyalty_bias: Existing credibility norms may be treated as neutral because they are familiar or institutionally stabilized.
      halo_horn_effects: Affected participants or frame-holders could be idealized or demonized if the analysis became person-focused.
      in_group_out_group_bias: Shared-understanding frames may privilege insiders' speech styles, concepts, credentials, or interpretive norms.
      dignity_bias_effect: Dignity language can protect against degradation, but it can also intensify shame or moral pressure if used without guardrails.
    norm_assumptions:
      explicit_norms:
      - People should not be reduced to person labels or dignity scores.
      - Credibility and interpretation should be handled with reversibility and review.
      - MIP scoring must not occur without adequate role, time, evidence, and power information.
      - D0 remains inviolable and outside analysis.
      implicit_norms:
      - Participation in shared understanding matters as a protected praxis good.
      - Non-uptake can be morally significant but is not automatically unjust.
      - A coherent structural explanation must still be discriminating.
      - Refusal and non-capture may be legitimate.
      dignity_concepts:
      - D0 as untouched ontological dignity.
      - D1/D2 only as dignity in practice if a safe, concrete frame exists.
      - Dignity protection as guardrail, not ranking.
      normative_position_of_D_reading: D is not activated as a profile. The analysis uses D only to protect against humiliating, ranking, or public person-level readings.
    intuition:
      initial_intuition: The case intuitively fits MIP because epistemic injustice involves awareness, coherence, responsibility, power-to-act, asymmetry, and possible dignity-in-practice concerns.
      used_as_sensor_not_judge: true
      checked_afterwards: true
      supporting_evidence: The PMS Core and PMS-CRITIQUE analyses already identified frame, asymmetry, recontextualization, distance, weak integration, non-capture, and no concrete scene.
      contradicting_evidence: The abstract case lacks the scene evidence required for A-score, M-score, IA-box conclusion, D-module activation, or practical intervention.
    possible_alternative_interpretations:
    - Ordinary disagreement rather than epistemic injustice.
    - Legitimate evidentiary caution rather than credibility injustice.
    - Conceptual mismatch rather than wronging.
    - Hermeneutical injustice requiring non-MIP vocabulary.
    - Political-structural or sociological account requiring empirical grounding.
    - Speech-act account focused on uptake.
    - Legal-forensic account requiring jurisdiction-specific evidence.
    - Non-capture reading in which the PMS/MIP grammar is only partially adequate.
    counter_perspective:
      from_other_side: A frame-holder might argue that non-uptake reflects evidence standards, relevance limits, time constraints, or legitimate disagreement rather than injustice.
      from_affected_side: An affected participant might argue that the very demand for scene evidence can reproduce non-uptake if lived epistemic harm is repeatedly postponed or proceduralized.
      from_external_observer: An external observer might find the MIP reading useful for guardrails but insufficient for moral, political, historical, or empirical explanation.
  open_questions_and_blind_spots:
    missing_information:
    - Who is the affected epistemic participant?
    - Who or what holds the credibility or interpretation frame?
    - What exactly was said, ignored, misread, or excluded?
    - What was the expected uptake or response?
    - Was the non-uptake repeated, public, institutional, or reversible?
    - What protected goods and risks are active?
    - What alternatives or correction paths were available?
    uncertain_assumptions:
    - That epistemic injustice is the best framing rather than disagreement, evidentiary caution, or conceptual mismatch.
    - That asymmetry is structurally active rather than merely conceptually possible.
    - That non-uptake is wrongful rather than legitimate or ambiguous.
    - That MIP adds discriminative value beyond PMS Core and PMS-CRITIQUE without over-smoothing.
    weak_points_in_analysis:
    - No concrete A-band or M-band can be assigned.
    - IA-box cannot be adjudicated.
    - D-module cannot be safely activated.
    - Power-to-act remains mostly analytic rather than practical.
    - The analysis may appear more complete than the evidence permits.
    needed_perspectives:
    - Affected participant perspective, if safe and voluntary.
    - Frame-holder or listener perspective.
    - Institutional or cultural context perspective, if applicable.
    - Domain expert perspective in philosophy, sociology, law, ethics, or communication depending on later use.
    - External reviewer checking for overclaim and non-capture.
  possible_steps_towards_maturity:
    decision_mode: conceptual_working_note; no intervention, scoring, or transmission as decision basis
    functional_next_step:
      action: If the case is to move beyond conceptual analysis, specify one concrete scene with roles, frame, expected uptake, evidence, time window, publicness, available alternatives, and review path.
      reversible: true
      responsible_role: future analyst or case provider
    short_term_feasible:
    - Keep the current analysis private and conceptual.
    - State clearly that no A-score, M-score, IA verdict, D-profile, or legal/clinical finding is assigned.
    - Use the analysis as a checklist for what a concrete case would need to supply.
    medium_term_feasible:
    - Develop a scene-specific IA-box only if concrete evidence appears.
    - Compare MIP reading with hermeneutical, speech-act, political, sociological, and legal readings.
    - Create a reversible response or review design that protects affected voice without forcing agreement.
    overambitious_or_risky:
    - Using MIP to declare that epistemic injustice occurred.
    - Assigning maturity bands or responsibility bands to abstract roles.
    - Activating the D-module publicly or without safe frame.
    - Treating critique-readability as proof of wrongdoing or as required repair path.
    protection_first_if_low_M_high_harm:
    - If a later scene shows high harm but low M due to low predictability or few alternatives, prioritize protection and repair rather than blame.
    - Do not increase M because someone feels shame, guilt, or pressure.
    structural_change_if_high_M:
    - If a later scene shows high knowledge, control, predictability, alternatives, and failed integration, focus on structural uptake procedures, review loops, and accountability without person-ranking.
    - Ensure any change is transparent, justified, time-bound, reversible, and dignity-protective.
