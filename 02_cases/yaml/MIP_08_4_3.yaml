schema_version: MIP_Maturity_in_Practice_v3.0_blocks_appendices_aligned
schema_role: mip_case_application
file_name: MIP - Maturity in Practice.yaml
analysis_mode: full
reflection_mode: 'off'
language: en
case_title: Epistemic Injustice
mip_status: application_profile_only
base_and_overlay_relationship:
  pms_yaml: sole_PMS_Base_reference
  pms_critique_yaml: overlay_application_profile_only
  mip_yaml: maturity_in_practice_application_profile
  completed_pms_core_case_yaml: source_case_analysis_not_PMS_Base
  completed_pms_critique_overlay_yaml: source_overlay_analysis_not_PMS_Base
  no_pms_operator_redefinition: true
  no_pms_dependency_change: true
  no_core_pass_rewrite: true
mip_application_boundary:
  not_a_concrete_scene: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  clinical_claim: false
  implementation_claim: false
  pms_base_validation: false
  mip_score_overclaim: false
  D_module_activated: false
case:
  meta:
    case_id: MIP-EPISTEMIC-INJUSTICE-001
    case_title: Epistemic Injustice
    documentation_date: '2026-05-28'
    analysts:
    - name: ChatGPT
      role: formalization_assistant
      observer_position: External structural analyst applying MIP to prior PMS Core and PMS-CRITIQUE case analyses without claiming empirical, legal, diagnostic, or metaphysical authority.
    language: en
    confidentiality_level: internal
    analysis_mode: full
    intended_use: philosophy_anthropology; structural reflection on a conceptual case, not concrete adjudication
    application_zone: green
    interaction_profile:
      reflection_mode: 'off'
      d_module_preference: auto
      output_format: yaml
      discipline_profile: philosophy_anthropology
      d_activation_decision: D_module_not_activated; D_used_only_as_protection_signal_and_boundary
      transmission_default: working_note_until_checked
  guardrails:
    profile_not_person: true
    focus_on_roles_structures_enactments: true
    minimal_adulthood_checked: true
    analyst_self_implication_acknowledged: true
    system_axiom_applied: true
    use_context:
      roles_clarified: true
      observer_position_clarified: true
      information_basis_clarified: true
      analysis_purpose_clarified: true
      publicness_clarified: true
    red_zone_check:
      clinical_diagnostics: false
      therapy_planning: false
      forensics: false
      individual_HR_decisions: false
      child_youth_diagnostics: false
      public_pillory_or_ranking: false
      online_shaming_or_doxing: false
      humiliation_diagnostics: false
      public_D_readings_of_identifiable_persons: false
      any_red_zone_touched: false
      if_any_true: do_not_apply_model
    dignity_protection:
      D0_untouched: true
      D1_D2_enactments_only: true
      no_dignity_score: true
      no_person_labels_from_D: true
      D_default_off: true
      D_activated: false
      if_D_activated_guardrails_checked: false
      if_D_creates_more_shame_than_clarity: dial_D_down
    score_hygiene:
      A_score_band_not_person_score: true
      M_score_shared_responsibility_not_guilt: true
      D_profile_not_dignity_score: true
      IA_box_not_verdict: true
    tragedy_clause_considered: true
    misuse_as_own_finding_acknowledged: true
  information_basis:
    primary_material: 'Abstract case material: morally difficult situations in which people are wronged in their capacity as knowers, interpreters, or credible participants in shared understanding.'
    secondary_material: Completed PMS Core case YAML and PMS-CRITIQUE overlay for Epistemic Injustice. PMS.yaml remains PMS Base; PMS-CRITIQUE.yaml and MIP are overlay/application profiles only.
    assumptions_and_inferences: 'The analysis infers only conceptual role structures: affected knower/interpreter/participant, frame-holder or listener, shared-understanding field, possible credibility asymmetry, possible non-uptake, and possible critique-readability. It does not infer concrete actors, empirical occurrence, legal liability, clinical status, motives, guilt, or person maturity.'
    distinction_material_vs_inference_clear: true
    quality_and_limits:
      coverage_estimate: High for conceptual structural reflection; low for concrete scene adjudication.
      reliability_estimate: Reliable only as bounded MIP overlay analysis grounded in the supplied abstract case and prior PMS/PMS-CRITIQUE analyses; not reliable as empirical, legal, clinical, or implementation finding.
      known_gaps:
      - No concrete scene, actors, institution, timeline, jurisdiction, evidence base, or enacted response.
      - No observed publicness, recurrence, repeated non-uptake, correction attempt, review loop, or follow-up binding.
      - No affected-party testimony, counterparty account, external evidence, or domain-specific empirical validation.
      main_bias_risks_here:
      - 'Coherence bias: the case fits MIP and PMS vocabulary too smoothly.'
      - 'Moralization bias: the phrase epistemic injustice may be mistaken for adjudicated wrongdoing.'
      - 'Projection bias: abstract structures may be read as if a concrete wrong had already been proven.'
      - 'Dignity bias: dignity language may intensify moral pressure if not kept as protected qualitative boundary.'
  snapshot:
    short_case_description: A philosophical conceptual case concerning how morally difficult situations should be understood when people are wronged in their capacity as knowers, interpreters, or credible participants in shared understanding. The case is not a concrete praxis scene and supplies no actors, evidence, timeline, institution, or remedial process.
    central_actors_and_roles:
    - 'Affected epistemic participant: the role of a person or group whose knowing, interpretation, or credibility may be discounted.'
    - 'Frame-holder or listener: the role that grants, withholds, filters, or structures uptake within shared understanding.'
    - 'Shared-understanding field: the relational, institutional, cultural, or discursive context in which credibility and interpretation become meaningful.'
    - 'Analyst role: the MIP observer translating the completed PMS Core and CRITIQUE analyses into maturity-in-practice terms without adjudicating truth.'
    guiding_question: What does MIP make visible about maturity in practice when a case is only conceptually critique-readable as epistemic injustice, but lacks the concrete evidence needed for scoring, responsibility attribution, IA adjudication, or D-module activation?
    level:
    - conceptual
    - philosophical
    - structural
    - non-concrete
    - case-type-bound
    first_visible_asymmetry: Possible asymmetry in credibility, interpretive authority, participation standing, and capacity to define what counts as shared understanding.
    first_visible_D_themes_optional:
    - 'Possible D2 relational dignity theme: whether participants are treated as credible contributors rather than degraded or excluded epistemic objects.'
    - Possible D-P public dignity theme only if a later concrete public scene is supplied; currently not activated.
  role_mapping:
    object_of_observation:
      type: conceptual_case_structure
      description: The object of observation is the structured case-type Epistemic Injustice as already analyzed through PMS Core and PMS-CRITIQUE, not any concrete person or event.
      role: philosophical case material used for MIP structural reflection
      not_person_as_whole: true
    observer_position:
      role: MIP analyst applying a philosophy_anthropology discipline profile with reflection mode off
      power_relation_to_object: The analyst has interpretive power over the formalization but no authority over concrete persons, institutions, legal findings, or empirical truth.
      possible_effects_of_analysis: The analysis may clarify structural maturity conditions and blind spots, but it may also over-smooth contested moral material if presented as verdict rather than working note.
    involved_roles:
    - role: Affected knower, interpreter, or credible participant
      mandate: To contribute knowledge, interpretation, testimony, or situated understanding to a shared field.
      built_in_asymmetries:
      - possible dependence on recognition by others
      - possible vulnerability to credibility discounting
      - possible lack of control over dominant interpretive frame
      publicness_level: not specified
      dignity_exposure: Potential exposure to relational degradation if participation is denied or misread; not established as concrete D-break.
    - role: Listener, evaluator, institution, or frame-holder
      mandate: To structure uptake, relevance, credibility, response, and correction within the shared-understanding field.
      built_in_asymmetries:
      - possible power to grant or withhold uptake
      - possible control over interpretive resources
      - possible ability to define what counts as credible contribution
      publicness_level: not specified
      dignity_exposure: Potential risk of using credibility control in a degrading or exclusionary way; not established as concrete wrongdoing.
    - role: Shared-understanding field
      mandate: To provide the frame within which knowledge, interpretation, disagreement, uptake, and correction become meaningful.
      built_in_asymmetries:
      - norms may privilege some forms of expression or authority
      - institutional or cultural scripts may stabilize non-uptake
      - silence or absence may become meaningful only inside the frame
      publicness_level: not specified
      dignity_exposure: Potential symbolic or public dignity effects only if the field is public, archived, institutional, or reputational.
    publicness:
      level: not_specified_non_public_by_default
      A_P_relevance: A-P remains weak because no public, media-amplified, archived, or symbolically visible scene is given.
      P_PU_relevance: P-PU remains not applicable unless a later scene involves public reach, platform power, reputational effects, or institutional visibility.
      D_P_relevance_if_D_active: D-P would be relevant only in a concrete public scene; D-module is not activated here.
      public_shaming_risk: No current public shaming structure is present, but misuse of the analysis as public labeling would create a red-zone risk.
      reversibility_risk: Low within private conceptual analysis; high if the YAML were used publicly as a verdict or ranking without concrete review.
  frame_vs_variability:
    frame_elements:
    - element: PMS.yaml as sole PMS Base and MIP as application profile
      reason_fixed_or_slow: The analysis must not redefine PMS operators, dependencies, or PMS Base; MIP must remain an overlay/application lens.
      protected_goods:
      - model integrity
      - operator discipline
      - non-diagnostic use
      - reversibility
    - element: D0 remains untouched and unscored
      reason_fixed_or_slow: MIP treats ontological dignity as inviolable, non-measurable, non-gradable, and not part of D-profile scoring.
      protected_goods:
      - inviolable dignity
      - non-ranking
      - protection from humiliation
    - element: No concrete scene
      reason_fixed_or_slow: The supplied case material lacks actors, evidence, temporal sequence, institution, and response protocol.
      protected_goods:
      - claim hygiene
      - no false adjudication
      - no overclaim
    variability_elements:
    - element: Concrete scene specification
      possible_change: A later application could supply a scene, actors, roles, evidence, timeline, publicness, and response obligations.
      responsible_roles:
      - future analyst
      - case provider
      - affected parties if safe and appropriate
      - domain-specific reviewer
    - element: IA-box calibration
      possible_change: Transparency, justification, time-boundedness, and reversibility could be assessed if a specific asymmetry were documented.
      responsible_roles:
      - future MIP analyst
      - institutional reviewer if applicable
      - moderator or accountable role-holder
    - element: Correction or maturity pathway
      possible_change: A reversible next step could be identified only after knowing the setting, available levers, harm risks, and protected goods.
      responsible_roles:
      - role-holders with real power to act
      - affected participants
      - process owner
    unfair_high_M_zones:
    - It would be unfair to assign high M-score to any role because no actor had specified knowledge, control, predictability, alternatives, or integration opportunity in the abstract material.
    - It would be unfair to treat the affected epistemic participant as responsible for correcting a credibility frame they may not control.
    - It would be unfair to treat an abstract philosophical concept as if it carried concrete follow-up ownership.
    system_as_excuse_risk:
    - A purely structural explanation could excuse concrete actors in a later scene if it erased their real power to act.
    - Conversely, a purely individualizing reading could ignore structural co-causes such as norms, frames, publicness, or institutional routines.
    - 'In the present abstract case, the risk is mostly analytic: system-language must not replace scene evidence.'
    D1_D2_realistically_improvable_where:
    - 'At the conceptual level: by maintaining non-humiliating language, no person labels, no dignity score, and no public D-reading.'
    - 'In a later concrete scene: by designing uptake procedures, response rights, review points, and participation safeguards that protect D1/D2 enactments.'
    - 'In communication: by naming possible epistemic wronging without turning the term into a weapon, verdict, or public shame device.'
  acrp_profile:
    A_awareness:
      observations: 'Awareness is moderately visible at the conceptual level: the prior PMS analyses distinguish knowers, interpreters, credible participants, frames of uptake, possible non-events, asymmetry, recontextualization, and non-capture.'
      available_information: The available information is the abstract case material and completed PMS Core/CRITIQUE structural analyses, not direct evidence from a concrete event.
      realistically_knowable: It is realistically knowable that the case is conceptually about credibility and interpretive participation. It is not realistically knowable who was wronged, by whom, under what frame, with what harm, or with what alternatives.
      blind_spots: Blind spots include missing actor accounts, missing affected-party perspective, missing counterparty perspective, missing timeline, missing publicness, missing institutional rules, missing evidence of recurrence, and missing remedy path.
      role_awareness_A_R: 'Role awareness is explicit only at abstract level: affected participant, frame-holder/listener, shared-understanding field, and analyst role. Concrete role duties remain unknown.'
      publicness_awareness_A_P: Publicness is not specified. The analysis explicitly avoids public D-reading, public pillory, reputational claims, or platform-related assumptions.
      bias_awareness: 'Bias awareness is active: the analysis marks coherence bias, moralization bias, projection bias, and dignity-language intensification risk.'
    C_coherence:
      observations: Coherence is strong as a formal PMS/MIP projection but weak as concrete praxis coherence. The Core and CRITIQUE analyses align consistently, yet the case lacks concrete behavioral sequence or repair process.
      word_deed_relation: No word-deed relation can be assessed because no enactment is described. The analysis must not substitute correct terminology for practice.
      role_context_coherence: 'Role-context coherence is partial: conceptual roles are named, but no role obligations, procedures, sanctions, or response channels are specified.'
      narrative_coherence: 'The narrative is coherent as a philosophical domain reading: epistemic injustice concerns wronging in knowing, interpreting, and credible participation. This coherence remains under-discriminating unless it can separate injustice from disagreement, evidence caution, silence, refusal, or non-capture.'
      breaks_named_or_hidden: 'Breaks are named rather than hidden: no concrete scene, weak temporality, weak Σ, no Ψ follow-up binding, no D-module activation, no scoring, and no empirical validation.'
    R_responsibility:
      observations: Responsibility remains weak and non-forensic. The prior analyses preserve responsibility as structural possibility rather than blame, guilt, liability, or individual attribution.
      responsibility_points: Possible future responsibility points would include uptake design, credibility criteria, response procedures, interpretive-resource availability, review points, and protection against humiliating public use.
      assumed_responsibility: The analyst assumes responsibility only for claim hygiene, reversible framing, non-capture preservation, and not overclaiming the MIP/PMS reading.
      shifted_or_refused_responsibility: No concrete actor is shown shifting or refusing responsibility. A risk would arise if the analysis displaced responsibility onto abstract structure or onto affected participants.
      burdens_and_consequences: Potential burdens include epistemic exclusion, interpretive marginalization, credibility loss, and dignity stress, but these remain conceptual possibilities rather than established consequences.
    P_power_to_act:
      observations: Power to act is under-specified. The abstract case contains no concrete levers, authority, intervention options, response channels, or safe repair setting.
      real_levers: 'Current real lever: keep the analysis bounded, non-diagnostic, non-public, reversible, and explicit about missing evidence. Future levers would depend on scene specification.'
      formal_vs_real_options: Formal options include naming possible epistemic injustice, requesting scene evidence, using IA-box review, or designing response procedures. Real options cannot be assessed without roles, power, timing, and context.
      used_options: Used options include PMS Core structural analysis, PMS-CRITIQUE overlay, MIP guardrails, non-capture preservation, and refusal of scoring overclaim.
      unused_options: Unused options include empirical investigation, legal analysis, clinical interpretation, institutional intervention design, public communication, and D-profile activation.
      ceiling_rule_relevance: 'The M-score ceiling rule is highly relevant: predictability and access to alternatives are not known, so high shared responsibility cannot be assigned.'
  optional_D_observation:
    use_only_if_guardrails_fulfilled: true
    D_not_folded_into_A_score: true
    observations_only_no_evaluation_here: true
    visible_D_enactments:
      self_devaluation: Not evidenced. The case does not describe self-treatment, self-talk, guilt, shame, or self-neglect.
      self_neglect: Not evidenced.
      shame_dynamics: Possible in the domain of epistemic injustice, but not evidenced in the abstract case. The analysis must not infer humiliation from the concept alone.
      degradation_of_others: Possible risk if credibility asymmetry becomes degrading, but no concrete degradation is established.
      public_shaming: Not present. Publicness is not specified, and the analysis must not create public shaming through its own language.
      protest_or_refusal: 'Possible non-capture zone: resistance or refusal may be dignified protest, legitimate disagreement, or non-fit; it must not be automatically read as immaturity.'
      dignity_protection: 'Active as guardrail only: D0 untouched, no D-score, no person labels, D-module off, and D1/D2 discussed only as possible enactment domains.'
    next_step_if_relevant: Keep D-module off unless a concrete safe communication space, role-bound time window, and clear purpose are supplied.
  acrpd_submodules_profile:
    A:
      A-I: Not assessable. No inner signals, motives, affect, or self-awareness of concrete actors are available; no clinical or psychological inference is made.
      A-R: Weak to moderate conceptually. The analysis names abstract roles but lacks concrete role mandates, rights, and obligations.
      A-C: Moderate. Context is identified as philosophical/conceptual and credibility-and-interpretation oriented, but not scene-specific.
      A-IM: Weak. Possible impacts are named, but actual consequences and affected parties are not evidenced.
      A-P: Weak/not applicable. Publicness is explicitly unspecified and not assumed.
    C:
      C-S: Weak. Social coherence cannot be assessed without a concrete interaction or social setting.
      C-P: Moderate conceptually. Power and credibility asymmetry are central, but not empirically specified.
      C-N: Moderate to strong as conceptual narrative; weak as concrete enactment narrative.
      C-I: Weak. No institutional rules or procedures are supplied.
    R:
      R-I: Not assigned. No individual actionable share can be assessed.
      R-S: Weak. Social responsibility is plausible in epistemic injustice but not localized.
      R-E: Moderate conceptually. Ethical responsibility to avoid credibility degradation is relevant, but not assigned to concrete actors.
      R-P: Not applicable unless a public or institutional visibility field is later supplied.
    P:
      P-I: Not assessable. Inner agency of actors is unknown.
      P-S: Under-specified. Social agency depends on roles and response channels not provided.
      P-C: Moderate conceptually. Cultural or interpretive power is relevant to shared understanding, but not concretely located.
      P-PU: Not applicable. No public reach, platform, media visibility, or reputational effect is specified.
    D:
      active: false
      D-I: Not assessed because D-module is not activated and no self-treatment evidence is supplied.
      D-B: Not assessed; no bodily or material self-care evidence is supplied.
      D-R: 'Protection signal only: relational dignity may be at stake where credibility or participation is degraded, but no concrete D-R profile is assigned.'
      D-P: Not applicable unless a public scene is supplied; no public D reading of identifiable persons is permitted.
      note: D-submodules are not activated as a D-profile. D0 remains untouched; D1/D2 are referenced only as protected enactment domains and guardrails.
  scores_and_ia:
    A_score:
      A_band: not_assigned_non_concrete_case
      boundary_confirmed: A-score describes enactment, not essence.
      time_role_context: No concrete time-role context is supplied; therefore no A-band can be responsibly assigned.
      justification:
        A_awareness: Conceptual awareness is moderate, but A-score requires an enactment, case, situation, or episode H with enough context.
        C_coherence: Formal coherence is high, but concrete word-deed, role-context, social, and institutional coherence are under-specified.
        R_responsibility: Responsibility is not localized to role-holders; no individual or shared structural responsibility can be scored.
        P_power_to_act: Power to act is under-specified; levers and alternatives are unknown.
        modulators_context: Publicness, role mandate, evidence, recurrence, risk, and alternatives are unknown; therefore scoring would overclaim.
      D_excluded_from_A_number: true
    M_score:
      M_band: not_assigned_non_concrete_case
      boundary_confirmed: M-score describes shared structural responsibility, not guilt.
      role_position_time_frame: No role-holder, role position, or time frame is specified.
      five_factors:
        knowledge: Unknown. The case provides no concrete knowledge state or realistically knowable facts for any actor.
        power_control: Unknown. The case provides no concrete levers, authority, dependency, or control.
        predictability: Unknown. Consequences are conceptually plausible but not scene-evidenced.
        access_to_alternatives: Unknown. No alternatives, procedures, or response paths are supplied.
        serious_integration_attempt: Unknown. The case supplies no attempt at correction, mitigation, review, or integration.
      ceiling_rule_check:
        predictability_approx_zero: false
        access_to_alternatives_approx_zero: false
        M_capped_at_4: false
        explanation: The ceiling rule is relevant but not triggered as a concrete finding, because no actor, predictability condition, alternative set, or role-bound decision situation is supplied. In any future concrete scene, if predictability or access to alternatives is approximately zero, M must not rise above the ceiling rule; in the present abstract analysis, no M-band is assigned.
      D_link:
        self_devaluation_does_not_raise_M: true
        high_subjective_guilt_triggers_M_check_not_M_increase: true
        low_M_high_harm_means_protection_not_blame: true
    IA_box:
      asymmetry_named: Possible asymmetry in credibility, interpretive authority, participation standing, and uptake power.
      boundary_confirmed: IA-box is an asymmetry check, not a verdict.
      T_transparent:
        status: unclear
        notes: It is not known who knows what, who could realistically know it, or whether credibility criteria are visible to affected participants.
      J_justified:
        status: unclear
        protected_good_or_purpose: Potential protected goods include truthful participation, non-degrading uptake, fair interpretation, and shared understanding; no concrete justification is supplied.
        notes: No concrete asymmetry is justified or unjustified by the abstract case alone.
      TB_time_bound:
        status: unclear
        review_points_or_conditions: No time window, review point, appeal path, or correction condition is supplied.
        notes: Persistent non-uptake would raise IA risk, but persistence is not evidenced.
      R_reversible:
        status: unclear
        real_return_or_exit_options: No real return, appeal, correction, or re-entry option is specified.
        notes: Reversibility is maintained by the analysis but not shown within a concrete case.
      result: unclear
      short_justification: Asymmetry is conceptually central, but the T-J-TB-R criteria cannot be evaluated without scene evidence.
      immediate_action: Do not score or adjudicate. If applied further, first specify scene, roles, evidence, publicness, time window, review path, and protected goods.
  ia_localisation:
    knowing:
      issue: 'Possible issue: an affected participant may not know the credibility criteria, interpretive frame, or reason for non-uptake.'
      possible_intervention: Make criteria, frame, and grounds for response or non-response explicit in any future concrete scene.
    being_able:
      issue: 'Possible issue: an affected participant may lack real means to be heard, interpreted, or to correct misframing.'
      possible_intervention: Create safe, role-bound, time-bounded channels for clarification, reply, appeal, or interpretive supplementation.
    being_permitted:
      issue: 'Possible issue: formal permission to speak may not equal real permission to count as credible.'
      possible_intervention: Check whether participation is merely formal or actually uptake-capable; define participation rights and response obligations.
    willing:
      issue: 'Possible issue: willingness to participate cannot be inferred; refusal may be dignity-protective or non-capture, not immaturity.'
      possible_intervention: Avoid coercive participation. Preserve refusal, silence, and rival framing as possibly legitimate until context clarifies them.
  ia_protection:
    transparency_measures:
    - State explicitly whether the analysis is conceptual, empirical, legal, clinical, organizational, or implementation-oriented; here it is conceptual only.
    - Specify credibility criteria and interpretive frame before evaluating any concrete case.
    justification_measures:
    - Require a protected good or testable purpose for any asymmetry in credibility, authority, moderation, or response obligation.
    - Separate legitimate evidentiary caution from identity-based or role-based credibility discounting.
    time_boundedness_measures:
    - If a concrete asymmetry is later analyzed, define review intervals, appeal windows, and conditions under which non-uptake must be reconsidered.
    - Avoid indefinite suspension of credibility without review.
    reversibility_measures:
    - Maintain correction paths, reply options, and ways to revise the frame.
    - Prevent the analysis from becoming a permanent label or irreversible public judgment.
    participation_or_voice_measures:
    - Include affected perspectives where safe, voluntary, and non-coercive.
    - Allow rival formalizations and refusal of the PMS/MIP frame.
    dignity_protection_measures:
    - Keep D0 untouched and unscored.
    - Use D-language only to protect dignity in practice, not to shame, rank, expose, or diagnose.
    review_or_falsifier:
      date_or_interval: Before any concrete application or external transmission.
      falsifier_question: Can the proposed reading distinguish epistemic injustice from ordinary disagreement, evidentiary caution, legitimate refusal, conceptual mismatch, and non-capture without person-labeling or scoring overclaim?
      responsible_roles:
      - future analyst
      - domain reviewer
      - affected-side representative if safe and appropriate
      - process owner if a concrete institution is involved
  trajectory:
    principle: Trajectories, not labels.
    timeline:
    - timepoint: t0
      short_description: 'Initial abstract case material: epistemic injustice as wronging people in their capacity as knowers, interpreters, or credible participants.'
      A_band: not_assigned
      M_band: not_assigned
      D_observation_optional: D not activated; possible dignity-in-practice themes only.
      key_context_role_power_situation: No concrete context, role-holder, power relation, or publicness supplied.
    - timepoint: t1
      short_description: 'Completed PMS Core and PMS-CRITIQUE analyses: strong conceptual fit with frame, asymmetry, recontextualization, distance, weak Σ, and no Ψ follow-up binding.'
      A_band: not_assigned
      M_band: not_assigned
      D_observation_optional: D remains protection signal; no D-profile.
      key_context_role_power_situation: Conceptual structural analysis; no scene evidence for scoring.
    - timepoint: t2_possible_future
      short_description: Potential concrete application only if a scene, roles, evidence, temporal sequence, publicness, and response procedures are supplied.
      A_band: future_scene_required
      M_band: future_scene_required
      D_observation_optional: D-module may remain off or activate only with safe frame and guardrails.
      key_context_role_power_situation: Would require actual role mapping, IA-box calibration, and review conditions.
    A_t:
      pattern: A(t) cannot be scored. Conceptual awareness increases from t0 to t1 through structured PMS/MIP differentiation, but this is analyst awareness, not evidence of mature enactment by case actors.
      notes: Do not confuse increased analytic clarity with maturity in the underlying case.
    M_t_RVR_t:
      RVR_description: RVR(t) remains unmeasured. Knowing_t, able_t, permitted_t, and acting_t are unavailable for concrete actors.
      knowledge_over_time: Only analyst knowledge of the model structure increases; no actor knowledge trajectory is supplied.
      leverage_over_time: Current leverage is limited to documentation discipline. Concrete leverage requires future scene specification.
      alternatives_over_time: No actor alternatives are known. Analytical alternatives include rival readings and refusal of overclaim.
      ceiling_rule_over_time: Because predictability and alternatives are not evidenced, M must not rise to high bands in this abstract case.
    D_t_optional:
      active: false
      qualitative_course: D(t) is not tracked because D-module is off. Dignity remains a non-negotiable guardrail and possible future observation domain.
      D_quick_grid_movement_if_used: Not used.
      note: No D-score; only qualitative trajectory.
  D_module_optional:
    active: false
    activation_reason: D-module is not activated because the case is not a concrete, safe, role-bound, time-windowed communication space. D-language is used only as protection signal and guardrail.
    communication_space: not_activated_private_conceptual_working_note
    guardrails_checked:
      scenic: false
      context_bound: true
      role_bound: true
      time_windowed: false
