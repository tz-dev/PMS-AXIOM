  uniform_report:
    generate_only_from_structured_fields: true
    title: 'MIP Full-Depth Conceptual Case Analysis: Epistemic Injustice'
    overview_4_to_7_sentences: This MIP analysis treats Epistemic Injustice as a conceptual, non-concrete case concerning wronging in knowing, interpreting, and credible participation. It builds on the completed PMS Core and PMS-CRITIQUE analyses while keeping PMS.yaml as PMS Base and MIP as an application profile. The central visible asymmetry is possible credibility and interpretive authority asymmetry within shared understanding. Because no concrete scene, actors, evidence, timeline, publicness, or response path is supplied, no A-score, M-score, IA verdict, or D-profile is assigned. The analysis is strongest as a guardrailed structural reflection and weakest as any basis for action or adjudication. Its main maturity requirement is to keep the reading reversible, non-diagnostic, non-ranking, and open to rival formalizations and non-capture.
    key_findings:
    - The case is conceptually mature enough for structural reflection but not evidentially grounded enough for scoring or adjudication.
    - A-awareness is moderate at the analyst level, but not assignable as case maturity because no concrete enactment is supplied.
    - C-coherence is high formally and weak concretely; the model fit must not be mistaken for real-world coherence.
    - R-responsibility remains weak and non-forensic because no responsible role-holder or time window is identified.
    - P-power-to-act is under-specified; current action should remain limited to documentation hygiene and future scene specification.
    - IA risk is possible but not adjudicated; T, J, TB, and R are all under-specified.
    - D-module remains off; D is used only as protection signal and guardrail.
    A_summary: No A-band is assigned. Conceptual awareness is present in the analysis, but maturity in practice requires a concrete enactment, role, time frame, and power context.
    M_summary: No M-band is assigned. Shared structural responsibility cannot be scored because knowledge, control, predictability, alternatives, and integration attempts are unknown.
    IA_box_summary: The IA-box identifies possible credibility and interpretive asymmetry, but transparency, justification, time-boundedness, and reversibility cannot be evaluated without a concrete scene.
    D_summary_if_activated: D-module is not activated. D0 remains untouched; D1/D2 are not profiled; dignity language functions only as a protection guardrail.
    trajectory_summary: 'The trajectory is analytic rather than behavioral: from abstract case material to PMS Core and CRITIQUE formalization to MIP guardrailed reflection. No actor trajectory is established.'
    guardrail_status: 'Guardrails are maintained: profile-not-person, score hygiene, D0 untouched, no person labels, no red-zone use, non-capture preserved, and transmission limited to conceptual working-note use.'
    transmission_status: Working note transmittable for conceptual use only; not a decision basis.
    practical_implications: Before any applied analysis, specify the concrete scene, roles, frame, evidence, expected uptake, power levers, publicness, alternatives, review points, and dignity-protection measures. Until then, use the analysis only to clarify what must not be overclaimed.
    conclusion: 'MIP adds a maturity-in-practice layer that confirms the Core and CRITIQUE finding: Epistemic Injustice is structurally critique-readable, but not scoreable, adjudicable, or operationalizable without concrete scene evidence and guardrails.'