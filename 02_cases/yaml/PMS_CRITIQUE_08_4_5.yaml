  critique_overlay_synthesis:
    primary_critique_reading: >
      PMS-CRITIQUE makes visible that the Core case can be read as weak minimal critique:
      privacy/publicness mismatch becomes framed and interruptible, but it does not become
      productive or stable critique because no corrective step or self-bound follow-up is supplied.
      Publicness is the main overlay amplifier because it can increase exposure gradients,
      temporal residue, and attractor formation. Drift classes remain conditional risks only,
      not active findings, because the case lacks scene evidence, recurrence, audience structure,
      correction pathway, and follow-up binding.
    threshold_result: >
      The case reaches V2 / CRITIQUE_MIN only weakly and formally at overlay-application level.
      It does not reach productive critique, stable critique, or an active drift configuration.
      The threshold result should therefore be read as: the case can interrupt a framing, but
      cannot yet correct, consolidate, or bind a follow-up trajectory.
    mismatch_result: >
      Δ becomes critique-relevant through the privacy/publicness mismatch and related tensions around
      concealment, exposure, access, limitation, and accountability. The mismatch remains abstract
      rather than scene-bound and therefore cannot identify a target, wrong, duty, reply, or
      corrective addressee.
    frame_result: >
      □ defines what could count as legitimate privacy, legitimate publicness, response, interruption,
      or correction, but the concrete frame is absent. Frame relevance is therefore central and
      under-specified. A legal frame, interpersonal frame, institutional frame, public-discursive frame,
      or technological-access frame could generate different critique thresholds.
    distance_result: >
      Χ stop-capability is maintained by the Core pass and by this overlay. It is real as application
      discipline but not evidenced as a concrete actor capacity in a scene. Χ prevents the overlay from
      turning privacy into evasion by default, publicness into accountability by default, or exposure
      into correction by default.
    recontextualization_result: >
      Φ is central because privacy and publicness admit rival reframings, but it does not bridge to
      correction in this case. Without Σ, Φ remains contested frame work rather than productive critique.
      The overlay therefore keeps recontextualization open while refusing to treat recontextualization
      itself as repair, correction, or maturity.
    integration_result: >
      Σ remains unresolved and no correction consolidates. The overlay therefore refuses to treat PMS
      coherence as sufficient critique. An integrated critique would require a discriminating corrective
      unit that preserves privacy/accountability distinctions without collapsing them into exposure,
      silence, spectacle, or procedural deferral.
    self_binding_result: >
      Ψ remains guardrail-only. No actor, institution, role, or follow-up loop is self-bound, and no
      Ψ→Other demand is generated. Stable critique would require self-binding of the critic, institution,
      process, or responsible role, not coercive binding of the target.
    asymmetry_temporality_result: >
      Ω is salient because publicness and privacy distribute exposure, access, vulnerability, and
      accountability unevenly. Θ is weak because no sequence, residue, accumulation, or review window
      is supplied, though publicness can conceptually harden irreversibility. The overlay therefore marks
      asymmetry and temporality as calibration needs rather than established findings.
    scale_publicness_result: >
      The selected scale is paper tag a: generic / structural critique. Publicness overlay P is active
      conceptually and amplifies possible Ω, Θ, and Α effects without becoming an operator or proving
      public critique. The case concerns publicness as a topic, but it is not itself a public critique
      scene.
    drift_result: >
      The main CRITIQUE drift risks are judgment drift, narrative repair, commentary drift, public
      pillory, silence attractor, and integration bypass. They are constrained as risks only, not active
      diagnoses, verdicts, person labels, or sanctions. Each would require concrete load indicators such
      as reaction pressure, evaluative closure, repeated recontextualization without correction, public
      exposure, stabilized silence, or apparent integration without Σ.
    dignity_result: >
      Dignity-in-Practice is preserved by refusing shame, humiliation, ranking, diagnosis, coercive
      exposure, coercive silence, sanction logic, and scene-to-person typing. This is an application
      constraint under asymmetry, not a claim about ontological dignity or moral superiority.
    non_capture_result: >
      Outside PMS-CRITIQUE capture remain intimacy, legitimate opacity, confidentiality, legal procedure,
      public reason, surveillance critique, consent/access theory, institutional accountability, and
      tragic conflict not suited to Σ integration. These zones must not be converted into drift merely
      because they resist the critique overlay.
    optional_mip_docking_result: >
      MIP docking is not triggered. The optional interface remains separated and inactive because no MIP
      evaluation, deployment, or external normative regime is requested.
    final_critique_formula_or_signature: >
      CRITIQUE_MIN_weak + P_active + drift_risks(D2,D3,D4,D5,D6,C9), with
      CRITIQUE_PROD_not_applicable and CRITIQUE_STABLE_not_applicable.
    final_claim_boundary: >
      This CRITIQUE overlay adds visibility for critique thresholds, reach, scale, publicness, drift,
      modulators, and critique-facing projection boundaries. It does not revise PMS Base, rewrite the
      PMS Core pass, establish truth, verify motives, diagnose persons, rank persons, prescribe correction,
      generate sanction logic, validate PMS, or claim final capture of critique. Its valid result is a
      bounded overlay reading: the case supports weak formal critique-interruptibility, not productive
      critique, stable critique, or adjudicated accountability.