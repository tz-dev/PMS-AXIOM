      - "Naming outer legibility does not imply person-ranking, diagnosis, or moral verdict."
      - "Publicity may amplify, distribute, or sedimentize readability without necessarily creating it."
      - "Practice labels do not by themselves settle outer structural form."
      - "Pre-reflective readability does not settle meaning, worth, blame, or consent."
      - "Outer legibility does not authorize public accusation by itself."
      - "Publicness is an overlay, not the necessary origin of consequence."
      - "Internal framing may be real without being total."
      - "Sexual cost topology is not a score, person measure, dignity measure, or maturity measure."
      - "The EDEN/PFO asymmetry switch is a cross-domain reference, not a new PMS-SEX operator."
      - "Asymmetry activation is not itself drift; it drifts where unmarked, repeatable, and not re-bound."
      - "Parity binds reciprocity only where it coordinates cost topology; it becomes drift where it exits responsibility."
      - "Responsibility under asymmetry requires self-binding and restraint, not authority."
      - "PMS-SEX records operator profiles only; adultness-relevant evaluation belongs to MIP docking."
    case_application: >
      Layer separation is maintained by treating Boundary Confusion first as a
      Core PMS boundary case and only second as a SEX overlay non-activation
      test. Internal boundary descriptions, outer boundary readability,
      publicness, temporality, cost topology, and maturity-relevance are kept
