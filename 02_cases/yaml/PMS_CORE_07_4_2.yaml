ai_interface_pms_alignment:
  welcome_message: 'This case uses PMS as a structural operator model. PMS is non-psychological, non-diagnostic, non-clinical, non-prescriptive, and non-metaphysical in its claims.'
  modes:
  - id: axiomatic
    title: Axiomatic / theory mode
    description: Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions.
    case_status: active
    case_application: Axiomatic mode is used to inspect how Δ through Ψ apply or remain weak in the abstract structure of escalation, consequence, interruption, revision, and repair.
  - id: derived_axes_inspection
    title: Derived axes mode
    description: Map PMS structures to the five derived axes A, C, R, E, D without individual diagnosis.
    case_status: active
    case_application: Derived axes mode is used to project the formula-derived statuses of Awareness_A, Coherence_C, Responsibility_R, Action_E, and Dignity_in_Practice_D without treating them as independent axioms.
  - id: ai_architecture
    title: AI architecture mode
    description: Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing.
    case_status: not_applicable
    case_application: AI architecture mode is not applicable because the case does not describe an artificial agent, software system, policy architecture, or implementation context.
  guardrails:
    general:
    - Do not infer mental states, traits, or diagnoses from PMS descriptions.
    - Keep all findings tied to structures of praxis, not to ontological claims about persons.
    - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
    - Do not use PMS to rank or compare human beings.
    - Do not treat translation into PMS terms as proof of exhaustive capture.
    - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
    - Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of the model.
    - Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice (D), and external accountability.
    - Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation.
    ai_specific:
    - PMS operators may be used as abstract modules, not as evidence of subjective experience.
    - Encoding PMS in YAML does not by itself implement praxis or selfhood.
    - Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness.
    - Any deployment requires architecture-specific calibration, implementation constraints, and evaluation.
    - Always maintain a distinction between structural agency models and real human vulnerability.
  suggested_questions:
  - What structural operators are involved in this pattern of praxis?
  - Which asymmetries (Ω) and temporal trajectories (Θ) are visible?
  - Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?
  - How would this configuration project onto the derived axes Awareness, Coherence, Responsibility, Action, and Dignity-in-Practice?
  - Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?
  case_answer_to_suggested_questions:
    structural_operators_involved:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    asymmetries_and_temporal_trajectories_visible: Θ is clearly visible as the diachronic structure of decision, consequence, later interruption, revision, and repair. Ω is only weakly visible as a possible asymmetry of exposure, capacity, or obligation because no concrete affected parties are specified.
    recontextualization_distance_integration: Φ models the shift from consequence-as-fixed to consequence-as-repairable; Χ prevents premature verdict or erasure; Σ tests whether consequence and repair can be held together without forced coherence.
    derived_axes_projection: Awareness_A and Coherence_C are active; Responsibility_R is weak; Action_E is under-specified; Dignity_in_Practice_D is an application constraint rather than a scene finding.
    tentative_calibration_rivalry: Ω, Α, Ψ, Responsibility_R, Action_E, and any drift-pattern claim remain tentative. Rival metaphysical, pragmatist, restorative, tragic, and non-capture readings remain open.
analysis_quality_control:
  claim_type:
    primary: conceptual_projection
    secondary: []
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: conceptual_domain_projection
    concrete_scene: false
    implication: The case permits PMS-internal structural projection and conceptual discrimination, but not empirical findings, concrete scene judgment, metaphysical proof, diagnostic assessment, legal or forensic decision, implementation validity, or PMS Base validation.
  coherence_risk:
    status: high
    reason: The case strongly invites a smooth Θ-Φ-Χ-Σ reading in which consequence becomes repairable through distance and integration. That fit risks making PMS look more complete than the case warrants, especially if repair is treated as the normal telos of consequence or if interruption is too quickly read as productive recontextualization. The main risk is not formal inconsistency but excessive elegance: repair, reversal, evasion, tragic remainder, refusal, forgiveness, and non-capture could become under-discriminated.
    mitigation: The reading is constrained by weak Ω, weak Α, analytic-only Ψ, under-specified Action_E, rival readings, non-capture zones, and explicit falsifier conditions. Consequence must remain temporally real after revision; repair must not be treated as erasure; and refusal, rupture, non-fit, or unresolved absence must not automatically become PMS drift, incomplete integration, or incomplete calibration.
  coverage_vs_discrimination:
    coverage_result: PMS covers the structural relation among difference, frame, meaningful interruption, temporality, recontextualization, distance, and conditional integration.
    discrimination_requirement: The PMS reading must distinguish consequence from determinism, repair from erasure, recontextualization from excuse-making, interruption from avoidance, integration from forced closure, self-binding from rigidity, and non-capture from incomplete calibration.
    discrimination_status: partial
  discrimination_tests:
  - id: DT1
    test: Distinguish repair from erasure or reversal of consequence.
