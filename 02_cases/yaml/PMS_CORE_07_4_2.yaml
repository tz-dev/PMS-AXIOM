operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Δ marks the primary distinctions that make the case analyzable: decision versus consequence, consequence versus determination, revision versus erasure, interruption versus avoidance, repair versus fixed escalation.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - 'The relevant distinctions are internal to the case question: consequential decision, later revision, interruption, repair, and fixed determination.'
    - The analysis must not conflate repair with reversal, consequence with fate, or interruption with failure.
    falsifier_conditions:
    - If the case cannot sustain distinctions between consequence, determinism, revision, interruption, and repair, PMS loses its entry point.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: ∇ appears as structural directional tension between escalation toward closure and repair-oriented movement toward revision, interruption, or transformed continuation. It is not read as subjective desire.
    dependency_status: satisfied
    analytic_weight: moderate
    calibration_points:
    - 'The tension is philosophical and structural: a pressure between consequence-as-finalization and consequence-as-revisable trajectory.'
    - No affective impulse, personal desire, or psychological drive is inferred.
    falsifier_conditions:
    - If the case contains no directional tension between closure and repair, ∇ must be downgraded or removed.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: □ is the philosophical frame in which decision, consequence, interruption, revision, and repair become mutually intelligible and constrained.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The active frame is conceptual structural action theory rather than empirical adjudication, therapy, law, implementation, or metaphysical proof.
    - Frame shifts from consequence to repair are marked as analytic moves and not treated as evidence that repair has occurred.
    falsifier_conditions:
    - If no stable frame distinguishes the philosophical issue from empirical, legal, clinical, or metaphysical claims, the analysis becomes under-discriminating.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: Λ is active where interruption, delay, non-finalization, or non-continuation of the expected consequence trajectory becomes meaningful within the frame.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - The expected occurrence is a consequence path continuing as fixed escalation; the meaningful non-event is interruption or suspension that permits revision or repair.
    - Absence, refusal, rupture, or delay must not be automatically redescribed as incomplete integration, failed maturity, or PMS drift.
    falsifier_conditions:
    - If no expectation of continuation or no meaningful interruption is present, Λ should not be asserted as active.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Α is weak because the case mentions consequences and possible escalation but does not show repeated interaction, recurrent patterning, or stabilized role-script formation.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Attractor status would require evidence that consequence-paths stabilize into repeated escalation, path-dependence, or a recurrent repair-failure script.
    - A single abstract reference to consequence is not enough to establish pattern formation.
    falsifier_conditions:
    - If no recurrence, stabilization, or path-dependence can be specified, Α must remain weak or not active.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is weak and conditional. Consequences and repair may involve asymmetries of exposure, capacity, obligation, or vulnerability, but the case material does not specify affected parties or directional imbalance.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - 'The direction and kind of asymmetry would need specification: who decides, who bears consequences, who can interrupt, and who is owed repair.'
    - Asymmetry must not be moralized by default or converted into blame, tribunal logic, or person-ranking.
    - Ω remains weak because the case is abstract and does not identify actual power, exposure, capacity, or obligation gradients.
    falsifier_conditions:
    - If no directional imbalance of exposure, capacity, power, or obligation is identifiable in a concrete version, Ω claims must be removed or retained only as analytic possibility.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Θ is central because the question is explicitly diachronic: a decision has consequences across time, while later revision, interruption, or repair remains possible.'
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The trajectory is not a static contrast but the temporal relation between decision, consequence, later interruption, revision, and repair.
    - Temporality is essential to the case, but PMS temporality does not settle metaphysical determinism or empirical continuity.
    falsifier_conditions:
    - If the case is reformulated as a purely atemporal logical relation, Θ would be overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ is active where an existing decision-consequence structure is placed into a new frame of revision or repair rather than remaining only in the frame of escalation or fixation.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The source frame is consequence-as-fixed-or-escalating; the target frame is consequence-as-revisable-through-interruption-or-repair.
    - Recontextualization must clarify the relation to consequence and must not merely absorb rupture, refusal, non-fit, or disagreement into PMS coherence.
    falsifier_conditions:
    - If every rupture, refusal, resistance, or rival framing is automatically redescribed as Φ, the PMS reading is over-assimilative.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: Χ is active as reflective suspension of immediate verdict, urgency, or finalization. It allows the analysis to keep consequence and repair in view without fusing them into either fate or erasure.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - The analysis suspends final verdicts about determinism, guilt, success, maturity, and repair sufficiency.
    - 'Distance is not avoidance or neutrality: it preserves responsibility questions while refusing premature closure.'
    falsifier_conditions:
    - If Χ is suspended to force a final metaphysical, legal, diagnostic, or moral verdict, the PMS application is invalid.
    non_capture_note: 'Distance protects against overclaiming and premature closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Σ is active as a conditional integrative demand: the case asks whether consequence, interruption, revision, and repair can be held together without erasing any of them.'
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Integration must discriminate among repair, reversal, evasion, tragedy, forgiveness, and unresolved rupture rather than smoothing them into one coherence claim.
    - PMS coherence is not proof of adequacy; integration may remain partial or fail in concrete cases.
    falsifier_conditions:
    - If coherence is treated as sufficient by itself or as proof that repair is adequate, Σ is overclaimed.
    non_capture_note: 'PMS coherence is insufficient by itself.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is weak and conditional. It would become relevant only if a concrete agent or collective binds itself across time to consequences, repair obligations, promises, or stable norms.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Ψ is applied only as possible analytic self-binding, not as an established self-model or identity claim.
    - No subjectivity, selfhood, moral worth, or stable normativity is attributed to an abstract case structure.
    falsifier_conditions:
    - If Ψ is applied without concrete Σ, Θ, and Χ conditions of self-binding, the self-binding reading is under-specified.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.'
    case_function: L1 structures the case by differentiating decision, consequence, interruption, revision, and repair; orienting the tension between escalation and repair; framing the philosophical question; marking meaningful interruption; and keeping pattern formation weak unless recurrence is specified.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.'
    case_function: L2 is only partially active. Θ is central because consequences and repair are temporal, while Ω remains weak until a concrete scene identifies who is exposed, obligated, empowered, or vulnerable.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.'
    case_function: 'L3 carries the major analytic work: Φ models recontextualization of consequence into repair possibility, Χ preserves reflective distance from final verdict, and Σ tests whether consequence and repair can be integrated without forced coherence.'
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.'
    case_function: L4 is not primary. Ψ is analytic-only or weakly conditional because the case does not specify an agent who binds itself across time to repair obligations or stable normativity.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: Δ is satisfied by the explicit conceptual distinction between consequence, fixed determination, revision, interruption, and repair.
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: ∇ is satisfied as structural tension between escalation toward closure and repair-oriented revision.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: □ is satisfied by the philosophical frame that constrains the case as structural conceptual analysis.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Λ is satisfied by the meaningful interruption or non-finalization of an expected consequence trajectory.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: Α is weakly satisfied only as possible path-dependence or escalation pattern; no recurrence is evidenced.
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: Ω is weakly satisfied only as possible exposure, capacity, or obligation asymmetry; no directional relation is specified.
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Θ is satisfied conceptually by the diachronic issue of decision, consequence, later revision, and repair, but its PMS dependencies on Α and Ω remain weak.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Φ is structurally available as recontextualization from fixed consequence to repairable consequence, but its Ω dependency remains weak.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: Χ is structurally available as reflective distance from verdict and determinism, but it depends on a Φ configuration whose scene details remain under-specified.
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: Σ is conditionally available as integration of consequence, interruption, and repair, but it must not be treated as achieved repair.
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: Ψ is weak and analytic-only because no concrete agent, promise, role, or self-binding trajectory is specified.
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
