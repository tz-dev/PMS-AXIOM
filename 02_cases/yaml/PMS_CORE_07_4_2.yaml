guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: The case is not read as evidence of mental states, motives, desires, maturity, avoidance, resilience, pathology, or personality.
    non_metaphysical: The analysis does not decide whether decisions are metaphysically determined, free, fated, causally fixed, or ontologically open.
    non_diagnostic: No person, group, agent, or institution is diagnosed or assigned a clinical, moral, maturity, or risk category.
    non_legal_forensic: The analysis does not establish liability, culpability, evidence, admissibility, legal repair, damages, negligence, or forensic truth.
    non_implementation_claim: No software, governance, workflow, institutional process, AI architecture, or repair protocol is specified or validated.
    non_moral_ranking: No being, person, group, decision-maker, victim, or repair agent is ranked in moral worth or ontological dignity.
    non_exhaustive_capture: The PMS rendering is not exhaustive; rival readings, tragedy, refusal, rupture, metaphysical framing, and non-repairable remainder may remain outside capture.
    reversibility: All operator statuses remain revisable because the case is abstract and lacks concrete scene evidence.
    dignity_in_practice: 'Dignity-in-Practice is preserved as an application restraint: possible asymmetry is handled without shaming, ranking, humiliation, or irreversible labeling.'
limits:
- The PMS reading is limited by the absence of a concrete decision, actor, affected party, institution, consequence, interruption, or repair practice.
- The case does not support empirical, metaphysical, diagnostic, legal, forensic, clinical, implementation, or PMS Base validation claims.
- Rival readings remain open, and some aspects of consequence, repair, refusal, tragedy, or determinism may remain outside PMS capture.
- The Θ-Φ-Χ-Σ reading is coherent but may become too smooth unless it continues to discriminate repair from erasure, interruption from avoidance, and integration from forced closure.
case_synthesis:
  primary_pms_reading: The case can be modeled as a bounded PMS projection in which a framed distinction between fixed consequence and repairable consequence generates tension, meaningful interruption, temporal trajectory, recontextualization, reflective distance, and conditional integration.
  continuity_condition: Continuity is preserved only if consequence remains temporally real after revision; repair must not erase the fact that a decision generated consequences.
  change_condition: Change occurs when the decision-consequence structure is recontextualized into a repair-capable frame through interruption, distance, and possible integration.
  rupture_or_non_fit_condition: Rupture, refusal, disagreement, absence, or rival framing is preserved as possible non-capture and is not automatically translated into drift, incomplete calibration, incomplete integration, recontextualization, or maturity failure.
  responsibility_condition: Responsibility remains weak and conditional until a concrete asymmetry, temporal obligation, recontextualization of obligation, and self-binding agent are specified.
  dignity_condition: Dignity-in-Practice constrains the analysis by requiring restraint under possible asymmetry and forbidding person-ranking, humiliation, ontological evaluation, or irreversible labeling.
  rival_reading_condition: Rival formalizations remain open unless explicit comparison criteria show that the PMS reading discriminates better without over-assimilation.
