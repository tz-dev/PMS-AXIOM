  AHP_second_order_findings:
    schema_status: "non_canonical_explanatory_extension"
    canonical_storage_path: "case.addons.ah_precision"
    extension_boundary: >
      This section explains the AHP result in prose-like YAML form. It does not
      replace the canonical AHP storage path and does not introduce additional
      first-order findings.
    overall_precision_reading: >
      The previous MIP analysis is high-precision as a private structural working
      note. It defines scope, separates evidence from inference, preserves
      non-capture, prevents person-level conclusions, and clearly blocks
      transmission into decision contexts. Its main vulnerability is not missing
      structure but possible over-readability: the YAML is complete enough that
      an inattentive reader could mistake a conceptual profile for a concrete
      assessment.
    strongest_features:
      - >
        Strong boundary discipline: abstract case-type, not concrete scene, is
        repeatedly named.
      - >
        Strong score hygiene: A-score and M-score are explicitly bounded, and M
        is not assigned.
      - >
        Strong D hygiene: dignity is not scored, D-module remains off, and D is
        treated qualitatively.
      - >
        Strong transmission hygiene: working-note status is clear and non-private
        reuse requires renewed review.
      - >
        Strong non-capture discipline: rival readings and missing perspectives
        remain visible.
    weakest_features:
      - >
        The A-band phrase is still somewhat score-like even though it is bounded.
      - >
        The M ceiling-rule explanation could be misread as a hidden score if
        excerpted.
      - >
        The D notation is substantively safe but not fully aligned with the AHP
        module's preferred `D₀` and `D₁/D₂` wording.
      - >
        Rival readings are listed but not contrasted enough to show discriminative
        force.
      - >
        The artifact's completeness may itself produce false confidence if scope
        lines are removed.
    precision_not_persuasion_note: >
      The previous MIP output should not be hardened by adding more rhetoric or
      more apparent certainty. Its next improvement should be precision-oriented:
      clearer labels, sharper non-transmission markers, cleaner D notation, and
      more explicit if/then thresholds.
    bounded_recursion_note: >
      This AHP overlay should not itself become the object of further attack-point
      annotations inside the same run. The listed attack points should either be
      addressed in a next iteration or consciously accepted as limits.

  impact_overlay:
    principle: >
      PH affects confidence in the analysis artifact and IA/D decidability, not
      the base score scales and not the underlying case.
    PH_band: "high"
