derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    base_description: Sustained, framed differentiation across time.
    case_reading: 'Awareness_A is active as structural awareness: recognition requires sustained, framed differentiation across
      time of what or who is to be acknowledged, denied, delayed, accepted, or made explicit. This is not phenomenological
      awareness.'
    status: active
    calibration_points:
    - Differentiate the object of recognition, identify the frame in which it matters, and specify the temporal structure of
      noticing, delay, denial, acceptance, or explicitness.
    non_capture_note: 'Awareness is structural in PMS; it does not exhaust phenomenological awareness.'
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    base_description: Temporally stabilized structuring of impulse and expectation within a frame.
    case_reading: Coherence_C is weak-active because recognition can stabilize impulse, frame, expectation, non-event, and
      temporality into a coherent acknowledgment trajectory, but the abstract case does not prove truth, validity, integration,
      or sufficient discrimination.
    status: weak
    calibration_points:
    - Distinguish coherence from truth, legal validity, moral adequacy, forced integration, narrative smoothing, or PMS Base
      validation.
    non_capture_note: 'Coherence does not prove truth, validity, full integration, or exhaustive capture.'
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    base_description: Self-binding orientation toward asymmetry extended across time and recontextualization.
    case_reading: 'Responsibility_R is weak. Responsibility is named in the case material, but PMS Responsibility_R requires
      Ψ, Φ, Θ, and Ω: self-binding orientation toward asymmetry across time and recontextualization. Those conditions are not
      concretely evidenced.'
    status: weak
    calibration_points:
    - Identify asymmetry, temporality, recontextualization, and self-binding before claiming responsibility as active.
    non_capture_note: 'Responsibility_R is structural, not moralistic, legal, forensic, or diagnostic.'
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    base_description: Integrated realization of directedness across time.
    case_reading: Action_E is under-specified. Acceptance or making explicit could become action if directedness is temporally
      structured and integrated, but no concrete enactment, response, procedure, or commitment is supplied.
    status: under_specified
    calibration_points:
    - Distinguish action from mere noticing, wording, claim-status, conceptual structure, or unverified acknowledgment.
    non_capture_note: 'Action_E is not mere behavior or assertion; it requires integrated directedness across time.'
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    base_description: Self-bound reflective restraint and protection in asymmetrical relations.
    case_reading: Dignity_in_Practice_D is active as an application constraint. The analysis must handle possible asymmetry
      without ranking, shaming, humiliating, diagnosing, or ontologically evaluating any person or group.
    status: application_constraint
    calibration_points:
    - Check whether any asymmetry is handled with reflective restraint, reversibility, and non-ranking rather than tribunal
      judgment.
    non_capture_note: 'D is a praxeological application constraint, not an ontological or moral superiority claim.'
