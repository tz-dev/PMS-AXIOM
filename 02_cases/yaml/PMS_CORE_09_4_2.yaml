  - operator_layer_mapping
  - dependency_logic
  - dependency_table_reference
  - derived_structure_discipline
  - derived_axes_projection
  - self_model_analysis
  - asymmetry_drift_patterns
  - example_operator_chains_application
  - computational_representation
  - ai_interface_pms_alignment
  - analysis_quality_control
  - operationalization_requirements
  - guardrails
  - limits
  - case_synthesis
  - final_structural_formula
  pms_yaml_alignment_status: complete
  missing_sections: []
  known_limitations:
  - The case material is abstract and not a concrete praxis scene.
  - Operator activation for Α, Ω, Σ, and Ψ is weak or conditional because recurrence, asymmetry, integration, and self-binding
    are not concretely evidenced.
  - The PMS reading remains conceptual, reversible, and open to rival formalizations.
  validation_checks:
    valid_yaml: true
    no_new_pms_operators: true
    no_redefined_pms_base: true
