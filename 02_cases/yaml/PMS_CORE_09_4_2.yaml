  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  operator_inventory_status: no_additional_pms_operators_introduced
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Recognition becomes structurally analyzable only by distinguishing what is to be acknowledged from what
      is not yet acknowledged: person, claim, situation, responsibility, denial, delay, acceptance, or explicitness.'
    dependency_status: root_operator_available
    analytic_weight: major
    calibration_points:
    - Specify whether the differentiated object is a person, claim, situation, responsibility, acknowledgment act, denial,
      delay, or explicit formulation.
    - Check whether these distinctions are supplied by the case material or imported from a rival theory, legal frame, moral
      frame, or empirical scene not provided.
    falsifier_conditions:
    - If no stable object or contrast of recognition can be distinguished, PMS has no entry point for this case.
    non_capture_note: 'Difference does not by itself prove that PMS captures the case.'
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: The case contains a weak structural directedness toward acknowledgment; something differentiated may press
      toward being noticed, accepted, denied, delayed, corrected, or made explicit. This is not a claim about subjective desire.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Specify whether the directedness is practical, argumentative, institutional, ethical, procedural, or only conceptual.
    - Do not infer inner motivation, desire, bad faith, or avoidance from the abstract case material.
    falsifier_conditions:
    - If no directional tension follows from the differentiated object of recognition, ∇ remains under-specified.
    non_capture_note: 'Impulse is structural directedness, not psychological diagnosis.'
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: Recognition requires a frame that determines what counts as acknowledgment, denial, delay, acceptance, explicitness,
      or responsibility. In this case the frame is conceptual rather than a concrete institutional or interpersonal scene.
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'Name the relevant frame: conceptual acknowledgment, interpersonal recognition, procedural notice, ethical responsibility,
      legal admission, political status, or another explicitly supplied frame.'
    - Mark frame shifts carefully; do not treat a change from noticing to accepting or from implicit to explicit as the same
      operation without calibration.
    falsifier_conditions:
    - If no frame can specify what counts as recognition, denial, delay, or explicitness, the PMS reading becomes too abstract
      to discriminate.
    non_capture_note: 'A frame can clarify a case without exhausting it.'
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Recognition-as-acknowledgment centrally involves possible non-event: a claim may be denied, acknowledgment
      may be delayed, responsibility may remain unnamed, or explicitness may fail where a frame expects it.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - 'Specify the expected occurrence: notice, acceptance, reply, naming of responsibility, explicit acknowledgment, or another
      acknowledgment-event within a frame.'
    - Preserve the possibility that silence, delay, or refusal may be legitimate non-capture, rival framing, prudence, incapacity,
      or boundary-setting rather than PMS failure.
    falsifier_conditions:
    - If there is no structured expectation of acknowledgment within an identified frame, Λ must be weakened or removed.
    non_capture_note: 'Absence must not be automatically translated into incomplete integration.'
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: Attractor status is only weak here. The abstract material mentions denial, delay, and explicitness, but it
      does not show recurrence, stabilization, routine, path dependence, or role-script formation.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Show repeated acknowledgment, repeated denial, repeated delay, or stabilized omission before claiming Α as active.
    - Distinguish an actual recurrent pattern from a single conceptual possibility or one-off absence.
    falsifier_conditions:
    - If recurrence or stabilization is not evidenced, Α remains weak and must not be used to infer drift or role-script formation.
    non_capture_note: 'Pattern formation is not proof of explanatory sufficiency.'
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ω is weak-active only where recognition involves a responsibility, vulnerability, authority, exposure, capacity,
      or obligation gradient. The supplied material names responsibility but does not specify a concrete asymmetry.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - 'Specify the direction and kind of asymmetry: who can acknowledge, who depends on acknowledgment, who bears responsibility,
      and what exposure or obligation is at stake.'
    - Do not moralize asymmetry by default; structural imbalance is not culpability, diagnosis, or legal liability.
    - Allow Ω to remain weak if the case concerns mere noticing, naming, or conceptual explicitness without a responsibility
      gradient.
    falsifier_conditions:
    - If no directional imbalance of power, exposure, capacity, vulnerability, role, or obligation is identifiable, Ω claims
      must be removed or marked weak.
    non_capture_note: 'Asymmetry is structural, not a moral verdict.'
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Θ is major because recognition is temporally structured: something may be noticed, not yet accepted, delayed,
      denied, later made explicit, or carried as responsibility across time.'
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Distinguish sequence, delay, persistence, anticipation, and later explicitness from a static comparison between recognized
      and unrecognized states.
    - Check whether temporality is essential to the case or merely a descriptive addition; here it is central to delay and
      explicit acknowledgment.
    falsifier_conditions:
    - If recognition is treated only as an instantaneous status without delay, persistence, anticipation, or sequence, Θ is
      overextended.
    non_capture_note: 'Temporality in PMS does not by itself settle metaphysical or empirical continuity.'
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: Φ appears where an object moves from unnoticed to noticed, implicit to explicit, denied to acknowledged, responsibility-unclear
      to responsibility-named, or claim-unframed to claim-framed.
    dependency_status: weak
    analytic_weight: major
    calibration_points:
    - Name source frame and target frame, such as implicit concern to explicit acknowledgment, private noticing to shared statement,
      denial to acceptance, or unresolved responsibility to named responsibility.
    - Check whether recontextualization clarifies the acknowledgment structure or merely absorbs disagreement, refusal, or non-fit
      into PMS language.
    falsifier_conditions:
    - If every rupture, resistance, silence, or rival framing is treated as Φ, the reading is over-assimilative.
    non_capture_note: 'Recontextualization must preserve possible non-capture.'
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: 'Χ is active primarily as application discipline: the analysis must retain reflective distance, suspend verdict,
      avoid enforcement, and resist converting acknowledgment into person-ranking, diagnosis, or tribunal judgment.'
    dependency_status: satisfied
    analytic_weight: major
    calibration_points:
    - Check whether the analysis suspends verdict and preserves reversibility instead of using PMS to compel acknowledgment.
    - Distinguish reflective distance from avoidance, denial, empty neutrality, or refusal of responsibility.
    falsifier_conditions:
    - If Χ is suspended to force a verdict, rank persons, diagnose denial, or impose legal responsibility, the PMS application
      is invalid.
    non_capture_note: 'Distance protects against overclaiming and premature closure.'
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - maturity_of_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: Σ is weak because acknowledgment may integrate claim, frame, expectation, responsibility, and response into
      coherent praxis, but the material does not show actual integration.
    dependency_status: weak
    analytic_weight: moderate
    calibration_points:
    - Test whether integration produces discriminative coherence rather than smoothing over denial, disagreement, rival framing,
      or non-capture.
    - Distinguish integration from mere explicit wording, forced consensus, premature closure, or narrative tidiness.
    falsifier_conditions:
    - If coherence is treated as proof that PMS captures recognition adequately, Σ is overclaimed.
    non_capture_note: 'PMS coherence is insufficient by itself.'
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
    - self_model
    - responsibility_as_self_commitment
    - stable_normativity
    - autobiographical_coherence
    examples:
    - holding oneself accountable
    - owning a caregiving role
    - long-term identity commitments and promises
    status_within_pms: treated_as_structurally_basic
    role_in_case: Ψ is weak. Acknowledged responsibility could become self-binding if a subject or institution commits to integrated
      obligations over time, but no concrete self-binding commitment is supplied.
    dependency_status: weak
    analytic_weight: minor
    calibration_points:
    - Apply Ψ only where self-binding, stable normativity, or responsibility-as-self-commitment is explicitly in scope.
    - Do not attribute selfhood, maturity, sincerity, guilt, or accountability to an abstract recognition structure without
      scene evidence.
    falsifier_conditions:
    - If Ψ is applied without supported Σ, Θ, and Χ, the self-binding reading is under-specified.
    non_capture_note: 'SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity.'
operator_layer_mapping:
  L1:
    id: L1
    name: Early structural patterning
    contains:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    base_description: 'Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent
      patterns.'
    case_function: L1 structures the case by distinguishing the object of recognition, locating the directed pressure toward
      acknowledgment, framing what counts as acknowledgment, marking delayed or denied acknowledgment as possible non-event,
      and keeping recurrence only weak unless repetition is evidenced.
  L2:
    id: L2
    name: Relational asymmetry and temporality
    contains:
    - Ω
    - Θ
    base_description: 'Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories
      and commitments.'
    case_function: L2 is conditional. Ω is only weakly available where acknowledgment involves responsibility, vulnerability,
      authority, or obligation gradients; Θ is central because recognition can be delayed, denied, made explicit later, or
      extended as responsibility.
  L3:
    id: L3
    name: Meta-structural reflexivity
    contains:
    - Φ
    - Χ
    - Σ
    base_description: 'Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms
      of praxis.'
    case_function: L3 structures the reflective handling of recognition; Φ marks shifts from implicit to explicit or denied
      to acknowledged, Χ preserves distance and reversibility in the analysis, and Σ remains weak unless coherent uptake into
      praxis is shown.
  L4:
    id: L4
    name: Higher-order self-binding
    contains:
    - Ψ
    base_description: 'Layer in which integrated structures are bound into a relatively stable self-relation maintained across
      time and contexts.'
    case_function: Ψ is secondary and weak in this case. It becomes relevant only if acknowledgment of responsibility is self-bound
      across time; the abstract material does not establish this.
dependency_logic:
  status: partially_dependency_respecting
  forward_dependency_order:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  compositional_reading_used:
  - Ψ
  - Σ
  - Χ
  - Φ
  - Θ
  - Ω
  - Α
  - Λ
  - □
  - ∇
  - Δ
  chain_formula: Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ
  validation:
  - operator: Δ
    dependency_check: root
    satisfied_by: 'The case supplies a differentiable field: person, claim, situation, responsibility, acceptance, denial,
      delay, and explicitness.'
  - operator: ∇
    dependency_check: depends_on_Δ
    satisfied_by: Directedness is conceptually present as pressure toward acknowledgment or response, but no subjective or concrete
      impulse is evidenced.
  - operator: □
    dependency_check: depends_on_Δ_and_∇
    satisfied_by: A conceptual frame of recognition-as-acknowledgment makes the differences and directedness relevant.
  - operator: Λ
    dependency_check: depends_on_□
    satisfied_by: Denial and delay make structured absence conceptually central where acknowledgment is expected within a frame.
  - operator: Α
    dependency_check: depends_on_Δ_∇_□_Λ
    satisfied_by: 'Only weakly satisfied: recurrence or stabilization would be needed to make attractor status active.'
  - operator: Ω
    dependency_check: depends_on_Α
    satisfied_by: 'Only weakly satisfied: responsibility may imply obligation or vulnerability gradients, but the material does
      not specify them.'
  - operator: Θ
    dependency_check: depends_on_Ω_and_Α
    satisfied_by: Conceptually central through delay, denial over time, later explicitness, and responsibility across time,
      though its dependencies remain weak at scene level.
  - operator: Φ
    dependency_check: depends_on_Θ_Ω_□
    satisfied_by: Weakly satisfied through possible shifts from implicit to explicit, denied to acknowledged, or unframed to
      framed.
  - operator: Χ
    dependency_check: depends_on_Φ_Θ_□
    satisfied_by: 'Satisfied as application discipline: the analysis maintains distance, reversibility, and restraint.'
  - operator: Σ
    dependency_check: depends_on_Χ_and_Φ
    satisfied_by: 'Weakly satisfied: coherent uptake is possible but not evidenced as actual integration.'
  - operator: Ψ
    dependency_check: depends_on_Σ_Θ_Χ
    satisfied_by: 'Weakly satisfied: self-binding is possible where responsibility is acknowledged across time, but not established
      by the abstract material.'
  dependency_failure_conditions:
  - If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid.
  - If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high.
  - If an operator is not active, state so rather than forcing the full chain.
