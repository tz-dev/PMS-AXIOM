  primary_pms_reading: >-
    Repair Relationships can be structurally projected as a trust-repair field in which distinctions generate reliance or withdrawal tensions, frames create expectations, non-events test trust, possible patterns stabilize, asymmetries expose vulnerability, temporality structures damage and repair, recontextualization may reshape meaning, distance preserves reversibility, integration remains conditional, and self-binding is possible only where commitment across time is concretely shown.
  continuity_condition: >-
    Continuity would require a temporally sustained trust frame in which expectations, reliance, vulnerability, and role or claim commitments remain identifiable across rupture and possible repair. This condition is conceptually relevant but not concretely established.
  change_condition: >-
    Change would require explicit recontextualization of the rupture or non-event and enacted integration of revised expectations, obligations, or practices. Repair-language alone does not satisfy this condition.
  rupture_or_non_fit_condition: >-
    Rupture, resistance, disagreement, absence, or non-fit remains open as possible betrayal, justified refusal, misunderstanding, irreparable break, legal matter, institutional failure, rival framing, or non-capture; it is not automatically PMS drift or failed integration.
  responsibility_condition: >-
    Responsibility would require a calibrated Ω-Θ-Φ-Ψ structure: specified asymmetry or obligation, temporal extension, recontextualized expectation, and self-binding commitment. The present case makes this relevant but does not assign responsibility.
  dignity_condition: >-
    Dignity-in-Practice constrains the analysis as reflective restraint under asymmetry: no diagnosis, shaming, ranking, forced reconciliation, irreversible labeling, or conversion of vulnerability into moral superiority.
  rival_reading_condition: >-
    Rival formalizations remain open unless explicit comparison criteria demonstrate that PMS discriminates the case more precisely without erasing non-capture or over-assimilating resistance.

