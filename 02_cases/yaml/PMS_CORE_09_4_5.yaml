      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >-
      Developmental trajectory is active at the domain level because damage, withdrawal, repair, and restored trust are temporal. Actual sequence and outcome remain under-specified.
    status: "active"
  reflexive_praxis:
    formula:
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >-
