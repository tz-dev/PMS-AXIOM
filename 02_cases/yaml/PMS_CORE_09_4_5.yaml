operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Δ marks trust versus distrust, reliance versus non-reliance, confidence versus doubt, expectation versus failure, repair versus non-repair, betrayal versus non-betrayal, and person, role, claim, or institution as distinct relational sites.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the active distinction is trust/doubt, reliance/withdrawal, repair/betrayal, expectation/non-event, or person/role/claim/institution."
      - "Do not treat these distinctions as proven concrete oppositions; later scenes may show misunderstanding, disagreement, justified refusal, irreparable rupture, or non-capture."
    falsifier_conditions:
      - "If stable distinctions between trust, reliance, expectation, doubt, betrayal, repair, and refusal cannot be preserved, the PMS reading loses its entry point."
    non_capture_note: "Difference does not by itself prove that PMS captures the case."
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      ∇ appears as structural directedness toward reliance, withdrawal, repair, doubt, renewed confidence, protection, or accusation. It is not a claim about subjective desire.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the tension is practical, relational, epistemic, institutional, or argumentative."
      - "Do not infer subjective motive, affect, intention, or pathology."
    falsifier_conditions:
      - "If no directional orientation toward reliance, withdrawal, repair, doubt, or protection arises from Δ, ∇ is under-specified."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      □ is central because trust and repair differ across interpersonal, role-based, epistemic, institutional, contractual, familial, political, and philosophical frames.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame before deciding what counts as reliance, expectation, failure, repair, or betrayal."
      - "Mark frame shifts explicitly; interpersonal hurt, institutional legitimacy, legal reliance, and epistemic credibility are not the same scene."
    falsifier_conditions:
      - "If no trust-relevant frame can be specified, the analysis becomes too abstract to discriminate."
    non_capture_note: "A frame can clarify a case without exhausting it."
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Λ is central because trust may be tested through meaningful absence: silence, delay, missing response, unmet promise, failed acknowledgment, withheld repair, absent confirmation, or unresolved expectation.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected occurrence and the frame in which its absence matters."
      - "Preserve the possibility that absence marks justified refusal, unavailable evidence, rival framing, irreparability, or PMS non-capture."
    falsifier_conditions:
      - "If no structured expectation exists within a frame, Λ should not be asserted."
    non_capture_note: "Absence must not be automatically translated into incomplete integration."
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Α is relevant where trust, doubt, reliance, withdrawal, avoidance, repair attempts, or betrayal narratives stabilize into recurrent patterns or role scripts. It remains conditional because no recurrence evidence is supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence, path dependence, or role-script formation rather than merely naming trust processes."
      - "Distinguish a stable attractor from a single rupture, isolated misunderstanding, one-time delay, or conceptual enumeration."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown in a concrete scene, Α is over-read and must remain weak."
    non_capture_note: "Pattern formation is not proof of explanatory sufficiency."
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Ω is salient because reliance and vulnerability imply possible asymmetry of exposure, power, capacity, obligation, credibility, role authority, or institutional position. Direction and kind are not adjudicated.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify who or what is exposed, obligated, empowered, dependent, or institutionally positioned."
      - "Do not moralize asymmetry by default."
      - "Allow Ω to remain weak where no directional imbalance is specified."
    falsifier_conditions:
      - "If no directional imbalance of exposure, power, capacity, obligation, or role differentiation is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Θ is central because trust, betrayal, repair, confidence, doubt, and renewed reliance depend on sequence, delay, history, recurrence, anticipation, persistence, and possible restoration over time.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish a diachronic trajectory from a static contrast."
      - "Do not infer a specific sequence, developmental arc, or restoration outcome without scene evidence."
    falsifier_conditions:
      - "If no temporal extension, delay, expectation over time, or persistence is relevant, Θ is overextended."
    non_capture_note: "Temporality in PMS does not by itself settle metaphysical or empirical continuity."
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Φ appears where repair or reinterpretation places rupture, doubt, failure, or absence into a new frame such as misunderstanding, accountability, changed obligation, renewed trust, justified withdrawal, or institutional reform.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name source frame and target frame."
      - "Check whether recontextualization clarifies or merely erases betrayal, disagreement, refusal, or non-fit."
    falsifier_conditions:
      - "If every rupture, resistance, disagreement, or absence is absorbed as Φ, the reading is over-assimilative."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Χ suspends verdict, inhibits immediate accusation or reconciliation, preserves reversibility, and prevents PMS from becoming enforcement, tribunal judgment, person-ranking, or forced closure.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Check that the analysis does not decide betrayal, repair success, or maturity failure."
      - "Distinguish distance from avoidance, denial, indifference, strategic delay, or empty neutrality."
    falsifier_conditions:
      - "If Χ is suspended to force blame, absolution, reconciliation, diagnosis, or legal conclusion, the PMS application is invalid."
    non_capture_note: "Distance protects against overclaiming and premature closure."
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Σ is relevant to repair because restoration of trust would require integrating reliance, vulnerability, expectation, rupture, recontextualization, and future enactment. It remains weak because no concrete integration is supplied. In this case, Σ should be read as a conditional repair-threshold rather than as an achieved result: a structurally coherent account of repair is not yet integration unless the relevant tensions are coordinated in practice and remain discriminable from smoothing, excuse, pressure toward reconciliation, or institutional reassurance.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether integration discriminates rather than smooths over conflict."
      - "Distinguish integration from forced coherence, premature forgiveness, institutional messaging, or assimilation of rival readings."
      - "Require enacted coordination of rupture, expectation, vulnerability, responsibility, and future practice before treating Σ as achieved."
    falsifier_conditions:
      - "If coherence is treated as proof of repair, responsibility, truth, or adequacy, Σ is overclaimed."
      - "If disagreement, refusal, non-fit, or unresolved rupture is automatically described as low integration, Σ is being used coercively rather than structurally."
    non_capture_note: "PMS coherence is insufficient by itself."
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >-
      Ψ is relevant only conditionally: restored trust may involve accountability, promise-keeping, renewed role ownership, or stable institutional constraint. The case gives no concrete self-binding structure. For this case, Ψ must remain downstream of Σ, Θ, and Χ: a promise, apology, declaration, policy statement, or renewed confidence is not yet self-binding unless it is integrated, temporally maintained, and reflectively constrained in the relevant frame.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Apply Ψ only where a concrete actor, role, or institution is structurally bound to integrated commitments across time."
      - "Do not attribute literal subjectivity or metaphysical selfhood to institutions, roles, claims, or abstract relationships."
      - "Distinguish self-binding from verbal assurance, reputational performance, temporary alignment, or external pressure."
    falsifier_conditions:
      - "If Ψ is applied without evidence of Σ, Θ, and Χ, the self-binding reading is under-specified."
      - "If self-binding is inferred merely from repair-language or from the desire for restored trust, Ψ is overclaimed."
    non_capture_note: "SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >-
      Base layer of structural operations that create distinctions, impulses, frames, non-events, and recurrent patterns.
    case_function: >-
      L1 supplies trust distinctions, reliance or withdrawal tensions, frames of expectation, meaningful non-events, and possible stabilizing patterns. It is the strongest layer because the case material directly names trust, expectation, doubt, repair, and betrayal.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >-
      Layer in which stabilized patterns become asymmetric relations and are temporally extended into trajectories and commitments.
    case_function: >-
      L2 is structurally important because reliance and vulnerability indicate possible asymmetry, and trust repair is inherently temporal. It remains calibration-dependent because no concrete direction or sequence is supplied.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >-
      Layer of transformation, distancing, and integration that enables adaptive learning and more mature forms of praxis.
    case_function: >-
      L3 organizes possible repair through recontextualization, reflective distance, and integration. Actual integration is not established.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >-
      Layer in which integrated structures are bound into a relatively stable self-relation maintained across time and contexts.
    case_function: >-
      Ψ is analytic-only to secondary. It becomes central only if a concrete actor, role, or institution commits itself across time to integrated repair.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "Trust/distrust, reliance/withdrawal, repair/betrayal, expectation/non-event, and person/role/claim/institution distinctions are structurally available."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Reliance, withdrawal, doubt, repair, protection, and accusation provide directional tensions arising from Δ."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "The case explicitly spans persons, roles, claims, and institutions, requiring frames of relevance."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Trust may be tested by meaningful absence, delay, silence, failed expectation, or missing repair within a frame."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Attractor status is weak because recurrence and stabilization are conceptually relevant but not evidenced."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Vulnerability and reliance imply possible exposure or obligation, but the concrete asymmetry depends on still-weak pattern calibration."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Trust damage and repair are temporal, but the specific trajectory remains under-specified."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Repair may require reframing rupture or absence, but source and target frames are not concretely supplied."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Distance is maintained by suspending verdict, preserving reversibility, and avoiding person-level attribution."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Integration is relevant to repair but weak because no enacted repair or synthesis is supplied."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Self-binding remains analytic because commitment across time is possible but not demonstrated."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

