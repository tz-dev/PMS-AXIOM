derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >-
    Each derived structure must be marked as active, weak, analytic_constraint, possible_but_not_entailed, under_specified, or not_applicable. Consideration does not imply activation.
  rule: >-
    Derived structures are formula-derived PMS constructs. They are not independent axioms, diagnoses, ontological rankings, metaphysical entities, or proof of PMS completeness.
  case_status: >-
    Awareness_A and Coherence_C are active as conceptual projections; Responsibility_R is weak; Action_E is under-specified; Dignity_in_Practice_D is an application constraint; SELF_FIXPOINT is analytic-only; AD_A>>E and AD_Sigma_low are possible_but_not_entailed risks.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >-
      Awareness is modeled structurally, not phenomenologically. PMS derivation does not exhaust all notions of awareness.
    case_reading: >-
      Awareness_A appears as sustained, framed differentiation among trust, distrust, reliance, withdrawal, confidence, doubt, repair, betrayal, and non-repair across a temporally extended trust field.
    status: "active"
    calibration_points:
      - "Differentiate trust-related states and transitions within a specified relational, role-based, epistemic, or institutional frame and across a concrete sequence if later operationalized."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >-
      Coherence captures narrative stability of action, including meaningful absences and delays, without requiring full integration or self-binding.
    case_reading: >-
      Coherence_C appears where directional reliance or withdrawal is framed by expectations and meaningful non-events across time. It is central to trust repair, while not proving truth, justice, or adequacy.
    status: "active"
    calibration_points:
      - "Distinguish trust-repair coherence from truth, legal proof, therapeutic repair, forced reconciliation, institutional messaging, or narrative smoothing."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >-
      Responsibility is structural rather than moralistic and is not legal liability, blame, or diagnosis.
    case_reading: >-
      Responsibility_R is weak and conditional. It would require concrete asymmetry, temporal obligation, recontextualized expectation, and self-binding commitment. The case material makes responsibility relevant but does not assign it.
    status: "weak"
    calibration_points:
      - "Identify asymmetry, temporality, recontextualization, and self-binding before claiming responsibility."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into coherent enactment."
    notes: >-
      Action here is integrated and temporally extended, not mere behavior or statement.
    case_reading: >-
      Action_E is under-specified because the case gives no concrete withdrawal, apology, restitution, repair attempt, refusal, renewed reliance, institutional change, or future practice.
    status: "under_specified"
    calibration_points:
      - "Distinguish enacted repair or withdrawal from interpretation, statement, feeling, accusation, institutional language, or abstract conceptual fit."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >-
      Dignity-in-Practice concerns handling asymmetry, not ranking persons or asserting ontological worth.
    case_reading: >-
      Dignity_in_Practice_D constrains the analysis by requiring reflective restraint under possible asymmetry and preventing shaming, ranking, humiliation, diagnosis, forced reconciliation, and irreversible attribution.
    status: "application_constraint"
    calibration_points:
      - "Check that asymmetry is handled without ranking persons, pathologizing doubt or refusal, moralizing vulnerability, or treating repair-language as automatic superiority."
    non_capture_note: "D is a praxeological application constraint, not an ontological or moral superiority claim."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >-
    Formal representation of self-binding as the result of integrated, reflexively modulated, temporally extended, asymmetry-aware patterns of praxis being bound into a relatively stable self-relation.
  case_reading: >-
    SELF_FIXPOINT is not the primary structure of this conceptual case. It becomes relevant only analytically where repair would involve a subject, role, or institution binding itself to integrated commitments across time. No literal selfhood, consciousness, or metaphysical subjectivity is inferred.
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >-
    This sequence records one derivational strategy within PMS. It must not be read as proving that all forms of selfhood, agency, identity, or case structure reduce without remainder to this exact chain.
  non_capture_note: >-
    SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions as literal subjectivity unless explicitly scoped as structural self-binding or analytic self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >-
    PMS.yaml includes asymmetry drift patterns as structurally derived distortion forms. They are not automatically entailed by a case and must not be treated as diagnoses, person-types, or moral verdicts.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >-
        Evaluative or power asymmetry becomes stabilized through attractor formation, while recontextualization reinforces drift toward evaluation rather than supporting integrative transformation and balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: >-
      AD_A>>E remains only a structural risk. It could appear if trust repair became trapped in evaluation, interpretation, suspicion, or reflective distance while concrete repair, accountability, withdrawal, or renewed practice was suppressed or chronically delayed. The present case does not show that pattern.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >-
      This is not a personality trait, diagnosis, person-label, clinical state, or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >-
        Frequent recontextualization without sufficient integration leads to unstable trajectories and weak coherence of praxis, especially where unstable recontextualization and weak integration unfold under asymmetrically loaded praxis conditions.
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >-
      AD_Sigma_low remains only a structural risk. It could appear if recontextualization repeatedly shifted the meaning of rupture, apology, or obligation without integrating expectations, responsibility, and future action. The present case does not establish volatility or inconsistent responsibility.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >-
      This pattern describes structural volatility in action forms, not a clinical state, diagnosis, or person-type.

example_operator_chains_application:
