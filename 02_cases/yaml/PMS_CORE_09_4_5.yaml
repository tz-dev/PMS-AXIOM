core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >-
      PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >-
      The case is treated as praxis-structure: reliance, vulnerability, expectation, withdrawal, repair, and betrayal are read as patterned relations among enactments, roles, frames, and temporal commitments, not as psychological essence or ontology.
    failure_condition: >-
      The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >-
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis; completeness, optimal minimality, and unique ordering remain open.
    status: "satisfied"
    case_application: >-
      Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators. Trust, repair, betrayal, expectation, confidence, and doubt are case terms, not added PMS operators.
    failure_condition: >-
      The analysis would fail P2 if it introduced new PMS operators, axes, layers, or primitives as PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >-
      PMS derives awareness, coherence, responsibility, action, dignity-in-practice, and drift patterns from operator compositions rather than treating them as independent primitives.
    status: "satisfied"
    case_application: >-
      Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, AD_A>>E, and AD_Sigma_low are treated only as formula-derived structures.
    failure_condition: >-
      The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >-
      Asymmetry (Ω) and temporality (Θ) are central structural operators; responsibility, maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions.
    status: "satisfied"
    case_application: >-
      Ω and Θ carry major analytic weight because reliance and vulnerability imply possible exposure or obligation, while trust damage and repair require sequence, delay, persistence, and restoration trajectories. Their concrete direction remains unadjudicated.
    failure_condition: >-
      The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >-
      PMS may be represented computationally, but representation does not imply direct implementation, interoperability, or explanatory adequacy.
    status: "satisfied"
    case_application: >-
      This YAML representation is not an implementation of trust, repair, agency, morality, legal judgment, diagnosis, empirical adequacy, or PMS Base validation.
    failure_condition: >-
      The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >-
      PMS remains open to comparison with alternative grammars, sharper discriminative models, and empirically grounded formalisms.
    status: "satisfied"
    case_application: >-
      Rival readings remain open: epistemic, relational-ethical, legal-contractual, institutional, phenomenological, affective, conflict-theoretic, and strategic accounts of trust repair.
    failure_condition: >-
      The analysis would fail P6 if PMS translation were treated as defeating rival formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >-
      Translation into PMS terms does not prove exhaustive capture; some praxis may remain partially legible or resist assimilation.
    status: "satisfied"
    case_application: >-
      Possible non-capture is preserved for lived vulnerability, forgiveness, justified refusal, irreparable rupture, legal proof, institutional legitimacy, and rival grammars.
    failure_condition: >-
      The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >-
      PMS is not a diagnostic tool and must not be used for clinical, therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >-
      No clinical, psychological, therapeutic, forensic, personality, risk, competence, or pathology inference is made. Doubt, withdrawal, rupture, silence, and refusal remain structurally ambiguous.
    failure_condition: >-
      The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >-
      PMS applications must remain tied to praxeological scenes, roles, and structures; global person-labels and irreversible ontological attributions are out of scope.
    status: "partial"
    case_application: >-
      Because no concrete scene is supplied, the analysis is explicitly marked as a non-concrete case-type-bound projection. Concrete responsibility, repair, betrayal, and action claims require a later scene-bound application.
    failure_condition: >-
      The analysis would fail P9 if it generated global, irreversible, decontextualized claims.

