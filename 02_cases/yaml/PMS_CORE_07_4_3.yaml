    or applied analysis.
  required_for_empirical_or_applied_use:
    observable_indicators:
      "Δ": "Operational use would require explicit coding of branch distinctions: action, omission, harmed parties, saved parties, causal pathways, and responsibility categories."
      "∇": "Operational use would require observable or formally specified directional pressure such as a decision objective, constraint, or problem demand, without inferring psychology."
      "□": "Operational use would require an explicit frame: ethical, legal, institutional, emergency, simulation, or pedagogical."
      "Λ": "Operational use would require specified omissions, non-events, expected actions, counterfactuals, and the frame that makes absence meaningful."
      "Α": "Operational use would require evidence of recurrence, repeated variants, stabilized scripts, or institutional routine rather than a single abstract case."
      "Ω": "Operational use would require calibrated asymmetry indicators: capacity, exposure, vulnerability, duty, role power, or responsibility gradient."
      "Θ": "Operational use would require sequence data, probability or foreseeability standards, timing, irreversibility, and consequence tracking."
      "Φ": "Operational use would require explicit source and target frames and criteria for legitimate versus over-assimilative recontextualization."
      "Χ": "Operational use would require review mechanisms preserving reversibility, non-ranking, non-enforcement, and explicit refusal of premature verdicts."
      "Σ": "Operational use would require tests that integration discriminates among rival frames rather than smoothing conflict."
      "Ψ": "Operational use would require a concrete self-binding agent, role commitment, stable norm, or policy commitment and limits against metaphysical attribution."
    negative_cases:
      - "A scenario where no action or omission affects harm outcomes."
      - "A scenario where omission is not meaningful within the frame."
      - "A scenario where there is no asymmetry of capacity, exposure, duty, or vulnerability."
      - "A scenario where rival ethical framing is explicitly outside PMS scope."
      - "A concrete legal case whose jurisdictional rules override abstract structural projection."
    comparison_needs:
      - "rival_model_comparison"
      - "explicit_criteria_for_superior_discrimination"
      - "calibration_thresholds_for_operator_activation"
      - "case_specific_evidence"
      - "external_evaluation_where_empirical_claims_are_made"
  current_status: >
    Operationalization is not fulfilled. The present YAML is only a conceptual
    PMS projection of an abstract dilemma-form. Empirical, comparative,
    computational, legal, clinical, and applied validation are not provided and
    are not claimed.

guardrails:
  general:
    - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
    - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
    - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
    - "Do not use PMS to rank or compare human beings."
    - "Do not treat translation into PMS terms as proof of exhaustive capture."
    - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
    - "Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as immaturity per se."
    - "Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external accountability."
    - "Preserve intelligibility, revisability, and scene-bounded interpretation."
  case_specific:
    non_psychological: >
      No motive, intention, fear, desire, virtue, vice, maturity, personality,
      or mental state is inferred from the forced-choice structure.
    non_metaphysical: >
      No claim is made about consciousness, qualia, ontological dignity,
      metaphysical worth, sacredness, or the ultimate value of persons.
    non_diagnostic: >
      No chooser, party, reader, or philosophical position is diagnosed or typed
      as healthy, pathological, mature, immature, integrated, deficient,
      avoidant, or cruel.
    non_legal_forensic: >
      No legal liability, negligence, mens rea, justification, excuse, causation
      standard, evidentiary burden, or forensic conclusion is claimed.
    non_implementation_claim: >
      The analysis is not a decision algorithm, policy rule, AI safety system,
      triage procedure, governance protocol, or operational moral calculus.
    non_moral_ranking: >
      The analysis does not rank lives, persons, groups, victims, hypothetical
      choosers, or moral theories by PMS maturity or dignity.
    non_exhaustive_capture: >
      PMS translation leaves open moral, tragic, legal, metaphysical,
      phenomenological, and rival-formal dimensions that may not be captured by
      this operator grammar.
    reversibility: >
      Every operator assignment is bounded by the abstract case material and
      may be revised if concrete scene facts, rival frames, or falsifier
      conditions are supplied.
    dignity_in_practice: >
      Dignity-in-Practice is preserved as restraint under asymmetry: affected
      parties and hypothetical choosers are not shamed, ranked, dehumanized, or
      converted into irreversible labels.

limits:
  - >
    The PMS reading is limited to the abstract structure of trolley dilemmas and
    cannot decide what one morally ought to do in any trolley variant.
  - >
    No empirical, metaphysical, diagnostic, clinical, legal, forensic,
    implementation, or PMS Base validation claim is made or warranted by the
    case material.
  - >
    Rival readings and possible non-capture remain open, especially for
    consequentialist, deontological, causal, legal, tragic, phenomenological,
    and metaphysical treatments.
  - >
    Because the case maps smoothly onto several PMS operators, coherence risk
    is high: PMS may under-discriminate unless concrete calibration and rival
    comparison are added.

case_synthesis:
  primary_pms_reading: >
    Trolley dilemmas are structurally readable as forced-choice praxis in which
    differences between action and omission, harm and rescue, and responsibility
    assignment are framed, temporalized, asymmetrically loaded, and repeatedly
    recontextualized under reflective distance. The PMS reading is strongest
    where the case is treated as a dilemma-form rather than a concrete event:
    Δ, ∇, □, Λ, Ω, Θ, Φ, and Χ can be activated without claiming that the
    resulting structure decides the moral, legal, empirical, or metaphysical
    issue.
  continuity_condition: >
    Continuity is limited to the recurrent dilemma-form: action/omission,
    harm/rescue, and responsibility-ascription remain intelligible across
    variants only if the forced-choice frame and foreseeable consequence
    structure persist. If a variant changes the available actions, the causal
    mechanism, the status of omission, the probability of consequences, the
    role of the chooser, or the responsibility standard, continuity must be
    recalibrated rather than assumed.
  change_condition: >
    Change occurs through Φ when the same structure is reframed as outcome
    comparison, doing versus allowing, rescue versus sacrifice, duty versus
    consequence, causal intervention, role responsibility, or tragedy. These
    frame shifts are analytically relevant but not automatically signs of PMS
    drift, incomplete integration, evasion, or maturity failure.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, or non-fit is preserved as
    possible rival formalization or non-capture; it is not automatically
    redescribed as drift, failed Σ, incomplete calibration, or maturity failure.
    In this case, non-fit may mark a genuine remainder around moral
    commensurability, tragic choice, legal doctrine, phenomenological burden,
    or metaphysical value.
  responsibility_condition: >
    Responsibility_R remains weak unless the case specifies a concrete
    asymmetry, temporal consequence path, recontextualization of obligation, and
    self-binding agent or role commitment. Responsibility-ascription is raised
    by the case but not fully derived. A PMS-visible relation between action,
    omission, and consequence is therefore not enough by itself to establish
    Responsibility_R.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring non-ranking,
    non-shaming, reversibility, reflective distance, and restraint under
    asymmetry; it is not ontological dignity or moral superiority. This matters
    especially because trolley dilemmas can tempt the analysis to rank persons,
    lives, victims, choosers, or moral theories; PMS application discipline
    blocks that move.
  rival_reading_condition: >
    Rival formalizations remain open and may challenge PMS if they discriminate
    action, omission, causation, duty, consequence, tragedy, or moral value more
    sharply than the present PMS projection. PMS translation is therefore a
    structured reading, not a victory condition over consequentialist,
    deontological, causal, legal, tragic, phenomenological, or metaphysical
    accounts.

final_structural_formula:
  primary_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ, with Α weak and Σ and Ψ not included as established case operators unless a concrete integration or self-binding structure is supplied"
  primary_formula_status: "primary_case_model"
  compressed_reading: >
    The trolley-dilemma form is a reversible PMS conceptual projection of
    differentiated, framed, omission-sensitive, asymmetrical, temporally
    foreseeable harm allocation that requires recontextualization and reflective
    distance while leaving integration and self-binding weak. The formula should
    be read as a disciplined structural pre-analysis, not as a moral decision
    rule, legal standard, empirical model, diagnostic instrument, or validation
    of PMS Base.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity,
    implementation validity, moral ranking, or PMS Base validation. The reading
    remains reversible and may be weakened by concrete variants that alter the
    frame, asymmetry, omission status, causal structure, foreseeability, duty
    relation, or responsibility standard.