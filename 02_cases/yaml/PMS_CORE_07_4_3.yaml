      completeness.
    repository_role: >
      This case follows PMS_1.3 order and dependencies unless explicitly marked
      as critique or rival formalization.
  operator_inventory:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  operator_inventory_status: "no_additional_pms_operators_introduced"

operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ marks the distinctions that make trolley dilemmas structurally
      analyzable: action versus omission, harmed versus saved, intervention
      versus non-intervention, foreseeable versus unforeseeable consequence,
      and responsibility-ascribed versus responsibility-not-ascribed.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the relevant distinction is action/omission, harm/rescue, direct/indirect consequence, causal/role responsibility, or another framed contrast."
      - "Check that the distinction is not smoothed into one generic consequence calculus unless that is explicitly the rival formalization being tested."
    falsifier_conditions:
      - "If the case supplies no stable contrast between action, omission, harmed parties, saved parties, or responsibility branches, PMS loses its entry point for this analysis."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ appears as structural directedness generated by the difference between
      possible branches: pressure to prevent, redirect, reduce, or account for
      harm. This is not a claim about subjective desire or motivation.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The tension is structural and practical within the dilemma-form: a forced-choice pressure around harm and rescue."
      - "No psychological urge, emotion, intention, virtue, vice, fear, or preference is inferred from the abstract material."
    falsifier_conditions:
      - "If the case contains distinctions but no directional pressure toward action, omission, prevention, rescue, or responsibility assignment, ∇ becomes under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is the forced-choice philosophical frame that makes action, omission,
      harm, rescue, foreseeability, and responsibility relevant. The exact
      ethical, legal, institutional, or emergency frame remains unspecified.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Active frame: abstract philosophical forced-choice dilemma concerning harm allocation and responsibility-ascription."
      - "Mark frame shifts among consequence frame, action/omission frame, duty frame, causation frame, responsibility frame, and tragedy frame rather than collapsing them."
    falsifier_conditions:
      - "If no frame makes the alternatives, omissions, harms, and responsibility questions relevant, the PMS reading becomes too abstract to discriminate."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active because omission, non-intervention, foregone rescue, failure
      to redirect, failure to prevent, and counterfactual non-action are
      structurally central to trolley dilemmas.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected occurrence: switching, not switching, intervening, refraining, rescuing, preventing, or refusing an available branch, and specify the frame that makes the absence meaningful."
      - "Preserve the possibility that some absences mark tragic remainder or PMS non-capture rather than defect, drift, or incomplete integration."
    falsifier_conditions:
      - "If the scene has no framed expectation of possible action, omission, intervention, or prevention, Λ should be removed or marked not active."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weakly present as the recurrent philosophical pattern called a
      trolley dilemma: a stabilized problem-form repeated across variants. It is
      not established as a concrete behavioral habit, institutional routine, or
      empirical attractor.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence at the level of dilemma-form or repeated formal variants rather than treating a single abstract case as empirical recurrence."
      - "Distinguish a stable philosophical script from real-world role-script emergence or repeated decision behavior."
    falsifier_conditions:
      - "If the case is treated as a one-off abstract thought experiment without any recurring formal pattern, Α must remain weak or not active."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is active as structural imbalance between the chooser or
      decision-position that can affect outcomes and the affected parties
      exposed to harm or rescue. It also marks possible asymmetry between saved
      and harmed parties. This is not moral ranking.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the asymmetry is causal capacity, vulnerability, exposure, obligation, role power, responsibility gradient, or allocation of harm."
      - "Do not moralize asymmetry, rank lives, or infer blame from structural imbalance alone."
      - "Keep Ω weak where concrete duty, role, probability, or agency capacity is not supplied."
    falsifier_conditions:
      - "If no directional imbalance of capacity, exposure, obligation, vulnerability, or responsibility is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is active because the dilemma depends on sequence and foreseeable
      consequence trajectories: action or omission precedes, redirects,
      prevents, or allows later harm or rescue.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish temporal trajectory from static numerical comparison by specifying before/after, delay, irreversibility, and consequence realization."
      - "Check whether foreseeability is conceptual, probabilistic, legal, empirical, or merely stipulated; this case provides only conceptual foreseeability."
    falsifier_conditions:
      - "If action or omission does not temporally affect later consequence trajectories, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is active because trolley dilemmas change under rival frames: causing
      versus allowing, action versus omission, rescue versus sacrifice, duty
      versus consequence, responsibility versus non-responsibility, and tragedy
      versus solvable decision.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Source and target frames include consequence minimization, action/omission asymmetry, duty/prohibition, causal responsibility, role responsibility, and tragic forced choice."
      - "Test whether recontextualization clarifies discriminative structure or merely absorbs disagreement, rupture, non-fit, or rival ethics into PMS terms."
    falsifier_conditions:
      - "If every rival reading is automatically redescribed as PMS recontextualization, the analysis becomes over-assimilative and violates non-capture discipline."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as the application condition of reflective distance: the
      analysis suspends verdict, resists tribunal posture, and keeps the
      forced-choice structure reversible, bounded, and non-totalizing.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Check that the analysis does not force a moral, legal, diagnostic, metaphysical, or implementation verdict."
      - "Distinguish reflective distance from avoidance of the dilemma, empty neutrality, detachment from harm, or suppression of asymmetry."
    falsifier_conditions:
      - "If Χ is suspended to force closure, moral ranking, legal judgment, or PMS authority, the PMS application becomes invalid."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak because the case invites integration of tensions across frames,
      but no concrete resolution, coherent action plan, or stable synthesis is
      supplied. PMS coherence must not be treated as sufficient.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether any proposed integration distinguishes action/omission, causation/allowing, harm/rescue, and responsibility rather than smoothing them."
      - "Distinguish integration from forced coherence, moral closure, or PMS over-assimilation of rival formalizations."
    falsifier_conditions:
      - "If coherence is treated as proof of moral adequacy, empirical truth, legal validity, or complete capture, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is weak because responsibility is raised as a question, but no concrete
      agent, role, self-relation, commitment, or stable normativity is
      specified. Ψ applies only as analytic self-binding of the PMS application
      unless further case material is supplied.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ to the case only if a concrete chooser, role, commitment, or responsibility-as-self-commitment is specified."
      - "Do not attribute selfhood, identity, maturity, or stable normativity to an abstract dilemma, trolley system, or hypothetical chooser without explicit scope."
    falsifier_conditions:
      - "If Ψ is applied to derive Responsibility_R or SELF_FIXPOINT without Σ, Θ, Χ, and a concrete self-binding relation, the reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of
      subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 structures the dilemma as differentiated forced-choice praxis: branches
      are distinguished, harm-related directional pressure arises, the
      philosophical frame constrains relevance, omission becomes meaningful,
      and a weak problem-pattern is stabilized across trolley variants.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 structures the case through asymmetry and temporality: the
      decision-position can affect exposed parties, and action or omission
      unfolds into foreseeable consequence trajectories. Because the case is
      abstract, these remain conceptual rather than empirical or legal
      gradients.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables
      adaptive learning and more mature forms of praxis.
    case_function: >
      L3 structures the reflective handling of the dilemma: rival frames
      recontextualize the same structure, Distance keeps the analysis reversible
      and non-tribunal, and Integration remains weak unless a discriminating
      synthesis is supplied.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      Ψ is analytic-only or weak in this case. The case raises
      responsibility-ascription, but it does not provide a concrete
      self-binding agent, role commitment, or stable self-relation from which
      full Self-Binding can be derived.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: >
        The case material supplies stable conceptual differences: action or
        omission, harmed or saved, and responsibility assigned or not assigned.
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: >
        The harm/rescue contrast generates structural pressure to act, refrain,
        prevent, redirect, or account for consequences.
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: >
        The philosophical forced-choice frame constrains which differences and
        pressures count as relevant.
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: >
        Omission and non-intervention become meaningful because the frame treats
        absent action as consequence-relevant.
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: >
        A weak attractor is supplied by the recurrent trolley-dilemma form, not
        by concrete empirical repetition.
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: >
        Asymmetry is conceptually visible through decision capacity and
        affected-party exposure, but its dependency on Α remains weak because
        no concrete stabilized role-pattern is given.
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: >
        Foreseeable consequence trajectories are conceptually central, but not
        empirically calibrated.
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: >
        Rival frames recontextualize the structure while depending on the
        forced-choice frame, temporal consequences, and asymmetry.
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: >
        Reflective distance is maintained by refusing verdict, ranking, legal
        judgment, diagnosis, implementation, and PMS Base validation.
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: >
        Integration is only weakly available because no final synthesis or
        discriminating resolution is supplied; coherence is not treated as
        sufficient.
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: >
        Self-Binding is weak and analytic-only because the case lacks a concrete
        agent, role, or commitment; application self-binding is maintained as a
        guardrail.
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

