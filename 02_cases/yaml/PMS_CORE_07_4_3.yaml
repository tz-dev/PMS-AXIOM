analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "model_internal_derivation"
      - "case_type_bound_structural_reading"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: "false"
    implication: >
      The case type permits a reversible PMS projection of a forced-choice
      structure but does not permit empirical findings, legal liability,
      diagnosis, metaphysical conclusions, implementation claims, moral
      ranking, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The case strongly fits several PMS operators, which creates a risk that
      the reading becomes too smooth, over-assimilative, or under-discriminating
      among consequentialist, deontological, causal, omission-based, legal,
      tragic, and non-PMS readings. The main risk is not that PMS cannot map the
      case, but that it can map it too fluently: Δ, □, Λ, Ω, Θ, Φ, and Χ can
      make the dilemma look structurally well-contained even where the moral,
      legal, metaphysical, or tragic problem may remain unresolved.
    mitigation: >
      The analysis marks Σ and Ψ weak, keeps Α weak, preserves non-capture,
      includes rival readings and falsifiers, and refuses to treat PMS coherence
      as moral, empirical, legal, metaphysical, or implementation sufficiency.
      It also requires discriminative force: the PMS reading must show how it
      differentiates action from omission, causing from allowing, harm
      allocation from responsibility-ascription, conceptual foreseeability from
      empirical probability, and structural asymmetry from blame or ranking.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural grammar of difference, forced frame, omission,
      asymmetry, temporality, recontextualization, and reflective distance in
      trolley dilemmas. This coverage is strong at the level of abstract
      dilemma-form because the case explicitly turns on framed distinctions,
      meaningful non-action, consequence trajectories, and rival responsibility
      framings.
    discrimination_requirement: >
      The PMS reading must distinguish action from omission, causing from
      allowing, harm allocation from responsibility-ascription, conceptual
      foreseeability from empirical probability, and structural asymmetry from
      moral blame or person-ranking. It must also distinguish a structurally
      coherent PMS projection from a morally adequate answer to the dilemma.
      If different trolley variants with different causal mechanisms,
      probability structures, duties, and omission-frames all receive the same
      formula without further calibration, the reading becomes
      under-discriminating.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish action/omission structure from responsibility-ascription."
      expected_pms_distinction: >
        Δ and Λ separate action/non-action and meaningful omission, while
        Responsibility_R requires Ω, Θ, Φ, and Ψ; responsibility may not be
        claimed merely because an omission is structurally visible.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish coherent PMS mapping from adequate moral solution."
      expected_pms_distinction: >
        Σ may coordinate tensions only if it discriminates rival frames; Χ and
        P7 require that coherence not become proof of moral truth, legal
        validity, empirical adequacy, or exhaustive capture.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "Action/omission, harmed/saved, intervention/non-intervention, and responsibility/no-responsibility distinctions calibrate Difference."
      current_calibration: "satisfied"
    - operator: "∇"
      question: "The structural pressure to prevent, redirect, reduce, or account for harm calibrates Impulse without implying subjective desire."
      current_calibration: "partial"
    - operator: "□"
      question: "The abstract philosophical forced-choice frame calibrates Frame, while specific ethical, legal, institutional, or emergency frames remain under-specified."
      current_calibration: "partial"
    - operator: "Λ"
      question: "Omission, non-intervention, foregone rescue, and counterfactual non-action calibrate Non-Event within the forced-choice frame."
      current_calibration: "partial"
    - operator: "Α"
      question: "The recurring trolley-dilemma problem-form calibrates Attractor weakly; concrete behavioral or institutional recurrence is absent."
      current_calibration: "weak"
    - operator: "Ω"
      question: "Decision capacity versus affected-party exposure calibrates Asymmetry conceptually; duty, role, and vulnerability gradients are not concretely specified."
      current_calibration: "partial"
    - operator: "Θ"
      question: "Foreseeable consequence sequence calibrates Temporality conceptually; empirical probabilities and legal foreseeability are absent."
      current_calibration: "partial"
    - operator: "Φ"
      question: "Rival frames of action/omission, causing/allowing, duty/consequence, rescue/sacrifice, and tragedy/solution calibrate Recontextualization."
      current_calibration: "partial"
    - operator: "Χ"
      question: "Suspension of verdict, non-ranking, reversibility, and refusal of enforcement calibrate Distance."
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "Integration is calibrated only by a discriminating synthesis of rival frames, which the case does not provide."
      current_calibration: "weak"
    - operator: "Ψ"
      question: "Self-Binding requires a concrete agent, role, commitment, or responsibility-as-self-commitment, none of which is supplied."
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "The moral rightness or wrongness of a trolley choice."
      - "The commensurability or non-commensurability of lives and harms."
      - "Tragic remainder that may resist formal resolution."
      - "Legal doctrine, jurisdictional standards, causation rules, and liability."
      - "Phenomenological distress or lived experience of a chooser."
      - "Metaphysical value, consciousness, dignity, or moral worth."
      - "Rival ethical formalisms that do not reduce to PMS grammar."
    rule: >
      These zones must not be automatically redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "Consequentialist formalization that treats the branches primarily as outcome comparison."
      - "Deontological formalization that treats direct harm and prohibition as structurally decisive."
      - "Action/omission-asymmetry formalization that distinguishes doing from allowing."
      - "Causal-responsibility formalization focused on intervention and redirection."
      - "Role-duty formalization requiring a specified agent, office, or obligation."
      - "Tragedy-structure formalization in which no clean resolution is available."
      - "Non-PMS formalization that treats the core issue as outside PMS capture."
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if the case lacks a
        meaningful forced choice, if action or omission does not affect harm or
        rescue branches, or if no frame makes responsibility-ascription
        relevant.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if materially different trolley
        variants, causal structures, action/omission distinctions, role duties,
        or foreseeability standards all receive the same operator weighting
        without further calibration.
    - id: "F3"
      condition: >
        The reading would become over-assimilative if rival ethical
        disagreement, tragic remainder, absence, resistance, or non-fit were
        automatically translated into Φ, Σ failure, drift, maturity failure, or
        incomplete calibration.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The application is valid as a reversible PMS conceptual projection with
      high coherence risk. It is usable for structural pre-analysis only
      because it preserves weak operators, rival readings, falsifiers,
      non-capture, and all non-empirical, non-diagnostic, non-legal,
      non-implementation boundaries.

