pms_logic_overlay_application:
  schema_version: "PMS-LOGIC_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "application_profile_only"
  overlay_source_file: "PMS-LOGIC.yaml"
  paper_source_file: "PMS-LOGIC.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  overlay_metadata:
    model_name: "PMS–LOGIC Application Profile"
    model_short: "PMS-LOGIC"
    status: "draft"
    last_updated: "2026-04-06"
    depends_on:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    paper_source:
      title: "PMS–LOGIC"
      subtitle: "Pre-Moral Foundations, Logical Limits, and Post-Moral Effects"
      source_file: "PMS-LOGIC.md"
    description: >
      PMS-LOGIC is applied here only as an application profile / overlay for an
      already completed PMS Core case analysis of Dogmatism / Σ-Totalization. It
      makes visible the LOGIC-specific issues of pre-moral structural
      legibility, logical boundary management, non-closure, reduced-signature
      shorthand, responsibility-readability, and drift-risk without redefining
      PMS operators, dependencies, derived axes, or guardrails.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Dogmatism / Σ-Totalization"
    rule: >
      This LOGIC block is appended to or integrated into an already completed
      PMS Core v1.3 case artefact. It does not rewrite the core pass, redefine
      PMS operators, alter PMS dependencies, change derived structures, or treat
      LOGIC constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The LOGIC overlay may add boundary, non-closure, attribution,
      non-innocence, reduced-signature, and failure-mode visibility. It must not
      modify the already completed PMS Core case except where a direct PMS.yaml
      inconsistency has been separately identified. No such inconsistency is
      asserted here.

  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: >
      PMS-LOGIC introduces no amplification overlays beyond reduced signatures,
      structural failure modes, and paper-specific non-operator constructs. It
      remains an overlay/application profile only.

  validity_gate:
    status: "passed"
    gate_type: "PMS_application_only"
    requires:
      Distance_Chi:
        id: "Χ"
        name: "Distance"
        status: "maintained"
        meaning: >
          A meta-position and stop-capability are maintained. The LOGIC overlay
          does not fuse the case into verdict, authority, enforcement,
          certainty, moral demand, or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          The LOGIC reading remains case-type-bound, revisable, and
          configuration-specific. It does not generate global person labels or
          irreversible interpretive claims.
      Dignity_in_Practice_D:
        id: "D"
        status: "maintained"
        meaning: >
          The LOGIC overlay does not shame, rank, humiliate, morally evaluate,
          or ontologically assess persons or groups. It remains restricted to
          structural attribution and boundary handling.
    gate_result: "valid_as_logic_overlay_application"

  operator_reference:
    source: "PMS.yaml"
    schema_version: "PMS_1.3"
    fixed_operator_set:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    dependency_hygiene_note: >
      Any LOGIC reduced signature is shorthand only. Reduced signatures do not
      replace PMS dependencies. In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or
      Ψ remains dependency-respecting according to PMS.yaml and does not create
      a new dependency path.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  logic_overlay_scope:
    scope_guardrails:
      - "Non-metaphysical, non-clinical, non-diagnostic."
      - "No person-level judgments, no moral evaluation, no sanction logic."
      - "Focus on structures of praxis, not right or good morality."
      - "Audience: analysis of praxis and structure, not action guidance or decision rules."
    may_add_visibility_to:
      - "non-closure"
      - "closure-drive"
      - "logical boundary management"
      - "responsibility as attributability"
      - "non-innocence without guilt"
      - "effective capacity"
      - "moral readability as post-hoc interpretive field"
      - "failure-mode constraints"
      - "LOGIC drift risks"
      - "counter-readings"
    must_not_do:
      - "derive ought from being"
      - "introduce norms, values, duties, prescriptions, or moral rules"
      - "treat morality as a PMS operator"
      - "convert responsibility into blame"
      - "convert non-innocence into guilt"
      - "convert logical coherence into final authority"
      - "convert Σ into totalization"
      - "convert Ω into justificatory authority"
      - "convert Λ into defect, ignorance, nihilism, or metaphysical pointer"
      - "claim PMS Base validation"

  tripartition:
    pre_moral_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators_involved:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      claim: >
        This level identifies the structural conditions under which the case
        becomes praxeologically legible before evaluative or normative
        interpretation appears.
      case_application: >
        Dogmatism / Σ-Totalization is legible pre-morally as a structure of
        difference, closure-drive, frame-bound admissibility, meaningful absence
        of revision, and possible stabilization. The overlay does not first ask
        whether dogmatism is good, bad, culpable, virtuous, vicious, or morally
        blameworthy. It asks how a settled account becomes structurally organized
        before any normative reading is introduced.
      no_normativity_introduced: true
      notes:
        - "No norms, values, duties, prescriptions, or moral commands are introduced."
        - "Patterns may stabilize without intention, moral assessment, or authority."

    logical_boundary_management:
      label: "Logical level of ordering and boundary management"
      applicability: "active"
      dominant_operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      dependency_note: >
        The listed operators are dominant boundary-management operators. Their
        PMS dependencies remain intact; especially Χ and Σ must not be treated
        as dependency-free shorthand. The reduced LOGIC signature marks the
        analytic focus of the overlay, not an alternative PMS dependency path.
      claim: >
        Logic functions as an ordering and integration instrument. It may
        organize coherence within a frame, test consistency, stabilize
        distinctions, and coordinate tensions, but it does not become final
        authority or deliver ultimate closure where Λ persists. Its structural
        strength lies in clarifying the boundary between valid ordering and
        illegitimate totalization.
      case_application: >
        The case is centrally LOGIC-relevant because dogmatism treats coherence,
        consistency, argument, foundation, or framework as if logical ordering
        could deliver final closure. PMS-LOGIC marks the boundary at which
        unresolved uncertainty and rival interpretation remain Λ within □. Χ is
        required so that Σ remains integration under non-closure rather than
        closure masquerading as final authority. The overlay therefore does not
        accuse logic of failure; it identifies the point at which logic becomes
        structurally unstable when it begins to function as authority, immunity,
        or substitute finality.
      aphorism: "Logic is the beginning of everything — not the end."
      boundary_result: >
        The logical boundary is reached where a frame can organize reasons,
        preserve coherence, and discriminate admissible from inadmissible moves,
        but cannot eliminate all rival interpretation, unresolved uncertainty,
        or future revision. Λ is carried as structured non-closure rather than
        filled with dogma, metaphysical compensation, or pseudo-integrative
        certainty. Χ prevents the account, the analysis, or PMS itself from
        converting coherence into authority, and Σ remains valid only as
        integration under maintained non-closure, not as totalized settlement.

    post_moral_effects:
      label: "Post-moral level of effects"
      applicability: "weak"
      operators_involved:
        - "Ω"
        - "Θ"
        - "Ψ"
        - "Χ"
      claim: >
        Effects become morally readable once praxis unfolds under asymmetry and
        irreversible time, while responsibility is reconstructed as
        attributability rather than as an ought.
      case_application: >
        The abstract case does not by itself supply concrete effects, effective
        capacity, irreversible consequence chains, role asymmetry, or
        self-binding sufficient for responsibility-readability. Post-moral
        readability therefore remains weak and conditional. It would become
        more active only if dogmatic closure were situated in an institution,
        teaching relation, authority structure, vulnerable exposure, or durable
        self-binding that made consequences attributable without deriving a duty,
        blame, sanction, or command.
      core_formula: "Pre-moral in justification, logical in boundary management, post-moral in effect."
      no_ought_derived: true

  key_claims:
    C1_non_closure_as_strength:
      status: "active"
      claim: >
        Non-closure is treated as a structural strength rather than a mere
        deficiency. Persistent Λ prevents logical systems from compensating
        uncertainty with dogma or substitute narratives.
      case_application: >
        This claim is directly active because the case concerns protection
        against unresolved uncertainty and rival interpretation. PMS-LOGIC reads
        Λ not as ignorance, failure, nihilism, or absence of reason, but as the
        carried boundary that prevents logic from becoming dogmatic closure.

    C2_morality_as_readability_field:
      status: "weak"
      claim: >
        Morality is not reconstructed as an operator, but as a readability field
        under constellations involving Ω, Θ, Λ, and Ψ.
      case_application: >
        The case does not establish a moral-readability field because Ω, Θ, and
        Ψ are not concretely supplied. The overlay preserves the possibility
        that dogmatism could become morally readable in a later scene, but it
        does not introduce morality as a PMS operator, moral assessment, or
        normative system.

    C3_responsibility_as_attribution_not_prescription:
      status: "weak"
      claim: >
        What everyday language may call obligation is reconstructed as
        attribution of consequences, not prescriptive demand.
      case_application: >
        Responsibility-attribution is weak because no agent, capacity, role,
        consequence chain, or temporal exposure is supplied. If a later scene
        shows effective capacity under □ and Θ within Ω, consequences may become
        attributable, but no duty, command, blame, or sanction follows from this
        LOGIC overlay.

    C4_apparent_norms_as_failure_mode_constraints:
      status: "weak"
      claim: >
        Apparent norms can be reconstructed as structural failure-mode
        constraints stabilized by self-binding, without external authority or
        prescriptive ought.
      case_application: >
        The case may appear to imply a norm such as do not totalize or do not
        suppress rival interpretation. PMS-LOGIC reconstructs this not as a
        command, value, duty, or external authority, but as a structural
        failure-mode constraint: forced closure under persistent Λ destabilizes
        Σ and weakens Χ.

    C5_logic_as_ordering_tool_not_authority:
      status: "active"
      claim: >
        Logic remains important for consistency and integration, but becomes
        structurally unstable when it attempts final authority or closure beyond
        what the frame can deliver under persistent Λ.
      case_application: >
        This claim is active. Dogmatism / Σ-Totalization is precisely the case
        in which logical coherence, argumentative success, or frame-stability
        risks being converted into final authority. The overlay keeps logic as
        ordering tool, not as world-closing or rival-excluding authority.

  responsibility_readability_chain:
    status: "weak"
    source: "PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain"
    chain_type: "readability_chain_not_dependency_definition"
    sequence:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
      - "Ω"
      - "Θ"
      - "Φ"
      - "Χ"
      - "Σ"
      - "Ψ"
    note: >
      This sequence is used as a LOGIC readability chain for responsibility,
      non-closure, and moral-readability analysis. It is not a new PMS
      dependency definition; PMS.yaml dependencies remain authoritative.
    case_application: >
      The full readability chain is not active as a concrete responsibility
      analysis. The early and middle portions are active for boundary management
      around Δ, ∇, □, Λ, Χ, and Σ; Ω, Θ, and Ψ remain weak or conditional
      because the case is abstract and not a concrete praxis scene.

  theses_and_definitions:
    intermediate_thesis:
      label: "Boundary point of logic"
      quote: "Logic does not end in silence, but in a structurally sustainable non-assertion."
      operator_reading: >
        Non-event Λ, stabilized by Α within □, may mark a disciplined stopping
        point for logic rather than failure or negation.
      case_application: >
        The disciplined stopping point is where the dogmatic account can no
        longer legitimately convert coherence into final closure. At that point,
        unresolved uncertainty and rival interpretation should remain carried as
        Λ rather than be filled by substitute certainty, metaphysical
        compensation, or pseudo-Σ.

    central_thesis:
      quote: "From effective capacity follows structural responsibility, not obligation."
      operator_reading:
        responsibility_requires:
          - "effective capacity within □"
          - "irreversibility under Θ"
          - "distribution gradients under Ω"
          - "attributability continuity via Ψ"
      case_application: >
        Effective capacity is under-specified. The abstract case does not show a
        capacity-bearing agent, temporal window, role asymmetry, or self-bound
        trajectory. Responsibility-readability therefore does not follow in the
        present case, and no obligation is derived.

    conclusion_thesis:
      quote: >
        Logic does not fail as a tool; it becomes structurally unstable when it
        begins to function as authority.
      case_application: >
        The case shows the authority-risk of logic: a coherent framework may
        begin to function as final authority when it refuses to carry Λ and
        treats Σ as total closure. The overlay preserves logic as tool by
        requiring Χ and by refusing PMS Base validation from the case.

  boundary_conditions:
    BC_EFFECTIVE_CAPACITY:
      label: "Absence of effective capacity"
      status: "under_specified"
      definition: >
        Responsibility presupposes effective, frame-bound capacity within □ and
        temporal availability under Θ. Where access, means, authority, or the
        relevant temporal window are structurally absent, no responsibility
        attribution arises even if outcomes later appear significant.
      calibration_note: >
        PMS-LOGIC specifies the structural form of attributable capacity, but
        not every concrete threshold of sufficiency in advance.
      case_application: >
        Effective capacity is not supplied by the case material. The case names
        a philosophical tendency, not an agent, institution, action, role, means,
        temporal window, or outcome. Responsibility attribution must therefore
        remain under-specified and must not be converted into blame or obligation.

  non_operator_constructs:
    logic_paper_specific:
      status: "active"
      is_operator: false
      definition: >
        Logic is a procedural discipline of consistency, derivation, and
        closure-drive that meets a structural boundary at Λ under □.
      operator_touchpoints:
        - "Σ"
        - "Λ"
        - "□"
        - "∇"
        - "Χ"
      case_application: >
        Logic functions as ordering and closure-drive in the case: it can
        organize a framework, test consistency, and coordinate elements, but it
        reaches a boundary where unresolved uncertainty and rival interpretation
        persist. The risk is that logical ordering becomes authority and
        substitutes forced closure for carried Λ.

    morality_readability_field:
      status: "weak"
      is_operator: false
      definition: >
        Morality is the readability of responsibility that emerges post hoc
        from irreversible praxis under structural conditions. No norms, values,
        or duties are introduced.
      minimal_operator_basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      case_application: >
        Moral readability remains weak because the abstract case does not
        establish concrete asymmetry, irreversibility, self-binding, effective
        capacity, or consequence attribution. The overlay therefore marks moral
        readability as possible in later scenes but not active as a finding here.

    responsibility_vs_ought:
      status: "active"
      is_operator: false
      responsibility: "Attribution of consequences."
      ought: "Prescriptive demand; explicitly out of scope."
      pms_logic_position: >
        PMS-LOGIC operates on responsibility-readability and attributability,
        not on ought-statements.
      case_application: >
        The overlay explicitly separates structural responsibility-readability
        from prescription. Even where dogmatism may later produce attributable
        consequences, PMS-LOGIC does not derive that anyone ought to revise,
        obey, punish, comply, or abandon a framework.

    potential_effective_capacity:
      status: "under_specified"
      is_operator: false
      definition: >
        Effective capacity means capacity within a frame □ plus temporal
        availability Θ. It introduces exposure to consequences, not duty.
      reduced_basis:
        - "□"
        - "Θ"
      case_application: >
        Effective capacity is under-specified. The case supplies a frame and an
        implied temporal resistance to revision, but not a capacity-bearing
        agent, role, means, access, or outcome chain.

    non_innocence:
      status: "under_specified"
      is_operator: false
      definition: >
        Non-innocence is the structural condition in which consequences become
        attributable even without intent, command, guilt, or blame.
      basis:
        - "Ω"
        - "Θ"
        - "Λ"
        - "□"
        - "Ψ"
      case_application: >
        Non-innocence is under-specified. The case can name non-closure and
        possible omission of revision, but it does not supply concrete effects
        or attributable consequence pathways. Non-innocence must not be inferred
        as guilt, blame, or moral defect.

    apparent_norms_as_constraints:
      status: "weak"
      is_operator: false
      definition: >
        Apparent norms are reconstructed as PMS-internal self-binding
        constraints that prevent structural failure modes under irreversible,
        asymmetric conditions. They are not commandments.
      basis:
        - "Χ"
        - "Σ"
        - "Ψ"
        - "Λ"
        - "□"
        - "Ω"
        - "Θ"
      case_application: >
        Apparent norms such as keep distance, preserve non-closure, or do not
        totalize are reconstructed only as structural constraints on this
        application and as failure-mode boundaries for possible scenes. They are
        not external commands, moral laws, or prescriptions.

  reduced_signatures:
    PRE_MORAL_justification:
      label: "Pre-moral level of justification"
      applicability: "active"
      operators:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: "Structural preconditions of praxis; no normativity introduced."
      case_application: >
        Active as shorthand for the case's structural legibility before moral or
        normative assessment: distinctions, closure-drive, frame, structured
        absence of revision, and possible stabilization.

    LOGIC_boundary_management:
      label: "Logical boundary management"
      applicability: "active"
      operators:
        - "□"
        - "Λ"
        - "Χ"
        - "Σ"
      reduced: true
      note: >
        Ordering and integration under non-closure; Χ prevents dogmatic
        Σ-totalization.
      dependency_hygiene: >
        This is reduced shorthand only. PMS dependencies remain authoritative.
      case_application: >
        Active as the primary LOGIC signature for the case. The signature marks
        the relation between frame-bound reasoning, carried non-closure,
        reflective distance, and integration that must not become totalization.

    POST_MORAL_effects:
      label: "Post-moral effects"
      applicability: "weak"
      operators:
        - "Ω"
        - "Θ"
        - "Ψ"
      reduced: true
      note: >
        Irreversible consequence attribution under asymmetry and time; no norms
        derived.
      case_application: >
        Weak because no concrete consequences, capacity, self-binding, or
        asymmetry are supplied. The shorthand is retained only as a conditional
        later-scene lens.

    MORAL_READABILITY_min:
      label: "Moral readability field"
      applicability: "weak"
      operators:
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Morality as interpretive field generated post hoc; not an operator.
      case_application: >
        Weak because the case is conceptual and not a concrete field of effects.
        Moral readability may arise only if later material supplies Ω, Θ, Λ, Ψ,
        and attributable consequences.

    POTENTIAL_effective:
      label: "Effective potential / capacity"
      applicability: "under_specified"
      operators:
        - "□"
        - "Θ"
      reduced: true
      note: >
        Situated capacity plus temporal availability; generates exposure, not
        duty.
      case_application: >
        Under-specified. The case supplies a frame and implied temporal
        resistance, but not capacity, access, role, or consequence-bearing
        agency.

    NON_CLOSURE_stability:
      label: "Sustainable non-closure"
      applicability: "active"
      operators:
        - "Δ"
        - "□"
        - "Λ"
        - "Α"
      reduced: true
      note: >
        Openness carried within frame; attractor stabilizes non-substitution.
      case_application: >
        Active as a counter-form to dogmatism: the case is structurally improved
        when uncertainty and rival interpretation remain carried as Λ within □,
        rather than being replaced by certainty or pseudo-integration.

    HUME_KNOT_reconstruction:
      label: "Hume knot reconstruction"
      applicability: "not_applicable"
      operators:
        - "□"
        - "Ω"
        - "Θ"
        - "Λ"
        - "Ψ"
      reduced: true
      note: >
        Rewrites potential obligates into non-innocence and attributable
        consequence; preserves the is/ought boundary without crossing it.
      case_application: >
        Not applicable as a primary signature because the case does not assert
        that potential obligates or that capacity generates duty. The is/ought
        boundary is nevertheless preserved by refusing any normative derivation.

  failure_mode_constraints:
    note: >
      The following are frame-dependent PMS-internal self-binding constraints.
      They are not universal prescriptions. They name conditions for coherence
      and non-destructive praxis under non-closure.
    items:
      - id: "FMC1"
        label: "A boundary that cannot be carried becomes structurally unstable."
        applicability: "weak"
        operator_basis:
          - "Δ"
          - "Ψ"
        meaning: >
          Marking or occupying a boundary generates exposure. If the
          consequences cannot be sustained across time, the boundary becomes
          destructive rather than orienting.
        failure_mode: "Boundary inflation, authority overreach, collapse into dogma or abandonment."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "authority_capture_omega_inflation"
        case_application: >
          Weakly applicable. The case marks a boundary between settled account
          and rival interpretation, but no concrete self-binding or consequence
          exposure is supplied. The constraint becomes active only if the
          boundary is occupied by an agent, institution, or doctrine over time.

      - id: "FMC2"
        label: "Forced closure where Λ persists produces structural instability."
        applicability: "active"
        operator_basis:
          - "Λ"
          - "□"
          - "Χ"
        meaning: >
          Where a structure does not yield final explanation, forced closure
          introduces substitute narratives such as dogma, myth, metaphysical
          compensation, or false certainty. The relevant instability is not that
          the frame has limits, but that the frame refuses to carry those limits
          as limits and instead presents unresolved Λ as already resolved.
        failure_mode: "Dogmatization, metaphysical compensation, false certainty."
        related_drifts:
          - "dogmatism_sigma_totalization"
        case_application: >
          Active. The case directly concerns treating unresolved uncertainty and
          rival interpretation as if they were finally settled. FMC2 names the
          LOGIC constraint most directly implicated by Σ-Totalization. It also
          protects against a possible misuse of the overlay itself: PMS-LOGIC
          must not fill the very Λ it identifies by claiming that its own
          structural reading finally explains dogmatism without remainder.

      - id: "FMC3"
        label: "Explanatory power converted into sense-making authority causes structural overreach."
        applicability: "active"
        operator_basis:
          - "∇"
          - "Σ"
          - "□"
          - "Χ"
        meaning: >
          Explanatory success does not confer authority over meaning.
          Integration is coordination, not domination; Χ prevents closure-drive
          from laundering authority through explanation. A coherent account may
          be useful, discriminating, and structurally elegant while still lacking
          the authority to decide every rival frame in advance.
        failure_mode: "Epistemic domination, technocratic moralism, authority laundering through explanation."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "technocratic_reduction_frame_overconstraint"
        case_application: >
          Active as a structural risk. Dogmatism may convert explanatory or
          argumentative coherence into authority over meaning. Χ must prevent
          this conversion, and Σ must remain coordination rather than domination.
          The point is not that explanation is suspect, but that explanation
          becomes unstable when it treats its own coherence as warrant for
          excluding rival interpretation before recontextualization can occur.

      - id: "FMC4"
        label: "Where proximity generates power, viable praxis requires maintained distance."
        applicability: "not_applicable"
        operator_basis:
          - "Χ"
          - "Ω"
        meaning: >
          Closeness increases influence; where influence increases,
          unregulated proximity becomes power. Χ is a condition for dignified
          handling of power.
        failure_mode: "Manipulation, coercive intimacy, moral overreach."
        related_drifts:
          - "authority_capture_omega_inflation"
          - "moralism_pseudo_ought_injection"
        case_application: >
          Not applicable to the abstract case because no proximity relation,
          intimacy, interpersonal influence, or concrete power gradient is
          supplied. It may become relevant in later teaching, institutional, or
          authority scenes.

      - id: "FMC5"
        label: "Stable self-binding takes the form of restraint rather than assertion."
        applicability: "active"
        operator_basis:
          - "Ψ"
          - "Χ"
          - "Λ"
        meaning: >
          Assertions seek closure and authority; restraint preserves openness.
          Self-binding to restraint stabilizes praxis without commanding
          others.
        failure_mode: "Authoritarian certainty, moral exhibitionism, escalation dynamics."
        related_drifts:
          - "dogmatism_sigma_totalization"
          - "moralism_pseudo_ought_injection"
        case_application: >
          Active primarily as an application constraint. The overlay itself must
          be self-bound to restraint: it may identify Σ-totalization risk, but
          must not command revision, shame a subject, or assert PMS closure over
          the phenomenon.

  drift_catalogue:
    note: >
      LOGIC drift classes describe structural operator distortions. They are not
      personal traits, diagnoses, moral verdicts, or enforcement categories.
    dogmatism_sigma_totalization:
      label: "Dogmatism / Σ-totalization"
      applicability: "active"
      distorted_operators:
        - "Σ"
      mechanism: >
        Integration is forced into total closure, treating coherence as final
        truth rather than provisional coordination. Λ is denied instead of
        carried.
      symptoms:
        - "claims_of_ultimate_explanation"
        - "immunization_against_revision"
        - "replacement_of_structural_coherence_with_certainty"
      result: >
        Brittle structure under novelty; non-closure treated as error rather
        than constraint.
      case_application: >
        Active as the named LOGIC drift in the case. The status remains
        conceptual and non-diagnostic: it marks the structural risk of forced Σ,
        not a person-type, clinical state, or moral verdict.

    authority_capture_omega_inflation:
      label: "Authority capture / Ω-inflation"
      applicability: "risk"
      distorted_operators:
        - "Ω"
      mechanism: >
        Asymmetry is converted from descriptive condition into justificatory
        principle. Power gradients are mistaken for epistemic or moral
        authority.
      symptoms:
        - "because_I_can_becomes_because_I_am_right"
        - "suppression_of_Χ"
        - "obscured_responsibility_pathways"
      result: >
        Domination may become masked as necessity; responsibility flows upward
        and becomes opaque.
      case_application: >
        Risk only. Ω is not established in the abstract case. The drift would
        become relevant if dogmatic closure were backed by institutional,
        pedagogical, doctrinal, legal, or other authority gradients.

    moralism_pseudo_ought_injection:
      label: "Moralism / pseudo-ought injection"
      applicability: "risk"
      distorted_operators:
        - "Ψ"
        - "Χ"
      mechanism: >
        Responsibility is retranslated into obligation. Self-binding is replaced
        by compliance-seeking enforcement. Non-innocence is moralized into
        blame.
      symptoms:
        - "should_or_must_reintroduced_as_if_structurally_authorized"
        - "attribution_becomes_accusation"
        - "praxis_judged_instead_of_reconstructed"
      result: >
        Covert normativity is reintroduced; responsibility collapses into
        enforcement.
      case_application: >
        Risk for the overlay itself rather than an active case finding. The
        analysis must not turn its critique of dogmatism into a moral command,
        blame assignment, sanction logic, or requirement that every closure be
        revised.

    nihilism_lambda_suppression:
      label: "Nihilism / Λ-suppression"
      applicability: "not_applicable"
      distorted_operators:
        - "Λ"
      mechanism: >
        Non-events, omissions, or restraints are treated as irrelevant. The
        structural significance of omission within frames under time is erased.
      symptoms:
        - "nothing_happened_so_nothing_matters"
        - "denial_of_omission_effects"
        - "flattening_of_temporal_consequence"
      result: >
        False innocence; responsibility dissolves through denial of structural
        impact.
      case_application: >
        Not applicable as the main case drift. The case is not about treating
        absence as irrelevant; it is about treating uncertainty and rival
        interpretation as if closure had already resolved them.

    technocratic_reduction_frame_overconstraint:
      label: "Technocratic reduction / □-overconstraint"
      applicability: "risk"
      distorted_operators:
        - "□"
      mechanism: >
        Frames are treated as exhaustive representations of reality. What is
        unmodeled is dismissed or misrecognized as Λ.
      symptoms:
        - "overconfidence_in_models_or_metrics"
        - "ignoring_unmodeled_effects"
        - "frame_lock_in"
      result: >
        Blind spots are mistaken for non-existence; systemic fragility
        increases.
      case_application: >
        Risk where the dogmatic frame treats its own admissibility rules as
        exhaustive representation. In the supplied conceptual case this remains
        a structural risk, not an empirical finding.

  logic_derived_axes_projection:
    note: >
      This projection is a PMS-LOGIC paper-internal structural localization. It
      is not a measurement of objective quality and not a person evaluation.
    Awareness_A:
      structural_level: "medium"
      operator_basis:
        - "Δ"
        - "□"
        - "Θ"
      effect_notes:
        - "Sensitivity to limits and conditions of praxis."
        - "Perception of where explanation reaches a stopping point and responsibility becomes structurally relevant."
      case_application: >
        LOGIC makes Awareness_A more boundary-sensitive by asking whether the
        frame can perceive its own limit at Λ. Because the case is not concrete,
        this remains medium rather than high.

    Coherence_C:
      structural_level: "high"
      operator_basis:
        - "∇"
        - "□"
        - "Λ"
        - "Θ"
      effect_notes:
        - "Coherence maintained despite non-closure."
        - "Stability from integration of absence, not closure."
      case_application: >
        Coherence_C is strongly LOGIC-relevant because the case tests whether
        coherence is maintained by carrying non-closure or by suppressing it.
        The high level does not mean adequacy, truth, maturity, or empirical
        validation.

    Responsibility_R:
      structural_level: "low"
      operator_basis:
        - "Ω"
        - "Θ"
        - "Φ"
        - "Ψ"
      effect_notes:
        - "Responsibility without moral demand."
        - "Accountability without sanction."
        - "Exposure accepted rather than displaced."
        - "Responsibility is structurally attributable rather than obligatory."
      boundary_condition_ref: "BC_EFFECTIVE_CAPACITY"
      case_application: >
        Responsibility_R remains low because effective capacity, asymmetry,
        consequence attribution, and self-binding are under-specified. LOGIC
        clarifies that responsibility would mean attributability, not obligation
        or blame.

    Action_E:
      structural_level: "weak"
      operator_basis:
        - "∇"
        - "Θ"
        - "Σ"
        - "Χ"
      effect_notes:
        - "Action slowed or filtered."
        - "Preference for restraint over intervention."
        - "Avoidance of irreversible overreach under asymmetry amplification."
      case_application: >
        Action_E is weak because the case is a conceptual tendency rather than a
        concrete enactment. LOGIC constrains possible action-readings by
        favoring restraint and non-closure over forced intervention or verdict.

    Dignity_in_Practice_D:
      structural_level: "stabilizing"
      operator_basis:
        - "Ω"
        - "Χ"
        - "Ψ"
      effect_notes:
        - "Protection of vulnerable positions without paternalism."
        - "Power exercised without domination."
        - "Self-binding as stable continuity without norm derivation."
      case_application: >
        Dignity-in-Practice functions as a stabilizing application constraint.
        It prevents the overlay from converting dogmatism into a person-ranking,
        moral accusation, humiliating label, diagnostic category, or ontological
        evaluation.

  counter_readings:
    note: >
      Counter-readings are interpretive risks. PMS-LOGIC responds through
      structural clarification rather than polemic.
    items:
      - id: "D1"
        reading: "This is just ethics in disguise."
        relevance: "weak"
        pms_response: >
          No PMS operator generates values, norms, or prescriptions. What
          appears ethical is the interpretability of responsibility under Ω, Θ,
          Λ, and Ψ.
        case_application: >
          Weak relevance. The overlay could look ethical if dogmatism is treated
          as something one ought to overcome, but this block reconstructs only
          structural drift, boundary handling, and non-closure.

      - id: "D2"
        reading: "This collapses into relativism."
        relevance: "weak"
        pms_response: >
          Frames are explicit scope constraints, and reversibility is required.
          Structural attribution under Ω, Θ, and Λ is not arbitrary preference.
        case_application: >
          Weak relevance. Preserving rival readings and non-closure does not mean
          all frames are equivalent; it means no final closure is inferred from
          the LOGIC overlay alone.

      - id: "D3"
        reading: "This is nihilism with extra steps."
        relevance: "weak"
        pms_response: >
          Λ is not meaninglessness but structured absence. Omission and
          non-action remain relevant under Θ and Ω.
        case_application: >
          Weak relevance. The overlay treats unresolved uncertainty as a
          structured boundary, not as meaninglessness, failure, or nothingness.

      - id: "D4"
        reading: "This is a hidden theological argument."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC carries non-closure within □ without metaphysical filling.
          No external ground, lawgiver, or ultimate justification is introduced.
        case_application: >
          Weak relevance. The case may concern foundations, but the overlay does
          not add a metaphysical ground, final authority, lawgiver, or ultimate
          justification.

      - id: "D5"
        reading: "This makes responsibility unfair."
        relevance: "not_applicable"
        pms_response: >
          PMS does not claim fairness. It models attribution, not moral desert.
          Responsibility is structural, not a reward or punishment scheme.
          Absence of effective capacity implies no responsibility.
        case_application: >
          Not applicable as a primary challenge because responsibility is not
          attributed in this conceptual case. Effective capacity is
          under-specified, so no fairness or desert issue is activated.

      - id: "D6"
        reading: "This cannot guide action."
        relevance: "weak"
        pms_response: >
          PMS-LOGIC does not instruct; it orients by constraining overreach.
          Guidance is replaced by orientation through Χ, Σ, and Ψ.
        case_application: >
          Weak relevance. The overlay does not prescribe action, but it orients
          the analysis by constraining forced closure, moralization, and PMS
          overreach.

      - id: "D7"
        reading: "This wins by translation, not necessarily by final superiority."
        relevance: "active"
        pms_response: >
          Translation success is not final settlement. The relevant test is
          whether the grammar preserves differentiating force under pressure.
        case_application: >
          Active. The case itself concerns dogmatic closure, so the overlay must
          not win by translating dogmatism into LOGIC terms. Rival readings and
          possible non-capture remain preserved.

      - id: "D8"
        reading: "Relation to adjacent frameworks."
        relevance: "active"
        pms_response: >
          PMS-LOGIC is not virtue ethics, pragmatism, or systems ethics. It
          reconstructs responsibility structurally under asymmetry,
          temporality, and non-closure without ethical evaluation or normative
          optimization.
        case_application: >
          Active. Adjacent frameworks such as epistemic vice theory,
          anti-fallibilism, foundationalism, ideology critique, pragmatism, and
          philosophy-of-science accounts remain open for comparison.

  example_suite_schema_alignment:
    status: "reference_only_not_used_as_case_output"
    source: "PMS-LOGIC.yaml:example_suite_schema"
    required_blocks_reference:
      - "Minimal vignette (scene-bound)"
      - "Why this is repo-useful (structural focus)"
      - "Operator mapping (reduced signature)"
      - "Tripartition tag (pre-moral / logical / post-moral)"
      - "Typical drift markers"
      - "Failure-mode constraint reference"
      - "Validity gate reminder (Χ + reversibility + D)"
      - "Readable structural closure"
    axiom_case_policy: >
      AXIOM cases do not generate a separate PMS-LOGIC example suite. The
      schema is retained as a reference for scene-bound, non-instructional
      rendering discipline only.

  glossary_alignment:
    Attributability:
      definition: "Structural assignability of consequences to an agent or trajectory."
      case_relevance: "weak"
    Closure_Non_Closure_Lambda:
      definition: "Closure refers to final explanation or justification; Λ marks the structural impossibility of such finality."
      case_relevance: "active"
    Logic_paper_specific:
      definition: "Discipline of consistency and derivation operating within frames; tool, not final authority."
      case_relevance: "active"
    Moral_Morality:
      definition: "Interpretability of praxis once responsibility is structurally attributable under Ω, Θ, and Λ."
      case_relevance: "weak"
    Norm_Ought:
      definition: "A prescriptive demand; no PMS operator generates norms or ought-statements."
      case_relevance: "active"
    Non_Innocence:
      definition: "Consequences are attributable even without intent or command; distinct from guilt or blame."
      case_relevance: "under_specified"
    Potential_Capacity:
      definition: "Effective ability to influence outcomes within □ and over Θ; exposure to consequences, not obligation."
      case_relevance: "under_specified"
    Responsibility:
      definition: "Attribution of consequences to a self-bound trajectory under Ω and Θ; not equivalent to duty."
      case_relevance: "weak"
    Self_Binding_Psi:
      definition: "Commitment to integrated structures over time; accountability without external authority or moral command."
      case_relevance: "weak"
    Structural_Failure_Mode:
      definition: "Operator distortion leading to structural instability; not clinical or moral label."
      case_relevance: "active"

  logic_overlay_quality_control:
    status: "passed"
    checks:
      pms_base_preserved: true
      core_case_preserved: true
      no_new_pms_operators: true
      no_dependency_redefinition: true
      reduced_signatures_marked_as_shorthand: true
      no_ought_derived: true
      no_norms_or_prescriptions_introduced: true
      morality_not_treated_as_operator: true
      responsibility_distinguished_from_ought: true
      non_closure_preserved_as_lambda_boundary: true
      effective_capacity_boundary_checked: true
      non_innocence_not_confused_with_guilt: true
      failure_modes_not_person_labels: true
      counter_readings_preserved: true
      non_capture_preserved: true
      overlay_metadata_present: true
      no_nested_overlay_policy_present: true
      responsibility_readability_chain_present: true
      effective_capacity_boundary_present: true
      example_suite_schema_alignment_present: true
    issues_found:
      - "none"
    correction_required: false
    final_overlay_judgment: >
      The LOGIC overlay is valid, bounded, subordinate to the completed PMS Core
      case, and correctly limited to boundary-management, non-closure,
      reduced-signature, and drift-risk visibility.

  logic_overlay_synthesis:
    primary_logic_reading: >
      PMS-LOGIC makes visible that Dogmatism / Σ-Totalization is not merely a
      failure of openness, but a logical boundary-management failure in which
      coherence, frame stability, or argumentative integration is tempted to
      function as final authority. The overlay centers Λ as the carried boundary
      that prevents Σ from becoming totalization. Its critical force is therefore
      not anti-logical: it preserves logic as ordering, while refusing the
      conversion of ordering into final closure.
    non_closure_result: >
      Λ functions as logical boundary rather than defect, ignorance, nihilism,
      or metaphysical pointer. The case becomes dogmatic when Λ is not carried
      within □ but is converted into false certainty, substitute closure, or
      immunization against rival interpretation. Sustainable non-closure means
      that the unresolved remains structurally legible without being either
      erased, romanticized, or prematurely resolved.
    responsibility_attribution_result: >
      Responsibility attribution is weak and under-specified. Effective capacity
      is not supplied by the conceptual case, so no obligation, blame, guilt,
      sanction, or concrete responsibility finding follows. The overlay can say
      only that responsibility-readability would become relevant in later scenes
      where dogmatic closure has attributable effects under capacity, asymmetry,
      time, and self-binding.
    boundary_management_result: >
      □, Λ, Χ, and Σ manage closure pressure by allowing the frame to organize
      reasons, carrying unresolved uncertainty as structured non-closure,
      maintaining reflective distance, and keeping Integration from becoming
      totalization. This also disciplines the PMS reading itself: the overlay
      may identify Σ-totalization as a structural risk, but must not perform a
      rival totalization by treating PMS-LOGIC as final explanation.
    moral_readability_result: >
      Moral readability is weak and conditional. It may emerge only in later
      scenes where dogmatic closure produces attributable effects under Ω, Θ,
      Λ, and Ψ. No normative demand, morality-operator, duty, guilt, sanction,
      or prescriptive ought is introduced.
    drift_result: >
      The main active drift is dogmatism_sigma_totalization. Authority capture,
      pseudo-ought injection, and technocratic frame-overconstraint are retained
      as risks only; nihilism_lambda_suppression is not the primary drift. The
      drift reading remains structural and conceptual, not diagnostic,
      moralizing, forensic, clinical, or person-ranking.
    final_logic_formula_or_signature: >
      LOGIC_boundary_management + NON_CLOSURE_stability +
      dogmatism_sigma_totalization_risk, with POST_MORAL_effects retained only
      as a weak conditional later-scene lens.
    final_claim_boundary: >
      This LOGIC overlay adds boundary-management, non-closure, attributability,
      and drift-risk visibility. It does not revise PMS Base, rewrite the PMS
      Core pass, derive an ought, prescribe action, evaluate persons, assign
      guilt, validate PMS, or claim final philosophical closure. It remains an
      overlay reading of a conceptual case and must yield to PMS.yaml wherever
      Base discipline, operator dependency, or application guardrails require it.