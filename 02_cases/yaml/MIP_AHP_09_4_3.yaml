                diagnosis, recommendation, or action authority."
              linked_attack_ref: "AP-001"
              expected_effect: "PH remains high; transmission-status ambiguity down; publicness misreading risk down."
              feeds_next_iteration: true

            - hardening_action_id: "HB-002"
              severity: "medium"
              action_type: "add_scope_statement"
              instruction: >
