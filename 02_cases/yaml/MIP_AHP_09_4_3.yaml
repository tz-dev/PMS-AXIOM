            attack_points_describe_analysis_not_persons: true

      uniform_report:
        addon_overlays:
          ah_precision:
            precision_heuristic_summary: |
              **Precision Heuristic (PH):** high (6/6)
              - Satisfied precision dimensions: 6/6
              - Expected overlay effect: A-reading confidence up, C-reading confidence up, IA-box decidability more_decidable, D-R/D-P misreading risk down_if_PD-6_and_PD-2_true
              - Boundary: PH does not rescore A, M, IA or D.
            attack_surface_summary: |
              **Attack Points (analysis vulnerabilities, not person findings):**
              - [high (structural vulnerability / likely misread)] Transmission wording can be overread
                - ID: AP-001
                - Target: case.transmission_check.status
                - Type: transmission_status_ambiguity
                - Note: "Structurally_transmittable" may be detached from "internal structural working layer only" and misread as external applicability.
                - Suggested patch: Keep the internal-only boundary attached to every transmission-status rendering.
              - [medium (relevant uncertainty / visible leverage)] Full-depth form may look more decisive than the evidence
                - ID: AP-002
                - Target: case.uniform_report.overview_4_to_7_sentences
                - Type: scope_leakage
                - Note: Formal depth may be mistaken for concrete certainty.
                - Suggested patch: Add that depth documents template coverage, not concrete case certainty.
              - [medium (relevant uncertainty / visible leverage)] IA-box remains unclear but threshold movement is not operationalized
                - ID: AP-003
                - Target: case.scores_and_ia.IA_box
                - Type: missing_conditions
                - Note: The unclear IA result is justified, but future threshold prompts would make the result harder to misuse.
                - Suggested patch: Add T/J/TB/R prompts for what would make each dimension partial or decidable.
              - [medium (relevant uncertainty / visible leverage)] D-module activation may be misread as a D-reading
                - ID: AP-004
                - Target: case.D_module_optional
                - Type: D_profile_boundary_risk
                - Note: The D-module is protection-only, but active D-language can be extracted as dignity evaluation.
