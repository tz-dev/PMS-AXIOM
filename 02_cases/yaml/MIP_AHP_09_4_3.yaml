                - Expected effect: IA-box decidability clearer while IA result remains unchanged.
              - [medium (relevant uncertainty / visible leverage)] add_D_profile_boundary: Prefix D-module excerpts with a protection-only boundary.
                - ID: HB-004
                - Linked to attack point: AP-004
                - Expected effect: D-R/D-P misreading risk down.
              - [medium (relevant uncertainty / visible leverage)] add_counter_reading: Add comparison criteria for rival trust readings.
                - ID: HB-005
                - Linked to attack point: AP-005
                - Expected effect: Counter-reading robustness up; model-loyalty risk down.
              - [medium (relevant uncertainty / visible leverage)] add_score_hygiene_boundary: State that non-assignment is the appropriate score-hygiene result under abstract, non-scene evidence.
                - ID: HB-006
                - Linked to attack point: AP-006
                - Expected effect: Score-hygiene clarity up.
              - [low (minor noise / easy patch)] define_terms: Replace "translates this into A–C–R–P–D" with "adds a MIP mapping across A–C–R–P–D."
                - ID: HB-007
                - Linked to attack point: AP-007
                - Expected effect: Term ambiguity down; layer-subordination clearer.
            boundary_note: "AHP hardens the analysis; it does not rescore A, M, IA or D."
        legacy_flat_uniform_report_fields:
          deprecated: true
          note: "Retained only for migration from v1.2; canonical output path is case.uniform_report.addon_overlays.ah_precision."
          precision_score_summary: >
