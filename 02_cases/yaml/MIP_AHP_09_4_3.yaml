                - Linked to attack point: AP-001
                - Expected effect: PH remains high; transmission-status ambiguity down; publicness misreading risk down.
              - [medium (relevant uncertainty / visible leverage)] add_scope_statement: Add that depth documents template coverage and guardrail discipline, not concrete case certainty.
                - ID: HB-002
                - Linked to attack point: AP-002
                - Expected effect: Scope leakage down; C-reading confidence safer; false coherence risk down.
              - [medium (relevant uncertainty / visible leverage)] add_if_then_criteria: Add IA threshold prompts for T, J, TB and R.
                - ID: HB-003
