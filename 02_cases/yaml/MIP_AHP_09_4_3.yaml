              - [medium (relevant uncertainty / visible leverage)] Rival readings are listed but not given comparison criteria
                - ID: AP-005
                - Target: case.meta_notes.possible_alternative_interpretations
                - Type: counter_reading_missing
                - Note: Rival theories are named, but later comparison criteria are not specified.
                - Suggested patch: Add criteria: explanatory fit, evidence economy, dignity risk, action-authority risk, and affected-role contestability.
              - [medium (relevant uncertainty / visible leverage)] Score withholding is correct but could be mistaken for absence of maturity information
                - ID: AP-006
                - Target: case.scores_and_ia
                - Type: score_hygiene_risk
                - Note: Non-assignment is disciplined score hygiene, not analytic emptiness.
                - Suggested patch: Add that non-assignment is the appropriate scoring result under abstract evidence.
              - [low (minor noise / easy patch)] Mapping wording may imply stronger transformation than intended
                - ID: AP-007
                - Target: source_alignment.mapping_note
                - Type: term_ambiguity
                - Note: "Translates this into A–C–R–P–D" may overstate the relation between layers.
                - Suggested patch: Use "adds a MIP mapping across A–C–R–P–D."
            hardening_backlog_summary: |
              **Hardening Backlog (next iteration):**
              - [high (structural vulnerability / likely misread)] add_transmission_status: Revise every rendered transmission phrase to say the analysis is structurally transmittable only as an internal structural working layer, not as verdict, diagnosis, recommendation or action authority.
