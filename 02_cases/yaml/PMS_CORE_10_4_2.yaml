operator_analysis:
  Δ:
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Δ is active because the case turns on distinctions between apparent consent
      and the conditions of consent, consent-event and later invocation,
      disclosure and obscuration, legitimating use and evidentiary context, and
      frame-continuity and frame-shift.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "The primary distinction is apparent consent versus the obtaining, framing, and later invocation conditions that may be obscured by that apparent consent."
      - "The analysis must not conflate consent as event, consent as framed meaning, consent as later warrant, and consent as legal or moral validity."
    falsifier_conditions:
      - "If the apparent consent-act cannot be distinguished from its conditions or later use, the PMS reading loses its entry point."
    non_capture_note: >
      Difference does not by itself prove that PMS captures the case.
  ∇:
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      ∇ is present as a structural directional tension toward legitimation,
      sanitation, closure, or obscuration generated by the distinction between
      apparent consent and its conditions. This is not an inference of subjective
      desire or motive.
    dependency_status: "satisfied"
    analytic_weight: "moderate"
    calibration_points:
      - "The tension is structural and argumentative: apparent consent is oriented toward legitimating or settling the case while the conditions of consent remain available for scrutiny."
      - "No subjective desire, bad faith, manipulative intention, or psychological impulse is inferred from the conceptual case material."
    falsifier_conditions:
      - "If apparent consent is not oriented toward any legitimating, sanitizing, obscuring, or closing function, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  □:
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      □ is active because consent becomes structurally intelligible only inside a
      frame that determines what counts as consenting, what conditions are
      relevant, and how later invocation is permitted or constrained.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The active frame is a conceptual consent-frame that may be legal, institutional, relational, conversational, contractual, or normative, but the supplied material does not select one concrete frame."
      - "Frame shifts must be marked: obtaining consent under one frame and later invoking it under another is central to the candidate laundering structure."
    falsifier_conditions:
      - "If no frame is specified that makes consent count or constrains its later invocation, the analysis becomes too abstract to discriminate consent laundering from ordinary reference to consent."
    non_capture_note: >
      A frame can clarify a case without exhausting it.
  Λ:
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is active as a calibration-sensitive operator because the case concerns
      possible missing disclosure, missing refusal-space, missing acknowledgement
      of constraints, missing scope limitation, missing revisability, or missing
      continuity between the original consent frame and later invocation.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The expected occurrence must be frame-specific: disclosure, alternative, acknowledgement, response, explicit scope, or revisability matters only where the relevant consent-frame makes it expected."
      - "Absence may mark non-capture, missing evidence, or a rival account rather than a defect in the consent structure; it must not automatically become incomplete integration or PMS drift."
    falsifier_conditions:
      - "If the frame contains no structured expectation for disclosure, alternative, acknowledgement, revisability, or continuity, Λ should be removed or downgraded."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  Α:
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak because the case title and material refer to situations as a
      phenomenon-class, suggesting possible repetition or role-script
      stabilization, but no concrete recurrent pattern is evidenced.
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Α would require evidence of recurrent consent-framing, repeated later invocation, institutional routine, path dependence, or stable role-script emergence."
      - "A single abstract description or one isolated consent dispute is not enough to establish attractor formation."
    falsifier_conditions:
      - "If recurrence, stabilization, routine, or path dependence is not shown, Α remains weak and cannot support strong Ω or drift-pattern claims."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is conditionally relevant because consent laundering often depends on
      directional imbalance in framing authority, information access, exposure,
      vulnerability, capacity, obligation, or ability to refuse, but the present
      material does not establish a concrete asymmetry.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "The direction and kind of asymmetry must be specified before Ω can be treated as active in a concrete case: who controls the frame, who bears exposure, who has alternatives, and who can later invoke consent."
      - "Ω must remain structural rather than moralized; asymmetry is not by itself blame, invalidity, or domination."
      - "Where no imbalance is evidenced, Ω must remain weak or be removed from the case formula."
    falsifier_conditions:
      - "If no directional imbalance of power, exposure, capacity, obligation, role, or framing control is identifiable, Ω claims must be removed or marked weak."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict.
  Θ:
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is active because the phenomenon explicitly spans the time of obtaining
      consent, the frame in which consent was obtained, and the later invocation
      through which the consent-act may legitimate or obscure its own conditions.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The analysis must distinguish prior conditions, moment of apparent consent, framing at the time, subsequent change of frame, and later invocation."
      - "Temporality is essential rather than incidental because laundering depends on a later use of an earlier apparent consent-act."
    falsifier_conditions:
      - "If the case does not require a temporal gap, sequence, persistence, or later invocation, Θ is overextended."
    non_capture_note: >
      Temporality in PMS does not by itself settle metaphysical or empirical
      continuity.
  Φ:
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is the central case operator: the apparent consent-act is placed into a
      later or wider frame where it may legitimate, sanitize, or obscure the
      conditions under which it was obtained, framed, or invoked.
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "The source frame is the original consent-obtaining or consent-framing situation; the target frame is the later legitimating, sanitizing, evidentiary, institutional, or justificatory invocation."
      - "The analysis must distinguish recontextualization that clarifies scope from recontextualization that absorbs non-fit, erases conditions, or converts apparent consent into closure."
    falsifier_conditions:
      - "If every rupture, disagreement, refusal, resistance, or rival framing is absorbed as Φ, the reading is over-assimilative and loses PMS discipline."
    non_capture_note: >
      Recontextualization does not prove that the new frame is adequate.
  Χ:
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is active as an application constraint and analytic operator: it suspends
      immediate verdict, prevents apparent consent from automatically closing
      inquiry, and prevents PMS analysis from becoming enforcement,
      person-ranking, or legal-forensic judgment.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "The analysis maintains Χ by marking the case as conceptual, reversible, non-diagnostic, non-legal, and non-empirical."
      - "Χ must be distinguished from avoidance: it does not deny the possibility of consent laundering, but keeps the structural reading from becoming a premature tribunal finding."
    falsifier_conditions:
      - "If Χ is suspended in order to declare consent valid, invalid, coerced, mature, immature, pathological, or legally defective, the PMS application is invalid."
    non_capture_note: >
      Distance is not indifference, denial, or empty neutrality.
  Σ:
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is weak and withheld as a completed case structure. The analysis can ask
      whether apparent consent, conditions, absences, asymmetries, temporality,
      and later invocation are integrated, but it cannot assert successful
      integration from the supplied material.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Σ must discriminate rather than smooth conflict: integration requires holding consent, conditions, frame shifts, non-events, asymmetry, and temporal invocation together without erasing non-fit."
      - "A coherent story that consent occurred may be pseudo-integration if it excludes the conditions that make the consent meaningful or contestable."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, validity, or exhaustive capture, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  Ψ:
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is not active as a case structure because the material does not supply a
      self-binding agent, stable commitment, role obligation,
      responsibility-as-self-commitment, or self-relation across time. It remains
      relevant only as application discipline where PMS use is self-bound by its
      guardrails.
    dependency_status: "not_active"
    analytic_weight: "not_active"
    calibration_points:
      - "Apply Ψ to the case only if a concrete self-binding structure is introduced, such as an agent or institution bound to stable obligations across time."
      - "Do not attribute selfhood, stable normativity, or responsibility-as-self-commitment to the abstract phenomenon-class itself."
    falsifier_conditions:
      - "If Ψ is applied without evidence of Σ, Θ, Χ, and a scoped self-binding structure, the self-binding reading is under-specified."
    non_capture_note: >
      Self-binding must not be attributed to non-subjects or abstract concepts
      unless explicitly scoped as structural self-binding.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 supplies the early structural patterning of the case: Δ distinguishes
      apparent consent from its conditions; ∇ supplies the structural orientation
      toward legitimation or closure; □ frames what counts as consent; Λ marks
      possible meaningful absence; Α remains weak unless repeated or stabilized
      consent-framing is shown.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which stabilized patterns become asymmetric relations and are
      temporally extended into trajectories and commitments.
    case_function: >
      L2 is partially active: Θ is central because consent is obtained, framed,
      and later invoked across time, while Ω remains weak until a concrete
      imbalance in power, exposure, capacity, obligation, or framing control is
      specified.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration that enables adaptive
      learning and more mature forms of praxis.
    case_function: >
      L3 carries the main analytic discipline: Φ models the later
      recontextualization of apparent consent; Χ keeps the reading distanced and
      reversible; Σ is withheld unless the case shows discriminating integration
      rather than a smooth legitimating story.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into a relatively stable
      self-relation maintained across time and contexts.
    case_function: >
      L4 is not primary. Ψ is not established as a case structure because no
      self-binding agent or stable commitment is provided; it operates only as
      application discipline requiring restrained PMS use.

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The distinction between apparent consent and its obtaining, framing, and later invocation conditions is explicit in the case material."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "A structural direction toward legitimation, sanitation, or obscuration follows from the stated use of apparent consent, but no motive is inferred."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Consent requires a frame that makes the act count and constrains its later use; the frame is conceptual rather than scene-specific."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Possible missing disclosure, alternatives, revisability, or continuity are structurally relevant but not concretely evidenced."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "The phenomenon-class suggests possible recurrence, but no stabilized pattern is established in a concrete scene."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Asymmetry is a major calibration risk but remains weak because no directional imbalance is specified."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "The case explicitly involves obtaining, framing, and later invocation, so temporal sequencing is structurally central even though dependencies through Α and Ω are weak."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "The case centrally concerns placing apparent consent into a later legitimating or sanitizing frame, but the exact source and target frames require scene evidence."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "The application preserves suspension of verdict, reversibility, and non-tribunal status."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Integration is analytically tested but not claimed because the material may describe pseudo-integration rather than discriminating synthesis."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Self-binding is not active as a case structure; only the PMS application itself is self-bound by guardrails."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

dependency_table_reference:
  source: "PMS.yaml:pms_model_reference.dependency_table"
  status: "reference_only_not_base_revision"
  purpose: >
    This block mirrors the PMS.yaml dependency table for case-level dependency
    hygiene. It is not a revision of PMS Base and must not be altered by the
    case analysis.
  table:
    - axiom: "Δ"
      order: 1
      depends_on: []
      provides:
        - "initial_condition_for_structured_differentiation"
