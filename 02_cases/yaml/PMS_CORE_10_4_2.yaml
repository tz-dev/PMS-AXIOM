core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      The case is treated as a praxis-structure: a consent-act is framed,
      invoked, and potentially recontextualized under conditions that may
      include absence, temporal displacement, and asymmetry. No person is
      analyzed as an ontological entity, psychological essence, or ranked subject.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal
      generative basis for praxis. Whether they are fully complete, optimally
      minimal, or uniquely ordered remains open.
    status: "satisfied"
    case_application: >
      Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ is
      used as PMS operator vocabulary. No additional PMS operators, axes,
      layers, or primitives are introduced.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes, or
      primitives as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS is generative: awareness, coherence, responsibility, action,
      dignity-in-practice, and asymmetry drift patterns can be systematically
      derived within PMS from operator compositions rather than introduced as
      independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and asymmetry drift patterns are
      handled only as formula-derived PMS structures. They are not treated as
      independent axioms or freestanding evaluative categories.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural
      operators. Responsibility, maturity, and dignity-in-practice are analyzed
      under temporal and asymmetrical conditions rather than static attributes.
    status: "partial"
    case_application: >
      Θ is active because the case explicitly distinguishes obtaining, framing,
      and later invocation of consent. Ω is analytically important but only
      weakly calibrated because the case material suggests possible power,
      exposure, capacity, or obligation imbalance without providing a concrete
      scene that would establish it.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality
      or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS may be represented computationally, but representation does not by
      itself imply direct implementation, guaranteed interoperability, or
      explanatory adequacy.
    status: "satisfied"
    case_application: >
      This YAML representation is a structured PMS application record only. It
      does not implement praxis, validate PMS computationally, prove empirical
      adequacy, or supply an operational decision procedure.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative
      grammars, sharper discriminative models, or more empirically grounded
      formalisms remains methodologically open.
    status: "satisfied"
    case_application: >
      Rival readings remain open, including formal-procedural accounts of
      consent, legal validity accounts, normative ethics accounts,
      discourse-theoretic accounts, and non-laundering readings in which later
      invocation remains continuous with the original consent frame.
    failure_condition: >
      The analysis would fail P6 if it treated PMS translation as defeating rival
      formalisms by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation of a phenomenon into PMS terms does not by itself prove
      exhaustive capture. Some forms of praxis may remain only partially legible
      or may resist assimilation within the current grammar.
    status: "satisfied"
    case_application: >
      Possible non-capture is preserved for subjective experience of consenting,
      legal standards, moral legitimacy, cultural meanings of consent,
      evidentiary facts, and cases where resistance or non-fit is not PMS drift
      but a limit of the PMS projection.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for individual clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      The analysis makes no diagnostic, clinical, therapeutic, forensic,
      personality, competence, pathology, or risk claim. Asymmetry drift patterns
      are treated only as conditional structural risks, not person-types or
      diagnoses.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      Any application of PMS must keep findings tied to specific praxeological
      scenes, roles, and structures. Global person-labels and irreversible
      ontological attributions are out of scope.
    status: "partial"
    case_application: >
      Because no concrete scene is supplied, the analysis is explicitly marked
      as a non-concrete, case-type-bound conceptual projection. A scene-bound
      application would require actors, roles, frame boundaries, alternatives,
      sequence, and evidence of later invocation.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible,
      decontextualized claims.

