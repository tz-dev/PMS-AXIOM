analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary:
      - "pms_internal_structural_derivation_used_as_application_aid"
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      The case type permits structural operator projection and calibration
      testing. It does not permit empirical finding, concrete scene adjudication,
      legal or forensic judgment, diagnostic inference, implementation claim,
      person-ranking, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      The PMS reading strongly fits the vocabulary of difference, frame, absence,
      temporality, and recontextualization, so it risks becoming too smooth,
      over-assimilative, or under-discriminating. In particular, consent
      laundering could be overextended to any later invocation of consent unless
      Φ, Λ, Ω, Θ, and Σ are carefully calibrated. The case is therefore not made
      stronger by maximal operator activation; it is made stronger by preserving
      the difference between a structurally plausible laundering configuration
      and ordinary consent practices that remain transparent, bounded, and
      frame-continuous.
    mitigation: >
      The reading is constrained by falsifier conditions, rival readings,
      possible non-capture zones, weak status for Α, Ω, Σ, and Ψ, and
      discrimination tests separating laundering from ordinary bounded consent
      invocation. Coherence is treated as a risk as well as an achievement:
      a coherent consent narrative may itself be part of the sanitizing structure
      if it excludes the acquisition conditions, relevant absences, temporal
      shifts, or asymmetries that make the consent-act contestable.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers the structural distinction between apparent consent and its
      conditions, the framing of consent, meaningful absence, temporal
      displacement, recontextualization, reflective distance, and conditional
      asymmetry. This coverage is adequate for a conceptual pre-application, but
      it does not by itself show that PMS has captured the phenomenon better than
      legal, ethical, discourse-theoretic, institutional, or cultural analyses.
    discrimination_requirement: >
      The PMS reading must distinguish consent laundering from ordinary valid
      consent, bounded later reference to consent, benign clarification of
      consent scope, legal procedural validity, and mere disagreement about
      consent interpretation. It must also distinguish structural absence from
      simple missing evidence, and recontextualization from legitimate
      reinterpretation under changed but transparently acknowledged conditions.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish laundering recontextualization from ordinary later invocation of consent."
      expected_pms_distinction: >
        Ordinary later invocation maintains continuity between the original
        consent-frame and later use; laundering-relevant Φ shifts the consent-act
        into a frame that sanitizes, legitimates, or obscures relevant
        acquisition or framing conditions. The same later reference to consent
        may therefore be non-laundering where scope, conditions, and continuity
        remain intelligible.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish meaningful absence from missing evidence or PMS non-capture."
      expected_pms_distinction: >
        Λ is asserted only where a frame-specific expectation is absent;
        otherwise absence may be evidentiary incompleteness, rival framing, or a
        limit of PMS capture rather than structured non-event. The analysis must
        not convert every silence, omission, rupture, or unresolved condition
        into PMS-legible absence.
      current_status: "partially_satisfied"
    - id: "DT3"
      test: "Distinguish conditional asymmetry from presumed coercion or invalidity."
      expected_pms_distinction: >
        Ω requires a specified directional imbalance in power, exposure,
        capacity, obligation, dependency, information access, or framing control.
        Even where Ω is present, PMS does not by itself decide coercion,
        invalidity, legal defect, moral blame, or diagnostic status.
      current_status: "partially_satisfied"
  calibration_points:
    - operator: "Δ"
      question: "Difference is calibrated by the explicit contrast between apparent consent and the conditions, framing, or later invocation of that consent."
      current_calibration: "satisfied"
    - operator: "∇"
      question: "Impulse is calibrated by the structural orientation toward legitimation, sanitation, obscuration, or closure without inferring motive."
      current_calibration: "partial"
    - operator: "□"
      question: "Frame is calibrated by the consent-frame that determines what counts as consent and how it can be invoked later, though the concrete frame is unspecified."
      current_calibration: "partial"
    - operator: "Λ"
      question: "Non-Event is calibrated by frame-specific missing disclosure, alternative, acknowledgement, revisability, or continuity, none of which is concretely evidenced."
      current_calibration: "weak"
    - operator: "Α"
      question: "Attractor is calibrated only by recurrence, stabilization, routine, or path dependence; the supplied material does not establish these."
      current_calibration: "weak"
    - operator: "Ω"
      question: "Asymmetry is calibrated by directional imbalance in power, exposure, capacity, obligation, or framing control; this is possible but not specified."
      current_calibration: "weak"
    - operator: "Θ"
      question: "Temporality is calibrated by the explicit sequence of obtaining, framing, and later invoking consent."
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "Recontextualization is calibrated by moving apparent consent from its source frame into a later legitimating or sanitizing frame."
      current_calibration: "partial"
    - operator: "Χ"
      question: "Distance is calibrated by suspension of verdict, reversibility, non-diagnostic use, non-legal use, and non-ranking restraint."
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "Integration is calibrated by discriminating synthesis of consent, conditions, absences, asymmetries, and temporality; this is not established."
      current_calibration: "weak"
    - operator: "Ψ"
      question: "Self-Binding is calibrated by stable self-relation or commitment across time; this is not supplied in the conceptual material."
      current_calibration: "weak"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "subjective experience of consenting and phenomenological sense of agency"
      - "legal validity, enforceability, liability, evidentiary standards, or forensic conclusions"
      - "moral legitimacy under normative theories outside PMS"
      - "cultural, linguistic, institutional, or historical meanings of consent not exhausted by PMS operators"
      - "cases where refusal, resistance, rupture, non-fit, or rival framing is not drift, immaturity, incomplete integration, or recontextualization failure"
    rule: >
      These zones must not be automatically redescribed as PMS drift, calibration
      residue, incomplete integration, structured absence, or failed maturity.
      They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "formal-procedural reading in which consent counts because specified procedural conditions were satisfied"
      - "legal-validity reading governed by external legal standards rather than PMS operators"
      - "normative ethics reading focused on autonomy, coercion, exploitation, or legitimacy outside PMS Base"
      - "discourse-theoretic reading focused on communicative validity and recognition"
      - "non-laundering reading in which later invocation accurately remains within the original consent scope"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would be weakened or invalidated if the apparent
        consent-act remains transparently linked to its conditions, no relevant
        condition is obscured or sanitized, and later invocation stays within the
        original frame and scope.
    - id: "F2"
      condition: >
        PMS would be under-discriminating if the same formula equally fits
        ordinary valid consent, bounded later reference to consent, benign
        clarification, and laundering without operator-level distinctions in Φ,
        Λ, Ω, Θ, and Σ.
    - id: "F3"
      condition: >
        The reading would over-assimilate or lose non-capture if all resistance,
        disagreement, missing evidence, rupture, rival framing, or silence were
        automatically redescribed as PMS drift, incomplete calibration, or failed
        integration.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The case is usable as a reversible PMS conceptual projection because it
      cleanly activates Δ, □, Θ, Φ, and Χ while marking Λ, Α, Ω, Σ, Ψ, derived
      structures, and drift patterns with appropriate limits. It remains
      under-specified for concrete, empirical, legal, diagnostic, implementation,
      or PMS Base validation claims.

