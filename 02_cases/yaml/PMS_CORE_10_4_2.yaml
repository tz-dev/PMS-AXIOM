case_synthesis:
  primary_pms_reading: >
    Consent laundering is modeled as a candidate structure in which apparent
    consent is differentiated from its acquisition and framing conditions, later
    invoked across time, and recontextualized so that relevant conditions may be
    legitimized away, sanitized, or obscured.
  continuity_condition: >
    Continuity is preserved only if later invocation remains transparently
    connected to the original consent-frame, scope, conditions, and available
    alternatives.
  change_condition: >
    Change becomes laundering-relevant when the consent-act is moved from its
    source frame into a later legitimating frame that obscures or sanitizes
    conditions material to how the consent was obtained, framed, or made usable.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, silence, absence, or rival framing is not
    automatically PMS drift, failed integration, incomplete calibration,
    recontextualization, or maturity failure; it may be evidence gap, rival
    validity, or non-capture.
  responsibility_condition: >
    Responsibility_R is not claimed unless a concrete scene establishes Ω, Θ, Φ,
    and Ψ through specified asymmetry, temporal obligation, recontextualization,
    and self-binding.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring reflective restraint
    under possible asymmetry and prohibiting person-ranking, humiliation,
    diagnosis, or ontological evaluation.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparison criteria show
    that PMS discriminates the case better than formal-procedural, legal,
    normative, discourse-theoretic, cultural, or non-laundering accounts.

final_structural_formula:
  primary_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "bounded_candidate_case_model"
  compressed_reading: >
    Within PMS, consent laundering is a reversible conceptual projection in
    which apparent consent is distinguished from its conditions, framed,
    potentially marked by meaningful absence, optionally stabilized through Α
    if recurrence is shown, conditionally asymmetry-relevant through Ω if
    directional imbalance is evidenced, temporally invoked, recontextualized,
    and held under reflective distance without claiming Σ or Ψ as completed
    case structures.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It does
    not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, legal or forensic validity, implementation
    validity, moral ranking, or PMS Base validation. The formula remains
    discriminatively valid only insofar as it continues to separate laundering
    recontextualization from ordinary consent continuity, meaningful non-event
    from evidentiary absence, and conditional asymmetry from presumed coercion.