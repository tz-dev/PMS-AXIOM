  ai_interface_qc:
    status: weak
    overview: AI or agentic controllers, such as LLM-based systems, may reason about QC workflows
      in PMS-QC terms and may use PMS-QC as a structuring interface in bounded settings. They
      may propose, annotate, or compare macro-level workflows under Δ–Ψ-based policies rather
      than operating only at the low-level circuit layer. This does not imply deployment adequacy,
      validated safety, or full runtime autonomy.
    agent_view:
      structural_query_capabilities:
