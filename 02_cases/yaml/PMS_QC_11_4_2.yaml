pms_qc_overlay_application:
  schema_version: PMS-QC_1.1
  schema_role: case_overlay_application
  overlay_status: generic_qc_structural_layer
  overlay_source_file: PMS-QC.yaml
  paper_source_file: not_used_in_this_case
  base_reference_file: PMS.yaml
  base_schema_version: PMS_1.3
  schema_meta:
    model_name: Praxeological Meta-Structure – Quantum Computing Layer
    model_short: PMS-QC
    status: draft
    repository_role: generic_qc_structural_layer
    layer_role: base_overlay
    depends_on:
    - PMS_1.3
    epistemic_status: Bounded structural overlay for quantum-computational description,
      annotation, audit, macro-level workflow rendering, and policy-layer reasoning within
      the PMS framework.
    boundedness_note: PMS-QC is a candidate QC structural layer within the present framework.
      It does not claim monopoly over high-level structural analysis, final closure against
      rival grammars, or exhaustive capture of quantum computational phenomena.
    last_updated: '2026-04-19'
    authors:
    - name: T. Zöller
      role: originator
    - name: ChatGPT (GPT-5.4 Thinking)
      role: formalization_assistant
    inherits_from:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
    description: PMS-QC is a generic quantum-computational structural overlay within the
      PMS framework. It renders quantum circuits, algorithms, and selected hybrid AI–QC
      workflows as bounded compositions of the eleven PMS operators Δ–Ψ, without redefining
      those operators or displacing established QC formalisms. PMS-QC provides a structural
      mapping from Δ–Ψ to quantum frames, superposition, oracle asymmetry, attractor-like
      alignment, iterative structure, measurement, and stabilisation. It offers a candidate
      structural layer for expressing, annotating, constraining, and auditing quantum workflows
      at a meta-level. This does not imply exhaustive capture, equal explanatory depth across
      domains, or immunity to rival formalisation.
    intended_use:
      summary: Structural description, mapping, annotation, and bounded policy-layer reasoning
        for quantum circuits and hybrid AI–QC workflows within the PMS-QC framework.
      allowed_profiles:
      - quantum_algorithm_documentation
      - structural_qc_analysis
      - qc_workflow_auditing
      - meta_compiler_annotation
      - bounded_ai_qc_policy_reasoning
      - research_and_theoretical_exploration
      not_intended_for:
      - physical_noise_modelling
      - low_level_gate_optimization_only
      - hardware_level_safety_certification
      - replacement_of_qc_formalisms
      - performance_guarantee_provision
      - deployment_ready_agent_control
      - validated_safety_architecture
      - architecture_independent_implementation_claims
      - anthropomorphic_interpretation_of_quantum_processes
    case_application: The case fits structural QC analysis, qc_workflow_auditing, macro-level
      annotation, and research-oriented exploration. It does not supply a concrete circuit,
      backend, empirical run, or deployment setting, so bounded AI–QC policy reasoning remains
      only weakly relevant as an audit-interface possibility.
  normative_position:
    physics_clause: PMS-QC is not a physical theory. It does not modify or compete with quantum
      mechanics, the quantum circuit model, Hamiltonian simulation, tensor networks, ZX-calculus,
      or categorical quantum mechanics. It describes only structural organisation at an overlay
      level.
    non_monopoly_clause: PMS-QC complements QC formalisms but does not replace them and does
      not claim monopoly over high-level structural analysis.
    non_identity_clause: Mappings from Δ–Ψ to QC roles are structural renderings, not claims
      of ontological identity between quantum phenomena and PMS operators.
    substrate_independence: Within the present framework, the same operators can be used to
      render praxeological, computational, organisational, and quantum-computational structures
      at a structural level. This does not imply equal explanatory depth or exhaustive capture
      across all domains.
    anthropomorphism_clause: Terms like asymmetry, attractor, or self-binding are used in a
      formal, structural sense. PMS-QC does not attribute consciousness, intention, agency,
      or moral responsibility to quantum systems.
    governance_conditionality_clause: Governance- or policy-layer use in PMS-QC is conditional
      and overlay-specific. It should not be read as a necessary endpoint of PMS, nor as a
      validated safety or enforcement architecture.
    base_vs_extension_clause: PMS-QC defines generic QC overlay constructs only. Paper-specific
      refinements, algorithm-specific ladders, fixed-point variants, and stronger policy heuristics
      belong, if used, to optional extension layers rather than to the generic PMS-QC base overlay.
    case_application: The overlay reads oracle-like components only as structural QC renderings
      of PMS operators. It does not treat oracle asymmetry as a physical theory, does not replace
      quantum-mechanical or circuit-model analysis, does not identify QC structures ontologically
      with PMS operators, and does not attribute intention, consciousness, agency, moral responsibility,
      or dignity to quantum systems.
  computational_position:
    representation_clause: This overlay is a formal representational schema for structural
      description, annotation, and bounded reasoning. It is not, by itself, executable code,
      a proof of implementability, or a guarantee of backend interoperability.
    calibration_clause: Structural well-formedness in PMS-QC does not by itself establish
      physical adequacy, numerical correctness, optimal compilation, stability, or safety.
    accountability_clause: Any operational use of PMS-QC remains dependent on external architectures,
      implementations, validation procedures, and domain-specific accountability mechanisms.
    deployment_clause: Use of PMS-QC in auditing, orchestration, or AI–QC coordination does
      not by itself amount to deployment readiness or a validated control system.
    rivalry_clause: PMS-QC may coexist with rival or complementary formalisms that foreground
      different distinctions more effectively for particular analytical or implementation tasks.
    mapping_validity_clause: PMS-QC does not currently provide a formal test for when a cross-domain
      operator mapping preserves PMS operator semantics versus functioning as a structurally
      useful analogy or symbolic transfer. This remains an open methodological question for
      future work.
    case_application: The case remains structural, documentation-oriented, and audit-oriented.
      It risks overclaim only if the PMS-QC mapping is read as physical adequacy, numerical
      correctness, compilation validity, convergence, safety, governance authority, or deployment
      readiness; none of those claims is made.
  terminology:
    qc_frame:
      definition: 'A structured domain of quantum operations: Hilbert space, register decomposition,
        active subspace, or error-correction code space, rendered as a □-operator instance within
        the PMS-QC overlay.'
      case_application: 'The frame is under-specified but structurally relevant: an oracle domain,
        problem frame, eigenproblem frame, controlled-unitary frame, or measurement frame would
        have to be declared before Ω-heavy operations can be audited.'
    qc_workflow:
      definition: A sequence or DAG of quantum and possibly classical operations that can be
        expressed as a PMS operator chain with Δ–Ψ annotations.
      case_application: 'A workflow class is specified only at a high level: a circuit, hybrid
        DAG, or macro program containing one or more oracle-like components. No concrete gate
        list, register allocation, or trace log is supplied.'
    macro_operator:
      definition: A named QC-level structural construct such as QFRAME or QPREP that expands
        to a Δ–Ψ operator sequence and may serve as documentation, annotation, audit handle,
        or compilation-adjacent anchor. A macro does not by itself guarantee physical adequacy,
        correctness, or optimal compilation.
      case_application: QFRAME and QORACLE_CALL are most relevant; QMEASURE is relevant where
        measurement mappings are part of the case; QITERATE, QDIFFUSION, QFT_ALIGN, and QSTABILIZE
        remain weak or conditional.
    generic_base_macro:
      definition: A macro belonging to the generic PMS-QC base overlay and intended for algorithm-agnostic
        structural use.
      case_application: Only generic PMS-QC base macros are invoked as overlay shorthand. No
        paper-specific macro, ladder, fixed-point variant, or convergence refinement is promoted
        into base semantics.
    paper_specific_refinement:
      definition: A specialized construct, chain pattern, or policy refinement that may be introduced
        in an optional extension layer without changing PMS-QC base semantics.
      case_application: No paper-specific refinement is invoked. Explicit QPE ladders, fixed-point
        Grover variants, overshoot regulation, and algorithm-specific convergence schedules remain
        excluded unless supplied by a separate extension layer.
    optional_extension:
      definition: A non-canonical add-on layer that refines or augments a bounded use case while
        remaining subordinate to PMS and the PMS-QC base overlay.
      case_application: Optional extension use is absent and reserved. The abstract case can
        be annotated with generic base macros only; stronger algorithm-specific interpretation
        would require EXT-level evidence.
    structural_constraint:
      definition: An admissibility condition or guardrail formulated at the level of Δ–Ψ organisation
        rather than at the level of physical implementation.
      case_application: Relevant structural constraints are no_unframed_omega, measurement_requires_meas_frame
        where measurement is used, unstable_asymmetry_guard, no_reframing_past_sigma, and bounded
        Θ/Ψ constraints where iteration or stabilisation are specified.
    non_guarantee:
      definition: Explicit indication that structural admissibility does not imply physical correctness,
        safety, convergence, or deployment adequacy.
      case_application: Preserve non-guarantees for physical correctness, hardware adequacy,
        gate fidelity, convergence, numerical correctness, safety, legal sufficiency, deployment
        readiness, and PMS Base validation.
    structural_comparability:
      definition: Operator-level comparability across domains that does not imply ontological
        identity or equal explanatory depth.
      case_application: Structural comparability is used only to compare QC workflow motifs with
        PMS-QC overlay roles. It does not imply ontological identity, equal explanatory depth,
        or superiority over QC formalisms.
    structural_not_physical:
      definition: Indicates that the relevant statement concerns structural rendering, organisation,
        or annotation, not the underlying physical mechanism.
      case_application: Structural-not-physical language is required for every mapping from Δ–Ψ
        to superposition, oracle asymmetry, controlled operations, measurement, attractor-like
        amplification, stabilisation, or audit policy.
    cross_domain_mapping_validity:
      definition: PMS-QC does not currently provide a formal criterion for when a cross-domain
        operator mapping preserves PMS operator semantics rather than functioning as a structurally
        useful analogy or symbolic transfer.
      case_application: Mapping validity is methodologically open and under-specified. The overlay
        is useful as structural annotation, but PMS-QC does not prove that every cross-domain
        mapping preserves PMS semantics rather than functioning as controlled analogy.
  overlay_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: completed PMS Core case YAML for Oracle-Asymmetry Audit (Audit Trace)
    rule: This QC block is appended to or integrated with an already completed PMS Core v1.3
      case artefact. It does not rewrite the core pass, redefine PMS operators, alter PMS dependencies,
      change derived structures, or treat PMS-QC constructs as PMS Base.
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: The QC overlay may add visibility for QC frames, macro-programs, superposition
      preparation, oracle asymmetry, iteration, attractor-like amplification, Fourier-domain
      alignment, measurement, stabilisation, structural policies, AI–QC annotation, audit logging,
      and base/extension boundaries. It must not modify the completed PMS Core case except where
      a direct PMS.yaml inconsistency has been separately identified.
  pms_reference:
    note: PMS-QC assumes that the PMS repository reference specification is available and authoritative.
      This overlay does not redefine the Δ–Ψ operators, does not modify their canonical dependency
      spine, and does not alter the default operator ordering or repository-level PMS governance.
      All mappings below reference the PMS meta-axioms by id and should be read as overlay-level
      QC renderings only.
    operators_ref:
      source: PMS.yaml
      meta_axioms:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
    dependency_hygiene_note: PMS-QC macro expansions are structural renderings and documentation
      handles. They do not replace PMS dependencies and do not silently promote QC roles into
      canonical PMS operator meanings.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  repository_governance:
    role_of_this_file: Generic QC structural overlay within the PMS repository ecosystem.
    overlays_may:
    - Define domain-specific mappings from Δ–Ψ to QC roles.
    - Introduce generic QC base macros for structural description.
    - Define bounded overlay-level structural policies.
    - Add organizational or toolchain-oriented helper metadata, provided such metadata is explicitly
      non-canonical.
    overlays_should_not_without_explicit_revision:
    - Silently redefine Δ–Ψ mappings as if they were canonical PMS semantics.
    - Silently alter the canonical PMS operator set, ordering, or dependency path.
    - Silently promote paper-specific refinements into the PMS-QC base layer.
    - Silently alter the semantics of existing base macros.
    - Treat governance-oriented QC applications as required endpoints of PMS or PMS-QC.
    - Treat helper metadata as if it modified PMS operator logic.
    case_application: Repository discipline is preserved by treating PMS-QC as a subordinate
      overlay only. The completed PMS Core pass is not rewritten, PMS.yaml remains the only PMS
      Base reference, macros are not PMS operators, and QC policies are not promoted into PMS
      dependencies or derived structures.
  base_vs_extension_boundary:
    note: This block records the intended boundary between the generic PMS-QC base overlay and
      optional paper-specific refinement layers. It is a boundary aid for repository discipline
      and does not itself redefine PMS or PMS-QC semantics.
    base_macros:
    - QFRAME
    - QPREP
    - QORACLE_CALL
    - QITERATE
    - QDIFFUSION
    - QFT_ALIGN
    - QMEASURE
    - QSTABILIZE
    base_policies:
    - no_unframed_omega
    - measurement_requires_meas_frame
    - unstable_asymmetry_guard
    - no_reframing_past_sigma
    - max_iteration_depth
    - stabiliser_frequency
    paper_specific_refinements_reserved_for_ext:
    - Explicit QPE ladder macroization, e.g. U^(2^j) as a reusable named refinement.
    - Fixed-point or overshoot-regulated Grover refinements.
    - Algorithm-specific attractor schedules or convergence guards.
    - Paper-specific governance heuristics beyond the generic base policy layer.
    examples_that_remain_skeleton_only:
    - grover_minimal
    - qpe_minimal
    boundary_status: preserved
    case_application: The case stays within the generic PMS-QC base overlay. It may resemble
      Grover-style oracle marking or QPE-style controlled-unitary asymmetry, but it does not
      supply enough detail to invoke a skeleton example as the case output or to require EXT /
      paper-specific refinement.
  qc_mapping:
    overview: This section renders each PMS operator Δ–Ψ as a possible structural role in QC
      contexts. The mapping is one-to-many and non-identitarian; a given operator may have multiple
      quantum-computational renderings depending on context, framing, and level of description.
      These mappings do not imply ontological identity between quantum phenomena and PMS operators;
      they indicate how QC structures can be described through the PMS-QC overlay at a structural
      level.
    mapping_status: partial
    operator_roles:
      Delta:
        id: Δ
        name: Difference
        applicability: active
        qc_role: Distributed difference structures in Hilbert space can be read as superposition,
          basis alternatives, and marked subspaces. Within the computational frame, Δ can render
          how alternatives become structurally distinguishable.
        qc_examples:
        - Uniform superposition over computational basis states.
        - Oracle-marked states in Grover's search.
        - Eigenphase-encoded alternatives in the QPE control register.
        typical_realizations:
        - Hadamard layers creating superposition.
        - Phase flips or selective phase shifts marking solution states.
        case_application: Δ maps to basis distinctions, marked/unmarked alternatives, oracle-domain
          distinctions, and measured/unmeasured or trace-visible/trace-hidden alternatives. Superposition
          may be relevant, but the concrete preparation state is not specified.
      Nabla:
        id: ∇
        name: Impulse
        applicability: active
        qc_role: Minimal directed activation or progression in a circuit can be rendered as the
          application of a non-trivial gate or gate block that moves the system away from its
          previous configuration.
        qc_examples:
        - First non-identity gate layer after state initialisation.
        - Single-qubit rotations that initiate amplitude flow.
        typical_realizations:
        - Single-qubit rotations Rx, Ry, Rz.
        - Initial entangling step in QPREP(entangle).
        case_application: ∇ maps to directed activation through oracle calls, controlled-unitary
          application, marking or phase-kickback operation, or measurement-channel activation.
          The exact gate block is not supplied.
      Box:
        id: □
        name: Frame
        applicability: active
        qc_role: Structural boundaries within which quantum operations occur can be modeled as
          the chosen Hilbert space, register decomposition, active subspace, or error-correction
          code space.
        qc_examples:
        - Problem frame specifying the search domain in Grover.
        - Eigenproblem frame in Quantum Phase Estimation.
        - Error-space frame of a stabiliser code.
        typical_realizations:
        - Register layout and qubit allocation.
        - Subspace definitions for oracles or codes.
        case_application: '□ maps to the active workflow frame: circuit, hybrid DAG, macro program,
          oracle domain, controlled-unitary domain, or measurement frame. The concrete Hilbert-space/register
          frame remains under-specified.'
      Lambda:
        id: Λ
        name: Non-Event
        applicability: weak
        qc_role: Unrealised computational branches or outcomes, especially at measurement, can
          be rendered as the paths not taken encoded as suppressed or discarded possibilities.
        qc_examples:
        - Unrealised measurement outcomes in Grover.
        - Phase configurations not selected in QPE readout.
        typical_realizations:
        - Measurement collapse eliminating alternatives.
        - Post-selection discarding undesired outcomes.
        case_application: Λ maps only weakly to unrealised branches, discarded outcomes, missing
          trace expectations, non-selected alternatives, or absent measurement outcomes. Because
          no concrete measurement record or expected trace event is supplied, Λ remains conditional.
      Alpha:
        id: Α
        name: Attractor
        applicability: weak
        qc_role: Directed convergence tendencies in the amplitude landscape can be modeled as
          amplitude amplification, phase alignment, or stabilising transformations that bias evolution
          toward certain states or subspaces.
        qc_examples:
        - Grover diffusion operator amplifying marked states.
        - Inverse QFT in QPE aligning amplitudes around the phase estimate.
        - Error-mitigation routines pulling states back toward a code space.
        typical_realizations:
        - Amplitude amplification subcircuits.
        - Fourier-domain alignment QFT / QFT^-1.
        case_application: Α may appear as attractor-like amplification, phase alignment, stabilisation,
          or recurrent oracle-pattern formation, but the case does not specify diffusion, amplitude
          amplification, QFT alignment, or recurrence.
      Omega:
        id: Ω
        name: Asymmetry
        applicability: active
        qc_role: Directional or role-based structural differences in QC can be read as controlled
          operations, oracle calls, and measurement asymmetries through which certain subsystems
          act on others in a privileged way.
        qc_examples:
        - Controlled unitary action in phase-estimation-style settings.
        - Oracle phase flip on the target state in Grover.
        - Measurement mapping quantum states to classical outcomes.
        typical_realizations:
        - Controlled gates such as CNOT or controlled-U.
        - Problem oracles with special knowledge about solution sets.
        case_application: Ω is the central QC overlay role; black-box functions, marking or phase-kickback
          primitives, controlled unitaries, and measurement mappings impose directional access,
          control, information, or readout asymmetry. QORACLE_CALL covers oracle/control components;
          QMEASURE covers measurement mappings where present.
      Theta:
        id: Θ
        name: "Temporality / Iteration"
        applicability: "active_as_workflow_ordering_weak_as_iteration"
        qc_role: >
          Ordered quantum-computational structure can be rendered as circuit
          sequence, DAG dependency, macro-program order, query order,
          controlled-operation order, measurement timing, or explicit repeated
          blocks. PMS-QC may express repeated blocks as Θ-style iteration, but
          this does not by itself elevate any algorithm-specific ladder,
          convergence schedule, or power structure into generic base semantics.
        qc_examples:
          - "k-fold repetition of the Grover oracle–diffusion block."
          - "Ordered control sequences in QPE-like constructions."
          - "Measurement timing or trace order in a hybrid QC workflow."
        typical_realizations:
          - "For-loops or unrolled repetitions in circuit descriptions."
          - "Time-ordered application of control sequences."
          - "Trace-ordered quantum/classical handoff steps."
        case_application: >
          Θ is active at the overlay level as workflow ordering and audit-trace
          temporality: oracle calls, controlled operations, phase-kickback
          relations, and measurement mappings occur in an ordered or traceable
          workflow. Θ remains weak only in the narrower QITERATE sense, because
          no iteration depth k, repeated block, convergence schedule, or
          loop-unrolled structure is supplied.

      Phi:
        id: Φ
        name: "Recontextualization"
        applicability: "active_as_audit_recontextualization_weak_as_qc_basis_shift"
        qc_role: >
          Structural reframing between computational domains can be modeled as
          basis changes, Fourier transforms, representation shifts, or explicit
          movement between circuit, DAG, macro-program, measurement, and audit
          frames. PMS-QC treats these as overlay renderings of Φ, not as claims
          that every frame shift preserves operator semantics with equal depth.
        qc_examples:
          - "Inverse QFT in QPE moving from phase domain to bit representation."
          - "Switching between logical and physical qubit frames."
          - "Re-reading an oracle call as an audit-visible asymmetry point."
        typical_realizations:
          - "QFT / QFT^-1 layers."
          - "Change-of-basis transformations for measurement or analysis."
          - "Explicit audit annotation of a component previously treated only as a circuit operation."
        case_application: >
          Φ is active as audit recontextualization because the case asks for
          oracle-like components to be read through a QC overlay and audit
          profile. Φ remains weak as a concrete QC basis shift because no QFT,
          inverse QFT, logical/physical frame transition, or specified
          measurement-basis transformation is provided. Rival formalizations
          must therefore remain open rather than being absorbed as PMS-QC
          reframing.
      Chi:
        id: Χ
        name: Distance
        applicability: active
        qc_role: Separation or insulation between subsystems, layers, or domains can be rendered
          as boundaries between experimental frames, dev/prod environments, or separated code
          spaces. In QC contexts, this is typically a weaker and more context-dependent structural
          notion than in anthropological or governance-near PMS applications, and should not be
          overstretched into stronger non-QC senses without further argument.
        qc_examples:
        - Isolation of experimental circuits from production QC workloads.
        - Code-space separation in certain error-correction architectures.
        typical_realizations:
        - Use of disjoint register sets.
        - Segregated pipelines for test vs. production execution.
        case_application: Χ is active as audit distance and boundary discipline rather than as
          a concrete register-isolation claim. QC-specific distance such as code-space separation
          or dev/prod separation is not supplied.
      Sigma:
        id: Σ
        name: Integration
        applicability: weak
        qc_role: Structural commitment of transformations can be modeled as points where previous
          operations are treated as fixed, integrated, and no longer freely reinterpreted except
          under explicitly bounded constraint regimes.
        qc_examples:
        - End of a Grover iteration after diffusion.
        - Post-QFT state in QPE before measurement.
        typical_realizations:
        - Circuit-level boundaries where results are frozen for next stages.
        - Checkpoints in QC workflows or compilers.
        case_application: Σ would mark an integration boundary, checkpoint, diffusion commit,
          post-QFT commit, or trace commit. The abstract case does not provide a concrete commit
          point, so Σ remains weak.
      Psi:
        id: Ψ
        name: Self-Binding
        applicability: weak
        qc_role: Stabilising invariants and constraints on future operations can be rendered
          as error correction, stabiliser checks, coherence or iteration bounds, and bounded
          overlay-level policy constraints that restrict admissible compositions. This should
          not be read as a claim that PMS itself provides a validated governance architecture.
        qc_examples:
        - Stabiliser code enforcement and syndrome-based correction.
        - Iteration-depth guards on Grover- or QPE-related variants.
        - Overlay-level policy constraints in bounded AI–QC settings.
        typical_realizations:
        - Invariant enforcement such as stabiliser measurement and correction or code-space preservation.
        - Bounded policy constraints on admissible composition or iteration depth in AI–QC orchestration.
        case_application: Ψ is weak and policy-level only; possible iteration bounds, stabiliser
          checks, invariant enforcement, or audit constraints are not specified. No selfhood,
          consciousness, or autonomous agency is attributed.
  qc_macro_language:
    overview: PMS-QC introduces generic PMS-QC base macros that describe typical quantum-circuit
      motifs as Δ–Ψ compositions. These macros are structural and documentation-oriented objects;
      they serve as annotation, audit, and compilation-adjacent anchors within this framework.
      They do not claim completeness for QC macro-abstraction, do not guarantee optimal compilation,
      and do not by themselves establish physical adequacy, correctness, stability, or safety.
    macro_program_status: partial
    selected_macro_program:
    - QFRAME(problem_or_oracle_domain)
    - QORACLE_CALL(oracle_like_component)
    - QMEASURE(basis=under_specified, register=under_specified) if measurement_mapping_is_part_of_workflow
    macro_operators:
      QFRAME:
        id: QFRAME
        applicability: active
        params:
        - kind
        description: Create or activate a quantum frame (□).
        allowed_kinds:
        - init
        - problem
        - eigenproblem
        - error_space
        pms_expansion:
        - □
        canonical_chain: □
        notes: QFRAME(kind) is a generic PMS-QC base macro. It establishes or selects a □-instance
          and may be nested through repeated framing. Typical base kinds include init, problem,
          eigenproblem, and error_space. It marks structural scope only and does not by itself
          guarantee physical adequacy, resource availability, or hardware compatibility.
        case_application: QFRAME is required as an overlay condition; the oracle, controlled-unitary,
          or measurement mapping must be placed in a problem, eigenproblem, oracle-domain, or
          measurement frame. The exact kind is under-specified.
      QPREP:
        id: QPREP
        applicability: weak
        params:
        - mode
        description: Prepare quantum registers through superposition, entanglement, or initialisation.
        allowed_modes:
        - superposition
        - register_init
        - entangle
        pms_expansion:
        - Δ
        - ∇
        - Α
        canonical_chain: Α ∘ ∇ ∘ Δ
        notes: QPREP is a generic PMS-QC base macro. QPREP(superposition) can render Δ via
          distributed amplitudes, ∇ via activation gates, and Α via preparation routines that
          establish stable patterns such as uniform superposition. It captures structural preparation
          only; paper-specific preparation refinements, where needed, belong in an optional extension
          layer.
        case_application: QPREP is only weakly relevant. A quantum workflow normally has register
          initialisation or preparation, but the case does not specify superposition, entanglement,
          or register-init mode.
      QORACLE_CALL:
        id: QORACLE_CALL
        applicability: active
        params:
        - oracle_id
        description: Apply an oracle or controlled unitary encoding asymmetry within an active
          frame.
        pms_expansion:
        - □
        - Δ
        - Ω
        canonical_chain: Ω ∘ Δ ∘ □
        notes: QORACLE_CALL is a generic PMS-QC base macro. It may structurally render both
          Grover-style marking and controlled-unitary action in QPE-like settings. The active
          □-frame must match the oracle domain. Specialized laddered variants remain paper-specific
          refinements; the explicit QPE power-of-two ladder is not part of base semantics.
        case_application: QORACLE_CALL is active as overlay shorthand for black-box functions,
          marking or phase-kickback primitives, and controlled unitaries, provided each Ω operation
          is explicitly framed by □. Measurement mappings are handled through QMEASURE rather
          than silently folded into QORACLE_CALL.
      QDIFFUSION:
        id: QDIFFUSION
        applicability: weak
        params: []
        description: Apply amplitude amplification or related attractor dynamics with an integration
          step.
        pms_expansion:
        - Α
        - Σ
        canonical_chain: Σ ∘ Α
        notes: QDIFFUSION is a generic PMS-QC base macro. It captures the existence of an attractor-driven
          amplification step Α together with its structural commit Σ. It does not guarantee convergence,
          correctness, stability, or physical adequacy. Fixed-point or overshoot-regulated variants
          remain EXT-only refinements and are not implied by the base macro.
        case_application: QDIFFUSION is weak. It would apply if the oracle-asymmetry workflow
          includes amplitude amplification, diffusion, or an attractor-like structural commit,
          but this is not specified.
      QFT_ALIGN:
        id: QFT_ALIGN
        applicability: weak
        params:
        - direction
        description: Fourier-domain basis alignment as reframing plus attractor alignment.
        allowed_directions:
        - forward
        - inverse
        pms_expansion:
        - Φ
        - Α
        canonical_chain: Α ∘ Φ
        notes: QFT_ALIGN is a generic PMS-QC base macro. It models representation shift Φ together
          with amplitude alignment Α and is distinct from Grover-style diffusion. An explicit
          Σ step may follow when the transformed structure is committed for downstream processing
          or measurement, but Σ is not contained implicitly inside the macro and, where needed,
          should be represented explicitly in the surrounding workflow. The macro does not guarantee
          correctness, stability, or physical adequacy. More specialized QPE-oriented refinements
          belong to an optional extension layer.
        case_application: QFT_ALIGN is weak. It would apply if the workflow includes Fourier-domain
          alignment, inverse QFT-like basis shift, or phase-estimation-style representation change;
          the case material does not establish this.
      QITERATE:
        id: QITERATE
        applicability: weak
        params:
        - k
        - block
        description: Iterate a compositional block k times.
        pms_expansion:
        - Θ
        canonical_pattern: Θ^k(block)
        notes: QITERATE is a generic PMS-QC base macro. The block parameter may be an inline
          block or a named reference to a defined block/macro expansion. QITERATE does not inspect
          internal structure; it enforces Θ-structured repetition only. It does not guarantee
          convergence, termination, correctness, stability, or physical adequacy. Policy constraints
          may bound k via Ψ, but algorithm-specific iteration refinements remain outside the
          base unless explicitly promoted later by independent revision.
        case_application: QITERATE is weak. The workflow may contain repeated oracle calls or
          iterative amplification, but k, iteration depth, and repeated block are under-specified.
      QMEASURE:
        id: QMEASURE
        applicability: weak
        params:
        - basis
        - register
        description: Measure a register in a given basis.
        pms_expansion:
        - Δ
        - Λ
        canonical_chain: Λ ∘ Δ
        notes: QMEASURE is a generic PMS-QC base macro. Δ captures resolved outcome distinctions;
          Λ encodes unrealised branches as non-events. It requires a measurement-stable frame
          □_meas. The macro captures structural outcome resolution only and should not be read
          as a complete physical theory of measurement.
        case_application: QMEASURE is relevant where the oracle-like component is a measurement
          mapping or where an audit trace includes outcome resolution. Basis and register are
          not supplied, and Λ residues remain under-specified.
      QSTABILIZE:
        id: QSTABILIZE
        applicability: weak
        params:
        - code_id
        description: Apply error-correction or stabiliser code routines.
        pms_expansion:
        - Ψ
        canonical_chain: Ψ
        notes: QSTABILIZE is a generic PMS-QC base macro. It introduces or maintains structural
          invariants such as periodic stabiliser checks, coherence guards, or code-space enforcement.
          It does not by itself guarantee stability, correctness, or physical adequacy. Paper-specific
          invariants and algorithm-specific convergence rules remain EXT-only.
        case_application: QSTABILIZE is not concretely present. It remains a possible Ψ-level
          policy or invariant constraint for long Θ chains, stabiliser-code workflows, or bounded
          audit architectures.
    ebnf_alignment:
      status: reference_only
      note: The grammar is deliberately minimal and structural. Macro names, allowed kinds/modes/directions,
        expansion order, and optional versus required Σ/Ψ placements should remain synchronized
        with the PMS-QC paper and with the base/extension boundary. An explicit Σ statement is
        allowed where a workflow needs to mark a structural commit after a macro that does not
        contain Σ internally, for example after QFT_ALIGN(...).
      grammar_reference:
        Program: FrameDecl PrepDecl Block
        FrameDecl: QFRAME(FrameKind)
        FrameKind: init | problem | eigenproblem | error_space
        PrepDecl: QPREP(PrepKind)
        PrepKind: superposition | register_init | entangle
        Statement:
        - QORACLE_CALL(Identifier)
        - QDIFFUSION
        - QITERATE(Integer, Block)
        - QMEASURE(Basis, Register)
        - QSTABILIZE(CodeIdentifier)
        - Σ
        Basis: computational | fourier | Identifier
      case_application: The case can be represented only conceptually using the EBNF macro grammar.
        A parse-complete macro program cannot be produced because the concrete frame kind, preparation,
        oracle id, iteration count, measurement basis, and register are under-specified.
    iteration_encoding:
      status: weak
      overview: Optional parse-friendly metadata for Θ-style repetition. This metadata complements
        symbolic Θ^k notation for toolchains and organizational purposes. It is non-canonical,
        does not redefine Θ, and does not alter PMS operator dependencies or ordering.
      iteration:
        operator: Θ
        count_symbol: k
        applies_to:
        - Σ
        - Α
        - Ω
        - Δ
        - □
        applies_to_note: This list is a toolchain-oriented organizational hint for composing
          repeatable structural blocks. It should not be read as a canonical PMS claim that all
          listed operators are independently iterated in standard usage.
      case_application: Parse-friendly Θ metadata is relevant only if the workflow has repeated
        oracle calls or loop-unrolled controlled operations. The current case gives no k and
        no specified repeated block.
  qc_structural_policies:
    overview: PMS-QC enables structural guardrails that act on Δ–Ψ chains rather than on low-level
      gates. These policies support auditing, annotation, and bounded policy-layer reasoning,
      and may be used for runtime governance in bounded architectures. They express structural
      constraints, not physical guarantees.
    global_non_guarantee_clause: Structural constraint ≠ physical guarantee ≠ safety guarantee.
    policy_status: partial
    frame_constraints:
      no_unframed_omega:
        id: no_unframed_omega
        applicability: active
        policy_kind: frame
        non_guarantee: true
        description: Disallow Ω asymmetry operations without an active □-frame.
        rule: Any QORACLE_CALL or controlled operation must be dominated by an explicit QFRAME(..)
          in scope. Formally; Ω must be preceded by □.
        case_application: Every oracle-like Ω operation must be dominated by an explicit □ frame.
          The Core case already treats framing as active, but the concrete QFRAME must be supplied
          before operational use.
      measurement_requires_meas_frame:
        id: measurement_requires_meas_frame
        applicability: risk
        policy_kind: frame
        non_guarantee: true
        description: Require a measurement-stable frame before QMEASURE.
        rule: If no measurement-adequate □_meas is active, a Φ-step must introduce or select
          such a frame before QMEASURE. Reframing after Σ is forbidden unless mediated by Ψ.
        case_application: Measurement mappings require a measurement-stable □_meas. The case
          names measurement mappings as possible oracle-like components but does not provide
          basis/register or Σ/Ψ-mediated reframing rules, so this remains a review risk.
    asymmetry_constraints:
      unstable_asymmetry_guard:
        id: unstable_asymmetry_guard
        applicability: risk
        policy_kind: stability
        non_guarantee: true
        description: Ω-heavy compositions may be structurally unstable unless further guarded
          by attractor or stabilisation structure.
        rule: Ω that significantly redistributes risk or resource load should either be followed
          by Α, attractor toward a stabilising region, or Ψ, explicit invariant. Bare Ω-chains
          are flagged as structurally unstable unless further guarded or explicitly whitelisted.
        case_application: Ω-heavy oracle-asymmetry is central and should be guarded by Α or Ψ
          if iteration, amplification, resource redistribution, or audit consequence is specified.
          The abstract case lacks such guards, so this is a structural review risk, not a violation.
    integration_constraints:
      no_reframing_past_sigma:
        id: no_reframing_past_sigma
        applicability: active
        policy_kind: integration
        non_guarantee: true
        description: Σ marks integration boundaries that should not be freely reinterpreted.
        rule: After Σ(E), recontextualisation Φ may not alter the semantics of E except under
          policies explicitly bound to Ψ. Σ is treated as a structural commit.
        case_application: No concrete Φ-after-Σ movement is specified. If a future workflow introduces
          a Σ checkpoint or measurement commit, later recontextualization must be Ψ-bound rather
          than freely altering the committed semantics.
    self_binding_policies:
      max_iteration_depth:
        id: max_iteration_depth
        applicability: risk
        policy_kind: iteration
        non_guarantee: true
        description: Limit Θ-depth via bounded Ψ constraints.
        params:
          k_max: unspecified
        rule: For any QITERATE(k, block), require k <= k_max unless wrapped in a QSTABILIZE(..)
          section that enforces additional invariants. This prevents unbounded or poorly calibrated
          iterative amplification.
        case_application: Iteration depth is under-specified. Any QITERATE(k, block) version
          would require an explicit k_max or a QSTABILIZE-bound exception before operational
          use.
      stabiliser_frequency:
        id: stabiliser_frequency
        applicability: risk
        policy_kind: stability
        non_guarantee: true
        description: Require minimum stabilisation density for long Θ-chains.
        params:
          theta_length_threshold: unspecified
        rule: For Θ-chains exceeding theta_length_threshold, require at least one QSTABILIZE(..)
          occurrence within the chain. This models periodic error-correction or bounded governance
          checkpoints.
        case_application: Long Θ-chains are not specified. If long iteration or repeated controlled-unitary
          sequences are introduced, stabilisation density must be reviewed and cannot be inferred
          from PMS-QC structure alone.
  qc_examples_alignment:
    status: reference_only_not_used_as_case_output
    note: Source examples remain base-layer skeletons only. They may orient a case but do not
      imply convergence guarantees, physical adequacy, correctness, or reusable EXT-level refinements.
    grover_minimal:
      relevance: weak
      description: PMS-QC minimal structural rendering of Grover's search algorithm. This is
        a base-layer skeleton only and does not imply convergence guarantees.
      macro_program:
      - QFRAME(problem)
      - QPREP(superposition)
      - QITERATE(k, { QORACLE_CALL(F); QDIFFUSION; })
      - QMEASURE(basis=computational, register=search)
      pms_expansion:
        chain: Λ ∘ Δ ∘ Θ^k( Σ ∘ Α ∘ Ω ∘ Δ ∘ □ )
        interpretation: 'Structural rendering only. □: problem frame; Δ: distributed alternatives;
          Ω: oracle asymmetry; Α: amplitude attractor; Σ: integrated iteration effect; Θ^k:
          repeated oracle–diffusion; Δ/Λ: outcome distinction and unrealised branches. No Ψ-layer
