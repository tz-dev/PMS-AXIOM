      - Summarise Σ-boundaries and Φ-based reframings.
      allowed_actions:
      - Propose new macro-level programs QFRAME/QPREP/... under policy constraints.
      - Suggest workflow refinements by inserting QSTABILIZE(..) or adjusting Θ-depth.
      - Annotate existing circuits with PMS-QC metadata for auditing.
      - Structure alternative QC designs for comparison at the Δ–Ψ level.
      guardrails:
      - The agent must not bypass Ψ-encoded constraints.
      - New workflows must pass frame, asymmetry and integration policies.
      - Anthropomorphic interpretations of quantum processes are disallowed.
      - Policy satisfaction must not be treated as validated safety.
      - No physical guarantees or deployment claims follow from PMS-QC compliance alone.
      - The base/EXT distinction must not be bypassed or silently collapsed.
      case_application: AI–QC interface use is relevant only as bounded annotation, proposal review,
        structural query, and audit support. The overlay may help list frames, Ω operations,
        Θ depth, Σ boundaries, and Ψ constraints, but it does not authorize autonomous execution
        or deployment.
    logging_and_audit:
      logging_note: Implementations that choose to operationalize this layer may log the following
        items for audit and comparison purposes.
      suggested_logs:
      - Δ–Ψ operator sequence per executed workflow.
      - Triggered policy checks and their outcomes.
      - Points where Σ or Ψ changed future admissible operations.
      audit_use:
      - Post-hoc analysis of structural stability and asymmetry.
      - Comparison of alternative Δ–Ψ designs for the same QC task.
      case_application: Structurally relevant logs would include the Δ–Ψ operator sequence, QFRAME
        scope for every Ω operation, measurement-frame declarations, triggered policy checks,
        iteration depth, Σ checkpoints, and any Ψ constraints. Logging remains optional and non-validating.
  methodological_limits:
    cross_domain_mapping_validity: The PMS-QC layer does not provide a formal criterion for
      when a cross-domain operator mapping preserves PMS operator semantics rather than functioning
      as a structurally useful analogy or symbolic transfer. This remains an open methodological
      question.
    non_capture_zones:
    - physical adequacy of quantum mechanics or hardware dynamics
    - low-level gate fidelity and noise modelling
    - algorithmic convergence guarantees
    - runtime safety
    - deployment readiness
    - semantic equivalence to QASM, Qiskit, Cirq, Braket, or other frameworks
    - proof that PMS operators capture QC phenomena exhaustively
    rival_formalisms_preserved:
    - quantum circuit model
    - Hamiltonian simulation
    - tensor networks
    - ZX-calculus
    - categorical quantum mechanics
    - backend-specific compiler frameworks
    - hardware-level noise and error models
    case_application: The case leaves open physical adequacy, hardware dynamics, gate fidelity,
      noise, convergence, runtime safety, deployment readiness, semantic equivalence to QASM/Qiskit/Cirq/Braket,
      and proof of exhaustive PMS-QC capture. Rival formalisms such as the circuit model, Hamiltonian
      simulation, tensor networks, ZX-calculus, categorical quantum mechanics, compiler frameworks,
      and hardware-level noise models remain preserved.
  meta_notes:
    compatibility:
    - PMS-QC can annotate or wrap programs in QASM, Qiskit, Cirq, Braket and similar frameworks.
    - Δ–Ψ annotations may be stored as sidecar metadata or embedded comments.
    - Compatibility with backend frameworks does not imply semantic equivalence or direct implementation
      adequacy.
    - Computational portability should not be confused with physical correctness or deployment
      readiness.
    extensibility:
    - Future versions may add specialised macro-operators for error mitigation, variational circuits,
      or hybrid classical–quantum loops.
    - Additional QC-specific policies may be defined as long as they remain Δ–Ψ-based, preserve
      the base/extension boundary, and do not claim physical guarantees.
    - Paper-specific refinements should not be silently promoted into the generic base overlay.
    case_application: Compatibility is relevant only as possible annotation or sidecar metadata
      for future concrete workflows. Extensibility is reserved for later EXT layers if algorithm-specific
      ladders, fixed-point amplification, variational circuits, error mitigation, or stronger
      governance heuristics are explicitly introduced.
