      - QPREP(superposition)
      - QITERATE(t, { QORACLE_CALL(U^{2^j}); })
      - QFT_ALIGN(inverse)
      - Σ
      - QMEASURE(basis=computational, register=control)
      pms_expansion:
        chain: Λ ∘ Δ ∘ Σ ∘ Α ∘ Φ ∘ Θ^t( Ω ∘ □ ) ∘ Α ∘ ∇ ∘ Δ
        interpretation: 'Structural rendering only. □: eigenproblem frame; Δ/∇/Α: preparation
          of control superposition; Θ^t(Ω ∘ □): ordered controlled-unitary action in minimal
          base form; Φ/Α/Σ: reframing, alignment and explicit structural commit for measurement,
          semantically read as Σ(Α(Φ(S))); Δ/Λ: phase-encoded alternatives resolved into a discrete
          estimate. This does not create a reusable base ladder macro.'
      case_application: The case partially resembles QPE where controlled unitaries or phase-kickback
        primitives are central, but no eigenproblem frame, control-register preparation, ordered
        U^(2^j) structure, QFT_ALIGN, Σ commit, or measurement basis is supplied. QPE remains
