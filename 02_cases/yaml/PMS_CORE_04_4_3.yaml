operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Moral luck becomes structurally analyzable through distinctions among intended action, actual outcome, agent control, contingency, affected parties, and later moral evaluation. These distinctions are conceptual entry points, not settled empirical facts."
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Differentiate action from outcome, control from contingency, intention from consequence, and evaluation from legal or diagnostic judgment."
      - "Check that these distinctions are not imported as fixed conclusions; the title alone provides a problem-field rather than a concrete division of facts."
    falsifier_conditions:
      - "If the fuller case contains no meaningful distinction between action, outcome, control, contingency, or evaluation, the PMS reading loses its entry point."
    non_capture_note: "Difference does not by itself prove that PMS captures the case."
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "The directional tension is the structural pressure toward assessment created by the difference between what an agent controls and how outcomes alter evaluation. This is not a claim about subjective desire or psychological impulse."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Treat the tension as argumentative and structural: pressure toward blame, excuse, comparison, or re-evaluation."
      - "Do not infer emotional drive, desire, guilt, shame, or motivation without concrete scene material."
    falsifier_conditions:
      - "If the case contains no evaluative or practical pressure arising from the action/outcome distinction, ∇ remains under-specified and should not carry the reading."
    non_capture_note: "Impulse is structural directedness, not psychological diagnosis."
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "The active frame is a moral-philosophical evaluative frame concerned with responsibility under contingency. Legal, clinical, empirical, metaphysical, and implementation frames are explicitly excluded unless later case material supplies grounds."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame as conceptual moral evaluation under contingency, not legal liability, diagnosis, or metaphysical proof."
      - "Mark any shift from intention-frame to outcome-frame or from moral frame to legal, empirical, or metaphysical frame before drawing conclusions."
    falsifier_conditions:
      - "If no evaluative frame is specified beyond the title, the analysis remains too abstract to discriminate between moral, legal, empirical, or metaphysical readings."
    non_capture_note: "A frame can clarify a case without exhausting it."
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Λ is active as a conceptual non-event structure. Moral luck turns on an expected but unstable correspondence between controlled action, consequence, and moral evaluation: harm may fail to occur despite risky action; harm may occur through contingency; an avoided outcome may still remain morally salient; or a counterfactual outcome may haunt the evaluation without becoming an empirical fact."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify the expected occurrence as alignment between action, control, consequence, and evaluation within the moral-philosophical frame."
      - "Distinguish actual event, non-event, counterfactual comparison, delayed consequence, and failed evaluative alignment."
      - "Preserve the possibility that unresolved contingency or absence marks a genuine limit of PMS capture rather than incomplete integration."
    falsifier_conditions:
      - "If no structured expectation, absence, counterfactual, failed alignment, or meaningful non-occurrence is present, Λ should be removed or marked not active."
      - "If absence is treated as hidden guilt, hidden failure, or incomplete integration by default, Λ is being over-assimilated."
    non_capture_note: "Absence must not be automatically translated into incomplete integration, maturity failure, recontextualization, or PMS drift."
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Α is only weakly available. The title may point to recurrent evaluative patterning in moral discourse, such as repeated comparisons between equally negligent agents with unequal outcomes, but no repeated scene, stable practice, institutional routine, or path-dependent pattern is supplied."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Show recurrence or stabilization before treating outcome-sensitive evaluation as an attractor."
      - "Distinguish a stable moral-evaluative pattern from a single abstract contrast, illustrative example, or accidental aggregation of examples."
      - "Prevent Α from silently supplying the stability that the case material itself does not provide."
    falsifier_conditions:
      - "If no recurrence or stabilization is shown in fuller material, Α is over-read and downstream Ω and Θ claims must remain dependency-qualified."
    non_capture_note: "Pattern formation is not proof of explanatory sufficiency."
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ω carries major but under-specified weight. Moral luck involves several possible asymmetries: agent control versus outcome exposure, actor versus affected party, prospective action versus retrospective evaluation, and evaluator versus evaluated. These are structural imbalances, not yet blame, desert, liability, diagnosis, or person-ranking."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether the asymmetry concerns control, exposure, vulnerability, consequence-bearing, evaluative power, obligation, or role position."
      - "Separate asymmetry of outcome from asymmetry of agency: unequal consequences do not automatically prove unequal responsibility."
      - "Do not moralize asymmetry by default; structural imbalance is not yet blame, desert, liability, or diagnosis."
      - "Allow Ω to remain weak where the case title does not identify actors, affected parties, roles, or institutional positions."
    falsifier_conditions:
      - "If no directional imbalance of exposure, capacity, vulnerability, obligation, or evaluative position is identifiable, Ω claims must be removed or marked weak."
      - "If Ω is used to rank lucky and unlucky agents as persons, the application violates PMS discipline."
    non_capture_note: "Asymmetry is structural, not a moral verdict."
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Θ is central because moral luck depends on a diachronic structure: prior action or intention, contingent event or non-event, actual outcome, and later reinterpretation or evaluation. The temporal arc is conceptually essential, but it remains scene-unspecified because no concrete sequence is supplied."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish the diachronic sequence from a static comparison of agents or outcomes."
      - "Mark whether the morally relevant time point is the action moment, the outcome moment, the later evaluative moment, or the relation among them."
      - "Check whether temporality is essential to the case or merely imported by the analysis; here it is essential to the concept but under-specified without scene facts."
    falsifier_conditions:
      - "If later material shows no relevant before/after sequence, trajectory, delay, or retrospective evaluation, Θ is overextended."
    non_capture_note: "Temporality in PMS does not by itself settle metaphysical continuity, empirical causation, legal sequence, or moral desert."
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Φ is active as the transformation of a prior action when placed into a later outcome-frame. The same conduct may be re-read after harm, avoided harm, discovery, accident, or counterfactual comparison. This re-reading is structurally central, but it must not be treated as automatic moral truth."
    dependency_status: "weak"
    analytic_weight: "major"
    calibration_points:
      - "Source frame: intention/control/action before outcome; target frame: consequence/outcome/evaluation after contingency."
      - "Distinguish legitimate recontextualization from retrospective capture, where the outcome overwrites the earlier action structure."
      - "Check whether recontextualization clarifies the evaluative problem or merely absorbs contingency and non-fit into PMS terminology."
    falsifier_conditions:
      - "If every rupture, resistance, rival framing, or brute contingency is redescribed as Φ, the reading becomes over-assimilative."
      - "If the later outcome is allowed to rewrite the whole action without preserving Δ distinctions, Φ becomes a retrospective verdict-machine rather than a PMS operator."
    non_capture_note: "Recontextualization must preserve possible non-capture."
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Χ is required both as PMS entry discipline and as analytic protection against immediate verdict. Moral luck strongly tempts collapse into blame, acquittal, tragic resignation, legal analogy, or metaphysical conclusion. Χ keeps the reading reversible, non-tribunal, non-person-ranking, and open to rival formalizations."
    dependency_status: "satisfied_as_application_gate_dependency_qualified_for_case_chain"
    analytic_weight: "major"
    calibration_points:
      - "Check that the analysis suspends verdict, keeps the reading reversible, and does not treat PMS coherence as sufficient."
      - "Distinguish Distance from avoidance or empty neutrality: Χ permits careful structural discrimination while refusing premature closure."
      - "Use Χ to prevent the case title from becoming an implicit scene, hidden diagnosis, or covert responsibility finding."
    falsifier_conditions:
      - "If Χ is suspended to force a moral verdict, legal conclusion, diagnostic label, metaphysical closure, or PMS validation claim, the application is invalid."
    non_capture_note: "Distance protects against overclaiming, premature closure, and smooth formal capture."
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Σ is weak-to-moderate because the case invites coordination of action, outcome, contingency, frame, asymmetry, and responsibility, but the title alone does not permit full integration. In moral luck, integration is especially risky: too much coherence can make the paradox look solved when it may remain genuinely tragic, rival-readable, or non-capturable."
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Test whether integration distinguishes control, outcome, responsibility, and contingency rather than resolving them by narrative smoothing."
      - "Distinguish integration from forced coherence; moral luck may remain tragic, paradoxical, or rival-readable."
      - "Allow Σ to remain incomplete where the case material does not justify reconciliation between control-based and outcome-sensitive evaluation."
    falsifier_conditions:
      - "If coherence is treated as proof that PMS has solved or exhausted moral luck, Σ is overclaimed."
      - "If Σ eliminates the scandal of unequal moral evaluation under unequal outcomes without further grounds, the reading becomes under-discriminating."
    non_capture_note: "PMS coherence is insufficient by itself."
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: "Ψ is weak and mostly analytic. Responsibility-as-self-commitment could matter in a fuller scene, especially where an agent owns a role, promise, duty, or long-term obligation despite contingent outcomes. The title itself does not supply an agent, promise, role, self-relation, or stable commitment. The clearest Ψ here is the application self-binding of the analysis itself."
    dependency_status: "weak"
    analytic_weight: "minor"
    calibration_points:
      - "Apply Ψ only if fuller material supplies self-binding, role ownership, promise, enduring responsibility, or explicitly scoped analytic self-binding."
      - "Do not attribute selfhood, autobiographical coherence, stable normativity, guilt, remorse, or responsibility-as-ownership to an abstract title or to hypothetical agents without explicit scope."
      - "Distinguish responsibility-as-self-binding from blame, liability, desert, character judgment, and metaphysical free will."
    falsifier_conditions:
      - "If Ψ is applied without established Σ, Θ, and Χ or without concrete self-binding material, the self-binding reading is under-specified."
      - "If Responsibility_R is treated as available merely because the topic is responsibility, Ψ has been projected rather than derived."
    non_capture_note: "SELF_FIXPOINT is a derived PMS structure, not a metaphysical proof of subjectivity."

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: "Base layer of distinctions, impulses, frames, non-events, and recurrent patterns."
    case_function: "L1 provides the conceptual entry field: Δ distinguishes action/outcome/control/contingency; ∇ marks weak evaluative pressure; □ supplies the moral-philosophical frame; Λ marks failed alignment and counterfactual non-events; Α remains weak because no recurrence is evidenced."
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: "Layer in which stabilized patterns become asymmetric relations and temporal trajectories."
    case_function: "L2 carries the central problem-space: Ω marks imbalances of control, exposure, affectedness, and retrospective evaluation, while Θ orders action, contingency, outcome, and later judgment. Both remain under-specified without a concrete scene."
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: "Layer of transformation, distancing, and integration."
    case_function: "L3 governs the reflective handling of the case: Φ tracks outcome-based re-reading, Χ prevents tribunal collapse and preserves reversibility, and Σ is allowed only as weak discriminative coordination, not as forced resolution."
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: "Layer of relatively stable self-relation maintained across time and contexts."
    case_function: "L4 is not primary. Ψ is relevant only as weak responsibility-as-self-binding in a possible fuller scene and as analytic self-binding of this PMS application."

dependency_logic:
  status: "partially_dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The title supplies conceptual distinctions among action, outcome, control, contingency, and evaluation."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "Weakly satisfied by structural pressure toward moral assessment generated by those distinctions; no subjective impulse is inferred."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Weakly satisfied by the moral-philosophical evaluative frame; other frames are explicitly bounded out."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Weakly satisfied by counterfactual non-events and failed alignment between control, consequence, and evaluation."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Weakly satisfied only as possible recurrent outcome-sensitive evaluative patterning; no concrete recurrence is evidenced."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Weakly satisfied through conceptual asymmetries of control, exposure, affectedness, and retrospective evaluative position, with dependency qualification because Α is weak."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Weakly satisfied by the sequence from action through contingency and outcome to retrospective judgment, with dependency qualification because Ω and Α are not scene-evidenced."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Weakly satisfied by recontextualization of prior action under later outcome and evaluation frames."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied as an application condition: verdict, enforcement, person-ranking, and closure are suspended."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Weakly satisfied only as a limited coordination demand; integration is not treated as proof of adequacy."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Weakly satisfied only as analytic self-binding of the application or as a possible fuller responsibility structure if scene material supplies commitment."
  dependency_failure_conditions:
    - "If a later operator is used while its dependencies are absent, mark the reading as under-specified or invalid."
    - "If the chain is used as a smooth totalization without discrimination tests, mark coherence risk as high."
    - "If an operator is not active, state so rather than forcing the full chain."

