core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: "PMS analyzes enactments, roles, and structures of praxis; it does not analyze persons as ontological entities or psychological essences."
    status: "satisfied"
    case_application: "The case is treated as a structure of praxis-evaluation: distinctions among action, outcome, contingency, frame, and responsibility. No person is analyzed as an ontological entity, psychological essence, or ranked moral type."
    failure_condition: "The analysis would fail P1 if it generated global person-labels, psychological essence claims, or ontological person rankings."
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: "The eleven meta-axioms Δ–Ψ are treated within PMS as a proposed minimal generative basis for praxis, without claiming finality or unique order."
    status: "satisfied"
    case_application: "Only the PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ is used as PMS operator vocabulary. No new PMS operators, axes, layers, or primitives are introduced."
    failure_condition: "The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if they belonged to PMS Base."
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: "PMS derives structures such as awareness, coherence, responsibility, action, dignity-in-practice, and asymmetry drift patterns from operator compositions."
    status: "satisfied"
    case_application: "Awareness_A, Coherence_C, Responsibility_R, Action_E, Dignity_in_Practice_D, SELF_FIXPOINT, and asymmetry drift patterns are handled only through PMS formulas, not as independent axioms."
    failure_condition: "The analysis would fail P3 if derived structures were treated as independent axioms."
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: "Ω and Θ are central structural operators; responsibility, maturity, and dignity-in-practice are analyzed under temporal and asymmetrical conditions."
    status: "satisfied"
    case_application: "Ω and Θ carry major analytic weight because moral luck turns on imbalances between control, exposure, consequence, evaluator, and evaluated, and on the sequence from action through contingent outcome into retrospective judgment. Both remain under-specified without a scene."
    failure_condition: "The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them without calibration."
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: "PMS may be represented computationally, but representation does not imply direct implementation, guaranteed interoperability, or explanatory adequacy."
    status: "satisfied"
    case_application: "The YAML document is only a formal representation of a bounded PMS reading. It is not a software implementation, empirical test, operational deployment, or validation of PMS."
    failure_condition: "The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy, or computational sufficiency."
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: "PMS remains open to comparison with rival grammars, sharper discriminative models, and more empirically grounded formalisms."
    status: "satisfied"
    case_application: "Rival readings remain open, including control-condition accounts, outcome-sensitive responsibility accounts, virtue or character readings, legal-causal readings, tragic-praxis readings, and anti-capture readings."
    failure_condition: "The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by default."
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: "Translation into PMS terms does not prove exhaustive capture; some praxis may remain partially legible or resist assimilation."
    status: "satisfied"
    case_application: "Possible non-capture is preserved for metaphysical freedom, moral desert, brute contingency, phenomenological guilt or regret, theological fate, and legal causation. These zones are not automatically redescribed as drift or failed integration."
    failure_condition: "The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration, or calibration failure."
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: "PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic, or person-ranking decisions."
    status: "satisfied"
    case_application: "The analysis does not infer pathology, traits, competence, maturity, risk, moral worth, or diagnosis from the concept of moral luck or from any hypothetical agent."
    failure_condition: "The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis."
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: "Any PMS application must keep findings tied to specific praxeological scenes, roles, and structures; global person-labels are out of scope."
    status: "partial"
    case_application: "Because no concrete scene is supplied, the reading is explicitly case-type-bound as a conceptual projection. Any stronger scene-bound interpretation would require actors, actions, outcomes, counterfactuals, roles, and evaluative frame."
    failure_condition: "The analysis would fail P9 if it generated global, irreversible, decontextualized claims."

