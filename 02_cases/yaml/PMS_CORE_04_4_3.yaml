derived_structure_discipline:
  status_note: "Derived structures are not primitive. They are used only through PMS formulas."
  case_status: "Awareness_A and Coherence_C are weak conceptual projections; Responsibility_R is weak and not a blame finding; Action_E is under-specified because no concrete enactment is supplied; Dignity_in_Practice_D is active as an application constraint; SELF_FIXPOINT is analytic-only and not derived as a case structure; drift patterns are possible risks but not entailed."

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: "Awareness is modeled structurally, not phenomenologically, and does not exhaust all notions of awareness."
    case_reading: "Awareness_A derives as weak structural awareness: the case maintains framed distinctions between action, outcome, control, contingency, and evaluation across the temporal arc from act to consequence to judgment. This is not phenomenological consciousness."
    status: "weak"
    calibration_points:
      - "Differentiate action/outcome/control/contingency/evaluation within a moral-philosophical frame across the sequence from prospective action to retrospective judgment."
    non_capture_note: "Structural awareness is not phenomenological consciousness."
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: "Coherence captures narrative stability of action, including meaningful absences and delays, without requiring full integration or self-binding."
    case_reading: "Coherence_C is weak and unstable: the moral frame organizes evaluative pressure and expectation, while Λ marks failed or uncertain alignment between control and outcome. Coherence here names a structural pressure, not truth or resolution."
    status: "weak"
    calibration_points:
      - "Distinguish limited narrative stability from validity, final responsibility, forced integration, or smoothing of the moral-luck problem."
    non_capture_note: "Coherence does not prove adequacy."
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: "Responsibility is structural rather than moralistic in PMS and is not the only valid theory of responsibility."
    case_reading: "Responsibility_R is relevant but weak. The formula requires Ψ, Φ, Θ, and Ω; the title provides Ω, Θ, and Φ conceptually, but not self-binding by an agent. Therefore Responsibility_R cannot be claimed as moral blame, legal liability, or full structural responsibility."
    status: "weak"
    calibration_points:
      - "Identify concrete asymmetry, temporal extension, recontextualization, and self-binding before claiming responsibility beyond conceptual relevance."
    non_capture_note: "Responsibility_R is not moral blame, diagnosis, or legal liability."
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures this directedness as a trajectory rather than a momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into coherent enactment."
    notes: "Action here is not any behavior; it is integrated and temporally extended."
    case_reading: "Action_E is under-specified. The title does not supply an integrated enactment, directed praxis, or concrete trajectory. Action can only be treated as a missing requirement for fuller analysis."
    status: "under_specified"
    calibration_points:
      - "Distinguish a concrete action from an abstract philosophical label, a possible example, or an evaluative claim."
    non_capture_note: "Without a concrete scene, Action_E remains under-specified."
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: "Dignity-in-Practice concerns how asymmetry is handled, not ranking persons or ontological worth."
    case_reading: "Dignity_in_Practice_D constrains the analysis: asymmetry must be handled without shaming, ranking, humiliation, irreversible labeling, or ontological evaluation. D is an application constraint, not a claim of metaphysical dignity or moral superiority."
    status: "application_constraint"
    calibration_points:
      - "Check that actor, evaluator, affected party, and hypothetical persons are not ranked or reduced to verdict-bearing examples."
    non_capture_note: "D is a praxeological application constraint, not an ontological or moral superiority claim."

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "analytic_only"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: "Formal representation of self-binding as integrated, reflexively modulated, temporally extended, asymmetry-aware praxis bound into relatively stable self-relation."
  case_reading: "SELF_FIXPOINT is not the primary structure of Moral luck as supplied. The title does not provide a stable self-relation, autobiographical coherence, or integrated commitment. The full chain is retained only as a PMS reference and as an analytic warning not to infer selfhood or responsibility without the required dependencies."
  implications:
    - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: "This sequence must not be read as proving that all forms of selfhood, agency, identity, or case structure reduce without remainder to this exact chain."
  non_capture_note: "SELF_FIXPOINT must not be applied to non-subjects, abstract concepts, or institutions as literal subjectivity unless explicitly scoped as structural or analytic self-binding."

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: "Drift patterns are structurally derived PMS risks, not diagnoses, person-types, moral verdicts, or clinical categories."
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: "Evaluative or power asymmetry becomes stabilized through attractor formation while recontextualization reinforces evaluation rather than balanced enactment."
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes structurally salient."
      - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
    case_reading: "AD_A>>E is only a risk. Moral luck can invite expanded evaluative awareness while concrete action remains under-specified, but no scene shows stabilized drift toward evaluation rather than balanced enactment."
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: "This is not a personality trait, diagnosis, person-label, clinical state, or moral judgment."
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: "Frequent recontextualization without sufficient integration leads to unstable trajectories and weak coherence of praxis, especially under asymmetrically loaded praxis conditions."
    generative_mechanism:
      - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: "AD_Sigma_low is only a risk. Moral luck can fragment integration between control, outcome, and responsibility, but this may also mark a genuine philosophical tension or PMS non-capture rather than a drift pattern."
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: "This pattern describes structural volatility in action forms, not a clinical state, diagnosis, or person-type."

