analysis_quality_control:
  claim_type:
    primary: "conceptual_projection"
    secondary: []
    not_claimed:
      - "metaphysical_proof"
      - "phenomenological_account"
      - "clinical_assessment"
      - "legal_or_forensic_judgment"
      - "person_ranking"
      - "pms_base_validation"
  case_type:
    value: "conceptual_domain_projection"
    concrete_scene: false
    implication: >
      This case type permits PMS-internal structural projection and
      discrimination tests. It does not permit empirical finding, concrete scene
      verdict, metaphysical proof, diagnosis, legal judgment, implementation
      claim, or PMS Base validation.
  coherence_risk:
    status: "high"
    reason: >
      Freedom is broad and maps smoothly onto many PMS operators. That
      smoothness risks over-assimilation, especially if rival theories,
      disagreement, absence, or non-fit are redescribed as PMS drift or failed
      integration.
    mitigation: >
      The reading is constrained by claim typing, weak marking of Λ and Α,
      under-specified Action_E, non-capture zones, rival readings, and falsifier
      conditions.
  coverage_vs_discrimination:
    coverage_result: >
      PMS covers differentiated alternatives, situated frames, directed impulse,
      reflective distance, temporality, asymmetry, responsibility, integration,
      and self-binding.
    discrimination_requirement: >
      PMS must distinguish freedom from arbitrariness, randomness, mere
      option-space, independence, autonomy, voluntariness, agency, coercion,
      constraint, determinism, indeterminism, necessity, responsibility, and
      metaphysical free will.
    discrimination_status: "partial"
  discrimination_tests:
    - id: "DT1"
      test: "Distinguish non-metaphysical freedom from option-space, randomness, and arbitrariness."
      expected_pms_distinction: >
        Option-space is primarily Δ + □. Randomness or arbitrariness lacks
        sufficient frame-sensitive integration. Non-metaphysical freedom
        requires directed, framed, temporally extended, distanced, and
        integrated praxis where enactment is in scope.
      current_status: "partially_satisfied"
    - id: "DT2"
      test: "Distinguish responsibility-bearing freedom from metaphysical free will, moral blame, and legal culpability."
      expected_pms_distinction: >
        Responsibility_R = Ψ + Φ + Θ + Ω is structural self-binding under
        asymmetry across time, not metaphysical free will or forensic liability.
      current_status: "partially_satisfied"
    - id: "DT3"
      test: "Distinguish reflective distance from avoidance, incapacity, passivity, or chronic delay."
      expected_pms_distinction: >
        Χ requires reflective withdrawal connected to Φ and Θ; it cannot
        substitute for Action_E or Σ.
      current_status: "partially_satisfied"
    - id: "DT4"
      test: "Distinguish constraint from coercion and asymmetry from wrongdoing."
      expected_pms_distinction: >
        Ω marks imbalance; coercion and wrongdoing require scene-specific
        evidence and cannot be inferred from asymmetry alone.
      current_status: "not_tested"
  calibration_points:
    - operator: "Δ"
      question: "What adjacent concepts are being distinguished from freedom?"
      current_calibration: "satisfied"
    - operator: "∇"
      question: "What kind of structural directedness, impulse, or reason-responsive orientation is active?"
      current_calibration: "partial"
    - operator: "□"
      question: "What frame makes freedom intelligible as situated praxis?"
      current_calibration: "satisfied"
    - operator: "Λ"
      question: "What expected occurrence, withheld impulse, absent option, or delayed action is structured?"
      current_calibration: "weak"
    - operator: "Α"
      question: "What recurrence, stabilization, habit, or path-dependence is shown?"
      current_calibration: "weak"
    - operator: "Ω"
      question: "What kind and direction of asymmetry shape action-space?"
      current_calibration: "partial"
    - operator: "Θ"
      question: "What temporal sequence, delay, commitment, or trajectory is essential?"
      current_calibration: "satisfied"
    - operator: "Φ"
      question: "What source frame and target frame are involved in recontextualization?"
      current_calibration: "partial"
    - operator: "Χ"
      question: "How is reflective distance maintained without avoidance or closure?"
      current_calibration: "satisfied"
    - operator: "Σ"
      question: "How does integration discriminate rather than smooth over tensions?"
      current_calibration: "partial"
    - operator: "Ψ"
      question: "Where is self-binding or commitment actually in scope?"
      current_calibration: "partial"
  possible_non_capture:
    status: "kept_open"
    zones:
      - "Metaphysical free will and the truth or falsity of determinism or indeterminism."
      - "Phenomenological experience of openness, deliberation, or felt agency."
      - "Political or legal theories of liberty requiring institutional criteria beyond PMS."
      - "Clinical, cognitive, or neuroscientific accounts of capacity and decision-making."
      - "Concrete coercion, consent, culpability, or responsibility judgments requiring evidence."
    rule: >
      These zones must not automatically be redescribed as PMS drift,
      calibration residue, incomplete integration, structured absence, or failed
      maturity.
  rival_reading_placeholder:
    status: "required_but_not_resolved"
    examples:
      - "negative liberty as non-interference"
      - "positive liberty as self-mastery"
      - "republican liberty as non-domination"
      - "capability-theoretic freedom as real opportunity"
      - "compatibilist reasons-responsiveness"
      - "libertarian metaphysical free will"
      - "hard-determinist denial of free will"
      - "phenomenological freedom as lived openness"
      - "decision-theoretic option-space formalization"
    rule: >
      Rival readings remain epistemically open. PMS translation does not defeat
      them unless comparison criteria are explicitly specified and applied.
  falsifier_conditions:
    - id: "F1"
      condition: >
        The PMS reading would weaken or fail if the case required metaphysical
        free will rather than non-metaphysical praxis structure.
    - id: "F2"
      condition: >
        The PMS reading would be under-discriminating if it could not separate
        freedom from randomness, arbitrariness, mere option-space,
        voluntariness, autonomy, coercion, responsibility, or metaphysical free
        will.
    - id: "F3"
      condition: >
        The PMS reading would become over-assimilative if rival theories,
        disagreement, rupture, resistance, absence, or non-fit were
        automatically redescribed as PMS drift, incomplete integration,
        incomplete calibration, or maturity failure.
    - id: "F4"
      condition: >
        The PMS reading would overextend if it inferred empirical agency,
        diagnosis, legal responsibility, implementation validity, moral ranking,
        or PMS Base validation from conceptual operator coherence.
    - id: "F5"
      condition: >
        Concrete application remains under-specified without a scene-specific
        actor, frame, alternatives, constraints, asymmetry, temporal sequence,
        and evidence of enactment.
  final_quality_status:
    result: "usable_with_limits"
    reason: >
      The analysis is usable as a reversible conceptual PMS projection. It is
      not a concrete scene analysis and remains limited by high coherence risk,
      weak Λ and Α calibration, under-specified Action_E, open non-capture, and
      unresolved rival formalizations.

