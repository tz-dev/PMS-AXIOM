schema_version: "PMS_1.3"
schema_role: "case_application"
analysis_mode: "axiomatic"
template_status: "pms_yaml_aligned_case_application_template"
template_purpose: >
  Filled PMS_1.3 case application for the case Freedom (non-metaphysical).
  PMS.yaml is the only PMS Base reference. This document applies PMS.yaml
  without revising PMS Base, extending the operator inventory, or treating the
  template or prior pre-analysis as PMS Base.

repository_reference:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  reference_file: "PMS.yaml"
  reference_status: "repository_reference"
  repository_role: "current_base_schema"
  reference_last_updated: "2026-04-06"
  base_schema_status: "repository_reference"
  compliance_note: >
    This case analysis applies PMS_1.3 as the current repository reference.
    It does not redefine PMS operators, alter dependency order, introduce new
    operators, treat derived structures as primitives, override guardrails, or
    claim PMS Base validation.
  referenced_base_sections:
    - "pms_entry_condition"
    - "schema_version"
    - "schema_meta"
    - "repository_governance"
    - "core_principles"
    - "pms_model_reference"
    - "derived_structures"
    - "example_operator_chains"
    - "computational_representation"
    - "ai_interface_pms"
  application_schema_note: >
    The template is used only as an application schema. PMS.yaml remains the
    sole PMS Base reference.

schema_meta_alignment:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  pms_status: "repository_reference"
  pms_maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    PMS_1.3 is treated as formally disciplined and portable, but not final,
    complete, uniquely ordered, or immune to revision.
  description_alignment: >
    The case is analyzed as structural, non-phenomenological,
    non-psychological, non-clinical, non-diagnostic, non-prescriptive, and
    non-metaphysical praxis grammar.
  intended_use_alignment:
    allowed_profiles:
      - "theoretical_reflection"
      - "structural_action_theory"
      - "anthropology_and_praxeology"
      - "systems_theory"
      - "ai_architecture_and_safety"
      - "model_documentation_and_specification"
      - "simulation_scaffolding"
      - "structural_reasoning"
    not_intended_for:
      - "clinical_diagnosis"
      - "personality_typing"
      - "mental_health_risk_assessment"
      - "automated_moral_judgement"
      - "individual_person_evaluation"
      - "forensic_decision_making"
      - "policy_enforcement"
      - "irreversible_labeling"
  normative_position_alignment:
    ontology: >
      The analysis makes no PMS-based claim about consciousness, qualia, inner
      experience, metaphysical essence, moral worth, or ontological dignity.
    dignity_clause: >
      Dignity-in-Practice is treated as a praxeological constraint on handling
      asymmetry, not as metaphysical or moral ranking.
    tragedy_clause: >
      PMS coherence, integration, responsibility, or maturity does not eliminate
      tragedy, rupture, unresolved tension, or non-capture.
    self_binding_clause: >
      The analysis itself remains subject to Distance (Χ), Self-Binding
      discipline (Ψ), and Dignity-in-Practice (D).
  computational_position_alignment:
    representation_clause: >
      YAML representation is formal encoding of a PMS reading, not implementation
      of praxis, freedom, agency, selfhood, subjectivity, consciousness, or
      empirical validity.
    calibration_clause: >
      Operational use would require architecture-specific calibration,
      constraints, testing where applicable, external evaluation, and public
      accountability.
    accountability_clause: >
      Formal PMS translation does not guarantee public intelligibility,
      intersubjective uptake, empirical adequacy, or explanatory sufficiency.
    rivalry_clause: >
      PMS rendering does not prove superiority over rival grammars or formalisms.
  terminology_alignment:
    praxis: >
      Situated meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation.
    meta_axiom: >
      One of the eleven PMS operators Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ.
    operator_composition: >
      Ordered or structured application of PMS operators to generate complex
      praxeological formations.
    derived_construct: >
      A higher-order construct systematically derived from operator
      compositions, not an independent primitive.
    asymmetry_drift_pattern: >
      A structurally derived distortion risk, not a diagnosis, person-type,
      clinical category, ontological attribution, or moral verdict.
    repository_reference: >
      PMS.yaml remains the base reference.
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.4 Thinking)"
      role: "formalization_assistant"

repository_governance_alignment:
  role_of_pms_yaml: >
    PMS.yaml is the current repository reference specification for PMS Base.
    This case analysis depends on PMS.yaml but does not revise it.
  this_template_may:
    - "depend_on_pms"
    - "reference_pms_operators"
    - "define_case_application_structure"
    - "organize_pms_operators_for_case_analysis"
    - "specify_case_quality_control"
    - "support_structural_reasoning"
  this_template_must_not:
    - "silently_redefine_meta_axioms"
    - "silently_alter_default_operator_order"
    - "silently_alter_default_dependency_path"
    - "present_new_meta_axioms_as_if_already_in_base_pms"
    - "treat_derived_axes_as_independent_primitives"
    - "override_application_guardrails_while_claiming_full_pms_conformity"
    - "claim_pms_base_validation_from_a_case"
  governance_status: "subordinate_application_schema"

pms_entry_condition:
  requirement: >
    PMS application presupposes distance (Χ), reversibility, and
    Dignity-in-Practice (D) as praxeological restraint. This condition governs
    PMS application, not critique, refusal, rejection, revision, or rival
    formalization.
  applies_to: "application_only"
  does_not_apply_to:
    - "critique"
    - "refusal"
    - "rejection"
    - "revision_proposals"
    - "rival_formalization"
  application_gate:
    status: "accepted_for_this_application"
    conditions:
      Distance_Chi:
        status: "maintained"
        meaning: >
          The analysis does not fuse PMS into verdict, enforcement, closure,
          metaphysical proof, diagnosis, legal judgment, implementation claim,
          or person-level attribution.
      reversibility:
        status: "maintained"
        meaning: >
          Structural readings remain revisable, bounded, non-final, and
          non-totalizing.
      Dignity_in_Practice_D:
        status: "maintained"
        meaning: >
          The analysis maintains restraint under asymmetry and does not shame,
          rank, humiliate, diagnose, or ontologically evaluate persons or
          groups.
    gate_result: "valid_as_pms_application"

application_discipline:
  self_binding_clause:
    status: "active"
    statement: >
      Any application of PMS is itself subject to PMS. Analyses that suspend
      Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in
      order to enforce truth, clarity, authority, resolution, or action are
      formally invalid as PMS applications.
    application_to_this_case: >
      The analysis remains self-bound by treating freedom as a conceptual
      praxeological structure, not as a verdict about persons, metaphysical
      free will, empirical fact, legal culpability, diagnosis, implementation,
      or PMS validity.
  application_only_boundary:
    status: "active"
    statement: >
      PMS may be criticized, revised, rejected, ignored, or compared with rival
      formalizations without satisfying the PMS entry condition. The entry
      condition governs only applications that claim to use PMS.
  non_capture_rule:
    status: "active"
    statement: >
      Translation into PMS terms does not prove exhaustive capture. Resistance,
      rupture, disagreement, non-fit, missing evidence, or rival framing must
      not automatically be redescribed as drift, failed integration, incomplete
      calibration, or structured absence.
  no_pms_base_revision:
    status: "active"
    statement: >
      This case does not alter PMS Base, PMS operators, PMS dependencies,
      derived structures, guardrails, or repository governance.

case:
  title: "Freedom (non-metaphysical)"
  interpretation_type: "conceptual_domain_projection"
  case_type: "philosophical_structural_praxeological_concept_case"
  claim_status: "conceptual_pms_projection"
  not_a_concrete_scene: true
  empirical_status: "not_empirical"
  result_status: "reversible_case_bound_projection"
  pms_internal_structural_derivation: false
  concrete_scene_analysis: false
  conceptual_domain_projection: true
  empirical_finding: false
  metaphysical_claim: false
  diagnostic_claim: false
  legal_forensic_claim: false
  implementation_claim: false
  pms_base_validation: false
  scope: >
    The case analyzes freedom in a non-metaphysical sense as a structural
    problem of praxis: differentiated alternatives under a frame, directedness
    under constraint, reflective distance from immediate impulse, temporally
    extended choice, action-space under asymmetry, and possible self-binding
    where responsibility or commitment is explicitly at issue. The analysis
    treats freedom neither as metaphysical independence nor as mere option
    quantity, but as a bounded praxeological configuration that must be
    discriminated from arbitrariness, randomness, voluntariness, autonomy,
    coercion, constraint, determinism, indeterminism, necessity, responsibility,
    and metaphysical free will.
  non_scope: >
    The analysis does not claim metaphysical free will, causal independence,
    empirical proof, phenomenological completeness, psychological capacity,
    diagnostic assessment, clinical judgment, legal or forensic criteria,
    implementation validity, person-ranking, moral superiority, policy
    enforceability, or PMS Base validation. It also does not claim that PMS
    exhausts freedom as a philosophical, political, legal, phenomenological, or
    empirical concept.
  non_goals:
    - "metaphysical_proof"
    - "diagnostic_assessment"
    - "legal_or_forensic_judgment"
    - "person_ranking"
    - "irreversible_labeling"
    - "pms_base_validation"
  case_typing_note: >
    This is not a concrete praxis scene. It is a conceptual domain projection
    about the structural grammar of non-metaphysical freedom. Its legitimate
    PMS task is discriminative: to show how freedom can be structurally
    separated from adjacent notions without collapsing all non-fit, resistance,
    disagreement, absence, or rival framing into PMS drift or incomplete
    integration. It can organize distinctions among freedom, arbitrariness,
    randomness, option-space, autonomy, voluntariness, coercion, constraint,
    responsibility, determinism, indeterminism, necessity, and metaphysical free
    will, but it cannot adjudicate an actual event, person, institution, duty,
    coercive relation, or responsibility claim without scene-specific evidence.

