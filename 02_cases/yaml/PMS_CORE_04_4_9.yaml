    - axiom: "Θ"
      order: 7
      depends_on:
        - "Ω"
        - "Α"
      provides:
        - "temporal_trajectories"
    - axiom: "Φ"
      order: 8
      depends_on:
        - "Θ"
        - "Ω"
        - "□"
      provides:
        - "reframing_and_adaptation"
    - axiom: "Χ"
      order: 9
      depends_on:
