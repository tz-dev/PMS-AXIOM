derived_structure_discipline:
  derived_not_primitive: true
  structures_considered:
    - "Awareness_A"
    - "Coherence_C"
    - "Responsibility_R"
    - "Action_E"
    - "Dignity_in_Practice_D"
    - "SELF_FIXPOINT"
    - "AD_A_much_greater_E"
    - "AD_under_integration"
  usage_rule: >
    Each derived structure is marked active, weak, application_constraint,
    possible_but_not_entailed, under_specified, or not_applicable. Consideration
    does not imply activation.
  rule: >
    Derived structures are formula-derived PMS constructs, not independent
    axioms, diagnoses, ontological rankings, metaphysical entities, or proof of
    PMS completeness.
  case_status: >
    Awareness_A, Coherence_C, Responsibility_R, and
    Dignity_in_Practice_D are active or constraining; Action_E is
    under-specified without enactment; SELF_FIXPOINT is secondary; drift
    patterns are possible risks but not entailed.

derived_axes_projection:
  Awareness_A:
    symbol: "A"
    formula:
      - "Θ"
      - "□"
      - "Δ"
    description: "Sustained, framed differentiation across time."
    generative_reasoning:
      - "Δ enables distinctions in the field."
      - "□ frames distinctions as situationally relevant."
      - "Θ maintains these framed distinctions over time."
    notes: >
      Awareness is modeled structurally, not phenomenologically.
    case_reading: >
      Freedom is differentiated from adjacent concepts within a
      non-metaphysical praxeological frame across temporal issues of
      commitment, delay, and responsibility.
    status: "active"
    calibration_points:
      - "Specify what is differentiated, in what frame, and across what temporal structure."
    non_capture_note: >
      Structural awareness is not phenomenological consciousness.
  Coherence_C:
    symbol: "C"
    formula:
      - "Θ"
      - "Λ"
      - "□"
      - "∇"
    description: "Temporally stabilized structuring of impulse and expectation within a frame."
    generative_reasoning:
      - "∇ introduces directional impulse."
      - "□ constrains and structures the impulse."
      - "Λ encodes expectations and meaningful non-events."
      - "Θ temporalizes the configuration into trajectories."
    notes: >
      Coherence captures narrative stability without requiring full integration
      or self-binding.
    case_reading: >
      Coherence appears where impulse is framed by reasons and constraints,
      where delayed or foregone action matters, and where freedom is stabilized
      against randomness or arbitrariness.
    status: "active"
    calibration_points:
      - "Distinguish coherence from truth, validity, forced integration, or PMS-internal smoothness."
    non_capture_note: >
      Coherence does not prove adequacy.
  Responsibility_R:
    symbol: "R"
    formula:
      - "Ψ"
      - "Φ"
      - "Θ"
      - "Ω"
    description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
    generative_reasoning:
      - "Ω creates structural imbalance in exposure, capacity, or obligation."
      - "Θ extends this imbalance into enduring commitments."
      - "Φ allows reinterpretation of obligations under changing conditions."
      - "Ψ binds the agent to these obligations as part of its self-relation."
    notes: >
      Responsibility is structural rather than moralistic in this PMS
      specification.
    case_reading: >
      Responsibility_R is active because the case concerns responsibility
      without metaphysical free will, temporal commitment, asymmetry, and
      self-binding under conditions.
    status: "active"
    calibration_points:
      - "Identify Ω, Θ, Φ, and Ψ before claiming Responsibility_R."
    non_capture_note: >
      Responsibility_R is not moral blame, diagnosis, or legal liability.
  Action_E:
    symbol: "E"
    formula:
      - "Σ"
      - "Θ"
      - "∇"
    description: "Integrated realization of directedness across time."
    generative_reasoning:
      - "∇ provides energetic directedness."
      - "Θ structures directedness as trajectory rather than momentary reaction."
      - "Σ integrates conflicting impulses, constraints, and roles into enactment."
    notes: >
      Action here is integrated and temporally extended; it is not any behavior.
    case_reading: >
      Action_E is necessary to avoid reducing freedom to mere option-space, but
      no concrete enactment is provided. It therefore remains under-specified.
    status: "under_specified"
    calibration_points:
      - "Distinguish action from mere behavior, thought, claim, abstract possibility, random movement, or arbitrary selection."
    non_capture_note: >
      Without a concrete scene, Action_E remains under-specified.
  Dignity_in_Practice_D:
    symbol: "D"
    formula:
      - "Ψ"
      - "Χ"
      - "Ω"
    description: "Self-bound reflective restraint and protection in asymmetrical relations."
    generative_reasoning:
      - "Ω foregrounds vulnerability and directional power."
      - "Χ introduces reflective distance and inhibition of destructive impulses."
      - "Ψ binds the agent to norms that protect standing under asymmetry."
    notes: >
      Dignity-in-Practice concerns how asymmetry is handled, not the ranking of
      persons or ontological worth.
    case_reading: >
      Dignity-in-Practice constrains the analysis by requiring restraint under
      asymmetry and prohibiting ranking, diagnosis, shaming, humiliation, or
      ontological evaluation.
    status: "application_constraint"
    calibration_points:
      - "Handle asymmetry without ranking, shaming, humiliation, diagnosis, or irreversible labeling."
    non_capture_note: >
      D is a praxeological application constraint, not ontological or moral
      superiority.

self_model_analysis:
  id: "SELF_FIXPOINT"
  priority_in_this_case: "secondary"
  formula_sequence:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  description: >
    Formal representation of self-binding as integrated, reflexively modulated,
    temporally extended, asymmetry-aware praxis bound into a relatively stable
    self-relation.
  case_reading: >
    SELF_FIXPOINT is relevant where freedom is responsibility-bearing or
    commitment-bearing. It is not a metaphysical account of subjectivity and is
    not required for every minimal option or voluntary act.
  implications:
    - "Within PMS, selfhood can be modeled as structured praxis rather than its origin."
    - "Identity is represented as relatively stable self-binding to integrated trajectories."
    - "No phenomenological or metaphysical claims about subjectivity are implied."
  interpretation_note: >
    This sequence records one PMS derivational strategy and must not be read as
    exhaustive of all selfhood, agency, identity, or freedom.
  non_capture_note: >
    SELF_FIXPOINT must not be applied as literal subjectivity unless explicitly
    scoped as structural self-binding.

asymmetry_drift_patterns:
  status_in_this_case: "possible_but_not_entailed"
  general_note: >
    PMS drift patterns are conditional structural risks, not diagnoses,
    person-types, moral verdicts, or clinical categories.
  AD_A_much_greater_E:
    code: "AD_A>>E"
    name: "Excessive Distance between Awareness and Enactment"
    applicability: "possible_but_not_entailed"
    structural_basis:
      formula:
        - "Φ"
        - "Α"
        - "Ω"
      description: >
        Evaluative or power asymmetry becomes stabilized through attractor
        formation while recontextualization reinforces evaluative drift rather
        than balanced enactment.
    generative_mechanism:
      - "Ω: evaluative or positional asymmetry becomes salient."
      - "Α: asymmetry stabilizes into recurrent evaluative patterning."
      - "Φ: recontextualization reinforces evaluation instead of integration."
    case_reading: >
      This is only a watch-risk. The concept of freedom could over-expand
      awareness, reflection, or reasons-talk while under-specifying enactment,
      but no chronic delay, suppressed action, or concrete evaluative attractor
      is evidenced.
    axis_effects:
      awareness_axis: "under_specified"
      action_axis: "under_specified"
    guardrail: >
      This is not a personality trait, diagnosis, person-label, clinical state,
      or moral judgment.
  AD_under_integration:
    code: "AD_Sigma_low"
    name: "Fragmented integration"
    applicability: "possible_but_not_entailed"
    structural_basis:
      primary_tension:
        - "Φ"
        - "Σ"
      condition: "recontextualization_outpaces_integration"
      description: >
        Frequent recontextualization without sufficient integration leads to
        unstable trajectories and weak coherence of praxis.
    generative_mechanism:
      - "Φ: frames shift in ways that may destabilize continuity."
      - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
    case_reading: >
      This is only a watch-risk. Multiple rival frames of freedom do not by
      themselves prove fragmented integration, volatility, immaturity, or
      maturity failure.
    axis_effects:
      coherence_axis: "under_specified"
      responsibility_axis: "under_specified"
    guardrail: >
      This pattern describes structural volatility in action forms, not a
      clinical state, diagnosis, or person-type.

example_operator_chains_application:
  note: >
    These chains apply PMS example operator chains to the case. They are not the
    only possible pathways and do not settle the case by themselves.
  minimal_praxis:
    formula:
      - "□"
      - "∇"
      - "Δ"
    description: "A frame constrains an impulse that arises from a difference."
    case_reading: >
      Minimal praxis appears where differentiated alternatives generate
      directedness within a frame of relevance, reasons, constraint, coercion,
      or commitment.
    status: "active"
  pattern_formation:
    formula:
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Attractor formation via repeated framed impulses and non-events."
    case_reading: >
      Pattern formation is weak because no repeated sequence is provided; it is
      relevant only for possible stabilized constraints, habits, or commitments.
    status: "weak"
  asymmetry_emergence:
    formula:
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Asymmetrical roles emerging from stabilized patterns."
    case_reading: >
      Asymmetry emergence is active conceptually where unequal power, exposure,
      capacity, obligation, or responsibility shapes action-space.
    status: "active"
  developmental_trajectory:
    formula:
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Temporal extension of asymmetric patterns into trajectories."
    case_reading: >
      Developmental trajectory is active because commitment, inhibition,
      consequence, and responsibility require diachronic reading.
    status: "active"
  reflexive_praxis:
    formula:
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."
    case_reading: >
      Reflexive praxis is active for frame-sensitive choice, reflective distance
      from impulse, and integration of reasons, constraints, alternatives, and
      action.
    status: "active"
  self_binding_chain:
    formula:
      - "Ψ"
      - "Σ"
      - "Χ"
      - "Φ"
      - "Θ"
      - "Ω"
      - "Α"
      - "Λ"
      - "□"
      - "∇"
      - "Δ"
    description: "Default repository chain for self-binding as structured self-relation."
    case_reading: >
      The self-binding chain is secondary: it models responsibility-bearing or
      commitment-bearing freedom without metaphysical subjectivity.
    status: "secondary"

computational_representation:
  file_role: "case_application_representation"
  representation_scope: >
    This YAML encodes a PMS-based case analysis in machine-readable form. It
    does not implement praxis, agency, consciousness, selfhood, morality,
    diagnosis, legal judgment, or empirical validation.
  supports:
    - "machine_readable_loading"
    - "dependency_reasoning"
    - "operator_chain_validation"
    - "simulation_scaffolding"
    - "structural_analysis"
    - "agent_architecture_modeling"
    - "export_to_json_xml_graphviz"
    - "meta_theoretical_inspection"
  does_not_guarantee:
    - "direct_implementation_of_praxis"
    - "interoperability_across_architectures"
    - "explanatory_sufficiency"
    - "empirical_adequacy_without_testing"
