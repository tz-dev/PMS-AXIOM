operator_analysis:
  "Δ":
    id: "Δ"
    name: "Difference"
    order: 1
    definition: "Minimal structural distinction enabling differentiation."
    depends_on: []
    provides:
      - "boundary_formation"
      - "object_differentiation"
      - "structural_contrast"
    examples:
      - "self vs. other"
      - "inside vs. outside a role"
      - "allowed vs. forbidden action"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Difference is major because the case requires distinctions between
      freedom and unfreedom, arbitrariness, randomness, mere option-space,
      independence, autonomy, voluntariness, agency, coercion, constraint,
      determinism, indeterminism, necessity, responsibility, and metaphysical
      free will.
    dependency_status: "root_operator_available"
    analytic_weight: "major"
    calibration_points:
      - "Specify exactly which adjacent concept is being distinguished from freedom."
      - "Prevent conceptual distinctions from collapsing into one PMS-friendly continuum."
    falsifier_conditions:
      - "If stable distinctions among freedom and adjacent concepts cannot be made, PMS loses its entry point."
    non_capture_note: >
      Difference does not by itself prove PMS capture of freedom.
  "∇":
    id: "∇"
    name: "Impulse"
    order: 2
    definition: "Directional tension or drive arising from difference."
    depends_on:
      - "Δ"
    provides:
      - "activation"
      - "orientation"
      - "energetic_gradient"
      - "proto_agency"
    examples:
      - "desire triggered by perceived lack"
      - "urge to correct an imbalance"
      - "movement toward or away from a signal"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Impulse is active as structural directedness: immediate urge,
      motivation, pressure toward action, responsiveness to reasons, and the
      contrast between agency and mere option availability.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Specify whether directedness is impulse, reason-responsive orientation, voluntary tendency, or action pressure."
      - "Do not infer subjective desire, mental state, or diagnosis from structural directedness."
    falsifier_conditions:
      - "If no directedness or action pressure arises from Δ, ∇ is under-specified."
    non_capture_note: >
      Impulse is structural directedness, not psychological diagnosis.
  "□":
    id: "□"
    name: "Frame"
    order: 3
    definition: "Contextual structure that constrains and shapes impulses."
    depends_on:
      - "Δ"
      - "∇"
    provides:
      - "context"
      - "boundary_conditions"
      - "relevance_structuring"
      - "role_space"
    examples:
      - "institutional rules"
      - "family role expectations"
      - "conversation context"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Frame is major because freedom is situated and constrained. Relevant
      frames include action-space, reasons, coercion/constraint contexts,
      social asymmetry, temporal commitment, and rival theories of freedom.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name the active frame: non-metaphysical structural-praxeological freedom under situated constraints."
      - "Mark frame shifts among autonomy, voluntariness, coercion, responsibility, option-space, determinism, and rival theories."
    falsifier_conditions:
      - "If no frame of situated agency, constraint, reasons, temporality, or asymmetry is specified, the analysis is too abstract to discriminate."
    non_capture_note: >
      A frame can clarify freedom without exhausting it.
  "Λ":
    id: "Λ"
    name: "Non-Event"
    order: 4
    definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
    depends_on:
      - "□"
    provides:
      - "expectation"
      - "counterfactual_structure"
      - "tension_through_absence"
    examples:
      - "a promised reply that never arrives"
      - "silence where a response is expected"
      - "postponed decision that reshapes the situation"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Λ is weak but relevant for foregone alternatives, inhibited impulse,
      withheld action, delayed choice, expected but suspended response, or an
      absent option within a frame. No concrete expected occurrence is provided.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Specify the expected occurrence, withheld impulse, absent option, or delayed action and the frame in which it matters."
      - "Preserve absence as possible non-capture or missing evidence rather than automatic drift."
    falsifier_conditions:
      - "If no structured expectation, withholding, delay, absence, or foregone alternative exists, Λ should remain weak or absent."
    non_capture_note: >
      Absence must not be automatically translated into incomplete integration.
  "Α":
    id: "Α"
    name: "Attractor"
    order: 5
    definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
    depends_on:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
    provides:
      - "pattern_formation"
      - "stability"
      - "path_dependence"
      - "role_script_emergence"
    examples:
      - "repeated avoidance of conflict"
      - "reliable punctuality"
      - "stable institutional routine"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Α is weak-to-active conceptually for stabilized constraints, habits,
      commitments, role patterns, or repeated action-space limitation. No
      observed recurrence is supplied.
    dependency_status: "weak"
    analytic_weight: "moderate"
    calibration_points:
      - "Show recurrence or stabilization before treating attractor patterns as established."
      - "Distinguish conceptual patterning from observed repeated praxis."
    falsifier_conditions:
      - "If recurrence or stabilization is not shown, Α is over-read."
    non_capture_note: >
      Pattern formation is not proof of explanatory sufficiency.
  "Ω":
    id: "Ω"
    name: "Asymmetry"
    order: 6
    definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
    depends_on:
      - "Α"
    provides:
      - "role_differentiation"
      - "responsibility_gradients"
      - "vulnerability_structures"
    examples:
      - "parent-child relation"
      - "mentor-apprentice dynamics"
      - "leader-follower position"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ω is central at the conceptual level because the case explicitly includes
      freedom under asymmetry, unequal capacity, coercion, obligation, exposure,
      dependence, vulnerability, and responsibility gradients. However, because
      no concrete recurrence or stabilized pattern is supplied, Ω is supported
      by the case material as an explicit conceptual concern while its formal
      PMS dependency through Α remains weak or conceptual rather than
      scene-evidenced.
    dependency_status: "case_explicit_with_Α_dependency_weak"
    analytic_weight: "major"
    calibration_points:
      - "Specify the kind and direction of asymmetry: power, exposure, capacity, obligation, vulnerability, dependency, coercive pressure, or responsibility gradient."
      - "Distinguish asymmetry from domination, coercion, blame, guilt, immaturity, pathology, or moral failure."
      - "Do not moralize asymmetry or infer domination, blame, or maturity failure by default."
      - "Keep Ω structural, bounded, non-diagnostic, and non-tribunal."
    falsifier_conditions:
      - "If no directional imbalance is identifiable, Ω claims must be removed or marked weak."
      - "If asymmetry is treated as automatic wrongdoing, diagnosis, domination, or person-ranking, the PMS reading overclaims Ω."
    non_capture_note: >
      Asymmetry is structural, not a moral verdict. PMS can mark an imbalance
      without deciding whether the imbalance is illegitimate, coercive,
      culpable, clinically relevant, or legally actionable.
  "Θ":
    id: "Θ"
    name: "Temporality"
    order: 7
    definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
    depends_on:
      - "Ω"
      - "Α"
    provides:
      - "sequence_and_trajectory"
      - "persistence"
      - "anticipation_and_delay"
      - "developmental_arcs"
    examples:
      - "long-term responsibility"
      - "accumulating consequences"
      - "ongoing development of a role"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Θ is central because the case includes temporal commitment, inhibition of
      impulse, delay, trajectory, responsibility across time, and self-binding.
      The case strongly warrants temporality as a conceptual axis, but without
      a concrete sequence, history, promise, omission, recurrence, or enacted
      trajectory, Θ remains a structural requirement for the concept rather than
      an empirically evidenced case finding.
    dependency_status: "case_explicit_with_Ω_active_and_Α_dependency_weak"
    analytic_weight: "major"
    calibration_points:
      - "Distinguish momentary option-space from diachronic freedom involving delay, commitment, consequence, and trajectory."
      - "Check whether temporality is essential; here it is essential for responsibility, inhibition, commitment, and self-binding."
      - "Do not infer actual persistence, character stability, legal accountability, or autobiographical coherence without scene-specific temporal evidence."
    falsifier_conditions:
      - "If freedom is limited to a static instantaneous option relation, strong Θ is overextended."
      - "If no temporal sequence, delay, expectation, commitment, trajectory, or consequence is relevant, Θ should be reduced to weak or not applicable."
    non_capture_note: >
      Temporality does not settle metaphysical or empirical continuity. PMS can
      mark diachronic structure without proving identity persistence,
      phenomenological continuity, legal accountability, or causal freedom.
  "Φ":
    id: "Φ"
    name: "Recontextualization"
    order: 8
    definition: "Transformation through placing an existing structure into a new frame."
    depends_on:
      - "Θ"
      - "Ω"
      - "□"
    provides:
      - "adaptation"
      - "reinterpretation"
      - "developmental_change"
      - "pattern_shift"
    examples:
      - "reframing conflict as misunderstanding"
      - "seeing a failure as a learning step"
      - "renegotiating role expectations"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Φ is central because freedom changes meaning across frames: metaphysical
      free will, option-space, voluntariness, autonomy, coercion,
      responsibility, determinism, indeterminism, and non-metaphysical praxis.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Name source frames and target frame: from metaphysical or option-space readings toward non-metaphysical praxis."
      - "Check whether recontextualization clarifies rather than absorbs non-fit or rival theories."
    falsifier_conditions:
      - "If every rupture, rival theory, resistance, or disagreement is absorbed as Φ, the reading is over-assimilative."
    non_capture_note: >
      Recontextualization must preserve possible non-capture.
  "Χ":
    id: "Χ"
    name: "Distance"
    order: 9
    definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
    depends_on:
      - "Φ"
      - "Θ"
      - "□"
    provides:
      - "regulation"
      - "inhibition"
      - "reflection_and_meta_position"
    examples:
      - "pausing before reacting"
      - "stepping out of a role to reflect"
      - "deliberately suspending a habitual script"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Χ is central for reflective distance, inhibition of immediate impulse,
      non-reactivity, responsiveness to reasons, and analytic restraint against
      forced verdicts.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Maintain analytic distance from metaphysical verdicts, legal conclusions, diagnosis, ranking, and PMS Base validation."
      - "Distinguish reflective distance from avoidance, incapacity, passivity, or empty neutrality."
    falsifier_conditions:
      - "If PMS is used to force closure, verdict, ranking, or authority, Χ is suspended and the application fails."
    non_capture_note: >
      Distance protects against overclaiming and premature closure.
  "Σ":
    id: "Σ"
    name: "Integration"
    order: 10
    definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
    depends_on:
      - "Χ"
      - "Φ"
    provides:
      - "coherence"
      - "resolution_of_contradiction"
      - "multi_level_coordination"
      - "maturity_of_praxis"
    examples:
      - "aligning motives and roles"
      - "integrating emotional impulse and norm"
      - "forming a coherent action plan"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Σ is central because freedom must be distinguished from randomness,
      arbitrariness, fragmentation, mere option plurality, uncoordinated
      impulse, or forced conformity.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Test whether integration discriminates freedom from randomness, arbitrariness, coercion, and uncoordinated impulse."
      - "Distinguish integration from forced coherence or PMS-internal smoothness."
    falsifier_conditions:
      - "If coherence is treated as proof of adequacy, Σ is overclaimed."
    non_capture_note: >
      PMS coherence is insufficient by itself.
  "Ψ":
    id: "Ψ"
    name: "Self-Binding"
    order: 11
    definition: "Formation of self-relation through commitment to integrated structures across time."
    depends_on:
      - "Σ"
      - "Θ"
      - "Χ"
    provides:
      - "self_model"
      - "responsibility_as_self_commitment"
      - "stable_normativity"
      - "autobiographical_coherence"
    examples:
      - "holding oneself accountable"
      - "owning a caregiving role"
      - "long-term identity commitments and promises"
    status_within_pms: "treated_as_structurally_basic"
    role_in_case: >
      Ψ is central only where freedom involves responsibility, temporal
      commitment, stable normativity, autonomy-like self-relation, or
      self-binding. It is not required for every minimal option or voluntary
      act.
    dependency_status: "satisfied"
    analytic_weight: "major"
    calibration_points:
      - "Apply Ψ only where responsibility, temporal commitment, stable normativity, or self-binding is in scope."
      - "Do not convert Ψ into metaphysical selfhood, moral superiority, literal subjectivity, or universal freedom condition."
    falsifier_conditions:
      - "If Ψ is used without Σ, Θ, Χ, or without commitment/responsibility in scope, the self-binding reading is under-specified."
    non_capture_note: >
      SELF_FIXPOINT is a derived PMS structure, not metaphysical proof of
      subjectivity.

operator_layer_mapping:
  L1:
    id: "L1"
    name: "Early structural patterning"
    contains:
      - "Δ"
      - "∇"
      - "□"
      - "Λ"
      - "Α"
    base_description: >
      Base layer of structural operations that create distinctions, impulses,
      frames, non-events, and recurrent patterns.
    case_function: >
      L1 differentiates freedom from adjacent concepts, situates directed agency
      in frames, and weakly tracks withheld options or stabilized constraints.
  L2:
    id: "L2"
    name: "Relational asymmetry and temporality"
    contains:
      - "Ω"
      - "Θ"
    base_description: >
      Layer in which patterns become asymmetric relations and temporal
      trajectories.
    case_function: >
      L2 is central because the case concerns freedom under asymmetry and
      temporal commitment.
  L3:
    id: "L3"
    name: "Meta-structural reflexivity"
    contains:
      - "Φ"
      - "Χ"
      - "Σ"
    base_description: >
      Layer of transformation, distancing, and integration.
    case_function: >
      L3 is central for frame-sensitive choice, reflective distance from
      impulse, and integration that distinguishes freedom from arbitrariness.
  L4:
    id: "L4"
    name: "Higher-order self-binding"
    contains:
      - "Ψ"
    base_description: >
      Layer in which integrated structures are bound into relatively stable
      self-relation.
    case_function: >
      Ψ is active only where responsibility, commitment, or self-binding is in
      scope.

dependency_logic:
  status: "dependency_respecting"
  forward_dependency_order:
    - "Δ"
    - "∇"
    - "□"
    - "Λ"
    - "Α"
    - "Ω"
    - "Θ"
    - "Φ"
    - "Χ"
    - "Σ"
    - "Ψ"
  compositional_reading_used:
    - "Ψ"
    - "Σ"
    - "Χ"
    - "Φ"
    - "Θ"
    - "Ω"
    - "Α"
    - "Λ"
    - "□"
    - "∇"
    - "Δ"
  chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  validation:
    - operator: "Δ"
      dependency_check: "root"
      satisfied_by: "The case begins from explicit distinctions among freedom and adjacent concepts."
    - operator: "∇"
      dependency_check: "depends_on_Δ"
      satisfied_by: "The distinctions generate directed concerns: impulse, choice, reasons, inhibition, agency, and action."
    - operator: "□"
      dependency_check: "depends_on_Δ_and_∇"
      satisfied_by: "Freedom is framed as situated, constrained, non-metaphysical, and praxeological."
    - operator: "Λ"
      dependency_check: "depends_on_□"
      satisfied_by: "Weakly satisfied by withheld impulse, foregone alternatives, delayed action, and absent metaphysical or scene warrant."
    - operator: "Α"
      dependency_check: "depends_on_Δ_∇_□_Λ"
      satisfied_by: "Weakly satisfied by possible stabilized constraints, habits, commitments, and action-space patterns."
    - operator: "Ω"
      dependency_check: "depends_on_Α"
      satisfied_by: "Case material explicitly foregrounds asymmetry; formal PMS dependency support through Α remains conceptual or weak because no concrete recurrence or stabilized pattern is supplied."
    - operator: "Θ"
      dependency_check: "depends_on_Ω_and_Α"
      satisfied_by: "Case material explicitly foregrounds temporality; Ω is active, while formal support through Α remains conceptual or weak because no concrete recurrence or stabilized pattern is supplied."
    - operator: "Φ"
      dependency_check: "depends_on_Θ_Ω_□"
      satisfied_by: "Satisfied by recontextualizing freedom from metaphysical free will or option-space to structural praxis."
    - operator: "Χ"
      dependency_check: "depends_on_Φ_Θ_□"
      satisfied_by: "Satisfied by reflective distance, inhibition of impulse, and restraint against tribunal closure."
    - operator: "Σ"
      dependency_check: "depends_on_Χ_and_Φ"
      satisfied_by: "Satisfied as discrimination between integrated freedom and random, arbitrary, coerced, or fragmented action."
    - operator: "Ψ"
      dependency_check: "depends_on_Σ_Θ_Χ"
      satisfied_by: "Satisfied conditionally where responsibility, commitment, stable normativity, and self-binding are in scope."
  dependency_failure_conditions:
    - "If a later operator is used while dependencies are absent, mark the reading under-specified or invalid."
    - "If the chain becomes smooth totalization without discrimination tests, mark coherence risk high."
    - "If an operator is not active, state so rather than forcing the full chain."

