    - axiom: "Λ"
      order: 4
      depends_on:
        - "□"
      provides:
        - "meaningful_absence_and_expectation"
    - axiom: "Α"
      order: 5
      depends_on:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
      provides:
        - "recurrent_patterns"
    - axiom: "Ω"
      order: 6
      depends_on:
        - "Α"
      provides:
