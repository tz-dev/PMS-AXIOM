      irreversible labeling.

limits:
  - >
    The PMS reading is a conceptual projection of non-metaphysical freedom, not
    a concrete praxis scene analysis.
  - >
    The analysis does not establish empirical, metaphysical, phenomenological,
    diagnostic, clinical, legal, forensic, implementation, moral-ranking, or PMS
    Base validation status.
  - >
    Rival readings remain open and may discriminate some dimensions of freedom
    better than PMS, especially metaphysical, political, legal,
    phenomenological, empirical, or decision-theoretic accounts.
  - >
    Because freedom maps smoothly onto many PMS operators, coherence risk is
    high; PMS coherence must not be treated as sufficient evidence of capture or
    superiority.
  - >
    Λ and Α are weak or calibration-dependent, and Action_E is under-specified
    without a concrete scene of enactment.

case_synthesis:
  primary_pms_reading: >
    Non-metaphysical freedom can be projected in PMS as differentiated
    alternatives and directed agency within a frame, temporally extended and
    asymmetry-sensitive, mediated by recontextualization and reflective
    distance, integrated into action where enactment is present, and self-bound
    where responsibility or commitment is in scope. The PMS reading is strongest
    where freedom is not treated as pure metaphysical spontaneity, pure
    independence, random selection, or mere option quantity, but as situated
    praxis under constraints that still leaves room for differentiated,
    reason-responsive, temporally structured, and potentially accountable
    action.
  continuity_condition: >
    Continuity is supplied only where Θ and, where relevant, Ψ maintain
    commitments, reasons, obligations, or self-binding across time. In this
    case, continuity is conceptually required for responsibility-bearing
    freedom, but it is not empirically shown because no concrete sequence,
    promise, role-history, omission, recurrence, or enacted trajectory is
    provided.
  change_condition: >
    Change is supplied by Φ when freedom is recontextualized from metaphysical
    free will, mere option-space, pure voluntariness, or independence into
    structural praxis, or when action-space is reframed under constraint,
    asymmetry, temporality, and responsibility. This recontextualization must
    remain reversible and must not absorb rival theories merely because they do
    not fit PMS vocabulary.
  rupture_or_non_fit_condition: >
    Rupture, resistance, disagreement, absence, missing evidence, or rival
    framing is preserved as possible non-capture or rival formalization and is
    not automatically translated into drift, failed integration, incomplete
    calibration, recontextualization residue, or maturity failure. A rival
    account may be genuinely external to PMS, more discriminating for a given
    purpose, or focused on a dimension PMS does not claim to capture.
  responsibility_condition: >
    Responsibility is relevant only as Responsibility_R = Ψ + Φ + Θ + Ω:
    structural self-binding toward asymmetry across time under
    recontextualizable conditions, not metaphysical free will, moral blame,
    legal culpability, clinical capacity, or forensic liability. In the present
    case this remains a conceptual responsibility structure, not an adjudicated
    responsibility finding.
  dignity_condition: >
    Dignity-in-Practice constrains the analysis by requiring self-bound
    reflective restraint under asymmetry and by prohibiting ontological ranking,
    shaming, diagnosis, humiliation, tribunal use, or person-comparison.
    Dignity-in-Practice functions here as application discipline, not as a
    claim that PMS confers, measures, proves, or grades dignity.
  rival_reading_condition: >
    Rival formalizations remain open unless explicit comparative criteria are
    specified and applied. PMS translation alone does not defeat negative
    liberty, positive liberty, republican non-domination, capability theory,
    compatibilist reasons-responsiveness, libertarian metaphysical free will,
    hard-determinist denial, phenomenological openness, legal voluntariness, or
    decision-theoretic option-space readings.

final_structural_formula:
  primary_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
  primary_formula_status: "primary_case_model_with_case_bound_calibration"
  compressed_reading: >
    Within PMS, non-metaphysical freedom is a reversible structural projection
    of differentiated, directed, framed, temporally extended,
    asymmetry-sensitive, reflectively distanced, recontextualizable, integrable
    praxis. Λ and Α remain weak where no concrete expectation, omission,
    recurrence, or stabilized pattern is shown. Ω and Θ are conceptually
    central because the case explicitly foregrounds asymmetry and temporality,
    but their full scene-level dependency support is not established without
    concrete praxis evidence. Ψ is active only where responsibility,
    commitment, or self-binding is in scope.
  final_validity_status: "valid_with_limits"
  final_claim_boundary: >
    This formula states a PMS-internal structural projection of the case. It
    does not establish empirical truth, metaphysical truth, phenomenological
    completeness, diagnostic validity, clinical validity, legal or forensic
    validity, implementation validity, moral ranking, person-ranking, or PMS
    Base validation. Its validity is case-type-bound: it is adequate as a
    compact conceptual PMS projection, not as a final theory of freedom or as a
    verdict on any concrete agent, event, institution, or responsibility claim.