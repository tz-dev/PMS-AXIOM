  case_specific:
    non_psychological: >
      Freedom is analyzed as a structure of praxis, not as a psychological
      essence, personality trait, mental state, or clinical capacity claim.
    non_metaphysical: >
      The case explicitly concerns non-metaphysical freedom; the analysis does
      not claim metaphysical free will, subjectivity, consciousness, or ultimate
      causal independence.
    non_diagnostic: >
      No diagnosis, maturity ranking, pathology inference, competence judgment,
      or therapeutic assessment is made.
    non_legal_forensic: >
      Responsibility_R is structural and does not establish guilt, liability,
      consent, culpability, capacity, coercion, or legal responsibility.
    non_implementation_claim: >
      The YAML case representation does not implement freedom, agency,
      selfhood, decision-making, or an AI architecture.
    non_moral_ranking: >
      No person, group, theory, or agent is ranked as more dignified, mature,
      free, or morally superior by virtue of the PMS projection.
    non_exhaustive_capture: >
      Metaphysical, phenomenological, political, legal, empirical, and rival
