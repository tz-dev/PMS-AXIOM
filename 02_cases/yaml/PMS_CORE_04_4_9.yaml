core_principle_alignment:
  P1_praxeological_focus:
    id: "P1"
    title: "Praxeological focus"
    base_text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
    status: "satisfied"
    case_application: >
      Freedom is treated as praxis-structure: distinction, frame, impulse,
      distance, temporality, asymmetry, integration, and possible self-binding,
      not person essence, psychology, or ontology.
    failure_condition: >
      The analysis would fail P1 if it generated global person-labels,
      psychological essence claims, or ontological person rankings.
  P2_proposed_operator_minimality:
    id: "P2"
    title: "Proposed operator minimality"
    base_text: >
      The eleven meta-axioms Δ–Ψ are the proposed PMS basis; completeness,
      optimal minimality, and unique order remain open.
    status: "satisfied"
    case_application: >
      Only Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, and Ψ are used as PMS operators.
      Freedom, autonomy, coercion, responsibility, and option-space remain case
      concepts, not new PMS primitives.
    failure_condition: >
      The analysis would fail P2 if it introduced new PMS operators, axes,
      primitives, or layers as if they belonged to PMS Base.
  P3_generativity:
    id: "P3"
    title: "Generativity"
    base_text: >
      PMS derived structures are generated from operator compositions, not
      introduced as independent primitives.
    status: "satisfied"
    case_application: >
      Awareness_A, Coherence_C, Responsibility_R, Action_E,
      Dignity_in_Practice_D, SELF_FIXPOINT, and drift patterns are used only as
      formula-derived structures.
    failure_condition: >
      The analysis would fail P3 if derived structures were treated as
      independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: "P4"
    title: "Temporal and asymmetry awareness"
    base_text: >
      Ω and Θ are central structural operators. Responsibility, maturity, and
      Dignity-in-Practice are analyzed under temporal and asymmetrical
      conditions.
    status: "satisfied"
    case_application: >
      Θ is central because the case includes temporal commitment, inhibition,
      trajectory, delayed action, and responsibility across time. Ω is central
      because the case explicitly includes freedom under asymmetry, coercion,
      constraint, capacity, obligation, exposure, and responsibility gradients.
    failure_condition: >
      The analysis would fail P4 if it ignored relevant asymmetry or temporality
      or imported them without calibration.
  P5_computational_boundedness:
    id: "P5"
    title: "Computational boundedness"
    base_text: >
      PMS representation does not imply implementation, guaranteed
      interoperability, or explanatory adequacy. Operational use requires
      calibration, constraints, and evaluation.
    status: "satisfied"
    case_application: >
      This YAML representation is not an implementation of freedom, agency,
      selfhood, responsibility, consciousness, empirical adequacy, or legal
      validity.
    failure_condition: >
      The analysis would fail P5 if it treated YAML form as implemented praxis,
      empirical adequacy, or computational sufficiency.
  P6_rival_openness:
    id: "P6"
    title: "Rival openness"
    base_text: >
      PMS is open to comparison with alternative grammars, sharper
      discriminative models, and empirically grounded formalisms.
    status: "satisfied"
    case_application: >
      Rival readings remain open: negative liberty, positive liberty,
      republican non-domination, capability theory, compatibilist
      reasons-responsiveness, libertarian metaphysical free will, hard
      determinism, phenomenological freedom, and decision-theoretic
      option-space.
    failure_condition: >
      The analysis would fail P6 if PMS translation were treated as defeating
      rival formalizations by default.
  P7_non_capture_openness:
    id: "P7"
    title: "Non-capture openness"
    base_text: >
      Translation into PMS terms does not prove exhaustive capture.
    status: "satisfied"
    case_application: >
      Metaphysical, phenomenological, political, legal, empirical, clinical,
      and rival-theoretical dimensions may remain outside PMS capture.
    failure_condition: >
      The analysis would fail P7 if all non-fit were absorbed as drift,
      incomplete integration, or calibration failure.
  P8_non_diagnostic_use:
    id: "P8"
    title: "Non-diagnostic use"
    base_text: >
      PMS is not a diagnostic tool and must not be used for clinical,
      therapeutic, forensic, or person-ranking decisions.
    status: "satisfied"
    case_application: >
      No diagnosis, trait inference, capacity judgment, risk assessment,
      pathology claim, clinical claim, or forensic person-evaluation is made.
    failure_condition: >
      The analysis would fail P8 if it inferred pathology, traits, competence,
      risk, diagnosis, or clinical status.
  P9_scenic_context_bound_interpretation:
    id: "P9"
    title: "Scenic, context-bound interpretation"
    base_text: >
      PMS applications must keep findings tied to praxeological scenes, roles,
      and structures. Global person-labels and irreversible ontological
      attributions are out of scope.
    status: "satisfied"
    case_application: >
      Because no concrete scene is provided, this is explicitly marked as a
      non-concrete, case-type-bound conceptual projection.
    failure_condition: >
      The analysis would fail P9 if it generated global, irreversible, or
      decontextualized claims.

