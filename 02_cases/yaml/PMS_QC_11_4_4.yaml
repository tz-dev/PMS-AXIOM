pms_qc_overlay_application:
  schema_version: "PMS-QC_1.1"
  schema_role: "case_overlay_application"
  overlay_status: "generic_qc_structural_layer_applied"
  overlay_source_file: "PMS-QC.yaml"
  paper_source_file: "PMS-QC.md"
  base_reference_file: "PMS.yaml"
  base_schema_version: "PMS_1.3"

  schema_meta:
    model_name: "Praxeological Meta-Structure – Quantum Computing Layer"
    model_short: "PMS-QC"
    status: "draft"
    repository_role: "generic_qc_structural_layer"
    layer_role: "base_overlay"
    depends_on:
      - "PMS_1.3"
    epistemic_status: >
      Bounded structural overlay for quantum-computational description,
      annotation, audit, macro-level workflow rendering, and policy-layer
      reasoning within the PMS framework.
    boundedness_note: >
      PMS-QC is used here only as a candidate QC structural overlay. It does
      not claim monopoly over high-level structural analysis, final closure
      against rival grammars, or exhaustive capture of quantum-computational
      phenomena.
    last_updated: "2026-04-19"
    authors:
      - name: "T. Zöller"
        role: "originator"
      - name: "ChatGPT (GPT-5.4 Thinking)"
        role: "formalization_assistant"
    inherits_from:
      model_name: "Praxeological Meta-Structure"
      model_short: "PMS"
      schema_version: "PMS_1.3"
    description: >
      PMS-QC is applied as a generic quantum-computational structural overlay
      that renders the QSTABILIZE audit-trace case as bounded compositions of
      the PMS operators Δ–Ψ. It adds QC-facing visibility for frames,
      iteration, stabilisation, checkpoints, audit logging, and structural
      policies, without redefining PMS operators or displacing established QC
      formalisms.
    intended_use:
      summary: >
        Structural description, mapping, annotation, and bounded audit-layer
        reasoning for a quantum workflow that repeats stabilising steps and
        depends on documentation of repetitions, checkpoints, interruptions,
        and missing records.
      allowed_profiles:
        - "quantum_algorithm_documentation"
        - "structural_qc_analysis"
        - "qc_workflow_auditing"
        - "meta_compiler_annotation"
        - "bounded_ai_qc_policy_reasoning"
        - "research_and_theoretical_exploration"
      not_intended_for:
        - "physical_noise_modelling"
        - "low_level_gate_optimization_only"
        - "hardware_level_safety_certification"
        - "replacement_of_qc_formalisms"
        - "performance_guarantee_provision"
        - "deployment_ready_agent_control"
        - "validated_safety_architecture"
        - "architecture_independent_implementation_claims"
        - "anthropomorphic_interpretation_of_quantum_processes"
    case_application: >
      The fitting intended-use profile is qc_workflow_auditing, with secondary
      relevance for structural_qc_analysis and quantum_algorithm_documentation.
      The overlay is not used as implementation validation, physical modelling,
      performance assessment, deployment readiness review, or safety
      certification.

  normative_position:
    physics_clause: >
      PMS-QC is not a physical theory. In this case it does not modify or
      compete with quantum mechanics, the quantum circuit model, Hamiltonian
      simulation, tensor networks, ZX-calculus, categorical quantum mechanics,
      or any hardware-level account of stabilisation.
    non_monopoly_clause: >
      PMS-QC complements possible QC formalisms but does not replace them and
      does not claim monopoly over audit-trace, workflow-log, compiler,
      stabiliser-code, or process-mining analysis.
    non_identity_clause: >
      Mapping QSTABILIZE, iteration, checkpoints, and missing records to PMS-QC
      roles is a structural rendering only, not a claim of ontological identity
      between quantum phenomena and PMS operators.
    substrate_independence: >
      The use of Δ–Ψ across PMS Core and PMS-QC expresses structural
      comparability only. It does not imply equal explanatory depth across
      praxeological, computational, organisational, and quantum-computational
      domains.
    anthropomorphism_clause: >
      Terms such as self-binding, asymmetry, attractor, and stabilisation are
      used in formal structural senses. No consciousness, intention, agency,
      moral responsibility, or person-like selfhood is attributed to the
      quantum workflow.
    governance_conditionality_clause: >
      Policy-layer use is conditional and overlay-specific. The audit-trace
      reading does not establish a validated safety, governance, control,
      enforcement, or deployment architecture.
    base_vs_extension_clause: >
      Only generic PMS-QC base-overlay constructs are used. No paper-specific
      ladder, fixed-point Grover refinement, algorithm-specific convergence
      schedule, or stronger governance heuristic is promoted into the generic
      PMS-QC base layer.
    case_application: >
      These clauses constrain the case to a bounded QC overlay reading: repeated
      QSTABILIZE-like stabilisation and checkpoints may be structurally annotated,
      but the overlay cannot certify that the workflow is physically correct,
      numerically valid, safe, stable, complete, or legally auditable.

  computational_position:
    representation_clause: >
      This QC overlay block is a formal representational annotation. It is not
      executable code, not a proof of implementability, and not a guarantee of
      backend interoperability.
    calibration_clause: >
      Structural well-formedness in the overlay does not establish physical
      adequacy, numerical correctness, optimal compilation, stability, or
      safety of the repeated stabilising workflow.
    accountability_clause: >
      Operational use would require external architecture, implementation,
      validation, and domain-specific accountability mechanisms not supplied by
      the case material.
    deployment_clause: >
      Use of PMS-QC for audit annotation or AI–QC coordination does not imply
      deployment readiness or a validated control system.
    rivalry_clause: >
      Rival or complementary QC formalisms may foreground the workflow more
      effectively, especially stabiliser-code theory, hardware-level error
      models, compiler traces, circuit models, and process-mining formalisms.
    mapping_validity_clause: >
      The cross-domain mapping validity remains methodologically open. The
      reduced QC signatures below are overlay shorthand only and are not
      evidence that PMS operator semantics are physically preserved without
      remainder.
    case_application: >
      The case remains structural, documentation-oriented, and audit-oriented.
      It would overclaim if treated as implementation evidence, physical
      modelling, runtime governance, validated safety, or deployment-level
      control.

  terminology:
    qc_frame:
      definition: >
        A structured domain of quantum operations: Hilbert space, register
        decomposition, active subspace, or error-correction code space, rendered
        as a □-operator instance within the PMS-QC overlay.
      case_application: >
        The most fitting frame is an under-specified error_space or workflow
        audit frame for repeated stabilising steps; the actual Hilbert space,
        register layout, code space, and measurement frame are not supplied.
    qc_workflow:
      definition: >
        A sequence or DAG of quantum and possibly classical operations that can
        be expressed as a PMS operator chain with Δ–Ψ annotations.
      case_application: >
        The workflow is described only at macro level as repeated stabilising
        steps across iterations with checkpoints, interruptions, and possible
        missing documentation for later review.
    macro_operator:
      definition: >
        A named QC-level structural construct such as QFRAME or QPREP that
        expands to a Δ–Ψ operator sequence and may serve as documentation,
        annotation, audit handle, or compilation-adjacent anchor. A macro does
        not by itself guarantee physical adequacy, correctness, or optimal
        compilation.
      case_application: >
        QSTABILIZE and QITERATE are the relevant macro handles. QFRAME and Σ
        are relevant as frame and checkpoint or commit markers. QPREP,
        QORACLE_CALL, QDIFFUSION, QFT_ALIGN, and QMEASURE remain absent or
        under-specified.
    generic_base_macro:
      definition: >
        A macro belonging to the generic PMS-QC base overlay and intended for
        algorithm-agnostic structural use.
      case_application: >
        The case uses only generic base macros and does not invoke an EXT or
        paper-specific macro.
    paper_specific_refinement:
      definition: >
        A specialized construct, chain pattern, or policy refinement that may be
        introduced in an optional extension layer without changing PMS-QC base
        semantics.
      case_application: >
        No paper-specific refinement is invoked. The case does not introduce a
        QPE ladder, fixed-point Grover schedule, special convergence guard, or
        algorithm-specific stabiliser policy.
    optional_extension:
      definition: >
        A non-canonical add-on layer that refines or augments a bounded use case
        while remaining subordinate to PMS and the PMS-QC base overlay.
      case_application: >
        Optional extension use is absent and reserved. It would be needed only
        if the actual workflow supplied algorithm-specific stabiliser schedules,
        concrete code identifiers, noise models, compiler semantics, or
        hardware-specific audit policies.
    structural_constraint:
      definition: >
        An admissibility condition or guardrail formulated at the level of Δ–Ψ
        organisation rather than at the level of physical implementation.
      case_application: >
        Relevant structural constraints include bounded Θ-depth, stabiliser
        frequency, checkpoint commit discipline, no free Φ-after-Σ rewriting,
        and optional audit logging of Σ and Ψ events.
    non_guarantee:
      definition: >
        Explicit indication that structural admissibility does not imply
        physical correctness, safety, convergence, or deployment adequacy.
      case_application: >
        The overlay provides no guarantee of physical correctness, numerical
        correctness, convergence, stability, fault tolerance, safety,
        compliance, deployment readiness, or audit admissibility.
    structural_comparability:
      definition: >
        Operator-level comparability across domains that does not imply
        ontological identity or equal explanatory depth.
      case_application: >
        Structural comparability is used to map PMS Core trace concerns to
        PMS-QC workflow annotation; it remains bounded and non-identitarian.
    structural_not_physical:
      definition: >
        Indicates that the relevant statement concerns structural rendering,
        organisation, or annotation, not the underlying physical mechanism.
      case_application: >
        Required throughout the QSTABILIZE reading: stabilisation, iteration,
        checkpointing, and missing records are described structurally, not as
        validated physical or hardware-level mechanisms.
    cross_domain_mapping_validity:
      definition: >
        PMS-QC does not currently provide a formal criterion for when a
        cross-domain operator mapping preserves PMS operator semantics rather
        than functioning as a structurally useful analogy or symbolic transfer.
      case_application: >
        Mapping validity is weak-to-under-specified and methodologically open.
        The QC signatures are overlay shorthand only.

  overlay_relationship_to_core:
    status: "subordinate_to_completed_pms_core_case"
    core_case_status: "already_completed"
    core_case_source: "completed PMS Core case YAML for Stabilised Iteration (QSTABILIZE) (Audit Trace)"
    rule: >
      This QC block is appended to or integrated with an already completed PMS
      Core v1.3 case artefact. It does not rewrite the core pass, redefine PMS
      operators, alter PMS dependencies, change derived structures, or treat
      PMS-QC constructs as PMS Base.
    preserved_core_elements:
      - "PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ"
      - "PMS operator order and dependency hygiene"
      - "PMS derived structures as derived, not primitive"
      - "PMS application guardrails"
      - "PMS non-diagnostic and non-person-ranking discipline"
      - "PMS non-capture and rival-openness discipline"
    integration_rule: >
      The QC overlay adds visibility for QC frames, repeated QSTABILIZE-like
      stabilisation, checkpoint or commit markers, interruptions, missing
      records, structural policies, AI–QC annotation, audit logging, and
      base/extension boundaries. It must not modify the completed PMS Core case
      except where a direct PMS.yaml inconsistency has been separately
      identified.

  pms_reference:
    note: >
      PMS-QC assumes that PMS.yaml is authoritative as PMS Base. This overlay
      does not redefine Δ–Ψ, does not modify their canonical dependency spine,
      and does not alter PMS operator ordering or repository-level governance.
      All QC mappings below are overlay-level renderings only.
    operators_ref:
      source: "PMS.yaml"
      meta_axioms:
        - "Δ"
        - "∇"
        - "□"
        - "Λ"
        - "Α"
        - "Ω"
        - "Θ"
        - "Φ"
        - "Χ"
        - "Σ"
        - "Ψ"
    dependency_hygiene_note: >
      Macro expansions and reduced signatures are documentation handles. They
      do not replace PMS dependencies and do not promote QC roles into canonical
      PMS operator meanings.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true

  repository_governance:
    role_of_this_file: >
      Generic QC structural overlay within the PMS repository ecosystem.
    overlays_may:
      - "Define domain-specific mappings from Δ–Ψ to QC roles."
      - "Introduce generic QC base macros for structural description."
      - "Define bounded overlay-level structural policies."
      - "Add organizational or toolchain-oriented helper metadata, provided such metadata is explicitly non-canonical."
    overlays_should_not_without_explicit_revision:
      - "Silently redefine Δ–Ψ mappings as if they were canonical PMS semantics."
      - "Silently alter the canonical PMS operator set, ordering, or dependency path."
      - "Silently promote paper-specific refinements into the PMS-QC base layer."
      - "Silently alter the semantics of existing base macros."
      - "Treat governance-oriented QC applications as required endpoints of PMS or PMS-QC."
      - "Treat helper metadata as if it modified PMS operator logic."
    case_application: >
      Governance discipline is preserved by treating QSTABILIZE, QITERATE,
      QFRAME, and Σ as overlay-level annotation handles only. No macro is
      promoted into PMS Base, no EXT refinement is introduced, and no policy
      check is treated as validated safety or enforcement authority.

  base_vs_extension_boundary:
    note: >
      This block records the intended boundary between the generic PMS-QC base
      overlay and optional paper-specific refinement layers. It is a boundary
      aid for repository discipline and does not itself redefine PMS or PMS-QC
      semantics.
    base_macros:
      - "QFRAME"
      - "QPREP"
      - "QORACLE_CALL"
      - "QITERATE"
      - "QDIFFUSION"
      - "QFT_ALIGN"
      - "QMEASURE"
      - "QSTABILIZE"
    base_policies:
      - "no_unframed_omega"
      - "measurement_requires_meas_frame"
      - "unstable_asymmetry_guard"
      - "no_reframing_past_sigma"
      - "max_iteration_depth"
      - "stabiliser_frequency"
    paper_specific_refinements_reserved_for_ext:
      - "Explicit QPE ladder macroization, e.g. U^(2^j) as a reusable named refinement."
      - "Fixed-point or overshoot-regulated Grover refinements."
      - "Algorithm-specific attractor schedules or convergence guards."
      - "Paper-specific governance heuristics beyond the generic base policy layer."
    examples_that_remain_skeleton_only:
      - "grover_minimal"
      - "qpe_minimal"
    boundary_status: "preserved"
    case_application: >
      The case stays within the PMS-QC base overlay. It uses the generic
      QSTABILIZE and QITERATE handles and does not require Grover, QPE, QFT, a
      fixed-point refinement, or an algorithm-specific EXT layer on the given
      material.

  qc_mapping:
    overview: >
      Each PMS operator Δ–Ψ is rendered here as a possible QC overlay role. The
      mapping is one-to-many, non-identitarian, and case-bounded. It does not
      imply that quantum phenomena are identical to PMS operators or that PMS-QC
      exhausts QC analysis.
    mapping_status: "partial"
    operator_roles:
      Delta:
        id: "Δ"
        name: "Difference"
        applicability: "active"
        qc_role: >
          Distributed difference structures in Hilbert space can be read as
          superposition, basis alternatives, and marked subspaces. Within the
          computational frame, Δ can render how alternatives become structurally
          distinguishable.
        qc_examples:
          - "Uniform superposition over computational basis states."
          - "Oracle-marked states in Grover's search."
          - "Eigenphase-encoded alternatives in the QPE control register."
        typical_realizations:
          - "Hadamard layers creating superposition."
          - "Phase flips or selective phase shifts marking solution states."
        case_application: >
          Δ maps here to distinctions among iterations, checkpoint states,
          stabilisation events, interruptions, documented records, and missing
          records. It is not mapped to a specified superposition or marked-state
          structure because the case does not supply a circuit.
      Nabla:
        id: "∇"
        name: "Impulse"
        applicability: "weak"
        qc_role: >
          Minimal directed activation or progression in a circuit can be
          rendered as the application of a non-trivial gate or gate block that
          moves the system away from its previous configuration.
        qc_examples:
          - "First non-identity gate layer after state initialisation."
          - "Single-qubit rotations that initiate amplitude flow."
        typical_realizations:
          - "Single-qubit rotations Rx, Ry, Rz."
          - "Initial entangling step in QPREP(entangle)."
        case_application: >
          ∇ is weakly present as procedural directedness toward stabilisation
          and audit-trace continuation. No concrete activation gate or
          preparation step is specified.
      Box:
        id: "□"
        name: "Frame"
        applicability: "active"
        qc_role: >
          Structural boundaries within which quantum operations occur can be
          modeled as the chosen Hilbert space, register decomposition, active
          subspace, or error-correction code space.
        qc_examples:
          - "Problem frame specifying the search domain in Grover."
          - "Eigenproblem frame in Quantum Phase Estimation."
          - "Error-space frame of a stabiliser code."
        typical_realizations:
          - "Register layout and qubit allocation."
          - "Subspace definitions for oracles or codes."
        case_application: >
          □ maps to the under-specified stabilisation workflow frame and
          possible error_space or code-space frame, plus a later audit frame for
          reviewing the trace. The actual frame kind remains under-specified.
      Lambda:
        id: "Λ"
        name: "Non-Event"
        applicability: "active"
        qc_role: >
          Unrealised computational branches or outcomes, especially at
          measurement, can be rendered as the paths not taken encoded as
          suppressed or discarded possibilities.
        qc_examples:
          - "Unrealised measurement outcomes in Grover."
          - "Phase configurations not selected in QPE readout."
        typical_realizations:
          - "Measurement collapse eliminating alternatives."
          - "Post-selection discarding undesired outcomes."
        case_application: >
          Λ maps to missing records, skipped or undocumented checkpoints,
          unrecorded interruptions, delayed trace entries, and expected audit
          items that fail to appear within the frame. It is not mapped to
          measurement residues unless an actual QMEASURE stage is supplied.
      Alpha:
        id: "Α"
        name: "Attractor"
        applicability: "active"
        qc_role: >
          Directed convergence tendencies in the amplitude landscape can be
          modeled as amplitude amplification, phase alignment, or stabilising
          transformations that bias evolution toward certain states or
          subspaces.
        qc_examples:
          - "Grover diffusion operator amplifying marked states."
          - "Inverse QFT in QPE aligning amplitudes around the phase estimate."
          - "Error-mitigation routines pulling states back toward a code space."
        typical_realizations:
          - "Amplitude amplification subcircuits."
          - "Fourier-domain alignment QFT / QFT^-1."
        case_application: >
          Α maps to recurrent stabilising patterning and possible pull toward a
          code space, invariant region, or trace-stable workflow state. No
          amplitude-amplification or QFT alignment claim is made.
      Omega:
        id: "Ω"
        name: "Asymmetry"
        applicability: "weak"
        qc_role: >
          Directional or role-based structural differences in QC can be read as
          controlled operations, oracle calls, and measurement asymmetries
          through which certain subsystems act on others in a privileged way.
        qc_examples:
          - "Controlled unitary action in phase-estimation-style settings."
          - "Oracle phase flip on the target state in Grover."
          - "Measurement mapping quantum states to classical outcomes."
        typical_realizations:
          - "Controlled gates such as CNOT or controlled-U."
          - "Problem oracles with special knowledge about solution sets."
        case_application: >
          Ω is weakly relevant only as possible audit asymmetry or possible
          stabiliser/check subsystem asymmetry. No oracle, controlled-U,
          measurement asymmetry, or concrete resource asymmetry is specified.
      Theta:
        id: "Θ"
        name: "Temporality / Iteration"
        applicability: "active"
        qc_role: >
          Ordered repetition of quantum blocks can be rendered as explicit
          iteration counts, loop-unrolled sequences, or layered application of
          controlled operations. This does not by itself elevate any particular
          algorithm-specific ladder pattern into the generic base semantics of
          PMS-QC.
        qc_examples:
          - "k-fold repetition of the Grover oracle–diffusion block."
          - "Ordered control sequences in QPE-like constructions."
        typical_realizations:
          - "For-loops or unrolled repetitions in circuit descriptions."
          - "Time-ordered application of control sequences."
        case_application: >
          Θ is active as repeated stabilising iterations. The iteration count k,
          block internals, stopping rule, and temporal thresholds are not
          specified.
      Phi:
        id: "Φ"
        name: "Recontextualization"
        applicability: "weak"
        qc_role: >
          Structural reframing between computational domains can be modeled as
          basis changes, Fourier transforms, and representation shifts that
          reinterpret the meaning of amplitudes without changing the claim to
          underlying physical identity.
        qc_examples:
          - "Inverse QFT in QPE moving from phase domain to bit representation."
          - "Switching between logical and physical qubit frames."
        typical_realizations:
          - "QFT / QFT^-1 layers."
          - "Change-of-basis transformations for measurement or analysis."
        case_application: >
          Φ is weakly present as later audit recontextualisation of execution
          traces. No basis change, Fourier transform, logical/physical frame
          shift, or QFT_ALIGN step is supplied.
      Chi:
        id: "Χ"
        name: "Distance"
        applicability: "weak"
        qc_role: >
          Separation or insulation between subsystems, layers, or domains can
          be rendered as boundaries between experimental frames, dev/prod
          environments, or separated code spaces. In QC contexts, this is
          typically weaker and more context-dependent than in
          anthropological or governance-near PMS applications.
        qc_examples:
          - "Isolation of experimental circuits from production QC workloads."
          - "Code-space separation in certain error-correction architectures."
        typical_realizations:
          - "Use of disjoint register sets."
          - "Segregated pipelines for test vs. production execution."
        case_application: >
          Χ is active in the PMS Core review posture but only weak in the QC
          overlay. It may correspond to separation between execution trace and
          later audit review; no register, code-space, or dev/prod separation is
          specified.
      Sigma:
        id: "Σ"
        name: "Integration"
        applicability: "weak"
        qc_role: >
          Structural commitment of transformations can be modeled as points
          where previous operations are treated as fixed, integrated, and no
          longer freely reinterpreted except under explicitly bounded
          constraint regimes.
        qc_examples:
          - "End of a Grover iteration after diffusion."
          - "Post-QFT state in QPE before measurement."
        typical_realizations:
          - "Circuit-level boundaries where results are frozen for next stages."
          - "Checkpoints in QC workflows or compilers."
        case_application: >
          Σ maps weakly to checkpoints and audit commit boundaries where
          stabilisation records are treated as fixed for later review. Actual
          integration of the trace is not demonstrated.
      Psi:
        id: "Ψ"
        name: "Self-Binding"
        applicability: "weak"
        qc_role: >
          Stabilising invariants and constraints on future operations can be
          rendered as error correction, stabiliser checks, coherence or
          iteration bounds, and bounded overlay-level policy constraints that
          restrict admissible compositions.
        qc_examples:
          - "Stabiliser code enforcement and syndrome-based correction."
          - "Iteration-depth guards on Grover- or QPE-related variants."
          - "Overlay-level policy constraints in bounded AI–QC settings."
        typical_realizations:
          - "Invariant enforcement such as stabiliser measurement and correction or code-space preservation."
          - "Bounded policy constraints on admissible composition or iteration depth in AI–QC orchestration."
        case_application: >
          Ψ maps only as a weak overlay shorthand for QSTABILIZE-like invariant
          maintenance, stabiliser checking, or bounded trace discipline. It is
          not literal selfhood and not proof of stable policy enforcement.

  qc_macro_language:
    overview: >
      PMS-QC generic base macros are used here as structural documentation and
      audit handles. They are not PMS operators, not dependency rewrites, not
      executable code, and not guarantees of physical adequacy, correctness,
      convergence, stability, optimal compilation, or safety.
    macro_program_status: "partial"
    selected_macro_program:
      - "QFRAME(error_space_or_workflow_frame_under_specified)"
      - "QITERATE(k_under_specified, { QSTABILIZE(code_id_under_specified); Σ(checkpoint_or_trace_commit); })"
      - "audit_review({records, checkpoints, interruptions, missing_records})"
    macro_operators:
      QFRAME:
        id: "QFRAME"
        applicability: "active"
        params:
          - "kind"
        description: "Create or activate a quantum frame (□)."
        allowed_kinds:
          - "init"
          - "problem"
          - "eigenproblem"
          - "error_space"
        pms_expansion:
          - "□"
        canonical_chain: "□"
        notes: >
          QFRAME(kind) is a generic PMS-QC base macro. It marks structural
          scope only and does not by itself guarantee physical adequacy,
          resource availability, or hardware compatibility.
        case_application: >
          QFRAME is active as an under-specified error_space or workflow frame.
          The case does not provide enough information to choose a concrete
          Hilbert space, code space, register layout, or measurement frame.
      QPREP:
        id: "QPREP"
        applicability: "not_applicable"
        params:
          - "mode"
        description: >
          Prepare quantum registers through superposition, entanglement, or
          initialisation.
        allowed_modes:
          - "superposition"
          - "register_init"
          - "entangle"
        pms_expansion:
          - "Δ"
          - "∇"
          - "Α"
        canonical_chain: "Α ∘ ∇ ∘ Δ"
        notes: >
          QPREP is a generic PMS-QC base macro. It captures structural
          preparation only; paper-specific preparation refinements belong in an
          optional extension layer.
        case_application: >
          QPREP is not applicable on the supplied material because no register
          preparation, superposition, entanglement, or initialization step is
          described.
      QORACLE_CALL:
        id: "QORACLE_CALL"
        applicability: "not_applicable"
        params:
          - "oracle_id"
        description: >
          Apply an oracle or controlled unitary encoding asymmetry within an
          active frame.
        pms_expansion:
          - "□"
          - "Δ"
          - "Ω"
        canonical_chain: "Ω ∘ Δ ∘ □"
        notes: >
          QORACLE_CALL is a generic PMS-QC base macro. Specialized laddered
          variants remain paper-specific refinements and are not part of base
          semantics.
        case_application: >
          No oracle, controlled-U, controlled operation, or marked-state
          operation is specified. Ω remains weak in the Core case and is not
          upgraded by the QC overlay.
      QDIFFUSION:
        id: "QDIFFUSION"
        applicability: "not_applicable"
        params: []
        description: >
          Apply amplitude amplification or related attractor dynamics with an
